site_name: OCI Service Operator for Kubernetes
site_description: Customer-facing documentation for OCI Service Operator for Kubernetes.
site_url: https://oracle.github.io/oci-service-operator/
repo_url: https://github.com/oracle/oci-service-operator
repo_name: oracle/oci-service-operator
docs_dir: docs
site_dir: site
exclude_docs: README.md
not_in_nav: |
  reference/samples/**/*.md

theme:
  name: material
  font:
    text: Source Sans 3
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: custom
      accent: custom
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Get Started:
      - get-started/index.md
      - Installation: installation.md
      - Quick start with KRO: user-guide.md
