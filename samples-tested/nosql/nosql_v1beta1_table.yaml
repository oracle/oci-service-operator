#
# Replace spec.compartmentId with a real OCI compartment OCID before running
# e2e. Update metadata.name, spec.name, and spec.ddlStatement before reusing to
# avoid OCI table-name conflicts in the tenancy.
#

apiVersion: nosql.oracle.com/v1beta1
kind: Table
metadata:
  name: nosql-table-sample-20260402142349
spec:
  compartmentId: ocid1.compartment.oc1..exampleuniqueID
  name: nosql_table_sample_20260402142349
  ddlStatement: "CREATE TABLE IF NOT EXISTS nosql_table_sample_20260402142349 (id INTEGER, name STRING, PRIMARY KEY(id))"
  tableLimits:
    maxReadUnits: 50
    maxWriteUnits: 50
    maxStorageInGBs: 25
