#
# Replace spec.compartmentId and spec.subnetId with real OCI OCIDs before
# running e2e.
# Use a tenancy-unique spec.displayName if you want to force a fresh create
# instead of binding to an existing RedisCluster with the same displayName in
# the same compartment.
# Adjust nodeCount and nodeMemoryInGBs if your tenancy or service limits reject
# these starter values.
#

apiVersion: redis.oracle.com/v1beta1
kind: RedisCluster
metadata:
  name: rediscluster-sample
spec:
  compartmentId: ocid1.compartment.oc1..exampleuniqueID
  displayName: osok-redis-sample
  nodeCount: 1
  softwareVersion: V7_0_5
  nodeMemoryInGBs: 2.0
