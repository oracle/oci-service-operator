e-width:0.5;" width="129.958" x="609.9941" y="40"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="115.958" x="616.9941" y="57.7803">Kubernetes Secret</text></g><path d="M11,92 L11,114 A8,8 0 0 0 19,122 L435,122 A8,8 0 0 0 443,114 L443,94 L433,84 L19,84 A8,8 0 0 0 11,92" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M433,84 L433,90 A4,4 0 0 0 437,94 L443,94 L433,84" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7852" x="83.9065" y="99.7803">Finalizer discipline, delete confirmation, work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.0469" x="83.9065" y="113.7803">requests, and optional Secret cleanup</text><path d="M18,134 L97.0137,134 L97.0137,140 L87.0137,150 L10,150 L10,142 A8,8 0 0 1 18,134" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="106" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="654.0195" x="10" y="134"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="42.0137" x="25" y="145.7803">Step 1</text><g class="message" data-entity-1="part1" data-entity-2="part2" id="msg1"><polygon fill="#0F172A" points="367.4019,166,377.4019,170,367.4019,174,371.4019,170" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="76.0239" x2="373.4019" y1="170" y2="170"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3779" x="83.0239" y="164.7803">Handle delete request with finalizer discipline</text></g><path d="M384,191 L384,227 A8,8 0 0 0 392,235 L646,235 A8,8 0 0 0 654,227 L654,193 L644,183 L392,183 A8,8 0 0 0 384,191" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M644,183 L644,189 A4,4 0 0 0 648,193 L654,193 L644,183" fill="#