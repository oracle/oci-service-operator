"527" y2="527"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="28.97" y="518.7803">terminating</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="53.4688" x="234.87" y="629"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="234.87" x2="288.3388" y1="653" y2="653"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="33.4688" x="244.87" y="644.7803">failed</text></g><ellipse cx="360.6" cy="51" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="92.6" cy="766" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="92.6" cy="766" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="34" id="ent0003"><path d="M207.61,271 L207.61,341 L173.09,345 L207.61,349 L207.61,419 A8,8 0 0 0 215.61,427 L515.6012,427 A8,8 0 0 0 523.6012,419 L523.6012,273 L513.6012,263 L215.61,263 A8,8 0 0 0 207.61,271" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M513.6012,263 L513.6012,269 A4,4 0 0 0 517.6012,273 L523.6012,273 L513.6012,263" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.123" x="213.61" y="278.7803">Common controller phases specialized by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3096" x="213.61" y="292.7803">provider-backed lifecycle states</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1299" x="213.61" y="306.7803">Step 1. Provisioning, Active, Updating,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="213.61" y="320.7803">Terminating, and Failed are the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5029" x="213.61" y="334.7803">controller phases.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5713" x="213.61" y="348.7803">Step 2. Controller-local state machines map</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0605" x="213.61" y="362.7803">imported provider states into those phases and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6543" x="213.61" y="376.7803">keep delete targets explicit.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2949" x="213.61" y="390.7803">Step 3. Open gaps and legacy adapters stay</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9912" x="213.61" y="404.7803">visible instead of being hidden behind a generic</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="111.2891" x="213.61" y="418.7803">steady-state path.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="23" id="lnk3"><path d="M360.6,61.29 C360.6,77.87 360.6,107.03 360.6,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="360.6,136.85,364.6,127.85,360.6,131.85,356.6,127.85,360.6,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.6064" x="361.6" y="102.7803">create or bind</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="24" id="lnk4"><path d="M312.84,182.79 C276.04,199.86 225.68,227.38 190.6,263