<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="815px" preserveAspectRatio="none" style="width:345px;height:815px;background:#FCFCFD;" version="1.1" viewBox="0 0 345 815" width="345px" zoomAndPan="magnify"><title>Shared Reconcile Activity</title><defs/><g><rect fill="#FCFCFD" height="815" style="stroke:none;stroke-width:1;" width="345" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="171.9512" x="85.3789" y="30.7803">Shared Reconcile Activity</text></g><ellipse cx="172.8545" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="257.3232" x="44.1929" y="85"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3232" x="54.1929" y="105.7803">Common reconcile flow specialized by</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.1787" x="54.1929" y="119.7803">controller-local activity diagrams</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.8398" x="20.4346" y="153"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8398" x="30.4346" y="173.7803">Step 1. Read desired spec and existing status</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3857" x="30.4346" y="187.7803">from Kubernetes.</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="294.6953" x="25.5068" y="221"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6953" x="35.5068" y="241.7803">Step 2. Resolve current OCI identity through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2197" x="35.5068" y="255.7803">GET or datasource list fallback before</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.8398" x="35.5068" y="269.7803">choosing bind, create, update, or delete.</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="281.4541" x="32.1274" y="303"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4541" x="42.1274" y="323.7803">Step 3. Apply controller-local spec, secret,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6953" x="42.1274" y="337.7803">and delete policies while keeping</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.0957" x="42.1274" y="351.7803">BaseReconciler invariants intact.</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="291.5645" x="27.0723" y="385"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5645" x="37.0723" y="405.7803">Step 4. Project OSOK status, finalizer state,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.0264" x="37.0723" y="419.7803">and retryable conditions back to the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5791" x="37.0723" y="433.7803">reconciler.</text><ellipse cx="172.8545" cy="478" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="172.8545" cy="478" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="172.8545" x2="172.8545" y1="65" y2="85"/><polygon fill="#0F172A" points="168.8545,75,172.8545,85,176.8545,75,172.8545,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="172.8545" x2="172.8545" y1="133" y2="153"/><polygon fill="#0F172A" points="168.8545,143,172.8545,153,176.8545,143,172.8545,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="172.8545" x2="172.8545" y1="201" y2="221"/><polygon fill="#0F172A" points="168.8545,211,172.8545,221,176.8545,211,172.8545,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="172.8545" x2="172.8545" y1="283" y2="303"/><polygon fill="#0F172A" points="168.8545,293,172.8545,303,176.8545,293,172.8545,297" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="172.8545" x2="172.8545" y1="365" y2="385"/><polygon fill="#0F172A" points="168.8545,375,172.8545,385,176.8545,375,172.8545,379" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="172.8545" x2="172.8545" y1="447" y2="467"/><polygon fill="#0F172A" points="168.8545,457,172.8545,467,176.8545,457,172.8545,461" style="stroke:#0F172A;stroke-width:1;"/><g class="legend" data-source-line="29"><rect fill="none" height="290" rx="8" ry="8" style="stroke:#000000;stroke-width:1;" width="298.709" x="22" y="500"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3232" x="27" y="515.7803">Common reconcile flow specialized by</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.1787" x="27" y="529.7803">controller-local activity diagrams</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="9.3242" x="27" y="543.7803">--</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9785" x="27" y="557.7803">Shared Contract (#0F172A)</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.792" x="27" y="571.7803">Shared reconcile semantics and common</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="125.2754" x="27" y="585.7803">controller invariants.</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="9.3242" x="27" y="599.7803">--</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.2822" x="27" y="613.7803">Provider Facts (#0F766E)</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8818" x="27" y="627.7803">Imported terraform-provider-oci operations,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3574" x="27" y="641.7803">waits, datasource behavior, and lifecycle</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="41.2412" x="27" y="655.7803">states.</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="9.3242" x="27" y="669.7803">--</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9648" x="27" y="683.7803">Controller Local (#1D4ED8)</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6611" x="27" y="697.7803">Per-controller specialization derived from</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.0957" x="27" y="711.7803">manifest rows and spec settings.</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="9.3242" x="27" y="725.7803">--</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4473" x="27" y="739.7803">Repo Authored (#B45309)</text><text fill="#000000" font-family="Helvetica" font-s