" font-size="14" lengthAdjust="spacing" textLength="11.6758" x="71.77" y="173.7803">1.</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.917" x="87.3354" y="173.7803">1D4ED8</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9648" x="71.77" y="187.7803">Per-controller specialization</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3027" x="71.77" y="201.7803">derived from manifest rows and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5996" x="71.77" y="215.7803">spec settings.</text></g><!--entity palette_open_gap--><g class="entity" data-qualified-name="Palette.palette_open_gap" data-source-line="27" id="ent0005"><rect fill="#F8FAFC" height="90" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:0.5;" width="207.5371" x="64.65" y="310"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5996" x="74.65" y="330.7803">Open Gap</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="11.6758" x="74.65" y="344.7803">1.</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.917" x="90.2154" y="344.7803">B91C1C</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.8682" x="74.65" y="358.7803">Explicit stop conditions that</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="123.7373" x="74.65" y="372.7803">still block generated</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.5371" x="74.65" y="386.7803">promotion or adapter removal.</text></g><!--entity palette_provider_facts--><g class="entity" data-qualified-name="Palette.palette_provider_facts" data-source-line=