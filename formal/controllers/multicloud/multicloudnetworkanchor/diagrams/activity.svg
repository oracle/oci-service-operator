"135.3857" x="160.2769" y="241.7803">Resolve OCI state via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.082" x="160.2769" y="255.7803">GetMulticloudNetworkAnchor with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.875" x="160.2769" y="269.7803">ListMulticloudNetworkAnchor fallback</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="117.5942" y="303"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.8965" x="127.5942" y="323.7803">Use</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="127.5942" y="337.7803">scaffold_multicloud_multicloudnetworkanchor</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="127.5942" y="351.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="127.5942" y="365.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="222.5249,399,329.9038,399,341.9038,411,329.9038,423,222.5249,423,210.5249,411,222.5249,399" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="222.5249" y="414.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="188.7388" y="407.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="341.9038" y="407.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="223.875" x="32.4136" y="433"/><text fill="#0F172A" font-family="Helvetica" font-size="1