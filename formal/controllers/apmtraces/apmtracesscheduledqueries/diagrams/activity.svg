etica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="320.2212" y="1098.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="320.2212" y="1112.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="320.2212" y="1126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="320.2212" y="1140.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="320.2212" y="1154.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="117.4824" x="320.2212" y="1168.7803">service: apmtraces</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5645" x="320.2212" y="1182.7803">slug: apmtracesscheduledqueries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2197" x="320.2212" y="1196.7803">kind: ApmTracesScheduledQueries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="320.2212" y="1210.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="320.2212" y="1224.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="320.2212" y="1238.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="320.2212" y="1252.7803">requeue: pro