><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="803.8062" y="1479.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="803.8062" y="1493.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg20"><polygon fill="#0F172A" points="540.228,1544,530.228,1548,540.228,1552,536.228,1548" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="534.228" x2="795.8062" y1="1548" y2="1548"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="546.228" y="1528.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="546.228" y="1542.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg21"><polygon fill="#0F172A" points="301.4019,1593,291.4019,1597,301.4019,1601,297.4019,1597" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="295.4019" x2="528.228" y1="1597" y2="1597"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.8262" x="307.4019" y="1577.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="307.4019" y="1591.7803">terminating</text></g><path d="M801,1618 L801,2424 A8,8 0 0 0 809,2432 L1159,2432 A8,8 0 0 0 1167,2424 L1167,1620 L1157,1610 L809,1610 A8,8 0 0 0 801,1618" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1157,1610 L1157,1616 A4,4 0 0 0 1161,1620 L1167,1620 L1157,1610" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="807" y="1625.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="807" y="1639.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="807" y="1653.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="807" y="1667.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="807" y="1681.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="807" y="1695.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="807" y="1709.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="807" y="1723.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="807" y="1737.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="807" y="1751.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="807" y="1765.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="807" y="1779.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="807" y="1793.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="807" y="1807.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="117.4824" x="807" y="1821.7803">service: apmtraces</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.3096" x="807" y="1835.7803">slug: scheduledquery</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="137.751" x="807" y="1849.7803">kind: ScheduledQuery</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="807" y="1863.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="807" y="1877.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="807" y="1891.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="807" y="1905.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="807" y="1919.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="807" y="1933.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="807" y="1947.7803">supported drift: definedTags, freeformTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.8682" x="807" y="1961.7803">scheduledQueryDescription,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="345.8711" x="807" y="1975.7803">scheduledQueryMaximumRuntimeInSeconds (+8 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="807" y="1989.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.1514" x="807" y="2003.7803">apmDomainId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="807" y="2017.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1777" x="807" y="2031.7803">list lookup: oci_apm_traces_scheduled_queries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4336" x="807" y="2045.7803">filters apmDomainId, displayName; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3711" x="807" y="2059.7803">scheduledQueryName unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.1992" x="807" y="2073.7803">CREATING, or UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="807" y="2087.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="807" y="2101.7803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="807" y="2115.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="807" y="2129.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="807" y="2143.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.751" x="807" y="2157.7803">terminal and DELETED is only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6406" x="807" y="2171.7803">delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.916" x="807" y="2185.7803">Pre-create reuse always scopes by apmDomainId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.8887" x="807" y="2199.7803">and uses the SDK displayName filter from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7158" x="807" y="2213.7803">spec.scheduledQueryName, but adoption still</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4746" x="807" y="2227.7803">requires a unique exact-name match from the list</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="111.248" x="807" y="2241.7803">summary surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.2188" x="807" y="2255.7803">Create and update return the ScheduledQuery body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4814" x="807" y="2269.7803">directly, while delete returns headers only. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.792" x="807" y="2283.7803">runtime stays lifecycle-based and relies on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4404" x="807" y="2297.7803">read-after-write plus confirm-delete rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.7715" x="807" y="2311.7803">instead of work-request polling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="807" y="2325.7803">status.apmDomainId mirrors the bound request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.5156" x="807" y="2339.7803">domain because OCI does not echo that query</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="807" y="2353.7803">parameter back on ScheduledQuery or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.0752" x="807" y="2367.7803">ScheduledQuerySummary.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3232" x="807" y="2381.7803">Explicit clear-to-empty intent for zero-value</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4814" x="807" y="2395.7803">top-level fields remains a current gap until the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9365" x="807" y="2409.7803">generated spec preserves empty-string, zero, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2129" x="807" y="2423.7803">empty-map updates distinctly from omission.</text><?plantuml-src fLZRSXit4dt7LtHbNvnQ3cN5Tk9GvLGvafAehCHPqTadLhd06Go95GOO0nZIJ2h_dcvSXZCKkPQJqeD8NFjo-fm6tRtKBRUy0RVcbTbAlOAQAoUOwsUMlBnVMTFfwj8eO-5VTOb_rM159MhUAV-3qVuNtWZuIQYDyBBanzVCv