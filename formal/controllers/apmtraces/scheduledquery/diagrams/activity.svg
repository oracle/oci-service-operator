pacing" textLength="281.709" x="706.5221" y="1952.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="706.5221" y="1966.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="706.5221" y="1980.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="117.4824" x="706.5221" y="1994.7803">service: apmtraces</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.3096" x="706.5221" y="2008.7803">slug: scheduledquery</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="137.751" x="706.5221" y="2022.7803">kind: ScheduledQuery</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="706.5221" y="2036.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="706.5221" y="2050.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="706.5221" y="2064.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="706.5221" y="2078.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="706.5221" y="2092.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="706.5221" y="2106.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="706.5221" y="2120.7803">supported drift: definedTags, freeformTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.8682" x="706.5221" y="2134.7803">scheduledQueryDescription,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="345.8711" x="706.5221" y="2148.7803">scheduledQueryMaximumRuntimeInSeconds (+8 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="706.5221" y="2162.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.1514" x="706.5221" y="2176.7803">apmDomainId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="706.5221" y="2190.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1777" x="706.5221" y="2204.7803">list lookup: oci_apm_traces_scheduled_queries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4336" x="706.5221" y="2218.7803">filters apmDomainId, displayName; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3711" x="706.5221" y="2232.7803">scheduledQueryName unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.1992" x="706.5221" y="2246.7803">CREATING, or UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="706.5221" y="2260.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="706.5221" y="2274.7803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="706.5221" y="2288.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="706.5221" y="2302.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="706.5221" y="2316.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.751" x="706.5221" y="2330.7803">terminal and DELETED is only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6406" x="706.5221" y="2344.7803">delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.916" x="706.5221" y="2358.7803">Pre-create reuse always scopes by apmDomainId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.8887" x="706.5221" y="2372.7803">and uses the SDK displayName filter from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7158" x="706.5221" y="2386.7803">spec.scheduledQueryName, but adoption still</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4746" x="706.5221" y="2400.7803">requires a unique exact-name match from the list</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="111.248" x="706.5221" y="2414.7803">summary surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.2188" x="706.5221" y="2428.7803">Create and update return the ScheduledQuery body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4814" x="706.5221" y="2442.7803">directly, while delete returns headers only. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.792" x="706.5221" y="2456.7803">runtime stays lifecycle-based and relies on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4404" x="706.5221" y="2470.7803">read-after-write plus confirm-delete rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.7715" x="706.5221" y="2484.7803">instead of work-request polling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="706.5221" y="2498.7803">status.apmDomainId mirrors the bound request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.5156" x="706.5221" y="2512.7803">domain because OCI does not echo that query</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="706.5221" y="2526.7803">parameter back on ScheduledQuery or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.0752" x="706.5221" y="2540.7803">ScheduledQuerySummary.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3232" x="706.5221" y="2554.7803">Explicit clear-to-empty intent for zero-value</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4814" x="706.5221" y="2568.7803">top-level fields remains a current gap until the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9365" x="706.5221" y="2582.7803">generated spec preserves empty-string, zero, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2129" x="706.5221" y="2596.7803">empty-map updates distinctly from omission.</text><ellipse cx="669.5221" cy="2215" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="669.5221" cy="2215" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="669.5221" x2="669.5221" y1="157" y2="177"/><polygon fill="#0F172A" points="665.5221,167,669.5221,177,673.5221,167,669.5221,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="820.9879" x2="820.9879" y1="341" y2="361"/><polygon fill="#0F172A" points="816.9879,351,820.9879,361,824.9879,351,820.9879,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="820.9879" x2="820.9879" y1="423" y2="443"/><polygon fill="#0F172A" points="816.9879,433,820.9879,443,824.9879,433,820.9879,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="528.0563" x2="518.0563" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="518.0563" x2="518.0563" y1="257" y2="279"/><polygon fill="#0F172A" points="514.0563,269,518.0563,279,522.0563,269,518.0563,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="810.9879" x2="820.9879" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="820.9879" x2="820.9879" y1="257" y2="279"/><polygon fill="#0F172A" points="816.9879,269,820.9879,279,824.9879,269,820.9879,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="518.0563" x2="518.0563" y1="327" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="518.0563" x2="657.5221" y1="509" y2="509"/><polygon fill="#0F172A" points="647.5221,505,657.5221,509,647.5221,513,651.5221,509" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="820.9879" x2="820