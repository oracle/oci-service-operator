schemaVersion: 1
surface: repo-authored-semantics
service: apmtraces
slug: scheduledquery
kind: ScheduledQuery
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
repoAuthored:
  providerLifecycle:
    createPending:
      - CREATING
    updatePending:
      - UPDATING
    deletePending:
      - DELETING
  listLookup:
    filters:
      - apmDomainId
      - displayName
    matchRule: exact scheduledQueryName unique match in ACTIVE, CREATING, or UPDATING; duplicate matches fail
  mutation:
    mutable:
      - definedTags
      - freeformTags
      - scheduledQueryDescription
      - scheduledQueryMaximumRuntimeInSeconds
      - scheduledQueryName
      - scheduledQueryProcessingConfiguration
      - scheduledQueryProcessingSubType
      - scheduledQueryProcessingType
      - scheduledQueryRetentionCriteria
      - scheduledQueryRetentionPeriodInMs
      - scheduledQuerySchedule
      - scheduledQueryText
    forceNew:
      - apmDomainId
notes:
  - Reviewed lifecycle mapping treats CREATING as provisioning, UPDATING as
    updating, ACTIVE as success, and DELETING as terminating; FAILED is
    terminal and DELETED is only a delete-confirmation target.
  - Pre-create reuse always scopes by apmDomainId and uses the SDK displayName
    filter from spec.scheduledQueryName, but adoption still requires a unique
    exact-name match from the list summary surface.
  - Create and update return the ScheduledQuery body directly, while delete
    returns headers only. The runtime stays lifecycle-based and relies on
    read-after-write plus confirm-delete rereads instead of work-request
    polling.
  - status.apmDomainId mirrors the bound request domain because OCI does not
    echo that query parameter back on ScheduledQuery or ScheduledQuerySummary.
  - Explicit clear-to-empty intent for zero-value top-level fields remains a
    current gap until the generated spec preserves empty-string, zero, and
    empty-map updates distinctly from omission.
