<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1329px" preserveAspectRatio="none" style="width:708px;height:1329px;background:#FCFCFD;" version="1.1" viewBox="0 0 708 1329" width="708px" zoomAndPan="magnify"><title>Activity - identitydomains/IdentityDomainsRule</title><defs/><g><rect fill="#FCFCFD" height="1329" style="stroke:none;stroke-width:1;" width="708" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="313.4893" x="196.1868" y="30.7803">Activity - identitydomains/IdentityDomainsRule</text></g><ellipse cx="325.8228" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="173.4302" y="85"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="183.4302" y="105.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="183.4302" y="119.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="294.7227" x="178.4614" y="153"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7227" x="188.4614" y="173.7803">Load desired IdentityDomainsRule spec and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7373" x="188.4614" y="187.7803">status from Kubernetes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="311.0127" x="170.3164" y="221"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0127" x="180.3164" y="241.7803">Resolve OCI state via GetIdentityDomainsRule</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1025" x="180.3164" y="255.7803">with ListIdentityDomainsRule fallback</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="167.2026" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.8965" x="177.2026" y="309.7803">Use</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7158" x="177.2026" y="323.7803">scaffold_identitydomains_identitydomainsrule</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="177.2026" y="337.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="177.2026" y="351.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="272.1333,385,379.5122,385,391.5122,397,379.5122,409,272.1333,409,260.1333,397,272.1333,385" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="272.1333" y="400.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="238.3472" y="393.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="391.5122" y="393.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="306.3848" x="11" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3848" x="21" y="439.7803">Update path calls UpdateIdentityDomainsRule</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="30.8413" y="473"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.7021" x="40.8413" y="493.7803">Guard mutable fields display_name and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3096" x="40.8413" y="507.7803">force-new fields compartment_id</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="300.1367" x="337.3848" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1367" x="347.3848" y="439.7803">Create path calls CreateIdentityDomainsRule</text><polygon fill="#E2E8F0" points="325.8228,527,337.8228,539,325.8228,551,313.8228,539,325.8228,527" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="104" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="158.6646" y="571"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="168.6646" y="591.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="168.6646" y="605.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="168.6646" y="619.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="168.6646" y="633.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="168.6646" y="647.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="168.6646" y="661.7803">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="263.5918" x="194.0269" y="695"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="204.0269" y="715.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="298.5986" x="176.5234" y="749"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5986" x="186.5234" y="769.7803">Delete path uses DeleteIdentityDomainsRule</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9023" x="186.5234" y="783.7803">with required via GetIdentityDomainsRule or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9854" x="186.5234" y="797.7803">ListIdentityDomainsRule to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="186.5234" y="811.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="186.2578" y="845"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="196.2578" y="865.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="196.2578" y="879.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="169.1133" y="913"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="179.1133" y="933.7803">Requeue on provisioning, updating, terminating</text><path d="M356.8228,957 L356.8228,1133 L336.8228,1137 L356.8228,1141 L356.8228,1317 A0,0 0 0 0 356.8228,1317 L696.8628,1317 A0,0 0 0 0 696.8628,1317 L696.8628,967 L686.8628,957 L356.8228,957 A0,0 0 0 0 356.8228,957" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M686.8628,957 L686.8628,967 L696.8628,967 L686.8628,957" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="362.8228" y="972.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="362.8228" y="986.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="362.8228" y="1000.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="362.8228" y="1014.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="362.8228" y="1028.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="362.8228" y="1042.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="362.8228" y="1056.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="362.8228" y="1070.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="362.8228" y="1084.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="362.8228" y="1098.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="362.8228" y="1112.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.3994" x="362.8228" y="1126.7803">service: identitydomains</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.082" x="362.8228" y="1140.7803">slug: identitydomainsrule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6338" x="362.8228" y="1154.7803">kind: IdentityDomainsRule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="362.8228" y="1168.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="362.8228" y="1182.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="362.8228" y="1196.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="362.8228" y="1210.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="362.8228" y="1224.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="362.8228" y="1238.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="362.8228" y="1252.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="362.8228" y="1266.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="362.8228" y="1280.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="362.8228" y="1294.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="362.8228" y="1308.7803">promotion.</text><ellipse cx="325.8228" cy="1137" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="325.8228" cy="1137" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8228" x2="325.8228" y1="65" y2="85"/><polygon fill="#0F172A" points="321.8228,75,325.8228,85,329.8228,75,325.8228,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8228" x2="325.8228" y1="133" y2="153"/><polygon fill="#0F172A" points="321.8228,143,325.8228,153,329.8228,143,325.8228,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8228" x2="325.8228" y1="201" y2="221"/><polygon fill="#0F172A" points="321.8228,211,325.8228,221,329.8228,211,325.8228,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8228" x2="325.8228" y1="269" y2="289"/><polygon fill="#0F172A" points="321.8228,279,325.8228,289,329.8228,279,325.8228,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="164.1924" x2="164.1924" y1="453" y2="473"/><polygon fill="#0F172A" points="160.1924,463,164.1924,473,168.1924,463,164.1924,467" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="260.1333" x2="164.1924" y1="39