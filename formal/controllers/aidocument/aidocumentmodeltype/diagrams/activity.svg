="14" lengthAdjust="spacing" textLength="189.8477" x="379.1606" y="1098.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.5029" x="379.1606" y="1112.7803">service: aidocument</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.4336" x="379.1606" y="1126.7803">slug: aidocumentmodeltype</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.9717" x="379.1606" y="1140.7803">kind: AiDocumentModelType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="379.1606" y="1154.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="379.1606" y="1168.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="379.1606" y="1182.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="379.1606" y="1196.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="379.1606" y="1210.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="379.1606" y="1224.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="379.1606" y="1238.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="379.1606" y="1252.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="379.1606" y="1266.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="379.1606" y="1280.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="379.1606" y="1294.7803">promotion.</text><ellipse cx="342.1606" cy="1123" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="342.1606" cy="1123" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="342.1606" x2="342.1606" y1="65" y2="85"/><polygon fill="#0F172A" points="338.1606,75,342.1606,85,346.1606,75,342.1606,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="342.1606" x2="342.1606" y1="133" y2="153"/><polygon fill="#0F172A" points="338.1606,143,342.1606,153,346.1606,143,342.1606,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="342.1606" x2="342.1606" y1="201" y2="221"/><polygon fill="#0F172A" points="338.1606,211,342.1606,221,346.1606,211,342.1606,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="342.1606" x2="342.1606" y1="269" y2="289"/><polygon fill="#0F172A" points="338.1606,279,342.1606,289,346.1606,279,342.1606,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="172.3613" x2="172.3613" y1="439" y2="459"/><polygon fill="#0F172A" points="168.3613,449,172.3613,459,176.3613,449,172.3613,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="276.4712" x2="172.3613" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="172.3613" x2="172.3613" y1="383" y2="405"/><polygon fill="#0F172A" points="168.3613,395,172.3613