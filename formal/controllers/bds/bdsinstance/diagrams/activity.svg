lengthAdjust="spacing" textLength="182.875" x="695.7222" y="1937.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="695.7222" y="1951.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="695.7222" y="1965.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="695.7222" y="1979.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="695.7222" y="1993.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="695.7222" y="2007.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="695.7222" y="2021.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="695.7222" y="2035.2803">service: bds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1787" x="695.7222" y="2049.2803">slug: bdsinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5098" x="695.7222" y="2063.2803">kind: BdsInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="695.7222" y="2077.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="695.7222" y="2091.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="695.7222" y="2105.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="695.7222" y="2119.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="695.7222" y="2133.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="375.7441" x="695.7222" y="2147.2803">RESUMING, SUSPENDING, UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="695.7222" y="2161.2803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="695.7222" y="2175.2803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.1162" x="695.7222" y="2189.2803">supported drift: bootstrap_script_url,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.0088" x="695.7222" y="2203.2803">defined_tags, display_name, freeform_tags (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="695.7222" y="2217.2803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="695.7222" y="2231.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.9717" x="695.7222" y="2245.2803">cluster_profile, cluster_version,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.8574" x="695.7222" y="2259.2803">compartment_id, is_high_availability (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3506" x="695.7222" y="2273.2803">create-only fields: bds_cluster_version_summary,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6953" x="695.7222" y="2287.2803">cluster_admin_password, cluster_public_key,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.0303" x="695.7222" y="2301.2803">kerberos_realm_name (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.916" x="695.7222" y="2315.2803">list lookup: oci_bds_bds_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6748" x="695.7222" y="2329.2803">compartment_id, display_name, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="695.7222" y="2343.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="695.7222" y="2357.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="695.7222" y="2371.2803">Generated runtime uses read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.585" x="695.7222" y="2385.2803">follow-up for create and update plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.0957" x="695.7222" y="2399.2803">confirm-delete for delete; `CREATING` maps to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="358.5996" x="695.7222" y="2413.2803">provisioning, `UPDATING`/`SUSPENDING`/`RESUMING`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="330.6406" x="695.7222" y="2427.2803">to updating, `ACTIVE`/`INACTIVE`/`SUSPENDED` to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.7646" x="695.7222" y="2441.2803">success, `DELETING` to terminating, and `FAILED`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0957" x="695.7222" y="2455.2803">to the terminal failed bucket.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3574" x="695.7222" y="2469.2803">Pre-create lookup queries `ListBdsInstances`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="695.7222" y="2483.2803">with `compartmentId` and `displayName`; delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3369" x="695.7222" y="2497.2803">fallback can re-resolve the tracked cluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7158" x="695.7222" y="2511.2803">through `ListBdsInstances` when `GetBdsInstance`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="695.7222" y="2525.2803">stops finding the resource.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.958" x="695.7222" y="2539.2803">Only `displayName`, `bootstrapScriptUrl`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5439" x="695.7222" y="2553.2803">`freeformTags`, `definedTags`, and `kmsKeyId`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5371" x="695.7222" y="2567.2803">reconcile in place. `compartmentId`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.0615" x="695.7222" y="2581.2803">`clusterVersion`, `isHighAvailability`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.2959" x="695.7222" y="2595.2803">`isSecure`, `clusterProfile`, `networkConfig`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.792" x="695.7222" y="2609.2803">and `nodes` remain replacement-only drift.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.9443" x="695.7222" y="2623.2803">`secretId`, `isSecretReused`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.4961" x="695.7222" y="2637.2803">`bdsClusterVersionSummary`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4404" x="695.7222" y="2651.2803">`clusterAdminPassword`, `clusterPublicKey`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8818" x="695.7222" y="2665.2803">`kerberosRealmName` stay create-only for the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.4893" x="695.7222" y="2679.2803">reviewed runtime,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.2959" x="695.7222" y="2693.2803">`timeEarliestCertificateExpiration` stays</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1641" x="695.7222" y="2707.2803">observed status-only, and the runtime has no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7168" x="695.7222" y="2721.2803">secret side effects.</text><ellipse cx="658.7222" cy="2297.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="658.7222" cy="2297.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="658.7222" x2="658.7222" y1="157" y2="177"/><polygon fill="#0F172A" points="654.7222,167,658.7222,177,662.7222,167,658.7222,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="810.188" x2="810.188" y1="341" y2="361"/><polygon fill="#0F172A" points="806.188,351,810.188,361,814.188,351,810.188,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="810.188" x2="810.188" y1="423" y2="443"/><polygon fill="#0F172A" points="806.188,433,810.188,443,814.188,433,810.188,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="517.2563" x2="507.2563" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="507.2563" x2="507.2563" y1="257" y2="279"/><polygon fill="#0F172A" points="503.2563,269,507.2563,279,511.2563,269,507.2563,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="800.188" x2="810.188" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="810.188" x2="810.188" y1="257" y2="279"/><polygon fill="#0F172A" points="806.188,269,810.188,279,814.188,269,810.188,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="507.2563" x2="507.2563" y1="327" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="507.2563" x2="646.7222" y1="509" y2="509"/><polygon fill="#0F172A" points="636.7222,505,646.7222,509,636.7222,513,640.7222,509" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="810.188" x2="810.188" y1="491" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="810.188" x2="670.7222" y1="509" y2="509"/><polygon fill="#0F172A" points="680.7222,505,670.7222,509,680.7222,513,676.7222,509" style="stroke:#0F172A;stroke-width:1;"/><line style="