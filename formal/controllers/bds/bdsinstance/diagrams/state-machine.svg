="152.4268" x="3112.6" y="727"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3117.6" y="750.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="32" id="ent0002"><ellipse cx="16" cy="743" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2338.78,49 L2338.78,479.77 L2173.09,557.11 L2338.78,487.77 L2338.78,743 A8,8 0 0 0 2346.78,751 L2727.5241,751 A8,8 0 0 0 2735.5241,743 L2735.5241,51 L2725.5241,41 L2346.78,41 A8,8 0 0 0 2338.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2725.5241,41 L2725.5241,47 A4,4 0 0 0 2729.5241,51 L2735.5241,51 L2725.5241,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2344.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2344.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2344.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2344.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2344.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2344.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2344.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2344.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2344.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="2344.78" y="182.7803">service: bds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1787" x="2344.78" y="196.7803">slug: bdsinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5098" x="2344.78" y="210.7803">kind: BdsInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2344.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2344.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2344.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2344.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2344.78" y="280.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="375.7441" x="2344.78" y="294.7803">RESUMING, SUSPENDING, UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="2344.78" y="308.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="2344.78" y="322.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.1162" x="2344.78" y="336.7803">supported drift: bootstrap_script_url,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.0088" x="2344.78" y="350.7803">defined_tags, display_name, freeform_tags (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2344.78" y="364.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2344.78" y="378.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.9717" x="2344.78" y="392.7803">cluster_profile, cluster_version,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.8574" x="2344.78" y="406.7803">compartment_id, is_high_availability (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2344.78" y="420.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.916" x="2344.78" y="434.7803">list lookup: oci_bds_bds_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6748" x="2344.78" y="448.7803">compartment_id, display_name, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2344.78" y="462.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2344.78" y="476.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="2344.78" y="490.7803">Generated runtime uses read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.585" x="2344.78" y="504.7803">follow-up for create and update plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.0957" x="2344.78" y="518.7803">confirm-delete for delete; `CREATING` maps to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="358.5996" x="2344.78" y="532.7803">provisioning, `UPDATING`/`SUSPENDING`/`RESUMING`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="330.6406" x="2344.78" y="546.7803">to updating, `ACTIVE`/`INACTIVE`/`SUSPENDED` to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.7646" x="2344.78" y="560.7803">success, `DELETING` to terminating, and `FAILED`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0957" x="2344.78" y="574.7803">to the terminal failed bucket.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3574" x="2344.78" y="588.7803">Pre-create lookup queries `ListBdsInstances`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="2344.78" y="602.7803">with `compartmentId` and `displayName`; delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3369" x="2344.78" y="616.7803">fallback can re-resolve the tracked cluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7158" x="2344.78" y="630.7803">through `ListBdsInstances` when `GetBdsInstance`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="2344.78" y="644.7803">stops finding the resource.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.958" x="2344.78" y="658.7803">Only `displayName`, `bootstrapScriptUrl`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5439" x="2344.78" y="672.7803">`freeformTags`, `definedTags`, and `kmsKeyId`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5371" x="2344.78" y="686.7803">reconcile in place. `compartmentId`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.0615" x="2344.78" y="700.7803">`clusterVersion`, `isHighAvailability`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.2959" x="2344.78" y="714.7803">`isSecure`, `clusterProfile`, `networkConfig`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.585" x="2344.78" y="728.7803">and `nodes` remain replacement-only drift, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5645" x="2344.78" y="742.7803">the runtime has no secret side effects.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="107" id="ent0006"><path d="M3070.53,810 L3070.53,825.75 L2588.32,808.24 L3070.53,833.75 L3070.53,860 A8,8 0 0 0 3078.53,868 L3299.1013,868 A8,8 0 0 0 3307.1013,860 L3307.1013,812 L3297.1013,802 L3078.53,802 A8,8 0 0 0 3070.53,810" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3297.1013,802 L3297.1013,808 A4,4 0 0 0 3301.1013,812 L3307.1013,812 L3297.1013,802" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="3076.53" y="817.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5713" x="3076.53" y="831.7803">delete observe: GetBdsInstance or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.834" x="3076.53" y="845.7803">ListBdsInstances</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="3076.53" y="859.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.22,743 C61.3,743 183.49,743 284.63,743" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="290.63,743,281.63,739,285.63,743,281.63,747,290.63,743" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.4922" x="57" y="724.7803">AddKafka, AddWorkerNodes (+1</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="140.4668" y="738.7803">more)</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M555.64,727.05 C646.55,716.01 757.3337,702.5731 827.1837,694.0931" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="833.14,693.37,823.7235,690.4838,828.1764,693.9726,824.6877,698.4255,833.14,693.37" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="586.36" y="701.