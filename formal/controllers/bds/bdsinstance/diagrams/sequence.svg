ust="spacing" textLength="143.1992" x="796" y="1778.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="796" y="1792.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="796" y="1806.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="796" y="1820.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="796" y="1834.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="796" y="1848.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="796" y="1862.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="796" y="1876.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="796" y="1890.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="796" y="1904.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="796" y="1918.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="796" y="1932.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="796" y="1946.7803">service: bds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1787" x="796" y="1960.7803">slug: bdsinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5098" x="796" y="1974.7803">kind: BdsInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="796" y="1988.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="796" y="2002.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="796" y="2016.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="796" y="2030.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="796" y="2044.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="375.7441" x="796" y="2058.7803">RESUMING, SUSPENDING, UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="796" y="2072.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="796" y="2086.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.1162" x="796" y="2100.7803">supported drift: bootstrap_script_url,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.0088" x="796" y="2114.7803">defined_tags, display_name, freeform_tags (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="796" y="2128.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="796" y="2142.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.9717" x="796" y="2156.7803">cluster_profile, cluster_version,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.8574" x="796" y="2170.7803">compartment_id, is_high_availability (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3506" x="796" y="2184.7803">create-only fields: bds_cluster_version_summary,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6953" x="796" y="2198.7803">cluster_admin_password, cluster_public_key,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.0303" x="796" y="2212.7803">kerberos_realm_name (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.916" x="796" y="2226.7803">list lookup: oci_bds_bds_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6748" x="796" y="2240.7803">compartment_id, display_name, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="796" y="2254.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="796" y="2268.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="796" y="2282.7803">Generated runtime uses read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.585" x="796" y="2296.7803">follow-up for create and update plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.0957" x="796" y="2310.7803">confirm-delete for delete; `CREATING` maps to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="358.5996" x="796" y="2324.7803">provisioning, `UPDATING`/`SUSPENDING`/`RESUMING`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="330.6406" x="796" y="2338.7803">to updating, `ACTIVE`/`INACTIVE`/`SUSPENDED` to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.7646" x="796" y="2352.7803">success, `DELETING` to terminating, and `FAILED`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0957" x="796" y="2366.7803">to the terminal failed bucket.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3574" x="796" y="2380.7803">Pre-create lookup queries `ListBdsInstances`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="796" y="2394.7803">with `compartmentId` and `displayName`; delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3369" x="796" y="2408.7803">fallback can re-resolve the tracked cluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7158" x="796" y="2422.7803">through `ListBdsInstances` when `GetBdsInstance`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="796" y="2436.7803">stops finding the resource.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.958" x="796" y="2450.7803">Only `displayName`, `bootstrapScriptUrl`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5439" x="796" y="2464.7803">`freeformTags`, `definedTags`, and `kmsKeyId`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5371" x="796" y="2478.7803">reconcile in place. `compartmentId`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.0615" x="796" y="2492.7803">`clusterVersion`, `isHighAvailability`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.2959" x="796" y="2506.7803">`isSecure`, `clusterProfile`, `networkConfig`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.792" x="796" y="2520.7803">and `nodes` remain replacement-only drift.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.9443" x="796" y="2534.7803">`secretId`, `isSecretReused`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.4961" x="796" y="2548.7803">`bdsClusterVersionSummary`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4404" x="796" y="2562.7803">`clusterAdminPassword`, `clusterPublicKey`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8818" x="796" y="2576.7803">`kerberosRealmName` stay create-only for the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.4893" x="796" y="2590.7803">reviewed runtime,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.2959" x="796" y="2604.7803">`timeEarliestCertificateExpiration` stays</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1641" x="796" y="2618.7803">observed status-only, and the runtime has no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7168" x="796" y="2632.7803">secret side effects.</text><?plantuml-src lLXhRziu5ltENq7CVkcWTjBqCUsuw09fafa9cgP5tCv-2M3H4cLp8ujQahBhNUn_ttFva2N7cMPdWKLHH1B9-pptt4lRErKtmeWLjqjHw8sg5xmKbPNCTYjpaTyjZ6xhuanNsl2_b3d-5RqTXIn5MxbVTEsknKhotsIrbaxbul2UgVgdv2SlUul26Bs9qf-L9w-Vzq_MsidtzsmeozV5J_kxj2caYJlcBr-zUFRptWvI7zTVl7XvykfLRzsBpxMffU4dFp6dN2NvLFwZbNKk-PZF2tlylh2NjNK2NzXI5PANMhkv_jOJOzE9Vp7EHUwq6PWLtKjB-tx9v_9D-GpB48O8gaRKxl3v_eR7IEcvticeL2clL3qCtCylnOlv6woIo6QmbC-BL_AaMxgNb3UbA7FsR-Pzun_QkKGqdRIiPmS_Wo56LvKqWy_lXPKtCjTrhlQNVlWq_VHXAirQvVAZgCL2cX-ui7puQN3aqzabeuHplKOwXx97U-S0VICBRgJLLUkKhYVnqt6Xn08vjSVXVRpRCavfFhBhHP9Go0hUFdWwB0zFohhmm6IxOF7nNtincd1POtyhUGzxi3KwmtOxwTpGqGdldfyOqchTZsouXGuDmp7P2OT3Lf5ZVTZxrFChhU_mHy3ykQeB9Yh7dG4Wi1kfbz-Q2gdmUU2eanhLjEMYCb8KMwmgwomRwYLBi7l2VvMkhq-2ZJhHdIXb-KfP2xvwICmLTFJas2UbgfmqTd9Rvtf5M5b1ramL8ruesrHYEwj1NYEE_Kx-w3qoihLYZa2G6vJyrY3uq8sKeVI1_8UqdnR51r7UYH4z_KsREsckDS8vkgtF40HmLS_5Ikk6v_upRu08Ok6pculJBvVNlpusIZ35H-gmoNykyWVSEu2n1a65r50_QoHfa7DL-u2srekZe8Oou16GieY8ElUV7p8jhFQjUs0Zx2gLMIKjQoNst08yR-jzS8GKn3Cf1USNLnUFJm71_fxOv7DUIL73IUmfLIqgT4232E2hzNYQLvhm_PXm6-a4WXfjzM3rPOZlPXim4DS8vdW0Mt4zjv3yM0N1h9sXeaJXt9SQG9U0HraFri0VRmp1y74A0y5jbgh3xGe-Me07vH8BOSHlBgPVF_gdwTVfvulhStg-hRz-FlSR-9Ed9tob3MhN6rIfTOeFQG2HMVWags8iDk3ZsxemgdHShaNL2kzF1AB_l4HCAwANNHSPkZAY5ZDjcqORW9YtJK6QR6jAaQC7p34OMD1MCxEvKOsRjQOQqHI4TblCd5ZO4HloJccaBBLP-SMUCpVoxp9tV4wBagzQycW2za5TZskv2JvPbbSjgidC6gF1T92NFgofFdKzOlkqf-nigHRBcLWBLOcvggXUdpnzmOBUm5DZNLVRg0DU5NQs9tTcszLAcEseiq0KArNF6c7j1iF3xdlJpj4KPdToE-BWG_GxRMTGKgry1DYJfy-Zox6x9CRcUvQp0uIzwwIwSRteeEA84g3OKKs7d0EX1R