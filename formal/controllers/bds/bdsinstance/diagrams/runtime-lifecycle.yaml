schemaVersion: 1
surface: repo-authored-semantics
service: bds
slug: bdsinstance
kind: BdsInstance
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
  - failed
repoAuthored:
  mutation:
    mutable:
      - bootstrap_script_url
      - defined_tags
      - display_name
      - freeform_tags
      - kms_key_id
    forceNew:
      - cluster_profile
      - cluster_version
      - compartment_id
      - is_high_availability
      - is_secure
      - network_config
      - nodes
    createOnly:
      - bds_cluster_version_summary
      - cluster_admin_password
      - cluster_public_key
      - kerberos_realm_name
      - secret_id
      - is_secret_reused
  hooks:
    create:
      - helper: tfresource.CreateResource
    update:
      - helper: tfresource.UpdateResource
    delete:
      - helper: tfresource.DeleteResource
  followUp:
    create: read-after-write
    update: read-after-write
    delete: confirm-delete
notes:
  - Generated runtime uses read-after-write follow-up for create and update plus
    confirm-delete for delete; `CREATING` maps to provisioning,
    `UPDATING`/`SUSPENDING`/`RESUMING` to updating, `ACTIVE`/`INACTIVE`/`SUSPENDED`
    to success, `DELETING` to terminating, and `FAILED` to the terminal failed
    bucket.
  - Pre-create lookup queries `ListBdsInstances` with `compartmentId` and
    `displayName`; delete fallback can re-resolve the tracked cluster through
    `ListBdsInstances` when `GetBdsInstance` stops finding the resource.
  - Only `displayName`, `bootstrapScriptUrl`, `freeformTags`, `definedTags`,
    and `kmsKeyId` reconcile in place. `compartmentId`, `clusterVersion`,
    `isHighAvailability`, `isSecure`, `clusterProfile`, `networkConfig`, and
    `nodes` remain replacement-only drift. `secretId`,
    `isSecretReused`, `bdsClusterVersionSummary`, `clusterAdminPassword`,
    `clusterPublicKey`, and `kerberosRealmName` stay create-only for the
    reviewed runtime, `timeEarliestCertificateExpiration` stays observed
    status-only, and the runtime has no secret side effects.
