Adjust="spacing" textLength="281.709" x="832" y="1032.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="832" y="1046.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="832" y="1060.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="832" y="1074.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="832" y="1088.7803">service: bds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4814" x="832" y="1102.7803">slug: bdsbdsinstancesoftwareupdate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.0264" x="832" y="1116.7803">kind: BdsBdsInstanceSoftwareUpdate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="832" y="1130.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="832" y="1144.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="832" y="1158.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="832" y="1172.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="832" y="1186.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="832" y="1200.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="832" y="1214.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="832" y="1228.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="832" y="1242.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="832" y="1256.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="832" y="1270.7803">promotion.</text><?plantuml-src fLPTRzis57tdhxZeNbh0YkCcQLC56x0aNHiqIufwtPE1WYQlR28KgP5KlApeVz-blYmvjZCiY6F8kfU7vzmlqjyfKt37S_1BBkrAcGLaN7jalhFCkRXRE5iQUM6rTV1J9kXFzZmaPhpKuJThmWtF4JwYliUW1D_kCrN_84oEUqRkd5qrw8VPvEth_afZ0vu_uf1bR-MRJI_h9Bh6OtvySdJuRiCZRj_OZuwE9oSdFNi5Bwmpw63oXWKLDC8K_ohH28G4vjAFpwMdpvNnWTFBgSt2YZlyMaWUa2sLHCYi3NFxTm_Njn3V6G0NmRe1pqPlQzeKYg_nD3iaCu5HI5N1JTY-lk_mNr1wiUWmjChmMfbX9DyTywFvALaZP34mYRaymKbdUfIbqundWlrWbJRuLCwHmXlGinuFk20YpcgDRl3wd7lyWi8QeJPDBswdjv-cwEwLmD-vuGjqBu1x6BuQBBczk6An0i3UKtw7sAEDTTGB3YKuz5QNGLcJDg_6Kl45vTIFwz_9sYLfqtpWxnSjWaHDQdUkhit3bMXaLQbi7In8Vkd5A0Kqv5yYx2l6cN6jFBPU6v66qbFedb-woCE7Lspe4XSD0vH21quIlI8jCxEtDORh8oBb8uKF6FOkiqMWalJqPUrTMSJHfECuseLtJRxx05zcIWTqFfqPOVDO7ZcQy4t94P1xm5UCO23P8ZZdGIpZT1Gna29c75J0tCU4CQu328SybfU3kQ8S5ZmiTz6yg5ptAYV1HGjPq1PnwyzVRl-ycbxTtbpTVFY_4OriaUOxbDNlI5SwbOMzVEkrJ_DjC5k-NpzV_lh7SxdIVwo2kbMWAL6Kkp0lAx-dgJPuLCMPSfJScC_BzzVldy6NOZapJrLW9sfpZosT6Kkoz3z7pR75HZFYQhYcqzFHoy2LIKeJb4uQ5Tr4UTJ06mEaYY8D4D9SE7klFAcdX8tg1CQdcQ4soMct-AkUcqujbW5i1jk7PJFRdZSfdqJPDZ6dWVeOCcTp24k4HyDxVG1driK6lwmwj19CShctfIDZmHULNcj6m2b1TVCbrYLD