g" textLength="241.9922" x="804" y="2283.7803">compartmentId, displayName, id; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4883" x="804" y="2297.7803">compartmentId plus displayName unique match in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="347.7578" x="804" y="2311.7803">ACTIVE, CREATING, or UPDATING; duplicate matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="17.8965" x="804" y="2325.7803">fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="804" y="2339.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="804" y="2353.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="804" y="2367.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="804" y="2381.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="804" y="2395.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.751" x="804" y="2409.7803">terminal and DELETED is only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6406" x="804" y="2423.7803">delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="804" y="2437.7803">Create, update, and delete responses expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="804" y="2451.7803">work-request headers but do not return a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.8535" x="804" y="2465.7803">KnowledgeBase body. The runtime resumes through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.8887" x="804" y="2479.7803">GetWorkRequest, recovers the affected</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.0195" x="804" y="2493.7803">KnowledgeBase OCID from work-request resources,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0811" x="804" y="2507.7803">and then rereads GetKnowledgeBase before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.248" x="804" y="2521.7803">settling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5986" x="804" y="2535.7803">Pre-create reuse only runs when spec.displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3779" x="804" y="2549.7803">is present and keeps exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9229" x="804" y="2563.7803">displayName matching bounded to ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0273" x="804" y="2577.7803">CREATING, or UPDATING summaries.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.709" x="804" y="2591.7803">Only displayName, freeformTags, and definedTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0059" x="804" y="2605.7803">reconcile in place; compartmentId remains</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6338" x="804" y="2619.7803">replacement-only and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.5156" x="804" y="2633.7803">ChangeKnowledgeBaseCompartment stays out of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2266" x="804" y="2647.7803">scope for the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5713" x="804" y="2661.7803">Delete keeps the finalizer until the work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6055" x="804" y="2675.7803">request is terminal and GetKnowledgeBase or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="804" y="2689.7803">fallback ListKnowledgeBases confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3926" x="804" y="2703.7803">resource is gone.</text><?plantuml-src jLXRRnit5dxdho3QbnQGvBX9sbI65yZQRcl4snHsshmO2AWPZiGrHSwI72dQnVxt_Gx96SteaYXT57c8pCkvVkSxX-EVbAc54qlk5wAqQsNcl1BQI-QxdPaedkREDgQyijew_dLLu5_PEr7AIZGw_6HD-5Ki9Vz5wfKCgX27ppoeVqj-_gAtAPopwopzMNN-mtVzcyO6-VSz6whgX_BxtLFMbTBb4xCNBvy_-t7d1AdF-y-VlpX_-RAt7yKNrXdf-FdtBAYW9N-G_sgaAIGVSr4kpzuOkzQodCCWn6YXIiahQyFCVkm9yksT_p3EHH6i6nYM7MotTZsJtybNrJDiGnXYg6fXmk7x_GEdIEavtydGgf9toWn3z-CByNps2hiaiXvi5RFofJpljlRIygeILS7-ow9l_4qpauXda9xrxE1NCCHPhQKRB5DCxsLXJQ5sjxvw-_3spODqArN8VmWZvj9znONdmwN1bRTNjunIpkqA2HtA7ktS0_YTBBcJtkecA6kcUUciL6AEdFgpzFTuUsJSfddYL_DMGYarl3rwEsqFRqfJHcYoRR3u-6-z64svD3ZVI3v07wpDxh3jMRevT7NAkz_VEDBhmxTiU8Gk3GCotGg7IrwHQqFen_JpEskVy9-02pDbIYPquC4153YFzCkFjKOwOYuuQiMWfZPSQ2T5kS6kyi6peMQo1QUd_6SPXXebMAaJtWbJdY-Lz-2jOuBke6KWoNzJAHsayzD7KzWbOMO9QRVbY9VArrfiYCH6qF5jTCZ9neiP8a5UKFuRXzg6OcGDrG_m7rDz1KU