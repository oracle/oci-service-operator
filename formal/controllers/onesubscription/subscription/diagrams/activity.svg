="636.7803">OCI reaches ACTIVE</text><ellipse cx="515.1724" cy="696" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="515.1724" cy="696" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="394.6514,553,635.6934,553,647.6934,565,635.6934,577,394.6514,577,382.6514,565,394.6514,553" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="519.1724" y="587.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="394.6514" y="568.7803">"OCI state is outside success targets?"</text><rect fill="none" height="671" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="355.6572" x="343.3438" y="785"/><path d="M509.7637,785 L509.7637,792 L499.7637,802 L343.3438,802" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="346.3438" y="796.7803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="367.0522" y="819"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="377.0522" y="839.7803">Compare live OCI state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="377.0522" y="853.7803">field surface</text><rect fill="#F8FAFC" height="104" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.6572" x="363.3438" y="936"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="373.3438" y="956.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3438