0 0 703.6604,2274 L703.6604,1476 L693.6604,1466 L372.1721,1466 A0,0 0 0 0 372.1721,1466" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M693.6604,1466 L693.6604,1476 L703.6604,1476 L693.6604,1466" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="378.1721" y="1481.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="378.1721" y="1495.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="378.1721" y="1509.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="378.1721" y="1523.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="378.1721" y="1537.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="378.1721" y="1551.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="378.1721" y="1565.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="378.1721" y="1579.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="378.1721" y="1593.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="378.1721" y="1607.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="378.1721" y="1621.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.1855" x="378.1721" y="1635.7803">service: onesubscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.165" x="378.1721" y="1649.7803">slug: subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5029" x="378.1721" y="1663.7803">kind: Subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="378.1721" y="1677.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="378.1721" y="1691.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="378.1721" y="1705.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="378.1721" y="1719.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="378.1721" y="1733.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="378.1721" y="1747.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="378.1721" y="1761.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9365" x="378.1721" y="1775.7803">compartment_id, plan_number, subscription_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.8506" x="378.1721" y="1789.7803">buyer_email and conflicts buyer_email -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.1191" x="378.1721" y="1803.7803">plan_number, subscription_id, plan_number -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.3193" x="378.1721" y="1817.7803">subscription_id, buyer_email, subscription_id -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7646" x="378.1721" y="1831.7803">plan_number, buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="378.1721" y="1845.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2676" x="378.1721" y="1859.7803">list lookup: oci_onesubscription_subscriptions</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1094" x="378.1721" y="1873.7803">filters compartment_id, plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.4268" x="378.1721" y="1887.7803">subscription_id, buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.8438" x="378.1721" y="1901.7803">conflicts: buyer_email -&gt; plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.7813" x="378.1721" y="1915.7803">subscription_id, plan_number -&gt; subscription_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.6572" x="378.1721" y="1929.7803">buyer_email, subscription_id -&gt; plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2617" x="378.1721" y="1943.7803">buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1992" x="378.1721" y="1957.7803">open gaps: list-lookup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5713" x="378.1721" y="1971.7803">The published Subscription contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9434" x="378.1721" y="1985.7803">query-backed and observe-only. Reconcile issues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4473" x="378.1721" y="1999.7803">ListSubscriptions with compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9229" x="378.1721" y="2013.7803">exactly one of planNumber, subscriptionId, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9434" x="378.1721" y="2027.7803">buyerEmail, paginates every result page, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3369" x="378.1721" y="2041.7803">accepts only a single returned summary.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4883" x="378.1721" y="2055.7803">SubscriptionSummary exposes no stable top-level</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2334" x="378.1721" y="2069.7803">OCID or reread path. The runtime therefore</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9297" x="378.1721" y="2083.7803">leaves status.status.ocid empty and records only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3711" x="378.1721" y="2097.7803">the projected subscription summary fields on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.1104" x="378.1721" y="2111.7803">CR.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="378.1721" y="2125.7803">The raw subscription status is an untyped</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9092" x="378.1721" y="2139.7803">business-state string, not a typed OCI lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="378.1721" y="2153.7803">enum. The runtime requeues only clearly</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="378.1721" y="2167.7803">transitional create-like and update-like tokens,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5439" x="378.1721" y="2181.7803">treats FAIL/ERROR values as terminal failure,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.9229" x="378.1721" y="2195.7803">and settles all other values as observed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4619" x="378.1721" y="2209.7803">success.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="378.1721" y="2223.7803">Delete is CR-local unbind only. The controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="378.1721" y="2237.7803">releases Kubernetes control immediately and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1709" x="378.1721" y="2251.7803">never calls an OCI delete helper because the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6748" x="378.1721" y="2265.7803">pinned SDK exposes none.</text><ellipse cx="341.1721" cy="1870" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="341.1721" cy="1870" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="341.1721" x2="341.1721" y1="157" y2="177"/><polygon fill="#0F172A" points="337.1721,167,341.1721,177,345.1721,167,341.1721,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="498.7112" x2="498.7112" y1="355" y2="375"/><polygon fill="#0F172A" points="494.7112,365,498.7112,375,502.7112,365,498.7112,369" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="199.7063" x2="183.6331" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="183.6331" x2="183.6331" y1="257" y2="279"/><polygon fill="#0F172A" points="179.6331,269,183.6331,279,187.6331,269,183.6331,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="482.6379" x2="498.7112" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="498.7112" x2="498.7112" y1="257" y2="279"/><polygon fill="#0F172A" points="494.7112,269,498.7112,279,502.7112,269,498.7112,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="183.6331" x2="183.6331" y1="327" y2="441"/><line style="stroke:#0F172A;stroke-width:1;" x1="183.6331" x2="329.1721" y1="441" y2="441"/><polygon fill="#0F172A" points="319.1721,437,329.1721,441,319.1721,445,323.1721,441" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="498.7112" x2="498.7112" y1="423" y2="441"/><line style="stroke:#0F172A;stroke-width:1;" x1="498.7112" x2="353.1721" y1="441" y2="441"/><