acing" textLength="269.2471" x="771" y="1122.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="771" y="1136.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="771" y="1150.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="771" y="1164.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="771" y="1178.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="771" y="1192.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.1855" x="771" y="1206.7803">service: onesubscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.165" x="771" y="1220.7803">slug: subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5029" x="771" y="1234.7803">kind: Subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="771" y="1248.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="771" y="1262.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="771" y="1276.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="771" y="1290.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="771" y="1304.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="771" y="1318.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="771" y="1332.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9365" x="771" y="1346.7803">compartment_id, plan_number, subscription_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.8506" x="771" y="1360.7803">buyer_email and conflicts buyer_email -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.1191" x="771" y="1374.7803">plan_number, subscription_id, plan_number -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.3193" x="771" y="1388.7803">subscription_id, buyer_email, subscription_id -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7646" x="771" y="1402.7803">plan_number, buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="771" y="1416.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2676" x="771" y="1430.7803">list lookup: oci_onesubscription_subscriptions</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1094" x="771" y="1444.7803">filters compartment_id, plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.4268" x="771" y="1458.7803">subscription_id, buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.8438" x="771" y="1472.7803">conflicts: buyer_email -&gt; plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.7813" x="771" y="1486.7803">subscription_id, plan_number -&gt; subscription_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.6572" x="771" y="1500.7803">buyer_email, subscription_id -&gt; plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2617" x="771" y="1514.7803">buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1992" x="771" y="1528.7803">open gaps: list-lookup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5713" x="771" y="1542.7803">The published Subscription contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9434" x="771" y="1556.7803">query-backed and observe-only. Reconcile issues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4473" x="771" y="1570.7803">ListSubscriptions with compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9229" x="771" y="1584.7803">exactly one of planNumber, subscriptionId, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9434" x="771" y="1598.7803">buyerEmail, paginates every result page, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3369" x="771" y="1612.7803">accepts only a single returned summary.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4883" x="771" y="1626.7803">SubscriptionSummary exposes no stable top-level</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2334" x="771" y="1640.7803">OCID or reread path. The runtime therefore</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9297" x="771" y="1654.7803">leaves status.status.ocid empty and records only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3711" x="771" y="1668.7803">the projected subscription summary fields on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.1104" x="771" y="1682.7803">CR.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="771" y="1696.7803">The raw subscription status is an untyped</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9092" x="771" y="1710.7803">business-state string, not a typed OCI lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="771" y="1724.7803">enum. The runtime requeues only clearly</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="771" y="1738.7803">transitional create-like and update-like tokens,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5439" x="771" y="1752.7803">treats FAIL/ERROR values as terminal failure,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.9229" x="771" y="1766.7803">and settles all other values as observed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4619" x="771" y="1780.7803">success.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="771" y="1794.7803">Delete is CR-local unbind only. The controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="771" y="1808.7803">releases Kubernetes control immediately and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1709" x="771" y="1822.7803">never calls an OCI delete helper because the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6748" x="771" y="1836.7803">pinned SDK exposes none.</text><?plantuml-src pLVVRzis47xdNq5iBoqGEKr_rqC7h6cx5SqQ8DvZWO2MJZORYjH8ocusx7_VTnHjItQIPUlBa0T7ul5-V7VttIbSQTighnePbgfoQsqNibOca0ZRaxaghnRUTROwTSPv-NrTugyQI5HKgyx4zyx6JweX-GkP5KLTgfjbPleFaYTF1uVAUxVEsX_L9oyU3szQ5-dDWGzr_Q9wlY_bV4K-IyoVFdlowDMU19lFvq-UF3rvzcnmdjINpbloykIvY3eQaZFwlIDRaYoainIwUIYzRgDszdWsU11BNP6idOjpztMWCsok_ocaL6LqVkHZZdLpj1yaFQQNzICSGndWrAsoyURxGu7xQ1dWiDLXT4rdsevHVFLKFPc_n2chR4T7vRnwHYVReuCClQnLNOg_H8fDVkpc16WZ1J7mGvx24U-C8Jzw_KO5kg3IsLBl7trtFZl_E2E_qYNzggnQaFzEgY37hqPNpay_2Cw-T2laTgpxQEyU-i1J9Jq5PpfExJI_EgwqMY2duRX_BdOYnIRDax1QR3HKP13jhRVxu_5DibMgKh43InO_3Z2QIhAGxr2NW-A3ipaQiHFbY-D8ftBx_mFFPaDyACOYV6cCntId7145pP6D2ZybNvuvTuKVXG3csbQ2G24oUjG4vD4Q5jrqBNMGZGu192F6LjWkaZILPph4eVhmeDOcaW_JpxPq3IUrWR9BNHt9rYXxQRi6K1rzjiFMJCVpxfhy9JLAcuS7vcu0fuKLMEypluBRS6ZWkfKXgjW5Jf9G9kRyoemaLHc9j-drRV5PaCXjPt2brhxPA5vfTGZ7VGAPmvs2wjhvhPCC7VxXMd7p01LmbpPfCdf5ARW-6AGuo5gJgGgrHgb-jfNNTPIqKgPJWvo_JQ-NoBdXZEuQREpZ4NVVh6jR-0DKkxPYIw7pjIef8t91NwYCy1nEasmwTcOAElKb5PRMlJj1t5K1ugu2uC8KZA_HPGoZ4m1ujvh1AOJlD7Dm-q3xG9XxjVTd-ZznA3VnfkFa7jnYU57kcnrfsXAPQ-CWZHW3coJmej7N5KYXGesMt4Btg6u_AXNkqLGkN9QfekszjFIz_3hNEq2hjLK6Uub_dGgIrUnJunuJfyO74wEdMkzMEi05H7NKL_Ys8xnUBADqjRnvpkIny6r3vX-rt3HiPX6vbRLtZOnBaWTpRxUx06a1eDycQayX8a0LN8UyOgbO03g-SDHtc