<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="830px" preserveAspectRatio="none" style="width:2506px;height:830px;background:#FCFCFD;" version="1.1" viewBox="0 0 2506 830" width="2506px" zoomAndPan="magnify"><title>State Machine - onesubscription/Subscription</title><defs/><g><rect fill="#FCFCFD" height="830" style="stroke:none;stroke-width:1;" width="2506" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="304.9238" x="1092.6488" y="20.7803">State Machine - onesubscription/Subscription</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="232.96" y="471"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="232.96" x2="497.3243" y1="495" y2="495"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="338.6871" y="486.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="237.96" y="510.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="237.96" y="524.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1294.32" y="401"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1299.32" y="424.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2033.27" y="411"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2038.27" y="434.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="45.04" y="417"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="50.04" y="440.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1321.8" y="532"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1327.7346" y="555.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="775.4" y="482"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="780.4" y="505.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1608.52" y="456"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1613.52" y="479.7803">RejectUnsupportedDrift</text><g class="start_entity" data-qualified-name=".start." data-source-line="28" id="ent0002"><ellipse cx="80" cy="502" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="41" id="ent0003"><path d="M2144.74,49 L2144.74,427 L2084.01,431 L2144.74,435 L2144.74,813 A8,8 0 0 0 2152.74,821 L2489.2214,821 A8,8 0 0 0 2497.2214,813 L2497.2214,51 L2487.2214,41 L2152.74,41 A8,8 0 0 0 2144.74,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2487.2214,41 L2487.2214,47 A4,4 0 0 0 2491.2214,51 L2497.2214,51 L2487.2214,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2150.74" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2150.74" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2150.74" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2150.74" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2150.74" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2150.74" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2150.74" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2150.74" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2150.74" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.1855" x="2150.74" y="182.7803">service: onesubscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.165" x="2150.74" y="196.7803">slug: subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5029" x="2150.74" y="210.7803">kind: Subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2150.74" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="2150.74" y="238.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="2150.74" y="252.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2150.74" y="266.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="2150.74" y="280.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="2150.74" y="294.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2150.74" y="308.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9365" x="2150.74" y="322.7803">compartment_id, plan_number, subscription_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.8506" x="2150.74" y="336.7803">buyer_email and conflicts buyer_email -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.1191" x="2150.74" y="350.7803">plan_number, subscription_id, plan_number -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.3193" x="2150.74" y="364.7803">subscription_id, buyer_email, subscription_id -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7646" x="2150.74" y="378.7803">plan_number, buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2150.74" y="392.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2676" x="2150.74" y="406.7803">list lookup: oci_onesubscription_subscriptions</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1094" x="2150.74" y="420.7803">filters compartment_id, plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.4268" x="2150.74" y="434.7803">subscription_id, buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.8438" x="2150.74" y="448.7803">conflicts: buyer_email -&gt; plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.7813" x="2150.74" y="462.7803">subscription_id, plan_number -&gt; subscription_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.6572" x="2150.74" y="476.7803">buyer_email, subscription_id -&gt; plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2617" x="2150.74" y="490.7803">buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1992" x="2150.74" y="504.7803">open gaps: list-lookup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5713" x="2150.74" y="518.7803">The published Subscription contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9434" x="2150.74" y="532.7803">query-backed and observe-only. Reconcile issues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4473" x="2150.74" y="546.7803">ListSubscriptions with compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9229" x="2150.74" y="560.7803">exactly one of planNumber, subscriptionId, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9434" x="2150.74" y="574.7803">buyerEmail, paginates every result page, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3369" x="2150.74" y="588.7803">accepts only a single returned summary.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4883" x="2150.74" y="602.7803">SubscriptionSummary exposes no stable top-level</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2334" x="2150.74" y="616.7803">OCID or reread path. The runtime therefore</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9297" x="2150.74" y="630.7803">leaves status.status.ocid empty and records only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3711" x="2150.74" y="644.7803">the projected subscription summary fields on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.1104" x="2150.74" y="658.7803">CR.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="2150.74" y="672.7803">The raw subscription status is an untyped</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9092" x="2150.74" y="686.7803">business-state string, not a typed OCI lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="2150.74" y="700.7803">enum. The runtime requeues only clearly</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="2150.74" y="714.7803">transitional create-like and update-like tokens,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5439" x="2150.74" y="728.7803">treats FAIL/ERROR values as terminal failure,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.9229" x="2150.74" y="742.7803">and settles all other values as observed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4619" x="2150.74" y="756.7803">success.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="2150.74" y="770.7803">Delete is CR-local unbind only. The controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="2150.74" y="784.7803">releases Kubernetes control immediately and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1709" x="2150.74" y="798.7803">never calls an OCI delete helper because the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6748" x="2150.74" y="812.7803">pinned SDK exposes none.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="28" id="lnk3"><path d="M90.42,502 C113.26,502 168.01,502 226.49,502" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="232.49,502,223.49,498,227.49,502,223.49,506,232.49,502" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.0273" x="145.96" y="497.7803">reconcile</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="29" id="lnk4"><path d="M497.6,502 C588.51,502 699.25,502 769.1,502" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="775.1,502,766.1,498,770.1,502,766.1,506,775.1,502" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="528.32" y="497.7803">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="30" id="lnk5"><path d="M898.35,499.78 C999.28,495.57 1197.48,485.01 1264.32,465 C1282.19,459.65 1295.4383,453.1957 1310.2283,444.3657" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1315.38,441.29,1305.602,442.4691,1311.0869,443.8531,1309.7029,449.338,1315.38,441.29" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="1054.82" y="446.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="1106.5817" y="460.7803">ACTIVE</text></g><!--link resolve_by_lookup to failed--><g class="link" data-entity-1="ent0007" data-entity-2="ent0006" data-link-type="dependency" data-source-line="31" id="lnk6"><path d="M898.75,509.57 C928.97,513.23 966.05,517.55 999.32,521 C1120.07,533.5 1258.8195,544.9972 1315.4295,549.5672" fill="none" id="resolve_by_lookup-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1321.41,550.05,1312.761,545.3388,1316.4262,549.6477,1312.1173,553.3128,1321.41,550.05" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="1000.32" y="516.7803">unresolved OCI err