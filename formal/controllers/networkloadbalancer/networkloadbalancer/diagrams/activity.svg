">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="263.5918" x="202.5991" y="695"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="212.5991" y="715.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="307.1709" x="180.8096" y="749"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1709" x="190.8096" y="769.7803">Delete path uses DeleteNetworkLoadBalancer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4746" x="190.8096" y="783.7803">with required via GetNetworkLoadBalancer or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5576" x="190.8096" y="797.7803">ListNetworkLoadBalancer to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="190.8096" y="811.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="194.8301" y="845"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="204.8301" y="865.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="204.8301" y="879.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="177.6855" y="913"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="187.6855" y="933.7803">Requeue on provisioning, updating, terminating</text><path d="M365.395,957 L365.395,1133 L345.395,1137 L365.395,1