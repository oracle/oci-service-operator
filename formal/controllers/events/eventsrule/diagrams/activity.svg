cing" textLength="243.5918" x="159.8701" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.8057" x="129.2632" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.8057" x="139.2632" y="755.7803">Delete path uses DeleteEventsRule with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8057" x="139.2632" y="769.7803">required via GetEventsRule or ListEventsRule</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.2822" x="139.2632" y="783.7803">to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="142.1011" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="152.1011" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="152.1011" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="124.9565" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="134.9565" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M312.666,929 L312.666,1105 L292.666,1109 L312.666,1113 L312.666,1289 A0,0 0 0 0 312.666,1289 L652.7061,1289 A0,0 0 0 0 652.7061,1289 L652.7061,939 L642.7061,929 L312.666,929 A0,0 0 0 0 312.666,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M642.7061,929 L642.7061,939 L652.7061,939 L642.7061,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing