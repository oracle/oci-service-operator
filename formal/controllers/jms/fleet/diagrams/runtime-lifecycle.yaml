schemaVersion: 1
surface: repo-authored-semantics
service: jms
slug: fleet
kind: Fleet
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
repoAuthored:
  providerLifecycle:
    createPending:
      - CREATING
    updatePending:
      - UPDATING
    deletePending:
      - DELETING
  listLookup:
    filters:
      - compartmentId
      - displayName
      - id
    matchRule: exact compartmentId plus displayName unique match in ACTIVE, CREATING, UPDATING, or NEEDS_ATTENTION; duplicate matches fail
  mutation:
    mutable:
      - definedTags
      - description
      - displayName
      - freeformTags
      - inventoryLog
      - isAdvancedFeaturesEnabled
      - operationLog
    forceNew:
      - compartmentId
  hooks:
    create:
      - helper: tfresource.CreateResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: fleet
        action: CREATED
    update:
      - helper: tfresource.UpdateResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: fleet
        action: UPDATED
    delete:
      - helper: tfresource.DeleteResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: fleet
        action: DELETED
  followUp:
    create: GetWorkRequest -> GetFleet
    update: GetWorkRequest -> GetFleet
    delete: GetWorkRequest -> GetFleet/ListFleets confirm-delete
notes:
  - Reviewed lifecycle mapping treats CREATING as provisioning, UPDATING as
    updating, ACTIVE and NEEDS_ATTENTION as success, and DELETING as
    terminating; FAILED is terminal and DELETED is only a delete-confirmation
    target.
  - Create, update, and delete responses expose work-request headers but do
    not return a Fleet body. The runtime resumes through GetWorkRequest,
    recovers the affected Fleet OCID from work-request resources, and then
    rereads GetFleet before settling.
  - Pre-create reuse only runs when spec.compartmentId and spec.displayName
    are present and keeps exact compartmentId plus displayName matching
    bounded to ACTIVE, CREATING, UPDATING, or NEEDS_ATTENTION summaries.
  - Only displayName, description, inventoryLog, operationLog,
    isAdvancedFeaturesEnabled, freeformTags, and definedTags reconcile in
    place; operationLog updates only when both log identifiers are supplied,
    compartmentId remains replacement-only, and ChangeFleetCompartment stays
    out of scope for the published runtime.
  - inventoryLog remains a required published spec field because CreateFleet
    requires it from the first published contract.
  - Required status projection keeps approximate inventory counters,
    inventoryLog, operationLog, export-setting state, and systemTags on the
    published kind, and the runtime has no secret side effects.
