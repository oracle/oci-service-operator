pacing" textLength="88.7031" x="734" y="2115.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="734" y="2129.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="734" y="2143.7803">displayName, freeformTags (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="734" y="2157.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="734" y="2171.7803">compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="734" y="2185.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.0752" x="734" y="2199.7803">list lookup: oci_jms_fleets filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.9922" x="734" y="2213.7803">compartmentId, displayName, id; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4883" x="734" y="2227.7803">compartmentId plus displayName unique match in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="374.1582" x="734" y="2241.7803">ACTIVE, CREATING, UPDATING, or NEEDS_ATTENTION;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="734" y="2255.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="734" y="2269.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="734" y="2283.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="734" y="2297.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7021" x="734" y="2311.7803">provisioning, UPDATING as updating, ACTIVE and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.2061" x="734" y="2325.7803">NEEDS_ATTENTION as success, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4404" x="734" y="2339.7803">terminating; FAILED is terminal and DELETED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.8887" x="734" y="2353.7803">only a delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="734" y="2367.7803">Create, update, and delete responses expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="734" y="2381.7803">work-request headers but do not return a Fleet</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.7783" x="734" y="2395.7803">body. The runtime resumes through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.792" x="734" y="2409.7803">GetWorkRequest, recovers the affected Fleet OCID</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.7988" x="734" y="2423.7803">from work-request resources, and then rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4131" x="734" y="2437.7803">GetFleet before settling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3232" x="734" y="2451.7803">Pre-create reuse only runs when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4814" x="734" y="2465.7803">spec.compartmentId and spec.displayName are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3779" x="734" y="2479.7803">present and keeps exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9229" x="734" y="2493.7803">displayName matching bounded to ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.9238" x="734" y="2507.7803">CREATING, UPDATING, or NEEDS_ATTENTION</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3447" x="734" y="2521.7803">summaries.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="734" y="2535.7803">Only displayName, description, inventoryLog,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.4121" x="734" y="2549.7803">operationLog, isAdvancedFeaturesEnabled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="734" y="2563.7803">freeformTags, and definedTags reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.3359" x="734" y="2577.7803">place; operationLog updates only when both log</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.916" x="734" y="2591.7803">identifiers are supplied, compartmentId remains</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3848" x="734" y="2605.7803">replacement-only, and ChangeFleetCompartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.709" x="734" y="2619.7803">stays out of scope for the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0674" x="734" y="2633.7803">inventoryLog remains a required published spec</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1367" x="734" y="2647.7803">field because CreateFleet requires it from the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.958" x="734" y="2661.7803">first published contract.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="734" y="2675.7803">Required status projection keeps approximate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="734" y="2689.7803">inventory counters, inventoryLog, operationLog,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="734" y="2703.7803">export-setting state, and systemTags on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.5088" x="734" y="2717.7803">published kind, and the runtime has no secret</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.7031" x="734" y="2731.7803">side effects.</text><?plantuml-src hLXTSzks4dt7hy3qlYHJIOxhf4tbSMTSMsazTUsExTwyU2O3aQ24cYHO09IiTlhVxra0_9AbsBtjv24MiTpFisSNj0-gh8GH1RTBaUgrAXSy4xcLpBOdSv4yB8oko_HCvzhm_sG9_gKzYLHceixT1rswAr58_gFCLzAfHEoMkLL_I7xujdSeZD7hgFrDTlZDL_qtI-tazqzyoB9lqg-tfRH9fOaIyxVlZjvykoL1vkFvqT7RmtVlUkTUVQ9DAGq__9evvNB9R-NljImJoSVyjy8UVCYbT6ofKiaphTrSF_OKs4RsJyQvI9ms0uTYOCtHTaJoA_a-UuDZA4FkL2LAj_lzli1BjFI2RdNaAfENgXocxDktucZ-7gUaiXeS9VFqd