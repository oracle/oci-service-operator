xt fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="780" y="1779.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="780" y="1793.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="780" y="1807.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="780" y="1821.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="780" y="1835.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="780" y="1849.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="780" y="1863.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="780" y="1877.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="780" y="1891.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="780" y="1905.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="780" y="1919.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="780" y="1933.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="780" y="1947.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="155.6338" x="780" y="1961.7803">service: apmcontrolplane</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.6133" x="780" y="1975.7803">slug: apmdomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.4893" x="780" y="1989.7803">kind: ApmDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="780" y="2003.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="780" y="2017.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="780" y="2031.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="780" y="2045.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="780" y="2059.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="780" y="2073.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="780" y="2087.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4678" x="780" y="2101.7803">GetApmDomain; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.792" x="780" y="2115.7803">GetApmDomain; delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.8887" x="780" y="2129.7803">GetApmDomain/ListApmDomains confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="780" y="2143.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9512" x="780" y="2157.7803">displayName, freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="780" y="2171.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1582" x="780" y="2185.7803">compartmentId, isFreeTier</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="780" y="2199.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="780" y="2213.7803">list lookup: oci_apm_apm_domains filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5781" x="780" y="2227.7803">compartmentId, displayName; exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5713" x="780" y="2241.7803">plus displayName unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.1992" x="780" y="2255.7803">CREATING, or UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="780" y="2269.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="780" y="2283.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="780" y="2297.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="780" y="2311.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="780" y="2325.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.751" x="780" y="2339.7803">terminal and DELETED is only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6406" x="780" y="2353.7803">delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="780" y="2367.7803">Create, update, and delete responses expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4883" x="780" y="2381.7803">work-request headers but do not return an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6953" x="780" y="2395.7803">ApmDomain body. The runtime resumes through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.8057" x="780" y="2409.7803">GetWorkRequest, recovers the affected ApmDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3301" x="780" y="2423.7803">OCID from work-request resources, and then</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6748" x="780" y="2437.7803">rereads GetApmDomain before settling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5986" x="780" y="2451.7803">Pre-create reuse only runs when spec.displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3779" x="780" y="2465.7803">is present and keeps exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9229" x="780" y="2479.7803">displayName matching bounded to ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0273" x="780" y="2493.7803">CREATING, or UPDATING summaries.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2471" x="780" y="2507.7803">Only displayName, description, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2676" x="780" y="2521.7803">definedTags reconcile in place; compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="780" y="2535.7803">and isFreeTier remain replacement-only and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.6055" x="780" y="2549.7803">ChangeApmDomainCompartment stays out of scope</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.9785" x="780" y="2563.7803">for the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="780" y="2577.7803">DataUploadEndpoint is status-projected only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6885" x="780" y="2591.7803">after follow-up reads. Delete keeps the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1299" x="780" y="2605.7803">finalizer until the work request is terminal and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.7783" x="780" y="2619.7803">GetApmDomain or fallback ListApmDomains confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.7441" x="780" y="2633.7803">the resource is gone.</text><?plantuml-src lLXhRnit5ltENq5qlxI09CTDqgOoNC2rdTQejobiP_D5m8AQuKYiPyWfoP6YBlQ_xxaavoLRYR15Yo2mpSTzddlkvRX7fMjXHSNTMkHcg_IA5w9qahbkPoconvKrZSulJMai_qUHuLy-E97BGZIbVskq_qLKalyaoutqAXFFdxbNVqX--cgmAQmrsoJzHN7wxTV3czfu-SCJ6uhYs_oR_LF6vjAc4yjNhr---6xl1AbF-ozVlZfz_Ngm7yHdncff-Uatp2jVIdulVs-apYIVSb5N6QvRKzQbqFBaegwkJ2MKPckLIruOuvVcuq2WQ-_-Xt4kCc_ioC3aQBkrxw7yMhufNc0RmX1BLGljdxy_F72Cb44GEXcbAkIjqkCGVlTAl5o-mIw9h4TRsJ9_BK-xhIVfULE88cF_PS4t_dEpb8YhbuuDxE2NCPobjAFb7uIJTnAnpjJ-rXVlxj_zV2_jHcNodqABbRHVSE7uU6bqvTtb3QFKSxD1OiUo9tltK0HMvjnAPyh6AwFdQUaaLsA5dBgJ-FUqFp9jqpnpcrKh8PSbl3ruEswFRqgT1uYoFbXy-lqWHdCkDSutadV8WwN95TQVerjZD-Uy-_rBIpgT_ugDZz2bSJ3clN2uunIvrKC-f9tV6lE87mAcBvNEcIWzznPWm5caNNwiIwGXv82ZHZHgQiT5QQN8TzXLpZisrafsuFIS_oXzhqs2aJh1dI3bUAMS0sST4d8B3PqKzsMXIY-jcozqPYh2I0L9D_c4vygXfdT4Nby59wnid5Z2SxASSjrOr34K8aEeT03zaCfBEETbRtffJCspiCXhv9WOzlBk-kBXvfSVZ_CTkeB_pzlq_qJp6UkVmKoDK45ch8OD0Z_A8i3dlF2D2-8ePX7KF05CvWaZLs7va65njxVjm35OLIXRjJesIenS0jWMUfpi6FXqlWtyrVNjzR619m3lYMmzpKefD5p3YK9fKQAVMVYDLHT0iYmD8VMO85lfILUoao8gGpbXtUvYtjCUGHQ_W76uMJf8FbP1DAitL1GeWgTI8z1Qi56kepNm9nX3q3jEOIIfxLfrM0tX0sGMkeN-XB__zIhzrcKbQ2xLfWq4YGBlE1WlotmgjY3FXSwjAZoN6r4s8XYUS1QMrmXUIOpGK_xOvWdrW_kcheq5HdbJvwJ9DROGcPpJc88kc3-8bPimq5vcLKrAHXmnuOMLiZ2sedFiJlucCy-Nj29vrP3jSx04odEgvJPQxzWUvoZt5a8U5DfEej6MdlZu91jeRezMmcThk8cUy14jTdo3rMNZXlRoHYia9TwYohsuVBZvr_M4zTa0bDk4dF6y8Twck8GRwDg5K6NVeKpj1-xXAfKdRdYgiPWUe2O7lZ9_B4g78IJGX32si2I5hiiPRH4FVb