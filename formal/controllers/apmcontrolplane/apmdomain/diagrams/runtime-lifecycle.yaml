schemaVersion: 1
surface: repo-authored-semantics
service: apmcontrolplane
slug: apmdomain
kind: ApmDomain
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
repoAuthored:
  providerLifecycle:
    createPending:
      - CREATING
    updatePending:
      - UPDATING
    deletePending:
      - DELETING
  listLookup:
    filters:
      - compartmentId
      - displayName
    matchRule: exact compartmentId plus displayName unique match in ACTIVE, CREATING, or UPDATING; duplicate matches fail
  mutation:
    mutable:
      - definedTags
      - description
      - displayName
      - freeformTags
    forceNew:
      - compartmentId
      - isFreeTier
  hooks:
    create:
      - helper: tfresource.CreateResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: apmdomain
        action: CREATED
    update:
      - helper: tfresource.UpdateResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: apmdomain
        action: UPDATED
    delete:
      - helper: tfresource.DeleteResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: apmdomain
        action: DELETED
  followUp:
    create: GetWorkRequest -> GetApmDomain
    update: GetWorkRequest -> GetApmDomain
    delete: GetWorkRequest -> GetApmDomain/ListApmDomains confirm-delete
notes:
  - Reviewed lifecycle mapping treats CREATING as provisioning, UPDATING as
    updating, ACTIVE as success, and DELETING as terminating; FAILED is
    terminal and DELETED is only a delete-confirmation target.
  - Create, update, and delete responses expose work-request headers but do
    not return an ApmDomain body. The runtime resumes through GetWorkRequest,
    recovers the affected ApmDomain OCID from work-request resources, and then
    rereads GetApmDomain before settling.
  - Pre-create reuse only runs when spec.displayName is present and keeps exact
    compartmentId plus displayName matching bounded to ACTIVE, CREATING, or
    UPDATING summaries.
  - Only displayName, description, freeformTags, and definedTags reconcile in
    place; compartmentId and isFreeTier remain replacement-only and
    ChangeApmDomainCompartment stays out of scope for the published runtime.
  - DataUploadEndpoint is status-projected only after follow-up reads. Delete
    keeps the finalizer until the work request is terminal and GetApmDomain or
    fallback ListApmDomains confirms the resource is gone.
