schemaVersion: 1
surface: repo-authored-semantics
service: opa
slug: opainstance
kind: OpaInstance
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
repoAuthored:
  providerLifecycle:
    createPending:
      - CREATING
    updatePending:
      - UPDATING
    deletePending:
      - DELETING
  listLookup:
    filters:
      - compartmentId
      - displayName
    matchRule: exact compartmentId plus displayName unique match in ACTIVE, CREATING, UPDATING, or INACTIVE; duplicate matches fail
  mutation:
    mutable:
      - definedTags
      - description
      - displayName
      - freeformTags
    forceNew:
      - compartmentId
      - consumptionModel
      - idcsAt
      - isBreakglassEnabled
      - meteringType
      - shapeName
  hooks:
    create:
      - helper: tfresource.CreateResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: opainstance
        action: CREATED
    update:
      - helper: tfresource.UpdateResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: opainstance
        action: UPDATED
    delete:
      - helper: tfresource.DeleteResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: opainstance
        action: DELETED
  followUp:
    create: GetWorkRequest -> GetOpaInstance
    update: GetWorkRequest -> GetOpaInstance
    delete: GetWorkRequest -> GetOpaInstance/ListOpaInstances confirm-delete
notes:
  - Reviewed lifecycle mapping treats CREATING as provisioning, UPDATING as
    updating, ACTIVE and INACTIVE as success, and DELETING as terminating;
    FAILED is terminal and DELETED is only a delete-confirmation target.
  - Create, update, and delete responses expose work-request headers but do
    not return an OpaInstance body. The runtime resumes through GetWorkRequest,
    recovers the affected OpaInstance OCID from work-request resources, and
    rereads GetOpaInstance before settling.
  - Pre-create reuse only runs when both spec.compartmentId and
    spec.displayName are present and keeps exact compartmentId plus displayName
    matching bounded to ACTIVE, CREATING, UPDATING, or INACTIVE summaries.
  - Only displayName, description, freeformTags, and definedTags reconcile in
    place; IdcsAt is create-time-only and normalized out of post-create parity
    because OCI does not echo it, while compartmentId, shapeName,
    consumptionModel, meteringType, and isBreakglassEnabled remain
    replacement-only.
  - ChangeOpaInstanceCompartment, StartOpaInstance, and StopOpaInstance remain
    out of scope for the published runtime surface. Delete keeps the finalizer
    until the work request is terminal and GetOpaInstance or fallback
    ListOpaInstances confirms the resource is gone.
