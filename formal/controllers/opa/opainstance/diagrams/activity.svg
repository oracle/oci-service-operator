><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="824.3513" y="1500.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="824.3513" y="1514.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3506" x="824.3513" y="1528.7803">entity=opainstance action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="824.3513" y="1542.7803">update=tfresource.UpdateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="824.3513" y="1556.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3506" x="824.3513" y="1570.7803">entity=opainstance action=UPDATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.7334" x="824.3513" y="1584.7803">delete=tfresource.DeleteResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="824.3513" y="1598.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8467" x="824.3513" y="1612.7803">entity=opainstance action=DELETED when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="824.3513" y="1626.7803">matching field-driven path executes</text><rect fill="#F8FAFC" height="90" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="326.6055" x="818.2068" y="1660"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="828.2068" y="1680.7803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="828.2068" y="1694.7803">create=GetWorkRequest -&gt; GetOpaInstance;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="828.2068" y="1708.7803">update=GetWorkRequest -&gt; GetOpaInstance;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.4199" x="828.2068" y="1722.7803">delete=GetWorkRequest -&gt;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6055" x="828.2068" y="1736.7803">GetOpaInstance/ListOpaInstances confirm-delete</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8613" x="838.0789" y="1770"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8613" x="848.0789" y="1790.7803">Return success for the ACTIVE, INACTIVE</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8135" x="848.0789" y="1804.7803">success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="841.9446" y="1838"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="851.9446" y="1858.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="851.9446" y="1872.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="824.8" y="1906"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="834.8" y="1926.7803">Requeue on provisioning, updating, terminating</text><path d="M691.6268,1962 L691.6268,2425 L671.6268,2429 L691.6268,2433 L691.6268,2896 A0,0 0 0 0 691.6268,2896 L1046.4803,2896 A0,0 0 0 0 1046.4803,2896 L1046.4803,1972 L1036.4803,1962 L691.6268,1962 A0,0 0 0 0 691.6268,1962" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1036.4803,1962 L1036.4803,1972 L1046.4803,1972 L1036.4803,1962" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="697.6268" y="1977.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="697.6268" y="1991.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="697.6268" y="2005.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="697.6268" y="2019.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="697.6268" y="2033.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="697.6268" y="2047.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="697.6268" y="2061.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="697.6268" y="2075.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="697.6268" y="2089.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="697.6268" y="2103.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="697.6268" y="2117.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="697.6268" y="2131.7803">service: opa</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9648" x="697.6268" y="2145.7803">slug: opainstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="697.6268" y="2159.7803">kind: OpaInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="697.6268" y="2173.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="697.6268" y="2187.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="697.6268" y="2201.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="697.6268" y="2215.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="697.6268" y="2229.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="697.6268" y="2243.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="697.6268" y="2257.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="697.6268" y="2271.7803">GetOpaInstance; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="697.6268" y="2285.7803">GetOpaInstance; delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6055" x="697.6268" y="2299.7803">GetOpaInstance/ListOpaInstances confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="697.6268" y="2313.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9512" x="697.6268" y="2327.7803">displayName, freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="697.6268" y="2341.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4541" x="697.6268" y="2355.7803">compartmentId, consumptionModel, idcsAt,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.7061" x="697.6268" y="2369.7803">isBreakglassEnabled (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="697.6268" y="2383.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4883" x="697.6268" y="2397.7803">list lookup: oci_opa_opa_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5781" x="697.6268" y="2411.7803">compartmentId, displayName; exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5713" x="697.6268" y="2425.7803">plus displayName unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.958" x="697.6268" y="2439.7803">CREATING, UPDATING, or INACTIVE; duplicate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="697.6268" y="2453.7803">matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="697.6268" y="2467.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="697.6268" y="2481.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="697.6268" y="2495.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7021" x="697.6268" y="2509.7803">provisioning, UPDATING as updating, ACTIVE and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4199" x="697.6268" y="2523.7803">INACTIVE as success, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4404" x="697.6268" y="2537.7803">terminating; FAILED is terminal and DELETED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.8887" x="697.6268" y="2551.7803">only a delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="697.6268" y="2565.7803">Create, update, and delete responses expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4883" x="697.6268" y="2579.7803">work-request headers but do not return an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0537" x="697.6268" y="2593.7803">OpaInstance body. The runtime resumes through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.8887" x="697.6268" y="2607.7803">GetWorkRequest, recovers the affected</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2197" x="697.6268" y="2621.7803">OpaInstance OCID from work-request resources,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2813" x="697.6268" y="2635.7803">and rereads GetOpaInstance before settling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4609" x="697.6268" y="2649.7803">Pre-create reuse only runs when both</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4814" x="697.6268" y="2663.7803">spec.compartmentId and spec.displayName are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3779" x="697.6268" y="2677.7803">present and keeps exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9229" x="697.6268" y="2691.7803">displayName matching bounded to ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.3721" x="697.6268" y="2705.7803">CREATING, UPDATING, or INACTIVE summaries.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2471" x="697.6268" y="2719.7803">Only displayName, description, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7988" x="697.6268" y="2733.7803">definedTags reconcile in place; IdcsAt is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="697.6268" y="2747.7803">create-time-only and normalized out of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3848" x="697.6268" y="2761.7803">post-create parity because OCI does not echo it,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.3232" x="697.6268" y="2775.7803">while compartmentId, shapeName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0195" x="697.6268" y="2789.7803">consumptionModel, meteringType, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5918" x="697.6268" y="2803.7803">isBreakglassEnabled remain replacement-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.8535" x="697.6268" y="2817.7803">ChangeOpaInstanceCompartment, StartOpaInstance,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8604" x="697.6268" y="2831.7803">and StopOpaInstance remain out of scope for the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="697.6268" y="2845.7803">published runtime surface. Delete keeps the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1299" x="697.6268" y="2859.7803">finalizer until the work request is terminal and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="697.6268" y="2873.7803">GetOpaInstance or fallback ListOpaInstances</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.5303" x="697.6268" y=