="304.3018" x="779" y="2115.7803">compartment_id, display_name, gdp_pipeline_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9307" x="779" y="2129.7803">lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="779" y="2143.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="779" y="2157.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9707" x="779" y="2171.7803">GdpPipeline create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.123" x="779" y="2185.7803">work-request-backed. The runtime records the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.999" x="779" y="2199.7803">opening opc-work-request-id, polls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1846" x="779" y="2213.7803">GetGdpWorkRequest through the generatedruntime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5088" x="779" y="2227.7803">async seam, and rereads GetGdpPipeline before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9092" x="779" y="2241.7803">projecting status or completing delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.1445" x="779" y="2255.7803">confirmation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5645" x="779" y="2269.7803">GDP work-request OperationStatus values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.709" x="779" y="2283.7803">normalize into the shared async classes and GDP</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0605" x="779" y="2297.7803">operation types normalize into create, update,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="779" y="2311.7803">and delete phases. Raw work-request status,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.626" x="779" y="2325.7803">operation type, message, percent complete, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.0684" x="779" y="2339.7803">work-request ID remain visible in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6816" x="779" y="2353.7803">status.async.current for debugging.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0059" x="779" y="2367.7803">Success states are explicit: ACTIVE and INACTIVE</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.8477" x="779" y="2381.7803">settle success, while NEEDS_ATTENTION is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4746" x="779" y="2395.7803">terminal non-success rather than a default</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.7031" x="779" y="2409.7803">active state.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2334" x="779" y="2423.7803">Pre-create reuse is exact on compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0742" x="779" y="2437.7803">displayName, pipelineType, and peeringRegion,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5645" x="779" y="2451.7803">and the runtime confirms bucketDetails from a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.709" x="779" y="2465.7803">follow-up GET before binding to an existing</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3506" x="779" y="2479.7803">pipeline. When a tracked OCID already exists,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3301" x="779" y="2493.7803">list reuse stays keyed to the service-specific</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.0752" x="779" y="2507.7803">gdpPipelineId filter.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.9443" x="779" y="2521.7803">Mutable drift is limited to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4883" x="779" y="2535.7803">UpdateGdpPipelineDetails fields displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="779" y="2549.7803">description, serviceLogGroupId, fileTypes,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.8477" x="779" y="2563.7803">authorizationDetails,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3369" x="779" y="2577.7803">isFileOverrideInDestinationEnabled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1777" x="779" y="2591.7803">isScanningEnabled, isChunkingEnabled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4883" x="779" y="2605.7803">isApprovalNeeded, approvalKeyVaultId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="779" y="2619.7803">freeformTags, and definedTags. Strings, maps,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7295" x="779" y="2633.7803">and false booleans keep explicit clear intent,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6611" x="779" y="2647.7803">while zero-length fileTypes clears remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.998" x="779" y="2661.7803">unpublished because the pinned SDK update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.834" x="779" y="2675.7803">request omits empty slices.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="779" y="2689.7803">Start/Stop/Peer/Rotate/ChangeCompartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4473" x="779" y="2703.7803">auxiliaries remain out-of-scope drift for the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="117.5166" x="779" y="2717.7803">published contract.</text><?plantuml-src jLXTRnit5dtdho3QbnIhaPCcQLCLMI2rLTU8QmUMsxmO4AWPZiJr33abELRKnVxtdajoHZEotHZj5dc8nO_xUUwvb-DkbMw45JLt6r6OhT9hNehAIURwdPN8RzVMjBeuDfMn_CionxzYSAAGfMWh_wFH_aBKalyagplfLIuUFhDGlql-ujLWKrXhjadwy_B5jryFRshZvG_tR2ZBRujl3ayPMqYRJgnUlNxv_Bk34wG-xRzy-Uh5wzU3_I0-DrPBorzymxpobUGB-LihTIvvnjT5StHQD1zK8okb9TkeGlBI6ByodmPYN7VZlunpaNjZHsObzxgjGx_ar_9D-HpR48O8gaPe__3zuO6dI1cutikeL2dFuSj8mtUlnClL6-oIo6QqbQ-Ar_95ltKlAMzAKURiVopunj-tAubeUkdOm0v-34EigIffHyi_22UlP6vqhWwtlhXSNBvVI7kdSlcpq68jxHTSE3vU6bsvF3vZb71kxf3EiUp9mJr0tyg2M-bCrNfbz2mj7HLAh95JTnH_P_iZMPVcgRjRTn8AMS7RHs_7xV5DgOi0JBOF5i_-FO