schemaVersion: 1
surface: repo-authored-semantics
service: gdp
slug: gdppipeline
kind: GdpPipeline
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
  - failed
notes:
  - "GdpPipeline create, update, and delete are work-request-backed. The runtime records the opening opc-work-request-id, polls GetGdpWorkRequest through the generatedruntime async seam, and rereads GetGdpPipeline before projecting status or completing delete confirmation."
  - "GDP work-request OperationStatus values normalize into the shared async classes and GDP operation types normalize into create, update, and delete phases. Raw work-request status, operation type, message, percent complete, and work-request ID remain visible in status.async.current for debugging."
  - "Success states are explicit: ACTIVE and INACTIVE settle success, while NEEDS_ATTENTION is terminal non-success rather than a default active state."
  - "Pre-create reuse is exact on compartmentId, displayName, pipelineType, and peeringRegion, and the runtime confirms bucketDetails from a follow-up GET before binding to an existing pipeline. When a tracked OCID already exists, list reuse stays keyed to the service-specific gdpPipelineId filter."
  - "Mutable drift is limited to UpdateGdpPipelineDetails fields displayName, description, serviceLogGroupId, fileTypes, authorizationDetails, isFileOverrideInDestinationEnabled, isScanningEnabled, isChunkingEnabled, isApprovalNeeded, approvalKeyVaultId, freeformTags, and definedTags. Strings, maps, and false booleans keep explicit clear intent, while zero-length fileTypes clears remain unpublished because the pinned SDK update request omits empty slices. Start/Stop/Peer/Rotate/ChangeCompartment auxiliaries remain out-of-scope drift for the published contract."
