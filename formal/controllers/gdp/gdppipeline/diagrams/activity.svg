cess for the ACTIVE, INACTIVE</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8135" x="836.3916" y="1696.2803">success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="830.2573" y="1729.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="840.2573" y="1750.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="840.2573" y="1764.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="813.1128" y="1797.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="823.1128" y="1818.2803">Requeue on provisioning, updating, terminating</text><path d="M685.7832,1853.5 L685.7832,2358.5 L665.7832,2362.5 L685.7832,2366.5 L685.7832,2871.5 A0,0 0 0 0 685.7832,2871.5 L1028.9678,2871.5 A0,0 0 0 0 1028.9678,2871.5 L1028.9678,1863.5 L1018.9678,1853.5 L685.7832,1853.5 A0,0 0 0 0 685.7832,1853.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1018.9678,1853.5 L1018.9678,1863.5 L1028.9678,1863.5 L1018.9678,1853.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="691.7832" y="1869.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="691.7832" y="1883.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="691.7832" y="1897.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="691.7832" y="1911.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="691.7832" y="1925.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="691.7832" y="1939.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="691.7832" y="1953.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="691.7832" y="1967.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="691.7832" y="1981.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="691.7832" y="1995.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="691.7832" y="2009.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="691.7832" y="2023.2803">service: gdp</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.082" x="691.7832" y="2037.2803">slug: gdppipeline</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7373" x="691.7832" y="2051.2803">kind: GdpPipeline</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="691.7832" y="2065.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="691.7832" y="2079.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="691.7832" y="2093.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="691.7832" y="2107.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="691.7832" y="2121.2803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="691.7832" y="2135.2803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4814" x="691.7832" y="2149.2803">supported drift: approval_key_vault_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8604" x="691.7832" y="2163.2803">authorization_details, defined_tags, description</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="691.7832" y="2177.2803">(+8 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="691.7832" y="2191.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7363" x="691.7832" y="2205.2803">bucket_details, compartment_id, peering_region,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.5098" x="691.7832" y="2219.2803">pipeline_type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="691.7832" y="2233.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.6055" x="691.7832" y="2247.2803">list lookup: oci_gdp_gdp_pipelines filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.3018" x="691.7832" y="2261.2803">compartment_id, display_name, gdp_pipeline_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9307" x="691.7832" y="2275.2803">lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="691.7832" y="2289.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="691.7832" y="2303.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9707" x="691.7832" y="2317.2803">GdpPipeline create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.123" x="691.7832" y="2331.2803">work-request-backed. The runtime records the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.999" x="691.7832" y="2345.2803">opening opc-work-request-id, polls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1846" x="691.7832" y="2359.2803">GetGdpWorkRequest through the generatedruntime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5088" x="691.7832" y="2373.2803">async seam, and rereads GetGdpPipeline before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9092" x="691.7832" y="2387.2803">projecting status or completing delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.1445" x="691.7832" y="2401.2803">confirmation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5645" x="691.7832" y="2415.2803">GDP work-request OperationStatus values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.709" x="691.7832" y="2429.2803">normalize into the shared async classes and GDP</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0605" x="691.7832" y="2443.2803">operation types normalize into create, update,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="691.7832" y="2457.2803">and delete phases. Raw work-request status,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.626" x="691.7832" y="2471.2803">operation type, message, percent complete, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.0684" x="691.7832" y="2485.2803">work-request ID remain visible in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6816" x="691.7832" y="2499.2803">status.async.current for debugging.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0059" x="691.7832" y="2513.2803">Success states are explicit: ACTIVE and INACTIVE</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.8477" x="691.7832" y="2527.2803">settle success, while NEEDS_ATTENTION is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4746" x="691.7832" y="2541.2803">terminal non-success rather than a default</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.7031" x="691.7832" y="2555.2803">active state.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2334" x="691.7832" y="2569.2803">Pre-create reuse is exact on compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0742" x="691.7832" y="2583.2803">displayName, pipelineType, and peeringRegion,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5645" x="691.7832" y="2597.2803">and the runtime confirms bucketDetails from a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.709" x="691.7832" y="2611.2803">follow-up GET before binding to an existing</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3506" x="691.7832" y="2625.2803">pipeline. When a tracked OCID already exists,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3301" x="691.7832" y="2639.2803">list reuse stays keyed to the service-specific</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.0752" x="691.7832" y="2653.2803">gdpPipelineId filter.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.9443" x="691.7832" y="2667.2803">Mutable drift is limited to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4883" x="691.7832" y="2681.2803">UpdateGdpPipelineDetails fields displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="691.7832" y="2695.2803">description, serviceLogGroupId, fileTypes,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.8477" x="691.7832" y="2709.2803">authorizationDetails,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3369" x="691.7832" y="2723.2803">isFileOverrideInDestinationEnabled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1777" x="691.7832" y="2737.2803">isScanningEnabled, isChunkingEnabled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4883" x="691.7832" y="2751.2803">isApprovalNeeded, approvalKeyVaultId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="691.7832" y="2765.2803">freeformTags, and definedTags. Strings, maps,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7295" x="691.7832" y="2779.2803">and false booleans keep explicit clear intent,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6611" x="691.7832" y="2793.2803">while zero-length fileTypes clears remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.998" x="691.7832" y="2807.2803">unpublished because the pinned SDK update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.834" x="691.7832" y="2821.2803">request omits empty slices.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="691.7832" y="2835.2803">Start/Stop/Peer/Rotate/ChangeCompartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4473" x="691.7832" y="2849.2803">auxiliaries remain out-of-scope drift for the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="117.5166" x="691.7832" y="2863.2803">published contract.</text><ellipse cx="654.7832" cy="2362.5" fill=