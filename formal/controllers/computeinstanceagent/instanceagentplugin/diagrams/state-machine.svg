<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="830px" preserveAspectRatio="none" style="width:2511px;height:830px;background:#FCFCFD;" version="1.1" viewBox="0 0 2511 830" width="2511px" zoomAndPan="magnify"><title>State Machine - computeinstanceagent/InstanceAgentPlugin</title><defs/><g><rect fill="#FCFCFD" height="830" style="stroke:none;stroke-width:1;" width="2511" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="402.1787" x="1046.7968" y="20.7803">State Machine - computeinstanceagent/InstanceAgentPlugin</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="232.96" y="473"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="232.96" x2="497.3243" y1="497" y2="497"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="338.6871" y="488.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="237.96" y="512.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="237.96" y="526.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1294.32" y="401"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1299.32" y="424.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2033.27" y="411"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2038.27" y="434.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="45.04" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="50.04" y="442.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1321.8" y="536"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1327.7346" y="559.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="775.4" y="484"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="780.4" y="507.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1608.52" y="456"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1613.52" y="479.7803">RejectUnsupportedDrift</text><g class="start_entity" data-qualified-name=".start." data-source-line="28" id="ent0002"><ellipse cx="80" cy="504" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="41" id="ent0003"><path d="M2144.74,49 L2144.74,427 L2083.8,431 L2144.74,435 L2144.74,813 A8,8 0 0 0 2152.74,821 L2494.7722,821 A8,8 0 0 0 2502.7722,813 L2502.7722,51 L2492.7722,41 L2152.74,41 A8,8 0 0 0 2144.74,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2492.7722,41 L2492.7722,47 A4,4 0 0 0 2496.7722,51 L2502.7722,51 L2492.7722,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2150.74" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2150.74" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2150.74" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2150.74" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2150.74" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2150.74" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2150.74" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2150.74" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2150.74" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="2150.74" y="182.7803">service: computeinstanceagent</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.0059" x="2150.74" y="196.7803">slug: instanceagentplugin</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.8887" x="2150.74" y="210.7803">kind: InstanceAgentPlugin</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2150.74" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="2150.74" y="238.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="2150.74" y="252.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2150.74" y="266.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="2150.74" y="280.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.2012" x="2150.74" y="294.7803">follow-up: create=none; update=none; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="2150.74" y="308.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2150.74" y="322.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4951" x="2150.74" y="336.7803">compartmentId, instanceagentId, pluginName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2150.74" y="350.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="2150.74" y="364.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="337.0322" x="2150.74" y="378.7803">oci_compute_instance_agent_instance_agent_plugins</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2334" x="2150.74" y="392.7803">filters compartmentId, instanceagentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1299" x="2150.74" y="406.7803">pluginName; Direct reads require the exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0547" x="2150.74" y="420.7803">composite identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="2150.74" y="434.7803">instanceagentId+compartmentId+pluginName.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0059" x="2150.74" y="448.7803">Confirmation-only list reads reuse the same</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9502" x="2150.74" y="462.7803">scope and treat an exact plugin-name match as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.6396" x="2150.74" y="476.7803">the bound plugin; unexpected surviving matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="146.3164" x="2150.74" y="490.7803">fail instead of guessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2150.74" y="504.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2150.74" y="518.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.1299" x="2150.74" y="532.7803">Compute Instance Agent exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.2402" x="2150.74" y="546.7803">GetInstanceAgentPlugin and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.4189" x="2150.74" y="560.7803">ListInstanceAgentPlugins only in the pinned SDK,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="2150.74" y="574.7803">so the published runtime is bind-existing and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.041" x="2150.74" y="588.7803">observe-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2266" x="2150.74" y="602.7803">Bind identity is explicit: reconcile requires</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6328" x="2150.74" y="616.7803">compartmentId, instanceagentId, and pluginName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="2150.74" y="630.7803">tracks the composite identity in status, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5986" x="2150.74" y="644.7803">uses ListInstanceAgentPlugins only to confirm</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9502" x="2150.74" y="658.7803">absence after a reread no longer finds the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0547" x="2150.74" y="672.7803">tracked plugin.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6055" x="2150.74" y="686.7803">No OCI create, update, or delete operation is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8535" x="2150.74" y="700.7803">published. Plugin enable or disable remains part</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.5088" x="2150.74" y="714.7803">of Core UpdateInstance and is out of scope for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.4961" x="2150.74" y="728.7803">this package.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5303" x="2150.74" y="742.7803">Visible plugin states RUNNING, STOPPED,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2197" x="2150.74" y="756.7803">NOT_SUPPORTED, and INVALID are all stable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="2150.74" y="770.7803">observed states. Delete is Kubernetes-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.502" x="2150.74" y="784.7803">unbind only and settles through best-effort</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.709" x="2150.74" y="798.7803">local cleanup rather than cloud-side terminal</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="47.4688" x="2150.74" y="812.7803">waiting.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="28" id="lnk3"><path d="M90.42,504 C113.26,504 168.01,504 226.49,504" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="232.49,504,223.49,500,227.49,504,223.49,508,232.49,504" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.0273" x="145.96" y="499.7803">reconcile</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="29" id="lnk4"><path d="M497.6,504 C588.51,504 699.25,504 769.1,504" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="775.1,504,766.1,500,770.1,504,766.1,508,775.1,504" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="528.32" y="499.7803">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="30" id="lnk5"><path d="M898.51,503.46 C999.69,501.95 1198.26,496.15 1264.32,474 C1285.44,466.92 1301.6755,456.6969 1317.0655,444.9169" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1321.83,441.27,1312.252,443.564,1317.8596,444.3091,1317.1145,449.9166,1321.83,441.27" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="1055.1271" y="441.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9033" x="1060.2199" y="455.7803">RUNNING, STOPPED,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.7031" x="1038.82" y="469.7803">NOT_SUPPORTED, INVALID</text></g><!--link resolve_by_lookup to failed--><g class="link" data-entity-1="ent0007" data-entity-2="ent0006" data-link-type="dependency" data-source-line="31" id="lnk6"><path d="M898.62,515.04 C928.82,520.2 965.9,526.06 999.32,530 C1119.74,544.18 1258.6571,551.8284 1315.3771,554.5884" fill="none" id="resolve_by_lookup-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1321.37,554.88,1312.575,550.4473,1316.3759,554.637,1312.1862,558.4378,1321.37,554.88" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" l