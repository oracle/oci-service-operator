c, tracked</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6611" x="225.491" y="211.7803">status, and delete intent</text><polygon fill="#E2E8F0" points="247.3967,245,506.3284,245,518.3284,257,506.3284,269,247.3967,269,235.3967,257,247.3967,245" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.9316" x="247.3967" y="260.7803">"Tracked or explicit OCI identity present?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="213.6106" y="253.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="518.3284" y="253.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="222.3027" x="114.2454" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3027" x="124.2454" y="299.7803">Get the current OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.9922" x="124.2454" y="313.7803">GetInstanceAgentPlugin</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4951" x="377.0808" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="387.0808" y="299.7803">Resolve an existing OCI resource through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9092" x="387.0808" y="313.7803">ListInstanceAgentPlugins using filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4951" x="387.0808" y="327.7803">compartmentId, instanceagentId, pluginName</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="384.8806" y="361"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="394.8806" y="381.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="394.8806" y="395.7803">into status</text><polygon fill="#E2E8F0" points="376.8625,415,388.8625,427,376.8625,439,364.8625,427,376.8625,415" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="314.6863,471,439.0388,471,451.0388,483,439.0388,495,314.6863,495,302.6863,483,314.6863,471" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="314.6863" y="486.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="280.9001" y="479.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="451.0388" y="479.7803">no</text><rect fill="none" height="274" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="334.9434" x="11" y="505"/><path d="M61.4688,505 L61.4688,512 L51.4688,522 L11,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="516.7803">Delete</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="284.5986" x="36.1724" y="539"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5986" x="46.1724" y="559.7803">Delete path is not represented by imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0342" x="46.1724" y="573.7803">provider facts</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.9434" x="21" y="622"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9434" x="31" y="642.7803">Confirm deletion via GetInstanceAgentPlugin or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2607" x="31" y="656.7803">ListInstanceAgentPlugins until OCI reaches</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1582" x="31" y="670.7803">LOCAL_DELETE</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="292.3438" x="32.2998" y="719"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3438" x="42.2998" y="739.7803">Allow best-effort completion without finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4824" x="42.2998" y="753.7803">retention</text><ellipse cx="178.4717" cy="825" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="178.4717" cy="825" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="253" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="424.6201" x="365.9434" y="505"/><path d="M516.7773,505 L516.7773,512 L506.7773,522 L365.9434,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="368.9434" y="516.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="378.6201" x="385.9434" y="588"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="395.9434" y="608.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="358.6201" x="395.9434" y="622.7803">OCI reaches RUNNING, STOPPED, NOT_SUPPORTED,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4619" x="395.9434" y="636.7803">INVALID</text><ellipse cx="575.2534" cy="696" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="575.2534" cy="696" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="454.7324,539,695.7744,539,707.7744,551,695.7744,563,454.7324,563,442.7324,551,454.7324,539" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="579.2534" y="573.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="454.7324" y="554.7803">"OCI state is outside success targets?"</text><rect fill="none" height="547" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="354.4473" x="404.0298" y="785"/><path d="M570.4497,785 L570.4497,792 L560.4497,802 L404.0298,802" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="407.0298" y="796.7803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="237.8818" x="456.3125" y="819"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.8818" x="466.3125" y="839.7803">Compare live OCI state against the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3369" x="466.3125" y="853.7803">repo-authored mutation surface</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="424.0298" y="936"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="434.0298" y="956.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4678" x="434.0298" y="970.7803">fields compartmentId, instanceagentId,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.71" x="434.0298" y="984.7803">pluginName</text><ellipse cx="575.2534" cy="1029" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="575.2534" cy="1029" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="449.6704,887,700.8364,887,712.8364,899,700.8364,911,449.6704,911,437.6704,899,449.6704,887" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="579.2534" y="921.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="449.6704" y="902.7803">"Force-new or conflicting drift detected?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="273.3945" x="438.5562" y="1082"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="448.5562" y="1102.7803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.3945" x="448.5562" y="1116.7803">create=none; update=none; delete=none</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="307.8545" x="421.3262" y="1150"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8545" x="431.3262" y="1170.7803">Return success for the RUNNING, STOPPED,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4063" x="431.3262" y="1184.7803">NOT_SUPPORTED, INVALID success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="435.6885" y="1218"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="445.6885" y="1238.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="445.6885" y="1252.7803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="169.4336" x="490.5366" y="1286"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4336" x="500.5366" y="1306.7803">Requeue on terminating</text><path d="M407.8625,1342 L407.8625,1742 L387.8625,1746 L407.8625,1750 L407.8625,2150 A0,0 0 0 0 407.8625,2150 L765.8948,2150 A0,0 0 0 0 765.8948,2150 L765.8948,1352 L755.8948,1342 L407.8625,1342 A0,0 0 0 0 407.8625,1342" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M755.8948,1342 L755.8948,1352 L765.8948,1352 L755.8948,1342" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="413.8625" y="1357.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="413.8625" y="1371.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="413.8625" y="1385.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="413.8625" y="1399.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="413.8625" y="1413.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="413.8625" y="1427.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="413.8625" y="1441.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="413.8625" y="1455.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="413.8625" y="1469.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="413.8625" y="1483.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="413.8625" y="1497.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="413.8625" y="1511.7803">service: computeinstanceagent</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.0059" x="413.8625" y="1525.7803">slug: instanceagentplugin</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.8887" x="413.8625" y="1539.7803">kind: InstanceAgentPlugin</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="413.8625" y="1553.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="413.8625" y="1567.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="413.8625" y="1581.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="413.8625" y="1595.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="413.8625" y="1609.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.2012" x="413.8625" y="1623.7803">follow-up: create=none; update=none; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="413.8625" y="1637.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="413.8625" y="1651.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4951" x="413.8625" y="1665.7803">compartmentId, instanceagentId, pluginName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="413.8625" y="1679.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="413.8625" y="1693.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="337.0322" x="413.8625" y="1707.7803">oci_compute_instance_agent_instance_agent_plugins</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2334" x="413.8625" y="1721.7803">filters compartmentId, instanceagentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1299" x="413.8625" y="1735.7803">pluginName; Direct reads require the exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0547" x="413.8625" y="1749.7803">composite identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="413.8625" y="1763.7803">instanceagentId+compartmentId+pluginName.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0059" x="413.8625" y="1777.7803">Confirmation-only list reads reuse the same</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9502" x="413.8625" y="1791.7803">scope and treat an exact plugin-name match as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.6396" x="413.8625" y="1805.7803">the bound plugin; unexpected surviving matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="146.3164" x="413.8625" y="1819.7803">fail instead of guessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="413.8625" y="1833.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="413.8625" y="1847.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.1299" x="413.8625" y="1861.7803">Compute Instance Agent exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.2402" x="413.8625" y="1875.7803">GetInstanceAgentPlugin and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.4189" x="413.8625" y="1889.7803">ListInstanceAgentPlugins only in the pinned SDK,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="413.8625" y="1903.7803">so the published runtime is bind-existing and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.041" x="413.8625" y="1917.7803">observe-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2266" x="413.8625" y="1931.7803">Bind identity is explicit: reconcile requires</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6328" x="413.8625" y="1945.7803">compartmentId, instanceagentId, and pluginName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="413.8625" y="1959.7803">tracks the composite identity in status, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5986" x="413.8625" y="1973.7803">uses ListInstanceAgentPlugins only to confirm</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9502" x="413.8625" y="1987.7803">absence after a reread no longer finds the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0547" x="413.8625" y="2001.7803">tracked plugin.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6055" x="413.8625" y="2015.7803">No OCI create, update, or delete operation is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8535" x="413.8625" y="2029.7803">published. Plugin enable or disable remains part</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.5088" x="413.8625" y="2043.7803">of Core UpdateInstance and is out of scope for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.4961" x="413.8625" y="2057.7803">this package.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5303" x="413.8625" y="2071.7803">Visible plugin states RUNNING, STOPPED,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2197" x="413.8625" y="2085.7803">NOT_SUPPORTED, and INVALID are all stable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="413.8625" y="2099.7803">observed states. Delete is Kubernetes-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.502" x="413.8625" y="2113.7803">unbind only and settles through best-effort</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.709" x="413.8625" y="2127.7803">local cleanup rather than cloud-side terminal</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="47.4688" x="413.8625" y="2141.7803">waiting.</text><ellipse cx="376.8625" cy="1746" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="376.8625" cy="1746" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="376.8625" x2="376.8625" y1="157" y2="177"/><polygon fill="#0F172A" points="372.8625,167,376.8625,177,380.8625,167,376.8625,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="528.3284" x2="528.3284" y1="341" y2="361"/><polygon fill="#0F172A" points="524.3284,351,528.3284,361,532.3284,351,528.3284,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="235.3967" x2="225.3967" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="225.3967" x2="225.3967" y1="257" y2="279"/><polygon fill="#0F172A" points="221.3967,269,225.3967,279,229.3967,26