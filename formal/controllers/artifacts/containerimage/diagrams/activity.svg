ca" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="174.4683" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="305.5713" x="143.4785" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8262" x="153.4785" y="755.7803">Delete path uses DeleteContainerImage with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5576" x="153.4785" y="769.7803">required via GetContainerImage or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5713" x="153.4785" y="783.7803">ListContainerImage to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="156.6992" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="166.6992" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="166.6992" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="139.5547" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="149.5547" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M327.2642,929 L327.2642,1105 L307.2642,1109 L327.2642,1113 L327.2642,1289 A0,0 0 0 0 327.2642,1289 L667.3042,1289 A0,0 0 0 0 667.3042,1289 L667.3042,939 L657.3042,929 L327.2642,929 A0,0 0 0 0 327.2642,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M657.3042,929 L657.3042,939 L667.3042,939 L657.3042,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font