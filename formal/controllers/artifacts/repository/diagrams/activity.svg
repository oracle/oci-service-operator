03.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="311.04" x="695.4814" y="1329"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.04" x="705.4814" y="1349.7803">Apply UpdateRepository only for mutable fields</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3857" x="705.4814" y="1363.7803">display_name</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1026.5215" y="1329"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1036.5215" y="1349.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="988.5129,1383,1000.5129,1395,988.5129,1407,976.5129,1395,988.5129,1383" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="118" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="821.3547" y="1427"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="831.3547" y="1447.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="831.3547" y="1461.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="831.3547" y="1475.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="831.3547" y="1489.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="831.3547" y="1503.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLe