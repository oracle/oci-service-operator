ch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="726" y="1639.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="726" y="1653.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="726" y="1667.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="726" y="1681.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="726" y="1695.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="726" y="1709.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="726" y="1723.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="97.2754" x="726" y="1737.7803">service: logging</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.1445" x="726" y="1751.7803">slug: log</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.8203" x="726" y="1765.7803">kind: Log</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="726" y="1779.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="726" y="1793.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="726" y="1807.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="726" y="1821.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="726" y="1835.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="726" y="1849.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="726" y="1863.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.8369" x="726" y="1877.7803">freeform_tags, is_enabled (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="726" y="1891.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.6123" x="726" y="1905.7803">configuration, log_group_id, log_type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="726" y="1919.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6748" x="726" y="1933.7803">list lookup: oci_logging_logs filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7227" x="726" y="1947.7803">display_name, log_group_id, log_type,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.8926" x="726" y="1961.7803">lifecycle_state (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="726" y="1975.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="726" y="1989.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.709" x="726" y="2003.7803">The generated runtime creates or binds logs</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.916" x="726" y="2017.7803">under spec.logGroupId, then uses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1846" x="726" y="2031.7803">status.logGroupId for tracked read, update, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8467" x="726" y="2045.7803">delete operations so immutable path drift cannot</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5371" x="726" y="2059.7803">redirect delete cleanup.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7227" x="726" y="2073.7803">Bind lookup stays within the target log group</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.9092" x="726" y="2087.7803">and matches on displayName, logType,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9434" x="726" y="2101.7803">sourceService, and sourceResource before create;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="138.5166" x="726" y="2115.7803">duplicate matches fail.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="726" y="2129.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4883" x="726" y="2143.7803">isEnabled, freeformTags, definedTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.04" x="726" y="2157.7803">retentionDuration. Delete retains the finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3301" x="726" y="2171.7803">until GetLog or list fallback confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="121.4063" x="726" y="2185.7803">tracked log is gone.</text><?plantuml-src hLXTRnkt4dtdho1wNnBKakDyD8c2NA2nSzEWlaaHfsy636gNk-8DHUubkLBLel-zP_YnsfMjnaMBF5Yx98SpPywScOt_eamdd5XplnArtIhJyaPeBvaVLfQY-j8wsvlwt6hh-B-Q2l_gqOvQDgBNuJ_MX0zYBVaFKczaK9MuUy-L-bNoiwUZHU6StMRhZvgpvu_79uqDyiqj7vhcUVtTuIxhQkdoZkNJPqyUlJpOGTVdzITFdfuzUpPQZ-Ohwunq_Emx5bJGab_9__VIL9BFkBPj2tnEBstBLggMlB4sBEql8nE-xFwDSIwgODt4fHnQMJgCIJwMBvf7M8OneASwOSBTvySRxcDb5FPWGwj6NYep1UtbK_5a-GAhPBARB5NB-fay6vPk9UH58vgA_SvYRFp7VYc1P92UZVpWvt34MQsbcxn-8xpy92jhAdMuzCt7guy_NactKPNyhp2YbUuRBZoVlfeS-NZ-db6okTqWbLFR9mVdG7idQ-wajxeFoff5VdLQAz4Yf_uqFS_sMsObpNE_QOk5Mcf4U_HqMfwUbAQEf6HxiFZitoEC5bmQxEyb1-VWOmw2xNVG_cc02pxyVk3eDXyUikaMEZI5OR4tZa2yee28vZ7L-6M_u8-0kqjbQYPquC610DY5LCjVEWte8-uSTM5GEJikj9EYtc5L-U3Pz3xo0BiN_9qCT8-4uWmc1nFAyxNo7ZLtxFWbREEyVz0e7QJp2ruhtscnkp7GePDhWvgzYK7SgFg4AlWcxBgu0FPNkqhB6ny4gFBWsyTyRPry-326vsJlnH9eK4oK-TwXgk4GyeMw1-sFkNIEi8EaeBIr7Q_Y8--GQzBMyqzll__y_iExh-41-n6Jk_tuQzZUuUiThEa07wobIjWW3PDiAiC9fzv7SuHG8ZJF59Drvif5V7tCfRHANXtP07yQvTR5-aQ970Q8TcrAkXEqUK-1zkBjvTklGqk47SoKM403OU0yrXfbX4P_SeWCRtrC-b9ROkPzO7Go282LVKlSeiB1UxTBESrhbLrt-04zuNRfOVc-5oItzewA1jI_RJMHg129ifcyGJpH6QBL_IvC4hHTgO67QyJeGOfhKmXzmd_-wIB_6Z8HRzPgKu0WKz0M3-UbhcTY2scyDhLJJU1o8tGlekEPIV7r2k1fKe2ze4zzFY6rl-gxpZgmaFTTJJVvtZMYaWiQEz3ZwfiWMd_29kh06oTbOzqwBGAO6sa8bPez-FOigG7x9Fydgy2Nj57oTKznBA00ACEPa