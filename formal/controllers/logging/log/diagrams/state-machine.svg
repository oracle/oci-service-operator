">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="289.11" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="289.11" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="289.11" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="289.11" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="289.11" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="289.11" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="97.2754" x="289.11" y="404.7803">service: logging</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.1445" x="289.11" y="418.7803">slug: log</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.8203" x="289.11" y="432.7803">kind: Log</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="289.11" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="289.11" y="460.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="289.11" y="474.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="289.11" y="488.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="289.11" y="502.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="289.11" y="516.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="289.11" y="530.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="289.11" y="544.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="289.11" y="558.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="289.11" y="572.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="289.11" y="586.7803">promotion.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M183.35,61.29 C183.35,77.87 183.35,107.03 183.35,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="183.35,136.85,187.35,127.85,183.35,131.85,179.35,127.85,183.35,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="65.3789" x="184.35" y="102.7803">CreateLog</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk4"><path d="M183.35,187.46 C183.35,237.94 183.35,347.17 183.35,397.6" fill="none" id="provisioning-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="183.35,403.6,187.35,394.6,183.35,398.6,179.35,394.6,183.35,403.6" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="184.35" y="228.7803">ACTIVE</text></g><!--link active to updating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk5"><path d="M163.53,454.25 C136.26,489.36 88.48,557.55 70.35,625 C66.32,640 67.4932,651.4362 71.4232,665.0262" fill="none" id="active-to-updating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="73.09,670.79,74.4323,661.033,71.701,665.9868,66.7472,663.2555,73.09,670.79" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.5029" x="71.35" y="636.7803">UpdateLog</text></g><!--link updating to active--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="dependency" data-source-line="25" id="lnk6"><path d="M118.39,670.68 C128.22,662.37 137.91,652.28 144.35,641 C178.96,580.33 183.774,501.34 183.884,460.21" fill="none" id="updating-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="183.9,454.21,179.8759,463.1993,183.8866,459.21,187.8759,463.2207,183.9,454.21" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="153.27" y="636.7803">ACTIVE</text></g><!--link active to terminating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="26" id="lnk7"><