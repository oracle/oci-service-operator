Length="220.2334" x="837.7446" y="1546.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8613" x="831.0908" y="1579.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8613" x="841.0908" y="1600.2803">Return success for the ACTIVE, INACTIVE</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8135" x="841.0908" y="1614.2803">success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="834.9565" y="1647.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="844.9565" y="1668.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="844.9565" y="1682.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="817.812" y="1715.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="827.812" y="1736.2803">Requeue on provisioning, updating, terminating</text><path d="M688.1328,1771.5 L688.1328,2080.5 L668.1328,2084.5 L688.1328,2088.5 L688.1328,2397.5 A0,0 0 0 0 688.1328,2397.5 L1025.0762,2397.5 A0,0 0 0 0 1025.0762,2397.5 L1025.0762,1781.5 L1015.0762,1771.5 L688.1328,1771.5 A0,0 0 0 0 688.1328,1771.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1015.0762,1771.5 L1015.0762,1781.5 L1025.0762,1781.5 L1015.0762,1771.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="694.1328" y="1787.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="694.1328" y="1801.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="694.1328" y="1815.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="694.1328" y="1829.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="694.1328" y="1843.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="694.1328" y="1857.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="694.1328" y="1871.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="694.1328" y="1885.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="694.1328" y="1899.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="694.1328" y="1913.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="694.1328" y="1927.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="97.2754" x="694.1328" y="1941.2803">service: logging</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.1445" x="694.1328" y="1955.2803">slug: log</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.8203" x="694.1328" y="1969.2803">kind: Log</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="694.1328" y="1983.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="694.1328" y="1997.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="694.1328" y="2011.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="694.1328" y="2025.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="694.1328" y="2039.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="694.1328" y="2053.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="694.1328" y="2067.2803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.8369" x="694.1328" y="2081.2803">freeform_tags, is_enabled (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="694.1328" y="2095.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.6123" x="694.1328" y="2109.2803">configuration, log_group_id, log_type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="694.1328" y="2123.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6748" x="694.1328" y="2137.2803">list lookup: oci_logging_logs filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7227" x="694.1328" y="2151.2803">display_name, log_group_id, log_type,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.8926" x="694.1328" y="2165.2803">lifecycle_state (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="694.1328" y="2179.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="694.1328" y="2193.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.709" x="694.1328" y="2207.2803">The generated runtime creates or binds logs</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.916" x="694.1328" y="2221.2803">under spec.logGroupId, then uses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1846" x="694.1328" y="2235.2803">status.logGroupId for tracked read, update, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8467" x="694.1328" y="2249.2803">delete operations so immutable path drift cannot</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5371" x="694.1328" y="2263.2803">redirect delete cleanup.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7227" x="694.1328" y="2277.2803">Bind lookup stays within the target log group</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.9092" x="694.1328" y="2291.2803">and matches on displayName, logType,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9434" x="694.1328" y="2305.2803">sourceService, and sourceResource before create;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="138.5166" x="694.1328" y="2319.2803">duplicate matches fail.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="694.1328" y="2333.2803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4883" x="694.1328" y="2347.2803">isEnabled, freeformTags, definedTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.04" x="694.1328" y="2361.2803">retentionDuration. Delete retains the finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3301" x="694.1328" y="2375.2803">until GetLog or list fallback confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="121.4063" x="694.1328" y="2389.2803">tracked log is gone.</text><ellipse cx="657.1328" cy="2084.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="657.1328" cy="2084.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="657.1328" x2="657.1328" y1="157" y2="177"/><polygon fill="#0F172A" points="653.1328,167,657.1328,177,661.1328,167,657.1328,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.2581" x2="815.2581" y1="355" y2="375"/><polygon fill="#0F172A" points="811.2581,365,815.2581,375,819.2581,365,815.2581,369" style="stroke:#0F172A