just="spacing" textLength="97.2754" x="349.5679" y="1098.7803">service: logging</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.2754" x="349.5679" y="1112.7803">slug: workrequesterror</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.3789" x="349.5679" y="1126.7803">kind: WorkRequestError</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="349.5679" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="349.5679" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="349.5679" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="349.5679" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="349.5679" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="349.5679" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="349.5679" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="349.5679" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="349.5679" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="349.5679" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="349.5679" y="1280.7803">promotion.</text><ellipse cx="312.5679" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="312.5679" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="312.5679" x2="312.5679" y1="65" y2="85"/><polygon fill="#0F172A" points="308.5679,75,312.5679,85,316.5679,75,312.5679,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="312.5679" x2="312.5679" y1="133" y2="153"/><polygon fill="#0F172A" points="308.5679,143,312.5679,153,316.5679,143,312.5679,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="312.5679" x2="312.5679" y1="201" y2="221"/><polygon fill="#0F172A" points="308.5679,211,312.5679,221,316.5679,211,312.5679,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="312.5679" x2="312.5679" y1="269" y2="289"/><polygon fill="#0F172A" points="308.5679,279,312.5679,289,316.5679,279,312.5679,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="157.5649" x2="157.5649" y1="439" y2="459"/><polygon fill="#0F172A" points="153.5649,449,157.5649,459,161.5649,449,157.5649,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="246.8784" x2="157.5649" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="157.5649" x2="157.5649" y1="383" y2="405"/><polygon fill="#0F172A" points="153.5649,395,157.5649,405,161.5649,395,157.5649,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="378.2573" x2="467.5708" y1="383" y2="383"/><line style="stroke:#0F172A;s