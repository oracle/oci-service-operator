="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4746" x="751" y="2337.7803">compartmentId, annotationFormat, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9365" x="751" y="2351.7803">and an optional tracked id; the runtime skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1162" x="751" y="2365.7803">list reuse entirely when displayName is empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.9717" x="751" y="2379.7803">Only displayName, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="751" y="2393.7803">labelingInstructions, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="751" y="2407.7803">definedTags reconcile in place. Compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6953" x="751" y="2421.7803">changes, label-set helpers, and import or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2676" x="751" y="2435.7803">record-generation helpers stay outside the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7227" x="751" y="2449.7803">published runtime contract, and the runtime has</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="751" y="2463.7803">no secret side effects.</text><?plantuml-src lLXTRzms5dtdhxXeNr9qPCTrt2PZP07NTh96NRkmdJuP670aQeORZQWbgPdCBlhVU_YbaUQZSR708W-nIUhoVfnxxg7DPratNFC5cJalr4hMCofvPGGptSwKvvzdMhLrSQagfUdRCiU_edUY42LlA_j1rVQEBmJzKrHBOMNEzvzvbFyHTFAcjycrLgje_NLvyjCF_IzhPSNFEpwKvK_5Zzkdb2w4ZYUcRyvENx_REk6kZ_kdfszEpivw-zvyhdGjD9tyoAoqbQ17yUzMrBcW