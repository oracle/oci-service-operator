er states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="751" y="2015.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="751" y="2029.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="751" y="2043.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="751" y="2057.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.499" x="751" y="2071.7803">display_name, freeform_tags (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4336" x="751" y="2085.7803">reject before mutate: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3506" x="751" y="2099.7803">create-only fields: annotation_format,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6885" x="751" y="2113.7803">compartment_id, dataset_format_details,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.9473" x="751" y="2127.7803">dataset_source_details (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8535" x="751" y="2141.7803">list lookup: oci_data_labeling_service_datasets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1094" x="751" y="2155.7803">filters annotationFormat, compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="751" y="2169.7803">displayName; exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0605" x="751" y="2183.7803">annotationFormat plus displayName unique match</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.1582" x="751" y="2197.7803">in ACTIVE, CREATING, or UPDATING; missing</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4951" x="751" y="2211.7803">displayName skips pre-create reuse and duplicate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="751" y="2225.7803">matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="751" y="2239.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="751" y="2253.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="751" y="2267.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="751" y="2281.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4746" x="751" y="2295.7803">success, and DELETING as terminating; FAILED and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3096" x="751" y="2309.7803">NEEDS_ATTENTION are terminal failure states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8535" x="751" y="2323.7803">The published Dataset spec uses repo-authored</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.6123" x="751" y="2337.7803">create-shape helper types for the supported</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="360.999" x="751" y="2351.7803">OBJECT_STORAGE and TEXT/DELIMITED rollout so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1025" x="751" y="2365.7803">required discriminators stay explicit and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="751" y="2379.7803">zero-based columnIndex values survive into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="751" y="2393.7803">CreateDatasetDetails.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0195" x="751" y="2407.7803">Pre-create lookup queries ListDatasets with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4746" x="751" y="2421.7803">compartmentId, annotationFormat, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9365" x="751" y="2435.7803">and an optional tracked id; the runtime skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1162" x="751" y="2449.7803">list reuse entirely when displayName is empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.9717" x="751" y="2463.7803">Only displayName, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="751" y="2477.7803">labelingInstructions, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="751" y="2491.7803">definedTags reconcile in place. Compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6953" x="751" y="2505.7803">changes, label-set helpers, and import or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2676" x="751" y="2519.7803">record-generation helpers stay outside the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7227" x="751" y="2533.7803">published runtime contract, and the runtime has</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="751" y="2547.7803">no secret side effects.</text><?plantuml-src lLXRRnkv5Nxdho2sBrcineutyMvMHWeujfAgwxKNjhReWm61ck58quo6ioH7Ybhql_SxlCn5busB0aKU8fE7X-VodUySZlbSLBNGOitDIcHgMrHBdelII6RQdOL8Fo-rQghiHfLAyp_bAVvbFObCvg8fxKTLsNknblmlijn8MwJYkCnJyK_9BzxsDeNMQXkqlyulVlo-Vx9ILduui27FVyn-s9TIEfCwI2pUNhvv_TEU15qVzj-yUNjnUTdRT-fJfIkf-SKFp1QsbFn9_jx8AfKyuPcmeXGBMI98HkfDaShpMwmPQTcgo2JFbR8BzQMdqiJJ_sASYzGgFJ0nk1gtzdsKtyjt-MjiGncYMTIYiiVFzmLUegKNXbP7MUJohgY6GVpfhNYpU8TTKbaFjj95TYalsgs31BtBHPwoVpFd6_-vMKX4rah3UdRm6nYYLLbAFLZ-WA0-obHLQR6_zSt3qyFFJpxyluXABAN-XWl3Xqk38mytKqR9vsg3r0vrZ_REeGoqpBYMHfMDBLGr3aldMI6MoAavztyddKWIqtncDike8PCbl3rvscyFJyegSo1bNR1uykTUZCPSLf1l90-uWvt14TP9qPcXasFU_dwbwKPZlsL34Jeq3CMuKmvdJ45EHRYxbFCxfJxZFm6p5qMLCL5QRZM004caN7wfIwJ0nP-ZFYfKr8wBKakHxR1R66lOy4wo0j9Z_adQU9S46xLgMpM5uUl269JYAHLtq1zqc5TvKLgfpVYv4XL2B2Xj7vLU2plYgLeJMjRGFCr6prLMcBeKEsAoRvrFMZP6B106SeJItcYKD2o09XGzC7_AXXluQcNqf5IgvgbRuZMIJMHxypYvdatlFxqa4BZ71UEuFVzzO8_OVGGwDU86ZRuaDiZ189r5nGt2sHYdZgBbaSq3pcGMm7Bhba-PvNUZPIU4O5DUw7MyOLE8dZj0t7FLpxaFTv2DuRwTt4rU5cv2y41Tz2yjfQZW4FRpeX8bcfc6jrWr3XIBKX5KNn9QBQr008ED54VfgWdhUkTp7VO8e_W1r7AreERpqWkyMPsX8aST76hru8e0emnxQ-2FCuRWzh8BFJzjLqMBppLyD03ASnN1FkA__NeRVhKPSJUNnIO6WbI1T0oCbsMMY2ru4yMfYznokH5buueueiijhn0ywiuzjX_QFA9MyDJKjT909c_gZ6uoZSv5AiSqew01PdChbcR4G7gfBcgwPSG3ASmhiCA8