tivity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="694.5558" y="1714.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="694.5558" y="1728.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="694.5558" y="1742.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="694.5558" y="1756.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="694.5558" y="1770.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="694.5558" y="1784.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="694.5558" y="1798.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="694.5558" y="1812.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9785" x="694.5558" y="1826.2803">service: datalabelingservice</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3857" x="694.5558" y="1840.2803">slug: dataset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="81.71" x="694.5558" y="1854.2803">kind: Dataset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="694.5558" y="1868.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="694.5558" y="1882.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="694.5558" y="1896.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="694.5558" y="1910.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="694.5558" y="1924.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="694.5558" y="1938.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="694.5558" y="1952.2803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="694.5558" y="1966.2803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="694.5558" y="1980.2803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.499" x="694.5558" y="1994.2803">display_name, freeform_tags (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4336" x="694.5558" y="2008.2803">reject before mutate: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3506" x="694.5558" y="2022.2803">create-only fields: annotation_format,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6885" x="694.5558" y="2036.2803">compartment_id, dataset_format_details,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.9473" x="694.5558" y="2050.2803">dataset_source_details (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8535" x="694.5558" y="2064.2803">list lookup: oci_data_labeling_service_datasets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1094" x="694.5558" y="2078.2803">filters annotationFormat, compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="694.5558" y="2092.2803">displayName; exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0605" x="694.5558" y="2106.2803">annotationFormat plus displayName unique match</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.1582" x="694.5558" y="2120.2803">in ACTIVE, CREATING, or UPDATING; missing</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4951" x="694.5558" y="2134.2803">displayName skips pre-create reuse and duplicate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="694.5558" y="2148.2803">matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="694.5558" y="2162.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="694.5558" y="2176.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="694.5558" y="2190.2803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="694.5558" y="2204.2803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4746" x="694.5558" y="2218.2803">success, and DELETING as terminating; FAILED and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3096" x="694.5558" y="2232.2803">NEEDS_ATTENTION are terminal failure states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8535" x="694.5558" y="2246.2803">The published Dataset spec uses repo-authored</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.6123" x="694.5558" y="2260.2803">create-shape helper types for the supported</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="360.999" x="694.5558" y="2274.2803">OBJECT_STORAGE and TEXT/DELIMITED rollout so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1025" x="694.5558" y="2288.2803">required discriminators stay explicit and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="694.5558" y="2302.2803">zero-based columnIndex values survive into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="694.5558" y="2316.2803">CreateDatasetDetails.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0195" x="694.5558" y="2330.2803">Pre-create lookup queries ListDatasets with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4746" x="694.5558" y="2344.2803">compartmentId, annotationFormat, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9365" x="694.5558" y="2358.2803">and an optional tracked id; the runtime skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1162" x="694.5558" y="2372.2803">list reuse entirely when displayName is empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.9717" x="694.5558" y="2386.2803">Only displayName, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="694.5558" y="2400.2803">labelingInstructions, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="694.5558" y="2414.2803">definedTags reconcile in place. Compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6953" x="694.5558" y="2428.2803">changes, label-set helpers, and import or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2676" x="694.5558" y="2442.2803">record-generation helpers stay outside the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7227" x="694.5558" y="2456.2803">published runtime contract, and the runtime has</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="694.5558" y="2470.2803">no secret side effects.</text><ellipse cx="657.5558" cy="2067.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="657.5558" cy="2067.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="657.5558" x2="657.5558" y1="157" y2="177"/><polygon fill="#0F172A" poin