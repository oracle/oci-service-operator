st="spacing" textLength="174.3027" x="692.9504" y="1905.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="692.9504" y="1919.2803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="692.9504" y="1933.2803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="692.9504" y="1947.2803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.8301" x="692.9504" y="1961.2803">follow-up: delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6611" x="692.9504" y="1975.2803">supported drift: display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="692.9504" y="1989.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="692.9504" y="2003.2803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="692.9504" y="2017.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4814" x="692.9504" y="2031.2803">list lookup: oci_budget_budgets filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="138.5098" x="692.9504" y="2045.2803">compartment_id, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="692.9504" y="2059.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="692.9504" y="2073.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8193" x="692.9504" y="2087.2803">Budget exposes only steady OCI lifecycle states</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.8193" x="692.9504" y="2101.2803">ACTIVE and INACTIVE. The published runtime does</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2881" x="692.9504" y="2115.2803">not model provisioning or updating phases for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.5098" x="692.9504" y="2129.2803">create/update.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.502" x="692.9504" y="2143.2803">Delete keeps the finalizer until DeleteBudget</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8057" x="692.9504" y="2157.2803">succeeds and confirm-delete rereads return</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="65.3721" x="692.9504" y="2171.2803">NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9775" x="692.9504" y="2185.2803">The published Budget kind keeps generated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6816" x="692.9504" y="2199.2803">controller and service-manager wiring with no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="181.3096" x="692.9504" y="2213.2803">handwritten runtime override.</text><ellipse cx="655.9504" cy="1943.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="655.9504" cy="1943.5" fill="#222222" rx="6" ry="6" style="stroke:#2222