ica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4619" x="659.6177" y="998.7803">[supported mutable drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg14"><polygon fill="#0F172A" points="992.3647,1032,1002.3647,1036,992.3647,1040,996.3647,1036" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="666.0483" x2="998.3647" y1="1036" y2="1036"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9229" x="673.0483" y="1016.7803">Apply UpdateBudget only for mutable</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="122.958" x="673.0483" y="1030.7803">fields display_name</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg15"><polygon fill="#0F172A" points="992.3647,1137,1002.3647,1141,992.3647,1145,996.3647,1141" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="666.0483" x2="998.3647" y1="1141" y2="1141"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="673.0483" y="1065.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="673.0483" y="1079.7803">create=tfresource.CreateResource,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="673.0483" y="1093.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="673.0483" y="1107.7803">entity=template action=CREATED;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="673.0483" y="1121.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" le