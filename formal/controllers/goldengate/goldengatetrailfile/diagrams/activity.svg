 x="178.3682" y="241.7803">Resolve OCI state via GetGoldenGateTrailFile</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.2061" x="178.3682" y="255.7803">with ListGoldenGateTrailFile fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="163.3062" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.6396" x="173.3062" y="309.7803">Use scaffold_goldengate_goldengatetrailfile</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="173.3062" y="323.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="173.3062" y="337.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="268.2368,371,375.6157,371,387.6157,383,375.6157,395,268.2368,395,256.2368,383,268.2368,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="268.2368" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="234.4507" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="387.6157" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4883" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4883" x="21" y="425.7803">Update path calls UpdateGoldenGateTrailFile</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="28.8931" y="459"/><text fill="#0F172A" font-family="Helvetica" font-siz