 font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.8818" x="856.585" y="1078.7803">Compare live OCI state against the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3369" x="856.585" y="1092.7803">repo-authored mutation surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="814.3022" y="1175"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="824.3022" y="1195.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6201" x="824.3022" y="1209.7803">fields commitmentTerm, compartmentId</text><ellipse cx="965.5259" cy="1255.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="965.5259" cy="1255.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="839.9429,1126,1091.1089,1126,1103.1089,1138,1091.1089,1150,839.9429,1150,827.9429,1138,839.9429,1126" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="969.5259" y="1160.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="839.9429" y="1141.7803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="855.0981,1308.5,1075.9536,1308.5,1087.9536,1320.5,1075.9536,1332.5,855.0981,1332.5,843.0981,1320.5,855.0981,1308.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="855.0981" y="1324.2803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="821.312" y="1317.