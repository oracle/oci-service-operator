.3682" x="765" y="2115.7803">orderDescription, orderSize (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="765" y="2129.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.0479" x="765" y="2143.7803">commitmentTerm, compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="765" y="2157.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2266" x="765" y="2171.7803">list lookup: oci_mngdmac_mac_orders filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5781" x="765" y="2185.7803">compartmentId, displayName; exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5713" x="765" y="2199.7803">plus displayName unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.1992" x="765" y="2213.7803">CREATING, or UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="765" y="2227.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="765" y="2241.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="765" y="2255.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="765" y="2269.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.8682" x="765" y="2283.7803">success, and NEEDS_ATTENTION or FAILED as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5645" x="765" y="2297.7803">terminal failure; DELETING stays terminating and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.8613" x="765" y="2311.7803">DELETED is a delete target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3369" x="765" y="2325.7803">CreateMacOrder returns a MacOrder body plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9092" x="765" y="2339.7803">opc-work-request-id, while UpdateMacOrder and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0264" x="765" y="2353.7803">CancelMacOrder return work-request headers only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4199" x="765" y="2367.7803">The runtime follows the service-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6953" x="765" y="2381.7803">GetWorkRequest helper, recovers the affected</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="765" y="2395.7803">MacOrder OCID from work-request resources, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3438" x="765" y="2409.7803">rereads GetMacOrder as the authoritative</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4063" x="765" y="2423.7803">observed-state source.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2676" x="765" y="2437.7803">Delete maps to CancelMacOrder for the published</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9229" x="765" y="2451.7803">Kubernetes contract. The finalizer is released</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2402" x="765" y="2465.7803">when rereads confirm DELETED, NotFound, or a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3164" x="765" y="2479.7803">canceled order read-model</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.499" x="765" y="2493.7803">(`orderStatus=CANCELED`) after the cancel work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.6201" x="765" y="2507.7803">request succeeds.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.8193" x="765" y="2521.7803">ChangeMacOrderCompartment remains out of scope;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.9717" x="765" y="2535.7803">compartmentId and commitmentTerm stay</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7021" x="765" y="2549.7803">replacement-only, while displayName, ipRange,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="765" y="2563.7803">orderDescription, orderSize, and shape reconcile</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.1445" x="765" y="2577.7803">in place.</text><?plantuml-src lLXhRnit5ltENq5qloHOoOwRf4rbP05NThf6NNjXkxjV1AJK34VYPaHEIOuKRT7_lkVoCPgHhOtsWKKGU3Gax_FSSo_7VLAw4LQik5kAqcoKNl1Ar4uorwtCHV5fOKshowcfZUL_g0hyAtixIbc9jlOVZFQtOYNvdsMzbbuLulaz3-eVaf-zwIqAQyqcINzLdNtxTV-aDbv-_yI6glgs_6P_bx6bj6d7_CtRrw--szj1wjFwwzTlpjw-xQq7yOMn