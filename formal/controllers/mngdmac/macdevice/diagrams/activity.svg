o status</text><polygon fill="#E2E8F0" points="602.7556,401,614.7556,413,602.7556,425,590.7556,413,602.7556,401" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="540.5793,457,664.9319,457,676.9319,469,664.9319,481,540.5793,481,528.5793,469,540.5793,457" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="540.5793" y="472.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="506.7932" y="465.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="676.9319" y="465.7803">no</text><rect fill="none" height="356" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="491"/><path d="M61.4688,491 L61.4688,498 L51.4688,508 L11,508" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="502.7803">Delete</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="322.668" x="178.4102" y="525"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0059" x="188.4102" y="545.7803">Delete path uses TerminateMacDevice with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.668" x="188.4102" y="559.7803">required via GetMacDevice or ListMacDevices to</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6064" x="188.4102" y="573.7803">DELETED, NOT_FOUND confirmation</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4268" x="188.5308" y="622"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7578" x="198.5308" y="642.7803">Confirm deletion via GetMacDevice or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4268" x="198.5308" y="656.7803">ListMacDevices until OCI reaches DELETED,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.1104" x="198.5308" y="670.7803">NOT_FOUND</text><polygon fill="#E2E8F0" points="191.5718,715,487.9165,715,499.9165,727,487.9165,739,191.5718,739,179.5718,727,191.5718,715" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="730.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="723.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="723.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="749"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="769.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="749"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="769.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="783.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,803,351.7441,815,339.7441,827,327.7441,815,339.7441,803" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="887" fill="none" rx="11" ry="11" style="st