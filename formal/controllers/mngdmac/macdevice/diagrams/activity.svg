<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1942px" preserveAspectRatio="none" style="width:1073px;height:1942px;background:#FCFCFD;" version="1.1" viewBox="0 0 1073 1942" width="1073px" zoomAndPan="magnify"><title>Activity - mngdmac/MacDevice</title><defs/><g><rect fill="#FCFCFD" height="1942" style="stroke:none;stroke-width:1;" width="1073" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="205.4063" x="432.3232" y="30.7803">Activity - mngdmac/MacDevice</text></g><ellipse cx="602.7556" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="362" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="678.8877" x="259.0342" y="75"/><path d="M381.1025,75 L381.1025,82 L371.1025,92 L259.0342,92" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="262.0342" y="86.7803">Observe and Bind</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="450.363" y="109"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="460.363" y="129.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="460.363" y="143.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="308.6885" x="448.4114" y="177"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6885" x="458.4114" y="197.7803">Read desired MacDevice spec, tracked status,</text><text fill="#0F172A