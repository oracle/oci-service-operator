uessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1641" x="669" y="1901.7803">Create and update use read-after-write follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3574" x="669" y="1915.7803">and treat ACTIVE as the steady-state success</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3848" x="669" y="1929.7803">target; there are no separate provisioning or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2813" x="669" y="1943.7803">updating lifecycle enums in the vendored SDK.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2129" x="669" y="1957.7803">Mutable drift is limited to the reviewed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1299" x="669" y="1971.7803">UpdateAlarm surface, while compartmentId remains</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6338" x="669" y="1985.7803">replacement-only until a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4199" x="669" y="1999.7803">monitoring/alarm-specific move contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="46.6963" x="669" y="2013.7803">proven.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7852" x="669" y="2027.7803">Delete retains the finalizer until GetAlarm or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4678" x="669" y="2041.7803">list fallback confirms DELETED or not found, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="s