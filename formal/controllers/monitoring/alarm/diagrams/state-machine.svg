t-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2951.71" y="673.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="674" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2202.78,49 L2202.78,426.32 L2037.1,502.32 L2202.78,434.32 L2202.78,659 A8,8 0 0 0 2210.78,667 L2547.2614,667 A8,8 0 0 0 2555.2614,659 L2555.2614,51 L2545.2614,41 L2210.78,41 A8,8 0 0 0 2202.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2545.2614,41 L2545.2614,47 A4,4 0 0 0 2549.2614,51 L2555.2614,51 L2545.2614,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2208.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2208.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2208.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2208.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2208.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2208.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2208.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2208.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2208.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="117.4893" x="2208.78" y="182.7803">service: monitoring</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4688" x="2208.78" y="196.7803">slug: alarm</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.0205" x="2208.78" y="210.7803">kind: Alarm</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2208.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2208.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2208.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="2208.78" y="266.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2208.78" y="280.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="2208.78" y="294.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.4814" x="2208.78" y="308.7803">supported drift: body, defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.6299" x="2208.78" y="322.7803">destinations, display_name (+14 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2208.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="2208.78" y="350.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2208.78" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2129" x="2208.78" y="378.7803">list lookup: oci_monitoring_alarms filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2539" x="2208.78" y="392.7803">compartment_id, display_name, lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2208.78" y="406.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2208.78" y="420.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7988" x="2208.78" y="434.7803">The generated runtime scopes ListAlarms by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="321.3916" x="2208.78" y="448.7803">compartmentId plus displayName before create and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4951" x="2208.78" y="462.7803">only reuses a unique active match; duplicate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2676" x="2208.78" y="476.7803">display-name matches fail instead of guessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1641" x="2208.78" y="490.7803">Create and update use read-after-write follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3574" x="2208.78" y="504.7803">and treat ACTIVE as the steady-state success</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3848" x="2208.78" y="518.7803">target; there are no separate provisioning or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2813" x="2208.78" y="532.7803">updating lifecycle enums in the vendored SDK.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2129" x="2208.78" y="546.7803">Mutable drift is limited to the reviewed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1299" x="2208.78" y="560.7803">UpdateAlarm surface, while compartmentId remains</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6338" x="2208.78" y="574.7803">replacement-only until a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4199" x="2208.78" y="588.7803">monitoring/alarm-specific move contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="46.6963" x="2208.78" y="602.7803">proven.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7852" x="2208.78" y="616.7803">Delete retains the finalizer until GetAlarm or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4678" x="2208.78" y="630.7803">list fallback confirms DELETED or not found, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4883" x="2208.78" y="644.7803">no Kubernetes secret side effects are part of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.8135" x="2208.78" y="658.7803">this path.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="101" id="ent0006"><path d="M2890.27,733 L2890.27,741.04 L2430.39,724.28 L2890.27,749.04 L2890.27,769 A8,8 0 0 0 2898.27,777 L3147.5864,777 A8,8 0 0 0 3155.5864,769 L3155.5864,735 L3145.5864,725 L2898.27,725 A8,8 0 0 0 2890.27,733" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3145.5864,725 L3145.5864,731 A4,4 0 0 0 3149.5864,735 L3155.5864,735 L3145.5864,725" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2896.27" y="740.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3164" x="2896.27" y="754.7803">delete observe: GetAlarm or ListAlarms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2896.27" y="768.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.32,674 C48.78,674 102.28,674 159.81,674" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="165.81,674,156.81,670,160.81,674,156.81,678,165.81,674" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5791" x="57" y="669.7803">CreateAlarm</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M430.64,658.05 C521.55,647.01 632.333