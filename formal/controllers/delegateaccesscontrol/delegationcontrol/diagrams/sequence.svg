 y="1933.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="815" y="1947.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="815" y="1961.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="815" y="1975.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="815" y="1989.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="815" y="2003.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="815" y="2017.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="815" y="2031.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="815" y="2045.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="815" y="2059.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="815" y="2073.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4336" x="815" y="2087.7803">service: delegateaccesscontrol</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0957" x="815" y="2101.7803">slug: delegationcontrol</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5303" x="815" y="2115.7803">kind: DelegationControl</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="815" y="2129.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="815" y="2143.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="815" y="2157.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="815" y="2171.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="815" y="2185.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="815" y="2199.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="815" y="2213.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.5088" x="815" y="2227.7803">GetDelegationControl; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.833" x="815" y="2241.7803">GetDelegationControl; delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3779" x="815" y="2255.7803">GetDelegationControl/ListDelegationControls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="815" y="2269.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.2197" x="815" y="2283.7803">supported drift: definedTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7021" x="815" y="2297.7803">delegationSubscriptionIds, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8857" x="815" y="2311.7803">displayName (+7 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="815" y="2325.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9229" x="815" y="2339.7803">compartmentId, resourceType, vaultId, vaultKeyId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="815" y="2353.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="815" y="2367.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.7705" x="815" y="2381.7803">oci_delegate_access_control_delegation_controls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3027" x="815" y="2395.7803">filters compartmentId, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0605" x="815" y="2409.7803">resourceType, resourceId; Adopt only a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6816" x="815" y="2423.7803">exact ListDelegationControls match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.8125" x="815" y="2437.7803">compartmentId plus displayName plus resourceType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3506" x="815" y="2451.7803">plus a reusable resourceId filter, then</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5576" x="815" y="2465.7803">GetDelegationControl confirms the full</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3506" x="815" y="2479.7803">resourceIds set plus any create-only vault</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.0615" x="815" y="2493.7803">inputs in ACTIVE, CREATING, or UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="815" y="2507.7803">duplicate matches fail, and pre-create lookup is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="815" y="2521.7803">skipped when any required identity fields are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.0137" x="815" y="2535.7803">empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="815" y="2549.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="815" y="2563.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2881" x="815" y="2577.7803">Create, update, and delete persist the in-flight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.0889" x="815" y="2591.7803">OCI work request in `status.async.current`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6543" x="815" y="2605.7803">normalize Delegate Access Control</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9229" x="815" y="2619.7803">`OperationStatus*` values into shared async</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.2061" x="815" y="2633.7803">classes, and normalize work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1992" x="815" y="2647.7803">`OperationType*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1914" x="815" y="2661.7803">create/update/delete phases before deriving</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.04" x="815" y="2675.7803">conditions and requeue behavior.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1504" x="815" y="2689.7803">Create prefers the returned `DelegationControl`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0469" x="815" y="2703.7803">body when OCI exposes an identifier and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4268" x="815" y="2717.7803">otherwise recovers the OCID from work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1572" x="815" y="2731.7803">resources before polling `GetDelegationControl`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6396" x="815" y="2745.7803">Update also gates completion on a succeeded work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0605" x="815" y="2759.7803">request plus a readable `GetDelegationControl`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6201" x="815" y="2773.7803">Only `displayName`, `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.5166" x="815" y="2787.7803">`numApprovalsRequired`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="173.5439" x="815" y="2801.7803">`delegationSubscriptionIds`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9229" x="815" y="2815.7803">`isAutoApproveDuringMaintenance`, `resourceIds`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4473" x="815" y="2829.7803">`preApprovedServiceProviderActionNames`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.0547" x="815" y="2843.7803">`notificationTopicId`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.8887" x="815" y="2857.7803">`notificationMessageFormat`, `freeformTags`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3301" x="815" y="2871.7803">`definedTags` reconcile in place.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.8818" x="815" y="2885.7803">`compartmentId`, `resourceType`, `vaultId`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="815" y="2899.7803">`vaultKeyId` remain replacement-only drift, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.792" x="815" y="2913.7803">the published runtime never exercises</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9238" x="815" y="2927.7803">provider-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="815" y="2941.7803">`ChangeDelegationControlCompartment`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1299" x="815" y="2955.7803">Reviewed lifecycle mapping treats `FAILED` and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3027" x="815" y="2969.7803">`NEEDS_ATTENTION` as terminal failure without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5156" x="815" y="2983.7803">requeue, and delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6543" x="815" y="2997.7803">`GetDelegationControl` or fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6748" x="815" y="3011.7803">`ListDelegationControls` confirms the resource</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4336" x="815" y="3025.7803">is deleted or not found.</text><?plantuml-src jLbRSzis5dx7hy1qNv9ToKwQf4cLoSwujjFrn8axjhlxufaG8a496uhW0gHaRQV_VR-32oyIbTZJxkGX8W6SwtU-Sq3RBwgiX14hRfSYqnjLBdWk2YkPRLVc8lsoCBefirDTQCF_agVub_LsP38NJL6_rsNzIQma_uSirh9MgHZVSwF-A_dpbxr5OOpU1EdFykUll--VB7KjVzgp8SzVPp_ixj8caoRicBzyzUBPZpixI7rOV_7YvVDNhthhJdogJIaDV_u3grLTI7uZ_zF8CfLy2WyAkH2r56aghKqXoUZY-Co_LReyzM_OKcMIvrhNSttV4s-ZfDyOvoAjjHcO6zoEIxl-ok_bc_mPbY4CaLMLAElny_qD3v7I2qaher2vl5JbCA0_lXGlvc-mIYAhmL8wprx9v-tINhBUv29FsU_C-SO_D7E9ADVIifuTFCIla6Rm-YTXvRL4k5Erk_JTrStLXnjfrYgL7qKf5j9ynuNbmrU38rUd5uo0mFKQQHxAdkoSGqaOcN4ZhIuQol0il3hEb5WWf_ROFq-xBTEOvYExNaG9X9nQ7ZpjbuSdPPavmB8kM7pwzrwCPboMsDz8leT0M1nSOjr-EZrqTyRRtqyCwRRrKpRSGeU6GPbrm