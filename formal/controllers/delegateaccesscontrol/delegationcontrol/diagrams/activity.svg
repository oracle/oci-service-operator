acing" textLength="284.7852" x="700.257" y="1950.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="700.257" y="1964.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="700.257" y="1978.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="700.257" y="1992.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="700.257" y="2006.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="700.257" y="2020.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="700.257" y="2034.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="700.257" y="2048.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="700.257" y="2062.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="700.257" y="2076.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4336" x="700.257" y="2090.7803">service: delegateaccesscontrol</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0957" x="700.257" y="2104.7803">slug: delegationcontrol</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5303" x="700.257" y="2118.7803">kind: DelegationControl</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="700.257" y="2132.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="700.257" y="2146.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="700.257" y="2160.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="700.257" y="2174.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="700.257" y="2188.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="700.257" y="2202.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="700.257" y="2216.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.5088" x="700.257" y="2230.7803">GetDelegationControl; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.833" x="700.257" y="2244.7803">GetDelegationControl; delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3779" x="700.257" y="2258.7803">GetDelegationControl/ListDelegationControls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="700.257" y="2272.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.2197" x="700.257" y="2286.7803">supported drift: definedTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7021" x="700.257" y="2300.7803">delegationSubscriptionIds, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8857" x="700.257" y="2314.7803">displayName (+7 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="700.257" y="2328.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9229" x="700.257" y="2342.7803">compartmentId, resourceType, vaultId, vaultKeyId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="700.257" y="2356.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="700.257" y="2370.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.7705" x="700.257" y="2384.7803">oci_delegate_access_control_delegation_controls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3027" x="700.257" y="2398.7803">filters compartmentId, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0605" x="700.257" y="2412.7803">resourceType, resourceId; Adopt only a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6816" x="700.257" y="2426.7803">exact ListDelegationControls match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.8125" x="700.257" y="2440.7803">compartmentId plus displayName plus resourceType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3506" x="700.257" y="2454.7803">plus a reusable resourceId filter, then</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5576" x="700.257" y="2468.7803">GetDelegationControl confirms the full</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3506" x="700.257" y="2482.7803">resourceIds set plus any create-only vault</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.0615" x="700.257" y="2496.7803">inputs in ACTIVE, CREATING, or UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="700.257" y="2510.7803">duplicate matches fail, and pre-create lookup is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="700.257" y="2524.7803">skipped when any required identity fields are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.0137" x="700.257" y="2538.7803">empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="700.257" y="2552.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="700.257" y="2566.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2881" x="700.257" y="2580.7803">Create, update, and delete persist the in-flight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.0889" x="700.257" y="2594.7803">OCI work request in `status.async.current`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6543" x="700.257" y="2608.7803">normalize Delegate Access Control</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9229" x="700.257" y="2622.7803">`OperationStatus*` values into shared async</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.2061" x="700.257" y="2636.7803">classes, and normalize work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1992" x="700.257" y="2650.7803">`OperationType*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1914" x="700.257" y="2664.7803">create/update/delete phases before deriving</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.04" x="700.257" y="2678.7803">conditions and requeue behavior.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1504" x="700.257" y="2692.7803">Create prefers the returned `DelegationControl`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0469" x="700.257" y="2706.7803">body when OCI exposes an identifier and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4268" x="700.257" y="2720.7803">otherwise recovers the OCID from work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1572" x="700.257" y="2734.7803">resources before polling `GetDelegationControl`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6396" x="700.257" y="2748.7803">Update also gates completion on a succeeded work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0605" x="700.257" y="2762.7803">request plus a readable `GetDelegationControl`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6201" x="700.257" y="2776.7803">Only `displayName`, `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.5166" x="700.257" y="2790.7803">`numApprovalsRequired`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="173.5439" x="700.257" y="2804.7803">`delegationSubscriptionIds`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9229" x="700.257" y="2818.7803">`isAutoApproveDuringMaintenance`, `resourceIds`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4473" x="700.257" y="2832.7803">`preApprovedServiceProviderActionNames`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.0547" x="700.257" y="2846.7803">`notificationTopicId`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.8887" x="700.257" y="2860.7803">`notificationMessageFormat`, `freeformTags`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3301" x="700.257" y="2874.7803">`definedTags` reconcile in place.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.8818" x="700.257" y="2888.7803">`compartmentId`, `resourceType`, `vaultId`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="700.257" y="2902.7803">`vaultKeyId` remain replacement-only drift, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.792" x="700.257" y="2916.7803">the published runtime never exercises</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9238" x="700.257" y="2930.7803">provider-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="700.257" y="2944.7803">`ChangeDelegationControlCompartment`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1299" x="700.257" y="2958.7803">Reviewed lifecycle mapping treats `FAILED` and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3027" x="700.257" y="2972.7803">`NEEDS_ATTENTION` as terminal failure without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5156" x="700.257" y="2986.7803">requeue, and delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6543" x="700.257" y="3000.7803">`GetDelegationControl` or fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6748" x="700.257" y="3014.7803">`ListDelegationControls` confirms the resource</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4336" x="700.257" y="3028.7803">is deleted or not found.</text><ellipse cx="663.257" cy="2479" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="663.257" cy="2479" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="663.257" x2="663.257" y1="157" y2="177"/><polygon fill="#0F172A" points="659.257,167,663.257,177,667.257,167,663.257,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="814.7228" x2