t_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7168" x="841" y="2115.7803">create-only fields:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="342.4258" x="841" y="2129.7803">model_details.transcription_settings.additional_settings</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0537" x="841" y="2143.7803">list lookup: oci_ai_speech_transcription_jobs</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="841" y="2157.7803">filters compartment_id, display_name, id; Exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.999" x="841" y="2171.7803">displayName or tracked OCID match within the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.7441" x="841" y="2185.7803">requested compartment.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="841" y="2199.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="841" y="2213.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.502" x="841" y="2227.7803">TranscriptionJob keeps the generated controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0537" x="841" y="2241.7803">and service-manager shell, but the handwritten</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="841" y="2255.7803">runtime client overrides lifecycle handling for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6475" x="841" y="2269.7803">FAILED, CANCELING, and CANCELED while still</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8467" x="841" y="2283.7803">using generatedruntime request projection plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7236" x="841" y="2297.7803">read-after-write follow-up.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="357.1436" x="841" y="2311.7803">ACCEPTED and IN_PROGRESS remain the provisioning</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1572" x="841" y="2325.7803">states for both create and update. SUCCEEDED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.668" x="841" y="2339.7803">the only steady success state, FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3232" x="841" y="2353.7803">terminal, and CANCELING is a terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.7783" x="841" y="2367.7803">breadcrumb during normal observe.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="841" y="2381.7803">Delete confirmation is explicit repo-authored</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.668" x="841" y="2395.7803">behavior: CANCELING and CANCELED are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7295" x="841" y="2409.7803">intermediate delete breadcrumbs only, and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="841" y="2423.7803">finalizer is retained until GetTranscriptionJob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1299" x="841" y="2437.7803">confirms the resource is absent rather than</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.5166" x="841" y="2451.7803">stopping at CANCELED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2471" x="841" y="2465.7803">Only displayName, description, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2676" x="841" y="2479.7803">definedTags reconcile in place. compartmentId is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="197.6611" x="841" y="2493.7803">replacement-only, the refreshed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.0674" x="841" y="2507.7803">modelDetails.transcriptionSettings.additionalSettings</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3984" x="841" y="2521.7803">map is accepted on create and projected back</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="841" y="2535.7803">through status reads but remains create-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4746" x="841" y="2549.7803">drift because UpdateTranscriptionJobDetails</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4678" x="841" y="2563.7803">omits it, there are no secret side effects, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.7988" x="841" y="2577.7803">the auxiliary CancelTranscriptionJob API remains</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4814" x="841" y="2591.7803">outside the published controller surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.123" x="841" y="2605.7803">The pinned terraform-provider-oci revision has</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="841" y="2619.7803">no matching speech resource, so the import</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="841" y="2633.7803">catalog for this row is SDK-shaped and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3506" x="841" y="2647.7803">repo-curated; the runtime semantics in this file</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4746" x="841" y="2661.7803">are the authoritative formal input for diagrams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.1094" x="841" y="2675.7803">and generator binding.</text><?plantuml-src hLXRRnit5dxdho2wBosWaUCcQLC5MS2rtTGRRnnOwPi1WvhXI8ofuIp9aU8j-j_tEoJdfalYReiyHERbNB_pdSDn3wggXHLhxbQYC5jLBNafj9FCTJiBaJyihMcgujneO_a_oXp_Yi69GfQYqVuNK_dtOYtvhr9lf5UvE7nchluh-UcBmQQmrcoJz6VbwO_V3szMnikVzsmeon-B7tPF6Lj8cquiNhny_koddHEaFkq_V_xYzENBmNuGdnjRISjFVs1UUItvNFwdaLKkUSQ5ShMK-UhaenMLowsglJBLlyo2hLGXUMcCNvZF0u6klVixurpatjYHWSdHTclNG_czV5K-mpQ48PQg5fK_V7zuu2bI1a7eP6XLocjLZKFuqmlnVF4AkoIo7ctbY-AbFEsszjBpgXHbplvWmJV-hbb8nDLBnmPsy7COOetMqewMVnPEtihSLBdQtVhcPdxpRYxjHkNotw8IIsc_uSBnyTBeoitv5QFKSxD1OiUo9pltK0HM5jnAPtH3sPsbfPD2YILowaxYtrb_96lJF7MRPIkXa1hU7hqTjyStPLK4YB8-M3pxvo16Couhd6yatmKW34uUiVuuNHvxE-FTxsyjgNR-EpO-GfV6CPdrmk6LK-JTNW444F1hOnxmdu0Z2rKLJ6ZFlGKqS0KWa9zhZQI4Z71KJ8KAU-H2MocAH-mgvnqRAoTpS7h6tqg_frI2fZhvdJpb-5ev1o8x9kiQYdQ5kMzBfRsqRdPNvMPD-5b3uBqg9hn0tMlnU5-1sYPGz5rmpCh6YGM2GjuG6XgBIeTsv11SW58uflyS3dkvvuusfkPvsECr