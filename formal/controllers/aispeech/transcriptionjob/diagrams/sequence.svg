lookup: oci_ai_speech_transcription_jobs</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="841" y="2115.7803">filters compartment_id, display_name, id; Exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.999" x="841" y="2129.7803">displayName or tracked OCID match within the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.7441" x="841" y="2143.7803">requested compartment.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="841" y="2157.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="841" y="2171.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.502" x="841" y="2185.7803">TranscriptionJob keeps the generated controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0537" x="841" y="2199.7803">and service-manager shell, but the handwritten</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="841" y="2213.7803">runtime client overrides lifecycle handling for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6475" x="841" y="2227.7803">FAILED, CANCELING, and CANCELED while still</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8467" x="841" y="2241.7803">using generatedruntime request projection plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7236" x="841" y="2255.7803">read-after-write follow-up.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="357.1436" x="841" y="2269.7803">ACCEPTED and IN_PROGRESS remain the provisioning</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1572" x="841" y="2283.7803">states for both create and update. SUCCEEDED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.668" x="841" y="2297.7803">the only steady success state, FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3232" x="841" y="2311.7803">terminal, and CANCELING is a terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.7783" x="841" y="2325.7803">breadcrumb during normal observe.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="841" y="2339.7803">Delete confirmation is explicit repo-authored</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.668" x="841" y="2353.7803">behavior: CANCELING and CANCELED are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7295" x="841" y="2367.7803">intermediate delete breadcrumbs only, and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="841" y="2381.7803">finalizer is retained until GetTranscriptionJob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1299" x="841" y="2395.7803">confirms the resource is absent rather than</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.5166" x="841" y="2409.7803">stopping at CANCELED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2471" x="841" y="2423.7803">Only displayName, description, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2676" x="841" y="2437.7803">definedTags reconcile in place. compartmentId is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2471" x="841" y="2451.7803">replacement-only, there are no secret side</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.9717" x="841" y="2465.7803">effects, and the auxiliary</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5918" x="841" y="2479.7803">CancelTranscriptionJob API remains outside the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0957" x="841" y="2493.7803">published controller surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.123" x="841" y="2507.7803">The pinned terraform-provider-oci revision has</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="841" y="2521.7803">no matching speech resource, so the import</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="841" y="2535.7803">catalog for this row is SDK-shaped and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3506" x="841" y="2549.7803">repo-curated; the runtime semantics in this file</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4746" x="841" y="2563.7803">are the authoritative formal input for diagrams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.1094" x="841" y="2577.7803">and generator binding.</text><?plantuml-src hLXRRnit5dxdho2wBosWaUCcQLC5MS2rtQmttZYmqZS31ZN3aPYCo5cI8qMxsF