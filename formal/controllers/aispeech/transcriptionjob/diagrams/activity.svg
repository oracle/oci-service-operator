" y="1488.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="851.7361" y="1502.2803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="851.7361" y="1516.2803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="851.7361" y="1530.2803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="851.7361" y="1544.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="308.7158" x="834.155" y="1577.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="844.155" y="1598.2803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8926" x="844.155" y="1612.2803">create=read-after-write;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="844.155" y="1626.2803">update=read-after-write; delete=confirm-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="340.5576" x="818.2341" y="1659.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5576" x="828.2341" y="1680.2803">Return success for the SUCCEEDED success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="848.948" y="1713.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="858.948" y="1734.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="858.948" y="1748.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="831.8035" y="1781.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="841.8035" y="1802.2803">Requeue on provisioning, updating, terminating</text><path d="M695.1285,1837.5 L695.1285,2279.5 L675.1285,2283.5 L695.1285,2287.5 L695.1285,2729.5 A0,0 0 0 0 695.1285,2729.5 L1083.3756,2729.5 A0,0 0 0 0 1083.3756,2729.5 L1083.3756,1847.5 L1073.3756,1837.5 L695.1285,1837.5 A0,0 0 0 0 695.1285,1837.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1073.3756,1837.5 L1073.3756,1847.5 L1083.3756,1847.5 L1073.3756,1837.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="701.1285" y="1853.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="701.1285" y="1867.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="701.1285" y="1881.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="701.1285" y="1895.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="701.1285" y="1909.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="701.1285" y="1923.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="701.1285" y="1937.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="701.1285" y="1951.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="701.1285" y="1965.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="701.1285" y="1979.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="701.1285" y="1993.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.165" x="701.1285" y="2007.2803">service: aispeech</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3994" x="701.1285" y="2021.2803">slug: transcriptionjob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="701.1285" y="2035.2803">kind: TranscriptionJob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="701.1285" y="2049.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="701.1285" y="2063.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="701.1285" y="2077.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="701.1285" y="2091.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4404" x="701.1285" y="2105.2803">provider states: create ACCEPTED, IN_PROGRESS;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="367.2471" x="701.1285" y="2119.2803">update ACCEPTED, IN_PROGRESS; delete CANCELING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2412" x="701.1285" y="2133.2803">CANCELED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="701.1285" y="2147.2803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="701.1285" y="2161.2803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="701.1285" y="2175.2803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5371" x="701.1285" y="2189.2803">display_name, freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="701.1285" y="2203.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="701.1285" y="2217.2803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="701.1285" y="2231.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0537" x="701.1285" y="2245.2803">list lookup: oci_ai_speech_transcription_jobs</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="701.1285" y="2259.2803">filters compartment_id, display_name, id; Exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.999" x="701.1285" y="2273.2803">displayName or tracked OCID match within the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.7441" x="701.1285" y="2287.2803">requested compartment.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="701.1285" y="2301.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="701.1285" y="2315.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.502" x="701.1285" y="2329.2803">TranscriptionJob keeps the generated controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0537" x="701.1285" y="2343.2803">and service-manager shell, but the handwritten</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="701.1285" y="2357.2803">runtime client overrides lifecycle handling for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6475" x="701.1285" y="2371.2803">FAILED, CANCELING, and CANCELED while still</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8467" x="701.1285" y="2385.2803">using generatedruntime request projection plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7236" x="701.1285" y="2399.2803">read-after-write follow-up.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="357.1436" x="701.1285" y="2413.2803">ACCEPTED and IN_PROGRESS remain the provisioning</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1572" x="701.1285" y="2427.2803">states for both create and update. SUCCEEDED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.668" x="701.1285" y="2441.2803">the only steady success state, FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3232" x="701.1285" y="2455.2803">terminal, and CANCELING is a terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.7783" x="701.1285" y="2469.2803">breadcrumb during normal observe.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="701.1285" y="2483.2803">Delete confirmation is explicit repo-authored</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.668" x="701.1285" y="2497.2803">behavior: CANCELING and CANCELED are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7295" x="701.1285" y="2511.2803">intermediate delete breadcrumbs only, and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="701.1285" y="2525.2803">finalizer is retained until GetTranscriptionJob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1299" x="701.1285" y="2539.2803">confirms the resource is absent rather than</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.5166" x="701.1285" y="2553.2803">stopping at CANCELED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2471" x="701.1285" y="2567.2803">Only displayName, description, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2676" x="701.1285" y="2581.2803">definedTags reconcile in place. compartmentId is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2471" x="701.1285" y="2595.2803">replacement-only, there are no secret side</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.9717" x="701.1285" y="2609.2803">effects, and the auxiliary</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5918" x="701.1285" y="2623.2803">CancelTranscriptionJob API remains outside the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0957" x="701.1285" y="2637.2803">published controller surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.123" x="701.1285" y="2651.2803">The pinned terraform-provider-oci revision has</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="701.1285" y="2665.2803">no matching speech resource, so the import</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="701.1285" y="2679.2803">catalog for this row is SDK-shaped and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3506" x="701.1285" y="2693.2803">repo-curated; the runtime semantics in this file</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4746" x="701.1285" y="2707.2803">are the authoritative formal input for diagrams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.1094" x="701.1285" y="2721.2803">and generator binding.</text><ellipse cx="664.1285" cy="2283.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="664.1285" cy="2283.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="664.1285" x2="664.1285" y1="157" y2="177"/><polygon fill="#0F172A" points="660.1285,167,664.1285,177,668.1285,167,664.1285,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.5944" x2="815.5944" y1="341" y2="361"/><polygon fill="#0F172A" points="811.5944,351,815.5944,361,819.5944,351,815.5944,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.5944" x2="815.5944" y1="423" y2="443"/><polygon fill="#0F172A" points="811.5944,433,815.5944,443,819.5944,433,815.5944,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="522.6627" x2="512.6627" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="512.6627" x2="512.6627" y1="257" y2="279"/><polygon fill="#0F172A" points="508.6627,269,512.6627,279,516.6627,269,512.6627,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="805.5944" x2="815.5944" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.5944" x2="815.5944" y1="257" y2="279"/><polygon fill="#0F172A" points="811.5944,269,815.5944,279,819.5944,269,815.5944,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="512.6627" x2="512.6627" y1="327" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="512.6627" x2="652.1285" y1="509" y2="509"/><polygon fill="#0F172A" points="642.1285,505,652.1285,509,642.1285,513,646.1285,509" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.5944" x2="815.5944" y1="491" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.5944" x2="676.1285" y1="509" y2="509"/><polygon fill="#0F172A" points="686.1