ng" textLength="243.5918" x="155.396" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="307.1641" x="123.6099" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1641" x="133.6099" y="755.7803">Delete path uses DeleteFunction with required</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7852" x="133.6099" y="769.7803">via GetFunction or ListFunction to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="133.6099" y="783.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="137.627" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="147.627" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="147.627" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="120.4824" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="130.4824" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M308.1919,929 L308.1919,1105 L288.1919,1109 L308.1919,1113 L308.1919,1289 A0,0 0 0 0 308.1919,1289 L648.2319,1289 A0,0 0 0 0 648.2319,1289 L648.2319,939 L638.2319,929 L308.1919,929 A0,0 0 0 0 308.1919,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M638.2319,929 L638.2319,939 L648.2319,939 L638.2319,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" tex