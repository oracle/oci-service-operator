-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="362.8364" y="1266.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="362.8364" y="1280.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="362.8364" y="1294.7803">promotion.</text><ellipse cx="325.8364" cy="1123" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="325.8364" cy="1123" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8364" x2="325.8364" y1="65" y2="85"/><polygon fill="#0F172A" points="321.8364,75,325.8364,85,329.8364,75,325.8364,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8364" x2="325.8364" y1="133" y2="153"/><polygon fill="#0F172A" points="321.8364,143,325.8364,153,329.8364,143,325.8364,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8364" x2="325.8364" y1="201" y2="221"/><polygon fill="#0F172A" points="321.8364,211,325.8364,221,329.8364,211,325.8364,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8364" x2="325.8364" y1="269" y2="289"/><polygon fill="#0F172A" points="321.8364,279,325.8364,289,329.8364,279,325.8364,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="164.1992" x2="164.1992" y1="439" y2="459"/><polygon fill="#0F172A" points="160.1992,449,164.1992,459,168.1992,449,164.1992,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="260.147" x2="164.1992" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="164.1992" x2="164.1992" y1="383" y2="405"/><polygon fill="#0F172A" points="160.1992,395,164.1992,405