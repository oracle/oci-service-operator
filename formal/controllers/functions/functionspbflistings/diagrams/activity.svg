4" lengthAdjust="spacing" textLength="189.8477" x="362.8296" y="1098.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1582" x="362.8296" y="1112.7803">service: functions</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.751" x="362.8296" y="1126.7803">slug: functionspbflistings</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6406" x="362.8296" y="1140.7803">kind: FunctionsPbfListings</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="362.8296" y="1154.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="362.8296" y="1168.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="362.8296" y="1182.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="362.8296" y="1196.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="362.8296" y="1210.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="362.8296" y="1224.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="362.8296" y="1238.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="362.8296" y="1252.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="362.8296" y="1266.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="362.8296" y="1280.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="362.8296" y="1294.7803">promotion.</text><ellipse cx="325.8296" cy="1123" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="325.8296" cy="1123" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8296" x2="325.8296" y1="65" y2="85"/><polygon fill="#0F172A" points="321.8296,75,325.8296,85,329.8296,75,325.8296,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8296" x2="325.8296" y1="133" y2="153"/><polygon fill="#0F172A" points="321.8296,143,325.8296,153,329.8296,143,325.8296,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8296" x2="325.8296" y1="201" y2="221"/><polygon fill="#0F172A" points="321.8296,211,325.8296,221,329.8296,211,325.8296,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="325.8296" x2="325.8296" y1="269" y2="289"/><polygon fill="#0F172A" points="321.8296,279,325.8296,289,329.8296,279,325.8296,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="164.1958" x2="164.1958" y1="439" y2="459"/><polygon fill="#0F172A" points="160.1958,449,164.1958,459,168.1958,449,164.1958,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="260.1401" x2="164.1958" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="164.1958" x2="164.1958" y1="383" y2="405"/><polygon fill="#0F172A" points="160.1958,395,164.1958,40