 x="834.98" y="1517.7803">matching field-driven path executes</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="308.7158" x="817.3989" y="1551"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="827.3989" y="1571.7803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8926" x="827.3989" y="1585.7803">create=read-after-write;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="827.3989" y="1599.7803">update=read-after-write; delete=confirm-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="820.147" y="1633"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="830.147" y="1653.7803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="832.1919" y="1687"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="842.1919" y="1707.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="842.1919" y="1721.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="815.0474" y="1755"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="825.0474" y="1775.7803">Requeue on provisioning, updating, terminating</text><path d="M686.7505,1811 L686.7505,2141 L666.7505,2145 L686.7505,2149 L686.7505,2479 A0,0 0 0 0 686.7505,2479 L1025.1636,2479 A0,0 0 0 0 1025.1636,2479 L1025.1636,1821 L1015.1636,1811 L686.7505,1811 A0,0 0 0 0 686.7505,1811" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1015.1636,1811 L1015.1636,1821 L1025.1636,1821 L1015.1636,1811" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="692.7505" y="1826.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="692.7505" y="1840.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="692.7505" y="1854.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="692.7505" y="1868.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="692.7505" y="1882.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="692.7505" y="1896.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="692.7505" y="1910.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="692.7505" y="1924.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="692.7505" y="1938.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="692.7505" y="1952.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="692.7505" y="1966.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.8135" x="692.7505" y="1980.7803">service: aivision</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="692.7505" y="1994.7803">slug: project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.0342" x="692.7505" y="2008.7803">kind: Project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="692.7505" y="2022.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="692.7505" y="2036.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="692.7505" y="2050.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="692.7505" y="2064.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="692.7505" y="2078.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="692.7505" y="2092.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="692.7505" y="2106.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="692.7505" y="2120.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="692.7505" y="2134.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5371" x="692.7505" y="2148.7803">display_name, freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="692.7505" y="2162.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="692.7505" y="2176.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="692.7505" y="2190.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3369" x="692.7505" y="2204.7803">list lookup: oci_ai_vision_projects filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3506" x="692.7505" y="2218.7803">compartment_id, display_name, id, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="692.7505" y="2232.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="692.7505" y="2246.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="692.7505" y="2260.7803">Generated runtime uses read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.585" x="692.7505" y="2274.7803">follow-up for create and update plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.0957" x="692.7505" y="2288.7803">confirm-delete for delete; `CREATING` maps to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.4131" x="692.7505" y="2302.7803">provisioning, `ACTIVE` to success, `UPDATING` to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3848" x="692.7505" y="2316.7803">updating, and `DELETING` keeps reconcile in the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3506" x="692.7505" y="2330.7803">terminating bucket until `DELETED` or NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.668" x="692.7505" y="2344.7803">Pre-create lookup queries `ListProjects` with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2539" x="692.7505" y="2358.7803">`compartmentId`, `displayName`, and an optional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2471" x="692.7505" y="2372.7803">tracked `id`; delete fallback can re-resolve the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.123" x="692.7505" y="2386.7803">tracked project through `ListProjects` when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.1855" x="692.7505" y="2400.7803">`GetProject` returns NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6201" x="692.7505" y="2414.7803">Only `displayName`, `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="692.7505" y="2428.7803">`freeformTags`, and `definedTags` reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9023" x="692.7505" y="2442.7803">place. `compartmentId` remains replacement-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0195" x="692.7505" y="2456.7803">drift and the runtime has no secret side</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="45.1309" x="692.7505" y="2470.7803">effects.</text><ellipse cx="655.7505" cy="2145" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="655.7505" cy="2145" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="655.7505" x2="655.7505" y1="157" y2="177"/><polygon fill="#0F172A" points="651.7505,167,655.7505,177,659.7505,167,655.7505,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="819.1172" x2="819.1172" y1="341" y2="361"/><polygon fill="#0F172A" points="815.1172,351,819.1172,361,823.1172,351,819.1172,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="819.1172" x2="819.1172" y1="409" y2="429"/><polygon fill="#0F172A" points="815.1172,419,819.1172,429,823.1172,419,819.1172,423" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="514.2847" x2="492.3838" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="492.3838" x2="492.3838" y1="257" y2="279"/><polygon fill="#0F172A" points="488.3838,269,492.3838,279,496.3838,269,492.3838,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="797.2163" x2="819.1172" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="819.1172" x2="819.1172" y1="257" y2="279"/><polygon fill="#0F172A" points="815.1172,269,819.1172,279,823.1172,269,819.1172,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="492.3838" x2="492.3838" y1="313" y2="495"/><line style="stroke:#0F172A;stroke-width:1;" x