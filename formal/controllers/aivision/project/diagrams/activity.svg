I state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="866.7324" y="1079.2803">field surface</text><polygon fill="#E2E8F0" points="894.4248,1112.5,1115.2803,1112.5,1127.2803,1124.5,1115.2803,1136.5,894.4248,1136.5,882.4248,1124.5,894.4248,1112.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="894.4248" y="1128.2803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="860.6387" y="1121.2803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1127.2803" y="1121.2803">no</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="332.8262" x="695.4814" y="1146.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8262" x="705.4814" y="1167.2803">Apply ChangeProjectCompartment, UpdateProject</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3369" x="705.4814" y="1181.2803">only for mutable fields compartment_id,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.3398" x="705.4814" y="1195.2803">defined_tags, description, display_name (+1</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="705.4814" y="1209.2803">more)</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1048.3076" y="1146.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1058.3076" y="1167.2803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="1004.8525,1228.5,101