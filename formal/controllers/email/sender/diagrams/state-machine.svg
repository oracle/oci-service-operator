<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="716px" preserveAspectRatio="none" style="width:3565px;height:716px;background:#FCFCFD;" version="1.1" viewBox="0 0 3565 716" width="3565px" zoomAndPan="magnify"><title>State Machine - email/Sender</title><defs/><g><rect fill="#FCFCFD" height="716" style="stroke:none;stroke-width:1;" width="3565" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="193.7305" x="1678.8677" y="20.7803">State Machine - email/Sender</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="175" y="573"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="175" x2="439.3643" y1="597" y2="597"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="280.7271" y="588.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="180" y="612.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="180" y="626.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1236.36" y="416"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1241.36" y="439.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2006.32" y="416"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2011.32" y="439.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke: