s="message" data-entity-1="part3" data-entity-2="part2" id="msg20"><polygon fill="#0F172A" points="242.2573,1381,232.2573,1385,242.2573,1389,238.2573,1385" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="236.2573" x2="480.7319" y1="1385" y2="1385"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4746" x="248.2573" y="1379.7803">requeue on provisioning, terminating</text></g><path d="M754,1406 L754,2016 A8,8 0 0 0 762,2024 L1076,2024 A8,8 0 0 0 1084,2016 L1084,1408 L1074,1398 L762,1398 A8,8 0 0 0 754,1406" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1074,1398 L1074,1404 A4,4 0 0 0 1078,1408 L1084,1408 L1074,1398" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="760" y="1413.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="760" y="1427.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="760" y="1441.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="760" y="1455.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="760" y="1469.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="760" y="1483.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="760" y="1497.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="760" y="1511.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="760" y="1525.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="760" y="1539.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="760" y="1553.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="760" y="1567.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="760" y="1581.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="760" y="1595.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5791" x="760" y="1609.7803">service: email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2686" x="760" y="1623.7803">slug: sender</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.6064" x="760" y="1637.7803">kind: Sender</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="760" y="1651.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="760" y="1665.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="760" y="1679.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="760" y="1693.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="760" y="1707.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="760" y="1721.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.6055" x="760" y="1735.7803">supported drift: defined_tags, freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="760" y="1749.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2061" x="760" y="1763.7803">compartment_id, email_address</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="760" y="1777.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.1025" x="760" y="1791.7803">list lookup: oci_email_senders filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.916" x="760" y="1805.7803">compartment_id, email_address, lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="760" y="1819.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="760" y="1833.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0674" x="760" y="1847.7803">The generated runtime reuses an existing sender</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6885" x="760" y="1861.7803">by exact compartmentId plus emailAddress match</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3857" x="760" y="1875.7803">before create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5234" x="760" y="1889.7803">Ready state maps to OCI ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9365" x="760" y="1903.7803">In-place updates are limited to freeformTags and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1572" x="760" y="1917.7803">definedTags; compartmentId and emailAddress</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3994" x="760" y="1931.7803">require replacement.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1641" x="760" y="1945.7803">Create and update use read-after-write follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9502" x="760" y="1959.7803">through GetSender before the controller reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3789" x="760" y="1973.7803">steady state.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0332" x="760" y="1987.7803">Delete retains the finalizer until GetSender</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5576" x="760" y="2001.7803">confirms DELETED or OCI no longer returns the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="46.6963" x="760" y="2015.7803">sender.</text><?plantuml-src hLVRRXit47tdLn3fIm9evJYsSraZ1HpRJOsuCM2xVJ9WKBjSYJMNt99SAMhHV-yCBtkHBKT52p_88eTpFNDcP1-4QfXXDRKBLkgLK7DQCMaviTtDZ1KFSwDRLPvggGtzeIhWhnn8bBnYhNG_QUM-ifhJdxbSSYSAzhJCZVYJq_t3mIKpHg-YzjVL_hitmvTAE_xfaGzLzQvykocbJSbDb9WT7Xsy_h0XWURZ_S71uVxHqU3Ugo-qKTpG_RV42ISvlU5_j5mLd6QKrqp8lHkkm0PPY9BJIcitqzy6EcmI_ujGoWgdpSYd65kwsWoAl-7lgzTm3SeWVQ9XoZtzVYYmYvP1t9qEAIf-ATGuQnyEsS7iFToYocPqLSpA8xxVNJsgoFkALGNvc_ZOw9TsnY6LZbioy8EUWYD6Imaf71v_OfPVyqAhGcnUlRYwkVfomyrI5FmNfjYScnUKMJe-6ZsvEhqWM6sgbr3BiUx9nZl0lU4bDTngsJgXLHwFzah1vb1JknU-Pxr8bieyjSjvqb1o2T5kVHsknoy1IXwLf4yMpNuSv2YdN85yYpX4s86RCGxI2-6JSOmvxVv_QT2WTQ_8M0GVZJEHzyeX5YimfWXsNt1wgVK3V31mUYPKIPXqr1c00GX2mVctHa81VFOfT8U21bfJ9WrdvHfkXNMMZ4sY4o2Tqy_SHLCSkAVJscaHbjR2Mc2dRHekGNrGOLzMGZhup6cXQuH53LhkHJcvKxw5xrbPGYtjn7T0iIualxUEEVxAXsHuQzaCae1nOCrR0_qC7a2beEC1yDjyE8LG7O-1IAqRMlWJsi0HCklfzVd9xSNNppka0QpuL3pjpR_EwXDEFu6Q1h862aCpBA40er8AHJ5DhVNgC5K1qpH2Z9SHA6V-U9jNuJOwjaK6NAg4gPE1fM1zC82rEpKeTyXqb4oPFZk_FDyfquZSeR8K6e22AOW5hYkXc8IHXTq7fzQ3OIOrGdINh1hk6EGkUkYHvfi8piqwL3dU8LxX7s0OgcSMDEzg8BZLEyegQ837MWEi4hImkC4RYCSxWq3RpM0WfTL2TCY4pb8MC7Ad4iedVHMyFIcMANnK00HZmMKkouojW2BlL6b4vIXVCjaoxsw4apzUGCea4a1Fx6DF9yZwDstJQ0DGf6rJeYNRceeLFCVz0sPTUU_Ot4v8PJYljAdzLtBDV-U5epCyuhHkqSSSUXrQBLDy5RoqP8DEw8XDIAJ7RUH3dkUUVXRenWrC0_wm6O1P7U8wf0ZgLK9b2xShFeRXORbyY0aGQD1sUSChv9llMugjTD8qSar_zUbEFQNW18mbPNSgP71S13ek0jzEhAPLTC4bq1DTG9RjdGh4-j5LYHAdWNoluzVZEnK0C1G9FWv4GeCCHG8v9P5TUJFGuiU8QXmqNIj-3DsVjS2XCekyrgq3ti3cODxO05Ap0IaqHY-5XRe152OKO5Q36TSrXH7pXQEwea-lE74Z-M_xpNUrFBNdt3Xe12YthgbRSFfevUhNPe03WPAV-Gt3HmabOt7gDMpkuzLgWWHA0WWoRRBOxAMm3NF5OaeksHfIEJ2Ms3SPMYsuwWcJG9Lmog7cZZLzgQAvbJOFMPnpf87AUDyqSX1uqOyBXiqm9SmK2-xM3OSVJ-0FpXluLS6mlsoeJLR7uXHTgO4DuLEljkG88zw8mjALS0igwjYxAoQS3Qdfj6Omg9YauBCemBDeFW_aHQnivu3VC8pXLqoPfvsl2o6dy-Hyjkby0FvUbySyCNj9zyZpo8-mpfy1jRz1Fl4CYPGQrgaqO8uJoIkj-75AJZTqUaxpN9O_opxc_nW12P2U_lo3tFj696vLqW-8dEf2t8