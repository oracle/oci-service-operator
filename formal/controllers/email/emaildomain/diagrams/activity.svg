xt fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4541" x="693.5381" y="2094.7803">list lookup: oci_email_email_domains filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5645" x="693.5381" y="2108.7803">compartment_id, id, lifecycle_state, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="693.5381" y="2122.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="693.5381" y="2136.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3711" x="693.5381" y="2150.7803">The generated runtime binds through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="693.5381" y="2164.7803">ListEmailDomains on compartmentId plus name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.709" x="693.5381" y="2178.7803">before create when no OCI identifier is already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.1445" x="693.5381" y="2192.7803">recorded.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.7988" x="693.5381" y="2206.7803">Requeue continues while OCI reports CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4131" x="693.5381" y="2220.7803">UPDATING, or DELETING, and ACTIVE is the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7783" x="693.5381" y="2234.7803">steady-state success target for create or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="46.71" 