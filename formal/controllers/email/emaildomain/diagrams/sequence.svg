etica" font-size="14" lengthAdjust="spacing" textLength="214.8262" x="286.3608" y="1465.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="286.3608" y="1479.7803">terminating</text></g><path d="M780,1506 L780,2116 A8,8 0 0 0 788,2124 L1112,2124 A8,8 0 0 0 1120,2116 L1120,1508 L1110,1498 L788,1498 A8,8 0 0 0 780,1506" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1110,1498 L1110,1504 A4,4 0 0 0 1114,1508 L1120,1508 L1110,1498" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="786" y="1513.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="786" y="1527.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="786" y="1541.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="786" y="1555.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="786" y="1569.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="786" y="1583.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="786" y="1597.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="786" y="1611.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="786" y="1625.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="786" y="1639.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="786" y="1653.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="786" y="1667.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="786" y="1681.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="786" y="1695.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5791" x="786" y="1709.7803">service: email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.834" x="786" y="1723.7803">slug: emaildomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.71" x="786" y="1737.7803">kind: EmailDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="786" y="1751.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="786" y="1765.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="786" y="1779.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="786" y="1793.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="786" y="1807.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="786" y="1821.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="786" y="1835.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3721" x="786" y="1849.7803">freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="786" y="1863.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1787" x="786" y="1877.7803">compartment_id, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="786" y="1891.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4541" x="786" y="1905.7803">list lookup: oci_email_email_domains filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5645" x="786" y="1919.7803">compartment_id, id, lifecycle_state, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="786" y="1933.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="786" y="1947.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3711" x="786" y="1961.7803">The generated runtime binds through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="786" y="1975.7803">ListEmailDomains on compartmentId plus name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.709" x="786" y="1989.7803">before create when no OCI identifier is already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.1445" x="786" y="2003.7803">recorded.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.7988" x="786" y="2017.7803">Requeue continues while OCI reports CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4131" x="786" y="2031.7803">UPDATING, or DELETING, and ACTIVE is the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7783" x="786" y="2045.7803">steady-state success target for create or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="46.71" x="786" y="2059.7803">update.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4336" x="786" y="2073.7803">Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.7578" x="786" y="2087.7803">GetEmailDomain or list fallback confirms DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.4053" x="786" y="2101.7803">or not found, and no Kubernetes secret side</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6475" x="786" y="2115.7803">effects are part of this path.</text><?plantuml-src fLZRRXit47tdLn3fIm98TXpRkIX8WSHsKoDkKjX9dmmOrEwin7f5Rack5BV