9.1299" x="843.7722" y="1494.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="843.7722" y="1508.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="169.4336" x="888.6204" y="1541.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4336" x="898.6204" y="1562.2803">Requeue on terminating</text><path d="M687.5406,1597.5 L687.5406,1948.5 L667.5406,1952.5 L687.5406,1956.5 L687.5406,2307.5 A0,0 0 0 0 687.5406,2307.5 L1019.0563,2307.5 A0,0 0 0 0 1019.0563,2307.5 L1019.0563,1607.5 L1009.0563,1597.5 L687.5406,1597.5 A0,0 0 0 0 687.5406,1597.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1009.0563,1597.5 L1009.0563,1607.5 L1019.0563,1607.5 L1009.0563,1597.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="693.5406" y="1613.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="693.5406" y="1627.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="693.5406" y="1641.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="693.5406" y="1655.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="693.5406" y="1669.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="693.5406" y="1683.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="693.5406" y="1697.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="693.5406" y="1711.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="693.5406" y="1725.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="693.5406" y="1739.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="693.5406" y="1753.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="693.5406" y="1767.2803">service: usageapi</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9443" x="693.5406" y="1781.2803">slug: customtable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7168" x="693.5406" y="1795.2803">kind: CustomTable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="693.5406" y="1809.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="693.5406" y="1823.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="693.5406" y="1837.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="693.5406" y="1851.2803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="693.5406" y="1865.2803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="693.5406" y="1879.2803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6885" x="693.5406" y="1893.2803">supported drift: saved_custom_table</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="693.5406" y="1907.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5576" x="693.5406" y="1921.2803">compartment_id, saved_report_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="693.5406" y="1935.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2539" x="693.5406" y="1949.2803">list lookup: oci_usage_custom_tables filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5781" x="693.5406" y="1963.2803">saved_custom_table.display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.916" x="693.5406" y="1977.2803">saved_custom_table.row_group_by,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4883" x="693.5406" y="1991.2803">saved_custom_table.column_group_by,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.8916" x="693.5406" y="2005.2803">saved_custom_table.group_by_tag (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="693.5406" y="2019.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="693.5406" y="2033.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3848" x="693.5406" y="2047.2803">The generated runtime reuses an existing custom</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0469" x="693.5406" y="2061.2803">table by listing on the required compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8604" x="693.5406" y="2075.2803">and savedReportId request scope, then matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3916" x="693.5406" y="2089.2803">the returned savedCustomTable payload on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.5156" x="693.5406" y="2103.2803">displayName and any populated row, column, tag,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7441" x="693.5406" y="2117.2803">depth, or version fields.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1572" x="693.5406" y="2131.2803">The SDK surface does not expose lifecycle states</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1846" x="693.5406" y="2145.2803">on CustomTable bodies, so create and update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="693.5406" y="2159.2803">settle through read-after-write GetCustomTable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4678" x="693.5406" y="2173.2803">confirmation instead of lifecycle polling; a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.668" x="693.5406" y="2187.2803">service-local wrapper converts that confirmed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2129" x="693.5406" y="2201.2803">reread into settled Active status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.5508" x="693.5406" y="2215.2803">In-place updates are limited to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0127" x="693.5406" y="2229.2803">savedCustomTable; compartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8262" x="693.5406" y="2243.2803">savedReportId require replacement and are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6475" x="693.5406" y="2257.2803">rejected before OCI mutation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4336" x="693.5406" y="2271.2803">Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="693.5406" y="2285.2803">GetCustomTable confirms the custom table no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.4824" x="693.5406" y="2299.2803">longer exists.</text><ellipse cx="656.5406" cy="1952.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="656.5406" cy="1952.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="656.5406" x2="656.5406" y1="157" y2="177"/><polygon fill="#0F172A" points="652.5406,167,656.5406,177,660.5406