t-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="711.9312" y="1142.7803">Apply UpdateCustomTable only for</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6816" x="711.9312" y="1156.7803">mutable fields saved_custom_table</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg15"><polygon fill="#0F172A" points="964.4194,1235,974.4194,1239,964.4194,1243,968.4194,1239" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="704.9312" x2="970.4194" y1="1239" y2="1239"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="711.9312" y="1191.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="711.9312" y="1205.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="711.9312" y="1219.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="711.9312" y="1233.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg16"><polygon fill="#0F172A" points="448.353,1284,438.353,1288,448.353,1292,444.353,1288" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="442.353" x2="703.9312" y1="1288" y2="1288"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="454.353" y="1268.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="454.353" y="1282.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg17"><polygon fill="#0F172A" points="280.3677,1319,270.3677,1323,280.3677,1327,276.3677,1323" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="274.3677" x2="436.353" y1="1323" y2="1323"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="286.3677" y="1317.7803">requeue on terminating</text></g><path d="M709,1344 L709,2080 A8,8 0 0 0 717,2088 L1032,2088 A8,8 0 0 0 1040,2080 L1040,1346 L1030,1336 L717,1336 A8,8 0 0 0 709,1344" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1030,1336 L1030,1342 A4,4 0 0 0 1034,1346 L1040,1346 L1030,1336" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="715" y="1351.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="715" y="1365.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="715" y="1379.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="715" y="1393.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="715" y="1407.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="715" y="1421.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="715" y="1435.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="715" y="1449.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="715" y="1463.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="715" y="1477.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="715" y="1491.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="715" y="1505.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="715" y="1519.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="715" y="1533.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="715" y="1547.7803">service: usageapi</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9443" x="715" y="1561.7803">slug: customtable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7168" x="715" y="1575.7803">kind: CustomTable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="715" y="1589.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="715" y="1603.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="715" y="1617.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="715" y="1631.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="715" y="1645.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="715" y="1659.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6885" x="715" y="1673.7803">supported drift: saved_custom_table</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="715" y="1687.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5576" x="715" y="1701.7803">compartment_id, saved_report_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="715" y="1715.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2539" x="715" y="1729.7803">list lookup: oci_usage_custom_tables filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5781" x="715" y="1743.7803">saved_custom_table.display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.916" x="715" y="1757.7803">saved_custom_table.row_group_by,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4883" x="715" y="1771.7803">saved_custom_table.column_group_by,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.8916" x="715" y="1785.7803">saved_custom_table.group_by_tag (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="715" y="1799.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="715" y="1813.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3848" x="715" y="1827.7803">The generated runtime reuses an existing custom</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0469" x="715" y="1841.7803">table by listing on the required compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8604" x="715" y="1855.7803">and savedReportId request scope, then matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3916" x="715" y="1869.7803">the returned savedCustomTable payload on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.5156" x="715" y="1883.7803">displayName and any populated row, column, tag,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7441" x="715" y="1897.7803">depth, or version fields.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1572" x="715" y="1911.7803">The SDK surface does not expose lifecycle states</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1846" x="715" y="1925.7803">on CustomTable bodies, so create and update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="715" y="1939.7803">settle through read-after-write GetCustomTable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4678" x="715" y="1953.7803">confirmation instead of lifecycle polling; a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.668" x="715" y="1967.7803">service-local wrapper converts that confirmed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2129" x="715" y="1981.7803">reread into settled Active status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.5508" x="715" y="1995.7803">In-place updates are limited to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0127" x="715" y="2009.7803">savedCustomTable; compartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8262" x="715" y="2023.7803">savedReportId require replacement and are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6475" x="715" y="2037.7803">rejected before OCI mutation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4336" x="715" y="2051.7803">Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="715" y="2065.7803">GetCustomTable confirms the custom table no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.4824" x="715" y="2079.7803">longer exists.</text><?plantuml-src pLZRRjp84NtlhoXiNcnaA5c-x7h7S81T6KaCEp5WRTu423raSQRZdcwckpcpao3_djCNSiZHA1AIF0I68P5TNTTJfuhotvJff9DRyXlPsBqoQsgbzYpyUBAIzRUrixrfhgssZdxJrlZNJ2GQRcMlm--j2N-MMwO_ijvnKBKyBtEZ_ivqzNfoA9sp-wBzHNlrmylfJMC3_tpFXxRzeVd-LCgwXbsHMBr-y-h5ZoSIqNmvV_NgzTMRDvFpfBwsph2Zg-z5K44ptV3VUZOrKqMzbskMdRgyxdsmsr_aIhFOg8QfjJQixAyJNNwuzWz19EjWtSot4kDmT1eSl-ItxGi