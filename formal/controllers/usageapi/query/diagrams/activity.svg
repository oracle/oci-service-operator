text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="839.4678" y="1522.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="169.4336" x="884.3159" y="1555.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4336" x="894.3159" y="1576.2803">Requeue on terminating</text><path d="M685.3884,1611.5 L685.3884,1955.5 L665.3884,1959.5 L685.3884,1963.5 L685.3884,2307.5 A0,0 0 0 0 685.3884,2307.5 L1014.5457,2307.5 A0,0 0 0 0 1014.5457,2307.5 L1014.5457,1621.5 L1004.5457,1611.5 L685.3884,1611.5 A0,0 0 0 0 685.3884,1611.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1004.5457,1611.5 L1004.5457,1621.5 L1014.5457,1621.5 L1004.5457,1611.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="691.3884" y="1627.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="691.3884" y="1641.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="691.3884" y="1655.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="691.3884" y="1669.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="691.3884" y="1683.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="691.3884" y="1697.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="691.3884" y="1711.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="691.3884" y="1725.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="691.3884" y="1739.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="691.3884" y="1753.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="691.3884" y="1767.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="691.3884" y="1781.2803">service: usageapi</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4824" x="691.3884" y="1795.2803">slug: query</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5859" x="691.3884" y="1809.2803">kind: Query</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="691.3884" y="1823.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="691.3884" y="1837.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="691.3884" y="1851.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="691.3884" y="1865.2803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="691.3884" y="1879.2803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="691.3884" y="1893.2803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.123" x="691.3884" y="1907.2803">supported drift: query_definition</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="691.3884" y="1921.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="691.3884" y="1935.2803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="691.3884" y="1949.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="691.3884" y="1963.2803">list lookup: oci_usage_queries filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.0127" x="691.3884" y="1977.2803">query_definition.display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.7578" x="691.3884" y="1991.2803">query_definition.version,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.502" x="691.3884" y="2005.2803">query_definition.report_query.tenant_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.6709" x="691.3884" y="2019.2803">query_definition.report_query.granularity (+16</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="691.3884" y="2033.2803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="691.3884" y="2047.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="691.3884" y="2061.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2813" x="691.3884" y="2075.2803">The generated runtime reuses an existing query</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3848" x="691.3884" y="2089.2803">by listing on the required compartmentId request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.4678" x="691.3884" y="2103.2803">scope, then matching the returned</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="691.3884" y="2117.2803">queryDefinition payload on displayName, version,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5088" x="691.3884" y="2131.2803">report inputs, and any populated costAnalysisUI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5723" x="691.3884" y="2145.2803">fields.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1572" x="691.3884" y="2159.2803">The SDK surface does not expose lifecycle states</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.4053" x="691.3884" y="2173.2803">on Query bodies, so create and update settle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0127" x="691.3884" y="2187.2803">through read-after-write GetQuery confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="691.3884" y="2201.2803">instead of lifecycle polling; a service-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7988" x="691.3884" y="2215.2803">wrapper converts that confirmed reread into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3926" x="691.3884" y="2229.2803">settled Active status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="691.3884" y="2243.2803">In-place updates are limited to queryDefinition;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0195" x="691.3884" y="2257.2803">compartmentId requires replacement and is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6475" x="691.3884" y="2271.2803">rejected before OCI mutation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="691.3884" y="2285.2803">Delete retains the finalizer until GetQuery</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.9922" x="691.3884" y="2299.2803">confirms the query no longer exists.</text><ellipse cx="654.3884" cy="1959.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="654.3884" cy="1959.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="654.3884" x2="654.3884" y1="157" y2="177"/><polygon fill="#0F172A" points="650.3884,167,654.3884,177,658.3884,167,654.3884,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.031" x2="815.031" y1="397" y2="417"/><polygon fill="#0F172A" points="811.031,407,815.031,417,819.031,407,815.031,411" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1=