eight="44" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="421.7983" x="326.1982" y="1054"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="341.1982" y="1065.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="276.1309" x="407.9639" y="1066.7803">[force-new or conflicting drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg13"><polygon fill="#0F172A" points="403.2222,1086,393.2222,1090,403.2222,1094,399.2222,1090" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="397.2222" x2="658.8003" y1="1090" y2="1090"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1855" x="409.2222" y="1084.7803">reject before OCI mutation</text></g><path d="M579.604,1112 L638.3696,1112 L638.3696,1118 L628.3696,1128 L571.604,1128 L571.604,1120 A8,8 0 0 1 579.604,1112" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="58" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="393.0122" x="571.604" y="1112"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="586.604" y="1123.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4619" x="653.3696" y="1124.7803">[supported mutable drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg14"><polygon fill="#0F172A" points="923.1714,1158,933.1714,1162,923.1714,1166,927.1714,1162" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="659.8003" x2="929.1714" y1="1162" y2="1162"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6748" x="666.8003" y="1142.7803">Apply UpdateQuery only for mutable</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.4199" x="666.8003" y="1156.7803">fields query_definition</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg15"><polygon fill="#0F172A" points="923.1714,1235,933.1714,1239,923.1714,1243,927.1714,1239" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="659.8003" x2="929.1714" y1="1239" y2="1239"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="666.8003" y="1191.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="666.8003" y="1205.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="666.8003" y="1219.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="666.8003" y="1233.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg16"><polygon fill="#0F172A" points="403.2222,1284,393.2222,1288,403.2222,1292,399.2222,1288" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="397.2222" x2="658.8003" y1="1288" y2="1288"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="409.2222" y="1268.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="409.2222" y="1282.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg17"><polygon fill="#0F172A" points="235.2368,1319,225.2368,1323,235.2368,1327,231.2368,1323" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="229.2368" x2="391.2222" y1="1323" y2="1323"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="241.2368" y="1317.7803">requeue on terminating</text></g><path d="M664,1344 L664,2066 A8,8 0 0 0 672,2074 L985,2074 A8,8 0 0 0 993,2066 L993,1346 L983,1336 L672,1336 A8,8 0 0 0 664,1344" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M983,1336 L983,1342 A4,4 0 0 0 987,1346 L993,1346 L983,1336" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="670" y="1351.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="670" y="1365.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="670" y="1379.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="670" y="1393.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="670" y="1407.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="670" y="1421.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="670" y="1435.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="670" y="1449.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="670" y="1463.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="670" y="1477.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="670" y="1491.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="670" y="1505.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="670" y="1519.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="670" y="1533.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="670" y="1547.7803">service: usageapi</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4824" x="670" y="1561.7803">slug: query</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5859" x="670" y="1575.7803">kind: Query</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="670" y="1589.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="670" y="1603.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="670" y="1617.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="670" y="1631.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="670" y="1645.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="670" y="1659.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.123" x="670" y="1673.7803">supported drift: query_definition</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="670" y="1687.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="670" y="1701.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="670" y="1715.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="670" y="1729.7803">list lookup: oci_usage_queries filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.0127" x="670" y="1743.7803">query_definition.display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.7578" x="670" y="1757.7803">query_definition.version,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.502" x="670" y="1771.7803">query_definition.report_query.tenant_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.6709" x="670" y="1785.7803">query_definition.report_query.granularity (+16</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="670" y="1799.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="670" y="1813.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="670" y="1827.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2813" x="670" y="1841.7803">The generated runtime reuses an existing query</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3848" x="670" y="1855.7803">by listing on the required compartmentId request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.4678" x="670" y="1869.7803">scope, then matching the returned</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="670" y="1883.7803">queryDefinition payload on displayName, version,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5088" x="670" y="1897.7803">report inputs, and any populated costAnalysisUI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5723" x="670" y="1911.7803">fields.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1572" x="670" y="1925.7803">The SDK surface does not expose lifecycle states</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.4053" x="670" y="1939.7803">on Query bodies, so create and update settle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0127" x="670" y="1953.7803">through read-after-write GetQuery confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="670" y="1967.7803">instead of lifecycle polling; a service-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7988" x="670" y="1981.7803">wrapper converts that confirmed reread into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3926" x="670" y="1995.7803">settled Active status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="670" y="2009.7803">In-place updates are limited to queryDefinition;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0195" x="670" y="2023.7803">compartmentId requires replacement and is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6475" x="670" y="2037.7803">rejected before OCI mutation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="670" y="2051.7803">Delete retains the finalizer until GetQuery</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.9922" x="670" y="2065.7803">confirms the query no longer exists.</text><?plantuml-src pLZRRXit47tdLn3fIu9wvJYnSv6H0ecDjaRS1esRDmC6jJihiQR8BScLeXRzznvUzY9PJjpsfJ0CMSlXNC-ScRMxbReHLYovMuZAhAMUyreeHypr9pDHtiwjQNLrPfIn_9kwn4yragYe5gtotnljVnPBuZ-IMf6NfTWlSoN_87vqF3eKrffrrlwqFdhvR7nJ6q_lxlXGro-h5xjInbPaiyJi-EJvqzSx4i5yFd_-_FZev6Hq7jMNncgo_EW5yz8hubVqUqkw95xmreavYKOU_jAItR25h8ZNnlYP-JpIuheBVpBEHUcDtV8gHzSTxOP5p-XL_HJ7K8O4oaPel__-ME0XMaQHzpgKhEbIwksylJuMpsUlS1fKDbj7vQmweQF-w4vDNjMYBjbVBCR6txSpGZ8zEJRoWv_14MkK8hlr-9rmz95AeqkvU_JemzM7zrTaLxAaduH65UmZBXpVVhHrvSFP1GlrvcQ5QcxhFjYv1-HRghWbPrJhfT7J_EYmacAEchh3zBqOH8gkp1EtcdSQAbA8zjxRwNZx9kaguf8DoUB5TwCSJJbfoBV48-hWPGw33JBXndQ8Kzx__TW6Uyu_OTiYuT9s8gQ3SeJYP0WfGJsMcryQSuiF0PTdKbTCAC-z1GWWXtBJ