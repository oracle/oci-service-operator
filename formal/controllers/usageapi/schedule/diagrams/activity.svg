F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4336" x="907.3926" y="1546.7803">Requeue on terminating</text><path d="M691.9268,1582 L691.9268,1926 L671.9268,1930 L691.9268,1934 L691.9268,2278 A0,0 0 0 0 691.9268,2278 L1032.001,2278 A0,0 0 0 0 1032.001,2278 L1032.001,1592 L1022.001,1582 L691.9268,1582 A0,0 0 0 0 691.9268,1582" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1022.001,1582 L1022.001,1592 L1032.001,1592 L1022.001,1582" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="697.9268" y="1597.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="697.9268" y="1611.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="697.9268" y="1625.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="697.9268" y="1639.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="697.9268" y="1653.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="697.9268" y="1667.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="697.9268" y="1681.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="697.9268" y="1695.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="697.9268" y="1709.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="697.9268" y="1723.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="697.9268" y="1737.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="697.9268" y="1751.7803">service: usageapi</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.5029" x="697.9268" y="1765.7803">slug: schedule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8408" x="697.9268" y="1779.7803">kind: Schedule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="697.9268" y="1793.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="697.9268" y="1807.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="697.9268" y="1821.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="697.9268" y="1835.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="697.9268" y="1849.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="697.9268" y="1863.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="697.9268" y="1877.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.1816" x="697.9268" y="1891.7803">freeform_tags, output_file_format (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="697.9268" y="1905.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="697.9268" y="1919.7803">compartment_id, name, query_properties,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.3613" x="697.9268" y="1933.7803">saved_report_id (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="697.9268" y="1947.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9365" x="697.9268" y="1961.7803">list lookup: oci_usage_schedules filters name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="697.9268" y="1975.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="697.9268" y="1989.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3711" x="697.9268" y="2003.7803">The generated runtime reuses an existing</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.4678" x="697.9268" y="2017.7803">schedule by listing on the required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4814" x="697.9268" y="2031.7803">compartmentId request scope plus the exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.5635" x="697.9268" y="2045.7803">schedule name, then binding on that unique name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1846" x="697.9268" y="2059.7803">before GetSchedule loads the full payload for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9443" x="697.9268" y="2073.7803">drift evaluation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0742" x="697.9268" y="2087.7803">The Usage API exposes lifecycleState on Schedule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8535" x="697.9268" y="2101.7803">bodies, so create and update settle without a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0195" x="697.9268" y="2115.7803">service-local synchronous wrapper; both ACTIVE</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3438" x="697.9268" y="2129.7803">and INACTIVE are modeled as steady</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0479" x="697.9268" y="2143.7803">resource-exists states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0332" x="697.9268" y="2157.7803">In-place updates are limited to description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="697.9268" y="2171.7803">outputFileFormat, resultLocation, freeformTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1436" x="697.9268" y="2185.7803">and definedTags; name, compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6885" x="697.9268" y="2199.7803">scheduleRecurrences, timeScheduled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3779" x="697.9268" y="2213.7803">savedReportId, and queryProperties require</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4746" x="697.9268" y="2227.7803">replacement and are rejected before OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="57.5859" x="697.9268" y="2241.7803">mutation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2676" x="697.9268" y="2255.7803">Delete retains the finalizer until GetSchedule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="697.9268" y="2269.7803">confirms the schedule no longer exists.</text><ellipse cx="660.9268" cy="1930" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="660.9268" cy="1930" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="660.9268" x2="660.9268" y1="157" y2="177"/><polygon fill="#0F172A" points="656.9268,167,660.9268,177,664.9268,167,660.9268,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="822.3572" x2="822.3572" y1="327" y2="347"/><polygon fill="#0F172A" points="818.3572,337,822.3572,347,826.3572,337,822.3572,341" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="822.3572" x2="822.3572" y1="395" y2="415"/><polygon fill="#0F172A" points="818.3572,405,822.3572,415,826.3572,405,822.3572,409" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="519.4609" x2="499.4963" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-w