 fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="606.8589" y="1011.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4619" x="673.6245" y="1012.7803">[supported mutable drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg14"><polygon fill="#0F172A" points="918.1401,1074,928.1401,1078,918.1401,1082,922.1401,1078" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="680.0552" x2="924.1401" y1="1078" y2="1078"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2334" x="687.0552" y="1030.7803">Apply UpdateSchedule only for</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3369" x="687.0552" y="1044.7803">mutable fields defined_tags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7441" x="687.0552" y="1058.7803">description, freeform_tags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.0303" x="687.0552" y="1072.7803">output_file_format (+1 more)</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg15"><polygon fill="#0F172A" points="918.1401,1151,928.1401,1155,918.1401,1159,922.1401,1155" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="680.0552" x2="924.1401" y1="1155" y2="1155"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="687.0552" y="1107.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="687.0552" y="1121.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="687.0552" y="1135.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="687.0552" y="1149.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg16"><polygon fill="#0F172A" points="423.4771,1200,413.4771,1204,423.4771,1208,419.4771,1204" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="417.4771" x2="679.0552" y1="1204" y2="1204"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="429.4771" y="1184.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="429.4771" y="1198.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg17"><polygon fill="#0F172A" points="255.4917,1235,245.4917,1239,255.4917,1243,251.4917,1239" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="249.4917" x2="411.4771" y1="1239" y2="1239"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="261.4917" y="1233.7803">requeue on terminating</text></g><path d="M685,1260 L685,1982 A8,8 0 0 0 693,1990 L1017,1990 A8,8 0 0 0 1025,1982 L1025,1262 L1015,1252 L693,1252 A8,8 0 0 0 685,1260" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1015,1252 L1015,1258 A4,4 0 0 0 1019,1262 L1025,1262 L1015,1252" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="691" y="1267.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="691" y="1281.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="691" y="1295.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="691" y="1309.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="691" y="1323.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="691" y="1337.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="691" y="1351.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="691" y="1365.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="691" y="1379.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="691" y="1393.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="691" y="1407.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="691" y="1421.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="691" y="1435.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="691" y="1449.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="691" y="1463.7803">service: usageapi</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.5029" x="691" y="1477.7803">slug: schedule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8408" x="691" y="1491.7803">kind: Schedule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="691" y="1505.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="691" y="1519.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="691" y="1533.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="691" y="1547.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="691" y="1561.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="691" y="1575.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="691" y="1589.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.1816" x="691" y="1603.7803">freeform_tags, output_file_format (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="691" y="1617.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="691" y="1631.7803">compartment_id, name, query_properties,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.3613" x="691" y="1645.7803">saved_report_id (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="691" y="1659.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9365" x="691" y="1673.7803">list lookup: oci_usage_schedules filters name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="691" y="1687.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="691" y="1701.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3711" x="691" y="1715.7803">The generated runtime reuses an existing</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.4678" x="691" y="1729.7803">schedule by listing on the required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4814" x="691" y="1743.7803">compartmentId request scope plus the exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.5635" x="691" y="1757.7803">schedule name, then binding on that unique name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1846" x="691" y="1771.7803">before GetSchedule loads the full payload for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9443" x="691" y="1785.7803">drift evaluation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0742" x="691" y="1799.7803">The Usage API exposes lifecycleState on Schedule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8535" x="691" y="1813.7803">bodies, so create and update settle without a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0195" x="691" y="1827.7803">service-local synchronous wrapper; both ACTIVE</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3438" x="691" y="1841.7803">and INACTIVE are modeled as steady</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0479" x="691" y="1855.7803">resource-exists states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0332" x="691" y="1869.7803">In-place updates are limited to description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="691" y="1883.7803">outputFileFormat, resultLocation, freeformTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1436" x="691" y="1897.7803">and definedTags; name, compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6885" x="691" y="1911.7803">scheduleRecurrences, timeScheduled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3779" x="691" y="1925.7803">savedReportId, and queryProperties require</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4746" x="691" y="1939.7803">replacement and are rejected before OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="57.5859" x="691" y="1953.7803">mutation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2676" x="691" y="1967.7803">Delete retains the finalizer until GetSchedule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="691" y="1981.7803">confirms the schedule no longer exists.</text><?plantuml-src lLThRzms5lskNq5qlwJO6JlEeqqco0AfiscDkaqGf_l9WC6HhcQuuP0gISraMlI_xxbyQAI9dHfRe30CM-BbVPrp7_8VbUcaanlXrxAnEsLMefNQK-M7awMiFwwSxKrpRhLruXzjZPzc9D5GAtiTtbWJVfOR4Z-Gtb9GjRnTvahzHkBioUXGEcTtMVl3zkpRH-ERnWRwxZCVslRRvfjZAUiQSbbY-UJfuuVFZoJOV3v__FZ9sTEde_EelhREa1DdtrH11KtYYdxjoTGavgBtSaMoKwTNzPgQNbErLWs9rjgmj9z6YdovytibXAo3THF7Se3bw3WoUaJFseSuXZBaK7NIXDllZmNkesKK_A13gvOkbPccxlaJ-NZv3AUiifiSrSlcAPqDHv_1ygoLRLtzKSNOn8_zaf3FGBuQ-I7EuOYpMfERlFvEUdfFjJMrEZxwwktLsn-lo6rLJJz90o3SLq9wCNqrkVBs_A9Yo8NT0j2fxjdHFP3VKICSUQlxeAnPv5UdZP8hOEfFq_Fy838lC9_uxQfeQ4WZsZjlf-FfJJ9Df6PrI9QO_skKeuKW0_aUPCp4WwCvakeWnfUcKIx4yFy3noPz-BgQYl2bQIuM1-M8nYkEQY1y15rSMliHVoGSNohJL5874Hoe0560Jfyw3H0Y0W8LOb19Uo6r8zdiSQfyyDNKABi1wONudi9WZD261hs37kN5HdcFHdMNZaiOA4hyWrRfGCulX45d-ZhwwWYbl4Hyx203sZiKAnG31fGps7oNwdF446ZguUtQ_ezmRp5x2wGTWe7AnDKjCZF9iZB21nbw7zLni8bo8kDFJSRmTNnzbr_fT73j3YaurIgtAIQsIeu30XMkpGIBw4-jIHeu0AAqoaYDMU3W7TxwYC5IMmRyFgbm52G2pkOvRegan7ktJ-3aizfkElo3gXLswQ7vlWQIMmT7PGioVQurPZl-ib6jjiKTJZjAo4C5wMOkTsW3rwPngWs2jbBtCbxFcCJNQuIWcTw7vZLrTSQTxQhlEkk0f-YxXYtvthMofWKFMlJpvYR8bPzLAE7QgOwjp4JhY5hhDldCzg7hmmqgX6xujGpYmJ_FnCOw5Cfx-Y_LGIpv0ebDp-4iK1qWzzpGBWNaAyu1cku6_BjHpInMsKo0Qsv_qpaBjWP5iEKbSdxZY9s680mzoePoDvdKwQ4fsYwCZ88qJ3gqby2RIieZIDC0ZZhS5zHnO5mzCRY28XlqGtBvY6lxpotbcdZLTNelVecO72h1u5tBzL3qfUnDiG8lxWRhsdmHBRgxPxdUY3Lf827MIBM_DdNiOYz3MxhLIUfhx_FZYskJI3KMII6DH58HZ4LIroWYzsregL-zp9NI8DAXt5wc2f_tQ6vwdjlDC4QZWUDnTZGvOzlh6G41TcsWE0obvTHg7OHjnUtBG9xTVsqJ-5Cjjsq4Lm4L1VpjHeGrYS-MayE22HvK0FbrdCC8R2O0aimZg9Eh62-J2JsbIh3FhPldbj4etybGh