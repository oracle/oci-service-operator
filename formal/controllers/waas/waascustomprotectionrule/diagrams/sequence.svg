etype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="806" y="1046.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="806" y="1060.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="806" y="1074.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8066" x="806" y="1088.7803">service: waas</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.0957" x="806" y="1102.7803">slug: waascustomprotectionrule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3096" x="806" y="1116.7803">kind: WaasCustomProtectionRule</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="806" y="1130.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="806" y="1144.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="806" y="1158.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="806" y="1172.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="806" y="1186.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="806" y="1200.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="806" y="1214.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="806" y="1228.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="806" y="1242.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="806" y="1256.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="806" y="1270.7803">promotion.</text><?plantuml-src fLRlRzis4FtEl-BGVMa1AuwRf4qLRC2QT5tGB0xYTVjYeA2faqs48ZMIikSD-zztr2zBZkKDBO8OjdXyVE_UtOdkIUgSMvw1M_74RAHUGigLG-RQbGKNJqjh2frS6sKiV9SA-aiw4Gccl53-9wFzFSyGVaQrHYy5FnmpatyXJCuxYznQiwdHJzF9szVTdTfuVF-CGvg-JTxiHncReAqZ5kSNPwVlzYB2yVNwsTdvvEAYirx22sCrMfYyOLvwXJ33FmhK0Y623UTk_3jzN1VEc-p14fxmqkZ7GY5RoGGXDSOlp9yTKDVi_vi1SE6DxP6inJPB-ohnDLwcfxHCO9HFcNFj3-_l1lmVb4uYMWmbKxoJkf_6T-VyR759gm4oxos9HNA1atRfcKMNAKy5-uULsk1JiK3AhKV7EZpWceXOenJQtkFttE4Z2gE5t5zwCPrDFytGhgN0NxZcIxGlW3leF-fjcLxVic0_c3MPsySUxUsZHh2OW4LdL17iZUj7uqJo9NdgnjNlQ1SIDJQVkFMoGKXGaTh1tTLoVoVgf2nJjaiMH3zqSXG3Qeel48OASQvj8utjzWMKlkmOskylRU3W_2lM3mcR-ic9eGKdUKwIZhaUR8d-te16FiJm4VtW5fDxAaD77yOy5NcOHIhCdo6iEueT0dkPIkNHkdYkXSb2EMIe_HUPZC1vxl4L8mY83eZCk1UhC0f5I5u92D9Zve91Z2iFmY8FvMHX8ScpdFlL4CNhCdHGCGdD6xYSuCEn3u_JtsvdjzFxs_kFNvF5m19fY4EH9pNDnChK7-NvkOmzphF6QtX-VhZvyTTluKZ_mV6g5Q0kGqo6y6xAkECKQoogqbHQCZ9uT_FXxiDNygJSpVMnAck5x6CVwBXGTeNxFkWChJEQ4qVD5RqEBJtqNEgeq5wgg6RVJebdZRat5ChCqL0WhRarQ-c871aqgWmBt-QQMY6ZqyAlQXPQkLnvC2aS7e3rlFgswVUVA8UcuCnJhq9gJGP-XV1i8EzUggcneObloYui1PDSxanXQJ7dorAlqIFWP53LP96nKLt6YNHvwFGJTiUtbDNEOJNxzg3D2ZMqPZ4oYqP9YNoWtaQmCVOfgikPvMHIoOtQS8R4WiQ7Ggv