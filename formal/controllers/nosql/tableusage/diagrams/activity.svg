I state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="856.822" y="1079.2803">field surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="843.7185" y="1161.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="853.7185" y="1182.2803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="853.7185" y="1196.2803">fields compartment_id</text><ellipse cx="994.9421" cy="1242" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="994.9421" cy="1242" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="869.3591,1112.5,1120.5251,1112.5,1132.5251,1124.5,1120.5251,1136.5,869.3591,1136.5,857.3591,1124.5,869.3591,1112.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="998.9421" y="1147.2803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="869.3591" y="1128.2803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="884.5144,1295,1105.3699,1295,1117.3699,1307,1105.3699,1319,884.5144,1319,872.5144,1307,884.5144,1295" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="884.5144" y="1310.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="850.7283" y="1303.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1117.3699" y="1303.7803">no<