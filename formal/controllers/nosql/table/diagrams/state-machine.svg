y="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2976.52" y="687.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="688" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2212.78,49 L2212.78,435.16 L2047.07,509.57 L2212.78,443.16 L2212.78,673 A8,8 0 0 0 2220.78,681 L2573.6062,681 A8,8 0 0 0 2581.6062,673 L2581.6062,51 L2571.6062,41 L2220.78,41 A8,8 0 0 0 2212.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2571.6062,41 L2571.6062,47 A4,4 0 0 0 2575.6062,51 L2581.6062,51 L2571.6062,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2218.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2218.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2218.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2218.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2218.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2218.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2218.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2218.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2218.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5928" x="2218.78" y="182.7803">service: nosql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8203" x="2218.78" y="196.7803">slug: table</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4824" x="2218.78" y="210.7803">kind: Table</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2218.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2218.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2218.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2218.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2218.78" y="280.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2218.78" y="294.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.502" x="2218.78" y="308.7803">supported drift: compartment_id, defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.7471" x="2218.78" y="322.7803">freeform_tags, table_limits.capacity_mode (+3</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2218.78" y="336.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2218.78" y="350.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3164" x="2218.78" y="364.7803">is_auto_reclaimable, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5508" x="2218.78" y="378.7803">create-only fields: ddl_statement</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.668" x="2218.78" y="392.7803">list lookup: oci_nosql_tables filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.3193" x="2218.78" y="406.7803">compartment_id, name, state=ALL; exact-name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2813" x="2218.78" y="420.7803">unique match only; duplicate exact-name matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="17.8965" x="2218.78" y="434.7803">fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2218.78" y="448.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2218.78" y="462.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0264" x="2218.78" y="476.7803">Handwritten Table bind first checks the tracked</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7158" x="2218.78" y="490.7803">OCID, then searches ListTables in the requested</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3711" x="2218.78" y="504.7803">compartment, and rereads a single exact-name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1436" x="2218.78" y="518.7803">match through GetTable before reusing it.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.8535" x="2218.78" y="532.7803">Create, compartment move, update, and delete use</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6611" x="2218.78" y="546.7803">read-after-write confirmation instead of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.9717" x="2218.78" y="560.7803">explicit work-request polling; CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="347.8262" x="2218.78" y="574.7803">UPDATING, and DELETING keep one-minute requeues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5439" x="2218.78" y="588.7803">until ACTIVE or delete confirmation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.5576" x="2218.78" y="602.7803">DDL remains create-only; compartment moves run</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3848" x="2218.78" y="616.7803">before table-limit or tag updates when both</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0752" x="2218.78" y="630.7803">kinds of drift are present.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="2218.78" y="644.7803">Delete retains the finalizer until GetTable or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3643" x="2218.78" y="658.7803">ListTables confirms the Table is deleted or not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.9238" x="2218.78" y="672.7803">found.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="102" id="ent0006"><path d="M2916.61,747 L2916.61,755.16 L2448.55,738.25 L2916.61,763.16 L2916.61,783 A8,8 0 0 0 2924.61,791 L3170.8502,791 A8,8 0 0 0 3178.8502,783 L3178.8502,749 L3168.8502,739 L2924.61,739 A8,8 0 0 0 2916.61,747" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3168.8502,739 L3168.8502,745 A4,4 0 0 0 3172.8502,749 L3178.8502,749 L3168.8502,739" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2922.61" y="754.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2922.61" y="768.7803">delete observe: GetTable or ListTables</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2922.61" y="782.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.29,688 C48.57,688 101.45,688 158.56,688" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="164.56,688,155.56,684,159.56,688,155.56,692,164.56,688" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.041" x="57" y="683.7803">CreateTable</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M429.64,672.05 C520.55,661.01 631.3337,647.5731 701.1837,639.0931" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="707.14,638.37,697.7235,635.4838,702.1764,638.9726,698.6877,643.4255,707.14,638.37" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="460.36" y="646.8403">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="34" id="lnk5"><path d="M830.57,619.58 C944.1,598.19 1178.77,553.79 1196.36,549 C1206.07,546.36 1210.6038,545.0543 1220.3838,541.7043" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1226.06,539.76,1216.2494,538.8923,1221.3298,541.3803,1218.8419,546.4606,1226.06,539.76" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="986.86" y="530.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="1038.6217" y="544.7803">ACTIVE</text></g><!--link resolve_by_lookup to retryable--><g class="link" data-entity-1="ent0007" data-entity-2="ent0005" data-link-type="dependency" data-source-line="35" id="lnk6"><path d="M830.63,633.87 C938.21,638.95 1152.8067,649.0973 1237.5967,653.0973" fill="none" id="resolve_by_lookup-to-retryable" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1243.59,653.38,1234.7885,648.9603,1238.5956,653.1444,1234.4115,656.9514,1243.59,653.38" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" fon