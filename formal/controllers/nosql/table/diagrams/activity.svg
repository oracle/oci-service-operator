03">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="309.5229" y="958.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="309.5229" y="972.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="309.5229" y="986.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="309.5229" y="1000.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="309.5229" y="1014.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="309.5229" y="1028.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="309.5229" y="1042.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="309.5229" y="1056.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="309.5229" y="1070.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5928" x="309.5229" y="1084.7803">service: nosql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8203" x="309.5229" y="1098.7803">slug: table</text><text fill="#334155" font-family="Helvetica" font