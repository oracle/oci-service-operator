ize="14" lengthAdjust="spacing" textLength="220.2334" x="877.4272" y="1546.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="862.5942" y="1579.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="872.5942" y="1600.2803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="874.6392" y="1633.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="884.6392" y="1654.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="884.6392" y="1668.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="857.4946" y="1701.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="867.4946" y="1722.2803">Requeue on provisioning, updating, terminating</text><path d="M707.9741,1757.5 L707.9741,2087.5 L687.9741,2091.5 L707.9741,2095.5 L707.9741,2425.5 A0,0 0 0 0 707.9741,2425.5 L1076.8003,2425.5 A0,0 0 0 0 1076.8003,2425.5 L1076.8003,1767.5 L1066.8003,1757.5 L707.9741,1757.5 A0,0 0 0 0 707.9741,1757.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1066.8003,1757.5 L1066.8003,1767.5 L1076.8003,1767.5 L1066.8003,1757.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="713.9741" y="1773.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="713.9741" y="1787.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="713.9741" y="1801.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="713.9741" y="1815.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="713.9741" y="1829.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="713.9741" y="1843.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="713.9741" y="1857.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="713.9741" y="1871.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="713.9741" y="1885.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="713.9741" y="1899.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="713.9741" y="1913.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5928" x="713.9741" y="1927.2803">service: nosql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8203" x="713.9741" y="1941.2803">slug: table</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4824" x="713.9741" y="1955.2803">kind: Table</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="713.9741" y="1969.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="713.9741" y="1983.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="713.9741" y="1997.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="713.9741" y="2011.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="713.9741" y="2025.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="713.9741" y="2039.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.502" x="713.9741" y="2053.2803">supported drift: compartment_id, defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.7471" x="713.9741" y="2067.2803">freeform_tags, table_limits.capacity_mode (+3</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="713.9741" y="2081.2803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="713.9741" y="2095.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3164" x="713.9741" y="2109.2803">is_auto_reclaimable, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5508" x="713.9741" y="2123.2803">create-only fields: ddl_statement</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.668" x="713.9741" y="2137.2803">list lookup: oci_nosql_tables filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.3193" x="713.9741" y="2151.2803">compartment_id, name, state=ALL; exact-name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2813" x="713.9741" y="2165.2803">unique match only; duplicate exact-name matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="17.8965" x="713.9741" y="2179.2803">fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="713.9741" y="2193.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="713.9741" y="2207.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0264" x="713.9741" y="2221.2803">Handwritten Table bind first checks the tracked</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7158" x="713.9741" y="2235.2803">OCID, then searches ListTables in the requested</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3711" x="713.9741" y="2249.2803">compartment, and rereads a single exact-name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1436" x="713.9741" y="2263.2803">match through GetTable before reusing it.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.8535" x="713.9741" y="2277.2803">Create, compartment move, update, and delete use</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6611" x="713.9741" y="2291.2803">read-after-write confirmation instead of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.9717" x="713.9741" y="2305.2803">explicit work-request polling; CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="347.8262" x="713.9741" y="2319.2803">UPDATING, and DELETING keep one-minute requeues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5439" x="713.9741" y="2333.2803">until ACTIVE or delete confirmation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.5576" x="713.9741" y="2347.2803">DDL remains create-only; compartment moves run</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3848" x="713.9741" y="2361.2803">before table-limit or tag updates when both</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0752" x="713.9741" y="2375.2803">kinds of drift are present.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="713.9741" y="2389.2803">Delete retains the finalizer until GetTable or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3643" x="713.9741" y="2403.2803">ListTables confirms the Table is deleted or not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.9238" x="713.9741" y="2417.2803">found.</text><ellipse cx="676.9741" cy="2091.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="676.9741" cy="2091.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width