ing" textLength="320.5986" x="345.4219" y="1306.7803">mutable/forceNew: compartment_id, ddl_statement,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.0713" x="345.4219" y="1320.7803">defined_tags, freeform_tags (+4 more) /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3164" x="345.4219" y="1334.7803">is_auto_reclaimable, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8057" x="345.4219" y="1348.7803">open gaps: bind-versus-create, list-lookup,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8545" x="345.4219" y="1362.7803">mutation-policy, waiter-work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="345.4219" y="1376.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="345.4219" y="1390.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="345.4219" y="1404.7803">promotion.</text><ellipse cx="308.4219" cy="1212" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="308.4219" cy="1212" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="308.4219" x2="308.4219" y1="65" y2="85"/><polygon fill="#0F172A" points="304.4219,75,308.4219,85,312.4219,75,308.4219,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="308.4219" x2="308.4219" y1="133" y2="153"/><polygon fill="#0F172A" points="304.4219,143,308.4219,153,312.4219,143,308.4219,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="308.4219"