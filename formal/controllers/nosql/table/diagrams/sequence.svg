ing it.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.8535" x="738" y="2143.7803">Create, compartment move, update, and delete use</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6611" x="738" y="2157.7803">read-after-write confirmation instead of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.9717" x="738" y="2171.7803">explicit work-request polling; CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="347.8262" x="738" y="2185.7803">UPDATING, and DELETING keep one-minute requeues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5439" x="738" y="2199.7803">until ACTIVE or delete confirmation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.5576" x="738" y="2213.7803">DDL remains create-only; compartment moves run</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3848" x="738" y="2227.7803">before table-limit or tag updates when both</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0752" x="738" y="2241.7803">kinds of drift are present.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="738" y="2255.7803">Delete retains the finalizer until GetTable or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3643" x="738" y="2269.7803">ListTables confirms the Table is deleted or not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.9238" x="738" y="2283.7803">found.</text><?plantuml-src fLTTRnit5dtdho2wBmbMOyTrqgOoKY2risrGjrd4wJuP4AWPZiIQGqv9ZXHtiV-zvvAS3ybI