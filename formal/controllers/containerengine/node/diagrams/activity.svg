 font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="825.4814" y="1182.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="825.4814" y="1196.7803">fields compartment_id</text><ellipse cx="966.7051" cy="1242.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="966.7051" cy="1242.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="841.1221,1113,1092.2881,1113,1104.2881,1125,1092.2881,1137,841.1221,1137,829.1221,1125,841.1221,1113" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="970.7051" y="1147.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="841.1221" y="1128.7803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="856.2773,1295.5,1077.1328,1295.5,1089.1328,1307.5,1077.1328,1319.5,856.2773,1319.5,844.2773,1307.5,856.2773,1295.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="856.2773" y="1311.2803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="822.4912" y="1304.2803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1089.1328" y="1304.2803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="277.5918" x="695.4814" y="1329.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5918" x="705.4814" y="1350.2803">Apply UpdateNode only for mutable fields</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3857" x="705.4814" y="1364.2803">display_name</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="999.6299" y="1329.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1009.6299" y="1350.2803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="966.7051,1383.5,978.7051,1395.5,966.7051,1407.5,954.7051,1395.5,966.7051,1383.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="118" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="799.5469" y="1427.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="809.5469" y="1448.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="809.5469" y="1462.2803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="809.5469" y="1476.2803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="809.5469" y="1490.2803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="809.5469" y="1504.2803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="809.5469" y="1518.2803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="809.5469" y="1532.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F17