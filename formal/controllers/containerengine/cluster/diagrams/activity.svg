spacing" textLength="243.5918" x="153.0581" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.8125" x="125.9478" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="135.9478" y="755.7803">Delete path uses DeleteCluster with required</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.082" x="135.9478" y="769.7803">via GetCluster or ListCluster to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="135.9478" y="783.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="135.2891" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="145.2891" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="145.2891" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="118.1445" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="128.1445" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M305.854,929 L305.854,1105 L285.854,1109 L305.854,1113 L305.854,1289 A0,0 0 0 0 305.854,1289 L645.894,1289 A0,0 0 0 0 645.894,1289 L645.894,939 L635.894,929 L305.854,929 A0,0 0 0 0 305.854,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M635.894,929 L635.894,939 L645.894,939 L635.894,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="10