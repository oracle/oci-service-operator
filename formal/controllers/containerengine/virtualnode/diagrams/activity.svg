tica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="160.2598" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="307.9229" x="128.0942" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3643" x="138.0942" y="755.7803">Delete path uses DeleteVirtualNode with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="138.0942" y="769.7803">required via GetVirtualNode or ListVirtualNode</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.2822" x="138.0942" y="783.7803">to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="142.4907" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="152.4907" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="152.4907" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="125.3462" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="135.3462" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M313.0557,929 L313.0557,1105 L293.0557,1109 L313.0557,1113 L313.0557,1289 A0,0 0 0 0 313.0557,1289 L653.0957,1289 A0,0 0 0 0 653.0957,1289 L653.0957,939 L643.0957,929 L313.0557,929 A0,0 0 0 0 313.0557,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M643.0957,929 L643.0957,939 L653.0957,939 L643.0957,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family