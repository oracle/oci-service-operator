thAdjust="spacing" textLength="287.9229" x="2248.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2248.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2248.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.7578" x="2248.78" y="182.7803">service: containerengine</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0752" x="2248.78" y="196.7803">slug: nodepool</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="2248.78" y="210.7803">kind: NodePool</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2248.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2248.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2248.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2248.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2248.78" y="280.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2248.78" y="294.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4951" x="2248.78" y="308.7803">supported drift: defined_tags, freeform_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.4639" x="2248.78" y="322.7803">initial_node_labels, kubernetes_version (+11</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2248.78" y="336.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2248.78" y="350.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.9707" x="2248.78" y="364.7803">cluster_id, compartment_id, node_image_name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.7334" x="2248.78" y="378.7803">conflicts node_config_details -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.2607" x="2248.78" y="392.7803">quantity_per_subnet, subnet_ids,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.9258" x="2248.78" y="406.7803">quantity_per_subnet -&gt; node_config_details,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8779" x="2248.78" y="420.7803">subnet_ids -&gt; node_config_details</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2248.78" y="434.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5361" x="2248.78" y="448.7803">list lookup: oci_containerengine_node_pools</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3027" x="2248.78" y="462.7803">filters compartment_id, cluster_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.7305" x="2248.78" y="476.7803">lifecycle_state, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.623" x="2248.78" y="490.7803">conflicts: node_config_details -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.2607" x="2248.78" y="504.7803">quantity_per_subnet, subnet_ids,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.9258" x="2248.78" y="518.7803">quantity_per_subnet -&gt; node_config_details,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8779" x="2248.78" y="532.7803">subnet_ids -&gt; node_config_details</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2248.78" y="546.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2061" x="2248.78" y="560.7803">Ready state maps to OCI ACTIVE, INACTIVE, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.2412" x="2248.78" y="574.7803">NEEDS_ATTENTION.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.7988" x="2248.78" y="588.7803">Requeue continues while OCI reports CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.3584" x="2248.78" y="602.7803">UPDATING, or DELETING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3711" x="2248.78" y="616.7803">Bind-before-create reuses only exact compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3369" x="2248.78" y="630.7803">and cluster matches that remain in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0273" x="2248.78" y="644.7803">CREATING, UPDATING, INACTIVE, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.2412" x="2248.78" y="658.7803">NEEDS_ATTENTION.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3506" x="2248.78" y="672.7803">Delete completes after GetNodePool or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2676" x="2248.78" y="686.7803">ListNodePools returns DELETED or no longer finds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="81.71" x="2248.78" y="700.7803">the resource.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="104" id="ent0006"><path d="M2930.27,775 L2930.27,782.18 L2470.42,766.19 L2930.27,790.18 L2930.27,811 A8,8 0 0 0 2938.27,819 L3237.4477,819 A8,8 0 0 0 3245.4477,811 L3245.4477,777 L3235.4477,767 L2938.27,767 A8,8 0 0 0 2930.27,775" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3235.4477,767 L3235.4477,773 A4,4 0 0 0 3239.4477,777 L3245.4477,777 L3235.4477,767" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2936.27" y="782.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1777" x="2936.27" y="796.7803">delete observe: GetNodePool or ListNodePools</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2936.27" y="810.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-lin