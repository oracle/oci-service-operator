schemaVersion: 1
surface: repo-authored-semantics
service: containerengine
slug: nodepool
kind: NodePool
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
  - failed
  - deleted
notes:
  - Ready state maps to OCI ACTIVE, INACTIVE, or NEEDS_ATTENTION.
  - Requeue continues while OCI reports CREATING, UPDATING, or DELETING.
  - Bind-before-create reuses only exact compartment and cluster matches that remain in ACTIVE, CREATING, UPDATING, INACTIVE, or NEEDS_ATTENTION.
  - Delete completes after GetNodePool or ListNodePools returns DELETED or no longer finds the resource.
