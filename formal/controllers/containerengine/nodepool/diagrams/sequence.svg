t><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8779" x="765" y="2129.7803">subnet_ids -&gt; node_config_details</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="765" y="2143.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5361" x="765" y="2157.7803">list lookup: oci_containerengine_node_pools</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3027" x="765" y="2171.7803">filters compartment_id, cluster_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.7305" x="765" y="2185.7803">lifecycle_state, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.623" x="765" y="2199.7803">conflicts: node_config_details -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.2607" x="765" y="2213.7803">quantity_per_subnet, subnet_ids,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.9258" x="765" y="2227.7803">quantity_per_subnet -&gt; node_config_details,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8779" x="765" y="2241.7803">subnet_ids -&gt; node_config_details</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="765" y="2255.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2061" x="765" y="2269.7803">Ready state maps to OCI ACTIVE, INACTIVE, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.2412" x="765" y="2283.7803">NEEDS_ATTENTION.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.7988" x="765" y="2297.7803">Requeue continues while OCI reports CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.3584" x="765" y="2311.7803">UPDATING, or DELETING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3711" x="765" y="2325.7803">Bind-before-create reuses only exact compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3369" x="765" y="2339.7803">and cluster matches that remain in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0273" x="765" y="2353.7803">CREATING, UPDATING, INACTIVE, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.2412" x="765" y="2367.7803">NEEDS_ATTENTION.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3506" x="765" y="2381.7803">Delete completes after GetNodePool or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2676" x="765" y="2395.7803">ListNodePools returns DELETED or no longer finds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="81.71" x="765" y="2409.7803">the resource.</text><?plantuml-src pLVRRXit47tdLn3jIu9ATfnx5AH0Ohkf4TS9RATF0WHgboknfiWDoPNY5lttdY5tLxkob0X92nH-q9eS3kTovipGtoXJ2YSMtCz5RbVAp7WXj9VCjpjJaTtCdArCVcorTVp78iDVtf78PI4g7Nwn9bo8XUI_IhsKGMLYkyoL-bFoeyUTJU6SNTNQ7nH7pnvsJneRv9ixDXJ5i_pfffHrkNIrnFJnaqSFNcn8qFNr_gD7Zu-UFEdiH_MPTKOwVlIK1HMqv5VoKoLD9lcGPpWh57QbcU7dyCBcyeErcirLBdbXRPZQpnrzlZdw5-DSPC6wddsrdytMfeFoeNnUFC0sb26KgXGcR3_V5TX7IoS6hGwj2daEftetl7Wi7asVOvTKbhsjR9e_aKVjrftiF2z4aR6_MVIDlwkc4c4DqhEE7VmOXZYhjNIzvJV2oqk9Q6TgS-k7zrVltrr9jrIP_4qOCPFk1ouyxo_rZhm_FcE