 x="147.627" y="907.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="120.4824" y="941"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="130.4824" y="961.7803">Requeue on provisioning, updating, terminating</text><path d="M308.1919,985 L308.1919,1161 L288.1919,1165 L308.1919,1169 L308.1919,1345 A0,0 0 0 0 308.1919,1345 L648.2319,1345 A0,0 0 0 0 648.2319,1345 L648.2319,995 L638.2319,985 L308.1919,985 A0,0 0 0 0 308.1919,985" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M638.2319,985 L638.2319,995 L648.2319,995 L638.2319,985" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="314.1919" y="1000.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="314.1919" y="1014.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="314.1919" y="1028.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="314.1919" y="1042.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="314.1919" y="1056.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="314.1919" y="1070.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="314.1919" y="1084.7803">list-lookup hints, secret policies, delete</text><tex