gth="135.3857" x="159.2993" y="241.7803">Resolve OCI state via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.9922" x="159.2993" y="255.7803">GetCloudBridgeEnvironments with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7852" x="159.2993" y="269.7803">ListCloudBridgeEnvironments fallback</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="118.5718" y="303"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.8965" x="128.5718" y="323.7803">Use</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6328" x="128.5718" y="337.7803">scaffold_cloudbridge_cloudbridgeenvironments</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="128.5718" y="351.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="128.5718" y="365.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="223.5024,399,330.8813,399,342.8813,411,330.8813,423,223.5024,423,211.5024,411,223.5024,399" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="223.5024" y="414.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="189.7163" y="407.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="342.8813" y="407.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="227.7852" x="30.4585" y="433"/><text fill="#0F172A" font-family="Helvetica" font