<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1301px" preserveAspectRatio="none" style="width:691px;height:1301px;background:#FCFCFD;" version="1.1" viewBox="0 0 691 1301" width="691px" zoomAndPan="magnify"><title>Activity - cloudbridge/CloudBridgeAsset</title><defs/><g><rect fill="#FCFCFD" height="1301" style="stroke:none;stroke-width:1;" width="691" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="269.1377" x="209.8074" y="30.7803">Activity - cloudbridge/CloudBridgeAsset</text></g><ellipse cx="308.7124" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="156.3198" y="85"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="166.3198" y="105.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="166.3198" y="119.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="318.8535" x="149.2856" y="153"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8535" x="159.2856" y="173.7803">Load desired CloudBridgeAsset spec and status</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="103.4961" x="159.2856" y="187.7803">from Kubernetes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="322.6885" x="147.3682" y="221"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6885" x="157.3682" y="241.7803">Resolve OCI state via GetCloudBridgeAsset with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.2061" x="157.3682" y="255.7803">ListCloudBridgeAsset fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="150.0923" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8398" x="160.0923" y="309.7803">Use scaffold_cloudbridge_cloudbridgeasset</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="160.0923" y="323.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="160.0923" y="337.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="255.0229,371,362.4019,371,374.4019,383,362.4019,395,255.0229,395,243.0229,383,255.0229,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="255.0229" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="221.2368" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="374.4019" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="289.2744" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2744" x="21" y="425.7803">Update path calls UpdateCloudBridgeAsset</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="22.2861" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.7021" x="32.2861" y="479.7803">Guard mutable fields display_name and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3096" x="32.2861" y="493.7803">force-new fields compartment_id</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="283.0264" x="320.2744" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0264" x="330.2744" y="425.7803">Create path calls CreateCloudBridgeAsset</text><polygon fill="#E2E8F0" points="308.7124,513,320.7124,525,308.7124,537,296.7124,525,308.7124,513" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="104" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="141.5542" y="557"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="151.5542" y="577.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="151.5542" y="591.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="151.5542" y="605.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="151.5542" y="619.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="151.5542" y="633.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="151.5542" y="647.7803">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="263.5918" x="176.9165" y="681"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="186.9165" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="318.0195" x="149.7026" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="159.7026" y="755.7803">Delete path uses DeleteCloudBridgeAsset with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.0059" x="159.7026" y="769.7803">required via GetCloudBridgeAsset or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0195" x="159.7026" y="783.7803">ListCloudBridgeAsset to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="169.1475" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="179.1475" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="179.1475" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="152.0029" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="162.0029" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M339.7124,929 L339.7124,1105 L319.7124,1109 L339.7124,1113 L339.7124,1289 A0,0 0 0 0 339.7124,1289 L679.7524,1289 A0,0 0 0 0 679.7524,1289 L679.7524,939 L669.7524,929 L339.7124,929 A0,0 0 0 0 339.7124,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M669.7524,929 L669.7524,939 L679.7524,939 L669.7524,929" fill="#FFF7D6" style="stroke:#B45309;