size="14" lengthAdjust="spacing" textLength="124.5098" x="345.7124" y="1098.7803">service: cloudbridge</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.3096" x="345.7124" y="1112.7803">slug: cloudbridgeasset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5234" x="345.7124" y="1126.7803">kind: CloudBridgeAsset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="345.7124" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="345.7124" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="345.7124" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="345.7124" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="345.7124" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="345.7124" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="345.7124" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="345.7124" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="345.7124" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="345.7124" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="345.7124" y="1280.7803">promotion.</text><ellipse cx="308.7124" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="308.7124" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="308.7124" x2="308.7124" y1="65" y2="85"/><polygon fill="#0F172A" points="304.7124,75,308.7124,85,312.7124,75,308.7124,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="308.7124" x2="308.7124" y1="133" y2="153"/><polygon fill="#0F172A" points="304.7124,143,308.7124,153,312.7124,143,308.7124,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="308.7124" x2="308.7124" y1="201" y2="221"/><polygon fill="#0F172A" points="304.7124,211,308.7124,221,312.7124,211,308.7124,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="308.7124" x2="308.7124" y1="269" y2="289"/><polygon fill="#0F172A" points="304.7124,279,308.7124,289,312.7124,279,308.7124,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="155.6372" x2="155.6372" y1="439" y2="459"/><polygon fill="#0F172A" points="151.6372,449,155.6372,459,159.6372,449,155.6372,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="243.0229" x2="155.6372" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="155.6372" x2="155.6372" y1="383" y2="405"/><polygon fill="#0F172A" points="151.6372,395,155.6372,405,159.6372,395,155.6372,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="374.4019" x2="461.7876" y1="383" y2="383"/><line 