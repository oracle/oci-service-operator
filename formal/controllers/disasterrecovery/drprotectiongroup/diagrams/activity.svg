.1572" x="827.355" y="1676.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="837.355" y="1697.2803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2471" x="837.355" y="1711.2803">create=GetWorkRequest -&gt; GetDrProtectionGroup;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1572" x="837.355" y="1725.2803">update=GetWorkRequest -&gt; GetDrProtectionGroup;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.4199" x="837.355" y="1739.2803">delete=GetWorkRequest -&gt;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6748" x="837.355" y="1753.2803">GetDrProtectionGroup/ListDrProtectionGroups</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="837.355" y="1767.2803">confirm-delete</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8613" x="855.0029" y="1800.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8613" x="865.0029" y="1821.2803">Return success for the ACTIVE, INACTIVE</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8135" x="865.0029" y="1835.2803">success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="858.8687" y="1868.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="868.8687" y="1889.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="868.8687" y="1903.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="841.7241" y="1936.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="851.7241" y="1957.2803">Requeue on provisioning, updating, terminating</text><path d="M700.0889,1992.5 L700.0889,2392.5 L680.0889,2396.5 L700.0889,2400.5 L700.0889,2800.5 A0,0 0 0 0 700.0889,2800.5 L1043.2461,2800.5 A0,0 0 0 0 1043.2461,2800.5 L1043.2461,2002.5 L1033.2461,1992.5 L700.0889,1992.5 A0,0 0 0 0 700.0889,1992.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1033.2461,1992.5 L1033.2461,2002.5 L1043.2461,2002.5 L1033.2461,1992.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="706.0889" y="2008.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="706.0889" y="2022.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="706.0889" y="2036.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="706.0889" y="2050.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="706.0889" y="2064.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="706.0889" y="2078.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="706.0889" y="2092.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="706.0889" y="2106.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="706.0889" y="2120.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="706.0889" y="2134.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="706.0889" y="2148.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.8271" x="706.0889" y="2162.2803">service: disasterrecovery</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="706.0889" y="2176.2803">slug: drprotectiongroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.1787" x="706.0889" y="2190.2803">kind: DrProtectionGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="706.0889" y="2204.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="706.0889" y="2218.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="706.0889" y="2232.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="706.0889" y="2246.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="706.0889" y="2260.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="706.0889" y="2274.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="706.0889" y="2288.2803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1572" x="706.0889" y="2302.2803">GetDrProtectionGroup; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.4814" x="706.0889" y="2316.2803">GetDrProtectionGroup; delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6748" x="706.0889" y="2330.2803">GetDrProtectionGroup/ListDrProtectionGroups</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="706.0889" y="2344.2803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="706.0889" y="2358.2803">supported drift: definedTags, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.7402" x="706.0889" y="2372.2803">freeformTags, logLocation.bucket (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="706.0889" y="2386.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.1924" x="706.0889" y="2400.2803">association, compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="706.0889" y="2414.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="706.0889" y="2428.2803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2676" x="706.0889" y="2442.2803">oci_disaster_recovery_dr_protection_groups</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3027" x="706.0889" y="2456.2803">filters compartmentId, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.8096" x="706.0889" y="2470.2803">lifecycleState, role (+1 more); exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5918" x="706.0889" y="2484.2803">compartmentId plus displayName unique match,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="706.0889" y="2498.2803">optionally narrowed by lifecycleState, role, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7988" x="706.0889" y="2512.2803">lifecycleSubState; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="706.0889" y="2526.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="706.0889" y="2540.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.4121" x="706.0889" y="2554.2803">DrProtectionGroup create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.916" x="706.0889" y="2568.2803">work-request-backed and resume through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3643" x="706.0889" y="2582.2803">status.async.current as the canonical in-flight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="46.6758" x="706.0889" y="2596.2803">tracker.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.8057" x="706.0889" y="2610.2803">List responses expose DrProtectionGroupSummary</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8682" x="706.0889" y="2624.2803">items only, so the runtime rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.668" x="706.0889" y="2638.2803">GetDrProtectionGroup for authoritative</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2881" x="706.0889" y="2652.2803">logLocation and members projection instead of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0264" x="706.0889" y="2666.2803">treating summaries as complete observed state.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8955" x="706.0889" y="2680.2803">The published runtime keeps role,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="706.0889" y="2694.2803">lifecycleState, lifecycleSubState, peer fields,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4678" x="706.0889" y="2708.2803">and polymorphic members truthful in status while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.4961" x="706.0889" y="2722.2803">limiting in-place writes to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5439" x="706.0889" y="2736.2803">UpdateDrProtectionGroupDetails.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.4814" x="706.0889" y="2750.2803">Associate/Disassociate role changes, compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4814" x="706.0889" y="2764.2803">moves, DR plans, and the broader member-action</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6475" x="706.0889" y="2778.2803">families remain out of scope for this first</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.8887" x="706.0889" y="2792.2803">controller-backed disasterrecovery rollout.</text><ellipse cx="669.0889" cy="2396.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="669.0889" cy="2396.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="669.0889" x2="669.0889" y1="157" y2="177"/><polygon fill="#0F172A" points="665.0889,167,669.0889,177,673.0889,167,669.0889,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="820.5547" x2="820.5547" y1="355" y2="375"/><polygon fill="#0F172A" points="816.5547,365,820.5547,375,824.5547,365,820.5547,369" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="820.5547" x2="820.5547" y1="437" y2="457"/><polygon fill="#0F172A" points="816.5547,447,820.5547,457,824.5547,447,820.5547,451" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="527.623" x2="517.623" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="517.623" x2="517.623" y1="257" y2="279"/><polygon fill="#0F172A" points="513.623,269,517.623,279,521.623,269,517.623,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="810.5547" x2="820.5547" y1="257" y2="257"/><line style="s