<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="849px" preserveAspectRatio="none" style="width:3673px;height:849px;background:#FCFCFD;" version="1.1" viewBox="0 0 3673 849" width="3673px" zoomAndPan="magnify"><title>State Machine - marketplace/AcceptedAgreement</title><defs/><g><rect fill="#FCFCFD" height="849" style="stroke:none;stroke-width:1;" width="3673" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="328.3369" x="1665.7345" y="20.7803">State Machine - marketplace/AcceptedAgreement</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="256" y="697"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="256" x2="520.3643" y1="721" y2="721"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="361.7271" y="712.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="261" y="736.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="261" y="750.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1317.36" y="615"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1322.36" y="638.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2101.04" y="602"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2106.04" y="625.7803">Ready</text><rect fill="#F8FAFC" height