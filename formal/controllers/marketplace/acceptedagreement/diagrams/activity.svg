8.7803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="866.4719" y="1482"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="876.4719" y="1502.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="876.4719" y="1516.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="169.4336" x="921.3201" y="1550"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4336" x="931.3201" y="1570.7803">Requeue on terminating</text><path d="M703.8905,1606 L703.8905,1957 L683.8905,1961 L703.8905,1965 L703.8905,2316 A0,0 0 0 0 703.8905,2316 L1043.1854,2316 A0,0 0 0 0 1043.1854,2316 L1043.1854,1616 L1033.1854,1606 L703.8905,1606 A0,0 0 0 0 703.8905,1606" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1033.1854,1606 L1033.1854,1616 L1043.1854,1616 L1033.1854,1606" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="709.8905" y="1621.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="709.8905" y="1635.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="709.8905" y="1649.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="709.8905" y="1663.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="709.8905" y="1677.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="709.8905" y="1691.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="709.8905" y="1705.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="709.8905" y="1719.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="709.8905" y="1733.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="709.8905" y="1747.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="709.8905" y="1761.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3789" x="709.8905" y="1775.7803">service: marketplace</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.2129" x="709.8905" y="1789.7803">slug: acceptedagreement</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.3164" x="709.8905" y="1803.7803">kind: AcceptedAgreement</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="709.8905" y="1817.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="709.8905" y="1831.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="709.8905" y="1845.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="709.8905" y="1859.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="709.8905" y="1873.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="709.8905" y="1887.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="709.8905" y="1901.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3721" x="709.8905" y="1915.7803">freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="709.8905" y="1929.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.916" x="709.8905" y="1943.7803">agreement_id, compartment_id, listing_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.8096" x="709.8905" y="1957.7803">package_version (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="709.8905" y="1971.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2949" x="709.8905" y="1985.7803">list lookup: oci_marketplace_accepted_agreements</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.999" x="709.8905" y="1999.7803">filters agreement_id, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.6025" x="709.8905" y="2013.7803">display_name, listing_id (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="709.8905" y="2027.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="709.8905" y="2041.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="709.8905" y="2055.7803">AcceptedAgreement reuses an existing OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4951" x="709.8905" y="2069.7803">agreement before create by exact compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2813" x="709.8905" y="2083.7803">listingId, packageVersion, and agreementId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.792" x="709.8905" y="2097.7803">match, with displayName narrowing when set.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.75" x="709.8905" y="2111.7803">OCI accepted agreement responses do not expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="709.8905" y="2125.7803">lifecycle state, so successful create and update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2129" x="709.8905" y="2139.7803">normalize directly to Active from the immediate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="95.7305" x="709.8905" y="2153.7803">response body.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="709.8905" y="2167.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6055" x="709.8905" y="2181.7803">definedTags, and freeformTags; agreementId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9365" x="709.8905" y="2195.7803">compartmentId, listingId, packageVersion, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.8818" x="709.8905" y="2209.7803">signature are replacement-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.0957" x="709.8905" y="2223.7803">The controller mirrors the last applied</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9707" x="709.8905" y="2237.7803">signature at status.appliedSignature because OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8535" x="709.8905" y="2251.7803">read models never return the signature needed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.5996" x="709.8905" y="2265.7803">for explicit drift checks.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4336" x="709.8905" y="2279.7803">Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2539" x="709.8905" y="2293.7803">DeleteAcceptedAgreement is followed by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7295" x="709.8905" y="2307.7803">GetAcceptedAgreement returning not found.</text><ellipse cx="672.8905" cy="1961" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-