Adjust="spacing" textLength="143.9854" x="329.9673" y="1275.7803">requeue on terminating</text></g><path d="M753,1302 L753,2038 A8,8 0 0 0 761,2046 L1084,2046 A8,8 0 0 0 1092,2038 L1092,1304 L1082,1294 L761,1294 A8,8 0 0 0 753,1302" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1082,1294 L1082,1300 A4,4 0 0 0 1086,1304 L1092,1304 L1082,1294" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="759" y="1309.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="759" y="1323.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="759" y="1337.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="759" y="1351.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="759" y="1365.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="759" y="1379.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="759" y="1393.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="759" y="1407.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="759" y="1421.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="759" y="1435.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="759" y="1449.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="759" y="1463.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="759" y="1477.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="759" y="1491.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3789" x="759" y="1505.7803">service: marketplace</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.2129" x="759" y="1519.7803">slug: acceptedagreement</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.3164" x="759" y="1533.7803">kind: AcceptedAgreement</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="759" y="1547.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="759" y="1561.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="759" y="1575.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="759" y="1589.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="759" y="1603.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="759" y="1617.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="759" y="1631.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3721" x="759" y="1645.7803">freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="759" y="1659.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.916" x="759" y="1673.7803">agreement_id, compartment_id, listing_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.8096" x="759" y="1687.7803">package_version (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="759" y="1701.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2949" x="759" y="1715.7803">list lookup: oci_marketplace_accepted_agreements</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.999" x="759" y="1729.7803">filters agreement_id, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.6025" x="759" y="1743.7803">display_name, listing_id (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="759" y="1757.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="759" y="1771.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="759" y="1785.7803">AcceptedAgreement reuses an existing OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4951" x="759" y="1799.7803">agreement before create by exact compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2813" x="759" y="1813.7803">listingId, packageVersion, and agreementId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.792" x="759" y="1827.7803">match, with displayName narrowing when set.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.75" x="759" y="1841.7803">OCI accepted agreement responses do not expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="759" y="1855.7803">lifecycle state, so successful create and update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2129" x="759" y="1869.7803">normalize directly to Active from the immediate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="95.7305" x="759" y="1883.7803">response body.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="759" y="1897.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6055" x="759" y="1911.7803">definedTags, and freeformTags; agreementId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9365" x="759" y="1925.7803">compartmentId, listingId, packageVersion, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.8818" x="759" y="1939.7803">signature are replacement-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.0957" x="759" y="1953.7803">The controller mirrors the last applied</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9707" x="759" y="1967.7803">signature at status.appliedSignature because OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8535" x="759" y="1981.7803">read models never return the signature needed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.5996" x="759" y="1995.7803">for explicit drift checks.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4336" x="759" y="2009.7803">Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2539" x="759" y="2023.7803">DeleteAcceptedAgreement is followed by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7295" x="759" y="2037.7803">GetAcceptedAgreement returning not found.</text><?plantuml-src hLZRZXmr47ttLrZmaeYPsIn9I9WeI24Hi28GAHjuMcdbwQwUCTjjDxPx9WFYtpbbztKkoKgWADfjN-fwwbHv_PqsjNAgadwZShlJPYqBLNeIljzPgUnkxMnZyjUsj4v-MMJubuzEv5IefWm_M1D-LHN9dwZSKj2PEdtcMlz5ylB9Q5CvPtUjz4V5vRElnpUD3VJzaGr5yIp_vl2KTJcvziJgoTF7ZxuzEC7gs_t7ZvzSFdqwse_YC-iCENdvZGWwb2IlwS-6J4PoBYlbxYZKfSheubMMKHqeVxLsH1MP83Ow9rbO6rRsuqYex-x_BQHKMR1kOcJhRBTrw2LzJS-BHzY6CCHJryg4q_V71-uZPHI8NaQf2tghpJICtpvHZrVFiSiYwybMjigVqcM_TPIYvuKgCl6FYBx9dviL8RQ1l1ZP8L_346VBajna-NlbwJrbrcJwSEkBTzVlVhucjzKP_QACMfFxGYelfqkJA-zUNmbElxHR97SgUtPm3uNWA9UEl2sReArPjaiNkLPhvDHVfE_vS6JUfNdXj-jEGaubl3rxEsrFRvB98qp542mv_suKewKaW_CDoIC4mkBM9J6SvzjJTvUo__s1Ozq-F1JJ8tnf6fJb81nkUStk7PT0X