" textLength="291.0469" x="397.8569" y="1098.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="397.8569" y="1112.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="121.3994" x="397.8569" y="1126.7803">service: cloudguard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.0127" x="397.8569" y="1140.7803">slug: cloudguardsavedqueries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="197.668" x="397.8569" y="1154.7803">kind: CloudGuardSavedQueries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="397.8569" y="1168.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="397.8569" y="1182.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="397.8569" y="1196.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="397.8569" y="1210.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="397.8569" y="1224.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="397.8569" y="1238.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="397.8569" y="1252.7803">mutable/forceNew: display_name / compartment_id</text><text fill=