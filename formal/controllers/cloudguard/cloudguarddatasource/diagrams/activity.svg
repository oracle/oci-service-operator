ont-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="598.7803">Delete</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="318.8467" x="180.3208" y="621"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8467" x="190.3208" y="641.7803">Delete path uses DeleteCloudGuardDataSource</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1504" x="190.3208" y="655.7803">with required via GetCloudGuardDataSource or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2334" x="190.3208" y="669.7803">ListCloudGuardDataSource to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="190.3208" y="683.7803">confirmation</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="319.5986" x="179.9448" y="732"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5986" x="189.9448" y="752.7803">Confirm deletion via GetCloudGuardDataSource</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5918" x="189.9448" y="766.7803">or ListCloudGuardDataSource until OCI reaches</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5723" x="189.9448" y="780.7803">DELETED</text><polygon fill="#E2E8F0" points="191.5718,826,487.9165,826,499.9165,838,487.9165,850,191.5718,850,179.5718,838,191.5718,826" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="841.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="834.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="834.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="860"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="880.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="860"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="880.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="894.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,914,351.7441,926,339.7441,938,327.7441,926,339.7441,914" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="996" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="996" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="440" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="345.916" x="815.7307" y="587"/><path d="M966.5647,587 L966.5647,594 L956.5647,604 L815.7307,604" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="818.7307" y="598.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="280.5928" x="842.3923" y="670"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="852.3923" y="690.7803">Request requeue while OCI remains in</text><text fill="#0F172A" font-fam