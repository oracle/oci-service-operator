ft detected?"</text><polygon fill="#E2E8F0" points="872.261,1321.5,1093.1165,1321.5,1105.1165,1333.5,1093.1165,1345.5,872.261,1345.5,860.261,1333.5,872.261,1321.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="872.261" y="1337.2803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="838.4749" y="1330.2803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1105.1165" y="1330.2803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2744" x="695.4814" y="1355.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2744" x="705.4814" y="1376.2803">Apply UpdateCloudGuardDataSource only for</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6543" x="705.4814" y="1390.2803">mutable fields display_name</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1018.7559" y="1355.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1028.7559" y="1376.2803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="982.6887,1409.5,994.6887,1421.5,982.6887,1433.5,970.6887,1421.5,982.6887,1409.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="118" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="815.5305" y="1453.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="825.5305" y="1474.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="825.53