tLength="135.3857" x="153.6545" y="241.7803">Resolve OCI state via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5713" x="153.6545" y="255.7803">GetCloudGuardDataSourceEvent with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3643" x="153.6545" y="269.7803">ListCloudGuardDataSourceEvent fallback</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="325.8877" x="119.8928" y="303"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.8965" x="129.8928" y="323.7803">Use</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8877" x="129.8928" y="337.7803">scaffold_cloudguard_cloudguarddatasourceevent</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="129.8928" y="351.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="129.8928" y="365.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="229.1472,399,336.5261,399,348.5261,411,336.5261,423,229.1472,423,217.1472,411,229.1472,399" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="229.1472" y="414.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="195.3611" y="407.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="348.5261" y="407.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="250.3643" x="19.1689" y="433"/><text fill="#0F172A" font-family="Helvet