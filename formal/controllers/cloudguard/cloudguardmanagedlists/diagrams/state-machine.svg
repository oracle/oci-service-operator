="ent0005" data-link-type="dependency" data-source-line="26" id="lnk7"><path d="M275.49,454.46 C293.02,504.94 331.063,614.5016 348.563,664.9316" fill="none" id="active-to-terminating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="350.53,670.6,351.3584,660.786,348.8908,665.8763,343.8005,663.4087,350.53,670.6" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.123" x="340.13" y="636.7803">DeleteCloudGuardManagedLists</text></g><!--link terminating to *end*--><g class="link" data-entity-1="ent0005" data-entity-2="ent0008" data-link-type="dependency" data-source-line="27" id="lnk9"><path d="M359,721.41 C359,744.96 359,773.47 359,790.58" fill="none" id="terminating-to-*end*" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="359,796.58,363,787.58,359,791.58,355,787.58,359,796.58" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5723" x="360" y="762.7803">DELETED</text></g><?plantuml-src XLHjJzim4FxkNt7QlasqfQEyB4YJ67Ii4czQWI_RX8nzIImSExETTcpQVzyvJK9QG5E-nBwxvvxdNkmVb2cvumNud4kxL2Q3b6kFp7UMUouUCcSh8u-jjWxUfe8-sVEGcF9AXy_MX0jU87n1lS2W17_PPwv-8umdFIDtpYuRzErqlF--7sbim4_FEAJfljpRzB9EeciyxYUxEziVDZnY-iQ-ipCPx-xsx3MyiCwWW_4U2ofeX7dW0U6SYrmPX048RIkPLTp9qN7yFOs_vzpm3EMPyi7t07qT-uV12oKyI7agegLFkP4Ea3xHxEu8pRMNOpb1UK2Ns24sVd_PAkkRqjc5yieQQkbtKvyeKG9NNozlP_FPvSNiulGDS0zznpQOYw0Ms0yxEhwUtKxhW9MnTQrAoSD6ZfkhawFh5hzrQ0C2kaAPPp4dqxDf5zFpOT_U_O31uECQJqZWs271lTA3DTyOlE8ChGxMdAEfvKV6c_Zx6cRdzn-y7dUodw36Lo7xhZ4qIcqgCJrXSLx1gImFODEkwZbtA44gdj689Srvr9pzQ7KU21eWPxL6DwZBFYXM4ppqYupDuoH1wcm18KTe89z2eCovHoYiH0tSqAQNA1JNSMrLKLeNoBtjt6hA_HOjU5JA23l3G6SAfAT4wSeXu2yLFEJeSCYu4pc6nn9fAuB84pX5sZWUCJswXHAHR2oIOq-KF1IytCm9oWJRay0s9NXOgf1Jzb8heKWo5JkgSBKgXpyhh11A6wteXwp9d_Isd7bTPVsB5JUfwmRIgaiQnPUxsmbD86ib3ZObHYML7tNC4eYqL6p8Y1W6hioWCa7fsD9KkO8mcaet_9ErpTZgvdbhROisIaUAwlrPUmuELx78slqzR