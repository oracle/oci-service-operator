size="14" lengthAdjust="spacing" textLength="121.3994" x="356.6021" y="1098.7803">service: cloudguard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5371" x="356.6021" y="1112.7803">slug: cloudguardtargets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4131" x="356.6021" y="1126.7803">kind: CloudGuardTargets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="356.6021" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="356.6021" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="356.6021" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="356.6021" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="356.6021" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="356.6021" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="356.6021" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="356.6021" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="356.6021" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="356.6021" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="356.6021" y="1280.7803">promotion.</text><ellipse cx="319.6021" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="319.6021" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="319.6021" x2="319.6021" y1="65" y2="85"/><polygon fill="#0F172A" points="315.6021,75,319.6021,85,323.6021,75,319.6021,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="319.6021" x2="319.6021" y1="133" y2="153"/><polygon fill="#0F172A" points="315.6021,143,319.6021,153,323.6021,143,319.6021,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="319.6021" x2="319.6021" y1="201" y2="221"/><polygon fill="#0F172A" points="315.6021,211,319.6021,221,323.6021,211,319.6021,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="319.6021" x2="319.6021" y1="269" y2="289"/><polygon fill="#0F172A" points="315.6021,279,319.6021,289,323.6021,279,319.6021,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="161.082" x2="161.082" y1="439" y2="459"/><polygon fill="#0F172A" points="157.082,449,161.082,459,165.082,449,161.082,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="253.9126" x2="161.082" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="161.082" x2="161.082" y1="383" y2="405"/><polygon fill="#0F172A" points="157.082,395,161.082,405,165.082,395,161.082,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="385.2915" x2="478.1221" y1="383" y2="383"/><line style="strok