textLength="291.0469" x="396.2573" y="1098.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="396.2573" y="1112.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="97.2686" x="396.2573" y="1126.7803">service: devops</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.1855" x="396.2573" y="1140.7803">slug: devopsrepositorycommit</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.0684" x="396.2573" y="1154.7803">kind: DevopsRepositoryCommit</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="396.2573" y="1168.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="396.2573" y="1182.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="396.2573" y="1196.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="396.2573" y="1210.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="396.2573" y="1224.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="396.2573" y="1238.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="396.2573" y="1252.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="396.2573" y="1266.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="396.2573" y="1280.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="396.2573" y="1294.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="396.2573" y="1308.7803">promotion.</text><ellipse cx="359.2573" cy="1137" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="359.2573" cy="1137" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="359.2573" x2="359.2573" y1="65" y2="85"/><polygon fill="#0F172A" points="355.2573,75,359.2573,85,363.2573,75,359.2573,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="359.2573" x2="359.2573" y1="133" y2="153"/><polygon fill="#0F172A" points="355.2573,143,359.2573,153,363.2573,143,359.2573,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="359.2573" x2="359.2573" y1="201" y2="221"/><polygon fill="#0F172A" points="355.2573,211,359.2573,221,363.2573,211,359.2573,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="359.2573" x2="359.2573" y1="283" y2="303"/><polygon fill="#0F172A" points="355.2573,293,359.2573,303,363.2573,293,359.2573,297" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="180.9097" x2="180.9097" y1="453" y2="473"/><polygon fill="#0F172A" points="176.9097,463,180.9097,473,184.9097,463,180.9097,467" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="293.5679" x2="180.9097" y1="3