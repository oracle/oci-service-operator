.8253" y="361"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="660.8253" y="381.7803">Create the OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2949" x="660.8253" y="395.7803">CreateDevopsDeployPipeline when no reusable</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0479" x="660.8253" y="409.7803">match is found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="666.025" y="443"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="676.025" y="463.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="676.025" y="477.7803">into status</text><polygon fill="#E2E8F0" points="658.007,497,670.007,509,658.007,521,646.007,509,658.007,497" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="595.8307,553,720.1832,553,732.1832,565,720.1832,577,595.8307,577,583.8307,565,595.8307,553" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="595.8307" y="568.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="562.0446" y="561.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="732.1832" y="561.7803">no</text><rect fill="none" height="363" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="587"/><path d="M61.4688,587 L61.4688,594 L51.4688,604 L11,604" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="598.7803">Delete</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="310.2881" x="184.6001" y="621"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2881" x="194.6001" y="641.7803">Delete path uses DeleteDevopsDeployPipeline</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5918" x="194.6001" y="655.7803">with required via GetDevopsDeployPipeline or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6748" x="194.6001" y="669.7803">ListDevopsDeployPipeline to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="194.6001" y="683.7803">confirmation</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="311.04" x="184.2241" y="732"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.04" x="194.2241" y="752.7803">Confirm deletion via GetDevopsDeployPipeline</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0332" x="194.2241" y="766.7803">or ListDevopsDeployPipeline until OCI reaches</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5723" x="194.2241" y="780.7803">DELETED</text><polygon fill="#E2E8F0" points="191.5718,826,487.9165,826,499.9165,838,487.9165,850,191.5718,850,179.5718,838,191.5718,826" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="841.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="834.7803">yes<