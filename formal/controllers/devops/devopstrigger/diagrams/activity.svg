86" x="325.4644" y="1098.7803">service: devops</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="118.2891" x="325.4644" y="1112.7803">slug: devopstrigger</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="125.2754" x="325.4644" y="1126.7803">kind: DevopsTrigger</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="325.4644" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="325.4644" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="325.4644" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="325.4644" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="325.4644" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="325.4644" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="325.4644" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="325.4644" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="325.4644" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="325.4644" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="325.4644" y="1280.7803">promotion.</text><ellipse cx="288.4644" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="288.4644" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="288.4644" x2="288.4644" y1="65" y2="85"/><polygon fill="#0F172A" points="284.4644,75,288.4644,85,292.4644,75,288.4644,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="288.4644" x2="288.4644" y1="133" y2="153"/><polygon fill="#0F172A" points="284.4644,143,288.4644,153,292.4644,143,288.4644,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="288.4644" x2="288.4644" y1="201" y2="221"/><polygon fill="#0F172A" points="284.4644,211,288.4644,221,292.4644,211,288.4644,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="288.4644" x2="288.4644" y1="269" y2="289"/><polygon fill="#0F172A" points="284.4644,279,288.4644,289,292.4644,279,288.4644,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="145.5132" x2="145.5132" y1="439" y2="459"/><polygon fill="#0F172A" points="141.5132,449,145.5132,459,149.5132,449,145.5132,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="222.7749" x2="145.5132" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="145.5132" x2="145.5132" y1="383" y2="405"/><polygon fill="#0F172A" points="141.5132,395,145.5132,405,149.5132,395,145.5132,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="354.1538" x2="431.4155" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="431.4155" x2="431.4