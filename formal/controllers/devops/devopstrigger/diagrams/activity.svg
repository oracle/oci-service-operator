" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="166.6685" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.7715" x="139.5786" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0264" x="149.5786" y="755.7803">Delete path uses DeleteDevopsTrigger with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.7578" x="149.5786" y="769.7803">required via GetDevopsTrigger or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7715" x="149.5786" y="783.7803">ListDevopsTrigger to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="148.8994" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="158.8994" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="158.8994" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="131.7549" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="141.7549" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M319.4644,929 L319.4644,1105 L299.4644,1109 L319.4644,1113 L319.4644,1289 A0,0 0 0 0 319.4644,1289 L659.5044,1289 A0,0 0 0 0 659.5044,1289 L659.5044,939 L649.5044,929 L319.4644,929 A0,0 0 0 0 319.4644,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M649.5044,929 L649.5044,939 L659.5044,939 L649.5044,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-fami