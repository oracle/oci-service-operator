57" x="159.301" y="241.7803">Resolve OCI state via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.9854" x="159.301" y="255.7803">GetDevopsRepositoryAuthors with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7783" x="159.301" y="269.7803">ListDevopsRepositoryAuthors fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="118.5701" y="303"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0605" x="128.5701" y="323.7803">Use scaffold_devops_devopsrepositoryauthors</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="128.5701" y="337.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="128.5701" y="351.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="223.5007,385,330.8796,385,342.8796,397,330.8796,409,223.5007,409,211.5007,397,223.5007,385" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="223.5007" y="400.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="189.7146" y="393.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="342.8796" y="393.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="227.7783" x="30.4619" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1787" x="40.4619" y="439.7803">Update path calls</text><text fill="#0F172A" font-family="Helvetica" font-