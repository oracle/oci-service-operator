.4688" x="14" y="598.7803">Delete</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1025" x="193.1929" y="621"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3574" x="203.1929" y="641.7803">Delete path uses DeleteDeployArtifact with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.0889" x="203.1929" y="655.7803">required via GetDeployArtifact or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1025" x="203.1929" y="669.7803">ListDeployArtifact to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="309.4404" x="185.0239" y="718"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6611" x="195.0239" y="738.7803">Confirm deletion via GetDeployArtifact or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4404" x="195.0239" y="752.7803">ListDeployArtifact until OCI reaches DELETED</text><polygon fill="#E2E8F0" points="191.5718,795,487.9165,795,499.9165,807,487.9165,819,191.5718,819,179.5718,807,191.5718,795" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="810.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="803.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="803.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="829"/><text fill="#0F172A" font-family="Helvetica" font-size="14" len