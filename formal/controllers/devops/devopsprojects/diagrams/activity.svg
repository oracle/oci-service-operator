2686" x="331.6919" y="1098.7803">service: devops</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="127.627" x="331.6919" y="1112.7803">slug: devopsprojects</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="131.5029" x="331.6919" y="1126.7803">kind: DevopsProjects</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="331.6919" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="331.6919" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="331.6919" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="331.6919" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="331.6919" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="331.6919" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="331.6919" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="331.6919" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="331.6919" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="331.6919" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="331.6919" y="1280.7803">promotion.</text><ellipse cx="294.6919" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="294.6919" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="294.6919" x2="294.6919" y1="65" y2="85"/><polygon fill="#0F172A" points="290.6919,75,294.6919,85,298.6919,75,294.6919,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="294.6919" x2="294.6919" y1="133" y2="153"/><polygon fill="#0F172A" points="290.6919,143,294.6919,153,298.6919,143,294.6919,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="294.6919" x2="294.6919" y1="201" y2="221"/><polygon fill="#0F172A" points="290.6919,211,294.6919,221,298.6919,211,294.6919,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="294.6919" x2="294.6919" y1="269" y2="289"/><polygon fill="#0F172A" points="290.6919,279,294.6919,289,298.6919,279,294.6919,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="148.627" x2="148.627" y1="439" y2="459"/><polygon fill="#0F172A" points="144.627,449,148.627,459,152.627,449,148.627,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="229.0024" x2="148.627" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="148.627" x2="148.627" y1="383" y2="405"/><polygon fill="#0F172A" points="144.627,395,148.627,405,152.627,395,148.627,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="360.3813" x2="440.7568" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="440.7568" x2="440.7568" y1="3