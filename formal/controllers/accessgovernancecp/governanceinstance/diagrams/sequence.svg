"#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="844" y="1819.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="844" y="1833.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="844" y="1847.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="844" y="1861.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="844" y="1875.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="844" y="1889.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6475" x="844" y="1903.7803">service: accessgovernancecp</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7715" x="844" y="1917.7803">slug: governanceinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6543" x="844" y="1931.7803">kind: GovernanceInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="844" y="1945.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="844" y="1959.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="844" y="1973.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="844" y="1987.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="844" y="2001.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="844" y="2015.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="844" y="2029.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="844" y="2043.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="844" y="2057.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="844" y="2071.7803">displayName, freeformTags (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="844" y="2085.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2129" x="844" y="2099.7803">compartmentId, idcsAccessToken, systemTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="123.7373" x="844" y="2113.7803">tenancyNamespace</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5371" x="844" y="2127.7803">create-only fields: idcsAccessToken</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="844" y="2141.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6602" x="844" y="2155.7803">oci_access_governance_cp_governance_instances</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3301" x="844" y="2169.7803">filters compartmentId, displayName, id; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5576" x="844" y="2183.7803">compartmentId plus displayName list match with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.0742" x="844" y="2197.7803">matching licenseType, then GetGovernanceInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="336.1572" x="844" y="2211.7803">confirms tenancyNamespace and reusable ACTIVE or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4268" x="844" y="2225.7803">CREATING lifecycle; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="844" y="2239.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="844" y="2253.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="844" y="2267.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6611" x="844" y="2281.7803">provisioning, ACTIVE as success, DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8818" x="844" y="2295.7803">terminating, and DELETED as the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.8818" x="844" y="2309.7803">delete-confirmation target; NEEDS_ATTENTION is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="844" y="2323.7803">terminal failure without requeue.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="844" y="2337.7803">Create, update, and delete responses expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1641" x="844" y="2351.7803">work-request headers, but the SDK exposes no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.8887" x="844" y="2365.7803">matching GetWorkRequest or ListWorkRequests</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6953" x="844" y="2379.7803">helpers. The runtime records those breadcrumbs</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0264" x="844" y="2393.7803">without polling them directly and relies on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0752" x="844" y="2407.7803">lifecycle rereads instead.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5576" x="844" y="2421.7803">Pre-create reuse lists by exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3301" x="844" y="2435.7803">plus displayName, narrows to matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6816" x="844" y="2449.7803">licenseType summaries, then rereads each</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.4121" x="844" y="2463.7803">candidate through GetGovernanceInstance so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9365" x="844" y="2477.7803">tenancyNamespace must also match before reuse.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4541" x="844" y="2491.7803">Only displayName, description, licenseType,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="844" y="2505.7803">freeformTags, and definedTags reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0264" x="844" y="2519.7803">place; compartmentId, tenancyNamespace,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1025" x="844" y="2533.7803">idcsAccessToken, and systemTags remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1572" x="844" y="2547.7803">replacement-only drift, and compartment changes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.709" x="844" y="2561.7803">stay out of scope for the published runtime.</text><?plantuml-src hLXRRnkv5Nxdho2sBmagsV4csStAI06lxQP6l7PXk-sBWO2QuKYiPuPJaYD5BVQ_zpkyZ6QaaTUBBFmWYvTp_Svt3cMVLDq88ofkboBNQrKlU25AAvdjTkOYUreOtTRvkIwruNygClpblHEvB4HRkh_gsjs8IlA_oN8bdSh4-9bxzL_9JzxrDeKnUXsblobEVlo-VxFMJlwyPqDH_9Z_i7jAcroQU6B-xltRDp_jd23rSV_jstSdxz_tzhtuJ9jQ6dxo0tFAbPBVo_-qiiuadtAHPTBQXLv9KmiiPStnf-xBLMqTVRAboYKlj7Pp_RKdt2Ov_sCSafms0sEZqsbhrrlvlVnGlC4sX26kgX6r6x_VF_0IARs0T39ALSXhLG_3-TCxyNR-0RiaiXbiPVFylJpfjlPIzQ4GHSP-PTut_hcT8sRIISjwTl1p669qMKepMFvPM7adCrrdQdVhkzlxsy_tqgnK9dyHjLX8ynqNbW-N1bTkpwyOmO1JtdPaJtRkeI2CpBcHLfUjKxgUnQNZN8a5ScgFm_VfziWqfVd8hXP9GYvBU7lmTjWUtfHrxk7Aji7Yqx_qOZJZiiRvLl9z2CBaw1FRNg3hGtzdlFl_bI7brhrcmoDqQHYLsLOu_BAA_1if0Wy4Vgtr4pu4d9chEcUYTDmPm0EN00JvjIcH69yLZggfKN4RBaeZHRx1hhBEig5wCWYdP_oJT2Dg9OYhqz19L9PNobfGso5frr2rByw-AbJffB6pnphJ5