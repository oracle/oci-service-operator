<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="858px" preserveAspectRatio="none" style="width:3024px;height:858px;background:#FCFCFD;" version="1.1" viewBox="0 0 3024 858" width="3024px" zoomAndPan="magnify"><title>State Machine - generativeaiagentruntime/Session</title><defs/><g><rect fill="#FCFCFD" height="858" style="stroke:none;stroke-width:1;" width="3024" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="334.5439" x="1337.801" y="20.7803">State Machine - generativeaiagentruntime/Session</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="179" y="229"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="179" x2="443.3643" y1="253" y2="253"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="284.7271" y="244.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="184" y="268.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="184" y="282.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="768.36" y="294"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="773.36" y="317.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1537.04" y="347"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1542.04" y="370.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1527.32" y="228"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1532.32" y="251.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="960.82" y="153"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="966.7546" y="176.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1102.56" y="404"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1107.56" y="427.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1135.23" y="243"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1140.23" y="266.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="1888.55" y="148"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="1893.55" y="171.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="2935.44" y="102"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="2940.44" y="125.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="2474.86" y="102"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2479.86" y="125.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="31" id="ent0002"><ellipse cx="16" cy="260" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="49" id="ent0003"><path d="M1763.23,231 L1763.23,452.89 L1587.89,378.09 L1763.23,460.89 L1763.23,841 A8,8 0 0 0 1771.23,849 L2107.7114,849 A8,8 0 0 0 2115.7114,841 L2115.7114,233 L2105.7114,223 L1771.23,223 A8,8 0 0 0 1763.23,231" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2105.7114,223 L2105.7114,229 A4,4 0 0 0 2109.7114,233 L2115.7114,233 L2105.7114,223" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="1769.23" y="238.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="1769.23" y="252.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="1769.23" y="266.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="1769.23" y="280.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="1769.23" y="294.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="1769.23" y="308.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="1769.23" y="322.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="1769.23" y="336.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="1769.23" y="350.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.1162" x="1769.23" y="364.7803">service: generativeaiagentruntime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9307" x="1769.23" y="378.7803">slug: session</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.2686" x="1769.23" y="392.7803">kind: Session</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="1769.23" y="406.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="1769.23" y="420.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="1769.23" y="434.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="1769.23" y="448.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="1769.23" y="462.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="1769.23" y="476.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="1769.23" y="490.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="1769.23" y="504.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="1769.23" y="518.7803">supported drift: description, displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="1769.23" y="532.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.9785" x="1769.23" y="546.7803">agentEndpointId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="1769.23" y="560.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="1769.23" y="574.7803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="1769.23" y="588.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="1769.23" y="602.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.3154" x="1769.23" y="616.7803">Session create and update are synchronous reread</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8057" x="1769.23" y="630.7803">flows. OCI returns the body immediately and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4541" x="1769.23" y="644.7803">model exposes no lifecycle or work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="1769.23" y="658.7803">surface, so the reviewed runtime settles Active</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2959" x="1769.23" y="672.7803">after a confirmed reread.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1572" x="1769.23" y="686.7803">The published runtime keeps path identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="1769.23" y="700.7803">explicit: agentEndpointId is required from spec,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="1769.23" y="714.7803">sessionId is learned from the OCI body, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4951" x="1769.23" y="728.7803">status records both values for reread, update,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.6611" x="1769.23" y="742.7803">and delete addressing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8193" x="1769.23" y="756.7803">No ListSessions API exists in the pinned SDK, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5918" x="1769.23" y="770.7803">the controller does not publish list-based</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3643" x="1769.23" y="784.7803">pre-create reuse or delete-confirmation fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.9102" x="1769.23" y="798.7803">semantics.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="1769.23" y="812.7803">Delete confirmation relies on GetSession</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5156" x="1769.23" y="826.7803">returning NotFound after DeleteSession because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5713" x="1769.23" y="840.7803">delete responses carry headers only.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="95" id="ent0006"><path d="M2450.71,185 L2450.71,193.27 L1990.88,170.89 L2450.71,201.27 L2450.71,221 A8,8 0 0 0 2458.71,229 L2643.4336,229 A8,8 0 0 0 2651.4336,221 L2651.4336,187 L2641.4336,177 L2458.71,177 A8,8 0 0 0 2450.71,185" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2641.4336,177 L2641.4336,183 A4,4 0 0 0 2645.4336,187 L2651.4336,187 L2641.4336,177" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2456.71" y="192.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9922" x="2456.71" y="206.7803">delete observe: GetSession</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.7236" x="2456.71" y="220.7803">delete targets: NOT_FOUND</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="31" id="lnk3"><path d="M26.42,260 C50.44,260 110.44,260 172.75,260" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="178.75,260,169.75,256,173.75,260,169.75,264,178.75,260" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8271" x="57" y="255.7803">CreateSession</text></g><!--link observe to evaluate_ready--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="32" id="lnk4"><path d="M443.58,273.98 C549.34,285.23 686.4237,299.8049 762.0437,307.8549" fill="none" id="observe-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="768.01,308.49,759.484,303.5598,763.0381,307.9607,758.6371,311.5148,768.01,308.49" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="541.86" y="273.2503">OCI state in ACTIVE</text></g><!--link observe to failed--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="33" id="lnk5"><path d="M443.47,243.02 C608.06,221.73 872.6396,187.5097 954.5896,176.9097" fill="none" id="observe-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="960.54,176.14,951.1012,173.3276,955.5813,176.7814,952.1275,181.2615,960.54,176.14" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="474.36" y="201.2003">unresolved OCI error or non-success state</text></g><!--link evaluate_ready to reject_unsupported_drift--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="34" id="lnk6"><path d="M837.19,334.23 C852.01,352.13 876.15,377.32 903.32,390 C965.99,419.25 1038.9404,426.3441 1096.3304,426.9741" fill="none" id="evaluate_ready-to-reject_unsupported_drift" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1102.33,427.04,1093.3744,422.9414,1097.3303,426.9851,1093.2866,430.941,1102.33,427.04" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9512" x="914.32" y="371.7803">force-new or conflicting</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9375" x="945.8268" y="385.7803">drift detected</text></g><!--link reject_unsupported_drift to ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0004" data-link-type="dependency" data-source-line="