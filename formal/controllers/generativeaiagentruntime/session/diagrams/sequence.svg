403,1043,920.8403,1047,924.8403,1043" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="671.4829" x2="926.8403" y1="1043" y2="1043"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="678.4829" y="995.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="678.4829" y="1009.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="678.4829" y="1023.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="678.4829" y="1037.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg15"><polygon fill="#0F172A" points="920.8403,1109,930.8403,1113,920.8403,1117,924.8403,1113" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="671.4829" x2="926.8403" y1="1113" y2="1113"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0752" x="678.4829" y="1065.7803">apply follow-up strategy</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8926" x="678.4829" y="1079.7803">create=read-after-write;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.8027" x="678.4829" y="1093.7803">update=read-after-write;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.0234" x="678.4829" y="1107.7803">delete=confirm-delete</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg16"><polygon fill="#0F172A" points="414.9048,1158,404.9048,1162,414.9048,1166,410.9048,1162" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="408.9048" x2="670.4829" y1="1162" y2="1162"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="420.9048" y="1142.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="420.9048" y="1156.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg17"><polygon fill="#0F172A" points="246.9194,1193,236.9194,1197,246.9194,1201,242.9194,1197" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="240.9194" x2="402.9048" y1="1197" y2="1197"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="252.9194" y="1191.7803">requeue on terminating</text></g><path d="M676,1218 L676,1898 A8,8 0 0 0 684,1906 L1007,1906 A8,8 0 0 0 1015,1898 L1015,1220 L1005,1210 L684,1210 A8,8 0 0 0 676,1218" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1005,1210 L1005,1216 A4,4 0 0 0 1009,1220 L1015,1220 L1005,1210" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="682" y="1225.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="682" y="1239.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="682" y="1253.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="682" y="1267.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="682" y="1281.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="682" y="1295.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="682" y="1309.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="682" y="1323.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="682" y="1337.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="682" y="1351.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="682" y="1365.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="682" y="1379.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="682" y="1393.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="682" y="1407.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.1162" x="682" y="1421.7803">service: generativeaiagentruntime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9307" x="682" y="1435.7803">slug: session</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.2686" x="682" y="1449.7803">kind: Session</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="682" y="1463.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="682" y="1477.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="682" y="1491.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="682" y="1505.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="682" y="1519.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="682" y="1533.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="682" y="1547.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="682" y="1561.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="682" y="1575.7803">supported drift: description, displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="682" y="1589.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.9785" x="682" y="1603.7803">agentEndpointId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="682" y="1617.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="682" y="1631.7803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="682" y="1645.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="682" y="1659.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.3154" x="682" y="1673.7803">Session create and update are synchronous reread</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8057" x="682" y="1687.7803">flows. OCI returns the body immediately and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4541" x="682" y="1701.7803">model exposes no lifecycle or work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="682" y="1715.7803">surface, so the reviewed runtime settles Active</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2959" x="682" y="1729.7803">after a confirmed reread.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1572" x="682" y="1743.7803">The published runtime keeps path identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="682" y="1757.7803">explicit: agentEndpointId is required from spec,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="682" y="1771.7803">sessionId is learned from the OCI body, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4951" x="682" y="1785.7803">status records both values for reread, update,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.6611" x="682" y="1799.7803">and delete addressing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8193" x="682" y="1813.7803">No ListSessions API exists in the pinned SDK, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5918" x="682" y="1827.7803">the controller does not publish list-based</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3643" x="682" y="1841.7803">pre-create reuse or delete-confirmation fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.9102" x="682" y="1855.7803">semantics.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="682" y="1869.7803">Delete confirmation relies on GetSession</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5156" x="682" y="1883.7803">returning NotFound after DeleteSession because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5713" x="682" y="1897.7803">delete responses carry headers only.</text><?plantuml-src fLZRSjis47t7Ls3IbtP6bECupaMPT2QnUyd4JJfH--ONY5nAg2c01K0fQgV_thCWI96orBZjP9AOn6AlPyykxU-qgPLJQ-bNgh1RRPQoL9KduVkJXShlbiusfhYobNNogpB7ds8WKL2fcYfyRqtueDOaVwHgGq7dwhZCNFz1ylpfu50vPxT9--Fo_FcJuKrZ0xszvqDPFY-U7KfPLv1B4ekdbnUFNnv8iFbqVd7nzFpoSd0UrUVM6NBo_9a8EbGav_HxGoOdcSabuKG5lI6b5Hw2QqpGQpgRa_VQ6h7I1SdIsh2mdmTwVQVYJo6boeDr8pzJlDtHOQ3qX5wKZt4CPKYfhfK9n-yF1HwYPP2BNaUbIxhHPfp9bq_LnU85JbbbFJhA5yKbdVT7zwhqebHbBluICJRvlbaGqXl8Yu4VyWgEE5jLv4QltofFdoYt9jU7Huy-pZ--dvFRw9n-KWRLS8-aydByQdJbuzKxmGYGTeFwZdLF3kwX5nmLqf6tLHDGs