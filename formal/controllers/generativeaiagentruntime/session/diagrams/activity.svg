th:0.5;"/><path d="M1018.0276,1566.5 L1018.0276,1576.5 L1028.0276,1576.5 L1018.0276,1566.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="694.7122" y="1582.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="694.7122" y="1596.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="694.7122" y="1610.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="694.7122" y="1624.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="694.7122" y="1638.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="694.7122" y="1652.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="694.7122" y="1666.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="694.7122" y="1680.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="694.7122" y="1694.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="694.7122" y="1708.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="694.7122" y="1722.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.1162" x="694.7122" y="1736.2803">service: generativeaiagentruntime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9307" x="694.7122" y="1750.2803">slug: session</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.2686" x="694.7122" y="1764.2803">kind: Session</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="694.7122" y="1778.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="694.7122" y="1792.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="694.7122" y="1806.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="694.7122" y="1820.2803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="694.7122" y="1834.2803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="694.7122" y="1848.2803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="694.7122" y="1862.2803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="694.7122" y="1876.2803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="694.7122" y="1890.2803">supported drift: description, displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="694.7122" y="1904.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.9785" x="694.7122" y="1918.2803">agentEndpointId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="694.7122" y="1932.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="694.7122" y="1946.2803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="694.7122" y="1960.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="694.7122" y="1974.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.3154" x="694.7122" y="1988.2803">Session create and update are synchronous reread</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8057" x="694.7122" y="2002.2803">flows. OCI returns the body immediately and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4541" x="694.7122" y="2016.2803">model exposes no lifecycle or work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="694.7122" y="2030.2803">surface, so the reviewed runtime settles Active</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2959" x="694.7122" y="2044.2803">after a confirmed reread.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1572" x="694.7122" y="2058.2803">The published runtime keeps path identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="694.7122" y="2072.2803">explicit: agentEndpointId is required from spec,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="694.7122" y="2086.2803">sessionId is learned from the OCI body, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4951" x="694.7122" y="2100.2803">status records both values for reread, update,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.6611" x="694.7122" y="2114.2803">and delete addressing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8193" x="694.7122" y="2128.2803">No ListSessions API exists in the pinned SDK, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5918" x="694.7122" y="2142.2803">the controller does not publish list-based</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3643" x="694.7122" y="2156.2803">pre-create reuse or delete-confirmation fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.9102" x="694.7122" y="2170.2803">semantics.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="694.7122" y="2184.2803">Delete confirmation relies on GetSession</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5156" x="694.7122" y="2198.2803">returning NotFound after DeleteSession because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5713" x="694.7122" y="2212.2803">delete responses carry headers only.</text><ellipse cx="657.7122" cy="1893.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="657.7122" cy="1893.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="657.7122" x2="657.7122" y1="157" y2="177"/><polygon fill="#0F172A" points="653.7122,167,657.7122,177,661.7122,167,657.7122,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="824.196" x2="824.196" y1="327" y2="347"/><polygon fill="#0F172A" points="820.196,337,824.196,347,828.196,337,824.196,341" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="516.2463" x2="491.2283" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="491.2283" x2="491.2283" y1="257" y2="279"/><polygon fill="#0F172A" points="487.2283,269,491.2283,279,495.2283,269,491.2283,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="799.178" x2="824.196" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="824.196" x2="824.196" y1="257" y2="279"/><polygon fill="#0F172A" points="820.196,269,824.196,279,828.196,269,824.196,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="491.2283" x2="491.2283" y1="313" y2="413"/><line style="stroke:#0F172A;stroke-width:1;" x1="491.2283" x2="645.7122" y1="413" y2="413"/><polygon fill="#0F172A" points="635.7122,409,645.7122,413,635.7122,417,639.7122,413" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="824.196" x2="824.196" y1="395" y2="413"/><line style="stroke:#0F172A;stroke-width:1;" x1="824.196" x2="669.7122" y1="413" y2="413"/><polygon fill="#0F172A" points="679.7122,409,669.7122,413,679.7122,417,675.7122,413" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1=