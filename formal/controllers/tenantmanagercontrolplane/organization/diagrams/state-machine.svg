<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="690px" preserveAspectRatio="none" style="width:2451px;height:690px;background:#FCFCFD;" version="1.1" viewBox="0 0 2451 690" width="2451px" zoomAndPan="magnify"><title>State Machine - tenantmanagercontrolplane/Organization</title><defs/><g><rect fill="#FCFCFD" height="690" style="stroke:none;stroke-width:1;" width="2451" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="380.3926" x="1027.4344" y="20.7803">State Machine - tenantmanagercontrolplane/Organization</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="144" y="498"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="144" x2="408.3643" y1="522" y2="522"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="249.7271" y="513.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="149" y="537.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="149" y="551.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1205.36" y="341"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1210.36" y="364.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1978.32" y="341"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1983.32" y="364.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1222.88" y="468"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1227.88" y="491.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1232.84" y="603"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1238.7746" y="626.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="686.44" y="452"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="691.44" y="475.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1553.56" y="341"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1558.56" y="364.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1586.23" y="416"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1591.23" y="439.7803">ApplyUpdate</text><g class="start_entity" data-qualified-name=".start." data-source-line="29" id="ent0002"><ellipse cx="16" cy="529" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="46" id="ent0003"><path d="M2089.78,49 L2089.78,357 L2029.05,361 L2089.78,365 L2089.78,673 A8,8 0 0 0 2097.78,681 L2434.2614,681 A8,8 0 0 0 2442.2614,673 L2442.2614,51 L2432.2614,41 L2097.78,41 A8,8 0 0 0 2089.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2432.2614,41 L2432.2614,47 A4,4 0 0 0 2436.2614,51 L2442.2614,51 L2432.2614,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2095.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2095.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2095.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2095.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2095.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2095.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2095.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2095.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2095.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5781" x="2095.78" y="182.7803">service: tenantmanagercontrolplane</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7373" x="2095.78" y="196.7803">slug: organization</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8408" x="2095.78" y="210.7803">kind: Organization</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2095.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="2095.78" y="238.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2095.78" y="252.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2095.78" y="266.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2095.78" y="280.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="324.9121" x="2095.78" y="294.7803">follow-up: create=none; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.1885" x="2095.78" y="308.7803">GetOrganization; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="2095.78" y="322.7803">supported drift: default_ucm_subscription_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2095.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.1162" x="2095.78" y="350.7803">compartment_id, organization_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2095.78" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="2095.78" y="378.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1982" x="2095.78" y="392.7803">oci_tenantmanagercontrolplane_organizations</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="137.7168" x="2095.78" y="406.7803">filters compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2095.78" y="420.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2095.78" y="434.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9092" x="2095.78" y="448.7803">The published Organization contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8398" x="2095.78" y="462.7803">bind-existing plus update-only. Reconcile binds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.2539" x="2095.78" y="476.7803">by explicit organizationId or a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9297" x="2095.78" y="490.7803">ListOrganizations match on compartmentId, and it</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.7715" x="2095.78" y="504.7803">never invents a create path.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0469" x="2095.78" y="518.7803">Update only reconciles defaultUcmSubscriptionId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8125" x="2095.78" y="532.7803">and resumes through GetWorkRequest until a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9092" x="2095.78" y="546.7803">follow-up GetOrganization read confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.2266" x="2095.78" y="560.7803">bound organization state.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="2095.78" y="574.7803">Delete is CR-local unbind only. The controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1025" x="2095.78" y="588.7803">clears the finalizer immediately, never calls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1572" x="2095.78" y="602.7803">OCI delete helpers, and treats observed DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5781" x="2095.78" y="616.7803">or DELETED organization lifecycle as terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.4121" x="2095.78" y="630.7803">read state rather than managed delete progress.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5713" x="2095.78" y="644.7803">FAILED remains terminal non-success and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="2095.78" y="658.7803">Kubernetes secret side effects are part of this</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.0205" x="2095.78" y="672.7803">rollout.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="29" id="lnk3"><path d="M26.5,529 C46.42,529 88.8,529 137.64,529" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="143.64,529,134.64,525,138.64,529,134.64,533,143.64,529" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.0273" x="57" y="524.7803">reconcile</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="30" id="lnk4"><path d="M408.64,513.05 C499.55,502.01 610.3337,488.5731 680.1837,480.0931" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="686.14,479.37,676.7235,476.4838,681.1764,479.9726,677.6877,484.4255,686.14,479.37" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="439.36" y="487.8403">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="31" id="lnk5"><path d="M809.78,459.27 C840,453.03 877.08,445.48 910.36,439 C1027.93,416.12 1059.69,421.07 1175.36,390 C1185.08,387.39 1189.6138,386.1043 1199.3938,382.7543" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1205.07,380.81,1195.2594,379.9423,1200.3398,382.4303,1197.8519,387.5106,1205.07,380.81" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="965.86" y="371.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="1017.6217" y="385.7803">ACTIVE</text></g><!--link resolve_by_lookup to retryable--><g class="link" data-entity-1="ent0007" data-entity-2="ent0005" data-link-type="dependency" data-source-line="32" id="lnk6"><path d="M809.63,473.91 C917.21,477.3 1131.803,484.0612 1216.593,486.7312" fill="none" id="resolve_by_lookup-to-retryable" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1222.59,486.92,1213.7204,482.6387,1217.5925,486.7626,1213.4686,490.6348,1222.59,486.92" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0342" x="965.86" y="458.9603">OCI state in CREATING,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.1309" x="967.8117" y="472.9603">UPDATING, DELETING</text></g><!--link resolve_by_lookup to failed--><g class="link" data-entity-1="ent0007" data-entity-2="ent0006" data-link-type="dependency" data-source-line="33" id="lnk7"><path d="M809.63,490.06 C921.69,523.37 1150.6088,591.4203 1226.6988,614.0403" fill="none" id="resolve_by_lookup-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1232.45,615.75,1224.9629,609.3512,1227.6573,614.3252,1222.6833,617.0196,1232.45,615.75" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="911.36" y="516.6203">unresolved OCI error or non-success state</text></g><!--link observe to evaluate_ready--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="34" id="lnk8"><path d="M353.96,497.64 C380.45,487.43 410.47,476.55 438.36,468 C644.5,404.82 696.22,381.06 910.36,356 C1014.33,343.83 1131.0497,350.0341 1198.9897,355.5541" fill="none" id="observe-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1204.97,356.04,1196.3235,351.3243,1199.9864,355.6351,1195.6756,359.298,1204.97,356.04" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="H