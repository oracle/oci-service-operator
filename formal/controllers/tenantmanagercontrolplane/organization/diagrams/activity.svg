1692 L795.2817,1692 L785.2817,1682" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="455.3696" y="1697.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="455.3696" y="1711.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="455.3696" y="1725.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="455.3696" y="1739.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="455.3696" y="1753.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="455.3696" y="1767.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="455.3696" y="1781.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="455.3696" y="1795.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="455.3696" y="1809.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="455.3696" y="1823.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="455.3696" y="1837.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5781" x="455.3696" y="1851.7803">service: tenantmanagercontrolplane</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7373" x="455.3696" y="1865.7803">slug: organization</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8408" x="455.3696" y="1879.7803">kind: Organization</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="455.3696" y="1893.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="455.3696" y="1907.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="455.3696" y="1921.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="455.3696" y="1935.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="455.3696" y="1949.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="324.9121" x="455.3696" y="1963.7803">follow-up: create=none; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.1885" x="455.3696" y="1977.7803">GetOrganization; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="455.3696" y="1991.7803">supported drift: default_ucm_subscription_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="455.3696" y="2005.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.1162" x="455.3696" y="2019.7803">compartment_id, organization_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="455.3696" y="2033.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="455.3696" y="2047.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1982" x="455.3696" y="2061.7803">oci_tenantmanagercontrolplane_organizations</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="137.7168" x="455.3696" y="2075.7803">filters compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="455.3696" y="2089.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="455.3696" y="2103.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9092" x="455.3696" y="2117.7803">The published Organization contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8398" x="455.3696" y="2131.7803">bind-existing plus update-only. Reconcile binds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.2539" x="455.3696" y="2145.7803">by explicit organizationId or a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9297" x="455.3696" y="2159.7803">ListOrganizations match on compartmentId, and it</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.7715" x="455.3696" y="2173.7803">never invents a create path.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0469" x="455.3696" y="2187.7803">Update only reconciles defaultUcmSubscriptionId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8125" x="455.3696" y="2201.7803">and resumes through GetWorkRequest until a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9092" x="455.3696" y="2215.7803">follow-up GetOrganization read confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.2266" x="455.3696" y="2229.7803">bound organization state.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="455.3696" y="2243.7803">Delete is CR-local unbind only. The controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1025" x="455.3696" y="2257.7803">clears the finalizer immediately, never calls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1572" x="455.3696" y="2271.7803">OCI delete helpers, and treats observed DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5781" x="455.3696" y="2285.7803">or DELETED organization lifecycle as terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.4121" x="455.3696" y="2299.7803">read state rather than managed delete progress.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5713" x="455.3696" y="2313.7803">FAILED remains terminal non-success and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="455.3696" y="2327.7803">Kubernetes secret side effects are part of this</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.0205" x="455.3696" y="2341.7803">rollout.</text><ellipse cx="418.3696" cy="2016" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="418.3696" cy="2016" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="418.3696" x2="418.3696" y1="157" y2="177"/><polygon fill="#0F172A" points="414.3696,167,418.3696,177,422.3696,167,418.3696,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="569.8354" x2="569.8354" y1="327" y2="347"/><polygon fill="#0F172A" points="565.8354,337,569.8354,347,573.8354,337,569.8354,341" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="276.9038" x2="266.9038" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="266.9038" x2="266.9038" y1="257" y2="279"/><polygon fill="#0F172A" points="262.9038,269,266.9038,279,270.9038,269,266.9038,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="559.8354" x2="569.8354" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="569.8354" x2="569.8354" y1="257" y2="279"/><polygon fill="#0F172A" points="565.8354,269,569.8354,279,573.8354,269,569.8354,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="266.9038" x2="266.9038" y1="327" y2="413"/><line style="stroke:#0F172A;stroke-width:1;" x1="266.9038" x2="406.3696" y1="413" y2="413"/><polygon fill="#0F172A" points="396.3696,409,406.3696,413,396.3696,417,400.3696,413" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="569.8354" x2="569.8354" y1="395" y2="413"/><line style="stroke:#0F172A;stroke-width:1;" x1="569.8354" x