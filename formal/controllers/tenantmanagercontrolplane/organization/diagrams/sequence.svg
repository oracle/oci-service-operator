egy</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3779" x="773.4546" y="1133.7803">create=none; update=GetWorkRequest</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.916" x="773.4546" y="1147.7803">-&gt; GetOrganization; delete=none</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg17"><polygon fill="#0F172A" points="515.3179,1184,505.3179,1188,515.3179,1192,511.3179,1188" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="509.3179" x2="765.4546" y1="1188" y2="1188"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2334" x="521.3179" y="1182.7803">status=required, finalizer=none</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg18"><polygon fill="#0F172A" points="276.4917,1233,266.4917,1237,276.4917,1241,272.4917,1237" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="270.4917" x2="503.3179" y1="1237" y2="1237"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.8262" x="282.4917" y="1217.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="282.4917" y="1231.7803">terminating</text></g><path d="M771,1258 L771,1952 A8,8 0 0 0 779,1960 L1108,1960 A8,8 0 0 0 1116,1952 L1116,1260 L1106,1250 L779,1250 A8,8 0 0 0 771,1258" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1106,1250 L1106,1256 A4,4 0 0 0 1110,1260 L1116,1260 L1106,1250" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="777" y="1265.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="777" y="1279.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="777" y="1293.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="777" y="1307.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="777" y="1321.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="777" y="1335.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="777" y="1349.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="777" y="1363.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="777" y="1377.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="777" y="1391.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="777" y="1405.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="777" y="1419.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="777" y="1433.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="777" y="1447.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5781" x="777" y="1461.7803">service: tenantmanagercontrolplane</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7373" x="777" y="1475.7803">slug: organization</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8408" x="777" y="1489.7803">kind: Organization</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="777" y="1503.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="777" y="1517.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="777" y="1531.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="777" y="1545.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="777" y="1559.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="324.9121" x="777" y="1573.7803">follow-up: create=none; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.1885" x="777" y="1587.7803">GetOrganization; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="777" y="1601.7803">supported drift: default_ucm_subscription_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="777" y="1615.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.1162" x="777" y="1629.7803">compartment_id, organization_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="777" y="1643.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="777" y="1657.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1982" x="777" y="1671.7803">oci_tenantmanagercontrolplane_organizations</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="137.7168" x="777" y="1685.7803">filters compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="777" y="1699.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="777" y="1713.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9092" x="777" y="1727.7803">The published Organization contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8398" x="777" y="1741.7803">bind-existing plus update-only. Reconcile binds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.2539" x="777" y="1755.7803">by explicit organizationId or a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9297" x="777" y="1769.7803">ListOrganizations match on compartmentId, and it</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.7715" x="777" y="1783.7803">never invents a create path.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0469" x="777" y="1797.7803">Update only reconciles defaultUcmSubscriptionId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8125" x="777" y="1811.7803">and resumes through GetWorkRequest until a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9092" x="777" y="1825.7803">follow-up GetOrganization read confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.2266" x="777" y="1839.7803">bound organization state.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="777" y="1853.7803">Delete is CR-local unbind only. The controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1025" x="777" y="1867.7803">clears the finalizer immediately, never calls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1572" x="777" y="1881.7803">OCI delete helpers, and treats observed DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5781" x="777" y="1895.7803">or DELETED organization lifecycle as terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.4121" x="777" y="1909.7803">read state rather than managed delete progress.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5713" x="777" y="1923.7803">FAILED remains terminal non-success and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="777" y="1937.7803">Kubernetes secret side effects are part of this</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.0205" x="777" y="1951.7803">rollout.</text><?plantuml-src hLXjJnmt4FxkNp5AloGI1o50NYvAfGH8Yq931Odw1GdvTcVlNBpsrlRUvLBrltV6wtqxE8BKAX-ojxOVppmpyymi_bQPIZfPWb_8tAwKcKCXjKVXkvMPp6xdpjOcFxRQElYfoEXVFjYHOo5h7JvQ4pxB4k5Nr4iCAfFtxxbItn7s3mUBqZcxIkZFY_rNBuOdZGtuuOuDHV4gVxcvoxeSNTenEpmwUFvcOmTVdzOF3WxtZuu6wn4-iywWW_sN8gYW4QxmhnfDXZ21W4QQK4eZv-Wo0d9MLreQtBjmSsdKTncKDMAXSeJ2sZ2ptmRelWNwMm38B5WtiZPvtIvjkeily7Nnd9O9Z8XL5Lbo__dXXiUW31ZfCBGgy5oPCPzl3kN1x3MjCcGrMifc-H7kTqjtOlMwa4Kc_X7HD_XKpv183kZ5m0uuRXZLw4QlFqYFbqXqPsfpwSd5rSMdAtHBbU5lJLYUWFGmVZKwSd5y9ZWFm2ufocFidOrpL14ESt3ehQuvjDFqQYzNSaunzNlDxqc_PTA6UTSlvor2ZfgytNgwMHwVH9F7V1KzMJ3vUS3H5D3G_XfXc7naRF96z5lvuDZJANJFJnrVwyCpCTx2XyPyJ7jmyiWhzcoK-37uS6xjBVqdoO6PChcGEa1mb1AqdOAFtofDmOYH0AeKGsMs1gaTodnDgye7ByONiocqUmg_O1XTYAHJ7NQ7fJoKodjIicquvtJ94CW_BPGEwFpqscIsv7mf2Un6vS_kGDp3PKKd2R59b2MpCdHD6V11XjfpJ2CRJRmX4Ozv8kualjvcix5cwngPKYXNji1B9JUfkZP4_HstXRQsQazLP1wh_ydf-UcNiy-_F388S2ymk_e8vcRa_mIBmhgE5UQV7YBop1C4ySDeCTPCB9E976I7mQtbJEDZRefaKx6i5fo-ZEEmbCfuYi-rERuyVSy-xy3Ntq_IKyT3l5ch9QQh6OgItqEXKESJkQ8YlZQvKqK0N4fT3wlX9BvUK3LeJiXUUiOsxx0kNTLLHKnG0jLLpZVvsXKo8-58lVEcpieRNyzyvbJ5br26Yaly4xD0L1AB26NDDawf_xWC9mPNZPLUZFDwXyBMnujXKjcsXG3Z_RqUsIeCm2dud7nKqO5pfo61OfDJA3DExKU5PkW0XoOw4GkS0iyN-euPNfgn0FtmffIkxwjAh-5h97ISjuRUqvNNfiLicA9GFi1sh9WKdhPYsfnvj6oP_Du2ITjTRM21cbG55XGKCgYvxrqeM65gudwtyUSo_To69AFl1JK1kvfGS3rfPS3vcbIEv9OGMLJU9dVUaPb_M7TxsSZIjI6K3SlVfYADvnvRuutulKjLGvbNA2CrJO2kXzbiFHkThYrUYbhbx59vieM8tsaivwThGrbR4d3egiof-IA0BU3-hfwQy7zhwJz4kQ-rNmMgAoYSBI4i4EvC6VsaIDafA90diP56XybTsSISHhXvzDUQ7MwseWdfnBf9IizS-Kg6RB4hpkMQM1rSbgplBbejqFHn4QIitBmOkLFbs67ITIjAaqbgNwAY84NRB8iQMH4WqoWDpm2SVxj2kco1OLqXVKcGFLmGD69BBcVVn6QIXcgHTL7tAM-tSCGURtZXOQN20bIPf68bLV0DDHtgHDjCQY2RLKQMfUkdsqTxuNKzduxKKj18dq_7eq_duXJchNEJJUUQIjZhU9wshII7lQQ