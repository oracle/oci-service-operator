lvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="694.1251" y="1735.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="694.1251" y="1749.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="694.1251" y="1763.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="694.1251" y="1777.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="694.1251" y="1791.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="694.1251" y="1805.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="694.1251" y="1819.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="694.1251" y="1833.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="694.1251" y="1847.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5781" x="694.1251" y="1861.7803">service: tenantmanagercontrolplane</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3789" x="694.1251" y="1875.7803">slug: domain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="81.7031" x="694.1251" y="1889.7803">kind: Domain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="694.1251" y="1903.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="694.1251" y="1917.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="694.1251" y="1931.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="694.1251" y="1945.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="694.1251" y="1959.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="694.1251" y="1973.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.5781" x="694.1251" y="1987.7803">follow-up: create=GetWorkRequest -&gt; GetDomain;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9639" x="694.1251" y="2001.7803">update=none; delete=GetDomain/ListDomains</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="694.1251" y="2015.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3574" x="694.1251" y="2029.7803">supported drift: definedTags, freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="694.1251" y="2043.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.8398" x="694.1251" y="2057.7803">compartmentId, domainName, isGovernanceEnabled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.71" x="694.1251" y="2071.7803">subscriptionEmail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="694.1251" y="2085.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="694.1251" y="2099.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1777" x="694.1251" y="2113.7803">oci_tenantmanagercontrolplane_domains filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5645" x="694.1251" y="2127.7803">compartmentId, domainName, lifecycleState,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="321.3643" x="694.1251" y="2141.7803">status; exact compartmentId plus domainName with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7363" x="694.1251" y="2155.7803">optional lifecycleState and status unique match;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="694.1251" y="2169.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="694.1251" y="2183.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="694.1251" y="2197.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.7988" x="694.1251" y="2211.7803">CreateDomain is the only work-request-backed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.8955" x="694.1251" y="2225.7803">mutation in the visible SDK contract. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5576" x="694.1251" y="2239.7803">runtime stores the create work request, waits</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9365" x="694.1251" y="2253.7803">through GetWorkRequest, and rereads GetDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5576" x="694.1251" y="2267.7803">once that work request succeeds.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1641" x="694.1251" y="2281.7803">UpdateDomain returns the concrete Domain body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0127" x="694.1251" y="2295.7803">directly, so update projects status from the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8535" x="694.1251" y="2309.7803">response body without a separate follow-up read.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1367" x="694.1251" y="2323.7803">DeleteDomain returns no work-request identifier.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3643" x="694.1251" y="2337.7803">The runtime issues delete once, then confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="694.1251" y="2351.7803">DELETED or NOT_FOUND through GetDomain or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0264" x="694.1251" y="2365.7803">ListDomains rereads before releasing the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.1309" x="694.1251" y="2379.7803">finalizer.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0195" x="694.1251" y="2393.7803">Pre-create reuse and delete-time list fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="323.7158" x="694.1251" y="2407.7803">both key off exact compartmentId plus domainName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1709" x="694.1251" y="2421.7803">and optionally reuse lifecycleState and status</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7783" x="694.1251" y="2435.7803">as narrowing filters when the CR sets them.</text><ellipse cx="657.1251" cy="2068" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="657.1251" cy="2068" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="657.1251" x2="657.1251" y1="157" y2="177"/><polygon fill="#0F172A" points="653.1251,167,657.1251,177,661.1251,167,657.1251,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="822.8263" x2="822.8263" y1="341" y2="361"/><polygon fill="#0F172A" points="818.8263,351,822.8263,361,826.8263,351,822.8263,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="822.8263" x2="822.8263" y1="409" y2="429"/><polygon fill="#0F172A" points="818.8263,419,822.8263,429,826.8263,419,822.8263,423" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="515.6593" x2="491.424" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="491.424" x2="491.424" y1="257" y2="279"/><polygon fill="#0F172A" points="487.424,269,491.424,279,495.424,269,491.424,273" style="stroke:#0F172A;stroke