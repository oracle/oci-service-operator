-weight="bold" lengthAdjust="spacing" textLength="276.1309" x="500.5703" y="1024.7803">[force-new or conflicting drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg13"><polygon fill="#0F172A" points="495.8286,1044,485.8286,1048,495.8286,1052,491.8286,1048" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="489.8286" x2="751.4067" y1="1048" y2="1048"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1855" x="501.8286" y="1042.7803">reject before OCI mutation</text></g><path d="M672.2104,1070 L730.9761,1070 L730.9761,1076 L720.9761,1086 L664.2104,1086 L664.2104,1078 A8,8 0 0 1 672.2104,1070" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="58" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="455.9575" x="664.2104" y="1070"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="679.2104" y="1081.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4619" x="745.9761" y="1082.7803">[supported mutable drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg14"><polygon fill="#0F172A" points="1078.7231,1116,1088.7231,1120,1078.7231,1124,1082.7231,1120" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="752.4067" x2="1084.7231" y1="1120" y2="1120"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.792" x="759.4067" y="1100.7803">Apply UpdateDomain only for mutable</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6543" x="759.4067" y="1114.7803">fields definedTags, freeformTags</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg15"><polygon fill="#0F172A" points="1078.7231,1235,1088.7231,1239,1078.7231,1243,1082.7231,1239" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="752.4067" x2="1084.7231" y1="1239" y2="1239"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="759.4067" y="1149.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="759.4067" y="1163.7803">create=tfresource.CreateResource,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="759.4067" y="1177.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.5547" x="759.4067" y="1191.7803">entity=domain</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.7754" x="759.4067" y="1205.7803">action=REGISTER_DOMAIN;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="759.4067" y="1219.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="759.4067" y="1233.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg16"><polygon fill="#0F172A" points="1078.7231,1319,1088.7231,1323,1078.7231,1327,1082.7231,1323" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="752.4067" x2="1084.7231" y1="1323" y2="1323"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0752" x="759.4067" y="1261.7803">apply follow-up strategy</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7715" x="759.4067" y="1275.7803">create=GetWorkRequest -&gt; GetDomain;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.0303" x="759.4067" y="1289.7803">update=none;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.0439" x="759.4067" y="1303.7803">delete=GetDomain/ListDomains</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="759.4067" y="1317.7803">confirm-delete</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg17"><polygon fill="#0F172A" points="495.8286,1368,485.8286,1372,495.8286,1376,491.8286,1372" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="489.8286" x2="751.4067" y1="1372" y2="1372"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="501.8286" y="1352.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="501.8286" y="1366.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg18"><polygon fill="#0F172A" points="245.354,1403,235.354,1407,245.354,1411,241.354,1407" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="239.354" x2="483.8286" y1="1407" y2="1407"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4746" x="251.354" y="1401.7803">requeue on provisioning, terminating</text></g><path d="M757,1428 L757,2206 A8,8 0 0 0 765,2214 L1103,2214 A8,8 0 0 0 1111,2206 L1111,1430 L1101,1420 L765,1420 A8,8 0 0 0 757,1428" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1101,1420 L1101,1426 A4,4 0 0 0 1105,1430 L1111,1430 L1101,1420" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="763" y="1435.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="763" y="1449.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="763" y="1463.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="763" y="1477.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="763" y="1491.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="763" y="1505.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="763" y="1519.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="763" y="1533.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="763" y="1547.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="763" y="1561.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="763" y="1575.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="763" y="1589.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="763" y="1603.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="763" y="1617.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5781" x="763" y="1631.7803">service: tenantmanagercontrolplane</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3789" x="763" y="1645.7803">slug: domain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="81.7031" x="763" y="1659.7803">kind: Domain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="763" y="1673.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="763" y="1687.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="763" y="1701.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="763" y="1715.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="763" y="1729.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="763" y="1743.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.5781" x="763" y="1757.7803">follow-up: create=GetWorkRequest -&gt; GetDomain;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9639" x="763" y="1771.7803">update=none; delete=GetDomain/ListDomains</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="763" y="1785.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3574" x="763" y="1799.7803">supported drift: definedTags, freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="763" y="1813.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.8398" x="763" y="1827.7803">compartmentId, domainName, isGovernanceEnabled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.71" x="763" y="1841.7803">subscriptionEmail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="763" y="1855.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="763" y="1869.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1777" x="763" y="1883.7803">oci_tenantmanagercontrolplane_domains filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5645" x="763" y="1897.7803">compartmentId, domainName, lifecycleState,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="321.3643" x="763" y="1911.7803">status; exact compartmentId plus domainName with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7363" x="763" y="1925.7803">optional lifecycleState and status unique match;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="763" y="1939.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="763" y="1953.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="763" y="1967.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.7988" x="763" y="1981.7803">CreateDomain is the only work-request-backed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.8955" x="763" y="1995.7803">mutation in the visible SDK contract. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5576" x="763" y="2009.7803">runtime stores the create work request, waits</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9365" x="763" y="2023.7803">through GetWorkRequest, and rereads GetDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5576" x="763" y="2037.7803">once that work request succeeds.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1641" x="763" y="2051.7803">UpdateDomain returns the concrete Domain body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0127" x="763" y="2065.7803">directly, so update projects status from the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8535" x="763" y="2079.7803">response body without a separate follow-up read.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1367" x="763" y="2093.7803">DeleteDomain returns no work-request identifier.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3643" x="763" y="2107.7803">The runtime issues delete once, then confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="763" y="2121.7803">DELETED or NOT_FOUND through GetDomain or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0264" x="763" y="2135.7803">ListDomains rereads before releasing the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.1309" x="763" y="2149.7803">finalizer.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0195" x="763" y="2163.7803">Pre-create reuse and delete-time list fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="323.7158" x="763" y="2177.7803">both key off exact compartmentId plus domainName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1709" x="763" y="2191.7803">and optionally reuse lifecycleState and status</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7783" x="763" y="2205.7803">as narrowing filters when the CR sets them.</text><?plantuml-src fLXhRnit5ltENq5qlxI0HewRf4qLU87MTjCWRhomNUIBWO2QuKXSZyXPaYD5kzZ_lkVoCPgH9SUB80ZiuUC-ppttqkv1wLPOiU9kAIgpKNh1Qz4uoLo_CnVbmyAQJbVdfZ6M_wqkyQyQdAXaBRh6_swq_oXMalyXcxNqgXI7pzogVqj--cgmAQmrcoJzHNtwyu_3czfu-TiZ6-hwv-gd_LF6LjAc4_DNhr---6Nl1AbF-ozVlZfz_Ngm7yINncff-UbFp2lVI7uh_zL9NKfUS2-rq7ubj5X8MqAGDKtR22rFBinAACsMgfAyDiRFpPU1N9T5_8TnBaflxCZEv6_UsdTK_YZVr2-m3M48gMfXm-7xmmFFaJA8HI-ZKRMyKdeSoLzUYPVpDzWbaUregvnNh-Lfl_KeIszgKPVilopunZzqSudmUkdOm0v-7cFPI3jQ_aquUICHw5BjRtrtVNlzuLRQjIhbdp4Xtt7X-7XfTENw_3qZ172pHdx7iYTxzr0BLbRSIcUQpYk