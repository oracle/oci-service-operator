ta-entity-2="part5" id="msg14"><polygon fill="#0F172A" points="970.2573,1200,980.2573,1204,970.2573,1208,974.2573,1204" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="732.1724" x2="976.2573" y1="1204" y2="1204"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.123" x="739.1724" y="1156.7803">Apply UpdatePathAnalyzerTest only</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="739.1724" y="1170.7803">for mutable fields definedTags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5781" x="739.1724" y="1184.7803">destinationEndpoint, displayName,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.21" x="739.1724" y="1198.7803">freeformTags (+4 more)</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg15"><polygon fill="#0F172A" points="970.2573,1277,980.2573,1281,970.2573,1285,974.2573,1281" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="732.1724" x2="976.2573" y1="1281" y2="1281"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="739.1724" y="1233.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="739.1724" y="1247.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="739.1724" y="1261.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="739.1724" y="1275.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg16"><polygon fill="#0F172A" points="970.2573,1347,980.2573,1351,970.2573,1355,974.2573,1351" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="732.1724" x2="976.2573" y1="1351" y2="1351"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0752" x="739.1724" y="1303.7803">apply follow-up strategy</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8926" x="739.1724" y="1317.7803">create=read-after-write;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.8027" x="739.1724" y="1331.7803">update=read-after-write;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.0234" x="739.1724" y="1345.7803">delete=confirm-delete</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg17"><polygon fill="#0F172A" points="475.5942,1396,465.5942,1400,475.5942,1404,471.5942,1400" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="469.5942" x2="731.1724" y1="1400" y2="1400"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="481.5942" y="1380.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="481.5942" y="1394.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg18"><polygon fill="#0F172A" points="307.6089,1431,297.6089,1435,307.6089,1439,303.6089,1435" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="301.6089" x2="463.5942" y1="1435" y2="1435"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="313.6089" y="1429.7803">requeue on terminating</text></g><path d="M737,1456 L737,2290 A8,8 0 0 0 745,2298 L1073,2298 A8,8 0 0 0 1081,2290 L1081,1458 L1071,1448 L745,1448 A8,8 0 0 0 737,1456" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1071,1448 L1071,1454 A4,4 0 0 0 1075,1458 L1081,1458 L1071,1448" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="743" y="1463.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="743" y="1477.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="743" y="1491.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="743" y="1505.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="743" y="1519.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="743" y="1533.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="743" y="1547.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="743" y="1561.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="743" y="1575.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="743" y="1589.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="743" y="1603.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="743" y="1617.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="743" y="1631.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="743" y="1645.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2754" x="743" y="1659.7803">service: vnmonitoring</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1924" x="743" y="1673.7803">slug: pathanalyzertest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.958" x="743" y="1687.7803">kind: PathAnalyzerTest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="743" y="1701.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="743" y="1715.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="743" y="1729.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="743" y="1743.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="743" y="1757.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="743" y="1771.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="743" y="1785.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="743" y="1799.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.2197" x="743" y="1813.7803">supported drift: definedTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7158" x="743" y="1827.7803">destinationEndpoint, displayName, freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="743" y="1841.7803">(+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="743" y="1855.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="743" y="1869.7803">compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="743" y="1883.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="743" y="1897.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0469" x="743" y="1911.7803">oci_vn_monitoring_path_analyzer_tests filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5781" x="743" y="1925.7803">compartmentId, displayName; exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3369" x="743" y="1939.7803">plus displayName plus protocol plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="743" y="1953.7803">sourceEndpoint plus destinationEndpoint plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="743" y="1967.7803">queryOptions plus protocolParameters unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3232" x="743" y="1981.7803">match; empty displayName skips pre-create</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6611" x="743" y="1995.7803">lookup; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="743" y="2009.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="743" y="2023.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3779" x="743" y="2037.7803">PathAnalyzerTest create and update are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2539" x="743" y="2051.7803">synchronous reread flows. OCI returns the body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="323.709" x="743" y="2065.7803">immediately and the resource exposes only ACTIVE</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8262" x="743" y="2079.7803">and DELETED, so the reviewed runtime does not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5918" x="743" y="2093.7803">publish provisioning or updating lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.1377" x="743" y="2107.7803">buckets.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1367" x="743" y="2121.7803">Pre-create reuse always scopes by compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9297" x="743" y="2135.7803">and only uses the SDK displayName filter when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9297" x="743" y="2149.7803">spec.displayName is present, but adoption still</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2813" x="743" y="2163.7803">requires a unique exact match on the reviewed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.0479" x="743" y="2177.7803">identity surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7783" x="743" y="2191.7803">The published status surface mirrors the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6191" x="743" y="2205.7803">observed PathAnalyzerTest body, including the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.4053" x="743" y="2219.7803">polymorphic endpoint and protocol-parameter read</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.0205" x="743" y="2233.7803">model.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5645" x="743" y="2247.7803">Delete confirmation treats either a DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6953" x="743" y="2261.7803">lifecycle response or a NotFound reread as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1504" x="743" y="2275.7803">terminal and otherwise keeps the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.9854" x="743" y="2289.7803">OCI stops returning the resource.</text><?plantuml-src jLXjRzms4lxENq7qlgIejOuRfqtNo06fxVQ2k4qGk_ramE1AertM5AcIr6xKG__xpV15A-rBuxlY41YnoE5mNfvvPcZtA7Khh6YuMudARAHUybee1ymDEmjHFYwjwNHrQPIn_1zrYV-gaKG5jUYK_y5e_xDeWFyBr1gyBCLXcLlv1_2pyz6ciDPialRdzTctNuzFQkFX-pqRwlhRwfjTAMChi4bYSVxonVFlTYJe-hJ_uiNvsSkNe_sWlZHMW-Ldtp0llG9-2xzte4lW1L_hncZfZSKWdNuGVlL62zN_0VOEd6ShMG6lZV4ByscarENp_sQSYn9FJunCpkQjNI_XQtXLFyTjL8RnbAtG_l3viS1Jj8m2CUXGieORgQTX_EvSl5YymbrIsKwsoaNr4iw6hRqKlQf5NR8_MV2Dl-iMWB7ruDZ83dw9XbYZ5DZ9ylV2mKSeZIxbxjONxs_Vlxi5kvOb_2IqM8BzWWl7fqkJ8-yltp9AFpThJEvKzydEEIm42nMtu8pgl3HwdfPEAocMc5Dt6h-BhKYHqpnpwsNMK852Ru-UZjlJaw2h05Es3HOl_ZcAqPo3HlaE-2u0qU3a4TkAq-6fjtC-_FxCqjNEVycc8dHe6fFvLZbwvIHvjrS00GJynfX7_4-W8mkfAoQKvzuYDF08WW0-jGgJ4ZB2iM8qLbdFXR8WgXvtfVEEJIydSr1wpdy4ltSf85KD-WTzql56EeTrUapN3LwqgymzgwNoODtyNfUc8VmqgF1jTS8hwLebUYAtBuDB5Zed5XWEyeDmq5ciSRmNiuSiW4LmxEPBTDN3OKSEQ_qRqJbWnW54jEYp30X2FAyna9FaICsT5xvpGHqv7v7B4toWIgc_2il7x8kxUoOUaKRZQccRVDLQYdjzm4E4rBq-cCjWQAb0QBGCWLTBtCM-Oz5iN7KXMGjb23XFYP45Bp0IoHuA20IGuxhjO_RI7a47Vq5Mu6RXKFDJBuXcRGqLDO9nNsj8G_YXIvLSPtCe7rYQ3bM0gWgnGPgvrvMLjUUm5geJuNXALbXUeGkAocHBZbDJJuWvRxksDHOJpRksefjSPsjHmfoQElQBwauitGb3Pl1eF5rohQlMIEqdbNF2QWjG6zkGF7_srJblZCM2-WY_GUdvWlQ0DnrvCySgGl0N6ZRH7yScDSaIqUIIvTEAPQDxisWZVBb2Pv53Fs5BcfvWhUhSs5eU5bfhl2cD2byi5cHsBaeSy3hgmkAm_VkMDbmydfLzeCa0o6pUQOboqRGB3ath-x7f70U9bgo0eWoymLNmvO9L7H4fhOIpb7KXrRQ1cDQF8eW5G1M59pnDU14Jaept6Fcd0dIS9QA8aAcCIBhG3K2XBIAopz-K2lvDswgU_nBmjL_bMlNt6kyTz4P8JF27KFyS0577OGJ2SRwsdUOhKCYHV8MnTzWRGYPU-pepz2no-iVqUN6lOvsCHQ9d8v5OrsEHo91Pv9Wz8WIgnlPkDWMYsc7tyx3i1xkeMHI1EugDbNvape6TP4MYspIJFBLlnBRmEl5EHU7DvFKwycNHOGzHHL8_33tXWjsXOsVE2Tq5ImDf50rkGbupKLcvN24gQdvuT4kJrj-