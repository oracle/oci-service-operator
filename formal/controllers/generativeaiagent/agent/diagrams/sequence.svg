gram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="740" y="1793.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="740" y="1807.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="740" y="1821.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="740" y="1835.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="740" y="1849.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="740" y="1863.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="740" y="1877.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="740" y="1891.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="740" y="1905.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="740" y="1919.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="740" y="1933.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4336" x="740" y="1947.7803">service: generativeaiagent</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4961" x="740" y="1961.7803">slug: agent</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.0479" x="740" y="1975.7803">kind: Agent</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="740" y="1989.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="740" y="2003.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="740" y="2017.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="740" y="2031.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="740" y="2045.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="740" y="2059.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9229" x="740" y="2073.7803">follow-up: create=GetWorkRequest -&gt; GetAgent;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0264" x="740" y="2087.7803">update=GetWorkRequest -&gt; GetAgent;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7227" x="740" y="2101.7803">delete=GetWorkRequest -&gt; GetAgent/ListAgents</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="740" y="2115.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="740" y="2129.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="740" y="2143.7803">displayName, freeformTags (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="740" y="2157.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="740" y="2171.7803">compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="740" y="2185.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.4189" x="740" y="2199.7803">list lookup: oci_generative_ai_agent_agents</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.6543" x="740" y="2213.7803">filters compartmentId, displayName; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4883" x="740" y="2227.7803">compartmentId plus displayName unique match in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="347.7578" x="740" y="2241.7803">ACTIVE, CREATING, or UPDATING; duplicate matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="17.8965" x="740" y="2255.7803">fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="740" y="2269.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="740" y="2283.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="740" y="2297.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="740" y="2311.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="740" y="2325.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.751" x="740" y="2339.7803">terminal and DELETED is only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6406" x="740" y="2353.7803">delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.8262" x="740" y="2367.7803">CreateAgent returns an Agent body plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.9023" x="740" y="2381.7803">opc-work-request-id, while UpdateAgent,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.9775" x="740" y="2395.7803">DeleteAgent, and ChangeAgentCompartment return</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8193" x="740" y="2409.7803">work-request headers without a resource body.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.792" x="740" y="2423.7803">The runtime prefers the create response</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="740" y="2437.7803">identifier and otherwise recovers the Agent OCID</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.792" x="740" y="2451.7803">from work-request resources before rereading</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.041" x="740" y="2465.7803">GetAgent.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5986" x="740" y="2479.7803">Pre-create reuse only runs when spec.displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3779" x="740" y="2493.7803">is present and keeps exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9229" x="740" y="2507.7803">displayName matching bounded to ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0273" x="740" y="2521.7803">CREATING, or UPDATING summaries.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.7988" x="740" y="2535.7803">Only displayName, description, welcomeMessage,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8193" x="740" y="2549.7803">knowledgeBaseIds, llmConfig, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4814" x="740" y="2563.7803">definedTags reconcile in place; an empty</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8125" x="740" y="2577.7803">llmConfig value is treated as omission because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.7158" x="740" y="2591.7803">the published spec cannot distinguish</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2061" x="740" y="2605.7803">clear-from-empty from omission for that nested</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5781" x="740" y="2619.7803">object. CompartmentId remains replacement-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.4121" x="740" y="2633.7803">and ChangeAgentCompartment stays out of scope</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.9785" x="740" y="2647.7803">for the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5713" x="740" y="2661.7803">Delete keeps the finalizer until the work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="740" y="2675.7803">request is terminal and GetAgent or fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.792" x="740" y="2689.7803">ListAgents confirms the resource is gone.</text><?plantuml-src hLXhRnit5ltENq5qlwHOIOxhf4rbU05NTbkZRbFOQVF5G43DS2IkgU4ioP6YNUn_ttD9pakMRBLR1716myTzdNlklUCULLa9ArRSBKLkDgfSy49e9vbhL-OYUrnOKvVvp6XZ-T-A3F_otevS5gBM_djJ-b_4Il8VfLvBhpAnVy-z-hVafszwYy9QiqctlovEl_cgVx8qNdxtH8UY-2R_UdUNiRcqQSVypTkprz_kx23nQVtixCtfsxUzzN1zPcmfBJ_zcddbjUJtyb-rB3F9ntmXiIAyMakX17xuaqlwovOgbxmmni_DvzvrhZdv7yQvoBon0_MIcStIhdtoA_ckU8rbN0PFgagKVl_v_ePZRkcveBr3gqBUgdBem6_VYBFvEwpIbTLWAPldR-Lfk_GaEEyAKMJilopOnd-gvn9UzTAndXvy1aMiqLhQmUllX9DtCZDbfdQNldX___wdUsdNAfC_Yn91i5zmuVZmrU38-zaDey1piqPOXtUFTiuX1QpCkPNEwDehKqxJgvCS0KTCtKdyFUwsZ9imJznwqToGImrh3vwEoyEJiim3G5ddB3x-Hyz7KovBxAyb3wY3biaCrksX4qCJfxnzVcL9dlDVik4MEZHqnBIx7AOuHIP5g8TmyrjZ7l6VWCfpLUPCQC-z1GYm3-6MdoiDzmVVS-H6YKpQSg6j5FaMgyfvnuOIIGVidl8Vf8-I93YelRIzH3c-Kiw1fGvTS8lRmmtkLQ6qbzPDUMPM18aLtjxaeuSoLwxIOajKzMLGtihQYJci9OqfjhL5ta8O8eBC1h0FYPl1A2-ZojgOYcVX1QyGJ-BIsTtrvOURNtvusLx823Rlr-MFUc-FndkmKS4zk2yYVWr73oAcIkwyyBKBrv6V8d1v0fBC4nwkmkj3IiNLgDU1BT2eK7RLtB