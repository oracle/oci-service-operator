size="14" lengthAdjust="spacing" textLength="260.7295" x="773" y="1933.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="773" y="1947.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="773" y="1961.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="773" y="1975.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="773" y="1989.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="773" y="2003.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="773" y="2017.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="773" y="2031.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="773" y="2045.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9443" x="773" y="2059.7803">service: visualbuilder</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3926" x="773" y="2073.7803">slug: vbinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="103.5098" x="773" y="2087.7803">kind: VbInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="773" y="2101.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="773" y="2115.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="773" y="2129.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="773" y="2143.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="773" y="2157.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="773" y="2171.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="773" y="2185.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4883" x="773" y="2199.7803">GetVbInstance; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8125" x="773" y="2213.7803">GetVbInstance; delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9297" x="773" y="2227.7803">GetVbInstance/ListVbInstances confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3857" x="773" y="2241.7803">supported drift:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8125" x="773" y="2255.7803">alternateCustomEndpoints.certificateSecretId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2471" x="773" y="2269.7803">alternateCustomEndpoints.hostname,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2197" x="773" y="2283.7803">customEndpoint.certificateSecretId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.5127" x="773" y="2297.7803">customEndpoint.hostname (+11 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="773" y="2311.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5508" x="773" y="2325.7803">compartmentId, consumptionModel,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9365" x="773" y="2339.7803">networkEndpointDetails.privateEndpointIp</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4268" x="773" y="2353.7803">create-only fields: idcsOpenId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8262" x="773" y="2367.7803">list lookup: oci_visual_builder_vb_instances</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.6543" x="773" y="2381.7803">filters compartmentId, displayName; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4883" x="773" y="2395.7803">compartmentId plus displayName unique match in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.3721" x="773" y="2409.7803">ACTIVE, CREATING, UPDATING, or INACTIVE;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="773" y="2423.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="773" y="2437.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="773" y="2451.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="773" y="2465.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7021" x="773" y="2479.7803">provisioning, UPDATING as updating, ACTIVE and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4199" x="773" y="2493.7803">INACTIVE as success, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4404" x="773" y="2507.7803">terminating; FAILED is terminal and DELETED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.8887" x="773" y="2521.7803">only a delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="773" y="2535.7803">Create, update, and delete responses expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="773" y="2549.7803">work-request headers but do not return a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7158" x="773" y="2563.7803">VbInstance body. The runtime resumes through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.8262" x="773" y="2577.7803">GetWorkRequest, recovers the affected VbInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3301" x="773" y="2591.7803">OCID from work-request resources, and then</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6953" x="773" y="2605.7803">rereads GetVbInstance before settling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.7021" x="773" y="2619.7803">Pre-create reuse keeps exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9229" x="773" y="2633.7803">displayName matching bounded to ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.3721" x="773" y="2647.7803">CREATING, UPDATING, or INACTIVE summaries.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5508" x="773" y="2661.7803">In-place reconcile covers displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0605" x="773" y="2675.7803">nodeCount, freeformTags, definedTags, one-way</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.709" x="773" y="2689.7803">enablement of isVisualBuilderEnabled,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2949" x="773" y="2703.7803">customEndpoint, alternateCustomEndpoints, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.5371" x="773" y="2717.7803">the mutable public/private</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0332" x="773" y="2731.7803">networkEndpointDetails surface. CompartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1846" x="773" y="2745.7803">consumptionModel, and privateEndpointIp remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7783" x="773" y="2759.7803">replacement-only, while idcsOpenId is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7158" x="773" y="2773.7803">create-only because OCI does not project it back</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.2686" x="773" y="2787.7803">on live reads.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1777" x="773" y="2801.7803">ChangeVbInstanceCompartment, StartVbInstance,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9854" x="773" y="2815.7803">StopVbInstance, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.4121" x="773" y="2829.7803">ReconfigurePrivateEndpointVbInstance remain out</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.3301" x="773" y="2843.7803">of scope for the published</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4678" x="773" y="2857.7803">create/get/list/update/delete runtime.</text><?plantuml-src pLbTRnit5dtdho2wBobM7t6JjAaCBv3ORYlKJG8xJLuC1DGCH-9wXfmbELAqY_tlUox96St8KkosQB7eGwqXUJ_FFVUISNTAryAAYhkLoCr6wIKlHEaaSztAGcHtIsiQdP-RqbZ-joB3VtblHouBqPJ-1wFz6r59_fCirzAhJ1pUSwF-BVd9yzwYiDPialIdnSbtt_HFQkFbwtis5CLt-RVxkupDfKqx5izVF7lw_TuEKf_MdprxVlBYHMyzYC-CrTBoas-PLxwK_4R-gv4watpCryerebmqgeIIwOV5N3iliCHMAfUyCCOlpEUUFDSU_G_ZN6JUs85zoSzsQTz1-OryMJp5CeGXbAeMsXy-tz_m62cz67GoIbN8AwM74Vp-kNYsU8bL4baFbh95_aAUT4ltilEo44N6_ik2R_pdPY4HLYyTwzd1ps68DMKfxU3pQ-7ajSoCpjJ-qbTlRzx-V2FjMcNo5w75Kjglk71y-6bmvEtvd57ckLaZhqFPexrpg04hSswbCsNZbT6pz6cQAx54Jjqq_XxljepRD4_SUjbAo6K9Ru-UZil3arBd0Q5i5om-_aSlHZCkDVOtak-W1rEJBsotaOuD_PpnxkydbfGw_pKRRg53