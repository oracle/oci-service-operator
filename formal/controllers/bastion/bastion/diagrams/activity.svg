nt-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.1025" x="669.3441" y="395.7803">no reusable match is found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="678.0267" y="429"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="688.0267" y="449.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="688.0267" y="463.7803">into status</text><polygon fill="#E2E8F0" points="656.5458,483,668.5458,495,656.5458,507,644.5458,495,656.5458,483" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="594.3695,539,718.722,539,730.722,551,718.722,563,594.3695,563,582.3695,551,594.3695,539" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="594.3695" y="554.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="560.5834" y="547.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="730.722" y="547.7803">no</text><rect fill="none" height="340" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="573"/><path d="M61.4688,573 L61.4688,580 L51.4688,590 L11,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="584.7803">Delete</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="300.1641" x="189.6621" y="607"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1641" x="199.6621" y="627.7803">Delete path uses DeleteBastion with required</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7852" x="199.6621" y="641.7803">via GetBastion or ListBastion to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="199.6621" y="655.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="305.585" x="186.9517" y="704"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.585" x="196.9517" y="724.7803">Confirm deletion via GetBastion or ListBastion</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6201" x="196.9517" y="738.7803">until OCI reaches DELETED</text><polygon fill="#E2E8F0" points="191.5718,781,487.9165,781,499.9165,793,487.9165,805,191.5718,805,179.5718,793,191.5718,781" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="796.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="789.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="789.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="815"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="835.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="815"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="835.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="849.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,869,351.7441,881,339.7441,893,327.7441,881,339.7441,869" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="950.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="950.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="427.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="345.916" x="806.3894" y="573"/><path d="M957.2234,573 L957.2234,580 L947.2234,590 L806.3894,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="809.3894" y="584.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="280.5928" x="833.051" y="656"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="843.051" y="676.7803">Request requeue while OCI remains in</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.5928" x="843.051" y="690.7803">PROVISIONING, UPDATING, DELETING</text><ellipse cx="973.3474" cy="750" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="973.3474" cy="750" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="887.0642,607,1059.6306,607,1071.6306,619,1059.6306,631,887.0642,631,875.0642,619,887.0642,607" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="977.3474" y="641.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.5664" x="887.0642" y="622.7803">"OCI state in retryable set?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="826.3894" y="870"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="836.3894" y="890.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.041" x="836.3894" y="904.7803">OCI reaches ACTIVE</text><ellipse cx="973.3474" cy="955.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="973.3474" cy="955.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="852.8264,821,1093.8684,821,1105.8684,833,1093.8684,845,852.8264,845,840.8264,833,852.8264,821" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="977.3474" y="855.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="852.8264" y="836.7803">"OCI state is outside success targets?"</text><rect fill="none" height="722.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="541.8252" x="675.4814" y="1010.5"/><path d="M841.9014,1010.5 L841.9014,1017.5 L831.9014,1027.5 L675.4814,1027.5" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="678.4814" y="1022.2803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="825.2273" y="1044.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="835.2273" y="1065.2803">Compare live OCI state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="835.2273" y="1079.2803">field surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="822.1238" y="1161.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="832.1238" y="1182.2803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="832.1238" y="1196.2803">fields compartment_id</text><ellipse cx="973.3474" cy="1242" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="973.3474" cy="1242" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="847.7644,1112.5,1098.9304,1112.5,1110.9304,1124.5,1098.9304,1136.5,847.7644,1136.5,835.7644,1124.5,847.7644,1112.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="977.3474" y="1147.2803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="847.7644" y="1128.2803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="862.9197,1295,1083.7751,1295,1095.7751,1307,1083.7751,1319,862.9197,1319,850.9197,1307,862.9197,1295" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="862.9197" y="1310.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="829.1335" y="1303.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1095.7751" y="1303.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="290.8193" x="695.4814" y="1329"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8193" x="705.4814" y="1349.7803">Apply UpdateBastion only for mutable fields</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3857" x="705.4814" y="1363.7803">display_name</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1006.3008" y="1329"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1016.3008" y="1349.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="973.3474,1383,985.3474,1395,973.3474,1407,961.3474,1395,973.3474,1383" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="118" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="806.1892" y="1427"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="816.1892" y="1447.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="816.1892" y="1461.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="816.1892" y="1475.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="816.1892" y="1489.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="816.1892" y="1503.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="816.1892" y="1517.7803">delete=tfresource.De