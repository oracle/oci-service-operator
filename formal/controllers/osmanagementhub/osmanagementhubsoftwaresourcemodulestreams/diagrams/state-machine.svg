334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="548.49" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="548.49" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="548.49" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="548.49" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="548.49" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="548.49" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="548.49" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9854" x="548.49" y="404.7803">service: osmanagementhub</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="343.957" x="548.49" y="418.7803">slug: osmanagementhubsoftwaresourcemodulestreams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="356.3984" x="548.49" y="432.7803">kind: OsManagementHubSoftwareSourceModuleStreams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="548.49" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLe