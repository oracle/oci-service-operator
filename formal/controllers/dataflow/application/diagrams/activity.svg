textLength="297.6299" x="689.8367" y="2094.2803">archive_uri, arguments, class_name (+22 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="689.8367" y="2108.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6201" x="689.8367" y="2122.2803">compartment_id, type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="689.8367" y="2136.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="689.8367" y="2150.2803">list lookup: oci_dataflow_applications filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4336" x="689.8367" y="2164.2803">compartment_id, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.1123" x="689.8367" y="2178.2803">display_name_starts_with, owner_principal_id (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="689.8367" y="2192.2803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="689.8367" y="2206.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="689.8367" y="2220.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="689.8367" y="2234.2803">Package-local generatedruntime owns create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.1152" x="689.8367" y="2248.2803">update, and observe; create and update use the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3848" x="689.8367" y="2262.2803">immediate OCI response body rather than shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7236" x="689.8367" y="2276.2803">read-after-write follow-up.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2266" x="689.8367" y="2290.2803">Ready states map to OCI ACTIVE and INACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8057" x="689.8367" y="2304.2803">Tracked status.osokStatus.ocid is preflighted</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="689.8367" y="2318.2803">with GetApplication; OCI not found or observed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1436" x="689.8367" y="2332.2803">DELETED clears the tracked identity and forces a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.8135" x="689.8367" y="2346.2803">fresh create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1299" x="689.8367" y="2360.2803">Delete confirmation is absence-based:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.833" x="689.8367" y="2374.2803">DeleteApplication is followed by GetApplication</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2266" x="689.8367" y="2388.2803">until OCI returns not found, while ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.9922" x="689.8367" y="2402.2803">INACTIVE, and DELETED remain terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1992" x="689.8367" y="2416.2803">intermediate observations.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="689.8367" y="2430.2803">In-place updates follow the package-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5156" x="689.8367" y="2444.2803">BuildUpdateBody surface and preserve execute</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="689.8367" y="2458.2803">precedence over className, fileUri, arguments,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8887" x="689.8367" y="2472.2803">configuration, and parameters.</text><ellipse cx="652.8367" cy="2132.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="652.8367" cy="2132.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="652.8367" x2="652.8367" y1="157" y2="177"/><polygon fill="#0F172A" points="648.8367,167,652.8367,177,656.8367,167,652.8367,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="804.3025" x2="804.3025" y1="355" y2="375"/><polygon fill="#0F172A" points="800.3025,365,804.3025,375,808.3025,365,804.3025,369" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="804.3025" x2="804.3025" y1="423" y2="443"/><polygon fill="#0F172A" points="800.3025,433,804.3025,443,808.3025,433,804.3025,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="511.3708" x2="501.3708" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="501.3708" x2="501.3708" y1="257" y2="279"/><polygon fill="#0F172A" points="497.3708,269,501.3708,279,505.3708,269,501.3708,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke