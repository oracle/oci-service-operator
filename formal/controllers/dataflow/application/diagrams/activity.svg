mily="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="689.8367" y="1746.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="689.8367" y="1760.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="689.8367" y="1774.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="689.8367" y="1788.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="689.8367" y="1802.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="689.8367" y="1816.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2686" x="689.8367" y="1830.2803">service: dataflow</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3994" x="689.8367" y="1844.2803">slug: application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.9512" x="689.8367" y="1858.2803">kind: Application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="689.8367" y="1872.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="689.8367" y="1886.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="689.8367" y="1900.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="689.8367" y="1914.2803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="689.8367" y="1928.2803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.6064" x="689.8367" y="1942.2803">delete DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7158" x="689.8367" y="1956.2803">supported drift: application_log_config,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.6299" x="689.8367" y="1970.2803">archive_uri, arguments, class_name (+22 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="689.8367" y="1984.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6201" x="689.8367" y="1998.2803">compartment_id, type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="689.8367" y="2012.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="689.8367" y="2026.2803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="689.8367" y="2040.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="689.8367" y="2054.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="689.8367" y="2068.2803">The active Application runtime is still the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.6338" x="689.8367" y="2082.2803">handwritten override in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8125" x="689.8367" y="2096.2803">`pkg/servicemanager/dataflow/application`; this</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6885" x="689.8367" y="2110.2803">seeded formal row exists to regenerate a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8467" x="689.8367" y="2124.2803">generatedruntime baseline without switching the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="131.5166" x="689.8367" y="2138.2803">active reconcile path.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6885" x="689.8367" y="2152.2803">Create and update treat OCI `ACTIVE` and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4268" x="689.8367" y="2166.2803">`INACTIVE` as successful observed states,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.04" x="689.8367" y="2180.2803">project the live Application payload into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.2129" x="689.8367" y="2194.2803">status, and reject create-only drift for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="173.5098" x="689.8367" y="2208.2803">`compartmentId` and `type`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9092" x="689.8367" y="2222.2803">The handwritten runtime never binds by list</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.585" x="689.8367" y="2236.2803">lookup. Delete stays finalizer-backed for the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4541" x="689.8367" y="2250.2803">tracked OCID until `GetApplication` returns not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1094" x="689.8367" y="2264.2803">found; if OCI ever echoes lifecycle `DELETED`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1094" x="689.8367" y="2278.2803">the runtime still treats that as terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7646" x="689.8367" y="2292.2803">instead of final completion.</text><ellipse cx="652.8367" cy="1980.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="652.8367" cy="1980.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="652.8367" x2="652.8367" y1="157" y2="177"/><polygon fill="#0F172A" points="648.8367,167,652.8367,177,656.8367,167,652.8367,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="804.3025" x2="804.3025" y1="327" y2="347"/><polygon fill="#0F172A" points="800.3025,337,804.3025,347,808.3025,337,804.3025,341" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="511.3708" x2="501.3708" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="501.3708" x2="501.3708" y1="257" y2="279"/><polygon fill="#0F172A" points="497.3708,269,501.3708,279,505.3708,269,501.3708,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="794.3025" x2="804.3025" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="804.3025" x2="804.3025" y1="257" y2="279"/><polygon fil