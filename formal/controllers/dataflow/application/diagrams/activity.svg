-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="689.8367" y="1914.2803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="689.8367" y="1928.2803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.6064" x="689.8367" y="1942.2803">delete DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7158" x="689.8367" y="1956.2803">supported drift: application_log_config,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.6299" x="689.8367" y="1970.2803">archive_uri, arguments, class_name (+22 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="689.8367" y="1984.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6201" x="689.8367" y="1998.2803">compartment_id, type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="689.8367" y="2012.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="689.8367" y="2026.2803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="689.8367" y="2040.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="689.8367" y="2054.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1367" x="689.8367" y="2068.2803">The active Application runtime keeps the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.709" x="689.8367" y="2082.2803">generated service-manager shell but overrides</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3506" x="689.8367" y="2096.2803">the generated client seam with an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8125" x="689.8367" y="2110.2803">`applicationGeneratedRuntimeClient` wrapper</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.7988" x="689.8367" y="2124.2803">around `generatedruntime.ServiceClient`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2402" x="689.8367" y="2138.2803">Tracked OCI identity is preflighted through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6611" x="689.8367" y="2152.2803">`GetApplication`; NotFound or lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.123" x="689.8367" y="2166.2803">`DELETED` clears the recorded identity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3848" x="689.8367" y="2180.2803">re-enters `CreateApplication` instead of binding</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8203" x="689.8367" y="2194.2803">by list lookup.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0605" x="689.8367" y="2208.2803">Create and update use custom request-body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.8057" x="689.8367" y="2222.2803">builders so `execute` precedence, enum</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4883" x="689.8367" y="2236.2803">validation, and optional field omission stay</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.1025" x="689.8367" y="2250.2803">explicit in the checked-in contract.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9502" x="689.8367" y="2264.2803">The generatedruntime delegate fully replaces</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6953" x="689.8367" y="2278.2803">`ApplicationStatus` from the latest OCI payload,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.123" x="689.8367" y="2292.2803">clearing omitted optional fields while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.8887" x="689.8367" y="2306.2803">preserving OSOK bookkeeping.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.7715" x="689.8367" y="2320.2803">Delete keeps the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8125" x="689.8367" y="2334.2803">`GetApplication` returns not found; during</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4336" x="689.8367" y="2348.2803">delete confirmation a `DELETED` lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="689.8367" y="2362.2803">readback remains terminating instead of final</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="689.8367" y="2376.2803">completion.</text><ellipse cx="652.8367" cy="2022.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"