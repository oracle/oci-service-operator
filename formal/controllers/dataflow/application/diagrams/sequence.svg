"86.3789" x="706.4692" y="1076.7803">mutable fields</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6953" x="706.4692" y="1090.7803">application_log_config, archive_uri,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.375" x="706.4692" y="1104.7803">arguments, class_name (+22 more)</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg16"><polygon fill="#0F172A" points="937.5542,1183,947.5542,1187,937.5542,1191,941.5542,1187" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="699.4692" x2="943.5542" y1="1187" y2="1187"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="706.4692" y="1139.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="706.4692" y="1153.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="706.4692" y="1167.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="706.4692" y="1181.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg17"><polygon fill="#0F172A" points="433.5874,1232,423.5874,1236,433.5874,1240,429.5874,1236" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="427.5874" x2="698.4692" y1="1236" y2="1236"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="439.5874" y="1216.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="439.5874" y="1230.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg18"><polygon fill="#0F172A" points="265.6021,1267,255.6021,1271,265.6021,1275,261.6021,1271" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="259.6021" x2="421.5874" y1="1271" y2="1271"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="271.6021" y="1265.7803">requeue on terminating</text></g><path d="M704,1292 L704,2042 A8,8 0 0 0 712,2050 L1024,2050 A8,8 0 0 0 1032,2042 L1032,1294 L1022,1284 L712,1284 A8,8 0 0 0 704,1292" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1022,1284 L1022,1290 A4,4 0 0 0 1026,1294 L1032,1294 L1022,1284" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="710" y="1299.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="710" y="1313.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="710" y="1327.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="710" y="1341.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="710" y="1355.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="710" y="1369.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="710" y="1383.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="710" y="1397.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="710" y="1411.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="710" y="1425.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="710" y="1439.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="710" y="1453.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="710" y="1467.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="710" y="1481.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2686" x="710" y="1495.7803">service: dataflow</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3994" x="710" y="1509.7803">slug: application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.9512" x="710" y="1523.7803">kind: Application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="710" y="1537.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="710" y="1551.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="710" y="1565.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="710" y="1579.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="710" y="1593.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.6064" x="710" y="1607.7803">delete DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7158" x="710" y="1621.7803">supported drift: application_log_config,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.6299" x="710" y="1635.7803">archive_uri, arguments, class_name (+22 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="710" y="1649.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6201" x="710" y="1663.7803">compartment_id, type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="710" y="1677.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="710" y="1691.7803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="710" y="1705.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="710" y="1719.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1367" x="710" y="1733.7803">The active Application runtime keeps the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.709" x="710" y="1747.7803">generated service-manager shell but overrides</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3506" x="710" y="1761.7803">the generated client seam with an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8125" x="710" y="1775.7803">`applicationGeneratedRuntimeClient` wrapper</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.7988" x="710" y="1789.7803">around `generatedruntime.ServiceClient`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2402" x="710" y="1803.7803">Tracked OCI identity is preflighted through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6611" x="710" y="1817.7803">`GetApplication`; NotFound or lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.123" x="710" y="1831.7803">`DELETED` clears the recorded identity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3848" x="710" y="1845.7803">re-enters `CreateApplication` instead of binding</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8203" x="710" y="1859.7803">by list lookup.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0605" x="710" y="1873.7803">Create and update use custom request-body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.8057" x="710" y="1887.7803">builders so `execute` precedence, enum</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4883" x="710" y="1901.7803">validation, and optional field omission stay</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.1025" x="710" y="1915.7803">explicit in the checked-in contract.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9502" x="710" y="1929.7803">The generatedruntime delegate fully replaces</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6953" x="710" y="1943.7803">`ApplicationStatus` from the latest OCI payload,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.123" x="710" y="1957.7803">clearing omitted optional fields while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.8887" x="710" y="1971.7803">preserving OSOK bookkeeping.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.7715" x="710" y="1985.7803">Delete keeps the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8125" x="710" y="1999.7803">`GetApplication` returns not found; during</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4336" x="710" y="2013.7803">delete confirmation a `DELETED` lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="710" y="2027.7803">readback remains terminating instead of final</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="710" y="2041.7803">completion.</text><?plantuml-src fLXjRnkv4VxENp6uVhb3jNASbxkSWXJesUcrkFG2nEct01QrEoknffPRaYj5BVhV-mptNRORjuSWiPSSpkip3uS9TwQgjTTx2ZjTk