701" y="1435.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="701" y="1449.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="701" y="1463.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="701" y="1477.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="701" y="1491.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="701" y="1505.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="701" y="1519.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="701" y="1533.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2686" x="701" y="1547.7803">service: dataflow</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3994" x="701" y="1561.7803">slug: application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.9512" x="701" y="1575.7803">kind: Application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="701" y="1589.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="701" y="1603.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="701" y="1617.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="701" y="1631.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="701" y="1645.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="701" y="1659.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7158" x="701" y="1673.7803">supported drift: application_log_config,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.6299" x="701" y="1687.7803">archive_uri, arguments, class_name (+22 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="701" y="1701.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6201" x="701" y="1715.7803">compartment_id, type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="701" y="1729.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="701" y="1743.7803">list lookup: oci_dataflow_applications filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4336" x="701" y="1757.7803">compartment_id, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.1123" x="701" y="1771.7803">display_name_starts_with, owner_principal_id (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="701" y="1785.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="701" y="1799.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="701" y="1813.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="701" y="1827.7803">Package-local generatedruntime owns create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.1152" x="701" y="1841.7803">update, and observe; create and update use the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3848" x="701" y="1855.7803">immediate OCI response body rather than shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7236" x="701" y="1869.7803">read-after-write follow-up.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2266" x="701" y="1883.7803">Ready states map to OCI ACTIVE and INACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8057" x="701" y="1897.7803">Tracked status.osokStatus.ocid is preflighted</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="701" y="1911.7803">with GetApplication; OCI not found or observed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1436" x="701" y="1925.7803">DELETED clears the tracked identity and forces a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.8135" x="701" y="1939.7803">fresh create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1299" x="701" y="1953.7803">Delete confirmation is absence-based:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.833" x="701" y="1967.7803">DeleteApplication is followed by GetApplication</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2266" x="701" y="1981.7803">until OCI returns not found, while ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.9922" x="701" y="1995.7803">INACTIVE, and DELETED remain terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1992" x="701" y="2009.7803">intermediate observations.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="701" y="2023.7803">In-place updates follow the package-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5156" x="701" y="2037.7803">BuildUpdateBody surface and preserve execute</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="701" y="2051.7803">precedence over className, fileUri, arguments,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8887" x="701" y="2065.7803">configuration, and parameters.</text><?plantuml-src fLXhRzis5FtENq5iNrhCSfg-wo03ciVMebax9Etw9O11IvJDHIOrahBh3VllEvUaPCc9ss15KIGIoViwznnUnTqeNGihbjmjH67MIizvAIedcUjMPYA_cLlJwEBKLCRo7yiS_uhUZaAMegdyBqRxzs8f-HjPhQHNkRXxpvNwM_B3fxr5OQrP9-kFoiCNZ_idjV7ov5OCPVcYUBwxozX2shHZzlJPaqUlTdQG-xJ-vCdJmsVFUkl1V6wibfOVFcTU-KhoA_bN8tKkUSOBuKLPcVN1wxgka9nNHhE5AYGlZV4pywLdoxN7_c6SYzmREuWjvTWkxIOd7ykNvICimnZAg6gX_Ttd-nlkOwMNVsUZKgMyK7fOlLTFnPFPIwoIoNgm