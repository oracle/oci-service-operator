schemaVersion: 1
surface: repo-authored-semantics
service: dataflow
slug: application
kind: Application
archetype: generated-service-manager
states:
  - active
  - terminating
  - failed
notes:
  - The active Application runtime keeps the generated service-manager shell but overrides the generated client seam with an `applicationGeneratedRuntimeClient` wrapper around `generatedruntime.ServiceClient`.
  - Tracked OCI identity is preflighted through `GetApplication`; NotFound or lifecycle `DELETED` clears the recorded identity and re-enters `CreateApplication` instead of binding by list lookup.
  - Create and update use custom request-body builders so `execute` precedence, enum validation, and optional field omission stay explicit in the checked-in contract.
  - The generatedruntime delegate fully replaces `ApplicationStatus` from the latest OCI payload, clearing omitted optional fields while preserving OSOK bookkeeping.
  - Delete keeps the finalizer until `GetApplication` returns not found; during delete confirmation a `DELETED` lifecycle readback remains terminating instead of final completion.
