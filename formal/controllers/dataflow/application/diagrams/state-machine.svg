<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="835px" preserveAspectRatio="none" style="width:3553px;height:835px;background:#FCFCFD;" version="1.1" viewBox="0 0 3553 835" width="3553px" zoomAndPan="magnify"><title>State Machine - dataflow/Application</title><defs/><g><rect fill="#FCFCFD" height="835" style="stroke:none;stroke-width:1;" width="3553" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4688" x="1647.9836" y="20.7803">State Machine - dataflow/Application</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="198" y="683"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="198" x2="462.3643" y1="707" y2="707"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="303.7271" y="698.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="203" y="722.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="203" y="736.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1259.36" y="601"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1264.36" y="624.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2039.04" y="588"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2044.04" y="611.7803"