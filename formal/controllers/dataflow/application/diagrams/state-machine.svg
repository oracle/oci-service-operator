spacing" textLength="287.9229" x="2251.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2251.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2251.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2686" x="2251.78" y="182.7803">service: dataflow</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3994" x="2251.78" y="196.7803">slug: application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.9512" x="2251.78" y="210.7803">kind: Application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2251.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2251.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2251.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="2251.78" y="266.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2251.78" y="280.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="2251.78" y="294.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7158" x="2251.78" y="308.7803">supported drift: application_log_config,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.6299" x="2251.78" y="322.7803">archive_uri, arguments, class_name (+22 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2251.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6201" x="2251.78" y="350.7803">compartment_id, type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2251.78" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="2251.78" y="378.7803">list lookup: oci_dataflow_applications filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4336" x="2251.78" y="392.7803">compartment_id, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.1123" x="2251.78" y="406.7803">display_name_starts_with, owner_principal_id (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2251.78" y="420.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2251.78" y="434.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2251.78" y="448.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8262" x="2251.78" y="462.7803">Package-local generatedruntime owns create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.1152" x="2251.78" y="476.7803">update, and observe; create and update use the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3848" x="2251.78" y="490.7803">immediate OCI response body rather than shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7236" x="2251.78" y="504.7803">read-after-write follow-up.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2266" x="2251.78" y="518.7803">Ready states map to OCI ACTIVE and INACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8057" x="2251.78" y="532.7803">Tracked status.osokStatus.ocid is preflighted</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="2251.78" y="546.7803">with GetApplication; OCI not found or observed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1436" x="2251.78" y="560.7803">DELETED clears the tracked identity and forces a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.8135" x="2251.78" y="574.7803">fresh create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1299" x="2251.78" y="588.7803">Delete confirmation is absence-based:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.833" x="2251.78" y="602.7803">DeleteApplication is followed by GetApplication</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2266" x="2251.78" y="616.7803">until OCI returns not found, while ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.9922" x="2251.78" y="630.7803">INACTIVE, and DELETED remain terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1992" x="2251.78" y="644.7803">intermediate observations.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="2251.78" y="658.7803">In-place updates follow the package-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5156" x="2251.78" y="672.7803">BuildUpdateBody surface and preserve execute</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="2251.78" y="686.7803">precedence over className, fileUri, arguments,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8887" x="2251.78" y="700.7803">configuration, and parameters.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="104" id="ent0006"><path d="M2933.27,768 L2933.27,783.73 L2473.24,766.34 L2933.27,791.73 L2933.27,818 A8,8 0 0 0 2941.27,826 L3153.2827,826 A8,8 0 0 0 3161.2827,818 L3161.2827,770 L3151.2827,760 L2941.27,760 A8,8 0 0 0 2933.27,768" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3151.2827,760 L3151.2827,766 A4,4 0 0 0 3155.2827,770 L3161.2827,770 L3151.2827,760" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2939.27" y="775.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.0127" x="2939.27" y="789.7803">delete observe: GetApplication or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="97.2754" x="2939.27" y="803.7803">ListApplications</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="