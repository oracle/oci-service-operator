<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="786px" preserveAspectRatio="none" style="width:3140px;height:786px;background:#FCFCFD;" version="1.1" viewBox="0 0 3140 786" width="3140px" zoomAndPan="magnify"><title>State Machine - dataflow/Application</title><defs/><g><rect fill="#FCFCFD" height="786" style="stroke:none;stroke-width:1;" width="3140" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4688" x="1441.3836" y="20.7803">State Machine - dataflow/Application</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="198" y="633"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="198" x2="462.3643" y1="657" y2="657"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="303.7271" y="648.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="203" y="672.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="203" y="686.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="746.39" y="491"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="751.39" y="514.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1624.13" y="465"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1629.13" y="488.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1014.41" y="644"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1019.41" y="667.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1438.86" y="740"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1444.7946" y="763.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1171.61" y="465"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1176.61" y="488.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1204.28" y="540"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1209.28" y="563.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="1993.68" y="688"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="1998.68" y="711.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3051.52" y="636"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3056.52" y="659.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="2585.47" y="636"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2590.47" y="659.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="31" id="ent0002"><ellipse cx="16" cy="664" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="50" id="ent0003"><path d="M1868.36,49 L1868.36,404.64 L1674.96,476.37 L1868.36,412.64 L1868.36,645 A8,8 0 0 0 1876.36,653 L2212.8414,653 A8,8 0 0 0 2220.8414,645 L2220.8414,51 L2210.8414,41 L1876.36,41 A8,8 0 0 0 1868.36,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2210.8414,41 L2210.8414,47 A4,4 0 0 0 2214.8414,51 L2220.8414,51 L2210.8414,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="1874.36" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="1874.36" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="1874.36" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="1874.36" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="1874.36" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="1874.36" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="1874.36" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="1874.36" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="1874.36" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2686" x="1874.36" y="182.7803">service: dataflow</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3994" x="1874.36" y="196.7803">slug: application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.9512" x="1874.36" y="210.7803">kind: Application</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="1874.36" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="1874.36" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="1874.36" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="1874.36" y="266.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="1874.36" y="280.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.6064" x="1874.36" y="294.7803">delete DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7158" x="1874.36" y="308.7803">supported drift: application_log_config,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.6299" x="1874.36" y="322.7803">archive_uri, arguments, class_name (+22 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="1874.36" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6201" x="1874.36" y="350.7803">compartment_id, type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="1874.36" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="1874.36" y="378.7803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="1874.36" y="392.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="1874.36" y="406.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="1874.36" y="420.7803">The active Application runtime is still the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.6338" x="1874.36" y="434.7803">handwritten override in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8125" x="1874.36" y="448.7803">`pkg/servicemanager/dataflow/application`; this</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6885" x="1874.36" y="462.7803">seeded formal row exists to regenerate a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8467" x="1874.36" y="476.7803">generatedruntime baseline without switching the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="131.5166" x="1874.36" y="490.7803">active reconcile path.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6885" x="1874.36" y="504.7803">Create and update treat OCI `ACTIVE` and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4268" x="1874.36" y="518.7803">`INACTIVE` as successful observed states,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.04" x="1874.36" y="532.7803">project the live Application payload into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.2129" x="1874.36" y="546.7803">status, and reject create-only drift for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="173.5098" x="1874.36" y="560.7803">`compartmentId` and `type`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9092" x="1874.36" y="574.7803">The handwritten runtime never binds by list</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.585" x="1874.36" y="588.7803">lookup. Delete stays finalizer-backed for the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4541" x="1874.36" y="602.7803">tracked OCID until `GetApplication` returns not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1094" x="1874.36" y="616.7803">found; if OCI ever echoes lifecycle `DELETED`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1094" x="1874.36" y="630.7803">the runtime still treats that as terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7646" x="1874.36" y="644.7803">instead of final completion.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="95" id="ent0006"><path d="M2555.85,719 L2555.85,728.04 L2095.94,710.37 L2555.85,736.04 L2555.85,755 A8,8 0 0 0 2563.85,763 L2759.5248,763 A8,8 0 0 0 2767.5248,755 L2767.5248,721 L2757.5248,711 L2563.85,711 A8,8 0 0 0 2555.85,719" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2757.5248,711 L2757.5248,717 A4,4 0 0 0 2761.5248,721 L2767.5248,721 L2757.5248,711" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2561.85" y="726.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="190.6748" x="2561.85" y="740.7803">delete observe: GetApplication</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.7236" x="2561.85" y="754.7803">delete targets: NOT_FOUND</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="31" id="lnk3"><path d="M26.34,664 C52.37,664 122.32,664 191.65,664" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="197.65,664,188.65,660,192.65,664,188.65,668,197.65,664" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5098" x="57" y="659.7803">CreateApplication</text></g><!--link observe to evaluate_ready--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="32" id="lnk4"><path d="M427.03,632.58 C523.59,600.92 663.2886,555.1191 740.1886,529.9091" fill="none" id="observe-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="745.89,528.04,736.0918,527.0427,741.1388,529.5976,738.5839,534.6446,745.89,528.04" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2617" x="498.36" y="546.6403">OCI state in ACTIVE,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5654" x="532.2081" y="560.6403">INACTIVE</text></g><!--link observe to retryable--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="33" id="lnk5"><path d="M462.72,664 C632.16,664 910.49,664 1008.19,664" fill="none" id="observe-to-retryable" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1014.19,664,1005.19,660,1009.19,664,1005.19,668,1014.19,664" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.3789" x="493.36" y="659.7803">OCI state in DELETED</text></g><!--link observe to failed--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="34" id="lnk6"><path d="M462.66,675.15 C727.96,697.66 1306.8715,746.7626 1432.7215,757.4426" fill="none" id="observe-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1438.7,757.95,1430.0705,753.2033,1433.7179,757.5272,1429.394,761.1746,1438.7,757.95" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="667.36" y="688.6303">unresolved OCI error or non-success state</text></g><!--link evaluate_ready to reject_unsupported_drift--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="35" id="lnk7"><path d="M851.5,507.72 C883.2,505.73 924.63,503.16 961.36,501 C1032.48,496.82 1107.5289,492.6466 1165.3189,489.4966" fill="none" id="evaluate_ready-to-reject_unsupported_drift" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1171.31,489.17,1162.1056,485.6658,1166.3174,489.4421,1162.541,493.6539,1171.31