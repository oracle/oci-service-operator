" y="681"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="197.813" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="292.3848" x="173.4165" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3848" x="183.4165" y="755.7803">Delete path uses DeleteDataflowApplication</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6885" x="183.4165" y="769.7803">with required via GetDataflowApplication or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.7715" x="183.4165" y="783.7803">ListDataflowApplication to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="183.4165" y="797.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="180.0439" y="831"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="190.0439" y="851.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="190.0439" y="865.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="162.8994" y="899"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="172.8994" y="919.7803">Requeue on provisioning, updating, terminating</text><path d="M350.6089,943 L350.6089,1119 L330.6089,1123 L350.6089,1127 L350.6089,1303 A0,0 0 0 0 350.6089,1303 L690.6489,1303 A0,0 0 0 0 690.6489,1303 L690.6489,953 L680.6489,943 L350.6089,943 A0,0 0 0 0 350.6089,943" fil