ly="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="753.9995" y="1135.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg16"><polygon fill="#0F172A" points="490.4214,1186,480.4214,1190,490.4214,1194,486.4214,1190" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="484.4214" x2="745.9995" y1="1190" y2="1190"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="496.4214" y="1170.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="496.4214" y="1184.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg17"><polygon fill="#0F172A" points="251.5952,1235,241.5952,1239,251.5952,1243,247.5952,1239" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="245.5952" x2="478.4214" y1="1239" y2="1239"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.8262" x="257.5952" y="1219.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="257.5952" y="1233.7803">terminating</text></g><path d="M751,1260 L751,1912 A8,8 0 0 0 759,1920 L1084,1920 A8,8 0 0 0 1092,1912 L1092,1262 L1082,1252 L759,1252 A8,8 0 0 0 751,1260" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1082,1252 L1082,1258 A4,4 0 0 0 1086,1262 L1092,1262 L1082,1252" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="757" y="1267.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="757" y="1281.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="757" y="1295.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="757" y="1309.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="757" y="1323.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="757" y="1337.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="757" y="1351.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="757" y="1365.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="757" y="1379.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="757" y="1393.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="757" y="1407.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="757" y="1421.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="757" y="1435.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="757" y="1449.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="757" y="1463.7803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3926" x="757" y="1477.7803">slug: backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9443" x="757" y="1491.7803">kind: Backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="757" y="1505.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="757" y="1519.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="757" y="1533.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="757" y="1547.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="757" y="1561.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="757" y="1575.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="757" y="1589.7803">supported drift: backup, drain, offline, weight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="757" y="1603.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7773" x="757" y="1617.7803">backend_set_name, ip_address, load_balancer_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.124" x="757" y="1631.7803">port</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="757" y="1645.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7295" x="757" y="1659.7803">list lookup: oci_load_balancer_backends filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3926" x="757" y="1673.7803">ip_address, port</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="757" y="1687.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="757" y="1701.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6396" x="757" y="1715.7803">The published Backend runtime keeps request-path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0547" x="757" y="1729.7803">identity under</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6191" x="757" y="1743.7803">pkg/servicemanager/loadbalancer/backend by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5225" x="757" y="1757.7803">resolving loadBalancerId, backendSetName, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6816" x="757" y="1771.7803">the derived backend name locally.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9092" x="757" y="1785.7803">Create first probes GetBackend on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.6191" x="757" y="1799.7803">deterministic backend path; a matching backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3916" x="757" y="1813.7803">binds into observe or update, while 404 falls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3301" x="757" y="1827.7803">through to CreateBackend.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="757" y="1841.7803">Create and update use read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="757" y="1855.7803">follow-up, then settle through the next observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7637" x="757" y="1869.7803">because Backend payloads do not expose lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8955" x="757" y="1883.7803">fields. Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7021" x="757" y="1897.7803">GetBackend or list fallback confirms the backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.0342" x="757" y="1911.7803">is gone.</text><?plantuml-src hLXTRzp65NsVNp58Nb9WALcnd3Xhk43je6qGfmQiz4s0C2GlTwVYph0pmrrlY_ptdZiVN78b9IeI-45BpftxUUwvb_RtsWpAgPtqMzNQWpORsQdUa_3JIQsQ-uspesdVszuw-MNNu5yxasYfKsCV_cfD-8VQaVmxzNiAkb6Fozpe_v2ykfuTAkVi8Mj_qLrz-_Nyfh61tZtmeUk-RRyvbxAk9PSbwkjNBrzyToR1vlFvovVNLwzUpSwZ-iOwGqvUVIE23Zt96_htIAOXMSdUghPMlSAJksI7oBHYgrkIdRMXjfzdkdovzbyXfMg2TGlVSepbw3mu-ffUTozm36L8enwK2O_VdmiyHyii_ab7hplweC