 0 0 0 690.4656,1554" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1022.1052,1554 L1022.1052,1564 L1032.1052,1564 L1022.1052,1554" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="696.4656" y="1569.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="696.4656" y="1583.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="696.4656" y="1597.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="696.4656" y="1611.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="696.4656" y="1625.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="696.4656" y="1639.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="696.4656" y="1653.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="696.4656" y="1667.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="696.4656" y="1681.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="696.4656" y="1695.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="696.4656" y="1709.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="696.4656" y="1723.7803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3926" x="696.4656" y="1737.7803">slug: backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9443" x="696.4656" y="1751.7803">kind: Backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="696.4656" y="1765.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="696.4656" y="1779.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="696.4656" y="1793.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="696.4656" y="1807.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="696.4656" y="1821.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="696.4656" y="1835.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="696.4656" y="1849.7803">supported drift: backup, drain, offline, weight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="696.4656" y="1863.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7773" x="696.4656" y="1877.7803">backend_set_name, ip_address, load_balancer_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.124" x="696.4656" y="1891.7803">port</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="696.4656" y="1905.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7295" x="696.4656" y="1919.7803">list lookup: oci_load_balancer_backends filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3926" x="696.4656" y="1933.7803">ip_address, port</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="696.4656" y="1947.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="696.4656" y="1961.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6396" x="696.4656" y="1975.7803">The published Backend runtime keeps request-path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0547" x="696.4656" y="1989.7803">identity under</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6191" x="696.4656" y="2003.7803">pkg/servicemanager/loadbalancer/backend by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5225" x="696.4656" y="2017.7803">resolving loadBalancerId, backendSetName, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6816" x="696.4656" y="2031.7803">the derived backend name locally.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9092" x="696.4656" y="2045.7803">Create first probes GetBackend on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.6191" x="696.4656" y="2059.7803">deterministic backend path; a matching backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3916" x="696.4656" y="2073.7803">binds into observe or update, while 404 falls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3301" x="696.4656" y="2087.7803">through to CreateBackend.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="696.4656" y="2101.7803">Create and update use read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="696.4656" y="2115.7803">follow-up, then settle through the next observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7637" x="696.4656" y="2129.7803">because Backend payloads do not expose lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8955" x="696.4656" y="2143.7803">fields. Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7021" x="696.4656" y="2157.7803">GetBackend or list fallback confirms the backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.0342" x="696.4656" y="2171.7803">is gone.</text><ellipse cx="659.4656" cy="1867" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="659.4656" cy="1867" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke