<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="758px" preserveAspectRatio="none" style="width:3601px;height:758px;background:#FCFCFD;" version="1.1" viewBox="0 0 3601 758" width="3601px" zoomAndPan="magnify"><title>State Machine - loadbalancer/Backend</title><defs/><g><rect fill="#FCFCFD" height="758" style="stroke:none;stroke-width:1;" width="3601" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="255.1924" x="1666.2018" y="20.7803">State Machine - loadbalancer/Backend</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="184" y="613"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="184" x2="448.3643" y1="637" y2="637"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="289.7271" y="628.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="189" y="652.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="189" y="666.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1245.36" y="531"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1250.36" y="554.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2014.04" y="518"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2019.04" y="541.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="2004.32" y="637"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="2009.32" y="660.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1272.84" y="698"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1278.7746" y="721.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="726.44" y="624"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="731.44" y="647.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1579.56" y="615"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1584.56" y="638.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1612.23" y="454"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1617.23" y="477.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="2365.55" y="674"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2370.55" y="697.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3512.88" y="622"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3517.88" y="645.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="3002.08" y="622"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3007.08" y="645.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="644" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="53" id="ent0003"><path d="M2240.23,49 L2240.23,428.69 L2064.89,525.01 L2240.23,436.69 L2240.23,631 A8,8 0 0 0 2248.23,639 L2584.7114,639 A8,8 0 0 0 2592.7114,631 L2592.7114,51 L2582.7114,41 L2248.23,41 A8,8 0 0 0 2240.23,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2582.7114,41 L2582.7114,47 A4,4 0 0 0 2586.7114,51 L2592.7114,51 L2582.7114,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2246.23" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2246.23" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2246.23" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2246.23" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2246.23" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2246.23" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2246.23" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2246.23" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2246.23" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="2246.23" y="182.7803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3926" x="2246.23" y="196.7803">slug: backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9443" x="2246.23" y="210.7803">kind: Backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2246.23" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2246.23" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2246.23" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2246.23" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2246.23" y="280.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="2246.23" y="294.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="2246.23" y="308.7803">supported drift: backup, drain, offline, weight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2246.23" y="322.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7773" x="2246.23" y="336.7803">backend_set_name, ip_address, load_balancer_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.124" x="2246.23" y="350.7803">port</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2246.23" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7295" x="2246.23" y="378.7803">list lookup: oci_load_balancer_backends filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3926" x="2246.23" y="392.7803">ip_address, port</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2246.23" y="406.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2246.23" y="420.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6396" x="2246.23" y="434.7803">The published Backend runtime keeps request-path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0547" x="2246.23" y="448.7803">identity under</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6191" x="2246.23" y="462.7803">pkg/servicemanager/loadbalancer/backend by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5225" x="2246.23" y="476.7803">resolving loadBalancerId, backendSetName, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6816" x="2246.23" y="490.7803">the derived backend name locally.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9092" x="2246.23" y="504.7803">Create first probes GetBackend on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.6191" x="2246.23" y="518.7803">deterministic backend path; a matching backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3916" x="2246.23" y="532.7803">binds into observe or update, while 404 falls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3301" x="2246.23" y="546.7803">through to CreateBackend.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="2246.23" y="560.7803">Create and update use read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="2246.23" y="574.7803">follow-up, then settle through the next observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7637" x="2246.23" y="588.7803">because Backend payloads do not expose lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8955" x="2246.23" y="602.7803">fields. Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7021" x="2246.23" y="616.7803">GetBackend or list fallback confirms the backend</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.0342" x="2246.23" y="630.7803">is gone.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="97" id="ent0006"><path d="M2927.71,705 L2927.71,712.42 L2467.88,696.22 L2927.71,720.42 L2927.71,741 A8,8 0 0 0 2935.71,749 L3220.8741,749 A8,8 0 0 0 3228.8741,741 L3228.8741,707 L3218.8741,697 L2935.71,697 A8,8 0 0 0 2927.71,705" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3218.8741,697 L3218.8741,703 A4,4 0 0 0 3222.8741,707 L3228.8741,707 L3218.8741,697" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2933.71" y="712.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1641" x="2933.71" y="726.7803">delete observe: GetBackend or ListBackends</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2933.71" y="740.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.25,644 C50.68,644 113.46,644 177.78,644" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="183.78,644,174.78,640,178.78,644,174.78,648,183.78,644" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.5029" x="57" y="639.7803">CreateBackend</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M448.64,644 C539.55,644 650.29,644 720.14,644" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="726.14,644,717.14,640,721.14,644,717.14,648,726.14,644" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="479.36" y="639.7803">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="34" id="lnk5"><path d="M849.64,642.54 C950.94,639.46 1149.69,630.55 1215.36,607 C1237.18,599.18 1253.9894,587.821 1269.4094,575.251" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1274.06,571.46,1264.5568,574.0462,1270.1845,574.6192,1269.6115,580.247,1274.06,571.46" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="1005.86" y="588.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="1057.6217" y="602.7803">ACTIVE</text></g><!--link resolve_by_lookup to failed--><g class="link" data-entity-1="ent0007" data-entity-2="ent0006" data-link-type="dependency" data-source-line="35" id="lnk6"><path d="M849.74,651.08 C950.24,662.9 1146.58,686.58 1215.36,699 C1234.66,702.48 1250.4394,706.1239 1266.5494,710.1539" fill="none" id="resolve_by_lookup-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1272.37,711.61,1264.6097,705.5455,1267.5195,710.3966,1262.6683,713.3063,1272.37,711.61" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="951.36" y="659.5303">unresolved OCI error or non-success state</text></g><!--link observe to evaluate_ready--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="36" id="lnk7"><path d="M448.62,623.89 C458.68,622.52 468.68,621.2 478.36,620 C687.57,594.02 740.25,590.13 950.36,573 C1054.89,564.48 1171.3988,557.7054 1239.1488,554.0254" fill="none" id="observe-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><po