pacing" textLength="291.0469" x="704.3457" y="1889.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="704.3457" y="1903.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="704.3457" y="1917.7803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.0684" x="704.3457" y="1931.7803">slug: backendset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.958" x="704.3457" y="1945.7803">kind: BackendSet</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="704.3457" y="1959.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="704.3457" y="1973.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="704.3457" y="1987.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="704.3457" y="2001.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="704.3457" y="2015.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="704.3457" y="2029.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8262" x="704.3457" y="2043.7803">supported drift: backends, health_checker,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.626" x="704.3457" y="2057.7803">lb_cookie_session_persistence_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7549" x="704.3457" y="2071.7803">policy (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="704.3457" y="2085.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1504" x="704.3457" y="2099.7803">load_balancer_id, name and conflicts</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.4639" x="704.3457" y="2113.7803">lb_cookie_session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6885" x="704.3457" y="2127.7803">session_persistence_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.5264" x="704.3457" y="2141.7803">session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7363" x="704.3457" y="2155.7803">lb_cookie_session_persistence_configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="704.3457" y="2169.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8535" x="704.3457" y="2183.7803">list lookup: oci_load_balancer_backend_sets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3584" x="704.3457" y="2197.7803">filters name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4619" x="704.3457" y="2211.7803">conflicts:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.4639" x="704.3457" y="2225.7803">lb_cookie_session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6885" x="704.3457" y="2239.7803">session_persistence_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.5264" x="704.3457" y="2253.7803">session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7363" x="704.3457" y="2267.7803">lb_cookie_session_persistence_configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="704.3457" y="2281.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1572" x="704.3457" y="2295.7803">The published BackendSet runtime keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4473" x="704.3457" y="2309.7803">request-path lookup under</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2949" x="704.3457" y="2323.7803">pkg/servicemanager/loadbalancer/backendset by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="704.3457" y="2337.7803">resolving loadBalancerId from status or spec and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9297" x="704.3457" y="2351.7803">backendSetName from status.name or spec.name.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9229" x="704.3457" y="2365.7803">Create first probes GetBackendSet on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3643" x="704.3457" y="2379.7803">deterministic backend set path; a matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="704.3457" y="2393.7803">backend set binds into observe or update, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7363" x="704.3457" y="2407.7803">a 404 falls through to list lookup by name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.5439" x="704.3457" y="2421.7803">then CreateBackendSet.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="704.3457" y="2435.7803">Create and update use read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="704.3457" y="2449.7803">follow-up, then settle through the next observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0947" x="704.3457" y="2463.7803">because BackendSet payloads do not expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0059" x="704.3457" y="2477.7803">lifecycle fields. Delete retains the finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1162" x="704.3457" y="2491.7803">until GetBackendSet or list fallback confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.7715" x="704.3457" y="2505.7803">the backend set is gone.</text><ellipse cx="667.3457" cy="2131" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="667.3457" cy="2131" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="667.