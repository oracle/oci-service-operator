just="spacing" textLength="100.7549" x="779" y="1771.7803">policy (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="779" y="1785.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1504" x="779" y="1799.7803">load_balancer_id, name and conflicts</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.4639" x="779" y="1813.7803">lb_cookie_session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6885" x="779" y="1827.7803">session_persistence_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.5264" x="779" y="1841.7803">session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7363" x="779" y="1855.7803">lb_cookie_session_persistence_configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="779" y="1869.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8535" x="779" y="1883.7803">list lookup: oci_load_balancer_backend_sets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3584" x="779" y="1897.7803">filters name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4619" x="779" y="1911.7803">conflicts:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.4639" x="779" y="1925.7803">lb_cookie_session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6885" x="779" y="1939.7803">session_persistence_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.5264" x="779" y="1953.7803">session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7363" x="779" y="1967.7803">lb_cookie_session_persistence_configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="779" y="1981.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1572" x="779" y="1995.7803">The published BackendSet runtime keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4473" x="779" y="2009.7803">request-path lookup under</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2949" x="779" y="2023.7803">pkg/servicemanager/loadbalancer/backendset by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="779" y="2037.7803">resolving loadBalancerId from status or spec and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9297" x="779" y="2051.7803">backendSetName from status.name or spec.name.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9229" x="779" y="2065.7803">Create first probes GetBackendSet on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3643" x="779" y="2079.7803">deterministic backend set path; a matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="779" y="2093.7803">backend set binds into observe or update, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7363" x="779" y="2107.7803">a 404 falls through to list lookup by name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.5439" x="779" y="2121.7803">then CreateBackendSet.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="779" y="2135.7803">Create and update use read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="779" y="2149.7803">follow-up, then settle through the next observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0947" x="779" y="2163.7803">because BackendSet payloads do not expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0059" x="779" y="2177.7803">lifecycle fields. Delete retains the finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1162" x="779" y="2191.7803">until GetBackendSet or list fallback confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.7715" x="779" y="2205.7803">the backend set is gone.</text><?plantuml-src rLXjRnkv4VxENq5Sl-HGIuuJvowd80KQ7zexNDe0SVlDWC7TdTMoNf5RaYj5BVhV-mp9VPFjnhaM20h3a7OvdFTvPaR-JfjEERMJlb6LFMYpbRLgFGa_dXIglDiwsvlgohRMoT_K9Vwg6KL5jUhRy0Thmf_LZkHFrEufw58zJ7Ej_q7oud9sg9opXypzUNtn_OlvJMC3lRkdGrr_NtrtIcLTHIvJ59UlNZx_uOI2nUVpboylBrwzcfr7zgLrXfoy-4u47LgIr_Jtdan9SYLRgwf2jGfFxfmL8bDTKn2DhaZMreR2VfgnyyFDVmefLHciMwYNpHoEJksZ5_IwVevZC8CdTQTCUFZ-dE0fN6Ok67cqkgRtsYmT-CEbUbcynYcpx1P7PL6zeelnw5vmNjUgBiM_HBHD_j8N1Ay6ycAcXxo28iwsBRd5wtVAqqSghIdrwT4t7wu__79DRgzB-fCoQalk6wcyNBvQNFbmzRFWm4kxHrYNlCzExg4475NIaRTj7xGrc_pglD9gYvZwy_IycaXMGvZNVhyTE5JKmjf7RwVZvKtaKanGCJbBhdutyz56aW5zJt9AFQYQRH4J8LzRshcHu_TdZ