<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="898px" preserveAspectRatio="none" style="width:3782px;height:898px;background:#FCFCFD;" version="1.1" viewBox="0 0 3782 898" width="3782px" zoomAndPan="magnify"><title>State Machine - loadbalancer/BackendSet</title><defs/><g><rect fill="#FCFCFD" height="898" style="stroke:none;stroke-width:1;" width="3782" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="276.9785" x="1745.8187" y="20.7803">State Machine - loadbalancer/BackendSet</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="205" y="753"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="205" x2="469.3643" y1="777" y2="777"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="310.7271" y="768.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="210" y="792.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="210" y="806.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1266.36" y="671"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1271.36" y="694.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2153.04" y="658"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2158.04" y="681.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8"