ll="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3167.1" y="785.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="784" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="53" id="ent0003"><path d="M2379.23,49 L2379.23,531.45 L2203.89,660.42 L2379.23,539.45 L2379.23,771 A8,8 0 0 0 2387.23,779 L2723.7114,779 A8,8 0 0 0 2731.7114,771 L2731.7114,51 L2721.7114,41 L2387.23,41 A8,8 0 0 0 2379.23,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2721.7114,41 L2721.7114,47 A4,4 0 0 0 2725.7114,51 L2731.7114,51 L2721.7114,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2385.23" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2385.23" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2385.23" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2385.23" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2385.23" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2385.23" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2385.23" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2385.23" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2385.23" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="2385.23" y="182.7803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.0684" x="2385.23" y="196.7803">slug: backendset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.958" x="2385.23" y="210.7803">kind: BackendSet</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2385.23" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2385.23" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2385.23" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2385.23" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2385.23" y="280.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="2385.23" y="294.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8262" x="2385.23" y="308.7803">supported drift: backends, health_checker,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.626" x="2385.23" y="322.7803">lb_cookie_session_persistence_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7549" x="2385.23" y="336.7803">policy (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2385.23" y="350.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1504" x="2385.23" y="364.7803">load_balancer_id, name and conflicts</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.4639" x="2385.23" y="378.7803">lb_cookie_session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6885" x="2385.23" y="392.7803">session_persistence_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.5264" x="2385.23" y="406.7803">session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7363" x="2385.23" y="420.7803">lb_cookie_session_persistence_configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2385.23" y="434.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8535" x="2385.23" y="448.7803">list lookup: oci_load_balancer_backend_sets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3584" x="2385.23" y="462.7803">filters name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4619" x="2385.23" y="476.7803">conflicts:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.4639" x="2385.23" y="490.7803">lb_cookie_session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6885" x="2385.23" y="504.7803">session_persistence_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.5264" x="2385.23" y="518.7803">session_persistence_configuration -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7363" x="2385.23" y="532.7803">lb_cookie_session_persistence_configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2385.23" y="546.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1572" x="2385.23" y="560.7803">The published BackendSet runtime keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4473" x="2385.23" y="574.7803">request-path lookup under</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2949" x="2385.23" y="588.7803">pkg/servicemanager/loadbalancer/backendset by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="2385.23" y="602.7803">resolving loadBalancerId from status or spec and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9297" x="2385.23" y="616.7803">backendSetName from status.name or spec.name.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9229" x="2385.23" y="630.7803">Create first probes GetBackendSet on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3643" x="2385.23" y="644.7803">deterministic backend set path; a matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="2385.23" y="658.7803">backend set binds into observe or update, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7363" x="2385.23" y="672.7803">a 404 falls through to list lookup by name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.5439" x="2385.23" y="686.7803">then CreateBackendSet.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="2385.23" y="700.7803">Create and update use read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="2385.23" y="714.7803">follow-up, then settle through the next observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0947" x="2385.23" y="728.7803">because BackendSet payloads do not expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0059" x="2385.23" y="742.7803">lifecycle fields. Delete retains the finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1162" x="2385.23" y="756.7803">until GetBackendSet or list fallback confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.7715" x="2385.23" y="770.7803">the backend set is gone.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="107" id="ent0006"><path d="M3066.71,845 L3066.71,851.72 L2606.81,836.14 L3066.71,859.72 L3066.71,881 A8,8 0 0 0 3074.71,889 L3401.9014,889 A8,8 0 0 0 3409.9014,881 L3409.9014,847 L3399.9014,837 L3074.71,837 A8,8 0 0 0 3066.71,845" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3399.9014,837 L3399.9014,843 A4,4 0 0 0 3403.9014,847 L3409.9014,847 L3399.9014,837" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="3072.71" y="852.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1914" x="3072.71" y="866.7803">delete observe: GetBackendSet or ListBackendSets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="3072.71" y="880.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.21,784 C52.83,784 126.61,784 198.56,784" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="204.56,784,195.56,780,199.56,784,195.56,788,204.56,784" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="117.5166" x="57" y="779.7803">CreateBackendSet</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M469.64,784 C560.55,784 671.29,784 741.14,784" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="747.14,784,738.14,780,742.14,784,738.14,788,747.14,784" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="500.36" y="779.7803">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" da