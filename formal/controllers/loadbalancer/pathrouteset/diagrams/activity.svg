ica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="163.7649" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1299" x="138.9958" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3848" x="148.9958" y="755.7803">Delete path uses DeletePathRouteSet with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.1162" x="148.9958" y="769.7803">required via GetPathRouteSet or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1299" x="148.9958" y="783.7803">ListPathRouteSet to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="145.9958" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="155.9958" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="155.9958" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="128.8513" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="138.8513" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M316.5608,929 L316.5608,1105 L296.5608,1109 L316.5608,1113 L316.5608,1289 A0,0 0 0 0 316.5608,1289 L656.6008,1289 A0,0 0 0 0 656.6008,1289 L656.6008,939 L646.6008,929 L316.5608,929 A0,0 0 0 0 316.5608,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M646.6008,929 L646.6008,939 L656.6008,939 L646.6008,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-fami