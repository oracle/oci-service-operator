<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="849px" preserveAspectRatio="none" style="width:3140px;height:849px;background:#FCFCFD;" version="1.1" viewBox="0 0 3140 849" width="3140px" zoomAndPan="magnify"><title>State Machine - loadbalancer/Listener</title><defs/><g><rect fill="#FCFCFD" height="849" style="stroke:none;stroke-width:1;" width="3140" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="251.2959" x="1437.715" y="20.7803">State Machine - loadbalancer/Listener</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="179" y="224"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="179" x2="443.3643" y1="248" y2="248"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="284.7271" y="239.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="184" y="263.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="184" y="277.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="768.36" y="290"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="773.36" y="313.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1550.04" y="352"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1555.04" y="375.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1540.32" y="233"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1545.32" y="256.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="967.32" y="144"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="973.2546" y="167.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1115.56" y="409"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1120.56" y="432.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1148.23" y="248"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1153.23" y="271.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="1901.55" y="153"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="1906.55" y="176.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3052.02" y="102"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3057.02" y="125.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="2539.65" y="102"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2544.65" y="125.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="255" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="49" id="ent0003"><path d="M1776.23,236 L1776.23,454.17 L1600.89,382.63 L1776.23,462.17 L1776.23,832 A8,8 0 0 0 1784.23,840 L2120.7114,840 A8,8 0 0 0 2128.7114,832 L2128.7114,238 L2118.7114,228 L1784.23,228 A8,8 0 0 0 1776.23,236" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2118.7114,228 L2118.7114,234 A4,4 0 0 0 2122.7114,238 L2128.7114,238 L2118.7114,228" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="1782.23" y="243.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="1782.23" y="257.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="1782.23" y="271.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="1782.23" y="285.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="1782.23" y="299.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="1782.23" y="313.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="1782.23" y="327.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="1782.23" y="341.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="1782.23" y="355.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="1782.23" y="369.7803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5928" x="1782.23" y="383.7803">slug: listener</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.2686" x="1782.23" y="397.7803">kind: Listener</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="1782.23" y="411.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="1782.23" y="425.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="1782.23" y="439.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="1782.23" y="453.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="1782.23" y="467.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="1782.23" y="481.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.833" x="1782.23" y="495.7803">supported drift: connection_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9775" x="1782.23" y="509.7803">default_backend_set_name, hostname_names,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.1748" x="1782.23" y="523.7803">path_route_set_name (+5 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="1782.23" y="537.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4404" x="1782.23" y="551.7803">load_balancer_id, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="1782.23" y="565.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="1782.23" y="579.7803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="1782.23" y="593.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="1782.23" y="607.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4678" x="1782.23" y="621.7803">The published Listener runtime keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4473" x="1782.23" y="635.7803">request-path lookup under</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8193" x="1782.23" y="649.7803">pkg/servicemanager/loadbalancer/listener by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="1782.23" y="663.7803">resolving loadBalancerId from status or spec and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5713" x="1782.23" y="677.7803">listener name from status.name, spec.name, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1782.23" y="691.7803">the Kubernetes object name.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="323.75" x="1782.23" y="705.7803">Because OCI exposes no standalone GetListener or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2676" x="1782.23" y="719.7803">ListListeners API, read, bind, and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0195" x="1782.23" y="733.7803">confirmation all project the named listener from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.874" x="1782.23" y="747.7803">GetLoadBalancer on the owning load balancer.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="1782.23" y="761.7803">Create and update use read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="1782.23" y="775.7803">follow-up, then settle through the next observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0811" x="1782.23" y="789.7803">because Listener payloads do not expose a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2676" x="1782.23" y="803.7803">standalone lifecycle field. Delete retains the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2607" x="1782.23" y="817.7803">finalizer until the named listener disappears</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9717" x="1782.23" y="831.7803">from the parent listeners map.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="94" id="ent0006"><path d="M2463.71,185 L2463.71,197.52 L2003.73,175.81 L2463.71,205.52 L2463.71,235 A8,8 0 0 0 2471.71,243 L2760.0118,243 A8,8 0 0 0 2768.0118,235 L2768.0118,187 L2758.0118,177 L2471.71,177 A8,8 0 0 0 2463.71,185" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2758.0118,177 L2758.0118,183 A4,4 0 0 0 2762.0118,187 L2768.0118,187 L2758.0118,177" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2469.71" y="192.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3018" x="2469.71" y="206.7803">delete observe: repo-authored delete observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="27.248" x="2469.71" y="220.7803">path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2469.71" y="234.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="31" id="lnk3"><path d="M26.42,255 C50.44,255 110.44,255 172.75,255" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="178.75,255,169.75,251,173.75,255,169.75,259,178.75,255" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8271" x="57" y="250.7803">CreateListener</text></g><!--link observe to evaluate_ready--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="32" id="lnk4"><path d="M443.58,269.24 C549.34,280.69 686.4249,295.5439 762.0449,303.7339" fill="none" id="observe-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="768.01,304.38,759.493,299.4342,763.0391,303.8416,758.6316,307.3877,768.01,304.38" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="541.86" y="268.5703">OCI state in ACTIVE</text></g><!--link observe to failed--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="33" id="lnk5"><path d="M443.53,237.4 C609.72,215.13 878.3431,179.1367 961.0531,168.0567" fill="none" id="observe-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="967,167.26,957.5486,164.4904,962.0443,167.9239,958.6108,172.4196,967,167.26" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="474.36" y="193.6903">unresolved OCI error or non-success state</text></g><!--link evaluate_ready to reject_unsupported_drift--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="34" id="lnk6"><path d="M835,330.37 C849.22,350.5 873.85,380.34 903.32,395 C969.57,427.98 1048.6403,434.4084 1109.2903,433.8184" fill="none" id="evaluate_ready-to-reject_unsupported_drift" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1115.29,433.76,1106.2515,429.8477,1110.2902,433.8086,1106.3293,437.8474,1115.29,433.76" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9512" x="920.82" y="376.7803">force-new or conflicting</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9375" x="952.3268" y="390.7803">drift detected</text></g><!--link reject_unsupported_drift to ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0004" data-link-type="dependency" data-source-line="35" id="lnk7"><path d="M1271.21,417.47 C1357.94,404.45 1488.1963,384.9096 1543.6263,376.5996" fill="none" id="reject_unsupported_drift-to-ready" style="stroke:#0F172A;stroke-width:1;"