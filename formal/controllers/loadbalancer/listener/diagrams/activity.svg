olve OCI state via GetListener with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="122.9512" x="156.0027" y="255.7803">ListListener fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="128.0994" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2471" x="138.0994" y="309.7803">Use scaffold_loadbalancer_listener filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="138.0994" y="323.7803">compartment_id, state when OCID lookup or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5645" x="138.0994" y="337.7803">bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="222.53,371,329.9089,371,341.9089,383,329.9089,395,222.53,395,210.53,383,222.53,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="222.53" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="188.7439" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="341.9089" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="227.0195" x="30.8413" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.0195" x="40.8413" y="425.7803">Update path calls UpdateListener</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="11" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.7021" x="21" y="479.7803">Guard mutable fields display_name and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3096" x="21" y="493.7803">force-new fields compartment_id</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="220.7715" x="297.7021" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.7715" x="307.7021" y="425.7803">Create path calls CreateListener</text><polygon fill="#E2E8F0" points="276.2195,513,288.2195,525,276.2195,537,264.2195,525,276.2195,513" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="104" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="109.0613" y="557"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="119.0613" y="577.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="119.0613" y="591.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="119.0613" y="605.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="119.0613" y="619.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="119.0613" y="633.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="119.0613" y="647.7803">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="263.5918" x="144.4236" y="681"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="154.4236" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2744" x="124.5823" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2744" x="134.5823" y="755.7803">Delete path uses DeleteListener with required</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0059" x="134.5823" y="769.7803">via GetListener or ListListener to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="134.5823" y="783.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="136.6545" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="146.6545" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="146.6545" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="119.51" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="129.51" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M307.2195,929 L307.2195,1105 L287.2195,1109 L307.2195,1113 L307.2195,1289 A0,0 0 0 0 307.2195,1289 L647.2595,1289 A0,0 0 0 0 647.2595,1289 L647.2595,939 L637.2595,929 L307.2195,929 A0,0 0 0 0 307.2195,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M637.2595,929 L637.2595,939 L647.2595,939 L637.2595,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" tex