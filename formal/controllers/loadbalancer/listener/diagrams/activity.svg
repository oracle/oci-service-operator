="14" lengthAdjust="spacing" textLength="219.0508" x="854.6892" y="1248.2803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="854.6892" y="1262.2803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="854.6892" y="1276.2803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="854.6892" y="1290.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="839.8562" y="1323.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="849.8562" y="1344.2803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="851.9011" y="1377.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="861.9011" y="1398.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="861.9011" y="1412.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="834.7566" y="1445.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="844.7566" y="1466.2803">Requeue on provisioning, updating, terminating</text><path d="M696.6051,1501.5 L696.6051,1817.5 L676.6051,1821.5 L696.6051,1825.5 L696.6051,2141.5 A0,0 0 0 0 696.6051,2141.5 L1041.3551,2141.5 A0,0 0 0 0 1041.3551,2141.5 L1041.3551,1511.5 L1031.3551,1501.5 L696.6051,1501.5 A0,0 0 0 0 696.6051,1501.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1031.3551,1501.5 L1031.3551,1511.5 L1041.3551,1511.5 L1031.3551,1501.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="702.6051" y="1517.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="702.6051" y="1531.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="702.6051" y="1545.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="702.6051" y="1559.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="702.6051" y="1573.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="702.6051" y="1587.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="702.6051" y="1601.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="702.6051" y="1615.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="702.6051" y="1629.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="702.6051" y="1643.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="702.6051" y="1657.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="702.6051" y="1671.2803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5928" x="702.6051" y="1685.2803">slug: listener</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.2686" x="702.6051" y="1699.2803">kind: Listener</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="702.6051" y="1713.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="702.6051" y="1727.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="702.6051" y="1741.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="702.6051" y="1755.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="702.6051" y="1769.2803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="702.6051" y="1783.2803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.833" x="702.6051" y="1797.2803">supported drift: connection_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9775" x="702.6051" y="1811.2803">default_backend_set_name, hostname_names,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.1748" x="702.6051" y="1825.2803">path_route_set_name (+5 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="702.6051" y="1839.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4404" x="702.6051" y="1853.2803">load_balancer_id, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="702.6051" y="1867.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="702.6051" y="1881.2803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="702.6051" y="1895.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="702.6051" y="1909.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4678" x="702.6051" y="1923.2803">The published Listener runtime keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4473" x="702.6051" y="1937.2803">request-path lookup under</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8193" x="702.6051" y="1951.2803">pkg/servicemanager/loadbalancer/listener by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="702.6051" y="1965.2803">resolving loadBalancerId from status or spec and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5713" x="702.6051" y="1979.2803">listener name from status.name, spec.name, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="702.6051" y="1993.2803">the Kubernetes object name.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="323.75" x="702.6051" y="2007.2803">Because OCI exposes no standalone GetListener or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2676" x="702.6051" y="2021.2803">ListListeners API, read, bind, and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0195" x="702.6051" y="2035.2803">confirmation all project the named listener from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.874" x="702.6051" y="2049.2803">GetLoadBalancer on the owning load balancer.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="702.6051" y="2063.2803">Create and update use read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="702.6051" y="2077.2803">follow-up, then settle through the next observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0811" x="702.6051" y="2091.2803">because Listener payloads do not expose a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2676" x="702.6051" y="2105.2803">standalone lifecycle field. Delete retains the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2607" x="702.6051" y="2119.2803">finalizer until the named listener disappears</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9717" x="702.6051" y="2133.2803">from the parent listeners map.</text><ellipse cx="665.6051" cy="1821.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="665.6051" cy="1821.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="665.6051" x2="665.6051" y1="157" y2="177"/><polygon fill="#0F172A" points="661.6051,167,665.6051,177,669.6051,167,665.6051,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="817.0709" x2="817.0709" y1="327" y2="347"/><polygon fill="#0F172A" points="813.0709,337,817.0709,347,821.0709,337,817.0709,341" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="524.1393" x2="514.1393" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="514.1393" x2="514.1393" y1="257" y2="279"/><polygon fill="#0F172A" points="510.1393,269,514.1393,279,518.1393,269,514.1393,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="807.0709" x2="817.0709" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="817.0709" x2="817.0709" y1="257" y2="279"/><polygon fill="#0F172A" points="813.0709,269,817.0709,279,821.0709,269,817.0709,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="514.1393" x2="514.1393" y1="327" y2="413"/><line style="stroke:#0F172A;stroke-width:1;" x1="514.1393" x2="653.6051" y1="413" y2="413"/><polygon fill="#0F172A" points="643.6051,409,653.6051,413,643.6051,417,647.6051,413" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="817.0709" x2="817.0709" y1="395" y2="413"/><line style="stroke:#0F172A;stroke-width:1;" x1="817.0709" x2="677.6051" y1="413" y2="413"/><polygon fill="#0F172A" points="687.6051,409,677.6051,413,687.6051,417,683.6051,413" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="665.6051" x2="665.6051" y1="225" y2="245"/><polygon fill="#0F172A" points="661.6051,235,665.60