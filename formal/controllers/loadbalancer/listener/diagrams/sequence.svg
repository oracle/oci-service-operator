"1174"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.8262" x="252.9194" y="1154.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="252.9194" y="1168.7803">terminating</text></g><path d="M747,1195 L747,1861 A8,8 0 0 0 755,1869 L1083,1869 A8,8 0 0 0 1091,1861 L1091,1197 L1081,1187 L755,1187 A8,8 0 0 0 747,1195" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1081,1187 L1081,1193 A4,4 0 0 0 1085,1197 L1091,1197 L1081,1187" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="753" y="1202.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="753" y="1216.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="753" y="1230.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="753" y="1244.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="753" y="1258.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="753" y="1272.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="753" y="1286.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="753" y="1300.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="753" y="1314.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="753" y="1328.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="753" y="1342.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="753" y="1356.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="753" y="1370.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="753" y="1384.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="753" y="1398.7803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5928" x="753" y="1412.7803">slug: listener</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.2686" x="753" y="1426.7803">kind: Listener</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="753" y="1440.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="753" y="1454.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="753" y="1468.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="753" y="1482.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="753" y="1496.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="753" y="1510.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.833" x="753" y="1524.7803">supported drift: connection_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9775" x="753" y="1538.7803">default_backend_set_name, hostname_names,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.1748" x="753" y="1552.7803">path_route_set_name (+5 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="753" y="1566.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4404" x="753" y="1580.7803">load_balancer_id, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="753" y="1594.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="753" y="1608.7803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="753" y="1622.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="753" y="1636.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4678" x="753" y="1650.7803">The published Listener runtime keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4473" x="753" y="1664.7803">request-path lookup under</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8193" x="753" y="1678.7803">pkg/servicemanager/loadbalancer/listener by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="753" y="1692.7803">resolving loadBalancerId from status or spec and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5713" x="753" y="1706.7803">listener name from status.name, spec.name, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="753" y="1720.7803">the Kubernetes object name.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="323.75" x="753" y="1734.7803">Because OCI exposes no standalone GetListener or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2676" x="753" y="1748.7803">ListListeners API, read, bind, and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0195" x="753" y="1762.7803">confirmation all project the named listener from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.874" x="753" y="1776.7803">GetLoadBalancer on the owning load balancer.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="753" y="1790.7803">Create and update use read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1777" x="753" y="1804.7803">follow-up, then settle through the next observe</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0811" x="753" y="1818.7803">because Listener payloads do not expose a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2676" x="753" y="1832.7803">standalone lifecycle field. Delete retains the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2607" x="753" y="1846.7803">finalizer until the named listener disappears</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9717" x="753" y="1860.7803">from the parent listeners map.</text><?plantuml-src fLTjZzmq4FxkNs71bo8sUptQe-sY8d55GCL1KG--dNJo9fEDkQmTR6Ut2-A_yupjPBDxj_GGgjHBul6yF3FppAo_qwPJJgsbRrHbjzgiPArQJyAF9qjLtgsSxKtrnhRMoK_h4l-gYKH5jUhRy9qruMUr9la3jHiAkbGForphFqcUFvySAkViDcj_Mf-_-69wqzX0b_TygEiNrPV7KjPLvBB4yld5iwUlZYJOV3v_zkpv-SN5v3ogBwqpvEJvboBeq9AyfZzwCYN9GhPMLKlLAhoviolj0q5IDBeYMLiRblR3H9aVxlqbf5HbiEx0kHpaS7GS7Nr1B-kdE8OouAWxPSB3zwS2Zz4o0M3KqUgQhhGvXE_LS_Li-HAdhB8xE2gNrGMTZqVtKlEoLdKf_XOnDlbZloHW6iYBYH_o3Hnnjcq1uVJpfVBqdafhIdryzCcxwtS_NfFRw99-KaQjo7qYbPU7dmwkl7lpLd3QfTqWgOUwPqVtq02EAkd8sxOFsff5_dHMQRL2JlrPUY_s8iMGvhdVh0OD5RM8zkJjT7nuaqmLorFimPB5rnEC5f8Cv7kIG-71qHo9s8lnfSCe5t9yVkBOf0-VYKCHldI8nMAl7D5upL6D1H-JBg-ilSCV1SUNsbI2m1aoEDG2PD4I1kspazhBjVOUh29K6w2rzse9fSXB1Bftw1088NRq44f873h2ha5s8TyuKe567wArXxMf5gBLJj8727j6zfxE1q3go7d8f-nl40Bht8TXf0ygz4aTHvAIA3EYL6LKlesVJmMHJiSWJaZ1gLgxzM1YenNCTBPGVMWiCd5ZyebTUcWWT7TeebDbIyh02pHThOrgGRDS9lZg8yhBrd9w7eE7ew0GTRR4mLFCDRwxNO8_dvLstU41pJ0uz4W3oQszeweE-F-UrWWv3HNMwitW3cEFolHGGMrLg2sw2zWuNGT96zNsAbxFYOcV6uJGSZ7kEU7GrHaJndNVTTOXgRBlAhRaUrUh4XqDzmsLhFOsPcdLksXa9l9qk-LP2MTlFOLRWr4u4utrWP_Ygv_5RDt2fq2Za7po-OLO8xUVYVVqEmp89TLubUkU8rsWDL3PXQ5jYjKB7aMtmoowrTLCifuzZTWkJ2wX7jZTLiDrpFS44UgX0j9bU6o-fevnTqJdXWInGJ_YnaVSc1-tb6l-cwvhT_At2FT8SDRW6ypTc45VYlx6dCm3zyQ9HDoOHsJYnY0LCgM2JhEHwurig0Lfo0Oyo1v5VdeTwe67vecn