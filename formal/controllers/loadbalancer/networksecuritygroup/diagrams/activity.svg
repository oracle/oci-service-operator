<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1315px" preserveAspectRatio="none" style="width:720px;height:1315px;background:#FCFCFD;" version="1.1" viewBox="0 0 720 1315" width="720px" zoomAndPan="magnify"><title>Activity - loadbalancer/NetworkSecurityGroup</title><defs/><g><rect fill="#FCFCFD" height="1315" style="stroke:none;stroke-width:1;" width="720" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="305.7441" x="205.887" y="30.7803">Activity - loadbalancer/NetworkSecurityGroup</text></g><ellipse cx="337.478" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="185.0854" y="85"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="195.0854" y="105.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="195.0854" y="119.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="306.3779" x="184.2891" y="153"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3779" x="194.2891" y="173.7803">Load desired NetworkSecurityGroup spec and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7373" x="194.2891" y="187.7803">status from Kubernetes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="322.668" x="176.144" y="221"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.668" x="186.144" y="241.7803">Resolve OCI state via GetNetworkSecurityGroup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.7578" x="186.144" y="255.7803">with ListNetworkSecurityGroup fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="325.8398" x="174.5581" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8398" x="184.5581" y="309.7803">Use scaffold_loadbalancer_networksecuritygroup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="184.5581" y="323.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="184.5581" y="337.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="283.7886,371,391.1675,371,403.1675,383,391.1675,395,283.7886,395,271.7886,383,283.7886,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="283.7886" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="250.0024" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="403.1675" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="318.04" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.04" x="21" y="425.7803">Update path calls UpdateNetworkSecurityGroup</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="36.6689" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.7021" x="46.6689" y="479.7803">Guard mutable fields display_name and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3096" x="46.6689" y="493.7803">force-new fields compartment_id</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="311.792" x="349.04" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.792" x="359.04" y="425.7803">Create path calls CreateNetworkSecurityGroup</text><polygon fill="#E2E8F0" points="337.478,513,349.478,525,337.478,537,325.478,525,337.478,513" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="104" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="170.3198" y="557"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="180.3198" y="577.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="180.3198" y="591.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="180.3198" y="605.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="180.3198" y="619.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="180.3198" y="633.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="180.3198" y="647.7803">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="263.5918" x="205.6821" y="681"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="215.6821" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="310.2539" x="182.3511" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2539" x="192.3511" y="755.7803">Delete path uses DeleteNetworkSecurityGroup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5576" x="192.3511" y="769.7803">with required via GetNetworkSecurityGroup or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6406" x="192.3511" y="783.7803">ListNetworkSecurityGroup to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="192.3511" y="797.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="197.9131" y="831"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="207.9131" y="851.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="207.9131" y="865.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="180.7686" y="899"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="190.7686" y="919.7803">Requeue on provisioning, updating, terminating</text><path d="M368.478,943 L368.478,1119 L348.478,1123 L368.478,1127 L368.478,1303 A0,0 0 0 0 368.478,1303 L708.5181,1303 A0,0 0 0 0 708.5181,1303 L708.5181,953 L698.5181,943 L368.478,943 A0,0 0 0 0 368.478,943" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M698.5181,943 L698.5181,953 L708.5181,953 L698.5181,943" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="374.478" y="958.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="374.478" y="972.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="374.478" y="986.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="374.478" y="1000.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="374.478" y="1014.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="374.478" y="1028.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="374.478" y="1042.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="374.478" y="1056.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="374.478" y="1070.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="374.478" y="1084.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="374.478" y="1098.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="374.478" y="1112.7803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5234" x="374.478" y="1126.7803">slug: networksecuritygroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.2891" x="374.478" y="1140.7803">kind: NetworkSecurityGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="374.478" y="1154.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="374.478" y="1168.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="374.478" y="1182.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="374.478" y="1196.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="374.478" y="1210.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="374.478" y="1224.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="374.478" y="1238.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="374.478" y="1252.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-s