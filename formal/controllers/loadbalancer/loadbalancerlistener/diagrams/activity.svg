334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="369.8569" y="1266.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="369.8569" y="1280.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="369.8569" y="1294.7803">promotion.</text><ellipse cx="332.8569" cy="1123" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="332.8569" cy="1123" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="332.8569" x2="332.8569" y1="65" y2="85"/><polygon fill="#0F172A" points="328.8569,75,332.8569,85,336.8569,75,332.8569,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="332.8569" x2="332.8569" y1="133" y2="153"/><polygon fill="#0F172A" points="328.8569,143,332.8569,153,336.8569,143,332.8569,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="332.8569" x2="332.8569" y1="201" y2="221"/><polygon fill="#0F172A" points="328.8569,211,332.8569,221,336.8569,211,332.8569,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="332.8569" x2="332.8569" y1="269" y2="289"/><polygon fill="#0F172A" points="328.8569,279,332.8569,289,336.8569,279,332.8569,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="167.7095" x2="167.7095" y1="439" y2="459"/><polygon fill="#0F172A" points="163.7095,449,167.7095,459,171.7095,449,167.7095,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="267.1675" x2="167.7095" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="167.7095" x2="167.7095" y1="383" y2="405"/><polygon fill="#0F172A" points="163.7095,395