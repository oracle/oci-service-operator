 ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="815"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="835.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="849.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,869,351.7441,881,339.7441,893,327.7441,881,339.7441,869" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="950.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="950.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="427.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="345.916" x="808.7375" y="573"/><path d="M959.5715,573 L959.5715,580 L949.5715,590 L808.7375,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="811.7375" y="584.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="280.5928" x="835.3992" y="656"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="845.3992" y="676.7803">Request requeue while OCI remains in</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.5928" x="845.3992" y="690.7803">PROVISIONING, UPDATING, DELETING</text><ellipse cx="975.6956" cy="750" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="975.6956" cy="750" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="889.4124,607,1061.9788,607,1073.9788,619,1061.9788,631,889.4124,631,877.4124,619,889.4124,607" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="979.6956" y="641.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.5664" x="889.4124" y="622.7803">"OCI state in retryable set?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="828.7375" y="870"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="838.7375" y="890.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.041" x="838.7375" y="904.7803">OCI reaches ACTIVE</text><ellipse cx="975.6956" cy="955.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="975.6956" cy="955.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="855.1746,821,1096.2166,821,1108.2166,833,1096.2166,845,855.1746,845,843.1746,833,855.1746,821" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="979.6956" y="855.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="855.1746" y="836.7803">"OCI state is outside success targets?"</text><rect fill="none" height="722.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="544.9561" x="675.4814" y="1010.5"/><path d="M841.9014,1010.5 L841.9014,1017.5 L831.9014,1027.5 L675.4814,1027.5" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="678.4814" y="1022.2803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402