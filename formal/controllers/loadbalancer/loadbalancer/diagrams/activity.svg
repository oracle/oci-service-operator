3">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.9229" x="849.7341" y="1526"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9229" x="859.7341" y="1546.7803">Requeue on provisioning, terminating</text><path d="M688.7198,1582 L688.7198,1905 L668.7198,1909 L688.7198,1913 L688.7198,2236 A0,0 0 0 0 688.7198,2236 L1035.0148,2236 A0,0 0 0 0 1035.0148,2236 L1035.0148,1592 L1025.0148,1582 L688.7198,1582 A0,0 0 0 0 688.7198,1582" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1025.0148,1582 L1025.0148,1592 L1035.0148,1592 L1025.0148,1582" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="694.7198" y="1597.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="694.7198" y="1611.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="694.7198" y="1625.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="694.7198" y="1639.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="694.7198" y="1653.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="694.7198" y="1667.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="694.7198" y="1681.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="694.7198" y="1695.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="694.7198" y="1709.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="694.7198" y="1723.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="694.7198" y="1737.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2959" x="694.7198" y="1751.7803">service: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.6338" x="694.7198" y="1765.7803">slug: loadbalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.8613" x="694.7198" y="1779.7803">kind: LoadBalancer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="694.7198" y="1793.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="694.7198" y="1807.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="694.7198" y="1821.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="694.7198" y="1835.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="694.7198" y="1849.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="694.7198" y="1863.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="694.7198" y="1877.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3721" x="694.7198" y="1891.7803">freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="694.7198" y="1905.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1299" x="694.7198" y="1919.7803">backend_sets, certificates, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.2305" x="694.7198" y="1933.7803">hostnames (+11 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="694.7198" y="1947.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.4189" x="694.7198" y="1961.7803">list lookup: oci_load_balancer_load_balancers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8818" x="694.7198" y="1975.7803">filters display_name, compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="694.7198" y="1989.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="694.7198" y="2003.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0605" x="694.7198" y="2017.7803">The published LoadBalancer runtime keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1855" x="694.7198" y="2031.7803">bind-versus-create local to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8604" x="694.7198" y="2045.7803">pkg/servicemanager/loadbalancer/loadbalancer by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.792" x="694.7198" y="2059.7803">listing exact compartmentId plus displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.2949" x="694.7198" y="2073.7803">before CreateLoadBalancer when no tracked OCI ID</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5859" x="694.7198" y="2087.7803">is present.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.1016" x="694.7198" y="2101.7803">Create and update use GetLoadBalancer-backed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.6475" x="694.7198" y="2115.7803">read-after-write follow-up until OCI returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2471" x="694.7198" y="2129.7803">ACTIVE, while delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7988" x="694.7198" y="2143.7803">GetLoadBalancer or list fallback confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5781" x="694.7198" y="2157.7803">load balancer is gone or terminally DELETED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0332" x="694.7198" y="2171.7803">Only displayName and tag fields stay mutable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8535" x="694.7198" y="2185.7803">through UpdateLoadBalancer; desired-state drift</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7227" x="694.7198" y="2199.7803">for networking, shape, and nested child maps is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5781" x="694.7198" y="2213.7803">rejected before OCI mutation as create-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1582" x="694.7198" y="2227.7803">replacement drift.</text><ellipse cx="657.7198" cy="1909" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="657.7198" cy="1909" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="657.7198" x2="657.7198" y1="157" y2="177"/><polygon fill="#0F172A" points="653.7198,167,657.7198,177,661.7198,167,657.7198,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="809.1857" x2="809.1857" y1="341" y2="361"/><polygon fill="#0F172A" points="805.1857,351,809.1857,361,813.1857,351,809.1857,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="809.1857" x2="809.1857" y1="409" y2="429"/><polygon fill="#0F172A" points="805.1857,419,809.1857,429,813.1857,419,809.1857,423" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="516.254" x2="506.254" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="506.254" x2="506.254" y1="257" y2="279"/><polygon fill="#0F172A" points="502.254,269,506.254,279,510.254,269,506.254,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="799.1857" x2="809.1857" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-