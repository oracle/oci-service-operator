schemaVersion: 1
surface: repo-authored-semantics
service: loadbalancer
slug: loadbalancer
kind: LoadBalancer
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
  - failed
repoAuthored:
  mutation:
    mutable:
      - defined_tags
      - display_name
      - freeform_tags
    forceNew:
      - backend_sets
      - certificates
      - compartment_id
      - hostnames
      - ip_mode
      - is_private
      - listeners
      - network_security_group_ids
      - path_route_sets
      - reserved_ips
      - rule_sets
      - shape_details
      - shape_name
      - ssl_cipher_suites
      - subnet_ids
notes:
  - The published LoadBalancer runtime keeps bind-versus-create local to pkg/servicemanager/loadbalancer/loadbalancer by listing exact compartmentId plus displayName before CreateLoadBalancer when no tracked OCI ID is present.
  - Create and update use GetLoadBalancer-backed read-after-write follow-up until OCI returns ACTIVE, while delete retains the finalizer until GetLoadBalancer or list fallback confirms the load balancer is gone or terminally DELETED.
  - Only displayName and tag fields stay mutable through UpdateLoadBalancer; desired-state drift for networking, shape, and nested child maps is rejected before OCI mutation as create-only replacement drift.
