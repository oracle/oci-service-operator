<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="793px" preserveAspectRatio="none" style="width:3593px;height:793px;background:#FCFCFD;" version="1.1" viewBox="0 0 3593 793" width="3593px" zoomAndPan="magnify"><title>State Machine - loadbalancer/LoadBalancer</title><defs/><g><rect fill="#FCFCFD" height="793" style="stroke:none;stroke-width:1;" width="3593" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="289.4199" x="1644.963" y="20.7803">State Machine - loadbalancer/LoadBalancer</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="216" y="641"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="216" x2="480.3643" y1="665" y2="665"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="321.7271" y="656.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="221" y="680.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="221" y="694.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1277.36" y="559"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1282.36" y="582.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2061.04" y="546"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2066.04" y="569.7803">Ready</text><rect fill="#F8FAFC" height="40" rx=