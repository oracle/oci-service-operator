<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2196px" preserveAspectRatio="none" style="width:830px;height:2196px;background:#FCFCFD;" version="1.1" viewBox="0 0 830 2196" width="830px" zoomAndPan="magnify"><title>Activity - servicemanagerproxy/ServiceEnvironment</title><defs/><g><rect fill="#FCFCFD" height="2196" style="stroke:none;stroke-width:1;" width="830" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="347.04" x="240.3235" y="30.7803">Activity - servicemanagerproxy/ServiceEnvironment</text></g><ellipse cx="380.0396" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="376" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="597.5308" x="97.4224" y="75"/><path d="M219.4907,75 L219.4907,82 L209.4907,92 L97.4224,92" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="100.4224" y="86.7803">Observe and Bind</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="227.647" y="109"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="237.647" y="129.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="237.647" y="143.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="319.5918" x="220.2437" y="177"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5918" x="230.2437" y="197.7803">Read desired ServiceEnvironment spec, tracked</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6611" x="230.2437" y="211.7803">status, and delete intent</text><polygon fill="#E2E8F0" points="250.5737,245,509.5054,245,521.5054,257,509.5054,269,250.5737,269,238.5737,257,250.5737,245" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.9316" x="250.5737" y="260.7803">"Tracked or explicit OCI identity present?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="216.7876" y="253.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="521.5054" y="253.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="222.3027" x="117.4224" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3027" x="127.4224" y="299.7803">Get the current OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.8408" x="127.4224" y="313.7803">GetServiceEnvironment</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.9092" x="391.5508" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="401.5508" y="299.7803">Resolve an existing OCI resource through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.7578" x="401.5508" y="313.7803">ListServiceEnvironments using filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="401.5508" y="327.7803">compartment_id, service_environment_id</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="388.0576" y="361"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="398.0576" y="381.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="398.0576" y="395.7803">into status</text><polygon fill="#E2E8F0" points="380.0396,415,392.0396,427,380.0396,439,368.0396,427,380.0396,415" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="317.8633,471,442.2158,471,454.2158,483,442.2158,495,317.8633,495,305.8633,483,317.8633,471" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="317.8633" y="486.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="284.0771" y="479.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="454.2158" y="479.7803">no</text><rect fill="none" height="282" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="331.792" x="11" y="505"/><path d="M61.4688,505 L61.4688,512 L51.4688,522 L11,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="516.7803">Delete</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="284.5986" x="34.5967" y="539"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5986" x="44.5967" y="559.7803">Delete path is not represented by imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0342" x="44.5967" y="573.7803">provider facts</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="311.792" x="21" y="622"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.792" x="31" y="642.7803">Confirm deletion via GetServiceEnvironment or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1094" x="31" y="656.7803">ListServiceEnvironments until OCI reaches</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1582" x="31" y="670.7803">LOCAL_DELETE</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="292.3438" x="30.7241" y="719"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3438" x="40.7241" y="739.7803">Allow best-effort completion without finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4824" x="40.7241" y="753.7803">retention</text><ellipse cx="176.896" cy="833" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="176.896" cy="833" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="469" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="452.7822" x="362.792" y="505"/><path d="M513.626,505 L513.626,512 L503.626,522 L362.792,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="365.792" y="516.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="400.7822" x="382.792" y="588"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="392.792" y="608.7803">Request requeue while OCI remains in</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.3721" x="392.792" y="622.7803">INITIALIZED, BEGIN_ACTIVATION,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="380.7822" x="392.792" y="636.7803">BEGIN_SOFT_TERMINATION, BEGIN_TERMINATION (+10</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="392.792" y="650.7803">more)</text><ellipse cx="583.1831" cy="710" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="583.1831" cy="710" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="496.8999,539,669.4663,539,681.4663,551,669.4663,563,496.8999,563,484.8999,551,496.8999,539" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="587.1831" y="573.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.5664" x="496.8999" y="554.7803">"OCI state in retryable set?"</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="384.8477" x="390.7593" y="836"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="400.7593" y="856.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="364.8477" x="400.7593" y="870.7803">OCI reaches ACTIVE, SOFT_TERMINATED, CANCELED,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="155.9619" x="400.7593" y="884.7803">TERMINATED (+6 more)</text><ellipse cx="583.1831" cy="929" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="583.1831" cy="929" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="462.6621,787,703.7041,787,715.7041,799,703.7041,811,462.6621,811,450.6621,799,462.6621,787" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="587.1831" y="821.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="462.6621" y="802.7803">"OCI state is outside success targets?"</text><rect fill="none" height="480.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="383.4307" x="391.4678" y="984"/><path d="M557.8877,984 L557.8877,991 L547.8877,1001 L391.4678,1001" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="394.4678" y="995.7803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="435.063" y="1018"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="445.063" y="1038.7803">Compare live OCI state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="445.063" y="1052.7803">field surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="312.585" x="426.8906" y="1135"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="436.8906" y="1155.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="436.8906" y="1169.7803">fields compartment_id, service_environment_id</text><ellipse cx="583.1831" cy="1215.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="583.1831" cy="1215.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="457.6001,1086,708.7661,1086,720.7661,1098,708.7661,1110,457.6001,1110,445.6001,1098,457.6001,1086" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="587.1831" y="1120.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="457.6001" y="1101.7803">"Force-new or conflicting drift detected?"</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="363.4307" x="401.4678" y="1268.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4063" x="411.4678" y="1289.2803">Return success for the ACTIVE,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="343.4307" x="411.4678" y="1303.2803">SOFT_TERMINATED, CANCELED, TERMINATED (+6</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="125.2617" x="411.4678" y="1317.2803">more) success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="443.6182" y="1350.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="453.6182" y="1371.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="453.6182" y="1385.2803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="236.3848" x="464.9907" y="1418.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.3848" x="474.9907" y="1439.2803">Requeue on provisioning, updating</text><path d="M411.0396,1474.5 L411.0396,1825.5 L391.0396,1829.5 L411.0396,1833.5 L411.0396,2184.5 A0,0 0 0 0 411.0396,2184.5 L818.687,2184.5 A0,0 0 0 0 818.687,2184.5 L818.687,1484.5 L808.687,1474.5 L411.0396,1474.5 A0,0 0 0 0 411.0396,1474.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M808.687,1474.5 L808.687,1484.5 L818.687,1484.5 L808.687,1474.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="417.0396" y="1490.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="417.0396" y="1504.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="417.0396" y="1518.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="417.0396" y="1532.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="417.0396" y="1546.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="417.0396" y="1560.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="417.0396" y="1574.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="417.0396" y="1588.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="417.0396" y="1602.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="417.0396" y="1616.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="417.0396" y="1630.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.958" x="417.0396" y="1644.2803">service: servicemanagerproxy</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.8477" x="417.0396" y="1658.2803">slug: serviceenvironment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7373" x="417.0396" y="1672.2803">kind: ServiceEnvironment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="417.0396" y="1686.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="417.0396" y="1700.2803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="417.0396" y="1714.2803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6338" x="417.0396" y="1728.2803">provider states: create INITIALIZED,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="386.6475" x="417.0396" y="1742.2803">BEGIN_ACTIVATION; update BEGIN_SOFT_TERMINATION,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5029" x="417.0396" y="1756.2803">BEGIN_TERMINATION, BEGIN_DISABLING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.0713" x="417.0396" y="1770.2803">BEGIN_ENABLING (+8 more); delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="417.0396" y="1784.2803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="417.0396" y="1798.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="417.0396" y="1812.2803">compartment_id, service_environment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="417.0396" y="1826.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="417.0396" y="1840.2803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0469" x="417.0396" y="1854.2803">oci_service_manager_proxy_service_environments</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="417.0396" y="1868.2803">filters compartment_id, service_environment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="417.0396" y="1882.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="417.0396" y="1896.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5371" x="417.0396" y="1910.2803">Service Manager Proxy exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0889" x="417.0396" y="1924.2803">GetServiceEnvironment and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2676" x="417.0396" y="1938.2803">ListServiceEnvironments only in the pinned SDK,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="417.0396" y="1952.2803">so the published runtime is bind-existing and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.041" x="417.0396" y="1966.2803">observe-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2266" x="417.0396" y="1980.2803">Bind identity is explicit: reconcile requires</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2402" x="417.0396" y="1994.2803">compartmentId and serviceEnvironmentId, tracks</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8057" x="417.0396" y="2008.2803">the returned Service Manager identifier in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.04" x="417.0396" y="2022.2803">status, and uses ListServiceEnvironments only to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3848" x="417.0396" y="2036.2803">confirm absence after a reread no longer finds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.082" x="417.0396" y="2050.2803">the tracked environment.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6055" x="417.0396" y="2064.2803">No OCI create, update, or delete operation is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2129" x="417.0396" y="2078.2803">published. The controller treats</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7988" x="417.0396" y="2092.2803">serviceEnvironmentId and compartmentId as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3848" x="417.0396" y="2106.2803">bind-only identity and performs Kubernetes-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5576" x="417.0396" y="2120.2803">finalizer cleanup on delete.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="417.0396" y="2134.2803">Entitlement transitions beginning with BEGIN_</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4814" x="417.0396" y="2148.2803">requeue, stable entitlement states settle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="337.6611" x="417.0396" y="2162.2803">success, and FAILED_* plus TRA_UNKNOWN remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="102.7031" x="417.0396" y="2176.2803">terminal failures.</text><ellipse cx="380.0396" cy="1829.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="380.0396" cy="1829.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="380.0396" x2="380.0396" y1="157" y2="177"/><polygon fill="#0F172A" points="376.0396,167,380.0396,177,384.0396,167,380.0396,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="531.5054" x2="531.5054" y1="341" y2="361"/><polygon fill="#0F172A" points="527.5054,351,531.5054,361,535.5054,351,531.5054,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="238.5737" x2="228.5737" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="228.5737" x2="228.5737" y1="257" y2="279"/><polygon fill="#0F172A" points="224.5737,269,228.5737,279,232.5737,269,228.5737,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="521.5054" x2="531.5054" y1=