/text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="819" y="1105.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="819" y="1119.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="819" y="1133.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="819" y="1147.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="819" y="1161.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="819" y="1175.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="819" y="1189.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.958" x="819" y="1203.7803">service: servicemanagerproxy</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.8477" x="819" y="1217.7803">slug: serviceenvironment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7373" x="819" y="1231.7803">kind: ServiceEnvironment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="819" y="1245.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="819" y="1259.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="819" y="1273.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6338" x="819" y="1287.7803">provider states: create INITIALIZED,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="386.6475" x="819" y="1301.7803">BEGIN_ACTIVATION; update BEGIN_SOFT_TERMINATION,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5029" x="819" y="1315.7803">BEGIN_TERMINATION, BEGIN_DISABLING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.0713" x="819" y="1329.7803">BEGIN_ENABLING (+8 more); delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="819" y="1343.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="819" y="1357.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="819" y="1371.7803">compartment_id, service_environment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="819" y="1385.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="819" y="1399.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0469" x="819" y="1413.7803">oci_service_manager_proxy_service_environments</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="819" y="1427.7803">filters compartment_id, service_environment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="819" y="1441.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="819" y="1455.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5371" x="819" y="1469.7803">Service Manager Proxy exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0889" x="819" y="1483.7803">GetServiceEnvironment and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2676" x="819" y="1497.7803">ListServiceEnvironments only in the pinned SDK,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="819" y="1511.7803">so the published runtime is bind-existing and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.041" x="819" y="1525.7803">observe-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2266" x="819" y="1539.7803">Bind identity is explicit: reconcile requires</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2402" x="819" y="1553.7803">compartmentId and serviceEnvironmentId, tracks</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8057" x="819" y="1567.7803">the returned Service Manager identifier in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.04" x="819" y="1581.7803">status, and uses ListServiceEnvironments only to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3848" x="819" y="1595.7803">confirm absence after a reread no longer finds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.082" x="819" y="1609.7803">the tracked environment.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6055" x="819" y="1623.7803">No OCI create, update, or delete operation is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2129" x="819" y="1637.7803">published. The controller treats</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7988" x="819" y="1651.7803">serviceEnvironmentId and compartmentId as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3848" x="819" y="1665.7803">bind-only identity and performs Kubernetes-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5576" x="819" y="1679.7803">finalizer cleanup on delete.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="819" y="1693.7803">Entitlement transitions beginning with BEGIN_</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4814" x="819" y="1707.7803">requeue, stable entitlement states settle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="337.6611" x="819" y="1721.7803">success, and FAILED_* plus TRA_UNKNOWN remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="102.7031" x="819" y="1735.7803">terminal failures.</text><?plantuml-src hLVRRXit47tdLmpIbwIrP3ks4qT12lYQ2bRamd9Re30WKBkp4ckAt99SAMhHV--Gortjwj8QQE47IxpCvPoPmv5z5YhdXi_1pdYgbq9D8UFI8hFrpeGdprEZ2vLUQQaDV9Cbz9SsJgIOyKAwMwtSaCyHVa2vG2SIlllCIFo1S7pQsEJ6w6MqVfGTlt_RlAcqmykj6BBiVVfkyvGsAPf