<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="732px" preserveAspectRatio="none" style="width:2472px;height:732px;background:#FCFCFD;" version="1.1" viewBox="0 0 2472 732" width="2472px" zoomAndPan="magnify"><title>State Machine - servicemanagerproxy/ServiceEnvironment</title><defs/><g><rect fill="#FCFCFD" height="732" style="stroke:none;stroke-width:1;" width="2472" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="390.6055" x="1032.911" y="20.7803">State Machine - servicemanagerproxy/ServiceEnvironment</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="144" y="515"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="144" x2="408.3643" y1="539" y2="539"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="249.7271" y="530.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="149" y="554.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="149" y="568.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1205.36" y="352"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1210.36" y="375.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1944.32" y="362"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1949.32" y="385.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1222.88" y="486"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1227.88" y="509.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1232.84" y="635"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1238.7746" y="658.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="686.44" y="469"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="691.44" y="492.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1519.56" y="407"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1524.56" y="430.7803">RejectUnsupportedDrift</text><g class="start_entity" data-qualified-name=".start." data-source-line="28" id="ent0002"><ellipse cx="16" cy="546" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="43" id="ent0003"><path d="M2055.78,49 L2055.78,378 L1995.11,382 L2055.78,386 L2055.78,715 A8,8 0 0 0 2063.78,723 L2455.4275,723 A8,8 0 0 0 2463.4275,715 L2463.4275,51 L2453.4275,41 L2063.78,41 A8,8 0 0 0 2055.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2453.4275,41 L2453.4275,47 A4,4 0 0 0 2457.4275,51 L2463.4275,51 L2453.4275,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2061.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2061.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2061.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2061.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2061.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2061.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2061.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2061.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2061.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.958" x="2061.78" y="182.7803">service: servicemanagerproxy</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.8477" x="2061.78" y="196.7803">slug: serviceenvironment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7373" x="2061.78" y="210.7803">kind: ServiceEnvironment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2061.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="2061.78" y="238.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="2061.78" y="252.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6338" x="2061.78" y="266.7803">provider states: create INITIALIZED,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="386.6475" x="2061.78" y="280.7803">BEGIN_ACTIVATION; update BEGIN_SOFT_TERMINATION,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5029" x="2061.78" y="294.7803">BEGIN_TERMINATION, BEGIN_DISABLING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.0713" x="2061.78" y="308.7803">BEGIN_ENABLING (+8 more); delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="2061.78" y="322.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2061.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="2061.78" y="350.7803">compartment_id, service_environment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2061.78" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="2061.78" y="378.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0469" x="2061.78" y="392.7803">oci_service_manager_proxy_service_environments</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="2061.78" y="406.7803">filters compartment_id, service_environment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2061.78" y="420.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2061.78" y="434.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5371" x="2061.78" y="448.7803">Service Manager Proxy exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0889" x="2061.78" y="462.7803">GetServiceEnvironment and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2676" x="2061.78" y="476.7803">ListServiceEnvironments only in the pinned SDK,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="2061.78" y="490.7803">so the published runtime is bind-existing and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.041" x="2061.78" y="504.7803">observe-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2266" x="2061.78" y="518.7803">Bind identity is explicit: reconcile requires</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2402" x="2061.78" y="532.7803">compartmentId and serviceEnvironmentId, tracks</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8057" x="2061.78" y="546.7803">the returned Service Manager identifier in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.04" x="2061.78" y="560.7803">status, and uses ListServiceEnvironments only to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3848" x="2061.78" y="574.7803">confirm absence after a reread no longer finds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.082" x="2061.78" y="588.7803">the tracked environment.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6055" x="2061.78" y="602.7803">No OCI create, update, or delete operation is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2129" x="2061.78" y="616.7803">published. The controller treats</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7988" x="2061.78" y="630.7803">serviceEnvironmentId and compartmentId as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3848" x="2061.78" y="644.7803">bind-only identity and performs Kubernetes-local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5576" x="2061.78" y="658.7803">finalizer cleanup on delete.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="2061.78" y="672.7803">Entitlement transitions beginning with BEGIN_</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4814" x="2061.78" y="686.7803">requeue, stable entitlement states settle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="337.6611" x="2061.78" y="700.7803">success, and FAILED_* plus TRA_UNKNOWN remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="102.7031" x="2061.78" y="714.7803">terminal failures.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="28" id="lnk3"><path d="M26.5,546 C46.42,546 88.8,546 137.64,546" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="143.64,546,134.64,542,138.64,546,134.64,550,143.64,546" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.0273" x="57" y="541.7803">reconcile</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="29" id="lnk4"><path d="M408.64,530.05 C499.55,519.01 610.3337,505.5731 680.1837,497.0931" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="686.14,496.37,676.7235,493.4838,681.1764,496.9726,677.6877,501.4255,686.14,496.37" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="439.36" y="504.8403">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="30" id="lnk5"><path d="M795.34,468.61 C827.16,455.44 870.61,438.95 910.36,429 C1025.66,400.13 1058.73,415.87 1175.36,393 C1184.97,391.12 1189.3063,390.224 1199.0663,387.804" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1204.89,386.36,1195.1919,384.6435,1200.037,387.5633,1197.1172,392.4084,1204.89,386.36" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="966.0827" y="346.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.3516" x="943.9513" y="360.7803">ACTIVE, SOFT_TERMINATED,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.5342" x="943.36" y="374.7803">CANCELED, TERMINATED (+6</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="1024.8478" y="388.7803">more)</text></g><!--link resolve_by_lookup to retryable--><g class="link" data-entity-1="ent0007" data-entity-2="ent0005" data-link-type="dependency" data-source-line="31" id="lnk6"><path d="M809.63,491.03 C917.21,494.63 1131.8033,501.8199 1216.5933,504.6499" fill="none" id="resolve_by_lookup-to-retryable" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1222.59,504.85,1213.7284,500.552,1217.5928,504.6832,1213.4616,508.5476,1222.59,504.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.041" x="962.61" y="448.2803">OCI state in INITIALIZED,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.248" x="973.5065" y="462.2803">BEGIN_ACTIVATION,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.7998" x="944.7306" y="476.2803">BEGIN_SOFT_TERMINATION,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.541" x="932.86" y="490.2803">BEGIN_TERMINATION (+10 more)</text></g><!--link resolve_by_lookup to failed--><g class="link" data-entity-1="ent0007" data-entity-2="ent0006" data-link-type="dependency" data-source-line="32" id="lnk7"><path d="M809.63,508.86 C921.69,545.48 1150.6569,620.2959 1226.7469,645.1659" fill="none" id="resolve_by_lookup-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1232.45,647.03,1225.1381,640.4319,1227