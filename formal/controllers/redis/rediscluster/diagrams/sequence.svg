" y="2101.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5508" x="783" y="2115.7803">list lookup: oci_redis_redis_clusters filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="783" y="2129.7803">compartment_id, display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="783" y="2143.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="783" y="2157.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.8955" x="783" y="2171.7803">Bind through an explicit OCI identity first;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.833" x="783" y="2185.7803">otherwise adopt only a unique ListRedisClusters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8193" x="783" y="2199.7803">match on compartmentId plus displayName before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.7998" x="783" y="2213.7803">create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6475" x="783" y="2227.7803">Mutable drift is limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0537" x="783" y="2241.7803">nodeCount, nodeMemoryInGBs, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4814" x="783" y="2255.7803">definedTags; changes to compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3301" x="783" y="2269.7803">softwareVersion, or subnetId are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="111.2754" x="783" y="2283.7803">replacement-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5986" x="783" y="2297.7803">Create, update, and delete all track Redis</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.751" x="783" y="2311.7803">service work requests through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8682" x="783" y="2325.7803">status.async.current, preserving raw</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.585" x="783" y="2339.7803">work-request ID, status, operation type, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0537" x="783" y="2353.7803">percent complete while the shared async mapper</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="190.6816" x="783" y="2367.7803">drives conditions and requeue.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.585" x="783" y="2381.7803">Delete retains the finalizer until the tracked</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.668" x="783" y="2395.7803">work request is terminal and GetRedisCluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3779" x="783" y="2409.7803">confirms the cluster is gone; the delete guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0889" x="783" y="2423.7803">still blocks the first delete call while OCI</text><text fill="#334155" font-family="Helvetica" font-si