334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8193" x="783" y="2115.7803">match on compartmentId plus displayName before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.7998" x="783" y="2129.7803">create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6475" x="783" y="2143.7803">Mutable drift is limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0537" x="783" y="2157.7803">nodeCount, nodeMemoryInGBs, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4814" x="783" y="2171.7803">definedTags; changes to compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3301" x="783" y="2185.7803">softwareVersion, or subnetId are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="111.2754" x="783" y="2199.7803">replacement-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5293" x="783" y="2213.7803">Create and update rely on the generated-runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4883" x="783" y="2227.7803">read-after-write path, and delete retains the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5576" x="783" y="2241.7803">finalizer until DeleteRedisCluster is confirmed.</text><?plantuml-src hLZRRXit47tdLn3fIu9gxJYnSv6H0h6TfaQSfB2JFXamg5skn7gNt99SAMhHV-_XRI-ob3XjOS2MbkHmPiwPCxCsjq8sJBEQcWKhr4h8EIrPPJWntSgCvRTphLfPdAfAQVf3cUEd6EmeUCdQolwifFt0Qav_uTMIMv6pxNkkn9-S7XmE5fdMQXMjFouFdZyPdfJAyfCxFfJby-BPvYwb2wxZZjdXqTF7BpTskElZ-jEdXmT7HuDrRpvNMd9D3vuHAsp5wHN_e-KovpIZcXV2x5-wtwTLQopNP24AJa