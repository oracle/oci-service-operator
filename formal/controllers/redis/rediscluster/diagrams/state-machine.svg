<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="723px" preserveAspectRatio="none" style="width:3561px;height:723px;background:#FCFCFD;" version="1.1" viewBox="0 0 3561 723" width="3561px" zoomAndPan="magnify"><title>State Machine - redis/RedisCluster</title><defs/><g><rect fill="#FCFCFD" height="723" style="stroke:none;stroke-width:1;" width="3561" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="230.2891" x="1658.6734" y="20.7803">State Machine - redis/RedisCluster</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="210" y="573"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="210" x2="474.3643" y1="597" y2="597"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="315.7271" y="588.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="215" y="612.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="215" y="626.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1271.36" y="416"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1276.36" y="439.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2045.32" y="416"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2050.32" y="439.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" st