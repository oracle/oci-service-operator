schemaVersion: 1
surface: repo-authored-semantics
service: mediaservices
slug: mediaasset
kind: MediaAsset
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
repoAuthored:
  providerLifecycle:
    createPending:
      - CREATING
    updatePending:
      - UPDATING
    deletePending:
      - DELETING
  listLookup:
    filters:
      - bucketName
      - compartmentId
      - displayName
      - masterMediaAssetId
      - mediaWorkflowJobId
      - objectName
      - parentMediaAssetId
      - sourceMediaWorkflowId
      - sourceMediaWorkflowVersion
      - type
    matchRule: skip pre-create reuse when the spec has no identity stronger than compartmentId plus type, or when mediaWorkflowJobId/sourceMediaWorkflowVersion is set without sourceMediaWorkflowId; otherwise require an exact unique match on compartmentId, type, and any provided displayName, bucket/object location, workflow lineage, and parent/master IDs in ACTIVE, CREATING, or UPDATING
  mutation:
    mutable:
      - definedTags
      - displayName
      - freeformTags
      - masterMediaAssetId
      - mediaAssetTags
      - metadata
      - parentMediaAssetId
      - type
    forceNew:
      - bucketName
      - compartmentId
      - mediaWorkflowJobId
      - namespaceName
      - objectEtag
      - objectName
      - segmentRangeEndIndex
      - segmentRangeStartIndex
      - sourceMediaWorkflowId
      - sourceMediaWorkflowVersion
    createOnly:
      - locks
notes:
  - Reviewed lifecycle mapping treats CREATING as provisioning, UPDATING as updating, ACTIVE as success, FAILED as terminal without requeue, and DELETING as terminating until follow-up observation reaches DELETED or OCI NotFound.
  - Create, get, and update return the MediaAsset body directly, while DeleteMediaAsset returns only opc-request-id. The reviewed runtime therefore stays lifecycle-based and does not publish work-request polling behavior.
  - "The published delete contract is intentionally narrow: DeleteMediaAsset is called without deleteMode or isLockOverride, so hierarchical delete modes DELETE_CHILDREN and DELETE_DERIVATIONS remain out of scope for the controller-backed surface."
  - Matching create-time locks are normalized by ignoring OCI-populated timeCreated metadata so steady-state reconcile does not fail after a successful create that requested locks.
