djust="spacing" textLength="143.1992" x="776" y="1779.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="776" y="1793.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="776" y="1807.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="776" y="1821.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="776" y="1835.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="776" y="1849.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="776" y="1863.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="776" y="1877.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="776" y="1891.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="776" y="1905.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="776" y="1919.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="776" y="1933.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.5996" x="776" y="1947.7803">service: mediaservices</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.0547" x="776" y="1961.7803">slug: mediaasset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.6064" x="776" y="1975.7803">kind: MediaAsset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="776" y="1989.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="776" y="2003.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="776" y="2017.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="776" y="2031.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="776" y="2045.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="776" y="2059.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="776" y="2073.7803">supported drift: definedTags, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.5957" x="776" y="2087.7803">freeformTags, masterMediaAssetId (+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="776" y="2101.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="321.3506" x="776" y="2115.7803">bucketName, compartmentId, mediaWorkflowJobId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.6855" x="776" y="2129.7803">namespaceName (+6 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="776" y="2143.7803">create-only fields: locks</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1436" x="776" y="2157.7803">list lookup: oci_media_services_media_assets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6748" x="776" y="2171.7803">filters bucketName, compartmentId, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.9404" x="776" y="2185.7803">masterMediaAssetId (+6 more); skip pre-create</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6123" x="776" y="2199.7803">reuse when the spec has no identity stronger</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0195" x="776" y="2213.7803">than compartmentId plus type, or when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.0059" x="776" y="2227.7803">mediaWorkflowJobId/sourceMediaWorkflowVersion is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8955" x="776" y="2241.7803">set without sourceMediaWorkflowId; otherwise</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9502" x="776" y="2255.7803">require an exact unique match on compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3574" x="776" y="2269.7803">type, and any provided displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0537" x="776" y="2283.7803">bucket/object location, workflow lineage, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.8477" x="776" y="2297.7803">parent/master IDs in ACTIVE, CREATING, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3379" x="776" y="2311.7803">UPDATING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="776" y="2325.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="776" y="2339.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="776" y="2353.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="776" y="2367.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3779" x="776" y="2381.7803">success, FAILED as terminal without requeue, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3232" x="776" y="2395.7803">DELETING as terminating until follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.916" x="776" y="2409.7803">observation reaches DELETED or OCI NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.957" x="776" y="2423.7803">Create, get, and update return the MediaAsset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2402" x="776" y="2437.7803">body directly, while DeleteMediaAsset returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4541" x="776" y="2451.7803">only opc-request-id. The reviewed runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9365" x="776" y="2465.7803">therefore stays lifecycle-based and does not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.0195" x="776" y="2479.7803">publish work-request polling behavior.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.502" x="776" y="2493.7803">The published delete contract is intentionally</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9023" x="776" y="2507.7803">narrow: DeleteMediaAsset is called without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7988" x="776" y="2521.7803">deleteMode or isLockOverride, so hierarchical</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0059" x="776" y="2535.7803">delete modes DELETE_CHILDREN and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5781" x="776" y="2549.7803">DELETE_DERIVATIONS remain out of scope for the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.0752" x="776" y="2563.7803">controller-backed surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.668" x="776" y="2577.7803">Matching create-time locks are normalized by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8398" x="776" y="2591.7803">ignoring OCI-populated timeCreated metadata so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1436" x="776" y="2605.7803">steady-state reconcile does not fail after a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2334" x="776" y="2619.7803">successful create that requested locks.</text><?plantuml-src nLXDSnkv4RtZLtHjBdQ5bEorxFNIvLHv9NbNMTbAILxdeYeNE8CX4Gy74m13BfFAVyzh0FD5aJ8hUqZf8CwWqUYFrwyRuxxggfPMhiWjPMuskbfG8KkdXEjMvZBxkh2cgV9pKnfBVoeo_EK3YLmLiYdzUrFvZtAbw1TLhfNNcTmlSwV_fUZvsM1HMcisIVkpulaFtmztLiQhdnxOK1G_vAzsfOpDbKqIyxENBvxzk2F1nwVr5o_EdhzyELWFwZDZAsNf-IlXjIyLtQb_DghA54rffN8jdR9hdIbt-e6VtZcdl5ZgN55XZ9-RtmVwNBlrtu98PjxOaNt9ptPfrq7rlNfTFCCob26KkfQLtxz_A72Cba4CEXsbBjIrhiOH_F5ClfY_nYghh4TBsJn_gPvtIm-oyxgGHIR-8u9lz6ipLmYhLquCxA1p669DMIexUlqJWdohCbDbUdVfkvkxcr_lOWe-o4ekbFsEfAFngz6Mc_ChmPadiqPUnxedE_jG0rRbP9KpPUErgMRfrIbolK1EtMbydlOYqpRD9swzQ3NageIt1tV7vV5ELUK1eQ8F5at_CeZHZ5G5-KPH3psOcdmHlI1l6_ive-xt4yk7ElzKZ4LuqpWQiruv_76Q_Hg0FYIUhetvYdyInizrbGjPUl8MS80m4gz-hqia8cI1K2KLYcfBihHAvbkiQkUT61_BXa1wHZyhFpXEWPCwpPqcxMYbdGDh7T9oZIDwDUv9eKklh9lHl86gG5UJ-oepAyRC2cglyWdbsjMbtAR5bNJOqYkvokd9dr_HobZrz6dmsAh6oJdYn6uoD1gBieTnI2Y80NLnoBnpHCAhWP-bCJLbuItLm0GJyldjvRjFLnz_FZ9IE2r4QxzL_rFmzpYm1sGr0WkbiNxMoDCewxeYvwLlN537OOjbG0cHAa-OkWYl3raMLmV67P23MOMsg_QGjPPZfm3F-se77J7wQKSR_OlBwykZey-WtrNQkfkLIbRm3oA5hcI9BcZXFDww09PvQHZTnqJQAYyHpsGfXrM56iHxkutPJskCRFm0KP6PS_Cwze1eLc-eB5043xL6kBMGuuH7Q-1FC8O1UDo1aTisIzqXTWKV7N1pNxKLCA7V_dQHVdLv2IUNUjq6WbM1hHoCLsK-bHjmxdsLMrruKcjPDZ8Odi0MNYyHl99PfEyKOvidt4Rkches5a2bfixv9DVOGcPgniCDccV-IIxSH0pPWmghL67iAYxjfPApI2NYLlr3PPxcBAzerR0pCz07gdPQgKrqnua1ST6OjqIOKFvkxDUYD9k_cZbpMGL1LyFAC9c1k4GyBJBFr5JbDccU4GFGYSJf-vXIF4AKuZ6UR9MkfC-M2FICC2VLL5irJMJ7RAN4Pgagyak4jbOPqi8KsbE8GuUhk55x96piFDLbuyXlQqG51SPwzeJZD9BWX-72PsOju068vGBUQByqZQSzabVv6s5WdDrery4CTGSknPn3JQM1uUYYC3lsJP9jNAMosi9piuPV-HWjCTIdPXwGW7G4g4x49ba0c5SAU8nwe1swJsFSwUh22N32k_DFLvyl9zIN3CBHLaq_PPZQ3w054UPBz6hFb1Th1G79KUo