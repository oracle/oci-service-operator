hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="831.4697" y="1516.2803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="831.4697" y="1530.2803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="831.4697" y="1544.2803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="831.4697" y="1558.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="816.6367" y="1591.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="826.6367" y="1612.2803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="828.6816" y="1645.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="838.6816" y="1666.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="838.6816" y="1680.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="811.5371" y="1713.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="821.5371" y="1734.2803">Requeue on provisioning, updating, terminating</text><path d="M684.9954,1769.5 L684.9954,2190.5 L664.9954,2194.5 L684.9954,2198.5 L684.9954,2619.5 A0,0 0 0 0 684.9954,2619.5 L1039.0012,2619.5 A0,0 0 0 0 1039.0012,2619.5 L1039.0012,1779.5 L1029.0012,1769.5 L684.9954,1769.5 A0,0 0 0 0 684.9954,1769.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1029.0012,1769.5 L1029.0012,1779.5 L1039.0012,1779.5 L1029.0012,1769.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="690.9954" y="1785.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="690.9954" y="1799.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="690.9954" y="1813.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="690.9954" y="1827.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="690.9954" y="1841.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="690.9954" y="1855.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="690.9954" y="1869.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="690.9954" y="1883.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="690.9954" y="1897.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="690.9954" y="1911.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="690.9954" y="1925.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.5996" x="690.9954" y="1939.2803">service: mediaservices</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.0547" x="690.9954" y="1953.2803">slug: mediaasset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.6064" x="690.9954" y="1967.2803">kind: MediaAsset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="690.9954" y="1981.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="690.9954" y="1995.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="690.9954" y="2009.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="690.9954" y="2023.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="690.9954" y="2037.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="690.9954" y="2051.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="690.9954" y="2065.2803">supported drift: definedTags, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.5957" x="690.9954" y="2079.2803">freeformTags, masterMediaAssetId (+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="690.9954" y="2093.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="321.3506" x="690.9954" y="2107.2803">bucketName, compartmentId, mediaWorkflowJobId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.6855" x="690.9954" y="2121.2803">namespaceName (+6 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="690.9954" y="2135.2803">create-only fields: locks</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1436" x="690.9954" y="2149.2803">list lookup: oci_media_services_media_assets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6748" x="690.9954" y="2163.2803">filters bucketName, compartmentId, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.9404" x="690.9954" y="2177.2803">masterMediaAssetId (+6 more); skip pre-create</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6123" x="690.9954" y="2191.2803">reuse when the spec has no identity stronger</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0195" x="690.9954" y="2205.2803">than compartmentId plus type, or when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.0059" x="690.9954" y="2219.2803">mediaWorkflowJobId/sourceMediaWorkflowVersion is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8955" x="690.9954" y="2233.2803">set without sourceMediaWorkflowId; otherwise</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9502" x="690.9954" y="2247.2803">require an exact unique match on compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3574" x="690.9954" y="2261.2803">type, and any provided displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0537" x="690.9954" y="2275.2803">bucket/object location, workflow lineage, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.8477" x="690.9954" y="2289.2803">parent/master IDs in ACTIVE, CREATING, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3379" x="690.9954" y="2303.2803">UPDATING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="690.9954" y="2317.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="690.9954" y="2331.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="690.9954" y="2345.2803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="690.9954" y="2359.2803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3779" x="690.9954" y="2373.2803">success, FAILED as terminal without requeue, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3232" x="690.9954" y="2387.2803">DELETING as terminating until follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.916" x="690.9954" y="2401.2803">observation reaches DELETED or OCI NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.957" x="690.9954" y="2415.2803">Create, get, and update return the MediaAsset</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2402" x="690.9954" y="2429.2803">body directly, while DeleteMediaAsset returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4541" x="690.9954" y="2443.2803">only opc-request-id. The reviewed runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9365" x="690.9954" y="2457.2803">therefore stays lifecycle-based and does not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.0195" x="690.9954" y="2471.2803">publish work-request polling behavior.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.502" x="690.9954" y="2485.2803">The published delete contract is intentionally</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9023" x="690.9954" y="2499.2803">narrow: DeleteMediaAsset is called without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7988" x="690.9954" y="2513.2803">deleteMode or isLockOverride, so hierarchical</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0059" x="690.9954" y="2527.2803">delete modes DELETE_CHILDREN and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5781" x="690.9954" y="2541.2803">DELETE_DERIVATIONS remain out of scope for the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.0752" x="690.9954" y="2555.2803">controller-backed surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.668" x="690.9954" y="2569.2803">Matching create-time locks are normalized by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8398" x="690.9954" y="2583.2803">ignoring OCI-populated timeCreated metadata so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1436" x="690.9954" y="2597.2803">steady-state reconcile does not fail after a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2334" x="690.9954" y="2611.2803">successful create that requested locks.</text><ellipse cx="653.9954" cy="2194.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="653.9954" cy="2194.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="653.9954" x2="653.9954" y1="157" y2="177"/><polygon fill="#0F172A" points="649.9954,167,653.9954,177,657.9954,167,653.9954,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="828.8362" x2="828.8362" y1="355" y2="375"/><polygon fill="#0F172A" points="824.8362,365,828.8362,375,832.8362,365,828.8362,369" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="828.8362" x2="828.8362" y1="423" y2="443"/><polygon fill="#0F172A" points="824.8362,433,828.8362,443,832.8362,433,828.8362,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="512.5295" x2="479.1545" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="479.1545" x2="479.1545" y1="257" y2="279"/><polygon fill="#0F172A" points="475.1545,269,479.1545,279,483.1545,269,479.1545,273" style="stroke:#0F172A;stroke-width:1;"/><li