28.7803">ChangeMediaWorkflowCompartment,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3301" x="724.3657" y="1142.7803">UpdateMediaWorkflow only for mutable</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.2197" x="724.3657" y="1156.7803">fields definedTags, displayName,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.1377" x="724.3657" y="1170.7803">freeformTags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.1543" x="724.3657" y="1184.7803">mediaWorkflowConfigurationIds (+2</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="724.3657" y="1198.7803">more)</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg15"><polygon fill="#0F172A" points="973.6958,1277,983.6958,1281,973.6958,1285,977.6958,1281" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="717.3657" x2="979.6958" y1="1281" y2="1281"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="724.3657" y="1233.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="724.3657" y="1247.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="724.3657" y="1261.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="724.3657" y="1275.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg16"><polygon fill="#0F172A" points="973.6958,1347,983.6958,1351,973.6958,1355,977.6958,1351" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="717.3657" x2="979.6958" y1="1351" y2="1351"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0752" x="724.3657" y="1303.7803">apply follow-up strategy</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8926" x="724.3657" y="1317.7803">create=read-after-write;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.8027" x="724.3657" y="1331.7803">update=read-after-write;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.0234" x="724.3657" y="1345.7803">delete=confirm-delete</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg17"><polygon fill="#0F172A" points="460.7876,1396,450.7876,1400,460.7876,1404,456.7876,1400" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="454.7876" x2="716.3657" y1="1400" y2="1400"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="466.7876" y="1380.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="466.7876" y="1394.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg18"><polygon fill="#0F172A" points="292.8022,1431,282.8022,1435,292.8022,1439,288.8022,1435" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="286.8022" x2="448.7876" y1="1435" y2="1435"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="298.8022" y="1429.7803">requeue on terminating</text></g><path d="M722,1456 L722,2290 A8,8 0 0 0 730,2298 L1075,2298 A8,8 0 0 0 1083,2290 L1083,1458 L1073,1448 L730,1448 A8,8 0 0 0 722,1456" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1073,1448 L1073,1454 A4,4 0 0 0 1077,1458 L1083,1458 L1073,1448" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="728" y="1463.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="728" y="1477.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="728" y="1491.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="728" y="1505.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="728" y="1519.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="728" y="1533.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="728" y="1547.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="728" y="1561.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="728" y="1575.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="728" y="1589.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="728" y="1603.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="728" y="1617.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="728" y="1631.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="728" y="1645.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.5996" x="728" y="1659.7803">service: mediaservices</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.0479" x="728" y="1673.7803">slug: mediaworkflow</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1514" x="728" y="1687.7803">kind: MediaWorkflow</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="728" y="1701.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="728" y="1715.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="728" y="1729.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="728" y="1743.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="728" y="1757.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="728" y="1771.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="728" y="1785.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="728" y="1799.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="728" y="1813.7803">supported drift: definedTags, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.1816" x="728" y="1827.7803">freeformTags, mediaWorkflowConfigurationIds (+2</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="728" y="1841.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="728" y="1855.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="728" y="1869.7803">compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="728" y="1883.7803">create-only fields: locks</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1367" x="728" y="1897.7803">list lookup: oci_media_services_media_workflows</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.6543" x="728" y="1911.7803">filters compartmentId, displayName; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5918" x="728" y="1925.7803">compartmentId plus displayName unique match;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4541" x="728" y="1939.7803">empty displayName skips pre-create lookup;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="728" y="1953.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="728" y="1967.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="728" y="1981.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.8398" x="728" y="1995.7803">MediaWorkflow create and update are synchronous</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5645" x="728" y="2009.7803">reread flows. OCI returns the body immediately</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0195" x="728" y="2023.7803">and the resource exposes only ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="340.7852" x="728" y="2037.7803">NEEDS_ATTENTION, and DELETED, so the reviewed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4746" x="728" y="2051.7803">runtime does not publish provisioning or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="728" y="2065.7803">updating lifecycle buckets.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="335.3438" x="728" y="2079.7803">The published runtime treats NEEDS_ATTENTION as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="728" y="2093.7803">terminal failure without requeue and does not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1094" x="728" y="2107.7803">invent service-local work-request polling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7021" x="728" y="2121.7803">Pre-create reuse scopes by compartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1094" x="728" y="2135.7803">uses the SDK displayName filter when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1641" x="728" y="2149.7803">spec.displayName is present. Adoption requires a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3848" x="728" y="2163.7803">unique exact match on the reviewed identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.7998" x="728" y="2177.7803">surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5645" x="728" y="2191.7803">Delete confirmation treats either a DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6953" x="728" y="2205.7803">lifecycle response or a NotFound reread as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1504" x="728" y="2219.7803">terminal and otherwise keeps the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.9854" x="728" y="2233.7803">OCI stops returning the resource.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9092" x="728" y="2247.7803">Matching create-time locks are normalized out of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="728" y="2261.7803">steady-state parity by ignoring OCI-populated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6328" x="728" y="2275.7803">timeCreated metadata, but changing requested</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3369" x="728" y="2289.7803">locks after create remains out of scope.</text><?plantuml-src fLZlRnot4VtElu98lpZexSdoZyGvmGKSIMa5ot9XgUqN0GPlbtl7cajkIEwThqN_zxuXkNkx9rqi90Y2w9RaS6RUcpV3-2_AjCA9XlkrgEnMcHMlXVQI-M5bASelAsSxKvrRRHt_KrtYdsgqevArw7JunPfm8nh9_oRrHWPLYiVttAh_I7xwQhGedBFRRFrvVVhZY_59OuFy-O4FTVrZzSFXBkigwVAEvQlNBv__TB23hi_hBr--EdtzUhGUpPVM6UduwGyigA0blvM_TjAKaXUyaPKINhgDAgK_-K2__cNTbrhRBLkhIlBQsh2qNqScVN_wlunpKGRh9YxcKFkbmnZb2_ccVevb64CsLIjCUFpyUCDJh8pICDZGgfRNoaoJ-DChyNBv1gjaifqibSlgjJmTbXu0zAOMTSd-ns9i_7stbCXia9wD_E3dSCHPhQMRVFuPUVuaIsjATRZqtSVRZ-zl4meVX14hwRxZmlFffycHZ-TNZC3dTWDefxPd1-TG1avMt4blTHUKDOlywGHmhu2fFqc_Y_sMeeTvxZUhta8bDQ8zUZejJqzAKqMIidsoUF6NKOuMN1hixoIVi0_Uvd3OVY-Td8QwuCFVpnpTwyFtRBg53aqJijWRHqXUKMXJwaVu-RMrN_0VWH2MobHCwC230ocm7_3Bhwq6714BZbengAuT5zf9KUsmgdpmR7ep-OBT2_vN6QOtIkZJO7mmfZnlbFTGi6E6hd7Bn99_LYiTfFEBUrFQXZZJmDfLDUELygqMEvApxsCmJdPUB945Ye2mxnpg6fS2CLG-Y7_isdC46UGZ8JnkylScvH477g50YsXXDn5yW_nD0566-o12vwCv2Zlnb6U-o2h3VH4_7tCkhKxzEx8LdjNADVqz6oKUX7PlGA27s4NtIYs5WJ_OKIiZD3gBWxFuwYCuIss99K_9Z9D18Fxi2AL1HZhZkzibmF8QKGL_eFAvNL93UEe5oQszew86-HvQZScF_zAbMcrwTmW5LA272QchGcmX9VUcSgeEN6w4xaGydY6AdzS8GLDDx0LmwkgCrF6sQrlh02_lsefkyfshHIaNrBRH4wexiV8pDYgA6Q-TbBLrJLfgnjYS4wYhpaLthYhFd_tv1M-iGobzal-MPU1BEYfvqr5S2zGFc5yOkKsHUJQfHfOggB16x_A61ITWFSkoqvSndrRnsE5-QoD2kKP2eALVqPgc9rYhEp-kVTuP1UQdKsTSDctOZQrozFhMyzR9eenEmY-wvenL7IaUVObd2JIXz5xZRHj6OOE_L0au4MW4Iv22lnMOKOQdyckSMghhcDwUK7IX7t2c9PAURz-K2_LTs-hTlJa7eLRJqZxVPt1sR_uH2JJjJmaun9XllJS9nGcxncc7dGczxiqt-OKjaM3ok12xpl2rr910lWPA7g8VCNiRwbvzvubgd_BFitkJ2cAy9KKusf8AUBmb2M2_vPW_WbAAl6Y4L82Q7ZqjoDLky8iQGH55ejWw5KRkFBAIlSY2cWUCfxQ5fFfliy1KbFzUfTucOImwj0XTPFF311ClE1mY3eQMs3nGHD1BEDp0S1WKoQdLEd1RyyVdi3ms_R4Xx9jM