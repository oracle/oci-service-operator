<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1010px" preserveAspectRatio="none" style="width:3602px;height:1010px;background:#FCFCFD;" version="1.1" viewBox="0 0 3602 1010" width="3602px" zoomAndPan="magnify"><title>State Machine - apmconfig/Config</title><defs/><g><rect fill="#FCFCFD" height="1010" style="stroke:none;stroke-width:1;" width="3602" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="225.5654" x="1681.3603" y="20.7803">State Machine - apmconfig/Config</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="170" y="865"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="170" x2="434.3643" y1="889" y2="889"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="275.7271" y="880.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="175" y="904.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="175" y="918.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1231.36" y="783"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1236.36" y="806.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2000.04" y="770"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2005.04" y="793.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1990.32" y="889"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1995.32" y="912.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1258.84" y="950"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1264.7746" y="973.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="712.44" y="876"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="717.44" y="899.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1565.56" y="867"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1570.56" y="890.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1598.23" y="706"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1603.23" y="729.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="2372.91" y="926"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2377.91" y="949.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3513.58" y="874"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3518.58" y="897.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="3016.79" y="874"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3021.79" y="897.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="32" id="ent0002"><ellipse cx="16" cy="896" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="53" id="ent0003"><path d="M2226.23,49 L2226.23,622.66 L2050.78,769.98 L2226.23,630.66 L2226.23,883 A8,8 0 0 0 2234.23,891 L2613.4361,891 A8,8 0 0 0 2621.4361,883 L2621.4361,51 L2611.4361,41 L2234.23,41 A8,8 0 0 0 2226.23,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2611.4361,41 L2611.4361,47 A4,4 0 0 0 2615.4361,51 L2621.4361,51 L2611.4361,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2232.23" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2232.23" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2232.23" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2232.23" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2232.23" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2232.23" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2232.23" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2232.23" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2232.23" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7168" x="2232.23" y="182.7803">service: apmconfig</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.8203" x="2232.23" y="196.7803">slug: config</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9307" x="2232.23" y="210.7803">kind: Config</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2232.23" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2232.23" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2232.23" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="2232.23" y="266.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2232.23" y="280.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="2232.23" y="294.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="2232.23" y="308.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="2232.23" y="322.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.04" x="2232.23" y="336.7803">supported drift: agentVersion, attachInstallDir,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.9404" x="2232.23" y="350.7803">config, definedTags (+15 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2232.23" y="364.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0605" x="2232.23" y="378.7803">apmDomainId, configType, managementAgentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="197.6543" x="2232.23" y="392.7803">matchAgentsWithAttributeValue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2232.23" y="406.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="2232.23" y="420.7803">list lookup: oci_apm_config_configs filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0059" x="2232.23" y="434.7803">apmDomainId, configType, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="328.3916" x="2232.23" y="448.7803">optionsGroup; Pre-create reuse sends apmDomainId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0674" x="2232.23" y="462.7803">plus configType and any available displayName or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0811" x="2232.23" y="476.7803">options-group filters, then adopts only a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4883" x="2232.23" y="490.7803">exact match on configType, displayName, group,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.627" x="2232.23" y="504.7803">filterId, filterText, namespace,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8682" x="2232.23" y="518.7803">managementAgentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2607" x="2232.23" y="532.7803">matchAgentsWithAttributeValue, and serviceName;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0469" x="2232.23" y="546.7803">duplicate matches fail instead of guessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2232.23" y="560.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="2232.23" y="574.7803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1367" x="2232.23" y="588.7803">The published Config kind is polymorphic.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2813" x="2232.23" y="602.7803">spec.configType selects the OCI subtype decode</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="374.2061" x="2232.23" y="616.7803">path across AGENT, OPTIONS, MACS_APM_EXTENSION,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="351.6816" x="2232.23" y="630.7803">METRIC_GROUP, APDEX, and SPAN_FILTER, and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2402" x="2232.23" y="644.7803">runtime rejects top-level fields that do not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0674" x="2232.23" y="658.7803">belong to the selected subtype before OCI calls.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9297" x="2232.23" y="672.7803">The reviewed runtime is synchronous. Create and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="2232.23" y="686.7803">update settle from the follow-up read, the row</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8398" x="2232.23" y="700.7803">publishes no provisioning or updating lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.7227" x="2232.23" y="714.7803">buckets, and delete keeps the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9092" x="2232.23" y="728.7803">confirm-delete rereads stop finding the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3584" x="2232.23" y="742.7803">resource.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="2232.23" y="756.7803">status.apmDomainId mirrors the bound request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.2051" x="2232.23" y="770.7803">domain because OCI response bodies do not echo</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6611" x="2232.23" y="784.7803">it, but replacement-only domain drift still</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.1094" x="2232.23" y="798.7803">needs an explicit read model.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6191" x="2232.23" y="812.7803">APDEX rule booleans remain a current gap in the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0537" x="2232.23" y="826.7803">generated spec projection. Explicit false values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3779" x="2232.23" y="840.7803">inside spec.rules[] are not preserved today, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2676" x="2232.23" y="854.7803">the handwritten runtime cannot distinguish</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6816" x="2232.23" y="868.7803">omission from false for rules.isEnabled and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.3994" x="2232.23" y="882.7803">rules.isApplyToErrorSpans.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="115" id="ent0006"><path d="M2956.44,957 L2956.44,965.09 L2475.26,948.19 L2956.44,973.09 L2956.44,993 A8,8 0 0 0 2964.44,1001 L3221.5767,1001 A8,8 0 0 0 3229.5767,993 L3229.5767,959 L3219.5767,949 L2964.44,949 A8,8 0 0 0 2956.44,957" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3219.5767,949 L3219.5767,955 A4,4 0 0 0 3223.5767,959 L3229.5767,959 L3219.5767,949" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2962.44" y="964.7803">delete policy: required</text><text fill="#334155" font-family="Helvet