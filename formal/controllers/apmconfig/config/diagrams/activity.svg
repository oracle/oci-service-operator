 textLength="179.0059" x="1013.1299" y="1216.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="970.2051,1264,982.2051,1276,970.2051,1288,958.2051,1276,970.2051,1264" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="90" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.5537" x="823.4282" y="1308"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="833.4282" y="1328.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="833.4282" y="1342.7803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="833.4282" y="1356.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="833.4282" y="1370.7803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="833.4282" y="1384.7803">matching field-driven path executes</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="308.7158" x="815.8472" y="1418"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="825.8472" y="1438.7803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8926" x="825.8472" y="1452.7803">create=read-after-write;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="825.8472" y="1466.7803">update=read-after-write; delete=confirm-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="818.5952" y="1500"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="828.5952" y="1520.7803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="830.6401" y="1554"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="840.6401" y="1574.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="840.6401" y="1588.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="169.4336" x="885.4883" y="1622"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4336" x="895.4883" y="1642.7803">Requeue on terminating</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="258.1436" x="841.1333" y="1676"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1436" x="851.1333" y="1696.7803">Keep promotion blocked on drift-guard</text><path d="M685.9746,1732 L685.9746,2167 L665.9746,2171 L685.9746,2175 L685.9746,2610 A0,0 0 0 0 685.9746,2610 L1081.1807,2610 A0,0 0 0 0 1081.1807,2610 L1081.1807,1742 L1071.1807,1732 L685.9746,1732 A0,0 0 0 0 685.9746,1732" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1071.1807,1732 L1071.1807,1742 L1081.1807,1742 L1071.1807,1732" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="691.9746" y="1747.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="691.9746" y="1761.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="691.9746" y="1775.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="691.9746" y="1789.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="691.9746" y="1803.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="691.9746" y="1817.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="691.9746" y="1831.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="691.9746" y="1845.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="691.9746" y="1859.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="691.9746" y="1873.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="691.9746" y="1887.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7168" x="691.9746" y="1901.7803">service: apmconfig</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.8203" x="691.9746" y="1915.7803">slug: config</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9307" x="691.9746" y="1929.7803">kind: Config</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="691.9746" y="1943.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="691.9746" y="1957.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="691.9746" y="1971.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="691.9746" y="1985.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="691.9746" y="1999.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="691.9746" y="2013.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="691.9746" y="2027.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="691.9746" y="2041.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.04" x="691.9746" y="2055.7803">supported drift: agentVersion, attachInstallDir,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.9404" x="691.9746" y="2069.7803">config, definedTags (+15 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="691.9746" y="2083.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0605" x="691.9746" y="2097.7803">apmDomainId, configType, managementAgentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="197.6543" x="691.9746" y="2111.7803">matchAgentsWithAttributeValue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="691.9746" y="2125.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="691.9746" y="2139.7803">list lookup: oci_apm_config_configs filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0059" x="691.9746" y="2153.7803">apmDomainId, configType, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="328.3916" x="691.9746" y="2167.7803">optionsGroup; Pre-create reuse sends apmDomainId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0674" x="691.9746" y="2181.7803">plus configType and any available displayName or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0811" x="691.9746" y="2195.7803">options-group filters, then adopts only a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4883" x="691.9746" y="2209.7803">exact match on configType, displayName, group,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.627" x="691.9746" y="2223.7803">filterId, filterText, namespace,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8682" x="691.9746" y="2237.7803">managementAgentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2607" x="691.9746" y="2251.7803">matchAgentsWithAttributeValue, and serviceName;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0469" x="691.9746" y="2265.7803">duplicate matches fail instead of guessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="691.9746" y="2279.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="691.9746" y="2293.7803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1367" x="691.9746" y="2307.7803">The published Config kind is polymorphic.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2813" x="691.9746" y="2321.7803">spec.configType selects the OCI subtype decode</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="374.2061" x="691.9746" y="2335.7803">path across AGENT, OPTIONS, MACS_APM_EXTENSION,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="351.6816" x="691.9746" y="2349.7803">METRIC_GROUP, APDEX, and SPAN_FILTER, and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2402" x="691.9746" y="2363.7803">runtime rejects top-level fields that do not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0674" x="691.9746" y="2377.7803">belong to the selected subtype before OCI calls.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9297" x="691.9746" y="2391.7803">The reviewed runtime is synchronous. Create and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="691.9746" y="2405.7803">update settle from the follow-up read, the row</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8398" x="691.9746" y="2419.7803">publishes no provisioning or updating lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.7227" x="691.9746" y="2433.7803">buckets, and delete keeps the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9092" x="691.9746" y="2447.7803">confirm-delete rereads stop finding the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3584" x="691.9746" y="2461.7803">resource.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="691.9746" y="2475.7803">status.apmDomainId mirrors the bound request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.2051" x="691.9746" y="2489.7803">domain because OCI response bodies do not echo</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6611" x="691.9746" y="2503.7803">it, but replacement-only domain drift still</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.1094" x="691.9746" y="2517.7803">needs an explicit read model.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6191" x="691.9746" y="2531.7803">APDEX rule booleans remain a current gap in the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0537" x="691.9746" y="2545.7803">generated spec projection. Explicit false values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3779" x="691.9746" y="2559.7803">inside spec.rules[] are not preserved today, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2676" x="691.9746" y="2573.7803">the handwritten runtime cannot distinguish</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6816" x="691.9746" y="2587.7803">omission from false for rules.isEnabled and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.3994" x="691.9746" y="2601.7803">rules.isApplyToErrorSpans.</text><ellipse cx="654.9746" cy="2171" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="654.9746" cy="2171" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="654.9746" x2="654.9746" y1="157" y2="177"/><polygon fill="#0F172A" points="650.9746,167,654.9746,177,658.9746,167,654.9746,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.7896" x2="816.7896" y1="341" y2="361"/><polygon fill="#0F172A" points="812.7896,351,816.7896,361,820.7896,351,816.7896,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.7896" x2="816.7896" y1="409" y2="429"/><polygon fill="#0F172A" points="812.7896,419,816.7896,429,820.7896,419,816.7896,423" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="513.5088" x2="493.1597" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="493.1597" x2="493.1597" y1="257" y2="279"/><polygon fill="#0F172A" points="489.1597,269,493.1597,279,497.1597,269,493.1597,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="796.4404" x2="816.7896" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.7896" x2="816.7896" y1="257" y2="279"/><polygon fill="#0F172A" points="812.7896,269,816.7896,279,820.7896,269,816.7896,273" style="stroke:#0F172A;str