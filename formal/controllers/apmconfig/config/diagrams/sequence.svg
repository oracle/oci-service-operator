03.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="669.145" y="1317.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="669.145" y="1331.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="669.145" y="1345.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg16"><polygon fill="#0F172A" points="902.1646,1417,912.1646,1421,902.1646,1425,906.1646,1421" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="662.145" x2="908.1646" y1="1421" y2="1421"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0752" x="669.145" y="1373.7803">apply follow-up strategy</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8926" x="669.145" y="1387.7803">create=read-after-write;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.8027" x="669.145" y="1401.7803">update=read-after-write;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.0234" x="669.145" y="1415.7803">delete=confirm-delete</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg17"><polygon fill="#0F172A" points="405.5669,1466,395.5669,1470,405.5669,1474,401.5669,1470" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="399.5669" x2="661.145" y1="1470" y2="1470"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="411.5669" y="1450.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="411.5669" y="1464.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg18"><polygon fill="#0F172A" points="237.5815,1501,227.5815,1505,237.5815,1509,233.5815,1505" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="231.5815" x2="393.5669" y1="1505" y2="1505"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="243.5815" y="1499.7803">requeue on terminating</text></g><path d="M667,1526 L667,2430 A8,8 0 0 0 675,2438 L1054,2438 A8,8 0 0 0 1062,2430 L1062,1528 L1052,1518 L675,1518 A8,8 0 0 0 667,1526" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1052,1518 L1052,1524 A4,4 0 0 0 1056,1528 L1062,1528 L1052,1518" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="673" y="1533.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="673" y="1547.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="673" y="1561.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="673" y="1575.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="673" y="1589.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="673" y="1603.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="673" y="1617.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="673" y="1631.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="673" y="1645.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="673" y="1659.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="673" y="1673.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="673" y="1687.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="673" y="1701.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="673" y="1715.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7168" x="673" y="1729.7803">service: apmconfig</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.8203" x="673" y="1743.7803">slug: config</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9307" x="673" y="1757.7803">kind: Config</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="673" y="1771.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="673" y="1785.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="673" y="1799.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="673" y="1813.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="673" y="1827.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="673" y="1841.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="673" y="1855.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="673" y="1869.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.04" x="673" y="1883.7803">supported drift: agentVersion, attachInstallDir,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.9404" x="673" y="1897.7803">config, definedTags (+15 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="673" y="1911.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0605" x="673" y="1925.7803">apmDomainId, configType, managementAgentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="197.6543" x="673" y="1939.7803">matchAgentsWithAttributeValue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="673" y="1953.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="673" y="1967.7803">list lookup: oci_apm_config_configs filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0059" x="673" y="1981.7803">apmDomainId, configType, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="328.3916" x="673" y="1995.7803">optionsGroup; Pre-create reuse sends apmDomainId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0674" x="673" y="2009.7803">plus configType and any available displayName or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0811" x="673" y="2023.7803">options-group filters, then adopts only a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4883" x="673" y="2037.7803">exact match on configType, displayName, group,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.627" x="673" y="2051.7803">filterId, filterText, namespace,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8682" x="673" y="2065.7803">managementAgentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2607" x="673" y="2079.7803">matchAgentsWithAttributeValue, and serviceName;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0469" x="673" y="2093.7803">duplicate matches fail instead of guessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="673" y="2107.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="673" y="2121.7803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1367" x="673" y="2135.7803">The published Config kind is polymorphic.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2813" x="673" y="2149.7803">spec.configType selects the OCI subtype decode</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="374.2061" x="673" y="2163.7803">path across AGENT, OPTIONS, MACS_APM_EXTENSION,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="351.6816" x="673" y="2177.7803">METRIC_GROUP, APDEX, and SPAN_FILTER, and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2402" x="673" y="2191.7803">runtime rejects top-level fields that do not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0674" x="673" y="2205.7803">belong to the selected subtype before OCI calls.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9297" x="673" y="2219.7803">The reviewed runtime is synchronous. Create and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="673" y="2233.7803">update settle from the follow-up read, the row</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8398" x="673" y="2247.7803">publishes no provisioning or updating lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.7227" x="673" y="2261.7803">buckets, and delete keeps the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9092" x="673" y="2275.7803">confirm-delete rereads stop finding the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3584" x="673" y="2289.7803">resource.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="673" y="2303.7803">status.apmDomainId mirrors the bound request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.2051" x="673" y="2317.7803">domain because OCI response bodies do not echo</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6611" x="673" y="2331.7803">it, but replacement-only domain drift still</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.1094" x="673" y="2345.7803">needs an explicit read model.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6191" x="673" y="2359.7803">APDEX rule booleans remain a current gap in the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0537" x="673" y="2373.7803">generated spec projection. Explicit false values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3779" x="673" y="2387.7803">inside spec.rules[] are not preserved today, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2676" x="673" y="2401.7803">the handwritten runtime cannot distinguish</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6816" x="673" y="2415.7803">omission from false for rules.isEnabled and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.3994" x="673" y="2429.7803">rules.isApplyToErrorSpans.</text><?plantuml-src nLXTRziu5dtdhxYOVMcnbjjCcvcEYowGIJETOD8cY3sp0smM0IrHDhSogIKfkzx5_lSzbw9aER6tBUPXKHInHF9-ttCFvJzgKqidL-INih0RRHPKoiehuVkLkSm_BfnjJ75kA-leJsMEVyLWHw5AsLJX9sl21xbIzBEgrYheN1xUCzN_KdJoSh0edRER9FrvUVBzjyEJnWRruoCRolBxuhk7kwmhb4ixvYzFNpp_uS4ELf_MNxnuUN9wEbYFudFhZ79qyfq8EbIAfkgVZJAveenalSgjAVNYsNdy8vQwK5HQ6-Rsqq2ExuxyMn39F5YtPrVohrjww9ZwLhqgdsCPmX12NKiJ3fyVRlWIAGFVUncLBjMLDlkH--6bV35_XLKMMUyjvVFYL9tqIu-oyggKPIx-8w9lz4ipLmXdK5uCx224BpXRLShjlVvHUdMh4E9SFrpwvdfw_SjKkRNErNjfv4AvRqXwsd-rT-Jw_59mnickaSzzsQC7vr3xJXNabBTL4xGra_JgMQ7b0ZdrpzhdRBSbwz8yzkj59w5G5RmzUhfTtZ-fJ14hK-o2HTbV1Z6Qa3BOtoXgomvc9Z_4RXCVsVTnGltl9uuL-l1Kx6_XG_kHcEo4mnUlsQTKx37XT6NjH_oHC7gkJI5a5IWub04s8k7gKrqX0J7wXEumQA8joSefMMongdtmObyb6u7T4tgdGbAbW3-zr5wAzhJItWEXZacuWlXMX7zIwYeevoVSjM_jIcfpMOpkJDl0issjHbHeNrToouY55LjpLlqxTlDfzCkfniiv8i7ESE8RXwQ66KWNsXvLVyoGS_WRrD2RmxA-EZ07L1v8V0t78R2jvpLYk9SDRSW76HeVnR6ZRLbIgX9Lf5o_ZQ-FMTMk9iEEx8dHTgjEmLhBdJCebpipo5Yq9A-KD52DKYgraHK6XODTUEjZvEULvQBuaY0u5P3qJZLxh6BPuhtRjab9QxbTrVY1x9ETUqZ-KWMjMJj3POcIUomrnZd-PwMLNdVcSC3HOXuYL5LaSWEGk3E5qsKWjPPL8-Fnb8tuUWaNAcw17RJjcpfYt9isTMqTCabDNR0ctxXIvWhTi40L_CRrOSr8o11alhmqCAUgtcetQZEs6F6qnbGePXA9UVBdarDQMQUUYblr3vK7cgiIZxHgs8q9UW75d1crQHr1AWSzHuEM4wjev0esdB4XMCQha2_Za_-h3ikp49oUDq7z1l-LI7Xpi9lt90-RcOQzt8c8UX2v2TqubUMnGsDR8Zf8pfxHL5UD7uYFXIFDLiYrr5Niuu4-hjQaCOkv4idS4OMbCWHULGTFrbI0GcgCHfkXvJ4YM-UnGiTmgPspeoIHdMv_pTIdC2A3BRv6Ohy-iYFsIVYsTbZLQoeQ1cyEIpp9TGblXKPv0AN8bhG0FZ00ZtTJ2wuDyez8i2SG4vX9jgMClYtG4NduqhuQrXX3Lwophf5OeU_hcvTYEZwhAK7IMLqZ3R_6jkY0Y1C3PPsmEzEMyNwpt9cZtOAUtRKB3Tf57HyHhZ6qL1MWcfOeK8_H54loJIYxyJ1knyXjUdnzPzfk7cvf7HbiQT5dkAK5wcxBCNjaZ4i9Cc4t6Th5O_u6jTZsTl6aoYB2PHkdmy2S0ol9YeJ_YVTywVXgfzERX8uyjNk8VTEYUjPWb5LP4jyJgwZW8SLvmANYa4F_eUTWy0g2Gm-dJY-MWUlyC3rCREwFSSFFIZd44QS1n9PAPrUCAFI8hkwk72XZWNo-ZUmCZW5DP929RjHo4Vr5DSVkRpERMPUbCS78mwq_5bToY-0Db7Lpj5EqOMJhyoAG5wONBBcVVp4vITt6kezP8XYYHYwYRPQd5wpO3VvOXcCX7V0dCFBEsHxcGBYLIUxu15dPAYKdxvFhK_aUYH5x_C0BJni08-bLGfEDr03g69fUQWRA8Ik2pJg7PKdzP7SR5Bvg5edhB0HkWSM