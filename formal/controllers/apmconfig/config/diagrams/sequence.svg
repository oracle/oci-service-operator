="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.8584" x="649.762" y="893.7803">(+15 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7783" x="649.762" y="907.7803">Reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3027" x="649.762" y="921.7803">apmDomainId, configType,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8682" x="649.762" y="935.7803">managementAgentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="197.6543" x="649.762" y="949.7803">matchAgentsWithAttributeValue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3506" x="649.762" y="963.7803">Lookup filters: apmDomainId, configType,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.7578" x="649.762" y="977.7803">displayName, optionsGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9229" x="649.762" y="991.7803">Lookup matching: Pre-create reuse sends</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.8057" x="649.762" y="1005.7803">apmDomainId plus configType and any</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.916" x="649.762" y="1019.7803">available displayName or options-group</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.9297" x="649.762" y="1033.7803">filters, then adopts only a unique exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1367" x="649.762" y="1047.7803">match on configType, displayName, group,</text><text fill