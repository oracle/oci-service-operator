ore mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8467" x="811" y="2129.7803">availability_domain, cluster_placement_group_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.9473" x="811" y="2143.7803">compartment_id, file_system_name (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="811" y="2157.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="811" y="2171.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9092" x="811" y="2185.7803">oci_lustre_file_storage_lustre_file_systems</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6748" x="811" y="2199.7803">filters availability_domain, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.0234" x="811" y="2213.7803">display_name, id (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="811" y="2227.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="811" y="2241.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3164" x="811" y="2255.7803">Ready state maps to OCI ACTIVE or INACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.7988" x="811" y="2269.7803">Requeue continues while OCI reports CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.3584" x="811" y="2283.7803">UPDATING, or DELETING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.7852" x="811" y="2297.7803">Bind-before-create reuses only exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7783" x="811" y="2311.7803">compartment, availability-domain, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1162" x="811" y="2325.7803">display-name matches that remain in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0273" x="811" y="2339.7803">CREATING, UPDATING, or INACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.916" x="811" y="2353.7803">Create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.709" x="811" y="2367.7803">work-request-backed, but steady-state readiness</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.3926" x="811" y="2381.7803">is still classified from Lustre file system</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9238" x="811" y="2395.7803">lifecycle state.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0059" x="811" y="2409.7803">Delete completes after GetLustreFileSystem or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6543" x="811" y="2423.7803">ListLustreFileSystems returns DELETED or no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.9785" x="811" y="2437.7803">longer finds the resource.</text><?plantuml-src jLXRSnCt57xNhz2qBs7m9WG85pFf32JXCgJGIQ2yUCOZxsfjDRAqbRGsRgV_lPykkzxr1K8fmqFMkfphTxvpXBqHgcA6pQcTi