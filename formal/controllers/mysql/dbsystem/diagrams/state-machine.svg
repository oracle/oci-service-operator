textLength="287.9229" x="2458.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2458.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2458.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.6826" x="2458.78" y="182.7803">service: mysql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="2458.78" y="196.7803">slug: dbsystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.0342" x="2458.78" y="210.7803">kind: DbSystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2458.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2458.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2458.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2458.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="2458.78" y="280.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="2458.78" y="294.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.5439" x="2458.78" y="308.7803">supported drift: access_mode,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="385.2529" x="2458.78" y="322.7803">backup_policy.copy_policies.backup_copy_retention_in_days,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="2458.78" y="336.7803">backup_policy.copy_policies.copy_to_region,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.54" x="2458.78" y="350.7803">backup_policy.defined_tags (+50 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2458.78" y="364.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6748" x="2458.78" y="378.7803">admin_password, admin_username,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.1953" x="2458.78" y="392.7803">availability_domain, compartment_id (+12 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4404" x="2458.78" y="406.7803">list lookup: oci_mysql_mysql_db_systems filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8955" x="2458.78" y="420.7803">compartment_id, configuration_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.2295" x="2458.78" y="434.7803">database_management, db_system_id (+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2458.78" y="448.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2458.78" y="462.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2676" x="2458.78" y="476.7803">Generated runtime reads admin credential secret</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9502" x="2458.78" y="490.7803">refs during OCI request projection and does not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.875" x="2458.78" y="504.7803">write follow-up Kubernetes secrets.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="2458.78" y="518.7803">When no OCI ID is tracked, generated-runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3643" x="2458.78" y="532.7803">pre-create lookup reuses only identifying</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2129" x="2458.78" y="546.7803">ListDbSystems matches that remain in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2129" x="2458.78" y="560.7803">CREATING, or UPDATING; deleting, deleted,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4541" x="2458.78" y="574.7803">failed, or non-identifying matches still call</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.4824" x="2458.78" y="588.7803">CreateDbSystem.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="96" id="ent0006"><path d="M3194.04,663 L3194.04,670.34 L2707.3,654.1 L3194.04,678.34 L3194.04,699 A8,8 0 0 0 3202.04,707 L3507.3838,707 A8,8 0 0 0 3515.3838,699 L3515.3838,665 L3505.3838,655 L3202.04,655 A8,8 0 0 0 3194.04,663" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3505.3838,655 L3505.3838,661 A4,4 0 0 0 3509.3838,6