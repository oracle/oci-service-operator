<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="825px" preserveAspectRatio="none" style="width:674px;height:825px;background:#FCFCFD;" version="1.1" viewBox="0 0 674 825" width="674px" zoomAndPan="magnify"><title>State Machine - mysql/Configuration</title><defs/><g><rect fill="#FCFCFD" height="825" style="stroke:none;stroke-width:1;" width="674" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="242.6895" x="207.951" y="20.7803">State Machine - mysql/Configuration</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="181.041" x="122.83" y="137"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="122.83" x2="303.871" y1="175" y2="175"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.71" x="132.83" y="152.7803">provisioning</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.041" x="132.83" y="166.7803">provider: PROVISIONING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="128.9238" x="148.89" y="404"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="148.89" x2="277.8138" y1="442" y2="442"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5723" x="158.89" y="419.7803">active</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9238" x="158.89" y="433.7803">provider: ACTIVE</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="150.6963" x="7" y="671"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="7" x2="157.6963" y1="709" y2="709"/><text fill="#0F172A" font-family="Hel