xt fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="772" y="996.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="772" y="1010.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="772" y="1024.7803">archetype batch: Legacy-adapter controllers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7158" x="772" y="1038.7803">follow the shared resolution and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0469" x="772" y="1052.7803">sequences but preserve handwritten stop</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.999" x="772" y="1066.7803">conditions until promotion is safe.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.6826" x="772" y="1080.7803">service: mysql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9307" x="772" y="1094.7803">slug: mysqldbsystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9307" x="772" y="1108.7803">kind: MySqlDbSystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="772" y="1122.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="772" y="1136.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="772" y="1150.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="772" y="1164.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="772" y="1178.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.875" x="772" y="1192.7803">mutable/forceNew: access_mode,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="385.2529" x="772" y="1206.7803">backup_policy.copy_policies.backup_copy_retention_in_days,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="772" y="1220.7803">backup_policy.copy_policies.copy_to_region,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.3193" x="772" y="1234.7803">backup_policy.defined_tags (+50 more) /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6748" x="772" y="1248.7803">admin_password, admin_username,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.1953" x="772" y="1262.7803">availability_domain, compartment_id (+12 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="772" y="1276.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="772" y="1290.7803">delete-confirmation, endpoint-materialization,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.3818" x="772" y="1304.7803">legacy-adapter, list-lookup (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1436" x="772" y="1318.7803">Create reads username and password secrets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.999" x="772" y="1332.7803">before submitting the OCI request.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6123" x="772" y="1346.7803">Endpoint secret materialization only happens</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9717" x="772" y="1360.7803">after the DB system reaches ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8672" x="772" y="1374.7803">Delete remains an unsupported legacy path, so no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3506" x="772" y="1388.7803">confirmed terminating phase exists today.</text><?plantuml-src fLPjRzis4FxENt7elYIePITDqgOUEg2DiovOsWrDkqy134eysKGaaY6fkDwm_xuZHIcIatGTXY29f7lXlJpt7DsDL8PRNeDRSw4tKgsWv9L3vdf9pekRbTMD4cUwqXP-A0lw4GCDWILlAl-pLluZhn5-mUeElIpuupfNya-4m-E1a5khDydxGNduwiNGKccFxnx4K9QlnCjTBMq5sgIH7vyS7RpUqGZ79_dHqV7XoSb07jqNsYgqSFYIUUahX2kyRL0L21dKMtTRpJvihswhHNwrTHvhjfO2eTJQv_hhm9NhhFvY0Bpmsev2IobsejtSy0MUbWSa9cTKHMcuye_R3nM-nyiW_Tv79Kkyb6fSlDV7_2W_9MbmQKQY8XSdUDYB7ZJcjEHbmVvcCJVujScHAkhHiK4SS4Q1M5rLQ4UVtt67dx3Ggf2xecUNkEB5zgtWngDz1jnHR-oTBF03Ltore_tRsSNO-ZuECYii-kGXF5vHeCW2F43VKVF7KKnsZg51iIZ0ejDLuwLMy_Hf9YHVKVVTh7tFxbMo3X1JTxVgF0YiA9udhLlns1ALY31cWtIodmRLd0CgqcyGHZYbQ5Cwx5utM8vJdKF_l6V3kSxlix5AC1eNP7xld59oCgGs7fAnVl10xPd3U_IzYZQUWEZeZzOtZGaSL0NUUShsadGxOxTNoeemuURNgj1rQ7kDoY-bc005LifLOtdeGlXohGJtFAUSbdNq6LGd8FAbYyv8vrhjFJ-6cZ2nly_eDCWUoRdclbW7jYn2BOlW7cG89lI8ySe38Oi7H5d89RNDSBz-AfkpgDeNWsfWEdD3xi8nPv_Ettw--FX-0bz-NyIdxobhY0M9pQ4n8WKZh2pzDwFv4dN7qIJxBfh_70FzXXPRD3hZZL_hW18NfmzSu50iIwgYUyJXO4O3r7WOlTicmepejl6T6qv5tbZgmRKAMjjCgseR0A1IUrgzFfPslY3X74LB05QkrXvqkKiklNRDfN8xYJJADSPe6xpG21WA0XRHO5Y5TdB3yRj9FZA8pdFVk3U4qOPN4oYbuXMjJVj