<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1105px" preserveAspectRatio="none" style="width:744px;height:1105px;background:#FCFCFD;" version="1.1" viewBox="0 0 744 1105" width="744px" zoomAndPan="magnify"><title>State Machine - mysql/MySqlDbSystem</title><defs/><g><rect fill="#FCFCFD" height="1105" style="stroke:none;stroke-width:1;" width="744" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="260.627" x="234.8239" y="20.7803">State Machine - mysql/MySqlDbSystem</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="230.8135" x="235.06" y="137"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="235.06" x2="465.8735" y1="175" y2="175"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.71" x="245.06" y="152.7803">provisioning</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8135" x="245.06" y="166.7803">provider: CREATING, UPDATING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="128.9238" x="7" y="467"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="7" x2="135.9238" y1="505" y2="505"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5723" x="17" y="482.7803">active</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9238" x="17" y="496.7803">provider: ACTIVE</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="150.6963" x="147.11" y="811"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="147.11" x2="297.8063" y1="849" y2="849"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.7168" x="157.11" y="826.7803">updating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.6963" x="157.11" y="840.7803">provider: UPDATING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="253.4678" x="299.73" y="951"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="299.73" x2="553.1978" y1="989" y2="989"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="33.4688" x="309.73" y="966.7803">failed</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4678" x="309.73" y="980.7803">provider: repo-authored failure bucket</text></g><ellipse cx="350.46" cy="51" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="426.46" cy="1088" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="426.46" cy="1088" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="30" id="ent0003"><path d="M171.34,271 L171.34,488 L136.26,492 L171.34,496 L171.34,713 A8,8 0 0 0 179.34,721 L569.5929,721 A8,8 0 0 0 577.5929,713 L577.5929,273 L567.5929,263 L179.34,263 A8,8 0 0 0 171.34,271" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M567.5929,263 L567.5929,269 A4,4 0 0 0 571.5929,273 L577.5929,273 L567.5929,263" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="177.34" y="278.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="177.34" y="292.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="177.34" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="177.34" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="177.34" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2813" x="177.34" y="348.7803">archetype batch: Legacy-adapter controllers map</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7988" x="177.34" y="362.7803">provider states into the shared controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2949" x="177.34" y="376.7803">phases while open gaps keep additional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="114.3789" x="177.34" y="390.7803">transitions explicit.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.6826" x="177.34" y="404.7803">service: mysql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9307" x="177.34" y="418.7803">slug: mysqldbsystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9307" x="177.34" y="432.7803">kind: MySqlDbSystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="177.34" y="446.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="177.34" y="460.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="177.34" y="474.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="177.34" y="488.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="177.34" y="502.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.875" x="177.34" y="516.7803">mutable/forceNew: access_mode,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="385.2529" x="177.34" y="530.7803">backup_policy.copy_policies.backup_copy_retention_in_days,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="177.34" y="544.7803">backup_policy.copy_policies.copy_to_region,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.3193" x="177.34" y="558.7803">backup_policy.defined_tags (+50 more) /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6748" x="177.34" y="572.7803">admin_password, admin_username,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.1953" x="177.34" y="586.7803">availability_domain, compartment_id (+12 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="177.34" y="600.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="177.34" y="614.7803">delete-confirmation, endpoint-materialization,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.3818" x="177.34" y="628.7803">legacy-adapter, list-lookup (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1436" x="177.34" y="642.7803">Create reads username and password secrets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.999" x="177.34" y="656.7803">before submitting the OCI request.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6123" x="177.34" y="670.7803">Endpoint secret materialization only happens</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9717" x="177.34" y="684.7803">after the DB system reaches ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8672" x="177.34" y="698.7803">Delete remains an unsupported legacy path, so no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3506" x="177.34" y="712.7803">confirmed terminating phase exists today.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M350.46,61.29 C350.46,77.87 350.46,107.03 350.46,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="350.46,136.85,354.46,127.85,350.46,131.85,346.46,127.85,350.46,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5928" x="351.46" y="102.7803">CreateDbSystem</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk4"><path d="M270.98,187.48 C231,203.36 184.55,227.77 153.46,263 C100.01,323.55 81.446,415.5885 75.086,460.7885" fill="none" id="provisioning-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="74.25,466.73,79.465,458.3751,74.9467,461.7788,71.543,457.2605,74.25,466.73" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="210.08" y="228.7803">ACTIVE</text></g><!--link active to updating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk5"><path d="M62.52,517.4 C44.65,570.83 10.91,699.83 68.46,781 C86.49,806.42 111.6306,818.5493 141.0906,825.7293" fill="none" id="active-to-updating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="146.92,827.15,139.1231,821.1327,142.0622,825.9661,137.2288,828.9051,146.92,827.15" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7168" x="69.46" y="769.7803">UpdateDbSystem</text></g><!--link updating to active--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="dependency" data-source-line="25" id="lnk6"><path d="M213.79,810.63 C206.96,793.18 196.45,769.58 183.46,751 C172.66,735.54 163.56,736.92 153.46,721 C110.65,653.51 87.5346,566.4642 77.7846,523.0442" fill="none" id="updating-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="76.47,517.19,74.539,526.8477,77.5655,522.0685,82.3447,525.095,76.47,517.19" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="201.07" y="769.7803">ACTIVE</text></g><!--link provisioning to failed--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="26" id="lnk7"><path d="M466.34,181.14 C514.7,195.05 566.32,219.62 595.46,263 C708.99,431.96 640.63,522.52 595.46,721 C573.58,817.14 562.28,845 499.46,921 C490.22,932.18 483.0685,938.7932 471.4485,947.1632" fill="none" id="provisioning-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="466.58,950.67,476.2206,948.6554,470.6371,947.7476,471.5449,942.1641,466.58,950.67" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0547" x="589.22" y="762.7803">unresolved OCI error or</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3926" x="633.5511" y="776.7803">open gap</text></g><!--link updating to failed--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="27" id="lnk8"><path d="M258.46,861.35 C295.64,886.5 348.3406,922.1476 385.5106,947.2976" fill="none" id="updating-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="390.48,950.66,385.2675,942.3035,386.3389,947.858,380.7844,948.9293,390.48,950.66" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0547" x="343.73" y="902.7803">unresolved OCI error or</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3926" x="388.0611" y="916.7803">open gap</text></g><!--link failed to *end*--><g class="link" data-entity-1="ent0005" data-entity-2="ent0009" data-link-type="dependency" data-source-line="28" id="lnk10"><path d="M426.46,1001.41 C426.46,1024.96 426.46,1053.47 426.46,1070.58" fill="none" id="failed-to-*end*" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="426.46,1076.58,430.46,1067.58,426.46,1071.58,422.46,1067.58,426.46,1076.58" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="427.46" y="1042.7803">operator intervention</text></g><?plantuml-src bLNRRXit47tdLmpIbrwqaXNRIQe21HBBRGqaRb4dVMaAORIStINC9TSaLwuIzDy