ngthAdjust="spacing" textLength="229.5371" x="420.824" y="1138.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="420.824" y="1152.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="420.824" y="1166.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="420.824" y="1180.7803">archetype batch: Legacy-adapter controllers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3711" x="420.824" y="1194.7803">specialize the shared reconcile path while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7021" x="420.824" y="1208.7803">explicit gaps still block generated promotion.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.6826" x="420.824" y="1222.7803">service: mysql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9307" x="420.824" y="1236.7803">slug: mysqldbsystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9307" x="420.824" y="1250.7803">kind: MySqlDbSystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="420.824" y="1264.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="420.824" y="1278.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="420.824" y="1292.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="420.824" y="1306.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="420.824" y="1320.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.875" x="420.824" y="1334.7803">mutable/forceNew: access_mode,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="385.2529" x="420.824" y="1348.7803">backup_policy.copy_policies.backup_copy_retention_in_days,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="420.824" y="1362.7803">backup_policy.copy_policies.copy_to_region,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.3193" x="420.824" y="1376.7803">backup_policy.defined_tags (+50 more) /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6748" x="420.824" y="1390.7803">admin_password, admin_username,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.1953" x="420.824" y="1404.7803">availability_domain, compartment_id (+12 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="420.824" y="1418.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="420.824" y="1432.7803">delete-confirmation, endpoint-materialization,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.3818" x="420.824" y="1446.7803">legacy-adapter, list-lookup (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spa