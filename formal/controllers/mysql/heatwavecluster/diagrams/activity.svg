 font-size="14" lengthAdjust="spacing" textLength="243.5918" x="184.5581" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="315.6611" x="148.5234" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.916" x="158.5234" y="755.7803">Delete path uses DeleteHeatWaveCluster with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6475" x="158.5234" y="769.7803">required via GetHeatWaveCluster or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6611" x="158.5234" y="783.7803">ListHeatWaveCluster to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="166.7891" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="176.7891" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="176.7891" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="149.6445" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="159.6445" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M337.354,929 L337.354,1105 L317.354,1109 L337.354,1113 L337.354,1289 A0,0 0 0 0 337.354,1289 L677.394,1289 A0,0 0 0 0 677.394,1289 L677.394,939 L667.394,929 L337.354,929 A0,0 0 0 0 337.354,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M667.394,929 L667.394,939 L677.394,939 L667.394,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetic