ext fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="203.2612" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.833" x="176.1406" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.833" x="186.1406" y="755.7803">Delete path uses DeleteOpsiExadataInsights</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="186.1406" y="769.7803">with required via GetOpsiExadataInsights or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2197" x="186.1406" y="783.7803">ListOpsiExadataInsights to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="186.1406" y="797.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="185.4922" y="831"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="195.4922" y="851.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="195.4922" y="865.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="168.3477" y="899"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="178.3477" y="919.7803">Requeue on provisioning, updating, terminating</text><path d="M356.0571,943 L356.0571,1119 L336.0571,1123 L356.0571,1127 L356.0571,1303 A0,0 0 0 0 356.0571,1303 L696.0972,1303 A0,0 0 0 0 696.0972,1303 L696.0972,953 L686.0972,943 L356.0571,943 A0,0 0 0 0 356.0571,943" fill="#FFF7D6" st