ted</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="845.1377" y="1079.2803">field surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="832.0342" y="1161.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="842.0342" y="1182.2803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="842.0342" y="1196.2803">fields compartment_id</text><ellipse cx="983.2578" cy="1242" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="983.2578" cy="1242" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="857.6748,1112.5,1108.8408,1112.5,1120.8408,1124.5,1108.8408,1136.5,857.6748,1136.5,845.6748,1124.5,857.6748,1112.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="987.2578" y="1147.2803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="857.6748" y="1128.2803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="872.8301,1295,1093.6855,1295,1105.6855,1307,1093.6855,1319,872.8301,1319,860.8301,1307,872.8301,1295" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="872.8301" y="1310.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="839.0439" y="1303.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1105.6855" y="1303.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.0332" x="695.4814" y="1329"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0332" x="705.4814" y="1349.7803">Apply UpdateKmsVault only for mutable fields</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3857" x="705.4814" y="1363.7803">display_name</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1019.5146" y="1329"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1029.5146" y="1349.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="983.2578,1383,995.2578,1395,983.2578,1407,971.2578,1395,983.2578,1383" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="118" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="816.0996" y="1427"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="826.0996" y="1447.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="826.0996" y="1461.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="826.0996" y="1475.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="826.0996" y="1489.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="826.0996" y="1503.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="826.0996" y="151