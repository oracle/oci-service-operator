xt fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="211.8062" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="306.3779" x="180.4131" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3779" x="190.4131" y="755.7803">Delete path uses DeleteKmsReplicationStatus</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6816" x="190.4131" y="769.7803">with required via GetKmsReplicationStatus or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.7646" x="190.4131" y="783.7803">ListKmsReplicationStatus to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="190.4131" y="797.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="194.0371" y="831"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="204.0371" y="851.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="204.0371" y="865.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="176.8926" y="899"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="186.8926" y="919.7803">Requeue on provisioning, updating, terminating</text><path d="M364.6021,943 L364.6021,1119 L344.6021,1123 L364.6021,1127 L364.6021,1303 A0,0 0 0 0 364.6021,1303 L704.6421,1303 A0,0 0 0 0 704.6421,1303 L704.6421,953 L694.6421,943 L364.6021,943 A0,0 0 0 0 364.6021,943" fill="#FFF7D6