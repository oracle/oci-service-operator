<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="814px" preserveAspectRatio="none" style="width:3566px;height:814px;background:#FCFCFD;" version="1.1" viewBox="0 0 3566 814" width="3566px" zoomAndPan="magnify"><title>State Machine - ocvp/Cluster</title><defs/><g><rect fill="#FCFCFD" height="814" style="stroke:none;stroke-width:1;" width="3566" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="191.3789" x="1680.7435" y="20.7803">State Machine - ocvp/Cluster</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="174" y="671"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="174" x2="438.3643" y1="695" y2="695"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="279.7271" y="686.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="179" y="710.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="179" y="724.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1235.36" y="514"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1240.36" y="537.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2009.32" y="514"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2014.32" y="537.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke: