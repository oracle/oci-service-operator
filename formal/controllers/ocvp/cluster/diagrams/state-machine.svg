="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2982.5" y="701.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="702" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2225.78,49 L2225.78,443.68 L2060.1,522.85 L2225.78,451.68 L2225.78,687 A8,8 0 0 0 2233.78,695 L2570.2614,695 A8,8 0 0 0 2578.2614,687 L2578.2614,51 L2568.2614,41 L2233.78,41 A8,8 0 0 0 2225.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2568.2614,41 L2568.2614,47 A4,4 0 0 0 2572.2614,51 L2578.2614,51 L2568.2614,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2231.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2231.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2231.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2231.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2231.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2231.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2231.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2231.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2231.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="81.6963" x="2231.78" y="182.7803">service: ocvp</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="2231.78" y="196.7803">slug: cluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.8066" x="2231.78" y="210.7803">kind: Cluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2231.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2231.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2231.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2231.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="2231.78" y="280.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="2231.78" y="294.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="2231.78" y="308.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="2231.78" y="322.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="2231.78" y="336.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.623" x="2231.78" y="350.7803">esxi_software_version, freeform_tags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2231.78" y="364.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.9717" x="2231.78" y="378.7803">capacity_reservation_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8125" x="2231.78" y="392.7803">compute_availability_domain, datastores,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="173.1406" x="2231.78" y="406.7803">esxi_hosts_count (+7 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2231.78" y="420.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6475" x="2231.78" y="434.7803">list lookup: oci_ocvp_clusters filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1436" x="2231.78" y="448.7803">compartment_id, display_name, lifecycle_state,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="2231.78" y="462.7803">sddc_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2231.78" y="476.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2231.78" y="490.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="2231.78" y="504.7803">Create or bind only attempts list reuse when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6816" x="2231.78" y="518.7803">spec.displayName is set; otherwise the local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6885" x="2231.78" y="532.7803">runtime wrapper rejects untracked create-or-bind</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="2231.78" y="546.7803">so the controller never guesses from a broad</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.0342" x="2231.78" y="560.7803">ListClusters match.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.9854" x="2231.78" y="574.7803">Create and delete still record</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.9023" x="2231.78" y="588.7803">opc-work-request-id breadcrumbs when OCI returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1162" x="2231.78" y="602.7803">them, but GetCluster and ListClusters lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="2231.78" y="616.7803">rereads remain the authoritative async signal</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5713" x="2231.78" y="630.7803">for reconcile state and finalizer release.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6475" x="2231.78" y="644.7803">Mutable drift is limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6885" x="2231.78" y="658.7803">networkConfiguration, vmwareSoftwareVersion,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2231.78" y="672.7803">esxiSoftwareVersion, and tags; the remaining</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="2231.78" y="686.7803">published spec fields stay create-only drift.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="103" id="ent0006"><path d="M2913.27,761 L2913.27,768.76 L2453.19,752.24 L2913.27,776.76 L2913.27,797 A8,8 0 0 0 2921.27,805 L3186.1587,805 A8,8 0 0 0 3194.1587,797 L3194.1587,763 L3184.1587,753 L2921.27,753 A8,8 0 0 0 2913.27,761" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3184.1587,753 L3184.1587,759 A4,4 0 0 0 3188.1587,763 L3194.1587,763 L3184.1587,753" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2919.27" y="768.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.8887" x="2919.27" y="782.7803">delete observe: GetCluster or ListClusters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2919.27" y="796.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.26,702 C49.58,702 107.16,702 167.74,702" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="173.74,702,164.74,698,168.74,702,164.74,706,173.74,702" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3652" x="57" y="697.7803">CreateCluster</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M438.64,686.05 C529.55,675.01 640.3337,661.5731 710.1837,653.0931" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="716.14,652.37,706.7235,649.4838,711.1764,652.9726,707.6877,657.4255,716.14,652.37" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="469.36" y="660.8403">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="34" id="lnk5"><path d="M839.57,633.58 C953.1,612.19 1187.77,567.79 1205.36,563 C1215.07,560.36 1219.6038,559.0543 1229.3838,555.7043" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1235.06,553.76,1225.2494,552.8923,1230.3298,555.3803,1227.8419,560.4606,1235.06,553.76" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="995.86" y="544.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="1047.6217" y="558.7803">ACTIVE</text></g><!--link resolve_by_lookup to retryable--><g class="link" data-entity-1="ent0007" data-entity-2="ent0005" data-link-type="dependency" data-source-line="35" id="lnk6"><path d="M839.63,647.87 C947.21,652.95 1161.8067,663.0973 1246.5967,667.0973" fill="none" id="resolve_by_lookup-to-retryable" style="stroke:#0F172A;s