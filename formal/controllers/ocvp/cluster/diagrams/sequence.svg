acing" textLength="48.2549" x="747" y="2115.7803">sddc_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="747" y="2129.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="747" y="2143.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="747" y="2157.7803">Create or bind only attempts list reuse when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6816" x="747" y="2171.7803">spec.displayName is set; otherwise the local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6885" x="747" y="2185.7803">runtime wrapper rejects untracked create-or-bind</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="747" y="2199.7803">so the controller never guesses from a broad</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.0342" x="747" y="2213.7803">ListClusters match.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.9854" x="747" y="2227.7803">Create and delete still record</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.9023" x="747" y="2241.7803">opc-work-request-id breadcrumbs when OCI returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1162" x="747" y="2255.7803">them, but GetCluster and ListClusters lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="747" y="2269.7803">rereads remain the authoritative async signal</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5713" x="747" y="2283.7803">for reconcile state and finalizer release.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6475" x="747" y="2297.7803">Mutable drift is limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6885" x="747" y="2311.7803">networkConfiguration, vmwareSoftwareVersion,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="747" y="2325.7803">esxiSoftwareVersion, and tags; the remaining</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="747" y="2339.7803">published spec fields stay create-only drift.</text><?plantuml-src pLXPZnit4dxdhoXaNsoiUiRZEp8S81bxlK76ySApsIS10jNDbXYpoLwIBLa9yjzJnQCF7Ow2l0H-c1cokiwllYhQVPAwvPOtu3QyCZkfrr1pvGHp_SsAbv_MrdIwkZNAMFX7NUA_QYHHYPftol_BQFyZRmJyMwYjyBBafsNkvIy2RfwEBhcrPfUqFwflNZmUVwcD5zyT-L3NBwhdXrB6Li8cYTNJPqyUVNqWGURJ_PCdJs-UFHlT1_MbiLfOk7dElFHAmBtuVoTqAQ00KsxRwrlLEIyisyXAG6sCNvdF8nqkY__A07ZfZPtub6BBLuT1YSVYPVq8hr4Pfa-sNFlJtuy5Bj4oYhlNeMGjxgIUPkthf_p9wYNUaifsSbMkgcVYfhywgiZBcjSb-us5sE27RYKmbLuuDl83Rj4HQvJ258wFl-DEV1IbqQKylFhgm_s77-w5tSfIlEUQhuNz2hY3wT7aam-ttpEgDfWjrdAgUtRm7UBUYWgiS4PrNXezJqVNbUHhhAcxZdyNWqYHotpbjkkieH8AeptxTRoUVYbq5L39XcH1ySqeHtCG6kKx0Gbtw6SAX0rIzCqqo3dqlp-mPD7vXsmgGXzDKp4Vb6CmJb9G6UwXv71dp2VymT7jbTGLuyg3jmW4bCIIYy-jmXA4_0FsXyOMsWDNLl1gZxVIUSUcDiaBb9x3E-6pBO7qqwljrKW7ZNGE2UgSYZlKdtIu1xLKz7E-qALf21iDwbdAQWQLTAtY-wL6ffejD7L1kI-LM3hFlPY1gweI1H-6wApe75zXGYWa0a1diRdH5omRjZ-Y_vmtjnYr5pacPKmBPJY25ijEF7lxyUst__t-ntSp-Ea_Ry9lboG7BOO4dVRipoVxH0GduDHYBb5ZR9CjrcLIOgc1ajUve8xo5j4E2NkYIW1w4uxFkHLlisTdXD2dMjecMzXAFWe7KRZGOnp4n2VPdFWtR-_UNfPkGlL4NOuFyS8r1eJtjTHSuKIZtiHJ5-2nKeRWUqbghV0S4vXy320C7ORdTXzhdUu8oVWB4X2ObKFDbng8RWsEyffYEz8QmPK1HXMEtc0ymHc2ssK68sVjDhB7PuCnEWJAGX_3VZPK95XMSfiJGQgGY1mwBrHLy1rowK9NLjOUn9QhZWV74xh2yGQJfuWcXWamz