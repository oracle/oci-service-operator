ent_id, display_name, lifecycle_state,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="703.5972" y="2287.2803">sddc_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="703.5972" y="2301.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="703.5972" y="2315.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="703.5972" y="2329.2803">Create or bind only attempts list reuse when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6816" x="703.5972" y="2343.2803">spec.displayName is set; otherwise the local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6885" x="703.5972" y="2357.2803">runtime wrapper rejects untracked create-or-bind</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="703.5972" y="2371.2803">so the controller never guesses from a broad</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.0342" x="703.5972" y="2385.2803">ListClusters match.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.9854" x="703.5972" y="2399.2803">Create and delete still record</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.9023" x="703.5972" y="2413.2803">opc-work-request-id breadcrumbs when OCI returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1162" x="703.5972" y="2427.2803">them, but GetCluster and ListClusters lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthA