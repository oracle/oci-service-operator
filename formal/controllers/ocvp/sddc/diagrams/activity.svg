l="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="703.5972" y="1993.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="81.6963" x="703.5972" y="2007.7803">service: ocvp</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.0342" x="703.5972" y="2021.7803">slug: sddc</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="65.3721" x="703.5972" y="2035.7803">kind: Sddc</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="703.5972" y="2049.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="703.5972" y="2063.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="703.5972" y="2077.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="703.5972" y="2091.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="703.5972" y="2105.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="703.5972" y="2119.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="703.5972" y="2133.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="703.5972" y="2147.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="703.5972" y="2161.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.623" x="703.5972" y="2175.7803">esxi_software_version, freeform_tags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="703.5972" y="2189.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="703.5972" y="2203.7803">compartment_id, hcx_mode, initial_configuration,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.082" x="703.5972" y="2217.7803">is_single_host_sddc</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="703.5972" y="2231.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.9854" x="703.5972" y="2245.7803">list lookup: oci_ocvp_sddcs filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2539" x="703.5972" y="2259.7803">compartment_id, display_name, lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="703.5972" y="2273.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="703.5972" y="2287.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="703.5972" y="2301.7803">Create or bind only attempts list reuse when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6816" x="703.5972" y="2315.7803">spec.displayName is set; otherwise the local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6885" x="703.5972" y="2329.7803">runtime wrapper rejects untracked create-or-bind</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="703.5972" y="2343.7803">so the controller never guesses from a broad</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5996" x="703.5972" y="2357.7803">ListSddcs match.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.9854" x="703.5972" y="2371.7803">Create and delete still record</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.9023" x="703.5972" y="2385.7803">opc-work-request-id breadcrumbs when OCI returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2471" x="703.5972" y="2399.7803">them, but GetSddc and ListSddcs lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="703.5972" y="2413.7803">rereads remain the authoritative async signal</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5713" x="703.5972" y="2427.7803">for reconcile state and finalizer release.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6475" x="703.5972" y="2441.7803">Mutable drift is limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0059" x="703.5972" y="2455.7803">vmwareSoftwareVersion, esxiSoftwareVersion,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9365" x="703.5972" y="