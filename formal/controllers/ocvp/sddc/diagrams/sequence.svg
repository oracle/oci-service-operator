 font-size="14" lengthAdjust="spacing" textLength="274.6816" x="735" y="2129.7803">spec.displayName is set; otherwise the local</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6885" x="735" y="2143.7803">runtime wrapper rejects untracked create-or-bind</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="735" y="2157.7803">so the controller never guesses from a broad</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5996" x="735" y="2171.7803">ListSddcs match.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.9854" x="735" y="2185.7803">Create and delete still record</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.9023" x="735" y="2199.7803">opc-work-request-id breadcrumbs when OCI returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2471" x="735" y="2213.7803">them, but GetSddc and ListSddcs lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="735" y="2227.7803">rereads remain the authoritative async signal</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5713" x="735" y="2241.7803">for reconcile state and finalizer release.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6475" x="735" y="2255.7803">Mutable drift is limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0059" x="735" y="2269.7803">vmwareSoftwareVersion, esxiSoftwareVersion,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9365" x="735" y="2283.7803">sshAuthorizedKeys, and tags; the remaining</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="735" y="2297.7803">published spec fields stay create-only drift.</text><?plantuml-src fLXPZnGt47xthoWbBw1CxxAmN8E810iXY0KYDkHffP6dsptjuBOxjdk68Sf_JvNjlkQ0HOW7fdtK-TLNvNMVf6wuvJMuYXTc8_KAIgwSOAxVMVByqygQLXSNHXaBFvSv_Yj69mfHybRvtupsxtWju7UXriBBd1y-SoM_23Wx7sroQyqcIRzJdZsyExwfZHVFzsmeouV5WzrJnXR2fXFBy_ltxZpUEK7gq_wzU-Tdz--FzeFut5WjB9mzO5vw9U1A_DCAdGl8mEJhvlIgA79MoK90QOnVciyZ0Qux-oy3uBatTc9GSgpRslL8t1MFoZkuZS8mThBXsX--Fpvm4oaZftiPIfRYKkffo1wVytlBHxXB8fl9LhuixekpVcil7OzANkRiFnPyWpVjKc0SlN1iP0TSe27MA2NiPFavT-A3o8tEvUxMJ--lth-v4dOjS_6MQxuIzYVW3gPBaollBrupIZMODIPoAdksSmz1RqK1LZYZMY-DdgUbqqBo5URKdSRlR3YITMa-SUjL9w4G2hqzUZjkJsyANGH8iY5OaFqwYj4SXCRpBO8GGOT69Y_OS8GkJ3sSG__xbYLrpjzcqoDqQHg7-I0SFN6IF0f03yc6IsC-uNyS3LvANJ2kF7YB4C1Zc6pnkL4O_11vmChGM3bRuCeANcnnLphls5GXcO2dv_1A-A188ENqCdiPqa4jdKDIEdR_4eMJ07UhbCeBw-QGcvhWKAECXIncrxgGhb5ykz18JRC0_7oRAx5mddjnEtXZHUlu4hqd5oZLhSKoHlMO82nqnFan0oxGIo-23ygO1lBm3GrcbxZquiFBPt--VlTg1X__U15-VJCIg2j4ux1DtndM0uOVW4o3WKDniGxMc8599gK62bNhWZWALuGp97o98k7aHLW-PbFS3MOTEO46bTBMdVYrv9qZ2BDhtUSwHZgTwYBzukNbonl4bm0x2EeSGZXmZHxWPYarLzYWBBg7gox0OAaC8VCciRJ2SunOiYvWB5GEhjjjp6pQ8w3Y3wGKC4k7ac-g89er6CfBHFw-r0Yb3awKqcWD-XEC8N3TJ65aeKqbUpJMwAD3P5phVOJFXbm4pKgkkq2GA6GNXyOBLMHyW-o81MfbwK6ikMfvC3p1AInN63n5331m-jJc6H7-LTiqnY8KeMqAqkHQM_9Sp6dkm3PNB3nVkHcRSe5md-N2cTAJ7OirLO7HCrPQ8KfZwt07Rlro5sfZaIa-YBz5xc59cmBgbboQ8prWNMPQRA9JZkqG45JvvqLj2Z5ZKailkLe4eAzQ6xp5PRSWZaDAgepp2qSbaZZt6AknhvBQq5jCuqS68hn9DRArfvA9SKSu50YStDyKVkCW41f283gyaKBN9uEsYCA-hIbLwREcKLlu678OorNZDwhgH5th6ELfNc4IZcjzEB4mIUor7Z8R22KXfoEKxoBiumt2jXegeP1YeSASejhO8fxwiYFrazX4FgJF9zSwcZ8-4aCoEXBBVNma4cntv9WzF4IunF71R394cCEkwyLgszj5_IKBb99jhFGZSmxi92iISwSvvwPj9tQLfuaKg5NtdFOqqcZMOWjIMHBV3r91mUvGipCxTQo5xDfOivQ404phBAQPVbrhzAH6ZRwd5ojNbGTJmk4vCOrrFpOaVbFAeM7nocFn8tvD3RuIi3Ut3cyFn3V3HBy8erfm6DtbQNfe-2huIyM0lCfYoZDZimH-gYFky-g4NV8jHdMahEjedQ9D9VJGX1WcZEO5ajntef2