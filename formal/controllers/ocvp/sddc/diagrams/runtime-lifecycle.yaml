schemaVersion: 1
surface: repo-authored-semantics
service: ocvp
slug: sddc
kind: Sddc
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
repoAuthored:
  hooks:
    create:
      - helper: tfresource.CreateResource
    update:
      - helper: tfresource.UpdateResource
    delete:
      - helper: tfresource.DeleteResource
  followUp:
    create: read-after-write
    update: read-after-write
    delete: confirm-delete
notes:
  - Create or bind only attempts list reuse when spec.displayName is set;
    otherwise the local runtime wrapper rejects untracked create-or-bind so the
    controller never guesses from a broad ListSddcs match.
  - Create and delete still record opc-work-request-id breadcrumbs when OCI
    returns them, but GetSddc and ListSddcs lifecycle rereads remain the
    authoritative async signal for reconcile state and finalizer release.
  - Mutable drift is limited to displayName, vmwareSoftwareVersion,
    esxiSoftwareVersion, sshAuthorizedKeys, and tags; the remaining published
    spec fields stay create-only drift.
