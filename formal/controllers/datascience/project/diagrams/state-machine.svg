<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="862px" preserveAspectRatio="none" style="width:3549px;height:862px;background:#FCFCFD;" version="1.1" viewBox="0 0 3549 862" width="3549px" zoomAndPan="magnify"><title>State Machine - datascience/Project</title><defs/><g><rect fill="#FCFCFD" height="862" style="stroke:none;stroke-width:1;" width="3549" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="238.0889" x="1648.6185" y="20.7803">State Machine - datascience/Project</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="173" y="699"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="173" x2="437.3643" y1="723" y2="723"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="278.7271" y="714.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="178" y="738.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="178" y="752.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1234.36" y="549"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1239.36" y="572.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1993.32" y="549"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1998.32" y="572.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1251.88" y="677"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1256.88" y="700.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1261.84" y="796"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1267.7746" y="819.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="715.44" y="653"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="720.44" y="676.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1568.56" y="639"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1573.56" y="662.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1601.23" y="478"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1606.23" y="501.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="2335.1" y="758"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2340.1" y="781.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3460.61" y="706"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3465.61" y="729.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="2960.72" y="706"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2965.72" y="729.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="32" id="ent0002"><ellipse cx="16" cy="730" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2209.78,49 L2209.78,467.76 L2044.1,556.44 L2209.78,475.76 L2209.78,715 A8,8 0 0 0 2217.78,723 L2554.2614,723 A8,8 0 0 0 2562.2614,715 L2562.2614,51 L2552.2614,41 L2217.78,41 A8,8 0 0 0 2209.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2552.2614,41 L2552.2614,47 A4,4 0 0 0 2556.2614,51 L2562.2614,51 L2552.2614,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2215.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2215.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2215.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2215.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2215.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2215.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2215.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2215.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2215.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.8408" x="2215.78" y="182.7803">service: datascience</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="2215.78" y="196.7803">slug: project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.0342" x="2215.78" y="210.7803">kind: Project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2215.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2215.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2215.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4131" x="2215.78" y="266.7803">requeue: terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2215.78" y="280.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="2215.78" y="294.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="2215.78" y="308.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="2215.78" y="322.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="2215.78" y="336.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5371" x="2215.78" y="350.7803">display_name, freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2215.78" y="364.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="2215.78" y="378.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2215.78" y="392.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5781" x="2215.78" y="406.7803">list lookup: oci_datascience_projects filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.7813" x="2215.78" y="420.7803">compartment_id, created_by, display_name, id (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2215.78" y="434.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2215.78" y="448.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2215.78" y="462.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="2215.78" y="476.7803">Generated runtime uses read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.585" x="2215.78" y="490.7803">follow-up for create and update plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1504" x="2215.78" y="504.7803">confirm-delete for delete; successful create and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3301" x="2215.78" y="518.7803">update settle directly on `ACTIVE`, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.7852" x="2215.78" y="532.7803">`DELETING` keeps reconcile in the terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2061" x="2215.78" y="546.7803">bucket until `DELETED` or NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.668" x="2215.78" y="560.7803">Pre-create lookup queries `ListProjects` with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2539" x="2215.78" y="574.7803">`compartmentId`, `displayName`, and an optional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5576" x="2215.78" y="588.7803">tracked `id`; provider-exposed `lifecycleState`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.4893" x="2215.78" y="602.7803">`createdBy`, `sortBy`, `sortOrder`, `limit`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5645" x="2215.78" y="616.7803">`page` remain imported facts rather than</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.0889" x="2215.78" y="630.7803">repo-authored match rules.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6201" x="2215.78" y="644.7803">Only `displayName`, `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="2215.78" y="658.7803">`freeformTags`, and `definedTags` reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9023" x="2215.78" y="672.7803">place. `compartmentId` remains replacement-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.7227" x="2215.78" y="686.7803">drift even though the provider also exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2676" x="2215.78" y="700.7803">`ChangeProjectCompartment`, and the runtime has</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="2215.78" y="714.7803">no secret side effects.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="105" id="ent0006"><path d="M2897.27,789 L2897.27,796.78 L2437.4,780.25 L2897.27,804.78 L2897.27,825 A8,8 0 0 0 2905.27,833 L3168.6138,833 A8,8 0 0 0 3176.6138,825 L3176.6138,791 L3166.6138,781 L2905.27,781 A8,8 0 0 0 2897.27,789" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3166.6138,781 L3166.6138,787 A4,4 0 0 0 3170.6138,791 L3176.6138,791 L3166.6138,781" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2903.27" y="796.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3438" x="2903.27" y="810.7803">delete observe: GetProject or ListProjects</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2903.27" y="824.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.23,730 C49.42,730 106.57,730 166.83,730" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="172.83,730,163.83,726,167.83,730,163.83,734,172.83,730" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5928" x="57" y="725.7803">CreateProject</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M437.64,714.05 C528.55,703.01 639.3337,689.5731 709.1837,681.0931" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="715.14,680.37,705.7235,677.4838,710.1764,680.9726,706.6877,685.4255,715.14,680.37" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="468.36" y="688.8403">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="34" id="lnk5"><path d="M838.59,665.59 C921.94,654.68 1076.06,631.86 1204.36,598 C1214.09,595.43 1218.632,594.1591 1228.412,590.8191" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1234.09,588.88,1224.2802,588.0033,1229.3583,590.4959,1226.8657,595.574,1234.09,588.88" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="994.86" y="579.7803">lookup or create reaches<