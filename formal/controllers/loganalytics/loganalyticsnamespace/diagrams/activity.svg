"315.9229" x="192.7715" y="241.7803">Resolve OCI state via GetLogAnalyticsNamespace</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="192.7715" y="255.7803">with ListLogAnalyticsNamespace fallback</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="192.1128" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.8965" x="202.1128" y="309.7803">Use</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.502" x="202.1128" y="323.7803">scaffold_loganalytics_loganalyticsnamespace</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="202.1128" y="337.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="202.1128" y="351.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="297.0435,385,404.4224,385,416.4224,397,404.4224,409,297.0435,409,285.0435,397,297.0435,385" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="297.0435" y="400.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="263.2573" y="393.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="416.4224" y="393.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="331.2949" x="11" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2949" x="21" y="439.7803">Update path calls UpdateLogAnalyticsNamespace</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="43.2964" y="473"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.7021" x="53.2964" y="493.7803">Guard mutable fields display_name and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3096" x="53.2964" y="507.7803">force-new fields compartment_id</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="325.0469" x="362.2949" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0469" x="372.2949" y="439.7803">Create path calls CreateLogAnalyticsNamespace</text><polygon fill="#E2E8F0" points="350.7329,527,362.7329,539,350.7329,551,338.7329,539,350.7329,527" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="104" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="183.5747" y="571"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="193.5747" y="591.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="193.5747" y="605.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="193.5747" y="619.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="193.5747" y="633.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="193.5747" y="647.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="193.5747" y="661.7803">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="263.5918" x="218.937" y="695"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="228.937" y="715.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="323.5088" x="188.9785" y="749"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5088" x="198.9785" y="769.7803">Delete path uses DeleteLogAnalyticsNamespace</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8125" x="198.9785" y="783.7803">with required via GetLogAnalyticsNamespace or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.8955" x="198.9785" y="797.7803">ListLogAnalyticsNamespace to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="198.9785" y="811.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="211.168" y="845"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="221.168" y="865.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="221.168" y="879.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="194.0234" y="913"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="204.0234" y="933.7803">Requeue on provisioning, updating, terminating</text><path d="M381.7329,957 L381.7329,1133 L361.7329,113