 lengthAdjust="spacing" textLength="189.8477" x="361.2847" y="1098.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.8066" x="361.2847" y="1112.7803">service: psql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="155.6611" x="361.2847" y="1126.7803">slug: defaultconfiguration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.0957" x="361.2847" y="1140.7803">kind: DefaultConfiguration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="361.2847" y="1154.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="361.2847" y="1168.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="361.2847" y="1182.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="361.2847" y="1196.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="361.2847" y="1210.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="361.2847" y="1224.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="361.2847" y="1238.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="361.2847" y="1252.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="361.2847" y="1266.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="361.2847" y="1280.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="361.2847" y="1294.7803">promotion.</text><ellipse cx="324.2847" cy="1123" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="324.2847" cy="1123" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="324.2847" x2="324.2847" y1="65" y2="85"/><polygon fill="#0F172A" points="320.2847,75,324.2847,85,328.2847,75,324.2847,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="324.2847" x2="324.2847" y1="133" y2="153"/><polygon fill="#0F172A" points="320.2847,143,324.2847,153,328.2847,143,324.2847,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="324.2847" x2="324.2847" y1="201" y2="221"/><polygon fill="#0F172A" points="320.2847,211,324.2847,221,328.2847,211,324.2847,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="324.2847" x2="324.2847" y1="269" y2="289"/><polygon fill="#0F172A" points="320.2847,279,324.2847,289,328.2847,279,324.2847,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="163.4233" x2="163.4233" y1="439" y2="459"/><polygon fill="#0F172A" points="159.4233,449,163.4233,459,167.4233,449,163.4233,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="258.5952" x2="163.4233" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="163.4233" x2="163.4233" y1="383" y2="405"/><polygon fill="#0F172A" points="159.4233,395,163.4233,405,167.4