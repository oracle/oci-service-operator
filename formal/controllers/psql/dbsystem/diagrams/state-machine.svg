lengthAdjust="spacing" textLength="261.4678" x="436.97" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="436.97" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="436.97" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="436.97" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="436.97" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="436.97" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.8066" x="436.97" y="404.7803">service: psql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="436.97" y="418.7803">slug: dbsystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.0342" x="436.97" y="432.7803">kind: DbSystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="436.97" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="436.97" y="460.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="436.97" y="474.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="436.97" y="488.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="436.97" y="502.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="436.97" y="516.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2676" x="436.97" y="530.7803">mutable/forceNew: apply_config, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="436.97" y="544.7803">config_id, credentials.password_details.password</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.7471" x="436.97" y="558.7803">(+29 more) / credentials, credentials.username,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.416" x="436.97" y="572.7803">db_version, instances_details (+13 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8057" x="436.97" y="586.7803">open gaps: bind-versus-create, list-lookup,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8545" x="436.97" y="600.7803">mutation-policy, waiter-work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="436.97" y="614.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="436.97" y="628.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="436.97" y="642.7803">promotion.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M260.21,61.29 C260.21,77.87 260.21,107.03 260.21,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="260.21,136.85,264.21,127.85,260.21,131.85,256.21,127.85,260.21,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5928" x="261.21" y="102.7803">CreateDbSystem</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk4"><path d="M260.21,187.48 C260.21,242.77 260.21,370.77 260.21,425.8" fill="none" id="provisioning-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="260.21,431.8,264.21,422.8,260.21,426.8,256.21,422.8,260.21,431.8" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.6963" x="261.21" y="228.7803">ACTIVE, NEEDS_ATTENTION</text></g><!--link active to updating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk5"><path d="M215.02,482.5 C155.76,517.52 54.5,588.08 13.21,681 C7.79,693.18 6,699.78 13.21,711 C30.92,738.58 60.7783,750.8487 88.2983,757.5087" fill="none" id="active-to-updating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="94.13,758.92,86.3234,752.9153,89.2703,757.7439,84.4416,760.6908,94.13,758.92" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3096" x="14.21" y="692.7803">ChangeDbSystemCompartment,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength=