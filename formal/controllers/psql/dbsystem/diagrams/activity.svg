stroke:#0F172A;stroke-width:0.5;" width="293.5537" x="850.7441" y="1509.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="860.7441" y="1530.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="860.7441" y="1544.2803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="860.7441" y="1558.2803">update=tfresource.UpdateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6475" x="860.7441" y="1572.2803">tfresource.WaitForUpdatedState;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="860.7441" y="1586.2803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="860.7441" y="1600.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="357.6475" x="818.6973" y="1633.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="337.6475" x="828.6973" y="1654.2803">Return success for the ACTIVE, NEEDS_ATTENTION</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8135" x="828.6973" y="1668.2803">success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="857.9561" y="1701.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="867.9561" y="1722.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="867.9561" y="1736.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="840.8115" y="1769.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="850.8115" y="1790.2803">Requeue on provisioning, updating, terminating</text><path d="M699.6326,1825.5 L699.6326,2239.5 L679.6326,2243.5 L699.6326,2247.5 L699.6326,2661.5 A0,0 0 0 0 699.6326,2661.5 L1069.949,2661.5 A0,0 0 0 0 1069.949,2661.5 L1069.949,1835.5 L1059.949,1825.5 L699.6326,1825.5 A0,0 0 0 0 699.6326,1825.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1059.949,1825.5 L1059.949,1835.5 L1069.949,1835.5 L1059.949,1825.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="705.6326" y="1841.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="705.6326" y="1855.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="705.6326" y="1869.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="705.6326" y="1883.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="705.6326" y="1897.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="705.6326" y="1911.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="705.6326" y="1925.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="705.6326" y="1939.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="705.6326" y="1953.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="705.6326" y="1967.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="705.6326" y="1981.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.8066" x="705.6326" y="1995.2803">service: psql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="705.6326" y="2009.2803">slug: dbsystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.0342" x="705.6326" y="2023.2803">kind: DbSystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="705.6326" y="2037.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="705.6326" y="2051.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="705.6326" y="2065.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="705.6326" y="2079.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="705.6326" y="2093.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="705.6326" y="2107.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3857" x="705.6326" y="2121.2803">supported drift:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.7988" x="705.6326" y="2135.2803">dbConfigurationParams.applyConfig,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7295" x="705.6326" y="2149.2803">dbConfigurationParams.configId, definedTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.665" x="705.6326" y="2163.2803">description (+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="705.6326" y="2177.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3643" x="705.6326" y="2191.2803">compartmentId, dbVersion, instanceCount,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.8027" x="705.6326" y="2205.2803">instanceMemorySizeInGBs (+7 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7168" x="705.6326" y="2219.2803">create-only fields:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8613" x="705.6326" y="2233.2803">adminPassword.secret.secretName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="705.6326" y="2247.2803">adminUsername.secret.secretName, configId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.665" x="705.6326" y="2261.2803">credentials (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2197" x="705.6326" y="2275.2803">list lookup: oci_psql_db_systems filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2197" x="705.6326" y="2289.2803">compartmentId, displayName; tracked OCI ID via</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="321.3438" x="705.6326" y="2303.2803">GetDbSystem wins; otherwise exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5713" x="705.6326" y="2317.2803">plus displayName unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0273" x="705.6326" y="2331.2803">CREATING, UPDATING, INACTIVE, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7578" x="705.6326" y="2345.2803">NEEDS_ATTENTION; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="705.6326" y="2359.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="705.6326" y="2373.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7783" x="705.6326" y="2387.2803">Handwritten DbSystem bind first checks the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3369" x="705.6326" y="2401.2803">tracked OCID with GetDbSystem, then searches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5576" x="705.6326" y="2415.2803">ListDbSystems for an exact compartment plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9365" x="705.6326" y="2429.2803">displayName match, rereads a single candidate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="705.6326" y="2443.2803">through GetDbSystem, and fails on ambiguous</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4609" x="705.6326" y="2457.2803">duplicates instead of guessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5508" x="705.6326" y="2471.2803">Create resolves inline credentials or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0127" x="705.6326" y="2485.2803">same-namespace admin secret refs, stamps only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8262" x="705.6326" y="2499.2803">non-empty secret refs into status, and does not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.875" x="705.6326" y="2513.2803">write follow-up Kubernetes secrets.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="705.6326" y="2527.2803">Create and update do not poll work requests</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6953" x="705.6326" y="2541.2803">directly; provider-backed completion is modeled</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5713" x="705.6326" y="2555.2803">through GetDbSystem lifecycle projection with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="324.4609" x="705.6326" y="2569.2803">one-minute requeues while OCI reports CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.3584" x="705.6326" y="2583.2803">UPDATING, or DELETING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="349.3164" x="705.6326" y="2597.2803">ACTIVE, INACTIVE, and NEEDS_ATTENTION settle as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0537" x="705.6326" y="2611.2803">Active unless the reconcile is already in update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.833" x="705.6326" y="2625.2803">or delete follow-up, and delete retains the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4268" x="705.6326" y="2639.2803">finalizer until GetDbSystem or ListDbSystems</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0332" x="705.6326" y="2653.2803">confirms the DbSystem is deleted or not found.</text><ellipse cx="668.6326" cy="2243.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="668.6326" cy="2243.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="668.6326" x2="668.6326" y1="157" y2="177"/><polygon fill="#0F172A" points="664.6326,167,668.6326,177,672.6326,167,668.6326,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="833.1597" x2="833.1597" y1="341" y2="361"/><polygon fill="#0F172A" points="829.1597,351,833.1597,361,837.1597,351,833.1597,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="833.1597" x2="833.1597" y1="409" y2="429"/><polygon fill="#0F172A" points="829.1597,419,833.1597,429,837.1597,419,833.1597,423" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width