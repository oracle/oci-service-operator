text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7578" x="768" y="2297.7803">NEEDS_ATTENTION; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="768" y="2311.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="768" y="2325.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7783" x="768" y="2339.7803">Handwritten DbSystem bind first checks the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3369" x="768" y="2353.7803">tracked OCID with GetDbSystem, then searches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5576" x="768" y="2367.7803">ListDbSystems for an exact compartment plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9365" x="768" y="2381.7803">displayName match, rereads a single candidate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="768" y="2395.7803">through GetDbSystem, and fails on ambiguous</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4609" x="768" y="2409.7803">duplicates instead of guessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5508" x="768" y="2423.7803">Create resolves inline credentials or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0127" x="768" y="2437.7803">same-namespace admin secret refs, stamps only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8262" x="768" y="2451.7803">non-empty secret refs into status, and does not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.875" x="768" y="2465.7803">write follow-up Kubernetes secrets.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="768" y="2479.7803">Create and update do not poll work requests</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6953" x="768" y="2493.7803">directly; provider-backed completion is modeled</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5713" x="768" y="2507.7803">through GetDbSystem lifecycle projection with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="324.4609" x="768" y="2521.7803">one-minute requeues while OCI reports CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.3584" x="768" y="2535.7803">UPDATING, or DELETING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="349.3164" x="768" y="2549.7803">ACTIVE, INACTIVE, and NEEDS_ATTENTION settle as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0537" x="768" y="2563.7803">Active unless the reconcile is already in update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.833" x="768" y="2577.7803">or delete follow-up, and delete retains the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4268" x="768" y="2591.7803">finalizer until GetDbSystem or ListDbSystems</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0332" x="768" y="2605.7803">confirms the DbSystem is deleted or not found.</text><?p