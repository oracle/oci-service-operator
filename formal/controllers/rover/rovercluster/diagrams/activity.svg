307.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="879.8591" y="1323.2803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="846.073" y="1316.2803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1112.7146" y="1316.2803">no</text><rect fill="#F8FAFC" height="90" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4053" x="695.4814" y="1341.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3369" x="705.4814" y="1362.2803">Apply ChangeRoverClusterCompartment,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9023" x="705.4814" y="1376.2803">UpdateRoverCluster only for mutable fields</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.5029" x="705.4814" y="1390.2803">clusterSize, clusterWorkloads,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4053" x="705.4814" y="1404.2803">customerShippingAddress, dataValidationCode</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.8584" x="705.4814" y="1418.2803">(+16 more)</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1028.8867" y="1341.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1038.8867" y="1362.2803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="990.2869,1437.5,1002.2869,1449.5,990.2869,1461.5,978.2869,1449.5,990.2869,1437.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="90" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.5537" x="843.51" y="1481.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="853.51" y="1502.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="853.51" y="1516.2803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="853.51" y="1530.2803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="853.51" y="1544.2803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="853.51" y="1558.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="838.677" y="1591.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="848.677" y="1612.2803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="850.7219" y="1645.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="860.7219" y="1666.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="860.7219" y="1680.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="833.5774" y="1713.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="843.5774" y="1734.2803">Requeue on provisioning, updating, terminating</text><path d="M696.0155,1769.5 L696.0155,2218.5 L676.0155,2222.5 L696.0155,2226.5 L696.0155,2675.5 A0,0 0 0 0 696.0155,2675.5 L1054.7382,2675.5 A0,0 0 0 0 1054.7382,2675.5 L1054.7382,1779.5 L1044.7382,1769.5 L696.0155,1769.5 A0,0 0 0 0 696.0155,1769.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1044.7382,1769.5 L1044.7382,1779.5 L1054.7382,1779.5 L1044.7382,1769.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="702.0155" y="1785.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="702.0155" y="1799.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="702.0155" y="1813.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="702.0155" y="1827.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="702.0155" y="1841.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="702.0155" y="1855.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="702.0155" y="1869.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="702.0155" y="1883.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="702.0155" y="1897.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="702.0155" y="1911.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="702.0155" y="1925.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0205" x="702.0155" y="1939.2803">service: rover</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5928" x="702.0155" y="1953.2803">slug: rovercluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="115.1514" x="702.0155" y="1967.2803">kind: RoverCluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="702.0155" y="1981.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="702.0155" y="1995.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="702.0155" y="2009.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="702.0155" y="2023.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="702.0155" y="2037.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="702.0155" y="2051.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7783" x="702.0155" y="2065.2803">supported drift: clusterSize, clusterWorkloads,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.7051" x="702.0155" y="2079.2803">customerShippingAddress, dataValidationCode (+16</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="702.0155" y="2093.2803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="702.0155" y="2107.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.875" x="702.0155" y="2121.2803">clusterType, compartmentId, masterKeyId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="702.0155" y="2135.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.6543" x="702.0155" y="2149.2803">list lookup: oci_rover_rover_clusters filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4541" x="702.0155" y="2163.2803">clusterType, compartmentId, displayName; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.5781" x="702.0155" y="2177.2803">compartmentId plus displayName plus clusterType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1162" x="702.0155" y="2191.2803">list filters, then exact clusterSize unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.9375" x="702.0155" y="2205.2803">match in ACTIVE, CREATING, or UPDATING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8613" x="702.0155" y="2219.2803">summaries; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="702.0155" y="2233.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="702.0155" y="2247.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="702.0155" y="2261.2803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="702.0155" y="2275.2803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3779" x="702.0155" y="2289.2803">success, FAILED as terminal without requeue, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.2402" x="702.0155" y="2303.2803">delete confirmation as DELETING until DELETED or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="65.3721" x="702.0155" y="2317.2803">NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.0957" x="702.0155" y="2331.2803">The published runtime removes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="337.7227" x="702.0155" y="2345.2803">ChangeRoverClusterCompartment from the generated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6748" x="702.0155" y="2359.2803">auxiliary surface and never polls Rover work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1025" x="702.0155" y="2373.2803">requests for CRUD because RoverCluster write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2881" x="702.0155" y="2387.2803">responses do not expose opc-work-request-id and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.9961" x="702.0155" y="2401.2803">Rover's service-local work-request enum only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.3926" x="702.0155" y="2415.2803">documents ADD_NODES.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3301" x="702.0155" y="2429.2803">Pre-create lookup lists by compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0195" x="702.0155" y="2443.2803">displayName, and clusterType, then narrows</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.8613" x="702.0155" y="2457.2803">returned summaries in memory with exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="702.0155" y="2471.2803">clusterSize matching before any reuse.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3506" x="702.0155" y="2485.2803">lifecycleState is intentionally omitted from the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5859" x="702.0155" y="2499.2803">list request.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.7783" x="702.0155" y="2513.2803">LifecycleState, LifecycleStateDetails,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.4609" x="702.0155" y="2527.2803">SystemTags, and clusterWorkloads.workRequestId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1572" x="702.0155" y="2541.2803">remain provider-managed request-shape fields.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1436" x="702.0155" y="2555.2803">The reviewed runtime normalizes them out before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.8066" x="702.0155" y="2569.2803">parity or write calls.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="702.0155" y="2583.2803">Required status projection keeps the OCI body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="702.0155" y="2597.2803">surface except excluded credential-like fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8467" x="702.0155" y="2611.2803">and one-time URLs/codes dataValidationCode,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5439" x="702.0155" y="2625.2803">exteriorDoorCode, imageExportPar,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0195" x="702.0155" y="2639.2803">interiorAlarmDisarmCode, returnShippingLabelUri,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3779" x="702.0155" y="2653.2803">superUserPassword, and unlockPassphrase. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.2129" x="702.0155" y="2667.2803">runtime has no secret side effects.</text><ellipse cx="665.0155" cy="2222.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="665.0155" cy="2222.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="665.0155" x2="665.0155" y1="157" y2="177"/><polygon fill="#0F172A" points="661.0155,167,665.0155,177,669.0155,167,665.0155,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.4813" x2="816.4813" y1="341" y2="361"/><polygon fill="#0F172A" points="812.4813,351,816.4813,361,820.4813,351,816.4813,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.4813" x2="816.4813" y1="409" y2="429"/><polygon fill="#0F172A" points="812.4813,419,816.4813,429,820.4813,419,816.4813,423" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="523.5497" x2="513.5497" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="513.5497" x2="513.5497" y1="257" y2="279"/><polygon fill="#0F172A" points="509.5497,269,513.5497,279,517.5497,269,513.5497,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="806.4813" x2="816.4813" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.4813" x2="816.4813" y1="257" y2="279"/><polygon fill="#0F172A" points="812.4813,269,816.4813,279,820.4813,269,816.4813,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="513.5497" x2="513.5497" y1="327" y2="495"/><line style="stroke:#0F172A;stroke-width:1;" x1="513.5497" x2="653.0155" y1="495" y2="495"/><polygon fill="#0F172A" points="643.0155,491,653.0155,495,643.0155,499,647.0155,495" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.4813" x2="816.4813" y1="477" y2="495"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.4813" x2="677.0155" y1="495" y2="495"/><polygon fill="#0F172A" points="687.0155,491,677.0155,495,687.0155,499,683.0155,495" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="665.0155" x2="665.0155" y1="225" y2="245"/><polygon fill="#0F172A" points="661.0155,235,665.0155,245,669.0155,235,665.0155,239" style="stroke:#0F172A;stroke-width:1;"/><lin