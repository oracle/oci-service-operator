ight="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="846"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="866.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="846"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="866.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="880.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,900,351.7441,912,339.7441,924,327.7441,912,339.7441,900" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="982" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="982" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="440" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="392.5713" x="800.0012" y="573"/><path d="M950.8352,573 L950.8352,580 L940.8352,590 L800.0012,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="803.0012" y="584.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="340.5713" x="820.0012" y="656"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5713" x="830.0012" y="676.7803">Request requeue while OCI remains in CREATING,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.1309" x="830.0012" y="690.7803">UPDATING, DELETING</text><ellipse cx="990.2869" cy="750" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="990.2869" cy="750" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="904.0037,607,1076.5701,607,1088.5701,619,1076.5701,631,904.0037,631,892.0037,619,904.0037,607" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="994.2869" y="641.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.5664" x="904.0037" y="622.7803">"OCI state in retryable set?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="843.3289" y="873"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="853.3289" y="893.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.041" x="853.3289" y="907.7803">OCI reaches ACTIVE</text><ellipse cx="990.2869" cy="959" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="990.2869" cy="959" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="869.7659,824,1110.8079,824,1122.8079,836,1110.8079,848,869.7659,848,857.7659,836,869.7659,824" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="994.2869" y="858.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="869.7659" y="839.7803">"OCI state is outside success targets?"</text><rect fill="none" height="736.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="564.4111" x="675.4814" y="1023"/><path d="M841.9014,1023 L841.9014,1030 L831.9014,1040 L675.4814,1040" fill="none" style="stroke:#000