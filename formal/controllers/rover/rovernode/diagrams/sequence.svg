yle="stroke:#B45309;stroke-width:0.5;"/><path d="M1105,1624 L1105,1630 A4,4 0 0 0 1109,1634 L1115,1634 L1105,1624" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="774" y="1639.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="774" y="1653.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="774" y="1667.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="774" y="1681.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="774" y="1695.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="774" y="1709.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="774" y="1723.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="774" y="1737.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="774" y="1751.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="774" y="1765.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="774" y="1779.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="774" y="1793.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="774" y="1807.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="774" y="1821.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0205" x="774" y="1835.7803">service: rover</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.5029" x="774" y="1849.7803">slug: rovernode</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2754" x="774" y="1863.7803">kind: RoverNode</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="774" y="1877.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="774" y="1891.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="774" y="1905.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="774" y="1919.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="774" y="1933.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="774" y="1947.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.9854" x="774" y="1961.7803">supported drift: certCompartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.6611" x="774" y="1975.7803">certKeyAlgorithm, certSignatureAlgorithm,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.582" x="774" y="1989.7803">certificateAuthorityId (+25 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="774" y="2003.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.7373" x="774" y="2017.7803">compartmentId, masterKeyId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="774" y="2031.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5645" x="774" y="2045.7803">list lookup: oci_rover_rover_nodes filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2402" x="774" y="2059.7803">compartmentId, displayName, shape; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3643" x="774" y="2073.7803">compartmentId plus displayName plus shape list</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6953" x="774" y="2087.7803">filters, then exact serialNumber unique match in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.3721" x="774" y="2101.7803">ACTIVE, CREATING, or UPDATING summaries;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="774" y="2115.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="774" y="2129.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="774" y="2143.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="774" y="2157.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="774" y="2171.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3779" x="774" y="2185.7803">success, FAILED as terminal without requeue, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.2402" x="774" y="2199.7803">delete confirmation as DELETING until DELETED or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="65.3721" x="774" y="2213.7803">NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.0957" x="774" y="2227.7803">The published runtime removes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.8467" x="774" y="2241.7803">ChangeRoverNodeCompartment from the generated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6748" x="774" y="2255.7803">auxiliary surface and never polls Rover work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2266" x="774" y="2269.7803">requests for CRUD because RoverNode write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2881" x="774" y="2283.7803">responses do not expose opc-work-request-id and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.9961" x="774" y="2297.7803">Rover's service-local work-request enum only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.3926" x="774" y="2311.7803">documents ADD_NODES.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3301" x="774" y="2325.7803">Pre-create lookup lists by compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8398" x="774" y="2339.7803">displayName, and shape, then narrows returned</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.9648" x="774" y="2353.7803">summaries in memory with exact serialNumber</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0264" x="774" y="2367.7803">matching before any reuse. lifecycleState is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4541" x="774" y="2381.7803">intentionally omitted from the list request.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.7783" x="774" y="2395.7803">LifecycleState, LifecycleStateDetails,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3711" x="774" y="2409.7803">SystemTags, and nodeWorkloads.workRequestId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1572" x="774" y="2423.7803">remain provider-managed request-shape fields.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1436" x="774" y="2437.7803">The reviewed runtime normalizes them out before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.8066" x="774" y="2451.7803">parity or write calls.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="774" y="2465.7803">Required status projection keeps the OCI body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="774" y="2479.7803">surface except excluded credential-like fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8467" x="774" y="2493.7803">and one-time URLs/codes dataValidationCode,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2471" x="774" y="2507.7803">imageExportPar, returnShippingLabelUri,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3779" x="774" y="2521.7803">superUserPassword, and unlockPassphrase. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.2129" x="774" y="2535.7803">runtime has no secret side effects.</text><?plantuml-src hLXjRnkv4VxENq5SFpI7IdPUxt8AKi1dErSZhXDOyVMBWGErovLOSyajoRMi5ltlVOOlgvLi9yPT4S2HoE5mNfvvPYX_eqmdd6YvNudQhfLPyaPeBvaVTXQYkbawsvlws6hh-9-Q2l_gaKGj6z7hyC6QS25QoVyczQqCgX8FoypLloL_yNgqAPopwwpzUVFYnvVZayO6-VCz6vhcn_g7VIdhQkconEBrcrVFVzgJeElp_gjNhr-yUJFQZ-ehwunq_CKFBAYW9P_BV_NIL99FiNyhtU4b_RsmjMGhLKlUM1iMzcwanfSJ_s6SYofOjsDMTgzixVibNygtpNDiGnaYg3fXmiFdnm9FqJ9oVT2XLIFFbTaDt4-lnQl5M-oIocvdgrhKR-IBOUjUKjusegdOVrdqZN_i5nBH3DApaHty68OugxLqEyi_2oylPMLDfVQtlliq__HnBjsjgkJVXH5BwRxZmlFTfPqZduxF62MSKxhsT4_spW7wJjRSIMzr7vGrixnqM2knH4xzOVe-tOfCIveF_EsoQAYbXhUFdaxRkoUbgICmsJPOVFhNKOncN1h8zv8Fo8EbsHMsbQDJksxE-F3vcQCxVVYUxOhGeTrWpBRAuOvNvDOMyZ7j_DpQ6_mdOFf2cPe97NXm00DaaNPvrsca8UQ0eqOCAcd3XNPIr1liAXyysxsLx83qZFyYm_Os2HuQ50-AbEUjyXvCzPYISzmmQF7F6gM3T7vsRIhR4aPQQ3gh9xnMljDYGvGr