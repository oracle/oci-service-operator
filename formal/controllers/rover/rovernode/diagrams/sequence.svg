 updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="774" y="1961.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="774" y="1975.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.9854" x="774" y="1989.7803">supported drift: certCompartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.6611" x="774" y="2003.7803">certKeyAlgorithm, certSignatureAlgorithm,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.582" x="774" y="2017.7803">certificateAuthorityId (+25 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="774" y="2031.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.7373" x="774" y="2045.7803">compartmentId, masterKeyId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="774" y="2059.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5645" x="774" y="2073.7803">list lookup: oci_rover_rover_nodes filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2402" x="774" y="2087.7803">compartmentId, displayName, shape; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3643" x="774" y="2101.7803">compartmentId plus displayName plus shape list</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2471" x="774" y="2115.7803">filters with nodeType fixed to STANDALONE, then</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6748" x="774" y="2129.7803">exact serialNumber unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4199" x="774" y="2143.7803">CREATING, or UPDATING summaries only when the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="774" y="2157.7803">desired serialNumber is non-empty; duplicate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="774" y="2171.7803">matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="774" y="2185.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="774" y="2199.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="774" y="2213.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="774" y="2227.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3779" x="774" y="2241.7803">success, FAILED as terminal without requeue, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.2402" x="774" y="2255.7803">delete confirmation as DELETING until DELETED or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="65.3721" x="774" y="2269.7803">NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.0957" x="774" y="2283.7803">The published runtime removes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.8467" x="774" y="2297.7803">ChangeRoverNodeCompartment from the generated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6748" x="774" y="2311.7803">auxiliary surface and never polls Rover work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2266" x="774" y="2325.7803">requests for CRUD because RoverNode write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2881" x="774" y="2339.7803">responses do not expose opc-work-request-id and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.9961" x="774" y="2353.7803">Rover's service-local work-request enum only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.3926" x="774" y="2367.7803">documents ADD_NODES.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3301" x="774" y="2381.7803">Pre-create lookup lists by compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0674" x="774" y="2395.7803">displayName, and shape with nodeType fixed to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.7852" x="774" y="2409.7803">STANDALONE, then narrows returned summaries in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1025" x="774" y="2423.7803">memory with exact serialNumber matching only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6885" x="774" y="2437.7803">when the desired serialNumber is non-empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3506" x="774" y="2451.7803">lifecycleState is intentionally omitted from the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5859" x="774" y="2465.7803">list request.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.7783" x="774" y="2479.7803">LifecycleState, LifecycleStateDetails,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3711" x="774" y="2493.7803">SystemTags, and nodeWorkloads.workRequestId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1572" x="774" y="2507.7803">remain provider-managed request-shape fields.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1436" x="774" y="2521.7803">The reviewed runtime normalizes them out before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.8066" x="774" y="2535.7803">parity or write calls.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="774" y="2549.7803">Required status projection keeps the OCI body</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="774" y="2563.7803">surface except excluded credential-like fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8467" x="774" y="2577.7803">and one-time URLs/codes dataValidationCode,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2471" x="774" y="2591.7803">imageExportPar, returnShippingLabelUri,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3779" x="774" y="2605.7803">superUserPassword, and unlockPassphrase. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.2129" x="774" y="2619.7803">runtime has no secret side effects.</text><?plantuml-src hLXjR-Eu4VxENq5SFtGFjPDzlTlpOWlaakmrs3IxY9Fhbm07Mg9iDXAfabGSj-X_xpDyaIN7sGHtnG9PInmEv-MPPuPojqgtmeg6kvKepLhf9Qz4xIHp_Sf25BTBQpfT7flQMFwdgi2_SY1HoafqjVzajByGZUH_a_MTzAeG-sNcwj-IltexM1JMcdNI_h9wzUFhuKvjlFpvWGrLzMFvmwwKiQMqIMBnzjsRbp_jID3nQVtDcxUlthqRh0VrXR5QMlxg1-QLhoMVotzrKXUIJx5-9-tX9VszCALaArLANXdZ5-P-eCRb7VzXd8l26pioAxcNbtRzag_b--ebbg4C4LIjq7x__g70SxGCNEzrrAgIvqgF0_VJM_5cyHwhfB8TBHMByfryrIyzIChxIbG5-oyBll7FtK8YcbuwDh237yCGQ-fQsj7hduMJbx8mkb2xIzzzcN_vF9VsJXNoxqABfRJVSU7u-DLeovVZCqO9vvIk7TsJdNs0lfKbjzAPklFAw5bwTLWgiKHEtM5ydcv5fZdD1-vkcJMKieQtZ-wEo-ETKfS1c6mRB3xzwo16Courv3l9U-J1qkGAsyhHhh6RCzx_Vc7fJEU_PsCHsZGEncoh7EuuHMvj8H_Ipi-DkSL_0gOlb2wPg3tt5c20BD8kxziQQGWvuAWHZKhQS55RASeDLfNpZerF9JiWFUE_IByzJOA7UiMz8kLuevm3Kpscv1mdz5hSYqhLNbetkz65QGWZ3JITbHDUAjVMOaEKDI7-Q-NtmHShEoSM200vG2dlBCePvo9HA7ZW_R6JZ-6ZbriFQcDQNeINl4MgYLwFBq-FhiukVdbU271M2CD-ctvFKFTOlmSwBI86dR4exX3_KJALviuBtxcWZc8MiSqJpcIPe78INZzcM5pTslQ86Aogb6to6NTAZ5m2vcxqEESny4a-1_xazFpqkO4d7E-ep9uMjHGQha6YKbhKQ6OMVkEj2o1Pr8O0-vmWM-a5Gfdif8ZAK5LuRpSnxscDa8iV81vk5WwQdtj0D6jhgAXG2m-rHg1bi56kepNm9nX3q7lUWP6hrYlLOxM1ZmwGkT4P-XD-_VKa_Ugp4awkrLqE1Aa2_JWOB-joAjRWq1jTMbLvBkz4tObWUC9PUBr2y6eYXYtpZssUK5kOTsrhB33AkxQaarndAr60jmjfqI97746lFilDKRqqLlbLCmb2SxNKWB-LE-zLXQ77owFEh-ZrvgpaB_xo-XrlZ0MtNCf_oiBpXQpmo9kEt9o1K539KotNqL77TbYg4QWd2nlEIfQODpCQ7ukoXuIMTpJ25oj41jta7irvl96rTUU6RCZ3Yw006G4Bf0FP6gw21KjvjMa9LVS8eZTyVdLqSN9q_kNYTCBzIW9DuH3WL8dweclGsNYd5Q0H3G4OsD7nrTclaDzY0WMLOO6KD8sm2cLdTBq1dAGcpNrB6gbM3WdNKzcqVlE1bnsr7yfhE8i095IzRRIczOEOur2Y5-pmn14HNa1zYVee_7EhR9XN0dt8RIuhEj3rcACbul6dJqgqTDIsYC0niBtSKkK0fPCRVHrmF20lYXcCoOVTw0Wj_X3WQ8gx28-lza0yBdmRuu5uKrrbuirPVNx7Uxp3saxpbQpHdlWAq7QmARJNZxxANV4WTU7q-E56Htk68YbYMv78Y4EHr9pIutFxPcoB7nDvKNnxxlqOwNxQeOVMqzJK-h4m7B0xdUrCWfbTq