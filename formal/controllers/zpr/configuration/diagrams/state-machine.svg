<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="760px" preserveAspectRatio="none" style="width:2015px;height:760px;background:#FCFCFD;" version="1.1" viewBox="0 0 2015 760" width="2015px" zoomAndPan="magnify"><title>State Machine - zpr/Configuration</title><defs/><g><rect fill="#FCFCFD" height="760" style="stroke:none;stroke-width:1;" width="2015" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="223.2275" x="888.2621" y="20.7803">State Machine - zpr/Configuration</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="213" y="474"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="213" x2="477.3643" y1="498" y2="498"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="318.7271" y="489.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="218" y="513.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="218" y="527.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="802.36" y="366"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="807.36" y="389.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1541.32" y="376"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1546.32" y="399.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="819.88" y="485"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="824.88" y="508.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="829.84" y="604"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="835.7746" y="627.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1116.56" y="421"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1121.56" y="444.7803">RejectUnsupportedDrift</text><g class="start_entity" data-qualified-name=".start." data-source-line="27" id="ent0002"><ellipse cx="16" cy="505" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="38" id="ent0003"><path d="M1652.78,49 L1652.78,392 L1592.12,396 L1652.78,400 L1652.78,743 A8,8 0 0 0 1660.78,751 L1998.7517,751 A8,8 0 0 0 2006.7517,743 L2006.7517,51 L1996.7517,41 L1660.78,41 A8,8 0 0 0 1652.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1996.7517,41 L1996.7517,47 A4,4 0 0 0 2000.7517,51 L2006.7517,51 L1996.7517,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="1658.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="1658.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="1658.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="1658.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="1658.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="1658.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="1658.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="1658.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="1658.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5723" x="1658.78" y="182.7803">service: zpr</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.627" x="1658.78" y="196.7803">slug: configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7373" x="1658.78" y="210.7803">kind: Configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="1658.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="1658.78" y="238.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="1658.78" y="252.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="1658.78" y="266.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2959" x="1658.78" y="280.7803">UPDATING; delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.54" x="1658.78" y="294.7803">follow-up: create=GetZprConfigurationWorkRequest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.7324" x="1658.78" y="308.7803">-&gt; GetConfiguration; update=none; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="1658.78" y="322.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="1658.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7852" x="1658.78" y="350.7803">compartment_id, zpr_status, freeform_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.1787" x="1658.78" y="364.7803">defined_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="1658.78" y="378.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="1658.78" y="392.7803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="1658.78" y="406.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="1658.78" y="420.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4814" x="1658.78" y="434.7803">The published Configuration contract is a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6055" x="1658.78" y="448.7803">singleton create/get surface. Reconcile binds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.0889" x="1658.78" y="462.7803">and rereads through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1572" x="1658.78" y="476.7803">GetConfiguration(compartmentId) and creates only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="1658.78" y="490.7803">when that root-compartment read confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.8203" x="1658.78" y="504.7803">absence.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8125" x="1658.78" y="518.7803">CreateConfiguration is work-request-backed. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.668" x="1658.78" y="532.7803">runtime stores the create work request in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1094" x="1658.78" y="546.7803">status.async.current, resumes through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4609" x="1658.78" y="560.7803">GetZprConfigurationWorkRequest, recovers the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.668" x="1658.78" y="574.7803">configuration identifier from work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5576" x="1658.78" y="588.7803">resources, and then confirms state with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="1658.78" y="602.7803">GetConfiguration.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="1658.78" y="616.7803">No OCI update or delete operation is published.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5508" x="1658.78" y="630.7803">Drift on zprStatus or tag maps is rejected,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5986" x="1658.78" y="644.7803">compartmentId remains bind/create identity, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="1658.78" y="658.7803">Kubernetes delete performs local finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.5029" x="1658.78" y="672.7803">cleanup only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.9717" x="1658.78" y="686.7803">ACTIVE settles success, CREATING and UPDATING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9092" x="1658.78" y="700.7803">requeue, FAILED remains terminal non-success,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.916" x="1658.78" y="714.7803">and observed DELETED is treated as stale</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="1658.78" y="728.7803">identity or absence rather than managed delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3584" x="1658.78" y="742.7803">progress.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="27" id="lnk3"><path d="M26.44,505 C54.15,505 132.03,505 206.65,505" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="212.65,505,203.65,501,207.65,505,203.65,509,212.65,505" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="125.2959" x="57" y="500.7803">CreateConfiguration</text></g><!--link observe to evaluate_ready--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="28" id="lnk4"><path d="M477.68,473.98 C487.73,471.61 497.71,469.27 507.36,467 C611.86,442.47 728.2669,415.2831 796.0369,399.4731" fill="none" id="observe-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="801.88,398.11,792.2066,396.2593,797.0107,399.2459,794.0241,404.0501,801.88,398.11" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="575.86" y="401.5503">OCI state in ACTIVE</text></g><!--link observe to retryable--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="29" id="lnk5"><path d="M477.58,505 C592.15,505 744.49,505 813.45,505" fill="none" id="observe-to-retryable" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="819.45,505,810.45,501,814.45,505,810.45,509,819.45,505" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0342" x="562.86" y="486.7803">OCI state in CREATING,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3379" x="603.7081" y="500.7803">UPDATING</text></g><!--link observe to failed--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="30" id="lnk6"><path d="M477.58,535.8 C598.32,564.1 761.8283,602.4308 823.9483,616.9908" fill="none" id="observe-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="829.79,618.36,821.9403,612.4117,824.9219,617.219,820.1147,620.2007,829.79,618.36" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="508.36" y="539.2703">unresolved OCI error or non-success state</text></g><!--link evaluate_ready to reject_unsupported_drift--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="31" id="lnk7"><path d="M907.79,400.38 C917.55,402.8 927.71,405.13 937.32,407 C996.95,418.6 1059.2077,426.778 1110.2277,432.528" fill="none" id="evaluate_ready-to-reject_unsupported_drift" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1116.19,433.2,1107.6946,428.2172,1111.2215,432.64,1106.7987,436.1669,1116.19,433.2" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9512" x="938.32" y="388.7803">force-new or conflicting</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9375" x="969.8268" y="402.7803">drift detected</text></g><!--link reject_unsupported_drift to ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0004" data-link-type="dependency" data-source-line="32" id="lnk8"><path d="M1272.48,431.62 C1356.82,421.37 1481.1738,406.2534 1535.0238,399.7134" fill="none" id="reject_unsupported_drift-to-ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1540.98,398.99,1531.5634,396.1042,1536.0165,399.5928,1532.5279,404.0459,1540.98,398.99" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family=