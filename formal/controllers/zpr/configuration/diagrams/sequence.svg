8" y1="1055" y2="1055"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0752" x="773.4614" y="1007.7803">apply follow-up strategy</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.7334" x="773.4614" y="1021.7803">create=GetZprConfigurationWorkRequest</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.3779" x="773.4614" y="1035.7803">-&gt; GetConfiguration; update=none;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.4648" x="773.4614" y="1049.7803">delete=none</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg16"><polygon fill="#0F172A" points="515.3247,1086,505.3247,1090,515.3247,1094,511.3247,1090" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="509.3247" x2="765.4614" y1="1090" y2="1090"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2334" x="521.3247" y="1084.7803">status=required, finalizer=none</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg17"><polygon fill="#0F172A" points="280.3882,1121,270.3882,1125,280.3882,1129,276.3882,1125" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="274.3882" x2="503.3247" y1="1125" y2="1125"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9365" x="286.3882" y="1119.7803">requeue on provisioning, updating</text></g><path d="M771,1146 L771,1910 A8,8 0 0 0 779,1918 L1116,1918 A8,8 0 0 0 1124,1910 L1124,1148 L1114,1138 L779,1138 A8,8 0 0 0 771,1146" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1114,1138 L1114,1144 A4,4 0 0 0 1118,1148 L1124,1148 L1114,1138" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="777" y="1153.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="777" y="1167.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="777" y="1181.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="777" y="1195.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="777" y="1209.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="777" y="1223.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="777" y="1237.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="777" y="1251.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="777" y="1265.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="777" y="1279.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="777" y="1293.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="777" y="1307.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="777" y="1321.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="777" y="1335.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5723" x="777" y="1349.7803">service: zpr</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.627" x="777" y="1363.7803">slug: configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7373" x="777" y="1377.7803">kind: Configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="777" y="1391.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="777" y="1405.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="777" y="1419.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="777" y="1433.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2959" x="777" y="1447.7803">UPDATING; delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.54" x="777" y="1461.7803">follow-up: create=GetZprConfigurationWorkRequest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.7324" x="777" y="1475.7803">-&gt; GetConfiguration; update=none; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="777" y="1489.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="777" y="1503.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7852" x="777" y="1517.7803">compartment_id, zpr_status, freeform_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.1787" x="777" y="1531.7803">defined_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="777" y="1545.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="777" y="1559.7803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="777" y="1573.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="777" y="1587.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4814" x="777" y="1601.7803">The published Configuration contract is a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6055" x="777" y="1615.7803">singleton create/get surface. Reconcile binds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.0889" x="777" y="1629.7803">and rereads through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1572" x="777" y="1643.7803">GetConfiguration(compartmentId) and creates only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="777" y="1657.7803">when that root-compartment read confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.8203" x="777" y="1671.7803">absence.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8125" x="777" y="1685.7803">CreateConfiguration is work-request-backed. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.668" x="777" y="1699.7803">runtime stores the create work request in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1094" x="777" y="1713.7803">status.async.current, resumes through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4609" x="777" y="1727.7803">GetZprConfigurationWorkRequest, recovers the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.668" x="777" y="1741.7803">configuration identifier from work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5576" x="777" y="1755.7803">resources, and then confirms state with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="777" y="1769.7803">GetConfiguration.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="777" y="1783.7803">No OCI update or delete operation is published.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5508" x="777" y="1797.7803">Drift on zprStatus or tag maps is rejected,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5986" x="777" y="1811.7803">compartmentId remains bind/create identity, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="777" y="1825.7803">Kubernetes delete performs local finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.5029" x="777" y="1839.7803">cleanup only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.9717" x="777" y="1853.7803">ACTIVE settles success, CREATING and UPDATING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9092" x="777" y="1867.7803">requeue, FAILED remains terminal non-success,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.916" x="777" y="1881.7803">and observed DELETED is treated as stale</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="777" y="1895.7803">identity or absence rather than managed delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3584" x="777" y="1909.7803">progress.</text><?plantuml-src fLVlRzis4FtEluBelhI0vJHDqnykEg1DqYrerWv9jW53W8AMA8cDJ6eaPTSTzh_l7KN9acElmOfyY2MInxjxxzwTtAtIjR1YmLqfChDIkk2vg9nahb-PY_IsiARHsOcfZEK_v2d-ii6EJEQYgVmxe_q7iP3yPrajfLUfsBtdIdsL_F3fO55OQrRH-kFyyFcJuKbjl7nxnuSyVvuzszvbR2Pjt35_Udpq-ENM3he-hXyTFJqyFXwi1_EfiLfQVlYCUUKhoQ_aNutKgUG9_rhRWnEZSrKqLdXbD2jL9dbkZ9-RBmD3hZlpD-DSfDxOaMCnm6vfEpBvHBx87sCPnf13LGljTvyVRhYFbK7mlOrAvV92wN7gNZuLH_CNM2MJzMWfdMV7yh1VkWFBYrpaAVk7XTZu-sOkaKyl7HlumP55RqrLIJjw_LOuUIbJerErlVJWuzN7zrVIBbKgVn5Q5D8-uCBnyQlHaOydvumWvsO9GCUs9rldG7uhCswbCrL3qCxYguDCYGAOkeFsETbiIJgOfsvPT1OoMI7QlQVRvV59gRD0JRP95az-7EHengN6_aRo4VlWRGo7RVRIoN6eCzx_VcZfNkSViV4MEZHEo6nZ724vHQ6DgH_WvnV6tEAVG0XpfJCcAi-z1Icm7_3BBtK5E08M7BMYKLDhBYehHRR6gdBUiV7Dv0jsp_XFqezlb52btdXlJ3c-KCv1jyBbLZPEpE4rtKXODHPrY4t8C2eLHDrttmcSyd9yPMLCpTEmm6lWHEfuSddsvlhymq_tz