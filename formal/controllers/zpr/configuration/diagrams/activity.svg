4199" x="365.4058" y="955.2803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="385.5093" y="977.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="395.5093" y="998.2803">Compare live OCI state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="395.5093" y="1012.2803">field surface</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="382.4058" y="1094.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="392.4058" y="1115.2803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.2061" x="392.4058" y="1129.2803">fields compartment_id, zpr_status,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3301" x="392.4058" y="1143.2803">freeform_tags, defined_tags</text><ellipse cx="533.6294" cy="1187.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="533.6294" cy="1187.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="408.0464,1045.5,659.2124,1045.5,671.2124,1057.5,659.2124,1069.5,408.0464,1069.5,396.0464,1057.5,408.0464,1045.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="537.6294" y="1080.2803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="408.0464" y="1061.2803">"Force-new or conflicting drift detected?"</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="295.8711" x="385.6938" y="1240.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="395.6938" y="1261.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.8711" x="395.6938" y="1275.2803">create=tfresource.CreateResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="395.6938" y="1289.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="301.0049" x="383.127" y="1322.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="393.127" y="1343.2803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="393.127" y="1357.2803">create=GetZprConfigurationWorkRequest -&gt;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.0049" x="393.127" y="1371.2803">GetConfiguration; update=none; delete=none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="382.0195" y="1404.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="392.0195" y="1425.2803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="394.0645" y="1458.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="404.0645" y="1479.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="404.0645" y="1493.2803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="236.3848" x="415.437" y="1526.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.3848" x="425.437" y="1547.2803">Requeue on provisioning, updating</text><path d="M381.4006,1582.5 L381.4006,1947.5 L361.4006,1951.5 L381.4006,1955.5 L381.4006,2320.5 A0,0 0 0 0 381.4006,2320.5 L735.3723,2320.5 A0,0 0 0 0 735.3723,2320.5 L735.3723,1592.5 L725.3723,1582.5 L381.4006,1582.5 A0,0 0 0 0 381.4006,1582.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M725.3723,1582.5 L725.3723,1592.5 L735.3723,1592.5 L725.3723,1582.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="387.4006" y="1598.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="387.4006" y="1612.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="387.4006" y="1626.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="387.4006" y="1640.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="387.4006" y="1654.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="387.4006" y="1668.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="387.4006" y="1682.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="387.4006" y="1696.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="387.4006" y="1710.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="387.4006" y="1724.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="387.4006" y="1738.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5723" x="387.4006" y="1752.2803">service: zpr</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.627" x="387.4006" y="1766.2803">slug: configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7373" x="387.4006" y="1780.2803">kind: Configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="387.4006" y="1794.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="387.4006" y="1808.2803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="387.4006" y="1822.2803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="387.4006" y="1836.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2959" x="387.4006" y="1850.2803">UPDATING; delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.54" x="387.4006" y="1864.2803">follow-up: create=GetZprConfigurationWorkRequest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.7324" x="387.4006" y="1878.2803">-&gt; GetConfiguration; update=none; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="387.4006" y="1892.2803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="387.4006" y="1906.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7852" x="387.4006" y="1920.2803">compartment_id, zpr_status, freeform_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.1787" x="387.4006" y="1934.2803">defined_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="387.4006" y="1948.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1787" x="387.4006" y="1962.2803">list lookup: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="387.4006" y="1976.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="387.4006" y="1990.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4814" x="387.4006" y="2004.2803">The published Configuration contract is a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6055" x="387.4006" y="2018.2803">singleton create/get surface. Reconcile binds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.0889" x="387.4006" y="2032.2803">and rereads through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1572" x="387.4006" y="2046.2803">GetConfiguration(compartmentId) and creates only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="387.4006" y="2060.2803">when that root-compartment read confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.8203" x="387.4006" y="2074.2803">absence.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8125" x="387.4006" y="2088.2803">CreateConfiguration is work-request-backed. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.668" x="387.4006" y="2102.2803">runtime stores the create work request in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1094" x="387.4006" y="2116.2803">status.async.current, resumes through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4609" x="387.4006" y="2130.2803">GetZprConfigurationWorkRequest, recovers the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.668" x="387.4006" y="2144.2803">configuration identifier from work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5576" x="387.4006" y="2158.2803">resources, and then confirms state with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="387.4006" y="2172.2803">GetConfiguration.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="387.4006" y="2186.2803">No OCI update or delete operation is published.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5508" x="387.4006" y="2200.2803">Drift on zprStatus or tag maps is rejected,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5986" x="387.4006" y="2214.2803">compartmentId remains bind/create identity, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="387.4006" y="2228.2803">Kubernetes delete performs local finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.5029" x="387.4006" y="2242.2803">cleanup only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.9717" x="387.4006" y="2256.2803">ACTIVE settles success, CREATING and UPDATING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9092" x="387.4006" y="2270.2803">requeue, FAILED remains terminal non-success,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.916" x="387.4006" y="2284.2803">and observed DELETED is treated as stale</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="387.4006" y="2298.2803">identity or absence rather than managed delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3584" x="387.4006" y="2312.2803">progress.</text><ellipse cx="350.4006" cy="1951.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="350.4006" cy="1951.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="350.4006" x2="350.4006" y1="157" y2="177"/><polygon fill="#0F172A" points="346.400