" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="368.4187" y="381.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="368.4187" y="395.7803">into status</text><polygon fill="#E2E8F0" points="350.4006,415,362.4006,427,350.4006,439,338.4006,427,350.4006,415" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="288.2244,471,412.5769,471,424.5769,483,412.5769,495,288.2244,495,276.2244,483,288.2244,471" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="288.2244" y="486.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="254.4382" y="479.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="424.5769" y="479.7803">no</text><rect fill="none" height="268" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="312.3438" x="11" y="505"/><path d="M61.4688,505 L61.4688,512 L51.4688,522 L11,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="516.7803">Delete</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="284.5986" x="24.8726" y="539"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5986" x="34.8726" y="559.7803">Delete path is not represented by imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0342" x="34.8726" y="573.7803">provider facts</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="283.0264" x="25.6587" y="622"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0264" x="35.6587" y="642.7803">Confirm deletion via GetConfiguration until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="190.6338" x="35.6587" y="656.7803">OCI reaches LOCAL_DELETE</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="292.3438" x="21" y="705"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3438" x="31" y="725.7803">Allow best-effort completion without finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4824" x="31" y="739.7803">retention</text><ellipse cx="167.1719" cy="819" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="167.1719" cy="819" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="428.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="392.5713" x="343.3438" y="505"/><path d="M494.1777,505 L494.1777,512 L484.1777,522 L343.3438,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="346.3438" y="516.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="340.5713" x="363.3438" y="588"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5713" x="373.3438" y="608.7803">Request requeue while OCI remains in CREATING,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3379" x="373.3438" y="622.7803">UPDATING</text><ellipse cx="533.6294" cy="682" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="533.6294" cy="682" fill="#222222" rx="6" ry="6" style="stroke:#22