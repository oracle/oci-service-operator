th:1;stroke-dasharray:2,2;" x1="397.2598" x2="1066.7261" y1="967" y2="967"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="200.751" x="402.2598" y="977.7803">[live state requires field-aware</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="105.0068" x="402.2598" y="991.7803">drift evaluation]</text><path d="M415.2598,1003 L543.2461,1003 L543.2461,1009 L533.2461,1019 L407.2598,1019 L407.2598,1011 A8,8 0 0 1 415.2598,1003" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="406" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="649.4663" x="407.2598" y="1003"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="90.9863" x="422.2598" y="1014.7803">Drift handling</text><path d="M704,1032 L704,1110 A8,8 0 0 0 712,1118 L1038,1118 A8,8 0 0 0 1046,1110 L1046,1034 L1036,1024 L712,1024 A8,8 0 0 0 704,1032" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1036,1024 L1036,1030 A4,4 0 0 0 1040,1034 L1046,1034 L1036,1024" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.9639" x="744.3811" y="1039.7803">Supported update surface: defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1094" x="744.3811" y="1053.7803">description, freeform_tags, statements</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7783" x="744.3811" y="1067.7803">Reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1787" x="744.3811" y="1081.7803">compartment_id, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1162" x="744.3811" y="1095.7803">Lookup filters: compartment_id, name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.6064" x="744.3811" y="1109.7803">id, lifecycle_state</text><path d="M425.2598,1130 L484.0254,1130 L484.0254,1136 L474.0254,1146 L417.2598,1146 L417.2598,1138 A8,8 0 0 1 425.2598,1130" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="44" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="421.7983" x="417.2598" y="1130"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="432.2598" y="1141.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="276.1309" x="499.0254" y="1142.7803">[force-new or conflicting drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg16"><polygon fill="#0F172A" points="494.2837,1162,484.2837,1166,494.2837,1170,490.2837,1166" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="488.2837" x2="749.8618" y1="1166" y2="1166"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1855" x="500.2837" y="1160.7803">reject before OCI mutation</text></g><path d="M660.6655,1188 L719.4312,1188 L719.4312,1194 L709.4312,1204 L652.6655,1204 L652.6655,1196 A8,8 0 0 1 660.6655,1188" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="144" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="387.7261" x="652.6655" y="1188"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="667.6655" y="1199.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4619" x="734.4312" y="1200.7803">[supported mutable drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg17"><polygon fill="#0F172A" points="988.9468,1262,998.9468,1266,988.9468,1270,992.9468,1266" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="750.8618" x2="994.9468" y1="1266" y2="1266"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.1992" x="757.8618" y="1218.7803">Apply UpdateZprPolicy only for</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3369" x="757.8618" y="1232.7803">mutable fields defined_tags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7441" x="757.8618" y="1246.7803">description, freeform_tags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4756" x="757.8618" y="1260.7803">statements</text></g><path d="M670.6655,1281 L737.2104,1281 L737.2104,1287 L727.2104,1297 L662.6655,1297 L662.6655,1289 A8,8 0 0 1 670.6655,1281" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="44" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="367.7261" x="662.6655" y="1281"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="29.5449" x="677.6655" y="1292.7803">loop</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="190.5381" x="752.2104" y="1293.7803">[update pending UPDATING]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg18"><polygon fill="#0F172A" points="988.9468,1313,998.9468,1317,988.9468,1321,992.9468,1317" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="750.8618" x2="994.9468" y1="1317" y2="1317"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9102" x="757.8618" y="1311.7803">GetZprPolicy</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg19"><polygon fill="#0F172A" points="988.9468,1397,998.9468,1401,988.9468,1405,992.9468,1401" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="750.8618" x2="994.9468" y1="1401" y2="1401"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="757.8618" y="1353.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="757.8618" y="1367.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="757.8618" y="1381.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="757.8618" y="1395.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg20"><polygon fill="#0F172A" points="494.2837,1446,484.2837,1450,494.2837,1454,490.2837,1450" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="488.2837" x2="749.8618" y1="1450" y2="1450"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="500.2837" y="1430.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="500.2837" y="1444.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg21"><polygon fill="#0F172A" points="255.4575,1495,245.4575,1499,255.4575,1503,251.4575,1499" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="249.4575" x2="482.2837" y1="1499" y2="1499"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.8262" x="261.4575" y="1479.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="261.4575" y="1493.7803">terminating</text></g><path d="M755,1520 L755,2298 A8,8 0 0 0 763,2306 L1097,2306 A8,8 0 0 0 1105,2298 L1105,1522 L1095,1512 L763,1512 A8,8 0 0 0 755,1520" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1095,1512 L1095,1518 A4,4 0 0 0 1099,1522 L1105,1522 L1095,1512" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="761" y="1527.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="761" y="1541.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="761" y="1555.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="761" y="1569.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="761" y="1583.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="761" y="1597.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="761" y="1611.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="761" y="1625.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="761" y="1639.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="761" y="1653.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="761" y="1667.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="761" y="1681.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="761" y="1695.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="761" y="1709.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5723" x="761" y="1723.7803">service: zpr</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="761" y="1737.7803">slug: zprpolicy</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8066" x="761" y="1751.7803">kind: ZprPolicy</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="761" y="1765.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="761" y="1779.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="761" y="1793.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="761" y="1807.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="761" y="1821.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="761" y="1835.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="761" y="1849.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.627" x="761" y="1863.7803">freeform_tags, statements</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="761" y="1877.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1787" x="761" y="1891.7803">compartment_id, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="761" y="1905.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2129" x="761" y="1919.7803">list lookup: oci_zpr_zpr_policies filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5645" x="761" y="1933.7803">compartment_id, name, id, lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="761" y="1947.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="761" y="1961.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.04" x="761" y="1975.7803">ZprPolicy create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1367" x="761" y="1989.7803">work-request-backed through the ZPR service SDK.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2471" x="761" y="2003.7803">The runtime projects the polled work request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2676" x="761" y="2017.7803">into status.async.current as the canonical async</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6748" x="761" y="2031.7803">tracker and resumes in-flight OCI operations</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0684" x="761" y="2045.7803">from that shared status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3301" x="761" y="2059.7803">Create binds identity from an explicit OCI OCID</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.709" x="761" y="2073.7803">first and otherwise adopts only a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3369" x="761" y="2087.7803">ListZprPolicies match on compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6123" x="761" y="2101.7803">exact name before create; ambiguous matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.5303" x="761" y="2115.7803">instead of guessing.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4268" x="761" y="2129.7803">Mutable drift is limited to description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4746" x="761" y="2143.7803">statements, freeformTags, and definedTags.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.1777" x="761" y="2157.7803">compartmentId and name are replacement-only once</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.0752" x="761" y="2171.7803">a live policy is bound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4883" x="761" y="2185.7803">Create, update, and delete recover or confirm</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3643" x="761" y="2199.7803">the tracked policy through GetZprPolicy and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2334" x="761" y="2213.7803">GetZprPolicyWorkRequest. Delete completes only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6953" x="761" y="2227.7803">after the work request reaches a terminal state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="761" y="2241.7803">and GetZprPolicy confirms the policy is gone or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4619" x="761" y="2255.7803">DELETED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.8682" x="761" y="2269.7803">FAILED and NEEDS_ATTENTION remain terminal</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.957" x="761" y="2283.7803">non-success outcomes and do not collapse into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4551" x="761" y="2297.7803">ACTIVE.</text><?plantuml-src fLThRnit5ltENq6qNrh0akCcQLC5MS2rrQuHrmbiTnSe31ZK34VYPaJEaXmfRj7_tdFvc8SiROKjWi2ZuPtxFFVSI_T9wKPOiUPk9KgpLNh9Ar4xoLntiX35fwKrhIulJ6qi_x8gyAySI9Io4ctjVpJQtuYrvF-KzKPwLOZzCdVgDydFNWqEXRLccxI_gCw--sRufJPU_l3CXwhwhlnsLyhOKjeaiNZr-kMBxtSao7mwV_dorTdhruFpeBumLalBpxvbNlbQyZlvtrRgGl89_wsnfxyszgEfLV74LggKl3B6BypdWHANvNzdd8l26pjoAWMNZtQZaj_8DzKB74CPygSQeVt-xuS2nsWP1Dxfg5KbhvKUf-txL-BbuWrEIMKpEYeMvMjvrXqzAycRIbG5-uE5sFZxTY6HIoyT6_Z1B-28DNKjxUZr3yB9MraONQZTeoy-t7ruVoVjHXNoPw75Kjelk71y_6hqoOUBAqRbvcQ3Oevrd-ny1-1RMN8hdQbRhuoUfLUdfH9BrDITnj-JNcIIopnrcsNMKCeQqHxyEXwFlvIw3B1aVRBuv1-37Csur91l9U-G1qzJAAoNew_6OSvuz_oL9PlEVyt68lJHE1cpNZd2SOh2wY4VoiwlZVc4FmAkBvGkcQWzznPWW2pABZyt45QX1Xmzej57JrpKLeho2QVAUSV6LiaFIC_uJzBtrYHOg5FSALAEhvLpuAb3IgvX8MjHqdrLgTfBwsOFkZ1h0iaQgXvLUS8rkEe4gayUDBL2yLJKyj5vuUNN8IehMoSMI0M5GiLlBHeR7g1aQ7qW_v0F5uZMopwMsfY65-4bRr1qejcBs_dv_TNDJySb0xP2GlRxzF-aTu_tUq3K87NG6TjZWqgCogeqftorBgYZd4MKyuGuMIRGN8RNXnoBfxrl1yJWLQNiEjlOA34A2UXxq3lLZvbF7-JCNywlvyTcdY2zgpF72hW8ZU0WKYajQemrYyZnrWMOB6f3u3qcpLPwWMGcHmC6GuVXlKsjaCu8n7W02N6pSD1yh87eLk-egD0MpxL6g6MuKRMZDuWdE4FWEyvWvAtjIdLeNID61z0yw0p-4_xBnylqr9KbMAxL9YU2L86A79oNTJaHM_3fWowjgZoN6r6t8ZYUa1PUhv2ycaYYdm9ZdqzeHDorJMCiKChRfYHBhhMLAEICjXKCnlBHYwKxOQ32mgg6h9pmoafP6RkEPz55eXJ7RkL_PE7vWeubNxTqCWDHe4CdMcwZ-uxjeo6MM3MJ5T_BLOoUTgYgdo6cyGDZ02Nr2o3h2VCnMoXYYN8N_bZG30EY6eQWCah8eEjII4T4J7zjARNPUTFKJ_oNaFb1lscyhAYLiyAOjd59KFx3DNdGWw840aZbpGIGCNSyzHwcUjjglf8rU9AlK4E7CHDu_fslCZrFupYuJJ_VFkZepr0afc4W4XjpA19PCeiSI-2Hdz-b7g9Prr70kyWwanPaNayIktQRIZ2mkp3iB2UvoK56ZJKRvL0D9FWa9foU7ZJml8P5ttMZLSkLvwRY-nUnj3VzlItiBxNisyRkF3eEM39hxbUIFriC--KUM6Ee_cNOW4B025UaOTo8POYNW0aQOX4F4sCd2OQbSetmnMhAhiKJiZembWT0DhHTITrpDaF1QFAIvewuGzMIkQsndoPfzh86HGg-6I8_UD5FB46jDsN25Ylfdng9Enxy8U3ZyYEecrsipMITYbDqLGSDuw_P7iWHHRmJXUDRvLTShHDJR8NoBgQcqph1h1GrRqBFJLaoFwDB5tDrkmnFyPJXibNE1djf5yQCBtC0azq0OX-SThc