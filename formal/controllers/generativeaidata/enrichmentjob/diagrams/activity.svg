241" y="341.7803">display_name</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="328.1777" x="591.1067" y="375"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="601.1067" y="395.7803">Create the OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1777" x="601.1067" y="409.7803">GenerateEnrichmentJob when no reusable match</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.0342" x="601.1067" y="423.7803">is found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="611.7478" y="457"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="621.7478" y="477.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="621.7478" y="491.7803">into status</text><polygon fill="#E2E8F0" points="603.7297,511,615.7297,523,603.7297,535,591.7297,523,603.7297,511" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="541.5535,567,665.906,567,677.906,579,665.906,591,541.5535,591,529.5535,579,541.5535,567" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="541.5535" y="582.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="507.7673" y="575.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="677.906" y="575.7803">no</text><rect fill="none" height="363" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="601"/><path d="M61.4688,601 L61.4688,608 L51.4688,618 L11,618" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="612.7803">Delete</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="298.5439" x="190.4722" y="635"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7021" x="200.4722" y="655.7803">Delete path uses CancelEnrichmentJob with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3232" x="200.4722" y="669.7803">required via GetEnrichmentJob or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5439" x="200.4722" y="683.7803">ListEnrichmentJobs to CANCELED, FAILED,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.9375" x="200.4722" y="697.7803">NOT_FOUND, SUCCEEDED confirmation</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="338.2334" x="170.6274" y="746"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.8955" x="180.6274" y="766.7803">Confirm deletion via GetEnrichmentJob or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2334" x="180.6274" y="780.7803">ListEnrichmentJobs until OCI reaches CANCELED,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.5859" x="180.6274" y="794.7803">FAILED, NOT_FOUND, SUCCEEDED</text><polygon fill="#E2E8F0" points="191.5718,840,487.9165,840,499.9165,852,487.9165,864,191.5718,864,179.5718,852,191.5718,840" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="855.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="848.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="848.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="874"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="894.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="874"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="894.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="908.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,928,351.7441,940,339.7441,952,327.7441,940,339.7441,928" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="1010" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="1010" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="440" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="390.4678" x="675.4814" y="601"/><path d="M826.3154,601 L826.3154,608 L816.3154,618 L675.4814,618" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="678.4814" y="612.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="344.4678" x="695.4814" y="684"/><text fill="#0F172A" font-family="Helvetic