-size="14" lengthAdjust="spacing" textLength="241.042" x="747.1943" y="867.7803">"OCI state is outside success targets?"</text><rect fill="none" height="616.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="363.5024" x="687.4365" y="1051"/><path d="M853.8564,1051 L853.8564,1058 L843.8564,1068 L687.4365,1068" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="690.4365" y="1062.7803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="237.8818" x="748.7744" y="1085"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.8818" x="758.7744" y="1105.7803">Compare live OCI state against the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3369" x="758.7744" y="1119.7803">repo-authored mutation surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="716.4917" y="1202"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="726.4917" y="1222.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3438" x="726.4917" y="1236.7803">fields compartment_id, semantic_store_id</text><ellipse cx="867.7153" cy="1282.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="867.7153" cy="1282.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="742.1323,1153,993.2983,1153,1005.2983,1165,993.2983,1177,742.1323,1177,730.1323,1165,742.1323,1153" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="871.7153" y="1187.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="742.1323" y="1168.7803">"Force-new or conflicting drift detected?"</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.5537" x="720.9385" y="1335.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="730.9385" y="1356.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="730.9385" y="1370.2803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="730.9385" y="1384.2803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="730.9385" y="1398.2803">matching field-driven path executes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.8057" x="715.3125" y="1431.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="725.3125" y="1452.2803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8057" x="725.3125" y="1466.2803">create=read-after-write; delete=confirm-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="340.5576" x="697.4365" y="1499.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5576" x="707.4365" y="1520.2803">Return success for the SUCCEEDED success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="728.1504" y="1553.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="738.1504" y="1574.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="738.1504" y="1588.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.9229" x="741.7539" y="1621.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9229" x="751.7539" y="1642.2803">Requeue on provisioning, terminating</text><path d="M634.7297,1677.5 L634.7297,2175.5 L614.7297,2179.5 L634.7297,2183.5 L634.7297,2681.5 A0,0 0 0 0 634.7297,2681.5 L1012.8733,2681.5 A0,0 0 0 0 1012.8733,2681.5 L1012.8733,1687.5 L1002.8733,1677.5 L634.7297,1677.5 A0,0 0 0 0 634.7297,1677.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1002.8733,1677.5 L1002.8733,1687.5 L1012.8733,1687.5 L1002.8733,1677.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="640.7297" y="1693.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="640.7297" y="1707.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="640.7297" y="1721.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="640.7297" y="1735.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="640.7297" y="1749.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="640.7297" y="1763.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="640.7297" y="1777.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="640.7297" y="1791.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="640.7297" y="1805.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="640.7297" y="1819.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="640.7297" y="1833.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="155.6475" x="640.7297" y="1847.2803">service: generativeaidata</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="121.3994" x="640.7297" y="1861.2803">slug: enrichmentjob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.8408" x="640.7297" y="1875.2803">kind: EnrichmentJob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="640.7297" y="1889.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="640.7297" y="1903.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="640.7297" y="1917.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="640.7297" y="1931.2803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4404" x="640.7297" y="1945.2803">provider states: create ACCEPTED, IN_PROGRESS;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3506" x="640.7297" y="1959.2803">update none; delete CANCELING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="640.7297" y="1973.2803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.0234" x="640.7297" y="1987.2803">delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="640.7297" y="2001.2803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="640.7297" y="2015.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.7715" x="640.7297" y="2029.2803">compartment_id, semantic_store_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="640.7297" y="2043.2803">create-only fields: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.3535" x="640.7297" y="2057.2803">display_name, enrichment_job_configuration (+2</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="640.7297" y="2071.2803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="640.7297" y="2085.2803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.626" x="640.7297" y="2099.2803">oci_generative_ai_data_enrichment_jobs filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.8262" x="640.7297" y="2113.2803">semantic_store_id, compartment_id, display_name;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0332" x="640.7297" y="2127.2803">Exact displayName match within the requested</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8125" x="640.7297" y="2141.2803">semanticStoreId and compartmentId. Duplicate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5859" x="640.7297" y="2155.2803">matches fail.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="640.7297" y="2169.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="640.7297" y="2183.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6396" x="640.7297" y="2197.2803">EnrichmentJob keeps the generated controller and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8057" x="640.7297" y="2211.2803">service-manager shell, but the handwritten</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5918" x="640.7297" y="2225.2803">runtime client overrides the published contract</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6191" x="640.7297" y="2239.2803">so Kubernetes create calls GenerateEnrichmentJob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4746" x="640.7297" y="2253.2803">and Kubernetes delete requests</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9434" x="640.7297" y="2267.2803">CancelEnrichmentJob instead of claiming a plain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.1309" x="640.7297" y="2281.2803">CRUD surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="357.1436" x="640.7297" y="2295.2803">ACCEPTED and IN_PROGRESS remain the provisioning</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6816" x="640.7297" y="2309.2803">states for create and ordinary observe.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5576" x="640.7297" y="2323.2803">SUCCEEDED is the only steady success state,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.9922" x="640.7297" y="2337.2803">while FAILED and CANCELED are terminal</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2539" x="640.7297" y="2351.2803">unsuccessful outcomes that surface directly on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="640.7297" y="2365.2803">the CR status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="640.7297" y="2379.2803">Delete confirmation is explicit repo-authored</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4883" x="640.7297" y="2393.2803">cancel behavior: the finalizer is retained until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="343.1094" x="640.7297" y="2407.2803">GetEnrichmentJob reports CANCELED, SUCCEEDED,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0605" x="640.7297" y="2421.2803">FAILED, or NotFound, and a post-cancel read that</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.7578" x="640.7297" y="2435.2803">still shows ACCEPTED or IN_PROGRESS is treated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9365" x="640.7297" y="2449.2803">as pending until OCI reflects the cancellation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5986" x="640.7297" y="2463.2803">Pre-create reuse only runs when spec.displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5713" x="640.7297" y="2477.2803">is present. ListEnrichmentJobs is narrowed by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1504" x="640.7297" y="2491.2803">semanticStoreId, compartmentId, and displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.7158" x="640.7297" y="2505.2803">then duplicate exact matches fail instead of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.4961" x="640.7297" y="2519.2803">binding arbitrarily.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3643" x="640.7297" y="2533.2803">Because the pinned SDK has no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="640.7297" y="2547.2803">UpdateEnrichmentJob, compartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.999" x="640.7297" y="2561.2803">semanticStoreId remain create-time identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3916" x="640.7297" y="2575.2803">inputs and every other published spec field is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6611" x="640.7297" y="2589.2803">create-only drift after create. The runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6816" x="640.7297" y="2603.2803">rejects that drift instead of simulating an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.5098" x="640.7297" y="2617.2803">update surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.123" x="640.7297" y="2631.2803">The pinned terraform-provider-oci revision has</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.957" x="640.7297" y="2645.2803">no matching generativeaidata resource, so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7988" x="640.7297" y="2659.2803">import catalog for this row is SDK-shaped and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.2686" x="640.7297" y="2673.2803">repo-curated.</text><ellipse cx="603.7297" cy="2179.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="603.7297" cy="2179.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="603.7297" x2="603.7297" y1="157" y2="177"/><polygon fill="#0F172A" points="599.7297,167,603.7297,177,607.7297,167,603.7297,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="755.1956" x2="755.1956" y1="355" y2="375"/><polygon fill="#0F172A" points="751.1956,365,755.1956,375,759.1956,365,755.1956,369" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="755.1956" x2="755.1956" y1="437" y2="457"/><polygon fill="#0F172A" points="751.1956,447,755.1956,457,759.1956,447,755.1956,451" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="462.2639" x2="452.2639" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="452.2639" x2="452.2639" y1="257" y2="279"/><polygon fill="#0F172A" points="448.2639,269,452.2639,279,456.2639,269,452.2639,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="745.1956" x2="755.1956" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="755.1956" x2="755.1956" y1="257" y2="279"/><polygon fill="#0F172A" points="751.1956,269,755.1956,279,759.1956,269,755.1956,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="452.2639" x2="452.2639" y1="327" y2="523"/><line style="stroke:#0F172A;stroke-width:1;" x1="452.2639" x2="591.7297" y1="523" y2="523"/><polygon fill="#0F172A" points="581.7297,519,591.7297,523,581.7297,527,585.7297,523" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="755.1956" x2="755.1956" y1="505" y2="523"/><line style="stroke:#0F172A;stroke-width:1;" x1="755.1956" x2="615.7297" y1="523" y2="523"/><polygon fill="#0F172A" points="625.7297,519,615.7297,523,625.7297,527,621.7297,523" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="603.7297" x2="603.7297" y1="225" y2="245"/><polygon fill="#0F172A" points="599.7297,235,603.7297,245,607.7297,235,603.7297,239" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="603.7297" x2="603.7297" y1="65" y2="109"/><polygon fill="#0F172A" points="599.7297,99,603.7297,109,607.7297,99,603.7297,103" style="stroke:#0F172A;stroke-width:1;"/><line style="s