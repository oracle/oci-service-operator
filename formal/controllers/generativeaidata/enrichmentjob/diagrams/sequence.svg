ine style="stroke:#CBD5E1;stroke-width:1;stroke-dasharray:2,2;" x1="443.9424" x2="1148.1919" y1="981" y2="981"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="200.751" x="448.9424" y="991.7803">[live state requires field-aware</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="105.0068" x="448.9424" y="1005.7803">drift evaluation]</text><path d="M461.9424,1017 L589.9287,1017 L589.9287,1023 L579.9287,1033 L453.9424,1033 L453.9424,1025 A8,8 0 0 1 461.9424,1017" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="360" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="684.2495" x="453.9424" y="1017"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="90.9863" x="468.9424" y="1028.7803">Drift handling</text><path d="M782,1046 L782,1194 A8,8 0 0 0 790,1202 L1120,1202 A8,8 0 0 0 1128,1194 L1128,1048 L1118,1038 L790,1038 A8,8 0 0 0 782,1046" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1118,1038 L1118,1044 A4,4 0 0 0 1122,1048 L1128,1048 L1118,1038" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.04" x="812.4724" y="1053.7803">Supported update surface: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7783" x="812.4724" y="1067.7803">Reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.7715" x="812.4724" y="1081.7803">compartment_id, semantic_store_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.7852" x="812.4724" y="1095.7803">Create-only fields: defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7578" x="812.4724" y="1109.7803">description, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.6367" x="812.4724" y="1123.7803">enrichment_job_configuration (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5508" x="812.4724" y="1137.7803">Lookup filters: semantic_store_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="812.4724" y="1151.7803">compartment_id, display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2471" x="812.4724" y="1165.7803">Lookup matching: Exact displayName match</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5986" x="812.4724" y="1179.7803">within the requested semanticStoreId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.9922" x="812.4724" y="1193.7803">compartmentId. Duplicate matches fail.</text><path d="M471.9424,1214 L530.708,1214 L530.708,1220 L520.708,1230 L463.9424,1230 L463.9424,1222 A8,8 0 0 1 471.9424,1214" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="44" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="452.8335" x="463.9424" y="1214"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="478.9424" y="1225.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="276.1309" x="545.708" y="1226.7803">[force-new or conflicting drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg16"><polygon fill="#0F172A" points="540.9663,1246,530.9663,1250,540.9663,1254,536.9663,1250" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="534.9663" x2="827.5796" y1="1250" y2="1250"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1855" x="546.9663" y="1244.7803">reject before OCI mutation</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg17"><polygon fill="#0F172A" points="1070.1304,1309,1080.1304,1313,1070.1304,1317,1074.1304,1313" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="828.5796" x2="1076.1304" y1="1313" y2="1313"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="835.5796" y="1279.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="835.5796" y="1293.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="835.5796" y="1307.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg18"><polygon fill="#0F172A" points="1070.1304,1365,1080.1304,1369,1070.1304,1373,1074.1304,1369" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="828.5796" x2="1076.1304" y1="1369" y2="1369"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.0752" x="835.5796" y="1335.7803">apply follow-up strategy</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.8926" x="835.5796" y="1349.7803">create=read-after-write;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.0234" x="835.5796" y="1363.7803">delete=confirm-delete</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg19"><polygon fill="#0F172A" points="540.9663,1414,530.9663,1418,540.9663,1422,536.9663,1418" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="534.9663" x2="827.5796" y1="1418" y2="1418"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="546.9663" y="1398.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="546.9663" y="1412.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg20"><polygon fill="#0F172A" points="290.4917,1449,280.4917,1453,290.4917,1457,286.4917,1453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="284.4917" x2="528.9663" y1="1453" y2="1453"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4746" x="296.4917" y="1447.7803">requeue on provisioning, terminating</text></g><path d="M833,1474 L833,2504 A8,8 0 0 0 841,2512 L1203,2512 A8,8 0 0 0 1211,2504 L1211,1476 L1201,1466 L841,1466 A8,8 0 0 0 833,1474" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1201,1466 L1201,1472 A4,4 0 0 0 1205,1476 L1211,1476 L1201,1466" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="839" y="1481.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="839" y="1495.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="839" y="1509.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="839" y="1523.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="839" y="1537.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="839" y="1551.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="839" y="1565.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="839" y="1579.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="839" y="1593.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="839" y="1607.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="839" y="1621.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="839" y="1635.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="839" y="1649.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="839" y="1663.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="155.6475" x="839" y="1677.7803">service: generativeaidata</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="121.3994" x="839" y="1691.7803">slug: enrichmentjob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.8408" x="839" y="1705.7803">kind: EnrichmentJob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="839" y="1719.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="839" y="1733.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="839" y="1747.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="839" y="1761.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4404" x="839" y="1775.7803">provider states: create ACCEPTED, IN_PROGRESS;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3506" x="839" y="1789.7803">update none; delete CANCELING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="839" y="1803.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.0234" x="839" y="1817.7803">delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="839" y="1831.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="839" y="1845.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.7715" x="839" y="1859.7803">compartment_id, semantic_store_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="839" y="1873.7803">create-only fields: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.3535" x="839" y="1887.7803">display_name, enrichment_job_configuration (+2</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="839" y="1901.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="839" y="1915.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.626" x="839" y="1929.7803">oci_generative_ai_data_enrichment_jobs filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.8262" x="839" y="1943.7803">semantic_store_id, compartment_id, display_name;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0332" x="839" y="1957.7803">Exact displayName match within the requested</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8125" x="839" y="1971.7803">semanticStoreId and compartmentId. Duplicate</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5859" x="839" y="1985.7803">matches fail.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="839" y="1999.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="839" y="2013.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6396" x="839" y="2027.7803">EnrichmentJob keeps the generated controller and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8057" x="839" y="2041.7803">service-manager shell, but the handwritten</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5918" x="839" y="2055.7803">runtime client overrides the published contract</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6191" x="839" y="2069.7803">so Kubernetes create calls GenerateEnrichmentJob</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4746" x="839" y="2083.7803">and Kubernetes delete requests</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9434" x="839" y="2097.7803">CancelEnrichmentJob instead of claiming a plain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.1309" x="839" y="2111.7803">CRUD surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="357.1436" x="839" y="2125.7803">ACCEPTED and IN_PROGRESS remain the provisioning</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.6816" x="839" y="2139.7803">states for create and ordinary observe.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5576" x="839" y="2153.7803">SUCCEEDED is the only steady success state,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.9922" x="839" y="2167.7803">while FAILED and CANCELED are terminal</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2539" x="839" y="2181.7803">unsuccessful outcomes that surface directly on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="839" y="2195.7803">the CR status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1367" x="839" y="2209.7803">Delete confirmation is explicit repo-authored</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4883" x="839" y="2223.7803">cancel behavior: the finalizer is retained until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="343.1094" x="839" y="2237.7803">GetEnrichmentJob reports CANCELED, SUCCEEDED,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0605" x="839" y="2251.7803">FAILED, or NotFound, and a post-cancel read that</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.7578" x="839" y="2265.7803">still shows ACCEPTED or IN_PROGRESS is treated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9365" x="839" y="2279.7803">as pending until OCI reflects the cancellation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5986" x="839" y="2293.7803">Pre-create reuse only runs when spec.displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5713" x="839" y="2307.7803">is present. ListEnrichmentJobs is narrowed by</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1504" x="839" y="2321.7803">semanticStoreId, compartmentId, and displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.7158" x="839" y="2335.7803">then duplicate exact matches fail instead of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.4961" x="839" y="2349.7803">binding arbitrarily.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3643" x="839" y="2363.7803">Because the pinned SDK has no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="839" y="2377.7803">UpdateEnrichmentJob, compartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.999" x="839" y="2391.7803">semanticStoreId remain create-time identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3916" x="839" y="2405.7803">inputs and every other published spec field is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6611" x="839" y="2419.7803">create-only drift after create. The runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6816" x="839" y="2433.7803">rejects that drift instead of simulating an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.5098" x="839" y="2447.7803">update surface.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.123" x="839" y="2461.7803">The pinned terraform-provider-oci revision has</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.957" x="839" y="2475.7803">no matching generativeaidata resource, so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7988" x="839" y="2489.7803">import catalog for this row is SDK-shaped and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.2686" x="839" y="2503.7803">repo-curated.</text><?plantuml-src hLXTSzku5Nt7hy1iNvAfACVvsCqga