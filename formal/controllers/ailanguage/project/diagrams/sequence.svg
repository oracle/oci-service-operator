" textLength="230.3301" x="747" y="2115.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="747" y="2129.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="747" y="2143.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1572" x="747" y="2157.7803">list lookup: oci_ai_language_projects filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.833" x="747" y="2171.7803">compartment_id, display_name, id; Adopt only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.0674" x="747" y="2185.7803">unique paginated non-DELETED ListProjects match;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7158" x="747" y="2199.7803">delete fallback prefers status.compartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0674" x="747" y="2213.7803">status.displayName before spec values and adds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6953" x="747" y="2227.7803">the tracked projectId when GetProject returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="65.3721" x="747" y="2241.7803">NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="747" y="2255.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="747" y="2269.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2881" x="747" y="2283.7803">Create, update, and delete persist the in-flight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.0889" x="747" y="2297.7803">OCI work request in `status.async.current`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1777" x="747" y="2311.7803">normalize AI Language `OperationStatus*` values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0195" x="747" y="2325.7803">into shared async classes, and normalize</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0059" x="747" y="2339.7803">work-request `OperationType*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1914" x="747" y="2353.7803">create/update/delete phases before deriving</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4473" x="747" y="2367.7803">conditions and requeue.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3369" x="747" y="2381.7803">Create recovers the Project OCID from the create</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3096" x="747" y="2395.7803">response when OCI returns it or from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8057" x="747" y="2409.7803">work-request resources when the response omits</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4473" x="747" y="2423.7803">it, then polls `GetProject` until the Project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.4121" x="747" y="2437.7803">becomes readable. Update also gates completion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.5156" x="747" y="2451.7803">on a succeeded work request plus a readable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.8926" x="747" y="2465.7803">`GetProject`, and retryable 409 "currently being</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.7959" x="747" y="2479.7803">modified" conflicts stay in the updating bucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.8682" x="747" y="2493.7803">even without a work-request ID.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.998" x="747" y="2507.7803">Pre-create lookup adopts only a unique paginated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.9648" x="747" y="2521.7803">non-`DELETED` `ListProjects` match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3301" x="747" y="2535.7803">`compartmentId` and `displayName`. Delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0957" x="747" y="2549.7803">fallback reuses `status.compartmentId`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3369" x="747" y="2563.7803">`status.displayName`, and tracked `projectId`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4609" x="747" y="2577.7803">when `GetProject` returns NotFound so finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7568" x="747" y="2591.7803">release does not depend on stale spec values.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6201" x="747" y="2605.7803">Only `displayName`, `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="747" y="2619.7803">`freeformTags`, and `definedTags` reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9023" x="747" y="2633.7803">place. `compartmentId` remains replacement-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6543" x="747" y="2647.7803">drift, so the live runtime never exercises</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6953" x="747" y="2661.7803">provider-only `ChangeProjectCompartment`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5645" x="747" y="2675.7803">the runtime has no secret side effects.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="747" y="2689.7803">Delete is not best-effort. The finalizer stays</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="747" y="2703.7803">until the delete work request is terminal and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5166" x="747" y="2717.7803">`GetProject` or fallback `ListProjects` confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="747" y="2731.7803">the Project is gone or exposes lifecycle state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.7861" x="747" y="2745.7803">`DELETED`.</text><?plantuml-src fLZRSXkv4Nt7Lw2SbzqKILbhUTUcIwdoIiv6jOhbihoL5rLfm1aCYNW8p08pf9bK_ZsdSPaB9KfCjlnWQW0q-dBwT3