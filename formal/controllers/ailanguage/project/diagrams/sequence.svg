 y="1779.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="120.6338" x="747" y="1793.7803">service: ailanguage</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="747" y="1807.7803">slug: project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.0342" x="747" y="1821.7803">kind: Project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="747" y="1835.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="747" y="1849.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="747" y="1863.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="747" y="1877.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="747" y="1891.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="747" y="1905.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="747" y="1919.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="747" y="1933.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="747" y="1947.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5371" x="747" y="1961.7803">display_name, freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="747" y="1975.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="747" y="1989.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="747" y="2003.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1572" x="747" y="2017.7803">list lookup: oci_ai_language_projects filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3506" x="747" y="2031.7803">compartment_id, display_name, id, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="747" y="2045.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="747" y="2059.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="747" y="2073.7803">Generated runtime uses read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.585" x="747" y="2087.7803">follow-up for create and update plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.0957" x="747" y="2101.7803">confirm-delete for delete; `CREATING` maps to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.4131" x="747" y="2115.7803">provisioning, `ACTIVE` to success, `UPDATING` to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3848" x="747" y="2129.7803">updating, and `DELETING` keeps reconcile in the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3506" x="747" y="2143.7803">terminating bucket until `DELETED` or NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.668" x="747" y="2157.7803">Pre-create lookup queries `ListProjects` with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2539" x="747" y="2171.7803">`compartmentId`, `displayName`, and an optional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5645" x="747" y="2185.7803">tracked `projectId`; delete fallback can</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6748" x="747" y="2199.7803">re-resolve the tracked project through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.8545" x="747" y="2213.7803">`ListProjects` when `GetProject` returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="65.3721" x="747" y="2227.7803">NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6201" x="747" y="2241.7803">Only `displayName`, `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="747" y="2255.7803">`freeformTags`, and `definedTags` reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9023" x="747" y="2269.7803">place. `compartmentId` remains replacement-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.0195" x="747" y="2283.7803">drift and the runtime has no secret side</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="45.1309" x="747" y="2297.7803">effects.</text><?plantuml-src fLXRSnkt6Nt7hy2aByaCLx9YEt7Muyuuaf9wejeUo-cJPhJWBfP41G9R04j6xVI_z-2s5ugqsNRo40gNxtOEplUjxODG7JDiG-sQDNedr8gsJ5fExB2pPFN3okXUDPTQQaF_rDRuhvcSQ7ZBUkb-qSgzPnjE_yBbbZjHiyDdRiK_ERruCTbankXTilwilVZn--bDfHt_-KaCRVjZyyF-AMqQRjA9vOkNpv_zj7V2kq_xpv-_k7ZvSh8VpDVQA6xenG_42ISvlUN_wBcgEIqe4vAfLSzM_FoZqN_djIDhqN3QQksM-e-99Pil_OjGocgdpIoob67Usa-DVyzVjS-m3MCeekYOSeVlJm-SOcMI_M13YfRV23MltKylsFFbA-nwazrigrusB_d5iFK4brSjQsloRn9oex_rIuw2Ecx990vwYK2CbfARsVBFpF9FlDQg5ljRttou_V3RBJTRKVE_CWKGp3UKMJfVcbtvSFcEUCoftWBHkUt5tZsmt_266cwrx9tGganBvurWAs1gp-FVnNYao32VsUqgMsYuHBP7RyVj-Kskci1DCXQB5d-UrAYaNE5ypsdY7U9CYP3nbBypJxAam-zlZVTetNTaViHVcfUY78qZ6IjyKfdk0N9we_K3_iSGzbAeXZ3fg3CW0au2Slv79m51g3_5-r1uI8-KISDPyuXTOPqbSvy-2fmkwQ_SPLyS8ZIO7Sm8IpV2MiZKCHCti9zis6zR8HqtjhnJjTvuRcnWvruq2ze8sqdsUA-WLmlONzmfwvZZtuLq3EyjMw82FWUFU6_mck4SEE6zW-x7t5yYJSTp4bBhZjPXYNR0sSlhvQVhjv_VlV_rb1h0JwZ3uNZ--veUYFi0QpgK31RZQzYY_3CaXQA-KhqDvdor8gbfeXXl4a-kmlAniE9kZkp88SJK2hF97hQ2JT81sUxK5EvOxdGsb_lg-kRwj79xyixCvVngoPb2GjXlXM8IxSiWMwpQG8gbr9wbfvJMSCTGm1HZO5nuI5WtZn7hjES9Yn_G6QgN5fPFTH336WDbBPx0KwkHN9bW7k4O3V89mNYwdUOmIjDkBGP-Rf2Z1L7kL2RxWlx-yIhz6X09dgNOva9uKz0RY-2vR0gsWsJUgSQ8rb6-PR9d8V34hh2yHl6aLuDHwESnBtmNkEsxJXima_PTuptPthIivgMVIj3xcdl7LdP1e7Ur4PttigyGhU6yrMOJJf9FF11cwPSutVG-_1B2W5TPABwB2LWo5nsIX3EB4jtJ9F94as9TnWQXEpTn0Zhwzm6nTPxeiKw0hm7GjJkLBjD4F7eXcSmFxz0EnVDRNeI-xYczhRTT9n_f9K1QvPT-EUOCoVqzm36yFuNJ22GxkbEnZdEKw1GbqECBC0KzI91dFSWyF5L-ZqkzwHLTSmcrf6iWQz5aWjA_SMsMwBFO3ZwbFr_VgHZDz4YimUH8VAhJ8r4hyv5ZyR1GxHR3WDuLu9b5ztHyzJZ4vRj54UIWs1dX9k4Ss4bH90LEWykf7IGsY3VfGVlcEkZHcoY1HOzk8ejaVfYCWeFz4MLl6CgA0sNiZDuA2o80sKL4sl-wKyXa0uzka0OZLcimhAM71xyqf_r_KzzNhHoQ_cuTdWDugpVKhJbzCeYE7nFWDG7GLs7g2WaZNPPcWOwjGhvUkQ29949UQ5Ca_ljtmbozFYCtx15LdJZBtIWxsgsv6Xi80M2-zGTDp5qae9RSxRHvA5Bp9nr02h5fhyI8Oco