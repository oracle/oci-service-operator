schemaVersion: 1
surface: repo-authored-semantics
service: ailanguage
slug: project
kind: Project
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
repoAuthored:
  listLookup:
    filters:
      - compartment_id
      - display_name
      - id
    matchRule: >-
      Adopt only a unique paginated non-DELETED ListProjects match; delete
      fallback prefers status.compartmentId and status.displayName before spec
      values and adds the tracked projectId when GetProject returns NotFound.
  mutation:
    mutable:
      - defined_tags
      - description
      - display_name
      - freeform_tags
    forceNew:
      - compartment_id
  hooks:
    create:
      - helper: CreateProject
    update:
      - helper: UpdateProject
    delete:
      - helper: DeleteProject
  followUp:
    create: GetWorkRequest -> GetProject
    update: GetWorkRequest -> GetProject
    delete: GetWorkRequest -> GetProject/ListProjects confirm-delete
notes:
  - Create, update, and delete persist the in-flight OCI work request in
    `status.async.current`, normalize AI Language `OperationStatus*` values
    into shared async classes, and normalize work-request `OperationType*`
    values into create/update/delete phases before deriving conditions and
    requeue.
  - Create recovers the Project OCID from the create response when OCI returns
    it or from work-request resources when the response omits it, then polls
    `GetProject` until the Project becomes readable. Update also gates
    completion on a succeeded work request plus a readable `GetProject`, and
    retryable 409 "currently being modified" conflicts stay in the updating
    bucket even without a work-request ID.
  - Pre-create lookup adopts only a unique paginated non-`DELETED`
    `ListProjects` match on `compartmentId` and `displayName`. Delete fallback
    reuses `status.compartmentId`, `status.displayName`, and tracked
    `projectId` when `GetProject` returns NotFound so finalizer release does
    not depend on stale spec values.
  - Only `displayName`, `description`, `freeformTags`, and `definedTags`
    reconcile in place. `compartmentId` remains replacement-only drift, so the
    live runtime never exercises provider-only `ChangeProjectCompartment`, and
    the runtime has no secret side effects.
  - Delete is not best-effort. The finalizer stays until the delete work
    request is terminal and `GetProject` or fallback `ListProjects` confirms
    the Project is gone or exposes lifecycle state `DELETED`.
