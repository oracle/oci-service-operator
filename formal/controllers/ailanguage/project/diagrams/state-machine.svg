<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1150px" preserveAspectRatio="none" style="width:3549px;height:1150px;background:#FCFCFD;" version="1.1" viewBox="0 0 3549 1150" width="3549px" zoomAndPan="magnify"><title>State Machine - ailanguage/Project</title><defs/><g><rect fill="#FCFCFD" height="1150" style="stroke:none;stroke-width:1;" width="3549" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="231.0615" x="1652.1322" y="20.7803">State Machine - ailanguage/Project</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="173" y="1007"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="173" x2="437.3643" y1="1031" y2="1031"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="278.7271" y="1022.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="178" y="1046.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="178" y="1060.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1234.36" y="850"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1239.36" y="873.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1993.32" y="850"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1998.32" y="873.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1251.88" y="985"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1256.88" y="1008.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1261.84" y="1104"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1267.7746" y="1127.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="715.44" y="961"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="720.44" y="984.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1568.56" y="940"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1573.56" y="963.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1601.23" y="779"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1606.23" y="802.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="2335.1" y="1066"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2340.1" y="1089.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3460.61" y="1014"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3465.61" y="1037.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="2960.72" y="1014"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2965.72" y="1037.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="32" id="ent0002"><ellipse cx="16" cy="1038" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2209.78,49 L2209.78,692.5 L2041.86,849.61 L2209.78,700.5 L2209.78,1023 A8,8 0 0 0 2217.78,1031 L2554.2614,1031 A8,8 0 0 0 2562.2614,1023 L2562.2614,51 L2552.2614,41 L2217.78,41 A8,8 0 0 0 2209.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2552.2614,41 L2552.2614,47 A4,4 0 0 0 2556.2614,51 L2562.2614,51 L2552.2614,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2215.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2215.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2215.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2215.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2215.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2215.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2215.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2215.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2215.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="120.6338" x="2215.78" y="182.7803">service: ailanguage</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="2215.78" y="196.7803">slug: project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.0342" x="2215.78" y="210.7803">kind: Project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2215.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2215.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2215.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2215.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2215.78" y="280.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2215.78" y="294.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9092" x="2215.78" y="308.7803">follow-up: create=GetWorkRequest -&gt; GetProject;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0127" x="2215.78" y="322.7803">update=GetWorkRequest -&gt; GetProject;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.6953" x="2215.78" y="336.7803">delete=GetWorkRequest -&gt; GetProject/ListProjects</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="2215.78" y="350.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="2215.78" y="364.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5371" x="2215.78" y="378.7803">display_name, freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2215.78" y="392.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="2215.78" y="406.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2215.78" y="420.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1572" x="2215.78" y="434.7803">list lookup: oci_ai_language_projects filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.833" x="2215.78" y="448.7803">compartment_id, display_name, id; Adopt only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.0674" x="2215.78" y="462.7803">unique paginated non-DELETED ListProjects match;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7158" x="2215.78" y="476.7803">delete fallback prefers status.compartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0674" x="2215.78" y="490.7803">status.displayName before spec values and adds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6953" x="2215.78" y="504.7803">the tracked projectId when GetProject returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="65.3721" x="2215.78" y="518.7803">NotFound.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2215.78" y="532.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2215.78" y="546.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2881" x="2215.78" y="560.7803">Create, update, and delete persist the in-flight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.0889" x="2215.78" y="574.7803">OCI work request in `status.async.current`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1777" x="2215.78" y="588.7803">normalize AI Language `OperationStatus*` values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0195" x="2215.78" y="602.7803">into shared async classes, and normalize</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0059" x="2215.78" y="616.7803">work-request `OperationType*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1914" x="2215.78" y="630.7803">create/update/delete phases before deriving</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4473" x="2215.78" y="644.7803">conditions and requeue.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3369" x="2215.78" y="658.7803">Create recovers the Project OCID from the create</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3096" x="2215.78" y="672.7803">response when OCI returns it or from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8057" x="2215.78" y="686.7803">work-request resources when the response omits</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4473" x="2215.78" y="700.7803">it, then polls `GetProject` until the Project</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.4121" x="2215.78" y="714.7803">becomes readable. Update also gates completion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.5156" x="2215.78" y="728.7803">on a succeeded work request plus a readable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.8926" x="2215.78" y="742.7803">`GetProject`, and retryable 409 "currently being</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.7959" x="2215.78" y="756.7803">modified" conflicts stay in the updating bucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.8682" x="2215.78" y="770.7803">even without a work-request ID.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.998" x="2215.78" y="784.7803">Pre-create lookup adopts only a unique paginated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.9648" x="2215.78" y="798.7803">non-`DELETED` `ListProjects` match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3301" x="2215.78" y="812.7803">`compartmentId` and `displayName`. Delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0957" x="2215.78" y="826.7803">fallback reuses `status.compartmentId`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3369" x="2215.78" y="840.7803">`status.displayName`, and tracked `projectId`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4609" x="2215.78" y="854.7803">when `GetProject` returns NotFound so finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7568" x="2215.78" y="868.7803">release does not depend on stale spec values.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6201" x="2215.78" y="882.7803">Only `displayName`, `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="2215.78" y="896.7803">`freeformTags`, and `definedTags` reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9023" x="2215.78" y="910.7803">place. `compartmentId` remains replacement-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6543" x="2215.78" y="924.7803">drift, so the live runtime never exercises</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6953" x="2215.78" y="938.7803">provider-only `ChangeProjectCompartment`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5645" x="2215.78" y="952.7803">the runtime has no secret side effects.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2215.78" y="966.7803">Delete is not best-effort. The finalizer stays</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="2215.78" y="980.7803">until the delete work request is terminal and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5166" x="2215.78" y="994.7803">`GetProject` or fallback `ListProjects` confirms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="2215.78" y="1008.7803">the Project is gone or exposes lifecycle state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.7861" x="2215.78" y="1022.7803">`DELETED`.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="127" id="ent0006"><path d="M2897.27,1097 L2897.27,1104.78 L2437.4,1088.25 L2897.27,1112.78 L2897.27,1133 A8,8 0 0 0 2905.27,1141 L3168.6138,1141 A8,8 0 0 0 3176.6138,1133 L3176.6138,1099 L3166.6138,1089 L2905.27,1089 A8,8 0 0 0 2897.27,1097" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3166.6138,1089 L3166.6138,1095 A4,4 0 0 0 3170.6138,1099 L3176.6138,1099 L3166.6138,1089" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2903.27" y="1104.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3438" x="2903.27" y="1118.7803">delete observe: GetProject or ListProjects</text><text fill="#334155" font-famil