.5918" x="204.937" y="681"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="214.937" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="309.5088" x="181.9785" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.5088" x="191.9785" y="755.7803">Delete path uses DeleteDataSafeSqlCollection</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8125" x="191.9785" y="769.7803">with required via GetDataSafeSqlCollection or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.8955" x="191.9785" y="783.7803">ListDataSafeSqlCollection to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="191.9785" y="797.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="197.168" y="831"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="207.168" y="851.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="207.168" y="865.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="180.0234" y="899"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="190.0234" y="919.7803">Requeue on provisioning, updating, terminating</text><path d="M367.7329,943 L367.7329,1119 L347.7329,1123 L367.7329,1127 L367.7329,1303 A0,0 0 0 0 367.7329,1303 L707.7729,1303 A0,0 0 0 0 707.7729,1303 L707.7729,953 L697.7729,943 L367.7329,943 A0,0 0 0