ue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="315.7437" y="1266.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="315.7437" y="1280.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="315.7437" y="1294.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="315.7437" y="1308.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="315.7437" y="1322.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="315.7437" y="1336.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="315.7437" y="1350.7803">promotion.</text><ellipse cx="278.7437" cy="1179" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="278.7437" cy="1179" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="278.7437" x2="278.7437" y1="65" y2="85"/><polygon fill="#0F172A" points="274.7437,75,278.7437,85,282.7437,75,278.7437,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="278.7437" x2="278.7437" y1="133" y2="153"/><polygon fill="#0F172A" points="274.7437,143,278.7437,153,282.7437,143,278.7437,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="278.7437" x2="278.7437" y1="201" y2="221"/><polygon fill="#0F172A" points="274.7437,211