="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="175.2476" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="306.3506" x="143.8682" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6055" x="153.8682" y="755.7803">Delete path uses DeleteDataSafeReport with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.3369" x="153.8682" y="769.7803">required via GetDataSafeReport or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3506" x="153.8682" y="783.7803">ListDataSafeReport to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="157.4785" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="167.4785" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="167.4785" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="140.334" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="150.334" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M328.0435,929 L328.0435,1105 L308.0435,1109 L328.0435,1113 L328.0435,1289 A0,0 0 0 0 328.0435,1289 L668.0835,1289 A0,0 0 0 0 668.0835,1289 L668.0835,939 L658.0835,929 L328.0435,929 A0,0 0 0 0 328.0435,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M658.0835,929 L658.0835,939 L668.0835,939 L658.0835,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#33415