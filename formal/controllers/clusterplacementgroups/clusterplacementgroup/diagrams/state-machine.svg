ht="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="3111.91" y="965"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3116.91" y="988.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="32" id="ent0002"><ellipse cx="16" cy="996" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2315.78,49 L2315.78,667.84 L2150.23,807.7 L2315.78,675.84 L2315.78,981 A8,8 0 0 0 2323.78,989 L2690.6609,989 A8,8 0 0 0 2698.6609,981 L2698.6609,51 L2688.6609,41 L2323.78,41 A8,8 0 0 0 2315.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2688.6609,41 L2688.6609,47 A4,4 0 0 0 2692.6609,51 L2698.6609,51 L2688.6609,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2321.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2321.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2321.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2321.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2321.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2321.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2321.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2321.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2321.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.7578" x="2321.78" y="182.7803">service: clusterplacementgroups</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0957" x="2321.78" y="196.7803">slug: clusterplacementgroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.8613" x="2321.78" y="210.7803">kind: ClusterPlacementGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2321.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2321.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2321.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2321.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2321.78" y="280.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2321.78" y="294.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="2321.78" y="308.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="338.1123" x="2321.78" y="322.7803">GetClusterPlacementGroup; update=GetWorkRequest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.582" x="2321.78" y="336.7803">-&gt; GetClusterPlacementGroup;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.4199" x="2321.78" y="350.7803">delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5576" x="2321.78" y="364.7803">GetClusterPlacementGroup confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="2321.78" y="378.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.248" x="2321.78" y="392.7803">freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2321.78" y="406.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.7578" x="2321.78" y="420.7803">availabilityDomain, capabilities,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.0781" x="2321.78" y="434.7803">clusterPlacementGroupType, compartmentId (+2</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2321.78" y="448.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2321.78" y="462.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="2321.78" y="476.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="361.8809" x="2321.78" y="490.7803">oci_cluster_placement_groups_cluster_placement_groups</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0059" x="2321.78" y="504.7803">filters compartmentId, name, availabilityDomain,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1299" x="2321.78" y="518.7803">id; exact compartmentId plus name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2539" x="2321.78" y="532.7803">availabilityDomain unique match with matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.8887" x="2321.78" y="546.7803">clusterPlacementGroupType in ACTIVE, INACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.1992" x="2321.78" y="560.7803">CREATING, or UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2321.78" y="574.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2321.78" y="588.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="2321.78" y="602.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7021" x="2321.78" y="616.7803">provisioning, UPDATING as updating, ACTIVE and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4199" x="2321.78" y="630.7803">INACTIVE as success, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4404" x="2321.78" y="644.7803">terminating; FAILED is terminal and DELETED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.8887" x="2321.78" y="658.7803">only a delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="2321.78" y="672.7803">Create, update, and delete responses expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4473" x="2321.78" y="686.7803">work-request headers. The runtime resumes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2607" x="2321.78" y="700.7803">through GetWorkRequest, recovers the affected</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.9854" x="2321.78" y="714.7803">ClusterPlacementGroup OCID from work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9297" x="2321.78" y="728.7803">resources when needed, and rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6885" x="2321.78" y="742.7803">GetClusterPlacementGroup before settling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9434" x="2321.78" y="756.7803">Pre-create reuse only runs when spec.name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4951" x="2321.78" y="770.7803">spec.availabilityDomain are present and keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4541" x="2321.78" y="784.7803">exact compartmentId plus name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8262" x="2321.78" y="798.7803">availabilityDomain matching bounded to ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="342.2686" x="2321.78" y="812.7803">INACTIVE, CREATING, or UPDATING summaries with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.999" x="2321.78" y="826.7803">matching clusterPlacementGroupType.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4883" x="2321.78" y="840.7803">Only description, freeformTags, and definedTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.668" x="2321.78" y="854.7803">reconcile in place; availabilityDomain,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3438" x="2321.78" y="868.7803">capabilities, clusterPlacementGroupType,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3779" x="2321.78" y="882.7803">compartmentId, name, and placementInstruction</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5576" x="2321.78" y="896.7803">remain replacement-only, and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9434" x="2321.78" y="910.7803">activate/deactivate/compartment-change helpers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.709" x="2321.78" y="924.7803">stay out of scope for the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5713" x="2321.78" y="938.7803">Delete keeps the finalizer until the work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.4814" x="2321.78" y="952.7803">request is terminal and GetClusterPlacementGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4404" x="2321.78" y="966.7803">confirms the resource is gone or returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4619" x="2321.78" y="980.7803">DELETED.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="124" id="ent0006"><path d="M3033.67,1048 L3033.67,1062.44 L2558.42,1046.14 L3033.67,1070.44 L3033.67,1098 A8,8 0 0 0 3041.67,1106 L3334.5929,1106 A8,8 0 0 0 3342.5929,1098 L3342.5929,1050 L3332.5929,1040 L3041.67,1040 A8,8 0 0 0 3033.67,1048" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3332.5929,1040 L3332.5929,1046 A4,4 0 0 0 3336.5929,1050 L3342.5929,1050 L3332.5929,1040" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="3039.67" y="1055.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="3039.67" y="1069.7803">delete observe: GetClusterPlacementGroup or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1855" x="3039.67" y="1083.7803">ListClusterPlacementGroups</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="3039.67" y="1097.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.33,996 C60.46,996 175.6,996 272.77,996" fill="none" id="*start*-to-observe" styl