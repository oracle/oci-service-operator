t="spacing" textLength="199.2334" x="792" y="2101.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="792" y="2115.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="792" y="2129.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="792" y="2143.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="792" y="2157.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.7578" x="792" y="2171.7803">service: clusterplacementgroups</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.0957" x="792" y="2185.7803">slug: clusterplacementgroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.8613" x="792" y="2199.7803">kind: ClusterPlacementGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="792" y="2213.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="792" y="2227.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="792" y="2241.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="792" y="2255.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="792" y="2269.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="792" y="2283.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="792" y="2297.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="338.1123" x="792" y="2311.7803">GetClusterPlacementGroup; update=GetWorkRequest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.582" x="792" y="2325.7803">-&gt; GetClusterPlacementGroup;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.4199" x="792" y="2339.7803">delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5576" x="792" y="2353.7803">GetClusterPlacementGroup confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="792" y="2367.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.248" x="792" y="2381.7803">freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="792" y="2395.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.7578" x="792" y="2409.7803">availabilityDomain, capabilities,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.0781" x="792" y="2423.7803">clusterPlacementGroupType, compartmentId (+2</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="792" y="2437.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="792" y="2451.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="792" y="2465.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="361.8809" x="792" y="2479.7803">oci_cluster_placement_groups_cluster_placement_groups</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0059" x="792" y="2493.7803">filters compartmentId, name, availabilityDomain,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1299" x="792" y="2507.7803">id; exact compartmentId plus name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2539" x="792" y="2521.7803">availabilityDomain unique match with matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.8887" x="792" y="2535.7803">clusterPlacementGroupType in ACTIVE, INACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.1992" x="792" y="2549.7803">CREATING, or UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="792" y="2563.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="792" y="2577.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="792" y="2591.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7021" x="792" y="2605.7803">provisioning, UPDATING as updating, ACTIVE and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4199" x="792" y="2619.7803">INACTIVE as success, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4404" x="792" y="2633.7803">terminating; FAILED is terminal and DELETED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.8887" x="792" y="2647.7803">only a delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="792" y="2661.7803">Create, update, and delete responses expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4473" x="792" y="2675.7803">work-request headers. The runtime resumes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2607" x="792" y="2689.7803">through GetWorkRequest, recovers the affected</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.9854" x="792" y="2703.7803">ClusterPlacementGroup OCID from work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9297" x="792" y="2717.7803">resources when needed, and rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6885" x="792" y="2731.7803">GetClusterPlacementGroup before settling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9434" x="792" y="2745.7803">Pre-create reuse only runs when spec.name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4951" x="792" y="2759.7803">spec.availabilityDomain are present and keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4541" x="792" y="2773.7803">exact compartmentId plus name and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8262" x="792" y="2787.7803">availabilityDomain matching bounded to ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="342.2686" x="792" y="2801.7803">INACTIVE, CREATING, or UPDATING summaries with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.999" x="792" y="2815.7803">matching clusterPlacementGroupType.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4883" x="792" y="2829.7803">Only description, freeformTags, and definedTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.668" x="792" y="2843.7803">reconcile in place; availabilityDomain,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3438" x="792" y="2857.7803">capabilities, clusterPlacementGroupType,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3779" x="792" y="2871.7803">compartmentId, name, and placementInstruction</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5576" x="792" y="2885.7803">remain replacement-only, and the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9434" x="792" y="2899.7803">activate/deactivate/compartment-change helpers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.709" x="792" y="2913.7803">stay out of scope for the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5713" x="792" y="2927.7803">Delete keeps the finalizer until the work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.4814" x="792" y="2941.7803">request is terminal and GetClusterPlacementGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4404" x="792" y="2955.7803">confirms the resource is gone or returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="68.4619" x="792" y="2969.7803">DELETED.</text><?plantuml-src lLXRRzj65dwVNp7elYIe9CUvjAaCBv3QRchKJG8xtRm824RaeJHhQeQT6KhnBlhVzviBAL8c6oT55tc8F9Tp_Suvtz3UIbK98pRShaMkTrAjU25AIyosEqkHtQwChbL-fajj-3-A3F_opecS2b6NxYUjt1kn8VupbLjoCXF3PsxaVuWVF-zi2cFqBab_KXn__xHxKsb7FzwpeIY-pxyxFALDJYQTM3v_yUp93mSdlFgq_-pPy-CNBphxGNocZIB3ZxzZJhgI-0tzNfFAY4zvLjRMaQbAaT66bFFsLFReB2w_QvPV-sMsbZdnGcktr9ywEcmZxh-CSv4vRNes9z-RhKEdwIczB9vW6y8GNba9vORlTmyyH4edBgsCKXPq9LK_gZyy5y-MBx4RlEzjPSly1HstM_Sozh8GHSR-OC4t_akz98JQaMKTE_WP336wBCdqbdyKbgufqogJXrlVlBrv-yiDcQtCw5UXn8hCDrnOtb_gNNbxTiay6hZU8jTzsPE3UwWBGpatP7LPEwdLF2qTvLAia5Dx5F-UxezCcpJFx7RLICYfXBUZj-Ds_oQfFA2MxOF5f__in6ZEIU5yJNmGXGjb6h_O_f8NqVTvpjlVZumtmBh7h7_4N-f7PivRuV3DIZYnKCF54031hxI-nNy2JYsbofae7NS6C45m00ZwL9L8KCWEH_Ke5E0T5wKXaTzXLrfdMTy4RnHEp_bhSiEQ2QsiLT8AbPPlfBLeTcC2hw1jKA9zLCWIgtQ-K9dUU5JvlSjymXLQtsIXn5R8KYnb2KtdUYEaca3pu-2keTgA9GBcVVHugGrw0Sn1bj4jK2nZ1fqX38w6dIorhdWM3l0AcF5D_EpwujNxopUllpnYi254RTZMlvgF0Gy7u5WXm90VgswBrFKm8HMtJhZQ1d4-hh5uUC8kvGbnvs5vpCYuEspdo1LOM4YpQVHjfLYeCL-1wOKQnr7CMXBKPEtyukhYQxBsELrDdBAIX0h7UI6LA3683QA6LHjWk2orhvI7fCYG0xGR1tm-A9GsrirTH53QysM27-YBN2yj93zKGJHhRwWeuDfzgH6o3MmzKg8ry2SOuq7yC8MnbUxMiaMzBryBmA6pfOAQyD_UdQTVRRg2vb9kcq1uKMY85iPJcK_53Yr-eN8Z2yTfAyfQ1CCJIiFo6i4hVKVQ3wQ-pHC_jMxggj862ETrbNjDjZO5SZtt_0gpEdylLdR2q8yp8oklPC8BGrHei_5Rx9h-JPdZIxz2V5DxS-TeFQZjgQ9TDDYoeIQMYIgkI8AAR0Xfx-ygcl1UNsIFldtADr3scAK1q3HGFjG_sN