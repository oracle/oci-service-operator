ance (+1 more)</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="808.4614" y="1358.7803">only for mutable fields</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.751" x="808.4614" y="1372.7803">capacity.capacity_value,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2266" x="808.4614" y="1386.7803">compartment_id, defined_tags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.4512" x="808.4614" y="1400.7803">description (+12 more)</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg18"><polygon fill="#0F172A" points="1081.9497,1451,1091.9497,1455,1081.9497,1459,1085.9497,1455" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="801.4614" x2="1087.9497" y1="1455" y2="1455"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="808.4614" y="1435.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="808.4614" y="1449.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg19"><polygon fill="#0F172A" points="544.8833,1500,534.8833,1504,544.8833,1508,540.8833,1504" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="538.8833" x2="800.4614" y1="1504" y2="1504"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="550.8833" y="1484.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="550.8833" y="1498.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg20"><polygon fill="#0F172A" points="306.0571,1549,296.0571,1553,306.0571,1557,302.0571,1553" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="300.0571" x2="532.8833" y1="1553" y2="1553"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.8262" x="312.0571" y="1533.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="312.0571" y="1547.7803">terminating</text></g><path d="M806,1574 L806,2352 A8,8 0 0 0 814,2360 L1146,2360 A8,8 0 0 0 1154,2352 L1154,1576 L1144,1566 L814,1566 A8,8 0 0 0 806,1574" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1144,1566 L1144,1572 A4,4 0 0 0 1148,1576 L1154,1576 L1144,1566" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="812" y="1581.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="812" y="1595.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="812" y="1609.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="812" y="1623.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="812" y="1637.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="812" y="1651.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="812" y="1665.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="812" y="1679.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="812" y="1693.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="812" y="1707.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="812" y="1721.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="812" y="1735.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="812" y="1749.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="812" y="1763.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5928" x="812" y="1777.7803">service: analytics</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0752" x="812" y="1791.7803">slug: analyticsinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4063" x="812" y="1805.7803">kind: AnalyticsInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="812" y="1819.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="812" y="1833.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="812" y="1847.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="812" y="1861.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="812" y="1875.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="812" y="1889.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0264" x="812" y="1903.7803">supported drift: capacity.capacity_value,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.1191" x="812" y="1917.7803">compartment_id, defined_tags, description (+12</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="812" y="1931.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="812" y="1945.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3711" x="812" y="1959.7803">capacity.capacity_type, feature_set, name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.4395" x="812" y="1973.7803">network_endpoint_details.network_endpoint_type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="812" y="1987.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="812" y="2001.7803">list lookup: oci_analytics_analytics_instances</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="812" y="2015.7803">filters capacity_type, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.8096" x="812" y="2029.7803">feature_set, name (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="812" y="2043.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="812" y="2057.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0264" x="812" y="2071.7803">Seeded AnalyticsInstance row covers the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2266" x="812" y="2085.7803">published API-first surface only; controller,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2471" x="812" y="2099.7803">service-manager, and registration rollout remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4951" x="812" y="2113.7803">disabled until the controller-backed promotion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="146.2822" x="812" y="2127.7803">story binds formalSpec.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1162" x="812" y="2141.7803">The provisional lifecycle mapping treats</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.9854" x="812" y="2155.7803">CREATING as provisioning, ACTIVE as success,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3369" x="812" y="2169.7803">UPDATING as updating, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5576" x="812" y="2183.7803">terminating; FAILED, INACTIVE, and DELETED stay</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3096" x="812" y="2197.7803">explicit runtime states for the later</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.875" x="812" y="2211.7803">controller-backed audit to classify.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.626" x="812" y="2225.7803">Create and delete responses expose work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9639" x="812" y="2239.7803">headers while the pinned provider implementation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3301" x="812" y="2253.7803">waits on GetWorkRequest; later runtime stories</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="812" y="2267.7803">must decide whether that remains a lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3574" x="812" y="2281.7803">contract with breadcrumbs or becomes an explicit</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="812" y="2295.7803">work-request adapter.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5576" x="812" y="2309.7803">PrivateAccessChannel, VanityUrl, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="812" y="2323.7803">WorkRequest* stay out of the initial published</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6465" x="812" y="2337.7803">surface even though the SDK and provider expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7236" x="812" y="2351.7803">those auxiliary families.</text><?plantuml-src hLXhSnkt5VsENu59lzWjILb-90urxemYAQd6gkqHdVIBPZJWBfP4ZGKs09Oqs-b_xxd0FabAKPgEPwpT1N2VvvvxGVz5cKeuKNA_5hdTAhFYXT1UCj-jB4NsPULiRV8BgwtZVoeo_Ci7Et9PY5g77wq97qGf-T-atiYWCd5ypqBzI_BJruD5uPpTDj9V5AVVlHoUD3R87mviA8hlyc_tTrcNIzViMBv-y-h5ztixI7sp_khLwzCtRmRhKNncdP6EdtxBWWfQyeNyjPOcatpAXH5w1w_yoNdxT6ry45XbQvLBNbWRblRhGAHlJ_-RSIwoODt8nCRLTcdVH_bIlYrUO1d2e4rLmeJZvuSRdY9b48PEXbQ5l55c7CJlNujNoxTO9P7LQ2bRvc_aQRTqaA2tXIWozXyMVUFlwwL4P8FqR607lu0XpcejtUZp3yBBMvbPawdzfMy-BZw-NqYtKPdyErAoakuRBZmVVneT-NXnpIZvt6wGsh7ioTuvb86JENVIMrq7PSsy-NIIAx52Jlr9Uf_sMwPjccT-isebv5B3smTFf-NnIMdo25BM1ujF_pg8qPnBW_srv0S8XCMDIwpVJwV7xivvz_pCaMuVdhFn5Zeq3igy5mwtl2Bt3aiWme3VMFi5VmHSMIgJCw433mxWm1d0G7wjDD8ISy9HCmPLjkD2Eodo7LQL3vwDjPCzs3tdFybmg5M2gpe5dK3bUQcy1viz9Em6cWwa-MU5qa4wFxypcQW43DtTXrqb9pop9K6gX89xbK_kJ255g9syzp9Ck27MU_QNKrvQ9vy_ZruxMNknHCZ8LG9BxP0cM8OKWofGAG_PTe5e17degxQsubbSv1N0GcHzSNjr_ldwmq-_BsZG7GDttCO_aeuZNXq1OOKOGtOgimqoDuA3CXpYGksZE8fbgXRU85Rc3TWku-U734ohXpO-i1tM5SgLhQwD4dVcc8-0yPqv3f-KeKP0cw7BgvkhtvkXntIqCScq50P1G5KL2jlGL1qYXAy-mcofBHN5KzBXP108UcCunLx62iPtjqj8QTQe3F00qkDswI7vgGgIMRsXea2T7KfDq6pXIQX8ri2VQ0o1zMaA4qzkrwf3TmaVFS1rPzgYcVJ9YVgqshJkam0GdOV9KkTJiGLhtvdSgI9mkH6w5j7S1eVnyneXqqGvVQyPMpgXHhIegyewO9ZNLKwQVEqAaQ5Jj8mpwwY7z1no3yCeXJwTtmUnyXDYvCofAkO45FGoSH2xbV-KMU1BMU2LbpLvDGVleC2dHcwJN_w8qiHtGtfZH6_uNuQjTL_kaPxAAjYI4soqdnqia0ZMT8AMKVbO0TjpYX_bKvPywHgZhSB01I2VYXOD9L2XfUG0AR0BhZyLcSCm4L1Yg5eeaaBVPOoMY2r_MrDJs-TLfNV06w2nEcIYYpu4amStVKZ1lMfYYusBJEZ3VNtxkJFMw1t5gJCu9RjlQliGmyfUEaOO0_2FWqm-tCHSRVXQQZ0zNmC9dcHGiRyBHTjePecXRvlNfpQFr1lUDHKQUt5BA-yIaqrhD18zRHYzc