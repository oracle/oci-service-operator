4.7803">only for mutable fields</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.751" x="808.4614" y="1358.7803">capacity.capacity_value,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2266" x="808.4614" y="1372.7803">compartment_id, defined_tags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.4512" x="808.4614" y="1386.7803">description (+14 more)</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg18"><polygon fill="#0F172A" points="1081.9497,1437,1091.9497,1441,1081.9497,1445,1085.9497,1441" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="801.4614" x2="1087.9497" y1="1441" y2="1441"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="808.4614" y="1421.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="808.4614" y="1435.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg19"><polygon fill="#0F172A" points="544.8833,1486,534.8833,1490,544.8833,1494,540.8833,1490" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="538.8833" x2="800.4614" y1="1490" y2="1490"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="550.8833" y="1470.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="550.8833" y="1484.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg20"><polygon fill="#0F172A" points="306.0571,1535,296.0571,1539,306.0571,1543,302.0571,1539" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="300.0571" x2="532.8833" y1="1539" y2="1539"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.8262" x="312.0571" y="1519.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="312.0571" y="1533.7803">terminating</text></g><path d="M806,1560 L806,2338 A8,8 0 0 0 814,2346 L1146,2346 A8,8 0 0 0 1154,2338 L1154,1562 L1144,1552 L814,1552 A8,8 0 0 0 806,1560" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1144,1552 L1144,1558 A4,4 0 0 0 1148,1562 L1154,1562 L1144,1552" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="812" y="1567.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="812" y="1581.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="812" y="1595.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="812" y="1609.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="812" y="1623.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="812" y="1637.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="812" y="1651.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="812" y="1665.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="812" y="1679.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="812" y="1693.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="812" y="1707.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="812" y="1721.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="812" y="1735.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="812" y="1749.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5928" x="812" y="1763.7803">service: analytics</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0752" x="812" y="1777.7803">slug: analyticsinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4063" x="812" y="1791.7803">kind: AnalyticsInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="812" y="1805.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="812" y="1819.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="812" y="1833.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="812" y="1847.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="812" y="1861.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="812" y="1875.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0264" x="812" y="1889.7803">supported drift: capacity.capacity_value,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.1191" x="812" y="1903.7803">compartment_id, defined_tags, description (+14</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="812" y="1917.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="812" y="1931.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0537" x="812" y="1945.7803">admin_user, capacity.capacity_type, domain_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.375" x="812" y="1959.7803">feature_bundle (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="812" y="1973.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="812" y="1987.7803">list lookup: oci_analytics_analytics_instances</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="812" y="2001.7803">filters capacity_type, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.8096" x="812" y="2015.7803">feature_set, name (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="812" y="2029.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="812" y="2043.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0264" x="812" y="2057.7803">Seeded AnalyticsInstance row covers the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2266" x="812" y="2071.7803">published API-first surface only; controller,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2471" x="812" y="2085.7803">service-manager, and registration rollout remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4951" x="812" y="2099.7803">disabled until the controller-backed promotion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="146.2822" x="812" y="2113.7803">story binds formalSpec.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1162" x="812" y="2127.7803">The provisional lifecycle mapping treats</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.9854" x="812" y="2141.7803">CREATING as provisioning, ACTIVE as success,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3369" x="812" y="2155.7803">UPDATING as updating, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5576" x="812" y="2169.7803">terminating; FAILED, INACTIVE, and DELETED stay</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3096" x="812" y="2183.7803">explicit runtime states for the later</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.875" x="812" y="2197.7803">controller-backed audit to classify.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.626" x="812" y="2211.7803">Create and delete responses expose work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9639" x="812" y="2225.7803">headers while the pinned provider implementation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3301" x="812" y="2239.7803">waits on GetWorkRequest; later runtime stories</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="812" y="2253.7803">must decide whether that remains a lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3574" x="812" y="2267.7803">contract with breadcrumbs or becomes an explicit</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="812" y="2281.7803">work-request adapter.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5576" x="812" y="2295.7803">PrivateAccessChannel, VanityUrl, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="812" y="2309.7803">WorkRequest* stay out of the initial published</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6465" x="812" y="2323.7803">surface even though the SDK and provider expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7236" x="812" y="2337.7803">those auxiliary families.</text><?plantuml-src hLXTSnkt5Nt7hy2aBtPBIbOa9murxemZAQd6gkqHdVH5Cnfm5qkYnW9R04kQxVI_zrnWiLn-ASgaemVjBe3xUUwv5_HVb6c44pNt2r7QbJ9pNWdj9VFzoamKN-REjgQyijew_gUgm5yvs57AIhGw_6HD-21goVyczL86LOZ3UwRgtvAVNGmMXNDsrKb_LPrz_-tmfB51_hXdGrLzNtwtkykwKhfkn-pYzVch7tPsaFfk_Vpyukprwy5w55zOPwJZPz-ne8AMV2h_rKfJI3xcmWYzXbV-z5r-kZK-2AooXIebhwmDC_jr8DBdq_zXd8iYMBTbOkTgNjhrKNuhtrIli0nXqAOQOSBXyyCDpv4o24ClGwjAtYcp7SGVBiJvx0rMIMIpjLJCojVoh5_QIz2RIbG5-o-Bll7txKmYia5wDh23Ny4GPxMMRklpZyBBUrbOKwZTfMy-JZ--dqgtL8NyEr8ob-uRBZpV_hHrvEFLBQFaSxj4QhTbZtREeGoSBBcJtkesA6ictQVJKeavSkfFq_juisMSqtpYb_CiePGQtXuzdPQtJqfJHf2oJR3u-A-364suDDZVIhw7G5ZSkSGs--dqjhiJtZ-_SAJRXvTiUmiTsWxAP2CSRdb5xksNG8G1lxFs2_u9k39JfcH21nuSm84pW87yscYa9UQ4esOCgcpDXNPIb6kiAXyyszPEzc3tXFyimxvM2Qxg5VG2bUUryXviTapO7JJjIVClAgM3T7xoO0hH21YwVWphHevuOMk2L0q5ZweSFPXAYj0w-UXb6753hFVYBsUyjaw-V1czThBrOeQGaQi4bjOXJR0CAGPLe5AEsNQ5Q0Ivxwksjk55NEGDm49aVNL_y-xpxOUVVr_Ge3i6xh2DVoGT1xmw0C86CORiL6PBP6uB3ifmY0kjZ-8ebgbQU8TOMNPWkuwVZncOLlTjFB8TrbNArLdNKea7SyX7mFZ178PFob0d86Ve-kRkvlTcw2aTEIQ5bi8W2AYgIc4Rcgf3XF3LHvZDjAMYU4uwd0m2GUyCfzZBMC7uxjO9ATqQbG4UG7hSpZmaFrT1CcjZgAXGP_jI4pGpF0aLoHhu4uqXi3vFOUB9rKBrwAxXemUu7amkcj4cEL6VLiliFWa0qNcOB7Kv5YkmzeCfdQe2bqkXMn7DxN0OFoyGCasKi-arsvQEg15DswQn3XZcRLEI9j-wIXJe59bnJdhg8JtxtCCmIg5Fbuz1pFs86Bbmgeav0GLT90vYz_AViWXy9YkyyhebhoRW7HJusCXLyiipKTRAFBP89VJi6H2vZvMMGaUgUMQz6UXB4-MTT-ewti_yoNT4xBZ03x8dIwBwDcYRC30OEASIHVi8L5Of5S152GGLuRau70Q5O143au572dsV7reYRlnjJLqblsiQlGQw08JvFkzSRK8mEhhfWmmhwxxScBAnAcwS5aBlxziqcmTZZLvJd7g3KsetBMmNK5ZPISSMeW3pmv2InrkMQmrVI0rUvmiWmPCCAksteSfjvIJnyNtt-jnMaJh1swuUO-VD9F8syTQuHTlGuuw_-zagAjWTRNR6gKmJyBDnTgayF0QuHgaswUd10CyeaVYMAjkf-I9mM_73esCtwVsnkV4tfHoQ7wS1EUMLipKF2ydtHjdDTGHeOSZRTPpHeiDmLtJjln7pwAyr8-e2B4qSO-l67MELoZSY58iJTYVMYEf0MMuXMT5g8