acing" textLength="156.4063" x="812" y="1947.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="812" y="1961.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="812" y="1975.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="812" y="1989.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="812" y="2003.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="812" y="2017.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.6992" x="812" y="2031.7803">emailNotification, freeformTags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="812" y="2045.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.7988" x="812" y="2059.7803">capacity.capacityType, featureSet, name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3848" x="812" y="2073.7803">networkEndpointDetails.networkEndpointType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5576" x="812" y="2087.7803">create-only fields: adminUser, domainId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9307" x="812" y="2101.7803">idcsAccessToken</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="812" y="2115.7803">list lookup: oci_analytics_analytics_instances</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="812" y="2129.7803">filters capacityType, compartmentId, featureSet,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5781" x="812" y="2143.7803">name; exact compartmentId plus name plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2744" x="812" y="2157.7803">featureSet plus capacityType unique match in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.3721" x="812" y="2171.7803">ACTIVE, CREATING, UPDATING, or INACTIVE;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="812" y="2185.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="812" y="2199.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="812" y="2213.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="812" y="2227.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7021" x="812" y="2241.7803">provisioning, UPDATING as updating, ACTIVE and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4199" x="812" y="2255.7803">INACTIVE as success, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4404" x="812" y="2269.7803">terminating; FAILED is terminal and DELETED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.8887" x="812" y="2283.7803">only a delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.626" x="812" y="2297.7803">Create and delete responses expose work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7158" x="812" y="2311.7803">headers, while UpdateAnalyticsInstance returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4951" x="812" y="2325.7803">only opc-request-id plus the resource body. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.8955" x="812" y="2339.7803">runtime records shared async breadcrumbs from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3506" x="812" y="2353.7803">lifecycle projection rather than polling</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.4961" x="812" y="2367.7803">GetWorkRequest directly.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.7578" x="812" y="2381.7803">Only description, emailNotification,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="812" y="2395.7803">licenseType, freeformTags, definedTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6533" x="812" y="2409.7803">updateChannel reconcile in place. FeatureBundle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3779" x="812" y="2423.7803">and KmsKeyId stay in required status projection,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8398" x="812" y="2437.7803">but supporting SetFeatureBundle or SetKmsKey</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8262" x="812" y="2451.7803">remains out of scope for the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6748" x="812" y="2465.7803">DomainId remains a create-time input that is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4541" x="812" y="2479.7803">read back into status. AdminUser and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0195" x="812" y="2493.7803">IdcsAccessToken are create-time inputs OCI does</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4951" x="812" y="2507.7803">not echo back, so they are normalized out of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.5098" x="812" y="2521.7803">post-create parity checks.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.8955" x="812" y="2535.7803">Required status projection keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9229" x="812" y="2549.7803">NetworkEndpointDetails, PrivateAccessChannels,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1846" x="812" y="2563.7803">VanityUrlDetails, updateChannel, featureBundle,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1846" x="812" y="2577.7803">domainId, and systemTags on the published kind,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8125" x="812" y="2591.7803">and the runtime has no secret side effects.</text><?plantuml-src nLXTSzis5dt7hy1qNz9PIexZf4tboSuujjFrn7KwjjDzySmEH88IrXJ01K0fsft-zpqN02bI7uxJFkpumHG1tCzppxsWUrIw5bOik9kBmgoKdl5IL4uorwrCHVuuiwRHnRcfZEL_ANFy5RqTXIn5K_aFHliRiP3yxx9QIgzoiN_FdVgFvCUlUul2MhDAqb-Mnp--wf_KniltEpQKvO_53zkxZ2saJJkchz-SlFnfQmUfJ-id9w-FtxpfhGVnkR5QMdxy0_FALvBVoNytKkUIZxZGebh3AtTqrZvTQUS5LjbS5PANnlYf-T8JwThJ_sMSYzmREp0nkTekRVieNyctvKiiGnYqgLfel_zyVyDpfFJ2qCceL2clbHu6yQVNucJw5giaiXuivTFYZJpkbdOIzBOKPSv-Py4t_h6PIaJMIyTwTl1p669DLKaxUFrUE7ahSwDpjRtqtQUxJn_lf5sgNFw2bCoa_OuBnuUl1aS-dLynIZutIwHsA3lREeSoiBBWLZfJDLuPFKclZWebPiYfEug_HvijepRDOxUSjH8AMS7RWwVZyl2ar4K0ATi4Yu_-relHX4kD_OtaEmY4nSabjjbFfuVkJdZt_CAIRkU_PyCjT6WObCb6EDnoYjpRBO400tvjp2F-2RWoLRfWelBSMu03Pm03-QMka9QG4uwQqQYoDHULbQ9OOrKvxzXGEzc3tHF-i_IxMYMugbFG2LIEBvHpOBD3mgwXQKUQUr6goalh9Wyw5xM0eUlxTIqpdfi58Me1-LT5zg1BANnZvPtq6TUWlE-3erOsJamH9VAEyD5OP0R68AjW1nJ78NFE4G0lTzshZAbv7XPv3NmGFv_VNfxTNzty_6rnWkuGg_qs_faCxF5g3-vgX1MoOsKjaQm10fJc4ESR5yHHB6E1y0HIMIHyNOJNXmoCgxis7jWEwqfb5wskfH8FUf-FGEw3te-OcA4aeCtGnUNrvRTcw2aTRKpoIWgD8A2GIeLjwACM4S9R5s0shGpLmNFIOQKN27eod68lGz7YlLr7fAGrWZuUm7FSJ1qaFrT1D6jZg2XHMhjI8pHRU18geZNm9nX3O7sUmaYDgxdgqBs0ZmxWUj1jqMJyywyNwQbBKz1SgMKR2185bdCmNbR5IAn0sG-wiAhqN2v5rOXWU49aU3r7y2hYcqsZ6TgSKHUwQ-hQMA2PDtL1cbnZIv7B2Or7wBt5lPYvZ85aSwjgKf9nSgAwCLwL6AZ2ArPQAKjZ5xIRl_ZhAxum5XHqA_ybSy-dj2RveY5V9k0T5FX8orNqnh6MsSP3Yjkcj8oX0wsCVRpKHMsKzXS4cSgDjrxJQHRvQsHqjKvg9bmK2wK_0p4PBmnb0ip9L96xinoWTlVcKMgM-aNBktnW4nlIxew9xUc5yFaSmKT__89nOyZMhAuQ5xRpyBGH4dwplaRUQ0KKHO54IcVdzrU_NMPi7tnGXLStSSCfAnfgR9JIS9QmWs1jMhgfVIyJE4hSWnEU-28Y2u0lK1gvVsw1zRDDU0yPRokA5BeERhH4fFzrJOcYpkgwMgDiWElPBg6URmAS7TnqCyG9DjxbejhT1mIVH0G_w0WWXASrE89fK1wenAVh0-rvVu44hawLrt9rcyzlxwQ7kxbjD9_B2YsFpu5GHnOJwxtpPTjnnx5LtQQVp-sYiKc-ImGL9f6MNzz5IXyrwAZLABMsRj8C2hO7lQtXicLGC7rjpL8v11CXocB8wEb1eqfHrU5Nf3ghPdFFJSdt3z9fxlrpK_HNfUoRfkyy4CfBQnRSpoNV6UmtbpCWXI5l5s5Y3Gx3NP4cerhCWhy4DN0yonFJsL42Kg5SJIK_PjTYZQZsbBNTjLMqcakzQOWC2QFnXoHtNJ5aBQcZwXcb0OZLI5AmpL1dWHMRSK1GhOwPiE0TJoms9Ni8khZA2Yf_5tCpMgJav5tM