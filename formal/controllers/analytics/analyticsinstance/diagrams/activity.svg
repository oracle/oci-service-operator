="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="703.0332" y="1924.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="703.0332" y="1938.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="703.0332" y="1952.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="703.0332" y="1966.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5928" x="703.0332" y="1980.7803">service: analytics</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0752" x="703.0332" y="1994.7803">slug: analyticsinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4063" x="703.0332" y="2008.7803">kind: AnalyticsInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="703.0332" y="2022.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="703.0332" y="2036.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="703.0332" y="2050.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="703.0332" y="2064.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="703.0332" y="2078.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="703.0332" y="2092.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0264" x="703.0332" y="2106.7803">supported drift: capacity.capacity_value,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.1191" x="703.0332" y="2120.7803">compartment_id, defined_tags, description (+12</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="703.0332" y="2134.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="703.0332" y="2148.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3711" x="703.0332" y="2162.7803">capacity.capacity_type, feature_set, name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.4395" x="703.0332" y="2176.7803">network_endpoint_details.network_endpoint_type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="703.0332" y="2190.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="703.0332" y="2204.7803">list lookup: oci_analytics_analytics_instances</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="703.0332" y="2218.7803">filters capacity_type, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.8096" x="703.0332" y="2232.7803">feature_set, name (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="703.0332" y="2246.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="703.0332" y="2260.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0264" x="703.0332" y="2274.7803">Seeded AnalyticsInstance row covers the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2266" x="703.0332" y="2288.7803">published API-first surface only; controller,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2471" x="703.0332" y="2302.7803">service-manager, and registration rollout remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4951" x="703.0332" y="2316.7803">disabled until the controller-backed promotion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="146.2822" x="703.0332" y="2330.7803">story binds formalSpec.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1162" x="703.0332" y="2344.7803">The provisional lifecycle mapping treats</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.9854" x="703.0332" y="2358.7803">CREATING as provisioning, ACTIVE as success,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3369" x="703.0332" y="2372.7803">UPDATING as updating, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5576" x="703.0332" y="2386.7803">terminating; FAILED, INACTIVE, and DELETED stay</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3096" x="703.0332" y="2400.7803">explicit runtime states for the later</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.875" x="703.0332" y="2414.7803">controller-backed audit to classify.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.626" x="703.0332" y="2428.7803">Create and delete responses expose work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9639" x="703.0332" y="2442.7803">headers while the pinned provider implementation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3301" x="703.0332" y="2456.7803">waits on GetWorkRequest; later runtime stories</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="703.0332" y="2470.7803">must decide whether that remains a lifecycle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3574" x="703.0332" y="2484.7803">contract with breadcrumbs or becomes an explicit</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="703.0332" y="2498.7803">work-request adapter.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5576" x="703.0332" y="2512.7803">PrivateAccessChannel, VanityUrl, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="703.0332" y="2526.7803">WorkRequest* stay out of the initial published</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6465" x="703.0332" y="2540.7803">surface even though the SDK and provider expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7236" x="703.0332" y="2554.7803">those auxiliary families.</text