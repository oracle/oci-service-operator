xt fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1031.0732" y="1403.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="984.4268,1479,996.4268,1491,984.4268,1503,972.4268,1491,984.4268,1479" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.5537" x="837.6499" y="1523"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="847.6499" y="1543.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="847.6499" y="1557.7803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="847.6499" y="1571.7803">matching field-driven path executes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8613" x="840.9961" y="1605"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8613" x="850.9961" y="1625.7803">Return success for the ACTIVE, INACTIVE</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8135" x="850.9961" y="1639.7803">success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="844.8618" y="1673"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="854.8618" y="1693.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="854.8618" y="1707.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="827.7173" y="1741"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="837.7173" y="1761.7803">Requeue on provisioning, updating, terminating</text><path d="M693.0854,1797 L693.0854,2232 L673.0854,2236 L693.0854,2240 L693.0854,2675 A0,0 0 0 0 693.0854,2675 L1030.7876,2675 A0,0 0 0 0 1030.7876,2675 L1030.7876,1807 L1020.7876,1797 L693.0854,1797 A0,0 0 0 0 693.0854,1797" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1020.7876,1797 L1020.7876,1807 L1030.7876,1807 L1020.7876,1797" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="699.0854" y="1812.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="699.0854" y="1826.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="699.0854" y="1840.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="699.0854" y="1854.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="699.0854" y="1868.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="699.0854" y="1882.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="699.0854" y="1896.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="699.0854" y="1910.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="699.0854" y="1924.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="699.0854" y="1938.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="699.0854" y="1952.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5928" x="699.0854" y="1966.7803">service: analytics</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0752" x="699.0854" y="1980.7803">slug: analyticsinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4063" x="699.0854" y="1994.7803">kind: AnalyticsInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="699.0854" y="2008.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="699.0854" y="2022.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="699.0854" y="2036.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="699.0854" y="2050.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="699.0854" y="2064.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="699.0854" y="2078.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="699.0854" y="2092.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.6992" x="699.0854" y="2106.7803">emailNotification, freeformTags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="699.0854" y="2120.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.7988" x="699.0854" y="2134.7803">capacity.capacityType, featureSet, name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3848" x="699.0854" y="2148.7803">networkEndpointDetails.networkEndpointType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5576" x="699.0854" y="2162.7803">create-only fields: adminUser, domainId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9307" x="699.0854" y="2176.7803">idcsAccessToken</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="699.0854" y="2190.7803">list lookup: oci_analytics_analytics_instances</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="699.0854" y="2204.7803">filters capacityType, compartmentId, featureSet,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5781" x="699.0854" y="2218.7803">name; exact compartmentId plus name plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2744" x="699.0854" y="2232.7803">featureSet plus capacityType unique match in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.3721" x="699.0854" y="2246.7803">ACTIVE, CREATING, UPDATING, or INACTIVE;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="699.0854" y="2260.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="699.0854" y="2274.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="699.0854" y="2288.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="699.0854" y="2302.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7021" x="699.0854" y="2316.7803">provisioning, UPDATING as updating, ACTIVE and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4199" x="699.0854" y="2330.7803">INACTIVE as success, and DELETING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4404" x="699.0854" y="2344.7803">terminating; FAILED is terminal and DELETED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.8887" x="699.0854" y="2358.7803">only a delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.626" x="699.0854" y="2372.7803">Create and delete responses expose work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7158" x="699.0854" y="2386.7803">headers, while UpdateAnalyticsInstance returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4951" x="699.0854" y="2400.7803">only opc-request-id plus the resource body. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.8955" x="699.0854" y="2414.7803">runtime records shared async breadcrumbs from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3506" x="699.0854" y="2428.7803">lifecycle projection rather than polling</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.4961" x="699.0854" y="2442.7803">GetWorkRequest directly.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.7578" x="699.0854" y="2456.7803">Only description, emailNotification,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="699.0854" y="2470.7803">licenseType, freeformTags, definedTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6533" x="699.0854" y="2484.7803">updateChannel reconcile in place. FeatureBundle</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3779" x="699.0854" y="2498.7803">and KmsKeyId stay in required status projection,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8398" x="699.0854" y="2512.7803">but supporting SetFeatureBundle or SetKmsKey</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8262" x="699.0854" y="2526.7803">remains out of scope for the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.6748" x="699.0854" y="2540.7803">DomainId remains a create-time input that is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4541" x="699.0854" y="2554.7803">read back into status. AdminUser and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0195" x="699.0854" y="2568.7803">IdcsAccessToken are create-time inputs OCI does</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4951" x="699.0854" y="2582.7803">not echo back, so they are normalized out of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.5098" x="699.0854" y="2596.7803">post-create parity checks.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.8955" x="699.0854" y="2610.7803">Required status projection keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9229" x="699.0854" y="2624.7803">NetworkEndpointDetails, PrivateAccessChannels,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1846" x="699.0854" y="2638.7803">VanityUrlDetails, updateChannel, featureBundle,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1846" x="699.0854" y="2652.7803">domainId, and systemTags on the published kind,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8125" x="699.0854" y="2666.7803">and the runtime has no secret side effects.</text><ellipse cx="662.0854" cy="2236" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="662.0854" cy="2236" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="662.0854" x2="662.0854" y1="157" y2="177"/><polygon fill="#0F172A" points="658.0854,167,662.0854,177,666.0854,167,662.0854,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="813.5513" x2="813.5513" y1="341" y2="361"/><polygon fill="#0F172A" points="809.5513,351,813.5513,361,817.5513,351,813.5513,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="813.5513" x2="813.5513" y1="423" y2="443"/><polygon fill="#0F172A" points="809.5513,433,813.5513,443,817.5513,433,813.5513,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="520.6196" x2="510.6196" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="510.6196" x2="510.6196" y1="257" y2="279"/><polygon fill="#0F172A" points="506.6196,269,510.6196,279,514.6196,269,510.6196,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="803.5513" x2="813.5513" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="813.5513" x2="813.5513" y1="257" y2="279"/><polygon fill="#0F172A" points="809.5513,269,813.5513,279,817.5513,269,813.5513,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="510.6196" x2="510.6196" y1="327" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="510.6196" x2="650.0854" y1="509" y2="509"/><polygon fill="#0F172A" points="640.0854,505,650.0854,509,640.0854,513,644.0854,509" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="813.5513" x2="813.5513" y1="491" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="813.5513" x2="674.0854" y1="509" y2="509"/><polygon fill="#0F172A" points="684.0854,505,674.0854,509,684.0854,513,680.0854,509" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="662.0854" x2="662.0854" y1="225" y2="245"/><polygon fill="#0F172A" points="658.0854,235,662.0854,245,666.0854,235,662.0854,239" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="662.0854" x2="662.0854" y1="65" y2="109"/><polygon fill="#0F172A" points="658.085