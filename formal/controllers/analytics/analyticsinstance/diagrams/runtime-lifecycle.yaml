schemaVersion: 1
surface: repo-authored-semantics
service: analytics
slug: analyticsinstance
kind: AnalyticsInstance
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
repoAuthored:
  providerLifecycle:
    createPending:
      - CREATING
    updatePending:
      - UPDATING
    deletePending:
      - DELETING
  listLookup:
    filters:
      - capacityType
      - compartmentId
      - featureSet
      - name
    matchRule: exact compartmentId plus name plus featureSet plus capacityType unique match in ACTIVE, CREATING, UPDATING, or INACTIVE; duplicate matches fail
  mutation:
    mutable:
      - definedTags
      - description
      - emailNotification
      - freeformTags
      - licenseType
      - updateChannel
    forceNew:
      - capacity.capacityType
      - featureSet
      - name
      - networkEndpointDetails.networkEndpointType
    createOnly:
      - adminUser
      - domainId
      - idcsAccessToken
notes:
  - Reviewed lifecycle mapping treats CREATING as provisioning, UPDATING as updating, ACTIVE and INACTIVE as success, and DELETING as terminating; FAILED is terminal and DELETED is only a delete-confirmation target.
  - Create and delete responses expose work-request headers, while UpdateAnalyticsInstance returns only opc-request-id plus the resource body. The runtime records shared async breadcrumbs from lifecycle projection rather than polling GetWorkRequest directly.
  - Only description, emailNotification, licenseType, freeformTags, definedTags, and updateChannel reconcile in place. FeatureBundle and KmsKeyId stay in required status projection, but supporting SetFeatureBundle or SetKmsKey remains out of scope for the published runtime.
  - DomainId remains a create-time input that is read back into status. AdminUser and IdcsAccessToken are create-time inputs OCI does not echo back, so they are normalized out of post-create parity checks.
  - Required status projection keeps NetworkEndpointDetails, PrivateAccessChannels, VanityUrlDetails, updateChannel, featureBundle, domainId, and systemTags on the published kind, and the runtime has no secret side effects.
