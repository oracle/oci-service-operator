etica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="370.6157" y="1098.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.5166" x="370.6157" y="1112.7803">service: datacatalog</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.1025" x="370.6157" y="1126.7803">slug: datacatalogmetastore</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.4268" x="370.6157" y="1140.7803">kind: DatacatalogMetastore</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="370.6157" y="1154.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="370.6157" y="1168.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="370.6157" y="1182.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="370.6157" y="1196.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="370.6157" y="1210.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="370.6157" y="1224.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="370.6157" y="1238.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="370.6157" y="1252.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="370.6157" y="1266.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="370.6157" y="1280.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="370.6157" y="1294.7803">promotion.</text><ellipse cx="333.6157" cy="1123" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="333.6157" cy="1123" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="333.6157" x2="333.6157" y1="65" y2="85"/><polygon fill="#0F172A" points="329.6157,75,333.6157,85,337.6157,75,333.6157,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="333.6157" x2="333.6157" y1="133" y2="153"/><polygon fill="#0F172A" points="329.6157,143,333.6157,153,337.6157,143,333.6157,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="333.6157" x2="333.6157" y1="201" y2="221"/><polygon fill="#0F172A" points="329.6157,211,333.6157,221,337.6157,211,333.6157,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="333.6157" x2="333.6157" y1="269" y2="289"/><polygon fill="#0F172A" points="329.6157,279,333.6157,289,337.6157,279,333.6157,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="168.0889" x2="168.0889" y1="439" y2="459"/><polygon fill="#0F172A" points="164.0889,449,168.0889,459,172.0889,449,168.0889,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="267.9263" x2="168.0889" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="168.0889" x2="168.0889" y1="383" y2="405"/><polygon fill="#0F172A" points="16