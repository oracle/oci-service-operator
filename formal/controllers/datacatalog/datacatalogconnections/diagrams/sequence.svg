: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="783" y="1046.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="783" y="1060.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="783" y="1074.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.5166" x="783" y="1088.7803">service: datacatalog</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5713" x="783" y="1102.7803">slug: datacatalogconnections</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.0059" x="783" y="1116.7803">kind: DatacatalogConnections</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="783" y="1130.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="783" y="1144.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="783" y="1158.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="783" y="1172.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="783" y="1186.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="783" y="1200.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="783" y="1214.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="783" y="1228.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="783" y="1242.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="783" y="1256.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="783" y="1270.7803">promotion.</text><?plantuml-src fLRlRzis4FtEl-BGVMa1AqwQf4qLRC2QT6tGB2dgTPyC53HvaebGf4PIyR9X__kE-cN9iRAjG-305e-FxzsxEz7VALDonmlmQoxjHfaSCguzCj-lhBYuovsjZBomsZhuBXFq9mSH4ZDUwV2JDU665mWVKDzZK8BlZrceFn2EJWQBt3cxQT4FiwFNBuSxZGtuzX67B7ijN-r6MIVHjH6hazFZmpSx4V7uTltu-EJez7ImNiCBwmmwE7h5WWeQOO6_LMW4GWAI1oxeesq-lzn-lx36e0ZA6i_MIY9areQL_Ns0x3kGFna05y6w4TDMSRUqAnLVubbsICi4HabL9JTX__vXmBz16MIZnz0gmsjbnhbySyAFLsUq6Y7BqP9OoLCywfSU-NIMyKomlrYj3JvMAwG41_Him0CeXy5PhT6D7h_b7Z-Zi4QetQLdjulRZmjqzqhWpzpm7Dqpu1x6ZqPRRY-kMAm1iFVay1XxjhEFki6X18VUwYfwcxQFvbBnd3pry-PtiWr9EfiF_7tU8KZKf7PoTxCyteb6rhNAjic2v8T1Zb90G_4LmluoN1hN2MFRNH5ZB3g5_ljp5nduy8ADG-AcSMfIwC59d5UaOcacsc6yCsAH1ocynp2nmPQ12j3JFsllgZAE8Xt7pnJIDSNkXtgUAHtG-NHfX2rY6HHembSbP-033_Y24G0aU-GLF8Xrd8CYfgr60nMmyD4OndK0uP37CdAmKkHLoSDwYk157JgXbaIM7LX9uF7GJvzlVxrQNDtUNDsy_-_vYmoHfZTKfMmfIgUoy2J7BtNiKnnRj8xZbq-NF_xoxVpe4trkIX_QmaCvXNPPnpr5hqMYgioK8_kYOvVlhjzz4qVAsT9CrrKlOHTtJtV5Gglyzr5XR9FPalWPhkdjv-XXuCeabGbA9otpVXuyQiATzgzpHkrFEajdxvKdPcJCh34gVbiQAlw2Jek_cgddLBuEO3FOF-hQoVJ_vjm_ekoRTuj0tGcPimM4DSAZqRjzVMRMnRQzhFkk5XpVoTvMZXPBdjTwhPa19uEQnagiIzhobSgNiRSFs3L_eAmE3clPzmTjrcYWDukHMJGyQkGzjJQ3ZNLtILl8h2IJQcxKV0ia5ZGmD793uuoNfNuuOD