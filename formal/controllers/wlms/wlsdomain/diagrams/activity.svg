" x="824.6885" y="1515.7803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="826.7334" y="1549"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="836.7334" y="1569.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="836.7334" y="1583.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="809.5889" y="1617"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="819.5889" y="1637.7803">Requeue on provisioning, updating, terminating</text><path d="M684.0212,1673 L684.0212,2045 L664.0212,2049 L684.0212,2053 L684.0212,2425 A0,0 0 0 0 684.0212,2425 L1033.406,2425 A0,0 0 0 0 1033.406,2425 L1033.406,1683 L1023.406,1673 L684.0212,1673 A0,0 0 0 0 684.0212,1673" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1023.406,1673 L1023.406,1683 L1033.406,1683 L1023.406,1673" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="690.0212" y="1688.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="690.0212" y="1702.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="690.0212" y="1716.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="690.0212" y="1730.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="690.0212" y="1744.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="690.0212" y="1758.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="690.0212" y="1772.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="690.0212" y="1786.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="690.0212" y="1800.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="690.0212" y="1814.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="690.0212" y="1828.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0068" x="690.0212" y="1842.7803">service: wlms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="99.5996" x="690.0212" y="1856.7803">slug: wlsdomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.0273" x="690.0212" y="1870.7803">kind: WlsDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="690.0212" y="1884.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="690.0212" y="1898.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="690.0212" y="1912.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="690.0212" y="1926.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="690.0212" y="1940.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="690.0212" y="1954.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1641" x="690.0212" y="1968.7803">supported drift: configuration, definedTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.248" x="690.0212" y="1982.7803">freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="690.0212" y="1996.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2402" x="690.0212" y="2010.7803">compartmentId, displayName, id, middlewareType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="690.0212" y="2024.7803">(+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="690.0212" y="2038.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6475" x="690.0212" y="2052.7803">list lookup: oci_wlms_wls_domains filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2402" x="690.0212" y="2066.7803">compartmentId, displayName, id, middlewareType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.623" x="690.0212" y="2080.7803">(+1 more); exact id or exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2744" x="690.0212" y="2094.7803">displayName plus optional middlewareType and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0195" x="690.0212" y="2108.7803">weblogicVersion unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.1992" x="690.0212" y="2122.7803">CREATING, or UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="690.0212" y="2136.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="690.0212" y="2150.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.8955" x="690.0212" y="2164.7803">WLMS does not expose CreateWlsDomain in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.8125" x="690.0212" y="2178.7803">v65.110.0, so the published runtime is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1572" x="690.0212" y="2192.7803">bind/manage-existing only. Untracked reconciles</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="690.0212" y="2206.7803">must resolve an existing domain by explicit</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="690.0212" y="2220.7803">spec.id or by an exact unique list match before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.4883" x="690.0212" y="2234.7803">any update or delete can proceed.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="690.0212" y="2248.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="690.0212" y="2262.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5645" x="690.0212" y="2276.7803">success, DELETING as terminating, and FAILED or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6201" x="690.0212" y="2290.7803">NEEDS_ATTENTION as terminal failure.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2539" x="690.0212" y="2304.7803">UpdateWlsDomain only reconciles configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4746" x="690.0212" y="2318.7803">and tag fields. ChangeWlsDomainCompartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6748" x="690.0212" y="2332.7803">remains out of scope, so compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="328.3848" x="690.0212" y="2346.7803">displayName, middlewareType, and weblogicVersion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4268" x="690.0212" y="2360.7803">stay bind-only replacement drift.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7646" x="690.0212" y="2374.7803">DeleteWlsDomain returns no work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2197" x="690.0212" y="2388.7803">identifier. The runtime relies on GetWlsDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.1992" x="690.0212" y="2402.7803">or ListWlsDomains rereads to confirm DELETED or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5234" x="690.0212" y="2416.7803">NOT_FOUND before finalizer release.</text><ellipse cx="653.0212" cy="2049" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="653.0212" cy="2049" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="653.0212" x2="653.0212" y1="157" y2="177"/><polygon fill="#0F172A" points="649.0212,167,653.0212,177,657.0212,167,653.0212,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="817.1519" x2="817.1519" y1="341" y2="361"/><polygon fill="#0F172A" points="813.1519,351,817.1519,361,821.1519,351,817.1519,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="511.5554" x2="488.8906" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="488.8906" x2="488.8906" y1="257" y2="279"/><polygon fill="#0F172A" points="484.8906,269,488.8906,279,492.8906,269,488.8906,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="794.4871" x2="817.1519" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="817.1519" x2="817.1519" y1="257" y2="279"/><polygon fill="#0F172A" points="813.1519,269,817.1519,279,821.1519,269,817.1519,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="488.8906" x2="488.8906" y1="313" y2="427"/><line style="stroke:#0F172A;stroke-width:1;" x1="488.8906" x2="641.0212" y1="427" y2="427"/><polygon fill="#0F1