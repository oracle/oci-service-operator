ngth="263.0195" x="750.2205" y="1033.7803">weblogicVersion unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4131" x="750.2205" y="1047.7803">CREATING, or UPDATING; duplicate matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="17.8965" x="750.2205" y="1061.7803">fail</text><path d="M438.4805,1082 L497.2461,1082 L497.2461,1088 L487.2461,1098 L430.4805,1098 L430.4805,1090 A8,8 0 0 1 438.4805,1082" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="44" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="421.7983" x="430.4805" y="1082"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="445.4805" y="1093.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="276.1309" x="512.2461" y="1094.7803">[force-new or conflicting drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg13"><polygon fill="#0F172A" points="507.5044,1114,497.5044,1118,507.5044,1122,503.5044,1118" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="501.5044" x2="763.0825" y1="1118" y2="1118"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1855" x="513.5044" y="1112.7803">reject before OCI mutation</text></g><path d="M673.8862,1140 L732.6519,1140 L732.6519,1146 L722.6519,1156 L665.8862,1156 L665.8862,1148 A8,8 0 0 1 673.8862,1140" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="144" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="409.854" x="665.8862" y="1140"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="680.8862" y="1151.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4619" x="747.6519" y="1152.7803">[supported mutable drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg14"><polygon fill="#0F172A" points="1024.2954,1214,1034.2954,1218,1024.2954,1222,1028.2954,1218" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="764.0825" x2="1030.2954" y1="1218" y2="1218"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2129" x="771.0825" y="1170.7803">Apply ChangeWlsDomainCompartment,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2061" x="771.0825" y="1184.7803">UpdateWlsDomain only for mutable</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4609" x="771.0825" y="1198.7803">fields configuration, definedTags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.248" x="771.0825" y="1212.7803">freeformTags</text></g><path d="M683.8862,1233 L750.4312,1233 L750.4312,1239 L740.4312,1249 L675.8862,1249 L675.8862,1241 A8,8 0 0 1 683.8862,1233" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="44" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="389.854" x="675.8862" y="1233"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="29.5449" x="690.8862" y="1244.7803">loop</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="190.5381" x="765.4312" y="1245.7803">[update pending UPDATING]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg15"><polygon fill="#0F172A" points="1024.2954,1265,1034.2954,1269,1024.2954,1273,1028.2954,1269" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="764.0825" x2="1030.2954" y1="1269" y2="1269"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.1309" x="771.0825" y="1263.7803">GetWlsDomain</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg16"><polygon fill="#0F172A" points="1024.2954,1335,1034.2954,1339,1024.2954,1343,1028.2954,1339" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="764.0825" x2="1030.2954" y1="1339" y2="1339"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="771.0825" y="1305.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="771.0825" y="1319.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="771.0825" y="1333.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg17"><polygon fill="#0F172A" points="507.5044,1384,497.5044,1388,507.5044,1392,503.5044,1388" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="501.5044" x2="763.0825" y1="1388" y2="1388"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="513.5044" y="1368.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="513.5044" y="1382.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg18"><polygon fill="#0F172A" points="268.6782,1433,258.6782,1437,268.6782,1441,264.6782,1437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="262.6782" x2="495.5044" y1="1437" y2="1437"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.8262" x="274.6782" y="1417.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="274.6782" y="1431.7803">terminating</text></g><path d="M769,1458 L769,2236 A8,8 0 0 0 777,2244 L1110,2244 A8,8 0 0 0 1118,2236 L1118,1460 L1108,1450 L777,1450 A8,8 0 0 0 769,1458" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1108,1450 L1108,1456 A4,4 0 0 0 1112,1460 L1118,1460 L1108,1450" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="775" y="1465.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="775" y="1479.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="775" y="1493.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="775" y="1507.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="775" y="1521.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="775" y="1535.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="775" y="1549.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="775" y="1563.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="775" y="1577.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="775" y="1591.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="775" y="1605.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="775" y="1619.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="775" y="1633.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="775" y="1647.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0068" x="775" y="1661.7803">service: wlms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="99.5996" x="775" y="1675.7803">slug: wlsdomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.0273" x="775" y="1689.7803">kind: WlsDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="775" y="1703.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="775" y="1717.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="775" y="1731.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="775" y="1745.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="775" y="1759.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="775" y="1773.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1641" x="775" y="1787.7803">supported drift: configuration, definedTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.248" x="775" y="1801.7803">freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="775" y="1815.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2402" x="775" y="1829.7803">compartmentId, displayName, id, middlewareType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="775" y="1843.7803">(+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="775" y="1857.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6475" x="775" y="1871.7803">list lookup: oci_wlms_wls_domains filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2402" x="775" y="1885.7803">compartmentId, displayName, id, middlewareType</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.623" x="775" y="1899.7803">(+1 more); exact id or exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2744" x="775" y="1913.7803">displayName plus optional middlewareType and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0195" x="775" y="1927.7803">weblogicVersion unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.1992" x="775" y="1941.7803">CREATING, or UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="775" y="1955.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="775" y="1969.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.8955" x="775" y="1983.7803">WLMS does not expose CreateWlsDomain in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.8125" x="775" y="1997.7803">v65.110.0, so the published runtime is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1572" x="775" y="2011.7803">bind/manage-existing only. Untracked reconciles</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="775" y="2025.7803">must resolve an existing domain by explicit</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="775" y="2039.7803">spec.id or by an exact unique list match before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.4883" x="775" y="2053.7803">any update or delete can proceed.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="775" y="2067.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="775" y="2081.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5645" x="775" y="2095.7803">success, DELETING as terminating, and FAILED or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6201" x="775" y="2109.7803">NEEDS_ATTENTION as terminal failure.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2539" x="775" y="2123.7803">UpdateWlsDomain only reconciles configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4746" x="775" y="2137.7803">and tag fields. ChangeWlsDomainCompartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6748" x="775" y="2151.7803">remains out of scope, so compartmentId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="328.3848" x="775" y="2165.7803">displayName, middlewareType, and weblogicVersion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4268" x="775" y="2179.7803">stay bind-only replacement drift.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7646" x="775" y="2193.7803">DeleteWlsDomain returns no work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2197" x="775" y="2207.7803">identifier. The runtime relies on GetWlsDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.1992" x="775" y="2221.7803">or ListWlsDomains rereads to confirm DELETED or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5234" x="775" y="2235.7803">NOT_FOUND before finalizer release.</text><?plantuml-src lLXhRnit5ltENq5qloIe9DjDdAOAie1hEwrHrrx4Ill5G43DS2Gs779ASgIeY_tlUouvJybEZDt5meWjpLpUrpdtmVXFobJ2YPBxjSZjLfaLBuJsaldkpL9adrRErYO_jzew_hSYmqy-aCXb8MeTtbaJRaGf-SzIRsHGcNXOvaxz9Vd9oy5BuPpTDjgFYvFllnkUD3R87mzyA8hlyrVxKjRbqZKIovUdBuv_s9CWyytx5ozUdfoU3jv7zPbrHZf-yee55RJaT_BFMffCyYdVwj8V_QxzXIs5CcojSiaBQyFIVXveyUs1VpBEHHQi6tdLHDU-sWzBVYTV5yTu3ML8eAg42G-V7meyHSiWyaw7LeMyLcQSjnzUYXVBrtXBAglHgsoPdygJxjK19gyBKMJiNop6nd-fbnB93DApWH_y78uugxLqeyS_2Y_VoyoQJEs_-kRsxlQNE-asAfE_2YDMqdt3XUVZHwCZj-TNZF3cTWCqnxedU-V0V2TpxgItkWxAcddpw2XNOWLC_L7wFkr5fYtCCxzPjHfogH7jewVJw_59QVB8IzOdYq__FiZHd4i3-LhoZddmj0c5zN9qQXpcd7UVdpcowSDpDXQXG-Dap7lb2CSh2gkdV8ITNrlx2Ny4N5ygapEX0myEP80iO9UVAmqO8WOSDM9GI3ikj9CYt-6jyi6piLNo0z9p_fCClJM9DjGfxXGfpqlbFHhLOqgkOQ7JufyLIWVf_FpUPBOaZfJGT9LFUAvyfSMEEjO4-YVtfbHvhkKMQ2rsbUJFlZtXfNNo-VC3Kmzaku8HM4uysi3bKVo0pGSHQa-GnvGbEl066fatsRs8Zn-BBRtjS_I86Bmgb2jR6nibHga5JFTcd2QchQrQ-Ge-qYIukBo-N5pT_FGKk0ZwFPLjf9cMmY0qI1JA28tsxn0tdW9WuBdKbZ1-IfAT36IhyPCoAYCHyTpj4cEQTmGsFg1MkLrwQ7wgWUHMxwWeG9z3hJ6w-8-C4jR96yGJdH5BBPzcC9NtTaqrHtgSZEa3PUxD-VlBCq9WmZ_yuwBvrA4IBMkrQHD1gb2n7ivBdKy54VdUv4uLWSkDqBM8ZZSyYu_NI9wcMkgRvTZd2NNIkxggh0D7ULtbPCdNhX2PR8YsgbtKF64OyXWd-KAi_8GNJih2kfA-iVVo3va5lgGdafSrEJp7-7IPd1gvJIvxzfKIPOzLA6kQKbliVAo8xIlYXuhOI54fGhP6Oj1_FsESuKpgRVWyTf9NklP3H-C3PYlAYD3xXf1ljfLW_4fblr7703zhey21P98QnTdvukgtomdhmOVf5lytFA-fmH8CyGJ6Qo6KxaS9J0yIYwC44au4Akd41f0q1vspyDIY689778q0jbL01dr74NgrfF7nLKjD5pchAhtZvw3YgkzivtsEqPW_HDeDUet12JZJ6hitYJzxVEH3Fa9cICZOxnewj_skpV7JnbDJ_u_8kjhmjTIO2dmDIlbxauoz3GLDY1hup59OxvklRr2hiSiCHLB3RqKUDFW0O6dKl6qQ0esshf-zJIrqMcCkwMapABhj91hONnBs5fAsOu6vbRCRHHn6zYOfc_Jftg08IrWCNMjnQhKEt1RyuUMhsPN-kythgreUsi3k0cY6NcLB7jQI7oo3_K8FwZ10Un6tdXWmmXK966pQgnWliOvgFCEw0rFMJHkEKOUWSfsnQx53LWV6scdM6jgkfUa740DWj4GaFZTJAABMcDjQzsdQh16i0