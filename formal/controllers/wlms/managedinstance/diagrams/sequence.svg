95" y="1071.7803">delete=none</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg14"><polygon fill="#0F172A" points="460.8628,1108,450.8628,1112,460.8628,1116,456.8628,1112" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="454.8628" x2="710.9995" y1="1112" y2="1112"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2334" x="466.8628" y="1106.7803">status=required, finalizer=none</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg15"><polygon fill="#0F172A" points="308.4155,1143,298.4155,1147,308.4155,1151,304.4155,1147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="302.4155" x2="448.8628" y1="1147" y2="1147"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4473" x="314.4155" y="1141.7803">requeue on updating</text></g><path d="M716,1168 L716,1862 A8,8 0 0 0 724,1870 L1051,1870 A8,8 0 0 0 1059,1862 L1059,1170 L1049,1160 L724,1160 A8,8 0 0 0 716,1168" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1049,1160 L1049,1166 A4,4 0 0 0 1053,1170 L1059,1170 L1049,1160" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="722" y="1175.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="722" y="1189.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="722" y="1203.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="722" y="1217.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="722" y="1231.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="722" y="1245.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="722" y="1259.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="722" y="1273.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="722" y="1287.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="722" y="1301.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="722" y="1315.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="722" y="1329.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="722" y="1343.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="722" y="1357.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0068" x="722" y="1371.7803">service: wlms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="722" y="1385.7803">slug: managedinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7646" x="722" y="1399.7803">kind: ManagedInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="722" y="1413.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="722" y="1427.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.875" x="722" y="1441.7803">requeue: updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="722" y="1455.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="722" y="1469.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1914" x="722" y="1483.7803">follow-up: create=none; update=next reconcile</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.2568" x="722" y="1497.7803">GetManagedInstance confirmation; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.4404" x="722" y="1511.7803">supported drift: configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="722" y="1525.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.585" x="722" y="1539.7803">compartmentId, displayName, id, pluginStatus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="722" y="1553.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0332" x="722" y="1567.7803">list lookup: oci_wlms_managed_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4746" x="722" y="1581.7803">compartmentId, displayName, id, pluginStatus;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.585" x="722" y="1595.7803">exact id or exact compartmentId plus displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3916" x="722" y="1609.7803">plus optional pluginStatus unique match;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="722" y="1623.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="722" y="1637.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="722" y="1651.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1846" x="722" y="1665.7803">WLMS does not expose CreateManagedInstance or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8604" x="722" y="1679.7803">DeleteManagedInstance in v65.110.0, so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9434" x="722" y="1693.7803">published runtime is bind/manage-existing only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5156" x="722" y="1707.7803">Successful UpdateManagedInstance responses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3984" x="722" y="1721.7803">already return a ManagedInstance body. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8467" x="722" y="1735.7803">runtime uses that body plus one bounded</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6396" x="722" y="1749.7803">GetManagedInstance confirmation pass on the next</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5781" x="722" y="1763.7803">reconcile instead of inventing lifecycle or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1719" x="722" y="1777.7803">work-request polling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="722" y="1791.7803">Delete is Kubernetes-local unbind only because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1846" x="722" y="1805.7803">the SDK exposes no delete helper and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7715" x="722" y="1819.7803">cloud-side delete lifecycle for this family.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="722" y="1833.7803">Plugin status remains a projected observed-state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4746" x="722" y="1847.7803">field and optional bind filter, not a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5303" x="722" y="1861.7803">controller-owned async lifecycle.</text><?plantuml-src hLVRRXit47tdLn3fIm9ePJksSv6H0es3ja6SfeXQzCL0GEro9SOhSajo9Qj5_xrdkDohf3X52ZzOkoI7CsVcd9brTqgNmeerTokHcQtIIvwBmadcsfM5IE-MrbGwkpQ5iVoxFCLVrjkHoLnKXV_HQF-BM4l-iomsqgjK7DupLtz9VdRHMnJMccsq