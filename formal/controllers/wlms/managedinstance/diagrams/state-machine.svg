<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="690px" preserveAspectRatio="none" style="width:2526px;height:690px;background:#FCFCFD;" version="1.1" viewBox="0 0 2526 690" width="2526px" zoomAndPan="magnify"><title>State Machine - wlms/ManagedInstance</title><defs/><g><rect fill="#FCFCFD" height="690" style="stroke:none;stroke-width:1;" width="2526" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="262.958" x="1123.6317" y="20.7803">State Machine - wlms/ManagedInstance</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="232.96" y="411"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="232.96" x2="497.3243" y1="435" y2="435"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="338.6871" y="426.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="237.96" y="450.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="237.96" y="464.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1294.32" y="341"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1299.32" y="364.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2053.27" y="341"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2058.27" y="364.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="45.04" y="357"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="50.04" y="380.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1321.8" y="472"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1327.7346" y="495.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="775.4" y="422"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="780.4" y="445.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1628.52" y="341"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1633.52" y="364.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1661.19" y="416"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1666.19" y="439.7803">ApplyUpdate</text><g class="start_entity" data-qualified-name=".start." data-source-line="29" id="ent0002"><ellipse cx="80" cy="442" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="44" id="ent0003"><path d="M2164.74,49 L2164.74,357 L2104.01,361 L2164.74,365 L2164.74,673 A8,8 0 0 0 2172.74,681 L2509.2214,681 A8,8 0 0 0 2517.2214,673 L2517.2214,51 L2507.2214,41 L2172.74,41 A8,8 0 0 0 2164.74,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2507.2214,41 L2507.2214,47 A4,4 0 0 0 2511.2214,51 L2517.2214,51 L2507.2214,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2170.74" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2170.74" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2170.74" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2170.74" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2170.74" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2170.74" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2170.74" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2170.74" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2170.74" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0068" x="2170.74" y="182.7803">service: wlms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="2170.74" y="196.7803">slug: managedinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7646" x="2170.74" y="210.7803">kind: ManagedInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2170.74" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="2170.74" y="238.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.875" x="2170.74" y="252.7803">requeue: updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2170.74" y="266.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="2170.74" y="280.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1914" x="2170.74" y="294.7803">follow-up: create=none; update=next reconcile</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.2568" x="2170.74" y="308.7803">GetManagedInstance confirmation; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.4404" x="2170.74" y="322.7803">supported drift: configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2170.74" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.585" x="2170.74" y="350.7803">compartmentId, displayName, id, pluginStatus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2170.74" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0332" x="2170.74" y="378.7803">list lookup: oci_wlms_managed_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4746" x="2170.74" y="392.7803">compartmentId, displayName, id, pluginStatus;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.585" x="2170.74" y="406.7803">exact id or exact compartmentId plus displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3916" x="2170.74" y="420.7803">plus optional pluginStatus unique match;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="2170.74" y="434.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2170.74" y="448.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2170.74" y="462.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1846" x="2170.74" y="476.7803">WLMS does not expose CreateManagedInstance or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8604" x="2170.74" y="490.7803">DeleteManagedInstance in v65.110.0, so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9434" x="2170.74" y="504.7803">published runtime is bind/manage-existing only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5156" x="2170.74" y="518.7803">Successful UpdateManagedInstance responses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3984" x="2170.74" y="532.7803">already return a ManagedInstance body. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8467" x="2170.74" y="546.7803">runtime uses that body plus one bounded</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6396" x="2170.74" y="560.7803">GetManagedInstance confirmation pass on the next</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5781" x="2170.74" y="574.7803">reconcile instead of inventing lifecycle or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1719" x="2170.74" y="588.7803">work-request polling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="2170.74" y="602.7803">Delete is Kubernetes-local unbind only because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1846" x="2170.74" y="616.7803">the SDK exposes no delete helper and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7715" x="2170.74" y="630.7803">cloud-side delete lifecycle for this family.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="2170.74" y="644.7803">Plugin status remains a projected observed-state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4746" x="2170.74" y="658.7803">field and optional bind filter, not a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5303" x="2170.74" y="672.7803">controller-owned async lifecycle.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="29" id="lnk3"><path d="M90.42,442 C113.26,442 168.01,442 226.49,442" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="232.49,442,223.49,438,227.49,442,223.49,446,232.49,442" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.0273" x="145.96" y="437.7803">reconcile</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="30" id="lnk4"><path d="M497.6,442 C588.51,442 699.25,442 769.1,442" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="775.1,442,766.1,438,770.1,442,766.1,446,775.1,442" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="528.32" y="437.7803">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="31" id="lnk5"><path d="M898.35,439.78 C999.28,435.57 1197.48,425.01 1264.32,405 C1282.19,399.65 1295.4383,393.1957 1310.2283,384.3657" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1315.38,381.29,1305.602,382.4691,1311.0869,383.8531,1309.7029,389.338,1315.38,381.29" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="1054.82" y="386.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="122.9102" x="1070.4094" y="400.7803">ACTIVE, INACTIVE</text></g><!--link resolve_by_lookup to failed--><g class="link" data-entity-1="ent0007" data-entity-2="ent0006" data-link-type="dependency" data-source-line="32" id="lnk6"><path d="M898.75,449.57 C928.97,453.23 966.05,457.55 999.32,461 C1120.07,473.5 1258.8195,484.9972 1315.4295,489.5672" fill="none" id="resolve_by_lookup-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1321.41,490.05,1312.761,485.3388,1316.4262,489.6477,1312.1173,493.3128,1321.41,490.05" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="1000.32" y="456.7803">unresolved OCI error or non-success state</text></g><!--link observe to evaluate_ready--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="33" id="lnk7"><path d="M497.58,421.89 C507.63,420.52 517.64,419.2 527.32,418 C736.53,392.02 788.94,384.49 999.32,371 C1103.82,364.3 1220.3303,362.1546 1288.0903,361.4246" fill="none" id="observe-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1294.09,361.36,1285.0474,357.4572,1289.0903,361.4139,1285.1336,365.4567,1294.09,361.36" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.2617" x="770.82" y="354.9803">OCI state in ACTIVE,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5654" x="804.6681" y="368.9803">INACTIVE</text></g><!--link observe to failed--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="34" id="lnk8"><path d="M497.66,467.96 C560.02,479 635.72,490.56 704.32,496 C944.4,515.05 1230.6222,499.442 1315.5822,494.022" fill="none" id="observe-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1321.57,493.64,1312.3336,490.2211,1316.5801,493.9583,1312.8429,498.2049,1321.57,493.64" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="26