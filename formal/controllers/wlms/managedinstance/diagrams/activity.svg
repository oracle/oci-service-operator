<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2236px" preserveAspectRatio="none" style="width:929px;height:2236px;background:#FCFCFD;" version="1.1" viewBox="0 0 929 2236" width="929px" zoomAndPan="magnify"><title>Activity - wlms/ManagedInstance</title><defs/><g><rect fill="#FCFCFD" height="2236" style="stroke:none;stroke-width:1;" width="929" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="219.3926" x="353.6431" y="30.7803">Activity - wlms/ManagedInstance</text></g><ellipse cx="418.8103" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="376" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="606.8755" x="136.1931" y="75"/><path d="M258.2615,75 L258.2615,82 L248.2615,92 L136.1931,92" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="139.1931" y="86.7803">Observe and Bind</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="266.4177" y="109"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="276.4177" y="129.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="276.4177" y="143.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="305.6191" x="266.0007" y="177"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6191" x="276.0007" y="197.7803">Read desired ManagedInstance spec, tracked</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6611" x="276.0007" y="211.7803">status, and delete intent</text><polygon fill="#E2E8F0" points="289.3445,245,548.2761,245,560.2761,257,548.2761,269,289.3445,269,277.3445,257,289.3445,245" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.9316" x="289.3445" y="260.7803">"Tracked or explicit OCI identity present?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="255.5583" y="253.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="560.2761" y="253.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="222.3027" x="156.1931" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3027" x="166.1931" y="299.7803">Get the current OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8682" x="166.1931" y="313.7803">GetManagedInstance</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="305.585" x="417.4836" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="427.4836" y="299.7803">Resolve an existing OCI resource through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.7852" x="427.4836" y="313.7803">ListManagedInstances using filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.585" x="427.4836" y="327.7803">compartmentId, displayName, id, pluginStatus</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="426.8284" y="361"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="436.8284" y="381.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="436.8284" y="395.7803">into status</text><polygon fill="#E2E8F0" points="418.8103,415,430.8103,427,418.8103,439,406.8103,427,418.8103,415" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="356.634,471,480.9866,471,492.9866,483,480.9866,495,356.634,495,344.634,483,356.634,471" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="356.634" y="486.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="322.8479" y="479.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="492.9866" y="479.7803">no</text><rect fill="none" height="274" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="317.8193" x="11" y="505"/><path d="M61.4688,505 L61.4688,512 L51.4688,522 L11,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="516.7803">Delete</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="284.5986" x="27.6104" y="539"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5986" x="37.6104" y="559.7803">Delete path is not represented by imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0342" x="37.6104" y="573.7803">provider facts</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.8193" x="21" y="622"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8193" x="31" y="642.7803">Confirm deletion via GetManagedInstance or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1367" x="31" y="656.7803">ListManagedInstances until OCI reaches</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1582" x="31" y="670.7803">LOCAL_DELETE</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="292.3438" x="23.7378" y="713"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3438" x="33.7378" y="733.7803">Allow best-effort completion without finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4824" x="33.7378" y="747.7803">retention</text><ellipse cx="169.9097" cy="825" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="169.9097" cy="825" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="233" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="345.916" x="500.7529" y="505"/><path d="M651.5869,505 L651.5869,512 L641.5869,522 L500.7529,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="503.7529" y="516.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="520.7529" y="588"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="530.7529" y="608.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.3857" x="530.7529" y="622.7803">OCI reaches ACTIVE, INACTIVE</text><ellipse cx="667.7109" cy="682" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="667.7109" cy="682" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="547.1899,539,788.2319,539,800.2319,551,788.2319,563,547.1899,563,535.1899,551,547.1899,539" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="671.7109" y="573.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="547.1899" y="554.7803">"OCI state is outside success targets?"</text><rect fill="none" height="775" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="569.8594" x="348.8193" y="771"/><path d="M515.2393,771 L515.2393,778 L505.2393,788 L348.8193,788" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="351.8193" y="782.7803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="237.8818" x="548.77" y="805"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.8818" x="558.77" y="825.7803">Compare live OCI state against the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3369" x="558.77" y="839.7803">repo-authored mutation surface</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="516.4873" y="922"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="526.4873" y="942.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2129" x="526.4873" y="956.7803">fields compartmentId, displayName, id,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.0547" x="526.4873" y="970.7803">pluginStatus</text><ellipse cx="667.7109" cy="1015" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="667.7109" cy="1015" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="542.1279,873,793.2939,873,805.2939,885,793.2939,897,542.1279,897,530.1279,885,542.1279,873" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="671.7109" y="907.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="542.1279" y="888.7803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="557.2832,1068,778.1387,1068,790.1387,1080,778.1387,1092,557.2832,1092,545.2832,1080,557.2832,1068" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="557.2832" y="1083.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="523.4971" y="1076.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="790.1387" y="1076.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="318.8535" x="368.8193" y="1102"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8535" x="378.8193" y="1122.7803">Apply UpdateManagedInstance only for mutable</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="116.7373" x="378.8193" y="1136.7803">fields configuration</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="707.6729" y="1102"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="717.6729" y="1122.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="667.7109,1156,679.7109,1168,667.7109,1180,655.7109,1168,667.7109,1156" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.9053" x="516.2583" y="1200"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="526.2583" y="1220.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.9053" x="526.2583" y="1234.7803">update=tfresource.UpdateResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="526.2583" y="1248.7803">matching field-driven path executes</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="319.2568" x="508.0825" y="1282"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="518.0825" y="1302.7803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3848" x="518.0825" y="1316.7803">create=none; update=next reconcile</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.2568" x="518.0825" y="1330.7803">GetManagedInstance confirmation; delete=none</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8613" x="524.2803" y="1364"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8613" x="534.2803" y="1384.7803">Return success for the ACTIVE, INACTIVE</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8135" x="534.2803" y="1398.7803">success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="528.146" y="1432"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="538.146" y="1452.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="538.146" y="1466.7803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="153.8955" x="590.7632" y="1500"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8955" x="600.7632" y="1520.7803">Requeue on updating</text><path d="M449.8103,1556 L449.8103,1886 L429.8103,1890 L449.8103,1894 L449.8103,2224 A0,0 0 0 0 449.8103,2224 L792.9949,2224 A0,0 0 0 0 792.9949,2224 L792.9949,1566 L782.9949,1556 L449.8103,1556 A0,0 0 0 0 449.8103,1556" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M782.9949,1556 L782.9949,1566 L792.9949,1566 L782.9949,1556" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="455.8103" y="1571.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="455.8103" y="1585.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="455.8103" y="1599.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="455.8103" y="1613.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="455.8103" y="1627.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="455.8103" y="1641.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="455.8103" y="1655.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="455.8103" y="1669.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="455.8103" y="1683.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="455.8103" y="1697.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="455.8103" y="1711.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0068" x="455.8103" y="1725.7803">service: wlms</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="455.8103" y="1739.7803">slug: managedinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7646" x="455.8103" y="1753.7803">kind: ManagedInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="455.8103" y="1767.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="455.8103" y="1781.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.875" x="455.8103" y="1795.7803">requeue: updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="455.8103" y="1809.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="455.8103" y="1823.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1914" x="455.8103" y="1837.7803">follow-up: create=none; update=next reconcile</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.2568" x="455.8103" y="1851.7803">GetManagedInstance confirmation; delete=none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.4404" x="455.8103" y="1865.7803">supported drift: configuration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="455.8103" y="1879.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.585" x="455.8103" y="1893.7803">compartmentId, displayName, id, pluginStatus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="455.8103" y="1907.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0332" x="455.8103" y="1921.7803">list lookup: oci_wlms_managed_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4746" x="455.8103" y="1935.7803">compartmentId, displayName, id, pluginStatus;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.585" x="455.8103" y="1949.7803">exact id or exact compartmentId plus displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3916" x="455.8103" y="1963.7803">plus optional pluginStatus unique match;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="455.8103" y="1977.7803">duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="455.8103" y="1991.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="455.8103" y="2005.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1846" x="455.8103" y="2019.7803">WLMS does not expose CreateManagedInstance or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8604" x="455.8103" y="2033.7803">DeleteManagedInstance in v65.110.0, so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9434" x="455.8103" y="2047.7803">published runtime is bind/manage-existing only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5156" x="455.8103" y="2061.7803">Successful UpdateManagedInstance responses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3984" x="455.8103" y="2075.7803">already return a ManagedInstance body. The</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8467" x="455.8103" y="2089.7803">runtime uses that body plus one bounded</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6396" x="455.8103" y="2103.7803">GetManagedInstance confirmation pass on the next</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5781" x="455.8103" y="2117.7803">reconcile instead of inventing lifecycle or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1719" x="455.8103" y="2131.7803">work-request polling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7432" x="455.8103" y="2145.7803">Delete is Kubernetes-local unbind only because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1846" x="455.8103" y="2159.7803">the SDK exposes no delete helper and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7715" x="455.8103" y="2173.7803">cloud-side delete lifecycle for this family.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4951" x="455.8103" y="2187.7803">Plugin status remains a projected observed-state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4746" x="455.8103" y="2201.7803">field and optional bind filter, not a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5303" x="455.8103" y="2215.7803">controller-owned async lifecycle.</text><ellipse cx="418.8103" cy="1890" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="418.8103" cy="1890" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="418.8103" x2="418.8103" y1="157" y2="177"/><polygon fill="#0F172A" points="414.8103,167,418.8103,177,422.8103,167,418.8103,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;