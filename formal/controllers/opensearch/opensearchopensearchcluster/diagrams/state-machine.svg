text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3069.51" y="624.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="632" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2286.78,49 L2286.78,394.32 L2121.1,455.51 L2286.78,402.32 L2286.78,617 A8,8 0 0 0 2294.78,625 L2657.655,625 A8,8 0 0 0 2665.655,617 L2665.655,51 L2655.655,41 L2294.78,41 A8,8 0 0 0 2286.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2655.655,41 L2655.655,47 A4,4 0 0 0 2659.655,51 L2665.655,51 L2655.655,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2292.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2292.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2292.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2292.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2292.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2292.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2292.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2292.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2292.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="125.2891" x="2292.78" y="182.7803">service: opensearch</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.0264" x="2292.78" y="196.7803">slug: opensearchopensearchcluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0752" x="2292.78" y="210.7803">kind: OpensearchCluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2292.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2292.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2292.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2292.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="2292.78" y="280.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2292.78" y="294.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="2292.78" y="308.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="2292.78" y="322.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6611" x="2292.78" y="336.7803">supported drift: display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2292.78" y="350.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="2292.78" y="364.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2292.78" y="378.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8535" x="2292.78" y="392.7803">list lookup: oci_opensearch_opensearch_clusters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0127" x="2292.78" y="406.7803">filters compartment_id, display_name, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2292.78" y="420.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2292.78" y="434.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4541" x="2292.78" y="448.7803">Create first reuses a unique list match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1709" x="2292.78" y="462.7803">compartmentId plus displayName when one already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.9443" x="2292.78" y="476.7803">exists; otherwise it issues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3506" x="2292.78" y="490.7803">CreateOpensearchCluster and follows with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6406" x="2292.78" y="504.7803">read-after-write status projection.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5508" x="2292.78" y="518.7803">Reconcile remains retryable while OCI reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="357.875" x="2292.78" y="532.7803">PROVISIONING or UPDATING, succeeds when ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.6123" x="2292.78" y="546.7803">and keeps the finalizer until delete follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6611" x="2292.78" y="560.7803">confirms DELETING or the resource is absent.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3301" x="2292.78" y="574.7803">Only displayName is mutable in place,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0264" x="2292.78" y="588.7803">compartmentId remains create-only drift, and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0195" x="2292.78" y="602.7803">Kubernetes secret reads or writes are part of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3857" x="2292.78" y="616.7803">this runtime path.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="98" id="ent0006"><path d="M3000.66,684 L3000.66,698.9 L2527.56,682.2 L3000.66,706.9 L3000.66,734 A8,8 0 0 0 3008.66,742 L3272.7967,742 A8,8 0 0 