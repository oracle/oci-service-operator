 the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="707.55" y="1926.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="125.2891" x="707.55" y="1940.2803">service: opensearch</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.0264" x="707.55" y="1954.2803">slug: opensearchopensearchcluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0752" x="707.55" y="1968.2803">kind: OpensearchCluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="707.55" y="1982.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="707.55" y="1996.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="707.55" y="2010.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="707.55" y="2024.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="707.55" y="2038.2803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="707.55" y="2052.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6611" x="707.55" y="2066.2803">supported drift: display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="707.55" y="2080.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="707.55" y="2094.2803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="707.55" y="2108.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8535" x="707.55" y="2122.2803">list lookup: oci_opensearch_opensearch_clusters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0127" x="707.55" y="2136.2803">filters compartment_id, display_name, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="707.55" y="2150.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="707.55" y="2164.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4541" x="707.55" y="2178.2803">Create first reuses a unique list match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1709" x="707.55" y="2192.2803">compartmentId plus displayName when one already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.9443" x="707.55" y="2206.2803">exists; otherwise it issues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3506" x="707.55" y="2220.2803">CreateOpensearchCluster and follows with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6406" x="707.55" y="2234.2803">read-after-write status projection.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5508" x="707.55" y="2248.2803">Reconcile remains retryable while OCI reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="357.875" x="707.55" y="2262.2803">PROVISIONING or UPDATING, succeeds when ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.6123" x="707.55" y="2276.2803">and keeps the finalizer until delete follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6611" x="707.55" y="2290.2803">confirms DELETING or the resource is absent.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3301" x="707.55" y="2304.2803">Only displayName is mutable in place,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0264" x="707.55" y="2318.2803">compartmentId remains create-only drift, and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0195" x="707.55" y="2332.2803">Kubernetes secret reads or writes are part of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3857" x="707.55" y="2346.2803">this runtime path.</text><ellipse cx="670.55" cy="2062.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="670.55" cy="2062.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="670.55" x2="670.55" y1="157" y2="177"/><polygon fill="#0F172A" points="666.55,167,670.55,177,674.55,167,670.55,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="822.0159" x2="822.0159" y1="341" y2="361"/><polygon fill="#0F172A" points="818.0159,351,822.0159,361,826.0159,351,822.0159,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;