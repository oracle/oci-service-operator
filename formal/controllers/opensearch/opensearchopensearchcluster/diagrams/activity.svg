14" lengthAdjust="spacing" textLength="238.8955" x="708.4293" y="1872.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="708.4293" y="1886.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="708.4293" y="1900.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="708.4293" y="1914.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="708.4293" y="1928.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="125.2891" x="708.4293" y="1942.7803">service: opensearch</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.0264" x="708.4293" y="1956.7803">slug: opensearchopensearchcluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3438" x="708.4293" y="1970.7803">kind: OpensearchOpensearchCluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="708.4293" y="1984.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="708.4293" y="1998.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="708.4293" y="2012.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="708.4293" y="2026.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="708.4293" y="2040.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="708.4293" y="2054.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6611" x="708.4293" y="2068.7803">supported drift: display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="708.4293" y="2082.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="708.4293" y="2096.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="708.4293" y="2110.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="708.4293" y="2124.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="324.5498" x="708.4293" y="2138.7803">scaffold_opensearch_opensearchopensearchcluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0127" x="708.4293" y="2152.7803">filters compartment_id, display_name, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="708.4293" y="2166.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="708.4293" y="2180.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4541" x="708.4293" y="2194.7803">Create first reuses a unique list match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1709" x="708.4293" y="2208.7803">compartmentId plus displayName when one already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.9443" x="708.4293" y="2222.7803">exists; otherwise it issues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3506" x="708.4293" y="2236.7803">CreateOpensearchCluster and follows with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6406" x="708.4293" y="2250.7803">read-after-write status projection.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5508" x="708.4293" y="2264.7803">Reconcile remains retryable while OCI reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="357.875" x="708.4293" y="2278.7803">PROVISIONING or UPDATING, succeeds when ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.6123" x="708.4293" y="2292.7803">and keeps the finalizer until delete follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6611" x="708.4293" y="2306.7803">confirms DELETING or the resource is absent.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3301" x="708.4293" y="2320.7803">Only displayName is mutable in place,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0264" x="708.4293" y="2334.7803">compartmentId remains create-only drift, and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0195" x="708.4293" y="2348.7803">Kubernetes secret reads or writes are part of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3857" x="708.4293" y="2362.7803">this runtime path.</text><ellipse cx="671.4293" cy="2072" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="671.4293" cy="2072" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="671.4293" x2="671.4293" y1="157" y2="177"/><polygon fill="#0F172A" points="667.4293,167,671.4293,177,675.4293,167,671.4293,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="822.8951" x2="822.8951" y1="341" y2="361"/><polygon fill="#0F172A" points="818.8951,351,822.8951,361,826.8951,351,822.8951,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="822.8951" x2="822.8951" y1="423" y2="443"/><polygon fill="#0F172A" points="818.8951,433,822.8951,443,826.8951,433,822.8951,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="529.9635" x2="519.9635" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="519.9635" x2="519.9635" y1="257" y2="279"/><polygon fill="#0F172A" points="515.9635,269,519.9635,279,523.9635,269,519.9635,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="812.8951" x2="822.8951" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="822.8951" x2="822.8951" y1="257" y2="279"/><polygon fill="#0F172A" points="818.8951,269,822.8951,279,826.8951,269,822.8951,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="519.9635" x2="519.9635" y1="327" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="519.9635" x2="659.4293" y1="509" y2="509"/><polygon fill="#0F172A" points="649.4293,505,659.4293,509,649.4293,513,653.4293,509" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-w