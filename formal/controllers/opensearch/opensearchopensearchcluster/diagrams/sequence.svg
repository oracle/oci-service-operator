t><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.0264" x="841" y="1779.7803">slug: opensearchopensearchcluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0752" x="841" y="1793.7803">kind: OpensearchCluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="841" y="1807.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="841" y="1821.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="841" y="1835.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="841" y="1849.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="841" y="1863.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="841" y="1877.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="841" y="1891.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="841" y="1905.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6611" x="841" y="1919.7803">supported drift: display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="841" y="1933.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="841" y="1947.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="841" y="1961.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8535" x="841" y="1975.7803">list lookup: oci_opensearch_opensearch_clusters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0127" x="841" y="1989.7803">filters compartment_id, display_name, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="841" y="2003.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="841" y="2017.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4541" x="841" y="2031.7803">Create first reuses a unique list match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1709" x="841" y="2045.7803">compartmentId plus displayName when one already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.9443" x="841" y="2059.7803">exists; otherwise it issues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3506" x="841" y="2073.7803">CreateOpensearchCluster and follows with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6406" x="841" y="2087.7803">read-after-write status projection.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5508" x="841" y="2101.7803">Reconcile remains retryable while OCI reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="357.875" x="841" y="2115.7803">PROVISIONING or UPDATING, succeeds when ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.6123" x="841" y="2129.7803">and keeps the finalizer until delete follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6611" x="841" y="2143.7803">confirms DELETING or the resource is absent.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3301" x="841" y="2157.7803">Only displayName is mutable in place,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0264" x="841" y="2171.7803">compartmentId remains create-only drift, and no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0195" x="841" y="2185.7803">Kubernetes secret reads or writes are part of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3857" x="841" y="2199.7803">this runtime path.</text><?plantuml-src fLXPRnit47xdho3IbmJGsd5ivv2H0ecTfaRSEB2JF0a8gDrPYVMAt99SAMhH_zuP7dleI9m6Vl2QnvpVV3EqlPEg5aOik9sBGg-acl5IL1QORNUc8h-R6TseubnNsl1VoXn_Yjw90ahHLEuthTnxiG3-ErHBS38Nky_Soh-17vtqDeKnUXMbFowFdZtftrJQmUij6yhoMV5qyvGs1PXuOdfoUlpunSO9KX_tZuzFZavFU_jUVAwD0iEFdZ8dNGNy5lvgGEN0CwvhK1Q4oUU7r-tdUTLO1uRDPG6yrDfDzTUUJ9kk_yCu5xdJPc1Zz3LjRJe9J-1v-HYtKHY6KzP2kTtt-mVk8wKNXrP69KkuaceOnHSdudZw77T9P3tOogV5AHorMriPUbwACcV_CkyRVzTC0KFhmBAU7VmS3J6wgZ24_UNNmi8Dv5hbSdFhmVNjzRjRC4kPmnz2YHcO1rnOFbmQNBa-lsIKVQwNcDkXxD76FQm30mKtO7NLEAdLE2uT5bBCCAVsCFoTTKUobEO3kvmb2GLKwEtUss5xU1DKuL7Akc3nxDTUZCOS59vlW6yX42sEBh7kFDqUkZlcxVT3GxgjUyI6H-ZIC2ZZJZYwPIMvjrq27WRyIkix_2NGbQbK1HELuyuWEF0EmW2-rXMcnUU4OyqeBBCr5vK1KQnnLrfdsL0xsOEdn_mjk6sjW6JLAcW5IiiNqbgaitt2hb3JbZJxi9GL_HvFLAuNXA45I