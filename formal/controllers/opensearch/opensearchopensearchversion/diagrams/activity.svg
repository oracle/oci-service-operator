83" y="907.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="156.9683" y="921.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="129.8237" y="955"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="139.8237" y="975.7803">Requeue on provisioning, updating, terminating</text><path d="M317.5332,999 L317.5332,1175 L297.5332,1179 L317.5332,1183 L317.5332,1359 A0,0 0 0 0 317.5332,1359 L657.5732,1359 A0,0 0 0 0 657.5732,1359 L657.5732,1009 L647.5732,999 L317.5332,999 A0,0 0 0 0 317.5332,999" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M647.5732,999 L647.5732,1009 L657.5732,1009 L647.5732,999" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="323.5332" y="1014.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="323.5332" y="1028.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="323.5332" y="1042.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="323.5332" y="1056.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="323.5332" y="1070.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="323.5332" y="1084.7803">Controller-local activity diagrams add</text><text fil