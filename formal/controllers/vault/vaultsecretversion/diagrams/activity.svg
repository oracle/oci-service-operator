 y="241.7803">Resolve OCI state via GetVaultSecretVersion</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.7715" x="175.6509" y="255.7803">with ListVaultSecretVersion fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="168.3716" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3438" x="178.3716" y="309.7803">Use scaffold_vault_vaultsecretversion filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="178.3716" y="323.7803">compartment_id, state when OCID lookup or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5645" x="178.3716" y="337.7803">bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="262.8022,371,370.1812,371,382.1812,383,370.1812,395,262.8022,395,250.8022,383,262.8022,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="262.8022" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="229.0161" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="382.1812" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.0537" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0537" x="21" y="425.7803">Update path calls UpdateVaultSecretVersion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="26.1758" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="s