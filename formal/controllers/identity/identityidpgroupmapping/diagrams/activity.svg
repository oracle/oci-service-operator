5.3857" x="160.6563" y="241.7803">Resolve OCI state via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5645" x="160.6563" y="255.7803">GetIdentityIdpGroupMapping with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3574" x="160.6563" y="269.7803">ListIdentityIdpGroupMapping fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="117.2148" y="303"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.5156" x="127.2148" y="323.7803">Use scaffold_identity_identityidpgroupmapping</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="127.2148" y="337.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="127.2148" y="351.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="222.1455,385,329.5244,385,341.5244,397,329.5244,409,222.1455,409,210.1455,397,222.1455,385" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="222.1455" y="400.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="188.3594" y="393.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="341.5244" y="393.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="222.3574" x="33.1724" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1787" x="43.1724" y="439.7803">Update path calls</text><text fill="#0F172A" font-family="Helveti