803">Resolve OCI state via GetUserCapability with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1787" x="146.8545" y="255.7803">ListUserCapability fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="139.5649" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="149.5649" y="309.7803">Use scaffold_identity_usercapability filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="149.5649" y="323.7803">compartment_id, state when OCID lookup or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5645" x="149.5649" y="337.7803">bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="233.9956,371,341.3745,371,353.3745,383,341.3745,395,233.9956,395,221.9956,383,233.9956,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="233.9956" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="200.2095" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="353.3745" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="268.2471" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2471" x="21" y="425.7803">Update path calls UpdateUserCapability</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="11.7725" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24