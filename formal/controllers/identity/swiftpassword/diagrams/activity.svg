 font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="659.0864" y="381.7803">Create the OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2539" x="659.0864" y="395.7803">CreateSwiftPassword when no reusable match is</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="35.0342" x="659.0864" y="409.7803">found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="667.7656" y="443"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="677.7656" y="463.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="677.7656" y="477.7803">into status</text><polygon fill="#E2E8F0" points="659.7476,497,671.7476,509,659.7476,521,647.7476,509,659.7476,497" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="597.5713,553,721.9238,553,733.9238,565,721.9238,577,597.5713,577,585.5713,565,597.5713,553" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="597.5713" y="568.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="563.7852" y="561.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="733.9238" y="561.7803">no</text><rect fill="none" height="340" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="587"/><path d="M61.4688,587 L61.4688,594 L51.4688,604 L11,604" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.468