nt-size="14" lengthAdjust="spacing" textLength="304.2744" x="443.09" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="443.09" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="443.09" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="443.09" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="443.09" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="443.09" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="443.09" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="443.09" y="404.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0332" x="443.09" y="418.7803">slug: identityusercapabilitiesmanagement</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2471" x="443.09" y="432.7803">kind: IdentityUserCapabilitiesManagement</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="443.09" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="443.09" y="460.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="443.09" y="474.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="443.09" y="488.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="443.09" y="502.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="443.09" y="516.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="443.09" y="530.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="443.09" y="544.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="443.09" y="558.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="443.09" y="572.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="443.09" y="586.7803">promotion.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M337.33,61.29 C337.33,77.87 337.33,107.03 337.33,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="337.33,136.85,341.33,127.85,337.33,131.85,333.33,127.85,337.33,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#00000