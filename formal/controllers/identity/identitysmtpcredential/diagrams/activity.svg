4155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="375.2778" y="1266.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="375.2778" y="1280.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="375.2778" y="1294.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="375.2778" y="1308.7803">promotion.</text><ellipse cx="338.2778" cy="1137" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="338.2778" cy="1137" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="338.2778" x2="338.2778" y1="65" y2="85"/><polygon fill="#0F172A" points="334.2778,75,338.2778,85,342.2778,75,338.2778,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="338.2778" x2="338.2778" y1="133" y2="153"/><polygon fill="#0F172A" points="334.2778,143,338.2778,153,342.2778,143,338.2778,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="338.2778" x2="338.2778" y1="201" y2="221"/><polygon fill="#0F172A" points="334.2778,211,338.2778,221,342.2778,211,338.2778,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="338.2778" x2="338.2778" y1="283" y2="303"/><polygon fill="#0F172A" points="334.2778,293,338.2778,303,342.2778,293,338.2778,297" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="170.4199" x2="170.4199" y1="453" y2="473"/><polygon fill="#0F172A" points="166.4199,463,170.4199,473,174.4199,463,170.4199,467" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="272.5884" x2="170.4199" y1=