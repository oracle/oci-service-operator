<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1049px" preserveAspectRatio="none" style="width:753px;height:1049px;background:#FCFCFD;" version="1.1" viewBox="0 0 753 1049" width="753px" zoomAndPan="magnify"><title>State Machine - identity/User</title><defs/><g><rect fill="#FCFCFD" height="1049" style="stroke:none;stroke-width:1;" width="753" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="191.3789" x="274.3029" y="20.7803">State Machine - identity/User</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="150.6963" x="313.84" y="137"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="313.84" x2="464.5363" y1="175" y2="175"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.71" x="323.84" y="152.7803">provisioning</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.6963" x="323.84" y="166.7803">provider: CREATING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="128.9238" x="72.72" y="439"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="72.72" x2="201.6438" y1="477" y2="477"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5723" x="82.72" y="454.7803">active</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9238" x="82.72" y="468.7803">provider: ACTIVE</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="73.7168" x="287.33" y="755"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="287.33" x2="361.0468" y1="779" y2="779"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.7168" x="297.33" y="770.7803">updating</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="148.3721" x="7" y="755"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="7" x2="155.3721" y1="793" y2="793"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="17" y="770.7803">terminating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="17" y="784.7803">provider: DELETING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="253.4678" x="189.45" y="895"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="189.45" x2="442.9178" y1="933" y2="933"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="33.4688" x="199.45" y="910.7803">failed</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4678" x="199.45" y="924.7803">provider: repo-authored failure bucket</text></g><ellipse cx="389.19" cy="51" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="108.19" cy="1032" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="108.19" cy="1032" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="34" id="ent0003"><path d="M236.95,271 L236.95,460 L202.14,464 L236.95,468 L236.95,657 A8,8 0 0 0 244.95,665 L581.4314,665 A8,8 0 0 0 589.4314,657 L589.4314,273 L579.4314,263 L244.95,263 A8,8 0 0 0 236.95,271" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M579.4314,263 L579.4314,269 A4,4 0 0 0 583.4314,273 L589.4314,273 L579.4314,263" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="242.95" y="278.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="242.95" y="292.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="242.95" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="242.95" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="242.95" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="242.95" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="242.95" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="242.95" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="242.95" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="242.95" y="404.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="60.6963" x="242.95" y="418.7803">slug: user</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.0205" x="242.95" y="432.7803">kind: User</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="242.95" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="242.95" y="460.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="242.95" y="474.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="242.95" y="488.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="242.95" y="502.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="242.95" y="516.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1572" x="242.95" y="530.7803">mutable/forceNew: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4541" x="242.95" y="544.7803">email, freeform_tags / compartment_id, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="242.95" y="558.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2676" x="242.95" y="572.7803">The generated runtime reads back the OCI user</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8535" x="242.95" y="586.7803">after create or update and projects the response</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="67.7031" x="242.95" y="600.7803">into status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7783" x="242.95" y="614.7803">Finalizer removal waits for delete confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5234" x="242.95" y="628.7803">through Get or list fallback.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8057" x="242.95" y="642.7803">No secret side effects or legacy adapter seams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5645" x="242.95" y="656.7803">are involved in the current User path.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="23" id="lnk3"><path d="M389.19,61.29 C389.19,77.87 389.19,107.03 389.19,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="389.19,136.85,393.19,127.85,389.19,131.85,385.19,127.85,389.19,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5791" x="390.19" y="102.7803">CreateUser</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="24" id="lnk4"><path d="M327.37,187.38 C291.72,204.1 248.34,229.36 219.19,263 C173.23,316.03 151.9381,392.4377 143.1081,432.9377" fill="none" id="provisioning-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="141.83,438.8,147.6554,430.8587,142.8951,433.9148,139.839,429.1545,141.83,438.8" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="273.21" y="228.7803">ACTIVE</text></g><!--link active to updating--><g class="link" data-entity-1="ent0003" data-en