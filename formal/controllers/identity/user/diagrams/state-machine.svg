ily="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2937.71" y="589.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="590" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2195.78,49 L2195.78,360.8 L2030.1,414.61 L2195.78,368.8 L2195.78,575 A8,8 0 0 0 2203.78,583 L2540.2614,583 A8,8 0 0 0 2548.2614,575 L2548.2614,51 L2538.2614,41 L2203.78,41 A8,8 0 0 0 2195.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2538.2614,41 L2538.2614,47 A4,4 0 0 0 2542.2614,51 L2548.2614,51 L2538.2614,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2201.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2201.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2201.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2201.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2201.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2201.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2201.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2201.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2201.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="2201.78" y="182.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="60.6963" x="2201.78" y="196.7803">slug: user</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.0205" x="2201.78" y="210.7803">kind: User</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2201.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2201.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2201.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2201.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="2201.78" y="280.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="2201.78" y="294.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="2201.78" y="308.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="127.6064" x="2201.78" y="322.7803">email, freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2201.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1787" x="2201.78" y="350.7803">compartment_id, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2201.78" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.4336" x="2201.78" y="378.7803">list lookup: oci_identity_users filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5576" x="2201.78" y="392.7803">compartment_id, external_identifier,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.168" x="2201.78" y="406.7803">identity_provider_id, name (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2201.78" y="420.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2201.78" y="434.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1709" x="2201.78" y="448.7803">Blank/default-active runs no longer check in the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="2201.78" y="462.7803">generated User runtime, but explicit backlog</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.0957" x="2201.78" y="476.7803">regeneration still preserves this row.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5088" x="2201.78" y="490.7803">The preserved generated runtime reads back the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2744" x="2201.78" y="504.7803">OCI user after create or update and projects the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1855" x="2201.78" y="518.7803">response into status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.7441" x="2201.78" y="532.7803">Finalizer removal still waits for delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="2201.78" y="546.7803">confirmation through Get or list fallback, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4814" x="2201.78" y="560.7803">no secret side effects or legacy adapter seams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3789" x="2201.78" y="574.7803">are involved.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="95" id="ent0006"><path d="M2883.27,649 L2883.27,657.29 L2423.38,640.3 L2883.27,665.29 L2883.27,685 A8,8 0 0 0 2891.27,693 L3126.5864,693 A8,8 0 0 0 3134.5864,685 L3134.5864,651 L3124.5864,641 L2891.27,641 A8,8 0 0 0 2883.27,649" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3124.5864,641 L3124.5864,647 A4,4 0 0 0 3128.5864,651 L3134.5864,651 L3124.5864,641" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2889.27" y="656.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3164" x="2889.27" y="670.7803">delete observe: GetUser or ListUsers</text><text