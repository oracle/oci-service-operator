xtLength="214.8262" x="232.6714" y="772.7803">requeue on provisioning, updating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="232.6714" y="786.7803">terminating</text></g><path d="M714,813 L714,1269 A8,8 0 0 0 722,1277 L1034,1277 A8,8 0 0 0 1042,1269 L1042,815 L1032,805 L722,805 A8,8 0 0 0 714,813" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1032,805 L1032,811 A4,4 0 0 0 1036,815 L1042,815 L1032,805" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="720" y="820.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="720" y="834.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="720" y="848.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="720" y="862.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="720" y="876.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="720" y="890.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="720" y="904.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="720" y="918.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="720" y="932.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="720" y="946.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="720" y="960.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="720" y="974.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="720" y="988.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="720" y="1002.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="720" y="1016.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="60.6963" x="720" y="1030.7803">slug: user</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.0205" x="720" y="1044.7803">kind: User</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="720" y="1058.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="720" y="1072.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="720" y="1086.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="720" y="1100.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="720" y="1114.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="720" y="1128.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1572" x="720" y="1142.7803">mutable/forceNew: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4541" x="720" y="1156.7803">email, freeform_tags / compartment_id, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="720" y="1170.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2676" x="720" y="1184.7803">The generated runtime reads back the OCI user</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8535" x="720" y="1198.7803">after create or update and projects the response</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="67.7031" x="720" y="1212.7803">into status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7783" x="720" y="1226.7803">Finalizer removal waits for delete confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5234" x="720" y="1240.7803">through Get or list fallback.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8057" x="720" y="1254.7803">No secret side effects or legacy adapter seams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5645" x="720" y="1268.7803">are involved in the current User path.</text><?plantuml-src fLPRRzis57xdhpZeNXBCifCcQLCN6x0cRLSqIu2wVGiGqDAHp8KYDPAocmtxxpk7kbY-jGM60gabdlltdK_qZyfKqiaI_49cTgLC0RdK7eNlJ-OoVIoShKrsPRLry5EUqhziO95XBciTtbaJRcM9y3lg9GQLolqsC_Ktmkdvu50wPrTjz9FyzENpeQUn0T_ir93dBxCNsrRMPUXQY_dvnTd9goqBJj-UdvsTdrvS3CvZ-DGwWmvENuYWWaQOuLyrcXGX0PMXePTFaoyUdLZG8-JMXhdzEWZYE_j_181CWtKRHRNDTKVRNU5plCnFw9Y2qVnK9KtOxpyq-94eWyRx65hbUAFCvjXUdSkp-IMTSiXguoYTPnTusX_jG7APopmL_uhO6toivqYp3EZ5e0wueaASrPf6E7pzHdhyXAargTe-UdOtk_iuGxTKAVuXZIpGFGFfOVFLXilTrGV1S8DT4fYRiKTRVaHyXnauz5RNGLapRLzDCYKBmjHFckTaRP9qC8_zikWYPAYfsuFUpV6c9veiqbAiXmN9huCPJG4DsTS8J3egikr2h4tOORF3AVI_Znody-5OR9gmq-OSfklWr8bNt54a-gOPEz9qf_0UGposLI0YUVfZxMDTiNfeLen3VZTaoux-A5SwqFzJI6t9u9MqNWyg6zqR_4e7Hkg7PkLoHQZTcsx_7Yfdb_JWs1WC2yxHpwVtfhGEZuy5PO5aJtkb3Ec2zItbiQKC8wY0fMSKXDG1KeUIEUDWhWYOIeR5eIwkecaS0FLTTQuLXU8KLv_U_lRvm-txxmsFCoEfBTHLrgREdCh3DtD_YRQzFmFGS0jQi34xv7eTxTPbjtw4UwuS3OXdSltsvkqFrCwrzbWsZPZTl7kuwOCCjV-5QsMI4R2v8gpfc-3ePP3A93NXh9EsgdvrTYYyjIcnUzeKwY4on5Ct1CQe6Ix_kZV4gvAoyLCZ44uLYm0sX_sgq2xn_vE4xqRP9mspG2i1kRCbX0N2ZagjlpIvTKpwwyZQs32rAxsj7HrMieZzMZC2IG0rH4siIrhAPSfNl1bZSIEVQAg3P6trVQBL0WtqO0a2YnUI8-_XqGXMrZqcBIL5HI35seWsCwGgQDqqIaEA8QjAFus5TEa2mrE5TE6WUfXez2Mc4ZEg86AJb2quQO-wf-wrjgi3C-AEjxhmi59X0QgihEFOAwc2RqRJHqsqJQK6gbcbL5cRVjhV08JNTJ65clU8llpPj57AleCf55tjoNRj3Vqd_HWRtaQvdOXlyxyb-FGGlM78xauauxuXgsmZKPqqlUuqnrY3hxifzSjVra7EDKw8N2dUuchA5pYwAsGFGHQU4VUfKrL4Mc0fbHuHMH79lemcCDdMzIZL95T4ea9ML15d5fy9k7vQuBZrafLCPZxUF2EohEbnsZAd7WT2tVOWMQwT_PDatKS7ua1b3LrZbGcsbPonUDSDdSvBkoI86_HprjrT2ekmeFjDiM39usJnCzTztyRYbW8tJFPy5yGyZ-dP40kPFe7CPCNbUgHT9tOWABEqT3NEw4SiCwsTe-aq7tVM_75_9VWF?></g></svg>