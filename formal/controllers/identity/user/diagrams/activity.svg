" textLength="231.1299" x="394.3516" y="841.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="855.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,875,351.7441,887,339.7441,899,327.7441,887,339.7441,875" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="965" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="965" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="442" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="392.5713" x="774.4644" y="587"/><path d="M925.2983,587 L925.2983,594 L915.2983,604 L774.4644,604" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="777.4644" y="598.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="340.5713" x="794.4644" y="670"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5713" x="804.4644" y="690.7803">Request requeue while OCI remains in CREATING,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.0137" x="804.4644" y="704.7803">DELETING</text><ellipse cx="964.75" cy="764" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="964.75" cy="764" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="878.4668,621,1051.0332,621,1063.0332,633,1051.0332,645,878.4668,645,866.4668,633,878.4668,621" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="968.75" y="655.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.5664" x="878.4668" y="636.7803">"OCI state in retryable set?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="817.792" y="890"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="827.792" y="910.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.041" x="827.792" y="924.7803">OCI reaches ACTIVE</text><ellipse cx="964.75" cy="984" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="964.75" cy="984" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="844.229,841,1085.271,841,1097.271,853,1085.271,865,844.229,865,832.229,853,844.229,841" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="968.75" y="875.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="844.229" y="856.7803">"OCI state is outside success targets?"</text><rect fill="none" height="708.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="533.1992" x="675.4814" y="1039"/><path d="M841.9014,1039 L841.9014,1046 L831.9014,1056 L675.4814,1056" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="678.4814" y="1050.7803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="816.6299" y="1073"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="826.6299" y="1093.7803">Compare live OCI state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="826.6299" y="1107.7803">field surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="813.5264" y="1190"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="823.5264" y="1210.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.751" x="823.5264" y="1224.7803">fields compartment_id, name</text><ellipse cx="964.75" cy="1270.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="964.75" cy="1270.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="839.167,1141,1090.333,1141,1102.333,1153,1090.333,1165,839.167,1165,827.167,1153,839.167,1141" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="968.75" y="1175.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="839.167" y="1156.7803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="854.3223,1323.5,1075.1777,1323.5,1087.1777,1335.5,1075.1777,1347.5,854.3223,1347.5,842.3223,1335.5,854.3223,1323.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="854.3223" y="1339.2803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="820.5361" y="1332.2803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1087.1777" y="1332.2803">no</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="