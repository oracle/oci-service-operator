lvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="372.9468" y="1098.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="372.9468" y="1112.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.8818" x="372.9468" y="1126.7803">slug: oauthclientcredential</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.7578" x="372.9468" y="1140.7803">kind: OAuthClientCredential</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="372.9468" y="1154.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="372.9468" y="1168.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="372.9468" y="1182.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="372.9468" y="1196.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="372.9468" y="1210.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="372.9468" y="1224.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="372.9468" y="1238.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="372.9468" y="1252.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="372.9468" y="1266.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="372.9468" y="1280.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="372.9468" y="1294.7803">promotion.</text><ellipse cx="335.9468" cy="1123" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="335.9468" cy="1123" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="335.9468" x2="335.9468" y1="65" y2="85"/><polygon fill="#0F172A" points="331.9468,75,335.9468,85,339.9468,75,335.9468,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="335.9468" x2="335.9468" y1="133" y2="153"/><polygon fill="#0F172A" points="331.9468,143,335.9468,153,339.9468,143,335.9468,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="335.9468" x2="335.9468" y1="201" y2="221"/><polygon fill="#0F172A" points="331.9468,211,335.9468,221,339.9468,211,335.9468,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="335.9468" x2="335.9468" y1="269" y2="289"/><polygon fill="#0F172A" points="331.9468,279,335.9468,289,339.9468,279,335.9468,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="169.2544" x2="169.2544" y1="439" y2="459"/><polygon fill="#0F172A" points="165.2544,449,169.2544,459,173.2544,449,169.2544,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="270.2573" x2="169.2544" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="169.2544" x2="169.2544" y1="383" y2="405"/><polygon fill="#0F172A" points="16