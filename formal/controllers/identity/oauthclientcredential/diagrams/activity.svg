ft detected?"</text><polygon fill="#E2E8F0" points="864.668,1321.5,1085.5234,1321.5,1097.5234,1333.5,1085.5234,1345.5,864.668,1345.5,852.668,1333.5,864.668,1321.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="864.668" y="1337.2803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="830.8818" y="1330.2803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1097.5234" y="1330.2803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1504" x="695.4814" y="1355.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1504" x="705.4814" y="1376.2803">Apply UpdateOAuthClientCredential only for</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6543" x="705.4814" y="1390.2803">mutable fields display_name</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1008.6318" y="1355.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1018.6318" y="1376.2803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="975.0957,1409.5,987.0957,1421.5,975.0957,1433.5,963.0957,1421.5,975.0957,1409.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="118" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="807.9375" y="1453.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="817.9375" y="1474.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="817.9