ont-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="173.689" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.792" x="143.0889" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0469" x="153.0889" y="755.7803">Delete path uses DeleteIdentityTenancy with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.7783" x="153.0889" y="769.7803">required via GetIdentityTenancy or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.792" x="153.0889" y="783.7803">ListIdentityTenancy to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="155.9199" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="165.9199" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="165.9199" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="138.7754" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="148.7754" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M326.4849,929 L326.4849,1105 L306.4849,1109 L326.4849,1113 L326.4849,1289 A0,0 0 0 0 326.4849,1289 L666.5249,1289 A0,0 0 0 0 666.5249,1289 L666.5249,939 L656.5249,929 L326.4849,929 A0,0 0 0 0 326.4849,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M656.5249,929 L656.5249,939 L666.5249,939 L656.5249,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text 