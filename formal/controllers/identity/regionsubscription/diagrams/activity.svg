155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="355.0571" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="355.0571" y="1280.7803">promotion.</text><ellipse cx="318.0571" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="318.0571" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="318.0571" x2="318.0571" y1="65" y2="85"/><polygon fill="#0F172A" points="314.0571,75,318.0571,85,322.0571,75,318.0571,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="318.0571" x2="318.0571" y1="133" y2="153"/><polygon fill="#0F172A" points="314.0571,143,318.0571,153,322.0571,143,318.0571,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="318.0571" x2="318.0571" y1="201" y2="221"/><polygon fill="#0F172A" points="314.0571,211,318.0571,221,322.0571,211,318.0571,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="318.0571" x2="318.0571" y1="269" y2="289"/><polygon fill="#0F172A" points="314.0571,279,318.0571,289,322.0571,279,318.0571,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="160.3096" x2="160.3096" y1="439" y2="459"/><polygon fill="#0F172A" points="156.3096,449,160.3096,459,164.3096,449,160.3096,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="252.3677" x2="160.3096" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="160.3096" x2="160.3096" y1="383" y2="405"/><polygon fill="#0F172A" points="156.3096,395,160.3096,405,164.3096,395,160.3096,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="383.7466" x2="475.8047" y1="383" y2="383"/><line