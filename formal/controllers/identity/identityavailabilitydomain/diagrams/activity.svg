-width:0.5;" width="278.3574" x="669.7045" y="361"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="679.7045" y="381.7803">Create the OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3574" x="679.7045" y="395.7803">CreateIdentityAvailabilityDomain when no</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6406" x="679.7045" y="409.7803">reusable match is found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="665.4354" y="443"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="675.4354" y="463.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="675.4354" y="477.7803">into status</text><polygon fill="#E2E8F0" points="657.4174,497,669.4174,509,657.4174,521,645.4174,509,657.4174,497" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="595.2411,553,719.5936,553,731.5936,565,719.5936,577,595.2411,577,583.2411,565,595.2411,553" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="595.2411" y="568.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="561.455" y="561.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="731.5936" y="561.7803">no</text><rect fill="none" height="395.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="587"/><path d="M61.4688,587 L61.4688,594 L51.4688,604 L11,604" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#0