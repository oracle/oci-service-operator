ica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="168.9995" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="300.1025" x="140.7441" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3574" x="150.7441" y="755.7803">Delete path uses DeleteMfaTotpDevice with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.0889" x="150.7441" y="769.7803">required via GetMfaTotpDevice or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1025" x="150.7441" y="783.7803">ListMfaTotpDevice to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="151.2305" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="161.2305" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="161.2305" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="134.0859" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="144.0859" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M321.7954,929 L321.7954,1105 L301.7954,1109 L321.7954,1113 L321.7954,1289 A0,0 0 0 0 321.7954,1289 L661.8354,1289 A0,0 0 0 0 661.8354,1289 L661.8354,939 L651.8354,929 L321.7954,929 A0,0 0 0 0 321.7954,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M651.8354,929 L651.8354,939 L661.8354,939 L651.8354,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-f