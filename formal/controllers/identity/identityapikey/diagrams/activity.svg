 fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="659.3752" y="381.7803">Create the OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9434" x="659.3752" y="395.7803">CreateIdentityApiKey when no reusable match is</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="35.0342" x="659.3752" y="409.7803">found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="666.8992" y="443"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="676.8992" y="463.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="676.8992" y="477.7803">into status</text><polygon fill="#E2E8F0" points="658.8811,497,670.8811,509,658.8811,521,646.8811,509,658.8811,497" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="596.7048,553,721.0574,553,733.0574,565,721.0574,577,596.7048,577,584.7048,565,596.7048,553" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="596.7048" y="568.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="562.9187" y="561.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="733.0574" y="561.7803">no</text><rect fill="none" height="340" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="587"/><path d="M61.4688,587 L61.4688,594 L51.4688,604 L11,604" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" te