ticationPolicy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.8125" x="532.6145" y="211.7803">spec, tracked status, and delete intent</text><polygon fill="#E2E8F0" points="532.3376,245,791.2693,245,803.2693,257,791.2693,269,532.3376,269,520.3376,257,532.3376,245" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.9316" x="532.3376" y="260.7803">"Tracked or explicit OCI identity present?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="498.5515" y="253.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="803.2693" y="253.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="222.3027" x="399.1863" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3027" x="409.1863" y="299.7803">Get the current OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.7783" x="409.1863" y="313.7803">GetIdentityAuthenticationPolicy</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="287.6953" x="669.4216" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="679.4216" y="299.7803">Resolve an existing OCI resource through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6953" x="679.4216" y="313.7803">ListIdentityAuthenticationPolicy using filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="138.5098" x="679.4216" y="327.7803">compartment_id, state</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#