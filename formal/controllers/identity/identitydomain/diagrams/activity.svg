 textLength="96.4824" x="327.0298" y="1098.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="123.7373" x="327.0298" y="1112.7803">slug: identitydomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.8408" x="327.0298" y="1126.7803">kind: IdentityDomain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="327.0298" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="327.0298" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="327.0298" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="327.0298" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="327.0298" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="327.0298" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="327.0298" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="327.0298" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="327.0298" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="327.0298" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="327.0298" y="1280.7803">promotion.</text><ellipse cx="290.0298" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="290.0298" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="290.0298" x2="290.0298" y1="65" y2="85"/><polygon fill="#0F172A" points="286.0298,75,290.0298,85,294.0298,75,290.0298,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="290.0298" x2="290.0298" y1="133" y2="153"/><polygon fill="#0F172A" points="286.0298,143,290.0298,153,294.0298,143,290.0298,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="290.0298" x2="290.0298" y1="201" y2="221"/><polygon fill="#0F172A" points="286.0298,211,290.0298,221,294.0298,211,290.0298,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="290.0298" x2="290.0298" y1="269" y2="289"/><polygon fill="#0F172A" points="286.0298,279,290.0298,289,294.0298,279,290.0298,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="146.2959" x2="146.2959" y1="439" y2="459"/><polygon fill="#0F172A" points="142.2959,449,146.2959,459,150.2959,449,146.2959,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="224.3403" x2="146.2959" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="146.2959" x2="146.2959" y1="383" y2="405"/><polygon fill="#0F172A" points="142.2959,395,146.2959,405,150.2959,395,146.2959,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="355.7192" x2="433.7637" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x