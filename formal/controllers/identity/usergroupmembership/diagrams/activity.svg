Adjust="spacing" textLength="40.4688" x="14" y="598.7803">Delete</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.9229" x="182.2827" y="621"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9229" x="192.2827" y="641.7803">Delete path uses DeleteUserGroupMembership</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2266" x="192.2827" y="655.7803">with required via GetUserGroupMembership or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3096" x="192.2827" y="669.7803">ListUserGroupMembership to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="192.2827" y="683.7803">confirmation</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="332.0127" x="173.7378" y="732"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0127" x="183.7378" y="752.7803">Confirm deletion via GetUserGroupMembership or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3301" x="183.7378" y="766.7803">ListUserGroupMembership until OCI reaches</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5723" x="183.7378" y="780.7803">DELETED</text><polygon fill="#E2E8F0" points="191.5718,826,487.9165,826,499.9165,838,487.9165,850,191.5718,850,179.5718,838,191.5718,826" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="841.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="834.7803">yes</