st="spacing" textLength="96.4824" x="340.2437" y="1098.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="127.6201" x="340.2437" y="1112.7803">slug: costtrackingtag</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0547" x="340.2437" y="1126.7803">kind: CostTrackingTag</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="340.2437" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="340.2437" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="340.2437" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="340.2437" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="340.2437" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="340.2437" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="340.2437" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="340.2437" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="340.2437" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="340.2437" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="340.2437" y="1280.7803">promotion.</text><ellipse cx="303.2437" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="303.2437" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="303.2437" x2="303.2437" y1="65" y2="85"/><polygon fill="#0F172A" points="299.2437,75,303.2437,85,307.2437,75,303.2437,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="303.2437" x2="303.2437" y1="133" y2="153"/><polygon fill="#0F172A" points="299.2437,143,303.2437,153,307.2437,143,303.2437,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="303.2437" x2="303.2437" y1="201" y2="221"/><polygon fill="#0F172A" points="299.2437,211,303.2437,221,307.2437,211,303.2437,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="303.2437" x2="303.2437" y1="269" y2="289"/><polygon fill="#0F172A" points="299.2437,279,303.2437,289,307.2437,279,303.2437,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="152.9028" x2="152.9028" y1="439" y2="459"/><polygon fill="#0F172A" points="148.9028,449,152.9028,459,156.9028,449,152.9028,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="237.5542" x2="152.9028" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="152.9028" x2="152.9028" y1="383" y2="405"/><polygon fill="#0F172A" points="148.9028,395,152.9028,405,156.9028,395,152.9028,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="368.9331" x2="453.5845" y1="383" y2="383"/><line style="stroke:#0F172A;stro