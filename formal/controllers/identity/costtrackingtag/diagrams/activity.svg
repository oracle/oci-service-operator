" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="181.4478" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="312.5508" x="146.9683" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8057" x="156.9683" y="755.7803">Delete path uses DeleteCostTrackingTag with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.5371" x="156.9683" y="769.7803">required via GetCostTrackingTag or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5508" x="156.9683" y="783.7803">ListCostTrackingTag to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="163.6787" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="173.6787" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="173.6787" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="146.5342" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="156.5342" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M334.2437,929 L334.2437,1105 L314.2437,1109 L334.2437,1113 L334.2437,1289 A0,0 0 0 0 334.2437,1289 L674.2837,1289 A0,0 0 0 0 674.2837,1289 L674.2837,939 L664.2837,929 L334.2437,929 A0,0 0 0 0 334.2437,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M664.2837,929 L664.2837,939 L674.2837,939 L664.2837,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/>