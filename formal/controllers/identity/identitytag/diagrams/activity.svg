hAdjust="spacing" textLength="243.5918" x="159.2874" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="300.1436" x="131.0115" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4746" x="141.0115" y="755.7803">Delete path uses DeleteIdentityTag with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1436" x="141.0115" y="769.7803">required via GetIdentityTag or ListIdentityTag</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.2822" x="141.0115" y="783.7803">to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="141.5183" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="151.5183" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="151.5183" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="124.3738" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="134.3738" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M312.0833,929 L312.0833,1105 L292.0833,1109 L312.0833,1113 L312.0833,1289 A0,0 0 0 0 312.0833,1289 L652.1233,1289 A0,0 0 0 0 652.1233,1289 L652.1233,939 L642.1233,929 L312.0833,929 A0,0 0 0 0 312.0833,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M642.1233,929 L642.1233,939 L652.1233,939 L642.1233,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14