<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2334px" preserveAspectRatio="none" style="width:919px;height:2334px;background:#FCFCFD;" version="1.1" viewBox="0 0 919 2334" width="919px" zoomAndPan="magnify"><title>Activity - identity/Compartment</title><defs/><g><rect fill="#FCFCFD" height="2334" style="stroke:none;stroke-width:1;" width="919" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="207.6895" x="354.3882" y="30.7803">Activity - identity/Compartment</text></g><ellipse cx="421.0867" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="444" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="616.5894" x="138.4695" y="75"/><path d="M260.5378,75 L260.5378,82 L250.5378,92 L138.4695,92" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="141.4695" y="86.7803">Observe and Bind</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="268.6941" y="109"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="278.6941" y="129.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="278.6941" y="143.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="324.2539" x="258.9597" y="177"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2539" x="268.9597" y="197.7803">Read desired Compartment spec, tracked status,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="103.5303" x="268.9597" y="211.7803">and delete intent</text><polygon fill="#E2E8F0" points="291.6208,245,550.5525,245,562.5525,257,550.5525,269,291.6208,269,279.6208,257,291.6208,245" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.9316" x="291.6208" y="260.7803">"Tracked or explicit OCI identity present?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="257.8347" y="253.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="562.5525" y="253.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="222.3027" x="158.4695" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3027" x="168.4695" y="299.7803">Get the current OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3721" x="168.4695" y="313.7803">GetCompartment</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="316.4473" x="414.3289" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="424.3289" y="299.7803">Resolve an existing OCI resource through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4473" x="424.3289" y="313.7803">ListCompartments using filters compartment_id,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.7305" x="424.3289" y="327.7803">name, lifecycle_state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="325.0127" x="410.0461" y="361"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0127" x="420.0461" y="381.7803">Create the OCI resource via CreateCompartment</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4609" x="420.0461" y="395.7803">when no reusable match is found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="429.1047" y="429"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="439.1047" y="449.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="439.1047" y="463.7803">into status</text><polygon fill="#E2E8F0" points="421.0867,483,433.0867,495,421.0867,507,409.0867,495,421.0867,483" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="358.9104,539,483.2629,539,495.2629,551,483.2629,563,358.9104,563,346.9104,551,358.9104,539" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="358.9104" y="554.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="325.1243" y="547.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="495.2629" y="547.7803">no</text><rect fill="none" height="276" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="334.1025" x="11" y="573"/><path d="M61.4688,573 L61.4688,580 L51.4688,590 L11,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="584.7803">Delete</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.7646" x="29.1689" y="607"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0195" x="39.1689" y="627.7803">Delete path uses DeleteCompartment with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.4131" x="39.1689" y="641.7803">best-effort via GetCompartment or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7646" x="39.1689" y="655.7803">ListCompartments to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.1025" x="21" y="704"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3232" x="31" y="724.7803">Confirm deletion via GetCompartment or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1025" x="31" y="738.7803">ListCompartments until OCI reaches DELETED</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="292.3438" x="31.8794" y="781"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3438" x="41.8794" y="801.7803">Allow best-effort completion without finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4824" x="41.8794" y="815.7803">retention</text><ellipse cx="178.0513" cy="895" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="178.0513" cy="895" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="422.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="392.5713" x="473.8364" y="573"/><path d="M624.6704,573 L624.6704,580 L614.6704,590 L473.8364,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="476.8364" y="584.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="340.5713" x="493.8364" y="656"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5713" x="503.8364" y="676.7803">Request requeue while OCI remains in CREATING,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.0137" x="503.8364" y="690.7803">DELETING</text><ellipse cx="664.1221" cy="750" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="664.1221" cy="750" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="577.8389,607,750.4053,607,762.4053,619,750.4053,631,577.8389,631,565.8389,619,577.8389,607" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="668.1221" y="641.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.5664" x="577.8389" y="622.7803">"OCI state in retryable set?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="517.1641" y="870"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="527.1641" y="890.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.3857" x="527.1641" y="904.7803">OCI reaches ACTIVE, INACTIVE</text><ellipse cx="664.1221" cy="950.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="664.1221" cy="950.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="543.6011,821,784.6431,821,796.6431,833,784.6431,845,543.6011,845,531.6011,833,543.6011,821" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="668.1221" y="855.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="543.6011" y="836.7803">"OCI state is outside success targets?"</text><rect fill="none" height="722.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="543.3633" x="365.1025" y="1005.5"/><path d="M531.5225,1005.5 L531.5225,1012.5 L521.5225,1022.5 L365.1025,1022.5" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="368.1025" y="1017.2803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="516.002" y="1039.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="526.002" y="1060.2803">Compare live OCI state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="526.002" y="1074.2803">field surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="512.8984" y="1156.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="522.8984" y="1177.2803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="522.8984" y="1191.2803">fields compartment_id</text><ellipse cx="664.1221" cy="1237" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="664.1221" cy="1237" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="538.5391,1107.5,789.7051,1107.5,801.7051,1119.5,789.7051,1131.5,538.5391,1131.5,526.5391,1119.5,538.5391,1107.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="668.1221" y="1142.2803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="538.5391" y="1123.2803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="553.6943,1290,774.5498,1290,786.5498,1302,774.5498,1314,553.6943,1314,541.6943,1302,553.6943,1290" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="553.6943" y="1305.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="519.9082" y="1298.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="786.5498" y="1298.7803">no</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="292.3574" x="385.1025" y="1324"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3574" x="395.1025" y="1344.7803">Apply UpdateCompartment only for mutable</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.123" x="395.1025" y="1358.7803">fields defined_tags, description,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1719" x="395.1025" y="1372.7803">freeform_tags, name</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="697.46" y="1324"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="707.46" y="1344.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="664.1221,1392,676.1221,1404,664.1221,1416,652.1221,1404,664.1221,1392" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="90" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.5537" x="517.3452" y="1436"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="527.3452" y="1456.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="527.3452" y="1470.7803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="527.3452" y="1484.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="527.3452" y="1498.7803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="527.3452" y="1512.7803">matching field-driven path executes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8613" x="520.6914" y="1546"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8613" x="530.6914" y="1566.7803">Return success for the ACTIVE, INACTIVE</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8135" x="530.6914" y="1580.7803">success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="524.5571" y="1614"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="534.5571" y="1634.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="534.5571" y="1648.7803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.9229" x="538.1606" y="1682"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9229" x="548.1606" y="1702.7803">Requeue on provisioning, terminating</text><path d="M452.0867,1738 L452.0867,2026 L432.0867,2030 L452.0867,2034 L452.0867,2322 A0,0 0 0 0 452.0867,2322 L787.4167,2322 A0,0 0 0 0 787.4167,2322 L787.4167,1748 L777.4167,1738 L452.0867,1738 A0,0 0 0 0 452.0867,1738" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M777.4167,1738 L777.4167,1748 L787.4167,1748 L777.4167,1738" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="458.0867" y="1753.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="458.0867" y="1767.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="458.0867" y="1781.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="458.0867" y="1795.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="458.0867" y="1809.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="458.0867" y="1823.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="458.0867" y="1837.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="458.0867" y="1851.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="458.0867" y="1865.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="458.0867" y="1879.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="458.0867" y="1893.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="458.0867" y="1907.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="115.1582" x="458.0867" y="1921.7803">slug: compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="118.2686" x="458.0867" y="1935.7803">kind: Compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="458.0867" y="1949.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="458.0867" y="1963.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="458.0867" y="1977.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="458.0867" y="1991.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="458.0867" y="2005.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="458.0867" y="2019.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1719" x="458.0867" y="2033.7803">freeform_tags, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="458.0867" y="2047.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="458.0867" y="2061.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="458.0867" y="2075.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="458.0867" y="2089.7803">list lookup: oci_identity_compartments filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8887" x="458.0867" y="2103.7803">compartment_id, name, lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="458.0867" y="2117.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="458.0867" y="2131.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.585" x="458.0867" y="2145.7803">The checked-in Compartment runtime keeps the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1855" x="458.0867" y="2159.7803">`identity` service disabled for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="458.0867" y="2173.7803">blank/default-active runs while preserving the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8682" x="458.0867" y="2187.7803">explicit Compartment rollout in-repo.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4609" x="458.0867" y="2201.7803">Generated runtime binds through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4268" x="458.0867" y="2215.7803">`ListCompartments`, reads back the live</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3301" x="458.0867" y="2229.7803">Compartment with `GetCompartment`, and stamps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5645" x="458.0867" y="2243.7803">the observed OCI identity into status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5439" x="458.0867" y="2257.7803">Delete is best-effort for compartments. After</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.123" x="458.0867" y="2271.7803">`DeleteCompartment` is accepted, or OCI already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6338" x="458.0867" y="2285.7803">reports `DELETING` or `DELETED`, the controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4541" x="458.0867" y="2299.7803">clears the finalizer and lets cloud-side</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="458.0867" y="2313.7803">teardown finish asynchronously.</text><ellipse cx="421.0867" cy="2030" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="421.0867" cy="2030" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="421.0867" x2="421.0867" y1="157" y2="177"/><polygon fill="#0F172A" points="417.0867,167,421.0867,177,425.0867,167,421.0867,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="572.5525" x2="572.5525" y1="341" y2="361"/><polygon fill="#0F172A" points="568.5525,351,572.5525,361,576.5525,351,572.5525,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="572.5525" x2="572.5525" y1="409" y2="429"/><polygon fill="#0F172A" points="568.5525,419,572.5525,429,576.5525,419,572.5525,423" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="279.6208" x2="269.6208" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="269.6208" x2="269.6208" y1="257" y2="279"/><polygon fill="#0F172A" points="265.6208,269,269.6208,279,273.6208,269,269.6208,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="562.5525" x2="572.5525" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="572.5525" x2="572.5525" y1="257" y2="279"/><polygon fill="#0F172A" points="568.5525,269,572.5525,279,576.5525,269,572.5525,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="269.6208" x2="269.6208" y1="327" y2="495"/><line style="stroke:#0F172A;stroke-width:1;" x1="269.6208" x2="409.0867" y1="495" y2="495"/><polygon fill="#0F172A" points="399.0867,491,409.0867,495,399.0867,499,403.0867,495" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="572.5525" x2="572.5525" y1="477" y2="495"/><line style="stroke:#0F172A;stroke-width:1;" x1="572.5525" x2="433.0867" y1="495" y2="495"/><polygon fill="#0F172A" points="443.0867,491,433.0867,495,443.0867,499,439.0867,495" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="421.0867" x2="421.0