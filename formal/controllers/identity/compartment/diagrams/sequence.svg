2.8335" x="695.3345" y="1114"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="710.3345" y="1125.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4619" x="777.1001" y="1126.7803">[supported mutable drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg16"><polygon fill="#0F172A" points="1036.7231,1174,1046.7231,1178,1036.7231,1182,1040.7231,1178" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="783.5308" x2="1042.7231" y1="1178" y2="1178"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6611" x="790.5308" y="1144.7803">Apply UpdateCompartment only for</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3369" x="790.5308" y="1158.7803">mutable fields defined_tags,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6543" x="790.5308" y="1172.7803">description, freeform_tags, name</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg17"><polygon fill="#0F172A" points="1036.7231,1251,1046.7231,1255,1036.7231,1259,1040.7231,1255" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="783.5308" x2="1042.7231" y1="1255" y2="1255"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="790.5308" y="1207.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="790.5308" y="1221.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="790.5308" y="1235.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="790.5308" y="1249.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg18"><polygon fill="#0F172A" points="532.394,1286,522.394,1290,532.394,1294,528.394,1290" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="526.394" x2="782.5308" y1="1290" y2="1290"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2334" x="538.394" y="1284.7803">status=required, finalizer=none</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg19"><polygon fill="#0F172A" points="281.9194,1321,271.9194,1325,281.9194,1329,277.9194,1325" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="275.9194" x2="520.394" y1="1325" y2="1325"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4746" x="287.9194" y="1319.7803">requeue on provisioning, terminating</text></g><path d="M788,1346 L788,1956 A8,8 0 0 0 796,1964 L1115,1964 A8,8 0 0 0 1123,1956 L1123,1348 L1113,1338 L796,1338 A8,8 0 0 0 788,1346" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1113,1338 L1113,1344 A4,4 0 0 0 1117,1348 L1123,1348 L1113,1338" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="794" y="1353.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="794" y="1367.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="794" y="1381.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="794" y="1395.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="794" y="1409.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="794" y="1423.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="794" y="1437.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="794" y="1451.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="794" y="1465.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="794" y="1479.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="794" y="1493.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="794" y="1507.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="794" y="1521.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="794" y="1535.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="794" y="1549.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="115.1582" x="794" y="1563.7803">slug: compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="118.2686" x="794" y="1577.7803">kind: Compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="794" y="1591.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="794" y="1605.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="794" y="1619.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="794" y="1633.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="794" y="1647.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="794" y="1661.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1719" x="794" y="1675.7803">freeform_tags, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="794" y="1689.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="794" y="1703.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="794" y="1717.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="794" y="1731.7803">list lookup: oci_identity_compartments filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8887" x="794" y="1745.7803">compartment_id, name, lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="794" y="1759.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="794" y="1773.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.585" x="794" y="1787.7803">The checked-in Compartment runtime keeps the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1855" x="794" y="1801.7803">`identity` service disabled for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="794" y="1815.7803">blank/default-active runs while preserving the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8682" x="794" y="1829.7803">explicit Compartment rollout in-repo.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4609" x="794" y="1843.7803">Generated runtime binds through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4268" x="794" y="1857.7803">`ListCompartments`, reads back the live</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3301" x="794" y="1871.7803">Compartment with `GetCompartment`, and stamps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5645" x="794" y="1885.7803">the observed OCI identity into status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5439" x="794" y="1899.7803">Delete is best-effort for compartments. After</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.123" x="794" y="1913.7803">`DeleteCompartment` is accepted, or OCI already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6338" x="794" y="1927.7803">reports `DELETING` or `DELETED`, the controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4541" x="794" y="1941.7803">clears the finalizer and lets cloud-side</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="794" y="1955.7803">teardown finish asynchronously.</text><?plantuml-src fLZRRXit47tdLn3fIm98TXp7kIX8WSHsqo1k0jZfcm6BsfsLMA_8BScLeXRzzvxXtjToOwJmWxtBuLpFd9crlzMcK4wjfL-fr6wrMSfCvPw4RqyMAhbTEbkQzDJcricViWG_QKyYfKoLUVZ5cl1PhKd-Ilc6WaxKVfah_HV9e-UzG-MStTRQdsP7Bv_rRneRwFqT7xBiPVfYB6LTIgwMM3m_ENxwUYJ1vklpu-FdHoSdlVEeFh7Ea9D7BqJG8ITvHN-MP1AIKwbJCdYvEporQzm8QpoA5TxApDgmiDzwkdnpxMyXfKg2TGFVwXYRet5mz8nUPKznp6PqeWjbmlxxVO67QEd5t-h8TKONsWopz_gvEbwymYchB0P7oI8zeQFsw4vbNcKgIyG_8iOcFvKBGae3UT7pGvx24MVpdDpWzNlbwP8IQn8zFdhqvUhBfojo6vtGRyge9Rb7KdavV3MuykNqe-2gIxj1JOUw9wDxmB-ZL3hoDY-3jcPMlpfCjLgYflwmUfvs8jEcp0T-ismqf9GZsdjlLyV3csJIY4xH9KjEV-xbQ2R9GBuasSCUVAs34Pqatni6EfFjtuyTM_NXYHYAyALXEcQTSWJaDGVMXtqilRomzXQ_5DnVQ9CAbGSP7001QPIUlXKvIX7hq7QFLBaZbUvmgdtmOcYNFO7qJ7wWqBT7eAHMTQjAUxdMteEqxbDp0HizFVvnflD0pi-kJTAzlj7fH1emr-JQS3SakoId6nzKe2SnA4UbLmlaWYFX-fSElGtpg1gw7-2_pu5J11ke7qfkRI6J-5eMg3nJxkdb-Rkl7pz_U6WsO2zcPBzVFvRXFJ7imLA1v45hrISR56DGMsqaPwtqKHrdheAxh857QOsSi_ZwFjUgqxvtzmZ2hqoxTMDbezKeBC3msen1K9MWljEKuEpyulpX9M1utr7xm1Gka8WfPPbrRNeOY_W3b2BjmaC54jKMcJCSiSY0SnJSZal-44inwo2DxKgt65ahRJmATMqQq4swsAEzN6-eDiWAqFjUPfhoTAgseB1hapgT1KaRbPUAVMvg6b-lm0OvTsH7l4DF9ypALsLH87xWfonIjkHBbwc4PhmdO1QbDq4j_KI0UnA