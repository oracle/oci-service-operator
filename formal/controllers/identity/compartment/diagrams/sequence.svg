oke-dasharray:2,2;" x1="526.394" x2="787.9722" y1="1378" y2="1378"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="538.394" y="1358.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="538.394" y="1372.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg20"><polygon fill="#0F172A" points="281.9194,1409,271.9194,1413,281.9194,1417,277.9194,1413" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="275.9194" x2="520.394" y1="1413" y2="1413"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4746" x="287.9194" y="1407.7803">requeue on provisioning, terminating</text></g><path d="M793,1434 L793,2030 A8,8 0 0 0 801,2038 L1120,2038 A8,8 0 0 0 1128,2030 L1128,1436 L1118,1426 L801,1426 A8,8 0 0 0 793,1434" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1118,1426 L1118,1432 A4,4 0 0 0 1122,1436 L1128,1436 L1118,1426" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="799" y="1441.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="799" y="1455.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="799" y="1469.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="799" y="1483.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="799" y="1497.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="799" y="1511.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="799" y="1525.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="799" y="1539.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="799" y="1553.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="799" y="1567.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="799" y="1581.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="799" y="1595.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="799" y="1609.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="799" y="1623.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="799" y="1637.7803">service: identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="115.1582" x="799" y="1651.7803">slug: compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="118.2686" x="799" y="1665.7803">kind: Compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="799" y="1679.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="799" y="1693.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="799" y="1707.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="799" y="1721.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="799" y="1735.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="799" y="1749.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="799" y="1763.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1719" x="799" y="1777.7803">freeform_tags, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="799" y="1791.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3789" x="799" y="1805.7803">compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="799" y="1819.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="799" y="1833.7803">list lookup: oci_identity_compartments filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8887" x="799" y="1847.7803">compartment_id, name, lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="799" y="1861.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="799" y="1875.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.585" x="799" y="1889.7803">The checked-in Compartment runtime keeps the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1855" x="799" y="1903.7803">`identity` service disabled for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="799" y="1917.7803">blank/default-active runs while preserving the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8682" x="799" y="1931.7803">explicit Compartment rollout in-repo.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4609" x="799" y="1945.7803">Generated runtime binds through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4268" x="799" y="1959.7803">`ListCompartments`, reads back the live</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3301" x="799" y="1973.7803">Compartment with `GetCompartment`, and stamps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5645" x="799" y="1987.7803">the observed OCI identity into status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6885" x="799" y="2001.7803">Delete keeps the finalizer until follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.999" x="799" y="2015.7803">observation confirms `DELETED` or the resource</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.7578" x="799" y="2029.7803">is no longer returned by OCI.</text><?plantuml-src fLZRRXit47tdLn3fIm9exJYsSzaW1HBRJOAu2M2dRmOiQdTMOhrBRack5BNeltU6NExDSYAay8CiNkPwvinGzawgMXXHSRiIkTv8jUI5A2qms-qiH7QtDBfH-PakjU6_51d-vOCJEHIYATrlMhdFeWB-0SerE9c9tMUkvT_0Zqu6cy8OlMcbFosENZmRtbJQmRjxDXJ5Y_pvz9GsEPZsnEBazFZfgya9Kj_k7n-V79sU3lQz-4mR1OOVFMTEkXBuDVpLWCg09rpce71nUtYcAxpXAlpALhZA2wtTGdyRoBBnsZ-CSv4vRKQsjJx6hQbpy0nU5aznczJ8JDP2kTttXmVsaJBmlvDHoW8kfHf7xzM9E5wyn5qIMO-siaL-2aVTrhtCl2n4aR5_cVUDVseMW25rODd03dw6XXXTbc16o--4XIl8jChaTElHb-ildwx1h6K6lmibbc0USM7vU6bqvSlPHqPPvtgDEHtBdatk8VuDvDo0rMNZf5PfktIOIx74dDh3y3tfZoGnpGTslOmISYZHsmTlX-tnJL2vHoVhWyMJNmSnIZaeFDy07s0FRMsTOVr9kZTsDENT_uyDQRNk2HiVeKlZSAIzS7J8Id9i27kVUdwfzHr-23H_8LNEHEcuCmW8F8sfXszrYQdmUUYgXulIWCYtk2kjisoibop1qob_3swe3v2IEj6TA6bv9Qr5qdf8p2Ng6CYnZmjPEZ0slL5PltmhynbNo5op6qNLa6sp4cwj4mwUUASCD5OiC1Ra2UM_CLZRg1wpXjMFu7_8W3Dqri7GbLBhccT-cTUOUQBSiwkBjry_Vdw_RpHGdu_8Rhj-Bi8xVDY1fHg3Xr93dQmn6QFSIiKfQetruYXo0Uwy1HxaBNBE_V93feNTeNKF74Ix2ccgg6KjnSGjXE6Dce8WfA2z4rDmVd5viNyA2Dxtn4QV4Jn2ePDuff1AbDZk34O0Lwq7pQBKXEDzmct02GngQwj7f2ytN3VRW85sZ-2C_o0hSRsmA7bV1S6itb1HO87Sbnf05u57MG_Me3_U68BXVWe3aMrMiiDjXJvQ1C-DYeKmw_FXzPLo7Tqd0SX75as6Ca_41cdrHkL65ex3MfIDyEQsEFFBAmnPIIpHDuEnfJFg5DTDNMk36ELDdPCcsvX2P93Ix8BzCRzrOcbd3FamCx8cBJDU6812cohiUH9XL_0dP8ulQ0DurP3PAT84rcQYO1CCjsnCGAmbqqXGV2S_iGazzQr3rswW0g57jO7qwmZS8JgOgXoJchbzeJ5qWpBbNObO88Ms2nbj4H7zM5DRJs_hkjpoFtoaHuMbSBcWieqYGxZ6IS24_oWBy30fcqRn5PJ8PNo5KRVO33mVlt559D63GDnNxTVNDog0OdWa63yu4efcU2GmMJooBya63dtJ8Zr7RxloV1CO8McGSCkavRzkhF0AfhrzCad40aIYg8rUIuiHH8pCECAkGZMkAnGZbojCIC5tZqhjPFF_vgGVIjarBrqxH0icNLVShO3V6ztwyHj1mJ3bvtu-yLvYoaJR9sknzFuIWf0XM011eatI4a0kRIrSjZfWbsABeHmeY