ica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="162.9839" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="290.0059" x="139.7769" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2607" x="149.7769" y="755.7803">Delete path uses DeleteIdentityGroup with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.9922" x="149.7769" y="769.7803">required via GetIdentityGroup or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0059" x="149.7769" y="783.7803">ListIdentityGroup to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="145.2148" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="155.2148" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="155.2148" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="128.0703" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="138.0703" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M315.7798,929 L315.7798,1105 L295.7798,1109 L315.7798,1113 L315.7798,1289 A0,0 0 0 0 315.7798,1289 L655.8198,1289 A0,0 0 0 0 655.8198,1289 L655.8198,939 L645.8198,929 L315.7798,929 A0,0 0 0 0 315.7798,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M645.8198,929 L645.8198,939 L655.8198,939 L645.8198,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-f