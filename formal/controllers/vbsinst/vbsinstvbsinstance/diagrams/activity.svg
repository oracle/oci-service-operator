91" y="241.7803">Resolve OCI state via GetVbsInstVbsInstance</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.668" x="177.5991" y="255.7803">with ListVbsInstVbsInstance fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="161.7681" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="171.7681" y="309.7803">Use scaffold_vbsinst_vbsinstvbsinstance</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="171.7681" y="323.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="171.7681" y="337.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="266.6987,371,374.0776,371,386.0776,383,374.0776,395,266.6987,395,254.6987,383,266.6987,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="266.6987" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="232.9126" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="386.0776" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="300.9502" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9502" x="21" y="425.7803">Update path calls UpdateVbsInstVbsInstance</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="28.124" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust