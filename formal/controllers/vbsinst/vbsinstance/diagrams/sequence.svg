ating,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="280.1606" y="1787.7803">terminating</text></g><path d="M774,1814 L774,2774 A8,8 0 0 0 782,2782 L1115,2782 A8,8 0 0 0 1123,2774 L1123,1816 L1113,1806 L782,1806 A8,8 0 0 0 774,1814" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1113,1806 L1113,1812 A4,4 0 0 0 1117,1816 L1123,1816 L1113,1806" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="780" y="1821.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="780" y="1835.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="780" y="1849.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="780" y="1863.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="780" y="1877.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="780" y="1891.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="780" y="1905.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="780" y="1919.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="780" y="1933.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="780" y="1947.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="780" y="1961.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="780" y="1975.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="780" y="1989.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="780" y="2003.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="95.6963" x="780" y="2017.7803">service: vbsinst</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3926" x="780" y="2031.7803">slug: vbsinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5098" x="780" y="2045.7803">kind: VbsInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="780" y="2059.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="780" y="2073.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="780" y="2087.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="780" y="2101.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="780" y="2115.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="780" y="2129.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="780" y="2143.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4883" x="780" y="2157.7803">GetVbsInstance; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="780" y="2171.7803">GetVbsInstance; delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9297" x="780" y="2185.7803">GetVbsInstance/ListVbsInstances confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="780" y="2199.7803">supported drift: definedTags, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5918" x="780" y="2213.7803">freeformTags, isResourceUsageAgreementGranted</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="780" y="2227.7803">(+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="780" y="2241.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1719" x="780" y="2255.7803">compartmentId, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="780" y="2269.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="780" y="2283.7803">list lookup: oci_vbs_inst_vbs_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="780" y="2297.7803">compartmentId, name, id; exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.123" x="780" y="2311.7803">plus name unique match in ACTIVE, CREATING, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.7441" x="780" y="2325.7803">UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="780" y="2339.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="780" y="2353.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="780" y="2367.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="780" y="2381.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="780" y="2395.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.751" x="780" y="2409.7803">terminal and DELETED is only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6406" x="780" y="2423.7803">delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3086" x="780" y="2437.7803">Create, update, and delete responses expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="780" y="2451.7803">work-request headers but do not return a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7158" x="780" y="2465.7803">VbsInstance body. The runtime resumes through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.8887" x="780" y="2479.7803">GetWorkRequest, recovers the affected</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.8818" x="780" y="2493.7803">VbsInstance OCID from work-request resources,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0811" x="780" y="2507.7803">and then rereads GetVbsInstance before settling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3232" x="780" y="2521.7803">Pre-create reuse only runs when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="328.4121" x="780" y="2535.7803">spec.compartmentId and spec.name are present and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1504" x="780" y="2549.7803">keeps exact compartmentId plus name matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.0957" x="780" y="2563.7803">bounded to ACTIVE, CREATING, or UPDATING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3447" x="780" y="2577.7803">summaries.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="117.4893" x="780" y="2591.7803">Only displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4541" x="780" y="2605.7803">isResourceUsageAgreementGranted,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1162" x="780" y="2619.7803">resourceCompartmentId, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5986" x="780" y="2633.7803">definedTags reconcile in place; name remains</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5166" x="780" y="2647.7803">create-time identity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.626" x="780" y="2661.7803">ChangeVbsInstanceCompartment stays out of scope</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.9785" x="780" y="2675.7803">for the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8467" x="780" y="2689.7803">The provider-only idcs_access_token header input</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2676" x="780" y="2703.7803">is intentionally not part of the published CRD</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.9648" x="780" y="2717.7803">surface for VbsInstance.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8057" x="780" y="2731.7803">Required status projection keeps VbsAccessUrl,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.8887" x="780" y="2745.7803">lifecycleDetails, and systemTags on the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.5088" x="780" y="2759.7803">published kind, and the runtime has no secret</text><