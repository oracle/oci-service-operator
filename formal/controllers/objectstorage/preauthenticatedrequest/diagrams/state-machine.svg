<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="825px" preserveAspectRatio="none" style="width:724px;height:825px;background:#FCFCFD;" version="1.1" viewBox="0 0 724 825" width="724px" zoomAndPan="magnify"><title>State Machine - objectstorage/PreauthenticatedRequest</title><defs/><g><rect fill="#FCFCFD" height="825" style="stroke:none;stroke-width:1;" width="724" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="371.0889" x="168.5163" y="20.7803">State Machine - objectstorage/PreauthenticatedRequest</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="181.041" x="172.36" y="137"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="172.36" x2="353.401" y1="175" y2="175"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.71" x="182.36" y="152.7803">provisioning</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.041" x="182.36" y="166.7803">provider: PROVISIONING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="128.9238" x="198.42" y="404"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="198.42" x2="327.3438" y1="442" y2="442"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5723" x="208.42" y="419.7803">active</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9238" x="208.42" y="433.7803">provider: ACTIVE</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="150.6963" x="18.54" y="671"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="18.54" x2="169.2363" y1="709" y2="709"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.7168" x="28.54" y="686.7803">updating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.6963" x="28.54" y="700.7803">provider: UPDATING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="148.3721" x="280.7" y="671"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="280.7" x2="429.0721" y1="709" y2="709"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="290.7" y="686.7803">terminating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="290.7" y="700.7803">provider: DELETING</text></g><ellipse cx="262.88" cy="51" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="354.88" cy="808" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="354.88" cy="808" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="29" id="ent0003"><path d="M362.64,271 L362.64,425 L327.84,429 L362.64,433 L362.64,587 A8,8 0 0 0 370.64,595 L707.1214,595 A8,8 0 0 0 715.1214,587 L715.1214,273 L705.1214,263 L370.64,263 A8,8 0 0 0 362.64,271" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M705.1214,263 L705.1214,269 A4,4 0 0 0 709.1214,273 L715.1214,273 L705.1214,263" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="368.64" y="278.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="368.64" y="292.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="368.64" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="368.64" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="368.64" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="368.64" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="368.64" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="368.64" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="368.64" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="368.64" y="404.7803">service: objectstorage</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4609" x="368.64" y="418.7803">slug: preauthenticatedrequest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4609" x="368.64" y="432.7803">kind: PreauthenticatedRequest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="368.64" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="368.64" y="460.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="368.64" y="474.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="368.64" y="488.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="368.64" y="502.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="368.64" y="516.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="368.64" y="530.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="368.64" y="544.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="368.64" y="558.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="368.64" y="572.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="368.64" y="586.7803">promotion.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M262.88,61.29 C262.88,77.87 262.88,107.03 262.88,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="262.88,136.85,266.88,127.85,262.88,131.85,258.88,127.85,262.88,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0195" x="263.88" y="102.7803">CreatePreauthenticatedRequest</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk4"><path d="M262.88,187.46 C262.88,237.94 262.88,347.17 262.88,397.6" fill="none" id="provisioning-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="262.88,403.6,266.88,394.6,262.88,398.6,258.88,394.6,262.88,403.6" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="263.88" y="228.7803">ACTIVE</text></g><!--link active to updating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk5"><path d="M208.3,454.49 C148.21,484.81 54.85,542.73 14.88,625 C6,643.3 14.6229,655.6455 32.9629,667.4355" fill="none" id="active-to-updating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="38.01,670.68,32.6024,662.4485,33.8041,667.9762,28.2764,669.1779,38.01,670.68" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.1436" x="15.88" y="636.7803">UpdatePreauthenticatedRequest</text></g><!--link updating to active--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="dependency" data-source-line="25" id="lnk6"><path d="M169.53,677.9 C189.88,669.86 210.05,658.1 223.88,641 C268.27,586.11 268.7267,502.8455 265.7567,460.1855" fill="none" id="updating-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="265.34,454.2,261.9747,463.4561,265.6873,459.1879,269.9554,462.9005,265.34,454.2" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="234.83" y="636.7803">ACTIVE</text></g><!--link active to terminating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="26" id="lnk7"><path d="M271.37,454.46 C288.9,504.94 326.943,614.5016 344.443,664.9316" fill="none" id="active-to-terminating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="346.41,670.6,347.2384,660.786,344.7708,665.8763,339.6805,663.4087,346.41,670.6" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4678" x="336.01" y="636.7803">DeletePreauthenticatedRequest</text></g><!--link terminating to *end*--><g class="link" data-entity-1="ent0005" data-entity-2="ent0008" data-link-type="dependency" data-source-line="27" id="lnk9"><path d="M354.88,721.41 C354.88,744.96 354.88,773.47 354.88,790.58" fill="none" id="terminating-to-*end*" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="354.88,796.58,358.88,787.58,354.88,791.58,350.88,787.58,354.88,796.58" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5723" x="355.88" y="762.7803">DELETED</text></g><?plantuml-src XLNVRzCm47xtNt62DxIsA-j-a4b8OosZ4dJJkkq5qEGwbyJCiOFjj0p4_yuvJRAqMuNwKllklhllxZx7FKXTSCjpS1cFpKhg51Ak73BNMXPSFAJMb3e-DyfOU9q8-iKTZnWJNYh_qMW_upd29rHBz5BmbttcyZV2SDGnSclDgaRVJuR7RxkHsdZyyAo693cEZxQzZ8tHrXwBqU71_hijZv2-jXySZ8Q7Xnrx1I-CrMXXUCIyz0fXxhb7-C959ZL23ypY1mhllB4ynS6LHLxw37KWwp6-nfybEjy1TLNy7mOljF4auOa8bcxPDNs0vAdKzexGR7CvZ4SOdz0bjeYrtr-splggi6OfdJIQnlfDLoTA5C7LzUNTT3wzd4rd5w-0E-WwDi5SUBd4RjZP-StqRb85h8sDQrd4t6_bkBqQdzqq-8r34-3Hvb8_YnbFFa_Qc8uF-_hcE_HwxpVgX0ZEgVqUTmrXmpb4huk6XWYhpy7K54Z6s_1t9sZh-1_0JlLa7wF2tPXTtn0RsDRDc8nPM5kmCiqycAHjVCOjnX1BdjAMHVLvK9_TO7tk2TeXQvH2swiwtylNYzntovJDmp91OaqEL1JKa4yXK6JS8UGcHWLSa-0B59Ahe5wP5yOI1MY6jrvqjqSw3rGPOQVewKo1zA98LLe4_2MzWmmjzXct8aF_M209muiiWWiauOMsW4Exb28KgqbabZsLv23dnNPEaDgR3WMsJS71IlgCiXTA2acKgTc1XQrOsJ254g