4155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="370.6089" y="1266.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="370.6089" y="1280.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="370.6089" y="1294.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="370.6089" y="1308.7803">promotion.</text><ellipse cx="333.6089" cy="1137" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="333.6089" cy="1137" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="333.6089" x2="333.6089" y1="65" y2="85"/><polygon fill="#0F172A" points="329.6089,75,333.6089,85,337.6089,75,333.6089,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="333.6089" x2="333.6089" y1="133" y2="153"/><polygon fill="#0F172A" points="329.6089,143,333.6089,153,337.6089,143,333.6089,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="333.6089" x2="333.6089" y1="201" y2="221"/><polygon fill="#0F172A" points="329.6089,211,333.6089,221,337.6089,211,333.6089,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="333.6089" x2="333.6089" y1="269" y2="289"/><polygon fill="#0F172A" points="329.6089,279,333.6089,289,337.6089,279,333.6089,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="168.0854" x2="168.0854" y1="453" y2="473"/><polygon fill="#0F172A" points="164.0854,463,168.0854,473,172.0854,463,168.0854,467" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="267.9194" x2="168.0854" y1=