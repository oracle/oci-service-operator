<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="716px" preserveAspectRatio="none" style="width:3595px;height:716px;background:#FCFCFD;" version="1.1" viewBox="0 0 3595 716" width="3595px" zoomAndPan="magnify"><title>State Machine - objectstorage/ObjectStorageBucket</title><defs/><g><rect fill="#FCFCFD" height="716" style="stroke:none;stroke-width:1;" width="3595" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="344.6406" x="1618.6327" y="20.7803">State Machine - objectstorage/ObjectStorageBucket</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="172" y="571"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="172" x2="436.3643" y1="595" y2="595"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="277.7271" y="586.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="177" y="610.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="177" y="624.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1233.36" y="489"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1238.36" y="512.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2027.04" y="476"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2032.04" y="499.7803">Ready</text><rect fill="#F8FAFC