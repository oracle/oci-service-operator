08" y="580"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3013.08" y="603.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="602" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="53" id="ent0003"><path d="M2253.23,49 L2253.23,398.44 L2077.75,484.52 L2253.23,406.44 L2253.23,589 A8,8 0 0 0 2261.23,597 L2602.3872,597 A8,8 0 0 0 2610.3872,589 L2610.3872,51 L2600.3872,41 L2261.23,41 A8,8 0 0 0 2253.23,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2600.3872,41 L2600.3872,47 A4,4 0 0 0 2604.3872,51 L2610.3872,51 L2600.3872,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2259.23" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2259.23" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2259.23" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2259.23" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2259.23" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2259.23" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2259.23" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2259.23" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2259.23" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="2259.23" y="182.7803">service: objectstorage</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7646" x="2259.23" y="196.7803">slug: objectstoragebucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7578" x="2259.23" y="210.7803">kind: ObjectStorageBucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2259.23" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2259.23" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2259.23" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.9092" x="2259.23" y="266.7803">requeue: updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2259.23" y="280.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="2259.23" y="294.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4883" x="2259.23" y="308.7803">supported drift: auto_tiering, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.292" x="2259.23" y="322.7803">defined_tags, freeform_tags (+7 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2259.23" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9307" x="2259.23" y="350.7803">storage_tier</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2259.23" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="2259.23" y="378.7803">list lookup: oci_objectstorage_buckets filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3369" x="2259.23" y="392.7803">name, namespace, compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2259.23" y="406.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2259.23" y="420.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.6191" x="2259.23" y="434.7803">The published ObjectStorageBucket kind reuses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="336.1572" x="2259.23" y="448.7803">the Bucket SDK family and resolves namespaceName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2402" x="2259.23" y="462.7803">from observed status first, then through a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.502" x="2259.23" y="476.7803">GetNamespace lookup when spec.namespace is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.7998" x="2259.23" y="490.7803">omitted.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1846" x="2259.23" y="504.7803">Successful create and update responses without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="2259.23" y="518.7803">lifecycle fields are treated as synchronous</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="2259.23" y="532.7803">success and projected directly into status,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.2061" x="2259.23" y="546.7803">including status.status.ocid.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9297" x="2259.23" y="560.7803">Delete keeps the finalizer until DeleteBucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="2259.23" y="574.7803">succeeds and a follow-up read confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.1719" x="2259.23" y="588.7803">bucket is gone.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="94" id="ent0006"><path d="M2945.39,663 L2945.39,670.83 L2483.04,654.24 L2945.39,678.83 L2945.39,699 A8,8 0 0 0 2953.39,707 L3215.1888,707 A8,8 0 0 0 3223.1888,699 L3223.1888,665 L3213.1888,655 L2953.39,655 A8,8 0 0 0 2945.39,663" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3213.1888,655 L3213.1888,661 A4,4 0 0 0 3217.1888,665 L3223.1888,665 L3213.1888,655" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2951.39" y="670.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.7988" x="2951.39" y="684.7803">delete observe: GetBucket or ListBuckets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2951.39" y="698.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.2,602 C49.21,602 105.71,602 165.54,602" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="171.54,602,162.54,598,166.54,602,162.54,606,171.54,602" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8203" x="57" y="597.7803">CreateBucket</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M436.64,602 C527.55,602 638.29,602 708.14,602" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="714.14,602,705.14,598,709.14,602,705.14,606,714.14,602" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="467.36" y="597.7803">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="34" id="lnk5"><path d="M837.64,600.54 C938.94,597.46 1137.69,588.55 1203.36,565 C1225.18,557.18 1241.9894,545.821 1257.4094,533.251" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1262.06,529.46,1252.5568,532.0462,