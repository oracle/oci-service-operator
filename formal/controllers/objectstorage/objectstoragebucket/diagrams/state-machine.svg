<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="702px" preserveAspectRatio="none" style="width:3591px;height:702px;background:#FCFCFD;" version="1.1" viewBox="0 0 3591 702" width="3591px" zoomAndPan="magnify"><title>State Machine - objectstorage/Bucket</title><defs/><g><rect fill="#FCFCFD" height="702" style="stroke:none;stroke-width:1;" width="3591" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="248.9512" x="1664.1374" y="20.7803">State Machine - objectstorage/Bucket</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="172" y="557"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="172" x2="436.3643" y1="581" y2="581"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="277.7271" y="572.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="177" y="596.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="177" y="610.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1233.36" y="475"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1238.36" y="498.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2027.04" y="462"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2032.04" y="485.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8