><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="736" y="1295.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="736" y="1309.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="736" y="1323.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="736" y="1337.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="736" y="1351.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="736" y="1365.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="736" y="1379.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="736" y="1393.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="736" y="1407.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="736" y="1421.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="736" y="1435.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="736" y="1449.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="736" y="1463.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="736" y="1477.7803">service: objectstorage</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7646" x="736" y="1491.7803">slug: objectstoragebucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2617" x="736" y="1505.7803">kind: Bucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="736" y="1519.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="736" y="1533.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="736" y="1547.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.9092" x="736" y="1561.7803">requeue: updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="736" y="1575.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="736" y="1589.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4883" x="736" y="1603.7803">supported drift: auto_tiering, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.292" x="736" y="1617.7803">defined_tags, freeform_tags (+5 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="736" y="1631.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9307" x="736" y="1645.7803">storage_tier</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="736" y="1659.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="736" y="1673.7803">list lookup: oci_objectstorage_buckets filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3369" x="736" y="1687.7803">name, namespace, compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="736" y="1701.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="736" y="1715.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8398" x="736" y="1729.7803">The published Bucket kind reuses the Bucket SDK</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.8125" x="736" y="1743.7803">family and resolves namespaceName from observed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1709" x="736" y="1757.7803">status first, then through a GetNamespace lookup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8887" x="736" y="1771.7803">when spec.namespace is omitted.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1846" x="736" y="1785.7803">Successful create and update responses without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="736" y="1799.7803">lifecycle fields are treated as synchronous</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="736" y="1813.7803">success and projected directly into status,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.2061" x="736" y="1827.7803">including status.status.ocid.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9297" x="736" y="1841.7803">Delete keeps the finalizer until DeleteBucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="736" y="1855.7803">succeeds and a follow-up read confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.1719" x="736" y="1869.7803">bucket is gone.</text><?plantuml-src fLTPRnit47xdho3QbmILv3YsSoX8WSP13yHDWBXzCs1GkxCIOuhSabmfQj7_te_7NhAKk2qCUxqyvlfclfbrTrBNmeerTojHcgtKIru9vOYvRcSXYhkbDOqkBuqobdzR5VWf1oTAgaIZ_8z6-_TYJVndKXloiX27prpBFucVdWysXRLccwK_gKwVFntUrCRJctisLDNpyjd-AMDBild4ulpYxCdBlHD1VTu_Epi_lRWOx4VnXR6QB3zznhpqYlWr_T6GBeXFkLbyei8xRwnOqicRfhWZprQo95uPunVcyq2MQw_znJWN1UwCRCi-jblxpj5JUb4zmJQ48Ooo5jeVlZyyy10f0_yx6KfMT2NrE7elpyNPuWLsWyXwj5KioWiwxRRk8VEY4bN1_cRHD_wkMH12wicnWHty4ePOenJPqV8RuUWZ5KONSd_hcm_N7zvTazt8WduL6XZORxXmVBmqklBXyXSMKETc0qp7iYTxzv3_bafkoHdLU6dqF2-Tb58iWQaxIU_J_iYqXNdcDijMGaaAtXwzdRR7DqcNCJjP7om-_NuGepadZVCDyPHsC3FxmVf3uShOnpdl_dzaWqBd7xFnaN1f78bvBno-E1byoiaU0UTNnjpX8M3qGkgI2UMvjqW370JWzBbM0216dwCwD0ffnuMo9CeTTgNpZerL1YDmUiv_8fzL4JYeazf9aOwlfNDWgMCIhY0-YN2FAgayMJVd6gGqkT7XuMfHq8GNPXqIPGsvjx9y77smr3YnWDV1y01oOr70K0beKEB8y6DAB-4Rs6TW-M5P_pe81rGU0Bc6an2OSdU3U8qYBpLtNlZ6HN71qPI2F6S4bHdNjt7vc5LfDnjsv0nCggHTjmesKlJE83Lkz02TQ4cXI6YeHjfKKWk5nc1X5rPTZFn2cP003mc29I_WQbOTFAQOebY