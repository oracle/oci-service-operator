eue on updating, terminating</text><path d="M688.4276,1569.5 L688.4276,1857.5 L668.4276,1861.5 L688.4276,1865.5 L688.4276,2153.5 A0,0 0 0 0 688.4276,2153.5 L1045.5848,2153.5 A0,0 0 0 0 1045.5848,2153.5 L1045.5848,1579.5 L1035.5848,1569.5 L688.4276,1569.5 A0,0 0 0 0 688.4276,1569.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1035.5848,1569.5 L1035.5848,1579.5 L1045.5848,1579.5 L1035.5848,1569.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="694.4276" y="1585.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="694.4276" y="1599.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="694.4276" y="1613.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="694.4276" y="1627.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="694.4276" y="1641.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="694.4276" y="1655.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="694.4276" y="1669.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="694.4276" y="1683.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="694.4276" y="1697.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="694.4276" y="1711.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="694.4276" y="1725.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="694.4276" y="1739.2803">service: objectstorage</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7646" x="694.4276" y="1753.2803">slug: objectstoragebucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7578" x="694.4276" y="1767.2803">kind: ObjectStorageBucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="694.4276" y="1781.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="694.4276" y="1795.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="694.4276" y="1809.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.9092" x="694.4276" y="1823.2803">requeue: updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="694.4276" y="1837.2803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="694.4276" y="1851.2803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4883" x="694.4276" y="1865.2803">supported drift: auto_tiering, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.292" x="694.4276" y="1879.2803">defined_tags, freeform_tags (+7 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="694.4276" y="1893.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9307" x="694.4276" y="1907.2803">storage_tier</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="694.4276" y="1921.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="694.4276" y="1935.2803">list lookup: oci_objectstorage_buckets filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3369" x="694.4276" y="1949.2803">name, namespace, compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="694.4276" y="1963.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="694.4276" y="1977.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.6191" x="694.4276" y="1991.2803">The published ObjectStorageBucket kind reuses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="336.1572" x="694.4276" y="2005.2803">the Bucket SDK family and resolves namespaceName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2402" x="694.4276" y="2019.2803">from observed status first, then through a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.502" x="694.4276" y="2033.2803">GetNamespace lookup when spec.namespace is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.7998" x="694.4276" y="2047.2803">omitted.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1846" x="694.4276" y="2061.2803">Successful create and update responses without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="694.4276" y="2075.2803">lifecycle fields are treated as synchronous</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="694.4276" y="2089.2803">success and projected directly into status,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.2061" x="694.4276" y="2103.2803">including status.status.ocid.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9297" x="694.4276" y="2117.2803">Delete keeps the finalizer until DeleteBucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="694.4276" y="2131.2803">succeeds and a follow-up read confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.1719" x="694.4276" y="2145.2803">bucket is gone.</text><ellipse cx="657.4276" cy="1861.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="657.4276" cy="1861.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="657.4276" x2="657.4276" y1="157" y2="177"/><polygon fill="#0F172A" points="653.4276,167,657.4276,177,661.4276,167,657.4276,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width: