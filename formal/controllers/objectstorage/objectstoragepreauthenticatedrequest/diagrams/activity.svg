" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="318.8467" x="173.4353" y="235"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.3857" x="183.4353" y="255.7803">Resolve OCI state via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8467" x="183.4353" y="269.7803">GetObjectStoragePreauthenticatedRequest with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2813" x="183.4353" y="283.7803">ListObjectStoragePreauthenticatedRequest</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="47.4688" x="183.4353" y="297.7803">fallback</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="402.9287" x="131.3943" y="331"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.8965" x="141.3943" y="351.7803">Use</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="382.9287" x="141.3943" y="365.7803">scaffold_objectstorage_objectstoragepreauthenticatedrequest</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="141.3943" y="379.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="141.3943" y="393.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="279.1692,427,386.5481,427,398.5481,439,386.5481,451,279.1692,451,267.1692,439,279.1692,427" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="279.1692" y="442.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.