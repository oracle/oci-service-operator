nt-size="14" lengthAdjust="spacing" textLength="300.3438" x="657.0427" y="381.7803">Create the OCI resource via CreateDnsResolver</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4609" x="657.0427" y="395.7803">when no reusable match is found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="663.7668" y="429"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="673.7668" y="449.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="673.7668" y="463.7803">into status</text><polygon fill="#E2E8F0" points="655.7488,483,667.7488,495,655.7488,507,643.7488,495,655.7488,483" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="593.5725,539,717.925,539,729.925,551,717.925,563,593.5725,563,581.5725,551,593.5725,539" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="593.5725" y="554.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="559.7864" y="547.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="729.925" y="547.7803">no</text><rect fill="none" height="340" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="573"/><path d="M61.4688,573 L61.4688,580 L51.4688,590 L11,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="584.7803">Delete</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="321.8955" x="178.7964" y="607"/><text 