55" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="313.6074" y="1098.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="313.6074" y="1112.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="313.6074" y="1126.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="313.6074" y="1140.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="313.6074" y="1154.7803">service: dns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="188.3232" x="313.6074" y="1168.7803">slug: steeringpolicyattachment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.7646" x="313.6074" y="1182.7803">kind: SteeringPolicyAttachment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="313.6074" y="1196.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="313.6074" y="1210.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="313.6074" y="1224.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="313.6074" y="1238.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="313.6074" y="1252.7803