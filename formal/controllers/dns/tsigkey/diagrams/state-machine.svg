<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="825px" preserveAspectRatio="none" style="width:658px;height:825px;background:#FCFCFD;" version="1.1" viewBox="0 0 658 825" width="658px" zoomAndPan="magnify"><title>State Machine - dns/TsigKey</title><defs/><g><rect fill="#FCFCFD" height="825" style="stroke:none;stroke-width:1;" width="658" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="189.8203" x="226.3856" y="20.7803">State Machine - dns/TsigKey</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="181.041" x="106.83" y="137"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="106.83" x2="287.871" y1="175" y2="175"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.71" x="116.83" y="152.7803">provisioning</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.041" x="116.83" y="166.7803">provider: PROVISIONING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="128.9238" x="132.89" y="404"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="132.89" x2="261.8138" y1="442" y2="442"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5723" x="142.89" y="419.7803">active</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9238" x="142.89" y="433.7803">provider: ACTIVE</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="150.6963" x="7" y="671"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="7" x2="157.6963" y1="709" y2="709"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.7168" x="17" y="686.7803">updating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.6963" x="17" y="700.7803">provider: UPDATING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="148.3721" x="215.16" y="671"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="215.16" x2="363.5321" y1="709" y2="709"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="225.16" y="686.7803">terminating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="225.16" y="700.7803">provider: DELETING</text></g><ellipse cx="197.35" cy="51" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="289.35" cy="808" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="289.35" cy="808" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="29" id="ent0003"><path d="M297.11,271 L297.11,425 L262.31,429 L297.11,433 L297.11,587 A8,8 0 0 0 305.11,595 L641.5914,595 A8,8 0 0 0 649.5914,587 L649.5914,273 L639.5914,263 L305.11,263 A8,8 0 0 0 297.11,271" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M639.5914,263 L639.5914,269 A4,4 0 0 0 643.5914,273 L649.5914,273 L639.5914,263" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="303.11" y="278.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="303.11" y="292.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="303.11" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="303.11" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="303.11" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="303.11" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="303.11" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="303.11" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="303.11" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="303.11" y="404.7803">service: dns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="77.0342" x="303.11" y="418.7803">slug: tsigkey</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0342" x="303.11" y="432.7803">kind: TsigKey</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="303.11" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="303.11" y="460.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="303.11" y="474.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="303.11" y="488.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="303.11" y="502.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="303.11" y="516.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="303.11" y="530.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="303.11" y="544.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="303.11" y="558.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="303.11" y="572.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="303.11" y="586.7803">promotion.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M197.35,61.29 C197.35,77.87 197.35,107.03 197.35,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="197.35,136.85,201.35,127.85,197.35,131.85,193.35,127.85,197.35,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="92.5928" x="198.35" y="102.7803">CreateTsigKey</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk4"><path d="M197.35,187.46 C197.35,237.94 197.35,347.17 197.35,397.6" fill="none" id="provisioning-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="197.35,403.6,201.35,394.6,197.35,398.6,193.35,394.6,197.35,403.6" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="198.35" y="228.7803">ACTIVE</text></g><!--link active to updating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk5"><path d="M171.75,454.48 C137.89,488.82 79.88,554.98 57.35,625 C52.45,640.23 55.3199,651.8448 62.5099,665.2248" fill="none" id="active-to-updating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="65.35,670.51,64.6133,660.6887,62.9832,666.1056,57.5663,664.4756,65.35,670.51" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="95.7168" x="58.35" y="636.7803">UpdateTsigKey</text></g><!--link updating to active--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="dependency" data-source-line="25" id="lnk6"><path d="M128.48,670.71 C139.83,662.68 150.86,652.73 158.35,641 C196.02,581.96 199.5141,501.8387 198.6541,460.2587" fill="none" id="updating-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="198.53,454.26,194.717,463.3408,198.6334,459.2589,202.7153,463.1754,198.53,454.26" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="167.91" y="636.7803">ACTIVE</text></g><!--link active to terminating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-