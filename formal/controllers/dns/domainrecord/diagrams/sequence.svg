992" x="784" y="878.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="784" y="892.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="784" y="906.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="784" y="920.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="784" y="934.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="784" y="948.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="784" y="962.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="784" y="976.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="784" y="990.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="784" y="1004.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="784" y="1018.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="784" y="1032.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size