<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1301px" preserveAspectRatio="none" style="width:690px;height:1301px;background:#FCFCFD;" version="1.1" viewBox="0 0 690 1301" width="690px" zoomAndPan="magnify"><title>Activity - dns/ResolverEndpoint</title><defs/><g><rect fill="#FCFCFD" height="1301" style="stroke:none;stroke-width:1;" width="690" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="211.5859" x="237.8074" y="30.7803">Activity - dns/ResolverEndpoint</text></g><ellipse cx="307.1606" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="154.7681" y="85"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="164.7681" y="105.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="164.7681" y="119.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.3018" x="148.5098" y="153"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.3018" x="158.5098" y="173.7803">Load desired ResolverEndpoint spec and status</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="103.4961" x="158.5098" y="187.7803">from Kubernetes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="321.1367" x="146.5923" y="221"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1367" x="156.5923" y="241.7803">Resolve OCI state via GetResolverEndpoint with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6543" x="156.5923" y="255.7803">ListResolverEndpoint fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="159.0405" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0264" x="169.0405" y="309.7803">Use scaffold_dns_resolverendpoint filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="169.0405" y="323.7803">compartment_id, state when OCID lookup or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5645" x="169.0405" y="337.7803">bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="253.4712,371,360.8501,371,372.8501,383,360.8501,395,253.4712,395,241.4712,383,253.4712,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="253.4712" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="219.6851" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="372.8501" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="287.7227" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.7227" x="21" y="425.7803">Update path calls UpdateResolverEndpoint</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="21.5103" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.7021" x="31.5103" y="479.7803">Guard mutable fields display_name and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3096" x="31.5103" y="493.7803">force-new fields compartment_id</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="281.4746" x="318.7227" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4746" x="328.7227" y="425.7803">Create path calls CreateResolverEndpoint</text><polygon fill="#E2E8F0" points="307.1606,513,319.1606,525,307.1606,537,295.1606,525,307.1606,513" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="104" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="140.0024" y="557"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="150.0024" y="577.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="150.0024" y="591.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="150.0024" y="605.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="150.0024" y="619.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="150.0024" y="633.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="150.0024" y="647.7803">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="263.5918" x="175.3647" y="681"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="185.3647" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="316.4678" x="148.9268" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7227" x="158.9268" y="755.7803">Delete path uses DeleteResolverEndpoint with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4541" x="158.9268" y="769.7803">required via GetResolverEndpoint or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4678" x="158.9268" y="783.7803">ListResolverEndpoint to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="167.5957" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="177.5957" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="177.5957" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="150.4512" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="160.4512" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M338.1606,929 L338.1606,1105 L318.1606,1109 L338.1606,1113 L338.1606,1289 A0,0 0 0 0 338.1606,1289 L678.2007,1289 A0,0 0 0 0 678.2007,1289 L678.2007,939 L668.2007,929 L338.1606,929 A0,0 0 0 0 338.1606,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M668.2007,929 L668.2007,939 L678.2007,939 L668.2007,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="344.1606" y="944.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="344.1606" y="958.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="344.1606" y="972.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="344.1606" y="986.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="344.1606" y="1000.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="344.1606" y="1014.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="344.1606" y="1028.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="344.1606" y="1042.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="344.1606" y="1056.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="344.1606" y="1070.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="344.1606" y="1084.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="344.1606" y="1098.7803">service: dns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="344.1606" y="1112.7803">slug: resolverendpoint</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.9717" x="344.1606" y="1126.7803">kind: ResolverEndpoint</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="344.1606" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="344.1606" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="344.1606" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="344.1606" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="344.1606" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="344.1606" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="344.1606" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="344.1606" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="344.1606" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="344.1606" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="344.1606" y="1280.7803">promotion.</text><ellipse cx="307.1606" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="307.1606" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="307.1606" x2="307.1606" y1="65" y2="85"/><polygon fill="#0F172A" points="303.1606,75,307.1606,85,311.1606,75,307.1606,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="307.1606" x2="307.1606" y1="133" y2="153"/><polygon fill="#0F172A" points="303.1606,143,307.1606,153,311.1606,143,307.1606,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="307.1606" x2="307.1606" y1="201" y2="221"/><polygon fill="#0F172A" points="303.1606,211,307.1606,221,311.1606,211,307.1606,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="307.1606" x2="307.1606" y1="269" y2="289"/><polygon fill="#0F172A" points="303.1606,279,307.1606,289,311.1606,279,307.1606,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="154.8613" x2="154.8613" y1="439" y2="459"/><polygon fill="#0F172A" points="150.8613,449,154.8613,459,158.8613,449,154.8613,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="241.4712" x2="154.8613" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="154.8613" x2="154.8613" y1="383" y2="405"/><polygon fill="#0F172A" points="150.8613,395,154.8613,405,158.8613,395,154.8613,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="372.8501" x2="459.46" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width: