36" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="310.2744" x="122.8323" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="132.8323" y="755.7803">Delete path uses DeleteDnsZone with required</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0059" x="132.8323" y="769.7803">via GetDnsZone or ListDnsZone to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="132.8323" y="783.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="138.4045" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="148.4045" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="148.4045" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="121.26" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="131.26" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M308.9695,929 L308.9695,1105 L288.9695,1109 L308.9695,1113 L308.9695,1289 A0,0 0 0 0 308.9695,1289 L649.0095,1289 A0,0 0 0 0 649.0095,1289 L649.0095,939 L639.0095,929 L308.9695,929 A0,0 0 0 0 308.9695,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M639.0095,929 L639.0095,939 L649.0095,939 L639.0095,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="314.9695" y="944.