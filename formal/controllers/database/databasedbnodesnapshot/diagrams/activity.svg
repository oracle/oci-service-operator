857" x="245.3057" y="241.7803">Resolve OCI state via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.8057" x="245.3057" y="255.7803">GetDatabaseDbNodeSnapshot with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5986" x="245.3057" y="269.7803">ListDatabaseDbNodeSnapshot fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="331.3564" x="201.4268" y="303"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.3564" x="211.4268" y="323.7803">Use scaffold_database_databasedbnodesnapshot</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="211.4268" y="337.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="211.4268" y="351.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="313.4155,385,420.7944,385,432.7944,397,420.7944,409,313.4155,409,301.4155,397,313.4155,385" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="313.4155" y="400.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="279.6294" y="393.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="432.7944" y="393.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="347.667" x="11" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.667" x="21" y="439.7803">Update path calls UpdateDatabaseDbNodeSnapshot</text><rect fill="#F8FAFC" height="4