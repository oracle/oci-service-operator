" y="1098.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="404.105" y="1112.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="404.105" y="1126.7803">service: database</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.6055" x="404.105" y="1140.7803">slug: databasedbnodesnapshot</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.916" x="404.105" y="1154.7803">kind: DatabaseDbNodeSnapshot</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="404.105" y="1168.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="404.105" y="1182.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="404.105" y="1196.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="404.105" y="1210.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="404.105" y="1224.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="404.105" y="1238.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="404.105" y="1252.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="404.105" y="1266.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="404.105" y="1280.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="404.105" y="1294.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="404.105" y="1308.7803">promotion.</text><ellipse cx="367.105" cy="1137" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="367.105" cy="1137" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="367.105" x2="367.105" y1="65" y2="85"/><polygon fill="#0F172A" points="363.105,75,367.105,85,371.105,75,367.105,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="367.105" x2="367.105" y1="133" y2="153"/><polygon fill="#0F172A" points="363.105,143,367.105,153,371.105,143,367.105,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="367.105" x2="367.105" y1="201" y2="221"/><polygon fill="#0F172A" points="363.105,211,367.105,221,371.105,211,367.105,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="367.105" x2="367.105" y1="283" y2="303"/><polygon fill="#0F172A" points="363.105,293,367.105,303,371.105,293,367.105,297" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="184.8335" x2="184.8335" y1="453" y2="473"/><polygon fill="#0F172A" points="180.8335,463,184.8335,473,188.8335,463,184.8335,467" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="301.4155" x2="184.8335" y1="397" y2="397"/><line style="stroke:#0F172A;stroke-width:1;" x1="184.8335"