"313.4189" x="119.9031" y="927"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="129.9031" y="947.7803">Requeue on provisioning, updating, terminating</text><path d="M307.6125,971 L307.6125,1147 L287.6125,1151 L307.6125,1155 L307.6125,1331 A0,0 0 0 0 307.6125,1331 L647.6526,1331 A0,0 0 0 0 647.6526,1331 L647.6526,981 L637.6526,971 L307.6125,971 A0,0 0 0 0 307.6125,971" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M637.6526,971 L637.6526,981 L647.6526,981 L637.6526,971" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="313.6125" y="986.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="313.6125" y="1000.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="313.6125" y="1014.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="313.6125" y="1028.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="313.6125" y="1042.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="313.6125" y="1056.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="313.6125" y="1070.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="313.6125" y="1084.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="313.6125" y="1098.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="313.6125" y="1112.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="313.6125" y="1126.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="313.6125" y="1140.7803">service: database</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="188.3574" x="313.6125" y="1154.7803">slug: databaseexecutionaction</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.7852" x="313.6125" y="1168.7803">kind: DatabaseExecutionAction</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="313.6125" y="1182.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="313.6125" y="1196.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="313.6125" y="1210.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="313.6125" y="1224.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="313.6125" y="1238.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="313.6125" y="1252.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="313.6125" y="1266.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="313.6125" y="1280.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="313.6125" y="1294.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="313.6125" y="1308.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="313.6125" y="1322.7803">promotion.</text><ellipse cx="276.6125" cy="1151" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="276.6125" cy="1151" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="276.6125" x2="276.6125" y1="65" y2="85"/><polygon fill="#0F172A" points="272.6125,75,276.6125,85,280.6125,75,276.6125,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="276.6125" x2="276.6125" y1="133" y2="153"/><polygon fill="#0F172A" points="272.6125,143,276.6125,153,280.6125,143,276.6125,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="276.6125" x2="276.6125" y1="201" y2="221"/><polygon fill="#0F172A" points="272.6125,211,276.6125,221,280.6125,211,276.6125,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="276.6125" x2="276.6125" y1="283" y2="303"/><polygon fill="#0F172A" points="272.6125,293,276.6125,303,280.6125,293,276.6125,297" style="stroke:#0F172A;stroke-width:1;"/><line style="strok