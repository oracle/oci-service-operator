<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="825px" preserveAspectRatio="none" style="width:665px;height:825px;background:#FCFCFD;" version="1.1" viewBox="0 0 665 825" width="665px" zoomAndPan="magnify"><title>State Machine - database/DbSystem</title><defs/><g><rect fill="#FCFCFD" height="825" style="stroke:none;stroke-width:1;" width="665" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="239.6338" x="204.9788" y="20.7803">State Machine - database/DbSystem</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="181.041" x="113.83" y="137"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="113.83" x2="294.871" y1="175" y2="175"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.71" x="123.83" y="152.7803">provisioning</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.041" x="123.83" y="166.7803">provider: PROVISIONING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="128.9238" x="139.89" y="404"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="139.89" x2="268.8138" y1="442" y2="442"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5723" x="149.89" y="419.7803">active</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9238" x="149.89" y="433.7803">provider: ACTIVE</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="150.6963" x="7" y="671"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="7" x2="157.6963" y1="709" y2="709"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.7168" x="17" y="686.7803">updating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.6963" x="17" y="700.7803">provider: UPDATING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="148.3721" x="222.16" y="671"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="222.16" x2="370.5321" y1="709" y2="709"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="232.16" y="686.7803">terminating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="232.16" y="700.7803">provider: DELETING</text></g><ellipse cx="204.35" cy="51" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="296.35" cy="808" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="296.35" cy="808" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="29" id="ent0003"><path d="M304.11,271 L304.11,425 L269.31,429 L304.11,433 L304.11,587 A8,8 0 0 0 312.11,595 L648.5914,595 A8,8 0 0 0 656.5914,587 L656.5914,273 L646.5914,263 L312.11,263 A8,8 0 0 0 304.11,271" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M646.5914,263 L646.5914,269 A4,4 0 0 0 650.5914,273 L656.5914,273 L646.5914,263" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="310.11" y="278.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="310.11" y="292.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="310.11" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="310.11" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="310.11" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="310.11" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="310.11" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="310.11" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="310.11" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="310.11" y="404.7803">service: database</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="310.11" y="418.7803">slug: dbsystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.0342" x="310.11" y="432.7803">kind: DbSystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="310.11" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="310.11" y="460.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="310.11" y="474.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="310.11" y="488.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="310.11" y="502.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="310.11" y="516.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="310.11" y="530.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="310.11" y="544.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="310.11" y="558.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="310.11" y="572.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="310.11" y="586.7803">promotion.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M204.35,61.29 C204.35,77.87 204.35,107.03 204.35,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="204.35,136.85,208.35,127.85,204.35,131.85,200.35,127.85,204.35,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.5928" x="205.35" y="102.7803">CreateDbSystem</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk4"><path d="M204.35,187.46 C204.35,237.94 204.35,347.17 204.35,397.6" fill="none" id="provisioning-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="204.35,403.6,208.35,394.6,204.35,398.6,200.35,394.6,204.35,403.6" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="205.35" y="228.7803">ACTIVE</text></g><!--link active to updating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk5"><path d="M175.93,454.21 C138.7,488.01 75.25,553.28 50.35,625 C44.96,640.53 48.7758,652.3151 57.6958,665.5451" fill="none" id="active-to-updating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="61.05,670.52,59.3353,660.8216,58.2548,666.3743,52.7021,665.2938,61.05,670.52" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7168" x="51.35" y="636.7803">UpdateDbSystem</text></g><!--link updating to active--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="dependency" data-source-line="25" id="lnk6"><path d="M133.98,670.61 C145.92,662.72 157.43,652.87 165.35,641 C204.22,582.74 207.2092,502.2573 205.9592,460.4173" fill="none" id="updating-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="205.78,454.42,202.0505,463.5354,205.9293,459.4178,210.047,463.2965,205.78,454.42" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="175.17" y="636.7803">ACTIVE</text></g><!--link active to terminating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-