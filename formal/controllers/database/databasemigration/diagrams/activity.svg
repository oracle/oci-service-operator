155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="351.1606" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="351.1606" y="1280.7803">promotion.</text><ellipse cx="314.1606" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="314.1606" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="314.1606" x2="314.1606" y1="65" y2="85"/><polygon fill="#0F172A" points="310.1606,75,314.1606,85,318.1606,75,314.1606,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="314.1606" x2="314.1606" y1="133" y2="153"/><polygon fill="#0F172A" points="310.1606,143,314.1606,153,318.1606,143,314.1606,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="314.1606" x2="314.1606" y1="201" y2="221"/><polygon fill="#0F172A" points="310.1606,211,314.1606,221,318.1606,211,314.1606,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="314.1606" x2="314.1606" y1="269" y2="289"/><polygon fill="#0F172A" points="310.1606,279,314.1606,289,318.1606,279,314.1606,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="158.3613" x2="158.3613" y1="439" y2="459"/><polygon fill="#0F172A" points="154.3613,449,158.3613,459,162.3613,449,158.3613,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="248.4712" x2="158.3613" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="158.3613" x2="158.3613" y1="383" y2="405"/><polygon fill="#0F172A" points="154.3613,395,158.3613,405,162.3613,395,158.3613,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="379.8501" x2="469.96" y1="383" y2="383"/><line s