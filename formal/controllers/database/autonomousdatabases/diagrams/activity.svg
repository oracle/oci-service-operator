 y="815.7803">update=tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.4541" x="171.8689" y="829.7803">entity=database action=UPDATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="171.8689" y="843.7803">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.8125" x="205.6189" y="877"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="215.6189" y="897.7803">Apply repo-authored secret policy ready-only</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4336" x="215.6189" y="911.7803">writes after ACTIVE plus secret-input reads</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="321.9707" x="193.5398" y="945"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1572" x="203.5398" y="965.7803">Delete stays repo-authored not-supported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9707" x="203.5398" y="979.7803">despite provider op DeleteAutonomousDatabase</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="273.6816" x="217.6843" y="1013"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="227.6843" y="1033.7803">Project manual status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="227.6843" y="1047.7803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="236.3848" x="236.3328" y="1081"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.3848" x="246.3328" y="1101.7803">Requeue on provisioning, updating</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.1641" x="197.4431" y="1135"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1641" x="207.4431" y="1155.7803">Keep promotion blocked on bind-versus-create,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3438" x="207.4431" y="1169.7803">delete-confirmation, legacy-adapter,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.3887" x="207.4431" y="1183.7803">list-lookup, manual-webhook (+4 more)</text><path d="M385.5251,1207 L385.5251,1467 L365.5251,1471 L385.5251,1475 L385.5251,1735 A0,0 0 0 0 385.5251,1735 L778.407,1735 A0,0 0 0 0 778.407,1735 L778.407,1217 L768.407,1207 L385.5251,1207 A0,0 0 0 0 385.5251,1207" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M768.407,1207 L768.407,1217 L778.407,1217 L768.407,1207" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="391.5251" y="1222.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="391.5251" y="1236.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="391.5251" y="1250.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="391.5251" y="1264.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="391.5251" y="1278.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="391.5251" y="1292.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="391.5251" y="1306.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="391.5251" y="1320.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="391.5251" y="1334.7803">archetype batch: Legacy-adapter controllers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3711" x="391.5251" y="1348.7803">specialize the shared reconcile path while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7021" x="391.5251" y="1362.7803">explicit gaps still block generated promotion.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="391.5251" y="1376.7803">service: database</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.123" x="391.5251" y="1390.7803">slug: autonomousdatabases</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.999" x="391.5251" y="1404.7803">kind: AutonomousDatabases</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="391.5251" y="1418.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="391.5251" y="1432.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="391.5251" y="1446.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5303" x="391.5251" y="1460.7803">provider states: create PROVISIONING, STARTING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="371.8818" x="391.5251" y="1474.7803">update MAINTENANCE_IN_PROGRESS, PROVISIONING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="363.7266" x="391.5251" y="1488.7803">RESTARTING, SCALE_IN_PROGRESS (+5 more); delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.9307" x="391.5251" y="1502.7803">TERMINATING, UNAVAILABLE</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="391.5251" y="1516.7803">mutable/forceNew: admin_password,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5576" x="391.5251" y="1530.7803">are_primary_whitelisted_ips_used,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3779" x="391.5251" y="1544.7803">auto_refresh_frequency_in_seconds,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.1465" x="391.5251" y="1558.7803">auto_refresh_point_lag_in_seconds (+107 more) /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3984" x="391.5251" y="1572.7803">autonomous_container_database_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.9502" x="391.5251" y="1586.7803">autonomous_database_backup_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.4775" x="391.5251" y="1600.7803">autonomous_database_id, character_set (+12 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="391.5251" y="1614.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3438" x="391.5251" y="1628.7803">delete-confirmation, legacy-adapter,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.3887" x="391.5251" y="1642.7803">list-lookup, manual-webhook (+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.1992" x="391.5251" y="1656.7803">Create first lists by displayName and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="391.5251" y="1670.7803">compartment before deciding to bind or create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="391.5251" y="1684.7803">Wallet secret generation is optional and only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3369" x="391.5251" y="1698.7803">runs after the database is active.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8672" x="391.5251" y="1712.7803">Delete remains an unsupported legacy path, so no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8818" x="391.5251" y="1726.7803">terminating state is confirmed today.</text><ellipse cx="354.5251" cy="1471" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="354.5251" cy="1471" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="354.5251" x2="354.5251" y1="65" y2="85"/><polygon fill="#0F172A" po