4155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="850" y="2129.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5303" x="850" y="2143.7803">provider states: create PROVISIONING, STARTING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="371.8818" x="850" y="2157.7803">update MAINTENANCE_IN_PROGRESS, PROVISIONING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="363.7266" x="850" y="2171.7803">RESTARTING, SCALE_IN_PROGRESS (+5 more); delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.9307" x="850" y="2185.7803">TERMINATING, UNAVAILABLE</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.999" x="850" y="2199.7803">supported drift: admin_password,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5576" x="850" y="2213.7803">are_primary_whitelisted_ips_used,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3779" x="850" y="2227.7803">auto_refresh_frequency_in_seconds,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.3672" x="850" y="2241.7803">auto_refresh_point_lag_in_seconds (+107 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="850" y="2255.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3984" x="850" y="2269.7803">autonomous_container_database_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.9502" x="850" y="2283.7803">autonomous_database_backup_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.4775" x="850" y="2297.7803">autonomous_database_id, character_set (+12 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.1475" x="850" y="2311.7803">and conflicts is_shrink_only -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="115.958" x="850" y="2325.7803">shrink_adb_trigger</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.5566" x="850" y="2339.7803">list lookup: oci_database_autonomous_databases</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.7363" x="850" y="2353.7803">filters autonomous_container_database_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.3262" x="850" y="2367.7803">compartment_id, db_version, db_workload (+9</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="850" y="2381.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.6367" x="850" y="2395.7803">conflicts: is_shrink_only -&gt; shrink_adb_trigger</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="850" y="2409.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3438" x="850" y="2423.7803">delete-confirmation, legacy-adapter,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.3887" x="850" y="2437.7803">list-lookup, manual-webhook (+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.1992" x="850" y="2451.7803">Create first lists by displayName and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="850" y="2465.7803">compartment before deciding to bind or create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="850" y="2479.7803">Wallet secret generation is optional and only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3369" x="850" y="2493.7803">runs after the database is active.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8672" x="850" y="2507.7803">Delete remains an unsupported legacy path, so no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8818" x="850" y="2521.7803">terminating state is confirmed today.</text><?plantuml-src pLZRRXiv4dtdLn2pBmb6ikF4paM15r1aRyOOHnb8Jl8YGA2wsHBNBRA7P4kZNUo_x-6bMzroo_5W0kmYG6o9nM9TJfsgihaNic2QhQbPiLHjXLpIZEM64rEVB5XolzIgbEb8vKhJlsK9_gKDYPHdhCpjFvIqOxRcz1UURxWL2UkMcOf_SNfstZXaMgjjrFuYEtlpidbJAii_FB0Xozwahm-bb4wvZXAByujNBzuTIBZdu_chL-Td5nUDSwy-KLfoJSzU4ojipkcK_rvocN3QfocpRC4CFnsMLacrLgMvYbyPiX8ffvbITg7-QEWqrVL_4qfPOfLksHXzhOuEdUGl-Tli1OwX3E4K1PEs-tvJu2bQ6d6eTUGYuxT2jgFuxfozMhp5gLDPj8wIHNh1p-gZ1nbwcx4i8VyXtZVwQxdW2Ar5h1fsq14CqIhFkMvz_G51dV14oKGS7lrqovSisGrJLbYkVwBC84bw8nB-YKcsF93-FBfftzxRWMk9vZPgSBzEOIWd3YTKRO22jXMzWsTGCPgdL7EZyj8A9GVngzDKi2MoRqx3v_vUf5y1uiHibfM6bEUmv-ZjSDo-oMNgyKmQxlJ_teZcW789-PBJ3hJEfAwy8lihJa7Rum6jVt-ctVF6FYTj4NUf7PS1hPN3CoFWmansbOo73RrLwXu_61nQ29aIbbjgDS24m00s_8yYH-vy8YbgJA8iTvJbchDqXrDXh25j0vn9a1xGZzm-V9Tmi5lzGgrH6BeMne3_ZccxnLCTRZpBH0uSci5CilfqZW1OXbhIyuervYBjpMIYrWwDQxpglg3fOWwW6I03X_YmLVe-Loobptv-HzT0u_FdFYAQbuOj454N1WUdKeDKO3H00Df1rHqpUuH8MVxGSBptfKWxZqYkL44JVv4MW9hh2hzDFd-zcTvy7j-CF-Bkz6uukSElVpBsiDF7lzkVlvJMZX1q0BfmqJOsLEq626ZXIaXgBBEbyUfSu4FnqOX-daRKNlcl0rLeiLnPgh936gglhe44Wv-5wWCYA-LglfIcB0gb