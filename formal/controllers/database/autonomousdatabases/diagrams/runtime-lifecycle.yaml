schemaVersion: 1
surface: repo-authored-semantics
service: database
slug: autonomousdatabases
kind: AutonomousDatabases
archetype: legacy-adapter
states:
  - provisioning
  - active
  - updating
  - failed
notes:
  - Create first lists by displayName and compartment before deciding to bind or create.
