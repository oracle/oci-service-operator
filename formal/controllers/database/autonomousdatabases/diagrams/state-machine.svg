9"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.7168" x="17" y="896.7803">updating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="705.2227" x="17" y="910.7803">provider: MAINTENANCE_IN_PROGRESS, PROVISIONING, RESTARTING, SCALE_IN_PROGRESS (+5 more)</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="253.4678" x="450.88" y="1021"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="450.88" x2="704.3478" y1="1059" y2="1059"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="33.4688" x="460.88" y="1036.7803">failed</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4678" x="460.88" y="1050.7803">provider: repo-authored failure bucket</text></g><ellipse cx="488.61" cy="51" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="577.61" cy="1158" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="577.61" cy="1158" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="30" id="ent0003"><path d="M340.17,285 L340.17,523 L305.83,527 L340.17,531 L340.17,769 A8,8 0 0 0 348.17,777 L725.0518,777 A8,8 0 0 0 733.0518,769 L733.0518,287 L723.0518,277 L348.17,277 A8,8 0 0 0 340.17,285" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M723.0518,277 L723.0518,283 A4,4 0 0 0 727.0518,287 L733.0518,287 L723.0518,277" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="346.17" y="292.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="346.17" y="306.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="346.17" y="320.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="346.17" y="334.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="346.17" y="348.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2813" x="346.17" y="362.7803">archetype batch: Legacy-adapter controllers map</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7988" x="346.17" y="376.7803">provider states into the shared controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2949" x="346.17" y="390.7803">phases while open gaps keep additional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="114.3789" x="346.17" y="404.7803">transitions explicit.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="346.17" y="418.7803">service: database</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.123" x="346.17" y="432.7803">slug: autonomousdatabases</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.999" x="346.17" y="446.7803">kind: AutonomousDatabases</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="346.17" y="460.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="346.17" y="474.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="346.17" y="488.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5303" x="346.17" y="502.7803">provider states: create PROVISIONING, STARTING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="371.8818" x="346.17" y="516.7803">update MAINTENANCE_IN_PROGRESS, PROVISIONING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="363.7266" x="346.17" y="530.7803">RESTARTING, SCALE_IN_PROGRESS (+5 more); delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.9307" x="346.17" y="544.7803">TERMINATING, UNAVAILABLE</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="346.17" y="558.7803">mutable/forceNew: admin_password,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5576" x="346.17" y="572.7803">are_primary_whitelisted_ips_used,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3779" x="346.17" y="586.7803">auto_refresh_frequency_in_seconds,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.1465" x="346.17" y="600.7803">auto_refresh_point_lag_in_seconds (+107 more) /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3984" x="346.17" y="614.7803">autonomous_container_database_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.9502" x="346.17" y="628.7803">autonomous_database_backup_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.4775" x="346.17" y="642.7803">autonomous_database_id, character_set (+12 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="346.17" y="656.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3438" x="346.17" y="670.7803">delete-confirmation, legacy-adapter,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.3887" x="346.17" y="684.7803">list-lookup, manual-webhook (+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.1992" x="346.17" y="698.7803">Create first lists by displayName and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="346.17" y="712.7803">compartment before deciding to bind or create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="346.17" y="726.7803">Wallet secret generation is optional and only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3369" x="346.17" y="740.7803">runs after the database is active.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8672" x="346.17" y="754.7803">Delete remains an unsupported legacy path, so no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8818" x="346.17" y="768.7803">terminating state is confirmed today.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M488.61,61.25 C488.61,80.02 488.61,117.14 488.61,144.57" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;strok