 fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2811.09" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2813" x="2811.09" y="126.7803">archetype batch: Legacy-adapter controllers map</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7988" x="2811.09" y="140.7803">provider states into the shared controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2949" x="2811.09" y="154.7803">phases while open gaps keep additional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="114.3789" x="2811.09" y="168.7803">transitions explicit.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="2811.09" y="182.7803">service: database</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.123" x="2811.09" y="196.7803">slug: autonomousdatabases</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.999" x="2811.09" y="210.7803">kind: AutonomousDatabases</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="2811.09" y="224.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="2811.09" y="238.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="2811.09" y="252.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5303" x="2811.09" y="266.7803">provider states: create PROVISIONING, STARTING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="371.8818" x="2811.09" y="280.7803">update MAINTENANCE_IN_PROGRESS, PROVISIONING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="363.7266" x="2811.09" y="294.7803">RESTARTING, SCALE_IN_PROGRESS (+5 more); delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.9307" x="2811.09" y="308.7803">TERMINATING, UNAVAILABLE</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.999" x="2811.09" y="322.7803">supported drift: admin_password,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5576" x="2811.09" y="336.7803">are_primary_whitelisted_ips_used,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3779" x="2811.09" y="350.7803">auto_refresh_frequency_in_seconds,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.3672" x="2811.09" y="364.7803">auto_refresh_point_lag_in_seconds (+107 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2811.09" y="378.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3984" x="2811.09" y="392.7803">autonomous_container_database_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.9502" x="2811.09" y="406.7803">autonomous_database_backup_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.4775" x="2811.09" y="420.7803">autonomous_database_id, character_set (+12 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.1475" x="2811.09" y="434.7803">and conflicts is_shrink_only -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="115.958" x="2811.09" y="448.7803">shrink_adb_trigger</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.5566" x="2811.09" y="462.7803">list lookup: oci_database_autonomous_databases</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.7363" x="2811.09" y="476.7803">filters autonomous_container_database_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.3262" x="2811.09" y="490.7803">compartment_id, db_version, db_workload (+9</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2811.09" y="504.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.6367" x="2811.09" y="518.7803">conflicts: is_shrink_only -&gt; shrink_adb_trigger</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="2811.09" y="532.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3438" x="2811.09" y="546.7803">delete-confirmation, legacy-adapter,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.3887" x="2811.09" y="560.7803">list-lookup, manual-webhook (+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.1992" x="2811.09" y="574.7803">Create first lists by displayName and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2744" x="2811.09" y="588.7803">compartment before deciding to bind or create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="2811.09" y="602.7803">Wallet secret generation is optional and only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3369" x="2811.09" y="616.7803">runs after the database is active.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8672" x="2811.09" y="630.7803">Delete remains an unsupported legacy path, so no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.8818" x="2811.09" y="644.7803">terminating state is confirmed today.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="105" id="ent0006"><path d="M3532.98,698 L3532.98,726.66 L3052.7,710.14 L3532.98,734.66 L3532.98,776 A8,8 0 0 0 3540.98,784 L3823.0405,784 A8,8 0 0 0 3831.0405,776 L3831.0405,700 L3821.0405,690 L3540.98,690 A8,8 0 0 0 3532.98,698" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3821.0405,690 L3821.0405,696 A4,4 0 0 0 3825.0405,700 L3831.0405,700 L3821.0405,690" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.999" x="3538.98" y="705.7803">delete policy: not-supported</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0605" x="3538.98" y="719.7803">delete observe: GetAutonomousDatabase or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3232" x="3538.98" y="733.7803">ListAutonomousDatabases</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="183.6133" x="3538.98" y="747.7803">delete targets: TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2197" x="3538.98" y="76