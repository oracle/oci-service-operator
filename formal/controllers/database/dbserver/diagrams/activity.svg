 the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="844.5532" y="1079.2803">field surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="831.4497" y="1161.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="841.4497" y="1182.2803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="841.4497" y="1196.2803">fields compartment_id</text><ellipse cx="982.6733" cy="1242" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="982.6733" cy="1242" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="857.0903,1112.5,1108.2563,1112.5,1120.2563,1124.5,1108.2563,1136.5,857.0903,1136.5,845.0903,1124.5,857.0903,1112.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="986.6733" y="1147.2803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="857.0903" y="1128.2803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="872.2456,1295,1093.1011,1295,1105.1011,1307,1093.1011,1319,872.2456,1319,860.2456,1307,872.2456,1295" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="872.2456" y="1310.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="838.4595" y="1303.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1105.1011" y="1303.7803">no</text><rect fi