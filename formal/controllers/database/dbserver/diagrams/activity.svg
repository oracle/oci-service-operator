"243.5918" x="156.7546" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="312.5986" x="122.2512" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5986" x="132.2512" y="755.7803">Delete path uses DeleteDbServer with required</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6543" x="132.2512" y="769.7803">via GetDbServer or ListDbServer to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="132.2512" y="783.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="138.9856" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="148.9856" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="148.9856" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="121.8411" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="131.8411" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M309.5505,929 L309.5505,1105 L289.5505,1109 L309.5505,1113 L309.5505,1289 A0,0 0 0 0 309.5505,1289 L649.5906,1289 A0,0 0 0 0 649.5906,1289 L649.5906,939 L639.5906,929 L309.5505,929 A0,0 0 0 0 309.5505,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M639.5906,929 L639.5906,939 L649.5906,939 L639.5906,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="10