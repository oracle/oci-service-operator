th uses DeleteDbServer with required</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6543" x="193.4448" y="641.7803">via GetDbServer or ListDbServer to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="193.4448" y="655.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="281.4268" x="199.0308" y="704"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6475" x="209.0308" y="724.7803">Confirm deletion via GetDbServer or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4268" x="209.0308" y="738.7803">ListDbServer until OCI reaches DELETED</text><polygon fill="#E2E8F0" points="191.5718,781,487.9165,781,499.9165,793,487.9165,805,191.5718,805,179.5718,793,191.5718,781" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="796.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="789.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="789.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="815"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="835.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="815"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="835.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="849.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,869,351.7441,881,339.7441,893,327.7441,881,339.7441,869" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="950.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="950.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="427.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="345.916" x="815.7153" y="573"/><path d="M966.5493,573 L966.5493,580 L956.5493,590 L815.7153,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="818.7153" y="584.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="280.5928" x="842.377" y="656"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="852.377" y="676.7803">Request requeue while OCI remains in</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.5928" x="852.377" y="690.7803">PROVISIONING, UPDATING, DELETING</text><ellipse cx="982.6733" cy="750" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="982.6733" cy="750" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="896.3901,607,1068.9565,607,1080.9565,619,1068.9565,631,896.3901,631,884.3901,619,896.3901,607" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="986.6733" y="641.7803">yes</text><text fill="#0F172A" font-family="Hel