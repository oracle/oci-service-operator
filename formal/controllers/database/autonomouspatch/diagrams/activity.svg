nt-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="189.2612" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="320.3643" x="150.875" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6191" x="160.875" y="755.7803">Delete path uses DeleteAutonomousPatch with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3506" x="160.875" y="769.7803">required via GetAutonomousPatch or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3643" x="160.875" y="783.7803">ListAutonomousPatch to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="171.4922" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="181.4922" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="181.4922" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="154.3477" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="164.3477" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M342.0571,929 L342.0571,1105 L322.0571,1109 L342.0571,1113 L342.0571,1289 A0,0 0 0 0 342.0571,1289 L682.0972,1289 A0,0 0 0 0 682.0972,1289 L682.0972,939 L672.0972,929 L342.0571,929 A0,0 0 0 0 342.0571,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M672.0972,929 L672.0972,939 L682.0972,939 L672.0972,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fi