" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="175.2271" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="306.3301" x="143.8579" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.585" x="153.8579" y="755.7803">Delete path uses DeleteDbSystemPatch with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.3164" x="153.8579" y="769.7803">required via GetDbSystemPatch or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3301" x="153.8579" y="783.7803">ListDbSystemPatch to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="157.458" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="167.458" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="167.458" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="140.3135" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="150.3135" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M328.0229,929 L328.0229,1105 L308.0229,1109 L328.0229,1113 L328.0229,1289 A0,0 0 0 0 328.0229,1289 L668.063,1289 A0,0 0 0 0 668.063,1289 L668.063,939 L658.063,929 L328.0229,929 A0,0 0 0 0 328.0229,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M658.063,929 L658.063,939 L668.063,939 L658.063,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetic