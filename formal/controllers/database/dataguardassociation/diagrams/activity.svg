<polygon fill="#E2E8F0" points="865.2524,1321.5,1086.1079,1321.5,1098.1079,1333.5,1086.1079,1345.5,865.2524,1345.5,853.2524,1333.5,865.2524,1321.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="865.2524" y="1337.2803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="831.4663" y="1330.2803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1098.1079" y="1330.2803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.9297" x="695.4814" y="1355.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9297" x="705.4814" y="1376.2803">Apply UpdateDataGuardAssociation only for</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6543" x="705.4814" y="1390.2803">mutable fields display_name</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1009.4111" y="1355.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1019.4111" y="1376.2803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="975.6802,1409.5,987.6802,1421.5,975.6802,1433.5,963.6802,1421.5,975.6802,1409.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="118" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="808.522" y="1453.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="818.522" y="1474.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="818.522" y="1488.2803">