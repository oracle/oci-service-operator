 y="241.7803">Resolve OCI state via GetDatabaseDbServer with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.2061" x="160.8682" y="255.7803">ListDatabaseDbServer fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="319.626" x="155.8994" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.626" x="165.8994" y="309.7803">Use scaffold_database_databasedbserver filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="165.8994" y="323.7803">compartment_id, state when OCID lookup or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5645" x="165.8994" y="337.7803">bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="262.0229,371,369.4019,371,381.4019,383,369.4019,395,262.0229,395,250.0229,383,262.0229,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="262.0229" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="228.2368" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="381.4019" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2744" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="21" y="425.7803">Update path calls UpdateDatabaseDbServer</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="25.7861" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing"