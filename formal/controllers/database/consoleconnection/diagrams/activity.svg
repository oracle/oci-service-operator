67" y="241.7803">Resolve OCI state via GetConsoleConnection</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.123" x="176.8267" y="255.7803">with ListConsoleConnection fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="160.2231" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1846" x="170.2231" y="309.7803">Use scaffold_database_consoleconnection</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="170.2231" y="323.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="170.2231" y="337.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="265.1538,371,372.5327,371,384.5327,383,372.5327,395,265.1538,395,253.1538,383,265.1538,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="265.1538" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="231.3677" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="384.5327" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="299.4053" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.4053" x="21" y="425.7803">Update path calls UpdateConsoleConnection</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="27.3516" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.7021" x="37.3516" y="479.7803">Guard mutable fields display_name and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3096" x="37.3516" y="493.7803">force-new fields compartment_id</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1572" x="330.4053" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="340.4053" y="425.7803">Create path calls CreateConsoleConnection</text><polygon fill="#E2E8F0" points="318.8433,513,330.8433,525,318.8433,537,306.8433,525,318.8433,513" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="104" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="151.6851" y="557"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="161.6851" y="577.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="161.6851" y="591.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="161.6851" y="605.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="161.6851" y="619.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="161.6851" y="633.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="161.6851" y="647.7803">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="263.5918" x="187.0474" y="681"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="197.0474" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="328.1504" x="154.7681" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.4053" x="164.7681" y="755.7803">Delete path uses DeleteConsoleConnection with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.1367" x="164.7681" y="769.7803">required via GetConsoleConnection or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1504" x="164.7681" y="783.7803">ListConsoleConnection to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="179.2783" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="189.2783" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="189.2783" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="162.1338" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="172.1338" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M349.8433,929 L349.8433,1105 L329.8433,1109 L349.8433,1113 L349.8433,1289 A0,0 0 0 0 349.8433,1289 L689.8833,1289 A0,0 0 0 0 689.8833,1289 L689.8833,939 L679.8833,929 L349.8433,929 A0,0 0 0 0 349.8433,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M679.8833,929 L679.8833,939 L689.8833,939 L679.8833,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="355.8433" y="944.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="355.8433" y="958.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="355.8433" y="972.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="355.8433" y="986.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="355.8433" y="1000.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="355.8433" y="1014.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="355.8433" y="1028.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="355.8433" y="1042.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="355.8433" y="1056.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="355.8433" y="1070.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="355.8433" y="1084.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7305" x="355.8433" y="1098.7803">service: database</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="149.4336" x="355.8433" y="1112.7803">slug: consoleconnection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="155.6543" x="355.8433" y="1126.7803">kind: ConsoleConnection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="355.8433" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="355.8433" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="355.8433" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="355.8433" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="355.8433" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="355.8433" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="355.8433" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="355.8433" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="355.8433" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="355.8433" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="355.8433" y="1280.7803">promotion.</text><ellipse cx="318.8433" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="318.8433" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="318.8433" x2="318.8433" y1="65" y2="85"/><polygon fill="#0F172A" points="314.8433,75,318.8433,85,322.8433,75,318.8433,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="318.8433" x2="318.8433" y1="133" y2="153"/><polygon fill="#0F172A" points="314.8433,143,318.8433,153,322.8433,143,318.8433,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="318.8433" x2="318.8433" y1="201" y2="221"/><polygon fill="#0F172A" points="314.8433,211,318.8433,221,322.8433,211,318.8433,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="318.8433" x2="318.8433" y1="269" y2="289"/><polygon fill="#0F172A" points="314.8433,279,318.8433,289,322.8433,279,318.8433,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="160.7026" x2="160.7026" y1="439" y2="459"/><polygon fill="#0F172A" points="156.7026,449,160.7026,459,164.7026,449,160.7026,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="253.1538" x2="160.7026" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="160.7026" x2="160.7026" y1="383" y2="405"/><polygon fill="#0F172A" points="156.7026,395,160.7026,405,164.7026,395,160.7026,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="384.5327" x2="476.9839" y1="383" y2="383"/><line 