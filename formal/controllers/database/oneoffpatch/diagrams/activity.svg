2246" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="320.2246" y="1280.7803">promotion.</text><ellipse cx="283.2246" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="283.2246" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="283.2246" x2="283.2246" y1="65" y2="85"/><polygon fill="#0F172A" points="279.2246,75,283.2246,85,287.2246,75,283.2246,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="283.2246" x2="283.2246" y1="133" y2="153"/><polygon fill="#0F172A" points="279.2246,143,283.2246,153,287.2246,143,283.2246,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="283.2246" x2="283.2246" y1="201" y2="221"/><polygon fill="#0F172A" points="279.2246,211,283.2246,221,287.2246,211,283.2246,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="283.2246" x2="283.2246" y1="269" y2="289"/><polygon fill="#0F172A" points="279.2246,279,283.2246,289,287.2246,279,283.2246,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="144.3511" x2="144.3511" y1="439" y2="459"/><polygon fill="#0F172A" points="140.3511,449,144.3511,459,148.3511,449,144.3511,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="217.5352" x2="144.3511" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="144.3511" x2="144.3511" y1="383" y2="405"/><polygon fill="#0F172A" points="140.3511,395,144.3511,405,148.3511,395,144.3511,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="348.9141" x2="422.0981" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="422.0981" x2="422.0981" y1="383" y2="405"/><polygon 