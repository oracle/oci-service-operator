 y="241.7803">Resolve OCI state via GetQueueConsumerGroup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4541" x="188.4922" y="255.7803">with ListQueueConsumerGroup fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="325.0811" x="179.6338" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0811" x="189.6338" y="309.7803">Use scaffold_queue_queueconsumergroup filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="189.6338" y="323.7803">compartment_id, state when OCID lookup or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5645" x="189.6338" y="337.7803">bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="288.4849,371,395.8638,371,407.8638,383,395.8638,395,288.4849,395,276.4849,383,288.4849,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="288.4849" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="254.6987" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="407.8638" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="322.7363" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7363" x="21" y="425.7803">Update path calls UpdateQueueConsumerGroup</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="39.0171" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="s