850.3296" y="1532.2803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="850.3296" y="1546.2803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="850.3296" y="1560.2803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.7783" x="850.3296" y="1574.2803">entity=queue action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="850.3296" y="1588.2803">update=tfresource.UpdateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="850.3296" y="1602.2803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.7783" x="850.3296" y="1616.2803">entity=queue action=UPDATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.7334" x="850.3296" y="1630.2803">delete=tfresource.DeleteResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="850.3296" y="1644.2803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9707" x="850.3296" y="1658.2803">entity=queue action=DELETED when the matching</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.5371" x="850.3296" y="1672.2803">field-driven path executes</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.8125" x="859.4087" y="1705.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="869.4087" y="1726.2803">Apply repo-authored secret policy ready-only</text><polygon fill="#E2E8F0" points="931.3662,1759.5,1085.2637,1759.5,1097.2637,1771.5,1085.2637,1783.5,931.3662,1783.5,919.3662,1771.5,931.3662,1759.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.8975" x="931.3662" y="1775.2803">"Secret sync succeeds?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="897.5801" y="1768.2803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1097.2637" y="1768.2803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="695.4814" y="1793.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="705.4814" y="1814.2803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="301.6748" x="1018.7012" y="1793.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6748" x="1028.7012" y="1814.2803">Block successful completion until Secret sync</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.1445" x="1028.7012" y="1828.2803">succeeds</text><polygon fill="#E2E8F0" points="1008.3149,1847.5,1020.3149,1859.5,1008.3149,1871.5,996.3149,1859.5,1008.3149,1847.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="868.75" y="1891.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="878.75" y="1912.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="878.75" y="1926.2803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="851.6055" y="1959.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="861.6055" y="1980.2803">Requeue on provisioning, updating, terminating</text><path d="M705.0295,2015.5 L705.0295,2485.5 L685.0295,2489.5 L705.0295,2493.5 L705.0295,2963.5 A0,0 0 0 0 705.0295,2963.5 L1055.1936,2963.5 A0,0 0 0 0 1055.1936,2963.5 L1055.1936,2025.5 L1045.1936,2015.5 L705.0295,2015.5 A0,0 0 0 0 705.0295,2015.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1045.1936,2015.5 L1045.1936,2025.5 L1055.1936,2025.5 L1045.1936,2015.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="711.0295" y="2031.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="711.0295" y="2045.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="711.0295" y="2059.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="711.0295" y="2073.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="711.0295" y="2087.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="711.0295" y="2101.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="711.0295" y="2115.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="711.0295" y="2129.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="711.0295" y="2143.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="711.0295" y="2157.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="711.0295" y="2171.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0547" x="711.0295" y="2185.2803">service: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3926" x="711.0295" y="2199.2803">slug: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4961" x="711.0295" y="2213.2803">kind: Queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="711.0295" y="2227.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="711.0295" y="2241.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="711.0295" y="2255.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="711.0295" y="2269.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="711.0295" y="2283.2803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="711.0295" y="2297.2803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.04" x="711.0295" y="2311.2803">supported drift: channel_consumption_limit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6475" x="711.0295" y="2325.2803">custom_encryption_key_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.791" x="711.0295" y="2339.2803">dead_letter_queue_delivery_count, defined_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="711.0295" y="2353.2803">(+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="711.0295" y="2367.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2539" x="711.0295" y="2381.2803">compartment_id, retention_in_seconds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="711.0295" y="2395.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.7021" x="711.0295" y="2409.2803">list lookup: oci_queue_queues filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="711.0295" y="2423.2803">compartment_id, display_name, id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9307" x="711.0295" y="2437.2803">lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="711.0295" y="2451.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="711.0295" y="2465.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.7295" x="711.0295" y="2479.2803">Queue create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4609" x="711.0295" y="2493.2803">work-request-backed. The runtime projects the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7021" x="711.0295" y="2507.2803">polled work request into status.async.current as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3232" x="711.0295" y="2521.2803">the canonical async tracker, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6123" x="711.0295" y="2535.2803">createWorkRequestId, updateWorkRequestId, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6611" x="711.0295" y="2549.2803">deleteWorkRequestId remain compatibility mirrors</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="321.3779" x="711.0295" y="2563.2803">so reconcile resumes asynchronous OCI operations</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9502" x="711.0295" y="2577.2803">across requeues instead of relying on name-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="45.1445" x="711.0295" y="2591.2803">lookup.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1709" x="711.0295" y="2605.2803">Queue SDK OperationStatus values normalize into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.2949" x="711.0295" y="2619.2803">shared async classes and Queue ActionType values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7227" x="711.0295" y="2633.2803">normalize into create, update, and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.04" x="711.0295" y="2647.2803">phases, but raw work-request status, operation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8057" x="711.0295" y="2661.2803">type, message, percent complete, and work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3779" x="711.0295" y="2675.2803">request ID stay visible in status for debugging.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2471" x="711.0295" y="2689.2803">Create binds identity from Queue work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.502" x="711.0295" y="2703.2803">resources, then reads the Queue by recovered</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0195" x="711.0295" y="2717.2803">OCID before projecting status. Delete is not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4678" x="711.0295" y="2731.2803">best-effort; it only completes after GetQueue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3779" x="711.0295" y="2745.2803">confirms the tracked Queue is gone or exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.3857" x="711.0295" y="2759.2803">lifecycle state DELETED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8057" x="711.0295" y="2773.2803">Mutable drift is limited to UpdateQueueDetails</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="711.0295" y="2787.2803">fields such as displayName, timeout, visibility,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="711.0295" y="2801.2803">tags, channelConsumptionLimit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.04" x="711.0295" y="2815.2803">deadLetterQueueDeliveryCount, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3574" x="711.0295" y="2829.2803">customEncryptionKeyId. Create-only inputs like</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2744" x="711.0295" y="2843.2803">compartmentId and retentionInSeconds are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.958" x="711.0295" y="2857.2803">rejected as force-new drift.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8398" x="711.0295" y="2871.2803">A package-local companion writes or updates the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.1641" x="711.0295" y="2885.2803">same-name endpoint Secret only after ACTIVE when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0469" x="711.0295" y="2899.2803">messagesEndpoint is present, adopts only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3916" x="711.0295" y="2913.2803">unlabeled matching Secrets, uses guarded</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.502" x="711.0295" y="2927.2803">updates/deletes for owned Secrets, and skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7021" x="711.0295" y="2941.2803">missing or unowned Secrets during delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9307" x="711.0295" y="2955.2803">cleanup.</text><ellipse cx="674.0295" cy="2489.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="674.0295" cy="2489.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="674.0295" x2="674.0295" y1="157" y2="177"/><polygon fill="#0F172A" points="670.0295,167,674.0295,177,678.0295,167,674.0295,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="836.6272" x2="836.6272" y1="341" y2="361"/><polygon fill="#0F172A" points="832.6272,351,836.6272,361,840.6272,351,836.6272,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="836.6272" x2="836.6272" y1="409" y2="429"/><polygon fill="#0F172A" points="832.6272,419,836.6272,429,840.6272,419,836.6272,423" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="532.5637" x2="511.4319" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="511.4319" x2="511.4319" y1="257" y2="279"/><polygon fill="#0F172A" points="507.4319,269,511.4319,279,515.4319,269,511.4319,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.4954" x2="836.6272" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="836.6272" x2="836.6272" y1="257" y2="279"/><polygon fill="#0F172A" point