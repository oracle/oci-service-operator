823.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="745" y="1837.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="745" y="1851.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="745" y="1865.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="745" y="1879.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="745" y="1893.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="745" y="1907.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="745" y="1921.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="745" y="1935.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="745" y="1949.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="745" y="1963.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="745" y="1977.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0547" x="745" y="1991.7803">service: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3926" x="745" y="2005.7803">slug: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4961" x="745" y="2019.7803">kind: Queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="745" y="2033.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="745" y="2047.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="745" y="2061.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="745" y="2075.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="745" y="2089.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="745" y="2103.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.4268" x="745" y="2117.7803">supported drift: capabilities,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.7646" x="745" y="2131.7803">channel_consumption_limit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6475" x="745" y="2145.7803">custom_encryption_key_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.7949" x="745" y="2159.7803">dead_letter_queue_delivery_count (+5 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="745" y="2173.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2539" x="745" y="2187.7803">compartment_id, retention_in_seconds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="745" y="2201.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.7021" x="745" y="2215.7803">list lookup: oci_queue_queues filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="745" y="2229.7803">compartment_id, display_name, id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9307" x="745" y="2243.7803">lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="745" y="2257.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="745" y="2271.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.7295" x="745" y="2285.7803">Queue create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4609" x="745" y="2299.7803">work-request-backed. The runtime projects the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7021" x="745" y="2313.7803">polled work request into status.async.current as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3232" x="745" y="2327.7803">the canonical async tracker, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6123" x="745" y="2341.7803">createWorkRequestId, updateWorkRequestId, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6611" x="745" y="2355.7803">deleteWorkRequestId remain compatibility mirrors</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="321.3779" x="745" y="2369.7803">so reconcile resumes asynchronous OCI operations</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9502" x="745" y="2383.7803">across requeues instead of relying on name-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="45.1445" x="745" y="2397.7803">lookup.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1709" x="745" y="2411.7803">Queue SDK OperationStatus values normalize into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.2949" x="745" y="2425.7803">shared async classes and Queue ActionType values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7227" x="745" y="2439.7803">normalize into create, update, and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.04" x="745" y="2453.7803">phases, but raw work-request status, operation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8057" x="745" y="2467.7803">type, message, percent complete, and work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3779" x="745" y="2481.7803">request ID stay visible in status for debugging.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2471" x="745" y="2495.7803">Create binds identity from Queue work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.502" x="745" y="2509.7803">resources, then reads the Queue by recovered</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0195" x="745" y="2523.7803">OCID before projecting status. Delete is not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4678" x="745" y="2537.7803">best-effort; it only completes after GetQueue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3779" x="745" y="2551.7803">confirms the tracked Queue is gone or exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.3857" x="745" y="2565.7803">lifecycle state DELETED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8057" x="745" y="2579.7803">Mutable drift is limited to UpdateQueueDetails</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5645" x="745" y="2593.7803">fields such as capabilities, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.0479" x="745" y="2607.7803">timeout, visibility, tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.9785" x="745" y="2621.7803">channelConsumptionLimit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.04" x="745" y="2635.7803">deadLetterQueueDeliveryCount, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1572" x="745" y="2649.7803">customEncryptionKeyId. Queue steady-state parity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="745" y="2663.7803">treats capabilities as the enabled type set</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0947" x="745" y="2677.7803">because GetQueue does not echo consumer-group</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.5361" x="745" y="2691.7803">add-on settings after enablement, even though</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5576" x="745" y="2705.7803">the runtime still forwards repo-authored</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.874" x="745" y="2719.7803">capability payloads on create and update when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="106.627" x="745" y="2733.7803">that set changes.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8398" x="745" y="2747.7803">A package-local companion writes or updates the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.1641" x="745" y="2761.7803">same-name endpoint Secret only after ACTIVE when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0469" x="745" y="2775.7803">messagesEndpoint is present, adopts only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3916" x="745" y="2789.7803">unlabeled matching Secrets, uses guarded</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.502" x="745" y="2803.7803">updates/deletes for owned Secrets, and skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7021" x="745" y="2817.7803">missing or unowned Secrets during delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9307" x="745" y="2831.7803">cleanup.</text><?plantuml-src lLXTRnl75NsVNp58NsnqITcnbJWqL42Hr4Im4hUIKxy888Qxi-HKovdDpAmOjkX_xxdpiTobn4X1ZIA0G-tCtizppxrttPtIhR1YpTrAL6QZz9BNed6IkVva8SgxfJMThivCOop_KrtYlsfmevArw1h_LwFzps8j-O-okPTUbUBnEpVgNvA_VZiu5DQQJPB-gdxzxTV3DxNnyli7DjJrjzKt-xUChQHDDnPlZz-y-cxl1gbFvs_Ul7rzV3mu3-9BOxMq_FKtp2lVI7uZV-saBYMVSFpevD7VwL-sKfNajJ5-ONuRY73vzhyPvwBqnevCIgxbetsVvDVoNVqAnn26wAbMQF_u-yCBpv4oSBkNqQXQNYaz3jftRyMRnJkSaiXsT5GkgcFvkZzwa91tjQXBzXyMVECVkeL49BrqR607FuCXrZIDjAF7tmidhsLfTAdsZxxwUFFnmusqzwgKFmajbj9-nONZuqUZLpwUNOv5x8p1QwMLFacWdpUmLZB21ZVtoFpOb69F3Qh4oefRwKpJUMNqB3qwgfHO0WBkAFuzsLsPP5HCtVqoIwXa0tiElXsFnszANGKCiu4xaxyCGZhZKWUGyW1IM9dSOBixzCROnHdlVx-mfC_vbsnyXLuQ1sAs4mvNd2ANOcK4TF0hO-xmFm6J5qfNJ3IUUmlCu1xG8Nzh6sGdf8gZb3IARSj5OwMejZXLpZisraWsuFQC_o1zr2H1KxtGNeXoVAsS0v4T4d05wK62Ur6hnalhPhmqQqBC6aBcgYfkTQLSsuZjN8FF2aWlGhsKsxAHS-U5bo-3JrPsJYmG17A4KjvPL3ziGAB03oYFGrQSmLSleoUDCIqlmmFU8it4mcVN5wUVBd_-eU2__Eqy_7ew8D0MWlAuLNyql8_O_WXuMiGFyc99t2CJevGgpIbQdGlYA68HsJmXJLO9CEVXyI6Zuccqwy0LM5GhkyxoxvNeNG7YRlKkwp7SwLuEz_d5rSLpWape7OYIZoPum2ophCXiD88JJxYe0RiGgNXwgvFvWWWZn0b04ng1WRvQQT6WPrf43KzT0DYYCGJyvwG86WKIaGm9w0sLYUTs6n6JpgWCy0CsSBDmaFnS1T6idQ7HmGTI8qGpJCd_Q0ty2SOGQ9-dCFBSPgLwbA_XemFWRlN3qYbs-GsQ6tMV0q6YG5yEnikcceWD-1VbRrNjkRmNJHTJab0Q7gyGl8O8PjSrnZONr85kkhOr5WZdNLkH9jVPMfH0H2bQiL2DyagwWfKGfsKpXtUkMxUaRTwejV8uwfmtwpawWDt6Wpkv9NvY5IfvZfWYolCGYZbY3QVi5d8wzBmNVpvcQ-3l9RkM_vIbvmjPuq--xiZh6RW9b33HSXFzTcoF0IaVLCFGgVJSKUnnAT7w8TfaJxBchecPrW-C0Cgf0j0KF5LZ33zGKS6AqZyNXKD72HJ1sGmxKkZwdD0HCUJJcX81dBPji-M_X5Gc9j1u05rPrgsEeHpd5wLzCC4uEvHXGF0PARxLCSU1qHBCCgFziRPnk57PJlELRC3pV8NqEnWTEjM9htDhcSPcTft-XF63iyz2OVwqduszkuwa_rdvrGKcVljZAgHR7Tl5IQngJ928n4aeuulpzxSwUZPK6FFmXHM6Y0M5aRY62cC7-i8A0obTd3_LGJPM1Q92yvu4q059MWOHs3ZeOkWOgRUuhIwnmwd6FQTeGXj1NP