ize="14" lengthAdjust="spacing" textLength="72.3926" x="745" y="1991.7803">slug: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4961" x="745" y="2005.7803">kind: Queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="745" y="2019.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="745" y="2033.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="745" y="2047.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="745" y="2061.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="745" y="2075.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="745" y="2089.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.04" x="745" y="2103.7803">supported drift: channel_consumption_limit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6475" x="745" y="2117.7803">custom_encryption_key_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.791" x="745" y="2131.7803">dead_letter_queue_delivery_count, defined_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="745" y="2145.7803">(+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="745" y="2159.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2539" x="745" y="2173.7803">compartment_id, retention_in_seconds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="745" y="2187.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.7021" x="745" y="2201.7803">list lookup: oci_queue_queues filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="745" y="2215.7803">compartment_id, display_name, id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9307" x="745" y="2229.7803">lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="745" y="2243.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="745" y="2257.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="745" y="2271.7803">Queue reconciliation is expected to track OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8398" x="745" y="2285.7803">work requests across create, update, and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6953" x="745" y="2299.7803">so the controller can resume asynchronous</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6611" x="745" y="2313.7803">operations across requeues.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.3223" x="745" y="2327.7803">Queue endpoint Secret handling is ready-only and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5156" x="745" y="2341.7803">should publish the OCI messages endpoint only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3301" x="745" y="2355.7803">after the Queue reaches ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8057" x="745" y="2369.7803">Mutable drift is limited to UpdateQueueDetails</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6543" x="745" y="2383.7803">fields, while create-only inputs like</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2471" x="745" y="2397.7803">compartment and retention remain force-new.</text><?plantuml-src jLZRRXit47tVhnYaBmagsN5YfuaA5qXjjmtYDAsTDYy616gNAx7cabkIAqKj-kyzlEn5ibIxQ0e3qcf9plNCcQ7jhL0rCwmYks25NWarfv99opFRhSnOVZitkb75cPRQq1TbZhzYiAFW9Mka-quhzoEhEFt0vP8xaRFTUwx57voEZWUBp1YzIjAVbaTVFHkULDhnR-_OK9PV5I-sTsbJS9Dsp8vFdZzzjRN3gq_hpvyV7vsS3DQ3-5mRnGqTlSYSS9BJDV-zuIhdD2OyDFpmP_-PBKJ1gTJQpVIdWGZRxlup8sAvqsR3fEHQkxJj4t_6NvPFiGnXY9wecNAxpmytF4JAmErEXXGblnHgCsYlZjdpsKkiUf7rnb8-AqxuKRTq9o4lIrRcsLzPy8tUDZEEI3fkiu4TT0P3Z9QIcutNtpBBhtYkLIwsbnwzltx_zfgRfSZvEwROd9j7n2njljeuylxipQQ8tXWSomrtIO9_l8QrFFFO8Br4vZTD6MsfGPKONf3XLil62QqcwTLX8TWS4B27yVUutp9kKN5Wb_DMGi4bxDbxEYvldkIg21ZE1kwClnc4T49S1P1I02ciJ6va_Hv_OjF52NNFZutNPzsJR7EBFxGPY4al7AvOuLsAbH7GGPTQt-ABmUIPK4N6f2DdW1di0phufreYEo5LX59IABOrCMauAzPO5TRPR5EZjm6x9_GzTr4J1qrrGZiXmb8bh0MHxHDm2Ub1WdrS2kcuiHFATUKHKq78L1IZ6rK8MqksdYhmsGZIHw5UydKk-TGwvlYJu9FXZMKp1C4xubFU65G_R42Ym0yeZtrMdC5NnwCdKkkQyl22QgJPi_3PrSNh3sz-_7v4l_nq7fxk3mYqXQ3ijkhVXdU7xJl0KoD-a1TBOebCRAHKAFBHQcmGvoCMaKq9QRn8W3aFh_SP5LUZNNksmA9IcAgLlnIiSmM8kr5zrcEuqxustESNbnSF2R97xq0KtvdW0RDCMaLwfH2Sk4Ai1En2fEBgZKhcCqyO8Ku06bC83FILGZ69dcaGDRor0M0