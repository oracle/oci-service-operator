4.833" x="745" y="1823.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="745" y="1837.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="745" y="1851.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="745" y="1865.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="745" y="1879.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="745" y="1893.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="745" y="1907.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="745" y="1921.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="745" y="1935.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="745" y="1949.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="745" y="1963.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0547" x="745" y="1977.7803">service: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3926" x="745" y="1991.7803">slug: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4961" x="745" y="2005.7803">kind: Queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="745" y="2019.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="745" y="2033.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="745" y="2047.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="745" y="2061.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="745" y="2075.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="745" y="2089.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.04" x="745" y="2103.7803">supported drift: channel_consumption_limit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6475" x="745" y="2117.7803">custom_encryption_key_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.791" x="745" y="2131.7803">dead_letter_queue_delivery_count, defined_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="745" y="2145.7803">(+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="745" y="2159.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2539" x="745" y="2173.7803">compartment_id, retention_in_seconds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="745" y="2187.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.7021" x="745" y="2201.7803">list lookup: oci_queue_queues filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="745" y="2215.7803">compartment_id, display_name, id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9307" x="745" y="2229.7803">lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="745" y="2243.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="745" y="2257.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.7295" x="745" y="2271.7803">Queue create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4609" x="745" y="2285.7803">work-request-backed. The runtime projects the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7021" x="745" y="2299.7803">polled work request into status.async.current as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3232" x="745" y="2313.7803">the canonical async tracker, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6123" x="745" y="2327.7803">createWorkRequestId, updateWorkRequestId, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.6611" x="745" y="2341.7803">deleteWorkRequestId remain compatibility mirrors</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="321.3779" x="745" y="2355.7803">so reconcile resumes asynchronous OCI operations</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9502" x="745" y="2369.7803">across requeues instead of relying on name-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="45.1445" x="745" y="2383.7803">lookup.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1709" x="745" y="2397.7803">Queue SDK OperationStatus values normalize into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.2949" x="745" y="2411.7803">shared async classes and Queue ActionType values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7227" x="745" y="2425.7803">normalize into create, update, and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.04" x="745" y="2439.7803">phases, but raw work-request status, operation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8057" x="745" y="2453.7803">type, message, percent complete, and work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3779" x="745" y="2467.7803">request ID stay visible in status for debugging.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2471" x="745" y="2481.7803">Create binds identity from Queue work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.502" x="745" y="2495.7803">resources, then reads the Queue by recovered</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0195" x="745" y="2509.7803">OCID before projecting status. Delete is not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4678" x="745" y="2523.7803">best-effort; it only completes after GetQueue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3779" x="745" y="2537.7803">confirms the tracked Queue is gone or exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.3857" x="745" y="2551.7803">lifecycle state DELETED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8057" x="745" y="2565.7803">Mutable drift is limited to UpdateQueueDetails</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="745" y="2579.7803">fields such as displayName, timeout, visibility,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="745" y="2593.7803">tags, channelConsumptionLimit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.04" x="745" y="2607.7803">deadLetterQueueDeliveryCount, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3574" x="745" y="2621.7803">customEncryptionKeyId. Create-only inputs like</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2744" x="745" y="2635.7803">compartmentId and retentionInSeconds are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.958" x="745" y="2649.7803">rejected as force-new drift.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8398" x="745" y="2663.7803">A package-local companion writes or updates the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.1641" x="745" y="2677.7803">same-name endpoint Secret only after ACTIVE when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0469" x="745" y="2691.7803">messagesEndpoint is present, adopts only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3916" x="745" y="2705.7803">unlabeled matching Secrets, uses guarded</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.502" x="745" y="2719.7803">updates/deletes for owned Secrets, and skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7021" x="745" y="2733.7803">missing or unowned Secrets during delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9307" x="745" y="2747.7803">cleanup.</text><?plantuml-src jLXjRnit4lxENq7qlYGuIKuQfqqL-83KzhL6tEJEJYzV30ZKBbVYUKLkIQvLtQ7_lSyCkQkLRDKkBeS0ZhJapkippymet1hRAAzMCYnLwTR6BcIbwg15w4_cghXTUDVQyjJLpik_L0N-bOCRfQvKMyU_Eni_g9MMF-hwJaTJg8VlN9l_QFdoU72el7VhBFr5zVBRhuTlMXVrz_TigAflos_sRpbVQfzlp8zVlthntTuDKf_FNxqwVldwzU2SnHVEM-tbosz4DB7Mybh_qcfRQ3cM-D3get_INx4qfPQLSt7kVXs82Dtj_mefLH6Ttp4fkzOTxVkalzPlgXSuXZ14ppJAneVV7rvuYfI1sxsCsbJwqjZTe7rth5xDt-2KH3OxHyMyVArVzaVt4lAcKbKXVXFictpVpZKY6NKG0plaAGpnhgwrttdylGhwIXVE5cR_wAkFrn_VNsj_Pmhzax9geVrNKWMv-sZdbO-d5xiYjiRWjSBhc2NGnsjOgmLXGxexP7xNbD6U6bI9rwNqEhYwZSRPQNvqL1gr00J2KVe-tbuPTwYOXBj59w7KDUmv-7OwtdrJsv8nB0RkZFys2EbKQiiWbGnIM9dT4DixzCQkYrFPVtxcIL-8pyNk5NffDn3JhN2u4Wovb2g3qI4ldRl5VmecpuqjXQgZZ1wOmJsWG__QrCWEfqgYb2oARIDLx