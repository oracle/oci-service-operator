schemaVersion: 1
surface: repo-authored-semantics
service: queue
slug: queue
kind: Queue
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
  - failed
notes:
  - Queue create, update, and delete are work-request-backed. The runtime projects the polled work request into status.async.current as the canonical async tracker, while createWorkRequestId, updateWorkRequestId, and deleteWorkRequestId remain compatibility mirrors so reconcile resumes asynchronous OCI operations across requeues instead of relying on name-only lookup.
  - Queue SDK OperationStatus values normalize into shared async classes and Queue ActionType values normalize into create, update, and delete phases, but raw work-request status, operation type, message, percent complete, and work request ID stay visible in status for debugging.
  - Create binds identity from Queue work-request resources, then reads the Queue by recovered OCID before projecting status. Delete is not best-effort; it only completes after GetQueue confirms the tracked Queue is gone or exposes lifecycle state DELETED.
  - Mutable drift is limited to UpdateQueueDetails fields such as capabilities, displayName, timeout, visibility, tags, channelConsumptionLimit, deadLetterQueueDeliveryCount, and customEncryptionKeyId. Queue steady-state parity treats capabilities as the enabled type set because GetQueue does not echo consumer-group add-on settings after enablement, even though the runtime still forwards repo-authored capability payloads on create and update when that set changes.
  - A package-local companion writes or updates the same-name endpoint Secret only after ACTIVE when messagesEndpoint is present, adopts only unlabeled matching Secrets, uses guarded updates/deletes for owned Secrets, and skips missing or unowned Secrets during delete cleanup.
