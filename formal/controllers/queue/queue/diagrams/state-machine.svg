01.8477" x="2776.41" y="646"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2781.41" y="669.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3898.84" y="580"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3903.84" y="603.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="3400.5" y="580"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3405.5" y="603.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="34" id="ent0002"><ellipse cx="16" cy="616" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="60" id="ent0003"><path d="M2651.09,49 L2651.09,347.63 L2460.68,379.39 L2651.09,355.63 L2651.09,603 A8,8 0 0 0 2659.09,611 L2995.5714,611 A8,8 0 0 0 3003.5714,603 L3003.5714,51 L2993.5714,41 L2659.09,41 A8,8 0 0 0 2651.09,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2993.5714,41 L2993.5714,47 A4,4 0 0 0 2997.5714,51 L3003.5714,51 L2993.5714,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2657.09" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2657.09" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2657.09" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2657.09" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2657.09" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2657.09" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2657.09" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2657.09" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2657.09" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0547" x="2657.09" y="182.7803">service: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3926" x="2657.09" y="196.7803">slug: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4961" x="2657.09" y="210.7803">kind: Queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2657.09" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2657.09" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2657.09" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2657.09" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="2657.09" y="280.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="2657.09" y="294.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.04" x="2657.09" y="308.7803">supported drift: channel_consumption_limit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6475" x="2657.09" y="322.7803">custom_encryption_key_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.791" x="2657.09" y="336.7803">dead_letter_queue_delivery_count, defined_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="2657.09" y="350.7803">(+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2657.09" y="364.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2539" x="2657.09" y="378.7803">compartment_id, retention_in_seconds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2657.09" y="392.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.7021" x="2657.09" y="406.7803">list lookup: oci_queue_queues filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="2657.09" y="420.7803">compartment_id, display_name, id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9307" x="2657.09" y="434.7803">lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2657.09" y="448.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2657.09" y="462.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="2657.09" y="476.7803">Queue reconciliation is expected to track OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8398" x="2657.09" y="490.7803">work requests across create, update, and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6953" x="2657.09" y="504.7803">so the controller can resume asynchronous</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6611" x="2657.09" y="518.7803">operations across requeues.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.3223" x="2657.09" y="532.7803">Queue endpoint Secret handling is ready-only and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5156" x="2657.09" y="546.7803">should publish the OCI messages endpoint only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.3301" x="2657.09" y="560.7803">after the Queue reaches ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8057" x="2657.09" y="574.7803">Mutable drift is limited to UpdateQueueDetails</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6543" x="2657.09" y="588.7803">fields, while create-only inputs like</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2471" x="2657.09" y="602.7803">compartment and retention remain force-new.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="102" id="ent0006"><path d="M3338.58,663 L3338.58,684.84 L2878.59,668.25 L3338.58,692.84 L3338.58,727 A8,8 0 0 0 3346.58,735 L3606.8476,735 A8,8 0 0 0 3614.8476,727 L3614.8476,665 L3604.8476,655 L3346.58,655 A8,8 0 0 0 3338.58,663" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3604.8476,655 L3604.8476,661 A4,4 0 0 0 3608.8476,665 L3614.8476,665 L3604.8476,655" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="3344.58" y="670.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2676" x="3344.58" y="684.7803">delete observe: GetQueue or ListQueues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="3344.58" y="698.7803">delete targets: DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2197" x="3344.58" y="712.7803">Secret cleanup waits for OCI delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.1445" x="3344.58" y="726.7803">confirmation.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="34" id="lnk3"><path d="M26.2,616 C49.21,616 105.71,616 165.54,616" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="171.54,616,162.54,612,166.54,616,162.54,620,171.54,616" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="