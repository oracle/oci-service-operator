<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="975px" preserveAspectRatio="none" style="width:3987px;height:975px;background:#FCFCFD;" version="1.1" viewBox="0 0 3987 975" width="3987px" zoomAndPan="magnify"><title>State Machine - queue/Queue</title><defs/><g><rect fill="#FCFCFD" height="975" style="stroke:none;stroke-width:1;" width="3987" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="195.2617" x="1889.1471" y="20.7803">State Machine - queue/Queue</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="172" y="809"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="172" x2="436.3643" y1="833" y2="833"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="277.7271" y="824.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="177" y="848.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="177" y="862.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1233.36" y="649"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1238.36" y="672.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2409.73" y="587"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2414.73" y="610.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1250.88" y="929"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1255.88" y="952.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1260.84" y="810"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1266.7746" y="833.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="714.44" y="760"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="719.44" y="783.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1761.32" y="566"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1766.32" y="589.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1627.73" y="741"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1632.73" y="764.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="81.5859" x="2008.53" y="661"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5859" x="2013.53" y="684.7803">SyncSecret</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="100.2686" x="2384.83" y="680"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="90.2686" x="2389.83" y="703.7803">SecretBlocked</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="2776.41" y="870"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2781.41" y="893.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3898.84" y="804"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3903.84" y="827.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="3400.5" y="804"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3405.5" y="827.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="34" id="ent0002"><ellipse cx="16" cy="840" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="60" id="ent0003"><path d="M2651.09,49 L2651.09,509.98 L2460.68,596.3 L2651.09,517.98 L2651.09,827 A8,8 0 0 0 2659.09,835 L2995.5714,835 A8,8 0 0 0 3003.5714,827 L3003.5714,51 L2993.5714,41 L2659.09,41 A8,8 0 0 0 2651.09,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2993.5714,41 L2993.5714,47 A4,4 0 0 0 2997.5714,51 L3003.5714,51 L2993.5714,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2657.09" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2657.09" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2657.09" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2657.09" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2657.09" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2657.09" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2657.09" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2657.09" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2657.09" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0547" x="2657.09" y="182.7803">service: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="72.3926" x="2657.09" y="196.7803">slug: queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4961" x="2657.09" y="210.7803">kind: Queue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2657.09" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2657.09" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2657.09" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2657.09" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="2657.09" y="280.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="2657.09" y="294.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.04" x="2657.09" y="308.7803">supported drift: channel_consumption_limit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6475" x="2657.09" y="322.7803">custom_encryption_key_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.791" x="2657.09" y="336.7803">dead_letter_queue_delivery_count, defined_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="2657.09" y="350.7803">(+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2657.09" y="364.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2539" x="2657.09" y="378.7803">compartment_id, retention_in_seconds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2657.09" y="392.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.7021" x="2657.09" y="406.7803">list lookup: oci_queue_queues filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="2657.09" y="420.7803">compartment_id, display_name, id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.9307" x="2657.09" y="434.7803">lifecycle_state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2657.09" y="448.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2657.09" y="462.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.7295" x="2657.09" y="476.7803">Queue create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3232" x="2657.09" y="490.7803">work-request-backed. The runtime persists</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.6123" x="2657.09" y="504.7803">createWorkRequestId, updateWorkRequestId, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="2657.09" y="518.7803">deleteWorkRequestId in status so reconcile</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9092" x="2657.09" y="532.7803">resumes asynchronous OCI operations across</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8604" x="2657.09" y="546.7803">requeues instead of relying on name-only lookup.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2471" x="2657.09" y="560.7803">Create binds identity from Queue work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.502" x="2657.09" y="574.7803">resources, then reads the Queue by recovered</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0195" x="2657.09" y="588.7803">OCID before projecting status. Delete is not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4678" x="2657.09" y="602.7803">best-effort; it only completes after GetQueue</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3779" x="2657.09" y="616.7803">confirms the tracked Queue is gone or exposes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.3857" x="2657.09" y="630.7803">lifecycle state DELETED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.8057" x="2657.09" y="644.7803">Mutable drift is limited to UpdateQueueDetails</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="2657.09" y="658.7803">fields such as displayName, timeout, visibility,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="2657.09" y="672.7803">tags, channelConsumptionLimit,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.04" x="2657.09" y="686.7803">deadLetterQueueDeliveryCount, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3574" x="2657.09" y="700.7803">customEncryptionKeyId. Create-only inputs like</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2744" x="2657.09" y="714.7803">compartmentId and retentionInSeconds are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.958" x="2657.09" y="728.7803">rejected as force-new drift.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8398" x="2657.09" y="742.7803">A package-local companion writes or updates the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.1641" x="2657.09" y="756.7803">same-name endpoint Secret only after ACTIVE when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0469" x="2657.09" y="770.7803">messagesEndpoint is present, adopts only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3916" x="2657.09" y="784.7803">unlabeled matching Secrets, uses guarded</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.502" x="2657.09" y="798.7803">updates/deletes for owned Secrets, and skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7021" x="2657.09" y="812.7803">missing or unowned Secrets during delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9307" x="2657.09" y="826.7803">cleanup.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="118" id="ent0006"><path d="M3338.58,887 L3338.58,908.84 L2878.59,892.25 L3338.58,916.84 L3338.58,951 A8,8 0 0 0 3346.58,959 L3606.8476,959 A8,8 0 0 0 3614.8476,951 L3614.8476,889 L3604.8476,879 L3346.58,879 A8,8 0 0 0 3338.58,887" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3604.8476,879 L3604.8476,885 A4,4 0 0 0 3608.8476,889 L3614.8476,889 L3604.8476,879" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="3344.58" y="894.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2676" x="3344.58" y="908.7803">delete observe: GetQueue or ListQueues</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="3344.58" y="922.7803">delete 