nt-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="190.772" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="321.875" x="151.6304" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1299" x="161.6304" y="755.7803">Delete path uses DeleteWorkRequestError with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8613" x="161.6304" y="769.7803">required via GetWorkRequestError or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.875" x="161.6304" y="783.7803">ListWorkRequestError to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="173.0029" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="183.0029" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="183.0029" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="155.8584" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="165.8584" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M343.5679,929 L343.5679,1105 L323.5679,1109 L343.5679,1113 L343.5679,1289 A0,0 0 0 0 343.5679,1289 L683.6079,1289 A0,0 0 0 0 683.6079,1289 L683.6079,939 L673.6079,929 L343.5679,929 A0,0 0 0 0 343.5679,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M673.6079,929 L673.6079,939 L683.6079,939 L673.6079,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><tex