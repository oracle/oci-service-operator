acing" textLength="243.5918" x="163.1736" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="331.2334" x="119.3528" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0195" x="129.3528" y="755.7803">Delete path uses DeleteWorkRequest with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2334" x="129.3528" y="769.7803">required via GetWorkRequest or ListWorkRequest</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.2822" x="129.3528" y="783.7803">to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="145.4045" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="155.4045" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="155.4045" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="128.26" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="138.26" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M315.9695,929 L315.9695,1105 L295.9695,1109 L315.9695,1113 L315.9695,1289 A0,0 0 0 0 315.9695,1289 L656.0095,1289 A0,0 0 0 0 656.0095,1289 L656.0095,939 L646.0095,929 L315.9695,929 A0,0 0 0 0 315.9695,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M646.0095,929 L646.0095,939 L656.0095,939 L646.0095,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust=