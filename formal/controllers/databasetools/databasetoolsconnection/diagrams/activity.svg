1.0469" x="709.6008" y="2107.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="709.6008" y="2121.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.3027" x="709.6008" y="2135.2803">service: databasetools</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="188.3574" x="709.6008" y="2149.2803">slug: databasetoolsconnection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4541" x="709.6008" y="2163.2803">kind: DatabaseToolsConnection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="709.6008" y="2177.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="709.6008" y="2191.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="709.6008" y="2205.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="709.6008" y="2219.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="709.6008" y="2233.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="709.6008" y="2247.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="709.6008" y="2261.2803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="709.6008" y="2275.2803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9229" x="709.6008" y="2289.2803">supported drift: advanced_properties,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8604" x="709.6008" y="2303.2803">connection_string, defined_tags, display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="709.6008" y="2317.2803">(+8 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="709.6008" y="2331.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5645" x="709.6008" y="2345.2803">compartment_id, runtime_support, type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="709.6008" y="2359.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="709.6008" y="2373.2803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.9014" x="709.6008" y="2387.2803">oci_database_tools_database_tools_connections</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7715" x="709.6008" y="2401.2803">filters compartment_id, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3711" x="709.6008" y="2415.2803">related_resource_identifier, runtime_identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="709.6008" y="2429.2803">(+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="709.6008" y="2443.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="709.6008" y="2457.2803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="709.6008" y="2471.2803">Generated runtime uses read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.585" x="709.6008" y="2485.2803">follow-up for create and update plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.0957" x="709.6008" y="2499.2803">confirm-delete for delete; `CREATING` maps to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.9922" x="709.6008" y="2513.2803">provisioning, `UPDATING` to updating, `ACTIVE`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8477" x="709.6008" y="2527.2803">and `INACTIVE` to success, `DELETING` to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5781" x="709.6008" y="2541.2803">terminating, and `FAILED` to the terminal failed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="45.1377" x="709.6008" y="2555.2803">bucket.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.3096" x="709.6008" y="2569.2803">Pre-create lookup queries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8887" x="709.6008" y="2583.2803">`ListDatabaseToolsConnections` with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.792" x="709.6008" y="2597.2803">`compartmentId`, `displayName`, and optional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0264" x="709.6008" y="2611.2803">`relatedResourceIdentifier`; reusable matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.0752" x="709.6008" y="2625.2803">are narrowed in memory with `type`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6133" x="709.6008" y="2639.2803">`connectionString` or `url`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4268" x="709.6008" y="2653.2803">`relatedResource.identifier`, `userName`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2471" x="709.6008" y="2667.2803">`privateEndpointId`, and `runtimeSupport`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1436" x="709.6008" y="2681.2803">Only the mutable fields above reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9023" x="709.6008" y="2695.2803">place. `compartmentId`, `runtimeSupport`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9297" x="709.6008" y="2709.2803">`type` remain replacement-only drift even though</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8467" x="709.6008" y="2723.2803">the provider exposes broader update paths;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7578" x="709.6008" y="2737.2803">post-create `locks` drift stays explicit as an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.123" x="709.6008" y="2751.2803">open repo-authored gap.</text><ellipse cx="672.6008" cy="2362.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="672.6008" cy="2362.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="672.6008" x2="672.6008" y1="157" y2="177"/><polygon fill="#0F172A" points="668.6008,167,672.6008,177,676.6008,167,672.6008,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="824.0667" x2="824.0667" y1="369" y2="389"/><polygon fill="#0F172A" points="820.0667,379,824.0667,389,828.0667,379,824.0667,383" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="824.0667" x2="824.0667" y1="451" y2="471"/><polygon fill="#0F172A" points="820.0667,461,824.0667,471,828.0667,461,824.0667,465" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="531.135" x2="521.135" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="521.135" x2="521.135" y1="257" y2="279"/><polygon fill="#0F172A" points="517.135,269,521.135,279,525.135,269,521.135,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="814.0667" x2="824.0667" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="824.0667" x2="824.0667" y1="257" y2="279"/><polygon fill="#0F172A" points="820.0667,269,824.0667,279,828.0667,269,824.0667,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="521.135" x2="521.135" y1="327" y2="537"/><line style="stroke:#0F172A;stroke-width:1;" x1="521.135" x2="660.6008" y1="537" y2="537"/><polygon fill="#0F172A" points="650.6008,533,660.6008,537,650.6008,541,654.6008,537" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="824.0667" x2="824.0667" y1="519" y2="537"/><line style="stroke:#0F172A;stroke-width:1;" x1="824.0667" x2="684.6008" y1="537" y2="537"/