schemaVersion: 1
surface: repo-authored-semantics
service: databasetools
slug: databasetoolsconnection
kind: DatabaseToolsConnection
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
  - failed
repoAuthored:
  mutation:
    mutable:
      - advanced_properties
      - connection_string
      - defined_tags
      - display_name
      - freeform_tags
      - key_stores
      - private_endpoint_id
      - proxy_client
      - related_resource
      - url
      - user_name
      - user_password
    forceNew:
      - compartment_id
      - runtime_support
      - type
  hooks:
    create:
      - helper: tfresource.CreateResource
    update:
      - helper: tfresource.UpdateResource
    delete:
      - helper: tfresource.DeleteResource
  followUp:
    create: read-after-write
    update: read-after-write
    delete: confirm-delete
notes:
  - Generated runtime uses read-after-write follow-up for create and update plus
    confirm-delete for delete; `CREATING` maps to provisioning, `UPDATING` to
    updating, `ACTIVE` and `INACTIVE` to success, `DELETING` to terminating,
    and `FAILED` to the terminal failed bucket.
  - Pre-create lookup queries `ListDatabaseToolsConnections` with
    `compartmentId`, `displayName`, and optional `relatedResourceIdentifier`;
    reusable matches are narrowed in memory with `type`, `connectionString` or
    `url`, `relatedResource.identifier`, `userName`, `privateEndpointId`, and
    `runtimeSupport`.
  - Only the mutable fields above reconcile in place. `compartmentId`,
    `runtimeSupport`, and `type` remain replacement-only drift even though the
    provider exposes broader update paths; post-create `locks` drift stays
    explicit as an open repo-authored gap.
