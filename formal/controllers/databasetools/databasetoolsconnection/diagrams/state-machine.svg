yle="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="3105.31" y="783"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3110.31" y="806.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="32" id="ent0002"><ellipse cx="16" cy="814" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2331.78,49 L2331.78,526.56 L2166.1,631.09 L2331.78,534.56 L2331.78,799 A8,8 0 0 0 2339.78,807 L2676.2614,807 A8,8 0 0 0 2684.2614,799 L2684.2614,51 L2674.2614,41 L2339.78,41 A8,8 0 0 0 2331.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2674.2614,41 L2674.2614,47 A4,4 0 0 0 2678.2614,51 L2684.2614,51 L2674.2614,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2337.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2337.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2337.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2337.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2337.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2337.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2337.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2337.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2337.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.3027" x="2337.78" y="182.7803">service: databasetools</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="188.3574" x="2337.78" y="196.7803">slug: databasetoolsconnection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="198.4541" x="2337.78" y="210.7803">kind: DatabaseToolsConnection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2337.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2337.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2337.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2337.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2337.78" y="280.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2337.78" y="294.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="2337.78" y="308.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="2337.78" y="322.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9229" x="2337.78" y="336.7803">supported drift: advanced_properties,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8604" x="2337.78" y="350.7803">connection_string, defined_tags, display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="2337.78" y="364.7803">(+8 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2337.78" y="378.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5645" x="2337.78" y="392.7803">compartment_id, runtime_support, type</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2337.78" y="406.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="2337.78" y="420.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.9014" x="2337.78" y="434.7803">oci_database_tools_database_tools_connections</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7715" x="2337.78" y="448.7803">filters compartment_id, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3711" x="2337.78" y="462.7803">related_resource_identifier, runtime_identity</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="2337.78" y="476.7803">(+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2337.78" y="490.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="2337.78" y="504.7803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.999" x="2337.78" y="518.7803">Generated runtime uses read-after-write</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="222.585" x="2337.78" y="532.7803">follow-up for create and update plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.0957" x="2337.78" y="546.7803">confirm-delete for delete; `CREATING` maps to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.9922" x="2337.78" y="560.7803">provisioning, `UPDATING` to updating, `ACTIVE`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8477" x="2337.78" y="574.7803">and `INACTIVE` to success, `DELETING` to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5781" x="2337.78" y="588.7803">terminating, and `FAILED` to the terminal failed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="45.1377" x="2337.78" y="602.7803">bucket.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.3096" x="2337.78" y="616.7803">Pre-create lookup queries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8887" x="2337.78" y="630.7803">`ListDatabaseToolsConnections` with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.792" x="2337.78" y="644.7803">`compartmentId`, `displayName`, and optional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0264" x="2337.78" y="658.7803">`relatedResourceIdentifier`; reusable matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.0752" x="2337.78" y="672.7803">are narrowed in memory with `type`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6133" x="2337.78" y="686.7803">`connectionString` or `url`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4268" x="2337.78" y="700.7803">`relatedResource.identifier`, `userName`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2471" x="2337.78" y="714.7803">`privateEndpointId`, and `runtimeSupport`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1436" x="2337.78" y="728.7803">Only the mutable fields above reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9023" x="2337.78" y="742.7803">place. `compartmentId`, `runtimeSupport`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9297" x="2337.78" y="756.7803">`type` remain replacement-only drift even though</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.8467" x="2337.78" y="770.7803">the provider exposes broader update paths;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7578" x="2337.78" y="784.7803">post-create `locks` drift stays explicit as an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.123" x="2337.78" y="798.7803">open repo-authored gap.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="111" id="ent0006"><path d="M3019.27,866 L3019.27,880.03 L2559.22,864.17 L3019.27,888.03 L3019.27,916 A8,8 0 0 0 3027.27,924 L3335.7856,924 A8,8 0 0 0 3343.7856,916 L3343.7856,868 L3333.7856,858 L3027.27,858 A8,8 0 0 0 3019.27,866" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3333.7856,858 L3333.7856,864 A4,4 0 0 0 3337.7856,868 L3343.7856,868 L3333.7856,858" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="3025.27" y="873.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5156" x="3025.27" y="887.7803">delete observe: GetDatabaseToolsConnection or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.7783" x="3025.27" y="901.7803">ListDatabaseToolsConnections</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="3025.27" y="915.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.32,814 C61.88,814 186.28,814 288.62,814" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="294.62,814,285.62,810,289.62,814,285.62,818,294.62,814" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.0127" x="57" y="809.7803">CreateDatabaseToolsConnection</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1