<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="933px" preserveAspectRatio="none" style="width:3716px;height:933px;background:#FCFCFD;" version="1.1" viewBox="0 0 3716 933" width="3716px" zoomAndPan="magnify"><title>State Machine - databasetools/DatabaseToolsConnection</title><defs/><g><rect fill="#FCFCFD" height="933" style="stroke:none;stroke-width:1;" width="3716" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="381.1855" x="1660.6552" y="20.7803">State Machine - databasetools/DatabaseToolsConnection</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="295" y="783"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="295" x2="559.3643" y1="807" y2="807"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="400.7271" y="798.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="300" y="822.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="300" y="836.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1356.36" y="626"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1361.36" y="649.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2115.32" y="626"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength=