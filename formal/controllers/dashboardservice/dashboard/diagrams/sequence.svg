" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="772" y="1779.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="772" y="1793.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="772" y="1807.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="772" y="1821.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="772" y="1835.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="772" y="1849.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6338" x="772" y="1863.7803">service: dashboardservice</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="99.627" x="772" y="1877.7803">slug: dashboard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.9512" x="772" y="1891.7803">kind: Dashboard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="772" y="1905.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="772" y="1919.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="772" y="1933.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="772" y="1947.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="772" y="1961.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="772" y="1975.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="772" y="1989.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="772" y="2003.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3574" x="772" y="2017.7803">supported drift: config, definedTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.3682" x="772" y="2031.7803">description, displayName (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="772" y="2045.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="772" y="2059.7803">dashboardGroupId, schemaVersion, systemTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="772" y="2073.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9639" x="772" y="2087.7803">list lookup: oci_dashboard_service_dashboards</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0332" x="772" y="2101.7803">filters dashboardGroupId, displayName; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.0811" x="772" y="2115.7803">dashboardGroupId plus displayName unique match</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8271" x="772" y="2129.7803">in ACTIVE, CREATING, or UPDATING; empty</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.833" x="772" y="2143.7803">displayName skips lookup and duplicate matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="17.8965" x="772" y="2157.7803">fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="772" y="2171.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="772" y="2185.7803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="772" y="2199.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="772" y="2213.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="772" y="2227.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3369" x="772" y="2241.7803">terminal and DELETED or NotFound are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6406" x="772" y="2255.7803">delete-confirmation targets.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="772" y="2269.7803">Existing-before-create lookup runs only when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0742" x="772" y="2283.7803">both dashboardGroupId and displayName are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1641" x="772" y="2297.7803">present, then scopes ListDashboards by exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2949" x="772" y="2311.7803">dashboardGroupId plus displayName and reuses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.4814" x="772" y="2325.7803">only a unique candidate in ACTIVE, CREATING, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2275" x="772" y="2339.7803">UPDATING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.709" x="772" y="2353.7803">The published runtime dispatches polymorphic</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.957" x="772" y="2367.7803">create and update bodies by schemaVersion,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9297" x="772" y="2381.7803">currently supports only V1, defaults an omitted</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0605" x="772" y="2395.7803">schemaVersion to V1, and rejects unsupported</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8818" x="772" y="2409.7803">schema versions before OCI mutation.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.999" x="772" y="2423.7803">Only displayName, description, freeformTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3916" x="772" y="2437.7803">definedTags, config, and widgets reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9092" x="772" y="2451.7803">place. dashboardGroupId moves via</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.4258" x="772" y="2465.7803">ChangeDashboardGroup remain out of scope, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.0957" x="772" y="2479.7803">schemaVersion plus systemTags remain</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.7783" x="772" y="2493.7803">replacement-only drift. Empty-string displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0605" x="772" y="2507.7803">or description values and null config values are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2402" x="772" y="2521.7803">treated as omission until the spec can</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5029" x="772" y="2535.7803">distinguish clear from omit.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.3018" x="772" y="2549.7803">Create, get, and update return the Dashboard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.082" x="772" y="2563.7803">body polymorphically, list returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="772" y="2577.7803">DashboardSummary items only, delete returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5225" x="772" y="2591.7803">headers only, and the Dashboards home-region</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1504" x="772" y="2605.7803">caveat remains explicit in the published runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.6895" x="772" y="2619.7803">contract.</text><?plantuml-src hLZRZXot4NtdLnIS5ncP7cbriUKH543UNIc2DrAWbVMqWC7fPiymwcwsIVQC9eR_FQT8zcLkqY89zA1PiiYwdJfLRFTPDwsqiYQtbeNPwcP5fQoS4cxOMShyyygQhYakJMKi_QNCyQ-OI1Igb5tbNvl6lvEreh-hQgEypkLfcLlzRqKNJoURqbgpJRS_AYz-V3mzsHYlVZwoeIn_B7uub3AsK3P9B9y-U_BefmC9Lf_sdpnvUl7isMG_N9yRsoXB5py8htsbw5RztgacLvHH8TrwQQGjdB8RdQk7L_s2MEj2KMcCNvelanjTV_WFGIHpR-oUXSdJVklGHVLOFIyVOHkN8PYwbOq_VNugS9zR9b4OxgXqgMvqin_3dvxA9yldsEKhsxsjV5ayKnV3rb5-dfUopCMV8lX6ltHBXS1wvSJ43hg48TPKbR9xopzBfpwet3IvFjpwxltj-rzkOmB-8HkvKlOxaexsb_QElBzyApZtP3R8xFxTiuDpg0Ah2hBAcQhpsZIBjFImq7A5dBg7yUzi5CdwDC_TPjNVKAWAtfuz7RVtJwgc21WLOx0e-ziaHWjI3UGxHGFoO6boHOnoV6hVpGKDlnzOrkdyzs9VX0_j1sCnNWvtd6QtHiY7jDEDCP_nduJfIzqKGbQUl0KO88kqgozjXJI4711gf45HxKXMLibYXrtjl1FxMjaEI2_eZVAZDWLA6YuUBjAEQkqSIElS9JVGCDpY7fIwyigwnLqp5FCRzkDjCQD2kxQIEoQmxuCVLdLEBk4y6y_fxYnA6JgH91Gxi7vEwoNyysgqlZAcfJmiKeiqCyjUVhX-zV7jkpVtSxz98JXjqtyJq1FMdu1DYsZXpbWG6yH-Bv6w8UUbxrouZcCMSKq9Owg7oLLOFcTOt1rjEoC6gqfjwrx7Hiizbu2tksO_tp7mIRuF_DNrpVLz0yyOFhYozpIlb6pW6YHAtSWAFSt2Rwow099bPHYizmcoLLuYbCbEZgWA5OLrkujvJtkvgLly0EcGMN8Rkg-2QDPeg2nH1yUtHg3rOEDSHslWJp26eNS_XP6djcizOBM6ZmwGkMjwwC_ertzUfLz3LeBcIc_wGF1Le1u7urLLP78B_aJvMbrwKXjPTJ8Odd0MbjS8NiMaCBB-liqpRWctNTiQ2unIrnQioNMsbBbAG5lD14OMDCJYerov6JDWRdNBolQuGZpuwsEgZGLfV53_KhcdfIhn9zKTsxy0Kw14iqPjemTE75EFozS8poUkDTmkt0wbKxDQaVYrvoqwEYkcfYJfMlfy3V_HBxwW_HuT4ctLkQaFr3KQ2Oi7kQfVNNvy--bw9iPC0UPzibwGgbjK_rGpPfxMKJLsWw9ZvkUmXaivVr9NOuyphPz41hTpq772Sud6x09q1U2P-_k2V1fznbp8G8zgLkY6bFCMq-YtDILMUDMsrOuk0QtLo5GXdhExvjS0e0bhD9256RsQkoQclaSMJP45C9-15etG2aIMSDeJMP-F-tUGyntBTWsjLGMwfpMIwEwQsAvU-hBlClFOrJwaFr_SDT6UgKWCn4GaCinK999zBtBE7Xd2NMASCTiCa7Be_LwjTeDTtF2om6BPrce_CUV4Jh8YDP0qVDst1SOEzpBnK37Z