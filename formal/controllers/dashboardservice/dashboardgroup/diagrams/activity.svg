st="spacing" textLength="273.8955" x="701.7181" y="1963.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="701.7181" y="1977.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="701.7181" y="1991.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="701.7181" y="2005.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="701.7181" y="2019.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="701.7181" y="2033.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="701.7181" y="2047.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="701.7181" y="2061.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6338" x="701.7181" y="2075.2803">service: dashboardservice</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.4336" x="701.7181" y="2089.2803">slug: dashboardgroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.8613" x="701.7181" y="2103.2803">kind: DashboardGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="701.7181" y="2117.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="701.7181" y="2131.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="701.7181" y="2145.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="701.7181" y="2159.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="701.7181" y="2173.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="701.7181" y="2187.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="701.7181" y="2201.2803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="701.7181" y="2215.2803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="701.7181" y="2229.2803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9512" x="701.7181" y="2243.2803">displayName, freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="701.7181" y="2257.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6133" x="701.7181" y="2271.2803">compartmentId, systemTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="701.7181" y="2285.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="701.7181" y="2299.2803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8604" x="701.7181" y="2313.2803">oci_dashboard_service_dashboard_groups filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5781" x="701.7181" y="2327.2803">compartmentId, displayName; exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5713" x="701.7181" y="2341.2803">plus displayName unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="335.2959" x="701.7181" y="2355.2803">CREATING, or UPDATING; empty displayName skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.0195" x="701.7181" y="2369.2803">lookup and duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="701.7181" y="2383.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="701.7181" y="2397.2803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="701.7181" y="2411.2803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="701.7181" y="2425.2803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="701.7181" y="2439.2803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8057" x="701.7181" y="2453.2803">terminal and DELETED is the delete-confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="39.6895" x="701.7181" y="2467.2803">target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="701.7181" y="2481.2803">Existing-before-create lookup runs only when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1709" x="701.7181" y="2495.2803">both compartmentId and displayName are present,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5986" x="701.7181" y="2509.2803">then scopes ListDashboardGroups by exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1641" x="701.7181" y="2523.2803">compartmentId plus displayName and reuses only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2334" x="701.7181" y="2537.2803">unique candidate in ACTIVE, CREATING, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2275" x="701.7181" y="2551.2803">UPDATING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2471" x="701.7181" y="2565.2803">Only displayName, description, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2881" x="701.7181" y="2579.2803">definedTags reconcile in place. The handwritten</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8535" x="701.7181" y="2593.2803">update builder keeps non-empty string updates</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.5986" x="701.7181" y="2607.2803">for displayName and description and preserves</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8818" x="701.7181" y="2621.2803">explicit empty-map clears for the tag maps;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0332" x="701.7181" y="2635.2803">empty-string displayName and description values</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3643" x="701.7181" y="2649.2803">are treated as omission until the spec can</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.123" x="701.7181" y="2663.2803">distinguish clear from omit. CompartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8955" x="701.7181" y="2677.2803">systemTags remain replacement-only drift and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7295" x="701.7181" y="2691.2803">ChangeDashboardGroupCompartment stays out of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="41.248" x="701.7181" y="2705.2803">scope.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9229" x="701.7181" y="2719.2803">Create, get, and update return the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2676" x="701.7181" y="2733.2803">DashboardGroup body directly, delete returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5225" x="701.7181" y="2747.2803">headers only, and the Dashboards home-region</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1504" x="701.7181" y="2761.2803">caveat remains explicit in the published runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.6895" x="701.7181" y="2775.2803">contract.</text><ellipse cx="664.7181" cy="2344.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="664.7181" cy="2344.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="664.7181" x2="664.7181" y1="157" y2="177"/><polygon fill="#0F172A" points="660.7181,167,664.7181,177,668.7181,167,664.7181,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.184" x2="816.184" y1="341" y2="361"/><polygon fill="#0F172A" points="812.184,351,816.184,361,820.184,351,816.184,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.184" x2="816.184" y1="423" y2="443"/><polygon fill="#0F172A" points="812.184,433,816.184,443,820.184,433,816.184,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="523.2523" x2="513.2523" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="513.2523" x2="513.2523" y1="257" y2="279"/><polygon fill="#0F172A" points="509.2523,269,513.2523,279,517.2523,269,513.2523,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="806.184" x2="816.184" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="816.184" x2="816.184" y1="257" y2="279"/><polygon fill="#0F172A" points="812.184,269,816.184,279,820.184,269,816.184,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="513.2523" x2="513.2523" y1="327" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="513.2523" x2="652.7181" y1="509" y2="509"/><polygon fill="#0F172A" points="642.7181,505,652.7181,509,642.7181,513,646.7181,509" style="stroke:#0F172A;stroke-width