:#0F172A;stroke-width:0.5;" width="152.4268" x="3025.4" y="811"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3030.4" y="834.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="32" id="ent0002"><ellipse cx="16" cy="842" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2273.78,49 L2273.78,547.86 L2108.23,658.15 L2273.78,555.86 L2273.78,827 A8,8 0 0 0 2281.78,835 L2622.0759,835 A8,8 0 0 0 2630.0759,827 L2630.0759,51 L2620.0759,41 L2281.78,41 A8,8 0 0 0 2273.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2620.0759,41 L2620.0759,47 A4,4 0 0 0 2624.0759,51 L2630.0759,51 L2620.0759,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2279.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2279.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2279.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2279.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2279.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2279.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2279.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2279.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2279.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6338" x="2279.78" y="182.7803">service: dashboardservice</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.4336" x="2279.78" y="196.7803">slug: dashboardgroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.8613" x="2279.78" y="210.7803">kind: DashboardGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2279.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2279.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2279.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2279.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2279.78" y="280.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2279.78" y="294.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="2279.78" y="308.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="2279.78" y="322.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="2279.78" y="336.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9512" x="2279.78" y="350.7803">displayName, freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2279.78" y="364.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6133" x="2279.78" y="378.7803">compartmentId, systemTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2279.78" y="392.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="2279.78" y="406.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8604" x="2279.78" y="420.7803">oci_dashboard_service_dashboard_groups filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5781" x="2279.78" y="434.7803">compartmentId, displayName; exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5713" x="2279.78" y="448.7803">plus displayName unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="335.2959" x="2279.78" y="462.7803">CREATING, or UPDATING; empty displayName skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.0195" x="2279.78" y="476.7803">lookup and duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2279.78" y="490.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2279.78" y="504.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="2279.78" y="518.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="2279.78" y="532.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="2279.78" y="546.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8057" x="2279.78" y="560.7803">terminal and DELETED is the delete-confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="39.6895" x="2279.78" y="574.7803">target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="2279.78" y="588.7803">Existing-before-create lookup runs only when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1709" x="2279.78" y="602.7803">both compartmentId and displayName are present,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5986" x="2279.78" y="616.7803">then scopes ListDashboardGroups by exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1641" x="2279.78" y="630.7803">compartmentId plus displayName and reuses only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2334" x="2279.78" y="644.7803">unique candidate in ACTIVE, CREATING, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2275" x="2279.78" y="658.7803">UPDATING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2471" x="2279.78" y="672.7803">Only displayName, description, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2881" x="2279.78" y="686.7803">definedTags reconcile in place. The handwritten</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5918" x="2279.78" y="700.7803">update builder preserves clear-to-empty intent</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2402" x="2279.78" y="714.7803">for those fields, while compartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8955" x="2279.78" y="728.7803">systemTags remain replacement-only drift and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7295" x="2279.78" y="742.7803">ChangeDashboardGroupCompartment stays out of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="41.248" x="2279.78" y="756.7803">scope.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9229" x="2279.78" y="770.7803">Create, get, and update return the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2676" x="2279.78" y="784.7803">DashboardGroup body directly, delete returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5225" x="2279.78" y="798.7803">headers only, and the Dashboards home-region</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1504" x="2279.78" y="812.7803">caveat remains explicit in the published runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.6895" x="2279.78" y="826.7803">contract.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="113" id="ent0006"><path d="M2965.08,894 L2965.08,908.91 L2503.22,892.25 L2965.08,916.91 L2965.08,944 A8,8 0 0 0 2973.08,952 L3230.1552,952 A8,8 0 0 0 3238.1552,944 L3238.1552,896 L3228.1552,886 L2973.08,886 A8,8 0 0 0 2965.08,894" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3228.1552,886 L3228.1552,892 A4,4 0 0 0 3232.1552,896 L3238.1552,896 L3228.1552,886" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2971.08" y="901.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.9229" x="2971.08" y="915.7803">delete observe: GetDashboardGroup or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1855" x="2971.08" y="929.7803">ListDashboardGroups</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.0752" x="2971.08" y="943.7803">delete targets: DELETED, NOT_FOUND</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.39,842 C56.55,842 147.82,842 230.91,842" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="