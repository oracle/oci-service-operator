t><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="810" y="1779.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="810" y="1793.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="810" y="1807.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="810" y="1821.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="810" y="1835.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="810" y="1849.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="810" y="1863.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="162.6338" x="810" y="1877.7803">service: dashboardservice</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.4336" x="810" y="1891.7803">slug: dashboardgroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.8613" x="810" y="1905.7803">kind: DashboardGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="810" y="1919.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="810" y="1933.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="810" y="1947.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="810" y="1961.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="810" y="1975.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="810" y="1989.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="810" y="2003.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="810" y="2017.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="810" y="2031.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9512" x="810" y="2045.7803">displayName, freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="810" y="2059.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6133" x="810" y="2073.7803">compartmentId, systemTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="810" y="2087.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="810" y="2101.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8604" x="810" y="2115.7803">oci_dashboard_service_dashboard_groups filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5781" x="810" y="2129.7803">compartmentId, displayName; exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5713" x="810" y="2143.7803">plus displayName unique match in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="335.2959" x="810" y="2157.7803">CREATING, or UPDATING; empty displayName skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.0195" x="810" y="2171.7803">lookup and duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="810" y="2185.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="810" y="2199.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="810" y="2213.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="810" y="2227.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="810" y="2241.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8057" x="810" y="2255.7803">terminal and DELETED is the delete-confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="39.6895" x="810" y="2269.7803">target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1504" x="810" y="2283.7803">Existing-before-create lookup runs only when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1709" x="810" y="2297.7803">both compartmentId and displayName are present,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5986" x="810" y="2311.7803">then scopes ListDashboardGroups by exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.1641" x="810" y="2325.7803">compartmentId plus displayName and reuses only a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2334" x="810" y="2339.7803">unique candidate in ACTIVE, CREATING, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2275" x="810" y="2353.7803">UPDATING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2471" x="810" y="2367.7803">Only displayName, description, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2881" x="810" y="2381.7803">definedTags reconcile in place. The handwritten</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5918" x="810" y="2395.7803">update builder preserves clear-to-empty intent</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2402" x="810" y="2409.7803">for those fields, while compartmentId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8955" x="810" y="2423.7803">systemTags remain replacement-only drift and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7295" x="810" y="2437.7803">ChangeDashboardGroupCompartment stays out of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="41.248" x="810" y="2451.7803">scope.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9229" x="810" y="2465.7803">Create, get, and update return the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2676" x="810" y="2479.7803">DashboardGroup body directly, delete returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.5225" x="810" y="2493.7803">headers only, and the Dashboards home-region</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1504" x="810" y="2507.7803">caveat remains explicit in the published runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.6895" x="810" y="2521.7803">contract.</text><?plantuml-src lLXTRnit5dtdho2wBosWiUCcQLCPAP3QRchKsopiT9y45DGCH-A68cT9ZXIrsF--vvASBrdQE5kWo4FiuUNzFFVSI_iFoZJ2YGttQr7PdJ8hNWlj9VFzoLAK7rREjgQwijew_hUwnBzg9579MhGw_6XD-4Li9Fz9wgqCgXJ7PHxKxv9Vl1WT2kViBcj_Lbzy-_Nufh51_l38Xxh-jlhcKCgwIheiiNpnylcpxmuao7m-V_xynSNBbwFpgBwqpaZ7BxvXGGKj-OFyTojDANd1A-7NIojSvQNRgbAUNtSVtk9gmzQgahosDYpjnv5QtsduWt4koc3TnCqSRdTq6AVyMhwgd-4Oof1HrGWJZjyV2pn5ooWLlGwjQdcdp3IHtxqGpvUlS4egcybHkQnUoel-w56HNjMYBjb_M8oD_zmk9R8Rf6SZF_WL775MQ-acdtyGNjxBqffI7HvzyUxXtSyFgGf_5qQifFk22y-ddoPNtbtTCW80jrkKTwfxTd0FhU1anPtqLhT1MJFFdyuh9LQegJzFlnU3ID6L-SnlLvs6Icf4U_9sEfxUbAQAG6L3idZn_IX7SouDv5l9f_23kpaUDWZJrMciSzx__AKZmpvynQOYT6cQaVcW735vHR4TW3y2WDzP-m7_2GInLAPYGWSU76212m20_DXe52HMWwDR37fipuLsKbHxd2eVF9kQ9cSWFUTlPJWmAK5JlVPUc_9yexm7aPtIT0SpKrN-orhf89sVBqnfDuIR3TJTLZDUATzeiITQ-og6usJhnHA9e1Ye_gr3RyCggeRk1_XFsRr2c44U1A6jRNWPJtY3uXC1NztVl7b_-ylRpqW5hCPq7FVk_