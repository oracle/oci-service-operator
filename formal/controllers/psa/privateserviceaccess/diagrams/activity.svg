D</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9434" x="847.0945" y="1654.7803">when the matching field-driven path executes</text><rect fill="#F8FAFC" height="132" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="353.7852" x="827.3601" y="1688"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5303" x="837.3601" y="1708.7803">Apply explicit follow-up semantics</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3096" x="837.3601" y="1722.7803">create=GetPsaWorkRequest -&gt;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.834" x="837.3601" y="1736.7803">GetPrivateServiceAccess;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="837.3601" y="1750.7803">update=GetPsaWorkRequest -&gt;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.834" x="837.3601" y="1764.7803">GetPrivateServiceAccess;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="837.3601" y="1778.7803">delete=GetPsaWorkRequest -&gt;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.7852" x="837.3601" y="1792.7803">GetPrivateServiceAccess/ListPrivateServiceAccesses</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="837.3601" y="1806.7803">confirm-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="852.6428" y="1840"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="862.6428" y="1860.7803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="864.6877" y="1894"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="874.6877" y="1914.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="874.6877" y="1928.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="847.5432" y="1962"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="857.5432" y="1982.7803">Requeue on provisioning, updating, terminating</text><path d="M702.9984,2018 L702.9984,2516 L682.9984,2520 L702.9984,2524 L702.9984,3022 A0,0 0 0 0 702.9984,3022 L1057.7836,3022 A0,0 0 0 0 1057.7836,3022 L1057.7836,2028 L1047.7836,2018 L702.9984,2018 A0,0 0 0 0 702.9984,2018" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1047.7836,2018 L1047.7836,2028 L1057.7836,2028 L1047.7836,2018" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="708.9984" y="2033.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="708.9984" y="2047.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="708.9984" y="2061.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="708.9984" y="2075.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="708.9984" y="2089.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="708.9984" y="2103.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="708.9984" y="2117.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="708.9984" y="2131.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="708.9984" y="2145.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="708.9984" y="2159.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="708.9984" y="2173.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="708.9984" y="2187.7803">service: psa</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.3994" x="708.9984" y="2201.7803">slug: privateserviceaccess</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.8408" x="708.9984" y="2215.7803">kind: PrivateServiceAccess</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="708.9984" y="2229.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="708.9984" y="2243.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="708.9984" y="2257.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="708.9984" y="2271.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="708.9984" y="2285.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="708.9984" y="2299.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1162" x="708.9984" y="2313.7803">follow-up: create=GetPsaWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.834" x="708.9984" y="2327.7803">GetPrivateServiceAccess;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="708.9984" y="2341.7803">update=GetPsaWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.834" x="708.9984" y="2355.7803">GetPrivateServiceAccess;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="708.9984" y="2369.7803">delete=GetPsaWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.7852" x="708.9984" y="2383.7803">GetPrivateServiceAccess/ListPrivateServiceAccesses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="708.9984" y="2397.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="708.9984" y="2411.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="708.9984" y="2425.7803">displayName, freeformTags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="708.9984" y="2439.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="708.9984" y="2453.7803">compartmentId, ipv4Ip, serviceId, subnetId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="708.9984" y="2467.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="708.9984" y="2481.7803">list lookup: oci_psa_private_service_accesses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1025" x="708.9984" y="2495.7803">filters compartmentId, displayName, serviceId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.792" x="708.9984" y="2509.7803">id; Adopt only a unique exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4268" x="708.9984" y="2523.7803">ListPrivateServiceAccesses match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="708.9984" y="2537.7803">compartmentId plus displayName plus serviceId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0811" x="708.9984" y="2551.7803">whose returned subnetId also matches and whose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.71" x="708.9984" y="2565.7803">lifecycle is ACTIVE, CREATING, or UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="708.9984" y="2579.7803">duplicate matches fail, and pre-create lookup is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0537" x="708.9984" y="2593.7803">skipped when compartmentId, subnetId, serviceId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.165" x="708.9984" y="2607.7803">or displayName is empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="708.9984" y="2621.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="708.9984" y="2635.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2881" x="708.9984" y="2649.7803">Create, update, and delete persist the in-flight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.0889" x="708.9984" y="2663.7803">OCI work request in `status.async.current`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2471" x="708.9984" y="2677.7803">normalize PSA `OperationStatus*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3643" x="708.9984" y="2691.7803">shared async classes, and normalize work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1992" x="708.9984" y="2705.7803">`OperationType*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1914" x="708.9984" y="2719.7803">create/update/delete phases before deriving</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.04" x="708.9984" y="2733.7803">conditions and requeue behavior.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.8682" x="708.9984" y="2747.7803">Create prefers the returned</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.585" x="708.9984" y="2761.7803">`PrivateServiceAccess` body when OCI exposes an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6748" x="708.9984" y="2775.7803">identifier and otherwise recovers the OCID from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2266" x="708.9984" y="2789.7803">work-request resources before polling</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9023" x="708.9984" y="2803.7803">`GetPrivateServiceAccess`. Update also gates</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7295" x="708.9984" y="2817.7803">completion on a succeeded work request plus a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="708.9984" y="2831.7803">readable `GetPrivateServiceAccess`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.2959" x="708.9984" y="2845.7803">Only `definedTags`, `freeformTags`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6133" x="708.9984" y="2859.7803">`securityAttributes`, `displayName`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5781" x="708.9984" y="2873.7803">`description`, and `nsgIds` reconcile in place.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7715" x="708.9984" y="2887.7803">`compartmentId`, `subnetId`, `serviceId`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7852" x="708.9984" y="2901.7803">`ipv4Ip` remain replacement-only drift, so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2539" x="708.9984" y="2915.7803">published runtime never exercises provider-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4404" x="708.9984" y="2929.7803">`ChangePrivateServiceAccessCompartment`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1299" x="708.9984" y="2943.7803">Reviewed lifecycle mapping treats `FAILED` and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3027" x="708.9984" y="2957.7803">`NEEDS_ATTENTION` as terminal failure without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5156" x="708.9984" y="2971.7803">requeue, and delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9648" x="708.9984" y="2985.7803">`GetPrivateServiceAccess` or fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4131" x="708.9984" y="2999.7803">`ListPrivateServiceAccesses` confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.792" x="708.9984" y="3013.7803">resource is deleted or not found.</text><ellipse cx="671.9984" cy="2520" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="671.9984" cy="2520" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="671.9984" x2="671.9984" y1="157" y2="177"/><polygon fill="#0F172A" points="667.9984,167,671.9984,1