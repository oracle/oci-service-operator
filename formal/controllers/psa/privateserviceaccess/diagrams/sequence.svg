st="spacing" textLength="301.1982" x="778" y="2115.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="778" y="2129.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="778" y="2143.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="778" y="2157.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="778" y="2171.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="778" y="2185.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="778" y="2199.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="778" y="2213.7803">service: psa</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.3994" x="778" y="2227.7803">slug: privateserviceaccess</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.8408" x="778" y="2241.7803">kind: PrivateServiceAccess</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="778" y="2255.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="778" y="2269.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="778" y="2283.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="778" y="2297.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="778" y="2311.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="778" y="2325.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1162" x="778" y="2339.7803">follow-up: create=GetPsaWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.834" x="778" y="2353.7803">GetPrivateServiceAccess;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="778" y="2367.7803">update=GetPsaWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.834" x="778" y="2381.7803">GetPrivateServiceAccess;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="778" y="2395.7803">delete=GetPsaWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.7852" x="778" y="2409.7803">GetPrivateServiceAccess/ListPrivateServiceAccesses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="778" y="2423.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="778" y="2437.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="778" y="2451.7803">displayName, freeformTags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="778" y="2465.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="778" y="2479.7803">compartmentId, ipv4Ip, serviceId, subnetId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="778" y="2493.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="778" y="2507.7803">list lookup: oci_psa_private_service_accesses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1025" x="778" y="2521.7803">filters compartmentId, displayName, serviceId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.792" x="778" y="2535.7803">id; Adopt only a unique exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4268" x="778" y="2549.7803">ListPrivateServiceAccesses match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="778" y="2563.7803">compartmentId plus displayName plus serviceId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0811" x="778" y="2577.7803">whose returned subnetId also matches and whose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.71" x="778" y="2591.7803">lifecycle is ACTIVE, CREATING, or UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="778" y="2605.7803">duplicate matches fail, and pre-create lookup is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0537" x="778" y="2619.7803">skipped when compartmentId, subnetId, serviceId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.165" x="778" y="2633.7803">or displayName is empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="778" y="2647.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="778" y="2661.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2881" x="778" y="2675.7803">Create, update, and delete persist the in-flight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.0889" x="778" y="2689.7803">OCI work request in `status.async.current`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2471" x="778" y="2703.7803">normalize PSA `OperationStatus*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3643" x="778" y="2717.7803">shared async classes, and normalize work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1992" x="778" y="2731.7803">`OperationType*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1914" x="778" y="2745.7803">create/update/delete phases before deriving</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.04" x="778" y="2759.7803">conditions and requeue behavior.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.8682" x="778" y="2773.7803">Create prefers the returned</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.585" x="778" y="2787.7803">`PrivateServiceAccess` body when OCI exposes an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6748" x="778" y="2801.7803">identifier and otherwise recovers the OCID from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2266" x="778" y="2815.7803">work-request resources before polling</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9023" x="778" y="2829.7803">`GetPrivateServiceAccess`. Update also gates</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7295" x="778" y="2843.7803">completion on a succeeded work request plus a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="778" y="2857.7803">readable `GetPrivateServiceAccess`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.2959" x="778" y="2871.7803">Only `definedTags`, `freeformTags`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6133" x="778" y="2885.7803">`securityAttributes`, `displayName`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5781" x="778" y="2899.7803">`description`, and `nsgIds` reconcile in place.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7715" x="778" y="2913.7803">`compartmentId`, `subnetId`, `serviceId`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7852" x="778" y="2927.7803">`ipv4Ip` remain replacement-only drift, so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2539" x="778" y="2941.7803">published runtime never exercises provider-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4404" x="778" y="2955.7803">`ChangePrivateServiceAccessCompartment`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1299" x="778" y="2969.7803">Reviewed lifecycle mapping treats `FAILED` and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3027" x="778" y="2983.7803">`NEEDS_ATTENTION` as terminal failure without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5156" x="778" y="2997.7803">requeue, and delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9648" x="778" y="3011.7803">`GetPrivateServiceAccess` or fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4131" x="778" y="3025.7803">`ListPrivateServiceAccesses` confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.792" x="778" y="3039.7803">resource is deleted or not found.</text><?plantuml-src jLdRSXit4dt7Lw2oB_OkAVcQE7HvgnH9ILHHB9Uah5zOvG5dC2JMmy44c27DJUs_xsbSva8DPJdUb1v44K2ZqNtwz05aFwgo4aQikLs9J6zLkUIvAAnajXrPYFJZqkYcp4vreGt_MvxY9-lDo6GkcgB-KPVrMx6M_6TPR6IjKZ4-vqRzH_AdBtg3mXYz3TQVv4-_UzPVMUfQ_d37Xpp_BljsVvOscJHXnkB5o-TFlj-RGTk7yUVFNpnz-R8txiodsfJIyAVVibhLXUGtylT6bgdaKrvPSVpEg8sevOqq6vNAapILrhALoYJFjQuN-bFFderB_s2SYxJMPk1VE6SSsZ-WV2PVvKym36C8fQf4MO-lxqzuY9LU35eRXShbfIg74Vp-XNY-U8LHCbaDXj95zb8-ROVkPETLBlAK_PUvi_5VceL4M6jfMSyFVWf7Z2uAQGPV_o2il9QfBbErF_JDrStLBo7ulufIBANvXWlBXryDbboTNZ3AFDSRv7LeUxAt3ZLWPCQDjBfeQgNBMVZgE5DYYPpQO__tj9ioZMa-ifjbj9390gSzkDeF3rVACdC8PLsm-FIVlHZDk2mnlv5y38JpqiHZiMu