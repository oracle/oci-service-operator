<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1143px" preserveAspectRatio="none" style="width:3659px;height:1143px;background:#FCFCFD;" version="1.1" viewBox="0 0 3659 1143" width="3659px" zoomAndPan="magnify"><title>State Machine - psa/PrivateServiceAccess</title><defs/><g><rect fill="#FCFCFD" height="1143" style="stroke:none;stroke-width:1;" width="3659" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="280.1504" x="1682.5178" y="20.7803">State Machine - psa/PrivateServiceAccess</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="265" y="993"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="265" x2="529.3643" y1="1017" y2="1017"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="370.7271" y="1008.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="270" y="1032.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="270" y="1046.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1326.36" y="836"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1331.36" y="859.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2085.32" y="836"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2090.32" y="859.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1343.88" y="971"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1348.88" y="994.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1353.84" y="1090"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1359.7746" y="1113.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="807.44" y="947"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="812.44" y="970.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1660.56" y="926"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1665.56" y="949.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1693.23" y="765"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1698.23" y="788.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="2428.25" y="1052"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2433.25" y="1075.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3570.47" y="993"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3575.47" y="1016.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="3062.81" y="993"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3067.81" y="1016.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="32" id="ent0002"><ellipse cx="16" cy="1024" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2301.78,49 L2301.78,682.4 L2134.48,835.54 L2301.78,690.4 L2301.78,1009 A8,8 0 0 0 2309.78,1017 L2648.5652,1017 A8,8 0 0 0 2656.5652,1009 L2656.5652,51 L2646.5652,41 L2309.78,41 A8,8 0 0 0 2301.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2646.5652,41 L2646.5652,47 A4,4 0 0 0 2650.5652,51 L2656.5652,51 L2646.5652,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2307.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2307.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2307.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2307.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2307.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2307.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2307.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2307.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2307.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.6963" x="2307.78" y="182.7803">service: psa</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.3994" x="2307.78" y="196.7803">slug: privateserviceaccess</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.8408" x="2307.78" y="210.7803">kind: PrivateServiceAccess</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2307.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2307.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2307.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2307.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2307.78" y="280.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2307.78" y="294.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1162" x="2307.78" y="308.7803">follow-up: create=GetPsaWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.834" x="2307.78" y="322.7803">GetPrivateServiceAccess;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="2307.78" y="336.7803">update=GetPsaWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.834" x="2307.78" y="350.7803">GetPrivateServiceAccess;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="2307.78" y="364.7803">delete=GetPsaWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="333.7852" x="2307.78" y="378.7803">GetPrivateServiceAccess/ListPrivateServiceAccesses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="2307.78" y="392.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="2307.78" y="406.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="2307.78" y="420.7803">displayName, freeformTags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2307.78" y="434.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="2307.78" y="448.7803">compartmentId, ipv4Ip, serviceId, subnetId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2307.78" y="462.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="2307.78" y="476.7803">list lookup: oci_psa_private_service_accesses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1025" x="2307.78" y="490.7803">filters compartmentId, displayName, serviceId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.792" x="2307.78" y="504.7803">id; Adopt only a unique exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4268" x="2307.78" y="518.7803">ListPrivateServiceAccesses match on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="2307.78" y="532.7803">compartmentId plus displayName plus serviceId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0811" x="2307.78" y="546.7803">whose returned subnetId also matches and whose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.71" x="2307.78" y="560.7803">lifecycle is ACTIVE, CREATING, or UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="2307.78" y="574.7803">duplicate matches fail, and pre-create lookup is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0537" x="2307.78" y="588.7803">skipped when compartmentId, subnetId, serviceId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.165" x="2307.78" y="602.7803">or displayName is empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2307.78" y="616.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2307.78" y="630.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2881" x="2307.78" y="644.7803">Create, update, and delete persist the in-flight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.0889" x="2307.78" y="658.7803">OCI work request in `status.async.current`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2471" x="2307.78" y="672.7803">normalize PSA `OperationStatus*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3643" x="2307.78" y="686.7803">shared async classes, and normalize work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1992" x="2307.78" y="700.7803">`OperationType*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1914" x="2307.78" y="714.7803">create/update/delete phases before deriving</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.04" x="2307.78" y="728.7803">conditions and requeue behavior.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.8682" x="2307.78" y="742.7803">Create prefers the returned</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.585" x="2307.78" y="756.7803">`PrivateServiceAccess` body when OCI exposes an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6748" x="2307.78" y="770.7803">identifier and otherwise recovers the OCID from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2266" x="2307.78" y="784.7803">work-request resources before polling</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9023" x="2307.78" y="798.7803">`GetPrivateServiceAccess`. Update also gates</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7295" x="2307.78" y="812.7803">completion on a succeeded work request plus a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="2307.78" y="826.7803">readable `GetPrivateServiceAccess`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.2959" x="2307.78" y="840.7803">Only `definedTags`, `freeformTags`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6133" x="2307.78" y="854.7803">`securityAttributes`, `displayName`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5781" x="2307.78" y="868.7803">`description`, and `nsgIds` reconcile in place.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7715" x="2307.78" y="882.7803">`compartmentId`, `subnetId`, `serviceId`, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.7852" x="2307.78" y="896.7803">`ipv4Ip` remain replacement-only drift, so the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2539" x="2307.78" y="910.7803">published runtime never exercises provider-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4404" x="2307.78" y="924.7803">`ChangePrivateServiceAccessCompartment`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1299" x="2307.78" y="938.7803">Reviewed lifecycle mapping treats `FAILED` and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3027" x="2307.78" y="952.7803">`NEEDS_ATTENTION` as terminal failure without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5156" x="2307.78" y="966.7803">requeue, and delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9648" x="2307.78" y="980.7803">`GetPrivateServiceAccess` or fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4131" x="2307.78" y="994.7803">`ListPrivateServiceAccesses` confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.792" x="2307.78" y="1008.7803">resource is deleted or not found.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="126" id="ent0006"><path d="M2991.57,1076 L2991.57,1090.52 L2530.43,1074.22 L2991.57,1098.52 L2991.57,1126 A8,8 0 0 0 2999.57,1134 L3278.4723,1134 A8,8 0 0 0 3286.4723,1126 L3286.4723,1078 L3276.4723,1068 L2999.57,1068 A8,8 0 0 0 2991.57,1076" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3276.4723,1068 L3276.4723,1074 A4,4 0 0 0 3280.4723,1078 L3286.4723,1078 L3276.4723,1068" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2997.57" y="1083.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9023" x="2997.57" y="1097.7803">delete observe: GetPrivateServiceAccess or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9512" x="2997.57" y="1111.7803">ListPrivateServiceAccesses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="sp