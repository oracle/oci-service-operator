ica" font-size="14" lengthAdjust="spacing" textLength="155.627" x="342.6021" y="1098.7803">service: keymanagement</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.627" x="342.6021" y="1112.7803">slug: replicationstatus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4131" x="342.6021" y="1126.7803">kind: ReplicationStatus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="342.6021" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="342.6021" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="342.6021" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="342.6021" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="342.6021" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="342.6021" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="342.6021" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="342.6021" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="342.6021" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="342.6021" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="342.6021" y="1280.7803">promotion.</text><ellipse cx="305.6021" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="305.6021" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="305.6021" x2="305.6021" y1="65" y2="85"/><polygon fill="#0F172A" points="301.6021,75,305.6021,85,309.6021,75,305.6021,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="305.6021" x2="305.6021" y1="133" y2="153"/><polygon fill="#0F172A" points="301.6021,143,305.6021,153,309.6021,143,305.6021,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="305.6021" x2="305.6021" y1="201" y2="221"/><polygon fill="#0F172A" points="301.6021,211,305.6021,221,309.6021,211,305.6021,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="305.6021" x2="305.6021" y1="269" y2="289"/><polygon fill="#0F172A" points="301.6021,279,305.6021,289,309.6021,279,305.6021,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="154.082" x2="154.082" y1="439" y2="459"/><polygon fill="#0F172A" points="150.082,449,154.082,459,158.082,449,154.082,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="239.9126" x2="154.082" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="154.082" x2="154.082" y1="383" y2="405"/><polygon fill="#0F172A" points="150.082,395,154.082,405,158.082,395,154.082,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="371.2915" x2="457.1221" y1="383" y2="383"/><line s