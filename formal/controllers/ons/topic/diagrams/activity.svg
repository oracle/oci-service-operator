">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2197" x="113.7166" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4883" x="123.7166" y="755.7803">Delete path uses DeleteTopic with required via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2197" x="123.7166" y="769.7803">GetTopic or ListTopic to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="132.7615" y="803"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="142.7615" y="823.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="142.7615" y="837.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="115.6169" y="871"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="125.6169" y="891.7803">Requeue on provisioning, updating, terminating</text><path d="M303.3264,915 L303.3264,1091 L283.3264,1095 L303.3264,1099 L303.3264,1275 A0,0 0 0 0 303.3264,1275 L643.3665,1275 A0,0 0 0 0 643.3665,1275 L643.3665,925 L633.3665,915 L303.3264,915 A0,0 0 0 0 303.3264,915" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M633.3665,915 L633.3665,925 L643.3665,925 L633.3665,915" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="309.3264" y="930.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="309.3264" y="944.