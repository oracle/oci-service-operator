ext fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="204.02" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="298.5918" x="176.52" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="186.52" y="755.7803">Delete path uses DeleteOnsNotificationTopic</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="186.52" y="769.7803">with required via GetOnsNotificationTopic or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9785" x="186.52" y="783.7803">ListOnsNotificationTopic to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="186.52" y="797.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="186.251" y="831"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="196.251" y="851.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="196.251" y="865.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="169.1064" y="899"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="179.1064" y="919.7803">Requeue on provisioning, updating, terminating</text><path d="M356.8159,943 L356.8159,1119 L336.8159,1123 L356.8159,1127 L356.8159,1303 A0,0 0 0 0 356.8159,1303 L696.856,1303 A0,0 0 0 0 696.856,1303 L696.856,953 L686.856,943 L356.8159,943 A0,0 0 0 0 356.8159,943" fill="#FFF7D6" style="stroke:#B