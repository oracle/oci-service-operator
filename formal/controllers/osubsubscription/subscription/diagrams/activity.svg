<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2064px" preserveAspectRatio="none" style="width:732px;height:2064px;background:#FCFCFD;" version="1.1" viewBox="0 0 732 2064" width="732px" zoomAndPan="magnify"><title>Activity - osubsubscription/Subscription</title><defs/><g><rect fill="#FCFCFD" height="2064" style="stroke:none;stroke-width:1;" width="732" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="269.9102" x="229.7927" y="30.7803">Activity - osubsubscription/Subscription</text></g><ellipse cx="340.8696" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="390" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="650.1563" x="25.7207" y="75"/><path d="M147.7891,75 L147.7891,82 L137.7891,92 L25.7207,92" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="28.7207" y="86.7803">Observe and Bind</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="188.4771" y="109"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="198.4771" y="129.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="198.4771" y="143.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="271.3574" x="205.1909" y="177"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3574" x="215.1909" y="197.7803">Read desired Subscription spec, tracked</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6611" x="215.1909" y="211.7803">status, and delete intent</text><polygon fill="#E2E8F0" points="211.4038,245,470.3354,245,482.3354,257,470.3354,269,211.4038,269,199.4038,257,211.4038,245" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.9316" x="211.4038" y="260.7803">"Tracked or explicit OCI identity present?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="177.6177" y="253.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="482.3354" y="253.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="275.2197" x="45.7207" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="255.2197" x="55.7207" y="299.7803">Use the tracked OCI identity for follow-up</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="81.71" x="55.7207" y="313.7803">reconciliation</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.9365" x="340.9404" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="350.9404" y="299.7803">Resolve an existing OCI resource through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5234" x="350.9404" y="313.7803">ListSubscriptions using filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9365" x="350.9404" y="327.7803">compartment_id, plan_number, subscription_id,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2617" x="350.9404" y="341.7803">buyer_email</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="354.9609" y="375"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="364.9609" y="395.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="364.9609" y="409.7803">into status</text><polygon fill="#E2E8F0" points="340.8696,429,352.8696,441,340.8696,453,328.8696,441,340.8696,429" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="278.6934,485,403.0459,485,415.0459,497,403.0459,509,278.6934,509,266.6934,497,278.6934,485" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="278.6934" y="500.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="244.9072" y="493.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="415.0459" y="493.7803">no</text><rect fill="none" height="260" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="312.3438" x="11" y="519"/><path d="M61.4688,519 L61.4688,526 L51.4688,536 L11,536" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="530.7803">Delete</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="284.5986" x="24.8726" y="553"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5986" x="34.8726" y="573.7803">Delete path is not represented by imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0342" x="34.8726" y="587.7803">provider facts</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="283.0127" x="25.6655" y="636"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0127" x="35.6655" y="656.7803">Confirm deletion via ListSubscriptions until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="190.6338" x="35.6655" y="670.7803">OCI reaches LOCAL_DELETE</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="292.3438" x="21" y="719"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3438" x="31" y="739.7803">Allow best-effort completion without finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4824" x="31" y="753.7803">retention</text><ellipse cx="167.1719" cy="825" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="167.1719" cy="825" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="239" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="345.916" x="347.6094" y="519"/><path d="M498.4434,519 L498.4434,526 L488.4434,536 L347.6094,536" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="350.6094" y="530.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="367.6094" y="602"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="377.6094" y="622.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.041" x="377.6094" y="636.7803">OCI reaches ACTIVE</text><ellipse cx="514.5674" cy="696" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="514.5674" cy="696" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="394.0464,553,635.0884,553,647.0884,565,635.0884,577,394.0464,577,382.0464,565,394.0464,553" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="518.5674" y="587.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="394.0464" y="568.7803">"OCI state is outside success targets?"</text><rect fill="none" height="533" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="354.4473" x="343.3438" y="785"/><path d="M509.7637,785 L509.7637,792 L499.7637,802 L343.3438,802" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="346.3438" y="796.7803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="366.4473" y="819"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="376.4473" y="839.7803">Compare live OCI state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="376.4473" y="853.7803">field surface</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="363.3438" y="936"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="373.3438" y="956.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3438" x="373.3438" y="970.7803">fields compartment_id, plan_number,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.3887" x="373.3438" y="984.7803">subscription_id, buyer_email (+5 more)</text><ellipse cx="514.5674" cy="1029" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="514.5674" cy="1029" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="388.9844,887,640.1504,887,652.1504,899,640.1504,911,388.9844,911,376.9844,899,388.9844,887" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="518.5674" y="921.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="388.9844" y="902.7803">"Force-new or conflicting drift detected?"</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="362.9575" y="1082"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="372.9575" y="1102.7803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="375.0024" y="1136"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="385.0024" y="1156.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="385.0024" y="1170.7803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="153.8955" x="437.6196" y="1204"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8955" x="447.6196" y="1224.7803">Requeue on updating</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.1641" x="357.4854" y="1258"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1641" x="367.4854" y="1278.7803">Keep promotion blocked on bind-versus-create,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8203" x="367.4854" y="1292.7803">lifecycle-classification</text><path d="M371.8696,1328 L371.8696,1686 L351.8696,1690 L371.8696,1694 L371.8696,2052 A0,0 0 0 0 371.8696,2052 L720.4956,2052 A0,0 0 0 0 720.4956,2052 L720.4956,1338 L710.4956,1328 L371.8696,1328 A0,0 0 0 0 371.8696,1328" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M710.4956,1328 L710.4956,1338 L720.4956,1338 L710.4956,1328" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="377.8696" y="1343.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="377.8696" y="1357.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="377.8696" y="1371.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="377.8696" y="1385.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="377.8696" y="1399.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="377.8696" y="1413.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="377.8696" y="1427.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="377.8696" y="1441.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="377.8696" y="1455.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="377.8696" y="1469.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="377.8696" y="1483.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="377.8696" y="1497.7803">service: osubsubscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.165" x="377.8696" y="1511.7803">slug: subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5029" x="377.8696" y="1525.7803">kind: Subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="377.8696" y="1539.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="377.8696" y="1553.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.875" x="377.8696" y="1567.7803">requeue: updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="377.8696" y="1581.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="377.8696" y="1595.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="377.8696" y="1609.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="377.8696" y="1623.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9365" x="377.8696" y="1637.7803">compartment_id, plan_number, subscription_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.2236" x="377.8696" y="1651.7803">buyer_email (+5 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="377.8696" y="1665.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2676" x="377.8696" y="1679.7803">list lookup: oci_osubsubscription_subscriptions</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1094" x="377.8696" y="1693.7803">filters compartment_id, plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.4268" x="377.8696" y="1707.7803">subscription_id, buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="377.8696" y="1721.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="377.8696" y="1735.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8203" x="377.8696" y="1749.7803">lifecycle-classification</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.04" x="377.8696" y="1763.7803">OSubscription exposes ListSubscriptions only in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3848" x="377.8696" y="1777.7803">the pinned SDK, so the published runtime is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0059" x="377.8696" y="1791.7803">query-backed and observe-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2402" x="377.8696" y="1805.7803">Reconcile requires compartmentId plus exactly</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4609" x="377.8696" y="1819.7803">one of planNumber, subscriptionId, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3232" x="377.8696" y="1833.7803">buyerEmail. The runtime also passes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4131" x="377.8696" y="1847.7803">isCommitInfoRequired, sort controls,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.626" x="377.8696" y="1861.7803">xOneGatewaySubscriptionId, and xOneOriginRegion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.0469" x="377.8696" y="1875.7803">when those spec fields are populated.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="377.8696" y="1889.7803">SubscriptionSummary does not expose a clean</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5576" x="377.8696" y="1903.7803">top-level OCID or the request filter fields, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9639" x="377.8696" y="1917.7803">the package-local read model echoes the selector</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3506" x="377.8696" y="1931.7803">fields into projected list items and accepts</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5439" x="377.8696" y="1945.7803">only a unique exact match.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8467" x="377.8696" y="1959.7803">No OCI create, update, get, or delete operation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="377.8696" y="1973.7803">is published. Kubernetes delete is local-only,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5986" x="377.8696" y="1987.7803">and the runtime leaves status.status.ocid empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6953" x="377.8696" y="2001.7803">A blank sdkStatus string is treated as retryable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3711" x="377.8696" y="2015.7803">updating. Any non-empty sdkStatus settles</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2266" x="377.8696" y="2029.7803">success while the raw string remains visible on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="47.4619" x="377.8696" y="2043.7803">the CR.</text><ellipse cx="340.8696" cy="1690" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="340.8696" cy="1690" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="340.8696" x2="340.8696