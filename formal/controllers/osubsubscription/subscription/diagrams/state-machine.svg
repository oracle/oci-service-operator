<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="746px" preserveAspectRatio="none" style="width:2506px;height:746px;background:#FCFCFD;" version="1.1" viewBox="0 0 2506 746" width="2506px" zoomAndPan="magnify"><title>State Machine - osubsubscription/Subscription</title><defs/><g><rect fill="#FCFCFD" height="746" style="stroke:none;stroke-width:1;" width="2506" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="313.4756" x="1088.3729" y="20.7803">State Machine - osubsubscription/Subscription</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="232.96" y="429"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="232.96" x2="497.3243" y1="453" y2="453"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="338.6871" y="444.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="237.96" y="468.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="237.96" y="482.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1294.32" y="359"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1299.32" y="382.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2033.27" y="369"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2038.27" y="392.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="45.04" y="375"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="50.04" y="398.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1321.8" y="490"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1327.7346" y="513.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="775.4" y="440"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="780.4" y="463.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1608.52" y="414"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1613.52" y="437.7803">RejectUnsupportedDrift</text><g class="start_entity" data-qualified-name=".start." data-source-line="28" id="ent0002"><ellipse cx="80" cy="460" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="41" id="ent0003"><path d="M2144.74,49 L2144.74,385 L2084.01,389 L2144.74,393 L2144.74,729 A8,8 0 0 0 2152.74,737 L2489.2214,737 A8,8 0 0 0 2497.2214,729 L2497.2214,51 L2487.2214,41 L2152.74,41 A8,8 0 0 0 2144.74,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2487.2214,41 L2487.2214,47 A4,4 0 0 0 2491.2214,51 L2497.2214,51 L2487.2214,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2150.74" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2150.74" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2150.74" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2150.74" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2150.74" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2150.74" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2150.74" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2150.74" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2150.74" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2150.74" y="182.7803">service: osubsubscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.165" x="2150.74" y="196.7803">slug: subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5029" x="2150.74" y="210.7803">kind: Subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2150.74" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="2150.74" y="238.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.875" x="2150.74" y="252.7803">requeue: updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2150.74" y="266.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="2150.74" y="280.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="2150.74" y="294.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2150.74" y="308.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9365" x="2150.74" y="322.7803">compartment_id, plan_number, subscription_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.2236" x="2150.74" y="336.7803">buyer_email (+5 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2150.74" y="350.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2676" x="2150.74" y="364.7803">list lookup: oci_osubsubscription_subscriptions</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1094" x="2150.74" y="378.7803">filters compartment_id, plan_number,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.4268" x="2150.74" y="392.7803">subscription_id, buyer_email</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2150.74" y="406.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="2150.74" y="420.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.8203" x="2150.74" y="434.7803">lifecycle-classification</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.04" x="2150.74" y="448.7803">OSubscription exposes ListSubscriptions only in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3848" x="2150.74" y="462.7803">the pinned SDK, so the published runtime is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0059" x="2150.74" y="476.7803">query-backed and observe-only.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2402" x="2150.74" y="490.7803">Reconcile requires compartmentId plus exactly</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4609" x="2150.74" y="504.7803">one of planNumber, subscriptionId, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3232" x="2150.74" y="518.7803">buyerEmail. The runtime also passes</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4131" x="2150.74" y="532.7803">isCommitInfoRequired, sort controls,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.626" x="2150.74" y="546.7803">xOneGatewaySubscriptionId, and xOneOriginRegion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.0469" x="2150.74" y="560.7803">when those spec fields are populated.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6055" x="2150.74" y="574.7803">SubscriptionSummary does not expose a clean</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="271.5576" x="2150.74" y="588.7803">top-level OCID or the request filter fields, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9639" x="2150.74" y="602.7803">the package-local read model echoes the selector</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3506" x="2150.74" y="616.7803">fields into projected list items and accepts</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5439" x="2150.74" y="630.7803">only a unique exact match.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8467" x="2150.74" y="644.7803">No OCI create, update, get, or delete operation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2744" x="2150.74" y="658.7803">is published. Kubernetes delete is local-only,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5986" x="2150.74" y="672.7803">and the runtime leaves status.status.ocid empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6953" x="2150.74" y="686.7803">A blank sdkStatus string is treated as retryable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3711" x="2150.74" y="700.7803">updating. Any non-empty sdkStatus settles</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2266" x="2150.74" y="714.7803">success while the raw string remains visible on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="47.4619" x="2150.74" y="728.7803">the CR.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="28" id="lnk3"><path d="M90.42,460 C113.26,460 168.01,460 226.49,460" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="232.49,460,223.49,456,227.49,460,223.49,464,232.49,460" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.0273" x="145.96" y="455.7803">reconcile</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="29" id="lnk4"><path d="M497.6,460 C588.51,460 699.25,460 769.1,460" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="775.1,460,766.1,456,770.1,460,766.1,464,775.1,460" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="528.32" y="455.7803">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="30" id="lnk5"><path d="M898.35,457.78 C999.28,453.57 1197.48,443.01 1264.32,423 C1282.19,417.65 1295.4383,411.1957 1310.2283,402.3657" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1315.38,399.29,1305.602,400.4691,1311.0869,401.8531,1309.7029,407.338,1315.38,399.29" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="1054.82" y="404.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="1106.5817" y="418.7803">ACTIVE</text></g><!--link resolve_by_lookup to failed--><g class="link" data-entity-1="ent0007" data-entity-2="ent0006" data-link-type="dependency" data-source-line="31" id="lnk6"><path d="M898.75,467.57 C928.97,471.23 966.05,475.55 999.32,479 C1120.07,491.5 1258.8195,502.9972 1315.4295,507.5672" fill="none" id="resolve_by_lookup-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1321.41,508.05,1312.761,503.3388,1316.4262,507.6477,1312.1173,511.3128,1321.41,508.05" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="1000.32" y="474.7803">unresolved OCI error or non-success state</text></g><!--link observe to evaluate_ready--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="32" id="lnk7"><path d="M497.58,439.89 C507.63,438.52 517.64,437.2 527.32,436 C736.53,410.02 788.94,402.49 999.32,389 C1103.82,382.3 1220.3303,380.1546 1288.0903,379.4246" fill="none" id="observe-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1294.09,379.36,1285.0474,375.4572,1289.0903,379.4139,1285.1336,383.4567,1294.09,379.36" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="772.82" y="386.9803">OCI state in ACTIVE</text></g><!--link observe to failed--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="33" id="lnk8"><path d="M497.66,485.96 C560.02,497 635.72,508.56 704.32,514 C944.4,533.05 1230.6222,517.442 1315.5822,512.022" fill="none" id="observe-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon