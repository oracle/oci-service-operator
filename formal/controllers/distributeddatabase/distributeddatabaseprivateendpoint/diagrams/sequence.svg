Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="810" y="1933.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="810" y="1947.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="810" y="1961.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="810" y="1975.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="810" y="1989.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="810" y="2003.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3232" x="810" y="2017.7803">service: distributeddatabase</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3984" x="810" y="2031.7803">slug: distributeddatabaseprivateendpoint</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1504" x="810" y="2045.7803">kind: DistributedDatabasePrivateEndpoint</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="810" y="2059.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="810" y="2073.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="810" y="2087.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="810" y="2101.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="810" y="2115.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="810" y="2129.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="810" y="2143.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="810" y="2157.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="810" y="2171.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="810" y="2185.7803">displayName, freeformTags (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="810" y="2199.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.8613" x="810" y="2213.7803">compartmentId, subnetId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="810" y="2227.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="810" y="2241.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="403.9629" x="810" y="2255.7803">oci_distributeddatabase_distributed_database_private_endpoints</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3027" x="810" y="2269.7803">filters compartmentId, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5576" x="810" y="2283.7803">lifecycleState; exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.9717" x="810" y="2297.7803">displayName list filters preserve the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0127" x="810" y="2311.7803">service-supported lifecycleState filter, then</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4951" x="810" y="2325.7803">reuse only a unique summary candidate; the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.041" x="810" y="2339.7803">runtime rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8398" x="810" y="2353.7803">GetDistributedDatabasePrivateEndpoint before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3232" x="810" y="2367.7803">binding or status projection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="810" y="2381.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="810" y="2395.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="810" y="2409.7803">Create and delete responses can carry</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9365" x="810" y="2423.7803">`opc-work-request-id` headers, but the published</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.8818" x="810" y="2437.7803">runtime stays lifecycle-classified and uses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2607" x="810" y="2451.7803">those IDs only as shared request breadcrumbs</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5508" x="810" y="2465.7803">instead of polling `GetWorkRequest`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="810" y="2479.7803">`ListDistributedDatabasePrivateEndpoints`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4131" x="810" y="2493.7803">returns summary items that omit `privateIp`, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.123" x="810" y="2507.7803">every successful bind or write path rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1641" x="810" y="2521.7803">`GetDistributedDatabasePrivateEndpoint` before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9854" x="810" y="2535.7803">projecting steady-state status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3848" x="810" y="2549.7803">The package-local update builder preserves</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.1992" x="810" y="2563.7803">explicit clear intent for `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3301" x="810" y="2577.7803">`nsgIds`, `freeformTags`, and `definedTags`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4951" x="810" y="2591.7803">instead of letting generatedruntime drop</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.4893" x="810" y="2605.7803">zero-value clears.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.7715" x="810" y="2619.7803">Delete keeps the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.916" x="810" y="2633.7803">`GetDistributedDatabasePrivateEndpoint` or list</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6406" x="810" y="2647.7803">fallback confirms `DELETED` or NotFound.</text><?plantuml-src hLdlRnit4ltEluBeVKbnNZjkaZQLaGAjxVQCkabXfxWl0Y9gbolnp2NtIAuKjUZ_Ve-_Lhko5EkQ8WWYBRcScJTltWmL-o1Komnhg5soIg-5Mj2QISk9xLVch7nO6Dsfwb9BRUW_wX9_gi6EYjUia-v7hTnRrd3wBovNt8cIxTzpBtxdzFpbO94PezVfzEVr-JTV3TzKsl4V7lbGrzzKN-_kqgRY9ksOltprulctEpky-RJ-uiNByrUl1klX-58RnGqz_veuuIIdz_o_7LSbfmMjX7L6p3l7guevDcUMdrrjdrsbPxyQiMAENwkgrK8viXGLfxNMRgu_3gpPVF0VX59MEcr6tYSKyj9k-Fmh_hf-ZcKS1g15ovJR__vmmp6d313gpv2YvhT2ZV7zzYLxCN-DLNzaEregvzKhVjulFShTwvhL9VcJXDZepzsS0tJ7BHduGI_XYD5ISZDw_0CWlkEbLgNONVhYtVsxd--vMOcI_y8KMt3p1MMMZX-DNdbtUKCyBwXU8UlZiqzstaE565vHmwsMdHDQJTAZiqgm1N9gp-BtOhkbo6a-jQj5Fg7Y4j4UV3ikZz_agWhy9LkmQF7T0AC9vGhxEpvLJtDogaoEacoFy0UE4PZG_lCpuzsnxaiotk9V6kCqeVtXYDGAX7ICJoHmXTvg_O1_6EAT2rKH9Xrr1Wm2Rk0A_zXAv2uaZgAm5AfqGvaqd5KRhCAC9MD_l8VOFQ4_SNU46npYrrliBGXB6s4jvF7GwRSu-kdZxRDQICUDdKnLgHjFnGOcRgeJBo-jP1ile2TJvKkkt9IItpky_cN0mV3EiZbWzS5xZdK6-W7Nm0me30hia7ENmCVn8wANMhUq3Bjf2zBvVd1vT_tz-vktFtqchl0kOBi_YhyrXNk0sCFj5cd0OR6WLyZsY5D2KGleEnkEy_37kgIf47YL67iL7X_oEAuUuVI1z-5kBKoJZQy4cwgZK9WgRQRgI5R6l2SREUzNrxVNdvtt_y-D33LupnImHSNNGZ69WS40U3orWV1pgNrz7fDbmnr3BbDiFgKyg0kUcqraP5hpzOWFK6sgvnOd7siWkhLrbDMeyCUdnXB8PU395hr1FC4PNnJ76Gn2JzTBqLTHWnWjE3jLkLfFw6-_NgLFVIQ3PIbM6GX_50JQmdakguAj