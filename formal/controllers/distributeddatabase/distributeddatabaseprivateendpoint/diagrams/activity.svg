17.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1117.1051,1917.5 L1117.1051,1927.5 L1127.1051,1927.5 L1117.1051,1917.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="708.1422" y="1933.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="708.1422" y="1947.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="708.1422" y="1961.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="708.1422" y="1975.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="708.1422" y="1989.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="708.1422" y="2003.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="708.1422" y="2017.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="708.1422" y="2031.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="708.1422" y="2045.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="708.1422" y="2059.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="708.1422" y="2073.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3232" x="708.1422" y="2087.2803">service: distributeddatabase</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3984" x="708.1422" y="2101.2803">slug: distributeddatabaseprivateendpoint</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1504" x="708.1422" y="2115.2803">kind: DistributedDatabasePrivateEndpoint</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="708.1422" y="2129.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="708.1422" y="2143.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="708.1422" y="2157.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="708.1422" y="2171.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="708.1422" y="2185.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="708.1422" y="2199.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="708.1422" y="2213.2803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="708.1422" y="2227.2803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="708.1422" y="2241.2803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="708.1422" y="2255.2803">displayName, freeformTags (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="708.1422" y="2269.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.8613" x="708.1422" y="2283.2803">compartmentId, subnetId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="708.1422" y="2297.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="708.1422" y="2311.2803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="403.9629" x="708.1422" y="2325.2803">oci_distributeddatabase_distributed_database_private_endpoints</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3027" x="708.1422" y="2339.2803">filters compartmentId, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="250.5576" x="708.1422" y="2353.2803">lifecycleState; exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.9717" x="708.1422" y="2367.2803">displayName list filters preserve the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0127" x="708.1422" y="2381.2803">service-supported lifecycleState filter, then</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4951" x="708.1422" y="2395.2803">reuse only a unique summary candidate; the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.041" x="708.1422" y="2409.2803">runtime rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8398" x="708.1422" y="2423.2803">GetDistributedDatabasePrivateEndpoint before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="167.3232" x="708.1422" y="2437.2803">binding or status projection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="708.1422" y="2451.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="708.1422" y="2465.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="708.1422" y="2479.2803">Create and delete responses can carry</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.9365" x="708.1422" y="2493.2803">`opc-work-request-id` headers, but the published</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.8818" x="708.1422" y="2507.2803">runtime stays lifecycle-classified and uses</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2607" x="708.1422" y="2521.2803">those IDs only as shared request breadcrumbs</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5508" x="708.1422" y="2535.2803">instead of polling `GetWorkRequest`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7988" x="708.1422" y="2549.2803">`ListDistributedDatabasePrivateEndpoints`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4131" x="708.1422" y="2563.2803">returns summary items that omit `privateIp`, so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.123" x="708.1422" y="2577.2803">every successful bind or write path rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1641" x="708.1422" y="2591.2803">`GetDistributedDatabasePrivateEndpoint` before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9854" x="708.1422" y="2605.2803">projecting steady-state status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3848" x="708.1422" y="2619.2803">The package-local update builder preserves</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.1992" x="708.1422" y="2633.2803">explicit clear intent for `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3301" x="708.1422" y="2647.2803">`nsgIds`, `freeformTags`, and `definedTags`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4951" x="708.1422" y="2661.2803">instead of letting generatedruntime drop</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.4893" x="708.1422" y="2675.2803">zero-value clears.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.7715" x="708.1422" y="2689.2803">Delete keeps the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.916" x="708.1422" y="2703.2803">`GetDistributedDatabasePrivateEndpoint` or list</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6406" x="708.1422" y="2717.2803">fallback confirms `DELETED` or NotFound.</text><ellipse cx="671.1422" cy="2321.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="671.1422" cy="2321.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="671.1422" x2="671.1422" y1="157" y2="177"/><polygon fill="#0F172A" points="667.1422,167,671.1422,177,675.1422,167,671.1422,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="829.4725" x2="829.4725" y1="369" y2="389"/><polygon fill="#0F172A" points="825.4725,379,829.4725,389,833.4725,379,829.4725,383" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="829.4725" x2="829.4725" y1="451" y2="471"/><polygon fill="#0F172A" points="825.4725,461,829.4725,471,833.4725,461,829.4725,465" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="529.6764" x2="512.8119" y1="271" y2="271"/><line style="stroke:#0F172A;stroke-width:1;" x1="512.8119" x2="512.8119" y1="271" y2="293"/><polygon fill="#0F172A" points="508.8119,283,512.8119,293,516.8119,283,512.8119,287" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="812.608" x2="829.4725" y1="271" y2="271"/><line style="stroke:#0F172A;stroke-width:1;" x1="829.4725" x2="829.4725" y1="271" y2="293"/><polygon fill="#0F172A" points="825.4725,283,829.4725,293,833.4725,283,829.4725,287" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="512.8119" x2="512.8119" y1="341" y2="537"/><line style="stroke:#0F172A;stroke-width:1;" x1="512.8119" x2="659.1422" y1="537" y2="537"/><polygon fill="#0F172A" points="649.1422,533,659.1422,537,649.1422,541,653.1422,537" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;strok