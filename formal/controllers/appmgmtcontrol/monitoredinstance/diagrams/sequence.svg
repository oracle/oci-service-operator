9;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="813" y="1065.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="813" y="1079.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="813" y="1093.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="813" y="1107.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="813" y="1121.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="813" y="1135.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="813" y="1149.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="813" y="1163.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="813" y="1177.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="813" y="1191.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="813" y="1205.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="813" y="1219.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="813" y="1233.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="813" y="1247.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.5029" x="813" y="1261.7803">service: appmgmtcontrol</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.8613" x="813" y="1275.7803">slug: monitoredinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6406" x="813" y="1289.7803">kind: MonitoredInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="813" y="1303.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="813" y="1317.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="813" y="1331.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="813" y="1345.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="813" y="1359.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="813" y="1373.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="813" y="1387.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1504" x="813" y="1401.7803">compartment_id, display_name, instance_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="813" y="1415.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="813" y="1429.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3711" x="813" y="1443.7803">oci_appmgmtcontrol_monitored_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="813" y="1457.7803">compartment_id, display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="813" y="1471.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="813" y="1485.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.709" x="813" y="1499.7803">The published MonitoredInstance contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.502" x="813" y="1513.7803">bind-existing and observe-only. Reconcile binds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.123" x="813" y="1527.7803">by explicit instanceId or a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7021" x="813" y="1541.7803">ListMonitoredInstances match on compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="813" y="1555.7803">plus displayName, and it never invents create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.2402" x="813" y="1569.7803">update, or delete operations.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.1992" x="813" y="1583.7803">Direct binds are explicit. The runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5088" x="813" y="1597.7803">preflights GetMonitoredInstance when instanceId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2402" x="813" y="1611.7803">is set so a missing direct bind does not fall</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="127.6338" x="813" y="1625.7803">back to list adoption.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4268" x="813" y="1639.7803">ListMonitoredInstances returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8125" x="813" y="1653.7803">MonitoredInstanceSummary rather than the full</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0537" x="813" y="1667.7803">body, so the runtime reruns GetMonitoredInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5576" x="813" y="1681.7803">after a list bind to project timeCreated,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0195" x="813" y="1695.7803">timeUpdated, and lifecycleDetails from the full</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="41.248" x="813" y="1709.7803">object.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="813" y="1723.7803">Delete is CR-local unbind only. The controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1025" x="813" y="1737.7803">clears the finalizer immediately, never calls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0332" x="813" y="1751.7803">auxiliary monitoring or workrequest helpers, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5576" x="813" y="1765.7803">treats observed DELETING or DELETED lifecycle as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2744" x="813" y="1779.7803">terminating read state rather than managed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3926" x="813" y="1793.7803">delete progress.</text><?plantuml-src fLTTRzis57tdhxZONZh0JfgrwOU73TYIRWkQjaFJlGK8Q8cokLAaHb9slM7_VUTIb2n_fCjGv26oIDwFS-uzl0eVjMsabpM5fIpTMji5LT849SAmCfV5nuLthIqld76UlguA_9MZ7QMgP6lYpyx6jx9MzAioAnLr8O_lkT5_AJfxEbgKthjrjlwuEdl-xVYaTL7zT113LJqld-tlShvKFk-OFpr_ylZbtWvsdzUVF7bwTdu-Ma_c2-UjydJsJ4GTZQ8RzMUhRA5eIh9fwaKT2vZmpfo-SLP7vrLvPKEKs2AMkbHKEHVdxjF8RkXD_2s8P84pEt7cVFkb_KJLj-f5zHZBC0P8TIDjF7v-lE4XLaPO33QChjIrjhj8ldmgdynVO9LDDZjBnRmyLsV3qW5BBofP5U8VaNAZr-rS0TweWXZ5GHSTeaRvdTS_oQ3UAy1TwFsbhzxTl7jze_nA5-gDj7AX_5Sa0-s-sZdoxk9AS0MGMu7VNTkJlNFe1V1ANWLdsgYTdULNfwMM2t0QJhlVq-sMQK_pILWjUWkbCiZstjFTykv9PSjKgM8B5ar_664q8sMnlrLqK868EASajllvz6wwCngU7tds7U8tOdSB7ze5PROrZhI2vlGEMo2L0Lqxzn7_95APQriAQI95Z-B06PI1-jGOq98u8VICHQjjI1glPBd1gWunY5tl70zsp-WN5G-zAWZMu60mg0FLEWH8sdt6hk7fm5fuL6aJbG-pMrkucckeXiKxNKwerA4nSdDdeNBV75Wz0dG3Et3IbT8AqUsah2t1Psm3ivvGwYg2CYkgp81UfjVtfM6TlNSDeLJQrxtXbPQtzXY6uENM7iT36EUQta23IFcIk7nr_Uh3rTjV_WzFd_F103m0ppbGcQggSdx0YZd20rgGt3p0151ZQwae66w6M74rU1NzHiwDUeYdH06QRBtaYcSxNjLIsm3MRkt5-rS_SleJ-lsto_mqG98y6xrIsJMRGhy4ghGovLIkqVotjlIwYgHMq