<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="732px" preserveAspectRatio="none" style="width:2417px;height:732px;background:#FCFCFD;" version="1.1" viewBox="0 0 2417 732" width="2417px" zoomAndPan="magnify"><title>State Machine - appmgmtcontrol/MonitoredInstance</title><defs/><g><rect fill="#FCFCFD" height="732" style="stroke:none;stroke-width:1;" width="2417" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="345.3652" x="1027.9481" y="20.7803">State Machine - appmgmtcontrol/MonitoredInstance</text></g><g class="entity" data-qualified-name="observe" id="ent0002"><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="144" y="509"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="144" x2="408.3643" y1="533" y2="533"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="249.7271" y="524.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="149" y="548.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="149" y="562.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1205.36" y="352"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1210.36" y="375.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1944.32" y="362"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1949.32" y="385.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1222.88" y="479"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1227.88" y="502.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1232.84" y="614"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1238.7746" y="637.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="686.44" y="463"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="691.44" y="486.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1519.56" y="407"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1524.56" y="430.7803">RejectUnsupportedDrift</text><g class="start_entity" data-qualified-name=".start." data-source-line="28" id="ent0002"><ellipse cx="16" cy="540" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="43" id="ent0003"><path d="M2055.78,49 L2055.78,378 L1995.05,382 L2055.78,386 L2055.78,715 A8,8 0 0 0 2063.78,723 L2400.2614,723 A8,8 0 0 0 2408.2614,715 L2408.2614,51 L2398.2614,41 L2063.78,41 A8,8 0 0 0 2055.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2398.2614,41 L2398.2614,47 A4,4 0 0 0 2402.2614,51 L2408.2614,51 L2398.2614,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2061.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2061.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2061.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2061.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2061.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2061.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2061.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2061.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2061.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.5029" x="2061.78" y="182.7803">service: appmgmtcontrol</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.8613" x="2061.78" y="196.7803">slug: monitoredinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6406" x="2061.78" y="210.7803">kind: MonitoredInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2061.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="2061.78" y="238.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2061.78" y="252.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2061.78" y="266.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2061.78" y="280.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="2061.78" y="294.7803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2061.78" y="308.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1504" x="2061.78" y="322.7803">compartment_id, display_name, instance_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2061.78" y="336.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="2061.78" y="350.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3711" x="2061.78" y="364.7803">oci_appmgmtcontrol_monitored_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="2061.78" y="378.7803">compartment_id, display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2061.78" y="392.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2061.78" y="406.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.709" x="2061.78" y="420.7803">The published MonitoredInstance contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.502" x="2061.78" y="434.7803">bind-existing and observe-only. Reconcile binds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.123" x="2061.78" y="448.7803">by explicit instanceId or a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7021" x="2061.78" y="462.7803">ListMonitoredInstances match on compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="2061.78" y="476.7803">plus displayName, and it never invents create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.2402" x="2061.78" y="490.7803">update, or delete operations.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.1992" x="2061.78" y="504.7803">Direct binds are explicit. The runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5088" x="2061.78" y="518.7803">preflights GetMonitoredInstance when instanceId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2402" x="2061.78" y="532.7803">is set so a missing direct bind does not fall</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="127.6338" x="2061.78" y="546.7803">back to list adoption.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4268" x="2061.78" y="560.7803">ListMonitoredInstances returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8125" x="2061.78" y="574.7803">MonitoredInstanceSummary rather than the full</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0537" x="2061.78" y="588.7803">body, so the runtime reruns GetMonitoredInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5576" x="2061.78" y="602.7803">after a list bind to project timeCreated,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0195" x="2061.78" y="616.7803">timeUpdated, and lifecycleDetails from the full</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="41.248" x="2061.78" y="630.7803">object.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="2061.78" y="644.7803">Delete is CR-local unbind only. The controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1025" x="2061.78" y="658.7803">clears the finalizer immediately, never calls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0332" x="2061.78" y="672.7803">auxiliary monitoring or workrequest helpers, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5576" x="2061.78" y="686.7803">treats observed DELETING or DELETED lifecycle as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2744" x="2061.78" y="700.7803">terminating read state rather than managed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3926" x="2061.78" y="714.7803">delete progress.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="28" id="lnk3"><path d="M26.5,540 C46.42,540 88.8,540 137.64,540" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="143.64,540,134.64,536,138.64,540,134.64,544,143.64,540" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.0273" x="57" y="535.7803">reconcile</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="29" id="lnk4"><path d="M408.64,524.05 C499.55,513.01 610.3337,499.5731 680.1837,491.0931" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="686.14,490.37,676.7235,487.4838,681.1764,490.9726,677.6877,495.4255,686.14,490.37" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="439.36" y="498.8403">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="30" id="lnk5"><path d="M809.78,470.27 C840,464.03 877.08,456.48 910.36,450 C1027.93,427.12 1059.69,432.07 1175.36,401 C1185.08,398.39 1189.6138,397.1043 1199.3938,393.7543" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1205.07,391.81,1195.2594,390.9423,1200.3398,393.4303,1197.8519,398.5106,1205.07,391.81" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="965.86" y="382.7803">lookup or create reaches</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="122.9102" x="981.4494" y="396.7803">ACTIVE, INACTIVE</text></g><!--link resolve_by_lookup to retryable--><g class="link" data-entity-1="ent0007" data-entity-2="ent0005" data-link-type="dependency" data-source-line="31" id="lnk6"><path d="M809.63,484.91 C917.21,488.3 1131.803,495.0612 1216.593,497.7312" fill="none" id="resolve_by_lookup-to-retryable" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1222.59,497.92,1213.7204,493.6387,1217.5925,497.7626,1213.4686,501.6348,1222.59,497.92" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0342" x="965.86" y="469.9603">OCI state in CREATING,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.1309" x="967.8117" y="483.9603">UPDATING, DELETING</text></g><!--link resolve_by_lookup to failed--><g class="link" data-entity-1="ent0007" data-entity-2="ent0006" data-link-type="dependency" data-source-line="32" id="lnk7"><path d="M809.63,501.06 C921.69,534.37 1150.6088,602.4203 1226.6988,625.0403" fill="none" id="resolve_by_lookup-to-failed" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1232.45,626.75,1224.9629,620.3512,1227.6573,625.3252,1222.6833,628.0196,1232.45,626.75" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.7783" x="911.36" y="527.6203">unresolved OCI error or non-success state</text></g><!--link observe to evaluate_ready--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="33" id="lnk8"><path d="M353.96,508.64 C380.45,498.43 410.47,487.55 438.36,479 C644.5,415.82 696.22,392.06 910.36,367 C1014.33,354.83 1131.0497,361.0341 1198.9897,366.5541" fill="none" id="observe-to-evaluate_ready" style="stro