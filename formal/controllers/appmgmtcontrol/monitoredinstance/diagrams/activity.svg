<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2148px" preserveAspectRatio="none" style="width:756px;height:2148px;background:#FCFCFD;" version="1.1" viewBox="0 0 756 2148" width="756px" zoomAndPan="magnify"><title>Activity - appmgmtcontrol/MonitoredInstance</title><defs/><g><rect fill="#FCFCFD" height="2148" style="stroke:none;stroke-width:1;" width="756" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="301.7998" x="225.7334" y="30.7803">Activity - appmgmtcontrol/MonitoredInstance</text></g><ellipse cx="357.4143" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="376" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="597.5308" x="74.7971" y="75"/><path d="M196.8655,75 L196.8655,82 L186.8655,92 L74.7971,92" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="77.7971" y="86.7803">Observe and Bind</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="205.0217" y="109"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="215.0217" y="129.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="215.0217" y="143.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="309.4951" x="202.6667" y="177"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4951" x="212.6667" y="197.7803">Read desired MonitoredInstance spec, tracked</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6611" x="212.6667" y="211.7803">status, and delete intent</text><polygon fill="#E2E8F0" points="227.9485,245,486.8801,245,498.8801,257,486.8801,269,227.9485,269,215.9485,257,227.9485,245" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.9316" x="227.9485" y="260.7803">"Tracked or explicit OCI identity present?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="194.1624" y="253.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="498.8801" y="253.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="222.3027" x="94.7971" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="202.3027" x="104.7971" y="299.7803">Get the current OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="137.7441" x="104.7971" y="313.7803">GetMonitoredInstance</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.9092" x="368.9255" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="378.9255" y="299.7803">Resolve an existing OCI resource through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.6611" x="378.9255" y="313.7803">ListMonitoredInstances using filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="378.9255" y="327.7803">compartment_id, display_name</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="365.4324" y="361"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="375.4324" y="381.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="375.4324" y="395.7803">into status</text><polygon fill="#E2E8F0" points="357.4143,415,369.4143,427,357.4143,439,345.4143,427,357.4143,415" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="295.238,471,419.5906,471,431.5906,483,419.5906,495,295.238,495,283.238,483,295.238,471" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="295.238" y="486.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="261.4519" y="479.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="431.5906" y="479.7803">no</text><rect fill="none" height="276" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="321.6953" x="11" y="505"/><path d="M61.4688,505 L61.4688,512 L51.4688,522 L11,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="516.7803">Delete</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="284.5986" x="29.5483" y="539"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5986" x="39.5483" y="559.7803">Delete path is not represented by imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.0342" x="39.5483" y="573.7803">provider facts</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="301.6953" x="21" y="622"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6953" x="31" y="642.7803">Confirm deletion via GetMonitoredInstance or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="31" y="656.7803">ListMonitoredInstances until OCI reaches</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.4619" x="31" y="670.7803">DELETED, NOT_FOUND</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="292.3438" x="25.6758" y="713"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3438" x="35.6758" y="733.7803">Allow best-effort completion without finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="54.4824" x="35.6758" y="747.7803">retention</text><ellipse cx="171.8477" cy="827" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="171.8477" cy="827" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="422.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="392.5713" x="352.6953" y="505"/><path d="M503.5293,505 L503.5293,512 L493.5293,522 L352.6953,522" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="355.6953" y="516.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="340.5713" x="372.6953" y="588"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5713" x="382.6953" y="608.7803">Request requeue while OCI remains in CREATING,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.1309" x="382.6953" y="622.7803">UPDATING, DELETING</text><ellipse cx="542.981" cy="682" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="542.981" cy="682" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="456.6978,539,629.2642,539,641.2642,551,629.2642,563,456.6978,563,444.6978,551,456.6978,539" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="546.981" y="573.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.5664" x="456.6978" y="554.7803">"OCI state in retryable set?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="396.0229" y="802"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="406.0229" y="822.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.3857" x="406.0229" y="836.7803">OCI reaches ACTIVE, INACTIVE</text><ellipse cx="542.981" cy="882.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="542.981" cy="882.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="422.46,753,663.502,753,675.502,765,663.502,777,422.46,777,410.46,765,422.46,753" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="546.981" y="787.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="422.46" y="768.7803">"OCI state is outside success targets?"</text><rect fill="none" height="479" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="354.4473" x="371.7573" y="937.5"/><path d="M538.1772,937.5 L538.1772,944.5 L528.1772,954.5 L371.7573,954.5" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="374.7573" y="949.2803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="296.2402" x="394.8608" y="971.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="404.8608" y="992.2803">Compare live OCI state against the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="404.8608" y="1006.2803">field surface</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="391.7573" y="1088.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="401.7573" y="1109.2803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.0059" x="401.7573" y="1123.2803">fields compartment_id, display_name,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.8271" x="401.7573" y="1137.2803">instance_id</text><ellipse cx="542.981" cy="1181.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="542.981" cy="1181.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="417.3979,1039.5,668.564,1039.5,680.564,1051.5,668.564,1063.5,417.3979,1063.5,405.3979,1051.5,417.3979,1039.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="546.981" y="1074.2803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="417.3979" y="1055.2803">"Force-new or conflicting drift detected?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8613" x="399.5503" y="1234.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8613" x="409.5503" y="1255.2803">Return success for the ACTIVE, INACTIVE</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="84.8135" x="409.5503" y="1269.2803">success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="403.416" y="1302.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="413.416" y="1323.2803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="413.416" y="1337.2803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="386.2715" y="1370.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="396.2715" y="1391.2803">Requeue on provisioning, updating, terminating</text><path d="M388.4143,1426.5 L388.4143,1777.5 L368.4143,1781.5 L388.4143,1785.5 L388.4143,2136.5 A0,0 0 0 0 388.4143,2136.5 L736.9719,2136.5 A0,0 0 0 0 736.9719,2136.5 L736.9719,1436.5 L726.9719,1426.5 L388.4143,1426.5 A0,0 0 0 0 388.4143,1426.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M726.9719,1426.5 L726.9719,1436.5 L736.9719,1436.5 L726.9719,1426.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="394.4143" y="1442.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="394.4143" y="1456.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="394.4143" y="1470.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="394.4143" y="1484.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="394.4143" y="1498.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="394.4143" y="1512.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="394.4143" y="1526.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="394.4143" y="1540.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="394.4143" y="1554.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="394.4143" y="1568.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="394.4143" y="1582.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="152.5029" x="394.4143" y="1596.2803">service: appmgmtcontrol</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="147.8613" x="394.4143" y="1610.2803">slug: monitoredinstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6406" x="394.4143" y="1624.2803">kind: MonitoredInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="394.4143" y="1638.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="394.4143" y="1652.2803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="394.4143" y="1666.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="394.4143" y="1680.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="394.4143" y="1694.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.4199" x="394.4143" y="1708.2803">supported drift: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="394.4143" y="1722.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1504" x="394.4143" y="1736.2803">compartment_id, display_name, instance_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="394.4143" y="1750.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="394.4143" y="1764.2803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3711" x="394.4143" y="1778.2803">oci_appmgmtcontrol_monitored_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="194.5439" x="394.4143" y="1792.2803">compartment_id, display_name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="394.4143" y="1806.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="394.4143" y="1820.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.709" x="394.4143" y="1834.2803">The published MonitoredInstance contract is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.502" x="394.4143" y="1848.2803">bind-existing and observe-only. Reconcile binds</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="203.123" x="394.4143" y="1862.2803">by explicit instanceId or a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7021" x="394.4143" y="1876.2803">ListMonitoredInstances match on compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="394.4143" y="1890.2803">plus displayName, and it never invents create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.2402" x="394.4143" y="1904.2803">update, or delete operations.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="227.1992" x="394.4143" y="1918.2803">Direct binds are explicit. The runtime</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.5088" x="394.4143" y="1932.2803">preflights GetMonitoredInstance when instanceId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2402" x="394.4143" y="1946.2803">is set so a missing direct bind does not fall</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="127.6338" x="394.4143" y="1960.2803">back to list adoption.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4268" x="394.4143" y="1974.2803">ListMonitoredInstances returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8125" x="394.4143" y="1988.2803">MonitoredInstanceSummary rather than the full</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0537" x="394.4143" y="2002.2803">body, so the runtime reruns GetMonitoredInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5576" x="394.4143" y="2016.2803">after a list bind to project timeCreated,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0195" x="394.4143" y="2030.2803">timeUpdated, and lifecycleDetails from the full</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="41.248" x="394.4143" y="2044.2803">object.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9092" x="394.4143" y="2058.2803">Delete is CR-local unbind only. The controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1025" x="394.4143" y="2072.2803">clears the finalizer immediately, never calls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0332" x="394.4143" y="2086.2803">auxiliary monitoring or workrequest helpers, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="327.5576" x="394.4143" y="2100.2803">treats observed DELETING or DELETED lifecycle as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2744" x="394.4143" y="2114.2803">terminating read state rather than managed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.3926" x="394.4143" y="2128.2803">delete progress.</text><ellipse cx="357.4143" cy="1781.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="357.4143" cy="1781.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="357.4143" x2="357.4143" y1="157" y2="177"/><polygon fill="#0F172A" points="353.4143,167,357.4143,177,361.4143,167,357.4143,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="508.8801" x2="508.8801" y1="341" y2="361"/><polygon fill="#0F172A" points="504.8801,351,508.8801,361,512.8801,351,508.8801,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="215.9485" x2="205.9485" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="205.9485" x2="205.9485" y1="257" y2="279"/><polygon fill="#0F172A" points="201.9485,269,205.9485,279,209.9485,269,205.9485,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="498.8801" x2="508.8801" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="508.8801" x2="508.8801" y1="257" y2="279"/><polygon fill="#0F172A" points="504.8801,269,508.8801,279,512.8801,269,508.8801,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="205.9485" x2="205.9485" y1="327" y2="427"/><line style="stroke:#0F172A;stroke-width:1;" x1="205.9485" x2="345.4143" y1="427" y2="427"/><polygon fill="#0F172A" points="335.4143,423,345.4143,427,335.4143,431,339.4143,427" style="stroke:#0