cing" textLength="156.4063" x="770" y="2101.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="770" y="2115.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="770" y="2129.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="770" y="2143.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="770" y="2157.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="770" y="2171.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.5537" x="770" y="2185.7803">GetPrivilegedApiControl; update=GetWorkRequest</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.0234" x="770" y="2199.7803">-&gt; GetPrivilegedApiControl;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.4199" x="770" y="2213.7803">delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9229" x="770" y="2227.7803">GetPrivilegedApiControl/ListPrivilegedApiControls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="770" y="2241.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.792" x="770" y="2255.7803">supported drift: approverGroupIdList,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.2021" x="770" y="2269.7803">definedTags, description, displayName (+6 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="770" y="2283.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="770" y="2297.7803">compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="770" y="2311.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="770" y="2325.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9434" x="770" y="2339.7803">oci_apiaccesscontrol_privileged_api_controls</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3027" x="770" y="2353.7803">filters compartmentId, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1641" x="770" y="2367.7803">resourceType, id; Adopt only a unique exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3643" x="770" y="2381.7803">ListPrivilegedApiControls match on compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6816" x="770" y="2395.7803">plus displayName plus resourceType in ACTIVE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.0889" x="770" y="2409.7803">CREATING, or UPDATING; duplicate matches fail,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7295" x="770" y="2423.7803">and pre-create lookup is skipped when any of</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.0957" x="770" y="2437.7803">those identity fields are empty.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="770" y="2451.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="770" y="2465.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2881" x="770" y="2479.7803">Create, update, and delete persist the in-flight</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.0889" x="770" y="2493.7803">OCI work request in `status.async.current`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.0127" x="770" y="2507.7803">normalize API Access Control `OperationStatus*`</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="300.3779" x="770" y="2521.7803">values into shared async classes, and normalize</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0059" x="770" y="2535.7803">work-request `OperationType*` values into</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1914" x="770" y="2549.7803">create/update/delete phases before deriving</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.04" x="770" y="2563.7803">conditions and requeue behavior.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.8682" x="770" y="2577.7803">Create prefers the returned</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0469" x="770" y="2591.7803">`PrivilegedApiControl` body when OCI exposes an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6748" x="770" y="2605.7803">identifier and otherwise recovers the OCID from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2266" x="770" y="2619.7803">work-request resources before polling</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3643" x="770" y="2633.7803">`GetPrivilegedApiControl`. Update also gates</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7295" x="770" y="2647.7803">completion on a succeeded work request plus a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.999" x="770" y="2661.7803">readable `GetPrivilegedApiControl`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="211.6201" x="770" y="2675.7803">Only `displayName`, `description`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7852" x="770" y="2689.7803">`notificationTopicId`, `approverGroupIdList`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="177.3789" x="770" y="2703.7803">`resourceType`, `resources`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5645" x="770" y="2717.7803">`privilegedOperationList`, `numberOfApprovers`,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.6816" x="770" y="2731.7803">`freeformTags`, and `definedTags` reconcile in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9023" x="770" y="2745.7803">place. `compartmentId` remains replacement-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.585" x="770" y="2759.7803">drift, so the published runtime never exercises</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.9238" x="770" y="2773.7803">provider-only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9023" x="770" y="2787.7803">`ChangePrivilegedApiControlCompartment`.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1299" x="770" y="2801.7803">Reviewed lifecycle mapping treats `FAILED` and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3027" x="770" y="2815.7803">`NEEDS_ATTENTION` as terminal failure without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5156" x="770" y="2829.7803">requeue, and delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4268" x="770" y="2843.7803">`GetPrivilegedApiControl` or fallback</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.0889" x="770" y="2857.7803">`ListPrivilegedApiControls` confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.792" x="770" y="2871.7803">resource is deleted or not found.</text><?plantuml-src hLbRS-Es5Nx7hpYJlkocahtENhAHnvrHR6VhYMlls4xxufabH88IQefW0L2oskb_xpcuy2AJiNVJoKCi0ZZNxtpd06iUP5bnpTTWLZnJMrak8UU54SmqAmkUFYorgiliL1LAmv_o5F_BEZioaVEwiB-eqbxnjO2_Yc8Zh4pvy9vR-My1H-ywYrnhjGtIt-H7F_xGFLagAtv-OaEU_vXzsD-bT2PqsB5uz_xjcv_sTf3wiFxsxRkZz-yxwqvygdGfD1nzO5RQGi2j-5SjobJ057WbUPeAOr8KebLn-5dBZIp4KcJpIfxwZsmbCm6vKdQX7Zl2JPJp7mR0KwjqpzZWT5pQzrRy83xcRt0PXM5SPSLBEto-k-4bKZe1QMGKCXUNiko7ywTt_EtY8wwIoAgtb2woz-AeMNgIgeyvprFsN-PyWr_hXS0OMs5Onmu8yIk4xdt-cHjn8p3YgTnV-kxwzlhNMw4tCXL_uoLV2