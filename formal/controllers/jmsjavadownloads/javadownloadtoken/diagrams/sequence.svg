="2101.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="834" y="2115.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="834" y="2129.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="834" y="2143.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="834" y="2157.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="834" y="2171.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="834" y="2185.7803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="336.1846" x="834" y="2199.7803">GetJavaDownloadToken; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.5088" x="834" y="2213.7803">GetJavaDownloadToken; delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7295" x="834" y="2227.7803">GetJavaDownloadToken/ListJavaDownloadTokens</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="834" y="2241.7803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="834" y="2255.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="834" y="2269.7803">displayName, freeformTags (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="834" y="2283.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="834" y="2297.7803">compartmentId, javaVersion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="834" y="2311.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="834" y="2325.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.3018" x="834" y="2339.7803">oci_jmsjavadownloads_java_download_tokens</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3301" x="834" y="2353.7803">filters compartmentId, displayName, id; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4883" x="834" y="2367.7803">compartmentId plus displayName unique match in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="347.7578" x="834" y="2381.7803">ACTIVE, CREATING, or UPDATING; duplicate matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="17.8965" x="834" y="2395.7803">fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="834" y="2409.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="834" y="2423.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.6123" x="834" y="2437.7803">Create returns a JavaDownloadToken body plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3848" x="834" y="2451.7803">opc-work-request-id, while update and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2539" x="834" y="2465.7803">return work-request headers only. The reviewed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3574" x="834" y="2479.7803">runtime resumes all three phases through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.999" x="834" y="2493.7803">GetWorkRequest before rereading</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1992" x="834" y="2507.7803">GetJavaDownloadToken.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="834" y="2521.7803">The token value authorizes downloads and is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="834" y="2535.7803">intentionally excluded from published status,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6396" x="834" y="2549.7803">generated docs, and generic bind/parity matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0264" x="834" y="2563.7803">in this story. No Kubernetes Secret side effects</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9238" x="834" y="2577.7803">are emitted.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1436" x="834" y="2591.7803">Pre-create reuse stays bounded to exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.9502" x="834" y="2605.7803">compartmentId plus displayName matching and does</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2881" x="834" y="2619.7803">not use the sensitive value filter even though</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8955" x="834" y="2633.7803">ListJavaDownloadTokens supports it.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6055" x="834" y="2647.7803">Delete keeps the finalizer until the delete work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1641" x="834" y="2661.7803">request is terminal and GetJavaDownloadToken or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0264" x="834" y="2675.7803">fallback ListJavaDownloadTokens confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.1719" x="834" y="2689.7803">token is gone.</text><?plantuml-src jLXRRnit5dxdho2wBmdMikCwQLC5NY2rlMsstgImtUR5G43DS2J6r71ASgHeY_xt_GulenbT4Xb1uGThXkIvVkSxX-CULDq8A-RSpKHfbggUyafe9vdhLYQYU9XQqzRbXT76ydzK1VxAtevILgBL_j-czc_5NFAVfLv8hmgnUy-j-f_afyzxYy9QiqpIdrMdtt_RFraRBt_Sig6glY-_sznbR2bjsZ5v_kBisGyREqXzMZyxUtxwuaLlFOWlZAsbvQVVCQ-yblnM_j7Akf1yn3_EtKUne2ZLseZIdVm7JvVfwSuyo9hDL2bvPOoVc4yzoIuB-PDnBWflxC3Iv75UsdHLVYjVLi-m3648gcf4xNUVxsyuH4el6fqChIfvhUfXB7zuBiucBx5A8fl1KZ4fNyZJRcahJoyhKHNiBnPyux-q4ua0U-bOpmv-0KEiqLhQmUiVXPCtiZ1reJQNldbt--wNMsaNgf3_5RMOIliD5uuFNmsElBjummW3t2oGuQ7ieurpg0OhIswbCxhrojJZzEgaL6AAdBgJ-3nQRndbD1-xnJHBAAM6jtjFn-NXILcN0Qji7Im--bSlHcCkQ-nl9Tz282nEBh7rVZezT7VCkzzFBEbs_YaRRg53mw2CryBXbbFatdO911ZmQsCUy4_0bOcgIoQqvzu273W36CXFZKPQGauuQgP6iQsuq5QASeLLvRnZG-ra3tQF-K_IRskLeAnEGITGEJvNpe7KzWcxXgOjQUv9fRINretlwyBC2KDpI7nJ7l5IkKQB5R7S4VGy3OvPsJenGLJ86y93Qr7hK8uiWWrG3