"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="862.2446" y="1928.2803">Requeue on provisioning, updating, terminating</text><path d="M705.3491,1963.5 L705.3491,2363.5 L685.3491,2367.5 L705.3491,2371.5 L705.3491,2771.5 A0,0 0 0 0 705.3491,2771.5 L1074.1069,2771.5 A0,0 0 0 0 1074.1069,2771.5 L1074.1069,1973.5 L1064.1069,1963.5 L705.3491,1963.5 A0,0 0 0 0 705.3491,1963.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1064.1069,1963.5 L1064.1069,1973.5 L1074.1069,1973.5 L1064.1069,1963.5" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="711.3491" y="1979.2803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="711.3491" y="1993.2803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="711.3491" y="2007.2803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="711.3491" y="2021.2803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="711.3491" y="2035.2803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="711.3491" y="2049.2803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="711.3491" y="2063.2803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="711.3491" y="2077.2803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="711.3491" y="2091.2803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="711.3491" y="2105.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="711.3491" y="2119.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5166" x="711.3491" y="2133.2803">service: jmsjavadownloads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.3301" x="711.3491" y="2147.2803">slug: javadownloadtoken</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="711.3491" y="2161.2803">kind: JavaDownloadToken</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="711.3491" y="2175.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="711.3491" y="2189.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="711.3491" y="2203.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="711.3491" y="2217.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="711.3491" y="2231.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="711.3491" y="2245.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9922" x="711.3491" y="2259.2803">follow-up: create=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="336.1846" x="711.3491" y="2273.2803">GetJavaDownloadToken; update=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.5088" x="711.3491" y="2287.2803">GetJavaDownloadToken; delete=GetWorkRequest -&gt;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7295" x="711.3491" y="2301.2803">GetJavaDownloadToken/ListJavaDownloadTokens</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7031" x="711.3491" y="2315.2803">confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="711.3491" y="2329.2803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9131" x="711.3491" y="2343.2803">displayName, freeformTags (+3 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="711.3491" y="2357.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="711.3491" y="2371.2803">compartmentId, javaVersion</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="711.3491" y="2385.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="711.3491" y="2399.2803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.3018" x="711.3491" y="2413.2803">oci_jmsjavadownloads_java_download_tokens</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3301" x="711.3491" y="2427.2803">filters compartmentId, displayName, id; exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4883" x="711.3491" y="2441.2803">compartmentId plus displayName unique match in</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="347.7578" x="711.3491" y="2455.2803">ACTIVE, CREATING, or UPDATING; duplicate matches</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="17.8965" x="711.3491" y="2469.2803">fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="711.3491" y="2483.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="711.3491" y="2497.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.6123" x="711.3491" y="2511.2803">Create returns a JavaDownloadToken body plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3848" x="711.3491" y="2525.2803">opc-work-request-id, while update and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2539" x="711.3491" y="2539.2803">return work-request headers only. The reviewed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3574" x="711.3491" y="2553.2803">runtime resumes all three phases through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.999" x="711.3491" y="2567.2803">GetWorkRequest before rereading</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1992" x="711.3491" y="2581.2803">GetJavaDownloadToken.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="711.3491" y="2595.2803">The token value authorizes downloads and is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7158" x="711.3491" y="2609.2803">intentionally excluded from published status,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6396" x="711.3491" y="2623.2803">generated docs, and generic bind/parity matching</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0264" x="711.3491" y="2637.2803">in this story. No Kubernetes Secret side effects</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9238" x="711.3491" y="2651.2803">are emitted.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1436" x="711.3491" y="2665.2803">Pre-create reuse stays bounded to exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.9502" x="711.3491" y="2679.2803">compartmentId plus displayName matching and does</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2881" x="711.3491" y="2693.2803">not use the sensitive value filter even though</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8955" x="711.3491" y="2707.2803">ListJavaDownloadTokens supports it.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6055" x="711.3491" y="2721.2803">Delete keeps the finalizer until the delete work</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1641" x="711.3491" y="2735.2803">request is terminal and GetJavaDownloadToken or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0264" x="711.3491" y="2749.2803">fallback ListJavaDownloadTokens confirms the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.1719" x="711.3491" y="2763.2803">token is gone.</text><ellipse cx="674.3491" cy="2367.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="674.3491" cy="2367.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="674.3491" x2="674.3491" y1="157" y2="177"/><polygon fill="#0F172A" points="670.3491,167,674.3491,177,678.3491,167,674.3491,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="827.2227" x2="827.2227" y1="341" y2="361"/><polygon fill="#0F172A" points="823.2227,351,827.2227,361,831.2227,351,827.2227,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="827.2227" x2="827.2227" y1="423" y2="443"/><polygon fill="#0F172A" points="823.2227,433,827.2227,443,831.2227,433,827.2227,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="532.8833" x2="521.4756" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="521.4756" x2="521.4756" y1="257" y2="279"/><polygon fill="#0F172A" points="517.4756,269,521.4756,279,525.4756,269,521.4756,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.8149" x2="827.2227" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="827.2227" x2="827.2227" y1="257" y2="279"/><polygon fill="#0F172A" points="823.2227,269,827.2227,279,831.2227,269,827.2227,273" style="stroke