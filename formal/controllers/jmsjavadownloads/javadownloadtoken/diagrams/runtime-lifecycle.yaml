schemaVersion: 1
surface: repo-authored-semantics
service: jmsjavadownloads
slug: javadownloadtoken
kind: JavaDownloadToken
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
repoAuthored:
  providerLifecycle:
    createPending:
      - CREATING
    updatePending:
      - UPDATING
    deletePending:
      - DELETING
  listLookup:
    filters:
      - compartmentId
      - displayName
      - id
    matchRule: exact compartmentId plus displayName unique match in ACTIVE, CREATING, or UPDATING; duplicate matches fail
  mutation:
    mutable:
      - definedTags
      - description
      - displayName
      - freeformTags
      - isDefault
      - licenseType
      - timeExpires
    forceNew:
      - compartmentId
      - javaVersion
  hooks:
    create:
      - helper: tfresource.CreateResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: javadownloadtoken
        action: CREATED
    update:
      - helper: tfresource.UpdateResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: javadownloadtoken
        action: UPDATED
    delete:
      - helper: tfresource.DeleteResource
      - helper: tfresource.WaitForWorkRequestWithErrorHandling
        entityType: javadownloadtoken
        action: DELETED
  followUp:
    create: GetWorkRequest -> GetJavaDownloadToken
    update: GetWorkRequest -> GetJavaDownloadToken
    delete: GetWorkRequest -> GetJavaDownloadToken/ListJavaDownloadTokens confirm-delete
notes:
  - Create returns a JavaDownloadToken body plus opc-work-request-id, while
    update and delete return work-request headers only. The reviewed runtime
    resumes all three phases through GetWorkRequest before rereading
    GetJavaDownloadToken.
  - The token value authorizes downloads and is intentionally excluded from
    published status, generated docs, and generic bind/parity matching in this
    story. No Kubernetes Secret side effects are emitted.
  - Pre-create reuse stays bounded to exact compartmentId plus displayName
    matching and does not use the sensitive value filter even though
    ListJavaDownloadTokens supports it.
  - Delete keeps the finalizer until the delete work request is terminal and
    GetJavaDownloadToken or fallback ListJavaDownloadTokens confirms the token
    is gone.
