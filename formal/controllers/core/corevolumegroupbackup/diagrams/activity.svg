-size="14" lengthAdjust="spacing" textLength="189.8477" x="397.0708" y="1098.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3584" x="397.0708" y="1112.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.7783" x="397.0708" y="1126.7803">slug: corevolumegroupbackup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.8818" x="397.0708" y="1140.7803">kind: CoreVolumeGroupBackup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="397.0708" y="1154.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="397.0708" y="1168.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="397.0708" y="1182.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="397.0708" y="1196.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="397.0708" y="1210.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="397.0708" y="1224.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="397.0708" y="1238.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="397.0708" y="1252.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="397.0708" y="1266.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="397.0708" y="1280.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="397.0708" y="1294.7803">promotion.</text><ellipse cx="360.0708" cy="1123" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="360.0708" cy="1123" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="360.0708" x2="360.0708" y1="65" y2="85"/><polygon fill="#0F172A" points="356.0708,75,360.0708,85,364.0708,75,360.0708,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="360.0708" x2="360.0708" y1="133" y2="153"/><polygon fill="#0F172A" points="356.0708,143,360.0708,153,364.0708,143,360.0708,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="360.0708" x2="360.0708" y1="201" y2="221"/><polygon fill="#0F172A" points="356.0708,211,360.0708,221,364.0708,211,360.0708,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="360.0708" x2="360.0708" y1="269" y2="289"/><polygon fill="#0F172A" points="356.0708,279,360.0708,289,364.0708,279,360.0708,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="181.3164" x2="181.3164" y1="439" y2="459"/><polygon fill="#0F172A" points="177.3164,449,181.3164,459,185.3164,449,181.3164,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="294.3813" x2="181.3164" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="181.3164" x2="181.3164" y1="383" y2="405"/><polygon fill="#0F172A" points="177.3164,395,181.31