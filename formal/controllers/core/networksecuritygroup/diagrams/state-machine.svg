 lengthAdjust="spacing" textLength="287.9229" x="2327.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2327.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2327.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3584" x="2327.78" y="182.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="166.5234" x="2327.78" y="196.7803">slug: networksecuritygroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.2891" x="2327.78" y="210.7803">kind: NetworkSecurityGroup</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2327.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2327.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2327.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2327.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="2327.78" y="280.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.3721" x="2327.78" y="294.7803">UPDATING; delete TERMINATING, TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="2327.78" y="308.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3721" x="2327.78" y="322.7803">freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2327.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.627" x="2327.78" y="350.7803">compartment_id, vcn_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="2327.78" y="364.7803">list lookup: oci_core_network_security_groups</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0195" x="2327.78" y="378.7803">filters compartment_id, display_name, vcn_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="30.3516" x="2327.78" y="392.7803">state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2327.78" y="406.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2327.78" y="420.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4473" x="2327.78" y="434.7803">Ready state maps to OCI AVAILABLE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6816" x="2327.78" y="448.7803">Requeue continues while OCI reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="311.2061" x="2327.78" y="462.7803">PROVISIONING, the defensive literal UPDATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.4482" x="2327.78" y="476.7803">TERMINATING, or TERMINATED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6406" x="2327.78" y="490.7803">Delete completes only after</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0195" x="2327.78" y="504.7803">GetNetworkSecurityGroup returns not found;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="364.8955" x="2327.78" y="518.7803">TERMINATING and TERMINATED are accepted observed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.1719" x="2327.78" y="532.7803">pre-delete states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="2327.78" y="546.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2197" x="2327.78" y="560.7803">definedTags, and freeformTags.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="94" id="ent0006"><path d="M3042.68,628 L3042.68,642.58 L2566,626.16 L3042.68,650.58 L3042.68,678 A8,8 0 0 0 3050.68,686 L3335.0306,686 A8,8 0 0 0 3343.0306,678 L3343.0306,630 L3333.0306,620 L3050.68,620 A8,8 0 0 0 3042.68,628" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3333.0306,620 L3333.0306,626 A4,4 0 0 0 3337.0306,630 L3343.0306,630 L3333.0306,620" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="3048.68" y="635.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3506" x="3048.68" y="649.7803">delete observe: GetNetworkSecurityGro