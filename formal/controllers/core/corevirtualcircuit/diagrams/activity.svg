lvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="343.3472" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="343.3472" y="1280.7803">promotion.</text><ellipse cx="306.3472" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="306.3472" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="306.3472" x2="306.3472" y1="65" y2="85"/><polygon fill="#0F172A" points="302.3472,75,306.3472,85,310.3472,75,306.3472,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="306.3472" x2="306.3472" y1="133" y2="153"/><polygon fill="#0F172A" points="302.3472,143,306.3472,153,310.3472,143,306.3472,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="306.3472" x2="306.3472" y1="201" y2="221"/><polygon fill="#0F172A" points="302.3472,211,306.3472,221,310.3472,211,306.3472,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="306.3472" x2="306.3472" y1="269" y2="289"/><polygon fill="#0F172A" points="302.3472,279,306.3472,289,310.3472,279,306.3472,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="154.4546" x2="154.4546" y1="439" y2="459"/><polygon fill="#0F172A" points="150.4546,449,154.4546,459,158.4546,449,154.4546,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="240.6577" x2="154.4546" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="154.4546" x2="154.4546" y1="383" y2="405"/><polygon fill="#0F172A" points="150.4546,395,154.4546,405,158.4546,395,154.4546,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="372.0366" x2="458.2397" y1="383" y2="383"/><line style="stroke:#0F17