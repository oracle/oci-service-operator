</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="314.9695" y="1280.7803">promotion.</text><ellipse cx="277.9695" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="277.9695" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="277.9695" x2="277.9695" y1="65" y2="85"/><polygon fill="#0F172A" points="273.9695,75,277.9695,85,281.9695,75,277.9695,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="277.9695" x2="277.9695" y1="133" y2="153"/><polygon fill="#0F172A" points="273.9695,143,277.9695,153,281.9695,143,277.9695,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="277.9695" x2="277.9695" y1="201" y2="221"/><polygon fill="#0F172A" points="273.9695,211,277.9695,221,281.9695,211,277.9695,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="277.9695" x2="277.9695" y1="269" y2="289"/><polygon fill="#0F172A" points="273.9695,279,277.9695,289,281.9695,279,277.9695,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="144.3511" x2="144.3511" y1="439" y2="459"/><polygon fill="#0F172A" points="140.3511,449,144.3511,459,148.3511,449,144.3511,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="212.28" x2="144.3511" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="144.3511" x2="144.3511" y1="383" y2="405"/><polygon fill="#0F172A" points="140.3511,395,144.3511,405,148.3511,395,144.3511,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="343.6589" x2="411.5879" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="411.5879" x2="411.5879" y1="383" y2="405"/><polygon fill="#0F172A" points="407.5879,395,411.5879,405,415.5879,395,4