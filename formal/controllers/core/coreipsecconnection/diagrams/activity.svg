="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="211.8267" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="306.3984" x="180.4233" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3984" x="190.4233" y="755.7803">Delete path uses DeleteCoreIpSecConnection</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="190.4233" y="769.7803">with required via GetCoreIpSecConnection or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="242.7852" x="190.4233" y="783.7803">ListCoreIpSecConnection to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="190.4233" y="797.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="194.0576" y="831"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="204.0576" y="851.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="204.0576" y="865.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="176.9131" y="899"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="186.9131" y="919.7803">Requeue on provisioning, updating, terminating</text><path d="M364.6226,943 L364.6226,1119 L344.6226,1123 L364.6226,1127 L364.6226,1303 A0,0 0 0 0 364.6226,1303 L704.6626,1303 A0,0 0 0 0 704.6626,1303 L704.6626,953 L694.6626,943 L364.6226,943 A0,0 0 0 0 364.6226,943" fill="#FFF7D6" style="s