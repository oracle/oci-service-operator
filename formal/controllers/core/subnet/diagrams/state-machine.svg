ont-size="14" lengthAdjust="spacing" textLength="307.248" x="2219.78" y="490.7803">PROVISIONING, UPDATING, or TERMINATING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9297" x="2219.78" y="504.7803">Delete completes only after GetSubnet returns</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8193" x="2219.78" y="518.7803">not found; TERMINATED is an accepted observed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.1719" x="2219.78" y="532.7803">pre-delete state.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="92" id="ent0006"><path d="M2901.27,607 L2901.27,614.76 L2441.2,598.24 L2901.27,622.76 L2901.27,643 A8,8 0 0 0 2909.27,651 L3174.2134,651 A8,8 0 0 0 3182.2134,643 L3182.2134,609 L3172.2134,599 L2909.27,599 A8,8 0 0 0 2901.27,607" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3172.2134,599 L3172.2134,605 A4,4 0 0 0 3176.2134,609 L3182.2134,609 L3172.2134,599" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2907.27" y="614.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9434" x="2907.27" y="628.7803">delete observe: GetSubnet or ListSubnets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.7236" x="2907.27" y="642.7803">delete targets: NOT_FOUND</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.26,474 C49.58,474 107.16,474 167.74,474" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="173.74,474,164.74,470,168.74,