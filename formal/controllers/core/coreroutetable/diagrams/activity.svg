84" x="336.3745" y="1098.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="122.9648" x="336.3745" y="1112.7803">slug: coreroutetable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1855" x="336.3745" y="1126.7803">kind: CoreRouteTable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="336.3745" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="336.3745" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="336.3745" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="336.3745" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="336.3745" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="336.3745" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="336.3745" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="336.3745" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="336.3745" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="336.3745" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="336.3745" y="1280.7803">promotion.</text><ellipse cx="299.3745" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="299.3745" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="299.3745" x2="299.3745" y1="65" y2="85"/><polygon fill="#0F172A" points="295.3745,75,299.3745,85,303.3745,75,299.3745,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="299.3745" x2="299.3745" y1="133" y2="153"/><polygon fill="#0F172A" points="295.3745,143,299.3745,153,303.3745,143,299.3745,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="299.3745" x2="299.3745" y1="201" y2="221"/><polygon fill="#0F172A" points="295.3745,211,299.3745,221,303.3745,211,299.3745,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="299.3745" x2="299.3745" y1="269" y2="289"/><polygon fill="#0F172A" points="295.3745,279,299.3745,289,303.3745,279,299.3745,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="150.9683" x2="150.9683" y1="439" y2="459"/><polygon fill="#0F172A" points="146.9683,449,150.9683,459,154.9683,449,150.9683,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="233.6851" x2="150.9683" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="150.9683" x2="150.9683" y1="383" y2="405"/><polygon fill="#0F172A" points="146.9683,395,150.9683,405,154.9683,395,150.9683,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="365.064" x2="447.7808" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="447.7808" x2="447.78