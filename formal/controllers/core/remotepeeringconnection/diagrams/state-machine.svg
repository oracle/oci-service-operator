" textLength="304.2744" x="378.98" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="378.98" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="378.98" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="378.98" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="378.98" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="378.98" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="378.98" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3584" x="378.98" y="404.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4541" x="378.98" y="418.7803">slug: remotepeeringconnection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5645" x="378.98" y="432.7803">kind: RemotePeeringConnection</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="378.98" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="378.98" y="460.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="378.98" y="474.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="378.98" y="488.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="378.98" y="502.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="378.98" y="516.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="378.98" y="530.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="378.98" y="544.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="378.98" y="558.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="378.98" y="572.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="378.98" y="586.7803">promotion.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M273.22,61.29 C273.22,77.87 273.22,107.03 273.22,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="273.22,136.85,277.22,127.85,273.22,131.85,269.22,127.85,273.22,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.123" x="274.22" y="102.7803">CreateRemotePeeringConnection</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk4"><path d="M273.22,187.46 C273.22,237.94 273.22,347.17 273.22,397.6" fill="none" id="provisioning-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="273.22,403.6,277.22,394.6,273.22,398.6,269.22,394.6,273.22,403.6" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="274.22" y="228.7803">ACTIVE</text></g><!--link active to updating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk5"><path d="M215.37,454.42 C152.9,484.34 56.74,541.56 15.22,625 C6,643.52 14.7463,655.8216 33.6963,667.4516" fill="none" id="active-to-updating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="38.81,670.59,33.2317,662.4732,34.5485,667.9747,29.0471,669.2915,38.81,670.59" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.2471" x="16.22" y="636.7803">UpdateRemotePeeringConnection</text></g><!--link updating to active--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="dependency" data-source-line="25" id="lnk6"><path d="M174.91,679.54 C196.98,671.51 219.18,659.35 234.22,641 C278.96,586.4 279.2611,503.0045 276.1811,460.2445" fill="none" id="updating-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="275.75,454.26,272.4069,463.5241,276.1092,459.2471,280.3863,462.9494,275.75,454.26" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="245.24" y="636.7803">ACTIVE</text></g><!--link active to terminating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="26" id="lnk7"><path d="M281.71,454.46 C299.23,504.94 337.272,614.5019 354.782,664.9319" fill="none" id="active-to-terminating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="356.75,670.6,357.5767,660.7859,355.11,665.8766,350.0193,663.4099,356.75,670.6" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="208.5713" x="346.35" y="636.7803">DeleteRemotePeeringConnection</text></g><!--link terminating to *end*--><g class="link" data-entity-1="ent0005" data-entity-2="ent0008" data-link-type="dependency" data-source-line="27" id="lnk9"><path d="M365.22,721.41 C365.22,744.96 365.22,773.47 365.22,790.58" fill="none" id="terminating-to-*end*" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="365.22,796.58,369.22,787.58,365.22,791.58,361.22,787.58,365.22,796.58" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="64.5723" x="366.22" y="762.7803">DELETED</text></g><?plantuml-src XLHjJzim4FxkNt5YtoPAwIWl2z8a1Xr3sWgYm9TjGiOv9nQEdTbEEpRjl--S9cbQG5E_rBcxvvxdtloZCYLtl02VyzGkbCb0SksH-SxomCLZvcnbqbEhhOCtKj0lxNcaA7cbmoThmfGN29zHpp4emL_scQdV2ADnpyYTiui6VLUE3j_r8uqD-F4P1oaFquDDB-jIT8t7mtX_R_VzXaTCtzZtziQZ_VsUlOONrXbqC3fWGGMDC0iy87pb8bS6OG1an-4r5eHrXUYeNgVM61H1MTF3ydNO7mOlLEz8SYcYfS-sKGqWLmoxRuJcse-ZT8pf4Nt43h7n-ykMMRTAP-VA4o5YzztKBqgKmDNrvTt5xE9oUZ4ztmBkeU_O1dEICiT-sCdfpSNTf0vO6blNganvsCXnUtLsSjFYjmvjG41NAFCivcpoPTB5z7pOjxS_O33uiCOJ4ZXrI72lDM7DEKOlIKChX3NlQ6e9al4s_dqLj7Fy3s2FFTdFKEFhc7tV61lLDiMOdB4uhU1KbWUmiYjypXsca2gUqPGbpNlOlFrm-Hu8cY5djKOtg2i_A9Rpk-Fd6Pl5OGBfR04XHsWWLo5GvjmZ53P53TpGdfSe5DTnQLLHMXV8lMtUSj3zDgrtbCe8EyD0RmgaGw9qvH3mbmeUSdIumxWJEOQd4canWiWJE4VQDnunFRgv4f6iuHawjgBaeU3bPavG9jYU1BOfmSD2XPoobre9HPAfs565grKv_5bXXL3QQ4M_mvhyIRtZpEigIy3LlIkNlHEhtj6Yfmc