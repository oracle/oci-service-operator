 the imported</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="75.4824" x="841.6411" y="1079.2803">field surface</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="828.5376" y="1161.5"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="838.5376" y="1182.2803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="838.5376" y="1196.2803">fields compartment_id</text><ellipse cx="979.7612" cy="1242" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="979.7612" cy="1242" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="854.1782,1112.5,1105.3442,1112.5,1117.3442,1124.5,1105.3442,1136.5,854.1782,1136.5,842.1782,1124.5,854.1782,1112.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="983.7612" y="1147.2803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="854.1782" y="1128.2803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="869.3335,1295,1090.189,1295,1102.189,1307,1090.189,1319,869.3335,1319,857.3335,1307,869.3335,1295" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="869.3335" y="1310.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="835.5474" y="1303.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1102.189" y="1303.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="299.3711" x="695.4814" y="1329"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="705.4814" y="1349.7803">Apply UpdatePrivateIp only for mutable fields</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3857" x="705.4814" y="1363.7803">display_name</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1014.8525" y="1329"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1024.8525" y="1349.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="979.7612,1383,991.7612,1395,979.7612,1407,967.7612,1395,979.7612,1383" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="118" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="334.3164" x="812.603" y="1427"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="822.603" y="1447.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="822.603" y="1461.7803">create=tfresource.CreateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="314.3164" x="822.603" y="1475.7803">tfresource.WaitForWorkRequestWithErrorHandling</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="215.5439" x="822.603" y="1489.7803">entity=template action=CREATED;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="822.603" y="1503.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="822.603" y="151