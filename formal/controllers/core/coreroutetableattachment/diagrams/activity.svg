te PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="316.916" y="1266.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="316.916" y="1280.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="316.916" y="1294.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="316.916" y="1308.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="316.916" y="1322.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="316.916" y="1336.7803">promotion.</text><ellipse cx="279.916" cy="1165" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="279.916" cy="1165" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="279.916" x2="279.916" y1="65" y2="85"/><polygon fill="#0F172A" points="275.916,75,279.916,85,283.916,75,279.916,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="279.916" x2="279.916" y1="133" y2="153"/><polygon fill="#0F172A" points="275.916,143,279.916,153,283.916,143,279.916,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="279.916" x2="279.916" y1="201" y2="221"/><polygon fill="#0F172A" points="275.916,211,279.916,221,283.916,211,279.916,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="279.916" x2="279.916" y1="283" y2="303"/><polygon fill="#0F172A" points="275.916,293,279.916,30