nt-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="199.3647" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="330.4678" x="155.9268" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7227" x="165.9268" y="755.7803">Delete path uses DeleteCoreVolumeBackup with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="165.9268" y="769.7803">required via GetCoreVolumeBackup or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4678" x="165.9268" y="783.7803">ListCoreVolumeBackup to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="181.5957" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="191.5957" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="191.5957" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="164.4512" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="174.4512" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M352.1606,929 L352.1606,1105 L332.1606,1109 L352.1606,1113 L352.1606,1289 A0,0 0 0 0 352.1606,1289 L692.2007,1289 A0,0 0 0 0 692.2007,1289 L692.2007,939 L682.2007,929 L352.1606,929 A0,0 0 0 0 352.1606,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M682.2007,929 L682.2007,939 L692.2007,939 L682.2007,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><