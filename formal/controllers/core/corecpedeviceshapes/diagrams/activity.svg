xt fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="221.1577" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="315.7295" x="185.0889" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7295" x="195.0889" y="755.7803">Delete path uses DeleteCoreCpeDeviceShapes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0332" x="195.0889" y="769.7803">with required via GetCoreCpeDeviceShapes or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1162" x="195.0889" y="783.7803">ListCoreCpeDeviceShapes to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="195.0889" y="797.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="203.3887" y="831"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="213.3887" y="851.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="213.3887" y="865.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="186.2441" y="899"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="196.2441" y="919.7803">Requeue on provisioning, updating, terminating</text><path d="M373.9536,943 L373.9536,1119 L353.9536,1123 L373.9536,1127 L373.9536,1303 A0,0 0 0 0 373.9536,1303 L713.9937,1303 A0,0 0 0 0 713.9937,1303 L713.9937,953 L703.9937,943 L373.9536,943 A0,0 0 0 0 373.9536,943" fill="#FFF7D6" s