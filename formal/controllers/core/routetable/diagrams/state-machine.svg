nt-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3039.26" y="575.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="492" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2253.78,49 L2253.78,310.14 L2088.12,322.72 L2253.78,318.14 L2253.78,561 A8,8 0 0 0 2261.78,569 L2598.9861,569 A8,8 0 0 0 2606.9861,561 L2606.9861,51 L2596.9861,41 L2261.78,41 A8,8 0 0 0 2253.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2596.9861,41 L2596.9861,47 A4,4 0 0 0 2600.9861,51 L2606.9861,51 L2596.9861,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2259.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2259.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2259.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2259.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2259.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2259.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2259.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2259.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2259.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3584" x="2259.78" y="182.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="95.7305" x="2259.78" y="196.7803">slug: routetable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8408" x="2259.78" y="210.7803">kind: RouteTable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2259.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2259.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2259.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2259.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="2259.78" y="280.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="317.3721" x="2259.78" y="294.7803">UPDATING; delete TERMINATING, TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="2259.78" y="308.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1924" x="2259.78" y="322.7803">freeform_tags, route_rules</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2259.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.627" x="2259.78" y="350.7803">compartment_id, vcn_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2259.78" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1299" x="2259.78" y="378.7803">list lookup: oci_core_route_tables filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.9814" x="2259.78" y="392.7803">compartment_id, display_name, id, vcn_id (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2259.78" y="406.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2259.78" y="420.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2259.78" y="434.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4473" x="2259.78" y="448.7803">Ready state maps to OCI AVAILABLE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6816" x="2259.78" y="462.7803">Requeue continues while OCI reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.248" x="2259.78" y="476.7803">PROVISIONING, UPDATING, or TERMINATING.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4746" x="2259.78" y="490.7803">Delete completes only after GetRouteTable</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.2061" x="2259.78" y="504.7803">returns not found; TERMINATING and TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4883" x="2259.78" y="518.7803">are accepted observed pre-delete states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2539" x="2259.78" y="532.7803">Route-rule drift is normalized before update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0537" x="2259.78" y="546.7803">evaluation so order-only diffs and OCI-managed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.1299" x="2259.78" y="560.7803">LOCAL rules do not trigger updates.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="94" id="ent0006"><path d="M2941.99,635 L2941.99,641.82 L2481.8,626.16 L2941.99,649.82 L2941.99,671 A8,8 0 0 0 2949.99,679 L3270.947,679 A8,8 0 0 0 3278.947,671 L3278.947,637 L3268.947,627 L2949.99,627 A8,8 0 0 0 2941.99,635" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3268.947,627 L3268.947,633 A4,4 0 0 0 3272.947,637 L3278.947,637 L3268.947,627" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2947.99" y="642.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.957" x="2947.99" y="656.7803">delete observe: GetRouteTable or ListRouteTables</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.7236" x="2947.99" y="670.7803">delete targ