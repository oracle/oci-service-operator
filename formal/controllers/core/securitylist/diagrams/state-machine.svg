<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="735px" preserveAspectRatio="none" style="width:3546px;height:735px;background:#FCFCFD;" version="1.1" viewBox="0 0 3546 735" width="3546px" zoomAndPan="magnify"><title>State Machine - core/SecurityList</title><defs/><g><rect fill="#FCFCFD" height="735" style="stroke:none;stroke-width:1;" width="3546" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="220.1787" x="1656.2036" y="20.7803">State Machine - core/SecurityList</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="202" y="544"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="202" x2="466.3643" y1="568" y2="568"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="307.7271" y="559.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="207" y="583.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="207" y="597.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1263.36" y="380"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1268.36" y="403.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2037.32" y="380"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2042.32" y="403.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" styl