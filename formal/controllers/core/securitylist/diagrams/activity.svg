nt-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="855.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="835"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="855.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="869.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,889,351.7441,901,339.7441,913,327.7441,901,339.7441,889" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="979" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="979" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="456" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="362.9102" x="816.2417" y="587"/><path d="M967.0757,587 L967.0757,594 L957.0757,604 L816.2417,604" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="819.2417" y="598.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="310.9102" x="836.2417" y="670"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="846.2417" y="690.7803">Request requeue while OCI remains in</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.9102" x="846.2417" y="704.7803">PROVISIONING, UPDATING, TERMINATING,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91" x="846.2417" y="718.7803">TERMINATED</text><ellipse cx="991.6968" cy="778" fill="none" rx="1