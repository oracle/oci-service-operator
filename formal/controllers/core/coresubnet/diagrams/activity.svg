<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2185px" preserveAspectRatio="none" style="width:1256px;height:2185px;background:#FCFCFD;" version="1.1" viewBox="0 0 1256 2185" width="1256px" zoomAndPan="magnify"><title>Activity - core/CoreSubnet</title><defs/><g><rect fill="#FCFCFD" height="2185" style="stroke:none;stroke-width:1;" width="1256" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="175.8135" x="538.7568" y="30.7803">Activity - core/CoreSubnet</text></g><ellipse cx="667.0535" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="444" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="698.3975" x="315.7168" y="75"/><path d="M437.7852,75 L437.7852,82 L427.7852,92 L315.7168,92" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="318.7168" y="86.7803">Observe and Bind</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="514.6609" y="109"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="524.6609" y="129.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="524.6609" y="143.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.1641" x="509.9714" y="177"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1641" x="519.9714" y="197.7803">Read desired CoreSubnet spec, tracked status,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="103.5303" x="519.9714" y="211.7803">and delete intent</text><polygon fill="#E2E8F0" points="537.5876,245,796.5193,245,808.5193,257,796.5193,269,537.5876,269,525.5876,257,537.5876,245" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.9316" x="537.5876" y="260.7803">"Tracked or explicit OCI identity present?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="503.8015" y="253.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="808.5193" y="253.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="323.4746" x="335.7168" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4746" x="345.7168" y="299.7803">Get the current OCI resource via GetCoreSubnet</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="299.3574" x="686.9741" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="696.9741" y="299.7803">Resolve an existing OCI resource through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3574" x="696.9741" y="313.7803">ListCoreSubnet using filters compartment_id,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="30.3516" x="696.9741" y="327.7803">state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.9229" x="679.1914" y="361"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9229" x="689.1914" y="381.7803">Create the OCI resource via CreateCoreSubnet</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.4609" x="689.1914" y="395.7803">when no reusable match is found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="693.2051" y="429"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="703.2051" y="449.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="703.2051" y="463.7803">into status</text><polygon fill="#E2E8F0" points="667.0535,483,679.0535,495,667.0535,507,655.0535,495,667.0535,483" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="604.8772,539,729.2297,539,741.2297,551,729.2297,563,604.8772,563,592.8772,551,604.8772,539" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="604.8772" y="554.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="571.0911" y="547.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="741.2297" y="547.7803">no</text><rect fill="none" height="340" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="573"/><path d="M61.4688,573 L61.4688,580 L51.4688,590 L11,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="584.7803">Delete</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="311.0537" x="184.2173" y="607"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.9297" x="194.2173" y="627.7803">Delete path uses DeleteCoreSubnet with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0537" x="194.2173" y="641.7803">required via GetCoreSubnet or ListCoreSubnet</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.2822" x="194.2173" y="655.7803">to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.0127" x="191.2378" y="704"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2334" x="201.2378" y="724.7803">Confirm deletion via GetCoreSubnet or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0127" x="201.2378" y="738.7803">ListCoreSubnet until OCI reaches DELETED</text><polygon fill="#E2E8F0" points="191.5718,781,487.9165,781,499.9165,793,487.9165,805,191.5718,805,179.5718,793,191.5718,781" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="796.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="789.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="789.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="815"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="835.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="815"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="835.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="849.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,869,351.7441,881,339.7441,893,327.7441,881,339.7441,869" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="950.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="950.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="427.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="345.916" x="827.4048" y="573"/><path d="M978.2388,573 L978.2388,580 L968.2388,590 L827.4048,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="830.4048" y="584.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="280.5928" x="854.0664" y="656"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="864.0664" y="676.7803">Request requeue while OCI remains in</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.5928" x="864.0664" y="690.7803">PROVISIONING, UPDATING, DELETING</text><ellipse cx="994.3628" cy="750" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="994.3628" cy="750" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="908.0796,607,1080.646,607,1092.646,619,1080.646,631,908.0796,631,896.0796,619,908.0796,607" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="998.3628" y="641.7803">yes</text><text fill="#