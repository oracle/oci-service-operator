st="spacing" textLength="189.8477" x="369.8501" y="1098.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3584" x="369.8501" y="1112.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.7715" x="369.8501" y="1126.7803">slug: instanceconfiguration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6611" x="369.8501" y="1140.7803">kind: InstanceConfiguration</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="369.8501" y="1154.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="369.8501" y="1168.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="369.8501" y="1182.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="369.8501" y="1196.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="369.8501" y="1210.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="369.8501" y="1224.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="369.8501" y="1238.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="369.8501" y="1252.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="369.8501" y="1266.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="369.8501" y="1280.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="369.8501" y="1294.7803">promotion.</text><ellipse cx="332.8501" cy="1123" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="332.8501" cy="1123" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="332.8501" x2="332.8501" y1="65" y2="85"/><polygon fill="#0F172A" points="328.8501,75,332.8501,85,336.8501,75,332.8501,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="332.8501" x2="332.8501" y1="133" y2="153"/><polygon fill="#0F172A" points="328.8501,143,332.8501,153,336.8501,143,332.8501,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="332.8501" x2="332.8501" y1="201" y2="221"/><polygon fill="#0F172A" points="328.8501,211,332.8501,221,336.8501,211,332.8501,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="332.8501" x2="332.8501" y1="269" y2="289"/><polygon fill="#0F172A" points="328.8501,279,332.8501,289,336.8501,279,332.8501,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="167.7061" x2="167.7061" y1="439" y2="459"/><polygon fill="#0F172A" points="163.7061,449,167.7061,459,171.7061,449,167.7061,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="267.1606" x2="167.7061" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="167.7061" x2="167.7061" y1="383" y2="405"/><polygon fill="#0F172A" points="163.7061,395,167.7061,405,171.7061,395,1