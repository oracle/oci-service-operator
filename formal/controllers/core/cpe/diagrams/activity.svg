" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="937" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="937" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="442" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="345.916" x="795.854" y="559"/><path d="M946.688,559 L946.688,566 L936.688,576 L795.854,576" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="798.854" y="570.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="280.5928" x="822.5156" y="642"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="832.5156" y="662.7803">Request requeue while OCI remains in</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.5928" x="832.5156" y="676.7803">PROVISIONING, UPDATING, DELETING</text><ellipse cx="962.812" cy="736" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="962.812" cy="736" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="876.5288,593,1049.0952,593,1061.0952,605,1049.0952,617,876.5288,617,864.5288,605,876.5288,593" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="966.812" y="627.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.5664" x="876.5288" y="608.7803">"OCI state in retryable set?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="815.854" y="862"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" tex