="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5918" x="215.7163" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="310.2881" x="182.3682" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2881" x="192.3682" y="755.7803">Delete path uses DeleteDrgRedundancyStatus</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.5918" x="192.3682" y="769.7803">with required via GetDrgRedundancyStatus or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="246.6748" x="192.3682" y="783.7803">ListDrgRedundancyStatus to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="192.3682" y="797.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="197.9473" y="831"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="207.9473" y="851.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="207.9473" y="865.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="180.8027" y="899"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="190.8027" y="919.7803">Requeue on provisioning, updating, terminating</text><path d="M368.5122,943 L368.5122,1119 L348.5122,1123 L368.5122,1127 L368.5122,1303 A0,0 0 0 0 368.5122,1303 L708.5522,1303 A0,0 0 0 0 708.5522,1303 L708.5522,953 L698.5522,943 L368.5122,943 A0,0 0 0 0 368.5122,943" fill="#FFF7D6" style="s