803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="306.3506" x="117.7925" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0537" x="127.7925" y="755.7803">Delete path uses DeleteVtap with required via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3506" x="127.7925" y="769.7803">GetVtap or ListVtap to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="131.4028" y="803"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="141.4028" y="823.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="141.4028" y="837.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="114.2583" y="871"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="124.2583" y="891.7803">Requeue on provisioning, updating, terminating</text><path d="M301.9678,915 L301.9678,1091 L281.9678,1095 L301.9678,1099 L301.9678,1275 A0,0 0 0 0 301.9678,1275 L642.0078,1275 A0,0 0 0 0 642.0078,1275 L642.0078,925 L632.0078,915 L301.9678,915 A0,0 0 0 0 301.9678,915" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M632.0078,915 L632.0078,925 L642.0078,925 L632.0078,915" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="307.9678" y="930.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="307.9678" y="944.