 x="335.5815" y="1098.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9512" x="335.5815" y="1112.7803">slug: servicegateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.3926" x="335.5815" y="1126.7803">kind: ServiceGateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="335.5815" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="335.5815" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="335.5815" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="335.5815" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="335.5815" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="335.5815" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="335.5815" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="335.5815" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="335.5815" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="335.5815" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="335.5815" y="1280.7803">promotion.</text><ellipse cx="298.5815" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="298.5815" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="298.5815" x2="298.5815" y1="65" y2="85"/><polygon fill="#0F172A" points="294.5815,75,298.5815,85,302.5815,75,298.5815,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="298.5815" x2="298.5815" y1="133" y2="153"/><polygon fill="#0F172A" points="294.5815,143,298.5815,153,302.5815,143,298.5815,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="298.5815" x2="298.5815" y1="201" y2="221"/><polygon fill="#0F172A" points="294.5815,211,298.5815,221,302.5815,211,298.5815,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="298.5815" x2="298.5815" y1="269" y2="289"/><polygon fill="#0F172A" points="294.5815,279,298.5815,289,302.5815,279,298.5815,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="150.5718" x2="150.5718" y1="439" y2="459"/><polygon fill="#0F172A" points="146.5718,449,150.5718,459,154.5718,449,150.5718,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="232.8921" x2="150.5718" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="150.5718" x2="150.5718" y1="383" y2="405"/><polygon fill="#0F172A" points="146.5718,395,150.5718,405,154.5718,395,150.5718,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="364.271" x2="446.5913" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="446.5913" x2="446.5913"