ext fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="817" y="1664.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="817" y="1678.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="817" y="1692.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="817" y="1706.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="817" y="1720.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3584" x="817" y="1734.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9512" x="817" y="1748.7803">slug: servicegateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.3926" x="817" y="1762.7803">kind: ServiceGateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="817" y="1776.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="817" y="1790.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="817" y="1804.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="817" y="1818.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="817" y="1832.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.1787" x="817" y="1846.7803">none; delete TERMINATING, TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8193" x="817" y="1860.7803">supported drift: block_traffic, defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.499" x="817" y="1874.7803">display_name, freeform_tags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="817" y="1888.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.627" x="817" y="1902.7803">compartment_id, vcn_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="817" y="1916.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3506" x="817" y="1930.7803">list lookup: oci_core_service_gateways filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.9814" x="817" y="1944.7803">compartment_id, display_name, id, vcn_id (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="817" y="1958.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="817" y="1972.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="817" y="1986.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4473" x="817" y="2000.7803">Ready state maps to OCI AVAILABLE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6816" x="817" y="2014.7803">Requeue continues while OCI reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.9102" x="817" y="2028.7803">PROVISIONING, TERMINATING, or TERMINATED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.0264" x="817" y="2042.7803">Delete completes only after GetServiceGateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.2061" x="817" y="2056.7803">returns not found; TERMINATING and TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4883" x="817" y="2070.7803">are accepted observed pre-delete states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9023" x="817" y="2084.7803">In-place updates are limited to blockTraffic,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.6748" x="817" y="2098.7803">displayName, definedTags, freeformTags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.8682" x="817" y="2112.7803">routeTableId, and services.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.7783" x="817" y="2126.7803">Service comparisons normalize by serviceId so</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0537" x="817" y="2140.7803">ordering and response-only serviceName fields do</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="120.6338" x="817" y="2154.7803">not trigger updates.</text><?plantuml-src fLXRR-Cs4ttdho3QbrtKJZPxQRSEyW7PRBercYQ5atPV30IqDBBvhKog96KtBVhVUtYHB2bsDssHXqGQSgvdpenYFqbL2IFMtAv4hhTIBNaXIalCjfA5o3ujZQvLVg5BRVYNHOQVl7CYfqBKfVjEAtSjriI_ft93JcPY_vbR-JlnazSTeJ16RvFs5yN9Do-xDvLszEwH3qNnJVxry9GsEPbqOl7wpQiNtmvEUFD9_khLwvCtRphoe3xJHf7X9ryp9rr9_9P-hKbbnCSS8Zg-9REH6NqGZhRYWQraJhpGsYtqRnrLjhdr1-DSP4wRdcifn4OqZ8rUqjlY1SHGXYpAIYYt_txtm5EqTC9lTPIoe2kf-idxzhLujNWBgLTPzKJP8dz39wteKM7U5gB8s9yinCP_g1U4Z3gohEC7lu0ZHfSbcTxhTyBIZ3AjCZaKVN5pU_D3olwFGeabcI-uiBp_gdVbvcBAVD6vtg2aVTsZmJt0tr3E3LbTravgDKclZdCfbgYfFOxFuzsHSLFc8xjPDXfoAX7jmTjHtBz9AW_WPBjayV7_EZcQS58uNnFlmm_kfdZOxh2_sezrmjk_dnblsBhdh7_4N-fdPB9JZfYizB4Dm1y0mA-q_eHV0a4ifCgPA1rt1h301G20VgjA52HKWwDR5FhgWOlIaCWV89NMMTOtxPt1wGd_G6vWaa1DhVPMcxHyBQq5UHtIT0KpVLNsMI5BHyPEvYhJQu-RDTJTotp4SschKZpSAv3P26P6SxN954JysLSdV0qUUFuyn6cejcA13FdWF31gWwQ7EoWdQ05TSSYX2yJlQ11TgNN5io3X5L3XsVYdsSqlqzlfpVNq-iC_o1CiXrpjz_1VftzFG7lWLY6jK1oxQODAzMel5RTEkDe6TJwDiIbumYRb2Ldlm-j3taNfmC43P-5Q8SswCRIHud5mSmMqxi59h4gwsLJbxdBsu_Jw_0v50JYQfyltJqubMcEkzbbhSfAL91II0ASAgKI9cMcG8Ror0M6BKlicU4ev33c1fASGVEufj2lUczHIIUOR0N-0sxXUM6X-ge7erivHKQ2r7ckDk6omwL4HlK4ymHcFrASPZ7IuNSaMscl4Q06kkUgspEXmgO8FfTmqAV5AGNCMOL2PZyKMX3rNkP65uxGHPIr220cRuVKAQImzxUp6JD_xaPz1jtLLQGDSyxhAlILRcq9aD8b5l0UV5ONCHWmx4WPnVk_4qWvOY1M6gD1c7OJWePUHXzYC_a-Pumil9BwkVIWJS0_QVAne6uEnR4XnaSzO8k-62ldW67l4X7n8XBlffIlNiGlS-gu3zplVC36Dg7CEH6JkgRZgnkRB7E9hWEGDsZQtNkI9xlEMKa-ULrNvm7yE9HasfuAay2tQQ8rf71GCw3XSiRawL38wF1PChVYAIX0eNw4q5hCfZ8CpLpJaVHH7nomzmav7zb58B7dcepQVPf5DFqgtkiHwRRvFM9shoCDdZj2MWGiodzApYzcbxulJkOemxTgCMMfidlh0VMjtZqG-ReuyTLJ4IN2MUizFsfP4pY9lZMkuMuuJXRShL30mN686MrD34w2pokYDj0WJ6HXnW7qDCwvjNIENAyTrmVUlXMcB-syxuMUrxDiDRntQaHT6hxbR4N-qfku-DO0q1Woz3rjOY18b4sdWLs8PujLgvAcVHLIDjHadIlBG5IvR7R4hyO1KTemrSwCnj5sHsb4zGvKyeBpcbkz3gPAvBR0uJgETLQXCy4rxfeGNkq4dV3iUCM6o5Rc7Yl3T2N_ywCG7cV0TRcDjnkjKdAmjDJWRl_NsG8vyn8CeBD-YCRXS9_ROed5iJ4shTOnc5oM7ppA3Pydy97m8CblMoqdZqZAj7_W0p2V3DRcDQCANJIpZOIon3uxRj4wQSPJpO_RtZP1GFlaRZ0S9Fk7YfFCy7vVCxgGyJTC93Q7ejAbbTthopl3SyMxWs-4euprY