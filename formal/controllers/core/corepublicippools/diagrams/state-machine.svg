ly="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.7168" x="17" y="686.7803">updating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.6963" x="17" y="700.7803">provider: UPDATING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="148.3721" x="247.16" y="671"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="247.16" x2="395.5321" y1="709" y2="709"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="257.16" y="686.7803">terminating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="257.16" y="700.7803">provider: DELETING</text></g><ellipse cx="229.35" cy="51" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="321.35" cy="808" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="321.35" cy="808" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="29" id="ent0003"><path d="M329.11,271 L329.11,425 L294.31,429 L329.11,433 L329.11,587 A8,8 0 0 0 337.11,595 L673.5914,595 A8,8 0 0 0 681.5914,587 L681.5914,273 L671.5914,263 L337.11,263 A8,8 0 0 0 329.11,271" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M671.5914,263 L671.5914,269 A4,4 0 0 0 675.5914,273 L681.5914,273 L671.5914,263" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="335.11" y="278.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="335.11" y="292.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="335.11" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="335.11" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="335.11" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="335.11" y="348.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="335.11" y="362.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="335.11" y="376.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="335.11" y="390.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3584" x="335.11" y="404.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="141.6406" x="335.11" y="418.7803">slug: corepublicippools</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6338" x="335.11" y="432.7803">kind: CorePublicIpPools</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="335.11" y="446.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="335.11" y="460.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="335.11" y="474.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="335.11" y="488.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="335.11" y="502.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="335.11" y="516.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="335.11" y="530.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="335.11" y="544.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="335.11" y="558.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="335.11" y="572.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="335.11" y="586.7803">promotion.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk3"><path d="M229.35,61.29 C229.35,77.87 229.35,107.03 229.35,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="229.35,136.85,233.35,127.85,229.35,131.85,225.35,127.85,229.35,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1924" x="230.35" y="102.7803">CreateCorePublicIpPools</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk4"><path d="M229.35,187.46 C229.35,237.94 229.35,347.17 229.35,397.6" fill="none" id="provisioning-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="229.35,403.6,233.35,394.6,229.35,398.6,225.35,394.6,229.35,403.6" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="230.35" y="228.7803">ACTIVE</text></g><!--link active to updating--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk5"><path d="M187.94,454.41 C138.27,486.38 57.56,547.58 24.35,625 C17.07,641.97 23.9935,654.1581 38.6135,666.6181" fill="none" id="active-to-updating" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="43.18,670.51,38.9248,661.6278,39.3745,667.2668,33.7356,667.7166,43.18,670.51" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="160.3164" x="25.35" y="636.7803">UpdateCorePublicIpPools</text></g><!--link updating to active--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="dependency" data-source-line="25" id="lnk6"><path d="M154.63,670.57 C168.24,663.01 181.09,653.31 190.35,641 C232.67,584.74 234.0899,502.5309 231.7599,460.2209" fill="none" id="updating-to-active" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="231.43,454.23,227.9309,463.4363,231.7049,459.2224,235.9188,462.9964,231.43,454.23" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="50.5654" x="200.87" y="636.7803">ACTIVE</text></g><!--link active to terminating--><g class="link" data-entity-1