nt-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.5889" x="834.6245" y="1384.7803">Enforce conflictsWith rules cidr_block -&gt;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.0645" x="834.6245" y="1398.7803">cidr_blocks, cidr_blocks -&gt; cidr_block before</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9375" x="834.6245" y="1412.7803">any OCI mutation</text><polygon fill="#E2E8F0" points="861.729,1446,1082.5845,1446,1094.5845,1458,1082.5845,1470,861.729,1470,849.729,1458,861.729,1446" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="861.729" y="1461.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="827.9429" y="1454.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1094.5845" y="1454.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="288.4951" x="695.4814" y="1480"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2471" x="705.4814" y="1500.7803">Apply UpdateVcn only for mutable fields</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4951" x="705.4814" y="1514.7803">defined_tags, display_name, freeform_tags</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1005.0815" y="1480"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1015.0815" y="1500.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="972.1567,1534,984.1567,1546,972.1567,1558,960.1567,1546,