cn with required via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5371" x="186.4756" y="641.7803">GetVcn or ListVcns to NOT_FOUND confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.0127" x="191.2378" y="690"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.0127" x="201.2378" y="710.7803">Confirm deletion via GetVcn or ListVcns until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.5859" x="201.2378" y="724.7803">OCI reaches NOT_FOUND</text><polygon fill="#E2E8F0" points="191.5718,773,487.9165,773,499.9165,785,487.9165,797,191.5718,797,179.5718,785,191.5718,773" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="788.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="781.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="781.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="807"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="827.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="807"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="827.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLeng