ont-size="14" lengthAdjust="spacing" textLength="243.5918" x="176.0063" y="701.7803">Apply repo-authored secret policy none</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="307.1094" x="144.2476" y="735"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3643" x="154.2476" y="755.7803">Delete path uses DeleteComputeCluster with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.0957" x="154.2476" y="769.7803">required via GetComputeCluster or</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1094" x="154.2476" y="783.7803">ListComputeCluster to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="158.2373" y="817"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="168.2373" y="837.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="168.2373" y="851.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="141.0928" y="885"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="151.0928" y="905.7803">Requeue on provisioning, updating, terminating</text><path d="M328.8022,929 L328.8022,1105 L308.8022,1109 L328.8022,1113 L328.8022,1289 A0,0 0 0 0 328.8022,1289 L668.8423,1289 A0,0 0 0 0 668.8423,1289 L668.8423,939 L658.8423,929 L328.8022,929 A0,0 0 0 0 328.8022,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M658.8423,929 L658.8423,939 L668.8423,939 L658.8423,929" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-fami