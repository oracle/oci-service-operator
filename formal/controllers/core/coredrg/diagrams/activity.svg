<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2185px" preserveAspectRatio="none" style="width:1234px;height:2185px;background:#FCFCFD;" version="1.1" viewBox="0 0 1234 2185" width="1234px" zoomAndPan="magnify"><title>Activity - core/CoreDrg</title><defs/><g><rect fill="#FCFCFD" height="2185" style="stroke:none;stroke-width:1;" width="1234" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="152.4824" x="539.5156" y="30.7803">Activity - core/CoreDrg</text></g><ellipse cx="658.8734" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="444" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="692.1289" x="320.0106" y="75"/><path d="M442.079,75 L442.079,82 L432.079,92 L320.0106,92" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="323.0106" y="86.7803">Observe and Bind</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="506.4808" y="109"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="516.4808" y="129.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="516.4808" y="143.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="319.5986" x="499.0741" y="177"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5986" x="509.0741" y="197.7803">Read desired CoreDrg spec, tracked status, and</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2822" x="509.0741" y="211.7803">delete intent</text><polygon fill="#E2E8F0" points="529.4076,245,788.3392,245,800.3392,257,788.3392,269,529.4076,269,517.4076,257,529.4076,245" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.9316" x="529.4076" y="260.7803">"Tracked or explicit OCI identity present?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="495.6215" y="253.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="800.3392" y="253.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="301.6611" x="340.0106" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6611" x="350.0106" y="299.7803">Get the current OCI resource via GetCoreDrg</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.9092" x="686.951" y="279"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="696.951" y="299.7803">Resolve an existing OCI resource through</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5439" x="696.951" y="313.7803">ListCoreDrg using filters compartment_id,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="30.3516" x="696.951" y="327.7803">state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="330.4678" x="661.6718" y="361"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.4678" x="671.6718" y="381.7803">Create the OCI resource via CreateCoreDrg when</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.1025" x="671.6718" y="395.7803">no reusable match is found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="683.4579" y="429"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="693.4579" y="449.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="693.4579" y="463.7803">into status</text><polygon fill="#E2E8F0" points="658.8734,483,670.8734,495,658.8734,507,646.8734,495,658.8734,483" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="596.6971,539,721.0497,539,733.0497,551,721.0497,563,596.6971,563,584.6971,551,596.6971,539" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="596.6971" y="554.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="562.911" y="547.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="733.0497" y="547.7803">no</text><rect fill="none" height="340" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="573"/><path d="M61.4688,573 L61.4688,580 L51.4688,590 L11,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="14" y="584.7803">Delete</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="306.3711" x="186.5586" y="607"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="286.3711" x="196.5586" y="627.7803">Delete path uses DeleteCoreDrg with required</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.1992" x="196.5586" y="641.7803">via GetCoreDrg or ListCoreDrg to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="196.5586" y="655.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.999" x="180.7446" y="704"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.999" x="190.7446" y="724.7803">Confirm deletion via GetCoreDrg or ListCoreDrg</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6201" x="190.7446" y="738.7803">until OCI reaches DELETED</text><polygon fill="#E2E8F0" points="191.5718,781,487.9165,781,499.9165,793,487.9165,805,191.5718,805,179.5718,793,191.5718,781" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="796.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="789.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="789.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="815"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="835.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="815"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="835.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="849.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,869,351.7441,881,339.7441,893,327.7441,881,339.7441,869" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="950.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="950.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="427.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="345.916" x="811.0447" y="573"/><path d="M961.8787,573 L961.8787,580 L951.8787,590 L811.0447,590" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="814.0447" y="584.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="280.5928" x="837.7063" y="656"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="847.7063" y="676.7803">Request requeue while OCI remains in</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.5928" x="847.7063" y="690.7803">PROVISIONING, UPDATING, DELETING</text><ellipse cx="978.0027" cy="750" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="978.0027" cy="750" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="891.7195,607,1064.2859,607,1076.2859,619,1064.2859,631,891.7195,631,879.7195,619,891.7195,607" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="982.0027" y="641.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size=