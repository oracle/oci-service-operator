><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2197" x="773" y="2128.7803">compartmentId, displayName; tracked OCI ID via</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9023" x="773" y="2142.7803">GetDrg wins; otherwise exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="773" y="2156.7803">displayName unique match in AVAILABLE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.1992" x="773" y="2170.7803">PROVISIONING, or UPDATING; blank displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5713" x="773" y="2184.7803">skips reuse and duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="773" y="2198.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="773" y="2212.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4473" x="773" y="2226.7803">Ready state maps to OCI AVAILABLE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.0059" x="773" y="2240.7803">CreateDrgDetails does not expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6953" x="773" y="2254.7803">defaultDrgRouteTables, so requested</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5986" x="773" y="2268.7803">attachment-type defaults reconcile through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5234" x="773" y="2282.7803">UpdateDrg after the DRG exists.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4678" x="773" y="2296.7803">Delete completes only after GetDrg returns not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="346.2266" x="773" y="2310.7803">found; TERMINATING and TERMINATED are accepted</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6543" x="773" y="2324.7803">observed pre-delete states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.668" x="773" y="2338.7803">The create-fallback wrapper only recovers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.7783" x="773" y="2352.7803">first-create post-read failures when status</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8887" x="773" y="2366.7803">already carries a created DRG OCID and a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9092" x="773" y="2380.7803">provisioning-like or AVAILABLE lifecycle state.</text><?plantuml-src fLXTRzis57tdho2sbmsmacPjryv11gHnrWNBciB9rfS00orHDXTQr4ZAhZVil-zSaf8bnswp3Nse9LANz-FSSm_Z7bHL2okMt2r4OTQgclDIQ2UPwrPc8d-OMzDKnONHnl8lonp_YjwEGfQYqVu7K_btOYdvZrAlf5UvsB_dLlqf-ScBtgAmrgoJzMVboQjl-bzMniitZtmeorV5jxkxZ2saJJjcBru-V_RTpWuwFgq_V_xYvENBtdemdnjRISjFlcLUUItvhVoZaLKkUSQn98ydTiuMgf2yDCRFpCVUzwxT-XVZNEJUs84_AQvsQJSW-OryNJx3CemXTQeMbT__VN_3KwpqOkviQ5NAQrKDC_RT2_5yzXghPB8UBEMpugKywPOULUDrASgS_Sr2RFodPYQHHYyTw_d1B-28DLfBEtZzHZWvbRcfShMxzCNDxSrFjzAkL2v_5fMOI_i55uuFNmq-kRcuObHfRbQeuz3sQESxODxAWblfZ6wyCjKulJekb9YZfkuuFcVRBLbRvYEtchSM2gaHxS6lu_BmIraL0P5icooUVT_BqPZB2liRoO4v-9Y2ODiTj7yOu9Xtlx-oT9hpNxFX5lfec8RnrZW2SOe28fY7KlDhOnxmdu2xCrKLJ6ZFlGK0i0kbbXzhZTI7l7FqHOMssN2XhHJ51glAUSU6vv47s3tcRwMdSoJefZFPcL2EBvLp8AH3dr_3DhvtNvLAUsdT6