mily="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1367" x="687.4971" y="2163.2803">supported drift: defaultDrgRouteTables,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.7852" x="687.4971" y="2177.2803">definedTags, displayName, freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="687.4971" y="2191.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="93.3721" x="687.4971" y="2205.2803">compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="687.4971" y="2219.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3096" x="687.4971" y="2233.2803">list lookup: oci_core_drgs filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2197" x="687.4971" y="2247.2803">compartmentId, displayName; tracked OCI ID via</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9023" x="687.4971" y="2261.2803">GetDrg wins; otherwise exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.9229" x="687.4971" y="2275.2803">displayName unique match in AVAILABLE,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.1992" x="687.4971" y="2289.2803">PROVISIONING, or UPDATING; blank displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5713" x="687.4971" y="2303.2803">skips reuse and duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="687.4971" y="2317.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="687.4971" y="2331.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4473" x="687.4971" y="2345.2803">Ready state maps to OCI AVAILABLE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.0059" x="687.4971" y="2359.2803">CreateDrgDetails does not expose</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6953" x="687.4971" y="2373.2803">defaultDrgRouteTables, so requested</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.5986" x="687.4971" y="2387.2803">attachment-type defaults reconcile through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.5234" x="687.4971" y="2401.2803">UpdateDrg after the DRG exists.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4678" x="687.4971" y="2415.2803">Delete completes only after GetDrg returns not</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="346.2266" x="687.4971" y="2429.2803">found; TERMINATING and TERMINATED are accepted</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="169.6543" x="687.4971" y="2443.2803">observed pre-delete states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.668" x="687.4971" y="2457.2803">The create-fallback wrapper only recovers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.7783" x="687.4971" y="2471.2803">first-create post-read failures when status</text><text fill="#334155" font-fam