"spacing" textLength="287.9229" x="2289.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2289.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2289.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3584" x="2289.78" y="182.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.3027" x="2289.78" y="196.7803">slug: internetgateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1855" x="2289.78" y="210.7803">kind: InternetGateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2289.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2289.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2289.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="2289.78" y="266.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="2289.78" y="280.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.1787" x="2289.78" y="294.7803">none; delete TERMINATING, TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="2289.78" y="308.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.8369" x="2289.78" y="322.7803">freeform_tags, is_enabled (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2289.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.627" x="2289.78" y="350.7803">compartment_id, vcn_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="2289.78" y="364.7803">list lookup: oci_core_internet_gateways filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.9814" x="2289.78" y="378.7803">compartment_id, display_name, id, vcn_id (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2289.78" y="392.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2289.78" y="406.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2289.78" y="420.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4473" x="2289.78" y="434.7803">Ready state maps to OCI AVAILABLE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6816" x="2289.78" y="448.7803">Requeue continues while OCI reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.9102" x="2289.78" y="462.7803">PROVISIONING, TERMINATING, or TERMINATED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8193" x="2289.78" y="476.7803">Delete completes only after GetInternetGateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.2061" x="2289.78" y="490.7803">returns not found; TERMINATING and TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4883" x="2289.78" y="504.7803">are accepted observed pre-delete states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="2289.78" y="518.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4883" x="2289.78" y="532.7803">definedTags, freeformTags, isEnabled, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.4961" x="2289.78" y="546.7803">routeTableId.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="93" id="ent0006"><path d="M2971.99,614 L2971.99,629.1 L2511.66,612.28 L2971.99,637.1 L2971.99,664 A8,8 0 0 0 2979.99,672 L3226.2371,672 A8,8 0 0 0 3234.2371,664 L3234.2371,616 L3224.2371,606 L2979.99,606 A8,8 0 0 0 2971.99,614" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3224.2371,606 L3224.2371,612 A4,4 0 0 0 3228.2371,616 L3234.2371,616 L3224.2371,606" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2977.99" y="621.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="2977.99" y="635.7803">delete observe: GetInternetGateway or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="131.5098" x="2977.99" y="649.7803">ListInternetGateways</tex