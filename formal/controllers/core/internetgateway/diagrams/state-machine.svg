F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3031.9" y="568.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="576" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2283.78,49 L2283.78,350.57 L2118.12,401.08 L2283.78,358.57 L2283.78,561 A8,8 0 0 0 2291.78,569 L2628.9861,569 A8,8 0 0 0 2636.9861,561 L2636.9861,51 L2626.9861,41 L2291.78,41 A8,8 0 0 0 2283.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2626.9861,41 L2626.9861,47 A4,4 0 0 0 2630.9861,51 L2636.9861,51 L2626.9861,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2289.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2289.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2289.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2289.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2289.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2289.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2289.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2289.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2289.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.3584" x="2289.78" y="182.7803">service: core</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="132.3027" x="2289.78" y="196.7803">slug: internetgateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1855" x="2289.78" y="210.7803">kind: InternetGateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2289.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2289.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2289.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="2289.78" y="266.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="2289.78" y="280.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.1787" x="2289.78" y="294.7803">none; delete TERMINATING, TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.5088" x="2289.78" y="308.7803">supported drift: defined_tags, display_name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.8369" x="2289.78" y="322.7803">freeform_tags, is_enabled (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2289.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.627" x="2289.78" y="350.7803">compartment_id, vcn_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2289.78" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="2289.78" y="378.7803">list lookup: oci_core_internet_gateways filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.9814" x="2289.78" y="392.7803">compartment_id, display_name, id, vcn_id (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="2289.78" y="406.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2289.78" y="420.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2289.78" y="434.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4473" x="2289.78" y="448.7803">Ready state maps to OCI AVAILABLE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6816" x="2289.78" y="462.7803">Requeue continues while OCI reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="325.9102" x="2289.78" y="476.7803">PROVISIONING, TERMINATING, or TERMINATED.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8193" x="2289.78" y="490.7803">Delete completes only after GetInternetGateway</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.2061" x="2289.78" y="504.7803">returns not found; TERMINATING and TERMINATED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4883" x="2289.78" y="518.7803">are accepted observed pre-delete states.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="2289.78" y="532.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4883" x="2289.78" y="546.7803">definedTags, freeformTags, isEnabled, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="82.4961" x="2289.78" y="560.7803">routeTableId.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="94" id="ent0006"><path d="M2971.99,628 L2971.99,643.1 L2511.66,626.28 L2971.99,651.1 L2971.99,678 A8,8 0 0 0 2979.99,686 L3226.2371,686 A8,8 0 0 0 3234.2371,678 L3234.2371,630 L3224.2371,620 L2979.99,620 A8,8 0 0 0 2971.99,628" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3224.2371,620 L3224.2371,626 A4,4 0 0 0 3228.2371,630 L3234.2371,630 L3224.2371,620" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2977.99" y="635.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2471" x="2977.99" y="649.7803">delete observe: GetInternetGateway or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="131.5098" x="2977.99" y="663.7803">ListInternetGateways</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.7236" x="2977.99" y="677.7803">delete targets: NOT_FOUND</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.26,576 C55.72,576 144.14,576 225.56,576" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="231.56,576,222.56,572,226.56,576,222.56,580,231.56,576" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.7441" x="57" y="571.7803">CreateInternetGateway</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M496.64,560.05 C587.55,549.01 698.3337,535.5731 768.1837,527.0931" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="774.14,526.37,764.7235,523.4838,769.1764,526.9726,765.6877,531.4255,774.14,526.37" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="527.36" y="534.8403">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="34" id="lnk5"><path d="M897.57,507.58 C1011.1,486.19 1245.77,441.79 1263.36,437 C1273.07,434.36 1277.6038,433.0543 1287.3838,429.7043" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="1293.06,427.76,1283.2494,426.8923,1288.3298,429.3803,1285.8419,434.4606,1293.06,427.76" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" le