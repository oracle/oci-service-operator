<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="695px" preserveAspectRatio="none" style="width:3606px;height:695px;background:#FCFCFD;" version="1.1" viewBox="0 0 3606 695" width="3606px" zoomAndPan="magnify"><title>State Machine - core/InternetGateway</title><defs/><g><rect fill="#FCFCFD" height="695" style="stroke:none;stroke-width:1;" width="3606" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="248.9648" x="1671.9905" y="20.7803">State Machine - core/InternetGateway</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="232" y="545"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="232" x2="496.3643" y1="569" y2="569"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="337.7271" y="560.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="237" y="584.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="237" y="598.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1293.36" y="388"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1298.36" y="411.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2067.32" y="388"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2072.32" y="411.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8