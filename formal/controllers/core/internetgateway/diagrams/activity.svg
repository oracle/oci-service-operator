" y="341.7803">more)</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="321.1709" x="654.7218" y="375"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="664.7218" y="395.7803">Create the OCI resource via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1709" x="664.7218" y="409.7803">CreateInternetGateway when no reusable match</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.0342" x="664.7218" y="423.7803">is found</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="286.8955" x="671.8595" y="457"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.8955" x="681.8595" y="477.7803">Persist the resolved or created OCI identity</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="63.8135" x="681.8595" y="491.7803">into status</text><polygon fill="#E2E8F0" points="663.8414,511,675.8414,523,663.8414,535,651.8414,523,663.8414,511" style="stroke:#1D4ED8;stroke-width:0.5;"/><polygon fill="#E2E8F0" points="601.6652,567,726.0177,567,738.0177,579,726.0177,591,601.6652,591,589.6652,579,601.6652,567" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="124.3525" x="601.6652" y="582.7803">"Delete requested?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="567.879" y="575.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="738.0177" y="575.7803">no</text><rect fill="none" height="356" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="644.4814" x="11" y="601"/><path d="M61.4688,601 L61.4688,608 L5