ing" textLength="163.4268" x="768" y="1779.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="768" y="1793.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="768" y="1807.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="768" y="1821.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="768" y="1835.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="768" y="1849.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="768" y="1863.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="768" y="1877.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="121.3789" x="768" y="1891.7803">service: apiplatform</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.8613" x="768" y="1905.7803">slug: apiplatforminstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.7441" x="768" y="1919.7803">kind: ApiPlatformInstance</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="768" y="1933.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="768" y="1947.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="768" y="1961.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="768" y="1975.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="768" y="1989.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="768" y="2003.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="209.6992" x="768" y="2017.7803">follow-up: create=read-after-write;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7158" x="768" y="2031.7803">update=read-after-write; delete=confirm-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7021" x="768" y="2045.7803">supported drift: definedTags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.248" x="768" y="2059.7803">freeformTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="768" y="2073.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1719" x="768" y="2087.7803">compartmentId, name</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="768" y="2101.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="768" y="2115.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.8193" x="768" y="2129.7803">oci_api_platform_api_platform_instances filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3506" x="768" y="2143.7803">compartmentId, name, id; exact compartmentId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="322.123" x="768" y="2157.7803">plus name unique match in ACTIVE, CREATING, or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="214.7441" x="768" y="2171.7803">UPDATING; duplicate matches fail</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="768" y="2185.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="768" y="2199.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.5576" x="768" y="2213.7803">Reviewed lifecycle mapping treats CREATING as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.1299" x="768" y="2227.7803">provisioning, UPDATING as updating, ACTIVE as</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="318.2266" x="768" y="2241.7803">success, and DELETING as terminating; FAILED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9297" x="768" y="2255.7803">terminal failure without requeue, and DELETED is</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3164" x="768" y="2269.7803">a delete-confirmation target.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.916" x="768" y="2283.7803">Pre-create reuse uses exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.6396" x="768" y="2297.7803">name matching. Generated reuse remains bounded</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.5645" x="768" y="2311.7803">to reusable lifecycle states and rejects</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2949" x="768" y="2325.7803">duplicate exact matches instead of binding an</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="254.4678" x="768" y="2339.7803">arbitrary existing instance. The published</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1094" x="768" y="2353.7803">runtime intentionally omits lifecycleState from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.7305" x="768" y="2367.7803">the list query contract for first</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.041" x="768" y="2381.7803">bind-or-create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.4883" x="768" y="2395.7803">Only description, freeformTags, and definedTags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0615" x="768" y="2409.7803">reconcile in place.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="336.1641" x="768" y="2423.7803">ChangeApiPlatformInstanceCompartment remains out</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4746" x="768" y="2437.7803">of scope, so compartmentId and name stay</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.04" x="768" y="2451.7803">replacement-only drift in the published runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="313.626" x="768" y="2465.7803">Create and delete responses expose work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7363" x="768" y="2479.7803">headers, but the published surface has no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.8545" x="768" y="2493.7803">service-local work-request readers.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="326.8262" x="768" y="2507.7803">Generatedruntime records async breadcrumbs when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4609" x="768" y="2521.7803">OCI returns them and relies on lifecycle rereads</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1436" x="768" y="2535.7803">plus confirm-delete observation rather than</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.1719" x="768" y="2549.7803">work-request polling.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2676" x="768" y="2563.7803">The published `ApiPlatformInstance` kind keeps</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2676" x="768" y="2577.7803">generated controller and service-manager wiring,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="768" y="2591.7803">but a package-local runtime hook narrows list</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.8887" x="768" y="2605.7803">lookup semantics and clears auxiliary</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7158" x="768" y="2619.7803">compartment-change operations from the reviewed</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3574" x="768" y="2633.7803">runtime contract. The kind has no secret side</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="45.1309" x="768" y="2647.7803">effects.</text><?plantuml-src fLXRRnit5dxdho2wBoqWAN6JjAcCBE3QRjUejmdYT9y4jDGCH-9wH4v9ZXNjOl_xVeUNkSYZr4tX1qkydEjtldCeTwzq8wpOSRSLfTahlU6Lg9rahjjPY-9-OqshoqjJ6yl_LXNuAmSdIbc9jlO_6Er_5Zl9_o7h1-bL8QRFtAd_I7xsSh0fh3Nx9FrvTVRjryERsdZv_ICRgkhRyflZKyQMqgOJwvUlNZp_xkW4gK_xBrwyF7lrQh0Vn1V6QcdvsJVCArzBVYT_RwKk99zpqQYc5huoTlVieb7lqkSRxRp02RPLfUILCNvjFWx4kYpXlunpKNXZHsOcT_FMiP_oQ_cwUevj24D4LIEqdxu_FF0KAODGT39gLSbRfSU1_EwbUB5-ZLqIsOosYdNvIfvrMu-IzBeILS7-nu9l_ATsBH5TBnqRsC4lOOWrTItjQFbxuUHxMHXTgEEjBzxUlVtfJje7LSX_2Yqsqdx1XUFZfT6LjvStZ030pGFIEvOzExg7Kh2ov5OwKxTU6RrCIyzA9JR8gNiMly_x8_ESveLxs6G9fQpXxSdRSNjyK-eo09NrmUBplmzYjEHIutmh-GG6LzfchrX_XGICFLxoxlENbjGx_nKR7w5BuxWiUISSdZa55rPwgX026FYjCVVu9-3GMkcIYTfpRm4H10PWa1-R6ia9cU6e78rwEt1HModA0tQLyuwD3I2JS7h9VvH-Igy4RtKgEf7AyPro3insIjmjT4t8SrzMglRIkkLA5sP7QDf1vaqvuneiDuEAhu9NLhPEh14LSeKWqLgKE_GYaI04rCCfpPVmriifNsfZ6bw4RTu054JCb--lBpxS_FpZdmqBz8VGJDlvrq8-uTi4sXf44T9ZIJqWEwEaAyqXphSkYAE8nihW2PgoJ92w2ikdJ8oxKrQUk03xAcLtMTk34YizxIS0kzAdO19pbOJaN5rTtrx_-LnzMa-EJb5BeH4EL56bjAZHJYrYXLKNOBUk3PN0Kn9ZfHS8VpAUiY13nMBT7Y9gqXvL03w0whXPEqX-ge9eLc-eg51JZwL6c6Qe4ZwYDV0d64F0VPh2o8xxhUgGleEF3Z1RwLn2C_xBkwlqgKjLq5ohXnm84WMMSp1UrkLSxC7QArrQLNak7qJTYc1umcPOtY9uDL5Dtsl6Di-e4TsrJMCiSCtRfYHDhhMLAEIIfYIqt_A3sBWP0yaMLZMaPCOhAoN1WRROU_blMNY-fXN9TosPkmJLe9xdMkwZmOvDi1PBj9ofZPzWjdnk9tonXKDeEn_HnSV7MLEtBbpXhLQ8UpnE1Nrn-U7cNzSprWSSQCqnF-TbI-nFheSR07SbLDrtFzFuWJ