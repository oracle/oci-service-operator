none" height="44" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="421.7983" x="408.6943" y="1270"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="423.6943" y="1281.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="276.1309" x="490.46" y="1282.7803">[force-new or conflicting drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg16"><polygon fill="#0F172A" points="485.7183,1302,475.7183,1306,485.7183,1310,481.7183,1306" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="479.7183" x2="741.2964" y1="1306" y2="1306"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.1855" x="491.7183" y="1300.7803">reject before OCI mutation</text></g><path d="M662.1001,1328 L720.8657,1328 L720.8657,1334 L710.8657,1344 L654.1001,1344 L654.1001,1336 A8,8 0 0 1 662.1001,1328" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="86" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="402.3843" x="654.1001" y="1328"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.7656" x="669.1001" y="1339.7803">opt</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="243.4619" x="735.8657" y="1340.7803">[supported mutable drift is detected]</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg17"><polygon fill="#0F172A" points="1015.0396,1402,1025.0396,1406,1015.0396,1410,1019.0396,1406" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="742.2964" x2="1021.0396" y1="1406" y2="1406"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6816" x="749.2964" y="1358.7803">Apply UpdateModel only for mutable</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.123" x="749.2964" y="1372.7803">fields defined_tags, description,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="205.0508" x="749.2964" y="1386.7803">display_name, freeform_tags (+2</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="749.2964" y="1400.7803">more)</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg18"><polygon fill="#0F172A" points="1015.0396,1479,1025.0396,1483,1015.0396,1487,1019.0396,1483" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="742.2964" x2="1021.0396" y1="1483" y2="1483"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2891" x="749.2964" y="1435.7803">run helper hooks</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="749.2964" y="1449.7803">create=tfresource.CreateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="749.2964" y="1463.7803">update=tfresource.UpdateResource;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="749.2964" y="1477.7803">delete=tfresource.DeleteResource</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg19"><polygon fill="#0F172A" points="485.7183,1528,475.7183,1532,485.7183,1536,481.7183,1532" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="479.7183" x2="741.2964" y1="1532" y2="1532"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="100.7822" x="491.7183" y="1512.7803">status=required,</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.7197" x="491.7183" y="1526.7803">finalizer=retain-until-confirmed-delete</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg20"><polygon fill="#0F172A" points="235.2437,1563,225.2437,1567,235.2437,1571,231.2437,1567" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;stroke-dasharray:2,2;" x1="229.2437" x2="473.7183" y1="1567" y2="1567"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.4746" x="241.2437" y="1561.7803">requeue on provisioning, terminating</text></g><path d="M747,1588 L747,2394 A8,8 0 0 0 755,2402 L1079,2402 A8,8 0 0 0 1087,2394 L1087,1590 L1077,1580 L755,1580 A8,8 0 0 0 747,1588" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1077,1580 L1077,1586 A4,4 0 0 0 1081,1590 L1087,1590 L1077,1580" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="753" y="1595.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="307.3916" x="753" y="1609.7803">shared/diagrams/shared-resolution-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="143.1992" x="753" y="1623.7803">shared delete diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="753" y="1637.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="753" y="1651.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="753" y="1665.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="753" y="1679.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="753" y="1693.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="753" y="1707.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="753" y="1721.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="753" y="1735.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="753" y="1749.7803">controllers follow the shared resolution and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9297" x="753" y="1763.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="753" y="1777.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3994" x="753" y="1791.7803">service: generativeai</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="753" y="1805.7803">slug: model</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="753" y="1819.7803">kind: Model</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="753" y="1833.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="753" y="1847.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="753" y="1861.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="753" y="1875.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="753" y="1889.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="753" y="1903.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="753" y="1917.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.499" x="753" y="1931.7803">display_name, freeform_tags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="753" y="1945.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7568" x="753" y="1959.7803">base_model_id, compartment_id, fine_tune_details</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="753" y="1973.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="753" y="1987.7803">list lookup: oci_generative_ai_models filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.0059" x="753" y="2001.7803">compartment_id, base_model_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7432" x="753" y="2015.7803">fine_tune_details.dedicated_ai_cluster_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.4229" x="753" y="2029.7803">display_name (+1 more); exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.4131" x="753" y="2043.7803">baseModelId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0264" x="753" y="2057.7803">fineTuneDetails.dedicatedAiClusterId, with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="753" y="2071.7803">displayName required when populated; blank</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="155.6201" x="753" y="2085.7803">displayName skips reuse</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="753" y="2099.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="753" y="2113.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7227" x="753" y="2127.7803">The generated runtime scopes ListModels by the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7363" x="753" y="2141.7803">required compartment and only binds a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="753" y="2155.7803">returned model that matches baseModelId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9502" x="753" y="2169.7803">fineTuneDetails.dedicatedAiClusterId, and any</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.2061" x="753" y="2183.7803">populated displayName.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8887" x="753" y="2197.7803">A service-local wrapper skips pre-create reuse</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="753" y="2211.7803">when displayName is empty and clears stale</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="753" y="2225.7803">tracked IDs before recreating so create never</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.123" x="753" y="2239.7803">guesses across older fine-tune jobs.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1641" x="753" y="2253.7803">Create and update use read-after-write follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9365" x="753" y="2267.7803">through GetModel before the controller reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9844" x="753" y="2281.7803">steady state; the vendored SDK does not expose a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4404" x="753" y="2295.7803">separate UPDATING lifecycle enum for Model.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="753" y="2309.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3643" x="753" y="2323.7803">description, vendor, version, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2881" x="753" y="2337.7803">definedTags; compartmentId, baseModelId, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5645" x="753" y="2351.7803">fineTuneDetails require replacement.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0195" x="753" y="2365.7803">Delete retains the finalizer until GetModel</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5576" x="753" y="2379.7803">confirms DELETED or OCI no longer returns the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.0205" x="753" y="2393.7803">model.</text><?plantuml-src hLXjRnit4lxENq7qlYIePCTvQLCPEI2rSwqHjpd4wJS31hKxAx7U9VT8hXJTeV-zpv3xAak9xwumO5dBsNbzvfcX_RqsjNAgadwjShlLPYKBLNeIlZzPgkn-vMnZyWjRMYV_LcJuoKSIEHMgASC_h0c_gehaprHkAEXC7PQvqVycUVPoTAYSizjM-xFYxFldupUD3VJZ0n-Aullyktqfwt9ohSJovQiNptxOas3pxVcB5o_FNhqQdKVrcNM6d3pxJWGTIf8tzA-6J4PoBbU44nNqXfG-_SNcL8grpaaMreQb_JpIvBkN_YEaL5cmRk9P6s5tj1yQFQVNnJCSGncIg6jbmk7tnmAFqJAAljTHweAkjPdcxeUNwiNoDKvPPJqvofRvAphhZnxKvNMXYapy8M9iydsp92Gqa1SZF-G5776sBCbD7l-eF7sap9fCxnzzy-7cm_iRSXkTqI_Ag1MvRwJoSlfeyig7Yol1DPTsWufETS_stWFw7UNIaRTb4xGrY_RHQQxL2ZNrf-dxV12PTsK-yPjLfm6eGBH7tqx7qpV9v16ROaYMdFzzbAE590FvXcH47Rnimn233Byn3N4X-x-VEBRdmrCn5U6NfebO3CeHYjSSKe9wBBUyjlOU7mekBxN9XIg330uWW1pAJP_h4kcFkPVe3OCcsabLEbBv3gVQ1o-c5ja7I2_aJnII9GBzz4fx9ThBIdiFWZgcu1hQemR_fD1b8ESNChCLGwA2aZkTpsxD4WcugrWgVIy0_RlGu5TEGUdId-IKWxa2vNTAtsLbuw4foURQrwNQtHdck2VVdidAEdhwD2R1KUFL4bdZo1aZZKF_msbK5Wo11ZdczWMI4oY5NbfRoom-a3LmmNHyyV7TsqzNl_xqzRp1HipTOL_-soeSyFW0ncga6VfIvsnGi4dbjP4-gD3ug8xpb1f0je2alCNLPNnypAbqclmw8WAF2ksgJlz6gpuK0FFM3E18IMxbkYHVlhj-zvWaCyX7ghgeifAKGHWu1Q1KYG7d42EU-WY2PMaPpOz9g6COciu_pXx5TiDpjqlrRSyOs_W3J2JjqaFpOmqajmP7LG68FzIQ0DM1YkkQl44yqHc6sECC9lBQhdMFoGenU