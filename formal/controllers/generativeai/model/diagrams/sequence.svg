></g><line style="stroke:#CBD5E1;stroke-width:1;stroke-dasharray:2,2;" x1="388.6943" x2="1092.3843" y1="981" y2="981"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="200.751" x="393.6943" y="991.7803">[live state requires field-aware</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="105.0068" x="393.6943" y="1005.7803">drift evaluation]</text><path d="M406.6943,1017 L534.6807,1017 L534.6807,1023 L524.6807,1033 L398.6943,1033 L398.6943,1025 A8,8 0 0 1 406.6943,1017" fill="#F8FAFC" style="stroke:#CBD5E1;stroke-width:1.5;"/><rect fill="none" height="474" rx="8" ry="8" style="stroke:#CBD5E1;stroke-width:1.5;" width="683.6899" x="398.6943" y="1017"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="90.9863" x="413.6943" y="1028.7803">Drift handling</text><path d="M695,1046 L695,1250 A8,8 0 0 0 703,1258 L1064,1258 A8,8 0 0 0 1072,1250 L1072,1048 L1062,1038 L703,1038 A8,8 0 0 0 695,1046" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1062,1038 L1062,1044 A4,4 0 0 0 1066,1048 L1072,1048 L1062,1038" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.9639" x="748.0618" y="1053.7803">Supported update surface: defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0195" x="748.0618" y="1067.7803">description, display_name, freeform_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="748.0618" y="1081.7803">(+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.7783" x="748.0618" y="1095.7803">Reject before mutate: force-new fields</text><text fill="#334155" font-family="H