schemaVersion: 1
surface: repo-authored-semantics
service: generativeai
slug: model
kind: Model
archetype: generated-service-manager
states:
  - provisioning
  - active
  - terminating
  - deleted
  - failed
repoAuthored:
  listLookup:
    filters:
      - compartment_id
      - base_model_id
      - fine_tune_details.dedicated_ai_cluster_id
      - display_name
      - state
    matchRule: exact compartmentId plus baseModelId and fineTuneDetails.dedicatedAiClusterId, with displayName required when populated; blank displayName skips reuse
  mutation:
    mutable:
      - defined_tags
      - description
      - display_name
      - freeform_tags
      - vendor
      - version
    forceNew:
      - base_model_id
      - compartment_id
      - fine_tune_details
notes:
  - The generated runtime scopes ListModels by the required compartment and only binds a unique returned model that matches baseModelId, fineTuneDetails.dedicatedAiClusterId, and any populated displayName.
  - A service-local wrapper skips pre-create reuse when displayName is empty and clears stale tracked IDs before recreating so create never guesses across older fine-tune jobs.
  - Create and update use read-after-write follow-up through GetModel before the controller reports steady state; the vendored SDK does not expose a separate UPDATING lifecycle enum for Model.
  - In-place updates are limited to displayName, description, vendor, version, freeformTags, and definedTags; compartmentId, baseModelId, and fineTuneDetails require replacement.
  - Delete retains the finalizer until GetModel confirms DELETED or OCI no longer returns the model.
