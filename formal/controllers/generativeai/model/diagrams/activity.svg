xt fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.8818" x="860.0952" y="1107.7803">Compare live OCI state against the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3369" x="860.0952" y="1121.7803">repo-authored mutation surface</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="302.4473" x="817.8125" y="1204"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4473" x="827.8125" y="1224.7803">Reject drift before OCI mutation for force-new</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.5781" x="827.8125" y="1238.7803">fields base_model_id, compartment_id,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8613" x="827.8125" y="1252.7803">fine_tune_details</text><ellipse cx="969.0361" cy="1297" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="969.0361" cy="1297" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="843.4531,1155,1094.6191,1155,1106.6191,1167,1094.6191,1179,843.4531,1179,831.4531,1167,843.4531,1155" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="973.0361" y="1189.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="843.4531" y="1170.7803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="858.6084,1350,1079.4639,1350,1091.4639,1362,1079.4639,1374,858.6084,1374,846.6084,1362,858.6084,1350" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="858.6084" y="1365.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="824.8223" y="1358.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="1091.4639" y="1358.7803">no</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="282.2539" x="695.4814" y="1384"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2539" x="705.4814" y="1404.7803">Apply UpdateModel only for mutable fields</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.7158" x="705.4814" y="1418.7803">defined_tags, description, display_name,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="151.334" x="705.4814" y="1432.7803">freeform_tags (+2 more)</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="1001.9609" y="1384"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="1011.9609" y="1404.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="969.0361,1452,981.0361,1464,969.0361,1476,957.0361,1464,969.0361,1452" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="90" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.5537" x="822.2593" y="1496"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="832.2593" y="1516.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="832.2593" y="1530.7803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="832.2593" y="1544.7803">update=tfresource.UpdateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="832.2593" y="1558.7803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="832.2593" y="1572.7803">matching field-driven path executes</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="817.4263" y="1606"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="827.4263" y="1626.7803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="829.4712" y="1660"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="839.4712" y="1680.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="839.4712" y="1694.7803">retain-until-confirmed-delete</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.9229" x="843.0747" y="1728"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.9229" x="853.0747" y="1748.7803">Requeue on provisioning, terminating</text><path d="M685.3901,1784 L685.3901,2170 L665.3901,2174 L685.3901,2178 L685.3901,2564 A0,0 0 0 0 685.3901,2564 L1025.813,2564 A0,0 0 0 0 1025.813,2564 L1025.813,1794 L1015.813,1784 L685.3901,1784 A0,0 0 0 0 685.3901,1784" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M1015.813,1784 L1015.813,1794 L1025.813,1794 L1015.813,1784" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="691.3901" y="1799.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="691.3901" y="1813.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="691.3901" y="1827.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="691.3901" y="1841.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="691.3901" y="1855.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="691.3901" y="1869.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="691.3901" y="1883.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="691.3901" y="1897.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="691.3901" y="1911.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="691.3901" y="1925.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="691.3901" y="1939.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3994" x="691.3901" y="1953.7803">service: generativeai</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="691.3901" y="1967.7803">slug: model</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="691.3901" y="1981.7803">kind: Model</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="691.3901" y="1995.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="691.3901" y="2009.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="691.3901" y="2023.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="691.3901" y="2037.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="691.3901" y="2051.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="691.3901" y="2065.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="691.3901" y="2079.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.499" x="691.3901" y="2093.7803">display_name, freeform_tags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="691.3901" y="2107.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7568" x="691.3901" y="2121.7803">base_model_id, compartment_id, fine_tune_details</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="691.3901" y="2135.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="691.3901" y="2149.7803">list lookup: oci_generative_ai_models filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.0059" x="691.3901" y="2163.7803">compartment_id, base_model_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7432" x="691.3901" y="2177.7803">fine_tune_details.dedicated_ai_cluster_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.4229" x="691.3901" y="2191.7803">display_name (+1 more); exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.4131" x="691.3901" y="2205.7803">baseModelId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0264" x="691.3901" y="2219.7803">fineTuneDetails.dedicatedAiClusterId, with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="691.3901" y="2233.7803">displayName required when populated; blank</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="155.6201" x="691.3901" y="2247.7803">displayName skips reuse</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="691.3901" y="2261.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="691.3901" y="2275.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7227" x="691.3901" y="2289.7803">The generated runtime scopes ListModels by the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7363" x="691.3901" y="2303.7803">required compartment and only binds a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="691.3901" y="2317.7803">returned model that matches baseModelId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9502" x="691.3901" y="2331.7803">fineTuneDetails.dedicatedAiClusterId, and any</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.2061" x="691.3901" y="2345.7803">populated displayName.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8887" x="691.3901" y="2359.7803">A service-local wrapper skips pre-create reuse</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="691.3901" y="2373.7803">when displayName is empty and clears stale</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="691.3901" y="2387.7803">tracked IDs before recreating so create never</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.123" x="691.3901" y="2401.7803">guesses across older fine-tune jobs.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1641" x="691.3901" y="2415.7803">Create and update use read-after-write follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9365" x="691.3901" y="2429.7803">through GetModel before the controller reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9844" x="691.3901" y="2443.7803">steady state; the vendored SDK does not expose a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4404" x="691.3901" y="2457.7803">separate UPDATING lifecycle enum for Model.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="691.3901" y="2471.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3643" x="691.3901" y="2485.7803">description, vendor, version, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2881" x="691.3901" y="2499.7803">definedTags; compartmentId, baseModelId, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5645" x="691.3901" y="2513.7803">fineTuneDetails require replacement.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0195" x="691.3901" y="2527.7803">Delete retains the finalizer until GetModel</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5576" x="691.3901" y="2541.7803">confirms DELETED or OCI no longer returns the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.0205" x="691.3901" y="2555.7803">model.</text><ellipse cx="654.3901" cy="2174" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="654.3901" cy="2174" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="654.3901" x2="654.3901" y1="157" y2="177"/><polygon fill="#0F172A" points="650.3901,167,654.3901,177,658.3901,167,654.3901,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="815.0361" x2="815.0361" y1="369" y2="389"/><