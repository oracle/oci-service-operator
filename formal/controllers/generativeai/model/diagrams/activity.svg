engthAdjust="spacing" textLength="40.4688" x="14" y="612.7803">Delete</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="332.0127" x="173.7378" y="635"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3848" x="183.7378" y="655.7803">Delete path uses DeleteModel with required via</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.0127" x="183.7378" y="669.7803">GetModel or ListModels to DELETED confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="295.4541" x="192.0171" y="718"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4541" x="202.0171" y="738.7803">Confirm deletion via GetModel or ListModels</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="176.6201" x="202.0171" y="752.7803">until OCI reaches DELETED</text><polygon fill="#E2E8F0" points="191.5718,801,487.9165,801,499.9165,813,487.9165,825,191.5718,825,179.5718,813,191.5718,801" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.3447" x="191.5718" y="816.7803">"Delete cleanup and finalizer release succeed?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="157.7856" y="809.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="499.9165" y="809.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.1436" x="23" y="835"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="33" y="855.7803">Remove the finalizer after delete completion</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="835"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="855.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="869.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,889,351.7441,901,339.7441,913,327.7441,901,339.7441,889" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="979" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="979" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="442" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="392.5713" x="778.7505" y="601"/><path d="M929.5845,601 L929.5845,608 L919.5845,618 L778.7505,618" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="781.7505" y="612.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="340.5713" x="798.7505" y="684"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5713" x="808.7505" y="704.7803">Request requeue while OCI remains in CREATING,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.0137" x="808.7505" y="718.7803">DELETING</text><ellipse cx="969.0361" cy="778" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="969.0361" cy="778" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="882.7529,635,1055.3193,635,1067.3193,647,1055.3193,659,882.7529,659,870.7529,647,882.7529,635" style="stroke:#1D4ED8;stroke-width:0.5;"/>