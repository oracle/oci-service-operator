<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="912px" preserveAspectRatio="none" style="width:3533px;height:912px;background:#FCFCFD;" version="1.1" viewBox="0 0 3533 912" width="3533px" zoomAndPan="magnify"><title>State Machine - generativeai/Model</title><defs/><g><rect fill="#FCFCFD" height="912" style="stroke:none;stroke-width:1;" width="3533" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="232.6201" x="1643.4079" y="20.7803">State Machine - generativeai/Model</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="168" y="769"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="168" x2="432.3643" y1="793" y2="793"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="273.7271" y="784.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="173" y="808.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="173" y="822.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1229.36" y="612"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1234.36" y="635.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="1988.32" y="612"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="1993.32" y="635.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="69.917" x="1246.88" y="747"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.917" x="1251.88" y="770.7803">Retryable</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50" x="1256.84" y="866"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="38.1309" x="1262.7746" y="889.7803">Failed</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="122.8477" x="710.44" y="723"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.8477" x="715.44" y="746.7803">ResolveByLookup</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="155.5098" x="1563.56" y="702"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5098" x="1568.56" y="725.7803">RejectUnsupportedDrift</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="90.165" x="1596.23" y="541"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.165" x="1601.23" y="564.7803">ApplyUpdate</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="101.8477" x="2330.1" y="828"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2335.1" y="851.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3444.73" y="776"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3449.73" y="799.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="2950.28" y="776"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="2955.28" y="799.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="800" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="55" id="ent0003"><path d="M2204.78,49 L2204.78,516.2 L2039.1,617.56 L2204.78,524.2 L2204.78,785 A8,8 0 0 0 2212.78,793 L2549.2614,793 A8,8 0 0 0 2557.2614,785 L2557.2614,51 L2547.2614,41 L2212.78,41 A8,8 0 0 0 2204.78,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2547.2614,41 L2547.2614,47 A4,4 0 0 0 2551.2614,51 L2557.2614,51 L2547.2614,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2210.78" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2210.78" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2210.78" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2210.78" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2210.78" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2210.78" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2210.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2210.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2210.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3994" x="2210.78" y="182.7803">service: generativeai</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="2210.78" y="196.7803">slug: model</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="2210.78" y="210.7803">kind: Model</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2210.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2210.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2210.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="2210.78" y="266.7803">requeue: provisioning, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2607" x="2210.78" y="280.7803">provider states: create CREATING; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0479" x="2210.78" y="294.7803">delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="2210.78" y="308.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.499" x="2210.78" y="322.7803">display_name, freeform_tags (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2210.78" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="316.7568" x="2210.78" y="350.7803">base_model_id, compartment_id, fine_tune_details</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2210.78" y="364.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="2210.78" y="378.7803">list lookup: oci_generative_ai_models filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.0059" x="2210.78" y="392.7803">compartment_id, base_model_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7432" x="2210.78" y="406.7803">fine_tune_details.dedicated_ai_cluster_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.4229" x="2210.78" y="420.7803">display_name (+1 more); exact compartmentId plus</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.4131" x="2210.78" y="434.7803">baseModelId and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0264" x="2210.78" y="448.7803">fineTuneDetails.dedicatedAiClusterId, with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="2210.78" y="462.7803">displayName required when populated; blank</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="155.6201" x="2210.78" y="476.7803">displayName skips reuse</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2210.78" y="490.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2210.78" y="504.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.7227" x="2210.78" y="518.7803">The generated runtime scopes ListModels by the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7363" x="2210.78" y="532.7803">required compartment and only binds a unique</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.1504" x="2210.78" y="546.7803">returned model that matches baseModelId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9502" x="2210.78" y="560.7803">fineTuneDetails.dedicatedAiClusterId, and any</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.2061" x="2210.78" y="574.7803">populated displayName.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8887" x="2210.78" y="588.7803">A service-local wrapper skips pre-create reuse</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="2210.78" y="602.7803">when displayName is empty and clears stale</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="2210.78" y="616.7803">tracked IDs before recreating so create never</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.123" x="2210.78" y="630.7803">guesses across older fine-tune jobs.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1641" x="2210.78" y="644.7803">Create and update use read-after-write follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9365" x="2210.78" y="658.7803">through GetModel before the controller reports</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9844" x="2210.78" y="672.7803">steady state; the vendored SDK does not expose a</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4404" x="2210.78" y="686.7803">separate UPDATING lifecycle enum for Model.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="2210.78" y="700.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.3643" x="2210.78" y="714.7803">description, vendor, version, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2881" x="2210.78" y="728.7803">definedTags; compartmentId, baseModelId, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5645" x="2210.78" y="742.7803">fineTuneDetails require replacement.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0195" x="2210.78" y="756.7803">Delete retains the finalizer until GetModel</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5576" x="2210.78" y="770.7803">confirms DELETED or OCI no longer returns the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="42.0205" x="2210.78" y="784.7803">model.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="110" id="ent0006"><path d="M2892.27,859 L2892.27,866.98 L2432.25,850.26 L2892.27,874.98 L2892.27,895 A8,8 0 0 0 2900.27,903 L3152.7309,903 A8,8 0 0 0 3160.7309,895 L3160.7309,861 L3150.7309,851 L2900.27,851 A8,8 0 0 0 2892.27,859" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3150.7309,851 L3150.7309,857 A4,4 0 0 0 3154.7309,861 L3160.7309,861 L3150.7309,851" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2898.27" y="866.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4609" x="2898.27" y="880.7803">delete observe: GetModel or ListModels</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2898.27" y="894.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.39,800 C49.1,800 103.44,800 161.61,800" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="167.61,800,158.61,796,162.61,800,158.61,804,167.61,800" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.1514" x="57" y="795.7803">CreateModel</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="33" id="lnk4"><path d="M432.64,784.05 C523.55,773.01 634.3337,759.5731 704.1837,751.0931" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="710.14,750.37,700.7235,747.4838,705.1764,750.9726,701.6877,755.4255,710.14,750.37" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLeng