-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3994" x="359.7124" y="1098.7803">service: generativeai</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.8682" x="359.7124" y="1112.7803">slug: generativeaimodels</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.5234" x="359.7124" y="1126.7803">kind: GenerativeAiModels</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="359.7124" y="1140.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="359.7124" y="1154.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="359.7124" y="1168.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="359.7124" y="1182.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.6816" x="359.7124" y="1196.7803">provider states: create PROVISIONING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="359.7124" y="1210.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="319.04" x="359.7124" y="1224.7803">mutable/forceNew: display_name / compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="359.7124" y="1238.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.9023" x="359.7124" y="1252.7803">Scaffold metadata only; replace with</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3232" x="359.7124" y="1266.7803">controller-specific runtime states before</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="359.7124" y="1280.7803">promotion.</text><ellipse cx="322.7124" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="322.7124" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="322.7124" x2="322.7124" y1="65" y2="85"/><polygon fill="#0F172A" points="318.7124,75,322.7124,85,326.7124,75,322.7124,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="322.7124" x2="322.7124" y1="133" y2="153"/><polygon fill="#0F172A" points="318.7124,143,322.7124,153,326.7124,143,322.7124,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="322.7124" x2="322.7124" y1="201" y2="221"/><polygon fill="#0F172A" points="318.7124,211,322.7124,221,326.7124,211,322.7124,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="322.7124" x2="322.7124" y1="269" y2="289"/><polygon fill="#0F172A" points="318.7124,279,322.7124,289,326.7124,279,322.7124,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="162.6372" x2="162.6372" y1="439" y2="459"/><polygon fill="#0F172A" points="158.6372,449,162.6372,459,166.6372,449,162.6372,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="257.0229" x2="162.6372" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="162.6372" x2="162.6372" y1="383" y2="405"/><polygon fill="#0F172A" points="158.6372,395,162.6372,405,166.6372,395,162.6372,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="388.4019" x2="482.7