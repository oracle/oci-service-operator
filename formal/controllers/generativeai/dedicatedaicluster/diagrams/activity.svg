91.0469" x="689.2488" y="1897.2803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="689.2488" y="1911.2803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3994" x="689.2488" y="1925.2803">service: generativeai</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="146.3096" x="689.2488" y="1939.2803">slug: dedicatedaicluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2959" x="689.2488" y="1953.2803">kind: DedicatedAiCluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="689.2488" y="1967.2803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="689.2488" y="1981.2803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="689.2488" y="1995.2803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="689.2488" y="2009.2803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="689.2488" y="2023.2803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="689.2488" y="2037.2803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="689.2488" y="2051.2803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.499" x="689.2488" y="2065.2803">display_name, freeform_tags (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="689.2488" y="2079.2803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="689.2488" y="2093.2803">compartment_id, type, unit_shape</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="689.2488" y="2107.2803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="689.2488" y="2121.2803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2881" x="689.2488" y="2135.2803">oci_generative_ai_dedicated_ai_clusters filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3506" x="689.2488" y="2149.2803">compartment_id, display_name, id, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="689.2488" y="2163.2803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="689.2488" y="2177.2803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.0264" x="689.2488" y="2191.2803">The generated runtime binds by exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.9297" x="689.2488" y="2205.2803">compartmentId plus displayName when displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8057" x="689.2488" y="2219.2803">is provided and no OCI identifier is already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.7998" x="689.2488" y="2233.2803">tracked.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8887" x="689.2488" y="2247.2803">A service-local wrapper skips pre-create reuse</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="689.2488" y="2261.2803">when displayName is empty and clears stale</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="689.2488" y="2275.2803">tracked IDs before recreating so create never</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5508" x="689.2488" y="2289.2803">falls back to compartment-wide matching.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="689.2488" y="2303.2803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="689.2488" y="2317.2803">description, unitCount, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.5293" x="689.2488" y="2331.2803">definedTags; compartmentId, type, and unitShape</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7021" x="689.2488" y="2345.2803">require replacement in the checked-in runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4336" x="689.2488" y="2359.2803">Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.2266" x="689.2488" y="2373.2803">GetDedicatedAiCluster confirms DELETED or OCI no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9785" x="689.2488" y="2387.2803">longer returns the resource.</text><ellipse cx="652.2488" cy="2075.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="652.2488" cy="2075.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="652.2488" x2="652.2488" y1="157" y2="177"/><polygon fill="#0F172A" points="648.2488,167,652.2488,177,656.2488,167,652.2488,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="803.7146" x2="803.7146" y1="341" y2="361"/><polygon fill="#0F172A" points="799.7146,351,803.7146,361,807.7146,351,803.7146,355" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="803.7146" x2="803.7146" y1="423" y2="443"/><polygon fill="#0F172A" points="799.7146,433,803.7146,443,807.7146,433,803.7146,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="510.783" x2="500.783" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="500.783" x2="500.783" y1="257" y2="279"/><polygon fill="#0F172A" points="496.783,269,500.783,279,504.783,269,500.783,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="793.7146" x2="803.7146" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="803.7146" x2="803.7146" y1="257" y2="279"/><polygon fill="#0F172A" points="799.7146,269,803.7146,279,807.7146,269,803.7146,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="500.783" x2="500.783" y1="327" y2="509"/><line style="stroke:#0F172A;stroke-width:1;" x1="500.783" x2="640.2488" y1="509" y2="509"/><polygon fill="#0F172A" points="630.2488,505,640.2488,509,630.2488,513,634.2488,509" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="803.7146" x2="803.7146" y1="4