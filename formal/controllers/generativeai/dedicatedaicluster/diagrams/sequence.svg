155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2959" x="823" y="1793.7803">kind: DedicatedAiCluster</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="823" y="1807.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="823" y="1821.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="823" y="1835.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="823" y="1849.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="823" y="1863.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="823" y="1877.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.8262" x="823" y="1891.7803">supported drift: defined_tags, description,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.499" x="823" y="1905.7803">display_name, freeform_tags (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="823" y="1919.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.9023" x="823" y="1933.7803">compartment_id, type, unit_shape</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="823" y="1947.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="823" y="1961.7803">list lookup:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2881" x="823" y="1975.7803">oci_generative_ai_dedicated_ai_clusters filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.3506" x="823" y="1989.7803">compartment_id, display_name, id, state</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="823" y="2003.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="823" y="2017.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.0264" x="823" y="2031.7803">The generated runtime binds by exact</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.9297" x="823" y="2045.7803">compartmentId plus displayName when displayName</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8057" x="823" y="2059.7803">is provided and no OCI identifier is already</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="49.7998" x="823" y="2073.7803">tracked.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.8887" x="823" y="2087.7803">A service-local wrapper skips pre-create reuse</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2402" x="823" y="2101.7803">when displayName is empty and clears stale</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.916" x="823" y="2115.7803">tracked IDs before recreating so create never</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5508" x="823" y="2129.7803">falls back to compartment-wide matching.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2539" x="823" y="2143.7803">In-place updates are limited to displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5781" x="823" y="2157.7803">description, unitCount, freeformTags, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="310.5293" x="823" y="2171.7803">definedTags; compartmentId, type, and unitShape</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7021" x="823" y="2185.7803">require replacement in the checked-in runtime.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4336" x="823" y="2199.7803">Delete retains the finalizer until</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="332.2266" x="823" y="2213.7803">GetDedicatedAiCluster confirms DELETED or OCI no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.9785" x="823" y="2227.7803">longer returns the resource.</text><?plantuml-src hLXTRnit5dtdho2wBodgiUCcQLC5MI2rqzIejodYz4s0GSrm9Auvv2p9aUfTzB_tN7wCHhAKkEr23z8CoVjvxhcNydVAzCA9ZlkLQEn6cILlXVQI-N5b8UgxfRE3QIwijex_ewtnQIOx6jcAGOSVh0a_Yqxo7wLUow1gSNZFZVglvEVF9ul2ERl9qf-svzz-FJrfR93VFx2XRRzjljdVPLqZNTwnUFxYsTFlzdQG-hp-xDdpynSl9kjHV6sTaOwVVyE22bho6_cVGPfQyeel9LP4K6ifrDcbRE1VaCqRTQ477wHZAzL8tbeR5lQtYLXV9FoFSIxgODsEcTdTihJlf_nQlcoVOXd2457L2nCEdvzkU8oKIIX66LgrybgPtK1-zrmyMxp4AediTvRgHVD2dezB3vBqiXLjpNvdqJV-qx2GY6wGdatiu1Smn5cj4SBfw--5bnzaRKsjzfU-U7_p_gSRwTQgblyIHYob-u8BptTVxHnvVt75203Shf7UNTadU-TG2aust4blzH2KDRFywgnHOecS-hFqN6stL2NDftwzB18QgU7jqTDfUVUaD4q4Aji6YrV_dCHengN1_a7o