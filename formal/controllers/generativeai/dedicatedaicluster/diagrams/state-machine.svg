<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="779px" preserveAspectRatio="none" style="width:3626px;height:779px;background:#FCFCFD;" version="1.1" viewBox="0 0 3626 779" width="3626px" zoomAndPan="magnify"><title>State Machine - generativeai/DedicatedAiCluster</title><defs/><g><rect fill="#FCFCFD" height="779" style="stroke:none;stroke-width:1;" width="3626" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="321.3232" x="1645.3813" y="20.7803">State Machine - generativeai/DedicatedAiCluster</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="249" y="629"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="249" x2="513.3643" y1="653" y2="653"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="354.7271" y="644.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="254" y="668.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="254" y="682.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1310.36" y="472"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1315.36" y="495.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2069.32" y="472"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2074.32" y="495.7803">Ready</text><rect fill="#F8FAFC" he