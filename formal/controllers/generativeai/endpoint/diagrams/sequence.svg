cing" textLength="128.3994" x="758" y="1793.7803">service: generativeai</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.1787" x="758" y="1807.7803">slug: endpoint</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.7305" x="758" y="1821.7803">kind: Endpoint</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="758" y="1835.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="758" y="1849.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="758" y="1863.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="758" y="1877.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="758" y="1891.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="758" y="1905.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.0605" x="758" y="1919.7803">supported drift: content_moderation_config,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.3398" x="758" y="1933.7803">defined_tags, description, display_name (+1</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5586" x="758" y="1947.7803">more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="758" y="1961.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1504" x="758" y="1975.7803">compartment_id, dedicated_ai_cluster_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="56.8135" x="758" y="1989.7803">model_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="758" y="2003.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="285.6191" x="758" y="2017.7803">list lookup: oci_generative_ai_endpoints filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1504" x="758" y="2031.7803">compartment_id, dedicated_ai_cluster_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.0234" x="758" y="2045.7803">display_name, id (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="758" y="2059.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="758" y="2073.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3711" x="758" y="2087.7803">The generated runtime reuses an existing</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="295.7295" x="758" y="2101.7803">endpoint by listing on the required compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="303.502" x="758" y="2115.7803">scope, then matching returned items on modelId,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1777" x="758" y="2129.7803">dedicatedAiClusterId, and any populated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="171.1992" x="758" y="2143.7803">displayName before create.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4336" x="758" y="2157.7803">Ready state maps to OCI ACTIVE, while CREATING,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.9092" x="758" y="2171.7803">UPDATING, and DELETING keep the controller on</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3848" x="758" y="2185.7803">the generated lifecycle requeue path.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.5508" x="758" y="2199.7803">In-place updates are limited to</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0264" x="758" y="2213.7803">contentModerationConfig, displayName,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7021" x="758" y="2227.7803">description, freeformTags, and definedTags;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="315.1709" x="758" y="2241.7803">compartmentId, modelId, and dedicatedAiClusterId</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3994" x="758" y="2255.7803">require replacement.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1641" x="758" y="2269.7803">Create and update use read-after-write follow-up</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.6123" x="758" y="2283.7803">through GetEndpoint before the controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.8408" x="758" y="2297.7803">reports steady state.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="758" y="2311.7803">Delete retains the finalizer until GetEndpoint</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.5576" x="758" y="2325.7803">confirms DELETED or OCI no longer returns the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="57.6064" x="758" y="2339.7803">endpoint.</text><?plantuml-src jLXhRoCr5_xkNs71brsHjDkzm9BLljBI5gWeBDekVAfKEJEUn6zdxC7s90J4V-SvlimbRI02eNveuikvFkSvnt7tIhV2YeQxjIZDLkaLhqJj97Fzpb8KzojhEbsUczfO_cbLuAySdIXb9RhQVssq_q4qadyhwutqgX2FdxbHlqb-zdAqAQmrsoJzMNNsnVFnJMsy_Eg13LNrHVdv_YbZIsdJYUNBLo-UVRbtWjId_HSlNfwzUZNQ3-8BOxMq_EnpvfMl9R-HltHI5vBF-KfYHtYraKATNkgoDKfxjbQbv9KnVcb-7Gbp-TxlZ7DHU6CdnYKdyzQ-T_AvV5qzmpQ48Owg5Te_Vdzyu1Wfem3qCcfLoMkbf-7xygLuiNoDNHBPJhQAPVbAdlLR3rBpkX9LmVvWmJV-NRUKYAcNZetiuESmn9gwbdQo_9LmyeCiZ2xK_jOdxs_UVtSZxKOLydkXnKhQJxXmVBeqkVB-_8fHshdP8AbJsREzUoW0AqjkfJDrvvNHYxHqMYgnGaxTQVm-7uxCSvfFt6QL9PIoXhS7RyVjwKsfom1FDWIBp_ytYj62IutpdUGPU30qUSA6OtHfwkM2zv-VM5Bf_5CsFKANfh5O3CBXZLFaLG_ua7H-RSmz_WaOlbIwPABst5j00KUHTFbhMoC98GCS5Q9HJJikQYj5kSEkSjwngL8o0wSN_1lfUsKILDJBxUKennlb7CZga8nhACX2t9DArLvQjxZLXMa87mq4tQboTgjBMOAdl2plXBehwixXODfHhgt5xaw3qMRGpPzyzfmtnigdJuEtLdPEB14XSf4WqLcKEqn38a48g8T3nfqZ2bxsFjR6jBm8Qxm54eY3ppzSlljuzSCtHyK8caAS7hVe7mJz4TCV0LQBa49ah9WDyZF9jTBSUU4x5yHHm2BmUKAXB1EIBiBo8RlYRc_QWLCmgbAsoIesIemT0Y1lzGGHCURfT8xvnUNrvP4n9uXF1MOdYreA3Qzme59Qr6Xr5YvZrGLmB6j3M3uclbPwWIWcAocOCjGRrkqkPZpj4Qhn0OJ4pT91yh4Aebc3eQ82_1zAZH3BCACqHslWJp26G7USmiXXsxNgKTh0HmUqtEgC-Hd_wSUBzAdFIT1Se_ScrIGAlEHWlApBkTY2Mr6pLbMUouseEn4CJn0Bosi4hoRE63h2rEOPjOkRhcsD1JnvrvQaoNMs4WNu77vuuet6b64ECFeku6ure-46_REyysBbPWoKMLZLqWbiZMW4578MAOHzaF-NXUTBMU4hRpfoQW7QGCNEjTn6jnpRuoj-YAuO6LNZ4ql4d2cFxqbWXoHC39snCTyDxScqVcGZC4u10D5xgfyOV62Y17eAVom6nt4WI8HOPD2HGjTdXBQ8t_vUKohPTs