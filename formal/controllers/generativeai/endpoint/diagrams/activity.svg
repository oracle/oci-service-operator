48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="251.1299" x="384.3516" y="829"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="231.1299" x="394.3516" y="849.7803">Stay blocked until cleanup or finalizer</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9512" x="394.3516" y="863.7803">release succeeds</text><polygon fill="#E2E8F0" points="339.7441,883,351.7441,895,339.7441,907,327.7441,895,339.7441,883" style="stroke:#1D4ED8;stroke-width:0.5;"/><ellipse cx="339.7441" cy="964.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="339.7441" cy="964.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="none" height="427.5" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="392.5713" x="789.491" y="587"/><path d="M940.325,587 L940.325,594 L930.325,604 L789.491,604" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="140.834" x="792.491" y="598.7803">Lifecycle Classification</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="340.5713" x="809.491" y="670"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.5713" x="819.491" y="690.7803">Request requeue while OCI remains in CREATING,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="150.1309" x="819.491" y="704.7803">UPDATING, DELETING</text><ellipse cx="979.7766" cy="764" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="979.7766" cy="764" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="893.4934,621,1066.0598,621,1078.0598,633,1066.0598,645,893.4934,645,881.4934,633,893.4934,621" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="983.7766" y="655.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="172.5664" x="893.4934" y="636.7803">"OCI state in retryable set?"</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.916" x="832.8186" y="884"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.916" x="842.8186" y="904.7803">Return an unsuccessful reconcile result until</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="133.041" x="842.8186" y="918.7803">OCI reaches ACTIVE</text><ellipse cx="979.7766" cy="969.5" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="979.7766" cy="969.5" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="859.2556,835,1100.2976,835,1112.2976,847,1100.2976,859,859.2556,859,847.2556,847,859.2556,835" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="983.7766" y="869.7803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.042" x="859.2556" y="850.7803">"OCI state is outside success targets?"</text><rect fill="none" height="721" rx="8" ry="8" style="stroke:#000000;stroke-width:1.5;" width="550.3975" x="675.4814" y="1024.5"/><path d="M841.9014,1024.5 L841.9014,1031.5 L831.9014,1041.5 L675.4814,1041.5" fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="678.4814" y="1036.2803">Ready and Drift Handling</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="237.8818" x=