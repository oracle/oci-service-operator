.8716" y="241.7803">Resolve OCI state via GetOspGatewayInvoices</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.2129" x="181.8716" y="255.7803">with ListOspGatewayInvoices fallback</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="317.2402" x="170.313" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.6191" x="180.313" y="309.7803">Use scaffold_ospgateway_ospgatewayinvoices</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2402" x="180.313" y="323.7803">filters compartment_id, state when OCID lookup</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9023" x="180.313" y="337.7803">or bind-versus-create needs list resolution</text><polygon fill="#E2E8F0" points="275.2437,371,382.6226,371,394.6226,383,382.6226,395,275.2437,395,263.2437,383,275.2437,371" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="275.2437" y="386.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="241.4575" y="379.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="394.6226" y="379.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="309.4951" x="11" y="405"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.4951" x="21" y="425.7803">Update path calls UpdateOspGatewayInvoices</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="266.7021" x="32.3965" y="459"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAd