cing" textLength="287.9229" x="2270.78" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2270.78" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2270.78" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9102" x="2270.78" y="182.7803">service: self</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.165" x="2270.78" y="196.7803">slug: subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="110.5029" x="2270.78" y="210.7803">kind: Subscription</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2270.78" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2270.78" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2270.78" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2270.78" y="266.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.1855" x="2270.78" y="280.7803">provider states: create CREATED,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="343.0547" x="2270.78" y="294.7803">PENDING_ACTIVATION, PROVISIONING_STARTED,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="370.3438" x="2270.78" y="308.7803">PROVISIONING_COMPLETED; update UPDATING; delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="70.0137" x="2270.78" y="322.7803">DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.7021" x="2270.78" y="336.7803">supported drift: display_name, freeform_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.1787" x="2270.78" y="350.7803">defined_tags</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2270.78" y="364.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8398" x="2270.78" y="378.7803">compartment_id, tenant_id, seller_id, product_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="61.0723" x="2270.78" y="392.7803">(+5 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="144.751" x="2270.78" y="406.7803">create-only fields: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3301" x="2270.78" y="420.7803">list lookup: oci_self_subscriptions filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="2270.78" y="434.7803">compartment_id, display_name, id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.0479" x="2270.78" y="448.7803">lifecycle_details</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2270.78" y="462.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="2270.78" y="476.7803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.916" x="2270.78" y="490.7803">Create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5918" x="2270.78" y="504.7803">workrequest-backed and re-enter through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8193" x="2270.78" y="518.7803">GetWorkRequest before rereading Subscription.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="2270.78" y="532.7803">Provisioning, update, and delete confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.123" x="2270.78" y="546.7803">classification uses lifecycleDetails because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7852" x="2270.78" y="560.7803">coarse lifecycleState is too coarse for SELF</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5928" x="2270.78" y="574.7803">subscriptions.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.916" x="2270.78" y="588.7803">Keep the SELF subscription rollout distinct from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4609" x="2270.78" y="602.7803">ons/Subscription in shared formal surfaces.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="97" id="ent0006"><path d="M2991.13,670 L2991.13,685.07 L2511.73,668.19 L2991.13,693.07 L2991.13,720 A8,8 0 0 0 2999.13,728 L3256.2052,728 A8,8 0 0 0 3264.2052,720 L3264.2052,672 L3254.2052,662 L2999.13,662 A8,8 0 0 0 2991.13,670" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5