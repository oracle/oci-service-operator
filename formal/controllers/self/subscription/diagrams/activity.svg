55" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3301" x="691.9746" y="2272.7803">list lookup: oci_self_subscriptions filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="691.9746" y="2286.7803">compartment_id, display_name, id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="98.0479" x="691.9746" y="2300.7803">lifecycle_details</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="691.9746" y="2314.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9785" x="691.9746" y="2328.7803">open gaps: drift-guard</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.916" x="691.9746" y="2342.7803">Create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5918" x="691.9746" y="2356.7803">workrequest-backed and re-enter through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8193" x="691.9746" y="2370.7803">GetWorkRequest before rereading Subscription.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="691.9746" y="2384.7803">Provisioning, update, and delete confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.123" x="691.9746" y="2398.7803">classification uses lifecycleDetails because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7852" x="691.9746" y="2412.7803">coarse lifecycleState is too coarse for SELF</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5928" x="691.9746" y="2426.7803">subscriptions.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.916" x="691.9746" y="2440.7803">Keep the SELF subscription rollout distinct from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4609" x="691.9746" y="2454.7803">ons/Subscription in shared formal surfaces.</text><ellipse cx="654.9746" cy="2164" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="654.9746" cy="2164" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="654.9746" x2="654.9746" y1="157" y2="177"/><polygon fill="#0F172A" points="650.9746,167,654.9746,177,658.9746,167,654.9746,171" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="806.4404" x2="806.4404" y1="355" y2="375"/><polygon fill="#0F172A" points="802.4404,365,806.4404,375,810.4404,365,806.4404,369" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="806.4404" x2="806.4404" y1="423" y2="443"/><polygon fill="#0F172A" points="802.4404,433,806.4404,443,810.4404,433,806.4404,437" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="513.5088" x2="503.5088" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="503.5088" x2="503.5088" y1="257" y2="279"/><polygon fill="#0F172A" points="499.5088,269,503.5088,279,507.5088,269,503.5088,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="796.4404" x2="806.4404" y1="257" y2="257"/><line style="stroke:#0F172A;stroke-width:1;" x1="806.4404" x2="806.4404" y1="257" y2="279"/><polygon fill="#0F172A" points="802.4404,269,806.4404,279,810.4404,269,806.4404,273" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="503.5088" x2="503.5088" y1="327" y2="509"/><line style="stroke:#0F172A;str