e="14" lengthAdjust="spacing" textLength="189.916" x="799" y="2128.7803">Create, update, and delete are</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="257.5918" x="799" y="2142.7803">workrequest-backed and re-enter through</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.8193" x="799" y="2156.7803">GetWorkRequest before rereading Subscription.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="799" y="2170.7803">Provisioning, update, and delete confirmation</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="266.123" x="799" y="2184.7803">classification uses lifecycleDetails because</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="270.7852" x="799" y="2198.7803">coarse lifecycleState is too coarse for SELF</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="85.5928" x="799" y="2212.7803">subscriptions.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.916" x="799" y="2226.7803">Keep the SELF subscription rollout distinct from</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="268.4609" x="799" y="2240.7803">ons/Subscription in shared formal surfaces.</text><?plantuml-src hLXRSnir57xNhz30Ipl4ITCsKDm9Co49a6beEd6XBvx9oBjdRT6rj4XQcy3mt_bqM-_Q3WsNwKFMkfphzvrpLFjHgaOOiUHs8KgzbchEAr5ROhRRcOdYuzpeLfNdkjQ6VruL-5VsJfHKYRPstsdbteebyH-eNf6JXTX_PY9_9txyihSfZD7h9FrPTVpLy_vDfHrzksD3LNrLVhbzIfkIJ3enUtdoujdNMoUy-hJ_uiNBuvEJtduGNsYZoF3ZBvcJhYO-eLzRKWNn4RTKLqUJTcOB8nidjM8BMHAlj7Op_LjFaCrt_c2SYy9fCp0iEPYtjZsZv_IgUePj24CCPIEKst-_V-0nKdhETp9gMT6rLCFGVVrIl9YzmguNsGosYbbvGiVTravQNbMYAjYVBFZ6txGpGZmTMTQpWv_34AFhcinW-LjXwPOAhGgvlVNPpUJcpOJCIXRqer1YJkOpBYmVBWskt9nVCPzohbT8