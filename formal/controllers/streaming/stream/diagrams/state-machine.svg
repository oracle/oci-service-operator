" width="101.8477" x="2743.41" y="702"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2748.41" y="725.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3872.02" y="636"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3877.02" y="659.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="3370.59" y="636"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3375.59" y="659.7803">DeleteCleanupBlocked</text><g class="start_entity" data-qualified-name=".start." data-source-line="34" id="ent0002"><ellipse cx="16" cy="674" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="60" id="ent0003"><path d="M2618.09,49 L2618.09,389.11 L2427.68,435.49 L2618.09,397.11 L2618.09,659 A8,8 0 0 0 2626.09,667 L2962.5714,667 A8,8 0 0 0 2970.5714,659 L2970.5714,51 L2960.5714,41 L2626.09,41 A8,8 0 0 0 2618.09,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2960.5714,41 L2960.5714,47 A4,4 0 0 0 2964.5714,51 L2970.5714,51 L2960.5714,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2624.09" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2624.09" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2624.09" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2624.09" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2624.09" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2624.09" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2624.09" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2624.09" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2624.09" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.5928" x="2624.09" y="182.7803">service: streaming</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.248" x="2624.09" y="196.7803">slug: stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5859" x="2624.09" y="210.7803">kind: Stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2624.09" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="2624.09" y="238.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2624.09" y="252.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2624.09" y="266.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2624.09" y="280.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4951" x="2624.09" y="294.7803">supported drift: defined_tags, freeform_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="95.7236" x="2624.09" y="308.7803">stream_pool_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1299" x="2624.09" y="322.7803">reject before mutate: force-new fields name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5576" x="2624.09" y="336.7803">partitions, retention_in_hours</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.0957" x="2624.09" y="350.7803">list lookup: oci_streaming_streams filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.9473" x="2624.09" y="364.7803">compartment_id, id, name, state (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2624.09" y="378.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2624.09" y="392.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="2624.09" y="406.7803">The generated runtime reuses existing streams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1504" x="2624.09" y="420.7803">before create by listing on name plus the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2539" x="2624.09" y="434.7803">optional pool and compartment filters, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6885" x="2624.09" y="448.7803">delete-phase lookup can still resolve</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3506" x="2624.09" y="462.7803">terminating or failed matches when no OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9512" x="2624.09" y="476.7803">identifier is recorded.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="2624.09" y="490.7803">A narrow package-local companion writes or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9502" x="2624.09" y="504.7803">updates the ready-only endpoint secret after</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.1367" x="2624.09" y="518.7803">ACTIVE when the same-name Secret already carries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6953" x="2624.09" y="532.7803">the current Stream UID ownership label, or when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0674" x="2624.09" y="546.7803">a legacy unlabeled Secret already matches the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="2624.09" y="560.7803">desired ready-only payload so reconcile can</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="2624.09" y="574.7803">stamp the current UID label before future</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="288.7568" x="2624.09" y="588.7803">updates. Guarded update or delete revalidates</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6191" x="2624.09" y="602.7803">the full Secret snapshot before mutating, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2624.09" y="616.7803">best-effort delete cleanup skips missing or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="2624.09" y="630.7803">unowned Secrets.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="323.6611" x="2624.09" y="644.7803">Delete remains best-effort; DELETING or DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.1787" x="2624.09" y="658.7803">is sufficient for finalizer removal.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="106" id="ent0006"><path d="M3305.58,719 L3305.58,740.73 L2845.56,724.24 L3305.58,748.73 L3305.58,783 A8,8 0 0 0 3313.58,791 L3580.0273,791 A8,8 0 0 0 3588.0273,783 L3588.0273,721 L3578.0273,711 L3313.58,711 A8,8 0 0 0 3305.58,719" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3578.0273,711 L3578.0273,717 A4,4 0 0 0 3582.0273,721 L3588.0273,721 L3578.0273,711" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="148.6338" x="3311.58" y="726.7803">delete policy: best-effort</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4473" x="3311.58" y="740.7803">delete observe: GetStream or ListStreams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="3311.58" y="754.7803">delete targets: DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2197" x="3311.58" y="768.7803">Secret cleanup waits for OCI delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="80.1445" x="3311.58" y="782.7803">confirmation.</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="34" id="lnk3"><path d="M26.29,674 C49.74,674 107.76,674 168.66,674" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="174.66,674,165.66,670,169.66,674,165.66,678,174.66,674" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.1445" x="57" y="669.7803">CreateStream</text></g><!--link observe to resolve_by_lookup--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="35" id="lnk4"><path d="M439.64,657.21 C530.55,645.59 641.3383,631.44 711.1883,622.52" fill="none" id="observe-to-resolve_by_lookup" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="717.14,621.76,707.7058,618.9323,712.1803,622.3934,708.7192,626.8678,717.14,621.76" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="145.5029" x="470.36" y="630.9003">tracked identity missing</text></g><!--link resolve_by_lookup to evaluate_ready--><g class="link" data-entity-1="ent0007" data-entity-2="ent0003" data-link-type="dependency" data-source-line="36" id="lnk5"><path d="M840.69,599.73 C870.89,592.82 907.97,584.62 941.36,578 C1058.62,554.77 1090.75,562.37 1206.36,532 C1216.09,529.44 1220.632,528.1791 1230.412,524.8391" fill="none" id="resolve_by_lookup-to-evaluate_ready" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" poin