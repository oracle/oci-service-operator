<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="821px" preserveAspectRatio="none" style="width:3960px;height:821px;background:#FCFCFD;" version="1.1" viewBox="0 0 3960 821" width="3960px" zoomAndPan="magnify"><title>State Machine - streaming/Stream</title><defs/><g><rect fill="#FCFCFD" height="821" style="stroke:none;stroke-width:1;" width="3960" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="224.8477" x="1860.9441" y="20.7803">State Machine - streaming/Stream</text></g><g><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="264.3643" x="175" y="657"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="175" x2="439.3643" y1="681" y2="681"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="52.9102" x="280.7271" y="672.7803">Observe</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="244.3643" x="180" y="696.7803">read spec, tracked status, delete intent,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.2822" x="180" y="710.7803">and current OCI lifecycle</text></g><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="104.9512" x="1236.36" y="497"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.9512" x="1241.36" y="520.7803">EvaluateReady</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="50.4688" x="2376.73" y="435"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="40.4688" x="2381.73" y="458.7803">Ready</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style=