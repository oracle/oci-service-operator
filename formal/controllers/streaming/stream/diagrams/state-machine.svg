<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1077px" preserveAspectRatio="none" style="width:758px;height:1077px;background:#FCFCFD;" version="1.1" viewBox="0 0 758 1077" width="758px" zoomAndPan="magnify"><title>State Machine - streaming/Stream</title><defs/><g><rect fill="#FCFCFD" height="1077" style="stroke:none;stroke-width:1;" width="758" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="224.8477" x="259.9285" y="20.7803">State Machine - streaming/Stream</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="150.6963" x="320.84" y="137"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="320.84" x2="471.5363" y1="175" y2="175"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.71" x="330.84" y="152.7803">provisioning</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.6963" x="330.84" y="166.7803">provider: CREATING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="128.9238" x="79.72" y="453"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="79.72" x2="208.6438" y1="491" y2="491"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="36.5723" x="89.72" y="468.7803">active</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="108.9238" x="89.72" y="482.7803">provider: ACTIVE</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="150.6963" x="224.84" y="783"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="224.84" x2="375.5363" y1="821" y2="821"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="53.7168" x="234.84" y="798.7803">updating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="130.6963" x="234.84" y="812.7803">provider: UPDATING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="148.3721" x="7" y="783"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="7" x2="155.3721" y1="821" y2="821"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="69.2549" x="17" y="798.7803">terminating</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="128.3721" x="17" y="812.7803">provider: DELETING</text></g><g><rect fill="#F8FAFC" height="50" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="253.4678" x="177.45" y="923"/><line style="stroke:#0F172A;stroke-width:0.5;" x1="177.45" x2="430.9178" y1="961" y2="961"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="33.4688" x="187.45" y="938.7803">failed</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.4678" x="187.45" y="952.7803">provider: repo-authored failure bucket</text></g><ellipse cx="396.19" cy="51" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="96.19" cy="1060" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="96.19" cy="1060" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="34" id="ent0003"><path d="M243.95,271 L243.95,474 L209.14,478 L243.95,482 L243.95,685 A8,8 0 0 0 251.95,693 L588.4314,693 A8,8 0 0 0 596.4314,685 L596.4314,273 L586.4314,263 L251.95,263 A8,8 0 0 0 243.95,271" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M586.4314,263 L586.4314,269 A4,4 0 0 0 590.4314,273 L596.4314,273 L586.4314,263" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="249.95" y="278.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="249.95" y="292.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="249.95" y="306.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="249.95" y="320.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="249.95" y="334.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2813" x="249.95" y="348.7803">archetype batch: Legacy-adapter controllers map</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7988" x="249.95" y="362.7803">provider states into the shared controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2949" x="249.95" y="376.7803">phases while open gaps keep additional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="114.3789" x="249.95" y="390.7803">transitions explicit.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.5928" x="249.95" y="404.7803">service: streaming</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.248" x="249.95" y="418.7803">slug: stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5859" x="249.95" y="432.7803">kind: Stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="249.95" y="446.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="249.95" y="460.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="249.95" y="474.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="249.95" y="488.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="249.95" y="502.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.833" x="249.95" y="516.7803">mutable/forceNew: compartment_id, defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="249.95" y="530.7803">freeform_tags, stream_pool_id / name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5576" x="249.95" y="544.7803">partitions, retention_in_hours</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="249.95" y="558.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="249.95" y="572.7803">delete-confirmation, endpoint-materialization,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.3818" x="249.95" y="586.7803">legacy-adapter, list-lookup (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6465" x="249.95" y="600.7803">Create or bind selection depends on name-based</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1641" x="249.95" y="614.7803">list lookup with optional pool and compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="37.3379" x="249.95" y="628.7803">filters.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6123" x="249.95" y="642.7803">Endpoint secret materialization happens only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3584" x="249.95" y="656.7803">after ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="249.95" y="670.7803">Delete is best-effort today; DELETING is treated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0332" x="249.95" y="684.7803">as sufficient for cleanup and finalizer removal.</text></g><!--link *start* to provisioning--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="23" id="lnk3"><path d="M396.19,61.29 C396.19,77.87 396.19,107.03 396.19,130.85" fill="none" id="*start*-to-provisioning" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="396.19,136.85,400.19,127.85,396.19,131.85,392.19,127.85,396.19,136.85" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.1445" x="397.19" y="102.7803">CreateStream</text></g><!--link provisioning to active--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="24" id="lnk4"><path d="M333.67,187.33 C298,203.96 254.84,229.16 226.19,26