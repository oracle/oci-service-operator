A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.8477" x="2766.41" y="627.7803">DeletePending</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="58.2549" x="3890.02" y="538"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="48.2549" x="3895.02" y="561.7803">Deleted</text><rect fill="#F8FAFC" height="40" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="152.4268" x="3388.59" y="538"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="142.4268" x="3393.59" y="561.7803">DeleteCleanupBlocked</text><ellipse cx="16" cy="550" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="60" id="ent0003"><path d="M2636.09,49 L2636.09,302.35 L2445.68,307.81 L2636.09,310.35 L2636.09,561 A8,8 0 0 0 2644.09,569 L2980.5714,569 A8,8 0 0 0 2988.5714,561 L2988.5714,51 L2978.5714,41 L2644.09,41 A8,8 0 0 0 2636.09,49" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M2978.5714,41 L2978.5714,47 A4,4 0 0 0 2982.5714,51 L2988.5714,51 L2978.5714,41" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2642.09" y="56.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="331.4814" x="2642.09" y="70.7803">shared/diagrams/shared-controller-state-machine.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2744" x="2642.09" y="84.7803">Start from the shared controller phase model and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4678" x="2642.09" y="98.7803">specialize imported provider states, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2642.09" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="304.2813" x="2642.09" y="126.7803">archetype batch: Legacy-adapter controllers map</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.7988" x="2642.09" y="140.7803">provider states into the shared controller</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="248.2949" x="2642.09" y="154.7803">phases while open gaps keep additional</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="114.3789" x="2642.09" y="168.7803">transitions explicit.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.5928" x="2642.09" y="182.7803">service: streaming</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.248" x="2642.09" y="196.7803">slug: stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5859" x="2642.09" y="210.7803">kind: Stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="2642.09" y="224.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="2642.09" y="238.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="2642.09" y="252.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="2642.09" y="266.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="2642.09" y="280.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="289.502" x="2642.09" y="294.7803">supported drift: compartment_id, defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.875" x="2642.09" y="308.7803">freeform_tags, stream_pool_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1299" x="2642.09" y="322.7803">reject before mutate: force-new fields name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="262.2676" x="2642.09" y="336.7803">partitions, retention_in_hours and conflicts</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="320.2227" x="2642.09" y="350.7803">compartment_id -&gt; stream_pool_id, stream_pool_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="117.1064" x="2642.09" y="364.7803">-&gt; compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.0957" x="2642.09" y="378.7803">list lookup: oci_streaming_streams filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.9473" x="2642.09" y="392.7803">compartment_id, id, name, state (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.9609" x="2642.09" y="406.7803">conflicts: compartment_id -&gt; stream_pool_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.7197" x="2642.09" y="420.7803">stream_pool_id -&gt; compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="2642.09" y="434.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="2642.09" y="448.7803">delete-confirmation, endpoint-materialization,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.3818" x="2642.09" y="462.7803">legacy-adapter, list-lookup (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6465" x="2642.09" y="476.7803">Create or bind selection depends on name-based</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1641" x="2642.09" y="490.7803">list lookup with optional pool and compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="37.3379" x="2642.09" y="504.7803">filters.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6123" x="2642.09" y="518.7803">Endpoint secret materialization happens only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3584" x="2642.09" y="532.7803">after ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="2642.09" y="546.7803">Delete is best-effort today; DELETING is treated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0332" x="2642.09" y="560.7803">as sufficient for cleanup and finalizer removal.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="99" id="ent0006"><path d="M3323.58,621 L3323.58,642.73 L2863.56,626.24 L3323.58,650.73 L3323.58,685 A8,8 0 0 0 3331.58,693 L3598.0273,693 A8,8 0 0 0 3606.0273,685 L3606.0273,623 L3596.0273,613 L3331.58,613 A8,8 0 0 0 3323.58,621" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M359