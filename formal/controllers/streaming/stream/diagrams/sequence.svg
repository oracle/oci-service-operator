hAdjust="spacing" textLength="259.9297" x="743" y="1721.7803">delete sequences with imported waits and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.6064" x="743" y="1735.7803">controller-local policy.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.5928" x="743" y="1749.7803">service: streaming</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.248" x="743" y="1763.7803">slug: stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5859" x="743" y="1777.7803">kind: Stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="743" y="1791.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="743" y="1805.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="743" y="1819.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="743" y="1833.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="743" y="1847.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4951" x="743" y="1861.7803">supported drift: defined_tags, freeform_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="95.7236" x="743" y="1875.7803">stream_pool_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1299" x="743" y="1889.7803">reject before mutate: force-new fields name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5576" x="743" y="1903.7803">partitions, retention_in_hours</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.0957" x="743" y="1917.7803">list lookup: oci_streaming_streams filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.9473" x="743" y="1931.7803">compartment_id, id, name, state (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="743" y="1945.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="743" y="1959.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="743" y="1973.7803">The generated runtime reuses existing streams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1504" x="743" y="1987.7803">before create by listing on name plus the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2539" x="743" y="2001.7803">optional pool and compartment filters, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6885" x="743" y="2015.7803">delete-phase lookup can still resolve</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3506" x="743" y="2029.7803">terminating or failed matches when no OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9512" x="743" y="2043.7803">identifier is recorded.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="743" y="2057.7803">A narrow package-local companion writes or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9502" x="743" y="2071.7803">updates the ready-only endpoint secret after</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="329.1367" x="743" y="2085.7803">ACTIVE when the same-name Secret already carries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.6953" x="743" y="2099.7803">the current Stream UID ownership label, or when</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0674" x="743" y="2113.7803">a legacy unlabeled Secret already matches the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="743" y="2127.7803">desired ready-only payload so reconcile can</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="743" y="2141.7803">stamp the current UID label before future</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.9297" x="743" y="2155.7803">updates. Best-effort delete cleanup skips</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.751" x="743" y="2169.7803">missing or unowned Secrets.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="323.6611" x="743" y="2183.7803">Delete remains best-effort; DELETING or DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.1787" x="743" y="2197.7803">is sufficient for finalizer removal.</text><?plantuml-src fLXTZzis5dtdho3QbmIrPp9DqgOEKY2PcNQ3pZQBJB9z6M10KvJD3argISckM-n_xxdya2N7RbmK0H9PfEx7kUSUNYOyQDi8BrOyB4NbDjekU2rCK2pqAtCX7nRUTRQwTCPv_cKjyQSQxAXKBJ