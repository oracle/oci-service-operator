y="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.833" x="691" y="950.7803">shared/diagrams/shared-delete-sequence.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.9297" x="691" y="964.7803">Start from the shared resolution sequence for</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="260.7295" x="691" y="978.7803">OCID binding, datasource pagination, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4268" x="691" y="992.7803">create-or-update dispatch.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1982" x="691" y="1006.7803">Layer the shared delete sequence when finalizer</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="691" y="1020.7803">retention, delete confirmation, work-request</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.2334" x="691" y="1034.7803">polling, or Secret cleanup apply.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="691" y="1048.7803">archetype batch: Legacy-adapter controllers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.7158" x="691" y="1062.7803">follow the shared resolution and delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.0469" x="691" y="1076.7803">sequences but preserve handwritten stop</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="206.999" x="691" y="1090.7803">conditions until promotion is safe.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.5928" x="691" y="1104.7803">service: streaming</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.248" x="691" y="1118.7803">slug: stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5859" x="691" y="1132.7803">kind: Stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="691" y="1146.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="691" y="1160.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="691" y="1174.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="691" y="1188.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="691" y="1202.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.833" x="691" y="1216.7803">mutable/forceNew: compartment_id, defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="691" y="1230.7803">freeform_tags, stream_pool_id / name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5576" x="691" y="1244.7803">partitions, retention_in_hours</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="691" y="1258.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="691" y="1272.7803">delete-confirmation, endpoint-materialization,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.3818" x="691" y="1286.7803">legacy-adapter, list-lookup (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6465" x="691" y="1300.7803">Create or bind selection depends on name-based</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1641" x="691" y="1314.7803">list lookup with optional pool and compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="37.3379" x="691" y="1328.7803">filters.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6123" x="691" y="1342.7803">Endpoint secret materialization happens only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3584" x="691" y="1356.7803">after ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="691" y="1370.7803">Delete is best-effort today; DELETING is treated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0332" x="691" y="1384.7803">as sufficient for cleanup and finalizer removal.</text><?plantuml-src fLPRRzis57xdho2wbmIrdAP9Ud7G0QsJTS6oRcZQFHK8QF7G9YAH6ad5yuRzztsKA5bodBN34CIMV2uyb-zyX_vEcqeuKNA_4jAkjLbo9GfFpFUIXSZlbixMHivjOHt_JkNuamCDIKhKHVZ1cl11bCH_fEAUWix5VfqR_IVnuzE1K3XdrydxCtNyyldGqjX0xnx4eDHB-M9Nopf9BcaiJizEdhtUqOZ79_d9oUdnsTb0thZFhJFa-F4B5dGeYD_GxpMPd7Z6VN0aIbJewAPvOYijYIjhmyB-CV3ZEvE_6ESY3zQDuahvTQBTnEWvlLBF88Opb51NmeJzzaE5R_4ooBttKMX5rzgCA_VwL9miNa4QNLOZKRwGPtJSYnvqvPKIAcT_ioOt_bEz89Gpa6U3EFWSWJXR5EH6FxyJdZvIRaskTqLFhcafyirRAQf0xWaN7ernzpgdduKHontjN-PNO-jj733B7ONa8JxU851Y4HlStgFpuoWcEyTWIXn9xiZReWxQcbdwwKXgiKJt_L7xdcrLiWuGKt-_x3n8AX3FezQjU6n9HZOOPeDqiky7rPnnCj2lWTe6e0WpvS6sIj5adEECzyy7BXxemo4RgqIZSILcM-V8