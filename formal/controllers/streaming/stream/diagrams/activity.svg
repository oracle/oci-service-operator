<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1537px" preserveAspectRatio="none" style="width:688px;height:1537px;background:#FCFCFD;" version="1.1" viewBox="0 0 688 1537" width="688px" zoomAndPan="magnify"><title>Activity - streaming/Stream</title><defs/><g><rect fill="#FCFCFD" height="1537" style="stroke:none;stroke-width:1;" width="688" x="0" y="0"/><g class="title" data-source-line="10"><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="181.2822" x="251.8851" y="30.7803">Activity - streaming/Stream</text></g><ellipse cx="311.2195" cy="55" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="304.7852" x="158.8269" y="85"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9375" x="168.8269" y="105.7803">Start from shared flow</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="168.8269" y="119.7803">shared/diagrams/shared-reconcile-activity.svg</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="283.8057" x="169.3167" y="153"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.8057" x="179.3167" y="173.7803">Load desired Stream spec and status from</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="71.6064" x="179.3167" y="187.7803">Kubernetes</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="255.751" x="183.344" y="221"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.751" x="193.344" y="241.7803">Resolve OCI state via GetStream with</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="125.2686" x="193.344" y="255.7803">ListStreams fallback</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="322.3057" x="150.0667" y="289"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8477" x="160.0667" y="309.7803">Use oci_streaming_streams filters</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="302.3057" x="160.0667" y="323.7803">compartment_id, id, name, state (+1 more) when</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3438" x="160.0667" y="337.7803">OCID lookup or bind-versus-create needs list</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="60.7031" x="160.0667" y="351.7803">resolution</text><polygon fill="#E2E8F0" points="257.53,385,364.9089,385,376.9089,397,364.9089,409,257.53,409,245.53,397,257.53,385" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="107.3789" x="257.53" y="400.7803">Resource exists?</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="223.7439" y="393.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="376.9089" y="393.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.9297" x="11" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.9297" x="21" y="439.7803">Update path calls ChangeStreamCompartment,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="90.2686" x="21" y="453.7803">UpdateStream</text><rect fill="#F8FAFC" height="76" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.833" x="19.5483" y="487"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="237.3369" x="29.5483" y="507.7803">Guard mutable fields compartment_id,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.833" x="29.5483" y="521.7803">defined_tags, freeform_tags, stream_pool_id</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="232.6748" x="29.5483" y="535.7803">and force-new fields name, partitions,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="115.9717" x="29.5483" y="549.7803">retention_in_hours</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="216.0889" x="345.9297" y="419"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.0889" x="355.9297" y="439.7803">Create path calls CreateStream</text><polygon fill="#E2E8F0" points="311.2195,569,323.2195,581,311.2195,593,299.2195,581,311.2195,569" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="90" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="246.085" x="188.177" y="613"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="198.177" y="633.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="198.177" y="647.7803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="198.177" y="661.7803">update=tfresource.UpdateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6475" x="198.177" y="675.7803">tfresource.WaitForUpdatedState;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="212.8438" x="198.177" y="689.7803">delete=tfresource.DeleteResource</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.8125" x="162.3132" y="723"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="172.3132" y="743.7803">Apply repo-authored secret policy ready-only</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="122.917" x="172.3132" y="757.7803">writes after ACTIVE</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="310.2539" x="156.0925" y="791"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="290.2539" x="166.0925" y="811.7803">Delete path uses DeleteStream with best-effort</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="267.6406" x="166.0925" y="825.7803">via GetStream or ListStreams to DELETED</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2549" x="166.0925" y="839.7803">confirmation</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="273.6816" x="174.3787" y="873"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="253.6816" x="184.3787" y="893.7803">Project manual status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="184.3787" y="907.7803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="154.51" y="941"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="164.51" y="961.7803">Requeue on provisioning, updating, terminating</text><rect fill="#F8FAFC" height="62" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="314.1641" x="154.1375" y="995"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="294.1641" x="164.1375" y="1015.7803">Keep promotion blocked on bind-versus-create,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="164.1375" y="1029.7803">delete-confirmation, endpoint-materialization,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.3818" x="164.1375" y="1043.7803">legacy-adapter, list-lookup (+2 more)</text><path d="M342.2195,1067 L342.2195,1292 L322.2195,1296 L342.2195,1300 L342.2195,1525 A0,0 0 0 0 342.2195,1525 L676.0525,1525 A0,0 0 0 0 676.0525,1525 L676.0525,1077 L666.0525,1067 L342.2195,1067 A0,0 0 0 0 342.2195,1067" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M666.0525,1067 L666.0525,1077 L676.0525,1077 L666.0525,1067" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="101.165" x="348.2195" y="1082.7803">shared diagram:</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.7852" x="348.2195" y="1096.7803">shared/diagrams/shared-reconcile-activity.svg</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3438" x="348.2195" y="1110.7803">Start from the shared reconcile activity and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.8955" x="348.2195" y="1124.7803">specialize provider-backed CRUD, wait, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="182.875" x="348.2195" y="1138.7803">status-projection details here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.5371" x="348.2195" y="1152.7803">Controller-local activity diagrams add</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.8955" x="348.2195" y="1166.7803">list-lookup hints, secret policies, delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0332" x="348.2195" y="1180.7803">handling, and open formal gaps.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1572" x="348.2195" y="1194.7803">archetype batch: Legacy-adapter controllers</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3711" x="348.2195" y="1208.7803">specialize the shared reconcile path while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.7021" x="348.2195" y="1222.7803">explicit gaps still block generated promotion.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.5928" x="348.2195" y="1236.7803">service: streaming</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.248" x="348.2195" y="1250.7803">slug: stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5859" x="348.2195" y="1264.7803">kind: Stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="161.875" x="348.2195" y="1278.7803">archetype: legacy-adapter</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="348.2195" y="1292.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="348.2195" y="1306.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="348.2195" y="1320.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="348.2195" y="1334.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.833" x="348.2195" y="1348.7803">mutable/forceNew: compartment_id, defined_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.4541" x="348.2195" y="1362.7803">freeform_tags, stream_pool_id / name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5576" x="348.2195" y="1376.7803">partitions, retention_in_hours</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="348.2195" y="1390.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="348.2195" y="1404.7803">delete-confirmation, endpoint-materialization,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="228.3818" x="348.2195" y="1418.7803">legacy-adapter, list-lookup (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.6465" x="348.2195" y="1432.7803">Create or bind selection depends on name-based</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1641" x="348.2195" y="1446.7803">list lookup with optional pool and compartment</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="37.3379" x="348.2195" y="1460.7803">filters.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6123" x="348.2195" y="1474.7803">Endpoint secret materialization happens only</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="86.3584" x="348.2195" y="1488.7803">after ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.792" x="348.2195" y="1502.7803">Delete is best-effort today; DELETING is treated</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="284.0332" x="348.2195" y="1516.7803">as sufficient for cleanup and finalizer removal.</text><ellipse cx="311.2195" cy="1296" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="311.2195" cy="1296" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="311.2195" x2="311.2195" y1="65" y2="85"/><polygon fill="#0F172A" points="307.2195,75,311.2195,85,315.2195,75,311.2195,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="311.2195" x2="311.2195" y1="133" y2="153"/><polygon fill="#0F172A" points="307.2195,143,311.2195,153,315.2195,143,311.2195,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="311.2195" x2="311.2195" y1="201" y2="221"/><polygon fill="#0F172A" points="307.2195,211,311.2195,221,315.2195,211,311.2195,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="311.2195" x2="311.2195" y1="269" y2="289"/><polygon fill="#0F172A" points="307.2195,279,311.2195,289,315.2195,279,311.2195,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="168.4648" x2="168.4648" y1="467" y2="487"/><polygon fill="#0F172A" points="164.4648,477,168.4648,487,172.4648,477,168.4648,481" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke