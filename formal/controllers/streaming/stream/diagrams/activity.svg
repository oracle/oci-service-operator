rtitions, retention_in_hours</text><ellipse cx="694.0874" cy="1258" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="694.0874" cy="1258" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#E2E8F0" points="568.5044,1128.5,819.6704,1128.5,831.6704,1140.5,819.6704,1152.5,568.5044,1152.5,556.5044,1140.5,568.5044,1128.5" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="698.0874" y="1163.2803">yes</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.166" x="568.5044" y="1144.2803">"Force-new or conflicting drift detected?"</text><polygon fill="#E2E8F0" points="583.6597,1311,804.5151,1311,816.5151,1323,804.5151,1335,583.6597,1335,571.6597,1323,583.6597,1311" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.8555" x="583.6597" y="1326.7803">"Supported mutable drift detected?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="549.8735" y="1319.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="816.5151" y="1319.7803">no</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.833" x="410.9612" y="1345"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2471" x="420.9612" y="1365.7803">Apply UpdateStream only for mutable fields</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.833" x="420.9612" y="1379.7803">defined_tags, freeform_tags, stream_pool_id</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="199.0059" x="728.7942" y="1345"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.0059" x="738.7942" y="1365.7803">Skip the no-op mutation path</text><polygon fill="#E2E8F0" points="694.0874,1399,706.0874,1411,694.0874,1423,682.0874,1411,694.0874,1399" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="104" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="293.5537" x="547.3105" y="1443"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.2061" x="557.3105" y="1463.7803">Run provider helper hooks</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.0508" x="557.3105" y="1477.7803">create=tfresource.CreateResource;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="226.085" x="557.3105" y="1491.7803">update=tfresource.UpdateResource,</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="204.6475" x="557.3105" y="1505.7803">tfresource.WaitForUpdatedState;</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.5537" x="557.3105" y="1519.7803">delete=tfresource.DeleteResource when the</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="220.2334" x="557.3105" y="1533.7803">matching field-driven path executes</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="297.8125" x="545.1812" y="1567"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="277.8125" x="555.1812" y="1587.7803">Apply repo-authored secret policy ready-only</text><polygon fill="#E2E8F0" points="617.1387,1621,771.0361,1621,783.0361,1633,771.0361,1645,617.1387,1645,605.1387,1633,617.1387,1621" style="stroke:#1D4ED8;stroke-width:0.5;"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.8975" x="617.1387" y="1636.7803">"Secret sync succeeds?"</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="21.7861" x="583.3525" y="1629.7803">yes</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="15.5723" x="783.0361" y="1629.7803">no</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="303.2197" x="381.2539" y="1655"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="283.2197" x="391.2539" y="1675.7803">Return success for the ACTIVE success state</text><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="301.6748" x="704.4736" y="1655"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6748" x="714.4736" y="1675.7803">Block successful completion until Secret sync</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="59.1445" x="714.4736" y="1689.7803">succeeds</text><polygon fill="#E2E8F0" points="694.0874,1709,706.0874,1721,694.0874,1733,682.0874,1721,694.0874,1709" style="stroke:#1D4ED8;stroke-width:0.5;"/><rect fill="#F8FAFC" height="48" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="279.1299" x="554.5225" y="1753"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="564.5225" y="1773.7803">Project required status and finalizer policy</text><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.1445" x="564.5225" y="1787.7803">none</text><rect fill="#F8FAFC" height="34" rx="8" ry="8" style="stroke:#0F172A;stroke-width:0.5;" width="313.4189" x="537.3779" y="1821"/><text fill="#0F172A" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="293.4189" x="547.3779