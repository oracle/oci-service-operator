">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="291.0469" x="472.1072" y="2018.7803">controllers specialize the shared reconcile path</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8477" x="472.1072" y="2032.7803">with formal runtime ownership.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="113.5928" x="472.1072" y="2046.7803">service: streaming</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.248" x="472.1072" y="2060.7803">slug: stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="78.5859" x="472.1072" y="2074.7803">kind: Stream</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="472.1072" y="2088.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="472.1072" y="2102.7803">status/finalizer: required / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.3984" x="472.1072" y="2116.7803">requeue: provisioning, updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3369" x="472.1072" y="2130.7803">provider states: create CREATING; update</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.165" x="472.1072" y="2144.7803">UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4951" x="472.1072" y="2158.7803">supported drift: defined_tags, freeform_tags,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="95.7236" x="472.1072" y="2172.7803">stream_pool_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1299" x="472.1072" y="2186.7803">reject before mutate: force-new fields name,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="180.5576" x="472.1072" y="2200.7803">partitions, retention_in_hours</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.0957" x="472.1072" y="2214.7803">list lookup: oci_streaming_streams filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="264.9473" x="472.1072" y="2228.7803">compartment_id, id, name, state (+1 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="472.1072" y="2242.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="472.1072" y="2256.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="292.585" x="472.1072" y="2270.7803">The generated runtime reuses existing streams</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="252.1504" x="472.1072" y="2284.7803">before create by listing on name plus the</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="269.2539" x="472.1072" y="2298.7803">optional pool and compartment filters, while</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6885" x="472.1072" y="2312.7803">delete-phase lookup can still resolve</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="265.3506" x="472.1072" y="2326.7803">terminating or failed matches when no OCI</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9512" x="472.1072" y="2340.7803">identifier is recorded.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="275.4609" x="472.1072" y="2354.7803">A narrow package-local companion writes or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9502" x="472.1072" y="2368.7803">updates the ready-only endpoint secret after</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="308.9023" x="472.1072" y="2382.7803">ACTIVE only when the same-name Secret carries</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.2471" x="472.1072" y="2396.7803">the current Stream UID ownership label, and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="472.1072" y="2410.7803">best-effort delete cleanup skips missing or</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="112.0684" x="472.1072" y="2424.7803">unowned Secrets.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="323.6611" x="472.1072" y="2438.7803">Delete remains best-effort; DELETING or DELETED</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="199.1787" x="472.1072" y="2452.7803">is sufficient for finalizer removal.</text><ellipse cx="435.1072" cy="2169" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="435.1072" cy="2169" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="435.1072" x2="435.1072" y1="157" y2="177"/><polygon fill="#0F172A" points="431.1072,167,435.1072,177,439.1072,167,435.1072,171" style="stroke:#0F172A;stroke-width:1;