schemaVersion: 1
surface: repo-authored-semantics
service: streaming
slug: stream
kind: Stream
archetype: generated-service-manager
states:
  - provisioning
  - active
  - updating
  - terminating
  - failed
notes:
  - The generated runtime reuses existing streams before create by listing on name plus the optional pool and compartment filters, while delete-phase lookup can still resolve terminating or failed matches when no OCI identifier is recorded.
  - A narrow package-local companion writes the ready-only endpoint secret after ACTIVE and removes it during best-effort delete completion.
  - Delete remains best-effort; DELETING or DELETED is sufficient for finalizer removal.
