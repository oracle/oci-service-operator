</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.1445" x="311.2695" y="1280.7803">promotion.</text><ellipse cx="274.2695" cy="1109" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="274.2695" cy="1109" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="274.2695" x2="274.2695" y1="65" y2="85"/><polygon fill="#0F172A" points="270.2695,75,274.2695,85,278.2695,75,274.2695,79" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="274.2695" x2="274.2695" y1="133" y2="153"/><polygon fill="#0F172A" points="270.2695,143,274.2695,153,278.2695,143,274.2695,147" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="274.2695" x2="274.2695" y1="201" y2="221"/><polygon fill="#0F172A" points="270.2695,211,274.2695,221,278.2695,211,274.2695,215" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="274.2695" x2="274.2695" y1="269" y2="289"/><polygon fill="#0F172A" points="270.2695,279,274.2695,289,278.2695,279,274.2695,283" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="144.3511" x2="144.3511" y1="439" y2="459"/><polygon fill="#0F172A" points="140.3511,449,144.3511,459,148.3511,449,144.3511,453" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="208.5801" x2="144.3511" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="144.3511" x2="144.3511" y1="383" y2="405"/><polygon fill="#0F172A" points="140.3511,395,144.3511,405,148.3511,395,144.3511,399" style="stroke:#0F172A;stroke-width:1;"/><line style="stroke:#0F172A;stroke-width:1;" x1="339.959" x2="404.188" y1="383" y2="383"/><line style="stroke:#0F172A;stroke-width:1;" x1="404.188" x2="404.188" y1="383" y2="405"/><polygon fill="#0F172A" points="400.188,395,404.188,405,408.188,395,404.18