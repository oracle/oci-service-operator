# permissions for end users to edit dbsystems.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dbsystem-editor-role
rules:
- apiGroups:
  - mysql.oracle.com
  resources:
  - dbsystems
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mysql.oracle.com
  resources:
  - dbsystems/status
  verbs:
  - get
