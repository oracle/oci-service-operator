---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - oci.oracle.com
  resources:
  - autonomousdatabases
  - mysqldbsystems
  - streams
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - oci.oracle.com
  resources:
  - autonomousdatabases/finalizers
  - mysqldbsystems/finalizers
  - streams/finalizers
  verbs:
  - update
- apiGroups:
  - oci.oracle.com
  resources:
  - autonomousdatabases/status
  - mysqldbsystems/status
  - streams/status
  verbs:
  - get
  - patch
  - update
