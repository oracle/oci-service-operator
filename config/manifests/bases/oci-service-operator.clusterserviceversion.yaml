apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Basic Install
  name: oci-service-operator.v0.0.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: AutonomousDatabase is the Schema for the autonomousdatabases API.
      displayName: Autonomous Database
      kind: AutonomousDatabase
      name: autonomousdatabases.database.oracle.com
      version: v1beta1
    - description: DbSystem is the Schema for the dbsystems API.
      displayName: Db System
      kind: DbSystem
      name: dbsystems.mysql.oracle.com
      version: v1beta1
    - description: Stream is the Schema for the streams API.
      displayName: Stream
      kind: Stream
      name: streams.streaming.oracle.com
      version: v1beta1
  description: |-
    OCI Service Operator for Kubernetes exposes generator-owned OCI API groups
    and runtime scaffolding from the checked-in service map.

    The default deployment mounts a ControllerManagerConfig file and starts the
    manager with `--config=controller_manager_config.yaml`, so controller-runtime
    settings come from that file rather than the built-in flag defaults.
    Unknown fields or mismatched `apiVersion` / `kind` values fail startup
    during strict validation.
  displayName: Oci Service Operator
  icon:
  - base64data: ""
    mediatype: ""
  install:
    spec:
      deployments: null
    strategy: ""
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - oci-service-operator
  links:
  - name: Oci Service Operator
    url: https://oci-service-operator.domain
  maintainers:
  - email: your@email.com
    name: Maintainer Name
  maturity: alpha
  provider:
    name: Provider Name
    url: https://your.domain
  version: 0.0.0
