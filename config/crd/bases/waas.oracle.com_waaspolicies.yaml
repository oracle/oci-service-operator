---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: waaspolicies.waas.oracle.com
spec:
  group: waas.oracle.com
  names:
    kind: WaasPolicy
    listKind: WaasPolicyList
    plural: waaspolicies
    singular: waaspolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the WaasPolicy
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the WaasPolicy
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: WaasPolicy is the Schema for the waaspolicies API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WaasPolicySpec defines the desired state of WaasPolicy.
            properties:
              additionalDomains:
                description: An array of additional domains for the specified web
                  application.
                items:
                  type: string
                type: array
              compartmentId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment in which to create the WAAS policy.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: A user-friendly name for the WAAS policy. The name can
                  be changed and does not need to be unique.
                type: string
              domain:
                description: The web application domain that the WAAS policy protects.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              originGroups:
                additionalProperties:
                  description: WaasPolicyOriginGroups defines nested fields for WaasPolicy.OriginGroups.
                  properties:
                    origins:
                      description: The list of objects containing origin references
                        and additional properties.
                      items:
                        description: WaasPolicyOriginGroupsOrigin defines nested fields
                          for WaasPolicy.OriginGroups.Origin.
                        properties:
                          origin:
                            description: The IP address or CIDR notation of the origin
                              server.
                            type: string
                          weight:
                            description: The weight of the origin used in load balancing.
                              Origins with higher weights will receive larger proportions
                              of client requests.
                            type: integer
                        type: object
                      type: array
                  type: object
                description: |-
                  The map of origin groups and their keys used to associate origins to the `wafConfig`. Origin groups allow you to apply weights to groups of origins for load balancing purposes. Origins with higher weights will receive larger proportions of client requests.
                  To add additional origins to your WAAS policy, update the `origins` field of a `UpdateWaasPolicy` request.
                type: object
              origins:
                additionalProperties:
                  description: WaasPolicyOrigins defines nested fields for WaasPolicy.Origins.
                  properties:
                    customHeaders:
                      description: A list of HTTP headers to forward to your origin.
                      items:
                        description: WaasPolicyOriginsCustomHeader defines nested
                          fields for WaasPolicy.Origins.CustomHeader.
                        properties:
                          name:
                            description: The name of the header.
                            type: string
                          value:
                            description: The value of the header.
                            type: string
                        required:
                        - name
                        - value
                        type: object
                      type: array
                    httpPort:
                      description: The HTTP port on the origin that the web application
                        listens on. If unspecified, defaults to `80`. If `0` is specified
                        - the origin is not used for HTTP traffic.
                      type: integer
                    httpsPort:
                      description: The HTTPS port on the origin that the web application
                        listens on. If unspecified, defaults to `443`. If `0` is specified
                        - the origin is not used for HTTPS traffic.
                      type: integer
                    uri:
                      description: The URI of the origin. Does not support paths.
                        Port numbers should be specified in the `httpPort` and `httpsPort`
                        fields.
                      type: string
                  required:
                  - uri
                  type: object
                description: A map of host to origin for the web application. The
                  key should be a customer friendly name for the host, ex. primary,
                  secondary, etc.
                type: object
              policyConfig:
                description: WaasPolicyPolicyConfig defines nested fields for WaasPolicy.PolicyConfig.
                properties:
                  certificateId:
                    description: The OCID of the SSL certificate to use if HTTPS is
                      supported.
                    type: string
                  cipherGroup:
                    description: |-
                      The set cipher group for the configured TLS protocol. This sets the configuration for the TLS connections between clients and edge nodes only.
                      - **DEFAULT:** Cipher group supports TLS 1.0, TLS 1.1, TLS 1.2, TLS 1.3 protocols. It has the following ciphers enabled: `ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-DSS-AES128-GCM-SHA256:kEDH+AESGCM:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA:ECDHE-ECDSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-DSS-AES128-SHA256:DHE-RSA-AES256-SHA256:DHE-DSS-AES256-SHA:DHE-RSA-AES256-SHA:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:AES:CAMELLIA:!DES-CBC3-SHA:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK:!aECDH:!EDH-DSS-DES-CBC3-SHA:!EDH-RSA-DES-CBC3-SHA:!KRB5-DES-CBC3-SHA`
                    type: string
                  clientAddressHeader:
                    description: |-
                      Specifies an HTTP header name which is treated as the connecting client's IP address. Applicable only if `isBehindCdn` is enabled.
                      The edge node reads this header and its value and sets the client IP address as specified. It does not create the header if the header is not present in the request. If the header is not present, the connecting IP address will be used as the client's true IP address. It uses the last IP address in the header's value as the true IP address.
                      Example: `X-Client-Ip: 11.1.1.1, 13.3.3.3`
                      In the case of multiple headers with the same name, only the first header will be used. It is assumed that CDN sets the correct client IP address to prevent spoofing.
                      - **X_FORWARDED_FOR:** Corresponds to `X-Forwarded-For` header name.
                      - **X_CLIENT_IP:** Corresponds to `X-Client-Ip` header name.
                      - **X_REAL_IP:** Corresponds to `X-Real-Ip` header name.
                      - **CLIENT_IP:** Corresponds to `Client-Ip` header name.
                      - **TRUE_CLIENT_IP:** Corresponds to `True-Client-Ip` header name.
                    type: string
                  healthChecks:
                    description: WaasPolicyPolicyConfigHealthChecks defines nested
                      fields for WaasPolicy.PolicyConfig.HealthChecks.
                    properties:
                      expectedResponseCodeGroup:
                        description: |-
                          The HTTP response codes that signify a healthy state.
                          - **2XX:** Success response code group.
                          - **3XX:** Redirection response code group.
                          - **4XX:** Client errors response code group.
                          - **5XX:** Server errors response code group.
                        items:
                          type: string
                        type: array
                      expectedResponseText:
                        description: Health check will search for the given text in
                          a case-sensitive manner within the response body and will
                          fail if the text is not found.
                        type: string
                      headers:
                        additionalProperties:
                          type: string
                        description: |-
                          HTTP header fields to include in health check requests, expressed as `"name": "value"` properties. Because HTTP header field names are case-insensitive, any use of names that are case-insensitive equal to other names will be rejected. If Host is not specified, requests will include a Host header field with value matching the policy's protected domain. If User-Agent is not specified, requests will include a User-Agent header field with value "waf health checks".
                          **Note:** The only currently-supported header fields are Host and User-Agent.
                        type: object
                      healthyThreshold:
                        description: Number of successful health checks after which
                          the server is marked up.
                        type: integer
                      intervalInSeconds:
                        description: Time between health checks of an individual origin
                          server, in seconds.
                        type: integer
                      isEnabled:
                        description: Enables or disables the health checks.
                        type: boolean
                      isResponseTextCheckEnabled:
                        description: Enables or disables additional check for predefined
                          text in addition to response code.
                        type: boolean
                      method:
                        description: An HTTP verb (i.e. HEAD, GET, or POST) to use
                          when performing the health check.
                        type: string
                      path:
                        description: Path to visit on your origins when performing
                          the health check.
                        type: string
                      timeoutInSeconds:
                        description: Response timeout represents wait time until request
                          is considered failed, in seconds.
                        type: integer
                      unhealthyThreshold:
                        description: Number of failed health checks after which the
                          server is marked down.
                        type: integer
                    type: object
                  isBehindCdn:
                    description: Enabling `isBehindCdn` allows for the collection
                      of IP addresses from client requests if the WAF is connected
                      to a CDN.
                    type: boolean
                  isCacheControlRespected:
                    description: 'Enable or disable automatic content caching based
                      on the response `cache-control` header. This feature enables
                      the origin to act as a proxy cache. Caching is usually defined
                      using `cache-control` header. For example `cache-control: max-age=120`
                      means that the returned resource is valid for 120 seconds. Caching
                      rules will overwrite this setting.'
                    type: boolean
                  isHttpsEnabled:
                    description: Enable or disable HTTPS support. If true, a `certificateId`
                      is required. If unspecified, defaults to `false`.
                    type: boolean
                  isHttpsForced:
                    description: Force HTTP to HTTPS redirection. If unspecified,
                      defaults to `false`.
                    type: boolean
                  isOriginCompressionEnabled:
                    description: 'Enable or disable GZIP compression of origin responses.
                      If enabled, the header `Accept-Encoding: gzip` is sent to origin,
                      otherwise, the empty `Accept-Encoding:` header is used.'
                    type: boolean
                  isResponseBufferingEnabled:
                    description: Enable or disable buffering of responses from the
                      origin. Buffering improves overall stability in case of network
                      issues, but slightly increases Time To First Byte.
                    type: boolean
                  isSniEnabled:
                    description: SNI stands for Server Name Indication and is an extension
                      of the TLS protocol. It indicates which hostname is being contacted
                      by the browser at the beginning of the 'handshake'-process.
                      This allows a server to connect multiple SSL Certificates to
                      one IP address and port.
                    type: boolean
                  loadBalancingMethod:
                    description: An object that represents a load balancing method
                      and its properties.
                    properties:
                      domain:
                        description: The domain for which the cookie is set, defaults
                          to WAAS policy domain.
                        type: string
                      expirationTimeInSeconds:
                        description: |-
                          The time for which a browser should keep the cookie in seconds.
                          Empty value will cause the cookie to expire at the end of a browser session.
                        type: integer
                      jsonData:
                        type: string
                      method:
                        type: string
                      name:
                        description: |-
                          The name of the cookie used to track the persistence.
                          Can contain any US-ASCII character except separator or control character.
                        type: string
                    type: object
                  tlsProtocols:
                    description: |-
                      A list of allowed TLS protocols. Only applicable when HTTPS support is enabled.
                      The TLS protocol is negotiated while the request is connecting and the most recent protocol supported by both the edge node and client browser will be selected. If no such version exists, the connection will be aborted.
                      - **TLS_V1:** corresponds to TLS 1.0 specification.
                      - **TLS_V1_1:** corresponds to TLS 1.1 specification.
                      - **TLS_V1_2:** corresponds to TLS 1.2 specification.
                      - **TLS_V1_3:** corresponds to TLS 1.3 specification.
                      Enabled TLS protocols must go in a row. For example if `TLS_v1_1` and `TLS_V1_3` are enabled, `TLS_V1_2` must be enabled too.
                    items:
                      type: string
                    type: array
                  websocketPathPrefixes:
                    description: ModSecurity is not capable to inspect WebSockets.
                      Therefore paths specified here have WAF disabled if Connection
                      request header from the client has the value Upgrade (case insensitive
                      matching) and Upgrade request header has the value websocket
                      (case insensitive matching). Paths matches if the concatenation
                      of request URL path and query starts with the contents of the
                      one of `websocketPathPrefixes` array value. In All other cases
                      challenges, like JSC, HIC and etc., remain active.
                    items:
                      type: string
                    type: array
                type: object
              wafConfig:
                description: WaasPolicyWafConfig defines nested fields for WaasPolicy.WafConfig.
                properties:
                  accessRules:
                    description: The access rules applied to the Web Application Firewall.
                      Access rules allow custom content access policies to be defined
                      and `ALLOW`, `DETECT`, or `BLOCK` actions to be taken on a request
                      when specified criteria are met.
                    items:
                      description: WaasPolicyWafConfigAccessRule defines nested fields
                        for WaasPolicy.WafConfig.AccessRule.
                      properties:
                        action:
                          description: |-
                            The action to take when the access criteria are met for a rule. If unspecified, defaults to `ALLOW`.
                            - **ALLOW:** Takes no action, just logs the request.
                            - **DETECT:** Takes no action, but creates an alert for the request.
                            - **BLOCK:** Blocks the request by returning specified response code or showing error page.
                            - **BYPASS:** Bypasses some or all challenges.
                            - **REDIRECT:** Redirects the request to the specified URL. These fields are required when `REDIRECT` is selected: `redirectUrl`, `redirectResponseCode`.
                            - **SHOW_CAPTCHA:** Show a CAPTCHA Challenge page instead of the requested page.
                            Regardless of action, no further rules are processed once a rule is matched.
                          type: string
                        blockAction:
                          description: The method used to block requests if `action`
                            is set to `BLOCK` and the access criteria are met. If
                            unspecified, defaults to `SET_RESPONSE_CODE`.
                          type: string
                        blockErrorPageCode:
                          description: The error code to show on the error page when
                            `action` is set to `BLOCK`, `blockAction` is set to `SHOW_ERROR_PAGE`,
                            and the access criteria are met. If unspecified, defaults
                            to 'Access rules'.
                          type: string
                        blockErrorPageDescription:
                          description: The description text to show on the error page
                            when `action` is set to `BLOCK`, `blockAction` is set
                            to `SHOW_ERROR_PAGE`, and the access criteria are met.
                            If unspecified, defaults to 'Access blocked by website
                            owner. Please contact support.'
                          type: string
                        blockErrorPageMessage:
                          description: The message to show on the error page when
                            `action` is set to `BLOCK`, `blockAction` is set to `SHOW_ERROR_PAGE`,
                            and the access criteria are met. If unspecified, defaults
                            to 'Access to the website is blocked.'
                          type: string
                        blockResponseCode:
                          description: 'The response status code to return when `action`
                            is set to `BLOCK`, `blockAction` is set to `SET_RESPONSE_CODE`,
                            and the access criteria are met. If unspecified, defaults
                            to `403`. The list of available response codes: `200`,
                            `201`, `202`, `204`, `206`, `300`, `301`, `302`, `303`,
                            `304`, `307`, `400`, `401`, `403`, `404`, `405`, `408`,
                            `409`, `411`, `412`, `413`, `414`, `415`, `416`, `422`,
                            `444`, `494`, `495`, `496`, `497`, `499`, `500`, `501`,
                            `502`, `503`, `504`, `507`.'
                          type: integer
                        bypassChallenges:
                          description: |-
                            The list of challenges to bypass when `action` is set to `BYPASS`. If unspecified or empty, all challenges are bypassed.
                            - **JS_CHALLENGE:** Bypasses JavaScript Challenge.
                            - **DEVICE_FINGERPRINT_CHALLENGE:** Bypasses Device Fingerprint Challenge.
                            - **HUMAN_INTERACTION_CHALLENGE:** Bypasses Human Interaction Challenge.
                            - **CAPTCHA:** Bypasses CAPTCHA Challenge.
                          items:
                            type: string
                          type: array
                        captchaFooter:
                          description: The text to show in the footer when showing
                            a CAPTCHA challenge when `action` is set to `SHOW_CAPTCHA`
                            and the request is challenged.
                          type: string
                        captchaHeader:
                          description: The text to show in the header when showing
                            a CAPTCHA challenge when `action` is set to `SHOW_CAPTCHA`
                            and the request is challenged.
                          type: string
                        captchaSubmitLabel:
                          description: The text to show on the label of the CAPTCHA
                            challenge submit button when `action` is set to `SHOW_CAPTCHA`
                            and the request is challenged.
                          type: string
                        captchaTitle:
                          description: The title used when showing a CAPTCHA challenge
                            when `action` is set to `SHOW_CAPTCHA` and the request
                            is challenged.
                          type: string
                        criteria:
                          description: The list of access rule criteria. The rule
                            would be applied only for the requests that matched all
                            the listed conditions.
                          items:
                            description: WaasPolicyWafConfigAccessRuleCriteria defines
                              nested fields for WaasPolicy.WafConfig.AccessRule.Criteria.
                            properties:
                              condition:
                                description: |-
                                  The criteria the access rule and JavaScript Challenge uses to determine if action should be taken on a request.
                                  - **URL_IS:** Matches if the concatenation of request URL path and query is identical to the contents of the `value` field. URL must start with a `/`.
                                  - **URL_IS_NOT:** Matches if the concatenation of request URL path and query is not identical to the contents of the `value` field. URL must start with a `/`.
                                  - **URL_STARTS_WITH:** Matches if the concatenation of request URL path and query starts with the contents of the `value` field. URL must start with a `/`.
                                  - **URL_PART_ENDS_WITH:** Matches if the concatenation of request URL path and query ends with the contents of the `value` field.
                                  - **URL_PART_CONTAINS:** Matches if the concatenation of request URL path and query contains the contents of the `value` field.
                                  - **URL_REGEX:** Matches if the concatenation of request URL path and query is described by the regular expression in the value field. The value must be a valid regular expression recognized by the PCRE library in Nginx (https://www.pcre.org).
                                  - **URL_DOES_NOT_MATCH_REGEX:** Matches if the concatenation of request URL path and query is not described by the regular expression in the `value` field. The value must be a valid regular expression recognized by the PCRE library in Nginx (https://www.pcre.org).
                                  - **URL_DOES_NOT_START_WITH:** Matches if the concatenation of request URL path and query does not start with the contents of the `value` field.
                                  - **URL_PART_DOES_NOT_CONTAIN:** Matches if the concatenation of request URL path and query does not contain the contents of the `value` field.
                                  - **URL_PART_DOES_NOT_END_WITH:** Matches if the concatenation of request URL path and query does not end with the contents of the `value` field.
                                  - **IP_IS:** Matches if the request originates from one of the IP addresses contained in the defined address list. The `value` in this case is string with one or multiple IPs or CIDR notations separated by new line symbol \n
                                  *Example:* "1.1.1.1\n1.1.1.2\n1.2.2.1/30"
                                  - **IP_IS_NOT:** Matches if the request does not originate from any of the IP addresses contained in the defined address list. The `value` in this case is string with one or multiple IPs or CIDR notations separated by new line symbol \n
                                  *Example:* "1.1.1.1\n1.1.1.2\n1.2.2.1/30"
                                  - **IP_IN_LIST:** Matches if the request originates from one of the IP addresses contained in the referenced address list. The `value` in this case is OCID of the address list.
                                  - **IP_NOT_IN_LIST:** Matches if the request does not originate from any IP address contained in the referenced address list. The `value` field in this case is OCID of the address list.
                                  - **HTTP_HEADER_CONTAINS:** The HTTP_HEADER_CONTAINS criteria is defined using a compound value separated by a colon: a header field name and a header field value. `host:test.example.com` is an example of a criteria value where `host` is the header field name and `test.example.com` is the header field value. A request matches when the header field name is a case insensitive match and the header field value is a case insensitive, substring match.
                                  *Example:* With a criteria value of `host:test.example.com`, where `host` is the name of the field and `test.example.com` is the value of the host field, a request with the header values, `Host: www.test.example.com` will match, where as a request with header values of `host: www.example.com` or `host: test.sub.example.com` will not match.
                                  - **HTTP_METHOD_IS:** Matches if the request method is identical to one of the values listed in field. The `value` in this case is string with one or multiple HTTP methods separated by new line symbol \n The list of available methods: `GET`, `HEAD`, `POST`, `PUT`, `DELETE`, `CONNECT`, `OPTIONS`, `TRACE`, `PATCH`
                                   *Example:* "GET\nPOST"
                                  - **HTTP_METHOD_IS_NOT:** Matches if the request is not identical to any of the contents of the `value` field. The `value` in this case is string with one or multiple HTTP methods separated by new line symbol \n The list of available methods: `GET`, `HEAD`, `POST`, `PUT`, `DELETE`, `CONNECT`, `OPTIONS`, `TRACE`, `PATCH`
                                   *Example:* "GET\nPOST"
                                  - **COUNTRY_IS:** Matches if the request originates from one of countries in the `value` field. The `value` in this case is string with one or multiple countries separated by new line symbol \n Country codes are in ISO 3166-1 alpha-2 format. For a list of codes, see ISO's website (https://www.iso.org/obp/ui/#search/code/).
                                  *Example:* "AL\nDZ\nAM"
                                  - **COUNTRY_IS_NOT:** Matches if the request does not originate from any of countries in the `value` field. The `value` in this case is string with one or multiple countries separated by new line symbol \n Country codes are in ISO 3166-1 alpha-2 format. For a list of codes, see ISO's website (https://www.iso.org/obp/ui/#search/code/).
                                  *Example:* "AL\nDZ\nAM"
                                  - **USER_AGENT_IS:** Matches if the requesting user agent is identical to the contents of the `value` field.
                                  *Example:* `Mozilla/5.0 (X11; Ubuntu; Linux x86_64; rv:35.0) Gecko/20100101 Firefox/35.0`
                                  - **USER_AGENT_IS_NOT:** Matches if the requesting user agent is not identical to the contents of the `value` field.
                                  *Example:* `Mozilla/5.0 (X11; Ubuntu; Linux x86_64; rv:35.0) Gecko/20100101 Firefox/35.0`
                                type: string
                              isCaseSensitive:
                                description: When enabled, the condition will be matched
                                  with case-sensitive rules.
                                type: boolean
                              value:
                                description: The criteria value.
                                type: string
                            required:
                            - condition
                            - value
                            type: object
                          type: array
                        name:
                          description: The unique name of the access rule.
                          type: string
                        redirectResponseCode:
                          description: |-
                            The response status code to return when `action` is set to `REDIRECT`.
                            - **MOVED_PERMANENTLY:** Used for designating the permanent movement of a page (numerical code - 301).
                            - **FOUND:** Used for designating the temporary movement of a page (numerical code - 302).
                          type: string
                        redirectUrl:
                          description: The target to which the request should be redirected,
                            represented as a URI reference. Required when `action`
                            is `REDIRECT`.
                          type: string
                        responseHeaderManipulation:
                          description: An object that represents an action to apply
                            to an HTTP response headers if all rule criteria will
                            be matched regardless of `action` value.
                          items:
                            description: WaasPolicyWafConfigAccessRuleResponseHeaderManipulation
                              defines nested fields for WaasPolicy.WafConfig.AccessRule.ResponseHeaderManipulation.
                            properties:
                              action:
                                type: string
                              header:
                                description: |-
                                  A header field name that conforms to RFC 7230.
                                  Example: `example_header_name`
                                type: string
                              jsonData:
                                type: string
                              value:
                                description: |-
                                  A header field value that conforms to RFC 7230.
                                  Example: `example_value`
                                type: string
                            type: object
                          type: array
                      required:
                      - action
                      - criteria
                      - name
                      type: object
                    type: array
                  addressRateLimiting:
                    description: The settings used to limit the number of requests
                      from an IP address.
                    properties:
                      allowedRatePerAddress:
                        description: The number of allowed requests per second from
                          one IP address. If unspecified, defaults to `1`.
                        type: integer
                      blockResponseCode:
                        description: 'The response status code returned when a request
                          is blocked. If unspecified, defaults to `503`. The list
                          of available response codes: `400`, `401`, `403`, `404`,
                          `405`, `408`, `409`, `411`, `412`, `413`, `414`, `415`,
                          `416`, `422`, `494`, `495`, `496`, `497`, `499`, `500`,
                          `501`, `502`, `503`, `504`, `507`.'
                        type: integer
                      isEnabled:
                        description: Enables or disables the address rate limiting
                          Web Application Firewall feature.
                        type: boolean
                      maxDelayedCountPerAddress:
                        description: The maximum number of requests allowed to be
                          queued before subsequent requests are dropped. If unspecified,
                          defaults to `10`.
                        type: integer
                    required:
                    - isEnabled
                    type: object
                  cachingRules:
                    description: A list of caching rules applied to the web application.
                    items:
                      description: WaasPolicyWafConfigCachingRule defines nested fields
