                          type: string
                        blockErrorPageCode:
                          description: The error code to show on the error page when
                            `action` is set to `BLOCK`, `blockAction` is set to `SHOW_ERROR_PAGE`,
                            and the access criteria are met. If unspecified, defaults
                            to 'Access rules'.
                          type: string
                        blockErrorPageDescription:
                          description: The description text to show on the error page
