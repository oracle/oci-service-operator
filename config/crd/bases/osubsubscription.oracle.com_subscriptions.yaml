---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: (devel)
  name: subscriptions.osubsubscription.oracle.com
spec:
  group: osubsubscription.oracle.com
  names:
    kind: Subscription
    listKind: SubscriptionList
    plural: subscriptions
    singular: subscription
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the Subscription
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Subscription
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Subscription is the Schema for the subscriptions API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SubscriptionSpec defines the desired state of Subscription.
            properties:
              buyerEmail:
                description: |-
                  Optional buyer email selector for the query-backed observe contract.
                  Set exactly one of planNumber, subscriptionId, or buyerEmail.
                type: string
              compartmentId:
                description: |-
                  The OCID of the compartment that contains the subscription summary projection.
                  Required for every ListSubscriptions reread.
                type: string
              isCommitInfoRequired:
                description: When true, request commitment details on the subscription
                  summary list call.
                type: boolean
              planNumber:
                description: |-
                  Optional plan-number selector for the query-backed observe contract.
                  Set exactly one of planNumber, subscriptionId, or buyerEmail.
                type: string
              sortBy:
                description: Optional list sort field for the observed subscription
                  query.
                enum:
                - TIMECREATED
                - TIMESTART
                type: string
              sortOrder:
                description: Optional list sort order for the observed subscription
                  query.
                enum:
                - ASC
                - DESC
                type: string
              subscriptionId:
                description: |-
                  Optional line-level subscription selector for the query-backed observe contract.
                  This value is not a top-level OCI OCID and is not published as tracked controller identity.
                  Set exactly one of planNumber, subscriptionId, or buyerEmail.
                type: string
              xOneGatewaySubscriptionId:
                description: Optional request header passthrough for environments
                  that require x-one-gateway-subscription-id on list reads.
                type: string
              xOneOriginRegion:
                description: Optional request header passthrough for environments
                  whose home region is not us-ashburn-1.
