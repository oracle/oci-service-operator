                  name:
                    description: Currency name
                    type: string
                  stdPrecision:
                    description: Standard Precision of the Currency
                    format: int64
                    type: integer
                type: object
              sdkStatus:
                description: The raw subscription status string returned by OSubscription.
                type: string
              serviceName:
                description: Customer friendly service name provided by PRG
                type: string
              status:
