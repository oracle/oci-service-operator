                    programType:
                      description: Subscribed service program type
                      type: string
                    promoType:
                      description: Subscribed service promotion type
                      type: string
                    quantity:
                      description: Subscribed service quantity
                      type: string
                    status:
                      description: Subscribed service status
                      type: string
                    termValue:
                      description: Term value in Months
                      format: int64
                      type: integer
                    termValueUOM:
                      description: Term value UOM
                      type: string
                    timeEnd:
                      description: Subscribed service end date
                      type: string
                    timeStart:
                      description: Subscribed service start date
                      type: string
                    totalValue:
                      description: Subscribed service total value
                      type: string
                  type: object
                type: array
              timeEnd:
                description: Represents the date when the last service of the subscription
