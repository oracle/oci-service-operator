                  properties:
                    bookingOptyNumber:
                      description: Booking Opportunity Number of Subscribed Service
                      type: string
                    commitmentServices:
                      description: List of Commitment services of a line
                      items:
                        description: SubscriptionSubscribedServiceCommitmentService
                          defines nested fields for Subscription.SubscribedService.CommitmentService.
                        properties:
                          availableAmount:
                            description: Commitment available amount
                            type: string
                          fundedAllocationValue:
                            description: Funded Allocation line value
                            type: string
                          lineNetAmount:
                            description: Commitment line net amount
