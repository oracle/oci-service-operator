                  family, registration type, and vendor. When registering an instance
                  with the corresonding characteristics, the default profile is used,
                  unless another profile is specified.
                type: boolean
              isServiceProvidedProfile:
                description: Indicates if the profile was created by the service.
                  OS Management Hub provides a limited set of standardized profiles
                  that can be used to register Autonomous Linux or Windows instances.
                type: boolean
              jsonData:
                type: string
              lifecycleEnvironment:
