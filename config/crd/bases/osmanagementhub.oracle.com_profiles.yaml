                properties:
                  displayName:
                    description: Managed instance group name.
                    type: string
                  id:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the managed instance group.
                    type: string
                type: object
              managementStationId:
                description: |-
                  The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the management station to associate with an
                  instance once registered. Management stations are only used by non-OCI instances.
                type: string
              osFamily:
                description: The operating system family.
                type: string
              profileType:
                type: string
              profileVersion:
                description: The version of the profile. The version is automatically
