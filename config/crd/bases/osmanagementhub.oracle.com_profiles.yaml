                items:
                  description: ProfileSoftwareSource defines nested fields for Profile.SoftwareSource.
                  properties:
                    description:
                      description: Software source description.
                      type: string
                    displayName:
                      description: Software source name.
                      type: string
                    id:
                      description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                        of the software source.
                      type: string
                    isMandatoryForAutonomousLinux:
                      description: Indicates whether this is a required software source
