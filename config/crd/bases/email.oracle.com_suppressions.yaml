---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: suppressions.email.oracle.com
spec:
  group: email.oracle.com
  names:
    kind: Suppression
    listKind: SuppressionList
    plural: suppressions
    singular: suppression
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the Suppression
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Suppression
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Suppression is the Schema for the suppressions API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SuppressionSpec defines the desired state of Suppression.
            properties:
              compartmentId:
                description: |-
                  The OCID of the compartment to contain the suppression. Since
                  suppressions are at the customer level, this must be the tenancy
                  OCID.
                type: string
              emailAddress:
                description: The recipient email address of the suppression.
                type: string
            required:
            - compartmentId
            - emailAddress
            type: object
          status:
            description: SuppressionStatus defines the observed state of Suppression.
            properties:
              compartmentId:
                description: |-
                  The OCID of the compartment to contain the suppression. Since
                  suppressions are at the customer level, this must be the tenancy
                  OCID.
                type: string
              emailAddress:
                description: Email address of the suppression.
                type: string
              errorDetail:
                description: |-
                  The specific error message returned by a system that resulted in the suppression.
                  This message is usually an SMTP error code with additional descriptive text.
                  Not provided for all types of suppressions.
                type: string
              errorSource:
                description: |-
                  DNS name of the source of the error that caused the suppression.
                  Will be set to either the remote-mta or reporting-mta field from a delivery status notification (RFC 3464) when available.
                  Not provided for all types of suppressions, and not always known.
                  Note: Most SMTP errors that cause suppressions come from software run by email receiving systems rather than from OCI email delivery itself.
                type: string
              id:
                description: The unique ID of the suppression.
                type: string
              messageId:
                description: |-
                  The value of the Message-ID header from the email that triggered a suppression.
                  This value is as defined in RFC 5322 section 3.6.4, excluding angle-brackets.
                  Not provided for all types of suppressions.
                type: string
              reason:
                description: The reason that the email address was suppressed. For
                  more information on the types of bounces, see Suppression List (https://docs.oracle.com/iaas/Content/Email/Concepts/overview.htm#components).
                type: string
              status:
                properties:
                  async:
                    description: |-
                      Async is the canonical controller-owned async contract. Resource-local
                      legacy work-request fields may remain as compatibility mirrors while
                      follow-on migrations land, but new async state should project here first.
                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
                            enum:
                            - none
                            - lifecycle
                            - workrequest
                            type: string
                          updatedAt:
                            format: date-time
                            type: string
                          workRequestId:
                            type: string
                        required:
                        - normalizedClass
                        - phase
                        - source
                        - updatedAt
                        type: object
                    type: object
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  opcRequestId:
                    description: |-
                      OpcRequestID is the latest non-empty OCI request ID from a mutating OCI
                      response or surfaced OCI service error that materially contributed to the
                      current shared status projection. Headerless follow-up observations keep
                      the last non-empty value intact.
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time the suppression was added in "YYYY-MM-ddThh:mmZ"
                  format with a Z offset, as defined by RFC 3339 (https://tools.ietf.org/html/rfc3339).
                type: string
              timeLastSuppressed:
                description: |-
                  The last date and time the suppression prevented submission
                  in "YYYY-MM-ddThh:mmZ"
                  format with a Z offset, as defined by RFC 3339 (https://tools.ietf.org/html/rfc3339).
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
