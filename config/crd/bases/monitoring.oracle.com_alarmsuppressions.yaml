              suppressionConditions:
                description: |-
                  Array of all preconditions for alarm suppression.
                  Example: `[{
                    conditionType: "RECURRENCE",
                    suppressionRecurrence: "FRQ=DAILY;BYHOUR=10",
                    suppressionDuration: "PT1H"
