                type: array
              lifecycleDetails:
                description: A message describing the current state in more detail.
                  For example, can be used to provide actionable information for a
                  resource in Failed state.
                type: string
              lifecycleState:
                description: The current state of the database system.
                type: string
              managementPolicy:
                description: DbSystemManagementPolicy defines nested fields for DbSystem.ManagementPolicy.
