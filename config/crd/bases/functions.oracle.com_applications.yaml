                      enabled for the application.
                    type: boolean
                  keyDetails:
                    description: A list of KMS key details.
                    items:
                      description: ApplicationImagePolicyConfigKeyDetail defines nested
                        fields for Application.ImagePolicyConfig.KeyDetail.
