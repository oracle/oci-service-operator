---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: dbsystems.mysql.oracle.com
spec:
  group: mysql.oracle.com
  names:
    kind: DbSystem
    listKind: DbSystemList
    plural: dbsystems
    singular: dbsystem
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the DbSystem
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the DbSystem
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: DbSystem is the Schema for the dbsystems API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DbSystemSpec defines the desired state of DbSystem.
            properties:
              accessMode:
                description: |-
                  The access mode indicating if the database access will be restricted only to administrators or not:
                   - UNRESTRICTED (default): the access to the database is not restricted;
                   - RESTRICTED: the access will be allowed only to users with specific privileges;
                     RESTRICTED will correspond to setting the MySQL system variable
                     offline_mode (https://dev.mysql.com/doc/en/server-system-variables.html#sysvar_offline_mode) to ON.
                type: string
              adminPassword:
                description: |-
                  The password for the administrative user sourced from a Kubernetes Secret in the same namespace.
                  The referenced Secret must contain a `password` key.
                properties:
                  secret:
                    properties:
                      secretName:
                        type: string
                    type: object
                type: object
              adminUsername:
                description: |-
                  The username for the administrative user sourced from a Kubernetes Secret in the same namespace.
                  The referenced Secret must contain a `username` key.
                properties:
                  secret:
                    properties:
                      secretName:
                        type: string
                    type: object
                type: object
              availabilityDomain:
                description: |-
                  The availability domain on which to deploy the Read/Write endpoint. This defines the preferred primary instance.
                  In a failover scenario, the Read/Write endpoint is redirected to one of the other availability domains
                  and the MySQL instance in that domain is promoted to the primary instance.
                  This redirection does not affect the IP address of the DB System in any way.
                  For a standalone DB System, this defines the availability domain in which the DB System is placed.
                type: string
              backupPolicy:
                description: DbSystemBackupPolicy defines nested fields for DbSystem.BackupPolicy.
                properties:
                  copyPolicies:
                    description: |-
                      List of policies of a DB system to schedule cross-region DB system backup copy.
                      The policy includes the name of the destination region to which the DB system backup will be copied, and
                      an optional parameter which specifies the retention period of the copied DB system backup in days.
                      **Note:** Currently, only one policy can be specified in the list.
                    items:
                      description: DbSystemBackupPolicyCopyPolicy defines nested fields
                        for DbSystem.BackupPolicy.CopyPolicy.
                      properties:
                        backupCopyRetentionInDays:
                          description: Number of days to retain the copied DB system
                            backup.
                          type: integer
                        copyToRegion:
                          description: The destination region name to which the DB
                            system backup will be copied.
                          type: string
                      required:
                      - copyToRegion
                      type: object
                    type: array
                  definedTags:
                    additionalProperties:
                      additionalProperties:
                        type: string
                      type: object
                    description: |-
                      Usage of predefined tag keys. These predefined keys are scoped to namespaces.
                      Tags defined here will be copied verbatim as tags on the Backup resource created by this BackupPolicy.
                      Example: `{"foo-namespace": {"bar-key": "value"}}`
                    type: object
                  freeformTags:
                    additionalProperties:
                      type: string
                    description: |-
                      Simple key-value pair applied without any predefined name, type or scope. Exists for cross-compatibility only.
                      Tags defined here will be copied verbatim as tags on the Backup resource created by this BackupPolicy.
                      Example: `{"bar-key": "value"}`
                    type: object
                  isEnabled:
                    description: Specifies if automatic backups are enabled.
                    type: boolean
                  pitrPolicy:
                    description: DbSystemBackupPolicyPitrPolicy defines nested fields
                      for DbSystem.BackupPolicy.PitrPolicy.
                    properties:
                      isEnabled:
                        description: Specifies if PITR is enabled or disabled.
                        type: boolean
                    required:
                    - isEnabled
                    type: object
                  retentionInDays:
                    description: Number of days to retain an automatic backup.
                    type: integer
                  softDelete:
                    description: |-
                      Retains the backup to be deleted due to the retention policy in DELETE SCHEDULED
                      state for 7 days before permanently deleting it.
                    type: string
                  windowStartTime:
                    description: |-
                      The start of a 30-minute window of time in which daily, automated backups occur.
                      This should be in the format of the "Time" portion of an RFC3339-formatted timestamp. Any second or sub-second time data will be truncated to zero.
                      At some point in the window, the system may incur a brief service disruption as the backup is performed.
                    type: string
                type: object
              compartmentId:
                description: The OCID of the compartment.
                type: string
              configurationId:
                description: The OCID of the Configuration to be used for this DB
                  System.
                type: string
              crashRecovery:
                description: |-
                  Whether to run the DB System with InnoDB Redo Logs and the Double Write Buffer enabled or disabled,
                  and whether to enable or disable syncing of the Binary Logs.
                type: string
              customerContacts:
                description: |-
                  The list of customer email addresses that receive information from Oracle about the specified OCI DB System resource.
                  Oracle uses these email addresses to send notifications about planned and unplanned software maintenance updates, information about system hardware, and other information needed by administrators.
                  Up to 10 email addresses can be added to the customer contacts for a DB System.
                items:
                  description: DbSystemCustomerContact defines nested fields for DbSystem.CustomerContact.
                  properties:
                    email:
                      description: The email address used by Oracle to send notifications
                        regarding the DB System.
                      type: string
                  required:
                  - email
                  type: object
                type: array
              dataStorage:
                description: DbSystemDataStorage defines nested fields for DbSystem.DataStorage.
                properties:
                  isAutoExpandStorageEnabled:
                    description: |-
                      Enable/disable automatic storage expansion. When set to true, the DB System will automatically
                      add storage incrementally up to the value specified in maxStorageSizeInGBs.
                    type: boolean
                  maxStorageSizeInGBs:
                    description: |-
                      Maximum storage size this DB System can expand to. When isAutoExpandStorageEnabled
                      is set to true, the DB System will add storage incrementally up to this value.
                      DB Systems with an initial storage size of 400 GB or less can be expanded up to 32 TB.
                      DB Systems with an initial storage size between 401-800 GB can be expanded up to 64 TB.
                      DB Systems with an initial storage size between 801-1200 GB can be expanded up to 96 TB.
                      DB Systems with an initial storage size of 1201 GB or more can be expanded up to 128 TB.
                      It is not possible to decrease data storage size. You cannot set the maximum data storage size to less
                      than either current DB System dataStorageSizeInGBs or allocatedStorageSizeInGBs.
                    type: integer
                type: object
              dataStorageSizeInGBs:
                description: |-
                  Initial size of the data volume in GBs that will be created and attached.
                  Keep in mind that this only specifies the size of the database data volume,
                  the log volume for the database will be scaled appropriately with its shape.
                type: integer
              databaseConsole:
                description: DbSystemDatabaseConsole defines nested fields for DbSystem.DatabaseConsole.
                properties:
                  port:
                    description: The port on which the database console can be accessed.
                      Supported port numbers are 443 and from 1024 to 65535.
                    type: integer
                  status:
                    description: Enable/disable the database console on the DB System.
                    type: string
                required:
                - status
                type: object
              databaseManagement:
                description: Whether to enable monitoring via the Database Management
                  service.
                type: string
              databaseMode:
                description: |-
                  The database mode indicating the types of statements that will be allowed to run in the DB system.
                  This mode will apply only to statements run by user connections. Replicated write statements will continue
                  to be allowed regardless of the DatabaseMode.
                    - READ_WRITE (default): allow running read and write statements on the DB system;
                    - READ_ONLY: only allow running read statements on the DB system.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Usage of predefined tag keys. These predefined keys are scoped to namespaces.
                  Example: `{"foo-namespace": {"bar-key": "value"}}`
                type: object
              deletionPolicy:
                description: DbSystemDeletionPolicy defines nested fields for DbSystem.DeletionPolicy.
                properties:
                  automaticBackupRetention:
                    description: Specifies if any automatic backups created for a
                      DB System should be retained or deleted when the DB System is
                      deleted.
                    type: string
                  finalBackup:
                    description: |-
                      Specifies whether or not a backup is taken when the DB System is deleted.
                        REQUIRE_FINAL_BACKUP: a backup is taken if the DB System is deleted.
                        SKIP_FINAL_BACKUP: a backup is not taken if the DB System is deleted.
                    type: string
                  isDeleteProtected:
                    description: Specifies whether the DB System can be deleted. Set
                      to true to prevent deletion, false (default) to allow.
                    type: boolean
                type: object
              description:
                description: User-provided data about the DB System.
                type: string
              displayName:
                description: The user-friendly name for the DB System. It does not
                  have to be unique.
                type: string
              encryptData:
                description: DbSystemEncryptData defines nested fields for DbSystem.EncryptData.
                properties:
                  keyGenerationType:
                    description: Select whether to use Oracle-managed key (SYSTEM)
                      or your own key (BYOK).
                    type: string
                  keyId:
                    description: The OCID of the key to use.
                    type: string
                required:
                - keyGenerationType
                type: object
              faultDomain:
                description: |-
                  The fault domain on which to deploy the Read/Write endpoint. This defines the preferred primary instance.
                  In a failover scenario, the Read/Write endpoint is redirected to one of the other fault domains
                  and the MySQL instance in that domain is promoted to the primary instance.
                  This redirection does not affect the IP address of the DB System in any way.
                  For a standalone DB System, this defines the fault domain in which the DB System is placed.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Simple key-value pair applied without any predefined name, type or scope. Exists for cross-compatibility only.
                  Example: `{"bar-key": "value"}`
                type: object
              hostnameLabel:
                description: |-
                  The hostname for the primary endpoint of the DB System. Used for DNS.
                  The value is the hostname portion of the primary private IP's fully qualified domain name (FQDN)
                  (for example, "dbsystem-1" in FQDN "dbsystem-1.subnet123.vcn1.oraclevcn.com").
                  Must be unique across all VNICs in the subnet and comply with RFC 952 and RFC 1123.
                type: string
              ipAddress:
                description: |-
                  The IP address the DB System is configured to listen on.
                  A private IP address of your choice to assign to the primary endpoint of the DB System.
                  Must be an available IP address within the subnet's CIDR. If you don't specify a value,
                  Oracle automatically assigns a private IP address from the subnet. This should be a
                  "dotted-quad" style IPv4 address.
                type: string
              isHighlyAvailable:
                description: |-
                  Specifies if the DB System is highly available.
                  When creating a DB System with High Availability, three instances
                  are created and placed according to your region- and
                  subnet-type. The secondaries are placed automatically in the other
                  two availability or fault domains.  You can choose the preferred
                  location of your primary instance, only.
                type: boolean
              maintenance:
                description: DbSystemMaintenance defines nested fields for DbSystem.Maintenance.
                properties:
                  maintenanceDisabledWindows:
                    description: |-
                      Time window during which downtime-inducing maintenance shall not be performed.
                      Downtime-free maintenance may be performed to apply required security patches.
                      At most one configured window is supported.
                    items:
                      description: DbSystemMaintenanceMaintenanceDisabledWindow defines
                        nested fields for DbSystem.Maintenance.MaintenanceDisabledWindow.
                      properties:
                        timeEnd:
                          description: |-
                            The time until when maintenance is disabled.
                            Must be set together with timeStart and must be after timeStart.
                            as described by RFC 3339 (https://tools.ietf.org/rfc/rfc3339).
                          type: string
                        timeStart:
                          description: |-
                            The time from when maintenance is disabled.
                            Must be set together with timeEnd and must be before timeEnd.
                            as described by RFC 3339 (https://tools.ietf.org/rfc/rfc3339).
                          type: string
                      required:
                      - timeEnd
                      - timeStart
                      type: object
                    type: array
                  maintenanceScheduleType:
                    description: |-
                      The maintenance schedule type of the DB system. Defaults to REGULAR.
                      EARLY:   Maintenance schedule follows a cycle where upgrades are performed when versions become deprecated.
                      REGULAR: Maintenance schedule follows the normal cycle where upgrades are performed when versions become unavailable.
                    type: string
                  versionPreference:
                    description: |-
                      The preferred version to target when performing an automatic MySQL upgrade. Defaults to OLDEST.
                      OLDEST: Choose the oldest available MySQL version based on the current version of the DB System.
                      SECOND_NEWEST: Choose the MySQL version before the newest for auto-upgrade.
                      NEWEST: Choose the latest and greatest MySQL version available for auto-upgrade.
                    type: string
                  versionTrackPreference:
                    description: |-
                      The preferred version track to target when performing an automatic MySQL upgrade. Defaults to FOLLOW.
                      LONG_TERM_SUPPORT: No MySQL database behavior changes.
                      INNOVATION:        Provides access to the latest features and all bug fixes.
                      FOLLOW:            Follows the track of the current MySQL version.
                    type: string
                  windowStartTime:
                    description: |-
                      The start of the 2 hour maintenance window.
                      This string is of the format: "{day-of-week} {time-of-day}".
                      "{day-of-week}" is a case-insensitive string like "mon", "tue", &c.
                      "{time-of-day}" is the "Time" portion of an RFC3339-formatted timestamp. Any second or sub-second time data will be truncated to zero.
                      If you set the read replica maintenance window to "" or if not specified, the read replica is set same as the DB system maintenance window.
                    type: string
                required:
                - windowStartTime
                type: object
              mysqlVersion:
                description: The specific MySQL version identifier.
                type: string
              nsgIds:
                description: Network Security Group OCIDs used for the VNIC attachment.
                items:
                  type: string
                type: array
              port:
                description: The port for primary endpoint of the DB System to listen
                  on.
                type: integer
              portX:
                description: The TCP network port on which X Plugin listens for connections.
                  This is the X Plugin equivalent of port.
                type: integer
              readEndpoint:
                description: DbSystemReadEndpoint defines nested fields for DbSystem.ReadEndpoint.
                properties:
                  excludeIps:
                    description: A list of IP addresses of read replicas that are
                      excluded from serving read requests.
                    items:
                      type: string
                    type: array
                  isEnabled:
                    description: Specifies if the DB System read endpoint is enabled
                      or not.
                    type: boolean
                  readEndpointHostnameLabel:
                    description: |-
                      The hostname for the read endpoint of the DB System. Used for DNS.
                      The value is the hostname portion of the primary private IP's fully qualified domain name (FQDN)
                      (for example, "dbsystem-1" in FQDN "dbsystem-1.subnet123.vcn1.oraclevcn.com").
                      Must be unique across all VNICs in the subnet and comply with RFC 952 and RFC 1123.
                    type: string
                  readEndpointIpAddress:
                    description: |-
                      The IP address the DB System read endpoint is configured to listen on.
                      A private IP address of your choice to assign to the read endpoint of the DB System.
                      Must be an available IP address within the subnet's CIDR. If you don't specify a value,
                      Oracle automatically assigns a private IP address from the subnet. This should be a
                      "dotted-quad" style IPv4 address.
                    type: string
                type: object
              rest:
                description: DbSystemRest defines nested fields for DbSystem.Rest.
                properties:
                  configuration:
                    description: Select how REST is configured across the DB System
                      instances.
                    type: string
                  port:
                    description: The port for REST to listen on. Supported port numbers
                      are 443 and from 1024 to 65535.
                    type: integer
                required:
                - configuration
                type: object
              secureConnections:
                description: DbSystemSecureConnections defines nested fields for DbSystem.SecureConnections.
                properties:
                  certificateGenerationType:
                    description: Select whether to use MySQL Database Service-managed
                      certificate (SYSTEM) or your own certificate (BYOC).
                    type: string
                  certificateId:
                    description: The OCID of the certificate to use.
                    type: string
                required:
                - certificateGenerationType
                type: object
              securityAttributes:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Security Attributes for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see ZPR Artifacts (https://docs.oracle.com/en-us/iaas/Content/zero-trust-packet-routing/zpr-artifacts.htm).
                  Example: `{"Oracle-ZPR": {"MaxEgressCount": {"value": "42", "mode": "audit"}}}`
                type: object
              shapeName:
                description: |-
                  The name of the shape. The shape determines the resources allocated
                  - CPU cores and memory for VM shapes; CPU cores, memory and storage
                  for non-VM (or bare metal) shapes. To get a list of shapes, use the
                  ListShapes operation.
                type: string
              source:
                description: DbSystemSource defines nested fields for DbSystem.Source.
                properties:
                  backupId:
                    description: The OCID of the backup to be used as the source for
                      the new DB System.
                    type: string
                  dbSystemId:
                    description: |-
                      The OCID of the DB System from which a backup shall be selected to be
                      restored when creating the new DB System. Use this together with
                      recovery point to perform a point in time recovery operation.
                    type: string
                  jsonData:
                    type: string
                  recoveryPoint:
                    description: |-
                      The date and time, as per RFC 3339, of the change up to which the
                      new DB System shall be restored to, using a backup and logs from the
                      original DB System. In case no point in time is specified, then this
                      new DB System shall be restored up to the latest change recorded for
                      the original DB System.
                    type: string
                  sourceType:
                    type: string
                  sourceUrl:
                    description: |-
                      The Pre-Authenticated Request (PAR) of a bucket/prefix or PAR of a @.manifest.json object from the Object Storage.
                      Check Using Pre-Authenticated Requests (https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/usingpreauthenticatedrequests.htm)
                      for information related to PAR creation.
                      Please create PAR with "Permit object reads" access type and "Enable Object Listing" permission when using a bucket/prefix PAR.
                      Please create PAR with "Permit object reads" access type when using a @.manifest.json object PAR.
                    type: string
                type: object
              subnetId:
                description: The OCID of the subnet the DB System is associated with.
                type: string
              telemetryConfiguration:
                description: DbSystemTelemetryConfiguration defines nested fields
                  for DbSystem.TelemetryConfiguration.
                properties:
                  logs:
                    description: Telemetry configuration details for logging.
                    items:
                      description: DbSystemTelemetryConfigurationLog defines nested
                        fields for DbSystem.TelemetryConfiguration.Log.
                      properties:
                        destination:
                          description: Type of destination where MySQL telemetry is
                            exposed to.
                          type: string
                        destinationConfigurations:
                          description: List of configuration variables for a given
                            destination type.
                          items:
                            description: DbSystemTelemetryConfigurationLogDestinationConfiguration
                              defines nested fields for DbSystem.TelemetryConfiguration.Log.DestinationConfiguration.
                            properties:
                              key:
                                description: Name of the destination configuration
                                  variable.
                                type: string
                              value:
                                description: Value of the destination configuration
                                  variable.
                                type: string
                            required:
                            - key
                            - value
                            type: object
                          type: array
                        logTypes:
                          description: List of MySQL telemetry types that can be exposed
                            on a telemetry destination
                          items:
                            type: string
                          type: array
                      required:
                      - destination
                      - destinationConfigurations
                      - logTypes
                      type: object
                    type: array
                type: object
            required:
            - compartmentId
            - shapeName
            - subnetId
            type: object
          status:
            description: DbSystemStatus defines the observed state of DbSystem.
            properties:
              accessMode:
                description: |-
                  The access mode indicating if the database access is unrestricted (to all MySQL user accounts),
                  or restricted (to only certain users with specific privileges):
                   - UNRESTRICTED: the access to the database is not restricted;
                   - RESTRICTED: access allowed only to users with specific privileges;
                     RESTRICTED will correspond to setting the MySQL system variable
                     offline_mode (https://dev.mysql.com/doc/en/server-system-variables.html#sysvar_offline_mode) to ON.
                type: string
              adminPassword:
                description: The last applied secret reference for the administrative
                  password.
                properties:
                  secret:
                    properties:
                      secretName:
                        type: string
                    type: object
                type: object
              adminUsername:
                description: The last applied secret reference for the administrative
                  username.
                properties:
                  secret:
                    properties:
                      secretName:
                        type: string
                    type: object
                type: object
              availabilityDomain:
                description: |-
                  The availability domain on which to deploy the Read/Write endpoint. This defines the preferred primary instance.
                  In a failover scenario, the Read/Write endpoint is redirected to one of the other availability domains
                  and the MySQL instance in that domain is promoted to the primary instance.
                  This redirection does not affect the IP address of the DB System in any way.
                  For a standalone DB System, this defines the availability domain in which the DB System is placed.
                type: string
              backupPolicy:
                description: DbSystemBackupPolicyObservedState defines nested fields
                  for DbSystem.BackupPolicy.
                properties:
                  copyPolicies:
                    description: |-
                      List of policies of a DB system to schedule cross-region DB system backup copy.
                      The policy includes the name of the destination region to which the DB system backup will be copied, and
                      an optional parameter which specifies the retention period of the copied DB system backup in days.
                      **Note:** Currently, only one policy can be specified in the list.
                    items:
                      description: DbSystemBackupPolicyCopyPolicy defines nested fields
                        for DbSystem.BackupPolicy.CopyPolicy.
                      properties:
                        backupCopyRetentionInDays:
                          description: Number of days to retain the copied DB system
                            backup.
                          type: integer
                        copyToRegion:
                          description: The destination region name to which the DB
                            system backup will be copied.
                          type: string
                      required:
                      - copyToRegion
                      type: object
                    type: array
                  definedTags:
                    additionalProperties:
                      additionalProperties:
                        type: string
                      type: object
                    description: |-
                      Usage of predefined tag keys. These predefined keys are scoped to namespaces.
                      Tags defined here will be copied verbatim as tags on the Backup resource created by this BackupPolicy.
                      Example: `{"foo-namespace": {"bar-key": "value"}}`
                    type: object
                  freeformTags:
                    additionalProperties:
                      type: string
                    description: |-
                      Simple key-value pair applied without any predefined name, type or scope. Exists for cross-compatibility only.
                      Tags defined here will be copied verbatim as tags on the Backup resource created by this BackupPolicy.
                      Example: `{"bar-key": "value"}`
                    type: object
                  isEnabled:
                    description: If automated backups are enabled or disabled.
                    type: boolean
                  pitrPolicy:
                    description: DbSystemBackupPolicyPitrPolicy defines nested fields
                      for DbSystem.BackupPolicy.PitrPolicy.
                    properties:
                      isEnabled:
                        description: Specifies if PITR is enabled or disabled.
                        type: boolean
                    required:
                    - isEnabled
                    type: object
                  retentionInDays:
                    description: The number of days automated backups are retained.
                    type: integer
                  softDelete:
                    description: |-
                      Retains the backup to be deleted due to the retention policy in DELETE SCHEDULED
                      state for 7 days before permanently deleting it.
                    type: string
                  windowStartTime:
                    description: |-
                      The start of a 30-minute window of time in which daily, automated backups occur.
                      This should be in the format of the "Time" portion of an RFC3339-formatted timestamp. Any second or sub-second time data will be truncated to zero.
                      At some point in the window, the system may incur a brief service disruption as the backup is performed.
                      If not defined, a window is selected from the following Region-based time-spans:
                      - eu-frankfurt-1: 20:00 - 04:00 UTC
                      - us-ashburn-1: 03:00 - 11:00 UTC
                      - uk-london-1: 06:00 - 14:00 UTC
                      - ap-tokyo-1: 13:00 - 21:00
                      - us-phoenix-1: 06:00 - 14:00
                    type: string
                type: object
              channels:
                description: A list with a summary of all the Channels attached to
                  the DB System.
                items:
                  description: DbSystemChannel defines nested fields for DbSystem.Channel.
                  properties:
                    compartmentId:
                      description: The OCID of the compartment.
                      type: string
                    definedTags:
                      additionalProperties:
                        additionalProperties:
                          type: string
                        type: object
                      description: |-
                        Usage of predefined tag keys. These predefined keys are scoped to namespaces.
                        Example: `{"foo-namespace": {"bar-key": "value"}}`
                      type: object
                    displayName:
                      description: The user-friendly name for the Channel. It does
                        not have to be unique.
                      type: string
                    freeformTags:
                      additionalProperties:
                        type: string
                      description: |-
                        Simple key-value pair applied without any predefined name, type or scope. Exists for cross-compatibility only.
                        Example: `{"bar-key": "value"}`
                      type: object
                    id:
                      description: The OCID of the Channel.
                      type: string
                    isEnabled:
                      description: Whether the Channel has been enabled by the user.
                      type: boolean
                    lifecycleDetails:
                      description: A message describing the state of the Channel.
                      type: string
                    lifecycleState:
                      description: The state of the Channel.
                      type: string
                    source:
                      description: DbSystemChannelSource defines nested fields for
                        DbSystem.Channel.Source.
                      properties:
                        anonymousTransactionsHandling:
                          description: DbSystemChannelSourceAnonymousTransactionsHandling
                            defines nested fields for DbSystem.Channel.Source.AnonymousTransactionsHandling.
                          properties:
                            jsonData:
                              type: string
                            lastConfiguredLogFilename:
