---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: protecteddatabases.recovery.oracle.com
spec:
  group: recovery.oracle.com
  names:
    kind: ProtectedDatabase
    listKind: ProtectedDatabaseList
    plural: protecteddatabases
    singular: protecteddatabase
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the ProtectedDatabase
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the ProtectedDatabase
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: ProtectedDatabase is the Schema for the protecteddatabases API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProtectedDatabaseSpec defines the desired state of ProtectedDatabase.
            properties:
              changeRate:
                description: The percentage of data changes that exist in the database
                  between successive incremental backups.
                type: number
              compartmentId:
                description: The OCID of the compartment that contains the protected
                  database.
                type: string
              compressionRatio:
                description: The compression ratio of the protected database. The
                  compression ratio represents the ratio of compressed block size
                  to expanded block size.
                type: number
              databaseId:
                description: The OCID of the protected database.
                type: string
              databaseSize:
                description: The size of the protected database. XS - Less than 5GB,
                  S - 5GB to 50GB, M - 50GB to 500GB, L - 500GB to 1TB, XL - 1TB to
                  5TB, XXL - Greater than 5TB.
                type: string
              databaseSizeInGBs:
                description: The size of the database, in gigabytes.
                type: integer
              dbUniqueName:
                description: The dbUniqueName of the protected database in Recovery
                  Service. You cannot change the unique name.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  Example: `{"foo-namespace": {"bar-key": "value"}}`. For more information, see Resource Tags (https://docs.oracle.com/en-us/iaas/Content/General/Concepts/resourcetags.htm)
                type: object
              displayName:
                description: The protected database name. You can change the displayName.
                  Avoid entering confidential information.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Simple key-value pair that is applied without any predefined name, type or scope. Exists for cross-compatibility only.
                  Example: `{"bar-key": "value"}`
                type: object
              isRedoLogsShipped:
                description: |-
                  The value TRUE indicates that the protected database is configured to use Real-time data protection, and redo-data is sent from the protected database to Recovery Service.
                  Real-time data protection substantially reduces the window of potential data loss that exists between successive archived redo log backups.
                type: boolean
              password:
                description: |-
                  Password credential which can be used to connect to Protected Database.
                  It must contain at least 2 uppercase, 2 lowercase, 2 numeric and 2 special characters.
                  The special characters must be underscore (_), number sign (#) or hyphen (-). The password must not contain the username "admin", regardless of casing.
                type: string
              protectionPolicyId:
                description: The OCID of the protection policy associated with the
                  protected database.
                type: string
              recoveryServiceSubnets:
                description: List of recovery service subnet resources associated
                  with the protected database.
                items:
                  description: ProtectedDatabaseRecoveryServiceSubnet defines nested
                    fields for ProtectedDatabase.RecoveryServiceSubnet.
                  properties:
                    recoveryServiceSubnetId:
                      description: The recovery service subnet OCID.
                      type: string
                  required:
                  - recoveryServiceSubnetId
                  type: object
                type: array
              subscriptionId:
                description: |-
                  The OCID of the cloud service subscription to which you want to link the protected database.
                  For example, specify the Microsoft Azure subscription ID if you want to provision the protected database in Azure.
                type: string
            required:
            - compartmentId
            - dbUniqueName
            - displayName
            - password
            - protectionPolicyId
            - recoveryServiceSubnets
            type: object
          status:
            description: ProtectedDatabaseStatus defines the observed state of ProtectedDatabase.
            properties:
              changeRate:
                description: The percentage of data changes that exist in the database
                  between successive incremental backups.
                type: number
              compartmentId:
                description: The OCID of the compartment that contains the protected
                  database.
                type: string
              compressionRatio:
                description: The compression ratio of the protected database. The
                  compression ratio represents the ratio of compressed block size
                  to expanded block size.
                type: number
              databaseId:
                description: The OCID of the protected database.
                type: string
              databaseSize:
                description: The size of the protected database. XS - Less than 5GB,
                  S - 5GB to 50GB, M - 50GB to 500GB, L - 500GB to 1TB, XL - 1TB to
                  5TB, XXL - Greater than 5TB.
                type: string
              databaseSizeInGBs:
                description: The size of the database in GBs, in gigabytes.
                type: integer
              dbUniqueName:
                description: The dbUniqueName for the protected database in Recovery
                  Service. You cannot change the unique name.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  Example: `{"foo-namespace": {"bar-key": "value"}}`. For more information, see Resource Tags (https://docs.oracle.com/en-us/iaas/Content/General/Concepts/resourcetags.htm)
                type: object
              displayName:
                description: The protected database name. You can change the displayName.
                  Avoid entering confidential information.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Simple key-value pair that is applied without any predefined name, type or scope. Exists for cross-compatibility only.
                  Example: `{"bar-key": "value"}`
                type: object
              health:
                description: |-
                  Indicates the protection status of the database.
                  A 'PROTECTED' status indicates that Recovery Service can ensure database recovery to any point in time within the entire recovery window. The potential data loss exposure since the last backup is:
                   - Less than 10 seconds, if Real-time data protection is enabled
                   - Less than 70 minutes if Real-time data protection is disabled
                  A 'WARNING' status indicates that Recovery Service can ensure database recovery within the current recovery window - 1 day. The potential data loss exposure since the last backup is:
                   - Greater than 10 seconds, if Real-time data protection is enabled
                   - Greater than 60 minutes, if if Real-time data protection is disabled
                  An 'ALERT' status indicates that Recovery Service cannot recover the database within the current recovery window.
                type: string
              healthDetails:
                description: A message describing the current health of the protected
                  database.
                type: string
              id:
                description: The OCID of the protected database.
                type: string
              isReadOnlyResource:
                description: |-
                  Indicates whether the protected database is created by Recovery Service or created manually.
                  Set to <b>TRUE</b> for a service-defined protected database. When you enable the OCI-managed automatic backups option for a database and set Recovery Service as the backup destination, then Recovery Service creates the associated protected database resource.
                  Set to <b>FALSE</b> for a user-defined protected database.
                type: boolean
              isRedoLogsShipped:
                description: |-
                  The value TRUE indicates that the protected database is configured to use Real-time data protection, and redo-data is sent from the protected database to Recovery Service.
                  Real-time data protection substantially reduces the window of potential data loss that exists between successive archived redo log backups. For this to be effective, additional
                  configuration is needed on client side.
                type: boolean
              lifecycleDetails:
                description: Detailed description about the current lifecycle state
                  of the protected database. For example, it can be used to provide
                  actionable information for a resource in a Failed state.
                type: string
              lifecycleState:
                description: The current state of the Protected Database.
                type: string
              metrics:
                description: ProtectedDatabaseMetrics defines nested fields for ProtectedDatabase.Metrics.
                properties:
                  backupSpaceEstimateInGBs:
                    description: The estimated backup storage space, in gigabytes,
                      required to meet the recovery window goal, including foot print
                      and backups for the protected database.
                    type: number
                  backupSpaceUsedInGBs:
                    description: Backup storage space, in gigabytes, utilized by the
                      protected database. Oracle charges for the total storage used.
                    type: number
                  currentRetentionPeriodInSeconds:
                    description: Number of seconds backups are currently retained
                      for this database.
                    type: number
                  dbSizeInGBs:
                    description: The estimated space, in gigabytes, consumed by the
                      protected database. The database size is based on the size of
                      the data files in the catalog, and does not include archive
                      logs.
                    type: number
                  isRedoLogsEnabled:
                    description: |-
                      The value TRUE indicates that the protected database is configured to use Real-time data protection, and redo-data is sent from the protected database to Recovery Service.
                      Real-time data protection substantially reduces the window of potential data loss that exists between successive archived redo log backups.
                    type: boolean
                  minimumRecoveryNeededInDays:
                    description: Number of days of redo/archive to be applied to recover
                      database.
                    type: number
                  retentionPeriodInDays:
                    description: The maximum number of days to retain backups for
                      a protected database.
                    type: number
                  unprotectedWindowInSeconds:
                    description: |-
                      This is the time window when there is data loss exposure. The point after which recovery is impossible unless additional redo is available.
                      This is the time we received the last backup or last redo-log shipped.
                    type: number
                type: object
              policyLockedDateTime:
                description: |-
                  An RFC3339 formatted datetime string that specifies the exact date and time for the retention lock to take effect and permanently lock the retention period defined in the policy.
                  The retention lock feature controls whether Recovery Service strictly preserves backups for the duration defined in a policy. Retention lock is useful to enforce recovery window compliance and to prevent unintentional modifications to protected database backups.
                  Recovery Service enforces a 14-day delay before the retention lock set for a policy can take effect.
                type: string
              protectionPolicyId:
                description: The OCID of the protection policy associated with the
                  protected database.
                type: string
              recoveryServiceSubnets:
                description: List of recovery service subnet resources associated
                  with the protected database.
                items:
                  description: ProtectedDatabaseRecoveryServiceSubnet defines nested
                    fields for ProtectedDatabase.RecoveryServiceSubnet.
                  properties:
                    recoveryServiceSubnetId:
                      description: The recovery service subnet OCID.
                      type: string
                  required:
                  - recoveryServiceSubnetId
                  type: object
                type: array
              status:
                properties:
                  async:
                    description: |-
                      Async is the canonical controller-owned async contract. Resource-local
                      legacy work-request fields may remain as compatibility mirrors while
                      follow-on migrations land, but new async state should project here first.
                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
                            enum:
                            - none
                            - lifecycle
                            - workrequest
                            type: string
                          updatedAt:
                            format: date-time
                            type: string
                          workRequestId:
                            type: string
                        required:
                        - normalizedClass
                        - phase
                        - source
                        - updatedAt
                        type: object
                    type: object
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  opcRequestId:
                    description: |-
                      OpcRequestID is the latest non-empty OCI request ID from a mutating OCI
                      response or surfaced OCI service error that materially contributed to the
                      current shared status projection. Headerless follow-up observations keep
                      the last non-empty value intact.
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              subscriptionId:
                description: The OCID of the cloud service subscription to which the
                  protected database is linked.
                type: string
              systemTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Usage of system tag keys. These predefined keys are scoped to namespaces.
                  Example: `{"orcl-cloud": {"free-tier-retained": "true"}}`. For more information, see Resource Tags (https://docs.oracle.com/en-us/iaas/Content/General/Concepts/resourcetags.htm)
                type: object
              timeCreated:
                description: 'An RFC3339 formatted datetime string that indicates
                  the created time for a protected database. For example: ''2020-05-22T21:10:29.600Z'''
                type: string
              timeUpdated:
                description: 'An RFC3339 formatted datetime string that indicates
                  the last updated time for a protected database. For example: ''2020-05-22T21:10:29.600Z'''
                type: string
              vpcUserName:
                description: The virtual private catalog (VPC) user credentials that
                  authenticates the protected database to access Recovery Service.
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
