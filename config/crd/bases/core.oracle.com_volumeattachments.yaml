                      type: string
                    iqn:
                      description: |-
                        The target volume's iSCSI Qualified Name in the format defined
                        by RFC 3720 (https://tools.ietf.org/html/rfc3720#page-32).
                        Example: `iqn.2015-12.com.oracleiaas:40b7ee03-883f-46c6-a951-63d2841d2195`
                      type: string
                    port:
                      description: |-
                        The volume's iSCSI port, usually port 860 or 3260.
                        Example: `3260`
                      type: integer
                  type: object
                type: array
              port:
                description: |-
                  The volume's iSCSI port, usually port 860 or 3260.
                  Example: `3260`
                type: integer
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time the volume was created, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339).
