---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: volumeattachments.core.oracle.com
spec:
  group: core.oracle.com
  names:
    kind: VolumeAttachment
    listKind: VolumeAttachmentList
    plural: volumeattachments
    singular: volumeattachment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the VolumeAttachment
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the VolumeAttachment
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: VolumeAttachment is the Schema for the volumeattachments API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VolumeAttachmentSpec defines the desired state of VolumeAttachment.
            properties:
              iscsiLoginState:
                description: |-
                  The iscsi login state of the volume attachment. For a multipath volume attachment,
                  all iscsi sessions need to be all logged-in or logged-out to be in logged-in or logged-out state.
                type: string
            type: object
          status:
            description: VolumeAttachmentStatus defines the observed state of VolumeAttachment.
            properties:
              attachmentType:
                type: string
              availabilityDomain:
                description: |-
                  The availability domain of an instance.
                  Example: `Uocm:PHX-AD-1`
                type: string
              chapSecret:
                description: |-
                  The Challenge-Handshake-Authentication-Protocol (CHAP) secret
                  valid for the associated CHAP user name.
                  (Also called the "CHAP password".)
                type: string
              chapUsername:
                description: |-
                  The volume's system-generated Challenge-Handshake-Authentication-Protocol
                  (CHAP) user name. See RFC 1994 (https://tools.ietf.org/html/rfc1994) for more on CHAP.
                  Example: `ocid1.volume.oc1.phx.<unique_ID>`
                type: string
              compartmentId:
                description: The OCID of the compartment.
                type: string
              device:
                description: The device name.
                type: string
              displayName:
                description: |-
                  A user-friendly name. Does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                type: string
              encryptionInTransitType:
                description: |-
                  Refer the top-level definition of encryptionInTransitType.
                  The default value is NONE.
                type: string
              id:
                description: The OCID of the volume attachment.
                type: string
              instanceId:
                description: The OCID of the instance the volume is attached to.
                type: string
              ipv4:
                description: |-
                  The volume's iSCSI IP address.
                  Example: `169.254.0.2`
                type: string
              iqn:
                description: |-
                  The target volume's iSCSI Qualified Name in the format defined
                  by RFC 3720 (https://tools.ietf.org/html/rfc3720#page-32).
                  Example: `iqn.2015-12.us.oracle.com:<CHAP_username>`
                type: string
              isAgentAutoIscsiLoginEnabled:
                description: Whether Oracle Cloud Agent is enabled perform the iSCSI
                  login and logout commands after the volume attach or detach operations
                  for non multipath-enabled iSCSI attachments.
                type: boolean
              isMultipath:
                description: Whether the Iscsi or Paravirtualized attachment is multipath
                  or not, it is not applicable to NVMe attachment.
                type: boolean
              isPvEncryptionInTransitEnabled:
                description: Whether in-transit encryption for the data volume's paravirtualized
                  attachment is enabled or not.
                type: boolean
              isReadOnly:
                description: Whether the attachment was created in read-only mode.
                type: boolean
              isShareable:
                description: |-
                  Whether the attachment should be created in shareable mode. If an attachment
                  is created in shareable mode, then other instances can attach the same volume, provided
                  that they also create their attachments in shareable mode. Only certain volume types can
                  be attached in shareable mode. Defaults to false if not specified.
                type: boolean
              isVolumeCreatedDuringLaunch:
                description: |-
                  Flag indicating if this volume was created for the customer as part of a simplified launch.
                  Used to determine whether the volume requires deletion on instance termination.
                type: boolean
              iscsiLoginState:
                description: |-
                  The iscsi login state of the volume attachment. For a Iscsi volume attachment,
                  all iscsi sessions need to be all logged-in or logged-out to be in logged-in or logged-out state.
                type: string
              jsonData:
                type: string
              lifecycleState:
                description: The current state of the volume attachment.
                type: string
              multipathDevices:
                description: A list of secondary multipath devices
