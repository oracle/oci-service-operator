---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: alarms.monitoring.oracle.com
spec:
  group: monitoring.oracle.com
  names:
    kind: Alarm
    listKind: AlarmList
    plural: alarms
    singular: alarm
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the Alarm
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Alarm
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Alarm is the Schema for the alarms API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AlarmSpec defines the desired state of Alarm.
            properties:
              alarmSummary:
                description: |-
                  Customizable alarm summary (`alarmSummary` alarm message parameter (https://docs.oracle.com/iaas/Content/Monitoring/alarm-message-format.htm)).
                  Optionally include dynamic variables (https://docs.oracle.com/iaas/Content/Monitoring/Tasks/update-alarm-dynamic-variables.htm).
                  The alarm summary appears within the body of the alarm message and in responses to
                  ListAlarmsStatus
                  GetAlarmHistory and
                  RetrieveDimensionStates.
                type: string
              body:
                description: |-
                  The human-readable content of the delivered alarm notification.
                  Optionally include dynamic variables (https://docs.oracle.com/iaas/Content/Monitoring/Tasks/update-alarm-dynamic-variables.htm).
                  Oracle recommends providing guidance
                  to operators for resolving the alarm condition. Consider adding links to standard runbook
                  practices. Avoid entering confidential information.
                  Example: `High CPU usage alert. Follow runbook instructions for resolution.`
                type: string
              compartmentId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment containing the alarm.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Usage of predefined tag keys. These predefined keys are scoped to namespaces.
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              destinations:
                description: |-
                  A list of destinations for alarm notifications.
                  Each destination is represented by the OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of a related resource, such as a NotificationTopic.
                  Supported destination services: Notifications, Streaming.
                  Limit: One destination per supported destination service.
                items:
                  type: string
                type: array
              displayName:
                description: |-
                  A user-friendly name for the alarm. It does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                  This value determines the title of each alarm notification.
                  Example: `High CPU Utilization`
                type: string
              evaluationSlackDuration:
                description: |-
                  Customizable slack period to wait for metric ingestion before evaluating the alarm.
                  Specify a string in ISO 8601 format (`PT10M` for ten minutes or `PT1H`
                  for one hour). Minimum: PT3M. Maximum: PT2H. Default: PT3M.
                  For more information about the slack period, see
                  About the Internal Reset Period (https://docs.oracle.com/iaas/Content/Monitoring/Concepts/monitoringoverview.htm#reset).
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Simple key-value pair that is applied without any predefined name, type or scope. Exists for cross-compatibility only.
                  Example: `{"Department": "Finance"}`
                type: object
              isEnabled:
                description: |-
                  Whether the alarm is enabled.
                  Example: `true`
                type: boolean
              isNotificationsPerMetricDimensionEnabled:
                description: |-
                  When set to `true`, splits alarm notifications per metric stream.
                  When set to `false`, groups alarm notifications across metric streams.
                  Example: `true`
                type: boolean
              messageFormat:
                description: |-
                  The format to use for alarm notifications. The formats are:
                  * `RAW` - Raw JSON blob. Default value. When the `destinations` attribute specifies `Streaming`, all alarm notifications use this format.
                  * `PRETTY_JSON`: JSON with new lines and indents. Available when the `destinations` attribute specifies `Notifications` only.
                  * `ONS_OPTIMIZED`: Simplified, user-friendly layout. Available when the `destinations` attribute specifies `Notifications` only. Applies to Email subscription types only.
                type: string
              metricCompartmentId:
                description: |-
                  The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the compartment containing the metric
                  being evaluated by the alarm.
                type: string
              metricCompartmentIdInSubtree:
                description: |-
                  When true, the alarm evaluates metrics from all compartments and subcompartments. The parameter can
                  only be set to true when metricCompartmentId is the tenancy OCID (the tenancy is the root compartment).
                  A true value requires the user to have tenancy-level permissions. If this requirement is not met,
                  then the call is rejected. When false, the alarm evaluates metrics from only the compartment specified
                  in metricCompartmentId. Default is false.
                  Example: `true`
                type: boolean
              namespace:
                description: |-
                  The source service or application emitting the metric that is evaluated by the alarm.
                  Example: `oci_computeagent`
                type: string
              notificationTitle:
                description: |-
                  Customizable notification title (`title` alarm message parameter (https://docs.oracle.com/iaas/Content/Monitoring/alarm-message-format.htm)).
                  Optionally include dynamic variables (https://docs.oracle.com/iaas/Content/Monitoring/Tasks/update-alarm-dynamic-variables.htm).
                  The notification title appears as the subject line in a formatted email message and as the title in a Slack message.
                type: string
              notificationVersion:
                description: |-
                  The version of the alarm notification to be delivered. Allowed value: `1.X`
                  The value must start with a number (up to four digits), followed by a period and an uppercase X.
                type: string
              overrides:
                description: |-
                  A set of overrides that control evaluations of the alarm.
                  Each override can specify values for query, severity, body, and pending duration.
                  When an alarm contains overrides, the Monitoring service evaluates each override in order, beginning with the first override in the array (index position `0`),
                  and then evaluates the alarm's base values (`ruleName` value of `BASE`).
                items:
                  description: AlarmOverride defines nested fields for Alarm.Override.
                  properties:
                    body:
                      description: |-
                        The human-readable content of the delivered alarm notification.
                        Optionally include dynamic variables (https://docs.oracle.com/iaas/Content/Monitoring/Tasks/update-alarm-dynamic-variables.htm).
                        Oracle recommends providing guidance
                        to operators for resolving the alarm condition. Consider adding links to standard runbook
                        practices. Avoid entering confidential information.
                        Example: `High CPU usage alert. Follow runbook instructions for resolution.`
                      type: string
                    pendingDuration:
                      description: |-
                        The period of time that the condition defined in the alarm must persist before the alarm state
                        changes from "OK" to "FIRING". For example, a value of 5 minutes means that the
                        alarm must persist in breaching the condition for five minutes before the alarm updates its
                        state to "FIRING".
                        The duration is specified as a string in ISO 8601 format (`PT10M` for ten minutes or `PT1H`
                        for one hour). Minimum: PT1M. Maximum: PT1H. Default: PT1M.
                        Under the default value of PT1M, the first evaluation that breaches the alarm updates the
                        state to "FIRING".
                        The alarm updates its status to "OK" when the breaching condition has been clear for
                        the most recent minute.
                        Example: `PT5M`
                      type: string
                    query:
                      description: |-
                        The Monitoring Query Language (MQL) expression to evaluate for the alarm. The Alarms feature of
                        the Monitoring service interprets results for each returned time series as Boolean values,
                        where zero represents false and a non-zero value represents true. A true value means that the trigger
                        rule condition has been met. The query must specify a metric, statistic, interval, and trigger
                        rule (threshold or absence). Supported values for interval depend on the specified time range. More
                        interval values are supported for smaller time ranges. You can optionally
                        specify dimensions and grouping functions.
                        Also, you can customize the
                        absence detection period (https://docs.oracle.com/iaas/Content/Monitoring/Tasks/create-edit-alarm-query-absence-detection-period.htm).
                        Supported grouping functions: `grouping()`, `groupBy()`.
                        For information about writing MQL expressions, see
                        Editing the MQL Expression for a Query (https://docs.oracle.com/iaas/Content/Monitoring/Tasks/query-metric-mql.htm).
                        For details about MQL, see
                        Monitoring Query Language (MQL) Reference (https://docs.oracle.com/iaas/Content/Monitoring/Reference/mql.htm).
                        For available dimensions, review the metric definition for the supported service. See
                        Supported Services (https://docs.oracle.com/iaas/Content/Monitoring/Concepts/monitoringoverview.htm#SupportedServices).
                        Example of threshold alarm:
                          -----
                            CpuUtilization[1m]{availabilityDomain="cumS:PHX-AD-1"}.groupBy(availabilityDomain).percentile(0.9) > 85
                          -----
                        Example of absence alarm:
                          -----
                            CpuUtilization[1m]{availabilityDomain="cumS:PHX-AD-1"}.absent()
                          -----
                        Example of absence alarm with custom absence detection period of 20 hours:
                          -----

                            CpuUtilization[1m]{availabilityDomain="cumS:PHX-AD-1"}.absent(20h)

                          -----
                      type: string
                    ruleName:
                      description: A user-friendly description for this alarm override.
                        Must be unique across all `ruleName` values for the alarm.
                      type: string
                    severity:
                      description: |-
                        The perceived severity of the alarm with regard to the affected system.
                        Example: `CRITICAL`
                      type: string
                  type: object
                type: array
              pendingDuration:
