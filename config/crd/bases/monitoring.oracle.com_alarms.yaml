                  Default value: null (notifications are not re-submitted).
                  Example: `PT2H`
                type: string
              resolution:
                description: 'The time between calculated aggregation windows for
                  the alarm. Supported value: `1m`'
                type: string
              resourceGroup:
                description: |-
                  Resource group to match for metric data retrieved by the alarm. A resource group is a custom string that you can match when retrieving custom metrics. Only one resource group can be applied per metric.
                  A valid resourceGroup value starts with an alphabetical character and includes only alphanumeric characters, periods (.), underscores (_), hyphens (-), and dollar signs ($).
                  Example: `frontend-fleet`
                type: string
              ruleName:
                description: |-
                  Identifier of the alarm's base values for alarm evaluation, for use when the alarm contains overrides.
                  Default value is `BASE`. For information about alarm overrides, see AlarmOverride.
                type: string
              severity:
                description: |-
                  The perceived type of response required when the alarm is in the "FIRING" state.
                  Example: `CRITICAL`
                type: string
              status:
                properties:
                  async:
                    description: |-
                      Async is the canonical controller-owned async contract. Resource-local
                      legacy work-request fields may remain as compatibility mirrors while
                      follow-on migrations land, but new async state should project here first.
                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
                            enum:
                            - none
                            - lifecycle
                            - workrequest
                            type: string
                          updatedAt:
                            format: date-time
                            type: string
                          workRequestId:
                            type: string
                        required:
                        - normalizedClass
                        - phase
                        - source
                        - updatedAt
                        type: object
                    type: object
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  opcRequestId:
                    description: |-
                      OpcRequestID is the latest non-empty OCI request ID from a mutating OCI
                      response or surfaced OCI service error that materially contributed to the
                      current shared status projection. Headerless follow-up observations keep
                      the last non-empty value intact.
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              suppression:
                description: The configuration details for suppressing an alarm.
                properties:
                  description:
                    description: |-
                      Human-readable reason for suppressing alarm notifications.
                      It does not have to be unique, and it's changeable.
                      Avoid entering confidential information.
                      Oracle recommends including tracking information for the event or associated work,
                      such as a ticket number.
                      Example: `Planned outage due to change IT-1234.`
                    type: string
                  timeSuppressFrom:
                    description: |-
                      The start date and time for the suppression to take place, inclusive. Format defined by RFC3339.
                      Example: `2023-02-01T01:02:29.600Z`
                    type: string
                  timeSuppressUntil:
                    description: |-
                      The end date and time for the suppression to take place, inclusive. Format defined by RFC3339.
                      Example: `2023-02-01T02:02:29.600Z`
                    type: string
                required:
                - timeSuppressFrom
                - timeSuppressUntil
                type: object
              timeCreated:
                description: |-
                  The date and time the alarm was created. Format defined by RFC3339.
                  Example: `2023-02-01T01:02:29.600Z`
                type: string
              timeUpdated:
                description: |-
                  The date and time the alarm was last updated. Format defined by RFC3339.
                  Example: `2023-02-03T01:02:29.600Z`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
