              repeatNotificationDuration:
                description: |-
                  The frequency for re-submitting alarm notifications, if the alarm keeps firing without
                  interruption. Format defined by ISO 8601. For example, `PT4H` indicates four hours.
                  Minimum: PT1M. Maximum: P30D.
                  Default value: null (notifications are not re-submitted).
                  Example: `PT2H`
                type: string
              resolution:
                description: 'The time between calculated aggregation windows for
                  the alarm. Supported value: `1m`'
                type: string
              resourceGroup:
                description: |-
                  Resource group that you want to match. A null value returns only metric data that has no resource groups. The alarm retrieves metric data associated with the specified resource group only. Only one resource group can be applied per metric.
                  A valid resourceGroup value starts with an alphabetical character and includes only alphanumeric characters, periods (.), underscores (_), hyphens (-), and dollar signs ($).
                  Avoid entering confidential information.
                  Example: `frontend-fleet`
                type: string
              ruleName:
                description: |-
                  Identifier of the alarm's base values for alarm evaluation, for use when the alarm contains overrides.
                  Default value is `BASE`. For information about alarm overrides, see AlarmOverride.
                type: string
              severity:
                description: |-
                  The perceived type of response required when the alarm is in the "FIRING" state.
                  Example: `CRITICAL`
                type: string
              suppression:
                description: The configuration details for suppressing an alarm.
                properties:
                  description:
                    description: |-
                      Human-readable reason for suppressing alarm notifications.
                      It does not have to be unique, and it's changeable.
                      Avoid entering confidential information.
                      Oracle recommends including tracking information for the event or associated work,
                      such as a ticket number.
                      Example: `Planned outage due to change IT-1234.`
                    type: string
                  timeSuppressFrom:
                    description: |-
                      The start date and time for the suppression to take place, inclusive. Format defined by RFC3339.
                      Example: `2023-02-01T01:02:29.600Z`
                    type: string
                  timeSuppressUntil:
                    description: |-
                      The end date and time for the suppression to take place, inclusive. Format defined by RFC3339.
                      Example: `2023-02-01T02:02:29.600Z`
                    type: string
                required:
                - timeSuppressFrom
                - timeSuppressUntil
                type: object
