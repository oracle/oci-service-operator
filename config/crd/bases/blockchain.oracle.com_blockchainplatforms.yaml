                  resource in Failed state.
                type: string
              lifecycleState:
                description: The current state of the Platform Instance.
                type: string
              loadBalancerShape:
                description: Type of Load Balancer shape - LB_100_MBPS or LB_400_MBPS.
                  Default is LB_100_MBPS.
                type: string
              platformRole:
                description: Role of platform - FOUNDER or PARTICIPANT
                type: string
              platformShapeType:
                description: Type of Platform shape - DEFAULT or CUSTOM
                type: string
              platformVersion:
                description: Platform Version
                type: string
              replicas:
                description: BlockchainPlatformReplicas defines nested fields for
                  BlockchainPlatform.Replicas.
                properties:
                  caCount:
                    description: Number of CA replicas
                    type: integer
                  consoleCount:
                    description: Number of console replicas
                    type: integer
                  proxyCount:
