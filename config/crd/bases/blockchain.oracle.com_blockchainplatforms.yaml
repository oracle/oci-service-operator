              storageSizeInTBs:
                description: Storage size in TBs
                type: number
              storageUsedInTBs:
                description: Storage used in TBs
                type: number
              timeCreated:
                description: The time the the Platform Instance was created. An RFC3339
                  formatted datetime string
                type: string
              timeUpdated:
                description: The time the Platform Instance was updated. An RFC3339
                  formatted datetime string
                type: string
              totalOcpuCapacity:
                description: Number of total OCPUs allocated to the platform cluster
                type: integer
