    controller-gen.kubebuilder.io/version: v0.17.0
  name: blockchainplatforms.blockchain.oracle.com
spec:
  group: blockchain.oracle.com
  names:
    kind: BlockchainPlatform
    listKind: BlockchainPlatformList
    plural: blockchainplatforms
    singular: blockchainplatform
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the BlockchainPlatform
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the BlockchainPlatform
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: BlockchainPlatform is the Schema for the blockchainplatforms
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BlockchainPlatformSpec defines the desired state of BlockchainPlatform.
            properties:
              caCertArchiveText:
                description: |-
                  Base64 encoded text in ASCII character set of a Thirdparty CA Certificates archive file.
                  The Archive file is a zip file containing third part CA Certificates,
                  the ca key and certificate files used when issuing enrollment certificates
                  (ECerts) and transaction certificates (TCerts). The chainfile (if it exists)
                  contains the certificate chain which should be trusted for this CA, where
                  the 1st in the chain is always the root CA certificate.
                  File list in zip file [ca-cert.pem,ca-key.pem,ca-chain.pem(optional)].
                type: string
              compartmentId:
                description: Compartment Identifier
                type: string
              computeShape:
                description: Compute shape - STANDARD or ENTERPRISE_SMALL or ENTERPRISE_MEDIUM
                  or ENTERPRISE_LARGE or ENTERPRISE_EXTRA_LARGE
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  Example: `{"foo-namespace": {"bar-key": "value"}}`
                type: object
              description:
                description: Platform Instance Description
                type: string
              displayName:
                description: Platform Instance Display name, can be renamed
                type: string
              federatedUserId:
                description: Identifier for a federated user
                type: string
              freeformTags:
                additionalProperties:
                  type: string
