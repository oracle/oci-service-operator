                  caCount:
                    description: Number of CA replicas
                    type: integer
                  consoleCount:
                    description: Number of console replicas
                    type: integer
                  proxyCount:
                    description: Number of REST proxy replicas
                    type: integer
                type: object
              storageSizeInTBs:
                description: Storage size in TBs
                type: number
              totalOcpuCapacity:
                description: Number of total OCPUs to allocate
                type: integer
