                          properties:
                            ocpuAllocationNumber:
                              description: Number of OCPU allocation
                              type: number
                          type: object
                        peerKey:
                          description: peer identifier
                          type: string
                        role:
                          description: Peer role
                          type: string
                      type: object
                    type: array
                type: object
              computeShape:
                description: Compute shape - STANDARD or ENTERPRISE_SMALL or ENTERPRISE_MEDIUM
                  or ENTERPRISE_LARGE or ENTERPRISE_EXTRA_LARGE or ENTERPRISE_CUSTOM
                  or DIGITAL_ASSETS_MEDIUM or DIGITAL_ASSETS_LARGE or DIGITAL_ASSETS_EXTRA_LARGE
