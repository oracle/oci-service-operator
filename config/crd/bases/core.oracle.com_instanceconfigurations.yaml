                                  description: |-
                                    The baseline OCPU utilization for a subcore burstable VM instance. Leave this attribute blank for a
                                    non-burstable instance, or explicitly specify non-burstable with `BASELINE_1_1`.
                                    The following values are supported:
                                    - `BASELINE_1_8` - baseline usage is 1/8 of an OCPU.
                                    - `BASELINE_1_2` - baseline usage is 1/2 of an OCPU.
                                    - `BASELINE_1_1` - baseline usage is an entire OCPU. This represents a non-burstable instance.
                                  type: string
                                memoryInGBs:
                                  description: The total amount of memory available
                                    to the instance, in gigabytes.
                                  type: number
                                nvmes:
                                  description: The number of NVMe drives to be used
                                    for storage. A single drive has 6.8 TB available.
                                  type: integer
                                ocpus:
                                  description: The total number of OCPUs available
                                    to the instance.
                                  type: number
                                vcpus:
                                  description: |-
                                    The total number of VCPUs available to the instance. This can be used instead of OCPUs,
                                    in which case the actual number of OCPUs will be calculated based on this value
                                    and the actual hardware. This must be a multiple of 2.
                                  type: integer
                              type: object
                            sourceDetails:
                              description: InstanceConfigurationInstanceDetailsOptionLaunchDetailsSourceDetails
                                defines nested fields for InstanceConfiguration.InstanceDetails.Option.LaunchDetails.SourceDetails.
                              properties:
                                bootVolumeId:
                                  description: The OCID of the boot volume used to
                                    boot the instance.
                                  type: string
                                bootVolumeSizeInGBs:
                                  description: |-
                                    The size of the boot volume in GBs. The minimum value is 50 GB and the maximum
                                    value is 32,768 GB (32 TB).
                                  format: int64
                                  type: integer
                                bootVolumeVpusPerGB:
                                  description: |-
                                    The number of volume performance units (VPUs) that will be applied to this volume per GB,
                                    representing the Block Volume service's elastic performance options.
                                    See Block Volume Performance Levels (https://docs.cloud.oracle.com/iaas/Content/Block/Concepts/blockvolumeperformance.htm#perf_levels) for more information.
                                    Allowed values:
                                      * `10`: Represents Balanced option.
                                      * `20`: Represents Higher Performance option.
                                      * `30`-`120`: Represents the Ultra High Performance option.
                                    For performance autotune enabled volumes, it would be the Default(Minimum) VPUs/GB.
