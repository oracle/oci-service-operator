                                    Whether virtualization instructions are available. For example, Secure Virtual Machine for AMD shapes
                                    or VT-x for Intel shapes.
                                  type: boolean
                                configMap:
                                  additionalProperties:
                                    type: string
                                  description: Instance Platform Configuration Configuration
                                    Map for flexible setting input.
                                  type: object
                                isAccessControlServiceEnabled:
                                  description: |-
                                    Whether the Access Control Service is enabled on the instance. When enabled,
                                    the platform can enforce PCIe device isolation, required for VFIO device pass-through.
                                  type: boolean
                                isInputOutputMemoryManagementUnitEnabled:
                                  description: Whether the input-output memory management
                                    unit is enabled.
                                  type: boolean
                                isMeasuredBootEnabled:
                                  description: Whether the Measured Boot feature is
                                    enabled on the instance.
                                  type: boolean
                                isMemoryEncryptionEnabled:
                                  description: Whether the instance is a confidential
                                    instance. If this value is `true`, the instance
                                    is a confidential instance. The default value
                                    is `false`.
                                  type: boolean
                                isSecureBootEnabled:
                                  description: Whether Secure Boot is enabled on the
                                    instance.
                                  type: boolean
                                isSymmetricMultiThreadingEnabled:
                                  description: |-
                                    Whether symmetric multithreading is enabled on the instance. Symmetric multithreading is also
                                    called simultaneous multithreading (SMT) or Intel Hyper-Threading.
                                    Intel and AMD processors have two hardware execution threads per core (OCPU). SMT permits multiple
                                    independent threads of execution, to better use the resources and increase the efficiency
                                    of the CPU. When multithreading is disabled, only one thread is permitted to run on each core, which
                                    can provide higher or more predictable performance for some workloads.
                                  type: boolean
                                isTrustedPlatformModuleEnabled:
                                  description: Whether the Trusted Platform Module
                                    (TPM) is enabled on the instance.
                                  type: boolean
                                jsonData:
                                  type: string
                                numaNodesPerSocket:
                                  description: The number of NUMA nodes per socket
                                    (NPS).
                                  type: string
                                percentageOfCoresEnabled:
                                  description: |-
                                    The percentage of cores enabled. Value must be a multiple of 25%. If the requested percentage
                                    results in a fractional number of cores, the system rounds up the number of cores across processors
                                    and provisions an instance with a whole number of cores.
                                    If the applications that you run on the instance use a core-based licensing model and need fewer cores
                                    than the full size of the shape, you can disable cores to reduce your licensing costs. The instance
                                    itself is billed for the full shape, regardless of whether all cores are enabled.
                                  type: integer
                                type:
                                  type: string
