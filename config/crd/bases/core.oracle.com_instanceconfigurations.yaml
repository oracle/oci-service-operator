                              type: object
                            isAutoTuneEnabled:
                              description: |-
                                Specifies whether the auto-tune performance is enabled for this boot volume. This field is deprecated.
                                Use the `InstanceConfigurationDetachedVolumeAutotunePolicy` instead to enable the volume for detached autotune.
                              type: boolean
                            kmsKeyId:
                              description: |-
                                The OCID of the Vault service key to assign as the master encryption key
                                for the volume.
                              type: string
                            sizeInGBs:
                              description: The size of the volume in GBs.
                              format: int64
                              type: integer
                            sourceDetails:
                              description: InstanceConfigurationInstanceDetailsBlockVolumeCreateDetailsSourceDetails
                                defines nested fields for InstanceConfiguration.InstanceDetails.BlockVolume.CreateDetails.SourceDetails.
                              properties:
