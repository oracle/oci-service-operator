                                    non-burstable instance, or explicitly specify non-burstable with `BASELINE_1_1`.
                                    The following values are supported:
                                    - `BASELINE_1_8` - baseline usage is 1/8 of an OCPU.
                                    - `BASELINE_1_2` - baseline usage is 1/2 of an OCPU.
                                    - `BASELINE_1_1` - baseline usage is an entire OCPU. This represents a non-burstable instance.
                                  type: string
                                memoryInGBs:
                                  description: The total amount of memory available
                                    to the instance, in gigabytes.
                                  type: number
                                nvmes:
                                  description: The number of NVMe drives to be used
                                    for storage. A single drive has 6.8 TB available.
                                  type: integer
                                ocpus:
                                  description: The total number of OCPUs available
                                    to the instance.
