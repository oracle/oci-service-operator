                                  description: The OCID of the volume backup.
                                  type: string
                                jsonData:
                                  type: string
                                type:
                                  type: string
                              type: object
                            vpusPerGB:
                              description: |-
                                The number of volume performance units (VPUs) that will be applied to this volume per GB,
                                representing the Block Volume service's elastic performance options.
                                See Block Volume Performance Levels (https://docs.cloud.oracle.com/iaas/Content/Block/Concepts/blockvolumeperformance.htm#perf_levels) for more information.
                                Allowed values:
                                  * `0`: Represents Lower Cost option.
                                  * `10`: Represents Balanced option.
                                  * `20`: Represents Higher Performance option.
                                  * `30`-`120`: Represents the Ultra High Performance option.
                                For performance autotune enabled volumes, it would be the Default(Minimum) VPUs/GB.
                              format: int64
                              type: integer
                          type: object
                        volumeId:
                          description: The OCID of the volume.
                          type: string
                      type: object
                    type: array
                  instanceType:
                    type: string
                  jsonData:
                    type: string
                  launchDetails:
                    description: InstanceConfigurationInstanceDetailsLaunchDetails
                      defines nested fields for InstanceConfiguration.InstanceDetails.LaunchDetails.
                    properties:
                      agentConfig:
                        description: InstanceConfigurationInstanceDetailsLaunchDetailsAgentConfig
                          defines nested fields for InstanceConfiguration.InstanceDetails.LaunchDetails.AgentConfig.
                        properties:
                          areAllPluginsDisabled:
                            description: |-
                              Whether Oracle Cloud Agent can run all the available plugins.
                              This includes the management and monitoring plugins.
                              To get a list of available plugins, use the
                              ListInstanceagentAvailablePlugins
                              operation in the Oracle Cloud Agent API. For more information about the available plugins, see
                              Managing Plugins with Oracle Cloud Agent (https://docs.cloud.oracle.com/iaas/Content/Compute/Tasks/manage-plugins.htm).
                            type: boolean
                          isManagementDisabled:
                            description: |-
                              Whether Oracle Cloud Agent can run all the available management plugins.
                              Default value is false (management plugins are enabled).
                              These are the management plugins: OS Management Service Agent and Compute Instance
                              Run Command.
                              The management plugins are controlled by this parameter and by the per-plugin
                              configuration in the `pluginsConfig` object.
                              - If `isManagementDisabled` is true, all of the management plugins are disabled, regardless of
                              the per-plugin configuration.
                              - If `isManagementDisabled` is false, all of the management plugins are enabled. You
                              can optionally disable individual management plugins by providing a value in the `pluginsConfig`
                              object.
                            type: boolean
                          isMonitoringDisabled:
                            description: |-
                              Whether Oracle Cloud Agent can gather performance metrics and monitor the instance using the
                              monitoring plugins. Default value is false (monitoring plugins are enabled).
                              These are the monitoring plugins: Compute Instance Monitoring
                              and Custom Logs Monitoring.
                              The monitoring plugins are controlled by this parameter and by the per-plugin
                              configuration in the `pluginsConfig` object.
                              - If `isMonitoringDisabled` is true, all of the monitoring plugins are disabled, regardless of
                              the per-plugin configuration.
                              - If `isMonitoringDisabled` is false, all of the monitoring plugins are enabled. You
                              can optionally disable individual monitoring plugins by providing a value in the `pluginsConfig`
                              object.
                            type: boolean
                          pluginsConfig:
                            description: The configuration of plugins associated with
                              this instance.
                            items:
                              description: InstanceConfigurationInstanceDetailsLaunchDetailsAgentConfigPluginsConfig
                                defines nested fields for InstanceConfiguration.InstanceDetails.LaunchDetails.AgentConfig.PluginsConfig.
                              properties:
                                desiredState:
                                  description: |-
                                    Whether the plugin should be enabled or disabled.
                                    To enable the monitoring and management plugins, the `isMonitoringDisabled` and
                                    `isManagementDisabled` attributes must also be set to false.
                                  type: string
                                name:
                                  description: |-
                                    The plugin name. To get a list of available plugins, use the
                                    ListInstanceagentAvailablePlugins
                                    operation in the Oracle Cloud Agent API. For more information about the available plugins, see
                                    Managing Plugins with Oracle Cloud Agent (https://docs.cloud.oracle.com/iaas/Content/Compute/Tasks/manage-plugins.htm).
                                  type: string
                              required:
                              - desiredState
                              - name
                              type: object
                            type: array
                        type: object
                      availabilityConfig:
                        description: InstanceConfigurationInstanceDetailsLaunchDetailsAvailabilityConfig
                          defines nested fields for InstanceConfiguration.InstanceDetails.LaunchDetails.AvailabilityConfig.
                        properties:
                          isLiveMigrationPreferred:
                            description: |-
                              Whether to live migrate supported VM instances to a healthy physical VM host without
                              disrupting running instances during infrastructure maintenance events. If null, Oracle
                              chooses the best option for migrating the VM during infrastructure maintenance events.
                            type: boolean
                          recoveryAction:
                            description: |-
                              The lifecycle state for an instance when it is recovered after infrastructure maintenance.
                              * `RESTORE_INSTANCE` - The instance is restored to the lifecycle state it was in before the maintenance event.
                              If the instance was running, it is automatically rebooted. This is the default action when a value is not set.
                              * `STOP_INSTANCE` - The instance is recovered in the stopped state.
                            type: string
                        type: object
                      availabilityDomain:
                        description: |-
                          The availability domain of the instance.
                          Example: `Uocm:PHX-AD-1`
                        type: string
                      capacityReservationId:
                        description: The OCID of the compute capacity reservation
                          this instance is launched under.
                        type: string
                      compartmentId:
                        description: |-
                          The OCID of the compartment containing the instance.
                          Instances created from instance configurations are placed in the same compartment
                          as the instance that was used to create the instance configuration.
                        type: string
                      createVnicDetails:
                        description: InstanceConfigurationInstanceDetailsLaunchDetailsCreateVnicDetails
                          defines nested fields for InstanceConfiguration.InstanceDetails.LaunchDetails.CreateVnicDetails.
                        properties:
                          assignIpv6Ip:
                            description: |-
                              Whether to allocate an IPv6 address at instance and VNIC creation from an IPv6 enabled
                              subnet. Default: False. When provided you may optionally provide an IPv6 prefix
                              (`ipv6SubnetCidr`) of your choice to assign the IPv6 address from. If `ipv6SubnetCidr`
                              is not provided then an IPv6 prefix is chosen
                              for you.
                            type: boolean
                          assignPrivateDnsRecord:
                            description: |-
                              Whether the VNIC should be assigned a private DNS record. See the `assignPrivateDnsRecord` attribute of CreateVnicDetails
                              for more information.
                            type: boolean
                          assignPublicIp:
                            description: |-
                              Whether the VNIC should be assigned a public IP address. See the `assignPublicIp` attribute of CreateVnicDetails
                              for more information.
                            type: boolean
                          definedTags:
                            additionalProperties:
                              additionalProperties:
                                type: string
                              type: object
                            description: |-
                              Defined tags for this resource. Each key is predefined and scoped to a
                              namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                              Example: `{"Operations": {"CostCenter": "42"}}`
                            type: object
                          displayName:
                            description: |-
                              A user-friendly name. Does not have to be unique, and it's changeable.
                              Avoid entering confidential information.
                            type: string
                          freeformTags:
                            additionalProperties:
                              type: string
                            description: |-
                              Free-form tags for this resource. Each tag is a simple key-value pair with no
                              predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                              Example: `{"Department": "Finance"}`
                            type: object
                          hostnameLabel:
                            description: |-
                              The hostname for the VNIC's primary private IP.
                              See the `hostnameLabel` attribute of CreateVnicDetails for more information.
                            type: string
                          ipv6AddressIpv6SubnetCidrPairDetails:
                            description: |-
                              A list of IPv6 prefixes from which the VNIC should be assigned an IPv6 address.
                              You can provide only the prefix and OCI selects an available
                              address from the range. You can optionally choose to leave the prefix range empty
                              and instead provide the specific IPv6 address that should be used from within that range.
                            items:
                              description: InstanceConfigurationInstanceDetailsLaunchDetailsCreateVnicDetailsIpv6AddressIpv6SubnetCidrPairDetail
                                defines nested fields for InstanceConfiguration.InstanceDetails.LaunchDetails.CreateVnicDetails.Ipv6AddressIpv6SubnetCidrPairDetail.
                              properties:
                                ipv6Address:
                                  description: Optional. An available IPv6 address
                                    of your subnet from a valid IPv6 prefix on the
                                    subnet (otherwise the IP address is automatically
                                    assigned).
                                  type: string
                                ipv6SubnetCidr:
                                  description: Optional. Used to disambiguate which
                                    subnet prefix should be used to create an IPv6
                                    allocation.
                                  type: string
                              type: object
                            type: array
                          nsgIds:
                            description: |-
                              A list of the OCIDs of the network security groups (NSGs) to add the VNIC to. For more
                              information about NSGs, see
                              NetworkSecurityGroup.
                            items:
                              type: string
                            type: array
                          privateIp:
                            description: |-
                              A private IP address of your choice to assign to the VNIC.
                              See the `privateIp` attribute of CreateVnicDetails for more information.
                            type: string
                          skipSourceDestCheck:
                            description: |-
                              Whether the source/destination check is disabled on the VNIC.
                              See the `skipSourceDestCheck` attribute of CreateVnicDetails for more information.
                            type: boolean
                          subnetId:
                            description: |-
                              The OCID of the subnet to create the VNIC in.
                              See the `subnetId` attribute of CreateVnicDetails for more information.
                            type: string
                        type: object
                      dedicatedVmHostId:
                        description: |-
                          The OCID of the dedicated virtual machine host to place the instance on.
                          Dedicated VM hosts can be used when launching individual instances from an instance configuration. They
                          cannot be used to launch instance pools.
                        type: string
                      definedTags:
                        additionalProperties:
                          additionalProperties:
                            type: string
                          type: object
                        description: |-
                          Defined tags for this resource. Each key is predefined and scoped to a
                          namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                          Example: `{"Operations": {"CostCenter": "42"}}`
                        type: object
                      displayName:
                        description: |-
                          A user-friendly name. Does not have to be unique, and it's changeable.
                          Avoid entering confidential information.
                        type: string
                      extendedMetadata:
                        additionalProperties:
                          description: JSONValue preserves arbitrary JSON values inside
                            generated CRD fields.
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        description: |-
                          Additional metadata key/value pairs that you provide. They serve the same purpose and
                          functionality as fields in the `metadata` object.
                          They are distinguished from `metadata` fields in that these can be nested JSON objects
                          (whereas `metadata` fields are string/string maps only).
                          The combined size of the `metadata` and `extendedMetadata` objects can be a maximum of
                          32,000 bytes.
                        type: object
                      faultDomain:
                        description: |-
                          A fault domain is a grouping of hardware and infrastructure within an availability domain.
                          Each availability domain contains three fault domains. Fault domains let you distribute your
                          instances so that they are not on the same physical hardware within a single availability domain.
                          A hardware failure or Compute hardware maintenance that affects one fault domain does not affect
                          instances in other fault domains.
                          If you do not specify the fault domain, the system selects one for you.

                          To get a list of fault domains, use the
                          ListFaultDomains operation in the
                          Identity and Access Management Service API.
                          Example: `FAULT-DOMAIN-1`
                        type: string
                      freeformTags:
                        additionalProperties:
                          type: string
                        description: |-
                          Free-form tags for this resource. Each tag is a simple key-value pair with no
                          predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                          Example: `{"Department": "Finance"}`
                        type: object
                      instanceOptions:
                        description: InstanceConfigurationInstanceDetailsLaunchDetailsInstanceOptions
                          defines nested fields for InstanceConfiguration.InstanceDetails.LaunchDetails.InstanceOptions.
                        properties:
                          areLegacyImdsEndpointsDisabled:
                            description: |-
                              Whether to disable the legacy (/v1) instance metadata service endpoints.
                              Customers who have migrated to /v2 should set this to true for added security.
                              Default is false.
                            type: boolean
                        type: object
                      ipxeScript:
                        description: |-
                          This is an advanced option.
                          When a bare metal or virtual machine
                          instance boots, the iPXE firmware that runs on the instance is
                          configured to run an iPXE script to continue the boot process.
                          If you want more control over the boot process, you can provide
                          your own custom iPXE script that will run when the instance boots;
                          however, you should be aware that the same iPXE script will run
                          every time an instance boots; not only after the initial
                          LaunchInstance call.
                          The default iPXE script connects to the instance's local boot
                          volume over iSCSI and performs a network boot. If you use a custom iPXE
                          script and want to network-boot from the instance's local boot volume
                          over iSCSI the same way as the default iPXE script, you should use the
                          following iSCSI IP address: 169.254.0.2, and boot volume IQN:
                          iqn.2015-02.oracle.boot.
                          For more information about the Bring Your Own Image feature of
                          Oracle Cloud Infrastructure, see
                          Bring Your Own Image (https://docs.cloud.oracle.com/iaas/Content/Compute/References/bringyourownimage.htm).
                          For more information about iPXE, see http://ipxe.org.
                        type: string
                      isPvEncryptionInTransitEnabled:
                        description: Whether to enable in-transit encryption for the
                          data volume's paravirtualized attachment. The default value
                          is false.
                        type: boolean
                      launchMode:
                        description: |-
                          Specifies the configuration mode for launching virtual machine (VM) instances. The configuration modes are:
                          * `NATIVE` - VM instances launch with iSCSI boot and VFIO devices. The default value for platform images.
                          * `EMULATED` - VM instances launch with emulated devices, such as the E1000 network driver and emulated SCSI disk controller.
                          * `PARAVIRTUALIZED` - VM instances launch with paravirtualized devices using VirtIO drivers.
                          * `CUSTOM` - VM instances launch with custom configuration settings specified in the `LaunchOptions` parameter.
                        type: string
                      launchOptions:
                        description: InstanceConfigurationInstanceDetailsLaunchDetailsLaunchOptions
                          defines nested fields for InstanceConfiguration.InstanceDetails.LaunchDetails.LaunchOptions.
                        properties:
                          bootVolumeType:
                            description: |-
                              Emulation type for the boot volume.
                              * `ISCSI` - ISCSI attached block storage device.
                              * `SCSI` - Emulated SCSI disk.
                              * `IDE` - Emulated IDE disk.
                              * `VFIO` - Direct attached Virtual Function storage. This is the default option for local data
                              volumes on platform images.
                              * `PARAVIRTUALIZED` - Paravirtualized disk. This is the default for boot volumes and remote block
                              storage volumes on platform images.
                            type: string
                          firmware:
                            description: |-
                              Firmware used to boot VM. Select the option that matches your operating system.
                              * `BIOS` - Boot VM using BIOS style firmware. This is compatible with both 32 bit and 64 bit operating
                              systems that boot using MBR style bootloaders.
                              * `UEFI_64` - Boot VM using UEFI style firmware compatible with 64 bit operating systems. This is the
                              default for platform images.
                            type: string
                          isConsistentVolumeNamingEnabled:
                            description: Whether to enable consistent volume naming
                              feature. Defaults to false.
                            type: boolean
                          isPvEncryptionInTransitEnabled:
                            description: |-
                              Deprecated. Instead use `isPvEncryptionInTransitEnabled` in
                              InstanceConfigurationLaunchInstanceDetails.
                            type: boolean
                          networkType:
                            description: |-
                              Emulation type for the physical network interface card (NIC).
                              * `E1000` - Emulated Gigabit ethernet controller. Compatible with Linux e1000 network driver.
                              * `VFIO` - Direct attached Virtual Function network controller. This is the networking type
                              when you launch an instance using hardware-assisted (SR-IOV) networking.
                              * `PARAVIRTUALIZED` - VM instances launch with paravirtualized devices using VirtIO drivers.
                            type: string
                          remoteDataVolumeType:
                            description: |-
                              Emulation type for volume.
                              * `ISCSI` - ISCSI attached block storage device.
                              * `SCSI` - Emulated SCSI disk.
                              * `IDE` - Emulated IDE disk.
                              * `VFIO` - Direct attached Virtual Function storage. This is the default option for local data
                              volumes on platform images.
                              * `PARAVIRTUALIZED` - Paravirtualized disk. This is the default for boot volumes and remote block
                              storage volumes on platform images.
                            type: string
                        type: object
                      metadata:
                        additionalProperties:
                          type: string
                        description: |-
                          Custom metadata key/value pairs that you provide, such as the SSH public key
                          required to connect to the instance.
                          A metadata service runs on every launched instance. The service is an HTTP
                          endpoint listening on 169.254.169.254. You can use the service to:
                          * Provide information to Cloud-Init (https://cloudinit.readthedocs.org/en/latest/)
                            to be used for various system initialization tasks.
                          * Get information about the instance, including the custom metadata that you
                            provide when you launch the instance.
                           **Providing Cloud-Init Metadata**
                           You can use the following metadata key names to provide information to
                           Cloud-Init:
                           **"ssh_authorized_keys"** - Provide one or more public SSH keys to be
                           included in the `~/.ssh/authorized_keys` file for the default user on the
                           instance. Use a newline character to separate multiple keys. The SSH
                           keys must be in the format necessary for the `authorized_keys` file, as shown
                           in the example below.
                           **"user_data"** - Provide your own base64-encoded data to be used by
                           Cloud-Init to run custom scripts or provide custom Cloud-Init configuration. For
                           information about how to take advantage of user data, see the
                           Cloud-Init Documentation (http://cloudinit.readthedocs.org/en/latest/topics/format.html).
                           **Metadata Example**
                                "metadata" : {
