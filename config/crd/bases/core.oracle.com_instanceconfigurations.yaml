                                predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                                Example: `{"Department": "Finance"}`
                              type: object
                            instanceOptions:
                              description: InstanceConfigurationInstanceDetailsOptionLaunchDetailsInstanceOptions
                                defines nested fields for InstanceConfiguration.InstanceDetails.Option.LaunchDetails.InstanceOptions.
                              properties:
                                areLegacyImdsEndpointsDisabled:
                                  description: |-
                                    Whether to disable the legacy (/v1) instance metadata service endpoints.
                                    Customers who have migrated to /v2 should set this to true for added security.
                                    Default is false.
                                  type: boolean
                              type: object
                            ipxeScript:
                              description: |-
                                This is an advanced option.
                                When a bare metal or virtual machine
                                instance boots, the iPXE firmware that runs on the instance is
                                configured to run an iPXE script to continue the boot process.
                                If you want more control over the boot process, you can provide
                                your own custom iPXE script that will run when the instance boots;
                                however, you should be aware that the same iPXE script will run
                                every time an instance boots; not only after the initial
                                LaunchInstance call.
                                The default iPXE script connects to the instance's local boot
                                volume over iSCSI and performs a network boot. If you use a custom iPXE
                                script and want to network-boot from the instance's local boot volume
                                over iSCSI the same way as the default iPXE script, you should use the
                                following iSCSI IP address: 169.254.0.2, and boot volume IQN:
                                iqn.2015-02.oracle.boot.
                                For more information about the Bring Your Own Image feature of
                                Oracle Cloud Infrastructure, see
                                Bring Your Own Image (https://docs.cloud.oracle.com/iaas/Content/Compute/References/bringyourownimage.htm).
                                For more information about iPXE, see http://ipxe.org.
                              type: string
                            isPvEncryptionInTransitEnabled:
                              description: Whether to enable in-transit encryption
                                for the data volume's paravirtualized attachment.
                                The default value is false.
                              type: boolean
                            launchMode:
                              description: |-
                                Specifies the configuration mode for launching virtual machine (VM) instances. The configuration modes are:
                                * `NATIVE` - VM instances launch with iSCSI boot and VFIO devices. The default value for platform images.
                                * `EMULATED` - VM instances launch with emulated devices, such as the E1000 network driver and emulated SCSI disk controller.
                                * `PARAVIRTUALIZED` - VM instances launch with paravirtualized devices using VirtIO drivers.
                                * `CUSTOM` - VM instances launch with custom configuration settings specified in the `LaunchOptions` parameter.
                              type: string
                            launchOptions:
                              description: InstanceConfigurationInstanceDetailsOptionLaunchDetailsLaunchOptions
                                defines nested fields for InstanceConfiguration.InstanceDetails.Option.LaunchDetails.LaunchOptions.
                              properties:
                                bootVolumeType:
                                  description: |-
                                    Emulation type for the boot volume.
                                    * `ISCSI` - ISCSI attached block storage device.
                                    * `SCSI` - Emulated SCSI disk.
                                    * `IDE` - Emulated IDE disk.
                                    * `VFIO` - Direct attached Virtual Function storage. This is the default option for local data
                                    volumes on platform images.
                                    * `PARAVIRTUALIZED` - Paravirtualized disk. This is the default for boot volumes and remote block
                                    storage volumes on platform images.
                                  type: string
                                firmware:
                                  description: |-
                                    Firmware used to boot VM. Select the option that matches your operating system.
                                    * `BIOS` - Boot VM using BIOS style firmware. This is compatible with both 32 bit and 64 bit operating
                                    systems that boot using MBR style bootloaders.
                                    * `UEFI_64` - Boot VM using UEFI style firmware compatible with 64 bit operating systems. This is the
                                    default for platform images.
                                  type: string
                                isConsistentVolumeNamingEnabled:
                                  description: Whether to enable consistent volume
                                    naming feature. Defaults to false.
                                  type: boolean
                                isPvEncryptionInTransitEnabled:
                                  description: |-
                                    Deprecated. Instead use `isPvEncryptionInTransitEnabled` in
                                    InstanceConfigurationLaunchInstanceDetails.
                                  type: boolean
                                networkType:
                                  description: |-
                                    Emulation type for the physical network interface card (NIC).
                                    * `E1000` - Emulated Gigabit ethernet controller. Compatible with Linux e1000 network driver.
                                    * `VFIO` - Direct attached Virtual Function network controller. This is the networking type
                                    when you launch an instance using hardware-assisted (SR-IOV) networking.
                                    * `PARAVIRTUALIZED` - VM instances launch with paravirtualized devices using VirtIO drivers.
                                  type: string
                                remoteDataVolumeType:
                                  description: |-
                                    Emulation type for volume.
                                    * `ISCSI` - ISCSI attached block storage device.
                                    * `SCSI` - Emulated SCSI disk.
                                    * `IDE` - Emulated IDE disk.
                                    * `VFIO` - Direct attached Virtual Function storage. This is the default option for local data
                                    volumes on platform images.
                                    * `PARAVIRTUALIZED` - Paravirtualized disk. This is the default for boot volumes and remote block
                                    storage volumes on platform images.
                                  type: string
                              type: object
                            metadata:
                              additionalProperties:
                                type: string
                              description: |-
                                Custom metadata key/value pairs that you provide, such as the SSH public key
                                required to connect to the instance.
                                A metadata service runs on every launched instance. The service is an HTTP
                                endpoint listening on 169.254.169.254. You can use the service to:
                                * Provide information to Cloud-Init (https://cloudinit.readthedocs.org/en/latest/)
                                  to be used for various system initialization tasks.
                                * Get information about the instance, including the custom metadata that you
                                  provide when you launch the instance.
                                 **Providing Cloud-Init Metadata**
                                 You can use the following metadata key names to provide information to
                                 Cloud-Init:
                                 **"ssh_authorized_keys"** - Provide one or more public SSH keys to be
                                 included in the `~/.ssh/authorized_keys` file for the default user on the
                                 instance. Use a newline character to separate multiple keys. The SSH
                                 keys must be in the format necessary for the `authorized_keys` file, as shown
                                 in the example below.
                                 **"user_data"** - Provide your own base64-encoded data to be used by
                                 Cloud-Init to run custom scripts or provide custom Cloud-Init configuration. For
                                 information about how to take advantage of user data, see the
                                 Cloud-Init Documentation (http://cloudinit.readthedocs.org/en/latest/topics/format.html).
                                 **Metadata Example**
                                      "metadata" : {
                                         "quake_bot_level" : "Severe",
                                         "ssh_authorized_keys" : "ssh-rsa <your_public_SSH_key>== rsa-key-20160227",
                                         "user_data" : "<your_public_SSH_key>=="
                                      }
                                 **Getting Metadata on the Instance**
                                 To get information about your instance, connect to the instance using SSH and issue any of the
                                 following GET requests:
                                     curl -H "Authorization: Bearer Oracle" http://169.254.169.254/opc/v2/instance/
                                     curl -H "Authorization: Bearer Oracle" http://169.254.169.254/opc/v2/instance/metadata/
                                     curl -H "Authorization: Bearer Oracle" http://169.254.169.254/opc/v2/instance/metadata/<any-key-name>
                                 You'll get back a response that includes all the instance information; only the metadata information; or
                                 the metadata information for the specified key name, respectively.
                                 The combined size of the `metadata` and `extendedMetadata` objects can be a maximum of 32,000 bytes.
                              type: object
                            platformConfig:
                              description: InstanceConfigurationInstanceDetailsOptionLaunchDetailsPlatformConfig
                                defines nested fields for InstanceConfiguration.InstanceDetails.Option.LaunchDetails.PlatformConfig.
                              properties:
                                areVirtualInstructionsEnabled:
