---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: mysqldbsystems.mysql.oracle.com
spec:
  group: mysql.oracle.com
  names:
    kind: MySqlDbSystem
    listKind: MySqlDbSystemList
    plural: mysqldbsystems
    singular: mysqldbsystem
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the MySqlDbSystem
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the MySqlDbSystem
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: MySqlDbSystem is the Schema for the mysqldbsystems API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MySqlDbSystemSpec defines the desired state of MySqlDbSystem
            properties:
              adminPassword:
                properties:
                  secret:
                    properties:
                      secretName:
                        type: string
                    type: object
                type: object
              adminUsername:
                properties:
                  secret:
                    properties:
                      secretName:
                        type: string
                    type: object
                type: object
              availabilityDomain:
                type: string
              backupPolicy:
                properties:
                  definedTags:
                    additionalProperties:
                      additionalProperties:
                        type: string
                      type: object
                    type: object
                  freeformTags:
                    additionalProperties:
                      type: string
                    type: object
                  isEnabled:
                    description: Specifies if automatic backups are enabled.
                    type: boolean
                  retentionInDays:
                    description: Number of days to retain an automatic backup.
                    type: integer
                  windowStartTime:
                    description: |-
                      The start of a 30-minute window of time in which daily, automated backups occur.
                      This should be in the format of the "Time" portion of an RFC3339-formatted timestamp. Any second or sub-second time data will be truncated to zero.
                      At some point in the window, the system may incur a brief service disruption as the backup is performed.
                    type: string
                type: object
              compartmentId:
                maxLength: 255
                minLength: 1
                type: string
              configuration:
                description: CreateConfigurationDetails The Configuration for the
                  DB System.
                properties:
                  id:
                    description: Configuration Id
                    maxLength: 255
                    minLength: 1
                    type: string
                type: object
              crashRecovery:
                description: |-
                  Whether to run the DB System with InnoDB Redo Logs and the Double Write Buffer enabled or disabled,
                  and whether to enable or disable syncing of the Binary Logs.
                type: string
              dataStorageSizeInGBs:
                maximum: 65536
                minimum: 50
                type: integer
              databaseManagement:
                description: Whether to enable monitoring via the Database Management
                  service.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                type: object
              deletionPolicy:
                description: DeletionPolicyDetails Policy for how the DB System and
                  related resources should be handled at the time of its deletion.
                properties:
                  automaticBackupRetention:
                    description: Specifies if any automatic backups created for a
                      DB System should be retained or deleted when the DB System is
                      deleted.
                    type: string
                  finalBackup:
                    description: |-
                      Specifies whether or not a backup is taken when the DB System is deleted.
                        REQUIRE_FINAL_BACKUP: a backup is taken if the DB System is deleted.
                        SKIP_FINAL_BACKUP: a backup is not taken if the DB System is deleted.
                    type: string
                  isDeleteProtected:
                    description: Specifies whether the DB System can be deleted. Set
                      to true to prevent deletion, false (default) to allow.
                    type: boolean
                type: object
              description:
                maxLength: 400
                minLength: 1
                type: string
              displayName:
                type: string
              faultDomain:
                default: FAULT-DOMAIN-1
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                type: object
              hostnameLabel:
                type: string
              id:
                maxLength: 255
                minLength: 1
                type: string
              ipAddress:
                type: string
              isHighlyAvailable:
                type: boolean
              maintenance:
                description: CreateMaintenanceDetails The Maintenance Policy for the
                  DB System.
                properties:
                  windowStartTime:
                    description: |-
                      The start of the 2 hour maintenance window.
                      This string is of the format: "{day-of-week} {time-of-day}".
                      "{day-of-week}" is a case-insensitive string like "mon", "tue", &c.
                      "{time-of-day}" is the "Time" portion of an RFC3339-formatted timestamp. Any second or sub-second time data will be truncated to zero.
                    type: string
                type: object
              mysqlVersion:
                type: string
              port:
                maximum: 65535
                minimum: 1024
                type: integer
              portX:
                maximum: 65535
                minimum: 1024
                type: integer
              secureConnections:
                description: SecureConnectionDetails Secure connection configuration
                  details.
                properties:
                  certificateGenerationType:
                    description: Select whether to use MySQL Database Service-managed
                      certificate (SYSTEM) or your own certificate (BYOC).
                    type: string
                  certificateId:
                    description: The OCID of the certificate to use.
                    maxLength: 255
                    minLength: 1
                    type: string
                type: object
              shapeName:
                type: string
              source:
                description: CreateDbSystemSourceDetails Parameters detailing how
                  to provision the initial data of the system.
                properties:
                  jsonData:
                    type: string
                  sourceType:
                    type: string
                type: object
              subnetId:
                maxLength: 255
                minLength: 1
                type: string
            type: object
          status:
            description: MySqlDbSystemStatus defines the observed state of MySqlDbSystem.
            properties:
              availabilityDomain:
                description: |-
                  The availability domain on which to deploy the Read/Write endpoint. This defines the preferred primary instance.
                  In a failover scenario, the Read/Write endpoint is redirected to one of the other availability domains
                  and the MySQL instance in that domain is promoted to the primary instance.
                  This redirection does not affect the IP address of the DB System in any way.
                  For a standalone DB System, this defines the availability domain in which the DB System is placed.
                type: string
              backupPolicy:
                description: MySqlDbSystemBackupPolicy defines nested fields for MySqlDbSystem.BackupPolicy.
                properties:
                  definedTags:
                    additionalProperties:
                      additionalProperties:
                        type: string
                      type: object
                    description: |-
                      Usage of predefined tag keys. These predefined keys are scoped to namespaces.
                      Tags defined here will be copied verbatim as tags on the Backup resource created by this BackupPolicy.
                      Example: `{"foo-namespace": {"bar-key": "value"}}`
                    type: object
                  freeformTags:
                    additionalProperties:
                      type: string
                    description: |-
                      Simple key-value pair applied without any predefined name, type or scope. Exists for cross-compatibility only.
                      Tags defined here will be copied verbatim as tags on the Backup resource created by this BackupPolicy.
                      Example: `{"bar-key": "value"}`
                    type: object
                  isEnabled:
                    description: Specifies if automatic backups are enabled.
                    type: boolean
                  pitrPolicy:
                    description: MySqlDbSystemBackupPolicyPitrPolicy defines nested
                      fields for MySqlDbSystem.BackupPolicy.PitrPolicy.
                    properties:
                      isEnabled:
                        description: Specifies if PITR is enabled or disabled.
                        type: boolean
                    required:
                    - isEnabled
                    type: object
                  retentionInDays:
                    description: Number of days to retain an automatic backup.
                    type: integer
                  windowStartTime:
                    description: |-
                      The start of a 30-minute window of time in which daily, automated backups occur.
                      This should be in the format of the "Time" portion of an RFC3339-formatted timestamp. Any second or sub-second time data will be truncated to zero.
                      At some point in the window, the system may incur a brief service disruption as the backup is performed.
                    type: string
                type: object
              channels:
                description: A list with a summary of all the Channels attached to
                  the DB System.
                items:
                  description: MySqlDbSystemChannel defines nested fields for MySqlDbSystem.Channel.
                  properties:
                    compartmentId:
                      description: The OCID of the compartment.
                      type: string
                    definedTags:
                      additionalProperties:
                        additionalProperties:
                          type: string
                        type: object
                      description: |-
                        Usage of predefined tag keys. These predefined keys are scoped to namespaces.
                        Example: `{"foo-namespace": {"bar-key": "value"}}`
                      type: object
                    displayName:
                      description: The user-friendly name for the Channel. It does
                        not have to be unique.
                      type: string
                    freeformTags:
                      additionalProperties:
                        type: string
                      description: |-
                        Simple key-value pair applied without any predefined name, type or scope. Exists for cross-compatibility only.
                        Example: `{"bar-key": "value"}`
                      type: object
                    id:
                      description: The OCID of the Channel.
                      type: string
                    isEnabled:
                      description: Whether the Channel has been enabled by the user.
                      type: boolean
                    lifecycleDetails:
                      description: A message describing the state of the Channel.
                      type: string
                    lifecycleState:
                      description: The state of the Channel.
                      type: string
                    source:
                      description: MySqlDbSystemChannelSource defines nested fields
                        for MySqlDbSystem.Channel.Source.
                      properties:
                        anonymousTransactionsHandling:
                          description: MySqlDbSystemChannelSourceAnonymousTransactionsHandling
                            defines nested fields for MySqlDbSystem.Channel.Source.AnonymousTransactionsHandling.
                          properties:
                            jsonData:
                              type: string
                            lastConfiguredLogFilename:
                              description: |-
                                Specifies one of the coordinates (file) at which the replica should begin
                                reading the source's log. As this value specifies the point where replication
                                starts from, it is only used once, when it starts. It is never used again,
                                unless a new UpdateChannel operation modifies it.
                              type: string
                            lastConfiguredLogOffset:
                              description: |-
                                Specifies one of the coordinates (offset) at which the replica should begin
                                reading the source's log. As this value specifies the point where replication
                                starts from, it is only used once, when it starts. It is never used again,
                                unless a new UpdateChannel operation modifies it.
                              format: int64
                              type: integer
                            policy:
                              type: string
                            uuid:
                              description: |-
                                The UUID that is used as a prefix when generating transaction identifiers for anonymous transactions
                                coming from the source. You can change the UUID later.
                              type: string
                          type: object
                        hostname:
                          description: The network address of the MySQL instance.
                          type: string
                        jsonData:
                          type: string
                        port:
                          description: The port the source MySQL instance listens
                            on.
                          type: integer
                        sourceType:
                          type: string
                        sslCaCertificate:
                          description: MySqlDbSystemChannelSourceSslCaCertificate
                            defines nested fields for MySqlDbSystem.Channel.Source.SslCaCertificate.
                          properties:
                            certificateType:
                              type: string
                            contents:
                              description: The string containing the CA certificate
                                in PEM format.
                              type: string
                            jsonData:
                              type: string
                          type: object
                        sslMode:
                          description: The SSL mode of the Channel.
                          type: string
                        username:
                          description: |-
                            The name of the replication user on the source MySQL instance.
                            The username has a maximum length of 96 characters. For more information,
                            please see the MySQL documentation (https://dev.mysql.com/doc/refman/8.0/en/change-master-to.html)
                          type: string
                      type: object
                    target:
                      description: MySqlDbSystemChannelTarget defines nested fields
                        for MySqlDbSystem.Channel.Target.
                      properties:
                        applierUsername:
                          description: The username for the replication applier of
                            the target MySQL DB System.
                          type: string
                        channelName:
                          description: |-
                            The case-insensitive name that identifies the replication channel. Channel names
                            must follow the rules defined for MySQL identifiers (https://dev.mysql.com/doc/refman/8.0/en/identifiers.html).
                            The names of non-Deleted Channels must be unique for each DB System.
                          type: string
                        dbSystemId:
                          description: The OCID of the source DB System.
                          type: string
                        delayInSeconds:
                          description: |-
                            Specifies the amount of time, in seconds, that the channel waits before
                            applying a transaction received from the source.
                          type: integer
                        filters:
                          description: Replication filter rules to be applied at the
                            DB System Channel target.
                          items:
                            description: MySqlDbSystemChannelTargetFilter defines
                              nested fields for MySqlDbSystem.Channel.Target.Filter.
                            properties:
                              type:
                                description: |-
                                  The type of the filter rule.
                                  For details on each type, see
                                  Replication Filtering Rules (https://dev.mysql.com/doc/refman/8.0/en/replication-rules.html)
                                type: string
                              value:
                                description: |-
                                  The body of the filter rule. This can represent a database, a table, or a database pair (represented as
                                  "db1->db2"). For more information, see
                                  Replication Filtering Rules (https://dev.mysql.com/doc/refman/8.0/en/replication-rules.html).
                                type: string
                            type: object
                          type: array
                        jsonData:
                          type: string
                        tablesWithoutPrimaryKeyHandling:
                          description: |-
                            Specifies how a replication channel handles the creation and alteration of tables
                            that do not have a primary key.
                          type: string
                        targetType:
                          type: string
                      type: object
                    timeCreated:
                      description: The date and time the Channel was created, as described
                        by RFC 3339 (https://tools.ietf.org/rfc/rfc3339).
                      type: string
                    timeUpdated:
                      description: The time the Channel was last updated, as described
                        by RFC 3339 (https://tools.ietf.org/rfc/rfc3339).
                      type: string
                  type: object
                type: array
              compartmentId:
                description: The OCID of the compartment the DB System belongs in.
                type: string
              configurationId:
                description: The OCID of the Configuration to be used for Instances
                  in this DB System.
                type: string
              crashRecovery:
                description: |-
                  Whether to run the DB System with InnoDB Redo Logs and the Double Write Buffer enabled or disabled,
                  and whether to enable or disable syncing of the Binary Logs.
                type: string
              currentPlacement:
                description: MySqlDbSystemCurrentPlacement defines nested fields for
                  MySqlDbSystem.CurrentPlacement.
                properties:
                  availabilityDomain:
                    description: The availability domain in which the DB System is
                      placed.
                    type: string
                  faultDomain:
                    description: The fault domain in which the DB System is placed.
                    type: string
                type: object
              dataStorageSizeInGBs:
                description: Initial size of the data volume in GiBs that will be
                  created and attached.
                type: integer
              databaseManagement:
                description: Whether to enable monitoring via the Database Management
                  service.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  Example: `{"foo-namespace": {"bar-key": "value"}}`
                type: object
              deletionPolicy:
                description: MySqlDbSystemDeletionPolicy defines nested fields for
                  MySqlDbSystem.DeletionPolicy.
                properties:
                  automaticBackupRetention:
                    description: Specifies if any automatic backups created for a
                      DB System should be retained or deleted when the DB System is
                      deleted.
                    type: string
                  finalBackup:
                    description: |-
                      Specifies whether or not a backup is taken when the DB System is deleted.
                        REQUIRE_FINAL_BACKUP: a backup is taken if the DB System is deleted.
                        SKIP_FINAL_BACKUP: a backup is not taken if the DB System is deleted.
                    type: string
                  isDeleteProtected:
                    description: Specifies whether the DB System can be deleted. Set
                      to true to prevent deletion, false (default) to allow.
                    type: boolean
                type: object
              description:
                description: User-provided data about the DB System.
                type: string
              displayName:
                description: The user-friendly name for the DB System. It does not
                  have to be unique.
                type: string
              endpoints:
                description: The network endpoints available for this DB System.
                items:
                  description: MySqlDbSystemEndpoint defines nested fields for MySqlDbSystem.Endpoint.
                  properties:
                    hostname:
                      description: The network address of the DB System.
                      type: string
                    ipAddress:
                      description: The IP address the DB System is configured to listen
                        on.
                      type: string
                    modes:
                      description: The access modes from the client that this endpoint
                        supports.
                      items:
                        type: string
                      type: array
                    port:
                      description: The port the MySQL instance listens on.
                      type: integer
                    portX:
                      description: The network port where to connect to use this endpoint
                        using the X protocol.
                      type: integer
                    resourceId:
                      description: The OCID of the resource that this endpoint is
                        attached to.
                      type: string
                    resourceType:
                      description: The type of endpoint that clients and connectors
                        can connect to.
                      type: string
                    status:
                      description: |-
                        The state of the endpoints, as far as it can seen from the DB System.
                        There may be some inconsistency with the actual state of the MySQL service.
                      type: string
                    statusDetails:
                      description: Additional information about the current endpoint
                        status.
                      type: string
                  type: object
                type: array
              faultDomain:
                description: |-
                  The fault domain on which to deploy the Read/Write endpoint. This defines the preferred primary instance.
                  In a failover scenario, the Read/Write endpoint is redirected to one of the other fault domains
                  and the MySQL instance in that domain is promoted to the primary instance.
                  This redirection does not affect the IP address of the DB System in any way.
                  For a standalone DB System, this defines the fault domain in which the DB System is placed.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Simple key-value pair that is applied without any predefined name, type or scope. Exists for cross-compatibility only.
                  Example: `{"bar-key": "value"}`
                type: object
              heatWaveCluster:
                description: MySqlDbSystemHeatWaveCluster defines nested fields for
                  MySqlDbSystem.HeatWaveCluster.
                properties:
                  clusterSize:
                    description: |-
                      The number of analytics-processing compute instances, of the
                      specified shape, in the HeatWave cluster.
                    type: integer
                  isLakehouseEnabled:
                    description: Lakehouse enabled status for the HeatWave cluster.
                    type: boolean
                  lifecycleState:
                    description: The current state of the MySQL HeatWave cluster.
                    type: string
                  shapeName:
                    description: |-
                      The shape determines resources to allocate to the HeatWave
                      nodes - CPU cores, memory.
                    type: string
                  timeCreated:
                    description: |-
                      The date and time the HeatWave cluster was created,
                      as described by RFC 3339 (https://tools.ietf.org/rfc/rfc3339).
                    type: string
                  timeUpdated:
                    description: |-
                      The time the HeatWave cluster was last updated,
                      as described by RFC 3339 (https://tools.ietf.org/rfc/rfc3339).
                    type: string
                type: object
              hostnameLabel:
                description: |-
                  The hostname for the primary endpoint of the DB System. Used for DNS.
                  The value is the hostname portion of the primary private IP's fully qualified domain name (FQDN)
                  (for example, "dbsystem-1" in FQDN "dbsystem-1.subnet123.vcn1.oraclevcn.com").
                  Must be unique across all VNICs in the subnet and comply with RFC 952 and RFC 1123.
                type: string
              id:
                description: The OCID of the DB System.
                type: string
              ipAddress:
                description: |-
                  The IP address the DB System is configured to listen on. A private
                  IP address of the primary endpoint of the DB System. Must be an
                  available IP address within the subnet's CIDR. This will be a
                  "dotted-quad" style IPv4 address.
                type: string
              isHeatWaveClusterAttached:
                description: If the DB System has a HeatWave Cluster attached.
                type: boolean
              isHighlyAvailable:
                description: Specifies if the DB System is highly available.
                type: boolean
              lifecycleDetails:
                description: Additional information about the current lifecycleState.
                type: string
              lifecycleState:
                description: The current state of the DB System.
                type: string
              maintenance:
                description: MySqlDbSystemMaintenance defines nested fields for MySqlDbSystem.Maintenance.
                properties:
                  windowStartTime:
                    description: |-
                      The start of the 2 hour maintenance window.
                      This string is of the format: "{day-of-week} {time-of-day}".
                      "{day-of-week}" is a case-insensitive string like "mon", "tue", &c.
                      "{time-of-day}" is the "Time" portion of an RFC3339-formatted timestamp. Any second or sub-second time data will be truncated to zero.
                      If you set the read replica maintenance window to "" or if not specified, the read replica is set same as the DB system maintenance window.
                    type: string
                required:
                - windowStartTime
                type: object
              mysqlVersion:
                description: Name of the MySQL Version in use for the DB System.
                type: string
              pointInTimeRecoveryDetails:
                description: MySqlDbSystemPointInTimeRecoveryDetails defines nested
                  fields for MySqlDbSystem.PointInTimeRecoveryDetails.
                properties:
                  timeEarliestRecoveryPoint:
                    description: Earliest recovery time point for the DB System, as
                      described by RFC 3339 (https://tools.ietf.org/rfc/rfc3339).
                    type: string
                  timeLatestRecoveryPoint:
                    description: Latest recovery time point for the DB System, as
                      described by RFC 3339 (https://tools.ietf.org/rfc/rfc3339).
                    type: string
                type: object
              port:
                description: The port for primary endpoint of the DB System to listen
                  on.
                type: integer
              portX:
                description: The network port on which X Plugin listens for TCP/IP
                  connections. This is the X Plugin equivalent of port.
                type: integer
              secureConnections:
                description: MySqlDbSystemSecureConnections defines nested fields
                  for MySqlDbSystem.SecureConnections.
                properties:
                  certificateGenerationType:
                    description: Select whether to use MySQL Database Service-managed
                      certificate (SYSTEM) or your own certificate (BYOC).
                    type: string
                  certificateId:
                    description: The OCID of the certificate to use.
                    type: string
                required:
                - certificateGenerationType
                type: object
              shapeName:
                description: |-
                  The shape of the primary instances of the DB System. The shape
                  determines resources allocated to a DB System - CPU cores
                  and memory for VM shapes; CPU cores, memory and storage for non-VM
                  (or bare metal) shapes. To get a list of shapes, use (the
                  ListShapes operation.
                type: string
              source:
                description: MySqlDbSystemSource defines nested fields for MySqlDbSystem.Source.
                properties:
                  backupId:
                    description: The OCID of the backup to be used as the source for
                      the new DB System.
                    type: string
                  dbSystemId:
                    description: |-
                      The OCID of the DB System from which a backup shall be selected to be
                      restored when creating the new DB System. Use this together with
                      recovery point to perform a point in time recovery operation.
                    type: string
                  jsonData:
                    type: string
                  recoveryPoint:
                    description: |-
                      The date and time, as per RFC 3339, of the change up to which the
                      new DB System shall be restored to, using a backup and logs from the
                      original DB System. In case no point in time is specified, then this
                      new DB System shall be restored up to the latest change recorded for
                      the original DB System.
                    type: string
                  sourceType:
                    type: string
                  sourceUrl:
                    description: |-
                      The Pre-Authenticated Request (PAR) of a bucket/prefix or PAR of a @.manifest.json object from the Object Storage.
                      Check Using Pre-Authenticated Requests (https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/usingpreauthenticatedrequests.htm)
                      for information related to PAR creation.
                      Please create PAR with "Permit object reads" access type and "Enable Object Listing" permission when using a bucket/prefix PAR.
                      Please create PAR with "Permit object reads" access type when using a @.manifest.json object PAR.
                    type: string
                required:
                - backupId
                - dbSystemId
                - sourceUrl
                type: object
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              subnetId:
                description: The OCID of the subnet the DB System is associated with.
                type: string
              timeCreated:
                description: The date and time the DB System was created.
                type: string
              timeUpdated:
                description: The time the DB System was last updated.
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
