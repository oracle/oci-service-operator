                            when the key material will be used to generate RRSIGs.
                            **Example:** `2016-07-22T17:23:59:00Z`
                          type: string
                        timeCreated:
                          description: |-
                            The date and time the key version was created, expressed in RFC 3339 timestamp format.
                            **Example:** `2016-07-22T17:23:59:00Z`
                          type: string
                        timeExpired:
