---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: (devel)
  name: functions.functions.oracle.com
spec:
  group: functions.oracle.com
  names:
    kind: Function
    listKind: FunctionList
    plural: functions
    singular: function
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the Function
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Function
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Function is the Schema for the functions API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FunctionSpec defines the desired state of Function.
            properties:
              applicationId:
                description: The OCID of the application this function belongs to.
                type: string
              config:
                additionalProperties:
                  type: string
                description: |-
                  Function configuration. These values are passed on to the function as environment variables, this overrides application configuration values.
                  Keys must be ASCII strings consisting solely of letters, digits, and the '_' (underscore) character, and must not begin with a digit. Values should be limited to printable unicode characters.
                  Example: `{"MY_FUNCTION_CONFIG": "ConfVal"}`
                  The maximum size for all configuration keys and values is limited to 4KB. This is measured as the sum of octets necessary to represent each key and value in UTF-8.
                type: object
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: The display name of the function. The display name must
                  be unique within the application containing the function. Avoid
                  entering confidential information.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              image:
                description: |-
                  The qualified name of the Docker image to use in the function, including the image tag.
                  The image should be in the OCI Registry that is in the same region as the function itself.
                  Example: `phx.ocir.io/ten/functions/function:0.0.1`
                type: string
              imageDigest:
                description: |-
                  The image digest for the version of the image that will be pulled when invoking this function.
                  If no value is specified, the digest currently associated with the image in the OCI Registry will be used.
                  Example: `sha256:ca0eeb6fb05351dfc8759c20733c91def84cb8007aa89a5bf606bc8b315b9fc7`
                type: string
              memoryInMBs:
                description: Maximum usable memory for the function (MiB).
                format: int64
                type: integer
              provisionedConcurrencyConfig:
                description: FunctionProvisionedConcurrencyConfig defines nested fields
                  for Function.ProvisionedConcurrencyConfig.
                properties:
                  count:
                    description: Configuration specifying a constant amount of provisioned
                      concurrency.
                    type: integer
                  jsonData:
                    type: string
                  strategy:
                    type: string
                type: object
              sourceDetails:
                description: FunctionSourceDetails defines nested fields for Function.SourceDetails.
                properties:
                  jsonData:
                    type: string
                  pbfListingId:
                    description: |-
                      The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the PbfListing this
                      function is sourced from.
                    type: string
                  sourceType:
                    type: string
                type: object
              timeoutInSeconds:
                description: Timeout for executions of the function. Value in seconds.
                type: integer
              traceConfig:
                description: FunctionTraceConfig defines nested fields for Function.TraceConfig.
                properties:
                  isEnabled:
                    description: Define if tracing is enabled for the resource.
                    type: boolean
                type: object
            required:
            - applicationId
            - displayName
            - memoryInMBs
            type: object
          status:
            description: FunctionStatus defines the observed state of Function.
            properties:
              applicationId:
                description: The OCID of the application the function belongs to.
                type: string
              compartmentId:
                description: The OCID of the compartment that contains the function.
                type: string
              config:
                additionalProperties:
                  type: string
                description: |-
                  Function configuration. Overrides application configuration.
                  Keys must be ASCII strings consisting solely of letters, digits, and the '_' (underscore) character, and must not begin with a digit. Values should be limited to printable unicode characters.
                  Example: `{"MY_FUNCTION_CONFIG": "ConfVal"}`
                  The maximum size for all configuration keys and values is limited to 4KB. This is measured as the sum of octets necessary to represent each key and value in UTF-8.
                type: object
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: The display name of the function. The display name is
                  unique within the application containing the function.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              id:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the function.
                type: string
              image:
                description: |-
                  The qualified name of the Docker image to use in the function, including the image tag.
                  The image should be in the OCI Registry that is in the same region as the function itself.
                  Example: `phx.ocir.io/ten/functions/function:0.0.1`
                type: string
              imageDigest:
                description: |-
                  The image digest for the version of the image that will be pulled when invoking this function.
                  If no value is specified, the digest currently associated with the image in the OCI Registry will be used.
                  Example: `sha256:ca0eeb6fb05351dfc8759c20733c91def84cb8007aa89a5bf606bc8b315b9fc7`
                type: string
              invokeEndpoint:
                description: The base https invoke URL to set on a client in order
                  to invoke a function. This URL will never change over the lifetime
                  of the function and can be cached.
                type: string
              lifecycleState:
                description: The current state of the function.
                type: string
              memoryInMBs:
                description: Maximum usable memory for the function (MiB).
                format: int64
                type: integer
              provisionedConcurrencyConfig:
                description: FunctionProvisionedConcurrencyConfig defines nested fields
                  for Function.ProvisionedConcurrencyConfig.
                properties:
                  count:
                    description: Configuration specifying a constant amount of provisioned
                      concurrency.
                    type: integer
                  jsonData:
                    type: string
                  strategy:
                    type: string
                type: object
              shape:
                description: The processor shape (`GENERIC_X86`/`GENERIC_ARM`) on
                  which to run functions in the application, extracted from the image
                  manifest.
                type: string
              sourceDetails:
                description: FunctionSourceDetails defines nested fields for Function.SourceDetails.
                properties:
                  jsonData:
                    type: string
                  pbfListingId:
                    description: |-
                      The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the PbfListing this
                      function is sourced from.
                    type: string
                  sourceType:
                    type: string
                type: object
              status:
                properties:
                  async:
                    description: |-
                      Async is the canonical controller-owned async contract. Resource-local
                      legacy work-request fields may remain as compatibility mirrors while
                      follow-on migrations land, but new async state should project here first.
                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
                            enum:
                            - none
                            - lifecycle
                            - workrequest
                            type: string
                          updatedAt:
                            format: date-time
                            type: string
                          workRequestId:
                            type: string
                        required:
                        - normalizedClass
                        - phase
                        - source
                        - updatedAt
                        type: object
                    type: object
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The time the function was created, expressed in RFC 3339 (https://tools.ietf.org/html/rfc3339)
                  timestamp format.
                  Example: `2018-09-12T22:47:12.613Z`
                type: string
              timeUpdated:
                description: |-
                  The time the function was updated, expressed in RFC 3339 (https://tools.ietf.org/html/rfc3339)
                  timestamp format.
                  Example: `2018-09-12T22:47:12.613Z`
                type: string
              timeoutInSeconds:
                description: Timeout for executions of the function. Value in seconds.
                type: integer
              traceConfig:
                description: FunctionTraceConfig defines nested fields for Function.TraceConfig.
                properties:
                  isEnabled:
                    description: Define if tracing is enabled for the resource.
                    type: boolean
                type: object
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
