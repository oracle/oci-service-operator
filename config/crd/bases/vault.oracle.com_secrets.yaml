                  Example: `{"Department": "Finance"}`
                type: object
              id:
                description: The OCID of the secret.
                type: string
              isAutoGenerationEnabled:
                description: The value of this flag determines whether or not secret
                  content will be generated automatically.
                type: boolean
              keyId:
                description: The OCID of the master encryption key that is used to
                  encrypt the secret. You must specify a symmetric key to encrypt
                  the secret during import to the vault. You cannot encrypt secrets
                  with asymmetric keys. Furthermore, the key must exist in the vault
                  that you specify.
                type: string
              lastRotationTime:
                description: |-
                  A property indicating when the secret was last rotated successfully, expressed in RFC 3339 (https://tools.ietf.org/html/rfc3339) timestamp format.
                  Example: `2019-04-03T21:10:29.600Z`
                type: string
              lifecycleDetails:
                description: Additional information about the current lifecycle state
                  of the secret.
                type: string
              lifecycleState:
                description: The current lifecycle state of the secret.
                type: string
              metadata:
                additionalProperties:
                  description: JSONValue preserves arbitrary JSON values inside generated
