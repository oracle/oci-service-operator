                        type: string
                      functionId:
                        description: The unique identifier (OCID) of the OCI Functions
                          that vault secret connects to.
                        type: string
                      jsonData:
                        type: string
                      targetSystemType:
                        type: string
                    required:
                    - adbId
                    - functionId
                    type: object
                required:
                - targetSystemDetails
                type: object
              rotationStatus:
                description: Additional information about the status of the secret
                  rotation
                type: string
              secretGenerationContext:
                description: SecretGenerationContextObservedState defines nested fields
