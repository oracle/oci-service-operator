                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
