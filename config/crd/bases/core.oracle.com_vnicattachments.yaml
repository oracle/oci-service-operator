    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: VnicAttachment is the Schema for the vnicattachments API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VnicAttachmentSpec defines the desired state of VnicAttachment.
            type: object
          status:
            description: VnicAttachmentStatus defines the observed state of VnicAttachment.
            properties:
              availabilityDomain:
                description: |-
                  The availability domain of the instance.
                  Example: `Uocm:PHX-AD-1`
                type: string
              compartmentId:
                description: |-
                  The OCID of the compartment the VNIC attachment is in, which is the same
                  compartment the instance is in.
                type: string
              displayName:
                description: |-
                  A user-friendly name. Does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                type: string
              id:
                description: The OCID of the VNIC attachment.
                type: string
              instanceId:
                description: The OCID of the instance.
                type: string
              lifecycleState:
                description: The current state of the VNIC attachment.
                type: string
              nicIndex:
                description: |-
                  Which physical network interface card (NIC) the VNIC uses.
                  Certain bare metal instance shapes have two active physical NICs (0 and 1). If
                  you add a secondary VNIC to one of these instances, you can specify which NIC
                  the VNIC will use. For more information, see
                  Virtual Network Interface Cards (VNICs) (https://docs.cloud.oracle.com/iaas/Content/Network/Tasks/managingVNICs.htm).
                type: integer
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
