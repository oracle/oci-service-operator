                description: Listeners associated with the network load balancer.
                type: object
              networkSecurityGroupIds:
                description: |-
                  An array of network security groups OCIDs (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) associated with the network load
                  balancer.
                  During the creation of the network load balancer, the service adds the new load balancer to the specified network security groups.
                  The benefits of associating the network load balancer with network security groups include:
                  *  Network security groups define network security rules to govern ingress and egress traffic for the network load balancer.
                  *  The network security rules of other resources can reference the network security groups associated with the network load balancer
                     to ensure access.
                  Example: ["ocid1.nsg.oc1.phx.unique_ID"]
                items:
                  type: string
                type: array
              nlbIpVersion:
                description: IP version associated with the NLB.
                type: string
              reservedIps:
                description: |-
                  An array of reserved Ips. NLB supports reserved public ip, reserved private IP and reserved IPv6. Customer can pass 3 reserved IP ocids, with all items unique, and a maximum of 1 allowed for each entity type: public-ip, private-ip and IPv6
                  Note that NLB does not support changing an IP’s lifecycle state between ephemeral and reserved if the IP is already assigned to the NLB. While this type of lifecycle state change is supported by VCN IPs even when the IP is assigned to a resource, such changes will not be recognized or reflected by NLB.
                items:
                  description: NetworkLoadBalancerReservedIp defines nested fields
                    for NetworkLoadBalancer.ReservedIp.
                  properties:
                    id:
                      description: |-
                        Ocid of the Reserved IP (Public IP, Private IP or IPv6) created with VCN.
                        Reserved IPs are IPs which are already registered using VCN API.
                        For public Network load balancers, customer can create a reserved Public IP and/or reserved private IP and/or reserved IPv6 and pass the OCID's in the
                        reservedIps array field to attach the IP addresses to the network load balancer during create
                        For private Network load balancers, customer can create a reserved Private IP and/or reserved IPv6 and pass the OCID's in the
                        reservedIps array field to attach the IP addresses to the network load balancer during create
                        Reserved IPs will not be deleted when the Network Load balancer is deleted. They will be detached from the Network Load balancer.
                        Public IP Example: "ocid1.publicip.oc1.phx.unique_ID"
                        Private IP Example: "ocid1.privateip.oc1.phx.unique_ID"
                        IPV6 example: "ocid1.ipv6.oc1.phx.unique_ID"
                      type: string
                  type: object
                type: array
              reservedIpv6Id:
                description: |-
                  The reservedIpv6Id field is used to specify the OCID of a reserved IPv6 address to be used only when updating NLB from single-stack IPv4 to dual-stack.
                  This field should not be used for any other scenario
                type: string
              securityAttributes:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  ZPR tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"oracle-zpr": {"td": {"value": "42", "mode": "audit"}}}`
                type: object
              subnetId:
                description: The subnet in which the network load balancer is spawned
                  OCIDs (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm).
                type: string
              subnetIpv6Cidr:
                description: IPv6 subnet prefix selection. If Ipv6 subnet prefix is
                  passed, Nlb Ipv6 Address would be assign within the cidr block.
                  NLB has to be dual or single stack ipv6 to support this.
                type: string
            required:
            - compartmentId
            - displayName
            - subnetId
            type: object
