    name: v1beta1
    schema:
      openAPIV3Schema:
        description: NetworkLoadBalancer is the Schema for the networkloadbalancers
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NetworkLoadBalancerSpec defines the desired state of NetworkLoadBalancer.
            properties:
              assignedIpv6:
                description: |-
                  IPv6 address to be assigned to the network load balancer being created.
                  This IP address has to be part of one of the prefixes supported by the subnet.
                  Example: "2607:9b80:9a0a:9a7e:abcd:ef01:2345:6789"
                type: string
              assignedPrivateIpv4:
                description: |-
                  Private IP address to be assigned to the network load balancer being created.
                  This IP address has to be in the CIDR range of the subnet where network load balancer is being created
                  Example: "10.0.0.1"
                type: string
              backendSets:
                additionalProperties:
                  description: NetworkLoadBalancerBackendSets defines nested fields
                    for NetworkLoadBalancer.BackendSets.
                  properties:
                    areOperationallyActiveBackendsPreferred:
                      description: |-
                        If enabled, NLB supports active-standby backends, with the initial standby being the configured backup backend. The standby backend becomes active and takes over serving traffic when the current active backend becomes unhealthy.
                        The new active backend continues to serve the traffic while healthy even when the old active backend becomes healthy.
                      type: boolean
                    backends:
                      description: An array of backends.
                      items:
                        description: NetworkLoadBalancerBackendSetsBackend defines
                          nested fields for NetworkLoadBalancer.BackendSets.Backend.
                        properties:
                          ipAddress:
                            description: |-
                              The IP address of the backend server.
                              Example: `10.0.0.3`
                            type: string
                          isBackup:
                            description: |-
                              Whether the network load balancer should treat this server as a backup unit. If `true`, then the network load balancer forwards no ingress
                              traffic to this backend server unless all other backend servers not marked as "isBackup" fail the health check policy.
                              Example: `false`
                            type: boolean
                          isDrain:
                            description: |-
                              Whether the network load balancer should drain this server.
                              Servers marked "isDrain" stop receiving new connections but will continue to receive traffic on existing connections until the connection is terminated or times out.
                              Example: `false`
                            type: boolean
                          isOffline:
                            description: |-
                              Whether the network load balancer should treat this server as offline. Offline servers receive no incoming
                              traffic.
                              Example: `false`
                            type: boolean
                          name:
                            description: |-
                              A read-only field showing the IP address/IP OCID and port that uniquely identify this backend server in the backend set.
                              Example: `10.0.0.3:8080`, or `ocid1.privateip..oc1.<var>&lt;unique_ID&gt;</var>:443` or `10.0.0.3:0`
                            type: string
                          port:
                            description: |-
                              The communication port for the backend server.
                              Example: `8080`
                            type: integer
                          targetId:
                            description: |-
                              The IP OCID/Instance OCID associated with the backend server.
                              Example: `ocid1.privateip..oc1.<var>&lt;unique_ID&gt;</var>`
