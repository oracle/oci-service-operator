---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: networkloadbalancers.networkloadbalancer.oracle.com
spec:
  group: networkloadbalancer.oracle.com
  names:
    kind: NetworkLoadBalancer
    listKind: NetworkLoadBalancerList
    plural: networkloadbalancers
    singular: networkloadbalancer
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the NetworkLoadBalancer
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the NetworkLoadBalancer
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: NetworkLoadBalancer is the Schema for the networkloadbalancers
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NetworkLoadBalancerSpec defines the desired state of NetworkLoadBalancer.
            properties:
              backendSets:
                additionalProperties:
                  description: NetworkLoadBalancerBackendSets defines nested fields
                    for NetworkLoadBalancer.BackendSets.
                  properties:
                    backends:
                      description: An array of backends.
                      items:
                        description: NetworkLoadBalancerBackendSetsBackend defines
                          nested fields for NetworkLoadBalancer.BackendSets.Backend.
                        properties:
                          ipAddress:
                            description: |-
                              The IP address of the backend server.
                              Example: `10.0.0.3`
                            type: string
                          isBackup:
                            description: |-
                              Whether the network load balancer should treat this server as a backup unit. If `true`, then the network load balancer forwards no ingress
                              traffic to this backend server unless all other backend servers not marked as "isBackup" fail the health check policy.
                              Example: `false`
                            type: boolean
                          isDrain:
                            description: |-
                              Whether the network load balancer should drain this server. Servers marked "isDrain" receive no
                              incoming traffic.
                              Example: `false`
                            type: boolean
                          isOffline:
                            description: |-
                              Whether the network load balancer should treat this server as offline. Offline servers receive no incoming
                              traffic.
                              Example: `false`
                            type: boolean
                          name:
                            description: |-
                              A read-only field showing the IP address/IP OCID and port that uniquely identify this backend server in the backend set.
                              Example: `10.0.0.3:8080`, or `ocid1.privateip..oc1.<var>&lt;unique_ID&gt;</var>:443` or `10.0.0.3:0`
                            type: string
                          port:
                            description: |-
                              The communication port for the backend server.
                              Example: `8080`
                            type: integer
                          targetId:
                            description: |-
                              The IP OCID/Instance OCID associated with the backend server.
                              Example: `ocid1.privateip..oc1.<var>&lt;unique_ID&gt;</var>`
                            type: string
                          weight:
                            description: |-
                              The network load balancing policy weight assigned to the server. Backend servers with a higher weight receive a larger
                              proportion of incoming traffic. For example, a server weighted '3' receives three times the number of new connections
                              as a server weighted '1'.
                              For more information about load balancing policies, see
                              How Network Load Balancing Policies Work (https://docs.cloud.oracle.com/Content/Balance/Reference/lbpolicies.htm).
                              Example: `3`
                            type: integer
                        required:
                        - port
                        type: object
                      type: array
                    healthChecker:
                      description: NetworkLoadBalancerBackendSetsHealthChecker defines
                        nested fields for NetworkLoadBalancer.BackendSets.HealthChecker.
                      properties:
                        intervalInMillis:
                          description: |-
                            The interval between health checks, in milliseconds. The default value is 10000 (10 seconds).
                            Example: `10000`
                          type: integer
                        port:
                          description: |-
                            The backend server port against which to run the health check. If the port is not specified, then the network load balancer uses the
                            port information from the `Backend` object. The port must be specified if the backend port is 0.
                            Example: `8080`
                          type: integer
                        protocol:
                          description: |-
                            The protocol the health check must use; either HTTP or HTTPS, or UDP or TCP.
                            Example: `HTTP`
                          type: string
                        requestData:
                          description: Base64 encoded pattern to be sent as UDP or
                            TCP health check probe.
                          type: string
                        responseBodyRegex:
                          description: |-
                            A regular expression for parsing the response body from the backend server.
                            Example: `^((?!false).|\s)*$`
                          type: string
                        responseData:
                          description: Base64 encoded pattern to be validated as UDP
                            or TCP health check probe response.
                          type: string
                        retries:
                          description: |-
                            The number of retries to attempt before a backend server is considered "unhealthy". This number also applies
                            when recovering a server to the "healthy" state. The default value is 3.
                            Example: `3`
                          type: integer
                        returnCode:
                          description: |-
                            The status code a healthy backend server should return. If you configure the health check policy to use the HTTP protocol,
                            then you can use common HTTP status codes such as "200".
                            Example: `200`
                          type: integer
                        timeoutInMillis:
                          description: |-
                            The maximum time, in milliseconds, to wait for a reply to a health check. A health check is successful only if a reply
                            returns within this timeout period. The default value is 3000 (3 seconds).
                            Example: `3000`
                          type: integer
                        urlPath:
                          description: |-
                            The path against which to run the health check.
                            Example: `/healthcheck`
                          type: string
                      required:
                      - protocol
                      type: object
                    ipVersion:
                      description: IP version associated with the backend set.
                      type: string
                    isPreserveSource:
                      description: |-
                        If this parameter is enabled, then the network load balancer preserves the source IP of the packet when it is forwarded to backends.
                        Backends see the original source IP. If the isPreserveSourceDestination parameter is enabled for the network load balancer resource, then this parameter cannot be disabled.
                        The value is true by default.
                      type: boolean
                    policy:
                      description: |-
                        The network load balancer policy for the backend set.
                        Example: `FIVE_TUPLE`
                      type: string
                  required:
                  - healthChecker
                  type: object
                description: Backend sets associated with the network load balancer.
                type: object
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the compartment containing the network load balancer.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  Example: `{"foo-namespace": {"bar-key": "value"}}`
                type: object
              displayName:
                description: Network load balancer identifier, which can be renamed.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Simple key-value pair that is applied without any predefined name, type, or scope. Exists for cross-compatibility only.
                  Example: `{"bar-key": "value"}`
                type: object
              isPreserveSourceDestination:
                description: |-
                  This parameter can be enabled only if backends are compute OCIDs. When enabled, the skipSourceDestinationCheck parameter is automatically
                  enabled on the load balancer VNIC, and packets are sent to the backend with the entire IP header intact.
                type: boolean
              isPrivate:
                description: |-
                  Whether the network load balancer has a virtual cloud network-local (private) IP address.
                  If "true", then the service assigns a private IP address to the network load balancer.
                  If "false", then the service assigns a public IP address to the network load balancer.
                  A public network load balancer is accessible from the internet, depending on the
                  security list rules (https://docs.cloud.oracle.com/Content/network/Concepts/securitylists.htm) for your virtual cloud network. For more information about public and
                  private network load balancers,
                  see How Network Load Balancing Works (https://docs.cloud.oracle.com/Content/Balance/Concepts/balanceoverview.htm#how-network-load-balancing-works).
                  This value is true by default.
                  Example: `true`
                type: boolean
              listeners:
                additionalProperties:
                  description: NetworkLoadBalancerListeners defines nested fields
                    for NetworkLoadBalancer.Listeners.
                  properties:
                    defaultBackendSetName:
                      description: |-
                        The name of the associated backend set.
                        Example: `example_backend_set`
                      type: string
                    ipVersion:
                      description: IP version associated with the listener.
                      type: string
                    name:
                      description: |-
                        A friendly name for the listener. It must be unique and it cannot be changed.
                        Example: `example_listener`
                      type: string
                    port:
                      description: |-
                        The communication port for the listener.
                        Example: `80`
                      type: integer
                    protocol:
                      description: |-
                        The protocol on which the listener accepts connection requests.
                        For public network load balancers, ANY protocol refers to TCP/UDP.
                        For private network load balancers, ANY protocol refers to TCP/UDP/ICMP (note that ICMP requires isPreserveSourceDestination to be set to true).
                        To get a list of valid protocols, use the ListNetworkLoadBalancersProtocols
                        operation.
                        Example: `TCP`
                      type: string
                  required:
                  - defaultBackendSetName
                  - name
                  - port
                  - protocol
                  type: object
                description: Listeners associated with the network load balancer.
                type: object
              networkSecurityGroupIds:
                description: |-
                  An array of network security groups OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) associated with the network load
                  balancer.
                  During the creation of the network load balancer, the service adds the new load balancer to the specified network security groups.
                  The benefits of associating the network load balancer with network security groups include:
                  *  Network security groups define network security rules to govern ingress and egress traffic for the network load balancer.
                  *  The network security rules of other resources can reference the network security groups associated with the network load balancer
                     to ensure access.
                  Example: ["ocid1.nsg.oc1.phx.unique_ID"]
                items:
                  type: string
                type: array
              nlbIpVersion:
                description: IP version associated with the NLB.
                type: string
              reservedIps:
                description: An array of reserved Ips.
                items:
                  description: NetworkLoadBalancerReservedIp defines nested fields
                    for NetworkLoadBalancer.ReservedIp.
                  properties:
                    id:
                      description: |-
                        OCID of the reserved public IP address created with the virtual cloud network.
                        Reserved public IP addresses are IP addresses that are registered using the virtual cloud network API.
                        Create a reserved public IP address. When you create the network load balancer, enter the OCID of the reserved public IP address in the
                        reservedIp field to attach the IP address to the network load balancer. This task configures the network load balancer to listen to traffic on this IP address.
                        Reserved public IP addresses are not deleted when the network load balancer is deleted. The IP addresses become unattached from the network load balancer.
                        Example: "ocid1.publicip.oc1.phx.unique_ID"
                      type: string
                  type: object
                type: array
              subnetId:
                description: The subnet in which the network load balancer is spawned
                  OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm).
                type: string
            required:
            - compartmentId
            - displayName
            - subnetId
            type: object
          status:
            description: NetworkLoadBalancerStatus defines the observed state of NetworkLoadBalancer.
            properties:
              id:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the network load balancer.
                type: string
              ipAddresses:
                description: An array of IP addresses.
                items:
                  description: NetworkLoadBalancerIpAddress defines nested fields
                    for NetworkLoadBalancer.IpAddress.
                  properties:
                    ipAddress:
                      description: |-
                        An IP address.
                        Example: `192.168.0.3`
                      type: string
                    ipVersion:
                      description: IP version associated with this IP address.
                      type: string
                    isPublic:
                      description: |-
                        Whether the IP address is public or private.
                        If "true", then the IP address is public and accessible from the internet.
                        If "false", then the IP address is private and accessible only from within the associated virtual cloud network.
                      type: boolean
                    reservedIp:
                      description: NetworkLoadBalancerIpAddressReservedIp defines
                        nested fields for NetworkLoadBalancer.IpAddress.ReservedIp.
                      properties:
                        id:
                          description: |-
                            OCID of the reserved public IP address created with the virtual cloud network.
                            Reserved public IP addresses are IP addresses that are registered using the virtual cloud network API.
                            Create a reserved public IP address. When you create the network load balancer, enter the OCID of the reserved public IP address in the
                            reservedIp field to attach the IP address to the network load balancer. This task configures the network load balancer to listen to traffic on this IP address.
                            Reserved public IP addresses are not deleted when the network load balancer is deleted. The IP addresses become unattached from the network load balancer.
                            Example: "ocid1.publicip.oc1.phx.unique_ID"
                          type: string
                      type: object
                  type: object
                type: array
              lifecycleDetails:
                description: |-
                  A message describing the current state in more detail.
                  For example, can be used to provide actionable information for a resource in Failed state.
                type: string
              lifecycleState:
                description: The current state of the network load balancer.
                type: string
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              systemTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Key-value pair representing system tags' keys and values scoped to a namespace.
                  Example: `{"bar-key": "value"}`
                type: object
              timeCreated:
                description: |-
                  The date and time the network load balancer was created, in the format defined by RFC3339.
                  Example: `2020-05-01T21:10:29.600Z`
                type: string
              timeUpdated:
                description: |-
                  The time the network load balancer was updated. An RFC3339 formatted date-time string.
                  Example: `2020-05-01T22:10:29.600Z`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
