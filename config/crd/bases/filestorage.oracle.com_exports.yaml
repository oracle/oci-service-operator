---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: exports.filestorage.oracle.com
spec:
  group: filestorage.oracle.com
  names:
    kind: Export
    listKind: ExportList
    plural: exports
    singular: export
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the Export
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Export
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Export is the Schema for the exports API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ExportSpec defines the desired state of Export.
            properties:
              exportOptions:
                description: |-
                  Export options for the new export. For exports of mount targets with
                  IPv4 address, if client options are left unspecified, client options
                  would default to:
                         [
                           {
                              "source" : "0.0.0.0/0",
                              "requirePrivilegedSourcePort" : false,
                              "access": "READ_WRITE",
                              "identitySquash": "NONE",
                              "anonymousUid": 65534,
                              "anonymousGid": 65534,
                              "isAnonymousAccessAllowed": false,
                              "allowedAuth": ["SYS"]
                            }
                         ]
                    For exports of mount targets with IPv6 address, if client options are
                    left unspecified, client options would be an empty array, i.e. export
                    would not be visible to any clients.
                    **Note:** Mount targets do not have Internet-routable IP
                    addresses.  Therefore they will not be reachable from the
                    Internet, even if an associated `ClientOptions` item has
                    a source of `0.0.0.0/0`.
                    **If set to the empty array then the export will not be
                    visible to any clients.**
                    The export's `exportOptions` can be changed after creation
                    using the `UpdateExport` operation.
                items:
                  description: ExportOption defines nested fields for Export.ExportOption.
                  properties:
                    access:
                      description: |-
                        Type of access to grant clients using the file system
                        through this export. If unspecified defaults to `READ_WRITE`.
                      type: string
                    allowedAuth:
                      description: Array of allowed NFS authentication types.
                      items:
                        type: string
                      type: array
                    anonymousGid:
                      description: |-
                        GID value to remap to when squashing a client GID (see
                        identitySquash for more details.) If unspecified defaults
                        to `65534`.
                      format: int64
                      type: integer
                    anonymousUid:
                      description: |-
                        UID value to remap to when squashing a client UID (see
                        identitySquash for more details.) If unspecified, defaults
                        to `65534`.
                      format: int64
                      type: integer
                    identitySquash:
                      description: |-
                        Used when clients accessing the file system through this export
                        have their UID and GID remapped to 'anonymousUid' and
                        'anonymousGid'. If `ALL`, all users and groups are remapped;
                        if `ROOT`, only the root user and group (UID/GID 0) are
                        remapped; if `NONE`, no remapping is done. If unspecified,
                        defaults to `ROOT`.
                      type: string
                    isAnonymousAccessAllowed:
                      description: |-
                        Whether or not to enable anonymous access to the file system through this export in cases where a user isn't found in the LDAP server used for ID mapping.
                        If true, and the user is not found in the LDAP directory, the operation uses the Squash UID and Squash GID.
                      type: boolean
                    requirePrivilegedSourcePort:
                      description: |-
                        If `true`, clients accessing the file system through this
                        export must connect from a privileged source port. If
                        unspecified, defaults to `true`.
                      type: boolean
                    source:
                      description: |-
                        Clients these options should apply to. Must be a either
                        single IPv4/IPv6 address or single IPv4/IPv6 CIDR block.
                        **Note:** Access will also be limited by any applicable VCN
                        security rules and the ability to route IP packets to the
                        mount target. Mount targets do not have Internet-routable IP addresses.
                      type: string
                  required:
                  - source
                  type: object
                type: array
              exportSetId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of this export's export set.
                type: string
              fileSystemId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of this export's file system.
                type: string
              isIdmapGroupsForSysAuth:
                description: Whether or not the export should use ID mapping for Unix
                  groups rather than the group list provided within an NFS request's
                  RPC header. When this flag is true the Unix UID from the RPC header
                  is used to retrieve the list of secondary groups from a the ID mapping
                  subsystem. The primary GID is always taken from the RPC header.
                  If ID mapping is not configured, incorrectly configured, unavailable,
                  or cannot be used to determine a list of secondary groups then an
                  empty secondary group list is used for authorization. If the number
                  of groups exceeds the limit of 256 groups, the list retrieved from
                  LDAP is truncated to the first 256 groups read.
                type: boolean
              locks:
                description: Locks associated with this resource.
                items:
                  description: ExportLock defines nested fields for Export.Lock.
                  properties:
                    message:
                      description: |-
                        A message added by the creator of the lock. This is typically used to give an
                        indication of why the resource is locked.
                      type: string
                    relatedResourceId:
                      description: The ID of the resource that is locking this resource.
                        Indicates that deleting this resource will remove the lock.
                      type: string
                    timeCreated:
                      description: When the lock was created.
                      type: string
                    type:
                      description: Type of the lock.
                      type: string
                  required:
                  - type
                  type: object
                type: array
              path:
                description: |-
                  Path used to access the associated file system.
                  Avoid entering confidential information.
                  Example: `/mediafiles`
                type: string
            required:
            - exportSetId
            - fileSystemId
            - path
            type: object
          status:
            description: ExportStatus defines the observed state of Export.
            properties:
              exportOptions:
                description: |-
                  Policies that apply to NFS requests made through this
                  export. `exportOptions` contains a sequential list of
                  `ClientOptions`. Each `ClientOptions` item defines the
                  export options that are applied to a specified
                  set of clients.
                  For each NFS request, the first `ClientOptions` option
                  in the list whose `source` attribute matches the source
                  IP address of the request is applied.
                  If a client source IP address does not match the `source`
                  property of any `ClientOptions` in the list, then the
                  export will be invisible to that client. This export will
                  not be returned by `MOUNTPROC_EXPORT` calls made by the client
                  and any attempt to mount or access the file system through
                  this export will result in an error.
                  **Exports without defined `ClientOptions` are invisible to all clients.**
                  If one export is invisible to a particular client, associated file
                  systems may still be accessible through other exports on the same
                  or different mount targets.
                  To completely deny client access to a file system, be sure that the client
                  source IP address is not included in any export for any mount target
                  associated with the file system.
                items:
                  description: ExportOption defines nested fields for Export.ExportOption.
                  properties:
                    access:
                      description: |-
                        Type of access to grant clients using the file system
                        through this export. If unspecified defaults to `READ_WRITE`.
                      type: string
                    allowedAuth:
                      description: Array of allowed NFS authentication types.
                      items:
                        type: string
                      type: array
                    anonymousGid:
                      description: |-
                        GID value to remap to when squashing a client GID (see
                        identitySquash for more details.) If unspecified defaults
                        to `65534`.
                      format: int64
                      type: integer
                    anonymousUid:
                      description: |-
                        UID value to remap to when squashing a client UID (see
                        identitySquash for more details.) If unspecified, defaults
                        to `65534`.
                      format: int64
                      type: integer
                    identitySquash:
                      description: |-
                        Used when clients accessing the file system through this export
                        have their UID and GID remapped to 'anonymousUid' and
                        'anonymousGid'. If `ALL`, all users and groups are remapped;
                        if `ROOT`, only the root user and group (UID/GID 0) are
                        remapped; if `NONE`, no remapping is done. If unspecified,
                        defaults to `ROOT`.
                      type: string
                    isAnonymousAccessAllowed:
                      description: |-
                        Whether or not to enable anonymous access to the file system through this export in cases where a user isn't found in the LDAP server used for ID mapping.
                        If true, and the user is not found in the LDAP directory, the operation uses the Squash UID and Squash GID.
                      type: boolean
                    requirePrivilegedSourcePort:
                      description: |-
                        If `true`, clients accessing the file system through this
                        export must connect from a privileged source port. If
                        unspecified, defaults to `true`.
                      type: boolean
                    source:
                      description: |-
                        Clients these options should apply to. Must be a either
                        single IPv4/IPv6 address or single IPv4/IPv6 CIDR block.
                        **Note:** Access will also be limited by any applicable VCN
                        security rules and the ability to route IP packets to the
                        mount target. Mount targets do not have Internet-routable IP addresses.
                      type: string
                  required:
                  - source
                  type: object
                type: array
              exportSetId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of this export's export set.
                type: string
              fileSystemId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of this export's file system.
                type: string
              id:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of this export.
                type: string
              isIdmapGroupsForSysAuth:
                description: Whether or not the export should use ID mapping for Unix
                  groups rather than the group list provided within an NFS request's
                  RPC header. When this flag is true the Unix UID from the RPC header
                  is used to retrieve the list of secondary groups from a the ID mapping
                  subsystem. The primary GID is always taken from the RPC header.
                  If ID mapping is not configured, incorrectly configured, unavailable,
                  or cannot be used to determine a list of secondary groups then an
                  empty secondary group list is used for authorization. If the number
                  of groups exceeds the limit of 256 groups, the list retrieved from
                  LDAP is truncated to the first 256 groups read.
                type: boolean
              lifecycleState:
                description: The current state of this export.
                type: string
              locks:
                description: Locks associated with this resource.
                items:
                  description: ExportLock defines nested fields for Export.Lock.
                  properties:
                    message:
                      description: |-
                        A message added by the creator of the lock. This is typically used to give an
                        indication of why the resource is locked.
                      type: string
                    relatedResourceId:
                      description: The ID of the resource that is locking this resource.
                        Indicates that deleting this resource will remove the lock.
                      type: string
                    timeCreated:
                      description: When the lock was created.
                      type: string
                    type:
                      description: Type of the lock.
                      type: string
                  required:
                  - type
                  type: object
                type: array
              path:
                description: |-
                  Path used to access the associated file system.
                  Avoid entering confidential information.
                  Example: `/accounting`
                type: string
              status:
                properties:
                  async:
                    description: |-
                      Async is the canonical controller-owned async contract. Resource-local
                      legacy work-request fields may remain as compatibility mirrors while
                      follow-on migrations land, but new async state should project here first.
                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
                            enum:
                            - none
                            - lifecycle
                            - workrequest
                            type: string
                          updatedAt:
                            format: date-time
                            type: string
                          workRequestId:
                            type: string
                        required:
                        - normalizedClass
                        - phase
                        - source
                        - updatedAt
                        type: object
                    type: object
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  opcRequestId:
                    description: |-
                      OpcRequestID is the latest non-empty OCI request ID from a mutating OCI
                      response or surfaced OCI service error that materially contributed to the
                      current shared status projection. Headerless follow-up observations keep
                      the last non-empty value intact.
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time the export was created, expressed
                  in RFC 3339 (https://tools.ietf.org/rfc/rfc3339) timestamp format.
                  Example: `2016-08-25T21:10:29.600Z`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
