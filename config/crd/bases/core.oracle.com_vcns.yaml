---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: vcns.core.oracle.com
spec:
  group: core.oracle.com
  names:
    kind: Vcn
    listKind: VcnList
    plural: vcns
    singular: vcn
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the Vcn
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Vcn
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Vcn is the Schema for the vcns API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VcnSpec defines the desired state of Vcn.
            properties:
              byoipv6CidrDetails:
                description: The list of BYOIPv6 OCIDs and BYOIPv6 prefixes required
                  to create a VCN that uses BYOIPv6 address ranges.
                items:
                  description: VcnByoipv6CidrDetail defines nested fields for Vcn.Byoipv6CidrDetail.
                  properties:
                    byoipv6RangeId:
                      description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                        of the `ByoipRange` resource to which the CIDR block belongs.
                      type: string
                    ipv6CidrBlock:
                      description: |-
                        An IPv6 prefix required to create a VCN with a BYOIP prefix. It could be the whole prefix identified in `byoipv6RangeId`, or a subrange.
                        Example: `2001:0db8:0123::/48`
                      type: string
                  required:
                  - byoipv6RangeId
                  - ipv6CidrBlock
                  type: object
                type: array
              cidrBlock:
                description: |-
                  **Deprecated.** Do *not* set this value. Use `cidrBlocks` instead.
                  Example: `10.0.0.0/16`
                type: string
              cidrBlocks:
                description: |-
                  The list of one or more IPv4 CIDR blocks for the VCN that meet the following criteria:
                  - The CIDR blocks must be valid.
                  - They must not overlap with each other or with the on-premises network CIDR block.
                  - The number of CIDR blocks must not exceed the limit of CIDR blocks allowed per VCN.
                  **Important:** Do *not* specify a value for `cidrBlock`. Use this parameter instead.
                items:
                  type: string
                type: array
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment to contain the VCN.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a
                  namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name. Does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                type: string
              dnsLabel:
                description: |-
                  A DNS label for the VCN, used in conjunction with the VNIC's hostname and
                  subnet's DNS label to form a fully qualified domain name (FQDN) for each VNIC
                  within this subnet (for example, `bminstance1.subnet123.vcn1.oraclevcn.com`).
                  Not required to be unique, but it's a best practice to set unique DNS labels
                  for VCNs in your tenancy. Must be an alphanumeric string that begins with a letter.
                  The value cannot be changed.
                  You must set this value if you want instances to be able to use hostnames to
                  resolve other instances in the VCN. Otherwise the Internet and VCN Resolver
                  will not work.
                  For more information, see
                  DNS in Your Virtual Cloud Network (https://docs.cloud.oracle.com/iaas/Content/Network/Concepts/dns.htm).
                  Example: `vcn1`
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no
                  predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              ipv6PrivateCidrBlocks:
                description: |-
                  The list of one or more ULA or Private IPv6 prefixes for the VCN that meets the following criteria:
                  - The CIDR blocks must be valid.
                  - Multiple CIDR blocks must not overlap each other or the on-premises network prefix.
                  - The number of CIDR blocks must not exceed the limit of IPv6 prefixes allowed to a VCN.
                  **Important:** Do *not* specify a value for `ipv6CidrBlock`. Use this parameter instead.
                items:
                  type: string
                type: array
              isIpv6Enabled:
                description: |-
                  Whether IPv6 is enabled for the VCN. Default is `false`.
                  If enabled, Oracle will assign the VCN a IPv6 /56 CIDR block.
                  You may skip having Oracle allocate the VCN a IPv6 /56 CIDR block by setting isOracleGuaAllocationEnabled to `false`.
                  For important details about IPv6 addressing in a VCN, see IPv6 Addresses (https://docs.cloud.oracle.com/iaas/Content/Network/Concepts/ipv6.htm).
                  Example: `true`
                type: boolean
              isOracleGuaAllocationEnabled:
                description: |-
                  Specifies whether to skip Oracle allocated IPv6 GUA. By default, Oracle will allocate one GUA of /56
                  size for an IPv6 enabled VCN.
                type: boolean
            required:
            - compartmentId
            type: object
          status:
            description: VcnStatus defines the observed state of Vcn.
            properties:
              byoipv6CidrBlocks:
                description: The list of BYOIPv6 prefixes required to create a VCN
                  that uses BYOIPv6 ranges.
                items:
                  type: string
                type: array
              cidrBlock:
                description: |-
                  Deprecated. The first CIDR IP address from cidrBlocks.
                  Example: `172.16.0.0/16`
                type: string
              cidrBlocks:
                description: The list of IPv4 CIDR blocks the VCN will use.
                items:
                  type: string
                type: array
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment containing the VCN.
                type: string
              defaultDhcpOptionsId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  for the VCN's default set of DHCP options.
                type: string
              defaultRouteTableId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  for the VCN's default route table.
                type: string
              defaultSecurityListId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  for the VCN's default security list.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a
                  namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name. Does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                type: string
              dnsLabel:
                description: |-
                  A DNS label for the VCN, used in conjunction with the VNIC's hostname and
                  subnet's DNS label to form a fully qualified domain name (FQDN) for each VNIC
                  within this subnet (for example, `bminstance1.subnet123.vcn1.oraclevcn.com`).
                  Must be an alphanumeric string that begins with a letter.
                  The value cannot be changed.
                  The absence of this parameter means the Internet and VCN Resolver will
                  not work for this VCN.
                  For more information, see
                  DNS in Your Virtual Cloud Network (https://docs.cloud.oracle.com/iaas/Content/Network/Concepts/dns.htm).
                  Example: `vcn1`
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no
                  predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              id:
                description: The VCN's Oracle ID (OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)).
                type: string
              ipv6CidrBlocks:
                description: |-
                  For an IPv6-enabled VCN, this is the list of IPv6 prefixes for the VCN's IP address space.
                  The prefixes are provided by Oracle and the sizes are always /56.
                items:
                  type: string
                type: array
              ipv6PrivateCidrBlocks:
                description: For an IPv6-enabled VCN, this is the list of Private
                  IPv6 prefixes for the VCN's IP address space.
                items:
                  type: string
                type: array
              lifecycleState:
                description: The VCN's current state.
                type: string
              status:
                properties:
                  async:
                    description: |-
                      Async is the canonical controller-owned async contract. Resource-local
                      legacy work-request fields may remain as compatibility mirrors while
                      follow-on migrations land, but new async state should project here first.
                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
                            enum:
                            - none
                            - lifecycle
                            - workrequest
                            type: string
                          updatedAt:
                            format: date-time
                            type: string
                          workRequestId:
                            type: string
                        required:
                        - normalizedClass
                        - phase
                        - source
                        - updatedAt
                        type: object
                    type: object
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  opcRequestId:
                    description: |-
                      OpcRequestID is the latest non-empty OCI request ID from a mutating OCI
                      response or surfaced OCI service error that materially contributed to the
                      current shared status projection. Headerless follow-up observations keep
                      the last non-empty value intact.
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time the VCN was created, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339).
                  Example: `2016-08-25T21:10:29.600Z`
                type: string
              vcnDomainName:
                description: |-
                  The VCN's domain name, which consists of the VCN's DNS label, and the
                  `oraclevcn.com` domain.
                  For more information, see
                  DNS in Your Virtual Cloud Network (https://docs.cloud.oracle.com/iaas/Content/Network/Concepts/dns.htm).
                  Example: `vcn1.oraclevcn.com`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
