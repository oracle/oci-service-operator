---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: alarmstatuses.monitoring.oracle.com
spec:
  group: monitoring.oracle.com
  names:
    kind: AlarmStatus
    listKind: AlarmStatusList
    plural: alarmstatuses
    singular: alarmstatus
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the AlarmStatus
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the AlarmStatus
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: AlarmStatus is the Schema for the alarmstatuses API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AlarmStatusSpec defines the desired state of AlarmStatus.
            type: object
          status:
            description: AlarmStatusObservedState defines the observed state of AlarmStatus.
            properties:
              displayName:
                description: |-
                  The configured name of the alarm.
                  Example: `High CPU Utilization`
                type: string
              id:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the alarm.
                type: string
              sdkStatus:
                description: |-
                  The status of this alarm.
                  Status is collective, across all metric streams in the alarm.
                  To list alarm status for each metric stream, use RetrieveDimensionStates.
                  Example: `FIRING`
                  This uses a distinct JSON name so it can coexist with the OSOK status envelope.
                type: string
              severity:
                description: |-
                  The perceived type of response required when the alarm is in the "FIRING" state.
                  Example: `CRITICAL`
                type: string
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              suppression:
                description: The configuration details for suppressing an alarm.
                properties:
                  description:
                    description: |-
                      Human-readable reason for suppressing alarm notifications.
                      It does not have to be unique, and it's changeable.
                      Avoid entering confidential information.
                      Oracle recommends including tracking information for the event or associated work,
                      such as a ticket number.
                      Example: `Planned outage due to change IT-1234.`
                    type: string
                  timeSuppressFrom:
                    description: |-
                      The start date and time for the suppression to take place, inclusive. Format defined by RFC3339.
                      Example: `2023-02-01T01:02:29.600Z`
                    type: string
                  timeSuppressUntil:
                    description: |-
                      The end date and time for the suppression to take place, inclusive. Format defined by RFC3339.
                      Example: `2023-02-01T02:02:29.600Z`
                    type: string
                type: object
              timestampTriggered:
                description: |-
                  Timestamp for the transition of the alarm state. For example, the time when the alarm transitioned from OK to Firing.
                  Note: A three-minute lag for this value accounts for any late-arriving metrics.
                  Example: `2023-02-01T01:02:29.600Z`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
