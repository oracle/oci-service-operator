              kmsKeyVersionId:
                description: The OCID of the key container version that is used in
                  database transparent data encryption (TDE) operations KMS Key can
                  have multiple key versions. If none is specified, the current key
                  version (latest) of the Key Id is used for the operation. Autonomous
                  Database Serverless does not use key versions, hence is not applicable
                  for Autonomous Database Serverless instances.
                type: string
              licenseModel:
                description: |-
                  The Oracle license model that applies to the Oracle Autonomous Database. Bring your own license (BYOL) allows you to apply your current on-premises Oracle software licenses to equivalent, highly automated Oracle services in the cloud.
                  License Included allows you to subscribe to new Oracle Database software licenses and the Oracle Database service.
                  Note that when provisioning an Autonomous Database on dedicated Exadata infrastructure (https://docs.oracle.com/en/cloud/paas/autonomous-database/index.html), this attribute must be null. It is already set at the
                  Autonomous Exadata Infrastructure level. When provisioning an Autonomous Database Serverless  (https://docs.oracle.com/en/cloud/paas/autonomous-database/index.html) database, if a value is not specified, the system defaults the value to `BRING_YOUR_OWN_LICENSE`. Bring your own license (BYOL) also allows you to select the DB edition using the optional parameter.
                  This cannot be updated in parallel with any of the following: cpuCoreCount, computeCount, dataStorageSizeInTBs, adminPassword, isMTLSConnectionRequired, dbWorkload, privateEndpointLabel, nsgIds, dbVersion, dbName, scheduledOperations, dbToolsDetails, or isFreeTier.
                type: string
              lifecycleDetails:
                description: Information about the current lifecycle state.
                type: string
              lifecycleState:
                description: The current state of the Autonomous Database.
                type: string
              localAdgAutoFailoverMaxDataLossLimit:
                description: Parameter that allows users to select an acceptable maximum
                  data loss limit in seconds, up to which Automatic Failover will
                  be triggered when necessary for a Local Autonomous Data Guard
                type: integer
              localDisasterRecoveryType:
                description: |-
                  Indicates the local disaster recovery (DR) type of the Autonomous Database Serverless instance.
                  Autonomous Data Guard (ADG) DR type provides business critical DR with a faster recovery time objective (RTO) during failover or switchover.
                  Backup-based DR type provides lower cost DR with a slower RTO during failover or switchover.
                type: string
              localStandbyDb:
                description: AutonomousDatabaseLocalStandbyDb defines nested fields
                  for AutonomousDatabase.LocalStandbyDb.
                properties:
                  lagTimeInSeconds:
                    description: The amount of time, in seconds, that the data of
                      the standby database lags the data of the primary database.
                      Can be used to determine the potential data loss in the event
                      of a failover.
                    type: integer
                  lifecycleDetails:
                    description: Additional information about the current lifecycle
                      state.
                    type: string
                  lifecycleState:
                    description: The current state of the Autonomous Database.
                    type: string
                  timeDataGuardRoleChanged:
                    description: The date and time the Autonomous Data Guard role
                      was switched for the standby Autonomous Database.
                    type: string
                  timeDisasterRecoveryRoleChanged:
                    description: The date and time the Disaster Recovery role was
                      switched for the standby Autonomous Database.
                    type: string
                type: object
              longTermBackupSchedule:
                description: AutonomousDatabaseLongTermBackupSchedule defines nested
                  fields for AutonomousDatabase.LongTermBackupSchedule.
                properties:
                  isDisabled:
                    description: Indicates if the long-term backup schedule should
                      be deleted. The default value is `FALSE`.
                    type: boolean
                  repeatCadence:
                    description: The frequency of the long-term backup schedule
                    type: string
                  retentionPeriodInDays:
                    description: Retention period, in days, for long-term backups
                    type: integer
                  timeOfBackup:
                    description: The timestamp for the long-term backup schedule.
                      For a MONTHLY cadence, months having fewer days than the provided
                      date will have the backup taken on the last day of that month.
                    type: string
                type: object
              memoryPerOracleComputeUnitInGBs:
                description: The amount of memory (in GBs) enabled per ECPU or OCPU.
                type: integer
              ncharacterSet:
                description: |-
                  The national character set for the autonomous database.  The default is AL16UTF16. Allowed values are:
                  AL16UTF16 or UTF8.
                type: string
              netServicesArchitecture:
                description: Enabling SHARED server architecture enables a database
                  server to allow many client processes to share very few server processes,
                  thereby increasing the number of supported users.
                type: string
              nextLongTermBackupTimeStamp:
                description: The date and time when the next long-term backup would
                  be created.
                type: string
              nsgIds:
                description: |-
                  The list of OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) for the network security groups (NSGs) to which this resource belongs. Setting this to an empty list removes all resources from all NSGs. For more information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  **NsgIds restrictions:**
                  - A network security group (NSG) is optional for Autonomous Databases with private access. The nsgIds list can be empty.
                items:
                  type: string
                type: array
              ocpuCount:
                description: |-
                  The number of OCPU cores to be made available to the database.
                  The following points apply:
                  - For Autonomous Databases on Dedicated Exadata Infrastructure, to provision less than 1 core, enter a fractional value in an increment of 0.1. For example, you can provision 0.3 or 0.4 cores, but not 0.35 cores. (Note that fractional OCPU values are not supported for Autonomous Database Serverless instances.)
                  - To provision cores, enter an integer between 1 and the maximum number of cores available for the infrastructure shape. For example, you can provision 2 cores or 3 cores, but not 2.5 cores. This applies to Autonomous Databases on both serverless and dedicated Exadata infrastructure.
                  - For Autonomous Database Serverless instances, this parameter is not used.
                  For Autonomous Databases on Dedicated Exadata Infrastructure, the maximum number of cores is determined by the infrastructure shape. See Characteristics of Infrastructure Shapes (https://docs.oracle.com/en/cloud/paas/autonomous-database/dedicated/adbde/index.html) for shape details.
                  **Note:** This parameter cannot be used with the `cpuCoreCount` parameter.
                type: number
              openMode:
                description: |-
                  Indicates the Autonomous Database mode. The database can be opened in `READ_ONLY` or `READ_WRITE` mode.
                  This cannot be updated in parallel with any of the following: cpuCoreCount, computeCount, computeModel, adminPassword, whitelistedIps, isMTLSConnectionRequired, dbVersion, isRefreshable, dbName, scheduledOperations, dbToolsDetails, or isFreeTier.
                type: string
              operationsInsightsStatus:
                description: Status of Operations Insights for this Autonomous Database.
                type: string
              peerDbIds:
                description: The list of OCIDs (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of standby databases located in Autonomous Data Guard remote regions
                  that are associated with the source database. Note that for Autonomous
                  Database Serverless instances, standby databases located in the
                  same region as the source primary database do not have OCIDs.
                items:
                  type: string
                type: array
              permissionLevel:
                description: |-
                  The Autonomous Database permission level. Restricted mode allows access only by admin users.
                  This cannot be updated in parallel with any of the following: cpuCoreCount, computeCount, computeModel, adminPassword, whitelistedIps, isMTLSConnectionRequired, nsgIds, dbVersion, isRefreshable, dbName, scheduledOperations, dbToolsDetails, or isFreeTier.
                type: string
              privateEndpoint:
                description: The private endpoint for the resource.
                type: string
              privateEndpointIp:
                description: The private endpoint Ip address for the resource.
                type: string
              privateEndpointLabel:
                description: |-
                  The resource's private endpoint label.
                  - Setting the endpoint label to a non-empty string creates a private endpoint database.
                  - Resetting the endpoint label to an empty string, after the creation of the private endpoint database, changes the private endpoint database to a public endpoint database.
                  - Setting the endpoint label to a non-empty string value, updates to a new private endpoint database, when the database is disabled and re-enabled.
                  This setting cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, adminPassword, whitelistedIps, isMTLSConnectionRequired, dbWorkload, dbVersion, isRefreshable, dbName, scheduledOperations, dbToolsDetails, or isFreeTier.
                type: string
              provisionableCpus:
                description: An array of CPU values that an Autonomous Database can
                  be scaled to.
                items:
                  type: number
                type: array
              refreshableMode:
                description: The refresh mode of the clone. AUTOMATIC indicates that
                  the clone is automatically being refreshed with data from the source
                  Autonomous Database.
                type: string
              refreshableStatus:
                description: The refresh status of the clone. REFRESHING indicates
                  that the clone is currently being refreshed with data from the source
                  Autonomous Database.
                type: string
              remoteDisasterRecoveryConfiguration:
                description: AutonomousDatabaseRemoteDisasterRecoveryConfiguration
                  defines nested fields for AutonomousDatabase.RemoteDisasterRecoveryConfiguration.
                properties:
                  disasterRecoveryType:
                    description: |-
                      Indicates the disaster recovery (DR) type of the Autonomous Database Serverless instance.
                      Autonomous Data Guard (ADG) DR type provides business critical DR with a faster recovery time objective (RTO) during failover or switchover.
                      Backup-based DR type provides lower cost DR with a slower RTO during failover or switchover.
                    type: string
                  isReplicateAutomaticBackups:
                    description: If true, 7 days worth of backups are replicated across
                      regions for Cross-Region ADB or Backup-Based DR between Primary
                      and Standby. If false, the backups taken on the Primary are
                      not replicated to the Standby database.
                    type: boolean
                  isSnapshotStandby:
                    description: Indicates if user wants to convert to a snapshot
                      standby. For example, true would set a standby database to snapshot
                      standby database. False would set a snapshot standby database
                      back to regular standby database.
                    type: boolean
                  timeSnapshotStandbyEnabledTill:
                    description: Time and date stored as an RFC 3339 formatted timestamp
                      string. For example, 2022-01-01T12:00:00.000Z would set a limit
                      for the snapshot standby to be converted back to a cross-region
                      standby database.
                    type: string
                type: object
              resourcePoolLeaderId:
                description: The unique identifier for leader autonomous database
                  OCID OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm).
                type: string
              resourcePoolSummary:
                description: AutonomousDatabaseResourcePoolSummary defines nested
                  fields for AutonomousDatabase.ResourcePoolSummary.
                properties:
                  isDisabled:
                    description: Indicates if the resource pool should be deleted
                      for the Autonomous Database.
                    type: boolean
                  poolSize:
                    description: Resource pool size.
                    type: integer
                type: object
              role:
                description: The Data Guard role of the Autonomous Container Database
                  or Autonomous Database, if Autonomous Data Guard is enabled.
                type: string
              scheduledOperations:
                description: |-
                  The list of scheduled operations. Consists of values such as dayOfWeek, scheduledStartTime, scheduledStopTime.
                  This cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, whitelistedIps, isMTLSConnectionRequired, openMode, permissionLevel, dbWorkload, privateEndpointLabel, nsgIds, dbVersion, isRefreshable, dbName, dbToolsDetails, isLocalDataGuardEnabled, or isFreeTier.
                items:
                  description: AutonomousDatabaseScheduledOperationObservedState defines
                    nested fields for AutonomousDatabase.ScheduledOperation.
                  properties:
                    dayOfWeek:
                      description: AutonomousDatabaseScheduledOperationDayOfWeek defines
                        nested fields for AutonomousDatabase.ScheduledOperation.DayOfWeek.
                      properties:
                        name:
                          description: Name of the day of the week.
                          type: string
                      required:
                      - name
                      type: object
                    scheduledStartTime:
                      description: auto start time. value must be of ISO-8601 format
                        "HH:mm"
                      type: string
                    scheduledStopTime:
                      description: auto stop time. value must be of ISO-8601 format
                        "HH:mm"
                      type: string
                  required:
                  - dayOfWeek
                  type: object
                type: array
              serviceConsoleUrl:
                description: The URL of the Service Console for the Autonomous Database.
                type: string
              sourceId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the source Autonomous Database that was cloned to create the
                  current Autonomous Database.
                type: string
              standbyDb:
                description: '**Deprecated** Autonomous Data Guard standby database
                  details.'
                properties:
                  lagTimeInSeconds:
                    description: The amount of time, in seconds, that the data of
                      the standby database lags the data of the primary database.
                      Can be used to determine the potential data loss in the event
                      of a failover.
                    type: integer
                  lifecycleDetails:
                    description: Additional information about the current lifecycle
                      state.
                    type: string
                  lifecycleState:
                    description: The current state of the Autonomous Database.
                    type: string
                  timeDataGuardRoleChanged:
                    description: The date and time the Autonomous Data Guard role
                      was switched for the standby Autonomous Database.
                    type: string
                  timeDisasterRecoveryRoleChanged:
                    description: The date and time the Disaster Recovery role was
                      switched for the standby Autonomous Database.
                    type: string
                type: object
              standbyWhitelistedIps:
                description: |-
                  The client IP access control list (ACL). This feature is available for Autonomous Database Serverless  (https://docs.oracle.com/en/cloud/paas/autonomous-database/index.html) and on Exadata Cloud@Customer.
                  Only clients connecting from an IP address included in the ACL may access the Autonomous Database instance.
                  If `arePrimaryWhitelistedIpsUsed` is 'TRUE' then Autonomous Database uses this primary's IP access control list (ACL) for the disaster recovery peer called `standbywhitelistedips`.
                  For Autonomous Database Serverless, this is an array of CIDR (classless inter-domain routing) notations for a subnet or VCN OCID (virtual cloud network Oracle Cloud ID).
                  Multiple IPs and VCN OCIDs should be separate strings separated by commas, but if it’s other configurations that need multiple pieces of information then its each piece is connected with semicolon (;) as a delimiter.
                  Example: `["1.1.1.1","1.1.1.0/24","ocid1.vcn.oc1.sea.<unique_id>","ocid1.vcn.oc1.sea.<unique_id1>;1.1.1.1","ocid1.vcn.oc1.sea.<unique_id2>;1.1.0.0/16"]`
                  For Exadata Cloud@Customer, this is an array of IP addresses or CIDR notations.
                  Example: `["1.1.1.1","1.1.1.0/24","1.1.2.25"]`
                  For an update operation, if you want to delete all the IPs in the ACL, use an array with a single empty string entry.
                  This cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, adminPassword, isMTLSConnectionRequired, openMode, permissionLevel, dbWorkload, dbVersion, isRefreshable, dbName, scheduledOperations, dbToolsDetails, isLocalDataGuardEnabled, or isFreeTier.
                items:
                  type: string
                type: array
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              subnetId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the subnet the resource is associated with.
                  **Subnet Restrictions:**
                  - For bare metal DB systems and for single node virtual machine DB systems, do not use a subnet that overlaps with 192.168.16.16/28.
                  - For Exadata and virtual machine 2-node RAC systems, do not use a subnet that overlaps with 192.168.128.0/20.
                  - For Autonomous Database, setting this will disable public secure access to the database.
                  These subnets are used by the Oracle Clusterware private interconnect on the database instance.
                  Specifying an overlapping subnet will cause the private interconnect to malfunction.
                  This restriction applies to both the client subnet and the backup subnet.
                type: string
              supportedRegionsToCloneTo:
                description: The list of regions that support the creation of an Autonomous
                  Database clone or an Autonomous Data Guard standby database.
                items:
                  type: string
                type: array
              systemTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  System tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                type: object
              timeCreated:
                description: The date and time the Autonomous Database was created.
                type: string
              timeDataGuardRoleChanged:
                description: The date and time the Autonomous Data Guard role was
                  switched for the Autonomous Database. For databases that have standbys
                  in both the primary Data Guard region and a remote Data Guard standby
                  region, this is the latest timestamp of either the database using
                  the "primary" role in the primary Data Guard region, or database
                  located in the remote Data Guard standby region.
                type: string
              timeDeletionOfFreeAutonomousDatabase:
                description: The date and time the Always Free database will be automatically
                  deleted because of inactivity. If the database is in the STOPPED
                  state and without activity until this time, it will be deleted.
                type: string
              timeDisasterRecoveryRoleChanged:
                description: The date and time the Disaster Recovery role was switched
                  for the standby Autonomous Database.
                type: string
              timeLocalDataGuardEnabled:
                description: The date and time that Autonomous Data Guard was enabled
                  for an Autonomous Database where the standby was provisioned in
                  the same region as the primary database.
                type: string
              timeMaintenanceBegin:
                description: The date and time when maintenance will begin.
                type: string
              timeMaintenanceEnd:
                description: The date and time when maintenance will end.
                type: string
              timeOfJoiningResourcePool:
                description: The time the member joined the resource pool.
                type: string
              timeOfLastFailover:
                description: The timestamp of the last failover operation.
                type: string
              timeOfLastRefresh:
                description: The date and time when last refresh happened.
                type: string
              timeOfLastRefreshPoint:
                description: The refresh point timestamp (UTC). The refresh point
                  is the time to which the database was most recently refreshed. Data
                  created after the refresh point is not included in the refresh.
                type: string
              timeOfLastSwitchover:
                description: The timestamp of the last switchover operation for the
                  Autonomous Database.
                type: string
              timeOfNextRefresh:
                description: The date and time of next refresh.
                type: string
              timeReclamationOfFreeAutonomousDatabase:
                description: The date and time the Always Free database will be stopped
                  because of inactivity. If this time is reached without any database
                  activity, the database will automatically be put into the STOPPED
                  state.
                type: string
              timeUntilReconnectCloneEnabled:
                description: The time and date as an RFC3339 formatted string, e.g.,
                  2022-01-01T12:00:00.000Z, to set the limit for a refreshable clone
                  to be reconnected to its source database.
                type: string
              totalBackupStorageSizeInGBs:
                description: The backup storage to the database.
                type: number
              usedDataStorageSizeInGBs:
                description: The storage space consumed by Autonomous Database in
                  GBs.
                type: integer
              usedDataStorageSizeInTBs:
                description: The amount of storage that has been used, in terabytes.
                type: integer
              vaultId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the Oracle Cloud Infrastructure vault (https://docs.cloud.oracle.com/Content/KeyManagement/Concepts/keyoverview.htm#concepts).
                  This parameter and `secretId` are required for Customer Managed
                  Keys.
                type: string
              whitelistedIps:
                description: |-
                  The client IP access control list (ACL). This feature is available for Autonomous Database Serverless  (https://docs.oracle.com/en/cloud/paas/autonomous-database/index.html) and on Exadata Cloud@Customer.
                  Only clients connecting from an IP address included in the ACL may access the Autonomous Database instance.
                  If `arePrimaryWhitelistedIpsUsed` is 'TRUE' then Autonomous Database uses this primary's IP access control list (ACL) for the disaster recovery peer called `standbywhitelistedips`.
                  For Autonomous Database Serverless, this is an array of CIDR (classless inter-domain routing) notations for a subnet or VCN OCID (virtual cloud network Oracle Cloud ID).
                  Multiple IPs and VCN OCIDs should be separate strings separated by commas, but if it’s other configurations that need multiple pieces of information then its each piece is connected with semicolon (;) as a delimiter.
                  Example: `["1.1.1.1","1.1.1.0/24","ocid1.vcn.oc1.sea.<unique_id>","ocid1.vcn.oc1.sea.<unique_id1>;1.1.1.1","ocid1.vcn.oc1.sea.<unique_id2>;1.1.0.0/16"]`
                  For Exadata Cloud@Customer, this is an array of IP addresses or CIDR notations.
                  Example: `["1.1.1.1","1.1.1.0/24","1.1.2.25"]`
                  For an update operation, if you want to delete all the IPs in the ACL, use an array with a single empty string entry.
                  This cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, adminPassword, isMTLSConnectionRequired, openMode, permissionLevel, dbWorkload, dbVersion, isRefreshable, dbName, scheduledOperations, dbToolsDetails, isLocalDataGuardEnabled, or isFreeTier.
                items:
                  type: string
                type: array
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
