        reason: Port changes are intentionally out of scope for the update flow.
      SecureConnections:
        status: future_consideration
        reason: TLS configuration will be modelled with a broader security story.
      ShapeName:
        status: future_consideration
        reason: Shape changes require recreate operations and are not tackled in-place.
      SubnetId:
        status: future_consideration
        reason: Subnet migrations demand reprovisioning and are left manual.
  core.UpgradeStatus:
    fields:
      Status:
        status: intentionally_omitted
        reason: The SDK field collides with the CRD's existing `status.status` envelope and cannot be exposed as a sibling status field.
  streaming.CreateStreamDetails:
