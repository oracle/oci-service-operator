      FaultDomain:
        status: future_consideration
        reason: Placement changes are out of scope for the update reconciler.
      HostnameLabel:
        status: future_consideration
        reason: Endpoint renaming is intentionally left manual to avoid DNS churn.
      IpAddress:
        status: future_consideration
        reason: Endpoint IP management is intentionally left manual to avoid DNS churn.
      IsHighlyAvailable:
        status: future_consideration
        reason: Availability topology changes require reprovisioning today.
      Maintenance:
        status: future_consideration
        reason: Maintenance scheduling is not yet surfaced through OSOK CRDs.
      MysqlVersion:
        status: future_consideration
