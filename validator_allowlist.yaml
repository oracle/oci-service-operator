  mysql.CreateDbSystemDetails:
    fields:
      AdminPassword:
        status: intentionally_omitted
        reason: OSOK sources the MySQL admin password from a Kubernetes secret reference.
      AdminUsername:
        status: intentionally_omitted
        reason: OSOK sources the MySQL admin username from a Kubernetes secret reference.
      BackupPolicy:
        status: future_consideration
        reason: Database backup policy customisation will be added alongside lifecycle automation.
      CrashRecovery:
        status: future_consideration
        reason: Crash recovery tuning is left at service defaults for now.
      DatabaseManagement:
        status: future_consideration
        reason: Database Management integration is not targeted in this release.
      DeletionPolicy:
        status: future_consideration
        reason: Deletion policy configuration is deferred until we support managed teardown flows.
      Maintenance:
        status: future_consideration
        reason: Maintenance scheduling is not yet surfaced through OSOK CRDs.
      SecureConnections:
        status: future_consideration
        reason: TLS configuration will be modelled with a broader security story.
      Source:
        status: intentionally_omitted
        reason: OSOK provisions fresh MySQL DB Systems and does not orchestrate backup or PITR restores yet.
  mysql.UpdateDbSystemDetails:
    fields:
      AdminPassword:
        status: intentionally_omitted
        reason: Password rotation is handled through credential workflows outside the update API.
      AdminUsername:
        status: intentionally_omitted
        reason: Admin identity updates are intentionally blocked from automation.
      AvailabilityDomain:
        status: future_consideration
        reason: Placement changes are out of scope for the update reconciler.
      BackupPolicy:
