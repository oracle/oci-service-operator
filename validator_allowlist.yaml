structs:
  database.CreateAutonomousDatabaseDetails:
    fields:
      ArePrimaryWhitelistedIpsUsed:
        status: future_consideration
        reason: Standby access control is not managed by the initial OSOK controllers.
      AutonomousContainerDatabaseId:
        status: future_consideration
        reason: Dedicated autonomous container selection will be modeled in a later iteration.
      AutonomousMaintenanceScheduleType:
        status: future_consideration
        reason: Maintenance scheduling options are out of scope for the first validator pass.
      BackupRetentionPeriodInDays:
        status: future_consideration
        reason: Retention policies are left at service defaults until lifecycle stories land.
      CharacterSet:
        status: future_consideration
        reason: Character set customisation is deferred to keep the CRD surface minimal.
      CustomerContacts:
        status: future_consideration
        reason: Customer contact metadata is not surfaced through OSOK today.
      DataStorageSizeInGBs:
        status: future_consideration
        reason: Only the terabyte-based sizing workflow is supported by the current controllers.
      DatabaseEdition:
        status: future_consideration
        reason: Edition selection is not yet exposed through the OSOK CRDs.
      DbToolsDetails:
        status: future_consideration
        reason: DB Tools integration will be considered in a follow-up release.
      InMemoryPercentage:
        status: future_consideration
        reason: In-memory tuning is intentionally omitted for the initial managed experience.
      IsAccessControlEnabled:
        status: future_consideration
        reason: VCN level controls are preferred; database-level ACL toggles will come later.
      IsAutoScalingForStorageEnabled:
        status: future_consideration
        reason: Storage autoscaling will be evaluated after core create/update flows stabilize.
      IsDevTier:
        status: future_consideration
        reason: Developer tier provisioning is not planned for the first validator milestone.
      IsLocalDataGuardEnabled:
        status: future_consideration
        reason: Local Data Guard configuration is handled manually outside OSOK for now.
      IsMtlsConnectionRequired:
        status: future_consideration
        reason: mTLS enforcement remains at the OCI default pending operator UX work.
      IsPreviewVersionWithServiceTermsAccepted:
        status: future_consideration
        reason: Preview database provisioning is intentionally gated outside OSOK.
      KmsKeyId:
        status: future_consideration
        reason: Customer managed keys will be modelled once the secret workflow solidifies.
      NcharacterSet:
        status: future_consideration
        reason: NCHAR character set overrides are not exposed yet.
      NsgIds:
        status: future_consideration
        reason: Network security group selection will be added with broader networking stories.
      OcpuCount:
        status: future_consideration
        reason: OCPU-based sizing is intentionally deferred in favour of computeCount.
      PrivateEndpointIp:
        status: future_consideration
        reason: Private endpoint IP management is not part of the initial OSOK contract.
      PrivateEndpointLabel:
        status: future_consideration
        reason: Private endpoint labelling is pending design for private-cluster rollouts.
      ResourcePoolLeaderId:
        status: future_consideration
        reason: Resource pool coordination is not yet supported.
      ResourcePoolSummary:
        status: future_consideration
        reason: Resource pool coordination is not yet supported.
      ScheduledOperations:
        status: future_consideration
        reason: Scheduled operations are intentionally omitted from the first release.
      SecretId:
        status: intentionally_omitted
        reason: OSOK sources admin credentials from Kubernetes secrets instead of OCI vault references.
      SecretVersionNumber:
        status: intentionally_omitted
        reason: OSOK sources admin credentials from Kubernetes secrets instead of OCI vault references.
      StandbyWhitelistedIps:
        status: future_consideration
        reason: Standby access control is not managed by the initial OSOK controllers.
      SubnetId:
        status: future_consideration
        reason: Private endpoint networking will be handled in a later networking enhancement.
      VaultId:
        status: future_consideration
        reason: Customer managed keys will be modelled once the secret workflow solidifies.
      WhitelistedIps:
        status: future_consideration
        reason: Client ACL management is currently left to manual post-provision steps.
  database.GenerateAutonomousDatabaseWalletDetails:
