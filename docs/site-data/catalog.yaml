# Customer-facing docs metadata that should not be inferred from rollout config
# or release history alone.
schemaVersion: v1alpha1
packages:
  - package: apigateway
    displayName: API Gateway
    summary: Manage OCI API Gateway gateways and deployments from Kubernetes.
    supportStatus: preview
    customerVisible: true
    guidePath: docs/installation.md
    packageNotes:
      - Published from the checked-in package overlay even though apigateway is outside the current default-active generator surface.
    kindOverrides:
      - group: apigateway
        kind: ApiGateway
        summary: Manage OCI API Gateway gateway resources.
      - group: apigateway
        kind: ApiGatewayDeployment
        summary: Manage OCI API Gateway deployment routes and backend bindings.

  - package: containerinstances
    displayName: Container Instances
    summary: Manage OCI Container Instances from Kubernetes.
    supportStatus: preview
    customerVisible: true
    guidePath: docs/installation.md
    kindOverrides:
      - group: containerinstances
        kind: ContainerInstance
        summary: Manage OCI Container Instance workloads.

  - package: core
    displayName: Core Compute
    summary: Manage OCI Compute and core networking resources from Kubernetes.
    supportStatus: preview
    customerVisible: true
    guidePath: docs/installation.md
    packageNotes:
      - Core Compute currently focuses on Instance while the core-network split package carries the released networking surface.

  - package: core-network
    displayName: Core Networking
    summary: Manage OCI core networking resources from Kubernetes.
    supportStatus: preview
    customerVisible: true
    guidePath: docs/installation.md
    packageNotes:
      - Split package carved from selected core networking kinds.

  - package: database
    displayName: Autonomous Database
    summary: Manage OCI Autonomous Databases from Kubernetes.
    supportStatus: preview
    customerVisible: true
    guidePath: docs/adb.md
    packageNotes:
      - Current package scope is intentionally limited to AutonomousDatabase.
    kindOverrides:
      - group: database
        kind: AutonomousDatabase
        summary: Manage OCI Autonomous Database instances.

  - package: dataflow
    displayName: Data Flow
    summary: Manage OCI Data Flow applications from Kubernetes.
    supportStatus: preview
    customerVisible: true
    guidePath: docs/installation.md
    kindOverrides:
