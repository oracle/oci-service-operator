        strategy: none

  - service: loadbalancer
    sdkPackage: github.com/oracle/oci-go-sdk/v65/loadbalancer
    group: loadbalancer
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: controller-backed
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none

  - service: logging
    sdkPackage: github.com/oracle/oci-go-sdk/v65/logging
    group: logging
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: controller-backed
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none

  - service: monitoring
    sdkPackage: github.com/oracle/oci-go-sdk/v65/monitoring
    group: monitoring
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: controller-backed
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
    observedState:
      sdkAliases:
        AlarmHistory:
          - AlarmHistoryCollection

  - service: mysql
    sdkPackage: github.com/oracle/oci-go-sdk/v65/mysql
    group: mysql
    version: v1beta1
    phase: data-and-storage
    sampleOrder: 30
    packageProfile: controller-backed
    observedState:
      excludedFieldPaths:
        DbSystem:
          - Source.SourceUrl
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: manual
      resources:
        - kind: MySqlDbSystem
          sdkName: DbSystem
          controller:
            maxConcurrentReconciles: 3
            extraRBACMarkers:
              - groups="",resources=secrets,verbs=get;list;watch;create;update;patch;delete
              - groups="",resources=events,verbs=get;list;watch;create;update;patch;delete
          serviceManager:
            packagePath: mysql/dbsystem

  - service: networkloadbalancer
    sdkPackage: github.com/oracle/oci-go-sdk/v65/networkloadbalancer
    group: networkloadbalancer
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: controller-backed
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
