                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                vmwareSoftwareVersion: "7.0.0"
                hcxMode: DISABLED
                sshAuthorizedKeys: |
                  ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQCexampleReplaceMe user@example
                initialConfiguration:
