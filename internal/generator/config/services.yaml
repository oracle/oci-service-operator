      includeKinds:
        - Queue
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: Queue
          formalSpec: queue
          async:
            strategy: workrequest
            runtime: handwritten
            formalClassification: workrequest
            workRequest:
              source: service-sdk
              phases:
                - create
                - update
                - delete
              legacyFieldBridge:
                create: CreateWorkRequestId
                update: UpdateWorkRequestId
                delete: DeleteWorkRequestId
          controller:
            extraRBACMarkers:
              - groups="",resources=secrets,verbs=get;list;watch;create;update;delete
          serviceManager:
            packagePath: queue/queue
          statusFields:
            - name: CreateWorkRequestId
              type: string
              tag: 'json:"createWorkRequestId,omitempty"'
              comments:
                - The work request OCID tracking the in-flight create operation.
            - name: UpdateWorkRequestId
              type: string
              tag: 'json:"updateWorkRequestId,omitempty"'
              comments:
                - The work request OCID tracking the in-flight update operation.
            - name: DeleteWorkRequestId
              type: string
              tag: 'json:"deleteWorkRequestId,omitempty"'
              comments:
                - The work request OCID tracking the in-flight delete operation.
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of binding to an existing Queue with the same display name in the same
              # compartment.
              #
              apiVersion: queue.oracle.com/v1beta1
              kind: Queue
              metadata:
                name: queue-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
