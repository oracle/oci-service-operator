  - service: keymanagement
    sdkPackage: github.com/oracle/oci-go-sdk/v65/keymanagement
    group: keymanagement
    version: v1beta1
    phase: security-and-identity
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Vault
    observedState:
      excludedFieldPaths:
        PreCoUserCredential:
          - Password
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: Vault
          async:
            strategy: lifecycle
            runtime: generatedruntime
            formalClassification: lifecycle
          specFields:
            - name: DeletionScheduleDays
              type: int32
              tag: 'json:"deletionScheduleDays,omitempty,omitzero"'
              comments:
                - The number of days to retain the Vault after OCI deletion has been scheduled.
                - Set a value from 7 to 30 to control the retention window used when Vault deletion is scheduled.
              markers:
                - +kubebuilder:validation:Optional
                - +kubebuilder:validation:Minimum=7
                - +kubebuilder:validation:Maximum=30
          statusFields:
            - name: RequestedDeletionScheduleDays
              type: int32
              tag: 'json:"requestedDeletionScheduleDays,omitempty,omitzero"'
              comments:
                - The retention period in days last applied when Vault deletion was scheduled.
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Set `deletionScheduleDays` to a value from 7 to 30 to control OCI deletion retention.
              #
              apiVersion: keymanagement.oracle.com/v1beta1
              kind: Vault
              metadata:
                name: vault-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                displayName: vault-sample
                vaultType: DEFAULT
          serviceManager:
            packagePath: keymanagement/vault
        - kind: Key
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: KeyVersion
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: ReplicationStatus
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: WrappingKey
          controller:
            strategy: none
          serviceManager:
            strategy: none

