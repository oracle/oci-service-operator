# Source-of-truth service map for the OSOK generator contract.
# Service selection metadata declares the default active generation surface.
# - selection.enabled=false keeps a service inactive by default.
# - selection.mode=all enables all discovered kinds for that service.
# - selection.mode=explicit limits the primary default activity to selection.includeKinds.
# - packageSplits.includeKinds stay active for split outputs even when the primary
#   service selection is explicit.
# Services without a `generation` block default to:
# - controller/serviceManager/registration: none
# - webhooks: manual
schemaVersion: v1alpha1
domain: oracle.com
defaultVersion: v1beta1
generatorEntrypoint: ./cmd/generator

packageProfiles:
  controller-backed:
    description: Groups that participate in the shared manager install, whether runtime pieces are manual or generated.
  crd-only:
    description: Generated API groups that ship CRDs and samples before controller, service-manager, and registration rollout is enabled.

services:
  - service: analytics
    sdkPackage: github.com/oracle/oci-go-sdk/v65/analytics
    group: analytics
    version: v1beta1
    phase: data-and-storage
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - AnalyticsInstance
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: AnalyticsInstance
          formalSpec: analyticsinstance
          async:
            strategy: lifecycle
            runtime: generatedruntime
            formalClassification: lifecycle
          serviceManager:
            packagePath: analytics/analyticsinstance
        - kind: PrivateAccessChannel
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: VanityUrl
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: WorkRequest
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: WorkRequestError
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: WorkRequestLog
          controller:
            strategy: none
          serviceManager:
            strategy: none

  - service: artifacts
    sdkPackage: github.com/oracle/oci-go-sdk/v65/artifacts
    group: artifacts
    version: v1beta1
    phase: data-and-storage
    packageProfile: controller-backed
    selection:
      enabled: false
      mode: all
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none

  - service: certificates
    sdkPackage: github.com/oracle/oci-go-sdk/v65/certificates
    group: certificates
    version: v1beta1
    phase: security-and-identity
    packageProfile: controller-backed
    selection:
      enabled: false
      mode: all
    observedState:
      excludedFieldPaths:
        CertificateBundle:
          - JsonData
          - PrivateKeyPem
          - PrivateKeyPemPassphrase
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none

  - service: certificatesmanagement
    sdkPackage: github.com/oracle/oci-go-sdk/v65/certificatesmanagement
    group: certificatesmanagement
    version: v1beta1
    phase: security-and-identity
    packageProfile: controller-backed
    selection:
      enabled: false
      mode: all
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none

  - service: containerengine
    sdkPackage: github.com/oracle/oci-go-sdk/v65/containerengine
    group: containerengine
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Cluster
        - NodePool
    async:
      strategy: lifecycle
      runtime: generatedruntime
      formalClassification: lifecycle
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: Cluster
          formalSpec: cluster
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.name if you want to force a fresh create instead of
              # binding to an existing Cluster with the same name in the same compartment.
              # Replace spec.kubernetesVersion with a currently supported OKE version for your
              # region before running this sample.
              #
              apiVersion: containerengine.oracle.com/v1beta1
              kind: Cluster
              metadata:
                name: cluster-sample
              spec:
                name: "cluster-sample"
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                vcnId: ocid1.vcn.oc1..exampleuniqueID
                kubernetesVersion: "v1.30.1"
                endpointConfig:
                  subnetId: ocid1.subnet.oc1..exampleuniqueID
                  nsgIds:
                    - ocid1.networksecuritygroup.oc1..exampleuniqueID
                  isPublicIpEnabled: false
                options:
                  serviceLbSubnetIds:
                    - ocid1.subnet.oc1..exampleuniqueID
          serviceManager:
            packagePath: containerengine/cluster
        - kind: NodePool
          formalSpec: nodepool
          serviceManager:
            packagePath: containerengine/nodepool
    observedState:
      sdkAliases:
        WorkRequestLog:
          - WorkRequestLogEntry

  - service: containerinstances
    sdkPackage: github.com/oracle/oci-go-sdk/v65/containerinstances
    group: containerinstances
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - ContainerInstance
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: manual
      registration:
        strategy: manual
      webhooks:
        strategy: none
      resources:
        - kind: ContainerInstance
          async:
            strategy: lifecycle
            runtime: handwritten
            formalClassification: lifecycle
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of binding to an existing ContainerInstance with the same display name in
              # the same compartment and availability domain.
              #
              apiVersion: containerinstances.oracle.com/v1beta1
              kind: ContainerInstance
              metadata:
                name: containerinstance-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                availabilityDomain: "AD-1"
                shape: "CI.Standard.E4.Flex"
                shapeConfig:
                  ocpus: 1
                  memoryInGBs: 4
                containers:
                  - imageUrl: "busybox:latest"
                    displayName: "hello"
                    command:
                      - "/bin/sh"
                    arguments:
                      - "-c"
                      - "echo hello && sleep 3600"
                vnics:
                  - subnetId: ocid1.subnet.oc1..exampleuniqueID
                    displayName: "primary-vnic"
                displayName: "containerinstance-sample"
                containerRestartPolicy: "NEVER"
          serviceManager:
            packagePath: containerinstance
    observedState:
      excludedFieldPaths:
        ContainerInstance:
          - ImagePullSecrets.Password

  - service: core
    sdkPackage: github.com/oracle/oci-go-sdk/v65/core
    group: core
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Instance
    async:
      strategy: lifecycle
      runtime: generatedruntime
      formalClassification: lifecycle
    packageSplits:
      - name: core-network
        defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-core-network:latest
        includeKinds:
          - Drg
          - InternetGateway
          - NatGateway
          - NetworkSecurityGroup
          - RouteTable
          - SecurityList
          - ServiceGateway
          - Subnet
          - Vcn
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: Drg
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want a distinct DRG to be
              # created for this sample.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: Drg
              metadata:
                name: drg-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                displayName: "drg-sample"
        - kind: Instance
          formalSpec: instance
          async:
            strategy: lifecycle
            runtime: generatedruntime
            formalClassification: lifecycle
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing Instance with the same display name in the same
              # compartment and availability domain.
              # Adjust spec.shape and spec.shapeConfig if your tenancy or region does not have
              # capacity for this starter shape.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: Instance
              metadata:
                name: instance-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                availabilityDomain: "AD-1"
                subnetId: ocid1.subnet.oc1..exampleuniqueID
                displayName: "instance-sample"
                shape: "VM.Standard.E4.Flex"
                shapeConfig:
                  ocpus: 1
                  memoryInGBs: 16
                sourceDetails:
                  sourceType: image
                  imageId: ocid1.image.oc1..exampleuniqueID
          serviceManager:
            packagePath: core/instance
        - kind: InternetGateway
          formalSpec: internetgateway
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing InternetGateway with the same display name in the
              # same VCN.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: InternetGateway
              metadata:
                name: internetgateway-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                isEnabled: true
                vcnId: ocid1.vcn.oc1..exampleuniqueID
                displayName: "internetgateway-sample"
        - kind: NatGateway
          formalSpec: natgateway
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing NatGateway with the same display name in the same
              # VCN.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: NatGateway
              metadata:
                name: natgateway-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                vcnId: ocid1.vcn.oc1..exampleuniqueID
                displayName: "natgateway-sample"
          statusFields:
            - name: PublicIpIdCreateIntent
              type: string
              tag: 'json:"publicIpIdCreateIntent,omitempty"'
              comments:
                - Tracks whether `spec.publicIpId` was explicitly set or omitted when the current tracked NAT gateway first became managed by this controller.
              markers:
                - +kubebuilder:validation:Enum=Explicit;Omitted
        - kind: NetworkSecurityGroup
          formalSpec: networksecuritygroup
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing NetworkSecurityGroup with the same display name in
              # the same VCN.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: NetworkSecurityGroup
              metadata:
                name: networksecuritygroup-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                vcnId: ocid1.vcn.oc1..exampleuniqueID
                displayName: "networksecuritygroup-sample"
        - kind: RouteTable
          formalSpec: routetable
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing RouteTable with the same display name in the same
              # VCN.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: RouteTable
              metadata:
                name: routetable-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                vcnId: ocid1.vcn.oc1..exampleuniqueID
                displayName: "routetable-sample"
                routeRules:
                  - destination: 0.0.0.0/0
                    destinationType: CIDR_BLOCK
                    networkEntityId: ocid1.internetgateway.oc1..exampleuniqueID
                    description: "Route internet-bound traffic through an internet gateway"
        - kind: SecurityList
          formalSpec: securitylist
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing SecurityList with the same display name in the same
              # VCN.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: SecurityList
              metadata:
                name: securitylist-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                vcnId: ocid1.vcn.oc1..exampleuniqueID
                displayName: "securitylist-sample"
                egressSecurityRules:
                  - destination: 0.0.0.0/0
                    protocol: "all"
                    description: "Allow outbound traffic"
                ingressSecurityRules:
                  - protocol: "6"
                    source: 10.0.0.0/16
                    description: "Allow SSH from the VCN CIDR"
                    tcpOptions:
                      destinationPortRange:
                        min: 22
                        max: 22
        - kind: ServiceGateway
          formalSpec: servicegateway
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing ServiceGateway with the same display name in the
              # same VCN.
              # Replace spec.services[*].serviceId with a regional service OCID such as Object
              # Storage.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: ServiceGateway
              metadata:
                name: servicegateway-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                vcnId: ocid1.vcn.oc1..exampleuniqueID
                displayName: "servicegateway-sample"
                services:
                  - serviceId: ocid1.service.oc1..exampleuniqueID
        - kind: Subnet
          formalSpec: subnet
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing Subnet with the same display name in the same VCN.
              # This starter sample creates a regional private subnet.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: Subnet
              metadata:
                name: subnet-sample
              spec:
                cidrBlock: 10.0.1.0/24
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                vcnId: ocid1.vcn.oc1..exampleuniqueID
                displayName: "private-subnet-sample"
                dnsLabel: "privsubnet"
                prohibitPublicIpOnVnic: true
                routeTableId: ocid1.routetable.oc1..exampleuniqueID
                securityListIds:
                  - ocid1.securitylist.oc1..exampleuniqueID
        - kind: Vcn
          formalSpec: vcn
          sample:
            body: |-
              #
              # Replace the OCI identifiers below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing Vcn with the same display name in the same
              # compartment.
              # Replace spec.dnsLabel with a unique label before applying this sample.
              #
              apiVersion: core.oracle.com/v1beta1
              kind: Vcn
              metadata:
                name: vcn-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                displayName: "vcn-sample"
                dnsLabel: "vcnsample"
                cidrBlocks:
                  - 10.0.0.0/16
    observedState:
      sdkAliases:
        AllDrgAttachment:
          - DrgAttachmentInfo
        AllowedPeerRegionsForRemotePeering:
          - PeerRegionForRemotePeering
        AppCatalogListingAgreement:
          - AppCatalogListingResourceVersionAgreements
        ClusterNetworkInstance:
          - InstanceSummary
        ComputeCapacityReservationInstance:
          - CapacityReservationInstanceSummary
        ComputeGlobalImageCapabilitySchema:
          - ComputeGlobalImageCapabilitySchemaVersionSummary
        CrossConnectLetterOfAuthority:
          - LetterOfAuthority
        CrossConnectMapping:
          - CrossConnectMappingDetails
        CrossconnectPortSpeedShape:
          - CrossConnectPortSpeedShape
        DhcpOption:
          - DhcpOptions
        FastConnectProviderVirtualCircuitBandwidthShape:
          - VirtualCircuitBandwidthShape
        IPSecConnectionTunnelError:
          - IpSecConnectionTunnelErrorDetails
        IPSecConnectionTunnelRoute:
          - TunnelRouteSummary
        IPSecConnectionTunnelSecurityAssociation:
          - TunnelSecurityAssociationSummary
        InstanceDevice:
          - Device
        NetworkSecurityGroupSecurityRule:
          - SecurityRule
        VirtualCircuitAssociatedTunnel:
          - VirtualCircuitAssociatedTunnelDetails
        VolumeBackupPolicyAssetAssignment:
          - VolumeBackupPolicyAssignment
        WindowsInstanceInitialCredential:
          - InstanceCredentials
      excludedFieldPaths:
        CrossConnectMapping:
          - BgpMd5AuthKey
        IPSecConnectionDeviceConfig:
          - Tunnels.SharedSecret
        IPSecConnectionTunnelSharedSecret:
          - SharedSecret
        VirtualCircuit:
          - CrossConnectMappings.BgpMd5AuthKey
        VolumeAttachment:
          - JsonData
          - ChapSecret
        WindowsInstanceInitialCredential:
          - Password

  - service: dataflow
    sdkPackage: github.com/oracle/oci-go-sdk/v65/dataflow
    group: dataflow
    version: v1beta1
    phase: data-and-storage
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Application
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: Application
          formalSpec: application
          async:
            strategy: lifecycle
            runtime: handwritten
            formalClassification: lifecycle
          serviceManager:
            packagePath: dataflow/application
          sample:
            body: |-
              #
              # Replace the OCI identifiers and Object Storage URI below before running e2e.
              # Update metadata.name and spec.displayName if you want to force a fresh create
              # instead of reusing an existing Application with the same display name in the
              # same compartment.
              # Replace the starter shapes and Spark version with values currently supported in
              # your region if needed.
              #
              apiVersion: dataflow.oracle.com/v1beta1
              kind: Application
              metadata:
                name: application-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                displayName: "application-sample"
                driverShape: "VM.Standard.E4.Flex"
                executorShape: "VM.Standard.E4.Flex"
                language: "PYTHON"
                numExecutors: 2
                sparkVersion: "3.5.0"
                fileUri: "oci://bucket@namespace/app/main.py"

  - service: database
    sdkPackage: github.com/oracle/oci-go-sdk/v65/database
    group: database
    version: v1beta1
    phase: data-and-storage
    sampleOrder: 10
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - AutonomousDatabase
    package:
      extraResources:
        - ../../../config/rbac/autonomousdatabases_editor_role.yaml
        - ../../../config/rbac/autonomousdatabases_viewer_role.yaml
    observedState:
      excludedFieldPaths:
        ExternalBackupJob:
          - SwiftPassword
        ExternalDatabaseConnector:
          - JsonData
          - ConnectionCredentials.JsonData
          - ConnectionCredentials.Password
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: AutonomousDatabase
          formalSpec: databaseautonomousdatabase
          async:
            strategy: lifecycle
            runtime: generatedruntime
            formalClassification: lifecycle
          serviceManager:
            packagePath: database/autonomousdatabase
          controller:
            extraRBACMarkers:
              - groups="",resources=secrets,verbs=get;list;watch
          specFields:
            - name: AdminPassword
              type: shared.PasswordSource
              tag: 'json:"adminPassword,omitempty,omitzero"'
              comments:
                - The administrative password sourced from a Kubernetes Secret in the same namespace.
                - The referenced Secret must contain a `password` key. Use `secretId` and `secretVersionNumber` instead to reference an OCI Vault secret.
              markers:
                - +kubebuilder:validation:Optional

  - service: dns
    sdkPackage: github.com/oracle/oci-go-sdk/v65/dns
    group: dns
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: controller-backed
    selection:
      enabled: false
      mode: all
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
    observedState:
      excludedFieldPaths:
        TsigKey:
          - Secret
      sdkAliases:
        DomainRecord:
          - Record
        ZoneFromZoneFile:
          - Zone
        ZoneRecord:
          - Record

  - service: email
    sdkPackage: github.com/oracle/oci-go-sdk/v65/email
    group: email
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Dkim
        - EmailDomain
        - Sender
        - Suppression
        - WorkRequest
        - WorkRequestError
        - WorkRequestLog
    async:
      strategy: lifecycle
      runtime: generatedruntime
      formalClassification: lifecycle
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: EmailDomain
          formalSpec: emaildomain
          sample:
            body: |-
              #
              # Replace the domain and compartment OCID below before running e2e.
              # Update metadata.name and spec.name together if you want to force a fresh create instead of
              # binding to an existing EmailDomain with the same name in the same compartment.
              #
              apiVersion: email.oracle.com/v1beta1
              kind: EmailDomain
              metadata:
                name: emaildomain-sample
              spec:
                name: mail.example.com
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                description: OSOK EmailDomain sample
        - kind: Sender
          formalSpec: sender
          sample:
            body: |-
              #
              # Replace the compartment OCID and sender email address below before running e2e.
              # Update metadata.name if you want to force a fresh create instead of reusing an
              # existing Sender with the same compartmentId and emailAddress.
              #
              apiVersion: email.oracle.com/v1beta1
              kind: Sender
              metadata:
                name: sender-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                emailAddress: sender@example.com
                freeformTags:
                  managed-by: oci-service-operator

  - service: events
    sdkPackage: github.com/oracle/oci-go-sdk/v65/events
    group: events
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: controller-backed
    selection:
      enabled: false
      mode: all
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none

  - service: functions
    sdkPackage: github.com/oracle/oci-go-sdk/v65/functions
    group: functions
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Application
        - Function
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: manual
      registration:
        strategy: manual
      webhooks:
        strategy: none
      resources:
        - kind: Application
          async:
            strategy: lifecycle
            runtime: handwritten
            formalClassification: lifecycle
          serviceManager:
            packagePath: functions
        - kind: Function
          async:
            strategy: lifecycle
            runtime: handwritten
            formalClassification: lifecycle
          controller:
            extraRBACMarkers:
              - groups="",resources=secrets,verbs=get;list;watch;create;update;patch;delete
          serviceManager:
            packagePath: functions

  - service: generativeai
    sdkPackage: github.com/oracle/oci-go-sdk/v65/generativeai
    group: generativeai
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - DedicatedAiCluster
        - Endpoint
        - Model
        - WorkRequest
        - WorkRequestError
        - WorkRequestLog
    async:
      strategy: lifecycle
      runtime: generatedruntime
      formalClassification: lifecycle
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: DedicatedAiCluster
          formalSpec: dedicatedaicluster
          sample:
            body: |-
              #
              # Replace the compartment OCID and tune the displayName below before running e2e.
              # Keeping spec.displayName empty disables pre-create reuse; setting it allows the
              # controller to bind to an existing DedicatedAiCluster with the same compartmentId
