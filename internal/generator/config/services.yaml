  - service: secrets
    sdkPackage: github.com/oracle/oci-go-sdk/v65/secrets
    group: secrets
    version: v1beta1
    phase: security-and-identity
    packageProfile: controller-backed
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
