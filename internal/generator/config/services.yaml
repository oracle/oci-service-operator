      webhooks:
        strategy: none

  - service: identity
    sdkPackage: github.com/oracle/oci-go-sdk/v65/identity
    group: identity
    version: v1beta1
    phase: security-and-identity
    packageProfile: controller-backed
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: User
          formalSpec: user
    observedState:
      sdkAliases:
        BulkActionResourceType:
          - BulkActionResourceTypeCollection
        BulkEditTagsResourceType:
          - BulkEditTagsResourceTypeCollection
        CostTrackingTag:
          - Tag
        IdentityProvider:
          - Saml2IdentityProvider
        NetworkSource:
          - NetworkSources
        OrResetUIPassword:
          - UiPassword
        StandardTagNamespace:
          - StandardTagNamespaceTemplate
          - StandardTagNamespaceTemplateSummary
        StandardTagTemplate:
          - StandardTagDefinitionTemplate
        UserState:
          - User
        UserUIPasswordInformation:
          - UiPasswordInformation

  - service: keymanagement
    sdkPackage: github.com/oracle/oci-go-sdk/v65/keymanagement
    group: keymanagement
    version: v1beta1
    phase: security-and-identity
    packageProfile: controller-backed
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
      resources:
        - kind: Key
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: KeyVersion
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: ReplicationStatus
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: WrappingKey
          controller:
            strategy: none
          serviceManager:
            strategy: none

  - service: limits
    sdkPackage: github.com/oracle/oci-go-sdk/v65/limits
    group: limits
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: controller-backed
