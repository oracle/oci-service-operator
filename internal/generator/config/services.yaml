# Source-of-truth service map for the OSOK generator contract.
# Service selection metadata declares the default active generation surface.
# - selection.enabled=false keeps a service inactive by default.
# - selection.mode=all enables all discovered kinds for that service.
# - selection.mode=explicit limits default activity to selection.includeKinds.
# Services without a `generation` block default to:
# - controller/serviceManager/registration: none
# - webhooks: manual
schemaVersion: v1alpha1
domain: oracle.com
defaultVersion: v1beta1
generatorEntrypoint: ./cmd/generator

packageProfiles:
  controller-backed:
    description: Groups that participate in the shared manager install, whether runtime pieces are manual or generated.
  crd-only:
    description: Generated API groups that ship CRDs and samples before controller, service-manager, and registration rollout is enabled.

services:
  - service: artifacts
    sdkPackage: github.com/oracle/oci-go-sdk/v65/artifacts
    group: artifacts
    version: v1beta1
    phase: data-and-storage
    packageProfile: controller-backed
    selection:
      enabled: false
      mode: all
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none

  - service: certificates
    sdkPackage: github.com/oracle/oci-go-sdk/v65/certificates
    group: certificates
    version: v1beta1
    phase: security-and-identity
    packageProfile: controller-backed
    selection:
      enabled: false
      mode: all
    observedState:
      excludedFieldPaths:
        CertificateBundle:
          - JsonData
          - PrivateKeyPem
          - PrivateKeyPemPassphrase
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none

