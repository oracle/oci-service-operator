  - service: mysql
    sdkPackage: github.com/oracle/oci-go-sdk/v65/mysql
    group: mysql
    version: v1beta1
    phase: data-and-storage
    sampleOrder: 30
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: all
    observedState:
      excludedFieldPaths:
        Channel:
          - Source.Password
        DbSystem:
          - Source.SourceUrl
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: manual
      resources:
        - kind: DbSystem
          formalSpec: dbsystem
          controller:
            maxConcurrentReconciles: 3
            extraRBACMarkers:
              - groups="",resources=secrets,verbs=get;list;watch
          specFields:
            - name: AdminUsername
              type: shared.UsernameSource
              tag: 'json:"adminUsername,omitempty,omitzero"'
              comments:
                - The username for the administrative user sourced from a Kubernetes Secret in the same namespace.
                - The referenced Secret must contain a `username` key.
              markers:
                - +kubebuilder:validation:Optional
            - name: AdminPassword
              type: shared.PasswordSource
              tag: 'json:"adminPassword,omitempty,omitzero"'
              comments:
                - The password for the administrative user sourced from a Kubernetes Secret in the same namespace.
                - The referenced Secret must contain a `password` key.
              markers:
                - +kubebuilder:validation:Optional
          statusFields:
            - name: AdminUsername
              type: shared.UsernameSource
              tag: 'json:"adminUsername,omitempty,omitzero"'
              comments:
                - The last applied secret reference for the administrative username.
            - name: AdminPassword
              type: shared.PasswordSource
              tag: 'json:"adminPassword,omitempty,omitzero"'
              comments:
                - The last applied secret reference for the administrative password.
          sample:
            body: |-
              apiVersion: mysql.oracle.com/v1beta1
              kind: DbSystem
              metadata:
                name: dbsystem-sample
              spec:
                compartmentId: ocid1.compartment.oc1..exampleuniqueID
                shapeName: MySQL.VM.Standard.E3.1.8GB
                subnetId: ocid1.subnet.oc1..exampleuniqueID
                adminUsername:
                  secret:
                    secretName: admin-secret
                adminPassword:
                  secret:
                    secretName: admin-secret
          serviceManager:
            packagePath: mysql/dbsystem
            needsCredentialClient: true

