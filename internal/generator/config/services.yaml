  - service: streaming
    sdkPackage: github.com/oracle/oci-go-sdk/v65/streaming
    group: streaming
    version: v1beta1
    phase: eventing-messaging-and-observability
    sampleOrder: 20
    packageProfile: controller-backed
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: manual
      resources:
        - kind: Stream
          serviceManager:
            packagePath: streaming/stream
        - kind: Cursor
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: Group
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: GroupCursor
          controller:
            strategy: none
          serviceManager:
            strategy: none
        - kind: Message
          controller:
