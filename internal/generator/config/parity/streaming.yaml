resources:
  - sourceResource: Stream
    kind: Stream
    fileStem: stream
    leadingComments:
      - 'NOTE: json tags are required.  Any new fields you add must have json tags for the fields to be serialized.'
    specComments:
      - StreamSpec defines the desired state of Stream
    specFields:
      - name: StreamId
        type: shared.OCID
        tag: 'json:"Id,omitempty"'
        comments:
          - INSERT ADDITIONAL SPEC FIELDS - desired state of cluster
          - 'Important: Run "make" to regenerate code after modifying this file'
      - name: CompartmentId
        type: shared.OCID
        tag: 'json:"compartmentId,omitempty"'
      - name: Name
        type: string
        tag: 'json:"name,omitempty"'
      - name: Partitions
        type: int
        tag: 'json:"partitions,omitempty"'
        markers:
          - +kubebuilder:validation:Minimum=1
      - name: RetentionInHours
        type: int
        tag: 'json:"retentionInHours,omitempty"'
        markers:
          - +kubebuilder:validation:Maximum=168
          - +kubebuilder:validation:Minimum=24
      - name: StreamPoolId
        type: shared.OCID
        tag: 'json:"streamPoolId,omitempty"'
      - type: shared.TagResources
        tag: 'json:",inline"'
    statusComments:
      - StreamStatus defines the observed state of Stream
    statusFields:
      - name: OsokStatus
        type: shared.OSOKStatus
        tag: 'json:"status"'
        comments:
          - INSERT ADDITIONAL STATUS FIELD - define observed state of cluster
          - 'Important: Run "make" to regenerate code after modifying this file'
    printColumns:
      - name: Name
        type: string
        jsonPath: .spec.name
        priority: 1
      - name: Status
        type: string
        jsonPath: .status.status.conditions[-1].type
        description: status of the Stream
        priority: 0
      - name: Ocid
        type: string
        jsonPath: .status.status.ocid
        description: Ocid of the Stream
        priority: 1
      - name: Age
        type: date
        jsonPath: .metadata.creationTimestamp
        priority: 0
    objectComments:
      - Stream is the Schema for the streams API
    listComments:
      - StreamList contains a list of Stream
    sample:
      metadataName: sample-stream
      body: |-
        apiVersion: streaming.oracle.com/v1beta1
        kind: Stream
        metadata:
          name: sample-stream
        spec:
          # compartmentId: ocid1.compartment.oc1..aaaaaaaaXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
          name: SampleStream
          streamPoolId: ocid1.streampool.oc1.iad.XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
          partitions: 1
          retentionInHours: 24
          # Id: ocid1.stream.oc1.<region_code>.XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
package:
  extraResources:
    - ../../../config/rbac/stream_editor_role.yaml
    - ../../../config/rbac/stream_viewer_role.yaml
