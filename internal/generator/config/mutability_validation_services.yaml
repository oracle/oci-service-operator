# Deterministic fixture-backed service surface for mutability overlay validation.
schemaVersion: v1alpha1
domain: oracle.com
defaultVersion: v1beta1
generatorEntrypoint: ./cmd/generator

packageProfiles:
  controller-backed:
    description: Fixture-backed validation surface for mutability overlay and VAP regression gates.

services:
  - service: analytics
    sdkPackage: github.com/oracle/oci-go-sdk/v65/analytics
    group: analytics
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - AnalyticsInstance
    generation:
      resources:
        - kind: AnalyticsInstance
          formalSpec: analyticsinstance
          async:
            strategy: lifecycle
            runtime: generatedruntime
            formalClassification: lifecycle

  - service: containerengine
    sdkPackage: github.com/oracle/oci-go-sdk/v65/containerengine
    group: containerengine
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - NodePool
    async:
      strategy: lifecycle
      runtime: generatedruntime
      formalClassification: lifecycle
    generation:
      resources:
        - kind: NodePool
          formalSpec: nodepool

  - service: core
    sdkPackage: github.com/oracle/oci-go-sdk/v65/core
    group: core
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Instance
    async:
      strategy: lifecycle
      runtime: generatedruntime
      formalClassification: lifecycle
    generation:
      resources:
        - kind: Instance
          formalSpec: instance
          async:
            strategy: lifecycle
            runtime: generatedruntime
            formalClassification: lifecycle

  - service: dataflow
    sdkPackage: github.com/oracle/oci-go-sdk/v65/dataflow
    group: dataflow
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Application
    generation:
      resources:
        - kind: Application
          formalSpec: application
          async:
            strategy: lifecycle
            runtime: generatedruntime
            formalClassification: lifecycle

  - service: nosql
    sdkPackage: github.com/oracle/oci-go-sdk/v65/nosql
    group: nosql
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Table
    generation:
      resources:
        - kind: Table
          formalSpec: table
          async:
            strategy: lifecycle
            runtime: generatedruntime
            formalClassification: lifecycle

  - service: objectstorage
    sdkPackage: github.com/oracle/oci-go-sdk/v65/objectstorage
    group: objectstorage
    packageProfile: controller-backed
    selection:
      enabled: true
      mode: explicit
      includeKinds:
        - Bucket
    generation:
      resources:
        - kind: Bucket
          formalSpec: objectstoragebucket
          async:
            strategy: lifecycle
            runtime: generatedruntime
            formalClassification: lifecycle
