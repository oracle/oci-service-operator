---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: autonomousdatabaseclones.database.oracle.com
spec:
  group: database.oracle.com
  names:
    kind: AutonomousDatabaseClone
    listKind: AutonomousDatabaseCloneList
    plural: autonomousdatabaseclones
    singular: autonomousdatabaseclone
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the AutonomousDatabaseClone
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the AutonomousDatabaseClone
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: AutonomousDatabaseClone is the Schema for the autonomousdatabaseclones
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AutonomousDatabaseCloneSpec defines the desired state of
              AutonomousDatabaseClone.
            properties:
              adminPassword:
                description: |-
                  **Important** The `adminPassword` or `secretId` must be specified for all Autonomous Databases except for refreshable clones. The password must be between 12 and 30 characters long, and must contain at least 1 uppercase, 1 lowercase, and 1 numeric character. It cannot contain the double quote symbol (") or the username "admin", regardless of casing.
                  This cannot be used in conjunction with with OCI vault secrets (secretId).
                type: string
              arePrimaryWhitelistedIpsUsed:
                description: |-
                  This field will be null if the Autonomous Database is not Data Guard enabled or Access Control is disabled.
                  It's value would be `TRUE` if Autonomous Database is Data Guard enabled and Access Control is enabled and if the Autonomous Database uses primary IP access control list (ACL) for standby.
                  It's value would be `FALSE` if Autonomous Database is Data Guard enabled and Access Control is enabled and if the Autonomous Database uses different IP access control list (ACL) for standby compared to primary.
                type: boolean
              autonomousContainerDatabaseId:
                description: The Autonomous Container Database OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm).
                  Used only by Autonomous Database on Dedicated Exadata Infrastructure.
                type: string
              autonomousMaintenanceScheduleType:
                description: |-
                  The maintenance schedule type of the Autonomous Database Serverless. An EARLY maintenance schedule
                  follows a schedule applying patches prior to the REGULAR schedule. A REGULAR maintenance schedule follows the normal cycle
                type: string
              backupRetentionPeriodInDays:
                description: Retention period, in days, for long-term backups
                type: integer
              characterSet:
                description: |-
                  The character set for the autonomous database. The default is AL32UTF8. Allowed values for an Autonomous Database Serverless instance as as returned by List Autonomous Database Character Sets (https://docs.oracle.com/iaas/autonomous-database-serverless/doc/autonomous-character-set-selection.html)
                  For an Autonomous Database on dedicated infrastructure, the allowed values are:
                  AL32UTF8, AR8ADOS710, AR8ADOS720, AR8APTEC715, AR8ARABICMACS, AR8ASMO8X, AR8ISO8859P6, AR8MSWIN1256, AR8MUSSAD768, AR8NAFITHA711, AR8NAFITHA721, AR8SAKHR706, AR8SAKHR707, AZ8ISO8859P9E, BG8MSWIN, BG8PC437S, BLT8CP921, BLT8ISO8859P13, BLT8MSWIN1257, BLT8PC775, BN8BSCII, CDN8PC863, CEL8ISO8859P14, CL8ISO8859P5, CL8ISOIR111, CL8KOI8R, CL8KOI8U, CL8MACCYRILLICS, CL8MSWIN1251, EE8ISO8859P2, EE8MACCES, EE8MACCROATIANS, EE8MSWIN1250, EE8PC852, EL8DEC, EL8ISO8859P7, EL8MACGREEKS, EL8MSWIN1253, EL8PC437S, EL8PC851, EL8PC869, ET8MSWIN923, HU8ABMOD, HU8CWI2, IN8ISCII, IS8PC861, IW8ISO8859P8, IW8MACHEBREWS, IW8MSWIN1255, IW8PC1507, JA16EUC, JA16EUCTILDE, JA16SJIS, JA16SJISTILDE, JA16VMS, KO16KSC5601, KO16KSCCS, KO16MSWIN949, LA8ISO6937, LA8PASSPORT, LT8MSWIN921, LT8PC772, LT8PC774, LV8PC1117, LV8PC8LR, LV8RST104090, N8PC865, NE8ISO8859P10, NEE8ISO8859P4, RU8BESTA, RU8PC855, RU8PC866, SE8ISO8859P3, TH8MACTHAIS, TH8TISASCII, TR8DEC, TR8MACTURKISHS, TR8MSWIN1254, TR8PC857, US7ASCII, US8PC437, UTF8, VN8MSWIN1258, VN8VN3, WE8DEC, WE8DG, WE8ISO8859P1, WE8ISO8859P15, WE8ISO8859P9, WE8MACROMAN8S, WE8MSWIN1252, WE8NCR4970, WE8NEXTSTEP, WE8PC850, WE8PC858, WE8PC860, WE8ROMAN8, ZHS16CGB231280, ZHS16GBK, ZHT16BIG5, ZHT16CCDC, ZHT16DBT, ZHT16HKSCS, ZHT16MSWIN950, ZHT32EUC, ZHT32SOPS, ZHT32TRIS
                type: string
              cloneType:
                description: The Autonomous Database clone type.
                type: string
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the compartment of the Autonomous Database.
                type: string
              computeCount:
                description: |-
                  The compute amount (CPUs) available to the database. Minimum and maximum values depend on the compute model and whether the database is an Autonomous Database Serverless instance or an Autonomous Database on Dedicated Exadata Infrastructure.
                  For an Autonomous Database Serverless instance, the 'ECPU' compute model requires a minimum value of one, for databases in the elastic resource pool and minimum value of two, otherwise. Required when using the `computeModel` parameter. When using `cpuCoreCount` parameter, it is an error to specify computeCount to a non-null value. Providing `computeModel` and `computeCount` is the preferred method for both OCPU and ECPU.
                type: number
              computeModel:
                description: The compute model of the Autonomous Database. This is
                  required if using the `computeCount` parameter. If using `cpuCoreCount`
                  then it is an error to specify `computeModel` to a non-null value.
                  ECPU compute model is the recommended model and OCPU compute model
                  is legacy.
                type: string
              cpuCoreCount:
                description: |-
                  The number of CPU cores to be made available to the database. For Autonomous Databases on dedicated Exadata infrastructure, the maximum number of cores is determined by the infrastructure shape. See Characteristics of Infrastructure Shapes (https://www.oracle.com/pls/topic/lookup?ctx=en/cloud/paas/autonomous-database&id=ATPFG-GUID-B0F033C1-CC5A-42F0-B2E7-3CECFEDA1FD1) for shape details.
                  **Note:** This parameter cannot be used with the `ocpuCount` parameter.
                type: integer
              customerContacts:
                description: Customer Contacts.
                items:
                  description: AutonomousDatabaseCloneCustomerContact defines nested
                    fields for AutonomousDatabaseClone.CustomerContact.
                  properties:
                    email:
                      description: The email address used by Oracle to send notifications
                        regarding databases and infrastructure.
                      type: string
                  type: object
                type: array
              dataStorageSizeInGBs:
                description: |-
                  The size, in gigabytes, of the data volume that will be created and attached to the database. This storage can later be scaled up if needed. The maximum storage value is determined by the infrastructure shape. See Characteristics of Infrastructure Shapes (https://www.oracle.com/pls/topic/lookup?ctx=en/cloud/paas/autonomous-database&id=ATPFG-GUID-B0F033C1-CC5A-42F0-B2E7-3CECFEDA1FD1) for shape details.
                  **Notes**
                  - This parameter is only supported for dedicated Exadata infrastructure.
                  - This parameter cannot be used with the `dataStorageSizeInTBs` parameter.
                type: integer
              dataStorageSizeInTBs:
                description: |-
                  The size, in terabytes, of the data volume that will be created and attached to the database. This storage can later be scaled up if needed. For Autonomous Databases on dedicated Exadata infrastructure, the maximum storage value is determined by the infrastructure shape. See Characteristics of Infrastructure Shapes (https://www.oracle.com/pls/topic/lookup?ctx=en/cloud/paas/autonomous-database&id=ATPFG-GUID-B0F033C1-CC5A-42F0-B2E7-3CECFEDA1FD1) for shape details.
                  A full Exadata service is allocated when the Autonomous Database size is set to the upper limit (384 TB).
                  **Note:** This parameter cannot be used with the `dataStorageSizeInGBs` parameter.
                type: integer
              databaseEdition:
                description: The Oracle Database Edition that applies to the Autonomous
                  databases.
                type: string
              dbName:
                description: The database name. The name must begin with an alphabetic
                  character and can contain a maximum of 30 alphanumeric characters.
                  Special characters are not permitted. The database name must be
                  unique in the tenancy. It is required in all cases except when creating
                  a cross-region Autonomous Data Guard standby instance or a cross-region
                  disaster recovery standby instance.
                type: string
              dbToolsDetails:
                description: |-
                  The list of database tools details.
                  This cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, whitelistedIps, isMTLSConnectionRequired, openMode, permissionLevel, dbWorkload, privateEndpointLabel, nsgIds, dbVersion, isRefreshable, dbName, scheduledOperations, isLocalDataGuardEnabled, or isFreeTier.
                items:
                  description: AutonomousDatabaseCloneDbToolsDetail defines nested
                    fields for AutonomousDatabaseClone.DbToolsDetail.
                  properties:
                    computeCount:
                      description: Compute used by database tools.
                      type: number
                    isEnabled:
                      description: Indicates whether tool is enabled.
                      type: boolean
                    maxIdleTimeInMinutes:
                      description: The max idle time, in minutes, after which the
                        VM used by database tools will be terminated.
                      type: integer
                    name:
                      description: Name of database tool.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              dbVersion:
                description: A valid Oracle Database version for Autonomous Database.
                type: string
              dbWorkload:
                description: |-
                  The Autonomous Database workload type. The following values are valid:
                  - OLTP - indicates an Autonomous Transaction Processing database
                  - DW - indicates an Autonomous Data Warehouse database
                  - AJD - indicates an Autonomous JSON Database
                  - APEX - indicates an Autonomous Database with the Oracle APEX Application Development workload type.
                  This cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, adminPassword, whitelistedIps, isMTLSConnectionRequired, privateEndpointLabel, nsgIds, dbVersion, isRefreshable, dbName, scheduledOperations, dbToolsDetails, isLocalDataGuardEnabled, or isFreeTier.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                type: object
              displayName:
                description: The user-friendly name for the Autonomous Database. The
                  name does not have to be unique.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              inMemoryPercentage:
                description: The percentage of the System Global Area(SGA) assigned
                  to In-Memory tables in Autonomous Database. This property is applicable
                  only to Autonomous Databases on the Exadata Cloud@Customer platform.
                type: integer
              isAccessControlEnabled:
                description: |-
                  Indicates if the database-level access control is enabled.
                  If disabled, database access is defined by the network security rules.
                  If enabled, database access is restricted to the IP addresses defined by the rules specified with the `whitelistedIps` property. While specifying `whitelistedIps` rules is optional,
                   if database-level access control is enabled and no rules are specified, the database will become inaccessible. The rules can be added later using the `UpdateAutonomousDatabase` API operation or edit option in console.
                  When creating a database clone, the desired access control setting should be specified. By default, database-level access control will be disabled for the clone.
                  This property is applicable only to Autonomous Databases on the Exadata Cloud@Customer platform. For Autonomous Database Serverless instances, `whitelistedIps` is used.
                type: boolean
              isAutoScalingEnabled:
                description: Indicates if auto scaling is enabled for the Autonomous
                  Database CPU core count. The default value is `TRUE`.
                type: boolean
              isAutoScalingForStorageEnabled:
                description: Indicates if auto scaling is enabled for the Autonomous
                  Database storage. The default value is `FALSE`.
                type: boolean
              isDataGuardEnabled:
                description: '**Deprecated.** Indicates whether the Autonomous Database
                  has local (in-region) Data Guard enabled. Not applicable to cross-region
                  Autonomous Data Guard associations, or to Autonomous Databases using
                  dedicated Exadata infrastructure or Exadata Cloud@Customer infrastructure.'
                type: boolean
              isDedicated:
                description: True if the database is on dedicated Exadata infrastructure
                  (https://docs.oracle.com/en/cloud/paas/autonomous-database/index.html).
                type: boolean
              isDevTier:
                description: This project introduces Autonomous Database for Developers
                  (ADB-Dev), a free tier on dedicated infrastructure, and Cloud@Customer
                  for database development purposes. ADB-Dev enables ExaDB customers
                  to experiment with ADB for free and incentivizes enterprises to
                  use ADB for new development projects.Note that ADB-Dev have 4 CPU
                  and 20GB of memory. For ADB-Dev , memory and CPU cannot be scaled
                type: boolean
              isFreeTier:
                description: |-
                  Indicates if this is an Always Free resource. The default value is false. Note that Always Free Autonomous Databases have 1 CPU and 20GB of memory. For Always Free databases, memory and CPU cannot be scaled.
                  This cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, adminPassword, whitelistedIps, isMTLSConnectionRequired, openMode, permissionLevel, privateEndpointLabel, nsgIds, dbVersion, isRefreshable, dbName, scheduledOperations, dbToolsDetails, or isLocalDataGuardEnabled
                type: boolean
              isLocalDataGuardEnabled:
                description: Indicates whether the Autonomous Database has local (in-region)
                  Data Guard enabled. Not applicable to cross-region Autonomous Data
                  Guard associations, or to Autonomous Databases using dedicated Exadata
                  infrastructure or Exadata Cloud@Customer infrastructure.
                type: boolean
              isMtlsConnectionRequired:
                description: |-
                  Specifies if the Autonomous Database requires mTLS connections.
                  This may not be updated in parallel with any of the following: licenseModel, databaseEdition, cpuCoreCount, computeCount, dataStorageSizeInTBs, whitelistedIps, openMode, permissionLevel, db-workload, privateEndpointLabel, nsgIds, customerContacts, dbVersion, scheduledOperations, dbToolsDetails, isLocalDataGuardEnabled, or isFreeTier.
                  Service Change: The default value of the isMTLSConnectionRequired attribute will change from true to false on July 1, 2023 in the following APIs:
                  - CreateAutonomousDatabase
                  - GetAutonomousDatabase
                  - UpdateAutonomousDatabase
                  Details: Prior to the July 1, 2023 change, the isMTLSConnectionRequired attribute default value was true. This applies to Autonomous Database Serverless.
                  Does this impact me? If you use or maintain custom scripts or Terraform scripts referencing the CreateAutonomousDatabase, GetAutonomousDatabase, or UpdateAutonomousDatabase APIs, you want to check, and possibly modify, the scripts for the changed default value of the attribute. Should you choose not to leave your scripts unchanged, the API calls containing this attribute will continue to work, but the default value will switch from true to false.
                  How do I make this change? Using either OCI SDKs or command line tools, update your custom scripts to explicitly set the isMTLSConnectionRequired attribute to true.
                type: boolean
              isPreviewVersionWithServiceTermsAccepted:
                description: If set to `TRUE`, indicates that an Autonomous Database
                  preview version is being provisioned, and that the preview version's
                  terms of service have been accepted. Note that preview version software
                  is only available for Autonomous Database Serverless instances (https://docs.oracle.com/en/cloud/paas/autonomous-database/serverless/).
                type: boolean
              kmsKeyId:
                description: The OCID of the key container that is used as the master
                  encryption key in database transparent data encryption (TDE) operations.
                type: string
              licenseModel:
                description: |-
                  The Oracle license model that applies to the Oracle Autonomous Database. Bring your own license (BYOL) allows you to apply your current on-premises Oracle software licenses to equivalent, highly automated Oracle services in the cloud.
                  License Included allows you to subscribe to new Oracle Database software licenses and the Oracle Database service.
                  Note that when provisioning an Autonomous Database on dedicated Exadata infrastructure (https://docs.oracle.com/en/cloud/paas/autonomous-database/index.html), this attribute must be null. It is already set at the
                  Autonomous Exadata Infrastructure level. When provisioning an Autonomous Database Serverless  (https://docs.oracle.com/en/cloud/paas/autonomous-database/index.html) database, if a value is not specified, the system defaults the value to `BRING_YOUR_OWN_LICENSE`. Bring your own license (BYOL) also allows you to select the DB edition using the optional parameter.
                  This cannot be updated in parallel with any of the following: cpuCoreCount, computeCount, dataStorageSizeInTBs, adminPassword, isMTLSConnectionRequired, dbWorkload, privateEndpointLabel, nsgIds, dbVersion, dbName, scheduledOperations, dbToolsDetails, or isFreeTier.
                type: string
              ncharacterSet:
                description: |-
                  The character set for the Autonomous Database. The default is AL32UTF8. Use List Autonomous Database Character Sets (https://docs.oracle.com/iaas/autonomous-database-serverless/doc/autonomous-character-set-selection.html) to list the allowed values for an Autonomous Database Serverless instance.
                  For an Autonomous Database on dedicated Exadata infrastructure, the allowed values are:
                  AL16UTF16 or UTF8.
                type: string
              nsgIds:
                description: |-
                  The list of OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) for the network security groups (NSGs) to which this resource belongs. Setting this to an empty list removes all resources from all NSGs. For more information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  **NsgIds restrictions:**
                  - A network security group (NSG) is optional for Autonomous Databases with private access. The nsgIds list can be empty.
                items:
                  type: string
                type: array
              ocpuCount:
                description: |-
                  The number of OCPU cores to be made available to the database.
                  The following points apply:
                  - For Autonomous Databases on Dedicated Exadata infrastructure, to provision less than 1 core, enter a fractional value in an increment of 0.1. For example, you can provision 0.3 or 0.4 cores, but not 0.35 cores. (Note that fractional OCPU values are not supported for Autonomous Database Serverless instances.)
                  - To provision 1 or more cores, you must enter an integer between 1 and the maximum number of cores available for the infrastructure shape. For example, you can provision 2 cores or 3 cores, but not 2.5 cores. This applies to an Autonomous Database Serverless instance or an Autonomous Database on Dedicated Exadata Infrastructure.
                  - For Autonomous Database Serverless instances, this parameter is not used.
                  For Autonomous Databases on Dedicated Exadata infrastructure, the maximum number of cores is determined by the infrastructure shape. See Characteristics of Infrastructure Shapes (https://www.oracle.com/pls/topic/lookup?ctx=en/cloud/paas/autonomous-database&id=ATPFG-GUID-B0F033C1-CC5A-42F0-B2E7-3CECFEDA1FD1) for shape details.
                  **Note:** This parameter cannot be used with the `cpuCoreCount` parameter.
                type: number
              privateEndpointIp:
                description: The private endpoint Ip address for the resource.
                type: string
              privateEndpointLabel:
                description: |-
                  The resource's private endpoint label.
                  - Setting the endpoint label to a non-empty string creates a private endpoint database.
                  - Resetting the endpoint label to an empty string, after the creation of the private endpoint database, changes the private endpoint database to a public endpoint database.
                  - Setting the endpoint label to a non-empty string value, updates to a new private endpoint database, when the database is disabled and re-enabled.
                  This setting cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, adminPassword, whitelistedIps, isMTLSConnectionRequired, dbWorkload, dbVersion, isRefreshable, dbName, scheduledOperations, dbToolsDetails, or isFreeTier.
                type: string
              resourcePoolLeaderId:
                description: The unique identifier for leader autonomous database
                  OCID OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm).
                type: string
              resourcePoolSummary:
                description: AutonomousDatabaseCloneResourcePoolSummary defines nested
                  fields for AutonomousDatabaseClone.ResourcePoolSummary.
                properties:
                  isDisabled:
                    description: Indicates if the resource pool should be deleted
                      for the Autonomous Database.
                    type: boolean
                  poolSize:
                    description: Resource pool size.
                    type: integer
                type: object
              scheduledOperations:
                description: |-
                  The list of scheduled operations. Consists of values such as dayOfWeek, scheduledStartTime, scheduledStopTime.
                  This cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, whitelistedIps, isMTLSConnectionRequired, openMode, permissionLevel, dbWorkload, privateEndpointLabel, nsgIds, dbVersion, isRefreshable, dbName, dbToolsDetails, isLocalDataGuardEnabled, or isFreeTier.
                items:
                  description: AutonomousDatabaseCloneScheduledOperation defines nested
                    fields for AutonomousDatabaseClone.ScheduledOperation.
                  properties:
                    dayOfWeek:
                      description: AutonomousDatabaseCloneScheduledOperationDayOfWeek
                        defines nested fields for AutonomousDatabaseClone.ScheduledOperation.DayOfWeek.
                      properties:
                        name:
                          description: Name of the day of the week.
                          type: string
                      required:
                      - name
                      type: object
                    scheduledStartTime:
                      description: auto start time. value must be of ISO-8601 format
                        "HH:mm"
                      type: string
                    scheduledStopTime:
                      description: auto stop time. value must be of ISO-8601 format
                        "HH:mm"
                      type: string
                  required:
                  - dayOfWeek
                  type: object
                type: array
              secretId:
                description: |-
                  The OCI vault secret [/Content/General/Concepts/identifiers.htm]OCID.
                  This cannot be used in conjunction with adminPassword.
                type: string
              secretVersionNumber:
                description: The version of the vault secret. If no version is specified,
                  the latest version will be used.
                type: integer
              sourceId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the source Autonomous Database that you will clone to create
                  a new Autonomous Database.
                type: string
              standbyWhitelistedIps:
                description: |-
                  The client IP access control list (ACL). This feature is available for Autonomous Database Serverless  (https://docs.oracle.com/en/cloud/paas/autonomous-database/index.html) and on Exadata Cloud@Customer.
                  Only clients connecting from an IP address included in the ACL may access the Autonomous Database instance.
                  If `arePrimaryWhitelistedIpsUsed` is 'TRUE' then Autonomous Database uses this primary's IP access control list (ACL) for the disaster recovery peer called `standbywhitelistedips`.
                  For Autonomous Database Serverless, this is an array of CIDR (classless inter-domain routing) notations for a subnet or VCN OCID (virtual cloud network Oracle Cloud ID).
                  Multiple IPs and VCN OCIDs should be separate strings separated by commas, but if it’s other configurations that need multiple pieces of information then its each piece is connected with semicolon (;) as a delimiter.
                  Example: `["1.1.1.1","1.1.1.0/24","ocid1.vcn.oc1.sea.<unique_id>","ocid1.vcn.oc1.sea.<unique_id1>;1.1.1.1","ocid1.vcn.oc1.sea.<unique_id2>;1.1.0.0/16"]`
                  For Exadata Cloud@Customer, this is an array of IP addresses or CIDR notations.
                  Example: `["1.1.1.1","1.1.1.0/24","1.1.2.25"]`
                  For an update operation, if you want to delete all the IPs in the ACL, use an array with a single empty string entry.
                  This cannot be updated in parallel with any of the following: licenseModel, dbEdition, cpuCoreCount, computeCount, computeModel, adminPassword, isMTLSConnectionRequired, openMode, permissionLevel, dbWorkload, dbVersion, isRefreshable, dbName, scheduledOperations, dbToolsDetails, isLocalDataGuardEnabled, or isFreeTier.
                items:
                  type: string
                type: array
              subnetId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the subnet the resource is associated with.
                  **Subnet Restrictions:**
                  - For bare metal DB systems and for single node virtual machine DB systems, do not use a subnet that overlaps with 192.168.16.16/28.
                  - For Exadata and virtual machine 2-node RAC systems, do not use a subnet that overlaps with 192.168.128.0/20.
                  - For Autonomous Database, setting this will disable public secure access to the database.
                  These subnets are used by the Oracle Clusterware private interconnect on the database instance.
                  Specifying an overlapping subnet will cause the private interconnect to malfunction.
                  This restriction applies to both the client subnet and the backup subnet.
                type: string
              vaultId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the Oracle Cloud Infrastructure vault (https://docs.cloud.oracle.com/Content/KeyManagement/Concepts/keyoverview.htm#concepts).
                  This parameter and `secretId` are required for Customer Managed
                  Keys.
                type: string
              whitelistedIps:
                description: |-
                  The client IP access control list (ACL). This feature is available for Autonomous Database Serverless  (https://docs.oracle.com/en/cloud/paas/autonomous-database/index.html) and on Exadata Cloud@Customer.
                  Only clients connecting from an IP address included in the ACL may access the Autonomous Database instance.
                  If `arePrimaryWhitelistedIpsUsed` is 'TRUE' then Autonomous Database uses this primary's IP access control list (ACL) for the disaster recovery peer called `standbywhitelistedips`.
                  For Autonomous Database Serverless, this is an array of CIDR (classless inter-domain routing) notations for a subnet or VCN OCID (virtual cloud network Oracle Cloud ID).
                  Multiple IPs and VCN OCIDs should be separate strings separated by commas, but if it’s other configurations that need multiple pieces of information then its each piece is connected with semicolon (;) as a delimiter.
                  Example: `["1.1.1.1","1.1.1.0/24","ocid1.vcn.oc1.sea.<unique_id>","ocid1.vcn.oc1.sea.<unique_id1>;1.1.1.1","ocid1.vcn.oc1.sea.<unique_id2>;1.1.0.0/16"]`
                  For Exadata Cloud@Customer, this is an array of IP addresses or CIDR notations.
                  Example: `["1.1.1.1","1.1.1.0/24","1.1.2.25"]`
