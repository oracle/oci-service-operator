---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: dataguardassociations.database.oracle.com
spec:
  group: database.oracle.com
  names:
    kind: DataGuardAssociation
    listKind: DataGuardAssociationList
    plural: dataguardassociations
    singular: dataguardassociation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the DataGuardAssociation
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the DataGuardAssociation
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: DataGuardAssociation is the Schema for the dataguardassociations
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DataGuardAssociationSpec defines the desired state of DataGuardAssociation.
            properties:
              availabilityDomain:
                description: The name of the availability domain that the standby
                  database DB system will be located in. For example- "Uocm:PHX-AD-1".
                type: string
              backupNetworkNsgIds:
                description: A list of the OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the network security groups (NSGs) that the backup network of
                  this DB system belongs to. Setting this to an empty array after
                  the list is created removes the resource from all NSGs. For more
                  information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  Applicable only to Exadata systems.
                items:
                  type: string
                type: array
              cpuCoreCount:
                description: The number of CPU cores available for AMD-based virtual
                  machine DB systems.
                type: integer
              creationType:
                type: string
              dataCollectionOptions:
                description: DataGuardAssociationDataCollectionOptions defines nested
                  fields for DataGuardAssociation.DataCollectionOptions.
                properties:
                  isDiagnosticsEventsEnabled:
                    description: Indicates whether diagnostic collection is enabled
                      for the VM cluster/Cloud VM cluster/VMBM DBCS. Enabling diagnostic
                      collection allows you to receive Events service notifications
                      for guest VM issues. Diagnostic collection also allows Oracle
                      to provide enhanced service and proactive support for your Exadata
                      system. You can enable diagnostic collection during VM cluster/Cloud
                      VM cluster provisioning. You can also disable or enable it at
                      any time using the `UpdateVmCluster` or `updateCloudVmCluster`
                      API.
                    type: boolean
                  isHealthMonitoringEnabled:
                    description: |-
                      Indicates whether health monitoring is enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling health monitoring allows Oracle to collect diagnostic data and share it with its operations and support personnel. You may also receive notifications for some events. Collecting health diagnostics enables Oracle to provide proactive support and enhanced service for your system.
                      Optionally enable health monitoring while provisioning a system. You can also disable or enable health monitoring anytime using the `UpdateVmCluster`, `UpdateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                  isIncidentLogsEnabled:
                    description: |-
                      Indicates whether incident logs and trace collection are enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling incident logs collection allows Oracle to receive Events service notifications for guest VM issues, collect incident logs and traces, and use them to diagnose issues and resolve them.
                      Optionally enable incident logs collection while provisioning a system. You can also disable or enable incident logs collection anytime using the `UpdateVmCluster`, `updateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                type: object
              databaseAdminPassword:
                description: |-
                  A strong password for the `SYS`, `SYSTEM`, and `PDB Admin` users to apply during standby creation.
                  The password must contain no fewer than nine characters and include:
                  * At least two uppercase characters.
                  * At least two lowercase characters.
                  * At least two numeric characters.
                  * At least two special characters. Valid special characters include "_", "#", and "-" only.
                  **The password MUST be the same as the primary admin password.**
                type: string
              databaseDefinedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                type: object
              databaseFreeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              databaseSoftwareImageId:
                description: The database software image OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                type: string
              dbSystemDefinedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                type: object
              dbSystemFreeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              displayName:
                description: The user-friendly name of the DB system that will contain
                  the the standby database. The display name does not have to be unique.
                type: string
              faultDomains:
                description: |-
                  A Fault Domain is a grouping of hardware and infrastructure within an availability domain.
                  Fault Domains let you distribute your instances so that they are not on the same physical
                  hardware within a single availability domain. A hardware failure or maintenance
                  that affects one Fault Domain does not affect DB systems in other Fault Domains.
                  If you do not specify the Fault Domain, the system selects one for you. To change the Fault
                  Domain for a DB system, terminate it and launch a new DB system in the preferred Fault Domain.
                  If the node count is greater than 1, you can specify which Fault Domains these nodes will be distributed into.
                  The system assigns your nodes automatically to the Fault Domains you specify so that
                  no Fault Domain contains more than one node.
                  To get a list of Fault Domains, use the
                  ListFaultDomains operation in the
                  Identity and Access Management Service API.
                  Example: `FAULT-DOMAIN-1`
                items:
                  type: string
                type: array
              hostname:
                description: The hostname for the DB node.
                type: string
              isActiveDataGuardEnabled:
                description: True if active Data Guard is enabled.
                type: boolean
              jsonData:
                type: string
              licenseModel:
                description: The Oracle license model that applies to all the databases
                  on the dataguard standby DB system. The default is LICENSE_INCLUDED.
                  Bring your own license (BYOL) allows you to select the DB edition
                  using the optional parameter, for Autonomous Database Serverless.
                type: string
              nodeCount:
                description: The number of nodes to launch for the DB system of the
                  standby in the Data Guard association. For a 2-node RAC virtual
                  machine DB system, specify either 1 or 2. If you do not supply this
                  parameter, the default is the node count of the primary DB system.
                type: integer
              nsgIds:
                description: |-
                  The list of OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) for the network security groups (NSGs) to which this resource belongs. Setting this to an empty list removes all resources from all NSGs. For more information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  **NsgIds restrictions:**
                  - A network security group (NSG) is optional for Autonomous Databases with private access. The nsgIds list can be empty.
                items:
                  type: string
                type: array
              peerDbHomeId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the DB home in which to create the standby database.
                  You must supply this value to create standby database with an existing DB home
                type: string
              peerDbSystemId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the DB system in which to create the standby database.
                  You must supply this value if creationType is `ExistingDbSystem`.
                type: string
              peerDbUniqueName:
                description: Specifies the `DB_UNIQUE_NAME` of the peer database to
                  be created.
                type: string
              peerSidPrefix:
                description: Specifies a prefix for the `Oracle SID` of the database
                  to be created.
                type: string
              peerVmClusterId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the VM Cluster in which to create the standby database.
                  You must supply this value if creationType is `ExistingVmCluster`.
                type: string
              privateIp:
                description: |-
                  The IPv4 address from the provided OCI subnet which needs to be assigned to the VNIC. If not provided, it will
                  be auto-assigned with an available IPv4 address from the subnet.
                type: string
              protectionMode:
                description: |-
                  The protection mode to set up between the primary and standby databases. For more information, see
                  Oracle Data Guard Protection Modes (http://docs.oracle.com/database/122/SBYDB/oracle-data-guard-protection-modes.htm#SBYDB02000)
                  in the Oracle Data Guard documentation.
                  **IMPORTANT** - The only protection mode currently supported by the Database service is MAXIMUM_PERFORMANCE.
                type: string
              shape:
                description: |-
                  The virtual machine DB system shape to launch for the standby database in the Data Guard association. The shape determines the number of CPU cores and the amount of memory available for the DB system.
                  Only virtual machine shapes are valid options. If you do not supply this parameter, the default shape is the shape of the primary DB system.
                  To get a list of all shapes, use the ListDbSystemShapes operation.
                type: string
              storageVolumePerformanceMode:
                description: The block storage volume performance level. Valid values
                  are `BALANCED` and `HIGH_PERFORMANCE`. See Block Volume Performance
                  (https://docs.cloud.oracle.com/Content/Block/Concepts/blockvolumeperformance.htm)
                  for more information.
                type: string
              subnetId:
                description: |-
                  The OCID of the subnet the DB system is associated with.
                  **Subnet Restrictions:**
                  - For 1- and 2-node RAC DB systems, do not use a subnet that overlaps with 192.168.16.16/28
                  These subnets are used by the Oracle Clusterware private interconnect on the database instance.
                  Specifying an overlapping subnet will cause the private interconnect to malfunction.
                  This restriction applies to both the client subnet and backup subnet.
                type: string
              timeZone:
                description: The time zone of the dataguard standby DB system. For
                  details, see DB System Time Zones (https://docs.cloud.oracle.com/Content/Database/References/timezones.htm).
                type: string
              transportType:
                description: |-
                  The redo transport type to use for this Data Guard association.  Valid values depend on the specified `protectionMode`:
                  * MAXIMUM_AVAILABILITY - SYNC or FASTSYNC
                  * MAXIMUM_PERFORMANCE - ASYNC
                  * MAXIMUM_PROTECTION - SYNC
                  For more information, see
                  Redo Transport Services (http://docs.oracle.com/database/122/SBYDB/oracle-data-guard-redo-transport-services.htm#SBYDB00400)
                  in the Oracle Data Guard documentation.
                  **IMPORTANT** - The only transport type currently supported by the Database service is ASYNC.
                type: string
            required:
            - databaseAdminPassword
            - protectionMode
            - transportType
            type: object
          status:
            description: DataGuardAssociationStatus defines the observed state of
              DataGuardAssociation.
            properties:
              applyLag:
                description: |-
                  The lag time between updates to the primary database and application of the redo data on the standby database,
                  as computed by the reporting database.
                  Example: `9 seconds`
                type: string
              applyRate:
                description: |-
                  The rate at which redo logs are synced between the associated databases.
                  Example: `180 Mb per second`
                type: string
              databaseId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the reporting database.
                type: string
              id:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the Data Guard association.
                type: string
              isActiveDataGuardEnabled:
                description: True if active Data Guard is enabled.
                type: boolean
              lifecycleDetails:
                description: Additional information about the current lifecycleState,
                  if available.
                type: string
              lifecycleState:
                description: The current state of the Data Guard association.
                type: string
              peerDataGuardAssociationId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the peer database's Data Guard association.
                type: string
              peerDatabaseId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the associated peer database.
                type: string
              peerDbHomeId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the Database Home containing the associated peer database.
                type: string
              peerDbSystemId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the DB system containing the associated
                  peer database.
                type: string
              peerRole:
                description: The role of the peer database in this Data Guard association.
                type: string
              protectionMode:
                description: |-
                  The protection mode of this Data Guard association. For more information, see
                  Oracle Data Guard Protection Modes (http://docs.oracle.com/database/122/SBYDB/oracle-data-guard-protection-modes.htm#SBYDB02000)
                  in the Oracle Data Guard documentation.
                type: string
              role:
                description: The role of the reporting database in this Data Guard
                  association.
                type: string
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: The date and time the Data Guard association was created.
                type: string
              transportType:
                description: |-
                  The redo transport type used by this Data Guard association.  For more information, see
                  Redo Transport Services (http://docs.oracle.com/database/122/SBYDB/oracle-data-guard-redo-transport-services.htm#SBYDB00400)
                  in the Oracle Data Guard documentation.
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
