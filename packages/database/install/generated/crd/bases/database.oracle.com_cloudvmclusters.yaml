---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: cloudvmclusters.database.oracle.com
spec:
  group: database.oracle.com
  names:
    kind: CloudVmCluster
    listKind: CloudVmClusterList
    plural: cloudvmclusters
    singular: cloudvmcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the CloudVmCluster
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the CloudVmCluster
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: CloudVmCluster is the Schema for the cloudvmclusters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CloudVmClusterSpec defines the desired state of CloudVmCluster.
            properties:
              backupNetworkNsgIds:
                description: A list of the OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the network security groups (NSGs) that the backup network of
                  this DB system belongs to. Setting this to an empty array after
                  the list is created removes the resource from all NSGs. For more
                  information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  Applicable only to Exadata systems.
                items:
                  type: string
                type: array
              backupSubnetId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the backup network subnet associated with the cloud VM cluster.
                type: string
              cloudExadataInfrastructureId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the cloud Exadata infrastructure resource.
                type: string
              clusterName:
                description: The cluster name for cloud VM cluster. The cluster name
                  must begin with an alphabetic character, and may contain hyphens
                  (-). Underscores (_) are not permitted. The cluster name can be
                  no longer than 11 characters and is not case sensitive.
                type: string
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the compartment.
                type: string
              computeNodes:
                description: The list of compute servers to be added to the cloud
                  VM cluster.
                items:
                  type: string
                type: array
              cpuCoreCount:
                description: |-
                  The number of CPU cores to enable for a cloud VM cluster. Valid values depend on the specified shape:
                  - Exadata.Base.48 - Specify a multiple of 2, from 0 to 48.
                  - Exadata.Quarter1.84 - Specify a multiple of 2, from 22 to 84.
                  - Exadata.Half1.168 - Specify a multiple of 4, from 44 to 168.
                  - Exadata.Full1.336 - Specify a multiple of 8, from 88 to 336.
                  - Exadata.Quarter2.92 - Specify a multiple of 2, from 0 to 92.
                  - Exadata.Half2.184 - Specify a multiple of 4, from 0 to 184.
                  - Exadata.Full2.368 - Specify a multiple of 8, from 0 to 368.
                type: integer
              dataCollectionOptions:
                description: CloudVmClusterDataCollectionOptions defines nested fields
                  for CloudVmCluster.DataCollectionOptions.
                properties:
                  isDiagnosticsEventsEnabled:
                    description: Indicates whether diagnostic collection is enabled
                      for the VM cluster/Cloud VM cluster/VMBM DBCS. Enabling diagnostic
                      collection allows you to receive Events service notifications
                      for guest VM issues. Diagnostic collection also allows Oracle
                      to provide enhanced service and proactive support for your Exadata
                      system. You can enable diagnostic collection during VM cluster/Cloud
                      VM cluster provisioning. You can also disable or enable it at
                      any time using the `UpdateVmCluster` or `updateCloudVmCluster`
                      API.
                    type: boolean
                  isHealthMonitoringEnabled:
                    description: |-
                      Indicates whether health monitoring is enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling health monitoring allows Oracle to collect diagnostic data and share it with its operations and support personnel. You may also receive notifications for some events. Collecting health diagnostics enables Oracle to provide proactive support and enhanced service for your system.
                      Optionally enable health monitoring while provisioning a system. You can also disable or enable health monitoring anytime using the `UpdateVmCluster`, `UpdateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                  isIncidentLogsEnabled:
                    description: |-
                      Indicates whether incident logs and trace collection are enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling incident logs collection allows Oracle to receive Events service notifications for guest VM issues, collect incident logs and traces, and use them to diagnose issues and resolve them.
                      Optionally enable incident logs collection while provisioning a system. You can also disable or enable incident logs collection anytime using the `UpdateVmCluster`, `updateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                type: object
              dataStoragePercentage:
                description: |-
                  The percentage assigned to DATA storage (user data and database files).
                  The remaining percentage is assigned to RECO storage (database redo logs, archive logs, and recovery manager backups). Accepted values are 35, 40, 60 and 80. The default is 80 percent assigned to DATA storage. See Storage Configuration (https://docs.cloud.oracle.com/Content/Database/Concepts/exaoverview.htm#Exadata) in the Exadata documentation for details on the impact of the configuration settings on storage.
                type: integer
              dataStorageSizeInTBs:
                description: The data disk group size to be allocated in TBs.
                type: number
              dbNodeStorageSizeInGBs:
                description: The local node storage to be allocated in GBs.
                type: integer
              dbServers:
                description: The list of DB servers.
                items:
                  type: string
                type: array
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                type: object
              displayName:
                description: The user-friendly name for the cloud VM cluster. The
                  name does not need to be unique.
                type: string
              domain:
                description: |-
                  A domain name used for the cloud VM cluster. If the Oracle-provided internet and VCN
                  resolver is enabled for the specified subnet, the domain name for the subnet is used
                  (do not provide one). Otherwise, provide a valid DNS domain name. Hyphens (-) are not permitted.
                  Applies to Exadata Cloud Service instances only.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              giVersion:
                description: A valid Oracle Grid Infrastructure (GI) software version.
                type: string
              hostname:
                description: |-
                  The hostname for the cloud VM cluster. The hostname must begin with an alphabetic character, and
                  can contain alphanumeric characters and hyphens (-). The maximum length of the hostname is 16 characters for bare metal and virtual machine DB systems, and 12 characters for Exadata systems.
                  The maximum length of the combined hostname and domain is 63 characters.
                  **Note:** The hostname must be unique within the subnet. If it is not unique,
                  the cloud VM Cluster will fail to provision.
                type: string
              isLocalBackupEnabled:
                description: If true, database backup on local Exadata storage is
                  configured for the cloud VM cluster. If false, database backup on
                  local Exadata storage is not available in the cloud VM cluster.
                type: boolean
              isSparseDiskgroupEnabled:
                description: If true, the sparse disk group is configured for the
                  cloud VM cluster. If false, the sparse disk group is not created.
                type: boolean
              licenseModel:
                description: The Oracle license model that applies to the cloud VM
                  cluster. The default is BRING_YOUR_OWN_LICENSE.
                type: string
              memorySizeInGBs:
                description: The memory to be allocated in GBs.
                type: integer
              nsgIds:
                description: |-
                  The list of OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) for the network security groups (NSGs) to which this resource belongs. Setting this to an empty list removes all resources from all NSGs. For more information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  **NsgIds restrictions:**
                  - A network security group (NSG) is optional for Autonomous Databases with private access. The nsgIds list can be empty.
                items:
                  type: string
                type: array
              ocpuCount:
                description: The number of OCPU cores to enable for a cloud VM cluster.
                  Only 1 decimal place is allowed for the fractional part.
                type: number
              privateZoneId:
                description: The private zone id in which DNS records need to be created.
                type: string
              scanListenerPortTcp:
                description: The TCP Single Client Access Name (SCAN) port. The default
                  port is 1521.
                type: integer
              scanListenerPortTcpSsl:
                description: The TCPS Single Client Access Name (SCAN) port. The default
                  port is 2484.
                type: integer
              sshPublicKeys:
                description: The public key portion of one or more key pairs used
                  for SSH access to the cloud VM cluster.
                items:
                  type: string
                type: array
              storageSizeInGBs:
                description: The disk group size to be allocated in GBs.
                type: integer
              subnetId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the subnet associated with the cloud VM cluster.
                type: string
              systemVersion:
                description: Operating system version of the image.
                type: string
              timeZone:
                description: The time zone to use for the cloud VM cluster. For details,
                  see Time Zones (https://docs.cloud.oracle.com/Content/Database/References/timezones.htm).
                type: string
              updateDetails:
                description: CloudVmClusterUpdateDetails defines nested fields for
                  CloudVmCluster.UpdateDetails.
                properties:
                  updateAction:
                    description: The update action.
                    type: string
                  updateId:
                    description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                      of the maintenance update.
                    type: string
                type: object
            required:
            - backupSubnetId
            - cloudExadataInfrastructureId
            - compartmentId
            - cpuCoreCount
            - displayName
            - giVersion
            - hostname
            - sshPublicKeys
            - subnetId
            type: object
          status:
            description: CloudVmClusterStatus defines the observed state of CloudVmCluster.
            properties:
              availabilityDomain:
                description: The name of the availability domain that the cloud Exadata
                  infrastructure resource is located in.
                type: string
              backupNetworkNsgIds:
                description: A list of the OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the network security groups (NSGs) that the backup network of
                  this DB system belongs to. Setting this to an empty array after
                  the list is created removes the resource from all NSGs. For more
                  information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  Applicable only to Exadata systems.
                items:
                  type: string
                type: array
              backupSubnetId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the backup network subnet associated with the cloud VM cluster.
                  **Subnet Restriction:** See the subnet restrictions information for **subnetId**.
                type: string
              cloudExadataInfrastructureId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the cloud Exadata infrastructure.
                type: string
              clusterName:
                description: The cluster name for cloud VM cluster. The cluster name
                  must begin with an alphabetic character, and may contain hyphens
                  (-). Underscores (_) are not permitted. The cluster name can be
                  no longer than 11 characters and is not case sensitive.
                type: string
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the compartment.
                type: string
              cpuCoreCount:
                description: The number of CPU cores enabled on the cloud VM cluster.
                type: integer
              dataCollectionOptions:
                description: CloudVmClusterDataCollectionOptions defines nested fields
                  for CloudVmCluster.DataCollectionOptions.
                properties:
                  isDiagnosticsEventsEnabled:
                    description: Indicates whether diagnostic collection is enabled
                      for the VM cluster/Cloud VM cluster/VMBM DBCS. Enabling diagnostic
                      collection allows you to receive Events service notifications
                      for guest VM issues. Diagnostic collection also allows Oracle
                      to provide enhanced service and proactive support for your Exadata
                      system. You can enable diagnostic collection during VM cluster/Cloud
                      VM cluster provisioning. You can also disable or enable it at
                      any time using the `UpdateVmCluster` or `updateCloudVmCluster`
                      API.
                    type: boolean
                  isHealthMonitoringEnabled:
                    description: |-
                      Indicates whether health monitoring is enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling health monitoring allows Oracle to collect diagnostic data and share it with its operations and support personnel. You may also receive notifications for some events. Collecting health diagnostics enables Oracle to provide proactive support and enhanced service for your system.
                      Optionally enable health monitoring while provisioning a system. You can also disable or enable health monitoring anytime using the `UpdateVmCluster`, `UpdateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                  isIncidentLogsEnabled:
                    description: |-
                      Indicates whether incident logs and trace collection are enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling incident logs collection allows Oracle to receive Events service notifications for guest VM issues, collect incident logs and traces, and use them to diagnose issues and resolve them.
                      Optionally enable incident logs collection while provisioning a system. You can also disable or enable incident logs collection anytime using the `UpdateVmCluster`, `updateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                type: object
              dataStoragePercentage:
                description: |-
                  The percentage assigned to DATA storage (user data and database files).
                  The remaining percentage is assigned to RECO storage (database redo logs, archive logs, and recovery manager backups). Accepted values are 35, 40, 60 and 80. The default is 80 percent assigned to DATA storage. See Storage Configuration (https://docs.cloud.oracle.com/Content/Database/Concepts/exaoverview.htm#Exadata) in the Exadata documentation for details on the impact of the configuration settings on storage.
                type: integer
              dataStorageSizeInTBs:
                description: The data disk group size to be allocated in TBs.
                type: number
              dbNodeStorageSizeInGBs:
                description: The local node storage to be allocated in GBs.
                type: integer
              dbServers:
                description: The list of DB servers.
                items:
                  type: string
                type: array
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                type: object
              diskRedundancy:
                description: |-
                  The type of redundancy configured for the cloud Vm cluster.
                  NORMAL is 2-way redundancy.
                  HIGH is 3-way redundancy.
                type: string
              displayName:
                description: The user-friendly name for the cloud VM cluster. The
                  name does not need to be unique.
                type: string
              domain:
                description: The domain name for the cloud VM cluster.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              giVersion:
                description: A valid Oracle Grid Infrastructure (GI) software version.
                type: string
              hostname:
                description: The hostname for the cloud VM cluster.
                type: string
              id:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the cloud VM cluster.
                type: string
              iormConfigCache:
                description: CloudVmClusterIormConfigCache defines nested fields for
                  CloudVmCluster.IormConfigCache.
                properties:
                  dbPlans:
                    description: |-
                      An array of IORM settings for all the database in
                      the Exadata DB system.
                    items:
                      description: CloudVmClusterIormConfigCacheDbPlan defines nested
                        fields for CloudVmCluster.IormConfigCache.DbPlan.
                      properties:
                        dbName:
                          description: The database name. For the default `DbPlan`,
                            the `dbName` is `default`.
                          type: string
                        flashCacheLimit:
                          description: The flash cache limit for this database. This
                            value is internally configured based on the share value
                            assigned to the database.
                          type: string
                        share:
                          description: The relative priority of this database.
                          type: integer
                      type: object
                    type: array
                  lifecycleDetails:
                    description: Additional information about the current `lifecycleState`.
                    type: string
                  lifecycleState:
                    description: The current state of IORM configuration for the Exadata
                      DB system.
                    type: string
                  objective:
                    description: |-
                      The current value for the IORM objective.
                      The default is `AUTO`.
                    type: string
                type: object
              isLocalBackupEnabled:
                description: If true, database backup on local Exadata storage is
                  configured for the cloud VM cluster. If false, database backup on
                  local Exadata storage is not available in the cloud VM cluster.
                type: boolean
              isSparseDiskgroupEnabled:
                description: If true, sparse disk group is configured for the cloud
                  VM cluster. If false, sparse disk group is not created.
                type: boolean
              lastUpdateHistoryEntryId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the last maintenance update history entry. This value is updated
                  when a maintenance update starts.
                type: string
              licenseModel:
                description: The Oracle license model that applies to the cloud VM
                  cluster. The default is LICENSE_INCLUDED.
                type: string
              lifecycleDetails:
                description: Additional information about the current lifecycle state.
                type: string
              lifecycleState:
                description: The current state of the cloud VM cluster.
                type: string
              listenerPort:
                description: The port number configured for the listener on the cloud
                  VM cluster.
                format: int64
                type: integer
              memorySizeInGBs:
                description: The memory to be allocated in GBs.
                type: integer
              nodeCount:
                description: The number of nodes in the cloud VM cluster.
                type: integer
              nsgIds:
                description: |-
                  The list of OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) for the network security groups (NSGs) to which this resource belongs. Setting this to an empty list removes all resources from all NSGs. For more information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  **NsgIds restrictions:**
                  - A network security group (NSG) is optional for Autonomous Databases with private access. The nsgIds list can be empty.
                items:
                  type: string
                type: array
              ocpuCount:
                description: The number of OCPU cores to enable on the cloud VM cluster.
                  Only 1 decimal place is allowed for the fractional part.
                type: number
              scanDnsName:
                description: The FQDN of the DNS record for the SCAN IP addresses
                  that are associated with the cloud VM cluster.
                type: string
              scanDnsRecordId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the DNS record for the SCAN IP addresses that are associated
                  with the cloud VM cluster.
                type: string
              scanIpIds:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the Single Client Access Name (SCAN) IP addresses associated with the cloud VM cluster.
                  SCAN IP addresses are typically used for load balancing and are not assigned to any interface.
                  Oracle Clusterware directs the requests to the appropriate nodes in the cluster.
                  **Note:** For a single-node DB system, this list is empty.
                items:
                  type: string
                type: array
              scanListenerPortTcp:
                description: The TCP Single Client Access Name (SCAN) port. The default
                  port is 1521.
                type: integer
              scanListenerPortTcpSsl:
                description: The TCPS Single Client Access Name (SCAN) port. The default
                  port is 2484.
                type: integer
              shape:
                description: The model name of the Exadata hardware running the cloud
                  VM cluster.
                type: string
              sshPublicKeys:
                description: The public key portion of one or more key pairs used
                  for SSH access to the cloud VM cluster.
                items:
                  type: string
                type: array
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              storageSizeInGBs:
                description: The storage allocation for the disk group, in gigabytes
                  (GB).
                type: integer
              subnetId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the subnet associated with the cloud VM cluster.
                  **Subnet Restrictions:**
                  - For Exadata and virtual machine 2-node RAC systems, do not use a subnet that overlaps with 192.168.128.0/20.
                  These subnets are used by the Oracle Clusterware private interconnect on the database instance.
                  Specifying an overlapping subnet will cause the private interconnect to malfunction.
                  This restriction applies to both the client subnet and backup subnet.
                type: string
              systemTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  System tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                type: object
              systemVersion:
                description: Operating system version of the image.
                type: string
              timeCreated:
                description: The date and time that the cloud VM cluster was created.
                type: string
              timeZone:
                description: The time zone of the cloud VM cluster. For details, see
                  Exadata Infrastructure Time Zones (https://docs.cloud.oracle.com/Content/Database/References/timezones.htm).
                type: string
              vipIds:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the virtual IP (VIP) addresses associated with the cloud VM cluster.
                  The Cluster Ready Services (CRS) creates and maintains one VIP address for each node in the Exadata Cloud Service instance to
                  enable failover. If one node fails, the VIP is reassigned to another active node in the cluster.
                  **Note:** For a single-node DB system, this list is empty.
                items:
                  type: string
                type: array
              zoneId:
                description: The OCID of the zone the cloud VM cluster is associated
                  with.
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
