---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: dbsystems.database.oracle.com
spec:
  group: database.oracle.com
  names:
    kind: DbSystem
    listKind: DbSystemList
    plural: dbsystems
    singular: dbsystem
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the DbSystem
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the DbSystem
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: DbSystem is the Schema for the dbsystems API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DbSystemSpec defines the desired state of DbSystem.
            properties:
              backupNetworkNsgIds:
                description: A list of the OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the network security groups (NSGs) that the backup network of
                  this DB system belongs to. Setting this to an empty array after
                  the list is created removes the resource from all NSGs. For more
                  information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  Applicable only to Exadata systems.
                items:
                  type: string
                type: array
              cpuCoreCount:
                description: The new number of CPU cores to set for the DB system.
                  Not applicable for INTEL based virtual machine DB systems.
                type: integer
              dataCollectionOptions:
                description: DbSystemDataCollectionOptions defines nested fields for
                  DbSystem.DataCollectionOptions.
                properties:
                  isDiagnosticsEventsEnabled:
                    description: Indicates whether diagnostic collection is enabled
                      for the VM cluster/Cloud VM cluster/VMBM DBCS. Enabling diagnostic
                      collection allows you to receive Events service notifications
                      for guest VM issues. Diagnostic collection also allows Oracle
                      to provide enhanced service and proactive support for your Exadata
                      system. You can enable diagnostic collection during VM cluster/Cloud
                      VM cluster provisioning. You can also disable or enable it at
                      any time using the `UpdateVmCluster` or `updateCloudVmCluster`
                      API.
                    type: boolean
                  isHealthMonitoringEnabled:
                    description: |-
                      Indicates whether health monitoring is enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling health monitoring allows Oracle to collect diagnostic data and share it with its operations and support personnel. You may also receive notifications for some events. Collecting health diagnostics enables Oracle to provide proactive support and enhanced service for your system.
                      Optionally enable health monitoring while provisioning a system. You can also disable or enable health monitoring anytime using the `UpdateVmCluster`, `UpdateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                  isIncidentLogsEnabled:
                    description: |-
                      Indicates whether incident logs and trace collection are enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling incident logs collection allows Oracle to receive Events service notifications for guest VM issues, collect incident logs and traces, and use them to diagnose issues and resolve them.
                      Optionally enable incident logs collection while provisioning a system. You can also disable or enable incident logs collection anytime using the `UpdateVmCluster`, `updateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                type: object
              dataStorageSizeInGBs:
                description: The size, in gigabytes, to scale the attached storage
                  up to for this virtual machine DB system. This value must be greater
                  than current storage size. Note that the resulting total storage
                  size attached will be greater than the amount requested to allow
                  for REDO/RECO space and software volume. Applies only to virtual
                  machine DB systems.
                type: integer
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                type: object
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              licenseModel:
                description: The Oracle Database license model that applies to all
                  databases on the DB system. The default is LICENSE_INCLUDED.
                type: string
              maintenanceWindowDetails:
                description: DbSystemMaintenanceWindowDetails defines nested fields
                  for DbSystem.MaintenanceWindowDetails.
                properties:
                  customActionTimeoutInMins:
                    description: |-
                      Determines the amount of time the system will wait before the start of each database server patching operation.
                      Custom action timeout is in minutes and valid value is between 15 to 120 (inclusive).
                    type: integer
                  daysOfWeek:
                    description: Days during the week when maintenance should be performed.
                    items:
                      description: DbSystemMaintenanceWindowDetailsDaysOfWeek defines
                        nested fields for DbSystem.MaintenanceWindowDetails.DaysOfWeek.
                      properties:
                        name:
                          description: Name of the day of the week.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  hoursOfDay:
                    description: |-
                      The window of hours during the day when maintenance should be performed. The window is a 4 hour slot. Valid values are
                      - 0 - represents time slot 0:00 - 3:59 UTC - 4 - represents time slot 4:00 - 7:59 UTC - 8 - represents time slot 8:00 - 11:59 UTC - 12 - represents time slot 12:00 - 15:59 UTC - 16 - represents time slot 16:00 - 19:59 UTC - 20 - represents time slot 20:00 - 23:59 UTC
                    items:
                      type: integer
                    type: array
                  isCustomActionTimeoutEnabled:
                    description: If true, enables the configuration of a custom action
                      timeout (waiting period) between database server patching operations.
                    type: boolean
                  isMonthlyPatchingEnabled:
                    description: If true, enables the monthly patching option.
                    type: boolean
                  leadTimeInWeeks:
                    description: Lead time window allows user to set a lead time to
                      prepare for a down time. The lead time is in weeks and valid
                      value is between 1 to 4.
                    type: integer
                  months:
                    description: Months during the year when maintenance should be
                      performed.
                    items:
                      description: DbSystemMaintenanceWindowDetailsMonth defines nested
                        fields for DbSystem.MaintenanceWindowDetails.Month.
                      properties:
                        name:
                          description: Name of the month of the year.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  patchingMode:
                    description: |-
                      Cloud Exadata infrastructure node patching method, either "ROLLING" or "NONROLLING". Default value is ROLLING.
                      *IMPORTANT*: Non-rolling infrastructure patching involves system down time. See Oracle-Managed Infrastructure Maintenance Updates (https://docs.cloud.oracle.com/iaas/Content/Database/Concepts/examaintenance.htm#Oracle) for more information.
                    type: string
                  preference:
                    description: The maintenance window scheduling preference.
                    type: string
                  weeksOfMonth:
                    description: |-
                      Weeks during the month when maintenance should be performed. Weeks start on the 1st, 8th, 15th, and 22nd days of the month, and have a duration of 7 days. Weeks start and end based on calendar dates, not days of the week.
                      For example, to allow maintenance during the 2nd week of the month (from the 8th day to the 14th day of the month), use the value 2. Maintenance cannot be scheduled for the fifth week of months that contain more than 28 days.
                      Note that this parameter works in conjunction with the  daysOfWeek and hoursOfDay parameters to allow you to specify specific days of the week and hours that maintenance will be performed.
                    items:
                      type: integer
                    type: array
                type: object
              nsgIds:
                description: |-
                  The list of OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) for the network security groups (NSGs) to which this resource belongs. Setting this to an empty list removes all resources from all NSGs. For more information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  **NsgIds restrictions:**
                  - A network security group (NSG) is optional for Autonomous Databases with private access. The nsgIds list can be empty.
                items:
                  type: string
                type: array
              recoStorageSizeInGBs:
                description: The size, in gigabytes, to scale the attached RECO storage
                  up to for this virtual machine DB system. This value must be greater
                  than current storage size. Note that the resulting total storage
                  size attached will be greater than the amount requested to allow
                  for the software volume. Applies only to virtual machine DB systems.
                type: integer
              shape:
                description: |-
                  The shape of the DB system. The shape determines resources allocated to the DB system.
                  - For virtual machine shapes, the number of CPU cores and memory
                  To get a list of shapes, use the ListDbSystemShapes operation.
                type: string
              sshPublicKeys:
                description: The public key portion of the key pair to use for SSH
                  access to the DB system. Multiple public keys can be provided. The
                  length of the combined keys cannot exceed 40,000 characters.
                items:
                  type: string
                type: array
              version:
                description: DbSystemVersion defines nested fields for DbSystem.Version.
                properties:
                  action:
                    description: The action to perform on the patch.
                    type: string
                  databaseSoftwareImageId:
                    description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                      of the database software image.
                    type: string
                  patchId:
                    description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                      of the patch.
                    type: string
                type: object
            type: object
          status:
            description: DbSystemStatus defines the observed state of DbSystem.
            properties:
              availabilityDomain:
                description: The name of the availability domain that the DB system
                  is located in.
                type: string
              backupNetworkNsgIds:
                description: A list of the OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the network security groups (NSGs) that the backup network of
                  this DB system belongs to. Setting this to an empty array after
                  the list is created removes the resource from all NSGs. For more
                  information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  Applicable only to Exadata systems.
                items:
                  type: string
                type: array
              backupSubnetId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the backup network subnet the DB system is associated with. Applicable only to Exadata DB systems.
                  **Subnet Restriction:** See the subnet restrictions information for **subnetId**.
                type: string
              clusterName:
                description: The cluster name for Exadata and 2-node RAC virtual machine
                  DB systems. The cluster name must begin with an alphabetic character,
                  and may contain hyphens (-). Underscores (_) are not permitted.
                  The cluster name can be no longer than 11 characters and is not
                  case sensitive.
                type: string
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the compartment.
                type: string
              cpuCoreCount:
                description: The number of CPU cores enabled on the DB system.
                type: integer
              dataCollectionOptions:
                description: DbSystemDataCollectionOptions defines nested fields for
                  DbSystem.DataCollectionOptions.
                properties:
                  isDiagnosticsEventsEnabled:
                    description: Indicates whether diagnostic collection is enabled
                      for the VM cluster/Cloud VM cluster/VMBM DBCS. Enabling diagnostic
                      collection allows you to receive Events service notifications
                      for guest VM issues. Diagnostic collection also allows Oracle
                      to provide enhanced service and proactive support for your Exadata
                      system. You can enable diagnostic collection during VM cluster/Cloud
                      VM cluster provisioning. You can also disable or enable it at
                      any time using the `UpdateVmCluster` or `updateCloudVmCluster`
                      API.
                    type: boolean
                  isHealthMonitoringEnabled:
                    description: |-
                      Indicates whether health monitoring is enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling health monitoring allows Oracle to collect diagnostic data and share it with its operations and support personnel. You may also receive notifications for some events. Collecting health diagnostics enables Oracle to provide proactive support and enhanced service for your system.
                      Optionally enable health monitoring while provisioning a system. You can also disable or enable health monitoring anytime using the `UpdateVmCluster`, `UpdateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                  isIncidentLogsEnabled:
                    description: |-
                      Indicates whether incident logs and trace collection are enabled for the VM cluster / Cloud VM cluster / VMBM DBCS. Enabling incident logs collection allows Oracle to receive Events service notifications for guest VM issues, collect incident logs and traces, and use them to diagnose issues and resolve them.
                      Optionally enable incident logs collection while provisioning a system. You can also disable or enable incident logs collection anytime using the `UpdateVmCluster`, `updateCloudVmCluster` or `updateDbsystem` API.
                    type: boolean
                type: object
              dataStoragePercentage:
                description: |-
                  The percentage assigned to DATA storage (user data and database files).
                  The remaining percentage is assigned to RECO storage (database redo logs, archive logs, and recovery manager backups). Accepted values are 40 and 80. The default is 80 percent assigned to DATA storage. Not applicable for virtual machine DB systems.
                type: integer
              dataStorageSizeInGBs:
                description: The data storage size, in gigabytes, that is currently
                  available to the DB system. Applies only for virtual machine DB
                  systems.
                type: integer
              databaseEdition:
                description: The Oracle Database edition that applies to all the databases
                  on the DB system.
                type: string
              dbSystemOptions:
                description: DbSystemOptions defines nested fields for DbSystem.DbSystemOptions.
                properties:
                  storageManagement:
                    description: |-
                      The storage option used in DB system.
                      ASM - Automatic storage management
                      LVM - Logical Volume management
                    type: string
                type: object
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                type: object
              diskRedundancy:
                description: |-
                  The type of redundancy configured for the DB system.
                  NORMAL is 2-way redundancy.
                  HIGH is 3-way redundancy.
                type: string
              displayName:
                description: The user-friendly name for the DB system. The name does
                  not have to be unique.
                type: string
              domain:
                description: The domain name for the DB system.
                type: string
              faultDomains:
                description: List of the Fault Domains in which this DB system is
                  provisioned.
                items:
                  type: string
                type: array
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              hostname:
                description: The hostname for the DB system.
                type: string
              id:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the DB system.
                type: string
              iormConfigCache:
                description: DbSystemIormConfigCache defines nested fields for DbSystem.IormConfigCache.
                properties:
                  dbPlans:
                    description: |-
                      An array of IORM settings for all the database in
                      the Exadata DB system.
                    items:
                      description: DbSystemIormConfigCacheDbPlan defines nested fields
                        for DbSystem.IormConfigCache.DbPlan.
                      properties:
                        dbName:
                          description: The database name. For the default `DbPlan`,
                            the `dbName` is `default`.
                          type: string
                        flashCacheLimit:
                          description: The flash cache limit for this database. This
                            value is internally configured based on the share value
                            assigned to the database.
                          type: string
                        share:
                          description: The relative priority of this database.
                          type: integer
                      type: object
                    type: array
                  lifecycleDetails:
                    description: Additional information about the current `lifecycleState`.
                    type: string
                  lifecycleState:
                    description: The current state of IORM configuration for the Exadata
                      DB system.
                    type: string
                  objective:
                    description: |-
                      The current value for the IORM objective.
                      The default is `AUTO`.
                    type: string
                type: object
              kmsKeyId:
                description: The OCID of the key container that is used as the master
                  encryption key in database transparent data encryption (TDE) operations.
                type: string
              lastMaintenanceRunId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the last maintenance run.
                type: string
              lastPatchHistoryEntryId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the last patch history. This value is updated as soon as a patch
                  operation starts.
                type: string
              licenseModel:
                description: The Oracle license model that applies to all the databases
                  on the DB system. The default is LICENSE_INCLUDED.
                type: string
              lifecycleDetails:
                description: Additional information about the current lifecycle state.
                type: string
              lifecycleState:
                description: The current state of the DB system.
                type: string
              listenerPort:
                description: The port number configured for the listener on the DB
                  system.
                type: integer
              maintenanceWindow:
                description: DbSystemMaintenanceWindow defines nested fields for DbSystem.MaintenanceWindow.
                properties:
                  customActionTimeoutInMins:
                    description: |-
                      Determines the amount of time the system will wait before the start of each database server patching operation.
                      Custom action timeout is in minutes and valid value is between 15 to 120 (inclusive).
                    type: integer
                  daysOfWeek:
                    description: Days during the week when maintenance should be performed.
                    items:
                      description: DbSystemMaintenanceWindowDaysOfWeek defines nested
                        fields for DbSystem.MaintenanceWindow.DaysOfWeek.
                      properties:
                        name:
                          description: Name of the day of the week.
                          type: string
                      type: object
                    type: array
                  hoursOfDay:
                    description: |-
                      The window of hours during the day when maintenance should be performed. The window is a 4 hour slot. Valid values are
                      - 0 - represents time slot 0:00 - 3:59 UTC - 4 - represents time slot 4:00 - 7:59 UTC - 8 - represents time slot 8:00 - 11:59 UTC - 12 - represents time slot 12:00 - 15:59 UTC - 16 - represents time slot 16:00 - 19:59 UTC - 20 - represents time slot 20:00 - 23:59 UTC
                    items:
                      type: integer
                    type: array
                  isCustomActionTimeoutEnabled:
                    description: If true, enables the configuration of a custom action
                      timeout (waiting period) between database server patching operations.
                    type: boolean
                  isMonthlyPatchingEnabled:
                    description: If true, enables the monthly patching option.
                    type: boolean
                  leadTimeInWeeks:
                    description: Lead time window allows user to set a lead time to
                      prepare for a down time. The lead time is in weeks and valid
                      value is between 1 to 4.
                    type: integer
                  months:
                    description: Months during the year when maintenance should be
                      performed.
                    items:
                      description: DbSystemMaintenanceWindowMonth defines nested fields
                        for DbSystem.MaintenanceWindow.Month.
                      properties:
                        name:
                          description: Name of the month of the year.
                          type: string
                      type: object
                    type: array
                  patchingMode:
                    description: |-
                      Cloud Exadata infrastructure node patching method, either "ROLLING" or "NONROLLING". Default value is ROLLING.
                      *IMPORTANT*: Non-rolling infrastructure patching involves system down time. See Oracle-Managed Infrastructure Maintenance Updates (https://docs.cloud.oracle.com/iaas/Content/Database/Concepts/examaintenance.htm#Oracle) for more information.
                    type: string
                  preference:
                    description: The maintenance window scheduling preference.
                    type: string
                  weeksOfMonth:
                    description: |-
                      Weeks during the month when maintenance should be performed. Weeks start on the 1st, 8th, 15th, and 22nd days of the month, and have a duration of 7 days. Weeks start and end based on calendar dates, not days of the week.
                      For example, to allow maintenance during the 2nd week of the month (from the 8th day to the 14th day of the month), use the value 2. Maintenance cannot be scheduled for the fifth week of months that contain more than 28 days.
                      Note that this parameter works in conjunction with the  daysOfWeek and hoursOfDay parameters to allow you to specify specific days of the week and hours that maintenance will be performed.
                    items:
                      type: integer
                    type: array
                type: object
              memorySizeInGBs:
                description: Memory allocated to the DB system, in gigabytes.
                type: integer
              nextMaintenanceRunId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the next maintenance run.
                type: string
              nodeCount:
                description: The number of nodes in the DB system. For RAC DB systems,
                  the value is greater than 1.
                type: integer
              nsgIds:
                description: |-
                  The list of OCIDs (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) for the network security groups (NSGs) to which this resource belongs. Setting this to an empty list removes all resources from all NSGs. For more information about NSGs, see Security Rules (https://docs.cloud.oracle.com/Content/Network/Concepts/securityrules.htm).
                  **NsgIds restrictions:**
                  - A network security group (NSG) is optional for Autonomous Databases with private access. The nsgIds list can be empty.
                items:
                  type: string
                type: array
              osVersion:
                description: The most recent OS Patch Version applied on the DB system.
                type: string
              pointInTimeDataDiskCloneTimestamp:
                description: The point in time for a cloned database system when the
                  data disks were cloned from the source database system, as described
                  in RFC 3339 (https://tools.ietf.org/rfc/rfc3339).
                type: string
              recoStorageSizeInGB:
                description: The RECO/REDO storage size, in gigabytes, that is currently
                  allocated to the DB system. Applies only for virtual machine DB
                  systems.
                type: integer
              scanDnsName:
                description: The FQDN of the DNS record for the SCAN IP addresses
                  that are associated with the DB system.
                type: string
              scanDnsRecordId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the DNS record for the SCAN IP addresses that are associated
                  with the DB system.
                type: string
              scanIpIds:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the Single Client Access Name (SCAN) IP addresses associated with the DB system.
                  SCAN IP addresses are typically used for load balancing and are not assigned to any interface.
                  Oracle Clusterware directs the requests to the appropriate nodes in the cluster.
                  **Note:** For a single-node DB system, this list is empty.
                items:
                  type: string
                type: array
              shape:
                description: |-
                  The shape of the DB system. The shape determines resources to allocate to the DB system.
                  - For virtual machine shapes, the number of CPU cores and memory
                  - For bare metal and Exadata shapes, the number of CPU cores, storage, and memory
                type: string
              sourceDbSystemId:
                description: The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm)
                  of the DB system.
                type: string
              sparseDiskgroup:
                description: True, if Sparse Diskgroup is configured for Exadata dbsystem,
                  False, if Sparse diskgroup was not configured.
                type: boolean
              sshPublicKeys:
                description: The public key portion of one or more key pairs used
                  for SSH access to the DB system.
                items:
                  type: string
                type: array
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              storageVolumePerformanceMode:
                description: The block storage volume performance level. Valid values
                  are `BALANCED` and `HIGH_PERFORMANCE`. See Block Volume Performance
                  (https://docs.cloud.oracle.com/Content/Block/Concepts/blockvolumeperformance.htm)
                  for more information.
                type: string
              subnetId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the subnet the DB system is associated with.
                  **Subnet Restrictions:**
                  - For bare metal DB systems and for single node virtual machine DB systems, do not use a subnet that overlaps with 192.168.16.16/28.
                  - For Exadata and virtual machine 2-node RAC DB systems, do not use a subnet that overlaps with 192.168.128.0/20.
                  These subnets are used by the Oracle Clusterware private interconnect on the database instance.
                  Specifying an overlapping subnet will cause the private interconnect to malfunction.
                  This restriction applies to both the client subnet and backup subnet.
                type: string
              timeCreated:
                description: The date and time the DB system was created.
                type: string
              timeZone:
                description: The time zone of the DB system. For details, see DB System
                  Time Zones (https://docs.cloud.oracle.com/Content/Database/References/timezones.htm).
                type: string
              version:
                description: The Oracle Database version of the DB system.
                type: string
              vipIds:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/Content/General/Concepts/identifiers.htm) of the virtual IP (VIP) addresses associated with the DB system.
                  The Cluster Ready Services (CRS) creates and maintains one VIP address for each node in the DB system to
                  enable failover. If one node fails, the VIP is reassigned to another active node in the cluster.
                  **Note:** For a single-node DB system, this list is empty.
                items:
                  type: string
                type: array
              zoneId:
                description: The OCID of the zone the DB system is associated with.
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
