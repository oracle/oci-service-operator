---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - vault.oracle.com
  resources:
  - secrets
  - secretversions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vault.oracle.com
  resources:
  - secrets/finalizers
  - secretversions/finalizers
  verbs:
  - update
- apiGroups:
  - vault.oracle.com
  resources:
  - secrets/status
  - secretversions/status
  verbs:
  - get
  - patch
  - update
