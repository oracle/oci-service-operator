---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - governancerulescontrolplane.oracle.com
  resources:
  - governancerules
  - inclusioncriterions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - governancerulescontrolplane.oracle.com
  resources:
  - governancerules/finalizers
  - inclusioncriterions/finalizers
  verbs:
  - update
- apiGroups:
  - governancerulescontrolplane.oracle.com
  resources:
  - governancerules/status
  - inclusioncriterions/status
  verbs:
  - get
  - patch
  - update
