    controller-gen.kubebuilder.io/version: v0.17.0
  name: drprotectiongroups.disasterrecovery.oracle.com
spec:
  group: disasterrecovery.oracle.com
  names:
    kind: DrProtectionGroup
    listKind: DrProtectionGroupList
    plural: drprotectiongroups
    singular: drprotectiongroup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the DrProtectionGroup
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the DrProtectionGroup
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: DrProtectionGroup is the Schema for the drprotectiongroups API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DrProtectionGroupSpec defines the desired state of DrProtectionGroup.
            properties:
              association:
                description: DrProtectionGroupAssociation defines nested fields for
                  DrProtectionGroup.Association.
                properties:
                  peerId:
                    description: |-
                      The OCID of the peer DR protection group.
                      Example: `ocid1.drprotectiongroup.oc1..uniqueID`
                    type: string
                  peerRegion:
                    description: |-
                      The region of the peer DR protection group.
                      Example: `us-ashburn-1`
                    type: string
                  role:
                    description: |-
                      The role of the DR protection group.
                      Example: `STANDBY`
                    type: string
                required:
                - role
                type: object
              compartmentId:
                description: |-
                  The OCID of the compartment in which to create the DR protection group.
                  Example: `ocid1.compartment.oc1..uniqueID`
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  The display name of the DR protection group.
                  Example: `EBS PHX Group`
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Simple key-value pair that is applied without any predefined name, type or scope. Exists for cross-compatibility only.
                  Example: `{"Department": "Finance"}`
                type: object
              lifecycleState:
                description: |-
                  Optional exact-match filter used to narrow list-based binding and delete confirmation reads.
                  Supported values include `CREATING`, `ACTIVE`, `UPDATING`, `INACTIVE`, `NEEDS_ATTENTION`, `DELETING`, `DELETED`, and `FAILED`.
                type: string
              lifecycleSubState:
                description: |-
                  Optional exact-match filter used to narrow list-based binding and delete confirmation reads.
                  Supported values include `DR_DRILL_IN_PROGRESS`, `DR_PLAN_EXECUTION_IN_PROGRESS`, and `AUTOMATIC_DR_PLAN_EXECUTION_IN_PROGRESS`.
                type: string
              logLocation:
                description: DrProtectionGroupLogLocation defines nested fields for
                  DrProtectionGroup.LogLocation.
                properties:
                  bucket:
                    description: |-
                      The bucket name inside the object storage namespace.
                      Example: `operation_logs`
                    type: string
                  namespace:
                    description: |-
                      The namespace in object storage (Note - this is usually the tenancy name).
                      Example: `myocitenancy`
                    type: string
                required:
                - bucket
                - namespace
                type: object
              members:
                description: A list of DR protection group members.
                items:
                  description: DrProtectionGroupMember defines nested fields for DrProtectionGroup.Member.
                  properties:
                    autonomousDatabaseStandbyTypeForDrDrills:
                      description: |-
                        This specifies the mechanism used to create a temporary Autonomous Database instance for DR Drills.
                        See https://docs.oracle.com/en/cloud/paas/autonomous-database/serverless/adbsb/autonomous-clone-about.html for information about these clone types.
                        See https://docs.oracle.com/en/cloud/paas/autonomous-database/serverless/adbsb/autonomous-data-guard-snapshot-standby.html for information about snapshot standby.
                      type: string
                    backendSetMappings:
                      description: A list of backend set mappings that are used to
                        transfer or update backends during DR.
                      items:
                        description: DrProtectionGroupMemberBackendSetMapping defines
                          nested fields for DrProtectionGroup.Member.BackendSetMapping.
                        properties:
                          destinationBackendSetName:
                            description: |-
                              The name of the destination backend set.
                              Example: `Destination-BackendSet-1`
                            type: string
                          isBackendSetForNonMovable:
                            description: |-
                              This flag specifies if this backend set is used for traffic for non-movable compute instances.
                              Backend sets that point to non-movable instances are only enabled or disabled during DR, their contents
                              are not altered. For non-movable instances this flag should be set to 'true'.
                              Backend sets that point to movable instances are emptied and their contents are transferred to the
                              destination region load balancer.  For movable instances this flag should be set to 'false'.
                              Example: `true`
                            type: boolean
                          sourceBackendSetName:
                            description: |-
                              The name of the source backend set.
                              Example: `Source-BackendSet-1`
                            type: string
                        required:
                        - destinationBackendSetName
                        - isBackendSetForNonMovable
                        - sourceBackendSetName
                        type: object
                      type: array
                    backupConfig:
                      description: DrProtectionGroupMemberBackupConfig defines nested
                        fields for DrProtectionGroup.Member.BackupConfig.
                      properties:
                        backupSchedule:
                          description: |-
                            The schedule for backing up namespaces to the destination region. If a backup schedule is not specified, only a single backup will be created.
                            This format of the string specifying the backup schedule must conform with RFC-5545 (see examples below).
                            This schedule will use the UTC timezone.
                            This property applies to the OKE cluster member in primary region.
                            The backup frequency can be HOURLY, DAILY, WEEKLY or MONTHLY, and the upper and lower interval bounds are as follows
                              HOURLY
                                - Minimum = 1
                                - Maximum = 24
                              DAILY
                                - Minimum = 1
                                - Maximum = 30
                              WEEKLY
                                - Minimum = 1
                                - Maximum = 1
                              MONTHLY
                                - Minimum = 1
                                - Maximum = 12
                            Examples:
                                    FREQ=WEEKLY;BYDAY=MO,WE;BYHOUR=10;INTERVAL=1 -> Run a backup every Monday and Wednesday at 10:00 AM.
                                    FREQ=WEEKLY;BYDAY=MO,WE;BYHOUR=10;INTERVAL=2 -> Invalid configuration (Cannot specify an interval of 2).
                                    FREQ=HOURLY;INTERVAL=25 -> Invalid configuration (Cannot specify an interval of 25).
                                    FREQ=HOURLY;INTERVAL=0 -> Invalid configuration (Cannot specify an interval of 0).
                                    FREQ=HOURLY;INTERVAL=24 -> Run a backup every 24 hours.
                                    FREQ=HOURLY;INTERVAL=1 -> Run a backup every hour.
                                    FREQ=HOURLY;BYMINUTE=30;INTERVAL=15 -> Run a backup every 15 hours at the 30th minute.

                                    FREQ=DAILY;INTERVAL=31 -> Invalid configuration (Cannot specify an interval of 31).
                                    FREQ=DAILY;INTERVAL=0 -> Invalid configuration (Cannot specify an interval of 0).
                                    FREQ=DAILY;INTERVAL=30 -> Run a backup every 30 days at 12:00 midnight.
                                    FREQ=DAILY;BYHOUR=17;BYMINUTE=10;INTERVAL=1 -> Run a backup daily at 05:10 PM.
                          type: string
                        excludeNamespaces:
                          description: |-
                            A list of namespaces to be excluded from the backup.
                            The default value is null. If a list of namespaces to exclude is not provided, all namespaces will be backed up.
                            Specify either the `namespaces` or the `excludeNamespaces` parameter, but not both.
                            This property applies to OKE cluster members in the primary region.
                            Example: ["namespace_string_3", "namespace_string_4"]
                          items:
                            type: string
                          type: array
                        imageReplicationVaultSecretId:
                          description: |-
                            The OCID of the vault secret that stores the image credential.
                            This property applies to the OKE cluster member in both the primary and standby region.
                          type: string
                        maxNumberOfBackupsRetained:
                          description: |-
                            The maximum number of backups that should be retained.
                            This property applies to the OKE cluster member in primary region.
                          type: integer
                        namespaces:
                          description: |-
                            A list of namespaces to be included in the backup.
                            The default value is null. If a list of namespaces to include is not provided, all namespaces will be backed up.
                            Specify either the `namespaces` or the `excludeNamespaces` parameter, but not both.
                            This property applies to the OKE cluster member in primary region.
                            Example: ["default", "pv-nginx"]
                          items:
                            type: string
                          type: array
                        replicateImages:
                          description: |-
                            Controls the behaviour of image replication across regions.
                            Image replication is enabled by default for DR Protection Groups with a primary role.
                            This property applies to the OKE cluster member in primary region.
                          type: string
                      type: object
                    backupLocation:
                      description: DrProtectionGroupMemberBackupLocation defines nested
                        fields for DrProtectionGroup.Member.BackupLocation.
                      properties:
                        bucket:
                          description: |-
                            The bucket name inside the object storage namespace.
                            Example: `operation_logs`
                          type: string
                        namespace:
                          description: |-
                            The namespace in the object storage bucket location (Note - this is usually the tenancy name).
                            Example: `myocitenancy`
                          type: string
                      type: object
                    blockVolumeAttachAndMountOperations:
                      description: DrProtectionGroupMemberBlockVolumeAttachAndMountOperations
                        defines nested fields for DrProtectionGroup.Member.BlockVolumeAttachAndMountOperations.
                      properties:
                        attachments:
                          description: A list of details of attach or detach operations
                            performed on block volumes.
                          items:
                            description: DrProtectionGroupMemberBlockVolumeAttachAndMountOperationsAttachment
                              defines nested fields for DrProtectionGroup.Member.BlockVolumeAttachAndMountOperations.Attachment.
                            properties:
                              blockVolumeId:
                                description: |-
                                  The OCID of the block volume.
                                  Example: `ocid1.volume.oc1..uniqueID`
                                type: string
                              volumeAttachmentReferenceInstanceId:
                                description: |-
                                  The OCID of the reference compute instance needed to obtain the volume attachment details.
                                  This reference compute instance belongs to the peer DR protection group.
                                  Example: `ocid1.instance.oc1..uniqueID`
                                type: string
                            required:
                            - blockVolumeId
                            type: object
                          type: array
                        mounts:
                          description: A list of details of mount operations performed
                            on block volumes.
                          items:
                            description: DrProtectionGroupMemberBlockVolumeAttachAndMountOperationsMount
                              defines nested fields for DrProtectionGroup.Member.BlockVolumeAttachAndMountOperations.Mount.
                            properties:
                              mountPoint:
                                description: |-
                                  The physical mount point where the file system is mounted on the block volume.
                                  Example: `/mnt/yourmountpoint`
                                type: string
                            required:
                            - mountPoint
                            type: object
                          type: array
                      type: object
                    blockVolumeOperations:
                      description: |-
                        Deprecated. Use the 'blockVolumeAttachAndMountOperations' attribute instead of this.
                        A list of operations performed on block volumes used by the compute instance.
                      items:
                        description: DrProtectionGroupMemberBlockVolumeOperation defines
                          nested fields for DrProtectionGroup.Member.BlockVolumeOperation.
                        properties:
                          attachmentDetails:
                            description: DrProtectionGroupMemberBlockVolumeOperationAttachmentDetails
                              defines nested fields for DrProtectionGroup.Member.BlockVolumeOperation.AttachmentDetails.
                            properties:
                              volumeAttachmentReferenceInstanceId:
                                description: |-
                                  The OCID of the reference compute instance needed to obtain the volume attachment details.
                                  This reference compute instance belongs to the peer DR protection group.
                                  Example: `ocid1.instance.oc1..uniqueID`
                                type: string
                            type: object
                          blockVolumeId:
                            description: |-
                              The OCID of the block volume.
                              Example: `ocid1.volume.oc1..uniqueID`
                            type: string
                          mountDetails:
                            description: DrProtectionGroupMemberBlockVolumeOperationMountDetails
                              defines nested fields for DrProtectionGroup.Member.BlockVolumeOperation.MountDetails.
                            properties:
                              mountPoint:
                                description: |-
                                  The physical mount point where the file system is mounted on the block volume.
                                  Example: `/mnt/yourmountpoint`
                                type: string
                            type: object
                        required:
                        - blockVolumeId
                        type: object
                      type: array
                    bucketName:
                      description: |-
                        The bucket name inside the object storage namespace.
                        Example: `bucket_name`
                      type: string
                    commonDestinationKey:
                      description: DrProtectionGroupMemberCommonDestinationKey defines
                        nested fields for DrProtectionGroup.Member.CommonDestinationKey.
                      properties:
                        encryptionKeyId:
                          description: |-
                            The OCID of the customer-managed encryption key in the destination region vault.
                            Example: `ocid1.key.oc1..uniqueID`
                          type: string
                        vaultId:
                          description: |-
                            The OCID of the destination region vault for the customer-managed encryption key.
                            Example: `ocid1.vault.oc1..uniqueID`
                          type: string
                      required:
                      - encryptionKeyId
                      - vaultId
                      type: object
                    connectionStringType:
                      description: |-
                        The type of connection strings used to connect to an Autonomous Container Database snapshot standby created during a DR Drill operation.
                        See https://docs.oracle.com/en/cloud/paas/autonomous-database/dedicated/adbcl/index.html for information about these service types.
                      type: string
                    dbSystemAdminUserDetails:
                      description: DrProtectionGroupMemberDbSystemAdminUserDetails
                        defines nested fields for DrProtectionGroup.Member.DbSystemAdminUserDetails.
                      properties:
                        passwordVaultSecretId:
                          description: |-
                            The OCID of the vault secret where the HeatWave MySQL DB System password is stored.
                            Example: `ocid1.vaultsecret.oc1..uniqueID`
                          type: string
                        username:
                          description: |-
                            The user name for connecting to the HeatWave MySQL DB System node.
                            Example: `user`
                          type: string
                      required:
                      - passwordVaultSecretId
                      - username
                      type: object
                    dbSystemReplicationUserDetails:
                      description: DrProtectionGroupMemberDbSystemReplicationUserDetails
                        defines nested fields for DrProtectionGroup.Member.DbSystemReplicationUserDetails.
                      properties:
                        passwordVaultSecretId:
                          description: |-
                            The OCID of the vault secret where the HeatWave MySQL DB System password is stored.
                            Example: `ocid1.vaultsecret.oc1..uniqueID`
                          type: string
                        username:
                          description: |-
                            The user name for connecting to the HeatWave MySQL DB System node.
                            Example: `user`
                          type: string
                      required:
                      - passwordVaultSecretId
                      - username
                      type: object
                    destinationAvailabilityDomain:
                      description: |-
                        The availability domain of the destination mount target.
                        Example: `BBTh:region-AD`
                      type: string
                    destinationBackupPolicyId:
                      description: |-
                        The OCID of the backup policy to use in the destination region. This policy will be used to create backups
                        for this volume group after it moves the destination region.
                        Example: `ocid1.volumebackuppolicy.oc1..uniqueID`
                      type: string
                    destinationCapacityReservationId:
                      description: |-
                        The OCID of a capacity reservation in the destination region which will be used to launch
                        the compute instance.
                        Example: `ocid1.capacityreservation.oc1..uniqueID`
                      type: string
                    destinationCompartmentId:
                      description: |-
                        The OCID of a compartment in the destination region in which the file system should be launched.
                        Example: `ocid1.compartment.oc1..uniqueID`
                      type: string
                    destinationDedicatedVmHostId:
                      description: |-
                        The OCID of a dedicated VM host in the destination region where the compute instance
                        should be launched.
                        Example: `ocid1.dedicatedvmhost.oc1..uniqueID`
                      type: string
                    destinationEncryptionKey:
                      description: DrProtectionGroupMemberDestinationEncryptionKey
                        defines nested fields for DrProtectionGroup.Member.DestinationEncryptionKey.
                      properties:
                        encryptionKeyId:
                          description: |-
                            The OCID of the customer-managed encryption key in the destination region vault.
                            Example: `ocid1.key.oc1..uniqueID`
                          type: string
                        vaultId:
                          description: |-
                            The OCID of the destination region vault for the customer-managed encryption key.
                            Example: `ocid1.vault.oc1..uniqueID`
                          type: string
                      required:
                      - encryptionKeyId
                      - vaultId
                      type: object
                    destinationLoadBalancerId:
                      description: |-
                        The OCID of the destination load balancer.
                        Example: `ocid1.loadbalancer.oc1..uniqueID`
                      type: string
                    destinationNetworkLoadBalancerId:
                      description: |-
                        The OCID of the destination network load balancer.
                        Example: `ocid1.networkloadbalancer.oc1..uniqueID`
                      type: string
                    destinationSnapshotPolicyId:
                      description: |-
                        The OCID of the snapshot policy to use in the destination region. This policy will be attached to the file system after it moves to the destination region.
                        Example: `ocid1.filesystemsnapshotpolicy.oc1..uniqueID`
                      type: string
                    exportMappings:
                      description: A list of mappings between file system exports
                        in the primary region and mount targets in the standby region.
                      items:
                        description: DrProtectionGroupMemberExportMapping defines
                          nested fields for DrProtectionGroup.Member.ExportMapping.
                        properties:
                          destinationMountTargetId:
                            description: |-
                              The OCID of the destination mount target in the destination region which is used to export the file system.
                              Example: `ocid1.mounttarget.oc1..uniqueID`
                            type: string
                          exportId:
                            description: |-
                              The OCID of the export path in the primary region used to mount or unmount the file system.
                              Example: `ocid1.export.oc1..uniqueID`
                            type: string
                        required:
                        - destinationMountTargetId
                        - exportId
                        type: object
                      type: array
                    fileSystemOperations:
                      description: A list of operations performed on file systems
                        used by the compute instance.
                      items:
                        description: DrProtectionGroupMemberFileSystemOperation defines
                          nested fields for DrProtectionGroup.Member.FileSystemOperation.
                        properties:
                          exportPath:
                            description: |-
                              The export path of the file system.
                              Example: `/fs-export-path`
                            type: string
                          mountDetails:
                            description: DrProtectionGroupMemberFileSystemOperationMountDetails
                              defines nested fields for DrProtectionGroup.Member.FileSystemOperation.MountDetails.
                            properties:
                              mountTargetId:
                                description: |-
                                  The OCID of the mount target for this file system.
                                  Example: `ocid1.mounttarget.oc1..uniqueID`
                                type: string
                            type: object
                          mountPoint:
                            description: |-
                              The physical mount point of the file system on a host.
                              Example: `/mnt/yourmountpoint`
                            type: string
                          unmountDetails:
                            description: DrProtectionGroupMemberFileSystemOperationUnmountDetails
                              defines nested fields for DrProtectionGroup.Member.FileSystemOperation.UnmountDetails.
                            properties:
                              mountTargetId:
                                description: |-
                                  The OCID of the mount target.
                                  Example: `ocid1.mounttarget.oc1..uniqueID`
                                type: string
                            type: object
                        required:
                        - exportPath
                        - mountDetails
                        - mountPoint
                        - unmountDetails
                        type: object
                      type: array
                    gtidReconciliationTimeout:
                      description: |-
                        The maximum time (in seconds) to wait for the Global Transaction Identifier (GTID) synchronization process to complete before timing out.
                        Example: `600`
                      type: integer
                    isContinueOnGtidReconciliationTimeout:
                      description: |-
                        A flag indicating whether to continue with DR operation if the Global Transaction Identifier (GTID) reconciliation operation times out.
                        Example: `false`
                      type: boolean
                    isMovable:
                      description: |-
                        A flag indicating if the compute instance should be moved during DR operations.
                        Example: `false`
                      type: boolean
                    isRetainFaultDomain:
                      description: |-
                        A flag indicating if the compute instance should be moved to the same fault domain in the destination region.
                        The compute instance launch will fail if this flag is set to true and capacity is not available in the
                        specified fault domain in the destination region.
                        Example: `false`
                      type: boolean
                    isStartStopEnabled:
                      description: |-
                        A flag indicating whether the non-movable compute instance should be started and stopped during DR operations.
                        *Prechecks cannot be executed on stopped instances that are configured to be started.*
                      type: boolean
                    jsonData:
                      type: string
                    jumpHostId:
                      description: |-
                        The OCID of the compute instance member that is designated as a jump host.
                        This compute instance will be used to perform DR operations on the cluster using Oracle Cloud Agent's Run Command feature.
                        Example: `ocid1.instance.oc1..uniqueID`
                      type: string
                    loadBalancerMappings:
                      description: |-
                        The list of source-to-destination load balancer mappings required for DR operations.
                        This property applies to the OKE cluster member in primary region.
                      items:
                        description: DrProtectionGroupMemberLoadBalancerMapping defines
                          nested fields for DrProtectionGroup.Member.LoadBalancerMapping.
                        properties:
                          destinationLoadBalancerId:
                            description: |-
                              The OCID of the destination Load Balancer.
                              Example: `ocid1.loadbalancer.oc1..uniqueID`
                            type: string
                          sourceLoadBalancerId:
                            description: |-
                              The OCID of the source Load Balancer.

                               Example: `ocid1.loadbalancer.oc1..uniqueID`
                            type: string
                        required:
                        - destinationLoadBalancerId
                        - sourceLoadBalancerId
                        type: object
                      type: array
                    managedNodePoolConfigs:
                      description: |-
                        The list of managed node pools with configurations for minimum and maximum node counts.
                        This property applies to the OKE cluster member in both the primary and standby region.
                      items:
                        description: DrProtectionGroupMemberManagedNodePoolConfig
                          defines nested fields for DrProtectionGroup.Member.ManagedNodePoolConfig.
                        properties:
                          id:
                            description: The OCID of the managed node pool in OKE
                              cluster.
                            type: string
                          maximum:
                            description: The maximum number to which nodes in the
                              managed node pool could be scaled up.
                            type: integer
                          minimum:
                            description: The minimum number to which nodes in the
                              managed node pool could be scaled down.
                            type: integer
                        required:
                        - id
                        type: object
                      type: array
                    memberId:
                      description: |-
                        The OCID of the member.
                        Example: `ocid1.instance.oc1..uniqueID`
                      type: string
                    memberType:
                      type: string
                    namespaceName:
                      description: |-
                        The namespace in object storage (Note - this is usually the tenancy name).
                        Example: `myocitenancy`
                      type: string
                    networkLoadBalancerMappings:
                      description: |-
                        The list of source-to-destination network load balancer mappings required for DR operations.
                        This property applies to the OKE cluster member in primary region.
                      items:
                        description: DrProtectionGroupMemberNetworkLoadBalancerMapping
                          defines nested fields for DrProtectionGroup.Member.NetworkLoadBalancerMapping.
                        properties:
                          destinationNetworkLoadBalancerId:
                            description: |-
                              The OCID of the Network Load Balancer.
                              Example: `ocid1.networkloadbalancer.oc1..uniqueID`
                            type: string
                          sourceNetworkLoadBalancerId:
                            description: |-
                              The OCID of the source Network Load Balancer.
                               Example: `ocid1.networkloadbalancer.oc1..uniqueID`
                            type: string
                        required:
                        - destinationNetworkLoadBalancerId
                        - sourceNetworkLoadBalancerId
                        type: object
                      type: array
                    passwordVaultSecretId:
                      description: |-
                        The OCID of the vault secret where the database SYSDBA password is stored.
                        Example: `ocid1.vaultsecret.oc1..uniqueID`
                      type: string
                    peerClusterId:
                      description: |-
                        The OCID of the peer OKE cluster.
                        This property applies to the OKE cluster member in both the primary and standby region.
                        Example: `ocid1.cluster.oc1..uniqueID`
                      type: string
                    peerDbSystemId:
                      description: |-
                        The OCID of the peer HeatWave MySQL DB System from the peer region.
                        Example: `ocid1.mysqldbsystem.oc1..uniqueID`
                      type: string
                    resourceModifierMappings:
                      description: |-
                        The list of config maps along with their corresponding namespaces.
                        This property applies to the OKE cluster member in primary region.
                      items:
                        description: DrProtectionGroupMemberResourceModifierMapping
                          defines nested fields for DrProtectionGroup.Member.ResourceModifierMapping.
                        properties:
                          configMap:
                            description: |-
                              The name of the config map containing resource modification details.
                              Example: `resource-modifier`
                            type: string
                          namespace:
                            description: |-
                              The OKE namespace where the config map resides.
                              Example: `namespace_string_5`
                            type: string
                        required:
                        - configMap
                        - namespace
                        type: object
                      type: array
                    sourceVolumeToDestinationEncryptionKeyMappings:
                      description: |-
                        A list of mappings between source volume IDs in the volume group and customer-managed encryption keys in the
                        destination region which will be used to encrypt the volume after it moves to the destination region.
                        If you add the entry for source volumes and its corresponding vault and encryption keys here, you can not use
                        'commonDestinationKey' for encrypting all volumes with common encryption key. Similarly, if you specify common
                        vault and encryption key using 'commonDestinationKey', you cannot specify vaults and encryption keys individually
                        for each volume using 'sourceVolumeToDestinationEncryptionKeyMappings'.
                        An entry for each volume in volume group should be added in this list. The encryption key will not be updated
                        for the volumes that are part of volume group but missing in this list.
                      items:
                        description: DrProtectionGroupMemberSourceVolumeToDestinationEncryptionKeyMapping
                          defines nested fields for DrProtectionGroup.Member.SourceVolumeToDestinationEncryptionKeyMapping.
