---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: sensitivecolumns.datasafe.oracle.com
spec:
  group: datasafe.oracle.com
  names:
    kind: SensitiveColumn
    listKind: SensitiveColumnList
    plural: sensitivecolumns
    singular: sensitivecolumn
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the SensitiveColumn
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the SensitiveColumn
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: SensitiveColumn is the Schema for the sensitivecolumns API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SensitiveColumnSpec defines the desired state of SensitiveColumn.
            properties:
              appDefinedChildColumnKeys:
                description: |-
                  Unique keys identifying the columns that are application-level (non-dictionary) children of the sensitive column.
                  This attribute can be used to establish relationship between columns in a sensitive data model. Note that the
                  child columns must be added to the sensitive data model before their keys can be specified here. If this attribute
                  is provided, the parentColumnKeys and relationType attributes of the child columns are automatically updated to reflect the relationship.
                items:
                  type: string
                type: array
              appName:
                description: |-
                  The name of the application associated with the sensitive column. It's useful when the application name is
                  different from the schema name. Otherwise, it can be ignored. If this attribute is not provided, it's automatically
                  populated with the value provided for the schemaName attribute.
                type: string
              columnName:
                description: The name of the sensitive column.
                type: string
              dataType:
                description: The data type of the sensitive column.
                type: string
              dbDefinedChildColumnKeys:
                description: |-
                  Unique keys identifying the columns that are database-level (dictionary-defined) children of the sensitive column.
                  This attribute can be used to establish relationship between columns in a sensitive data model. Note that the
                  child columns must be added to the sensitive data model before their keys can be specified here. If this attribute
                  is provided, the parentColumnKeys and relationType attributes of the child columns are automatically updated to reflect the relationship.
                items:
                  type: string
                type: array
              objectName:
                description: The database object that contains the sensitive column.
                type: string
              objectType:
                description: The type of the database object that contains the sensitive
                  column.
                type: string
              parentColumnKeys:
                description: |-
                  Unique keys identifying the columns that are parents of the sensitive column. At present, it accepts only one
                  parent column key. This attribute can be used to establish relationship between columns in a sensitive data model.
                  Note that the parent column must be added to the sensitive data model before its key can be specified here.
                  If this attribute is provided, the appDefinedChildColumnKeys or dbDefinedChildColumnKeys attribute of the parent
                  column is automatically updated to reflect the relationship.
                items:
                  type: string
                type: array
              relationType:
                description: |-
                  The type of referential relationship the sensitive column has with its parent. NONE indicates that the sensitive
                  column does not have a parent. DB_DEFINED indicates that the relationship is defined in the database dictionary.
                  APP_DEFINED indicates that the relationship is defined at the application level and not in the database dictionary.
                type: string
              schemaName:
                description: The database schema that contains the sensitive column.
                type: string
              sensitiveTypeId:
                description: The OCID of the sensitive type to be associated with
                  the sensitive column.
                type: string
              status:
                description: |-
                  The status of the sensitive column. VALID means the column is considered sensitive. INVALID means the column
                  is not considered sensitive. Tracking invalid columns in a sensitive data model helps ensure that an incremental
                  data discovery job does not identify these columns as sensitive.
                type: string
            required:
            - columnName
            - objectName
            - schemaName
            type: object
          status:
            description: SensitiveColumnStatus defines the observed state of SensitiveColumn.
            properties:
              appDefinedChildColumnKeys:
                description: Unique keys identifying the columns that are application-level
                  (non-dictionary) children of the sensitive column.
                items:
                  type: string
                type: array
              appName:
                description: |-
                  The name of the application associated with the sensitive column. It's useful when the application name is
                  different from the schema name. Otherwise, it can be ignored.
                type: string
              columnGroups:
                description: |-
                  The composite key groups to which the sensitive column belongs. If the column is part of a composite key,
                  it's assigned a column group. It helps identify and manage referential relationships that involve composite keys.
                items:
                  type: string
                type: array
              columnName:
                description: The name of the sensitive column.
                type: string
              confidenceLevel:
                description: |-
                  The confidence level of the sensitive column associated with the sensitive type.
                  The confidence level of the discovered sensitive columns can be either HIGH, MEDIUM or LOW.
                  The confidence level will be NONE for manually added sensitive columns.
                type: string
              confidenceLevelDetails:
                description: |-
                  List containing maps as values.
                  Example: `{"Operations": [ {"CostCenter": "42"} ] }`
                items:
                  description: JSONValue preserves arbitrary JSON values inside generated
                    CRD fields.
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: array
              dataType:
                description: The data type of the sensitive column.
                type: string
              dbDefinedChildColumnKeys:
                description: Unique keys identifying the columns that are database-level
                  (dictionary-defined) children of the sensitive column.
                items:
                  type: string
                type: array
              estimatedDataValueCount:
                description: The estimated number of data values the column has in
                  the associated database.
                format: int64
                type: integer
              key:
                description: The unique key that identifies the sensitive column.
                  It's numeric and unique within a sensitive data model.
                type: string
              lifecycleDetails:
                description: Details about the current state of the sensitive column.
                type: string
              lifecycleState:
                description: The current state of the sensitive column.
                type: string
              objectName:
                description: The database object that contains the sensitive column.
                type: string
              objectType:
                description: The type of the database object that contains the sensitive
                  column.
                type: string
              parentColumnKeys:
                description: Unique keys identifying the columns that are parents
                  of the sensitive column. At present, it tracks a single parent only.
                items:
                  type: string
                type: array
              relationType:
                description: |-
                  The type of referential relationship the sensitive column has with its parent. NONE indicates that the
                  sensitive column does not have a parent. DB_DEFINED indicates that the relationship is defined in the database
                  dictionary. APP_DEFINED indicates that the relationship is defined at the application level and not in the database dictionary.
                type: string
              sampleDataValues:
                description: |-
                  Original data values collected for the sensitive column from the associated database. Sample data helps review
                  the column and ensure that it actually contains sensitive data. Note that sample data is retrieved by a data
                  discovery job only if the isSampleDataCollectionEnabled attribute is set to true. At present, only one data
                  value is collected per sensitive column.
                items:
                  type: string
                type: array
              schemaName:
                description: The database schema that contains the sensitive column.
                type: string
              sdkStatus:
                description: |-
                  The status of the sensitive column. VALID means the column is considered sensitive. INVALID means the column
                  is not considered sensitive. Tracking invalid columns in a sensitive data model helps ensure that an
                  incremental data discovery job does not identify these columns as sensitive again.
                  This uses a distinct JSON name so it can coexist with the OSOK status envelope.
                type: string
              sensitiveDataModelId:
                description: The OCID of the sensitive data model that contains the
                  sensitive column.
                type: string
              sensitiveTypeId:
                description: The OCID of the sensitive type associated with the sensitive
                  column.
                type: string
              source:
                description: |-
                  The source of the sensitive column. DISCOVERY indicates that the column was added to the sensitive data model
                  using a data discovery job. MANUAL indicates that the column was added manually.
                type: string
              status:
                properties:
                  async:
                    description: |-
                      Async is the canonical controller-owned async contract. Resource-local
                      legacy work-request fields may remain as compatibility mirrors while
                      follow-on migrations land, but new async state should project here first.
                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
                            enum:
                            - none
                            - lifecycle
                            - workrequest
                            type: string
                          updatedAt:
                            format: date-time
                            type: string
                          workRequestId:
                            type: string
                        required:
                        - normalizedClass
                        - phase
                        - source
                        - updatedAt
                        type: object
                    type: object
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  opcRequestId:
                    description: |-
                      OpcRequestID is the latest non-empty OCI request ID from a mutating OCI
                      response or surfaced OCI service error that materially contributed to the
                      current shared status projection. Headerless follow-up observations keep
                      the last non-empty value intact.
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339),
                  the sensitive column was created in the sensitive data model.
                type: string
              timeUpdated:
                description: |-
                  The date and time, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339),
                  the sensitive column was last updated in the sensitive data model.
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
