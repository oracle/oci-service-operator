    name: v1beta1
    schema:
      openAPIV3Schema:
        description: StreamPool is the Schema for the streampools API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: StreamPoolSpec defines the desired state of StreamPool.
            properties:
              compartmentId:
                description: The OCID of the compartment that contains the stream.
                type: string
              customEncryptionKeyDetails:
                description: StreamPoolCustomEncryptionKeyDetails defines nested fields
                  for StreamPool.CustomEncryptionKeyDetails.
                properties:
                  kmsKeyId:
                    description: Custom Encryption Key (Master Key) ocid.
                    type: string
