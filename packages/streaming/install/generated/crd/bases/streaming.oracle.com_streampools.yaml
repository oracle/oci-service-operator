                  Example: `{"Department": "Finance"}`
                type: object
              id:
                description: The OCID of the stream pool.
                type: string
              isPrivate:
                description: |-
                  True if the stream pool is private, false otherwise.
                  If the stream pool is private, the streams inside the stream pool can only be accessed from inside the associated subnetId.
                type: boolean
              kafkaSettings:
                description: StreamPoolKafkaSettings defines nested fields for StreamPool.KafkaSettings.
