                - kmsKeyId
                type: object
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair that is applied with no predefined name, type, or namespace. Exists for cross-compatibility only.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              kafkaSettings:
                description: StreamPoolKafkaSettings defines nested fields for StreamPool.KafkaSettings.
                properties:
                  autoCreateTopicsEnable:
                    description: Enable auto creation of topic on the server.
                    type: boolean
                  bootstrapServers:
                    description: Bootstrap servers.
                    type: string
                  logRetentionHours:
                    description: The number of hours to keep a log file before deleting
                      it (in hours).
                    type: integer
                  numPartitions:
                    description: The default number of log partitions per topic.
                    type: integer
                type: object
              name:
                description: |-
                  The name of the stream pool. Avoid entering confidential information.
                  Example: `MyStreamPool`
                type: string
              privateEndpointDetails:
                description: StreamPoolPrivateEndpointDetails defines nested fields
                  for StreamPool.PrivateEndpointDetails.
                properties:
                  nsgIds:
                    description: |-
                      The optional list of network security groups to be used with the private endpoint of the stream pool.
                      That value cannot be changed.
                    items:
                      type: string
                    type: array
                  privateEndpointIp:
                    description: |-
                      The optional private IP you want to be associated with your private stream pool.
                      That parameter can only be specified when the subnetId parameter is set. It cannot be changed.
                      The private IP needs to be part of the CIDR range of the specified subnetId or the creation will fail.
                      If not specified a random IP inside the subnet will be chosen.
                      After the stream pool is created, a custom FQDN, pointing to this private IP, is created.
                      The FQDN is then used to access the service instead of the private IP.
