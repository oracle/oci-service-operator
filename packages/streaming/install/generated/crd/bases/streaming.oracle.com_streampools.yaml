  name: streampools.streaming.oracle.com
spec:
  group: streaming.oracle.com
  names:
    kind: StreamPool
    listKind: StreamPoolList
    plural: streampools
    singular: streampool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
