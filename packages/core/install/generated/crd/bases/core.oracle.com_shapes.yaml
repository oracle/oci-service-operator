---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: shapes.core.oracle.com
spec:
  group: core.oracle.com
  names:
    kind: Shape
    listKind: ShapeList
    plural: shapes
    singular: shape
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the Shape
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Shape
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Shape is the Schema for the shapes API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ShapeSpec defines the desired state of Shape.
            type: object
          status:
            description: ShapeStatus defines the observed state of Shape.
            properties:
              baselineOcpuUtilizations:
                description: For a subcore burstable VM, the supported baseline OCPU
                  utilization for instances that use this shape.
                items:
                  type: string
                type: array
              billingType:
                description: How instances that use this shape are charged.
                type: string
              gpuDescription:
                description: |-
                  A short description of the graphics processing unit (GPU) available for this shape.
                  If the shape does not have any GPUs, this field is `null`.
                type: string
              gpus:
                description: The number of GPUs available for this shape.
                type: integer
              isBilledForStoppedInstance:
                description: Whether billing continues when the instances that use
                  this shape are in the stopped state.
                type: boolean
              isFlexible:
                description: |-
                  Whether the shape supports creating flexible instances. A flexible shape (https://docs.cloud.oracle.com/iaas/Content/Compute/References/computeshapes.htm#flexible)
                  is a shape that lets you customize the number of OCPUs and the amount of memory when launching or resizing your instance.
                type: boolean
              isLiveMigrationSupported:
                description: Whether live migration is supported for this shape.
                type: boolean
              isSubcore:
                description: |-
                  Whether the shape supports creating subcore or burstable instances. A burstable instance (https://docs.cloud.oracle.com/iaas/Content/Compute/References/burstable-instances.htm)
                  is a virtual machine (VM) instance that provides a baseline level of CPU performance with the ability to burst to a higher level to support occasional
                  spikes in usage.
                type: boolean
              localDiskDescription:
                description: |-
                  A short description of the local disks available for this shape.
                  If the shape does not have any local disks, this field is `null`.
                type: string
              localDisks:
                description: The number of local disks available for this shape.
                type: integer
              localDisksTotalSizeInGBs:
                description: |-
                  The aggregate size of the local disks available for this shape, in gigabytes.
                  If the shape does not have any local disks, this field is `null`.
                type: number
              maxVnicAttachmentOptions:
                description: ShapeMaxVnicAttachmentOptions defines nested fields for
                  Shape.MaxVnicAttachmentOptions.
                properties:
                  defaultPerOcpu:
                    description: The default number of VNIC attachments allowed per
                      OCPU.
                    type: number
                  max:
                    description: The highest maximum value of VNIC attachments.
                    type: number
                  min:
                    description: The lowest maximum value of VNIC attachments.
                    type: integer
                type: object
              maxVnicAttachments:
                description: The maximum number of VNIC attachments available for
                  this shape.
                type: integer
              memoryInGBs:
                description: The default amount of memory available for this shape,
                  in gigabytes.
                type: number
              memoryOptions:
                description: ShapeMemoryOptions defines nested fields for Shape.MemoryOptions.
                properties:
                  defaultPerOcpuInGBs:
                    description: The default amount of memory per OCPU available for
                      this shape, in gigabytes.
                    type: number
                  maxInGBs:
                    description: The maximum amount of memory, in gigabytes.
                    type: number
                  maxPerNumaNodeInGBs:
                    description: The maximum amount of memory per NUMA node, in gigabytes.
                    type: number
                  maxPerOcpuInGBs:
                    description: The maximum amount of memory per OCPU available for
                      this shape, in gigabytes.
                    type: number
                  minInGBs:
                    description: The minimum amount of memory, in gigabytes.
                    type: number
                  minPerOcpuInGBs:
                    description: The minimum amount of memory per OCPU available for
                      this shape, in gigabytes.
                    type: number
                type: object
              minTotalBaselineOcpusRequired:
                description: |-
                  For a subcore burstable VM, the minimum total baseline OCPUs required. The total baseline OCPUs is equal to
                  baselineOcpuUtilization chosen multiplied by the number of OCPUs chosen.
                type: number
              networkPorts:
                description: The number of physical network interface card (NIC) ports
                  available for this shape.
                type: integer
              networkingBandwidthInGbps:
                description: The networking bandwidth available for this shape, in
                  gigabits per second.
                type: number
              networkingBandwidthOptions:
                description: ShapeNetworkingBandwidthOptions defines nested fields
                  for Shape.NetworkingBandwidthOptions.
                properties:
                  defaultPerOcpuInGbps:
                    description: The default amount of networking bandwidth per OCPU,
                      in gigabits per second.
                    type: number
                  maxInGbps:
                    description: The maximum amount of networking bandwidth, in gigabits
                      per second.
                    type: number
                  minInGbps:
                    description: The minimum amount of networking bandwidth, in gigabits
                      per second.
                    type: number
                type: object
              ocpuOptions:
                description: ShapeOcpuOptions defines nested fields for Shape.OcpuOptions.
                properties:
                  max:
                    description: The maximum number of OCPUs.
                    type: number
                  maxPerNumaNode:
                    description: The maximum number of cores available per NUMA node.
                    type: number
                  min:
                    description: The minimum number of OCPUs.
                    type: number
                type: object
              ocpus:
                description: The default number of OCPUs available for this shape.
                type: number
              platformConfigOptions:
                description: ShapePlatformConfigOptions defines nested fields for
                  Shape.PlatformConfigOptions.
                properties:
                  accessControlServiceOptions:
                    description: ShapePlatformConfigOptionsAccessControlServiceOptions
                      defines nested fields for Shape.PlatformConfigOptions.AccessControlServiceOptions.
                    properties:
                      allowedValues:
                        description: Whether the Access Control Service can be enabled.
                        items:
                          type: boolean
                        type: array
                      isDefaultEnabled:
                        description: Whether the Access Control Service is enabled
                          by default.
                        type: boolean
                    type: object
                  inputOutputMemoryManagementUnitOptions:
                    description: ShapePlatformConfigOptionsInputOutputMemoryManagementUnitOptions
                      defines nested fields for Shape.PlatformConfigOptions.InputOutputMemoryManagementUnitOptions.
                    properties:
                      allowedValues:
                        description: Whether the input-output memory management unit
                          can be enabled.
                        items:
                          type: boolean
                        type: array
                      isDefaultEnabled:
                        description: Whether the input-output memory management unit
                          is enabled by default.
                        type: boolean
                    type: object
                  measuredBootOptions:
                    description: ShapePlatformConfigOptionsMeasuredBootOptions defines
                      nested fields for Shape.PlatformConfigOptions.MeasuredBootOptions.
                    properties:
                      allowedValues:
                        description: Boolean values that indicate whether the Measured
                          Boot feature can be enabled or disabled.
                        items:
                          type: boolean
                        type: array
                      isDefaultEnabled:
                        description: Whether the Measured Boot feature is enabled
                          by default.
                        type: boolean
                    type: object
                  memoryEncryptionOptions:
                    description: ShapePlatformConfigOptionsMemoryEncryptionOptions
                      defines nested fields for Shape.PlatformConfigOptions.MemoryEncryptionOptions.
                    properties:
                      allowedValues:
                        description: Whether memory encryption can be enabled.
                        items:
                          type: boolean
                        type: array
                      isDefaultEnabled:
                        description: Whether memory encryption is enabled by default.
                        type: boolean
                    type: object
                  numaNodesPerSocketPlatformOptions:
                    description: ShapePlatformConfigOptionsNumaNodesPerSocketPlatformOptions
                      defines nested fields for Shape.PlatformConfigOptions.NumaNodesPerSocketPlatformOptions.
                    properties:
                      allowedValues:
                        description: The supported values for this platform configuration
                          property.
                        items:
                          type: string
                        type: array
                      defaultValue:
                        description: The default NUMA nodes per socket configuration.
                        type: string
                    type: object
                  percentageOfCoresEnabledOptions:
                    description: ShapePlatformConfigOptionsPercentageOfCoresEnabledOptions
                      defines nested fields for Shape.PlatformConfigOptions.PercentageOfCoresEnabledOptions.
                    properties:
                      defaultValue:
                        description: The default percentage of cores enabled.
                        type: integer
                      max:
                        description: The maximum allowed percentage of cores enabled.
                        type: integer
                      min:
                        description: The minimum allowed percentage of cores enabled.
                        type: integer
                    type: object
                  secureBootOptions:
                    description: ShapePlatformConfigOptionsSecureBootOptions defines
                      nested fields for Shape.PlatformConfigOptions.SecureBootOptions.
                    properties:
                      allowedValues:
                        description: Boolean values that indicate whether Secure Boot
                          can be enabled or disabled.
                        items:
                          type: boolean
                        type: array
                      isDefaultEnabled:
                        description: Whether Secure Boot is enabled by default.
                        type: boolean
                    type: object
                  symmetricMultiThreadingOptions:
                    description: ShapePlatformConfigOptionsSymmetricMultiThreadingOptions
                      defines nested fields for Shape.PlatformConfigOptions.SymmetricMultiThreadingOptions.
                    properties:
                      allowedValues:
                        description: Whether symmetric multithreading can be enabled.
                        items:
                          type: boolean
                        type: array
                      isDefaultEnabled:
                        description: Whether symmetric multithreading is enabled by
                          default.
                        type: boolean
                    type: object
                  trustedPlatformModuleOptions:
                    description: ShapePlatformConfigOptionsTrustedPlatformModuleOptions
                      defines nested fields for Shape.PlatformConfigOptions.TrustedPlatformModuleOptions.
                    properties:
                      allowedValues:
                        description: Boolean values that indicate whether the Trusted
                          Platform Module can be enabled or disabled.
                        items:
                          type: boolean
                        type: array
                      isDefaultEnabled:
                        description: Whether the Trusted Platform Module is enabled
                          by default.
                        type: boolean
                    type: object
                  type:
                    description: The type of platform being configured.
                    type: string
                  virtualInstructionsOptions:
                    description: ShapePlatformConfigOptionsVirtualInstructionsOptions
                      defines nested fields for Shape.PlatformConfigOptions.VirtualInstructionsOptions.
                    properties:
                      allowedValues:
                        description: Whether virtualization instructions can be enabled.
                        items:
                          type: boolean
                        type: array
                      isDefaultEnabled:
                        description: Whether virtualization instructions are enabled
                          by default.
                        type: boolean
                    type: object
                type: object
              processorDescription:
                description: A short description of the shape's processor (CPU).
                type: string
              quotaNames:
                description: The list of of compartment quotas for the shape.
                items:
                  type: string
                type: array
              rdmaBandwidthInGbps:
                description: |-
                  The networking bandwidth available for the remote direct memory access (RDMA) network for this shape, in
                  gigabits per second.
                type: integer
              rdmaPorts:
                description: |-
                  The number of networking ports available for the remote direct memory access (RDMA) network between nodes in
                  a high performance computing (HPC) cluster network. If the shape does not support cluster networks, this
                  value is `0`.
                type: integer
              recommendedAlternatives:
                description: The list of shapes and shape details (if applicable)
                  that Oracle recommends that you use as an alternative to the current
                  shape.
                items:
                  description: ShapeRecommendedAlternative defines nested fields for
                    Shape.RecommendedAlternative.
                  properties:
                    shapeName:
                      description: The name of the shape.
                      type: string
                  type: object
                type: array
              resizeCompatibleShapes:
                description: |-
                  The list of compatible shapes that this shape can be changed to. For more information,
                  see Changing the Shape of an Instance (https://docs.cloud.oracle.com/iaas/Content/Compute/Tasks/resizinginstances.htm).
                items:
                  type: string
                type: array
              shape:
                description: |-
                  The name of the shape. You can enumerate all available shapes by calling
                  ListShapes.
                type: string
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
