---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: crossconnects.core.oracle.com
spec:
  group: core.oracle.com
  names:
    kind: CrossConnect
    listKind: CrossConnectList
    plural: crossconnects
    singular: crossconnect
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the CrossConnect
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the CrossConnect
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: CrossConnect is the Schema for the crossconnects API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CrossConnectSpec defines the desired state of CrossConnect.
            properties:
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment to contain the cross-connect.
                type: string
              crossConnectGroupId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the cross-connect group to put this cross-connect in.
                type: string
              customerReferenceName:
                description: |-
                  A reference name or identifier for the physical fiber connection that this cross-connect
                  uses.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a
                  namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name. Does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                type: string
              farCrossConnectOrCrossConnectGroupId:
                description: |-
                  If you already have an existing cross-connect or cross-connect group at this FastConnect
                  location, and you want this new cross-connect to be on a different router (for the
                  purposes of redundancy), provide the OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of that existing cross-connect or
                  cross-connect group.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no
                  predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              isActive:
                description: |-
                  Set to true to activate the cross-connect. You activate it after the physical cabling
                  is complete, and you've confirmed the cross-connect's light levels are good and your side
                  of the interface is up. Activation indicates to Oracle that the physical connection is ready.
                  Example: `true`
                type: boolean
              locationName:
                description: |-
                  The name of the FastConnect location where this cross-connect will be installed.
                  To get a list of the available locations, see
                  ListCrossConnectLocations.
                  Example: `CyrusOne, Chandler, AZ`
                type: string
              macsecProperties:
                description: CrossConnectMacsecProperties defines nested fields for
                  CrossConnect.MacsecProperties.
                properties:
                  encryptionCipher:
                    description: Type of encryption cipher suite to use for the MACsec
                      connection.
                    type: string
                  isUnprotectedTrafficAllowed:
                    description: Indicates whether unencrypted traffic is allowed
                      if MACsec Key Agreement protocol (MKA) fails.
                    type: boolean
                  primaryKey:
                    description: CrossConnectMacsecPropertiesPrimaryKey defines nested
                      fields for CrossConnect.MacsecProperties.PrimaryKey.
                    properties:
                      connectivityAssociationKeySecretId:
                        description: |-
                          Secret OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) containing the Connectivity Association Key (CAK) of this MACsec key.
                          NOTE: Only the latest secret version will be used.
                        type: string
                      connectivityAssociationNameSecretId:
                        description: |-
                          Secret OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) containing the Connectivity association Key Name (CKN) of this MACsec key.
                          NOTE: Only the latest secret version will be used.
                        type: string
                    required:
                    - connectivityAssociationKeySecretId
                    - connectivityAssociationNameSecretId
                    type: object
                  state:
                    description: Indicates whether or not MACsec is enabled.
                    type: string
                required:
                - state
                type: object
              nearCrossConnectOrCrossConnectGroupId:
                description: |-
                  If you already have an existing cross-connect or cross-connect group at this FastConnect
                  location, and you want this new cross-connect to be on the same router, provide the
                  OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of that existing cross-connect or cross-connect group.
                type: string
              portSpeedShapeName:
                description: |-
                  The port speed for this cross-connect. To get a list of the available port speeds, see
                  ListCrossconnectPortSpeedShapes.
                  Example: `10 Gbps`
                type: string
            required:
            - compartmentId
            - locationName
            - portSpeedShapeName
            type: object
          status:
            description: CrossConnectObservedState defines the observed state of CrossConnect.
            properties:
              id:
                description: The cross-connect's Oracle ID (OCID).
                type: string
              lifecycleState:
                description: The cross-connect's current state.
                type: string
              ociLogicalDeviceName:
                description: |-
                  The FastConnect device that terminates the logical connection.
                  This device might be different than the device that terminates the physical connection.
                type: string
              ociPhysicalDeviceName:
                description: The FastConnect device that terminates the physical connection.
                type: string
              portName:
                description: A string identifying the meet-me room port for this cross-connect.
                type: string
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time the cross-connect was created, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339).
                  Example: `2016-08-25T21:10:29.600Z`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
