---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: images.core.oracle.com
spec:
  group: core.oracle.com
  names:
    kind: Image
    listKind: ImageList
    plural: images
    singular: image
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the Image
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Image
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Image is the Schema for the images API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ImageSpec defines the desired state of Image.
            properties:
              compartmentId:
                description: The OCID of the compartment you want the image to be
                  created in.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a
                  namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name for the image. It does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                  You cannot use a platform image name as a custom image name.
                  Example: `My Oracle Linux image`
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no
                  predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              imageSourceDetails:
                description: ImageSourceDetails defines nested fields for Image.ImageSourceDetails.
                properties:
                  bucketName:
                    description: The Object Storage bucket for the image.
                    type: string
                  jsonData:
                    type: string
                  namespaceName:
                    description: The Object Storage namespace for the image.
                    type: string
                  objectName:
                    description: The Object Storage name for the image.
                    type: string
                  operatingSystem:
                    type: string
                  operatingSystemVersion:
                    type: string
                  sourceImageType:
                    description: |-
                      The format of the image to be imported. Only monolithic
                      images are supported. This attribute is not used for exported Oracle images with the OCI image format.
                    type: string
                  sourceType:
                    type: string
                  sourceUri:
                    description: The Object Storage URL for the image.
                    type: string
                required:
                - bucketName
                - namespaceName
                - objectName
                - sourceUri
                type: object
              instanceId:
                description: The OCID of the instance you want to use as the basis
                  for the image.
                type: string
              launchMode:
                description: |-
                  Specifies the configuration mode for launching virtual machine (VM) instances. The configuration modes are:
                  * `NATIVE` - VM instances launch with paravirtualized boot and VFIO devices. The default value for platform images.
                  * `EMULATED` - VM instances launch with emulated devices, such as the E1000 network driver and emulated SCSI disk controller.
                  * `PARAVIRTUALIZED` - VM instances launch with paravirtualized devices using VirtIO drivers.
                  * `CUSTOM` - VM instances launch with custom configuration settings specified in the `LaunchOptions` parameter.
                type: string
              operatingSystem:
                description: |-
                  Operating system
                  Example: `Oracle Linux`
                type: string
              operatingSystemVersion:
                description: |-
                  Operating system version
                  Example: `7.4`
                type: string
            required:
            - compartmentId
            type: object
          status:
            description: ImageStatus defines the observed state of Image.
            properties:
              agentFeatures:
                description: ImageAgentFeatures defines nested fields for Image.AgentFeatures.
                properties:
                  isManagementSupported:
                    description: This attribute is not used.
                    type: boolean
                  isMonitoringSupported:
                    description: This attribute is not used.
                    type: boolean
                type: object
              baseImageId:
                description: The OCID of the image originally used to launch the instance.
                type: string
              billableSizeInGBs:
                description: |-
                  The size of the internal storage for this image that is subject to billing (1 GB = 1,073,741,824 bytes).
                  Example: `100`
                format: int64
                type: integer
              compartmentId:
                description: The OCID of the compartment containing the instance you
                  want to use as the basis for the image.
                type: string
              createImageAllowed:
                description: |-
                  Whether instances launched with this image can be used to create new images.
                  For example, you cannot create an image of an Oracle Database instance.
                  Example: `true`
                type: boolean
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a
                  namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name for the image. It does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                  You cannot use a platform image name as a custom image name.
                  Example: `My custom Oracle Linux image`
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no
                  predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              id:
                description: The OCID of the image.
                type: string
              launchMode:
                description: |-
                  Specifies the configuration mode for launching virtual machine (VM) instances. The configuration modes are:
                  * `NATIVE` - VM instances launch with iSCSI boot and VFIO devices. The default value for platform images.
                  * `EMULATED` - VM instances launch with emulated devices, such as the E1000 network driver and emulated SCSI disk controller.
                  * `PARAVIRTUALIZED` - VM instances launch with paravirtualized devices using VirtIO drivers.
                  * `CUSTOM` - VM instances launch with custom configuration settings specified in the `LaunchOptions` parameter.
                type: string
              launchOptions:
                description: ImageLaunchOptions defines nested fields for Image.LaunchOptions.
                properties:
                  bootVolumeType:
                    description: |-
                      Emulation type for the boot volume.
                      * `ISCSI` - ISCSI attached block storage device.
                      * `SCSI` - Emulated SCSI disk.
                      * `IDE` - Emulated IDE disk.
                      * `VFIO` - Direct attached Virtual Function storage. This is the default option for local data
                      volumes on platform images.
                      * `PARAVIRTUALIZED` - Paravirtualized disk. This is the default for boot volumes and remote block
                      storage volumes on platform images.
                    type: string
                  firmware:
                    description: |-
                      Firmware used to boot VM. Select the option that matches your operating system.
                      * `BIOS` - Boot VM using BIOS style firmware. This is compatible with both 32 bit and 64 bit operating
                      systems that boot using MBR style bootloaders.
                      * `UEFI_64` - Boot VM using UEFI style firmware compatible with 64 bit operating systems. This is the
                      default for platform images.
                    type: string
                  isConsistentVolumeNamingEnabled:
                    description: Whether to enable consistent volume naming feature.
                      Defaults to false.
                    type: boolean
                  isPvEncryptionInTransitEnabled:
                    description: |-
                      Deprecated. Instead use `isPvEncryptionInTransitEnabled` in
                      LaunchInstanceDetails.
                    type: boolean
                  networkType:
                    description: |-
                      Emulation type for the physical network interface card (NIC).
                      * `E1000` - Emulated Gigabit ethernet controller. Compatible with Linux e1000 network driver.
                      * `VFIO` - Direct attached Virtual Function network controller. This is the networking type
                      when you launch an instance using hardware-assisted (SR-IOV) networking.
                      * `PARAVIRTUALIZED` - VM instances launch with paravirtualized devices using VirtIO drivers.
                    type: string
                  remoteDataVolumeType:
                    description: |-
                      Emulation type for volume.
                      * `ISCSI` - ISCSI attached block storage device.
                      * `SCSI` - Emulated SCSI disk.
                      * `IDE` - Emulated IDE disk.
                      * `VFIO` - Direct attached Virtual Function storage. This is the default option for local data
                      volumes on platform images.
                      * `PARAVIRTUALIZED` - Paravirtualized disk. This is the default for boot volumes and remote block
                      storage volumes on platform images.
                    type: string
                type: object
              lifecycleState:
                type: string
              listingType:
                description: The listing type of the image. The default value is "NONE".
                type: string
              operatingSystem:
                description: |-
                  The image's operating system.
                  Example: `Oracle Linux`
                type: string
              operatingSystemVersion:
                description: |-
                  The image's operating system version.
                  Example: `7.2`
                type: string
              sizeInMBs:
                description: |-
                  The boot volume size for an instance launched from this image (1 MB = 1,048,576 bytes).
                  Note this is not the same as the size of the image when it was exported or the actual size of the image.
                  Example: `47694`
                format: int64
                type: integer
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time the image was created, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339).
                  Example: `2016-08-25T21:10:29.600Z`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
