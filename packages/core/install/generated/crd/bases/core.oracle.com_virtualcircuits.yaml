---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: virtualcircuits.core.oracle.com
spec:
  group: core.oracle.com
  names:
    kind: VirtualCircuit
    listKind: VirtualCircuitList
    plural: virtualcircuits
    singular: virtualcircuit
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the VirtualCircuit
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the VirtualCircuit
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: VirtualCircuit is the Schema for the virtualcircuits API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VirtualCircuitSpec defines the desired state of VirtualCircuit.
            properties:
              bandwidthShapeName:
                description: |-
                  The provisioned data rate of the connection. To get a list of the
                  available bandwidth levels (that is, shapes), see
                  ListFastConnectProviderVirtualCircuitBandwidthShapes.
                  Example: `10 Gbps`
                type: string
              bgpAdminState:
                description: Set to `ENABLED` (the default) to activate the BGP session
                  of the virtual circuit, set to `DISABLED` to deactivate the virtual
                  circuit.
                type: string
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment to contain the virtual circuit.
                type: string
              crossConnectMappings:
                description: |-
                  Create a `CrossConnectMapping` for each cross-connect or cross-connect
                  group this virtual circuit will run on.
                items:
                  description: VirtualCircuitCrossConnectMapping defines nested fields
                    for VirtualCircuit.CrossConnectMapping.
                  properties:
                    bgpMd5AuthKey:
                      description: |-
                        The key for BGP MD5 authentication. Only applicable if your system
                        requires MD5 authentication. If empty or not set (null), that
                        means you don't use BGP MD5 authentication.
                      type: string
                    crossConnectOrCrossConnectGroupId:
                      description: |-
                        The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the cross-connect or cross-connect group for this mapping.
                        Specified by the owner of the cross-connect or cross-connect group (the
                        customer if the customer is colocated with Oracle, or the provider if the
                        customer is connecting via provider).
                      type: string
                    customerBgpPeeringIp:
                      description: |-
                        The BGP IPv4 address for the router on the other end of the BGP session from
                        Oracle. Specified by the owner of that router. If the session goes from Oracle
                        to a customer, this is the BGP IPv4 address of the customer's edge router. If the
                        session goes from Oracle to a provider, this is the BGP IPv4 address of the
                        provider's edge router. Must use a subnet mask from /28 to /31.
                        There's one exception: for a public virtual circuit, Oracle specifies the BGP IPv4 addresses.
                        Example: `10.0.0.18/31`
                      type: string
                    customerBgpPeeringIpv6:
                      description: |-
                        The BGP IPv6 address for the router on the other end of the BGP session from
                        Oracle. Specified by the owner of that router. If the session goes from Oracle
                        to a customer, this is the BGP IPv6 address of the customer's edge router. If the
                        session goes from Oracle to a provider, this is the BGP IPv6 address of the
                        provider's edge router. Only subnet masks from /64 up to /127 are allowed.
                        There's one exception: for a public virtual circuit, Oracle specifies the BGP IPv6 addresses.
                        IPv6 addressing is supported for all commercial and government regions. See
                        IPv6 Addresses (https://docs.cloud.oracle.com/iaas/Content/Network/Concepts/ipv6.htm).
                        Example: `2001:db8::1/64`
                      type: string
                    oracleBgpPeeringIp:
                      description: |-
                        The IPv4 address for Oracle's end of the BGP session. Must use a subnet mask from /28 to /31.
                        If the session goes from Oracle to a customer's edge router,
                        the customer specifies this information. If the session goes from Oracle to
                        a provider's edge router, the provider specifies this.
                        There's one exception: for a public virtual circuit, Oracle specifies the BGP IPv4 addresses.
                        Example: `10.0.0.19/31`
                      type: string
                    oracleBgpPeeringIpv6:
                      description: |-
                        The IPv6 address for Oracle's end of the BGP session. Only subnet masks from /64 up to /127 are allowed.
                        If the session goes from Oracle to a customer's edge router,
                        the customer specifies this information. If the session goes from Oracle to
                        a provider's edge router, the provider specifies this.
                        There's one exception: for a public virtual circuit, Oracle specifies the BGP IPv6 addresses.
                        Note that IPv6 addressing is currently supported only in certain regions. See
                        IPv6 Addresses (https://docs.cloud.oracle.com/iaas/Content/Network/Concepts/ipv6.htm).
                        Example: `2001:db8::2/64`
                      type: string
                    vlan:
                      description: |-
                        The number of the specific VLAN (on the cross-connect or cross-connect group)
                        that is assigned to this virtual circuit. Specified by the owner of the cross-connect
                        or cross-connect group (the customer if the customer is colocated with Oracle, or
                        the provider if the customer is connecting via provider).
                        Example: `200`
                      type: integer
                  type: object
                type: array
              customerAsn:
                description: |-
                  Your BGP ASN (either public or private). Provide this value only if
                  there's a BGP session that goes from your edge router to Oracle.
                  Otherwise, leave this empty or null.
                  Can be a 2-byte or 4-byte ASN. Uses "asplain" format.
                  Example: `12345` (2-byte) or `1587232876` (4-byte)
                format: int64
                type: integer
              customerBgpAsn:
                description: |-
                  Deprecated. Instead use `customerAsn`.
                  If you specify values for both, the request will be rejected.
                type: integer
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a
                  namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name. Does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no
                  predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              gatewayId:
                description: |-
                  For private virtual circuits only. The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the Drg
                  that this virtual circuit uses.
                type: string
              ipMtu:
                description: The layer 3 IP MTU to use with this virtual circuit.
                type: string
              isBfdEnabled:
                description: Set to `true` to enable BFD for IPv4 BGP peering, or
                  set to `false` to disable BFD. If this is not set, the default is
                  `false`.
                type: boolean
              isTransportMode:
                description: Set to `true` for the virtual circuit to carry only encrypted
                  traffic, or set to `false` for the virtual circuit to carry unencrypted
                  traffic. If this is not set, the default is `false`.
                type: boolean
              providerName:
                description: |-
                  Deprecated. Instead use `providerServiceId`.
                  To get a list of the provider names, see
                  ListFastConnectProviderServices.
                type: string
              providerServiceId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the service offered by the provider (if you're connecting
                  via a provider). To get a list of the available service offerings, see
                  ListFastConnectProviderServices.
                type: string
              providerServiceKeyName:
                description: The service key name offered by the provider (if the
                  customer is connecting via a provider).
                type: string
              providerServiceName:
                description: |-
                  Deprecated. Instead use `providerServiceId`.
                  To get a list of the provider names, see
                  ListFastConnectProviderServices.
                type: string
              providerState:
                description: |-
                  The provider's state in relation to this virtual circuit. Relevant only
                  if the customer is using FastConnect via a provider. ACTIVE
                  means the provider has provisioned the virtual circuit from their
                  end. INACTIVE means the provider has not yet provisioned the virtual
                  circuit, or has de-provisioned it.
                  To be updated only by the provider.
                type: string
              publicPrefixes:
                description: |-
                  For a public virtual circuit. The public IP prefixes (CIDRs) the customer wants to
                  advertise across the connection.
                items:
                  description: VirtualCircuitPublicPrefixFields defines nested fields
                    for VirtualCircuit.PublicPrefix.
                  properties:
                    cidrBlock:
                      description: |-
                        An individual public IP prefix (CIDR) to add to the public virtual circuit.
                        All prefix sizes are allowed.
                      type: string
                  required:
                  - cidrBlock
                  type: object
                type: array
              referenceComment:
                description: |-
                  Provider-supplied reference information about this virtual circuit.
                  Relevant only if the customer is using FastConnect via a provider.
                  To be updated only by the provider.
                type: string
              region:
                description: |-
                  The Oracle Cloud Infrastructure region where this virtual
                  circuit is located.
                  Example: `phx`
                type: string
              routingPolicy:
                description: |-
                  The routing policy sets how routing information about the Oracle cloud is shared over a public virtual circuit.
                  Policies available are: `ORACLE_SERVICE_NETWORK`, `REGIONAL`, `MARKET_LEVEL`, and `GLOBAL`.
                  See Route Filtering (https://docs.cloud.oracle.com/iaas/Content/Network/Concepts/routingonprem.htm#route_filtering) for details.
                  By default, routing information is shared for all routes in the same market.
                items:
                  type: string
                type: array
              type:
                description: |-
                  The type of IP addresses used in this virtual circuit. PRIVATE
                  means RFC 1918 (https://tools.ietf.org/html/rfc1918) addresses
                  (10.0.0.0/8, 172.16/12, and 192.168/16).
                type: string
            required:
            - compartmentId
            - type
            type: object
          status:
            description: VirtualCircuitStatus defines the observed state of VirtualCircuit.
            properties:
              bgpIpv6SessionState:
                description: The state of the Ipv6 BGP session associated with the
                  virtual circuit.
                type: string
              bgpManagement:
                description: |-
                  Deprecated. Instead use the information in
                  FastConnectProviderService.
                type: string
              bgpSessionState:
                description: The state of the Ipv4 BGP session associated with the
                  virtual circuit.
                type: string
              id:
                description: The virtual circuit's Oracle ID (OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)).
                type: string
              lifecycleState:
                description: |-
                  The virtual circuit's current state. For information about
                  the different states, see
                  FastConnect Overview (https://docs.cloud.oracle.com/iaas/Content/Network/Concepts/fastconnect.htm).
                type: string
              oracleBgpAsn:
                description: The Oracle BGP ASN.
                type: integer
              serviceType:
                description: Provider service type.
                type: string
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time the virtual circuit was created,
                  in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339).
                  Example: `2016-08-25T21:10:29.600Z`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
