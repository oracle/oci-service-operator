---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: ipsecconnectiontunnels.core.oracle.com
spec:
  group: core.oracle.com
  names:
    kind: IPSecConnectionTunnel
    listKind: IPSecConnectionTunnelList
    plural: ipsecconnectiontunnels
    singular: ipsecconnectiontunnel
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the IPSecConnectionTunnel
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the IPSecConnectionTunnel
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: IPSecConnectionTunnel is the Schema for the ipsecconnectiontunnels
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: IPSecConnectionTunnelSpec defines the desired state of IPSecConnectionTunnel.
            properties:
              associatedVirtualCircuits:
                description: The list of virtual circuit OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)s
                  over which your network can reach this tunnel.
                items:
                  type: string
                type: array
              bgpSessionConfig:
                description: IPSecConnectionTunnelBgpSessionConfig defines nested
                  fields for IPSecConnectionTunnel.BgpSessionConfig.
                properties:
                  customerBgpAsn:
                    description: |-
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this ASN
                      is required and used for the tunnel's BGP session. This is the ASN of the network on the
                      CPE end of the BGP session. Can be a 2-byte or 4-byte ASN. Uses "asplain" format.
                      If the tunnel's `routing` attribute is set to `STATIC`, the `customerBgpAsn` must be null.
                      Example: `12345` (2-byte) or `1587232876` (4-byte)
                    type: string
                  customerInterfaceIp:
                    description: |-
                      The IP address for the CPE end of the inside tunnel interface.
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this IP address
                      is required and used for the tunnel's BGP session.
                      If `routing` is instead set to `STATIC`, this IP address is optional. You can set this IP
                      address to troubleshoot or monitor the tunnel.
                      The value must be a /30 or /31.
                      Example: `10.0.0.5/31`
                    type: string
                  customerInterfaceIpv6:
                    description: |-
                      The IPv6 address for the CPE end of the inside tunnel interface. This IP address is optional.
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this IP address
                      is used for the tunnel's BGP session.
                      If `routing` is instead set to `STATIC`, you can set this IP
                      address to troubleshoot or monitor the tunnel.
                      Only subnet masks from /64 up to /127 are allowed.
                      Example: `2001:db8::1/64`
                    type: string
                  oracleInterfaceIp:
                    description: |-
                      The IP address for the Oracle end of the inside tunnel interface.
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this IP address
                      is required and used for the tunnel's BGP session.
                      If `routing` is instead set to `STATIC`, this IP address is optional. You can set this IP
                      address to troubleshoot or monitor the tunnel.
                      The value must be a /30 or /31.
                      Example: `10.0.0.4/31`
                    type: string
                  oracleInterfaceIpv6:
                    description: |-
                      The IPv6 address for the Oracle end of the inside tunnel interface. This IP address is optional.
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this IP address
                      is used for the tunnel's BGP session.
                      If `routing` is instead set to `STATIC`, you can set this IP
                      address to troubleshoot or monitor the tunnel.
                      Only subnet masks from /64 up to /127 are allowed.
                      Example: `2001:db8::1/64`
                    type: string
                type: object
              displayName:
                description: |-
                  A user-friendly name. Does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                type: string
              dpdConfig:
                description: IPSecConnectionTunnelDpdConfig defines nested fields
                  for IPSecConnectionTunnel.DpdConfig.
                properties:
                  dpdMode:
                    description: This option defines whether DPD can be initiated
                      from the Oracle side of the connection.
                    type: string
                  dpdTimeoutInSec:
                    description: DPD timeout in seconds. This sets the longest interval
                      between CPE device health messages before the IPSec connection
                      indicates it has lost contact with the CPE. The default is 20
                      seconds.
                    type: integer
                type: object
              drgRouteTableId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the DRG route table assigned to this attachment.
                  The DRG route table manages traffic inside the DRG.
                type: string
              encryptionDomainConfig:
                description: IPSecConnectionTunnelEncryptionDomainConfig defines nested
                  fields for IPSecConnectionTunnel.EncryptionDomainConfig.
                properties:
                  cpeTrafficSelector:
                    description: Lists IPv4 or IPv6-enabled subnets in your on-premises
                      network.
                    items:
                      type: string
                    type: array
                  oracleTrafficSelector:
                    description: Lists IPv4 or IPv6-enabled subnets in your Oracle
                      tenancy.
                    items:
                      type: string
                    type: array
                type: object
              ikeVersion:
                description: Internet Key Exchange protocol version.
                type: string
              natTranslationEnabled:
                description: |-
                  By default (the `AUTO` setting), IKE sends packets with a source and destination port set to 500,
                  and when it detects that the port used to forward packets has changed (most likely because a NAT device
                  is between the CPE device and the Oracle VPN headend) it will try to negotiate the use of NAT-T.
                  The `ENABLED` option sets the IKE protocol to use port 4500 instead of 500 and forces encapsulating traffic with the ESP protocol inside UDP packets.
                  The `DISABLED` option directs IKE to completely refuse to negotiate NAT-T
                  even if it senses there may be a NAT device in use.
                type: string
              oracleInitiation:
                description: Indicates whether the Oracle end of the IPSec connection
                  is able to initiate starting up the IPSec tunnel.
                type: string
              oracleTunnelIp:
                description: The headend IP that you can choose on the Oracle side
                  to terminate your private IPSec tunnel.
                type: string
              phaseOneConfig:
                description: IPSecConnectionTunnelPhaseOneConfig defines nested fields
                  for IPSecConnectionTunnel.PhaseOneConfig.
                properties:
                  authenticationAlgorithm:
                    description: The custom authentication algorithm proposed during
                      phase one tunnel negotiation.
                    type: string
                  diffieHelmanGroup:
                    description: The custom Diffie-Hellman group proposed during phase
                      one tunnel negotiation.
                    type: string
                  encryptionAlgorithm:
                    description: The custom encryption algorithm proposed during phase
                      one tunnel negotiation.
                    type: string
                  isCustomPhaseOneConfig:
                    description: Indicates whether custom configuration is enabled
                      for phase one options.
                    type: boolean
                  lifetimeInSeconds:
                    description: Internet key association (IKE) session key lifetime
                      in seconds for IPSec phase one. The default is 28800 which is
                      equivalent to 8 hours.
                    type: integer
                type: object
              phaseTwoConfig:
                description: IPSecConnectionTunnelPhaseTwoConfig defines nested fields
                  for IPSecConnectionTunnel.PhaseTwoConfig.
                properties:
                  authenticationAlgorithm:
                    description: The authentication algorithm proposed during phase
                      two tunnel negotiation.
                    type: string
                  encryptionAlgorithm:
                    description: The encryption algorithm proposed during phase two
                      tunnel negotiation.
                    type: string
                  isCustomPhaseTwoConfig:
                    description: Indicates whether custom configuration is enabled
                      for phase two options.
                    type: boolean
                  isPfsEnabled:
                    description: Indicates whether perfect forward secrecy (PFS) is
                      enabled.
                    type: boolean
                  lifetimeInSeconds:
                    description: Lifetime in seconds for the IPSec session key set
                      in phase two. The default is 3600 which is equivalent to 1 hour.
                    type: integer
                  pfsDhGroup:
                    description: The Diffie-Hellman group used for PFS, if PFS is
                      enabled.
                    type: string
                type: object
              routing:
                description: The type of routing to use for this tunnel (BGP dynamic
                  routing, static routing, or policy-based routing).
                type: string
              sharedSecret:
                description: |-
                  The shared secret (pre-shared key) to use for the IPSec tunnel. Only numbers, letters, and
                  spaces are allowed. If you don't provide a value,
                  Oracle generates a value for you. You can specify your own shared secret later if
                  you like with UpdateIPSecConnectionTunnelSharedSecret.
                type: string
            type: object
          status:
            description: IPSecConnectionTunnelStatus defines the observed state of
              IPSecConnectionTunnel.
            properties:
              associatedVirtualCircuits:
                description: The list of virtual circuit OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)s
                  over which your network can reach this tunnel.
                items:
                  type: string
                type: array
              bgpSessionInfo:
                description: IPSecConnectionTunnelBgpSessionInfo defines nested fields
                  for IPSecConnectionTunnel.BgpSessionInfo.
                properties:
                  bgpIpv6State:
                    description: The state of the BGP IPv6 session.
                    type: string
                  bgpState:
                    description: The state of the BGP session.
                    type: string
                  customerBgpAsn:
                    description: |-
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this ASN
                      is required and used for the tunnel's BGP session. This is the ASN of the network on the
                      CPE end of the BGP session. Can be a 2-byte or 4-byte ASN. Uses "asplain" format.
                      If the tunnel uses static routing, the `customerBgpAsn` must be null.
                      Example: `12345` (2-byte) or `1587232876` (4-byte)
                    type: string
                  customerInterfaceIp:
                    description: |-
                      The IP address for the CPE end of the inside tunnel interface.
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this IP address
                      is required and used for the tunnel's BGP session.
                      If `routing` is instead set to `STATIC`, this IP address is optional. You can set this IP
                      address so you can troubleshoot or monitor the tunnel.
                      The value must be a /30 or /31.
                      Example: `10.0.0.5/31`
                    type: string
                  customerInterfaceIpv6:
                    description: |-
                      The IPv6 address for the CPE end of the inside tunnel interface. This IP address is optional.
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this IP address
                      is used for the tunnel's BGP session.
                      If `routing` is instead set to `STATIC`, you can set this IP
                      address to troubleshoot or monitor the tunnel.
                      Only subnet masks from /64 up to /127 are allowed.
                      Example: `2001:db8::1/64`
                    type: string
                  oracleBgpAsn:
                    description: The Oracle BGP ASN.
                    type: string
                  oracleInterfaceIp:
                    description: |-
                      The IP address for the Oracle end of the inside tunnel interface.
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this IP address
                      is required and used for the tunnel's BGP session.
                      If `routing` is instead set to `STATIC`, this IP address is optional. You can set this IP
                      address so you can troubleshoot or monitor the tunnel.
                      The value must be a /30 or /31.
                      Example: `10.0.0.4/31`
                    type: string
                  oracleInterfaceIpv6:
                    description: |-
                      The IPv6 address for the Oracle end of the inside tunnel interface. This IP address is optional.
                      If the tunnel's `routing` attribute is set to `BGP`
                      (see IPSecConnectionTunnel), this IP address
                      is used for the tunnel's BGP session.
                      If `routing` is instead set to `STATIC`, you can set this IP
                      address to troubleshoot or monitor the tunnel.
                      Only subnet masks from /64 up to /127 are allowed.
                      Example: `2001:db8::1/64`
                    type: string
                type: object
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment containing the tunnel.
                type: string
              cpeIp:
                description: |-
                  The IP address of the CPE device's VPN headend.
                  Example: `203.0.113.22`
                type: string
              displayName:
                description: |-
                  A user-friendly name. Does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                type: string
              dpdMode:
                description: |-
                  Dead peer detection (DPD) mode set on the Oracle side of the connection.
                  This mode sets whether Oracle can only respond to a request from the CPE device to start DPD,
                  or both respond to and initiate requests.
                type: string
              dpdTimeoutInSec:
                description: DPD timeout in seconds.
                type: integer
              encryptionDomainConfig:
                description: IPSecConnectionTunnelEncryptionDomainConfig defines nested
                  fields for IPSecConnectionTunnel.EncryptionDomainConfig.
                properties:
                  cpeTrafficSelector:
                    description: Lists IPv4 or IPv6-enabled subnets in your on-premises
                      network.
                    items:
                      type: string
                    type: array
                  oracleTrafficSelector:
                    description: Lists IPv4 or IPv6-enabled subnets in your Oracle
                      tenancy.
                    items:
                      type: string
                    type: array
                type: object
              id:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the tunnel.
                type: string
              ikeVersion:
                description: Internet Key Exchange protocol version.
                type: string
              lifecycleState:
                description: The tunnel's lifecycle state.
                type: string
              natTranslationEnabled:
                description: |-
                  By default (the `AUTO` setting), IKE sends packets with a source and destination port set to 500,
                  and when it detects that the port used to forward packets has changed (most likely because a NAT device
                  is between the CPE device and the Oracle VPN headend) it will try to negotiate the use of NAT-T.
                  The `ENABLED` option sets the IKE protocol to use port 4500 instead of 500 and forces encapsulating traffic with the ESP protocol inside UDP packets.
                  The `DISABLED` option directs IKE to completely refuse to negotiate NAT-T
                  even if it senses there may be a NAT device in use.

                  .
                type: string
              oracleCanInitiate:
                description: Indicates whether Oracle can only respond to a request
                  to start an IPSec tunnel from the CPE device, or both respond to
                  and initiate requests.
                type: string
              phaseOneDetails:
                description: IPSecConnectionTunnelPhaseOneDetails defines nested fields
                  for IPSecConnectionTunnel.PhaseOneDetails.
                properties:
                  customAuthenticationAlgorithm:
                    description: The proposed custom authentication algorithm.
                    type: string
                  customDhGroup:
                    description: The proposed custom Diffie-Hellman group.
                    type: string
                  customEncryptionAlgorithm:
                    description: The proposed custom encryption algorithm.
                    type: string
                  isCustomPhaseOneConfig:
                    description: |-
                      Indicates whether custom phase one configuration is enabled.
                      If this option is not enabled, default settings are proposed.
                    type: boolean
                  isIkeEstablished:
                    description: Indicates whether IKE phase one is established.
                    type: boolean
                  lifetime:
                    description: The total configured lifetime of the IKE security
                      association.
                    format: int64
                    type: integer
                  negotiatedAuthenticationAlgorithm:
                    description: The negotiated authentication algorithm.
                    type: string
                  negotiatedDhGroup:
                    description: The negotiated Diffie-Hellman group.
                    type: string
                  negotiatedEncryptionAlgorithm:
                    description: The negotiated encryption algorithm.
                    type: string
                  remainingLifetime:
                    description: The remaining lifetime before the key is refreshed.
                    format: int64
                    type: integer
                  remainingLifetimeLastRetrieved:
                    description: |-
                      The date and time we retrieved the remaining lifetime, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339).
                      Example: `2016-08-25T21:10:29.600Z`
                    type: string
                type: object
              phaseTwoDetails:
                description: IPSecConnectionTunnelPhaseTwoDetails defines nested fields
                  for IPSecConnectionTunnel.PhaseTwoDetails.
                properties:
                  customAuthenticationAlgorithm:
                    description: Phase two authentication algorithm proposed during
                      tunnel negotiation.
                    type: string
                  customEncryptionAlgorithm:
                    description: The proposed custom phase two encryption algorithm.
                    type: string
                  dhGroup:
                    description: The proposed Diffie-Hellman group.
                    type: string
                  isCustomPhaseTwoConfig:
                    description: |-
                      Indicates whether custom phase two configuration is enabled.
                      If this option is not enabled, default settings are proposed.
                    type: boolean
                  isEspEstablished:
                    description: Indicates that ESP phase two is established.
                    type: boolean
                  isPfsEnabled:
                    description: Indicates that PFS (perfect forward secrecy) is enabled.
                    type: boolean
                  lifetime:
                    description: The total configured lifetime of the IKE security
                      association.
                    format: int64
                    type: integer
                  negotiatedAuthenticationAlgorithm:
                    description: The negotiated phase two authentication algorithm.
                    type: string
                  negotiatedDhGroup:
                    description: The negotiated Diffie-Hellman group.
                    type: string
                  negotiatedEncryptionAlgorithm:
                    description: The negotiated encryption algorithm.
                    type: string
                  remainingLifetime:
                    description: The remaining lifetime before the key is refreshed.
                    format: int64
                    type: integer
                  remainingLifetimeLastRetrieved:
                    description: |-
                      The date and time the remaining lifetime was last retrieved, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339).
                      Example: `2016-08-25T21:10:29.600Z`
                    type: string
                type: object
              routing:
                description: The type of routing used for this tunnel (BGP dynamic
                  routing, static routing, or policy-based routing).
                type: string
              sdkStatus:
                description: |-
                  The status of the tunnel based on IPSec protocol characteristics.
                  This uses a distinct JSON name so it can coexist with the OSOK status envelope.
                type: string
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time the IPSec tunnel was created, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339).
                  Example: `2016-08-25T21:10:29.600Z`
                type: string
              timeStatusUpdated:
                description: |-
                  When the status of the IPSec tunnel last changed, in the format defined by RFC3339 (https://tools.ietf.org/html/rfc3339).
                  Example: `2016-08-25T21:10:29.600Z`
                type: string
              vpnIp:
                description: |-
                  The IP address of the Oracle VPN headend for the connection.
                  Example: `203.0.113.21`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
