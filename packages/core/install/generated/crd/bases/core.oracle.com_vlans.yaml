    controller-gen.kubebuilder.io/version: v0.17.0
  name: vlans.core.oracle.com
spec:
  group: core.oracle.com
  names:
    kind: Vlan
    listKind: VlanList
    plural: vlans
    singular: vlan
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the Vlan
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Vlan
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Vlan is the Schema for the vlans API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VlanSpec defines the desired state of Vlan.
            properties:
              availabilityDomain:
                description: |-
                  Controls whether the VLAN is regional or specific to an availability domain.
                  A regional VLAN has the flexibility to implement failover across availability domains.
                  Previously, all VLANs were AD-specific.
                  To create a regional VLAN, omit this attribute. Resources created subsequently in this
                  VLAN (such as a Compute instance) can be created in any availability domain in the region.
                  To create an AD-specific VLAN, use this attribute to specify the availability domain.
                  Resources created in this VLAN must be in that availability domain.
                  Example: `Uocm:PHX-AD-1`
                type: string
              cidrBlock:
                description: |-
                  The range of IPv4 addresses that will be used for layer 3 communication with
                  hosts outside the VLAN. The CIDR must maintain the following rules -
                  1. The CIDR block is valid and correctly formatted.
                  2. The new range is within one of the parent VCN ranges.
                  Example: `192.0.2.0/24`
                type: string
              compartmentId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment to contain the VLAN.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a
                  namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name. Does not have to be unique, and it's changeable.
                  Avoid entering confidential information.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no
                  predefined name, type, or namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              nsgIds:
                description: |-
                  A list of the OCIDs of the network security groups (NSGs) to add all VNICs in the VLAN to. For more
                  information about NSGs, see
                  NetworkSecurityGroup.
                items:
                  type: string
                type: array
              routeTableId:
                description: |-
                  The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the route table the VLAN will use. If you don't provide a value,
                  the VLAN uses the VCN's default route table.
                type: string
              vcnId:
                description: The OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the VCN to contain the VLAN.
                type: string
              vlanTag:
                description: |-
                  The IEEE 802.1Q VLAN tag for this VLAN. The value must be unique across all
                  VLANs in the VCN. If you don't provide a value, Oracle assigns one.
                  You cannot change the value later. VLAN tag 0 is reserved for use by Oracle.
                type: integer
            required:
            - cidrBlock
            - compartmentId
            - vcnId
            type: object
          status:
            description: VlanStatus defines the observed state of Vlan.
            properties:
              id:
                description: The VLAN's Oracle ID (OCID (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/identifiers.htm)).
