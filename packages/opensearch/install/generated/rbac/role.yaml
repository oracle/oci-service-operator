---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - opensearch.oracle.com
  resources:
  - opensearchclusters
  - opensearchversions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - opensearch.oracle.com
  resources:
  - opensearchclusters/finalizers
  - opensearchversions/finalizers
  verbs:
  - update
- apiGroups:
  - opensearch.oracle.com
  resources:
  - opensearchclusters/status
  - opensearchversions/status
  verbs:
  - get
  - patch
  - update
