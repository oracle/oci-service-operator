---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: mounttargets.filestorage.oracle.com
spec:
  group: filestorage.oracle.com
  names:
    kind: MountTarget
    listKind: MountTargetList
    plural: mounttargets
    singular: mounttarget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the MountTarget
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the MountTarget
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: MountTarget is the Schema for the mounttargets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MountTargetSpec defines the desired state of MountTarget.
            properties:
              availabilityDomain:
                description: |-
                  The availability domain in which to create the mount target.
                  Example: `Uocm:PHX-AD-1`
                type: string
              compartmentId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment in which to create the mount target.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name. It does not have to be unique, and it is changeable.
                  Avoid entering confidential information.
                  Example: `My mount target`
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair
                   with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              hostnameLabel:
                description: |-
                  The hostname for the mount target's IP address, used for
                  DNS resolution. The value is the hostname portion of the private IP
                  address's fully qualified domain name (FQDN). For example,
                  `files-1` in the FQDN `files-1.subnet123.vcn1.oraclevcn.com`.
                  Must be unique across all VNICs in the subnet and comply
                  with RFC 952 (https://tools.ietf.org/html/rfc952)
                  and RFC 1123 (https://tools.ietf.org/html/rfc1123).
                  Note:
                  If the IP address is IPv4, this attribute value is stored in the
                  PrivateIp (https://docs.oracle.com/iaas/en-us/iaas/api/#/en/iaas/20160918/PrivateIp/) resource,
                  not in the `mountTarget` resource.
                  To update the `hostnameLabel`, use `GetMountTarget` to obtain the
                  OCIDs (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the mount target's
                  private IPs (`privateIpIds`). Then, you can use
                  UpdatePrivateIp (https://docs.oracle.com/iaas/en-us/iaas/api/#/en/iaas/20160918/PrivateIp/UpdatePrivateIp)
                  to update the `hostnameLabel` value.
                  If the IP address is IPv6, it is stored in the
                  Ipv6  (https://docs.oracle.com/en-us/iaas/api/#/en/iaas/20160918/Ipv6) resource
                  To update the `hostnameLabel`, use `GetMountTarget` to obtain the
                  OCIDs (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the mount target's
                  IPv6 address (`mountTargetIpv6Ids`). Then, you can use
                  UpdateIpv6 (https://docs.oracle.com/iaas/en-us/iaas/api/#/en/iaas/20160918/Ipv6/UpdateIpv6)
                  to update the `hostnameLabel` value.
                  For more information, see
                  DNS in Your Virtual Cloud Network (https://docs.oracle.com/iaas/Content/Network/Concepts/dns.htm).
                  Example: `files-1`
                type: string
              idmapType:
                description: The method used to map a Unix UID to secondary groups,
                  if any.
                type: string
              ipAddress:
                description: |-
                  A private IP address of your choice. Must be an available IP address within
                  the subnet's CIDR. If you don't specify a value, Oracle automatically
                  assigns a private IP address from the subnet.
                  Example: `10.0.3.3`
                type: string
              kerberos:
                description: MountTargetKerberos defines nested fields for MountTarget.Kerberos.
                properties:
                  backupKeyTabSecretVersion:
                    description: Version of the keytab Secret in the Vault to use
                      as a backup.
                    type: integer
                  currentKeyTabSecretVersion:
                    description: Version of the keytab Secret in the Vault to use.
                    type: integer
                  isKerberosEnabled:
                    description: Specifies whether to enable or disable Kerberos.
                    type: boolean
                  kerberosRealm:
                    description: The Kerberos realm that the mount target will join.
                    type: string
                  keyTabSecretId:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the keytab Secret in the Vault.
                    type: string
                required:
                - kerberosRealm
                type: object
              ldapIdmap:
                description: MountTargetLdapIdmap defines nested fields for MountTarget.LdapIdmap.
                properties:
                  cacheLifetimeSeconds:
                    description: The maximum amount of time the mount target is allowed
                      to use a cached entry.
                    type: integer
                  cacheRefreshIntervalSeconds:
                    description: The amount of time that the mount target should allow
                      an entry to persist in its cache before attempting to refresh
                      the entry.
                    type: integer
                  groupSearchBase:
                    description: |-
                      All LDAP searches are recursive starting at this group.
                      Example: `CN=Group,DC=domain,DC=com`
                    type: string
                  negativeCacheLifetimeSeconds:
                    description: The amount of time that a mount target will maintain
                      information that a user is not found in the ID mapping configuration.
                    type: integer
                  outboundConnector1Id:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the first connector to use to communicate with the LDAP server.
                    type: string
                  outboundConnector2Id:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the second connector to use to communicate with the LDAP
                      server.
                    type: string
                  schemaType:
                    description: Schema type of the LDAP account.
                    type: string
                  userSearchBase:
                    description: |-
                      All LDAP searches are recursive starting at this user.
                      Example: `CN=User,DC=domain,DC=com`
                    type: string
                type: object
              locks:
                description: Locks associated with this resource.
                items:
                  description: MountTargetLock defines nested fields for MountTarget.Lock.
                  properties:
                    message:
                      description: |-
                        A message added by the creator of the lock. This is typically used to give an
                        indication of why the resource is locked.
                      type: string
                    relatedResourceId:
                      description: The ID of the resource that is locking this resource.
                        Indicates that deleting this resource will remove the lock.
                      type: string
                    timeCreated:
                      description: When the lock was created.
                      type: string
                    type:
                      description: Type of the lock.
                      type: string
                  required:
                  - type
                  type: object
                type: array
              nsgIds:
                description: |-
                  A list of Network Security Group OCIDs (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) associated with this mount target.
                  A maximum of 5 is allowed.
                  Setting this to an empty array after the list is created removes the mount target from all NSGs.
                  For more information about NSGs, see Security Rules (https://docs.oracle.com/iaas/Content/Network/Concepts/securityrules.htm).
                items:
                  type: string
                type: array
              requestedThroughput:
                description: |-
                  Throughput for mount target in Gbps. Currently only 1 Gbps of requestedThroughput is supported during create MountTarget.
                  Available shapes and corresponding throughput are listed at Mount Target Performance (https://docs.oracle.com/iaas/Content/File/Tasks/managingmounttargets.htm#performance).
                format: int64
                type: integer
              securityAttributes:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Security attributes (https://docs.oracle.com/iaas/Content/zero-trust-packet-routing/zpr-artifacts.htm#security-attributes) are labels
                  for a resource that can be referenced in a Zero Trust Packet Routing (https://docs.oracle.com/iaas/Content/zero-trust-packet-routing/overview.htm)
                  (ZPR) policy to control access to ZPR-supported resources.
                  Example: `{"Oracle-ZPR": {"MaxEgressCount": {"value": "42", "mode": "enforce"}}}`
                type: object
              subnetId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the subnet in which to create the mount target.
                type: string
            required:
            - availabilityDomain
            - compartmentId
            - subnetId
            type: object
          status:
            description: MountTargetStatus defines the observed state of MountTarget.
            properties:
              availabilityDomain:
                description: |-
                  The availability domain the mount target is in. May be unset
                  as a blank or NULL value.
                  Example: `Uocm:PHX-AD-1`
                type: string
              compartmentId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the compartment that contains the mount target.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name. It does not have to be unique, and it is changeable.
                  Avoid entering confidential information.
                  Example: `My mount target`
                type: string
              exportSetId:
                description: |-
                  The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the associated export set. Controls what file
                  systems will be exported through Network File System (NFS) protocol on this
                  mount target.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair
                   with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              id:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the mount target.
                type: string
              idmapType:
                description: The method used to map a Unix UID to secondary groups.
                  If NONE, the mount target will not use the Unix UID for ID mapping.
                type: string
              kerberos:
                description: MountTargetKerberos defines nested fields for MountTarget.Kerberos.
                properties:
                  backupKeyTabSecretVersion:
                    description: Version of the keytab Secret in the Vault to use
                      as a backup.
                    type: integer
                  currentKeyTabSecretVersion:
                    description: Version of the keytab Secret in the Vault to use.
                    type: integer
                  isKerberosEnabled:
                    description: Specifies whether to enable or disable Kerberos.
                    type: boolean
                  kerberosRealm:
                    description: The Kerberos realm that the mount target will join.
                    type: string
                  keyTabSecretId:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the keytab Secret in the Vault.
                    type: string
                required:
                - kerberosRealm
                type: object
              ldapIdmap:
                description: MountTargetLdapIdmap defines nested fields for MountTarget.LdapIdmap.
                properties:
                  cacheLifetimeSeconds:
                    description: The maximum amount of time the mount target is allowed
                      to use a cached entry.
                    type: integer
                  cacheRefreshIntervalSeconds:
                    description: The amount of time that the mount target should allow
                      an entry to persist in its cache before attempting to refresh
                      the entry.
                    type: integer
                  groupSearchBase:
                    description: |-
                      All LDAP searches are recursive starting at this group.
                      Example: `CN=Group,DC=domain,DC=com`
                    type: string
                  negativeCacheLifetimeSeconds:
                    description: The amount of time that a mount target will maintain
                      information that a user is not found in the ID mapping configuration.
                    type: integer
                  outboundConnector1Id:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the first connector to use to communicate with the LDAP server.
                    type: string
                  outboundConnector2Id:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the second connector to use to communicate with the LDAP
                      server.
                    type: string
                  schemaType:
                    description: Schema type of the LDAP account.
                    type: string
                  userSearchBase:
                    description: |-
                      All LDAP searches are recursive starting at this user.
                      Example: `CN=User,DC=domain,DC=com`
                    type: string
                type: object
              lifecycleDetails:
                description: Additional information about the current 'lifecycleState'.
                type: string
              lifecycleState:
                description: The current state of the mount target.
                type: string
              locks:
                description: Locks associated with this resource.
                items:
                  description: MountTargetLock defines nested fields for MountTarget.Lock.
                  properties:
                    message:
                      description: |-
                        A message added by the creator of the lock. This is typically used to give an
                        indication of why the resource is locked.
                      type: string
                    relatedResourceId:
                      description: The ID of the resource that is locking this resource.
                        Indicates that deleting this resource will remove the lock.
                      type: string
                    timeCreated:
                      description: When the lock was created.
                      type: string
                    type:
                      description: Type of the lock.
                      type: string
                  required:
                  - type
                  type: object
                type: array
              mountTargetIpv6Ids:
                description: The OCIDs of the IPv6 addresses associated with this
                  mount target.
                items:
                  type: string
                type: array
              nsgIds:
                description: |-
                  A list of Network Security Group OCIDs (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) associated with this mount target.
                  A maximum of 5 is allowed.
                  Setting this to an empty array after the list is created removes the mount target from all NSGs.
                  For more information about NSGs, see Security Rules (https://docs.oracle.com/iaas/Content/Network/Concepts/securityrules.htm).
                items:
                  type: string
                type: array
              observedThroughput:
                description: |-
                  Current billed throughput for mount target in Gbps. This corresponds to shape of mount target.
                  Available shapes and corresponding throughput are listed at Mount Target Performance (https://docs.oracle.com/iaas/Content/File/Tasks/managingmounttargets.htm#performance).
                format: int64
                type: integer
              privateIpIds:
                description: The OCIDs of the private IP addresses associated with
                  this mount target.
                items:
                  type: string
                type: array
              requestedThroughput:
                description: '- New throughput for mount target at the end of billing
                  cycle in Gbps.'
                format: int64
                type: integer
              reservedStorageCapacity:
                description: |-
                  - Reserved capacity (GB) associated with this mount target. Reserved capacity depends on observedThroughput value
                  of mount target. Value is listed at Mount Target Performance (https://docs.oracle.com/iaas/Content/File/Tasks/managingmounttargets.htm#performance).
                format: int64
                type: integer
              securityAttributes:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Security attributes (https://docs.oracle.com/iaas/Content/zero-trust-packet-routing/zpr-artifacts.htm#security-attributes) are labels
                  for a resource that can be referenced in a Zero Trust Packet Routing (https://docs.oracle.com/iaas/Content/zero-trust-packet-routing/overview.htm)
                  (ZPR) policy to control access to ZPR-supported resources.
                  Example: `{"Oracle-ZPR": {"MaxEgressCount": {"value": "42", "mode": "enforce"}}}`
                type: object
              status:
                properties:
                  async:
                    description: |-
                      Async is the canonical controller-owned async contract. Resource-local
                      legacy work-request fields may remain as compatibility mirrors while
                      follow-on migrations land, but new async state should project here first.
                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
                            enum:
                            - none
                            - lifecycle
                            - workrequest
                            type: string
                          updatedAt:
                            format: date-time
                            type: string
                          workRequestId:
                            type: string
                        required:
                        - normalizedClass
                        - phase
                        - source
                        - updatedAt
                        type: object
                    type: object
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  opcRequestId:
                    description: |-
                      OpcRequestID is the latest non-empty OCI request ID from a mutating OCI
                      response or surfaced OCI service error that materially contributed to the
                      current shared status projection. Headerless follow-up observations keep
                      the last non-empty value intact.
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              subnetId:
                description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                  of the subnet the mount target is in.
                type: string
              systemTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  System tags for this resource.
                  System tags are applied to resources by internal OCI services.
                type: object
              timeBillingCycleEnd:
                description: |-
                  The date and time the mount target current billing cycle will end and next one starts, expressed
                    in RFC 3339 (https://tools.ietf.org/rfc/rfc3339) timestamp format.
                    Example: `2016-08-25T21:10:29.600Z`
                type: string
              timeCreated:
                description: |-
                  The date and time the mount target was created, expressed
                  in RFC 3339 (https://tools.ietf.org/rfc/rfc3339) timestamp format.
                  Example: `2016-08-25T21:10:29.600Z`
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
