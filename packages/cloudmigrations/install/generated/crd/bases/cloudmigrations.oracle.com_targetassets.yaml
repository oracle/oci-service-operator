---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: targetassets.cloudmigrations.oracle.com
spec:
  group: cloudmigrations.oracle.com
  names:
    kind: TargetAsset
    listKind: TargetAssetList
    plural: targetassets
    singular: targetasset
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the TargetAsset
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the TargetAsset
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: TargetAsset is the Schema for the targetassets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TargetAssetSpec defines the desired state of TargetAsset.
            properties:
              blockVolumesPerformance:
                description: Performance of the block volumes.
                type: integer
              isExcludedFromExecution:
                description: A boolean indicating whether the asset should be migrated.
                type: boolean
              jsonData:
                type: string
              migrationPlanId:
                description: OCID of the associated migration plan.
                type: string
              msLicense:
                description: Microsoft license for the VM configuration.
                type: string
              preferredShapeType:
                description: Preferred VM shape type that you provide.
                type: string
              type:
                type: string
              userSpec:
                description: TargetAssetUserSpec defines nested fields for TargetAsset.UserSpec.
                properties:
                  agentConfig:
                    description: TargetAssetUserSpecAgentConfig defines nested fields
                      for TargetAsset.UserSpec.AgentConfig.
                    properties:
                      areAllPluginsDisabled:
                        description: |-
                          Whether Oracle Cloud Agent can run all the available plugins.
                          This includes the management and monitoring plugins.
                          To get a list of available plugins, use the
                          ListInstanceagentAvailablePlugins
                          operation in the Oracle Cloud Agent API. For more information about the available plugins, see
                          Managing Plugins with Oracle Cloud Agent (https://docs.oracle.com/iaas/Content/Compute/Tasks/manage-plugins.htm).
                        type: boolean
                      isManagementDisabled:
                        description: |-
                          Whether Oracle Cloud Agent can run all the available management plugins.
                          By default, the value is false (management plugins are enabled).
                          These are the management plugins: OS Management Service Agent and Compute instance
                          run command.
                          The management plugins are controlled by this parameter and the per-plugin
                          configuration in the `pluginsConfig` object.
                          - If `isManagementDisabled` is true, all the management plugins are disabled, regardless of
                          the per-plugin configuration.
                          - If `isManagementDisabled` is false, all the management plugins are enabled. You
                          can optionally disable individual management plugins by providing a value in the `pluginsConfig`
                          object.
                        type: boolean
                      isMonitoringDisabled:
                        description: |-
                          Whether Oracle Cloud Agent can gather performance metrics and monitor the instance using the
                          monitoring plugins. By default, the value is false (monitoring plugins are enabled).
                          These are the monitoring plugins: Compute instance monitoring
                          and Custom logs monitoring.
                          The monitoring plugins are controlled by this parameter and by the per-plugin
                          configuration in the `pluginsConfig` object.
                          - If `isMonitoringDisabled` is true, all the monitoring plugins are disabled, regardless of
                          the per-plugin configuration.
                          - If `isMonitoringDisabled` is false, all the monitoring plugins are enabled. You
                          can optionally disable individual monitoring plugins by providing a value in the `pluginsConfig`
                          object.
                        type: boolean
                      pluginsConfig:
                        description: The configuration of plugins associated with
                          this instance.
                        items:
                          description: TargetAssetUserSpecAgentConfigPluginsConfig
                            defines nested fields for TargetAsset.UserSpec.AgentConfig.PluginsConfig.
                          properties:
                            desiredState:
                              description: |-
                                Whether the plugin should be enabled or disabled.
                                To enable the monitoring and management plugins, the `isMonitoringDisabled` and
                                `isManagementDisabled` attributes must also be set to false.
                              type: string
                            name:
                              description: |-
                                The plugin name. To get a list of available plugins, use the
                                ListInstanceagentAvailablePlugins
                                operation in the Oracle Cloud Agent API. For more information about the available plugins, see
                                Managing Plugins with Oracle Cloud Agent (https://docs.oracle.com/iaas/Content/Compute/Tasks/manage-plugins.htm).
                              type: string
                          required:
                          - desiredState
                          - name
                          type: object
                        type: array
                    type: object
                  availabilityDomain:
                    description: |-
                      The availability domain of the instance.
                      Example: `Uocm:PHX-AD-1`
                    type: string
                  capacityReservationId:
                    description: |-
                      The OCID of the compute capacity reservation under which this instance is launched.
                      You can opt out of all default reservations by specifying an empty string as input for this field.
                      For more information, see Capacity Reservations (https://docs.oracle.com/iaas/Content/Compute/Tasks/reserve-capacity.htm#default).
                    type: string
                  compartmentId:
                    description: The OCID of the compartment.
                    type: string
                  createVnicDetails:
                    description: TargetAssetUserSpecCreateVnicDetails defines nested
                      fields for TargetAsset.UserSpec.CreateVnicDetails.
                    properties:
                      assignPrivateDnsRecord:
                        description: |-
                          Whether the VNIC should be assigned a DNS record. If set to false, there will be no DNS record
                          registration for the VNIC. If set to true, the DNS record will be registered. By default,
                          the value is true.
                          If you specify a `hostnameLabel`, then `assignPrivateDnsRecord` must be set to true.
                        type: boolean
                      assignPublicIp:
                        description: |-
                          Whether the VNIC should be assigned a public IP address. Defaults to whether
                          the subnet is public or private. If not set and the VNIC is being created
                          in a private subnet (that is, where `prohibitPublicIpOnVnic` = true in the
                          Subnet), then no public IP address is assigned.
                          If not set and the subnet is public (`prohibitPublicIpOnVnic` = false), then
                          a public IP address is assigned. If set to true and
                          `prohibitPublicIpOnVnic` = true, an error is returned.
                          **Note:** This public IP address is associated with the primary private IP
                          on the VNIC. For more information, see
                          IP Addresses (https://docs.oracle.com/iaas/Content/Network/Tasks/managingIPaddresses.htm).
                          **Note:** There's a limit to the number of PublicIp
                          a VNIC or instance can have. If you try to create a secondary VNIC
                          with an assigned public IP for an instance that has already
                          reached its public IP limit, an error is returned. For information
                          about the public IP limits, see
                          Public IP Addresses (https://docs.oracle.com/iaas/Content/Network/Tasks/managingpublicIPs.htm).
                          Example: `false`
                          If you specify a `vlanId`, then `assignPublicIp` must be set to false. See
                          Vlan.
                        type: boolean
                      definedTags:
                        additionalProperties:
                          additionalProperties:
                            type: string
                          type: object
                        description: |-
                          Defined tags for this resource. Each key is predefined and scoped to a namespace.
                          Example: `{"foo-namespace": {"bar-key": "value"}}`
                        type: object
                      displayName:
                        description: |-
                          A user-friendly name. Does not have to be unique, and it's changeable.
                          Avoid entering confidential information.
                        type: string
                      freeformTags:
                        additionalProperties:
                          type: string
                        description: |-
                          Simple key-value pair that is applied without any predefined name, type or scope. It exists only for cross-compatibility.
                          Example: `{"bar-key": "value"}`
                        type: object
                      hostnameLabel:
                        description: |-
                          The hostname for the VNIC's primary private IP. Used for DNS. The value is the hostname
                          portion of the primary private IP's fully qualified domain name (FQDN)
                          (for example, `bminstance-1` in FQDN `bminstance-1.subnet123.vcn1.oraclevcn.com`).
                          Must be unique across all VNICs in the subnet and comply with
                          RFC 952 (https://tools.ietf.org/html/rfc952) and
                          RFC 1123 (https://tools.ietf.org/html/rfc1123).
                          The value appears in the Vnic object and also the
                          PrivateIp object returned by
                          ListPrivateIps and
                          GetPrivateIp.
                          For more information, see
                          DNS in Your Virtual Cloud Network (https://docs.oracle.com/iaas/Content/Network/Concepts/dns.htm).
                          When launching an instance, use this `hostnameLabel` instead
                          of the deprecated `hostnameLabel` in
                          LaunchInstanceDetails.
                          If you provide both, the values must match.
                          Example: `bminstance-1`
                          If you specify a `vlanId`, the `hostnameLabel` cannot be specified. VNICs on a VLAN
                          can not be assigned a hostname. See Vlan.
                        type: string
                      nsgIds:
                        description: |-
                          List of OCIDs of the network security groups (NSGs) that are added to the VNIC. For more
                           information about NSGs, see
                           NetworkSecurityGroup.
                           If a `vlanId` is specified, the `nsgIds` cannot be specified. The `vlanId`
                           indicates that the VNIC will belong to a VLAN instead of a subnet. With VLANs,
                           all VNICs in the VLAN belong to the NSGs that are associated with the VLAN.
                           See Vlan.
                        items:
                          type: string
                        type: array
                      privateIp:
                        description: |-
                          A private IP address of your choice to assign to the VNIC. Must be an
                          available IP address within the subnet's CIDR. If you don't specify a
                          value, Oracle automatically assigns a private IP address from the subnet.
                          This is the VNIC's *primary* private IP address. The value appears in
                          the Vnic object and also the
                          PrivateIp object returned by
                          ListPrivateIps and
                          GetPrivateIp.

                          If you specify a `vlanId`, the `privateIp` cannot be specified.
                          See Vlan.
                          Example: `10.0.3.3`
                        type: string
                      skipSourceDestCheck:
                        description: |-
                          Whether the source/destination check is disabled on the VNIC.
                          Defaults to `false`, which means the check is performed. For information
                          about why you should skip the source/destination check, see
                          Using a Private IP as a Route Target (https://docs.oracle.com/iaas/Content/Network/Tasks/managingroutetables.htm#privateip).

                          If you specify a `vlanId`, the `skipSourceDestCheck` cannot be specified because the
                          source/destination check is always disabled for VNICs in a VLAN. See
                          Vlan.
                          Example: `true`
                        type: boolean
                      subnetId:
                        description: |-
                          The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the subnet to create the VNIC. When launching an instance,
                          use this `subnetId` instead of the deprecated `subnetId` in
                          LaunchInstanceDetails.
                          At least one of them is required; if you provide both, the values must match.
                          If you are an Oracle Cloud VMware Solution customer and creating a secondary
                          VNIC in a VLAN instead of a subnet, provide a `vlanId` instead of a `subnetId`.
                          If you provide both `vlanId` and `subnetId`, the request fails.
                        type: string
                      vlanId:
                        description: |-
                          Provide this attribute only if you are an Oracle Cloud VMware Solution
                          customer and creating a secondary VNIC in a VLAN. The value is the OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the VLAN.
                          See Vlan.
                          Provide a `vlanId` instead of a `subnetId`. If you provide both
                          `vlanId` and `subnetId`, the request fails.
                        type: string
                    type: object
                  dedicatedVmHostId:
                    description: The OCID of the dedicated VM host.
                    type: string
                  definedTags:
                    additionalProperties:
                      additionalProperties:
                        type: string
                      type: object
                    description: |-
                      Defined tags for this resource. Each key is predefined and scoped to a namespace.
                      Example: `{"foo-namespace": {"bar-key": "value"}}`
                    type: object
                  displayName:
                    description: |-
                      A user-friendly name. Does not have to be unique, and it's changeable.
                      Avoid entering confidential information.
                    type: string
                  faultDomain:
                    description: |-
                      A fault domain is a grouping of hardware and infrastructure within an availability domain.
                      Each availability domain contains three fault domains. Fault domains lets you distribute your
                      instances so that they are not on the same physical hardware within a single availability domain.
                      A hardware failure or Compute hardware maintenance that affects one fault domain does not affect
                      instances in other fault domains.
                      If you do not specify the fault domain, the system selects one for you.

                      To get a list of fault domains, use the
                      ListFaultDomains operation in the
                      Identity and Access Management Service API.
                      Example: `FAULT-DOMAIN-1`
                    type: string
                  freeformTags:
                    additionalProperties:
                      type: string
                    description: |-
                      Simple key-value pair that is applied without any predefined name, type or scope. It exists only for cross-compatibility.
                      Example: `{"bar-key": "value"}`
                    type: object
                  hostnameLabel:
                    description: |-
                      Deprecated. Instead use `hostnameLabel` in
                      CreateVnicDetails.
                      If you provide both, the values must match.
                    type: string
                  instanceOptions:
                    description: TargetAssetUserSpecInstanceOptions defines nested
                      fields for TargetAsset.UserSpec.InstanceOptions.
                    properties:
                      areLegacyImdsEndpointsDisabled:
                        description: |-
                          Whether to disable the legacy (/v1) instance metadata service endpoints.
                          Customers who have migrated to /v2 should set this to true for added security.
                          Default is false.
                        type: boolean
                    type: object
                  ipxeScript:
                    description: |-
                      This is an advanced option.
                      When a bare metal or virtual machine
                      instance boots, the iPXE firmware that runs on the instance is
                      configured to run an iPXE script to continue the boot process.
                      If you want more control over the boot process, you can provide
                      your own custom iPXE script that will run when the instance boots.
                      Be aware that the same iPXE script will run
                      every time an instance boots, not only after the initial
                      LaunchInstance call.
                      By default, the iPXE script connects to the instance's local boot
                      volume over iSCSI and performs a network boot. If you use a custom iPXE
                      script and want to network-boot from the instance's local boot volume
                      over iSCSI in the same way as the default iPXE script, use the
                      following iSCSI IP address: 169.254.0.2, and boot volume IQN:
                      iqn.2015-02.oracle.boot.
                      If your instance boot volume type is paravirtualized,
                      the boot volume is attached to the instance through virtio-scsi and no iPXE script is used.
                      If your instance boot volume type is paravirtualized
                      and you use custom iPXE to perform network-boot into your instance,
                      the primary boot volume is attached as a data volume through the virtio-scsi drive.
                      For more information about the Bring Your Own Image feature of
                      Oracle Cloud Infrastructure, see
                      Bring Your Own Image (https://docs.oracle.com/iaas/Content/Compute/References/bringyourownimage.htm).
                      For more information about iPXE, see http://ipxe.org.
                    type: string
                  isPvEncryptionInTransitEnabled:
                    description: Whether to enable in-transit encryption for the data
                      volume's paravirtualized attachment. This field applies to both
                      block volumes and boot volumes. By default, the value is false.
                    type: boolean
                  preemptibleInstanceConfig:
                    description: TargetAssetUserSpecPreemptibleInstanceConfig defines
                      nested fields for TargetAsset.UserSpec.PreemptibleInstanceConfig.
                    properties:
                      preemptionAction:
                        description: TargetAssetUserSpecPreemptibleInstanceConfigPreemptionAction
                          defines nested fields for TargetAsset.UserSpec.PreemptibleInstanceConfig.PreemptionAction.
                        properties:
                          jsonData:
                            type: string
                          preserveBootVolume:
                            description: Whether to preserve the boot volume that
                              was used to launch the preemptible instance when the
                              instance is terminated. By default, it is false if not
                              specified.
                            type: boolean
                          type:
                            type: string
                        type: object
                    required:
                    - preemptionAction
                    type: object
                  shape:
                    description: |-
                      The shape of an instance. The shape determines the number of CPUs, amount of memory,
                      and other resources allocated to the instance.
                      You can enumerate all available shapes by calling ListShapes.
                    type: string
                  shapeConfig:
                    description: TargetAssetUserSpecShapeConfig defines nested fields
                      for TargetAsset.UserSpec.ShapeConfig.
                    properties:
                      baselineOcpuUtilization:
                        description: |-
                          The baseline OCPU utilization for a subcore burstable VM instance. Leave this attribute blank for a
                          non-burstable instance, or explicitly specify non-burstable with `BASELINE_1_1`.
                          The following values are supported:
                          - `BASELINE_1_8` - baseline usage is 1/8 of an OCPU.
                          - `BASELINE_1_2` - baseline usage is 1/2 of an OCPU.
                          - `BASELINE_1_1` - baseline usage is an entire OCPU. This represents a non-burstable instance.
                        type: string
                      memoryInGBs:
                        description: The total amount of memory in gigabytes that
                          is available to the instance.
                        type: number
                      ocpus:
                        description: The total number of OCPUs available to the instance.
                        type: number
                    type: object
                  sourceDetails:
                    description: TargetAssetUserSpecSourceDetails defines nested fields
                      for TargetAsset.UserSpec.SourceDetails.
                    properties:
                      bootVolumeId:
                        description: The OCID of the boot volume used to boot the
                          instance.
                        type: string
                      bootVolumeSizeInGBs:
                        description: The size of the boot volume in GBs. The minimum
                          value is 50 GB and the maximum value is 32,768 GB (32 TB).
                        format: int64
                        type: integer
                      bootVolumeVpusPerGB:
                        description: |-
                          The number of volume performance units (VPUs) that will be applied to this volume per GB that
                          represents the Block Volume service's elastic performance options.
                          See Block Volume Performance Levels (https://docs.oracle.com/iaas/Content/Block/Concepts/blockvolumeperformance.htm#perf_levels) for more information.
                          Allowed values:
                            * `10`: Represents Balanced option.
                            * `20`: Represents Higher Performance option.
                            * `30`-`120`: Represents the Ultra High Performance option.
                          For volumes with the auto-tuned performance feature enabled, this is set to the default (minimum) VPUs/GB.
                        format: int64
                        type: integer
                      imageId:
                        description: The OCID of the image used to boot the instance.
                        type: string
                      jsonData:
                        type: string
                      kmsKeyId:
                        description: The OCID of the key management key to assign
                          as the master encryption key for the boot volume.
                        type: string
                      sourceType:
                        type: string
                    type: object
                type: object
            required:
            - isExcludedFromExecution
            - migrationPlanId
            type: object
          status:
            description: TargetAssetStatus defines the observed state of TargetAsset.
            properties:
              blockVolumesPerformance:
                description: Performance of the block volumes.
                type: integer
              compartmentId:
                description: Compartment identifier
                type: string
              compatibilityMessages:
                description: Messages about the compatibility issues.
                items:
                  description: TargetAssetCompatibilityMessage defines nested fields
                    for TargetAsset.CompatibilityMessage.
                  properties:
                    message:
                      description: Detailed description of the compatibility issue.
                      type: string
                    name:
                      description: Name of the compatibility issue.
                      type: string
                    severity:
                      description: Severity level of the compatibility issue.
                      type: string
                  type: object
                type: array
              createdResourceId:
                description: Created resource identifier
                type: string
              displayName:
                description: A user-friendly name. Does not have to be unique, and
                  it's changeable. Avoid entering confidential information.
                type: string
              estimatedCost:
                description: TargetAssetEstimatedCost defines nested fields for TargetAsset.EstimatedCost.
                properties:
                  compute:
                    description: TargetAssetEstimatedCostCompute defines nested fields
                      for TargetAsset.EstimatedCost.Compute.
                    properties:
                      gpuCount:
                        description: Total number of GPU
                        type: number
                      gpuPerHour:
                        description: GPU per hour
                        type: number
                      gpuPerHourBySubscription:
                        description: GPU per hour by subscription
                        type: number
                      memoryAmountGb:
                        description: Total usage of memory
                        type: number
                      memoryGbPerHour:
                        description: Gigabyte per hour
                        type: number
                      memoryGbPerHourBySubscription:
                        description: Gigabyte per hour by subscription
                        type: number
                      ocpuCount:
                        description: Total number of OCPUs
                        type: number
                      ocpuPerHour:
                        description: OCPU per hour
                        type: number
                      ocpuPerHourBySubscription:
                        description: OCPU per hour by subscription
                        type: number
                      totalPerHour:
                        description: Total per hour
                        type: number
                      totalPerHourBySubscription:
                        description: Total usage per hour by subscription
                        type: number
                    type: object
                  currencyCode:
                    description: Currency code in the ISO format.
                    type: string
                  osImage:
                    description: TargetAssetEstimatedCostOsImage defines nested fields
                      for TargetAsset.EstimatedCost.OsImage.
                    properties:
                      totalPerHour:
                        description: Total price per hour
                        type: number
                      totalPerHourBySubscription:
                        description: Total price per hour by subscription
                        type: number
                    type: object
                  storage:
                    description: TargetAssetEstimatedCostStorage defines nested fields
                      for TargetAsset.EstimatedCost.Storage.
                    properties:
                      totalGbPerMonth:
                        description: Gigabyte storage capacity per month.
                        type: number
                      totalGbPerMonthBySubscription:
                        description: Gigabyte storage capacity per month by subscription.
                        type: number
                      volumes:
                        description: Volume estimation
                        items:
                          description: TargetAssetEstimatedCostStorageVolume defines
                            nested fields for TargetAsset.EstimatedCost.Storage.Volume.
                          properties:
                            capacityGb:
                              description: Gigabyte storage capacity
                              type: number
                            description:
                              description: Volume description
                              type: string
                            totalGbPerMonth:
                              description: Gigabyte storage capacity per month.
                              type: number
                            totalGbPerMonthBySubscription:
                              description: Gigabyte storage capacity per month by
                                subscription
                              type: number
                          type: object
                        type: array
                    type: object
                  subscriptionId:
                    description: Subscription ID
                    type: string
                  totalEstimationPerMonth:
                    description: Total estimation per month
                    type: number
                  totalEstimationPerMonthBySubscription:
                    description: Total estimation per month by subscription.
                    type: number
                type: object
              id:
                description: Unique identifier that is immutable on creation.
                type: string
              isExcludedFromExecution:
                description: A boolean indicating whether the asset should be migrated.
                type: boolean
              jsonData:
                type: string
              lifecycleDetails:
                description: A message describing the current state in more detail.
                  For example, it can be used to provide actionable information for
                  a resource in Failed state.
                type: string
              lifecycleState:
                description: The current state of the target asset.
                type: string
              migrationAsset:
                description: TargetAssetMigrationAsset defines nested fields for TargetAsset.MigrationAsset.
                properties:
                  availabilityDomain:
                    description: Availability domain
                    type: string
                  compartmentId:
                    description: Compartment Identifier
                    type: string
                  dependedOnBy:
                    description: List of migration assets that depend on the asset.
                    items:
                      type: string
                    type: array
                  dependsOn:
                    description: List of migration assets that depends on the asset.
                    items:
                      type: string
                    type: array
                  destinationDisks:
                    additionalProperties:
                      description: TargetAssetMigrationAssetDestinationDisks defines
                        nested fields for TargetAsset.MigrationAsset.DestinationDisks.
                      properties:
                        uuid:
                          description: UUID of disk
                          type: string
                      type: object
                    description: Mapping of source disk id to destination disk details
                    type: object
                  displayName:
                    description: A user-friendly name. Does not have to be unique,
                      and it's changeable. Avoid entering confidential information.
                    type: string
                  id:
                    description: Asset ID generated by mirgration service. It is used
                      in the mirgration service pipeline.
                    type: string
                  lifecycleDetails:
                    description: A message describing the current state in more detail.
                      For example, it can be used to provide actionable information
                      for a resource in Failed state.
                    type: string
                  lifecycleState:
                    description: The current state of the migration asset.
                    type: string
                  migrationId:
                    description: OCID of the associated migration.
                    type: string
                  notifications:
                    description: List of notifications
                    items:
                      type: string
                    type: array
                  parentSnapshot:
                    description: The parent snapshot of the migration asset to be
                      used by the replication task.
                    type: string
                  replicationCompartmentId:
                    description: Replication compartment identifier
                    type: string
                  replicationLocationDetail:
                    description: TargetAssetMigrationAssetReplicationLocationDetail
                      defines nested fields for TargetAsset.MigrationAsset.ReplicationLocationDetail.
                    properties:
                      metadata:
                        description: Properties for each of the replication location
                          types
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      replicationLocationType:
                        description: The type of replication location
                        type: string
                    type: object
                  replicationScheduleId:
                    description: Replication schedule identifier
                    type: string
                  snapShotBucketName:
                    description: Name of snapshot bucket
                    type: string
                  snapshots:
                    additionalProperties:
                      description: TargetAssetMigrationAssetSnapshots defines nested
                        fields for TargetAsset.MigrationAsset.Snapshots.
                      properties:
                        unmodifiedVolumeId:
                          description: ID of the unmodified volume
                          type: string
                        uuid:
                          description: ID of the vCenter disk obtained from Inventory.
                          type: string
                        volumeId:
                          description: ID of the hydration server volume
                          type: string
                        volumeType:
                          description: The hydration server volume type
                          type: string
                      type: object
                    description: |-
                      Key-value pair representing disks ID mapped to the OCIDs of replicated or hydration server volume snapshots.
                      Example: `{"bar-key": "value"}`
                    type: object
                  sourceAssetData:
                    additionalProperties:
                      description: JSONValue preserves arbitrary JSON values inside
                        generated CRD fields.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    description: |-
                      Key-value pair representing asset metadata keys and values scoped to a namespace.
                      Example: `{"bar-key": "value"}`
                    type: object
