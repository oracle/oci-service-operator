---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: stacks.resourcemanager.oracle.com
spec:
  group: resourcemanager.oracle.com
  names:
    kind: Stack
    listKind: StackList
    plural: stacks
    singular: stack
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the Stack
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Stack
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Stack is the Schema for the stacks API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: StackSpec defines the desired state of Stack.
            properties:
              compartmentId:
                description: Unique identifier (OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm))
                  of the compartment in which the stack resides.
                type: string
              configSource:
                description: StackConfigSource defines nested fields for Stack.ConfigSource.
                properties:
                  branchName:
                    description: The name of the branch that contains the Terraform
                      configuration.
                    type: string
                  bucketName:
                    description: The name of the bucket that contains the Terraform
                      configuration files.
                    type: string
                  compartmentId:
                    description: |-
                      The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the compartment to use for creating the stack.
                      The new stack will include definitions for supported resource types in scope of the specified compartment OCID (tenancy level for root compartment, compartment level otherwise).
                    type: string
                  configSourceType:
                    type: string
                  configurationSourceProviderId:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the Bitbucket Cloud configuration source.
                    type: string
                  jsonData:
                    type: string
                  namespace:
                    description: The Object Storage namespace that contains the bucket.
                    type: string
                  projectId:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the Project.
                    type: string
                  region:
                    description: |-
                      The name of the bucket's region.
                      Example: `us-phoenix-1`
                    type: string
                  repositoryId:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the Repository.
                    type: string
                  repositoryUrl:
                    description: The URL of the Bitbucket Cloud repository for the
                      configuration source.
                    type: string
                  servicesToDiscover:
                    description: |-
                      Filter for services to use with Resource Discovery (https://www.terraform.io/docs/providers/oci/guides/resource_discovery.html#services).
                      For example, "database" limits resource discovery to resource types within the Database service.
                      The specified services must be in scope of the given compartment OCID (tenancy level for root compartment, compartment level otherwise).
                      If not specified, then all services at the scope of the given compartment OCID are used.
                    items:
                      type: string
                    type: array
                  templateId:
                    type: string
                  workingDirectory:
                    description: |-
                      File path to the directory to use for running Terraform.
                      If not specified, the root directory is used.
                      Required when using a zip Terraform configuration (`configSourceType` value of `ZIP_UPLOAD`) that contains folders.
                      Ignored for the `configSourceType` value of `COMPARTMENT_CONFIG_SOURCE`.
                      For more information about required and recommended file structure, see
                      File Structure (Terraform Configurations for Resource Manager) (https://docs.oracle.com/iaas/Content/ResourceManager/Concepts/terraformconfigresourcemanager.htm#filestructure).
                    type: string
                  workspaceId:
                    description: The id of the workspace in Bitbucket Cloud for the
                      configuration source
                    type: string
                  zipFileBase64Encoded:
                    type: string
                type: object
              customTerraformProvider:
                description: StackCustomTerraformProvider defines nested fields for
                  Stack.CustomTerraformProvider.
                properties:
                  bucketName:
                    description: |-
                      The name of the bucket that contains the binary files for the custom Terraform providers.
                      For information about buckets, see Managing Buckets (https://docs.oracle.com/iaas/Content/Object/Tasks/managingbuckets.htm).
                    type: string
                  namespace:
                    description: |-
                      The Object Storage namespace that contains the bucket you want.
                      For information about Object Storage namespaces, see Understanding Object Storage Namespaces (https://docs.oracle.com/iaas/Content/Object/Tasks/understandingnamespaces.htm).
                    type: string
                  region:
                    description: |-
                      The name of the region that contains the bucket you want.
                      For information about regions, see Regions and Availability Domains (https://docs.oracle.com/iaas/Content/General/Concepts/regions.htm).
                      Example: `us-phoenix-1`
                    type: string
                required:
                - bucketName
                - namespace
                - region
                type: object
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags associated with this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              description:
                description: Description of the stack.
                type: string
              displayName:
                description: A user-friendly name. Does not have to be unique, and
                  it's changeable. Avoid entering confidential information.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags associated with this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              isThirdPartyProviderExperienceEnabled:
                description: |-
                  When `true`, changes the stack's sourcing of third-party Terraform providers to
                  Terraform Registry (https://registry.terraform.io/browse/providers) and allows
                  CustomTerraformProvider.
                  Applies to older stacks.
                  Once set to `true`, cannot be reverted.
                  For more information about stack sourcing of third-party Terraform providers, see
                  Third-party Provider Configuration (https://docs.oracle.com/iaas/Content/ResourceManager/Concepts/terraformconfigresourcemanager.htm#third-party-providers).
                type: boolean
              terraformVersion:
                description: 'The version of Terraform to use with the stack. Example:
                  `1.5.x`'
                type: string
              variables:
                additionalProperties:
                  type: string
                description: |-
                  Terraform variables associated with this resource.
                  Maximum number of variables supported is 250.
                  The maximum size of each variable, including both name and value, is 8192 bytes.
                  Example: `{"CompartmentId": "compartment-id-value"}`
                type: object
            required:
            - compartmentId
            - configSource
            type: object
          status:
            description: StackStatus defines the observed state of Stack.
            properties:
              compartmentId:
                description: Unique identifier (OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm))
                  for the compartment where the stack is located.
                type: string
              configSource:
                description: StackConfigSource defines nested fields for Stack.ConfigSource.
                properties:
                  branchName:
                    description: The name of the branch that contains the Terraform
                      configuration.
                    type: string
                  bucketName:
                    description: The name of the bucket that contains the Terraform
                      configuration files.
                    type: string
                  compartmentId:
                    description: |-
                      The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm) of the compartment to use for creating the stack.
                      The new stack will include definitions for supported resource types in scope of the specified compartment OCID (tenancy level for root compartment, compartment level otherwise).
                    type: string
                  configSourceType:
                    type: string
                  configurationSourceProviderId:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the Bitbucket Cloud configuration source.
                    type: string
                  jsonData:
                    type: string
                  namespace:
                    description: The Object Storage namespace that contains the bucket.
                    type: string
                  projectId:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the Project.
                    type: string
                  region:
                    description: |-
                      The name of the bucket's region.
                      Example: `us-phoenix-1`
                    type: string
                  repositoryId:
                    description: The OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm)
                      of the Repository.
                    type: string
                  repositoryUrl:
                    description: The URL of the Bitbucket Cloud repository for the
                      configuration source.
                    type: string
                  servicesToDiscover:
                    description: |-
                      Filter for services to use with Resource Discovery (https://www.terraform.io/docs/providers/oci/guides/resource_discovery.html#services).
                      For example, "database" limits resource discovery to resource types within the Database service.
                      The specified services must be in scope of the given compartment OCID (tenancy level for root compartment, compartment level otherwise).
                      If not specified, then all services at the scope of the given compartment OCID are used.
                    items:
                      type: string
                    type: array
                  templateId:
                    type: string
                  workingDirectory:
                    description: |-
                      File path to the directory to use for running Terraform.
                      If not specified, the root directory is used.
                      Required when using a zip Terraform configuration (`configSourceType` value of `ZIP_UPLOAD`) that contains folders.
                      Ignored for the `configSourceType` value of `COMPARTMENT_CONFIG_SOURCE`.
                      For more information about required and recommended file structure, see
                      File Structure (Terraform Configurations for Resource Manager) (https://docs.oracle.com/iaas/Content/ResourceManager/Concepts/terraformconfigresourcemanager.htm#filestructure).
                    type: string
                  workspaceId:
                    description: The id of the workspace in Bitbucket Cloud for the
                      configuration source
                    type: string
                  zipFileBase64Encoded:
                    type: string
                type: object
              customTerraformProvider:
                description: StackCustomTerraformProvider defines nested fields for
                  Stack.CustomTerraformProvider.
                properties:
                  bucketName:
                    description: |-
                      The name of the bucket that contains the binary files for the custom Terraform providers.
                      For information about buckets, see Managing Buckets (https://docs.oracle.com/iaas/Content/Object/Tasks/managingbuckets.htm).
                    type: string
                  namespace:
                    description: |-
                      The Object Storage namespace that contains the bucket you want.
                      For information about Object Storage namespaces, see Understanding Object Storage Namespaces (https://docs.oracle.com/iaas/Content/Object/Tasks/understandingnamespaces.htm).
                    type: string
                  region:
                    description: |-
                      The name of the region that contains the bucket you want.
                      For information about regions, see Regions and Availability Domains (https://docs.oracle.com/iaas/Content/General/Concepts/regions.htm).
                      Example: `us-phoenix-1`
                    type: string
                required:
                - bucketName
                - namespace
                - region
                type: object
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              description:
                description: Description of the stack.
                type: string
              displayName:
                description: A user-friendly name. Does not have to be unique, and
                  it's changeable. Avoid entering confidential information.
                type: string
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags associated with the resource. Each tag is a key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              id:
                description: Unique identifier (OCID (https://docs.oracle.com/iaas/Content/General/Concepts/identifiers.htm))
                  for the stack.
                type: string
              isThirdPartyProviderExperienceEnabled:
                description: |-
                  When `true`, the stack sources third-party Terraform providers from
                  Terraform Registry (https://registry.terraform.io/browse/providers) and allows
                  CustomTerraformProvider.
                  For more information about stack sourcing of third-party Terraform providers, see
                  Third-party Provider Configuration (https://docs.oracle.com/iaas/Content/ResourceManager/Concepts/terraformconfigresourcemanager.htm#third-party-providers).
                type: boolean
              lifecycleState:
                description: |-
                  The current lifecycle state of the stack.
                  For more information about stack lifecycle states in Resource Manager, see
                  Key Concepts (https://docs.oracle.com/iaas/Content/ResourceManager/Concepts/resourcemanager.htm#concepts__StackStates).
                type: string
              stackDriftStatus:
                description: |-
                  Drift status of the stack.
                  Drift refers to differences between the actual (current) state of the stack and the expected (defined) state of the stack.
                type: string
              status:
                properties:
                  async:
                    description: |-
                      Async is the canonical controller-owned async contract. Resource-local
                      legacy work-request fields may remain as compatibility mirrors while
                      follow-on migrations land, but new async state should project here first.
                    properties:
                      current:
                        properties:
                          message:
                            type: string
                          normalizedClass:
                            enum:
                            - pending
                            - succeeded
                            - failed
                            - canceled
                            - attention
                            - unknown
                            type: string
                          percentComplete:
                            maximum: 100
                            minimum: 0
                            type: number
                          phase:
                            enum:
                            - create
                            - update
                            - delete
                            type: string
                          rawOperationType:
                            type: string
                          rawStatus:
                            type: string
                          source:
                            enum:
                            - none
                            - lifecycle
                            - workrequest
                            type: string
                          updatedAt:
                            format: date-time
                            type: string
                          workRequestId:
                            type: string
                        required:
                        - normalizedClass
                        - phase
                        - source
                        - updatedAt
                        type: object
                    type: object
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  opcRequestId:
                    description: |-
                      OpcRequestID is the latest non-empty OCI request ID from a mutating OCI
                      response or surfaced OCI service error that materially contributed to the
                      current shared status projection. Headerless follow-up observations keep
                      the last non-empty value intact.
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              systemTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  The system tags associated with this resource, if any. The system tags are set by Oracle cloud infrastructure services. Each key is predefined and scoped to namespaces.
                  For more information, see Resource Tags (https://docs.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{orcl-cloud: {free-tier-retain: true}}`
                type: object
              terraformVersion:
                description: 'The version of Terraform specified for the stack. Example:
                  `1.5.x`'
                type: string
              timeCreated:
                description: |-
                  The date and time at which the stack was created.
                  Format is defined by RFC3339.
                  Example: `2020-01-25T21:10:29.600Z`
                type: string
              timeDriftLastChecked:
                description: |-
                  The date and time when the drift detection was last executed.
                  Format is defined by RFC3339.
                  Example: `2020-01-25T21:10:29.600Z`
                type: string
              variables:
                additionalProperties:
                  type: string
                description: |-
                  Terraform variables associated with this resource.
                  Maximum number of variables supported is 250.
                  The maximum size of each variable, including both name and value, is 8192 bytes.
                  Example: `{"CompartmentId": "compartment-id-value"}`
                type: object
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
