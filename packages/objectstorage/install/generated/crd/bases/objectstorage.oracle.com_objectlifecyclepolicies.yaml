  names:
    kind: ObjectLifecyclePolicy
    listKind: ObjectLifecyclePolicyList
    plural: objectlifecyclepolicies
    singular: objectlifecyclepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: status of the ObjectLifecyclePolicy
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the ObjectLifecyclePolicy
      jsonPath: .status.status.ocid
      name: Ocid
