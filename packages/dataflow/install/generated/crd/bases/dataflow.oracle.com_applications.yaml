                  See https://docs.cloud.oracle.com/iaas/Content/API/SDKDocs/hdfsconnector.htm#uriformat.
                type: string
            required:
            - compartmentId
            - displayName
            - driverShape
            - executorShape
            - language
            - numExecutors
            - sparkVersion
            type: object
