                  - value
                  type: object
                type: array
              poolId:
                description: The OCID of a pool. Unique Id to indentify a dataflow
                  pool resource.
                type: string
              privateEndpointId:
                description: The OCID of a private endpoint.
                type: string
              sparkVersion:
                description: The Spark version utilized to run the application.
                type: string
              type:
                description: The Spark application processing type.
                type: string
              warehouseBucketUri:
                description: |-
                  An Oracle Cloud Infrastructure URI of the bucket to be used as default warehouse directory
