---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: runs.dataflow.oracle.com
spec:
  group: dataflow.oracle.com
  names:
    kind: Run
    listKind: RunList
    plural: runs
    singular: run
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the Run
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Run
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Run is the Schema for the runs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RunSpec defines the desired state of Run.
            properties:
              applicationId:
                description: The OCID of the associated application. If this value
                  is set, then no value for the execute parameter is required. If
                  this value is not set, then a value for the execute parameter is
                  required, and a new application is created and associated with the
                  new run.
                type: string
              applicationLogConfig:
                description: RunApplicationLogConfig defines nested fields for Run.ApplicationLogConfig.
                properties:
                  logGroupId:
                    description: The log group id for where log objects will be for
                      Data Flow Runs.
                    type: string
                  logId:
                    description: The log id of the log object the Application Logs
                      of Data Flow Run will be shipped to.
                    type: string
                required:
                - logGroupId
                - logId
                type: object
              archiveUri:
                description: |-
                  A comma separated list of one or more archive files as Oracle Cloud Infrastructure URIs. For example, ``oci://path/to/a.zip,oci://path/to/b.zip``. An Oracle Cloud Infrastructure URI of an archive.zip file containing custom dependencies that may be used to support the execution of a Python, Java, or Scala application.
                  See https://docs.cloud.oracle.com/iaas/Content/API/SDKDocs/hdfsconnector.htm#uriformat.
                type: string
              arguments:
                description: |-
                  The arguments passed to the running application as command line arguments.  An argument is
                  either a plain text or a placeholder. Placeholders are replaced using values from the parameters
                  map.  Each placeholder specified must be represented in the parameters map else the request
                  (POST or PUT) will fail with a HTTP 400 status code.  Placeholders are specified as
                  `Service Api Spec`, where `name` is the name of the parameter.
                  Example:  `[ "--input", "${input_file}", "--name", "John Doe" ]`
                  If "input_file" has a value of "mydata.xml", then the value above will be translated to
                  `--input mydata.xml --name "John Doe"`
                items:
                  type: string
                type: array
              compartmentId:
                description: The OCID of a compartment.
                type: string
              configuration:
                additionalProperties:
                  type: string
                description: |-
                  The Spark configuration passed to the running process.
                  See https://spark.apache.org/docs/latest/configuration.html#available-properties.
                  Example: { "spark.app.name" : "My App Name", "spark.shuffle.io.maxRetries" : "4" }
                  Note: Not all Spark properties are permitted to be set.  Attempting to set a property that is
                  not allowed to be overwritten will cause a 400 status to be returned.
                type: object
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace. For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: A user-friendly name that does not have to be unique.
                  Avoid entering confidential information. If this value is not specified,
                  it will be derived from the associated application's displayName
                  or set by API using fileUri's application file name.
                type: string
              driverShape:
                description: The VM shape for the driver. Sets the driver cores and
                  memory.
                type: string
              driverShapeConfig:
                description: RunDriverShapeConfig defines nested fields for Run.DriverShapeConfig.
                properties:
                  memoryInGBs:
                    description: The amount of memory used for the driver or executors.
                    type: number
                  ocpus:
                    description: |-
                      The total number of OCPUs used for the driver or executors.
                      See here (https://docs.cloud.oracle.com/en-us/iaas/api/#/en/iaas/20160918/Shape/) for details.
                    type: number
                type: object
              execute:
                description: |-
                  The input used for spark-submit command. For more details see https://spark.apache.org/docs/latest/submitting-applications.html#launching-applications-with-spark-submit.
                  Supported options include ``--class``, ``--file``, ``--jars``, ``--conf``, ``--py-files``, and main application file with arguments.
                  Example: ``--jars oci://path/to/a.jar,oci://path/to/b.jar --files oci://path/to/a.json,oci://path/to/b.csv --py-files oci://path/to/a.py,oci://path/to/b.py --conf spark.sql.crossJoin.enabled=true --class org.apache.spark.examples.SparkPi oci://path/to/main.jar 10``
                  Note: If execute is specified together with applicationId, className, configuration, fileUri, language, arguments, parameters during application create/update, or run create/submit,
                  Data Flow service will use derived information from execute input only.
                type: string
              executorShape:
                description: The VM shape for the executors. Sets the executor cores
                  and memory.
                type: string
              executorShapeConfig:
                description: RunExecutorShapeConfig defines nested fields for Run.ExecutorShapeConfig.
                properties:
                  memoryInGBs:
                    description: The amount of memory used for the driver or executors.
                    type: number
                  ocpus:
                    description: |-
                      The total number of OCPUs used for the driver or executors.
                      See here (https://docs.cloud.oracle.com/en-us/iaas/api/#/en/iaas/20160918/Shape/) for details.
                    type: number
                type: object
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              idleTimeoutInMinutes:
                description: |-
                  The timeout value in minutes used to manage Runs. A Run would be stopped after inactivity for this amount of time period.
                  Note: This parameter is currently only applicable for Runs of type `SESSION`. Default value is 2880 minutes (2 days)
                format: int64
                type: integer
              logsBucketUri:
                description: |-
                  An Oracle Cloud Infrastructure URI of the bucket where the Spark job logs are to be uploaded.
                  See https://docs.cloud.oracle.com/iaas/Content/API/SDKDocs/hdfsconnector.htm#uriformat.
                type: string
              maxDurationInMinutes:
                description: |-
                  The maximum duration in minutes for which an Application should run. Data Flow Run would be terminated
                  once it reaches this duration from the time it transitions to `IN_PROGRESS` state.
                format: int64
                type: integer
              metastoreId:
                description: The OCID of OCI Hive Metastore.
                type: string
              numExecutors:
                description: The number of executor VMs requested.
                type: integer
              parameters:
                description: |-
                  An array of name/value pairs used to fill placeholders found in properties like
                  `Application.arguments`.  The name must be a string of one or more word characters
                  (a-z, A-Z, 0-9, _).  The value can be a string of 0 or more characters of any kind.
                  Example:  [ { name: "iterations", value: "10"}, { name: "input_file", value: "mydata.xml" }, { name: "variable_x", value: "${x}"} ]
                items:
                  description: RunParameter defines nested fields for Run.Parameter.
                  properties:
                    name:
                      description: |-
                        The name of the parameter.  It must be a string of one or more word characters
                        (a-z, A-Z, 0-9, _).
                        Examples: "iterations", "input_file"
                      type: string
                    value:
                      description: |-
                        The value of the parameter. It must be a string of 0 or more characters of any kind.
                        Examples: "" (empty string), "10", "mydata.xml", "${x}"
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
              poolId:
                description: The OCID of a pool. Unique Id to indentify a dataflow
                  pool resource.
                type: string
              sparkVersion:
                description: The Spark version utilized to run the application. This
                  value may be set if applicationId is not since the Spark version
                  will be taken from the associated application.
                type: string
              type:
                description: The Spark application processing type.
                type: string
              warehouseBucketUri:
                description: |-
                  An Oracle Cloud Infrastructure URI of the bucket to be used as default warehouse directory
                  for BATCH SQL runs.
                  See https://docs.cloud.oracle.com/iaas/Content/API/SDKDocs/hdfsconnector.htm#uriformat.
                type: string
            required:
            - compartmentId
            type: object
          status:
            description: RunStatus defines the observed state of Run.
            properties:
              applicationId:
                description: The application ID.
                type: string
              applicationLogConfig:
                description: RunApplicationLogConfig defines nested fields for Run.ApplicationLogConfig.
                properties:
                  logGroupId:
                    description: The log group id for where log objects will be for
