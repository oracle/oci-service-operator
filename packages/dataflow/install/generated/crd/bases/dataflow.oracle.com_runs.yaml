                  - value
                  type: object
                type: array
              poolId:
                description: The OCID of a pool. Unique Id to indentify a dataflow
                  pool resource.
                type: string
              privateEndpointDnsZones:
                description: |-
                  An array of DNS zone names.
                  Example: `[ "app.examplecorp.com", "app.examplecorp2.com" ]`
                items:
                  type: string
                type: array
              privateEndpointId:
                description: The OCID of a private endpoint.
                type: string
              privateEndpointMaxHostCount:
                description: |-
                  The maximum number of hosts to be accessed through the private endpoint. This value is used
                  to calculate the relevant CIDR block and should be a multiple of 256.  If the value is not a
                  multiple of 256, it is rounded up to the next multiple of 256. For example, 300 is rounded up
                  to 512.
                type: integer
              privateEndpointNsgIds:
                description: An array of network security group OCIDs.
                items:
                  type: string
                type: array
              privateEndpointSubnetId:
                description: The OCID of a subnet.
                type: string
              runDurationInMilliseconds:
                description: The duration of the run in milliseconds.
                format: int64
                type: integer
              sparkVersion:
                description: The Spark version utilized to run the application.
                type: string
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
