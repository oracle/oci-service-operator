---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: keys.keymanagement.oracle.com
spec:
  group: keymanagement.oracle.com
  names:
    kind: Key
    listKind: KeyList
    plural: keys
    singular: key
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      priority: 1
      type: string
    - description: status of the Key
      jsonPath: .status.status.conditions[-1].type
      name: Status
      type: string
    - description: Ocid of the Key
      jsonPath: .status.status.ocid
      name: Ocid
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Key is the Schema for the keies API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KeySpec defines the desired state of Key.
            properties:
              autoKeyRotationDetails:
                description: KeyAutoKeyRotationDetails defines nested fields for Key.AutoKeyRotationDetails.
                properties:
                  lastRotationMessage:
                    description: The last execution status message.
                    type: string
                  lastRotationStatus:
                    description: The status of last execution of auto key rotation.
                    type: string
                  rotationIntervalInDays:
                    description: The interval of auto key rotation. For auto key rotation
                      the interval should between 30 day and 365 days (1 year)
                    type: integer
                  timeOfLastRotation:
                    description: 'A  property indicating Last rotation Date Example:
                      `2023-04-04T00:00:00Z`.'
                    type: string
                  timeOfNextRotation:
                    description: 'A property indicating Next estimated scheduled Time,
                      as per the interval, expressed as date YYYY-MM-DD String. Example:
                      `2023-04-04T00:00:00Z` .'
                    type: string
                  timeOfScheduleStart:
                    description: 'A property indicating  scheduled start date expressed
                      as date YYYY-MM-DD String. Example: `2023-04-04T00:00:00Z` .'
                    type: string
                type: object
              compartmentId:
                description: The OCID of the compartment where you want to create
                  the master encryption key.
                type: string
              definedTags:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  Defined tags for this resource. Each key is predefined and scoped to a namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Operations": {"CostCenter": "42"}}`
                type: object
              displayName:
                description: |-
                  A user-friendly name for the key. It does not have to be unique, and it is changeable.
                  Avoid entering confidential information.
                type: string
              externalKeyReference:
                description: KeyExternalKeyReference defines nested fields for Key.ExternalKeyReference.
                properties:
                  externalKeyId:
                    description: ExternalKeyId refers to the globally unique key Id
                      associated with the key created in external vault in CTM
                    type: string
                required:
                - externalKeyId
                type: object
              freeformTags:
                additionalProperties:
                  type: string
                description: |-
                  Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
                  For more information, see Resource Tags (https://docs.cloud.oracle.com/Content/General/Concepts/resourcetags.htm).
                  Example: `{"Department": "Finance"}`
                type: object
              isAutoRotationEnabled:
                description: A parameter specifying whether the auto key rotation
                  is enabled or not.
                type: boolean
              keyShape:
                description: KeyShape defines nested fields for Key.KeyShape.
                properties:
                  algorithm:
                    description: The algorithm used by a key's key versions to encrypt
                      or decrypt. Only AES algorithm is supported for `External` keys.
                    type: string
                  curveId:
                    description: Supported curve IDs for ECDSA keys.
                    type: string
                  length:
                    description: |-
                      The length of the key in bytes, expressed as an integer. Supported values include the following:
                        - AES: 16, 24, or 32
                        - RSA: 256, 384, or 512
                        - ECDSA: 32, 48, or 66
                    type: integer
                required:
                - algorithm
                - length
                type: object
              protectionMode:
                description: |-
                  The key's protection mode indicates how the key persists and where cryptographic operations that use the key are performed.
                  A protection mode of `HSM` means that the key persists on a hardware security module (HSM) and all cryptographic operations are performed inside
                  the HSM. A protection mode of `SOFTWARE` means that the key persists on the server, protected by the vault's RSA wrapping key which persists
                  on the HSM. All cryptographic operations that use a key with a protection mode of `SOFTWARE` are performed on the server. By default,
                  a key's protection mode is set to `HSM`. You can't change a key's protection mode after the key is created or imported.
                  A protection mode of `EXTERNAL` mean that the key persists on the customer's external key manager which is hosted externally outside of oracle.
                  Oracle only hold a reference to that key.
                  All cryptographic operations that use a key with a protection mode of `EXTERNAL` are performed by external key manager.
                type: string
            required:
            - compartmentId
            - displayName
            - keyShape
            type: object
          status:
            description: KeyStatus defines the observed state of Key.
            properties:
              algorithm:
                description: The algorithm used by a key's key versions to encrypt
                  or decrypt data.
                type: string
              currentKeyVersion:
                description: |-
                  The OCID of the key version used in cryptographic operations. During key rotation, the service might be
                  in a transitional state where this or a newer key version are used intermittently. The `currentKeyVersion`
                  property is updated when the service is guaranteed to use the new key version for all subsequent encryption operations.
                type: string
              externalKeyReferenceDetails:
                description: KeyExternalKeyReferenceDetails defines nested fields
                  for Key.ExternalKeyReferenceDetails.
                properties:
                  externalKeyId:
                    description: ExternalKeyId refers to the globally unique key Id
                      associated with the key created in external vault in CTM.
                    type: string
                  externalKeyVersionId:
                    description: Key version ID associated with the external key.
                    type: string
                type: object
              id:
                description: The OCID of the key.
                type: string
              isPrimary:
                description: A Boolean value that indicates whether the Key belongs
                  to primary Vault or replica vault.
                type: boolean
              lifecycleState:
                description: |-
                  The key's current lifecycle state.
                  Example: `ENABLED`
                type: string
              replicaDetails:
                description: KeyReplicaDetails defines nested fields for Key.ReplicaDetails.
                properties:
                  replicationId:
                    description: ReplicationId associated with a key operation
                    type: string
                type: object
              restoredFromKeyId:
                description: The OCID of the key from which this key was restored.
                type: string
              status:
                properties:
                  conditions:
                    items:
                      properties:
                        lastTransitionTime:
                          format: date-time
                          type: string
                        message:
                          type: string
                        reason:
                          type: string
                        status:
                          type: string
                        type:
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  ocid:
                    maxLength: 255
                    minLength: 1
                    type: string
                  reason:
                    type: string
                  requestedAt:
                    format: date-time
                    type: string
                  updatedAt:
                    format: date-time
                    type: string
                type: object
              timeCreated:
                description: |-
                  The date and time the key was created, expressed in RFC 3339 (https://tools.ietf.org/html/rfc3339) timestamp format.
                  Example: `2018-04-03T21:10:29.600Z`
                type: string
              timeOfDeletion:
                description: |-
                  An optional property indicating when to delete the key, expressed in RFC 3339 (https://tools.ietf.org/html/rfc3339) timestamp format.
                  Example: `2019-04-03T21:10:29.600Z`
                type: string
              vaultId:
                description: The OCID of the vault that contains this key.
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
