---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - apigateway.oracle.com
  resources:
  - apigatewaydeployments
  - apigateways
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apigateway.oracle.com
  resources:
  - apigatewaydeployments/finalizers
  - apigateways/finalizers
  verbs:
  - update
- apiGroups:
  - apigateway.oracle.com
  resources:
  - apigatewaydeployments/status
  - apigateways/status
  verbs:
  - get
  - patch
  - update
