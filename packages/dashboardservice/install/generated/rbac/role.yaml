---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - dashboardservice.oracle.com
  resources:
  - dashboardgroups
  - dashboards
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dashboardservice.oracle.com
  resources:
  - dashboardgroups/finalizers
  - dashboards/finalizers
  verbs:
  - update
- apiGroups:
  - dashboardservice.oracle.com
  resources:
  - dashboardgroups/status
  - dashboards/status
  verbs:
  - get
  - patch
  - update
